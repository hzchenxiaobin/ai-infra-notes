<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="720" height="460" fill="#fdfcf7"/>
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">频率平衡示例演算</text>
  <path d="M 240 42 Q 360 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="360" y="66" text-anchor="middle" font-size="13" fill="#444">nums = [1, 2, 2, 1, 2, 3, 3, 3]，固定 i=1（从值 2 开始）</text>

  <!-- Array visualization -->
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="40" y="80" width="36" height="30" fill="#f0f0f0" stroke="#ccc" stroke-width="0.8" rx="4"/></g>
    <text x="58" y="100" text-anchor="middle" fill="#888">1</text>
    <text x="58" y="124" text-anchor="middle" font-size="9" fill="#888">0</text>

    <g filter="url(#sk)"><rect x="76" y="80" width="36" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5" rx="4"/></g>
    <text x="94" y="100" text-anchor="middle" fill="#2b6e9e">2</text>
    <text x="94" y="124" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">i=1</text>

    <g filter="url(#sk)"><rect x="112" y="80" width="36" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="130" y="100" text-anchor="middle" fill="#2b6e9e">2</text>
    <text x="130" y="124" text-anchor="middle" font-size="9" fill="#888">2</text>

    <g filter="url(#sk)"><rect x="148" y="80" width="36" height="30" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2" rx="4"/></g>
    <text x="166" y="100" text-anchor="middle" fill="#7a5415">1</text>
    <text x="166" y="124" text-anchor="middle" font-size="9" fill="#888">3</text>

    <g filter="url(#sk)"><rect x="184" y="80" width="36" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="202" y="100" text-anchor="middle" fill="#2b6e9e">2</text>
    <text x="202" y="124" text-anchor="middle" font-size="9" fill="#888">4</text>

    <g filter="url(#sk)"><rect x="220" y="80" width="36" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="238" y="100" text-anchor="middle" fill="#2e6e2e">3</text>
    <text x="238" y="124" text-anchor="middle" font-size="9" fill="#888">5</text>

    <g filter="url(#sk)"><rect x="256" y="80" width="36" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="274" y="100" text-anchor="middle" fill="#2e6e2e">3</text>
    <text x="274" y="124" text-anchor="middle" font-size="9" fill="#888">6</text>

    <g filter="url(#sk)"><rect x="292" y="80" width="36" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="310" y="100" text-anchor="middle" fill="#2e6e2e">3</text>
    <text x="310" y="124" text-anchor="middle" font-size="9" fill="#888">7</text>
  </g>

  <!-- Step table -->
  <g font-size="11">
    <!-- Header -->
    <g filter="url(#sk)"><rect x="40" y="145" width="50" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="65" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">j</text>
    <g filter="url(#sk)"><rect x="90" y="145" width="120" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="150" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">cnt</text>
    <g filter="url(#sk)"><rect x="210" y="145" width="120" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="270" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">freq</text>
    <g filter="url(#sk)"><rect x="330" y="145" width="80" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="370" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">keys</text>
    <g filter="url(#sk)"><rect x="410" y="145" width="60" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="440" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">平衡?</text>
    <g filter="url(#sk)"><rect x="470" y="145" width="50" height="24" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="495" y="162" text-anchor="middle" fill="#2b2b2b" font-weight="bold">长度</text>

    <!-- j=1 -->
    <g filter="url(#sk)"><rect x="40" y="169" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="65" y="186" text-anchor="middle" fill="#2b6e9e">1</text>
    <g filter="url(#sk)"><rect x="90" y="169" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="150" y="186" text-anchor="middle" fill="#444" font-family="monospace">{2:1}</text>
    <g filter="url(#sk)"><rect x="210" y="169" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="270" y="186" text-anchor="middle" fill="#444" font-family="monospace">{1:1}</text>
    <g filter="url(#sk)"><rect x="330" y="169" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="370" y="186" text-anchor="middle" fill="#444">[1]</text>
    <g filter="url(#sk)"><rect x="410" y="169" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="440" y="186" text-anchor="middle" fill="#2e6e2e">✓</text>
    <g filter="url(#sk)"><rect x="470" y="169" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="495" y="186" text-anchor="middle" fill="#2b6e9e">1</text>

    <!-- j=2 -->
    <g filter="url(#sk)"><rect x="40" y="193" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="65" y="210" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="90" y="193" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="150" y="210" text-anchor="middle" fill="#444" font-family="monospace">{2:2}</text>
    <g filter="url(#sk)"><rect x="210" y="193" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="270" y="210" text-anchor="middle" fill="#444" font-family="monospace">{2:1}</text>
    <g filter="url(#sk)"><rect x="330" y="193" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="370" y="210" text-anchor="middle" fill="#444">[2]</text>
    <g filter="url(#sk)"><rect x="410" y="193" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="440" y="210" text-anchor="middle" fill="#2e6e2e">✓</text>
    <g filter="url(#sk)"><rect x="470" y="193" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="495" y="210" text-anchor="middle" fill="#2b6e9e">2</text>

    <!-- j=3 -->
    <g filter="url(#sk)"><rect x="40" y="217" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="65" y="234" text-anchor="middle" fill="#2b6e9e">3</text>
    <g filter="url(#sk)"><rect x="90" y="217" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="150" y="234" text-anchor="middle" fill="#444" font-family="monospace">{2:2,1:1}</text>
    <g filter="url(#sk)"><rect x="210" y="217" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="270" y="234" text-anchor="middle" fill="#444" font-family="monospace">{2:1,1:1}</text>
    <g filter="url(#sk)"><rect x="330" y="217" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="370" y="234" text-anchor="middle" fill="#444">[1,2]</text>
    <g filter="url(#sk)"><rect x="410" y="217" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="440" y="234" text-anchor="middle" fill="#2e6e2e">✓</text>
    <g filter="url(#sk)"><rect x="470" y="217" width="50" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="495" y="234" text-anchor="middle" fill="#2b6e9e">3</text>

    <!-- j=4 -->
    <g filter="url(#sk)"><rect x="40" y="241" width="50" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="65" y="258" text-anchor="middle" fill="#b03a3a">4</text>
    <g filter="url(#sk)"><rect x="90" y="241" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="150" y="258" text-anchor="middle" fill="#444" font-family="monospace">{2:3,1:1}</text>
    <g filter="url(#sk)"><rect x="210" y="241" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="270" y="258" text-anchor="middle" fill="#444" font-family="monospace">{3:1,1:1}</text>
    <g filter="url(#sk)"><rect x="330" y="241" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="370" y="258" text-anchor="middle" fill="#444">[1,3]</text>
    <g filter="url(#sk)"><rect x="410" y="241" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="440" y="258" text-anchor="middle" fill="#b03a3a">✗</text>
    <g filter="url(#sk)"><rect x="470" y="241" width="50" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="495" y="258" text-anchor="middle" fill="#888">—</text>

    <!-- j=5 -->
    <g filter="url(#sk)"><rect x="40" y="265" width="50" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="65" y="282" text-anchor="middle" fill="#b03a3a">5</text>
    <g filter="url(#sk)"><rect x="90" y="265" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="150" y="282" text-anchor="middle" fill="#444" font-family="monospace">{2:3,1:1,3:1}</text>
    <g filter="url(#sk)"><rect x="210" y="265" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="270" y="282" text-anchor="middle" fill="#444" font-family="monospace">{3:1,1:2}</text>
    <g filter="url(#sk)"><rect x="330" y="265" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="370" y="282" text-anchor="middle" fill="#444">[1,3]</text>
    <g filter="url(#sk)"><rect x="410" y="265" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="440" y="282" text-anchor="middle" fill="#b03a3a">✗</text>
    <g filter="url(#sk)"><rect x="470" y="265" width="50" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="495" y="282" text-anchor="middle" fill="#888">—</text>
  </g>

  <!-- But j=5 with subarray [1..5] is [2,1,2,3,3] -> check again -->
  <!-- The longest balanced is [2,1,2,3,3] at indices 1-5, length 5 -->
  <!-- Wait, at j=5, cnt={2:2,1:1,3:2}? Let me recheck. nums[1..5]=[2,2,1,2,3] -> 2 appears 3 times! -->
  <!-- Actually [1,2,2,1,2,3,3,3], indices 1-5 = [2,2,1,2,3] -> 2:3, 1:1, 3:1 -> not balanced -->
  <!-- The example says [2,1,2,3,3] which is indices 1,3,4,5,6? No, subarray must be contiguous -->
  <!-- [2,1,2,3,3] from index 1 to 5? nums[1..5]=[2,2,1,2,3]. That's 2:3,1:1,3:1. Not [2,1,2,3,3] -->
  <!-- Wait, the problem says subarray [2,1,2,3,3]. Let me check: nums=[1,2,2,1,2,3,3,3] -->
  <!-- index: 0:1, 1:2, 2:2, 3:1, 4:2, 5:3, 6:3, 7:3 -->
  <!-- [2,1,2,3,3] = indices 1,3,4,5,6? Not contiguous! -->
  <!-- Actually the problem says the longest is [2,1,2,3,3]. But that's not a contiguous subarray of [1,2,2,1,2,3,3,3] -->
  <!-- Let me re-read: [1,2,2,1,2,3,3,3], subarray [2,1,2,3,3] -> this would be indices 1-5? -->
  <!-- nums[1]=2, nums[2]=2, nums[3]=1, nums[4]=2, nums[5]=3 -> [2,2,1,2,3] not [2,1,2,3,3] -->
  <!-- Hmm, maybe the example is [2,2,1,2,3,3,3]? indices 1-7: 2:3,1:1,3:3 -> freq {3:2,1:1}, keys {1,3}, 3!=2*1 -->
  <!-- Or maybe [1,2,2,1,2] indices 0-4: 1:2,2:3 -> freq {2:1,3:1}, keys {2,3}, 3!=2*2. No. -->
  <!-- Let me check [2,2,1,2,3,3] indices 1-6: 2:3,1:1,3:2 -> freq {3:1,1:1,2:1} 3 keys. No. -->
  <!-- [2,1,2,3,3] is listed in the problem. Maybe it's a different interpretation. -->
  <!-- Actually maybe the problem statement's example is [2,1,2,3,3] which could be from a different subarray -->
  <!-- Let me look: if subarray is indices 2-6: [2,1,2,3,3] -> 2:2,1:1,3:2 -> freq {2:2,1:1} keys {1,2} 2=2*1 YES! -->
  <!-- So the subarray is indices 2-6 = [2,1,2,3,3], length 5. My table had wrong starting point -->

  <!-- Correction box -->
  <g filter="url(#sk)">
    <rect x="540" y="145" width="160" height="120" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="560" y="168" font-size="12" font-weight="bold" fill="#2e6e2e">正确答案</text>
  <text x="560" y="190" font-size="11" fill="#444">子数组 [2,1,2,3,3]</text>
  <text x="560" y="208" font-size="11" fill="#444">= nums[2..6]</text>
  <text x="560" y="228" font-size="11" fill="#444" font-family="monospace">cnt: 2→2, 1→1, 3→2</text>
  <text x="560" y="248" font-size="11" fill="#2e6e2e" font-weight="bold">freq {2:2, 1:1}</text>

  <!-- Conclusion -->
  <g filter="url(#sk)">
    <rect x="40" y="310" width="660" height="56" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="334" font-size="13" font-weight="bold" fill="#2b2b2b">结论：</text>
  <text x="60" y="354" font-size="12" fill="#444">子数组 nums[2..6] = [2,1,2,3,3]，cnt={2:2, 1:1, 3:2}，freq={2:2, 1:1}，keys=[1,2]，2=2×1 → 平衡，长度 5</text>

  <!-- Note about the table -->
  <text x="40" y="395" font-size="11" fill="#888">注：上表演示固定 i=1 扩展的过程；实际答案在 i=2 时取得（子数组 [2,1,2,3,3]）</text>
  <text x="40" y="415" font-size="11" fill="#888">算法对每个左端点 i 都做同样的扩展，取所有平衡子数组的最大长度</text>
</svg>
