<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="440" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：回溯 dfs(open, close, path) + 两分支剪枝</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(C_n·n)，空间 O(n)；每分支结束 pop 回溯</text>

  <g font-size="10" fill="#333">
    <!-- Step 1: init -->
    <rect x="40" y="64" width="480" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="130" y="84" font-family="monospace" font-size="10" fill="#555">ans = []; path = [];</text>
    <text x="130" y="100" font-size="9" fill="#888">调用 dfs(n, n, path)</text>

    <path d="M 280 110 L 280 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: base case -->
    <rect x="40" y="128" width="480" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#b85450" font-weight="bold">② 终止</text>
    <text x="110" y="148" font-family="monospace" font-size="10" fill="#555">if open==0 and close==0:</text>
    <text x="110" y="164" font-family="monospace" font-size="10" fill="#555">    ans.append("".join(path));  return</text>

    <path d="M 280 174 L 280 188" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: branch ( -->
    <rect x="40" y="192" width="480" height="66" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="212" font-size="12" fill="#4a7a3a" font-weight="bold">③ 分支一：放 (</text>
    <text x="180" y="212" font-family="monospace" font-size="10" fill="#555">if (open > 0)</text>
    <text x="54" y="230" font-family="monospace" font-size="10" fill="#4a7a3a">    path.append("(");</text>
    <text x="54" y="246" font-family="monospace" font-size="10" fill="#4a7a3a">    dfs(open-1, close); path.pop();   // 回溯</text>

    <path d="M 280 260 L 280 274" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4: branch ) -->
    <rect x="40" y="278" width="480" height="66" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="298" font-size="12" fill="#d6a040" font-weight="bold">④ 分支二：放 )</text>
    <text x="180" y="298" font-family="monospace" font-size="10" fill="#555">if (close > open)</text>
    <text x="54" y="316" font-family="monospace" font-size="10" fill="#d6a040">    path.append(")");</text>
    <text x="54" y="332" font-family="monospace" font-size="10" fill="#d6a040">    dfs(open, close-1); path.pop();   // 回溯</text>

    <path d="M 280 346 L 280 360" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 5: done -->
    <rect x="40" y="364" width="480" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="385" font-size="12" fill="#4a7a3a" font-weight="bold">⑤ 返回</text>
    <text x="110" y="385" font-size="10" fill="#555">ans 即所有合法串（共卡特兰数 C_n 个）</text>
  </g>

  <!-- key note -->
  <rect x="40" y="406" width="480" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="8" filter="url(#rough2)"/>
  <text x="280" y="423" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">两分支用独立 if（非 elif）：同一位置可能 ( 和 ) 都合法</text>
</svg>
