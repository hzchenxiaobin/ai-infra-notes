<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="640" height="380" fill="#fdfcf7"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">好整数公式化简：d²−d = d·(d−1)</text>
  <path d="M 200 42 Q 320 50 440 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Formula box -->
  <g filter="url(#sk)">
    <rect x="120" y="60" width="400" height="36" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="320" y="84" text-anchor="middle" font-size="14" fill="#2b2b2b" font-family="monospace">squareSum − digitSum = Σ(d²) − Σ(d) = Σ d·(d−1)</text>

  <!-- Table header -->
  <g font-size="12" fill="#888">
    <text x="80" y="125" text-anchor="middle" font-weight="bold">数字 d</text>
    <text x="160" y="125" text-anchor="middle" font-weight="bold">d²</text>
    <text x="240" y="125" text-anchor="middle" font-weight="bold">d·(d−1) 贡献</text>
  </g>

  <!-- Table rows: d=0..9 -->
  <g font-size="13">
    <!-- d=0 -->
    <g filter="url(#sk)"><rect x="40" y="134" width="80" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="80" y="151" text-anchor="middle" fill="#888">0</text>
    <g filter="url(#sk)"><rect x="120" y="134" width="80" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="160" y="151" text-anchor="middle" fill="#888">0</text>
    <g filter="url(#sk)"><rect x="200" y="134" width="120" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="260" y="151" text-anchor="middle" fill="#888">0</text>

    <!-- d=1 -->
    <g filter="url(#sk)"><rect x="40" y="158" width="80" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="80" y="175" text-anchor="middle" fill="#888">1</text>
    <g filter="url(#sk)"><rect x="120" y="158" width="80" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="160" y="175" text-anchor="middle" fill="#888">1</text>
    <g filter="url(#sk)"><rect x="200" y="158" width="120" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="260" y="175" text-anchor="middle" fill="#888">0</text>

    <!-- d=2 -->
    <g filter="url(#sk)"><rect x="40" y="182" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="80" y="199" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="120" y="182" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="199" text-anchor="middle" fill="#2b6e9e">4</text>
    <g filter="url(#sk)"><rect x="200" y="182" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="260" y="199" text-anchor="middle" fill="#2b6e9e">2</text>

    <!-- d=3 -->
    <g filter="url(#sk)"><rect x="40" y="206" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="80" y="223" text-anchor="middle" fill="#2b6e9e">3</text>
    <g filter="url(#sk)"><rect x="120" y="206" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="223" text-anchor="middle" fill="#2b6e9e">9</text>
    <g filter="url(#sk)"><rect x="200" y="206" width="120" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="260" y="223" text-anchor="middle" fill="#2b6e9e">6</text>

    <!-- d=4 -->
    <g filter="url(#sk)"><rect x="40" y="230" width="80" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="80" y="247" text-anchor="middle" fill="#7a5415">4</text>
    <g filter="url(#sk)"><rect x="120" y="230" width="80" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="160" y="247" text-anchor="middle" fill="#7a5415">16</text>
    <g filter="url(#sk)"><rect x="200" y="230" width="120" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="260" y="247" text-anchor="middle" fill="#7a5415">12</text>

    <!-- d=5 -->
    <g filter="url(#sk)"><rect x="40" y="254" width="80" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="80" y="271" text-anchor="middle" fill="#7a5415">5</text>
    <g filter="url(#sk)"><rect x="120" y="254" width="80" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="160" y="271" text-anchor="middle" fill="#7a5415">25</text>
    <g filter="url(#sk)"><rect x="200" y="254" width="120" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="260" y="271" text-anchor="middle" fill="#7a5415">20</text>

    <!-- d=6 -->
    <g filter="url(#sk)"><rect x="40" y="278" width="80" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="80" y="295" text-anchor="middle" fill="#2e6e2e">6</text>
    <g filter="url(#sk)"><rect x="120" y="278" width="80" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="160" y="295" text-anchor="middle" fill="#2e6e2e">36</text>
    <g filter="url(#sk)"><rect x="200" y="278" width="120" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="260" y="295" text-anchor="middle" fill="#2e6e2e">30</text>

    <!-- d=7 -->
    <g filter="url(#sk)"><rect x="40" y="302" width="80" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="80" y="319" text-anchor="middle" fill="#2e6e2e">7</text>
    <g filter="url(#sk)"><rect x="120" y="302" width="80" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="160" y="319" text-anchor="middle" fill="#2e6e2e">49</text>
    <g filter="url(#sk)"><rect x="200" y="302" width="120" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="260" y="319" text-anchor="middle" fill="#2e6e2e">42</text>

    <!-- d=8 -->
    <g filter="url(#sk)"><rect x="40" y="326" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="80" y="343" text-anchor="middle" fill="#b03a3a" font-weight="bold">8</text>
    <g filter="url(#sk)"><rect x="120" y="326" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="160" y="343" text-anchor="middle" fill="#b03a3a" font-weight="bold">64</text>
    <g filter="url(#sk)"><rect x="200" y="326" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="260" y="343" text-anchor="middle" fill="#b03a3a" font-weight="bold">56 ≥ 50 ✓</text>

    <!-- d=9 -->
    <g filter="url(#sk)"><rect x="40" y="350" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="80" y="367" text-anchor="middle" fill="#b03a3a" font-weight="bold">9</text>
    <g filter="url(#sk)"><rect x="120" y="350" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="160" y="367" text-anchor="middle" fill="#b03a3a" font-weight="bold">81</text>
    <g filter="url(#sk)"><rect x="200" y="350" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="260" y="367" text-anchor="middle" fill="#b03a3a" font-weight="bold">72 ≥ 50 ✓</text>
  </g>

  <!-- Right side: key insight -->
  <g filter="url(#sk)">
    <rect x="360" y="134" width="260" height="120" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="380" y="158" font-size="13" font-weight="bold" fill="#2b6e9e">关键观察</text>
  <text x="380" y="180" font-size="11" fill="#444">• 0 和 1 贡献为 0（白嫖）</text>
  <text x="380" y="200" font-size="11" fill="#b03a3a" font-weight="bold">• 一个 8 或 9 即超 50</text>
  <text x="380" y="220" font-size="11" fill="#444">• 6+5=50，7+4=54 等组合</text>
  <text x="380" y="240" font-size="11" fill="#888">只需逐位累加 d·(d−1)</text>

  <!-- Example -->
  <g filter="url(#sk)">
    <rect x="360" y="266" width="260" height="100" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="380" y="290" font-size="13" font-weight="bold" fill="#2e6e2e">示例：n = 19</text>
  <text x="380" y="312" font-size="11" fill="#444" font-family="monospace">d=1: 贡献 0</text>
  <text x="380" y="330" font-size="11" fill="#b03a3a" font-family="monospace">d=9: 贡献 72</text>
  <text x="380" y="352" font-size="12" fill="#2e6e2e" font-weight="bold">总和 = 72 ≥ 50 → true</text>
</svg>
