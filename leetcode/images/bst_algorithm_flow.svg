<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b85450"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="540" height="400" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">中序迭代流程：维护 prev 前驱，遇 cur ≤ prev 即非法</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">用栈模拟中序，prev=null 表示无前驱（天然避开 int 边界）</text>

  <!-- ===== Step boxes ===== -->
  <g filter="url(#rough2)" font-size="11">

    <!-- 1. Init -->
    <rect x="180" y="60" width="180" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8"/>
    <text x="270" y="78" text-anchor="middle" fill="#446688" font-weight="bold">初始化</text>
    <text x="270" y="93" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">cur=root, prev=null, stack=[]</text>

    <!-- arrow down to loop -->
    <path d="M 270 102 L 270 118" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

    <!-- 2. Loop condition (diamond) -->
    <polygon points="270,120 390,160 270,200 150,160" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
    <text x="270" y="156" text-anchor="middle" fill="#d6a040" font-weight="bold">cur != null</text>
    <text x="270" y="172" text-anchor="middle" fill="#d6a040" font-weight="bold">|| stack 非空 ?</text>

    <!-- No → return true -->
    <path d="M 390 160 L 470 160" stroke="#4a7a3a" stroke-width="1.4" fill="none" marker-end="url(#arrG)"/>
    <text x="430" y="152" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">否</text>
    <rect x="470" y="142" width="60" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6"/>
    <text x="500" y="160" text-anchor="middle" fill="#4a7a3a" font-weight="bold">return</text>
    <text x="500" y="173" text-anchor="middle" fill="#4a7a3a" font-weight="bold">true ✅</text>

    <!-- Yes → down -->
    <path d="M 270 200 L 270 216" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
    <text x="282" y="212" font-size="10" fill="#666" font-weight="bold">是</text>

    <!-- 3. push left -->
    <rect x="150" y="218" width="240" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8"/>
    <text x="270" y="236" text-anchor="middle" fill="#446688" font-weight="bold">一路向左压栈</text>
    <text x="270" y="252" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">while cur: stack.push(cur); cur=cur.left</text>

    <path d="M 270 262 L 270 278" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>

    <!-- 4. pop & check (diamond) -->
    <polygon points="270,280 400,320 270,360 140,320" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
    <text x="270" y="312" text-anchor="middle" fill="#b85450" font-weight="bold">cur=stack.pop()</text>
    <text x="270" y="328" text-anchor="middle" fill="#b85450" font-weight="bold">prev &amp;&amp; cur≤prev ?</text>
    <text x="270" y="344" text-anchor="middle" fill="#555" font-size="9">(注意 ≤，相等也违规)</text>

    <!-- Yes → return false -->
    <path d="M 400 320 L 470 320" stroke="#b85450" stroke-width="1.4" fill="none" marker-end="url(#arrR)"/>
    <text x="432" y="312" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">是</text>
    <rect x="470" y="302" width="60" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6"/>
    <text x="500" y="320" text-anchor="middle" fill="#b85450" font-weight="bold">return</text>
    <text x="500" y="333" text-anchor="middle" fill="#b85450" font-weight="bold">false ❌</text>

    <!-- No → down -->
    <path d="M 270 360 L 270 376" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
    <text x="282" y="372" font-size="10" fill="#666" font-weight="bold">否</text>

    <!-- 5. update prev & go right, loop back -->
    <rect x="120" y="378" width="300" height="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6"/>
    <text x="270" y="391" text-anchor="middle" fill="#4a7a3a" font-family="monospace" font-size="10" font-weight="bold">prev=cur; cur=cur.right; 回到循环顶部</text>

    <!-- loop-back arrow: from step5 left side up to loop diamond -->
    <path d="M 120 387 L 70 387 L 70 160 L 150 160" stroke="#4a7a3a" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
    <text x="58" y="275" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold" transform="rotate(-90 58 275)">回到循环判断</text>
  </g>
</svg>
