<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">组合总和方法流程</text>

  <!-- 排序 -->
  <rect x="190" y="50" width="200" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" fill="#333">sort(candidates)</text>

  <path d="M 290 84 L 290 100" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- dfs -->
  <rect x="200" y="104" width="180" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="126" text-anchor="middle" font-size="12" fill="#333">dfs(remain, start)</text>

  <path d="M 290 138 L 290 154" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 终止 -->
  <polygon points="290,156 400,196 290,236 180,196" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="290" y="192" text-anchor="middle" font-size="12" fill="#333">remain == 0 ?</text>
  <text x="290" y="210" text-anchor="middle" font-size="11" fill="#888">凑成目标</text>

  <path d="M 290 236 L 290 256" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="252" font-size="10" fill="#82b366">是</text>
  <rect x="210" y="260" width="160" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="281" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">ans.add(path) 返回</text>

  <!-- 否 -->
  <path d="M 400 196 L 460 196 L 460 280" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="422" y="188" font-size="10" fill="#b85450">否</text>

  <rect x="390" y="284" width="160" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="470" y="306" text-anchor="middle" font-size="11" fill="#333">for i = start .. n-1</text>

  <path d="M 470 318 L 470 334" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="470,336 560,358 470,380 380,358" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="470" y="354" text-anchor="middle" font-size="10" fill="#333">c[i] &gt; remain ?</text>
  <text x="470" y="370" text-anchor="middle" font-size="10" fill="#888">break 整枝</text>

  <path d="M 380 358 L 320 358 L 320 320" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="345" y="350" font-size="10" fill="#82b366">否</text>

  <rect x="200" y="318" width="120" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="260" y="334" text-anchor="middle" font-size="10" fill="#333">path.push(c[i])</text>
  <text x="260" y="348" text-anchor="middle" font-size="10" fill="#333">dfs(remain-c[i], i)</text>

  <text x="60" y="334" font-size="11" fill="#888">回溯：path.pop()</text>
  <text x="60" y="352" font-size="11" fill="#888">传 i（非 i+1）→ 可重复选</text>
  <text x="60" y="370" font-size="11" fill="#888">从 start 开始 → 去重</text>

  <text x="290" y="394" text-anchor="middle" font-size="11" fill="#888">复杂度与 target 强相关；剪枝让实际远小于理论上界</text>
</svg>
