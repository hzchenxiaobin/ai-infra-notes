<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="620" height="520" fill="#fafafa"/>

  <!-- Title -->
  <text x="310" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">示例演算：root=[3,5,1,6,2,0,8,7,4], p=5, q=1 → LCA=3</text>

  <!-- Tree diagram -->
  <text x="30" y="52" font-size="12" fill="#888">二叉树:</text>
  <!-- 3 root -->
  <circle cx="310" cy="70" r="18" fill="#e8f0fe" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <text x="310" y="75" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">3</text>
  <!-- 5 -->
  <circle cx="220" cy="130" r="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="220" y="135" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">5</text>
  <line x1="296" y1="82" x2="234" y2="118" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <!-- 1 -->
  <circle cx="400" cy="130" r="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="400" y="135" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">1</text>
  <line x1="324" y1="82" x2="386" y2="118" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <!-- 6 -->
  <circle cx="170" cy="190" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="170" y="195" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">6</text>
  <line x1="208" y1="142" x2="180" y2="178" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 2 -->
  <circle cx="270" cy="190" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="270" y="195" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="232" y1="142" x2="260" y2="178" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 0 -->
  <circle cx="370" cy="190" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="370" y="195" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">0</text>
  <line x1="388" y1="142" x2="366" y2="178" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 8 -->
  <circle cx="440" cy="190" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="440" y="195" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">8</text>
  <line x1="412" y1="142" x2="432" y2="178" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 7 -->
  <circle cx="240" cy="248" r="15" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="240" y="252" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">7</text>
  <line x1="262" y1="204" x2="246" y2="236" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 4 -->
  <circle cx="300" cy="248" r="15" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="300" y="252" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">4</text>
  <line x1="278" y1="204" x2="294" y2="236" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <!-- p q markers -->
  <rect x="206" y="106" width="28" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
  <text x="220" y="116" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">p</text>
  <rect x="386" y="106" width="28" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
  <text x="400" y="116" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">q</text>

  <!-- Trace table -->
  <text x="30" y="300" font-size="12" fill="#444" font-weight="bold">后序遍历返回值（自底向上）：</text>

  <text x="30" y="324" font-size="11" fill="#333">dfs(6)</text>
  <text x="120" y="324" font-size="11" fill="#888">→ null（既非 p 非 q）</text>
  <text x="30" y="344" font-size="11" fill="#333">dfs(7), dfs(4)</text>
  <text x="120" y="344" font-size="11" fill="#888">→ null</text>
  <text x="30" y="364" font-size="11" fill="#333">dfs(2)</text>
  <text x="120" y="364" font-size="11" fill="#888">→ null（左右都空）</text>
  <text x="30" y="384" font-size="11" fill="#333">dfs(5)</text>
  <text x="120" y="384" font-size="11" fill="#4a7a3a" font-weight="bold">→ 返回 5（root==p，命中）</text>
  <text x="30" y="404" font-size="11" fill="#333">dfs(0), dfs(8)</text>
  <text x="120" y="404" font-size="11" fill="#888">→ null</text>
  <text x="30" y="424" font-size="11" fill="#333">dfs(1)</text>
  <text x="120" y="424" font-size="11" fill="#4a7a3a" font-weight="bold">→ 返回 1（root==q，命中）</text>
  <text x="30" y="444" font-size="11" fill="#333">dfs(3)</text>
  <text x="120" y="444" font-size="11" fill="#333">left=5, right=1，</text>
  <text x="300" y="444" font-size="11" fill="#b85450" font-weight="bold">两侧都非空 → 3 是 LCA ⭐</text>

  <!-- LCA highlight -->
  <circle cx="310" cy="70" r="24" fill="none" stroke="#b85450" stroke-width="2.5" stroke-dasharray="5,3" filter="url(#rough2)"/>
  <path d="M 310 94 L 310 460" stroke="#b85450" stroke-width="1.2" fill="none" stroke-dasharray="3,3" filter="url(#rough2)"/>

  <!-- result box -->
  <rect x="30" y="476" width="560" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="310" y="498" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">结论：p=5 在左子树、q=1 在右子树，首次"分居两侧"的节点 3 即为 LCA</text>
</svg>
