<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">分割回文串：回溯 + 回文预处理流程</text>

  <!-- 预处理 -->
  <rect x="170" y="50" width="240" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="73" text-anchor="middle" font-size="12" fill="#333">预处理 isPal[i][j]（区间 DP）</text>

  <path d="M 290 86 L 290 102" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- dfs 入口 -->
  <rect x="200" y="106" width="180" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="128" text-anchor="middle" font-size="12" fill="#333">dfs(start=0)</text>

  <path d="M 290 140 L 290 156" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 终止判定 -->
  <polygon points="290,158 410,200 290,242 170,200" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="290" y="196" text-anchor="middle" font-size="12" fill="#333">start == n ?</text>
  <text x="290" y="214" text-anchor="middle" font-size="11" fill="#888">切完整串</text>

  <!-- 是 -->
  <path d="M 290 242 L 290 262" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="258" font-size="10" fill="#82b366">是</text>
  <rect x="210" y="266" width="160" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="287" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">ans.add(path) 返回</text>

  <!-- 否 -->
  <path d="M 410 200 L 470 200 L 470 282" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="432" y="192" font-size="10" fill="#b85450">否</text>

  <rect x="400" y="286" width="150" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="475" y="308" text-anchor="middle" font-size="11" fill="#333">for end = start .. n-1</text>

  <path d="M 475 320 L 475 336" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="475,338 560,360 475,382 390,360" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="475" y="356" text-anchor="middle" font-size="10" fill="#333">isPal[start][end]?</text>
  <text x="475" y="372" text-anchor="middle" font-size="10" fill="#888">O(1) 查表</text>

  <!-- 是→push dfs pop -->
  <path d="M 390 360 L 320 360 L 320 300" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="350" y="352" font-size="10" fill="#82b366">是</text>

  <rect x="210" y="320" width="120" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="270" y="334" text-anchor="middle" font-size="10" fill="#333">path.push(段)</text>
  <text x="270" y="348" text-anchor="middle" font-size="10" fill="#333">dfs(end+1)</text>

  <text x="150" y="370" font-size="10" fill="#888">回溯：path.pop() 恢复现场</text>

  <text x="120" y="178" font-size="11" fill="#888">回文表预处理后，</text>
  <text x="120" y="194" font-size="11" fill="#888">判回文 O(1)，</text>
  <text x="120" y="210" font-size="11" fill="#888">总复杂度 O(n·2^n)</text>
</svg>
