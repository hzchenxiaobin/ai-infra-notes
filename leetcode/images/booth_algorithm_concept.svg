<svg xmlns="http://www.w3.org/2000/svg" width="940" height="660" viewBox="0 0 940 660" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
  </defs>
  <rect width="940" height="660" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Booth 算法核心思想：s+s 上双指针找最小旋转起点</text>
  <path d="M 200 42 Q 470 50 740 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Panel A: doubling ===== -->
  <text x="470" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 倍长：s → s+s，所有循环旋转都是 s2 中长度 n 的子串</text>

  <!-- s2 string with indices -->
  <g font-size="10" fill="#888">
    <text x="100" y="98" font-weight="bold">s2 索引:</text>
    <text x="200" y="98" text-anchor="middle">0</text>
    <text x="244" y="98" text-anchor="middle">1</text>
    <text x="288" y="98" text-anchor="middle">2</text>
    <text x="332" y="98" text-anchor="middle">3</text>
    <text x="376" y="98" text-anchor="middle">4</text>
    <text x="420" y="98" text-anchor="middle">5</text>
    <text x="464" y="98" text-anchor="middle">6</text>
    <text x="508" y="98" text-anchor="middle">7</text>
  </g>

  <!-- s2 chars: first s (blue bg), second s (green bg) -->
  <g font-size="15" font-weight="bold" font-family="monospace">
    <g filter="url(#sk)"><rect x="180" y="104" width="40" height="34" rx="4" fill="#e8f0fe" stroke="#3a6ea8" stroke-width="1.4"/></g>
    <text x="200" y="127" text-anchor="middle" fill="#23476e">b</text>
    <g filter="url(#sk)"><rect x="224" y="104" width="40" height="34" rx="4" fill="#e8f0fe" stroke="#3a6ea8" stroke-width="1.4"/></g>
    <text x="244" y="127" text-anchor="middle" fill="#23476e">a</text>
    <g filter="url(#sk)"><rect x="268" y="104" width="40" height="34" rx="4" fill="#e8f0fe" stroke="#3a6ea8" stroke-width="1.4"/></g>
    <text x="288" y="127" text-anchor="middle" fill="#23476e">a</text>
    <g filter="url(#sk)"><rect x="312" y="104" width="40" height="34" rx="4" fill="#e8f0fe" stroke="#3a6ea8" stroke-width="1.4"/></g>
    <text x="332" y="127" text-anchor="middle" fill="#23476e">b</text>
    <g filter="url(#sk)"><rect x="356" y="104" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="376" y="127" text-anchor="middle" fill="#2e6e2e">b</text>
    <g filter="url(#sk)"><rect x="400" y="104" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="420" y="127" text-anchor="middle" fill="#2e6e2e">a</text>
    <g filter="url(#sk)"><rect x="444" y="104" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="464" y="127" text-anchor="middle" fill="#2e6e2e">a</text>
    <g filter="url(#sk)"><rect x="488" y="104" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="508" y="127" text-anchor="middle" fill="#2e6e2e">b</text>
  </g>
  <text x="540" y="127" font-size="11" fill="#666">s2 = "baab"+"baab"</text>

  <!-- 4 candidate rotations -->
  <text x="80" y="160" font-size="11" fill="#888" font-weight="bold">起点 k:</text>
  <g font-size="11" font-family="monospace">
    <text x="150" y="160" fill="#888">k=0 → "baab"</text>
    <text x="270" y="160" fill="#2e6e2e" font-weight="bold">k=1 → "aabb" ← 最小</text>
    <text x="430" y="160" fill="#888">k=2 → "abba"</text>
    <text x="550" y="160" fill="#888">k=3 → "bbaa"</text>
  </g>

  <!-- ===== Panel B: dual pointers ===== -->
  <text x="470" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a">② 双指针：k = 当前最优起点，j = 扫描候选（逐位比较字典序）</text>

  <!-- k pointer pointing at s2[1], j pointer at s2[3] (example snapshot) -->
  <!-- s2 replica for pointer demo -->
  <g font-size="13" font-weight="bold" font-family="monospace">
    <g filter="url(#sk)"><rect x="120" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="138" y="240" text-anchor="middle" fill="#555">b</text>
    <g filter="url(#sk)"><rect x="156" y="220" width="36" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
    <text x="174" y="240" text-anchor="middle" fill="#7a2828">a</text>
    <g filter="url(#sk)"><rect x="192" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="210" y="240" text-anchor="middle" fill="#555">a</text>
    <g filter="url(#sk)"><rect x="228" y="220" width="36" height="30" rx="4" fill="#e8f0fe" stroke="#3a6ea8" stroke-width="2"/></g>
    <text x="246" y="240" text-anchor="middle" fill="#23476e">b</text>
    <g filter="url(#sk)"><rect x="264" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="282" y="240" text-anchor="middle" fill="#555">b</text>
    <g filter="url(#sk)"><rect x="300" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="318" y="240" text-anchor="middle" fill="#555">a</text>
    <g filter="url(#sk)"><rect x="336" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="354" y="240" text-anchor="middle" fill="#555">a</text>
    <g filter="url(#sk)"><rect x="372" y="220" width="36" height="30" rx="4" fill="#f0ede4" stroke="#bbb"/></g>
    <text x="390" y="240" text-anchor="middle" fill="#555">b</text>
  </g>

  <!-- k pointer arrow (down from top) -->
  <path d="M 174 210 L 174 218" stroke="#b85450" stroke-width="2" fill="none" marker-end="url(#arR)" filter="url(#sk)"/>
  <text x="174" y="204" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">k=1</text>

  <!-- j pointer arrow (up from bottom) -->
  <path d="M 246 260 L 246 252" stroke="#3a6ea8" stroke-width="2" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="246" y="272" text-anchor="middle" font-size="11" fill="#3a6ea8" font-weight="bold">j=3</text>

  <!-- comparison annotation -->
  <g filter="url(#sk)">
    <rect x="470" y="216" width="380" height="58" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3"/>
  </g>
  <text x="490" y="238" font-size="11" font-weight="bold" fill="#2b2b2b">比较 s2[k..k+n-1] 与 s2[j..j+n-1]</text>
  <text x="490" y="256" font-size="11" fill="#444" font-family="monospace">此处比 s2[1]="a" vs s2[3]="b"</text>
  <text x="490" y="270" font-size="10" fill="#888">失配时谁小谁的起点更优</text>

  <!-- decision box -->
  <g filter="url(#sk)">
    <rect x="120" y="290" width="730" height="70" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="140" y="314" font-size="12" font-weight="bold" fill="#2b6e9e">决策规则（失配时）</text>
  <text x="140" y="336" font-size="12" fill="#b85450" font-family="monospace" font-weight="bold">s2[j] &lt; s2[k+i+1] → j 是更优起点 → k = j（或 j−i−1）</text>
  <text x="140" y="354" font-size="12" fill="#4a8e4a" font-family="monospace" font-weight="bold">s2[j] &gt; s2[k+i+1] → k 仍最优 → k 不变，j 继续前进</text>

  <!-- ===== Panel C: failure function f ===== -->
  <text x="470" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">③ 失配函数 f：类比 KMP 的 next 数组，避免重复比较 → 均摊 O(1)</text>

  <!-- f explanation -->
  <g filter="url(#sk)">
    <rect x="60" y="404" width="400" height="130" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="80" y="428" font-size="12" font-weight="bold" fill="#2e6e2e">f[j−k] 的含义</text>
  <text x="80" y="450" font-size="11" fill="#444" font-family="monospace">f[j−k] = s2[k..] 与 s2[j..] 的</text>
  <text x="80" y="468" font-size="11" fill="#444" font-family="monospace">         已匹配公共前缀长度 − 1</text>
  <text x="80" y="490" font-size="11" fill="#666">即：s2[k..k+i] == s2[j..j+i] 已确认</text>
  <text x="80" y="508" font-size="11" fill="#666">下一步只需比 s2[k+i+1] vs s2[j]</text>
  <text x="80" y="526" font-size="11" fill="#2e6e2e" font-weight="bold">无需从头比较 → 节省时间</text>

  <!-- amortized analysis box -->
  <g filter="url(#sk)">
    <rect x="480" y="404" width="400" height="130" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="500" y="428" font-size="12" font-weight="bold" fill="#7a5415">均摊分析</text>
  <text x="500" y="450" font-size="11" fill="#444">外层 for 扫描 2n 位 → 2n 步</text>
  <text x="500" y="470" font-size="11" fill="#444">while 回退：i 沿 f 递减</text>
  <text x="500" y="488" font-size="11" fill="#444">每步 i 最多 +1（匹配时），回退总次数</text>
  <text x="500" y="506" font-size="11" fill="#444">≤ i 累积增加 ≤ 2n</text>
  <text x="500" y="526" font-size="12" fill="#b03a3a" font-family="monospace" font-weight="bold">总比较次数 O(n) → 均摊 O(1)/字符</text>

  <!-- footer insight -->
  <g filter="url(#sk)">
    <rect x="60" y="552" width="820" height="92" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="578" font-size="12" font-weight="bold" fill="#7a2828">关键洞察</text>
  <text x="80" y="600" font-size="11" fill="#444">朴素做法：枚举 n 个起点，每个与当前最优逐位比较 → O(n²)</text>
  <text x="80" y="618" font-size="11" fill="#444">Booth：用 f 记住「上一位比较到了哪里」，失配时沿 f 回退（类似 KMP），把 O(n²) 压到 O(n)</text>
  <text x="80" y="636" font-size="11" fill="#7a2828" font-weight="bold">★ k 始终指向「当前已扫过的 j 中，使旋转字典序最小的起点」</text>
</svg>
