<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="560" height="400" fill="#fdfcf7"/>

  <text x="280" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">骑士移动的棋盘二色性</text>
  <path d="M 180 38 Q 280 46 380 38" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 4x4 mini chessboard -->
  <g filter="url(#sk)">
    <rect x="80" y="70" width="200" height="200" fill="none" stroke="#5a5a5a" stroke-width="1.5"/>
  </g>
  <!-- colored cells: (x+y) even = white(#fef6e6), odd = dark(#e8f0fa) -->
  <g filter="url(#sk)">
    <!-- row 0 (y=0): even cells (0,0)(2,0) -->
    <rect x="80" y="70" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="180" y="70" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <!-- row 0 odd cells -->
    <rect x="130" y="70" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="230" y="70" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <!-- row 1 (y=1): odd cells (0,1)(2,1) are even-sum? 0+1=1 odd -->
    <rect x="80" y="120" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="180" y="120" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="130" y="120" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="230" y="120" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <!-- row 2 -->
    <rect x="80" y="170" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="180" y="170" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="130" y="170" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="230" y="170" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <!-- row 3 -->
    <rect x="80" y="220" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="180" y="220" width="50" height="50" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="130" y="220" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="230" y="220" width="50" height="50" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
  </g>

  <!-- Knight at (0,0) = top-left white -->
  <text x="105" y="100" text-anchor="middle" font-size="22" fill="#b85450" filter="url(#sk)">♞</text>
  <text x="105" y="60" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">start (0,0) 白</text>

  <!-- arrow to (2,1) = blue cell (knight move) -->
  <path d="M 115 100 Q 160 110 195 145" stroke="#b85450" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="155" y="105" font-size="9" fill="#b85450">1 步→蓝</text>

  <!-- highlight target same color -->
  <text x="205" y="200" text-anchor="middle" font-size="18" fill="#2e6e2e" filter="url(#sk)" font-weight="bold">★</text>
  <text x="205" y="245" text-anchor="middle" font-size="9" fill="#2e6e2e">同色·偶数步可达</text>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <rect x="320" y="80" width="20" height="20" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" filter="url(#sk)"/>
    <text x="348" y="95">白格：(x+y) 偶数</text>
    <rect x="320" y="110" width="20" height="20" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" filter="url(#sk)"/>
    <text x="348" y="125">蓝格：(x+y) 奇数</text>
  </g>

  <!-- Key insight box -->
  <g filter="url(#sk)">
    <rect x="320" y="150" width="220" height="110" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="430" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">核心观察</text>
  <g font-size="10" fill="#444">
    <text x="330" y="192">骑士每步改变 (x+y) 的奇偶性</text>
    <text x="330" y="208">→ 二分图：白↔蓝交替</text>
    <text x="330" y="226" font-weight="bold" fill="#b85450">偶数步：回到同色</text>
    <text x="330" y="244" font-weight="bold" fill="#b85450">奇数步：到达异色</text>
  </g>

  <!-- Formula -->
  <g filter="url(#sk)">
    <rect x="320" y="280" width="220" height="70" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="430" y="302" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">答案判定</text>
  <text x="430" y="322" text-anchor="middle" font-size="11" fill="#2b6e9e" font-family="monospace">(sx+sy)%2 == (tx+ty)%2</text>
  <text x="430" y="340" text-anchor="middle" font-size="9" fill="#888">同色 → true，异色 → false</text>

  <!-- Note about 0 steps -->
  <text x="80" y="300" font-size="10" fill="#888" filter="url(#sk)">注：start==target 时 0 步（偶数）→ true，同色规则已覆盖</text>
</svg>
