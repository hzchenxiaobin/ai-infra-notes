<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="360" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：n=5 时 f 数组填充过程</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">从初值 f(1)=1, f(2)=2 递推到 f(5)=8</text>

  <!-- ===== f array as cells ===== -->
  <g font-size="11" fill="#333">
    <!-- header -->
    <text x="80" y="80" font-size="10" fill="#888" font-weight="bold">i:</text>
    <text x="130" y="80" text-anchor="middle" font-size="10" fill="#888">1</text>
    <text x="190" y="80" text-anchor="middle" font-size="10" fill="#888">2</text>
    <text x="250" y="80" text-anchor="middle" font-size="10" fill="#888">3</text>
    <text x="310" y="80" text-anchor="middle" font-size="10" fill="#888">4</text>
    <text x="370" y="80" text-anchor="middle" font-size="10" fill="#888">5</text>

    <!-- f(1) init -->
    <rect x="110" y="90" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="130" y="115" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">1</text>

    <!-- f(2) init -->
    <rect x="170" y="90" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="190" y="115" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">2</text>

    <!-- f(3) = 1+2 -->
    <rect x="230" y="90" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="250" y="115" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">3</text>

    <!-- f(4) = 2+3 -->
    <rect x="290" y="90" width="40" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="310" y="115" text-anchor="middle" font-size="13" fill="#d6a040" font-weight="bold">5</text>

    <!-- f(5) = 3+5 -->
    <rect x="350" y="90" width="40" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="370" y="115" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">8</text>
  </g>

  <!-- arrows showing additions -->
  <!-- f(3) = f(1)+f(2) -->
  <path d="M 130 132 Q 180 160 230 132" stroke="#4a7a3a" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <path d="M 190 132 Q 220 160 250 132" stroke="#4a7a3a" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <text x="220" y="158" text-anchor="middle" font-size="8" fill="#4a7a3a">1+2=3</text>

  <!-- f(4) = f(2)+f(3) -->
  <path d="M 190 132 Q 240 180 310 132" stroke="#d6a040" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <path d="M 250 132 Q 280 180 310 132" stroke="#d6a040" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <text x="280" y="178" text-anchor="middle" font-size="8" fill="#d6a040">2+3=5</text>

  <!-- f(5) = f(3)+f(4) -->
  <path d="M 250 132 Q 300 200 370 132" stroke="#b85450" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <path d="M 310 132 Q 340 200 370 132" stroke="#b85450" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
  <text x="340" y="198" text-anchor="middle" font-size="8" fill="#b85450">3+5=8</text>

  <!-- ===== Legend ===== -->
  <rect x="60" y="220" width="400" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <rect x="76" y="230" width="14" height="14" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="96" y="242" font-size="9" fill="#555">初值</text>
  <rect x="140" y="230" width="14" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="160" y="242" font-size="9" fill="#555">i=3 推出</text>
  <rect x="220" y="230" width="14" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="240" y="242" font-size="9" fill="#555">i=4 推出</text>
  <rect x="300" y="230" width="14" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="320" y="242" font-size="9" fill="#555">答案 f(5)=8</text>

  <!-- ===== Result ===== -->
  <rect x="60" y="275" width="400" height="60" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="260" y="298" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">每步只看前 2 格 → 滚动数组 O(1) 空间</text>
  <text x="260" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">prev2, prev1 = prev1, prev1 + prev2</text>
  <text x="260" y="332" text-anchor="middle" font-size="9" fill="#888">Python 一行同时赋值，无需临时变量</text>
</svg>
