<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="440" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">最小堆合并 K 个升序链表</text>
  <path d="M 280 40 Q 470 48 660 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">lists = [[1,4,5],[1,3,4],[2,6]] → [1,1,2,3,4,4,5,6]</text>

  <!-- ===== Three input lists ===== -->
  <text x="40" y="82" font-size="11" fill="#555" font-weight="bold">输入：3 个升序链表</text>

  <g filter="url(#sk)">
    <rect x="40" y="90" width="40" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="80" y="90" width="40" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="120" y="90" width="40" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <text x="60" y="107" fill="#2b6e9e" font-weight="bold">1</text>
    <text x="100" y="107" fill="#2b6e9e">4</text>
    <text x="140" y="107" fill="#2b6e9e">5</text>
  </g>
  <text x="170" y="107" font-size="9" fill="#888">List 0</text>

  <g filter="url(#sk)">
    <rect x="40" y="120" width="40" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
    <rect x="80" y="120" width="40" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
    <rect x="120" y="120" width="40" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <text x="60" y="137" fill="#2e6e2e" font-weight="bold">1</text>
    <text x="100" y="137" fill="#2e6e2e">3</text>
    <text x="140" y="137" fill="#2e6e2e">4</text>
  </g>
  <text x="170" y="137" font-size="9" fill="#888">List 1</text>

  <g filter="url(#sk)">
    <rect x="40" y="150" width="40" height="24" rx="3" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.2"/>
    <rect x="80" y="150" width="40" height="24" rx="3" fill="#fff8e1" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <text x="60" y="167" fill="#7a5415" font-weight="bold">2</text>
    <text x="100" y="167" fill="#7a5415">6</text>
  </g>
  <text x="170" y="167" font-size="9" fill="#888">List 2</text>

  <!-- Arrow to heap -->
  <path d="M 220 133 L 300 133" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="260" y="128" text-anchor="middle" font-size="9" fill="#888">头节点入堆</text>

  <!-- ===== Min heap ===== -->
  <g filter="url(#sk)">
    <rect x="300" y="100" width="180" height="80" rx="8" fill="#f6f6f6" stroke="#ccc" stroke-width="1.2"/>
  </g>
  <text x="390" y="120" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">最小堆</text>

  <g filter="url(#sk)">
    <rect x="320" y="128" width="40" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
    <rect x="370" y="128" width="40" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
    <rect x="420" y="128" width="40" height="24" rx="3" fill="#fff8e1" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <g font-size="10" text-anchor="middle">
    <text x="340" y="145" fill="#2b6e9e" font-weight="bold">1</text>
    <text x="390" y="145" fill="#2e6e2e">1</text>
    <text x="440" y="145" fill="#7a5415">2</text>
  </g>
  <text x="390" y="172" text-anchor="middle" font-size="8" fill="#888">堆顶 = 最小值 1</text>

  <!-- Arrow to result -->
  <path d="M 390 180 L 390 210" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="430" y="200" font-size="9" fill="#888">弹出堆顶</text>

  <!-- ===== Result ===== -->
  <text x="300" y="230" font-size="11" fill="#555" font-weight="bold">输出：</text>
  <g filter="url(#sk)">
    <rect x="300" y="238" width="560" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <text x="320" y="257" fill="#c04050" font-weight="bold">1</text>
    <text x="360" y="257" fill="#c04050" font-weight="bold">1</text>
    <text x="400" y="257" fill="#c04050" font-weight="bold">2</text>
    <text x="440" y="257" fill="#c04050" font-weight="bold">3</text>
    <text x="480" y="257" fill="#c04050" font-weight="bold">4</text>
    <text x="520" y="257" fill="#c04050" font-weight="bold">4</text>
    <text x="560" y="257" fill="#c04050" font-weight="bold">5</text>
    <text x="600" y="257" fill="#c04050" font-weight="bold">6</text>
  </g>
  <text x="700" y="257" font-size="9" fill="#888">← 逐个弹出堆顶构建</text>

  <!-- ===== Process table ===== -->
  <line x1="30" y1="286" x2="910" y2="286" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="308" font-size="12" font-weight="bold" fill="#2b2b2b">执行过程</text>

  <!-- Table header -->
  <g filter="url(#sk)">
    <rect x="40" y="316" width="60" height="22" fill="#f6f6f6" stroke="#ccc" rx="2"/>
    <rect x="100" y="316" width="200" height="22" fill="#f6f6f6" stroke="#ccc" rx="2"/>
    <rect x="300" y="316" width="120" height="22" fill="#f6f6f6" stroke="#ccc" rx="2"/>
    <rect x="420" y="316" width="460" height="22" fill="#f6f6f6" stroke="#ccc" rx="2"/>
  </g>
  <g font-size="9" fill="#555" font-weight="bold" text-anchor="middle">
    <text x="70" y="331">步骤</text>
    <text x="200" y="331">堆状态</text>
    <text x="360" y="331">弹出</text>
    <text x="650" y="331">结果</text>
  </g>

  <!-- Rows -->
  <g font-size="9" fill="#444">
    <text x="70" y="350" text-anchor="middle">1</text>
    <text x="200" y="350" text-anchor="middle">[1(L0), 1(L1), 2(L2)]</text>
    <text x="360" y="350" text-anchor="middle" fill="#c04050" font-weight="bold">1(L0)</text>
    <text x="650" y="350" text-anchor="middle">1→</text>

    <text x="70" y="366" text-anchor="middle">2</text>
    <text x="200" y="366" text-anchor="middle">[1(L1), 2(L2), 4(L0)]</text>
    <text x="360" y="366" text-anchor="middle" fill="#c04050" font-weight="bold">1(L1)</text>
    <text x="650" y="366" text-anchor="middle">1→1→</text>

    <text x="70" y="382" text-anchor="middle">3</text>
    <text x="200" y="382" text-anchor="middle">[2(L2), 3(L1), 4(L0)]</text>
    <text x="360" y="382" text-anchor="middle" fill="#c04050" font-weight="bold">2(L2)</text>
    <text x="650" y="382" text-anchor="middle">1→1→2→</text>

    <text x="70" y="398" text-anchor="middle">4</text>
    <text x="200" y="398" text-anchor="middle">[3(L1), 4(L0), 6(L2)]</text>
    <text x="360" y="398" text-anchor="middle" fill="#c04050" font-weight="bold">3(L1)</text>
    <text x="650" y="398" text-anchor="middle">1→1→2→3→</text>

    <text x="70" y="414" text-anchor="middle">5</text>
    <text x="200" y="414" text-anchor="middle">[4(L0), 4(L1), 6(L2)]</text>
    <text x="360" y="414" text-anchor="middle" fill="#c04050" font-weight="bold">4(L0)</text>
    <text x="650" y="414" text-anchor="middle">1→1→2→3→4→ ... →6 ✓</text>
  </g>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="424" width="880" height="12" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.5"/>
  </g>
  <text x="470" y="434" text-anchor="middle" font-size="8" fill="#2b6e9e">💡 与 Scheduler 同构：堆弹出最小 = 调度器弹出最高优先级请求，弹出后补充下一个 = 链表前进/新请求入队</text>
</svg>
