<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">排序排列的最少操作数：反转 + 左旋</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">两种操作：①反转整个数组 ②左旋一位（首元素移到末尾）</text>

  <!-- ===== Operations ===== -->
  <text x="30" y="72" font-size="12" fill="#446688" font-weight="bold">操作定义</text>

  <rect x="30" y="80" width="270" height="50" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="100" font-size="11" fill="#446688" font-weight="bold">① 反转（reverse）</text>
  <text x="44" y="116" font-family="monospace" font-size="10" fill="#555">[a,b,c,d] → [d,c,b,a]</text>

  <rect x="320" y="80" width="270" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="334" y="100" font-size="11" fill="#d6a040" font-weight="bold">② 左旋一位（left-rotate）</text>
  <text x="334" y="116" font-family="monospace" font-size="10" fill="#555">[a,b,c,d] → [b,c,d,a]</text>

  <!-- ===== Example: [0,2,1] → 2 steps ===== -->
  <line x1="20" y1="145" x2="620" y2="145" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="168" font-size="12" fill="#b85450" font-weight="bold">示例 1：[0,2,1] → [0,1,2]，2 步</text>

  <g font-size="11" fill="#333">
    <!-- Step 0 -->
    <rect x="30" y="178" width="200" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="130" y="200" text-anchor="middle" font-family="monospace" fill="#b85450" font-weight="bold">[0, 2, 1]</text>
    <text x="240" y="200" font-size="10" fill="#888">初始</text>

    <!-- Arrow: left-rotate -->
    <path d="M 130 214 L 130 230" stroke="#d6a040" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <text x="145" y="226" font-size="9" fill="#d6a040">左旋</text>

    <!-- Step 1 -->
    <rect x="30" y="234" width="200" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="130" y="256" text-anchor="middle" font-family="monospace" fill="#d6a040" font-weight="bold">[2, 1, 0]</text>
    <text x="240" y="256" font-size="10" fill="#888">第 1 步：左旋</text>

    <!-- Arrow: reverse -->
    <path d="M 130 270 L 130 286" stroke="#446688" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <text x="145" y="282" font-size="9" fill="#446688">反转</text>

    <!-- Step 2 -->
    <rect x="30" y="290" width="200" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="4" filter="url(#rough2)"/>
    <text x="130" y="312" text-anchor="middle" font-family="monospace" fill="#4a7a3a" font-weight="bold">[0, 1, 2] ✓</text>
    <text x="240" y="312" font-size="10" fill="#4a7a3a">第 2 步：反转</text>
  </g>

  <!-- ===== Key observation ===== -->
  <line x1="20" y1="340" x2="620" y2="340" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="362" font-size="12" fill="#444" font-weight="bold">核心观察</text>

  <rect x="30" y="372" width="580" height="78" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="50" y="394" font-size="11" fill="#333">目标 [0,1,...,n-1] 在排列中只有两种循环形态：</text>
  <text x="50" y="412" font-size="10" fill="#446688" font-weight="bold">升序循环：0→1→2→...→n-1→0（相邻差+1，循环）</text>
  <text x="50" y="428" font-size="10" fill="#b85450" font-weight="bold">降序循环：n-1→n-2→...→0→n-1（相邻差-1，循环）</text>
  <text x="50" y="444" font-size="10" fill="#555">升序→直接旋转到 0 在首位；降序→先反转再旋转；都不是→返回 -1</text>
</svg>
