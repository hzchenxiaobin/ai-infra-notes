<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="440" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：l1=1→2→4, l2=1→3→4 逐步合并</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">每步比较 p1.val 和 p2.val，较小者接入 tail，最终 1→1→2→3→4→4</text>

  <!-- Step 1 -->
  <text x="30" y="72" font-size="10" fill="#b85450" font-weight="bold">步骤 1: p1.val=1, p2.val=1, 1≤1 取 l1</text>
  <g font-size="10">
    <rect x="30" y="80" width="36" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="48" y="96" text-anchor="middle" fill="#b85450" font-weight="bold">1</text>
    <text x="76" y="96" font-size="9" fill="#888">← 接入（l1 的 1）</text>
  </g>

  <!-- Step 2 -->
  <text x="30" y="120" font-size="10" fill="#4a7a3a" font-weight="bold">步骤 2: p1.val=2, p2.val=1, 2&gt;1 取 l2</text>
  <g font-size="10">
    <rect x="30" y="128" width="36" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="48" y="144" text-anchor="middle" fill="#888">1</text>
    <path d="M 66 140 L 72 140" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="74" y="128" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="92" y="144" text-anchor="middle" fill="#4a7a3a" font-weight="bold">1</text>
    <text x="120" y="144" font-size="9" fill="#888">← 接入（l2 的 1）</text>
  </g>

  <!-- Step 3 -->
  <text x="30" y="168" font-size="10" fill="#446688" font-weight="bold">步骤 3: p1.val=2, p2.val=3, 2≤3 取 l1</text>
  <g font-size="10">
    <rect x="30" y="176" width="36" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="48" y="192" text-anchor="middle" fill="#888">1</text>
    <path d="M 66 188 L 72 188" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="74" y="176" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="92" y="192" text-anchor="middle" fill="#888">1</text>
    <path d="M 110 188 L 116 188" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="118" y="176" width="36" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="136" y="192" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <text x="164" y="192" font-size="9" fill="#888">← 接入（l1 的 2）</text>
  </g>

  <!-- Step 4 -->
  <text x="30" y="216" font-size="10" fill="#d6a040" font-weight="bold">步骤 4: p1.val=4, p2.val=3, 4&gt;3 取 l2</text>
  <g font-size="10">
    <rect x="30" y="224" width="30" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="45" y="239" text-anchor="middle" font-size="9" fill="#888">1</text>
    <rect x="62" y="224" width="30" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="77" y="239" text-anchor="middle" font-size="9" fill="#888">1</text>
    <rect x="94" y="224" width="30" height="22" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="109" y="239" text-anchor="middle" font-size="9" fill="#888">2</text>
    <path d="M 124 235 L 130 235" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="132" y="224" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="150" y="240" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <text x="178" y="240" font-size="9" fill="#888">← 接入（l2 的 3）</text>
  </g>

  <!-- Step 5 -->
  <text x="30" y="264" font-size="10" fill="#b85450" font-weight="bold">步骤 5: p1.val=4, p2.val=4, 4≤4 取 l1</text>
  <g font-size="10">
    <rect x="30" y="272" width="28" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="44" y="286" text-anchor="middle" font-size="8" fill="#888">1</text>
    <rect x="60" y="272" width="28" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="74" y="286" text-anchor="middle" font-size="8" fill="#888">1</text>
    <rect x="90" y="272" width="28" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="104" y="286" text-anchor="middle" font-size="8" fill="#888">2</text>
    <rect x="120" y="272" width="28" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="134" y="286" text-anchor="middle" font-size="8" fill="#888">3</text>
    <path d="M 148 282 L 154 282" stroke="#666" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="156" y="272" width="36" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="174" y="288" text-anchor="middle" fill="#446688" font-weight="bold">4</text>
    <text x="200" y="288" font-size="9" fill="#888">← 接入（l1 的 4）</text>
  </g>

  <!-- Step 6: l1 exhausted, append remaining l2 -->
  <text x="30" y="316" font-size="10" fill="#d6a040" font-weight="bold">步骤 6: l1 耗尽，拼接 l2 剩余（4）</text>
  <g font-size="10">
    <rect x="30" y="324" width="28" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="44" y="338" text-anchor="middle" font-size="8" fill="#888">1</text>
    <rect x="60" y="324" width="28" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="74" y="338" text-anchor="middle" font-size="8" fill="#888">1</text>
    <rect x="90" y="324" width="28" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="104" y="338" text-anchor="middle" font-size="8" fill="#888">2</text>
    <rect x="120" y="324" width="28" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="134" y="338" text-anchor="middle" font-size="8" fill="#888">3</text>
    <rect x="150" y="324" width="28" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="164" y="338" text-anchor="middle" font-size="8" fill="#888">4</text>
    <path d="M 178 334 L 184 334" stroke="#666" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="186" y="324" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="204" y="340" text-anchor="middle" fill="#4a7a3a" font-weight="bold">4</text>
    <text x="230" y="340" font-size="9" fill="#888">← 整体接上剩余</text>
  </g>

  <!-- ===== Final result ===== -->
  <rect x="30" y="370" width="480" height="56" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="270" y="392" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">最终结果：1 → 1 → 2 → 3 → 4 → 4</text>
  <text x="270" y="410" text-anchor="middle" font-size="10" fill="#555">dummy.next 指向第一个 1，返回即真正的头</text>
  <text x="270" y="424" text-anchor="middle" font-size="9" fill="#888">共 6 步，每步 O(1)，总计 O(m+n) = O(6)</text>
</svg>
