<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260"
     font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#446688"/>
    </marker>
  </defs>
  <rect width="520" height="260" fill="#fafafa"/>
  <text x="260" y="30" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">把位置平移后，问题变成求绝对值之和最小区间</text>

  <text x="60" y="65" font-size="12" fill="#555" filter="url(#rough2)">pos（1 的下标）</text>
  <rect x="60" y="75" width="40" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/><text x="80" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">0</text>
  <rect x="110" y="75" width="40" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/><text x="130" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">3</text>
  <rect x="160" y="75" width="40" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/><text x="180" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">5</text>

  <text x="60" y="145" font-size="12" fill="#555" filter="url(#rough2)">q = pos - j（消除连续段内部偏移）</text>
  <rect x="60" y="155" width="40" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/><text x="80" y="178" text-anchor="middle" font-size="14" filter="url(#rough2)">0</text>
  <rect x="110" y="155" width="40" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/><text x="130" y="178" text-anchor="middle" font-size="14" filter="url(#rough2)">2</text>
  <rect x="160" y="155" width="40" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/><text x="180" y="178" text-anchor="middle" font-size="14" filter="url(#rough2)">3</text>

  <path d="M80 112 L80 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M130 112 L130 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M180 112 L180 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>

  <text x="260" y="200" font-size="12" fill="#555" filter="url(#rough2)">选 t = median(q) = 2，成本 |0-2|+|2-2|+|3-2| = 3 最小</text>
  <text x="260" y="225" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">滑动窗口取最小值即答案</text>
</svg>
