<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220"
     font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
  </defs>
  <rect width="520" height="220" fill="#fafafa"/>
  <text x="260" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">逆序对：前面的类别大于后面的类别</text>

  <!-- array boxes -->
  <rect x="70" y="70" width="40" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="2" filter="url(#rough2)"/>
  <text x="90" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">0</text>
  <rect x="115" y="70" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="135" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">1</text>
  <rect x="160" y="70" width="40" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="2" filter="url(#rough2)"/>
  <text x="180" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">0</text>
  <rect x="205" y="70" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="225" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">1</text>
  <rect x="250" y="70" width="40" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="270" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">2</text>
  <rect x="295" y="70" width="40" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="315" y="95" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">2</text>

  <!-- indices -->
  <text x="90" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">0</text>
  <text x="135" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">1</text>
  <text x="180" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">2</text>
  <text x="225" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">3</text>
  <text x="270" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">4</text>
  <text x="315" y="130" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">5</text>

  <!-- highlight inversion (1,2) -->
  <path d="M135 62 Q 157 40 180 62" fill="none" stroke="#b85450" stroke-width="2.5" filter="url(#rough2)"/>
  <text x="157" y="52" text-anchor="middle" font-size="12" fill="#b85450" filter="url(#rough2)">1&gt;0</text>

  <text x="260" y="180" text-anchor="middle" font-size="13" fill="#555" filter="url(#rough2)">每一对这样的元素都至少需要一次相邻交换来纠正顺序</text>
</svg>