<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="42" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">最小覆盖子串：算法流程</text>
  <path d="M 290 40 Q 450 48 610 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Init -->
  <g filter="url(#sk)"><rect x="60" y="68" width="240" height="44" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="180" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">① 初始化</text>
  <text x="180" y="104" text-anchor="middle" font-size="10" fill="#555">need=Counter(t), valid=0, left=0</text>

  <path d="M 300 90 L 340 90" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- right loop -->
  <g filter="url(#sk)"><rect x="340" y="68" width="260" height="44" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="470" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">② for right in range(len(s))</text>
  <text x="470" y="104" text-anchor="middle" font-size="10" fill="#555">右指针扩张，纳入 s[right]</text>

  <path d="M 600 90 L 640 90" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- update window -->
  <g filter="url(#sk)"><rect x="640" y="68" width="220" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="750" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">③ 更新 window[c]</text>
  <text x="750" y="104" text-anchor="middle" font-size="10" fill="#555">if window[c]==need[c]: valid++</text>

  <path d="M 750 112 L 750 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- valid check -->
  <g filter="url(#sk)"><rect x="640" y="142" width="220" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="750" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">④ valid == needCnt?</text>
  <text x="750" y="178" text-anchor="middle" font-size="10" fill="#555">窗口是否涵盖 t 全部字符</text>

  <!-- shrink loop -->
  <path d="M 750 186 L 750 216" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="580" y="216" width="280" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="720" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">⑤ while valid == needCnt:</text>
  <text x="720" y="252" text-anchor="middle" font-size="10" fill="#555">收缩 left，更新 minLen</text>

  <path d="M 580 238 L 520 238" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="280" y="216" width="240" height="44" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="400" y="236" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">⑥ 更新最小窗口</text>
  <text x="400" y="252" text-anchor="middle" font-size="10" fill="#555">if right-left+1 &lt; minLen: 记录</text>

  <path d="M 400 260 L 400 290" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="280" y="290" width="240" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="400" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">⑦ 移出 s[left], left++</text>
  <text x="400" y="326" text-anchor="middle" font-size="10" fill="#555">if window[d]-- == need[d]: valid--</text>

  <!-- loop back -->
  <path d="M 400 334 Q 400 360 550 360 Q 720 360 720 290" stroke="#888" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="560" y="376" font-size="10" fill="#888">继续收缩直到不合法</text>

  <!-- result -->
  <g filter="url(#sk)"><rect x="60" y="290" width="200" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="160" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">⑧ 返回 s[start:start+minLen]</text>
  <text x="160" y="326" text-anchor="middle" font-size="10" fill="#555">或 "" (无解)</text>

  <!-- complexity note -->
  <g filter="url(#sk)"><rect x="60" y="350" width="780" height="40" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="80" y="374" font-size="11" fill="#7a5415">★ left、right 各至多遍历 s 一次，总移动次数 ≤ 2n → O(n) 时间，O(m) 空间</text>
</svg>
