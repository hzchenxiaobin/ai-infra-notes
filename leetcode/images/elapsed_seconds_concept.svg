<svg xmlns="http://www.w3.org/2000/svg" width="640" height="340" viewBox="0 0 640 340" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="113" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="640" height="340" fill="#fdfcf7"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">时间转秒数 + 做差</text>
  <path d="M 190 42 Q 320 50 450 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Formula -->
  <g filter="url(#sk)">
    <rect x="120" y="62" width="400" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="320" y="88" text-anchor="middle" font-size="14" fill="#2b6e9e" font-family="monospace" font-weight="bold">total = HH × 3600 + MM × 60 + SS</text>

  <!-- Example -->
  <text x="320" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">示例：12:34:56 → 13:00:00</text>

  <!-- Start time -->
  <g filter="url(#sk)">
    <rect x="40" y="145" width="260" height="90" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="170" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">startTime = "12:34:56"</text>
  <g font-size="11" fill="#444" font-family="monospace">
    <text x="60" y="190">HH=12: 12 × 3600 = 43200</text>
    <text x="60" y="206">MM=34: 34 × 60 = 2040</text>
    <text x="60" y="222">SS=56: 56</text>
    <text x="60" y="236" fill="#2b6e9e" font-weight="bold">合计 = 45296</text>
  </g>

  <!-- Minus sign -->
  <text x="320" y="195" text-anchor="middle" font-size="24" fill="#3a3a3a" font-weight="bold">−</text>

  <!-- End time -->
  <g filter="url(#sk)">
    <rect x="340" y="145" width="260" height="90" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="470" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">endTime = "13:00:00"</text>
  <g font-size="11" fill="#444" font-family="monospace">
    <text x="360" y="190">HH=13: 13 × 3600 = 46800</text>
    <text x="360" y="206">MM=0:  0 × 60 = 0</text>
    <text x="360" y="222">SS=0:  0</text>
    <text x="360" y="236" fill="#2e6e2e" font-weight="bold">合计 = 46800</text>
  </g>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="160" y="250" width="320" height="50" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="320" y="272" text-anchor="middle" font-size="13" fill="#7a5415" font-family="monospace">46800 − 45296 =</text>
  <text x="320" y="292" text-anchor="middle" font-size="18" fill="#7a5415" font-weight="bold">1504 ✓</text>

  <!-- Parsing note -->
  <g filter="url(#sk)">
    <rect x="40" y="310" width="560" height="24" rx="6" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <text x="320" y="327" text-anchor="middle" font-size="11" fill="#888">解析：s.split(":") 或 s[0:2], s[3:5], s[6:8] → int()。O(1) 常数时间。</text>
</svg>
