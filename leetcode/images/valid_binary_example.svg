<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="r"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="13"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
  </defs>
  <rect width="560" height="340" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" filter="url(#r)">示例演算：n=3, k=1，枚举 mask 0..7</text>

  <text x="30" y="60" font-size="11" fill="#888" filter="url(#r)">下标从 0 开始，s[0]='1' 成本贡献 0</text>

  <g filter="url(#r)" font-size="11" font-family="monospace">
    <text x="30" y="85" fill="#446688" font-weight="bold">mask</text>
    <text x="100" y="85" fill="#446688" font-weight="bold">串</text>
    <text x="180" y="85" fill="#446688" font-weight="bold">连续1?</text>
    <text x="270" y="85" fill="#446688" font-weight="bold">成本</text>
    <text x="340" y="85" fill="#446688" font-weight="bold">≤1?</text>
    <text x="410" y="85" fill="#446688" font-weight="bold">有效</text>

    <text x="30" y="108" fill="#333">0</text><text x="100" y="108" fill="#333">000</text><text x="180" y="108" fill="#4a7a3a">✓</text><text x="270" y="108" fill="#333">0</text><text x="340" y="108" fill="#4a7a3a">✓</text><text x="410" y="108" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="30" y="128" fill="#333">1</text><text x="100" y="128" fill="#333">100</text><text x="180" y="128" fill="#4a7a3a">✓</text><text x="270" y="128" fill="#333">0</text><text x="340" y="128" fill="#4a7a3a">✓</text><text x="410" y="128" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="30" y="148" fill="#333">2</text><text x="100" y="148" fill="#333">010</text><text x="180" y="148" fill="#4a7a3a">✓</text><text x="270" y="148" fill="#333">1</text><text x="340" y="148" fill="#4a7a3a">✓</text><text x="410" y="148" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="30" y="168" fill="#333">3</text><text x="100" y="168" fill="#333">110</text><text x="180" y="168" fill="#b85450">✗</text><text x="270" y="168" fill="#888">1</text><text x="340" y="168" fill="#888">-</text><text x="410" y="168" fill="#b85450">✗</text>
    <text x="30" y="188" fill="#333">4</text><text x="100" y="188" fill="#333">001</text><text x="180" y="188" fill="#4a7a3a">✓</text><text x="270" y="188" fill="#333">2</text><text x="340" y="188" fill="#b85450">✗</text><text x="410" y="188" fill="#b85450">✗</text>
    <text x="30" y="208" fill="#333">5</text><text x="100" y="208" fill="#333">101</text><text x="180" y="208" fill="#4a7a3a">✓</text><text x="270" y="208" fill="#333">2</text><text x="340" y="208" fill="#b85450">✗</text><text x="410" y="208" fill="#b85450">✗</text>
    <text x="30" y="228" fill="#333">6</text><text x="100" y="228" fill="#333">011</text><text x="180" y="228" fill="#b85450">✗</text><text x="270" y="228" fill="#888">3</text><text x="340" y="228" fill="#888">-</text><text x="410" y="228" fill="#b85450">✗</text>
    <text x="30" y="248" fill="#333">7</text><text x="100" y="248" fill="#333">111</text><text x="180" y="248" fill="#b85450">✗</text><text x="270" y="248" fill="#888">3</text><text x="340" y="248" fill="#888">-</text><text x="410" y="248" fill="#b85450">✗</text>
  </g>

  <rect x="30" y="270" width="500" height="50" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#r)"/>
  <text x="45" y="292" font-size="12" fill="#4a7a3a" font-weight="bold" filter="url(#r)">有效字符串：["000","100","010"]</text>
  <text x="45" y="310" font-size="10" fill="#888" filter="url(#r)">连续1检查：(mask &amp; (mask&gt;&gt;1))==0；成本=为1的位索引之和</text>
</svg>
