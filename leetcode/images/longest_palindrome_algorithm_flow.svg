<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：枚举中心 → 双指针扩展 → 更新最长</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n²)，空间 O(1)；面试首选写法</text>

  <g font-size="10" fill="#333">
    <!-- Step 1: init -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="130" y="84" font-family="monospace" font-size="10" fill="#555">start = 0, maxLen = 1</text>
    <text x="130" y="100" font-size="9" fill="#888">至少 1 个字符是回文</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: for loop -->
    <rect x="40" y="128" width="440" height="150" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② 枚举每个中心 i = 0..n-1</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">for (int i = 0; i &lt; n; ++i) {</text>
    <text x="70" y="184" font-family="monospace" font-size="10" fill="#b85450">// 奇数中心：单字符</text>
    <text x="70" y="200" font-family="monospace" font-size="10" fill="#b85450">len1 = expand(i, i);</text>
    <text x="70" y="216" font-family="monospace" font-size="10" fill="#4a7a3a">// 偶数中心：双字符间隙</text>
    <text x="70" y="232" font-family="monospace" font-size="10" fill="#4a7a3a">len2 = expand(i, i + 1);</text>
    <text x="70" y="248" font-family="monospace" font-size="10" fill="#d6a040">len = max(len1, len2);</text>
    <text x="70" y="264" font-family="monospace" font-size="10" fill="#555">if (len &gt; maxLen) { maxLen = len; start = i - (len-1)/2; }</text>
    <text x="54" y="276" font-family="monospace" font-size="10" fill="#555">}</text>

    <path d="M 260 282 L 260 296" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: expand function -->
    <rect x="40" y="300" width="440" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="320" font-size="12" fill="#d6a040" font-weight="bold">expand(left, right)</text>
    <text x="170" y="320" font-family="monospace" font-size="10" fill="#555">while (l≥0 &amp;&amp; r&lt;n &amp;&amp; s[l]==s[r]) { l--; r++; }</text>
    <text x="170" y="336" font-family="monospace" font-size="10" fill="#555">return r - l - 1;  // 回文长度</text>
    <text x="170" y="350" font-size="9" fill="#888">向两端扩展直到不对称或越界</text>

    <!-- Step 4: return -->
    <rect x="40" y="364" width="440" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="260" y="382" text-anchor="middle" font-family="monospace" font-size="10" fill="#b85450" font-weight="bold">return s.substr(start, maxLen);</text>
  </g>
</svg>
