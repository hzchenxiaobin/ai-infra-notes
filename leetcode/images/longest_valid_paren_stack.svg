<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="780" height="480" fill="#fdfcf7"/>

  <text x="390" y="34" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">最长有效括号：栈解法（存下标）</text>
  <path d="M 240 44 Q 390 52 540 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="58" text-anchor="middle" font-size="11" fill="#888">s = ")()())"　栈底保留"最后未匹配的 )" 作为基准，有效长度 = i - stack.top()</text>

  <!-- 字符串展示 -->
  <text x="60" y="86" font-size="12" fill="#888" font-weight="bold">字符串</text>
  <g filter="url(#sk)">
    <rect x="100" y="70" width="40" height="34" rx="4" fill="#fdecec" stroke="#b03a3a" stroke-width="1.3"/>
    <rect x="142" y="70" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="184" y="70" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="226" y="70" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="268" y="70" width="40" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="310" y="70" width="40" height="34" rx="4" fill="#fdecec" stroke="#b03a3a" stroke-width="1.3"/>
  </g>
  <text x="120" y="92" text-anchor="middle" font-size="14" fill="#b03a3a" font-weight="bold">)</text>
  <text x="162" y="92" text-anchor="middle" font-size="14" fill="#2b2b2b">(</text>
  <text x="204" y="92" text-anchor="middle" font-size="14" fill="#2b2b2b">)</text>
  <text x="246" y="92" text-anchor="middle" font-size="14" fill="#2b2b2b">(</text>
  <text x="288" y="92" text-anchor="middle" font-size="14" fill="#2b2b2b">)</text>
  <text x="330" y="92" text-anchor="middle" font-size="14" fill="#b03a3a" font-weight="bold">)</text>
  <text x="120" y="116" text-anchor="middle" font-size="9" fill="#888">0</text>
  <text x="162" y="116" text-anchor="middle" font-size="9" fill="#888">1</text>
  <text x="204" y="116" text-anchor="middle" font-size="9" fill="#888">2</text>
  <text x="246" y="116" text-anchor="middle" font-size="9" fill="#888">3</text>
  <text x="288" y="116" text-anchor="middle" font-size="9" fill="#888">4</text>
  <text x="330" y="116" text-anchor="middle" font-size="9" fill="#888">5</text>

  <!-- 高亮有效子串 ()() -->
  <g filter="url(#sk)">
    <rect x="140" y="66" width="170" height="42" fill="none" stroke="#4a8e4a" stroke-width="2" stroke-dasharray="5,3" rx="6"/>
  </g>
  <text x="225" y="130" text-anchor="middle" font-size="10" fill="#4a8e4a" font-weight="bold">有效子串 "()()" 长度 4</text>

  <!-- 逐步演示 -->
  <text x="60" y="160" font-size="12" fill="#2b2b2b" font-weight="bold">逐步执行：</text>

  <!-- 步骤表 -->
  <g filter="url(#sk)">
    <rect x="60" y="168" width="660" height="220" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3"/>
  </g>
  <!-- 表头 -->
  <text x="80" y="190" font-size="11" fill="#2b2b2b" font-weight="bold">i</text>
  <text x="130" y="190" font-size="11" fill="#2b2b2b" font-weight="bold">s[i]</text>
  <text x="190" y="190" font-size="11" fill="#2b2b2b" font-weight="bold">操作</text>
  <text x="430" y="190" font-size="11" fill="#2b2b2b" font-weight="bold">栈（下标）</text>
  <text x="600" y="190" font-size="11" fill="#2b2b2b" font-weight="bold">有效长度</text>

  <!-- init -->
  <text x="80" y="212" font-size="10" fill="#888">-</text>
  <text x="130" y="212" font-size="10" fill="#888">-</text>
  <text x="190" y="212" font-size="10" fill="#444">初始化：压 -1 作基准</text>
  <text x="430" y="212" font-size="10" fill="#4a8edb" font-family="monospace">[-1]</text>
  <text x="600" y="212" font-size="10" fill="#888">0</text>

  <!-- i=0 -->
  <text x="80" y="234" font-size="10" fill="#2b2b2b">0</text>
  <text x="130" y="234" font-size="10" fill="#b03a3a" font-weight="bold">)</text>
  <text x="190" y="234" font-size="10" fill="#444">弹栈→空，压 0（未匹配）</text>
  <text x="430" y="234" font-size="10" fill="#4a8edb" font-family="monospace">[0]</text>
  <text x="600" y="234" font-size="10" fill="#888">0</text>

  <!-- i=1 -->
  <text x="80" y="256" font-size="10" fill="#2b2b2b">1</text>
  <text x="130" y="256" font-size="10" fill="#2b2b2b">(</text>
  <text x="190" y="256" font-size="10" fill="#444">压 1</text>
  <text x="430" y="256" font-size="10" fill="#4a8edb" font-family="monospace">[0, 1]</text>
  <text x="600" y="256" font-size="10" fill="#888">0</text>

  <!-- i=2 -->
  <text x="80" y="278" font-size="10" fill="#2b2b2b">2</text>
  <text x="130" y="278" font-size="10" fill="#b03a3a" font-weight="bold">)</text>
  <text x="190" y="278" font-size="10" fill="#444">弹 1，栈非空</text>
  <text x="430" y="278" font-size="10" fill="#4a8edb" font-family="monospace">[0]</text>
  <text x="600" y="278" font-size="10" fill="#4a8e4a" font-weight="bold">2-0=2</text>

  <!-- i=3 -->
  <text x="80" y="300" font-size="10" fill="#2b2b2b">3</text>
  <text x="130" y="300" font-size="10" fill="#2b2b2b">(</text>
  <text x="190" y="300" font-size="10" fill="#444">压 3</text>
  <text x="430" y="300" font-size="10" fill="#4a8edb" font-family="monospace">[0, 3]</text>
  <text x="600" y="300" font-size="10" fill="#888">2</text>

  <!-- i=4 -->
  <text x="80" y="322" font-size="10" fill="#2b2b2b">4</text>
  <text x="130" y="322" font-size="10" fill="#b03a3a" font-weight="bold">)</text>
  <text x="190" y="322" font-size="10" fill="#444">弹 3，栈非空</text>
  <text x="430" y="322" font-size="10" fill="#4a8edb" font-family="monospace">[0]</text>
  <text x="600" y="322" font-size="10" fill="#4a8e4a" font-weight="bold">4-0=4 ★</text>

  <!-- i=5 -->
  <text x="80" y="344" font-size="10" fill="#2b2b2b">5</text>
  <text x="130" y="344" font-size="10" fill="#b03a3a" font-weight="bold">)</text>
  <text x="190" y="344" font-size="10" fill="#444">弹 0→空，压 5（未匹配）</text>
  <text x="430" y="344" font-size="10" fill="#4a8edb" font-family="monospace">[5]</text>
  <text x="600" y="344" font-size="10" fill="#888">4</text>

  <!-- 答案 -->
  <text x="80" y="372" font-size="11" fill="#b03a3a" font-weight="bold">答案</text>
  <text x="190" y="372" font-size="11" fill="#b03a3a" font-weight="bold">max = 4（子串 "()()"，下标 1-4）</text>

  <!-- 底部要点 -->
  <g filter="url(#sk)">
    <rect x="60" y="400" width="660" height="64" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="80" y="424" font-size="11" fill="#2b2b2b" font-weight="bold">关键技巧：</text>
  <text x="80" y="442" font-size="10" fill="#444">① 栈存下标（非字符），可直接算长度 i - stack.top()　② 栈底保留 -1 或未匹配 ) 作基准</text>
  <text x="80" y="458" font-size="10" fill="#444">③ 栈空时压入当前 ) 下标作新基准（分隔点）　④ 时间 O(n)，空间 O(n)</text>
</svg>
