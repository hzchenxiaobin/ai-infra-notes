<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="77" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">示例演算：s = "ADOBECODEBANC", t = "ABC"</text>
  <path d="M 300 40 Q 460 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- char index labels -->
  <g font-size="9" fill="#888">
    <text x="65" y="68">0</text><text x="95" y="68">1</text><text x="125" y="68">2</text>
    <text x="155" y="68">3</text><text x="185" y="68">4</text><text x="215" y="68">5</text>
    <text x="245" y="68">6</text><text x="275" y="68">7</text><text x="305" y="68">8</text>
    <text x="335" y="68">9</text><text x="365" y="68">10</text><text x="395" y="68">11</text>
    <text x="425" y="68">12</text>
  </g>

  <!-- Step 1: right=0, A, valid=1 -->
  <g filter="url(#sk)"><rect x="50" y="76" width="800" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
  <g font-size="11" fill="#444">
    <g filter="url(#sk)"><rect x="60" y="82" width="26" height="28" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/></g>
    <text x="73" y="100" text-anchor="middle" font-weight="bold" fill="#2b6e9e">A</text>
    <text x="100" y="86" font-size="10" fill="#888">D</text><text x="130" y="86" font-size="10" fill="#888">O</text>
    <text x="160" y="86" font-size="10" fill="#888">B</text><text x="190" y="86" font-size="10" fill="#888">E</text>
    <text x="220" y="86" font-size="10" fill="#888">C</text>
    <text x="350" y="100" font-size="11" fill="#2b6e9e">right=0, valid=1/3 → 扩张</text>
  </g>

  <!-- Step 2: right=5, ADOBEC, valid=3, cover! -->
  <g filter="url(#sk)"><rect x="50" y="120" width="800" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
  <g font-size="11">
    <g filter="url(#sk)"><rect x="60" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="73" y="144" text-anchor="middle" fill="#2e6e2e" font-weight="bold">A</text>
    <g filter="url(#sk)"><rect x="86" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
    <text x="99" y="144" text-anchor="middle" fill="#888">D</text>
    <g filter="url(#sk)"><rect x="112" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
    <text x="125" y="144" text-anchor="middle" fill="#888">O</text>
    <g filter="url(#sk)"><rect x="138" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
    <text x="151" y="144" text-anchor="middle" fill="#2e6e2e" font-weight="bold">B</text>
    <g filter="url(#sk)"><rect x="164" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
    <text x="177" y="144" text-anchor="middle" fill="#888">E</text>
    <g filter="url(#sk)"><rect x="190" y="126" width="26" height="28" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="203" y="144" text-anchor="middle" fill="#b85450" font-weight="bold">C</text>
    <text x="350" y="144" font-size="11" fill="#2e6e2e" font-weight="bold">right=5, valid=3/3 → 合法！收缩, minLen=6</text>
  </g>

  <!-- Step 3: right=10, window covers again -->
  <g filter="url(#sk)"><rect x="50" y="164" width="800" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
  <g font-size="11">
    <g filter="url(#sk)"><rect x="86" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="99" y="188" text-anchor="middle" fill="#888">D</text>
    <g filter="url(#sk)"><rect x="112" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="125" y="188" text-anchor="middle" fill="#888">O</text>
    <g filter="url(#sk)"><rect x="138" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="151" y="188" text-anchor="middle" fill="#888">B</text>
    <g filter="url(#sk)"><rect x="164" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="177" y="188" text-anchor="middle" fill="#888">E</text>
    <g filter="url(#sk)"><rect x="190" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="203" y="188" text-anchor="middle" fill="#888">C</text>
    <g filter="url(#sk)"><rect x="216" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="229" y="188" text-anchor="middle" fill="#888">O</text>
    <g filter="url(#sk)"><rect x="242" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="255" y="188" text-anchor="middle" fill="#888">D</text>
    <g filter="url(#sk)"><rect x="268" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="281" y="188" text-anchor="middle" fill="#888">E</text>
    <g filter="url(#sk)"><rect x="294" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="307" y="188" text-anchor="middle" fill="#888">B</text>
    <g filter="url(#sk)"><rect x="320" y="170" width="26" height="28" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="333" y="188" text-anchor="middle" fill="#2e6e2e" font-weight="bold">A</text>
    <text x="400" y="188" font-size="11" fill="#7a5415">right=10, [1..10] 合法 → 收缩, minLen=6</text>
  </g>

  <!-- Step 4: right=12, BANC found -->
  <g filter="url(#sk)"><rect x="50" y="208" width="800" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <g font-size="11">
    <g filter="url(#sk)"><rect x="294" y="214" width="26" height="28" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/></g>
    <text x="307" y="232" text-anchor="middle" fill="#b85450" font-weight="bold">B</text>
    <g filter="url(#sk)"><rect x="320" y="214" width="26" height="28" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/></g>
    <text x="333" y="232" text-anchor="middle" fill="#b85450" font-weight="bold">A</text>
    <g filter="url(#sk)"><rect x="346" y="214" width="26" height="28" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/></g>
    <text x="359" y="232" text-anchor="middle" fill="#b85450" font-weight="bold">N</text>
    <g filter="url(#sk)"><rect x="372" y="214" width="26" height="28" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/></g>
    <text x="385" y="232" text-anchor="middle" fill="#b85450" font-weight="bold">C</text>
    <text x="440" y="232" font-size="11" fill="#b85450" font-weight="bold">right=12, [9..12]="BANC" → minLen=4 ★</text>
  </g>

  <!-- Summary table -->
  <g filter="url(#sk)"><rect x="50" y="264" width="800" height="160" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="70" y="288" font-size="12" font-weight="bold" fill="#444">关键步骤总结：</text>
  <g font-size="11" fill="#444">
    <text x="70" y="310">step 1: right=0, 纳入 A, valid=1 → 继续扩张</text>
    <text x="70" y="330">step 2: right=5, 纳入 C, valid=3 → 合法窗口 [0,5]="ADOBEC", minLen=6</text>
    <text x="70" y="350">step 3: right=10, 纳入 A, valid=3 → 合法, 收缩到 [5,10], minLen=6</text>
    <text x="70" y="370">step 4: right=12, 纳入 C, valid=3 → 合法, 收缩到 [9,12]="BANC", minLen=4 ★</text>
    <text x="70" y="398" fill="#b85450" font-weight="bold">最终最小覆盖子串：s[9..12] = "BANC"（长度 4）</text>
    <text x="500" y="398" fill="#7a5415">right/left 只增不减 → O(n)</text>
  </g>
</svg>
