<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8z" fill="#888"/>
    </marker>
  </defs>
  <rect width="560" height="300" fill="#fafafa"/>
  <text x="280" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333" filter="url(#rough2)">Q4 优化：单调队列维护窗口最大值</text>

  <!-- Transform -->
  <rect x="30" y="48" width="500" height="50" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="50" y="68" font-size="9" fill="#d6a040" font-weight="bold" filter="url(#rough2)">公式变换：</text>
  <text x="50" y="84" font-size="8" fill="#555" filter="url(#rough2)">dp[i][j] = prefix[i] + max_{len∈[l,r]} (dp[i-len][j-1] - prefix[i-len])</text>
  <text x="50" y="96" font-size="8" fill="#4a7a3a" filter="url(#rough2)">         = prefix[i] + max(val[i-r .. i-l])  ← 滑动窗口最大值!</text>

  <!-- Sliding window -->
  <text x="30" y="124" font-size="10" fill="#446688" font-weight="bold" filter="url(#rough2)">val 数组与滑动窗口 [i-r, i-l]：</text>

  <!-- val array -->
  <rect x="40" y="134" width="50" height="28" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
  <text x="65" y="154" text-anchor="middle" font-size="9" fill="#333" filter="url(#rough2)">v[0]</text>
  <rect x="95" y="134" width="50" height="28" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
  <text x="120" y="154" text-anchor="middle" font-size="9" fill="#333" filter="url(#rough2)">v[1]</text>
  <rect x="150" y="134" width="50" height="28" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="175" y="154" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold" filter="url(#rough2)">v[2]</text>
  <rect x="205" y="134" width="50" height="28" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="230" y="154" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold" filter="url(#rough2)">v[3]</text>
  <rect x="260" y="134" width="50" height="28" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
  <text x="285" y="154" text-anchor="middle" font-size="9" fill="#333" filter="url(#rough2)">v[4]</text>
  <rect x="315" y="134" width="50" height="28" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
  <text x="340" y="154" text-anchor="middle" font-size="9" fill="#333" filter="url(#rough2)">v[5]</text>

  <!-- Window bracket -->
  <path d="M 150 170 L 150 178 L 255 178 L 255 170" stroke="#4a7a3a" stroke-width="1.5" fill="none" filter="url(#rough2)"/>
  <text x="200" y="192" text-anchor="middle" font-size="8" fill="#4a7a3a" filter="url(#rough2)">窗口 [i-r, i-l]</text>

  <!-- Monotonic queue -->
  <rect x="30" y="210" width="500" height="70" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="50" y="232" font-size="10" fill="#4a7a3a" font-weight="bold" filter="url(#rough2)">单调递减队列（队首=窗口最大值）：</text>
  <text x="50" y="250" font-size="9" fill="#555" filter="url(#rough2)">1. 新元素入队尾，弹出所有 ≤ 新值的旧元素</text>
  <text x="50" y="264" font-size="9" fill="#555" filter="url(#rough2)">2. 弹出队首超出窗口左边界的元素</text>
  <text x="50" y="278" font-size="9" fill="#b85450" font-weight="bold" filter="url(#rough2)">→ O(1) 取窗口最大值，总复杂度 O(n·m)</text>
</svg>
