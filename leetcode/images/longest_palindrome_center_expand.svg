<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="380" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">中心扩展：以每个位置为中心向两端对称扩展</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">奇数中心（单字符）+ 偶数中心（双字符间隙），共 2n-1 个中心</text>

  <!-- ===== Odd length: "bab" centered at 'a' ===== -->
  <text x="30" y="76" font-size="12" fill="#b85450" font-weight="bold">奇数中心：以单个字符为中心</text>
  <g font-size="13">
    <!-- step 0: center -->
    <rect x="200" y="86" width="36" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
    <text x="218" y="108" text-anchor="middle" fill="#b85450" font-weight="bold">a</text>
    <text x="218" y="134" text-anchor="middle" font-size="9" fill="#b85450">中心 i=1</text>

    <!-- step 1: expand -->
    <path d="M 196 104 L 184 104" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 240 104 L 252 104" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="148" y="86" width="36" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="166" y="108" text-anchor="middle" fill="#446688" font-weight="bold">b</text>
    <rect x="252" y="86" width="36" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="270" y="108" text-anchor="middle" fill="#446688" font-weight="bold">b</text>
    <text x="218" y="140" text-anchor="middle" font-size="9" fill="#4a7a3a">s[0]==s[2] ✓ → "bab" len=3</text>

    <!-- step 2: expand more (fail) -->
    <path d="M 144 104 L 132 104" stroke="#888" stroke-width="0.8" fill="none" stroke-dasharray="2,2" marker-end="url(#arr)" filter="url(#rough2)"/>
    <text x="120" y="108" text-anchor="middle" font-size="9" fill="#888">越界 ✗</text>
  </g>

  <!-- ===== Even length: "bb" centered between two b's ===== -->
  <text x="30" y="176" font-size="12" fill="#4a7a3a" font-weight="bold">偶数中心：以两字符间隙为中心</text>
  <g font-size="13">
    <!-- step 0: center between two chars -->
    <rect x="170" y="190" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="188" y="212" text-anchor="middle" fill="#4a7a3a" font-weight="bold">b</text>
    <rect x="210" y="190" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="228" y="212" text-anchor="middle" fill="#4a7a3a" font-weight="bold">b</text>
    <text x="208" y="240" text-anchor="middle" font-size="9" fill="#4a7a3a">中心 i=1,i+1=2</text>

    <!-- expand -->
    <path d="M 166 208 L 154 208" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 250 208 L 262 208" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <text x="140" y="212" text-anchor="middle" font-size="9" fill="#888">c ✗</text>
    <text x="276" y="212" text-anchor="middle" font-size="9" fill="#888">d ✗</text>
    <text x="208" y="246" text-anchor="middle" font-size="9" fill="#4a7a3a">s[1]==s[2] ✓ → "bb" len=2，向外不对称停止</text>
  </g>

  <!-- ===== Summary ===== -->
  <line x1="20" y1="268" x2="520" y2="268" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <rect x="30" y="280" width="490" height="84" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="50" y="300" font-size="11" fill="#4a7a3a" font-weight="bold">两种中心覆盖所有回文：</text>
  <text x="50" y="318" font-size="10" fill="#555">① 奇数中心 expand(i, i)：覆盖 "aba"、"abcba" 等奇数长度回文</text>
  <text x="50" y="334" font-size="10" fill="#555">② 偶数中心 expand(i, i+1)：覆盖 "bb"、"abba" 等偶数长度回文</text>
  <text x="50" y="352" font-size="10" fill="#4a7a3a" font-weight="bold">共 2n-1 个中心（n 个字符 + n-1 个间隙）→ 每个扩展 O(n) → 总 O(n²)</text>
</svg>
