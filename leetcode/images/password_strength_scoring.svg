<svg xmlns="http://www.w3.org/2000/svg" width="780" height="480" viewBox="0 0 780 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="780" height="480" fill="#fdfcf7"/>
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">密码强度：按字符类别计「去重后」分值</text>
  <path d="M 220 40 Q 390 48 560 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="390" y="58" text-anchor="middle" font-size="11" fill="#888">同一类别内重复字符只算一次：Σ(类别权重 × 该类不同字符数)</text>

  <!-- ===== Four category cards ===== -->
  <!-- card width 168, height 104, x=30,210,390,570 ; y=78 -->
  <!-- Card 1: lowercase +1 (blue) -->
  <g filter="url(#sk)">
    <rect x="30" y="78" width="168" height="104" rx="10" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/>
  </g>
  <text x="114" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">小写字母</text>
  <text x="114" y="126" text-anchor="middle" font-size="12" fill="#446688" font-family="monospace">a – z</text>
  <text x="114" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#2b6e9e">+1</text>
  <text x="114" y="176" text-anchor="middle" font-size="10" fill="#888">每个不同字符</text>

  <!-- Card 2: uppercase +2 (green) -->
  <g filter="url(#sk)">
    <rect x="210" y="78" width="168" height="104" rx="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/>
  </g>
  <text x="294" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">大写字母</text>
  <text x="294" y="126" text-anchor="middle" font-size="12" fill="#4a7a3a" font-family="monospace">A – Z</text>
  <text x="294" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#2e6e2e">+2</text>
  <text x="294" y="176" text-anchor="middle" font-size="10" fill="#888">每个不同字符</text>

  <!-- Card 3: digit +3 (orange) -->
  <g filter="url(#sk)">
    <rect x="390" y="78" width="168" height="104" rx="10" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
  </g>
  <text x="474" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">数字</text>
  <text x="474" y="126" text-anchor="middle" font-size="12" fill="#7a5415" font-family="monospace">0 – 9</text>
  <text x="474" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a5415">+3</text>
  <text x="474" y="176" text-anchor="middle" font-size="10" fill="#888">每个不同字符</text>

  <!-- Card 4: special +5 (red) -->
  <g filter="url(#sk)">
    <rect x="570" y="78" width="168" height="104" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="654" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">特殊字符</text>
  <text x="654" y="126" text-anchor="middle" font-size="12" fill="#b85450" font-family="monospace">! @ # $</text>
  <text x="654" y="162" text-anchor="middle" font-size="26" font-weight="bold" fill="#b03a3a">+5</text>
  <text x="654" y="176" text-anchor="middle" font-size="10" fill="#888">每个不同字符</text>

  <!-- ===== Example breakdown "aA1!" ===== -->
  <text x="40" y="216" font-size="13" font-weight="bold" fill="#2b2b2b">示例：password = "aA1!"</text>

  <!-- 4 char boxes width 70 height 64, x=80,200,320,440 ; y=232 -->
  <!-- a : lowercase +1 -->
  <g filter="url(#sk)"><rect x="80" y="232" width="70" height="64" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="115" y="272" text-anchor="middle" font-size="26" font-weight="bold" fill="#2b6e9e">a</text>
  <text x="115" y="290" text-anchor="middle" font-size="10" fill="#446688">小写</text>
  <text x="115" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">+1</text>

  <!-- A : uppercase +2 -->
  <g filter="url(#sk)"><rect x="200" y="232" width="70" height="64" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/></g>
  <text x="235" y="272" text-anchor="middle" font-size="26" font-weight="bold" fill="#2e6e2e">A</text>
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#4a7a3a">大写</text>
  <text x="235" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">+2</text>

  <!-- 1 : digit +3 -->
  <g filter="url(#sk)"><rect x="320" y="232" width="70" height="64" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/></g>
  <text x="355" y="272" text-anchor="middle" font-size="26" font-weight="bold" fill="#7a5415">1</text>
  <text x="355" y="290" text-anchor="middle" font-size="10" fill="#7a5415">数字</text>
  <text x="355" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">+3</text>

  <!-- ! : special +5 -->
  <g filter="url(#sk)"><rect x="440" y="232" width="70" height="64" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="475" y="272" text-anchor="middle" font-size="26" font-weight="bold" fill="#b03a3a">!</text>
  <text x="475" y="290" text-anchor="middle" font-size="10" fill="#b85450">特殊</text>
  <text x="475" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#b03a3a">+5</text>

  <!-- plus signs between -->
  <text x="178" y="276" text-anchor="middle" font-size="18" fill="#888">+</text>
  <text x="298" y="276" text-anchor="middle" font-size="18" fill="#888">+</text>
  <text x="418" y="276" text-anchor="middle" font-size="18" fill="#888">+</text>

  <!-- equals + total -->
  <text x="528" y="276" text-anchor="middle" font-size="20" fill="#888">=</text>
  <g filter="url(#sk)"><rect x="550" y="244" width="120" height="56" rx="10" fill="#fffdf3" stroke="#2b2b2b" stroke-width="1.6"/></g>
  <text x="610" y="282" text-anchor="middle" font-size="28" font-weight="bold" fill="#2b2b2b">11</text>
  <text x="610" y="332" text-anchor="middle" font-size="11" fill="#888">1 + 2 + 3 + 5 = 11</text>

  <!-- ===== Formula box ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="354" width="700" height="58" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="56" y="376" font-size="12" font-weight="bold" fill="#7a5415">强度公式</text>
  <text x="390" y="398" text-anchor="middle" font-size="12" fill="#2b2b2b" font-family="monospace">strength = 1·|distinctLower| + 2·|distinctUpper| + 3·|distinctDigit| + 5·|distinctSpecial|</text>

  <!-- ===== De-dup note ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="424" width="700" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="56" y="446" font-size="12" font-weight="bold" fill="#b03a3a">⚠ 去重是关键</text>
  <text x="180" y="446" font-size="11" fill="#444" font-family="monospace">"bbB11#" → 小写{b}=1，大写{B}=2，数字{1}=3，特殊{#}=5 → 1+2+3+5 = 11（b/1 各重复只算一次）</text>
</svg>
