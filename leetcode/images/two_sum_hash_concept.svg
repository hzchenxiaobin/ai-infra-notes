<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="600" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">核心直觉：遍历时查"补数是否见过"，用哈希表 O(1) 查找</text>

  <!-- Array row -->
  <text x="30" y="70" font-size="12" fill="#888">nums =</text>
  <rect x="80" y="54" width="50" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="105" y="75" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">2</text>
  <text x="105" y="100" text-anchor="middle" font-size="10" fill="#888">i=0</text>
  <rect x="132" y="54" width="50" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="157" y="75" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">7</text>
  <text x="157" y="100" text-anchor="middle" font-size="10" fill="#888">i=1</text>
  <rect x="184" y="54" width="50" height="32" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="209" y="75" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">11</text>
  <text x="209" y="100" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">i=2 ← 当前</text>
  <rect x="236" y="54" width="50" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="261" y="75" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">15</text>
  <text x="261" y="100" text-anchor="middle" font-size="10" fill="#888">i=3</text>

  <!-- target annotation -->
  <rect x="360" y="54" width="120" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="420" y="75" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">target = 9</text>

  <!-- complement arrow -->
  <text x="300" y="130" font-size="12" fill="#444" font-weight="bold">当前 nums[2]=11，需要补数 = 9 − 11 = −2</text>

  <!-- HashMap visualization -->
  <text x="30" y="170" font-size="12" fill="#888">哈希表（已遍历过的元素）：</text>
  <rect x="80" y="180" width="180" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">值</text>
  <text x="220" y="198" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">下标</text>
  <line x1="170" y1="180" x2="170" y2="206" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>

  <rect x="80" y="208" width="180" height="24" fill="#f5f5f5" stroke="#bbb" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="120" y="224" text-anchor="middle" font-size="11" fill="#333">2</text>
  <text x="220" y="224" text-anchor="middle" font-size="11" fill="#333">0</text>
  <rect x="80" y="234" width="180" height="24" fill="#f5f5f5" stroke="#bbb" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="120" y="250" text-anchor="middle" font-size="11" fill="#333">7</text>
  <text x="220" y="250" text-anchor="middle" font-size="11" fill="#333">1</text>

  <!-- query -->
  <text x="300" y="220" font-size="12" fill="#b85450" font-weight="bold">查 −2 在表里？</text>
  <path d="M 300 226 L 265 226" stroke="#b85450" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="300" y="244" font-size="11" fill="#888">→ 不在，说明当前没有配对</text>

  <!-- action -->
  <rect x="80" y="278" width="280" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="220" y="298" text-anchor="middle" font-size="11" fill="#333">把 11 也存入哈希表，继续遍历下一个</text>

  <!-- hit scenario -->
  <line x1="20" y1="324" x2="580" y2="324" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="348" font-size="12" fill="#444" font-weight="bold">命中场景（假设遍历到 nums[1]=7）：</text>
  <text x="30" y="368" font-size="11" fill="#333">需要补数 = 9 − 7 = 2，查哈希表 → 2 在表里，下标=0</text>
  <text x="30" y="386" font-size="11" fill="#4a7a3a" font-weight="bold">→ 命中！返回 [0, 1] ⭐</text>

  <text x="430" y="368" font-size="11" fill="#888">关键：边查边存</text>
  <text x="430" y="386" font-size="11" fill="#888">一次遍历 O(n)</text>
</svg>
