<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="67" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
  </defs>
  <rect width="680" height="440" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">状态扩展 Dijkstra：(node, count) 状态机</text>
  <path d="M 180 42 Q 340 50 500 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- State definition -->
  <g filter="url(#sk)">
    <rect x="40" y="62" width="600" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="60" y="84" font-size="12" font-weight="bold" fill="#2b6e9e">状态 (u, c)：</text>
  <text x="60" y="102" font-size="11" fill="#444">u = 当前节点，c = 路径末尾 labels[u] 的连续出现次数。初始 (0, 1)，答案 = min dist[n-1][*]。</text>

  <!-- State graph: 3 nodes, labels "aab" -->
  <text x="340" y="140" text-anchor="middle" font-size="13" fill="#444">示例图：n=3, labels="aab", k=2</text>

  <!-- Node 0 (a) -->
  <g filter="url(#sk)">
    <ellipse cx="120" cy="200" rx="50" ry="35" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="120" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">0</text>
  <text x="120" y="212" text-anchor="middle" font-size="12" fill="#2e6e2e">'a'</text>

  <!-- Node 1 (a) -->
  <g filter="url(#sk)">
    <ellipse cx="340" cy="200" rx="50" ry="35" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="340" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="340" y="212" text-anchor="middle" font-size="12" fill="#2e6e2e">'a'</text>

  <!-- Node 2 (b) -->
  <g filter="url(#sk)">
    <ellipse cx="560" cy="200" rx="50" ry="35" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="560" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">2</text>
  <text x="560" y="212" text-anchor="middle" font-size="12" fill="#7a5415">'b'</text>

  <!-- Edges -->
  <g filter="url(#sk)">
    <path d="M 170 195 Q 250 175 290 195" stroke="#4a8edb" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  </g>
  <text x="230" y="172" text-anchor="middle" font-size="10" fill="#2b6e9e">w=1</text>

  <g filter="url(#sk)">
    <path d="M 390 195 Q 470 175 510 195" stroke="#4a8edb" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  </g>
  <text x="450" y="172" text-anchor="middle" font-size="10" fill="#2b6e9e">w=1</text>

  <g filter="url(#sk)">
    <path d="M 160 220 Q 340 290 520 220" stroke="#b85450" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arR)"/>
  </g>
  <text x="340" y="295" text-anchor="middle" font-size="10" fill="#b03a3a">w=3 (直达)</text>

  <!-- State transitions -->
  <line x1="30" y1="310" x2="650" y2="310" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>
  <text x="340" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">状态转移规则</text>

  <!-- Transition boxes -->
  <g filter="url(#sk)">
    <rect x="40" y="345" width="290" height="80" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="185" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">标签相同：labels[v] == labels[u]</text>
  <text x="185" y="390" text-anchor="middle" font-size="12" fill="#444" font-family="monospace">c' = c + 1</text>
  <text x="185" y="410" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">若 c' > k → 跳过（违反约束）</text>

  <g filter="url(#sk)">
    <rect x="350" y="345" width="290" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="495" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">标签不同：labels[v] ≠ labels[u]</text>
  <text x="495" y="390" text-anchor="middle" font-size="12" fill="#444" font-family="monospace">c' = 1</text>
  <text x="495" y="410" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">总是有效（重新计数）</text>
</svg>
