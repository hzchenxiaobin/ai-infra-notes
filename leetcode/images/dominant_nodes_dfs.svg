<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="620" height="440" fill="#fdfcf7"/>

  <text x="310" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">支配节点：自底向上 DFS 求子树最大值</text>
  <path d="M 200 36 Q 310 44 420 36" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Tree: root=5, left=3, right=8, 3.left=2, 3.right=4, 8.left=7, 8.right=1 -->
  <!-- edges -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <line x1="200" y1="80" x2="120" y2="140"/>
    <line x1="200" y1="80" x2="280" y2="140"/>
    <line x1="120" y1="140" x2="80" y2="200"/>
    <line x1="120" y1="140" x2="160" y2="200"/>
    <line x1="280" y1="140" x2="240" y2="200"/>
    <line x1="280" y1="140" x2="320" y2="200"/>
  </g>

  <!-- nodes: dominant=green border, non-dominant=red border -->
  <!-- root 5: subtree max=8, 5≠8 → non-dominant -->
  <g filter="url(#sk)">
    <circle cx="200" cy="80" r="20" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
    <text x="200" y="86" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">5</text>
  </g>
  <text x="200" y="50" text-anchor="middle" font-size="9" fill="#b85450">max=8 ✗</text>

  <!-- 3: subtree max=4, 3≠4 → non-dominant -->
  <g filter="url(#sk)">
    <circle cx="120" cy="140" r="20" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
    <text x="120" y="146" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">3</text>
  </g>
  <text x="120" y="178" text-anchor="middle" font-size="9" fill="#b85450">max=4 ✗</text>

  <!-- 8: subtree max=8, 8==8 → dominant -->
  <g filter="url(#sk)">
    <circle cx="280" cy="140" r="20" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
    <text x="280" y="146" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">8</text>
  </g>
  <text x="280" y="178" text-anchor="middle" font-size="9" fill="#2e6e2e">max=8 ✓</text>

  <!-- leaves: all dominant -->
  <g filter="url(#sk)">
    <circle cx="80" cy="200" r="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
    <text x="80" y="206" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">2</text>
  </g>
  <text x="80" y="234" text-anchor="middle" font-size="9" fill="#2e6e2e">✓</text>

  <g filter="url(#sk)">
    <circle cx="160" cy="200" r="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
    <text x="160" y="206" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">4</text>
  </g>
  <text x="160" y="234" text-anchor="middle" font-size="9" fill="#2e6e2e">✓</text>

  <g filter="url(#sk)">
    <circle cx="240" cy="200" r="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
    <text x="240" y="206" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">7</text>
  </g>
  <text x="240" y="234" text-anchor="middle" font-size="9" fill="#2e6e2e">✓</text>

  <g filter="url(#sk)">
    <circle cx="320" cy="200" r="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
    <text x="320" y="206" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">1</text>
  </g>
  <text x="320" y="234" text-anchor="middle" font-size="9" fill="#2e6e2e">✓</text>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <circle cx="395" cy="90" r="12" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2" filter="url(#sk)"/>
    <text x="415" y="95">支配节点 (val == 子树max)</text>
    <circle cx="395" cy="120" r="12" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#sk)"/>
    <text x="415" y="125">非支配节点 (val < 子树max)</text>
  </g>

  <!-- DFS flow box -->
  <g filter="url(#sk)">
    <rect x="370" y="150" width="240" height="160" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="490" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">DFS 递归流程</text>
  <g font-size="10" fill="#444">
    <text x="380" y="192">dfs(node) 返回子树最大值：</text>
    <text x="390" y="210">1. 叶节点：返回 node.val</text>
    <text x="390" y="228">2. 内部：L = dfs(left)</text>
    <text x="390" y="244">         R = dfs(right)</text>
    <text x="390" y="260">         mx = max(node.val, L, R)</text>
    <text x="390" y="276" fill="#2e6e2e" font-weight="bold">         if node.val == mx: cnt++</text>
    <text x="390" y="294" fill="#2b6e9e">         return mx</text>
  </g>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="370" y="330" width="240" height="60" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="490" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">示例 1 结果</text>
  <text x="490" y="372" text-anchor="middle" font-size="11" fill="#444">支配节点 = 2,4,7,1,8 → cnt = 5</text>

  <!-- bottom note -->
  <text x="40" y="400" font-size="10" fill="#888" filter="url(#sk)">注：完全二叉树 → 用数组索引 (2i+1, 2i+2) 或 TreeNode 指针均可遍历</text>
</svg>
