<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">N 皇后：逐行回溯流程</text>

  <!-- 入口 -->
  <rect x="200" y="50" width="180" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" fill="#333">backtrack(row)</text>

  <path d="M 290 84 L 290 100" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 终止 -->
  <polygon points="290,102 400,138 290,174 180,138" fill="#fff8e1" stroke="#d6a040" stroke-width="1.7" filter="url(#rough2)"/>
  <text x="290" y="134" text-anchor="middle" font-size="12" fill="#333">row == n ?</text>
  <text x="290" y="152" text-anchor="middle" font-size="10" fill="#888">放满 n 行</text>

  <path d="M 290 174 L 290 194" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="188" font-size="10" fill="#82b366">是</text>
  <rect x="210" y="198" width="160" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="218" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">ans.add(方案) 返回</text>

  <!-- 否 -->
  <path d="M 400 138 L 460 138 L 460 232" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="422" y="130" font-size="10" fill="#b85450">否</text>

  <rect x="390" y="236" width="150" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="465" y="256" text-anchor="middle" font-size="11" fill="#333">for col = 0 .. n-1</text>

  <path d="M 465 266 L 465 282" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 冲突检查 -->
  <polygon points="465,284 560,310 465,336 370,310" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="465" y="307" text-anchor="middle" font-size="9" fill="#333">col/diag1/diag2</text>
  <text x="465" y="322" text-anchor="middle" font-size="9" fill="#333">冲突？</text>

  <path d="M 370 310 L 330 310 L 330 286" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="345" y="302" font-size="10" fill="#82b366">否</text>

  <!-- 放置 -->
  <rect x="220" y="290" width="220" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="330" y="310" text-anchor="middle" font-size="10" fill="#333">放 Q；cols/diag1/diag2 加入</text>

  <path d="M 330 322 L 330 338" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="220" y="342" width="220" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="330" y="362" text-anchor="middle" font-size="10" fill="#333">backtrack(row+1)</text>

  <text x="120" y="356" font-size="11" fill="#888">回溯：移除 Q，三集合移除当前</text>

  <text x="290" y="388" text-anchor="middle" font-size="11" fill="#888">每行一个皇后 → 行约束隐式满足；三集合压冲突判定到 O(1)</text>
</svg>
