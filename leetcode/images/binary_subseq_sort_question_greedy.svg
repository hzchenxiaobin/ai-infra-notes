<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
  </defs>
  <rect width="940" height="600" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">'?' 填充：右取 1 贪心 → 前缀 1 计数点数最小</text>
  <path d="M 230 42 Q 470 50 710 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Panel A: setup ===== -->
  <text x="470" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 例：s="1100"（Os=2），t="1?1?"，需补 K = Os − 固定1数 个 1</text>

  <!-- s row -->
  <text x="70" y="108" font-size="11" fill="#888" font-weight="bold">s:</text>
  <g font-size="15" font-weight="bold" font-family="monospace">
    <g filter="url(#sk)"><rect x="100" y="92" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="119" y="114" text-anchor="middle" fill="#7a2828">1</text>
    <g filter="url(#sk)"><rect x="140" y="92" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="159" y="114" text-anchor="middle" fill="#7a2828">1</text>
    <g filter="url(#sk)"><rect x="180" y="92" width="38" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="199" y="114" text-anchor="middle" fill="#2e6e2e">0</text>
    <g filter="url(#sk)"><rect x="220" y="92" width="38" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
    <text x="239" y="114" text-anchor="middle" fill="#2e6e2e">0</text>
  </g>
  <text x="270" y="114" font-size="11" fill="#b85450" font-weight="bold">ps = [1,2,2,2]</text>

  <!-- t row with ? -->
  <text x="70" y="156" font-size="11" fill="#888" font-weight="bold">t:</text>
  <g font-size="15" font-weight="bold" font-family="monospace">
    <g filter="url(#sk)"><rect x="100" y="140" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="119" y="162" text-anchor="middle" fill="#7a2828">1</text>
    <g filter="url(#sk)"><rect x="140" y="140" width="38" height="32" rx="4" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.6"/></g>
    <text x="159" y="162" text-anchor="middle" fill="#7a5415">?</text>
    <g filter="url(#sk)"><rect x="180" y="140" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="199" y="162" text-anchor="middle" fill="#7a2828">1</text>
    <g filter="url(#sk)"><rect x="220" y="140" width="38" height="32" rx="4" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.6"/></g>
    <text x="239" y="162" text-anchor="middle" fill="#7a5415">?</text>
  </g>
  <text x="270" y="162" font-size="11" fill="#444">固定1数 a=2，'?'数 B=2</text>
  <text x="270" y="178" font-size="11" fill="#c98a2b" font-weight="bold">K = Os − a = 2 − 2 = 0（需补 0 个 1）</text>

  <!-- ===== Panel B: greedy assignment ===== -->
  <text x="470" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a">② 贪心：把 '?' 中 1 配额 K 全给最右 K 个 → 前缀 1 计数最小</text>

  <!-- assignment: K=0 -> all ? become 0 -->
  <text x="70" y="240" font-size="11" fill="#888" font-weight="bold">填后:</text>
  <g font-size="15" font-weight="bold" font-family="monospace">
    <g filter="url(#sk)"><rect x="100" y="224" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="119" y="246" text-anchor="middle" fill="#7a2828">1</text>
    <!-- leftmost B-K = 2 ? assigned 0 -->
    <g filter="url(#sk)"><rect x="140" y="224" width="38" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/></g>
    <text x="159" y="246" text-anchor="middle" fill="#2e6e2e">0</text>
    <g filter="url(#sk)"><rect x="180" y="224" width="38" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/></g>
    <text x="199" y="246" text-anchor="middle" fill="#7a2828">1</text>
    <g filter="url(#sk)"><rect x="220" y="224" width="38" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/></g>
    <text x="239" y="246" text-anchor="middle" fill="#2e6e2e">0</text>
  </g>
  <text x="270" y="246" font-size="11" fill="#2e6e2e" font-weight="bold">t = "1010"</text>

  <!-- arrows showing leftmost ? -> 0 -->
  <text x="159" y="272" text-anchor="middle" font-size="9" fill="#c98a2b">左 B−K 个 ? → 0</text>
  <text x="239" y="272" text-anchor="middle" font-size="9" fill="#c98a2b">→ 0</text>

  <!-- ===== Panel C: prefix count comparison ===== -->
  <text x="470" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">③ 检查：填后 pt[i] ≤ ps[i] 逐位成立？</text>

  <!-- table -->
  <g font-size="11" font-weight="bold">
    <g filter="url(#sk)"><rect x="80" y="318" width="60" height="24" rx="3" fill="#eef2f7" stroke="#bbb"/></g>
    <text x="110" y="334" text-anchor="middle">i</text>
    <g filter="url(#sk)"><rect x="140" y="318" width="100" height="24" rx="3" fill="#eef2f7" stroke="#bbb"/></g>
    <text x="190" y="334" text-anchor="middle" fill="#b85450">ps[i] (s)</text>
    <g filter="url(#sk)"><rect x="240" y="318" width="120" height="24" rx="3" fill="#eef2f7" stroke="#bbb"/></g>
    <text x="300" y="334" text-anchor="middle" fill="#2e6e2e">pt[i] (填后)</text>
    <g filter="url(#sk)"><rect x="360" y="318" width="80" height="24" rx="3" fill="#eef2f7" stroke="#bbb"/></g>
    <text x="400" y="334" text-anchor="middle">pt≤ps?</text>
  </g>
  <g font-size="11" font-family="monospace">
    <text x="110" y="358" text-anchor="middle">0</text>
    <text x="190" y="358" text-anchor="middle" fill="#b85450">1</text>
    <text x="300" y="358" text-anchor="middle" fill="#2e6e2e">1</text>
    <text x="400" y="358" text-anchor="middle" fill="#2e6e2e">✓</text>

    <text x="110" y="378" text-anchor="middle">1</text>
    <text x="190" y="378" text-anchor="middle" fill="#b85450">2</text>
    <text x="300" y="378" text-anchor="middle" fill="#2e6e2e">1</text>
    <text x="400" y="378" text-anchor="middle" fill="#2e6e2e">✓</text>

    <text x="110" y="398" text-anchor="middle">2</text>
    <text x="190" y="398" text-anchor="middle" fill="#b85450">2</text>
    <text x="300" y="398" text-anchor="middle" fill="#2e6e2e">2</text>
    <text x="400" y="398" text-anchor="middle" fill="#2e6e2e">✓</text>

    <text x="110" y="418" text-anchor="middle">3</text>
    <text x="190" y="418" text-anchor="middle" fill="#b85450">2</text>
    <text x="300" y="418" text-anchor="middle" fill="#2e6e2e">2</text>
    <text x="400" y="418" text-anchor="middle" fill="#2e6e2e">✓</text>
  </g>
  <g stroke="#e0e0e0" stroke-width="1">
    <line x1="80" y1="366" x2="440" y2="366" filter="url(#sk)"/>
    <line x1="80" y1="386" x2="440" y2="386" filter="url(#sk)"/>
    <line x1="80" y1="406" x2="440" y2="406" filter="url(#sk)"/>
  </g>
  <text x="260" y="440" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">全部 ✓ → true（与示例 2 的 "1?1?" 一致）</text>

  <!-- ===== Panel D: why rightmost is optimal ===== -->
  <g filter="url(#sk)">
    <rect x="500" y="318" width="380" height="190" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3"/>
  </g>
  <text x="520" y="344" font-size="13" font-weight="bold" fill="#2b2b2b">为什么「右取 1」最优？</text>
  <text x="520" y="368" font-size="11" fill="#444">约束只有上界 pt[i] ≤ ps[i]。</text>
  <text x="520" y="388" font-size="11" fill="#444">把配额 K 个 1 尽量往右放 →</text>
  <text x="520" y="408" font-size="11" fill="#444">每个前缀里被计入的 1 数</text>
  <text x="520" y="428" font-size="11" fill="#2e6e2e" font-weight="bold">点数最小（逐点）。</text>
  <text x="520" y="452" font-size="11" fill="#444">若此最小分配仍越界 →</text>
  <text x="520" y="472" font-size="11" fill="#b85450" font-weight="bold">任何分配都越界 → false。</text>
  <text x="520" y="496" font-size="10" fill="#888">即：右取 1 是「最宽松」的填法。</text>

  <!-- ===== Panel E: decision procedure summary ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="520" width="820" height="68" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="80" y="546" font-size="12" font-weight="bold" fill="#2b6e9e">判定流程（每个 strs[i]，O(n)）：</text>
  <text x="80" y="566" font-size="11" fill="#444" font-family="monospace">① 数固定 1 数 a、'?' 数 B；② K = Os − a，若 K&lt;0 或 K&gt;B → false；③ 左 B−K 个 ? 填 0、其余填 1，扫一遍验 pt[i] ≤ ps[i]。</text>
  <text x="80" y="582" font-size="11" fill="#666">总复杂度 O(n + |strs|·n)，n,|strs| ≤ 2000 → ≈ 4×10⁶ 可接受。</text>
</svg>
