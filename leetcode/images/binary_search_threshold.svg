<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <rect width="720" height="420" fill="#f6f8fa"/>
  <text x="360" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#24292f">二分第 m 大收益 T*</text>
  
  <!-- Axes -->
  <line x1="80" y1="360" x2="640" y2="360" stroke="#24292f" stroke-width="2"/>
  <line x1="80" y1="360" x2="80" y2="60" stroke="#24292f" stroke-width="2"/>
  
  <!-- Axis labels -->
  <text x="360" y="395" text-anchor="middle" font-size="14" fill="#24292f">阈值 T</text>
  <text x="45" y="210" text-anchor="middle" font-size="14" fill="#24292f" transform="rotate(-90 45 210)">g(T) = 收益 ≥ T 的项数</text>
  
  <!-- Ticks on x-axis -->
  <line x1="80" y1="360" x2="80" y2="368" stroke="#24292f" stroke-width="2"/>
  <text x="80" y="385" text-anchor="middle" font-size="12" fill="#57606a">0</text>
  
  <line x1="260" y1="360" x2="260" y2="368" stroke="#24292f" stroke-width="2"/>
  <text x="260" y="385" text-anchor="middle" font-size="12" fill="#57606a">T*</text>
  
  <line x1="440" y1="360" x2="440" y2="368" stroke="#24292f" stroke-width="2"/>
  <text x="440" y="385" text-anchor="middle" font-size="12" fill="#57606a">T*+1</text>
  
  <line x1="620" y1="360" x2="620" y2="368" stroke="#24292f" stroke-width="2"/>
  <text x="620" y="385" text-anchor="middle" font-size="12" fill="#57606a">max(value)</text>
  
  <!-- Ticks on y-axis -->
  <line x1="72" y1="200" x2="80" y2="200" stroke="#24292f" stroke-width="2"/>
  <text x="65" y="205" text-anchor="end" font-size="12" fill="#57606a">m</text>
  
  <line x1="72" y1="100" x2="80" y2="100" stroke="#24292f" stroke-width="2"/>
  <text x="65" y="105" text-anchor="end" font-size="12" fill="#57606a">total_count</text>
  
  <!-- Decreasing curve -->
  <path d="M 80,100 Q 200,130 260,200 T 440,330 T 620,355" fill="none" stroke="#0969da" stroke-width="3"/>
  
  <!-- Horizontal m line -->
  <line x1="80" y1="200" x2="640" y2="200" stroke="#cf222e" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- Vertical lines at T* and T*+1 -->
  <line x1="260" y1="200" x2="260" y2="360" stroke="#1f883d" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="440" y1="200" x2="440" y2="360" stroke="#d29922" stroke-width="2" stroke-dasharray="6,3"/>
  
  <!-- Dots at intersections -->
  <circle cx="260" cy="200" r="5" fill="#1f883d"/>
  <circle cx="440" cy="330" r="5" fill="#d29922"/>
  
  <!-- Annotations -->
  <text x="290" y="170" font-size="13" fill="#1f883d" font-weight="bold">g(T*) ≥ m</text>
  <text x="460" y="300" font-size="13" fill="#d29922" font-weight="bold">g(T*+1) &lt; m</text>
  
  <!-- Explanation box -->
  <rect x="120" y="60" width="480" height="55" rx="8" fill="#fff8c5" stroke="#d29922" stroke-width="1.5"/>
  <text x="360" y="82" text-anchor="middle" font-size="13" fill="#24292f">T* 是满足 g(T*) ≥ m 的最大阈值</text>
  <text x="360" y="103" text-anchor="middle" font-size="13" fill="#24292f">说明第 m 大收益恰好等于 T*</text>
</svg>