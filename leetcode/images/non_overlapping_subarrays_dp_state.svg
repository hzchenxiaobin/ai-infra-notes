<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="560" height="400" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">dp[t][i] 状态定义</text>
  <rect x="80" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="110" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">4</text>
  <text x="110" y="130" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">0</text>
  <rect x="150" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="180" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">1</text>
  <text x="180" y="130" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">1</text>
  <rect x="220" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="250" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">-5</text>
  <text x="250" y="130" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">2</text>
  <rect x="290" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="320" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">2</text>
  <text x="320" y="130" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">3</text>
  <rect x="80" y="70" width="130" height="40" rx="4" fill="none" stroke="#b85450" stroke-width="2.5" filter="url(#rough2)"/>
  <rect x="290" y="70" width="60" height="40" rx="4" fill="none" stroke="#b85450" stroke-width="2.5" filter="url(#rough2)"/>
  <text x="280" y="180" text-anchor="middle" font-size="14" fill="#555" filter="url(#rough2)">前 i 个元素中恰好选 t 个满足条件的子数组</text>
  <text x="280" y="210" text-anchor="middle" font-size="14" fill="#555" filter="url(#rough2)">红色框表示一个以 i-1 结尾的子数组，左侧为 dp[t-1][j]</text>
  <text x="280" y="250" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">dp[t][i] = max(dp[t][i-1], prefix[i] + max_{j∈[i-r,i-l]}(dp[t-1][j]-prefix[j]))</text>
  <rect x="40" y="270" width="480" height="50" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="300" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">要么不选 i-1，要么选一个以 i-1 结尾、长度在 [l,r] 的子数组</text>

</svg>