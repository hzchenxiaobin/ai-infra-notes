<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="73" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">贪心策略：选最大 k 个，大配大乘</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1: sort and select -->
  <g filter="url(#sk)">
    <rect x="40" y="62" width="280" height="100" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="180" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 选最大的 k 个</text>
  <g font-size="11">
    <text x="60" y="108" fill="#888">nums:</text>
    <g filter="url(#sk)"><rect x="100" y="94" width="36" height="22" fill="#f0f0f0" stroke="#ccc" rx="3"/></g>
    <text x="118" y="109" text-anchor="middle" fill="#888">6</text>
    <g filter="url(#sk)"><rect x="136" y="94" width="36" height="22" fill="#f0f0f0" stroke="#ccc" rx="3"/></g>
    <text x="154" y="109" text-anchor="middle" fill="#888">1</text>
    <g filter="url(#sk)"><rect x="172" y="94" width="36" height="22" fill="#f0f0f0" stroke="#ccc" rx="3"/></g>
    <text x="190" y="109" text-anchor="middle" fill="#888">2</text>
    <g filter="url(#sk)"><rect x="208" y="94" width="36" height="22" fill="#f0f0f0" stroke="#ccc" rx="3"/></g>
    <text x="226" y="109" text-anchor="middle" fill="#888">9</text>
    <text x="60" y="134" fill="#888">排序↓:</text>
    <g filter="url(#sk)"><rect x="100" y="120" width="36" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="3"/></g>
    <text x="118" y="135" text-anchor="middle" fill="#2e6e2e" font-weight="bold">9</text>
    <g filter="url(#sk)"><rect x="136" y="120" width="36" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="3"/></g>
    <text x="154" y="135" text-anchor="middle" fill="#2e6e2e" font-weight="bold">6</text>
    <g filter="url(#sk)"><rect x="172" y="120" width="36" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="3"/></g>
    <text x="190" y="135" text-anchor="middle" fill="#2e6e2e" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="208" y="120" width="36" height="22" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.5" rx="3"/></g>
    <text x="226" y="135" text-anchor="middle" fill="#ccc">1</text>
    <text x="250" y="135" font-size="10" fill="#888">← 取前k=3</text>
  </g>

  <!-- Step 2: assign multipliers -->
  <g filter="url(#sk)">
    <rect x="360" y="62" width="280" height="100" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="500" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">② 大配大乘数（排序不等式）</text>
  <g font-size="11">
    <text x="380" y="110" fill="#444">mul=2, 乘数序列: 2, 1, 0, ...</text>
    <text x="380" y="128" fill="#b03a3a" font-weight="bold">乘数 ≥ 2 才用乘法 → t=min(k, mul-1)=1</text>
    <text x="380" y="146" fill="#444">9 × 2 = 18 (乘法)</text>
    <text x="380" y="160" fill="#444">6 + 2 = 8 (加法)</text>
  </g>

  <!-- Pairing visualization -->
  <line x1="30" y1="180" x2="650" y2="180" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>
  <text x="340" y="202" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">配对示意</text>

  <!-- Elements row -->
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="80" y="215" width="60" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="4"/></g>
    <text x="110" y="235" text-anchor="middle" fill="#2e6e2e">9</text>
    <text x="110" y="258" text-anchor="middle" font-size="9" fill="#888">最大</text>
    <g filter="url(#sk)"><rect x="180" y="215" width="60" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="210" y="235" text-anchor="middle" fill="#2b6e9e">6</text>
    <text x="210" y="258" text-anchor="middle" font-size="9" fill="#888">次大</text>
    <g filter="url(#sk)"><rect x="280" y="215" width="60" height="30" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="4"/></g>
    <text x="310" y="235" text-anchor="middle" fill="#7a5415">2</text>
    <text x="310" y="258" text-anchor="middle" font-size="9" fill="#888">第三</text>
  </g>

  <!-- Multipliers row -->
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="80" y="275" width="60" height="28" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="4"/></g>
    <text x="110" y="294" text-anchor="middle" fill="#2e6e2e">×2</text>
    <g filter="url(#sk)"><rect x="180" y="275" width="60" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="4"/></g>
    <text x="210" y="294" text-anchor="middle" fill="#7a5415">+1</text>
    <g filter="url(#sk)"><rect x="280" y="275" width="60" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="4"/></g>
    <text x="310" y="294" text-anchor="middle" fill="#7a5415">+1</text>
  </g>

  <!-- Contribution -->
  <g font-size="12">
    <text x="110" y="320" text-anchor="middle" fill="#2e6e2e" font-weight="bold">= 18</text>
    <text x="210" y="320" text-anchor="middle" fill="#7a5415">= 6</text>
    <text x="310" y="320" text-anchor="middle" fill="#7a5415">= 2</text>
  </g>

  <!-- Total -->
  <g filter="url(#sk)">
    <rect x="400" y="275" width="240" height="60" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="520" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">总和</text>
  <text x="520" y="322" text-anchor="middle" font-size="16" fill="#2e6e2e" font-weight="bold">18 + 6 + 2 = 26</text>

  <!-- Key insight -->
  <g filter="url(#sk)">
    <rect x="40" y="345" width="600" height="45" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="367" font-size="12" font-weight="bold" fill="#2b2b2b">关键：</text>
  <text x="60" y="383" font-size="11" fill="#444">mul≥2 时乘法不劣于加法。乘数递减，由排序不等式大配大。t = min(k, mul−1) 个乘法。</text>
</svg>
