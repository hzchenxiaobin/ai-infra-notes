<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">最大深度 = max(左子树深度, 右子树深度) + 1</text>

  <!-- 树 标注深度 -->
  <circle cx="240" cy="70" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="240" y="74" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="270" y="74" font-size="11" fill="#b85450" font-weight="bold">depth=3</text>

  <circle cx="190" cy="130" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="190" y="134" text-anchor="middle" font-size="12" fill="#333">9</text>
  <text x="210" y="134" font-size="10" fill="#888">d=1</text>
  <line x1="228" y1="82" x2="198" y2="118" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>

  <circle cx="300" cy="130" r="15" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="300" y="134" text-anchor="middle" font-size="12" fill="#333">20</text>
  <text x="324" y="134" font-size="10" fill="#888">d=2</text>
  <line x1="252" y1="82" x2="290" y2="118" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>

  <circle cx="265" cy="195" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="265" y="199" text-anchor="middle" font-size="11" fill="#333">15</text>
  <text x="285" y="199" font-size="9" fill="#888">d=1</text>
  <line x1="290" y1="142" x2="272" y2="183" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <circle cx="340" cy="195" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="340" y="199" text-anchor="middle" font-size="11" fill="#333">7</text>
  <text x="358" y="199" font-size="9" fill="#888">d=1</text>
  <line x1="310" y1="142" x2="332" y2="183" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <!-- 最长路径高亮 -->
  <path d="M 240 86 L 300 118 L 300 145" stroke="#b85450" stroke-width="2.5" fill="none" filter="url(#rough2)"/>
  <path d="M 300 145 L 265 183" stroke="#b85450" stroke-width="2.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="380" y="160" font-size="11" fill="#b85450" font-weight="bold">最长路径</text>
  <text x="380" y="176" font-size="10" fill="#b85450">3→20→15（3 个节点）</text>

  <!-- 递归公式 -->
  <rect x="40" y="250" width="500" height="110" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="60" y="274" font-size="12" fill="#333" font-weight="bold">后序递归（自底向上汇总）：</text>
  <text x="60" y="298" font-size="12" fill="#555" font-family="monospace">depth(root) = max(depth(left), depth(right)) + 1</text>
  <text x="60" y="320" font-size="11" fill="#888">• depth(15) = depth(7) = 1（叶子）</text>
  <text x="60" y="338" font-size="11" fill="#888">• depth(20) = max(1,1)+1 = 2 ；depth(9) = 1</text>
  <text x="60" y="356" font-size="11" fill="#888">• depth(3) = max(1, 2)+1 = 3 ⭐</text>
</svg>
