<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="600" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">示例演算：nums = [1, 2, 3, 2, 1, 5, 6]</text>
  <path d="M 280 42 Q 460 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Array + prefix sum ===== -->
  <text x="460" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">数组、索引与前缀和</text>
  <!-- header -->
  <g font-size="9" fill="#888">
    <text x="100" y="92" text-anchor="middle">idx</text>
    <text x="100" y="112" text-anchor="middle">val</text>
    <text x="100" y="132" text-anchor="middle">pref</text>
  </g>
  <!-- 7 cells: idx 0..6, val 1,2,3,2,1,5,6, pref 0,1,3,6,8,9,14,20 -->
  <g font-size="10" fill="#2b2b2b">
    <!-- idx row -->
    <g filter="url(#sk)"><rect x="130" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="160" y="95" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="195" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="225" y="95" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="260" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="290" y="95" text-anchor="middle">2</text>
    <g filter="url(#sk)"><rect x="325" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="355" y="95" text-anchor="middle">3</text>
    <g filter="url(#sk)"><rect x="390" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="420" y="95" text-anchor="middle">4</text>
    <g filter="url(#sk)"><rect x="455" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="485" y="95" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="520" y="80" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="550" y="95" text-anchor="middle">6</text>
    <!-- val row -->
    <g filter="url(#sk)"><rect x="130" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="160" y="119" text-anchor="middle" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="195" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="225" y="119" text-anchor="middle" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="260" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="290" y="119" text-anchor="middle" font-weight="bold">3</text>
    <g filter="url(#sk)"><rect x="325" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="355" y="119" text-anchor="middle" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="390" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="420" y="119" text-anchor="middle" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="455" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="485" y="119" text-anchor="middle" font-weight="bold">5</text>
    <g filter="url(#sk)"><rect x="520" y="104" width="60" height="22" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g><text x="550" y="119" text-anchor="middle" font-weight="bold">6</text>
    <!-- pref row (pref[0]=0 ... pref[7]=20) -->
    <g filter="url(#sk)"><rect x="75" y="128" width="50" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="100" y="143" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="130" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="160" y="143" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="195" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="225" y="143" text-anchor="middle">3</text>
    <g filter="url(#sk)"><rect x="260" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="290" y="143" text-anchor="middle">6</text>
    <g filter="url(#sk)"><rect x="325" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="355" y="143" text-anchor="middle">8</text>
    <g filter="url(#sk)"><rect x="390" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="420" y="143" text-anchor="middle">9</text>
    <g filter="url(#sk)"><rect x="455" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="485" y="143" text-anchor="middle">14</text>
    <g filter="url(#sk)"><rect x="520" y="128" width="60" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="550" y="143" text-anchor="middle">20</text>
  </g>

  <!-- ===== d1 table ===== -->
  <text x="160" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a8edb">d1[i]（奇数半径）</text>
  <g font-size="10" fill="#2b2b2b">
    <g filter="url(#sk)"><rect x="130" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="160" y="202" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="195" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="225" y="202" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="260" y="186" width="60" height="24" fill="#4a8edb" opacity="0.5" stroke="#2b6e9e" stroke-width="1.4"/></g><text x="290" y="202" text-anchor="middle" font-weight="bold">3</text>
    <g filter="url(#sk)"><rect x="325" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="355" y="202" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="390" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="420" y="202" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="455" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="485" y="202" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="520" y="186" width="60" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="550" y="202" text-anchor="middle">1</text>
  </g>
  <text x="610" y="202" font-size="10" fill="#2b6e9e" font-weight="bold">← i=2: d1=3</text>
  <text x="610" y="216" font-size="9" fill="#888">回文 [0,4] = [1,2,3,2,1]</text>

  <!-- ===== d2 table ===== -->
  <text x="160" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#c98a2b">d2[i]（偶数半径）</text>
  <g font-size="10" fill="#2b2b2b">
    <g filter="url(#sk)"><rect x="130" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="160" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="195" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="225" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="260" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="290" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="325" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="355" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="390" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="420" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="455" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="485" y="264" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="520" y="248" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="550" y="264" text-anchor="middle">0</text>
  </g>
  <text x="610" y="264" font-size="10" fill="#888">无偶数长度回文</text>

  <!-- ===== Answer box ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="296" width="800" height="140" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="80" y="320" font-size="13" font-weight="bold" fill="#b03a3a">最优解：中心 i=2，d1[2]=3，奇数回文 [0, 4] = [1, 2, 3, 2, 1]</text>
  <text x="80" y="346" font-size="12" fill="#444" font-family="monospace">回文范围 [i-d1[i]+1, i+d1[i]-1] = [2-3+1, 2+3-1] = [0, 4]</text>
  <text x="80" y="370" font-size="12" fill="#444" font-family="monospace">sum = pref[i+d1[i]] - pref[i-d1[i]+1]</text>
  <text x="80" y="390" font-size="12" fill="#444" font-family="monospace">     = pref[5] - pref[0]</text>
  <text x="80" y="410" font-size="14" fill="#b03a3a" font-weight="bold" font-family="monospace">     = 9 - 0 = 9 ✓</text>
  <text x="80" y="430" font-size="10" fill="#888">验证：1 + 2 + 3 + 2 + 1 = 9 ✓</text>

  <!-- ===== Other centers ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="452" width="800" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="476" font-size="12" font-weight="bold" fill="#2b2b2b">其他中心的最大和（均更小）：</text>
  <text x="80" y="498" font-size="11" fill="#444" font-family="monospace">i=0: d1=1, [0,0], sum=pref[1]-pref[0]=1-0=1</text>
  <text x="80" y="516" font-size="11" fill="#444" font-family="monospace">i=1: d1=1, [1,1], sum=pref[2]-pref[1]=3-1=2</text>
  <text x="80" y="534" font-size="11" fill="#444" font-family="monospace">i=3: d1=1, [3,3], sum=pref[4]-pref[3]=8-6=2</text>
  <text x="80" y="552" font-size="11" fill="#444" font-family="monospace">i=5: d1=1, [5,5], sum=pref[6]-pref[5]=14-9=5  ← 单元素最大</text>
  <text x="80" y="568" font-size="11" fill="#b03a3a" font-weight="bold">ans = max(9, 1, 2, 2, 1, 5, 6) = 9</text>
</svg>
