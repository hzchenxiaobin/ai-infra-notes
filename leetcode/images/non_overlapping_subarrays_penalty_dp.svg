<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="560" height="360" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">带惩罚的 DP：skip 或 take 一个以 i-1 结尾的子数组</text>
  <rect x="80" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="110" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">4</text>
  <text x="110" y="125" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">0</text>
  <rect x="150" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="180" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">1</text>
  <text x="180" y="125" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">1</text>
  <rect x="220" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="250" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">-5</text>
  <text x="250" y="125" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">2</text>
  <rect x="290" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="320" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">2</text>
  <text x="320" y="125" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">3</text>
  <rect x="60" y="170" width="190" height="90" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="155" y="200" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">选项 A：skip i-1</text>
  <text x="155" y="225" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">价值 = dp[i-1]</text>
  <text x="155" y="248" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">数量 = cnt[i-1]</text>
  <rect x="310" y="170" width="210" height="120" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="415" y="200" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">选项 B：take 子数组 [j+1..i-1]</text>
  <text x="415" y="225" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">价值 = prefix[i] + eff(j) - lambda</text>
  <text x="415" y="248" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">eff(j) = max(dp[j]-prefix[j], -prefix[j])</text>
  <text x="415" y="275" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">（继承或从这里新开一个子数组）</text>
  <path d="M155,260 L155,310 L380,310 L380,290" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="280" y="330" text-anchor="middle" font-size="13" fill="#555" filter="url(#rough2)">取两种选项中价值更大者；价值相同则取数量更多者</text>

</svg>