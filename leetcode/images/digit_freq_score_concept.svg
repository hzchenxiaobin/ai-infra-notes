<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough2" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="280" fill="#fafafa"/>

  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b" filter="url(#rough2)">数字频率得分 = 频率统计 + 加权求和（示例 n = 122）</text>

  <!-- ① 数位分解 -->
  <text x="161" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#446688" filter="url(#rough2)">① 数位分解：n = 122</text>
  <rect x="70" y="104" width="54" height="54" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <rect x="134" y="104" width="54" height="54" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <rect x="198" y="104" width="54" height="54" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="97" y="141" text-anchor="middle" font-size="24" fill="#2b2b2b" filter="url(#rough2)">1</text>
  <text x="161" y="141" text-anchor="middle" font-size="24" fill="#2b2b2b" filter="url(#rough2)">2</text>
  <text x="225" y="141" text-anchor="middle" font-size="24" fill="#2b2b2b" filter="url(#rough2)">2</text>
  <text x="161" y="178" text-anchor="middle" font-size="11" fill="#888" filter="url(#rough2)">n % 10 取末位，n / 10 右移</text>

  <!-- 箭头 1 -->
  <path d="M 268 131 Q 302 125 336 131" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ② 频率统计表 -->
  <text x="470" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7a3a" filter="url(#rough2)">② 频率统计 cnt[d]</text>
  <rect x="375" y="104" width="95" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <rect x="470" y="104" width="95" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="422" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e5a2e" filter="url(#rough2)">d</text>
  <text x="517" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e5a2e" filter="url(#rough2)">cnt[d]</text>
  <rect x="375" y="138" width="95" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
  <rect x="470" y="138" width="95" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="422" y="160" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">1</text>
  <text x="517" y="160" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">1</text>
  <rect x="375" y="172" width="95" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
  <rect x="470" y="172" width="95" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="422" y="194" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">2</text>
  <text x="517" y="194" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">2</text>
  <text x="470" y="228" text-anchor="middle" font-size="11" fill="#888" filter="url(#rough2)">其余 d 的 cnt[d] = 0</text>

  <!-- 箭头 2 -->
  <path d="M 581 155 Q 617 149 653 155" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ③ 加权求和 -->
  <text x="765" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#a5761f" filter="url(#rough2)">③ 加权求和</text>
  <rect x="672" y="104" width="186" height="100" rx="10" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="765" y="132" text-anchor="middle" font-size="12" fill="#777" filter="url(#rough2)">得分 = Σ d · cnt[d]</text>
  <text x="765" y="170" text-anchor="middle" font-size="21" font-weight="bold" fill="#7a5415" filter="url(#rough2)">1×1 + 2×2 = 5</text>

  <!-- 底部上界观察 -->
  <text x="450" y="256" text-anchor="middle" font-size="12" fill="#666" filter="url(#rough2)">上界观察：答案 ≤ 9 × 10 位 = 90，int 绝不溢出</text>
</svg>
