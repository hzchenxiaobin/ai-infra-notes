<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="560" height="420" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">WQS 二分：用惩罚 lambda 控制子数组数量</text>
  <line x1="60" y1="340" x2="500" y2="340" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <line x1="60" y1="340" x2="60" y2="50" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="520" y="345" font-size="13" fill="#333" filter="url(#rough2)">t（子数组个数）</text>
  <text x="45" y="45" font-size="13" fill="#333" filter="url(#rough2)">best[t]</text>
  <circle cx="80" cy="120" r="5" fill="#446688" filter="url(#rough2)"/>
  <text x="80" y="108" text-anchor="middle" font-size="11" fill="#333" filter="url(#rough2)">t=1</text>
  <circle cx="180" cy="200" r="5" fill="#446688" filter="url(#rough2)"/>
  <text x="180" y="188" text-anchor="middle" font-size="11" fill="#333" filter="url(#rough2)">t=2</text>
  <circle cx="280" cy="260" r="5" fill="#446688" filter="url(#rough2)"/>
  <text x="280" y="248" text-anchor="middle" font-size="11" fill="#333" filter="url(#rough2)">t=3</text>
  <circle cx="380" cy="300" r="5" fill="#446688" filter="url(#rough2)"/>
  <text x="380" y="288" text-anchor="middle" font-size="11" fill="#333" filter="url(#rough2)">t=4</text>
  <circle cx="480" cy="320" r="5" fill="#446688" filter="url(#rough2)"/>
  <text x="480" y="308" text-anchor="middle" font-size="11" fill="#333" filter="url(#rough2)">t=5</text>
  <line x1="80" y1="120" x2="180" y2="200" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <line x1="180" y1="200" x2="280" y2="260" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <line x1="280" y1="260" x2="380" y2="300" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <line x1="380" y1="300" x2="480" y2="320" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <line x1="80" y1="360" x2="480" y2="40" stroke="#b85450" stroke-width="2" stroke-dasharray="5,3" filter="url(#rough2)"/>
  <text x="420" y="70" font-size="12" fill="#b85450" filter="url(#rough2)">斜率 = -lambda</text>
  <line x1="380" y1="60" x2="380" y2="340" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#rough2)"/>
  <text x="390" y="330" font-size="12" fill="#d6a040" filter="url(#rough2)">t=m</text>
  <rect x="70" y="365" width="420" height="28" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="384" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">best[t] 凹，二分 lambda 使最优数量 >= m，即可恢复 best[m]</text>

</svg>