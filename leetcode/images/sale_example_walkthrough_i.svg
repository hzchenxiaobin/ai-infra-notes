<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"
     font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="900" height="600" fill="#fafafa"/>

  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">示例 2 演算：items = [[2,4],[3,2],[4,1],[6,4],[12,4]]，budget = 8</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">c_i =（factor 值是 factor_i 倍数的类型总数）− 1；p1 = 1（类型 2 最便宜）</text>

  <!-- 表头 -->
  <rect x="60" y="80" width="740" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="105" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">类型 i</text>
  <text x="205" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">factor</text>
  <text x="315" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">price</text>
  <text x="435" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">c_i</text>
  <text x="580" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">价值 1+c_i</text>
  <text x="730" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#446688">选首件？</text>

  <!-- 行 0（选中） -->
  <rect x="60" y="120" width="740" height="38" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="105" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">0</text>
  <text x="205" y="144" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="315" y="144" text-anchor="middle" font-size="12" fill="#333">4</text>
  <text x="435" y="144" text-anchor="middle" font-size="12" fill="#333">3（2|2,4,6,12 减自身）</text>
  <text x="580" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">4</text>
  <text x="730" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">✓</text>

  <!-- 行 1（选中） -->
  <rect x="60" y="158" width="740" height="38" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="105" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="205" y="182" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="315" y="182" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="435" y="182" text-anchor="middle" font-size="12" fill="#333">2（3|3,6,12 减自身）</text>
  <text x="580" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">3</text>
  <text x="730" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">✓</text>

  <!-- 行 2（选中） -->
  <rect x="60" y="196" width="740" height="38" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="105" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">2</text>
  <text x="205" y="220" text-anchor="middle" font-size="12" fill="#333">4</text>
  <text x="315" y="220" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="435" y="220" text-anchor="middle" font-size="12" fill="#333">1（4|4,12 减自身）</text>
  <text x="580" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">2</text>
  <text x="730" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">✓</text>

  <!-- 行 3（未选） -->
  <rect x="60" y="234" width="740" height="38" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="105" y="258" text-anchor="middle" font-size="12" fill="#888">3</text>
  <text x="205" y="258" text-anchor="middle" font-size="12" fill="#888">6</text>
  <text x="315" y="258" text-anchor="middle" font-size="12" fill="#888">4</text>
  <text x="435" y="258" text-anchor="middle" font-size="12" fill="#888">1（6|6,12 减自身）</text>
  <text x="580" y="258" text-anchor="middle" font-size="12" fill="#888">2</text>
  <text x="730" y="258" text-anchor="middle" font-size="13" fill="#bbb">✗</text>

  <!-- 行 4（未选） -->
  <rect x="60" y="272" width="740" height="38" fill="#f5f5f5" stroke="#cccccc" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="105" y="296" text-anchor="middle" font-size="12" fill="#888">4</text>
  <text x="205" y="296" text-anchor="middle" font-size="12" fill="#888">12</text>
  <text x="315" y="296" text-anchor="middle" font-size="12" fill="#888">4</text>
  <text x="435" y="296" text-anchor="middle" font-size="12" fill="#888">0（仅自身是倍数）</text>
  <text x="580" y="296" text-anchor="middle" font-size="12" fill="#888">1</text>
  <text x="730" y="296" text-anchor="middle" font-size="13" fill="#bbb">✗</text>

  <!-- 免费明细 -->
  <rect x="60" y="336" width="410" height="118" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="80" y="360" font-size="13" font-weight="bold" fill="#7a5415">免费明细（按来源分别计数）</text>
  <text x="80" y="384" font-size="12" fill="#333">买类型 0（f=2）→ 送类型 2、3、4：3 件</text>
  <text x="80" y="406" font-size="12" fill="#333">买类型 1（f=3）→ 送类型 3、4：2 件</text>
  <text x="80" y="428" font-size="12" fill="#333">买类型 2（f=4）→ 送类型 4：1 件（合计 6 件）</text>

  <!-- 演算 -->
  <rect x="500" y="336" width="340" height="118" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="520" y="360" font-size="13" font-weight="bold" fill="#2b6e9e">背包演算</text>
  <text x="520" y="384" font-size="12" fill="#333">首件 0/1/2：花费 4+2+1 = 7 ≤ 8</text>
  <text x="520" y="406" font-size="12" fill="#333">礼包价值：4+3+2 = 9</text>
  <text x="520" y="428" font-size="12" fill="#333">剩余 1 元 ⇒ 散件 ×1（p1=1）→ +1</text>

  <!-- 答案 -->
  <rect x="230" y="486" width="440" height="56" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="450" y="521" text-anchor="middle" font-size="16" font-weight="bold" fill="#b85450">答案 = 购买 4 件 + 免费 6 件 = 10 ✓</text>
</svg>
