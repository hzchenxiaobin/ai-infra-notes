<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="107" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">变换 + Kadane：枚举 k</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="340" y="62" text-anchor="middle" font-size="12" fill="#444">固定 k 后，分数差 = 变换数组的最大子数组和</text>

  <!-- Transform rule -->
  <g filter="url(#sk)">
    <rect x="40" y="75" width="600" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="340" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">变换规则</text>
  <text x="340" y="118" text-anchor="middle" font-size="12" fill="#444" font-family="monospace">nums[i] % k == 0 → +nums[i]（Alice 得分）  否则 → −nums[i]（Bob 得分）</text>

  <!-- Example: k=2, nums=[1,4,6,8] -->
  <text x="340" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">示例：k=2, nums=[1,4,6,8]</text>

  <!-- Original array -->
  <text x="40" y="180" font-size="11" fill="#888">原数组：</text>
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="100" y="166" width="50" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1" rx="3"/></g>
    <text x="125" y="184" text-anchor="middle" fill="#b03a3a">1</text>
    <g filter="url(#sk)"><rect x="150" y="166" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
    <text x="175" y="184" text-anchor="middle" fill="#2e6e2e">4</text>
    <g filter="url(#sk)"><rect x="200" y="166" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
    <text x="225" y="184" text-anchor="middle" fill="#2e6e2e">6</text>
    <g filter="url(#sk)"><rect x="250" y="166" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
    <text x="275" y="184" text-anchor="middle" fill="#2e6e2e">8</text>
  </g>
  <text x="320" y="184" font-size="9" fill="#888">%2</text>
  <text x="345" y="184" font-size="9" fill="#b03a3a">≠0</text>
  <text x="380" y="184" font-size="9" fill="#2e6e2e">=0</text>
  <text x="420" y="184" font-size="9" fill="#2e6e2e">=0</text>
  <text x="450" y="184" font-size="9" fill="#2e6e2e">=0</text>

  <!-- Arrow down -->
  <path d="M 340 198 L 340 212" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Transformed -->
  <text x="40" y="232" font-size="11" fill="#888">变换后：</text>
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="100" y="218" width="50" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1" rx="3"/></g>
    <text x="125" y="236" text-anchor="middle" fill="#b03a3a">-1</text>
    <g filter="url(#sk)"><rect x="150" y="218" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
    <text x="175" y="236" text-anchor="middle" fill="#2e6e2e">+4</text>
    <g filter="url(#sk)"><rect x="200" y="218" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
    <text x="225" y="236" text-anchor="middle" fill="#2e6e2e">+6</text>
    <g filter="url(#sk)"><rect x="250" y="218" width="50" height="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
    <text x="275" y="236" text-anchor="middle" fill="#2e6e2e">+8</text>
  </g>

  <!-- Kadane -->
  <text x="340" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Kadane 最大子数组和</text>
  <g filter="url(#sk)">
    <rect x="100" y="275" width="200" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="200" y="294" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">4 + 6 + 8 = 18</text>
  <text x="340" y="294" font-size="12" fill="#444">→ 分数差 = 18</text>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="40" y="315" width="600" height="70" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="60" y="338" font-size="13" font-weight="bold" fill="#2b2b2b">答案 = 分数差 × k = 18 × 2 = 36 ✓</text>
  <text x="60" y="358" font-size="11" fill="#444">对每个候选 k 重复上述过程，取分数差最大（并列取最小 k）</text>
  <text x="60" y="374" font-size="11" fill="#888">候选 k = 所有 nums[i] 的因数 (>1) 并集 + k=2 保底</text>
</svg>
