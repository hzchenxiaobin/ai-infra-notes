<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="103" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="640" height="360" fill="#fdfcf7"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">两遍扫描：求范围 → 求和</text>
  <path d="M 190 42 Q 320 50 450 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1: compute ranges -->
  <g filter="url(#sk)">
    <rect x="40" y="62" width="560" height="120" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="320" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 逐个计算数字范围 = max_digit − min_digit</text>
  <g font-size="11">
    <g filter="url(#sk)"><rect x="60" y="100" width="150" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
    <text x="135" y="115" text-anchor="middle" fill="#2e6e2e" font-family="monospace">5724 → 7−2=5</text>
    <g filter="url(#sk)"><rect x="220" y="100" width="130" height="22" fill="#f5e0e0" stroke="#b85450" stroke-width="1" rx="3" opacity="0.6"/></g>
    <text x="285" y="115" text-anchor="middle" fill="#b03a3a" font-family="monospace">111 → 1−1=0</text>
    <g filter="url(#sk)"><rect x="360" y="100" width="150" height="22" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
    <text x="435" y="115" text-anchor="middle" fill="#2e6e2e" font-family="monospace">350 → 5−0=5</text>
  </g>
  <text x="320" y="146" text-anchor="middle" font-size="12" fill="#444" font-family="monospace">ranges = [5, 0, 5]</text>
  <text x="320" y="168" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">max_range = max(ranges) = 5</text>

  <!-- Arrow -->
  <path d="M 320 186 L 320 202" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#ar)" filter="url(#sk)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/></marker></defs>

  <!-- Step 2: sum -->
  <g filter="url(#sk)">
    <rect x="40" y="210" width="560" height="90" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="320" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">② 求所有 range == max_range 的元素之和</text>
  <g font-size="12">
    <g filter="url(#sk)"><rect x="80" y="248" width="120" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="4"/></g>
    <text x="140" y="265" text-anchor="middle" fill="#2e6e2e" font-weight="bold">5724 (range=5) ✓</text>
    <g filter="url(#sk)"><rect x="240" y="248" width="120" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5" rx="4"/></g>
    <text x="300" y="265" text-anchor="middle" fill="#b03a3a">111 (range=0) ✗</text>
    <g filter="url(#sk)"><rect x="400" y="248" width="120" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="4"/></g>
    <text x="460" y="265" text-anchor="middle" fill="#2e6e2e" font-weight="bold">350 (range=5) ✓</text>
  </g>
  <text x="320" y="292" text-anchor="middle" font-size="14" fill="#2e6e2e" font-weight="bold">ans = 5724 + 350 = 6074</text>

  <!-- Summary -->
  <g filter="url(#sk)">
    <rect x="40" y="310" width="560" height="40" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="320" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">数位提取：x%10 取末位，x/=10 前进，跟踪 max_d(初值0) 和 min_d(初值9)</text>
  <text x="320" y="344" text-anchor="middle" font-size="11" fill="#888">时间 O(n·d)，d ≤ 6 位。空间 O(1)。</text>
</svg>
