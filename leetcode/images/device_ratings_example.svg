<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
  </defs>
  <rect width="640" height="380" fill="#fdfcf7"/>
  <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">设备评分示例演算</text>
  <path d="M 200 42 Q 320 50 440 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="320" y="64" text-anchor="middle" font-size="13" fill="#444">units = [[1,3], [2,2]]</text>

  <!-- Before -->
  <text x="160" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">操作前</text>
  <g font-size="13">
    <!-- Device 0 -->
    <g filter="url(#sk)"><rect x="40" y="100" width="120" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="100" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">设备 0</text>
    <g filter="url(#sk)"><rect x="55" y="130" width="36" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" rx="4"/></g>
    <text x="73" y="148" text-anchor="middle" fill="#b03a3a" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="91" y="130" width="36" height="26" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8" rx="4"/></g>
    <text x="109" y="148" text-anchor="middle" fill="#2b6e9e">3</text>
    <text x="100" y="173" text-anchor="middle" font-size="11" fill="#444">min=1, 2nd=3</text>

    <!-- Device 1 -->
    <g filter="url(#sk)"><rect x="170" y="100" width="120" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/></g>
    <text x="230" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">设备 1</text>
    <g filter="url(#sk)"><rect x="185" y="130" width="36" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="4"/></g>
    <text x="203" y="148" text-anchor="middle" fill="#7a5415">2</text>
    <g filter="url(#sk)"><rect x="221" y="130" width="36" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="4"/></g>
    <text x="239" y="148" text-anchor="middle" fill="#7a5415">2</text>
    <text x="230" y="173" text-anchor="middle" font-size="11" fill="#444">min=2, 2nd=2</text>
  </g>
  <text x="165" y="205" text-anchor="middle" font-size="13" fill="#888">总和 = 1 + 2 = 3</text>

  <!-- Arrow -->
  <path d="M 300 140 L 340 140" stroke="#3a3a3a" stroke-width="2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="320" y="130" text-anchor="middle" font-size="10" fill="#b03a3a">移除1</text>

  <!-- After -->
  <text x="480" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">操作后</text>
  <g font-size="13">
    <!-- Device 0 (source, removed 1) -->
    <g filter="url(#sk)"><rect x="360" y="100" width="120" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="420" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">设备 0（作源）</text>
    <g filter="url(#sk)"><rect x="405" y="130" width="36" height="26" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="423" y="148" text-anchor="middle" fill="#2b6e9e" font-weight="bold">3</text>
    <text x="420" y="173" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">评分 = 3</text>

    <!-- Device 1 (dump, received 1) -->
    <g filter="url(#sk)"><rect x="490" y="100" width="120" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/></g>
    <text x="550" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">设备 1（dump）</text>
    <g filter="url(#sk)"><rect x="505" y="130" width="30" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="4"/></g>
    <text x="520" y="148" text-anchor="middle" fill="#7a5415" font-size="12">2</text>
    <g filter="url(#sk)"><rect x="535" y="130" width="30" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="4"/></g>
    <text x="550" y="148" text-anchor="middle" fill="#7a5415" font-size="12">2</text>
    <g filter="url(#sk)"><rect x="565" y="130" width="30" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1" rx="4"/></g>
    <text x="580" y="148" text-anchor="middle" fill="#b03a3a" font-size="12">1</text>
    <text x="550" y="173" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">评分 = 1</text>
  </g>
  <text x="480" y="205" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">总和 = 3 + 1 = 4</text>

  <!-- Analysis box -->
  <line x1="30" y1="225" x2="610" y2="225" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="40" y="240" width="560" height="130" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="60" y="264" font-size="13" font-weight="bold" fill="#2e6e2e">策略验证</text>
  <text x="60" y="286" font-size="11" fill="#444">① 每设备算 min 和 second_min：设备0 → min=1, 2nd=3；设备1 → min=2, 2nd=2</text>
  <text x="60" y="306" font-size="11" fill="#444">② global_min = min(1, 2) = 1</text>
  <text x="60" y="326" font-size="11" fill="#7a5415" font-weight="bold">③ dump = second_min 最小的设备 = 设备1（2nd=2）</text>
  <text x="60" y="346" font-size="11" fill="#444">④ 答案 = global_min + Σ(2nd_i, i≠dump) = 1 + 3 = </text>
  <text x="445" y="346" font-size="13" fill="#2e6e2e" font-weight="bold">4 ✓</text>
</svg>
