<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <rect width="720" height="400" fill="#f6f8fa"/>
  <text x="360" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#24292f">单下标中收益 ≥ T 的项求和</text>
  
  <!-- Value blocks -->
  <rect x="80" y="100" width="70" height="120" rx="5" fill="#0969da" opacity="0.9"/>
  <text x="115" y="145" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="115" y="170" text-anchor="middle" font-size="11" fill="#ffffff">第 1 项</text>
  
  <rect x="160" y="130" width="70" height="90" rx="5" fill="#1f883d" opacity="0.85"/>
  <text x="195" y="165" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="195" y="182" text-anchor="middle" font-size="10" fill="#ffffff">- decay[i]</text>
  
  <rect x="240" y="155" width="70" height="65" rx="5" fill="#d29922" opacity="0.85"/>
  <text x="275" y="180" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">...</text>
  <text x="275" y="198" text-anchor="middle" font-size="10" fill="#ffffff">≥ T</text>
  
  <rect x="320" y="175" width="70" height="45" rx="5" fill="#cf222e" opacity="0.85"/>
  <text x="355" y="195" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="355" y="210" text-anchor="middle" font-size="9" fill="#ffffff">-(k-1)d</text>
  
  <!-- Threshold line -->
  <line x1="70" y1="225" x2="420" y2="225" stroke="#cf222e" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="430" y="230" font-size="13" fill="#cf222e" font-weight="bold">阈值 T</text>
  
  <!-- Block below threshold (crossed out) -->
  <rect x="400" y="230" width="70" height="40" rx="5" fill="#8c959f" opacity="0.4"/>
  <line x1="405" y1="235" x2="465" y2="265" stroke="#8c959f" stroke-width="2"/>
  <line x1="465" y1="235" x2="405" y2="265" stroke="#8c959f" stroke-width="2"/>
  <text x="435" y="285" text-anchor="middle" font-size="11" fill="#57606a">&lt; T，不选</text>
  
  <!-- Count annotation -->
  <text x="230" y="330" text-anchor="middle" font-size="14" fill="#24292f">共 k = count_i(T) 项 ≥ T</text>
  
  <!-- Bracket -->
  <path d="M 80,90 L 80,75 L 390,75 L 390,90" fill="none" stroke="#24292f" stroke-width="1.5"/>
  <text x="235" y="68" text-anchor="middle" font-size="13" fill="#24292f">收益 ≥ T 的部分</text>
  
  <!-- Formula box -->
  <rect x="110" y="350" width="500" height="38" rx="6" fill="#eaeef2"/>
  <text x="360" y="365" text-anchor="middle" font-size="13" fill="#24292f">sum_i(T) = k × value[i] - decay[i] × k × (k - 1) / 2</text>
  <text x="360" y="382" text-anchor="middle" font-size="12" fill="#57606a">等差数列求和：首项 value[i]，末项 value[i] - (k-1)·decay[i]，项数 k</text>
</svg>