<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="r"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="37"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
  </defs>
  <rect width="560" height="340" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" filter="url(#r)">pre / suf 数组与替换位置判定</text>
  <text x="280" y="48" text-anchor="middle" font-size="11" fill="#888" filter="url(#r)">pre[i]=s[0..i-1] 贪心匹配 t 的长度；suf[i]=s[i+1..] 逆向匹配 t 尾部长度</text>

  <g filter="url(#r)" font-size="11" font-family="monospace">
    <text x="30" y="78" fill="#446688" font-weight="bold">i</text>
    <text x="80" y="78" fill="#446688" font-weight="bold">pre[i]</text>
    <text x="160" y="78" fill="#4a7a3a" font-weight="bold">suf[i+1]</text>
    <text x="260" y="78" fill="#d6a040" font-weight="bold">pre&lt;suf?</text>
    <text x="360" y="78" fill="#b85450" font-weight="bold">替换位</text>
    <text x="30" y="100" fill="#333">0</text><text x="80" y="100" fill="#333">0</text><text x="160" y="100" fill="#333">3</text><text x="260" y="100" fill="#4a7a3a">✓</text><text x="360" y="100" fill="#b85450">t[0]</text>
    <text x="30" y="122" fill="#333">1</text><text x="80" y="122" fill="#333">1</text><text x="160" y="122" fill="#333">3</text><text x="260" y="122" fill="#4a7a3a">✓</text><text x="360" y="122" fill="#b85450">t[1]</text>
    <text x="30" y="144" fill="#333">2</text><text x="80" y="144" fill="#333">2</text><text x="160" y="144" fill="#333">2</text><text x="260" y="144" fill="#b85450">✗</text>
    <text x="30" y="166" fill="#333">3</text><text x="80" y="166" fill="#333">3</text><text x="160" y="166" fill="#333">1</text><text x="260" y="166" fill="#b85450">✗</text>
    <text x="30" y="188" fill="#333">4</text><text x="80" y="188" fill="#333">3</text><text x="160" y="188" fill="#333">0</text><text x="260" y="188" fill="#b85450">✗</text>
  </g>

  <rect x="30" y="210" width="500" height="55" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#r)"/>
  <text x="45" y="232" font-size="12" fill="#4a7a3a" font-weight="bold" filter="url(#r)">三段拼接：s[0..i-1] 匹配 t[0..pre[i]-1] | 替换 s[i]→t[pre[i]] | s[i+1..] 匹配 t[suf[i+1]..]</text>
  <text x="45" y="252" font-size="10" fill="#888" filter="url(#r)">非重叠条件：pre[i]-1 &lt; pre[i] &lt; suf[i+1]（前缀末尾、替换位、后缀起始依次递进）</text>

  <rect x="30" y="280" width="500" height="44" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#r)"/>
  <text x="45" y="302" font-size="12" fill="#d6a040" font-weight="bold" filter="url(#r)">判定：存在 i 使 pre[i] &lt; suf[i+1] → true；全不满足且 s 非 t 子序列 → false</text>
  <text x="45" y="318" font-size="10" fill="#888" filter="url(#r)">哨兵 pre=m+1（越界大）、suf=-1（越界小）防误判</text>
</svg>
