<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="360" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">状态转移：偷或不偷第 i 间</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">f(i) = max(f(i-1), f(i-2) + nums[i])，对比爬楼梯的加法 → 取 max</text>

  <!-- ===== Houses ===== -->
  <g font-size="10" fill="#333">
    <!-- house i-2 -->
    <rect x="50" y="200" width="70" height="60" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="85" y="226" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">i-2</text>
    <text x="85" y="244" text-anchor="middle" font-size="9" fill="#446688">f(i-2)</text>

    <!-- house i-1 -->
    <rect x="180" y="200" width="70" height="60" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="215" y="226" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">i-1</text>
    <text x="215" y="244" text-anchor="middle" font-size="9" fill="#4a7a3a">f(i-1)</text>

    <!-- house i -->
    <rect x="320" y="180" width="80" height="80" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
    <text x="360" y="210" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">i</text>
    <text x="360" y="228" text-anchor="middle" font-size="10" fill="#b85450">nums[i]</text>
    <text x="360" y="246" text-anchor="middle" font-size="9" fill="#b85450">f(i) = ?</text>
  </g>

  <!-- ===== Two choices ===== -->
  <!-- choice 1: not rob i -->
  <path d="M 215 200 L 215 140 L 360 140 L 360 180" stroke="#4a7a3a" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="200" y="100" width="160" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="280" y="116" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">不偷 i</text>
  <text x="280" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a7a3a">→ f(i-1)</text>

  <!-- choice 2: rob i -->
  <path d="M 85 200 Q 85 120 320 130" stroke="#446688" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="60" y="80" width="170" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="145" y="98" text-anchor="middle" font-size="10" fill="#446688" font-weight="bold">偷 i（i-1 不能偷）</text>
  <text x="145" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#446688">→ f(i-2) + nums[i]</text>

  <!-- ===== Formula ===== -->
  <rect x="60" y="280" width="420" height="60" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="270" y="304" text-anchor="middle" font-family="monospace" font-size="13" fill="#333" font-weight="bold">f(i) = max( f(i-1), f(i-2) + nums[i] )</text>
  <text x="270" y="324" text-anchor="middle" font-size="10" fill="#888">对比爬楼梯 f(i)=f(i-1)+f(i-2)：加法 → 取 max，计数 → 最优化</text>
</svg>
