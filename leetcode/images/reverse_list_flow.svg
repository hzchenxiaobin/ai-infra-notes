<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text x="280" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">两种写法对比：迭代（左） vs 递归（右）</text>

  <!-- Left: iterative flow -->
  <text x="135" y="52" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">迭代法</text>

  <ellipse cx="135" cy="76" rx="58" ry="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="135" y="80" text-anchor="middle" font-size="11" fill="#333">prev=∅, curr=head</text>

  <path d="M 135 94 L 135 108" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="135,112 210,150 135,188 60,150" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="135" y="146" text-anchor="middle" font-size="11" fill="#333">curr ≠ ∅ ?</text>
  <text x="135" y="160" text-anchor="middle" font-size="10" fill="#666">(还有节点要处理)</text>

  <!-- Yes loop -->
  <path d="M 135 188 L 135 202" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="146" y="198" font-size="10" fill="#82b366">是</text>

  <rect x="60" y="206" width="150" height="70" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="135" y="224" text-anchor="middle" font-size="11" fill="#333">① next = curr-&gt;next</text>
  <text x="135" y="242" text-anchor="middle" font-size="11" fill="#333">② curr-&gt;next = prev</text>
  <text x="135" y="260" text-anchor="middle" font-size="11" fill="#333">③ prev=curr; curr=next</text>

  <!-- loop back -->
  <path d="M 60 241 L 30 241 L 30 150 L 60 150" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="22" y="195" text-anchor="middle" font-size="9" fill="#888" transform="rotate(-90 22 195)">循环</text>

  <!-- No -->
  <path d="M 210 150 L 250 150" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="230" y="142" text-anchor="middle" font-size="10" fill="#b85450">否</text>

  <ellipse cx="300" cy="150" rx="46" ry="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="300" y="154" text-anchor="middle" font-size="11" fill="#333">返回 prev</text>

  <!-- Right: recursive flow -->
  <text x="430" y="52" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">递归法</text>

  <ellipse cx="430" cy="76" rx="58" ry="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="430" y="80" text-anchor="middle" font-size="11" fill="#333">reverse(head)</text>

  <path d="M 430 94 L 430 108" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="430,112 510,150 430,188 350,150" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="430" y="146" text-anchor="middle" font-size="11" fill="#333">head 或 head-&gt;next</text>
  <text x="430" y="160" text-anchor="middle" font-size="11" fill="#333">为 ∅ ?</text>

  <!-- Yes base case -->
  <path d="M 510 150 L 540 150" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="524" y="142" text-anchor="middle" font-size="10" fill="#b85450">是</text>
  <text x="546" y="154" font-size="10" fill="#888">返回head</text>

  <!-- No: recurse -->
  <path d="M 430 188 L 430 202" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="442" y="198" font-size="10" fill="#82b366">否</text>

  <rect x="340" y="206" width="180" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="430" y="227" text-anchor="middle" font-size="11" fill="#333">newHead = reverse(head-&gt;next)</text>

  <path d="M 430 240 L 430 254" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="340" y="258" width="180" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="430" y="278" text-anchor="middle" font-size="11" fill="#333">head-&gt;next-&gt;next = head</text>
  <text x="430" y="296" text-anchor="middle" font-size="11" fill="#333">head-&gt;next = ∅</text>

  <path d="M 430 308 L 430 322" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <ellipse cx="430" cy="340" rx="58" ry="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="430" y="344" text-anchor="middle" font-size="11" fill="#333">返回 newHead</text>

  <!-- recursion call note -->
  <path d="M 340 223 L 250 223 L 250 76 L 372 76" stroke="#888" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="246" y="150" text-anchor="middle" font-size="9" fill="#888" transform="rotate(-90 246 150)">递归调用</text>

  <!-- Bottom comparison -->
  <rect x="30" y="380" width="500" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="280" y="402" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">对比：迭代 O(1) 空间、不会爆栈，面试首选</text>
  <text x="280" y="422" text-anchor="middle" font-size="11" fill="#666">递归 O(n) 空间（调用栈），代码更短但链表长时会栈溢出</text>
  <text x="280" y="438" text-anchor="middle" font-size="11" fill="#888">两者时间都是 O(n)</text>
</svg>
