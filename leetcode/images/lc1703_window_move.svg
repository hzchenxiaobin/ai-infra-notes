<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240"
     font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#446688"/>
    </marker>
  </defs>
  <rect width="520" height="240" fill="#fafafa"/>
  <text x="260" y="30" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">选定 k 个 1，保持相对顺序移动到连续位置</text>

  <text x="60" y="65" font-size="12" fill="#555" filter="url(#rough2)">原数组（选中窗口）</text>
  <rect x="60" y="75" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="78" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>
  <rect x="101" y="75" width="36" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" filter="url(#rough2)"/><text x="119" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">0</text>
  <rect x="142" y="75" width="36" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" filter="url(#rough2)"/><text x="160" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">0</text>
  <rect x="183" y="75" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="201" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>
  <rect x="224" y="75" width="36" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" filter="url(#rough2)"/><text x="242" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">0</text>
  <rect x="265" y="75" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="283" y="98" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>

  <path d="M78 62 L78 50" fill="none" stroke="#b85450" stroke-width="2" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M201 62 L201 50" fill="none" stroke="#b85450" stroke-width="2" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M283 62 L283 50" fill="none" stroke="#b85450" stroke-width="2" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="180" y="42" text-anchor="middle" font-size="12" fill="#b85450" filter="url(#rough2)">选中的 3 个 1</text>

  <text x="60" y="155" font-size="12" fill="#555" filter="url(#rough2)">目标数组（保持顺序）</text>
  <rect x="142" y="165" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="160" y="188" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>
  <rect x="183" y="165" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="201" y="188" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>
  <rect x="224" y="165" width="36" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/><text x="242" y="188" text-anchor="middle" font-size="14" filter="url(#rough2)">1</text>

  <path d="M78 112 L78 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="90" y="140" font-size="11" fill="#446688" filter="url(#rough2)">移动 0 位</text>

  <path d="M201 112 L201 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="210" y="140" font-size="11" fill="#446688" filter="url(#rough2)">移动 2 位</text>

  <path d="M283 112 L242 155" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="275" y="140" font-size="11" fill="#446688" filter="url(#rough2)">移动 2 位</text>

  <text x="260" y="225" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">总交换次数 = 选中的 1 跨越的 0 的个数（逆序对）</text>
</svg>
