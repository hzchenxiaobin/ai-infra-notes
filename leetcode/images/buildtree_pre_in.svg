<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">前序定根，中序分左右</text>

  <!-- 前序 -->
  <text x="40" y="62" font-size="12" fill="#888">前序 preorder:</text>
  <rect x="40" y="70" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="60" y="91" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">3</text>
  <rect x="84" y="70" width="40" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="104" y="91" text-anchor="middle" font-size="13" fill="#333">9</text>
  <rect x="128" y="70" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="148" y="91" text-anchor="middle" font-size="13" fill="#333">20</text>
  <rect x="172" y="70" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="192" y="91" text-anchor="middle" font-size="13" fill="#333">15</text>
  <rect x="216" y="70" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="236" y="91" text-anchor="middle" font-size="13" fill="#333">7</text>

  <text x="62" y="120" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">↑ 根</text>
  <text x="144" y="120" text-anchor="middle" font-size="10" fill="#446688">左子树前序</text>
  <text x="204" y="120" text-anchor="middle" font-size="10" fill="#4a7a3a">右子树前序</text>

  <!-- 中序 -->
  <text x="40" y="160" font-size="12" fill="#888">中序 inorder:</text>
  <rect x="40" y="168" width="40" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="60" y="189" text-anchor="middle" font-size="13" fill="#333">9</text>
  <rect x="84" y="168" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="104" y="189" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">3</text>
  <rect x="128" y="168" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="148" y="189" text-anchor="middle" font-size="13" fill="#333">15</text>
  <rect x="172" y="168" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="192" y="189" text-anchor="middle" font-size="13" fill="#333">20</text>
  <rect x="216" y="168" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="236" y="189" text-anchor="middle" font-size="13" fill="#333">7</text>

  <text x="60" y="218" text-anchor="middle" font-size="10" fill="#446688">左子树中序</text>
  <text x="104" y="218" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">↑ 根</text>
  <text x="192" y="218" text-anchor="middle" font-size="10" fill="#4a7a3a">右子树中序</text>

  <!-- 连线说明 -->
  <path d="M 60 122 L 60 166" stroke="#446688" stroke-width="1.2" stroke-dasharray="3,3" fill="none" filter="url(#rough2)"/>
  <path d="M 148 122 L 148 166" stroke="#4a7a3a" stroke-width="1.2" stroke-dasharray="3,3" fill="none" filter="url(#rough2)"/>

  <!-- 构造结果树 -->
  <text x="400" y="62" font-size="12" fill="#888">构造结果：</text>
  <circle cx="440" cy="90" r="15" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="440" y="94" text-anchor="middle" font-size="11" fill="#333">3</text>
  <circle cx="395" cy="145" r="14" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="395" y="149" text-anchor="middle" font-size="11" fill="#333">9</text>
  <line x1="428" y1="102" x2="402" y2="134" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <circle cx="485" cy="145" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="485" y="149" text-anchor="middle" font-size="11" fill="#333">20</text>
  <line x1="452" y1="102" x2="478" y2="134" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
  <circle cx="455" cy="200" r="12" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="455" y="204" text-anchor="middle" font-size="10" fill="#333">15</text>
  <line x1="478" y1="157" x2="462" y2="190" stroke="#4a7a3a" stroke-width="1.1" filter="url(#rough2)"/>
  <circle cx="515" cy="200" r="12" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="515" y="204" text-anchor="middle" font-size="10" fill="#333">7</text>
  <line x1="492" y1="157" x2="508" y2="190" stroke="#4a7a3a" stroke-width="1.1" filter="url(#rough2)"/>

  <!-- 步骤说明 -->
  <rect x="40" y="250" width="500" height="130" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="60" y="274" font-size="12" fill="#333" font-weight="bold">分治步骤：</text>
  <text x="60" y="294" font-size="11" fill="#555">① 取前序首元素 rootVal = preorder[preL] → 当前根</text>
  <text x="60" y="312" font-size="11" fill="#555">② 在中序区间哈希查 mid = idx[rootVal]（O(1)）</text>
  <text x="60" y="330" font-size="11" fill="#555">③ 左子树：中序 [inL, mid-1]，节点数 k = mid - inL；前序 [preL+1, preL+k]</text>
  <text x="60" y="348" font-size="11" fill="#555">④ 右子树：中序 [mid+1, inR]；前序 [preL+k+1, preR]</text>
  <text x="60" y="366" font-size="11" fill="#555">⑤ 递归构造左右子树，挂到 root</text>
</svg>
