<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough2" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="340" fill="#fafafa"/>

  <text x="450" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b" filter="url(#rough2)">示例 2 演算：n = 101 → 得分 = 2</text>

  <!-- ① 数位分解（0 的格子用浅色虚线） -->
  <text x="161" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#446688" filter="url(#rough2)">① 数位分解：n = 101</text>
  <rect x="70" y="104" width="54" height="54" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <rect x="134" y="104" width="54" height="54" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.4" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <rect x="198" y="104" width="54" height="54" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="97" y="141" text-anchor="middle" font-size="24" fill="#2b2b2b" filter="url(#rough2)">1</text>
  <text x="161" y="141" text-anchor="middle" font-size="24" fill="#999" filter="url(#rough2)">0</text>
  <text x="225" y="141" text-anchor="middle" font-size="24" fill="#2b2b2b" filter="url(#rough2)">1</text>
  <text x="161" y="178" text-anchor="middle" font-size="11" fill="#888" filter="url(#rough2)">0 照常计入 cnt[0]</text>

  <!-- 箭头 1 -->
  <path d="M 268 131 Q 302 125 336 131" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ② 频率统计表（d=0 行浅色虚线） -->
  <text x="460" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7a3a" filter="url(#rough2)">② 频率统计</text>
  <rect x="375" y="104" width="85" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <rect x="460" y="104" width="85" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="417" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e5a2e" filter="url(#rough2)">d</text>
  <text x="502" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e5a2e" filter="url(#rough2)">cnt[d]</text>
  <rect x="375" y="138" width="85" height="34" fill="#f7f7f7" stroke="#999" stroke-width="1.2" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <rect x="460" y="138" width="85" height="34" fill="#f7f7f7" stroke="#999" stroke-width="1.2" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <text x="417" y="160" text-anchor="middle" font-size="13" fill="#999" filter="url(#rough2)">0</text>
  <text x="502" y="160" text-anchor="middle" font-size="13" fill="#999" filter="url(#rough2)">1</text>
  <rect x="375" y="172" width="85" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <rect x="460" y="172" width="85" height="34" fill="#ffffff" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="417" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#333" filter="url(#rough2)">1</text>
  <text x="502" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#333" filter="url(#rough2)">2</text>
  <text x="460" y="228" text-anchor="middle" font-size="11" fill="#888" filter="url(#rough2)">cnt[0] = 1，cnt[1] = 2</text>

  <!-- 箭头 2 -->
  <path d="M 561 155 Q 600 149 639 155" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ③ 贡献求和 -->
  <text x="765" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#a5761f" filter="url(#rough2)">③ 贡献求和</text>
  <rect x="662" y="104" width="206" height="34" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <text x="765" y="126" text-anchor="middle" font-size="14" fill="#999" filter="url(#rough2)">d=0： 0 × 1 = 0</text>
  <rect x="662" y="146" width="206" height="34" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="765" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415" filter="url(#rough2)">d=1： 1 × 2 = 2</text>
  <text x="765" y="216" text-anchor="middle" font-size="19" font-weight="bold" fill="#b85450" filter="url(#rough2)">得分 = 0 + 2 = 2</text>

  <!-- 注释框 -->
  <rect x="110" y="262" width="680" height="44" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <text x="450" y="289" text-anchor="middle" font-size="13" fill="#555" filter="url(#rough2)">d = 0 时贡献恒为 0（0 乘任何数都是 0），照常统计即可，无需特判</text>
</svg>
