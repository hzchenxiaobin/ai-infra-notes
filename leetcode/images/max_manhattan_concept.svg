<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="53" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">曼哈顿距离拆分：固定部分 + 自由部分</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Coordinate plane -->
  <g filter="url(#sk)">
    <line x1="60" y1="200" x2="340" y2="200" stroke="#999" stroke-width="1.2"/>
    <line x1="200" y1="80" x2="200" y2="320" stroke="#999" stroke-width="1.2"/>
  </g>
  <text x="345" y="204" font-size="11" fill="#888">x</text>
  <text x="196" y="76" font-size="11" fill="#888">y</text>
  <text x="195" y="215" text-anchor="end" font-size="11" fill="#888">O</text>

  <!-- Fixed displacement: L and D -->
  <g filter="url(#sk)">
    <path d="M 200 200 L 140 200" stroke="#4a8edb" stroke-width="2.5" marker-end="url(#ar)"/>
  </g>
  <text x="165" y="194" text-anchor="middle" font-size="10" fill="#2b6e9e">L: net_x=-1</text>
  <g filter="url(#sk)">
    <path d="M 140 200 L 140 260" stroke="#4a8edb" stroke-width="2.5" marker-end="url(#ar)"/>
  </g>
  <text x="115" y="235" text-anchor="middle" font-size="10" fill="#2b6e9e">D: net_y=-1</text>
  <g filter="url(#sk)"><circle cx="140" cy="260" r="5" fill="#4a8edb"/></g>
  <text x="155" y="268" font-size="10" fill="#2b6e9e" font-weight="bold">固定终点 (-1,-1)</text>

  <!-- Underscore contribution: two more steps -->
  <g filter="url(#sk)">
    <path d="M 140 260 L 80 260" stroke="#c98a2b" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  </g>
  <text x="100" y="254" text-anchor="middle" font-size="10" fill="#7a5415">_ → L (+1)</text>
  <g filter="url(#sk)">
    <path d="M 80 260 L 80 320" stroke="#c98a2b" stroke-width="2.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  </g>
  <text x="55" y="295" text-anchor="middle" font-size="10" fill="#7a5415">_ → D (+1)</text>
  <g filter="url(#sk)"><circle cx="80" cy="320" r="5" fill="#c98a2b"/></g>
  <text x="95" y="328" font-size="10" fill="#7a5415" font-weight="bold">最终 (-2,-2)</text>

  <!-- Manhattan distance annotation -->
  <g filter="url(#sk)">
    <path d="M 200 200 L 80 320" stroke="#b85450" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5"/>
  </g>
  <text x="150" y="280" font-size="11" fill="#b03a3a" font-weight="bold" transform="rotate(-45 150 280)">|−2|+|−2|=4</text>

  <!-- Right side: formula -->
  <g filter="url(#sk)">
    <rect x="380" y="85" width="280" height="100" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="520" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">公式</text>
  <text x="520" y="135" text-anchor="middle" font-size="13" fill="#444" font-family="monospace">答案 = |net_x| + |net_y| + num_</text>
  <text x="520" y="158" text-anchor="middle" font-size="11" fill="#888">每个 _ 独立增加 1（选增大|x|或|y|的方向）</text>

  <!-- Count table -->
  <g filter="url(#sk)">
    <rect x="380" y="200" width="280" height="120" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="520" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">moves = "L_D_" 统计</text>
  <text x="400" y="246" font-size="11" fill="#444" font-family="monospace">net_x = R−L = 0−1 = −1</text>
  <text x="400" y="266" font-size="11" fill="#444" font-family="monospace">net_y = U−D = 0−1 = −1</text>
  <text x="400" y="286" font-size="11" fill="#7a5415" font-family="monospace">num_ = 2</text>
  <text x="400" y="310" font-size="13" fill="#2e6e2e" font-weight="bold" font-family="monospace">|−1|+|−1|+2 = 4 ✓</text>

  <!-- Key insight box -->
  <g filter="url(#sk)">
    <rect x="40" y="340" width="600" height="48" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="362" font-size="12" font-weight="bold" fill="#2b2b2b">关键观察：</text>
  <text x="60" y="380" font-size="11" fill="#444">|x| 和 |y| 独立可增。net_x≥0 选 R（+1到|x|），net_x&lt;0 选 L（+1到|x|）。每个 _ 使距离+1，互不干扰。</text>
</svg>
