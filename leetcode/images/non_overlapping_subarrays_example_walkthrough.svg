<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 370" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="560" height="370" fill="#fafafa"/>
  <text x="280" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">WQS 示例演算：nums=[4,1,-5,2], m=2, l=1, r=3</text>
  <rect x="80" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="110" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">4</text>
  <rect x="150" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="180" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">1</text>
  <rect x="220" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="250" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">-5</text>
  <rect x="290" y="70" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="320" y="96" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">2</text>
  <rect x="80" y="70" width="130" height="40" rx="4" fill="none" stroke="#4a7a3a" stroke-width="2.5" filter="url(#rough2)"/>
  <rect x="290" y="70" width="60" height="40" rx="4" fill="none" stroke="#4a7a3a" stroke-width="2.5" filter="url(#rough2)"/>
  <rect x="60" y="140" width="440" height="130" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="170" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">lambda = 0 时：最优选 [4]+[1]+[2]，数量 3，价值 7</text>
  <text x="280" y="200" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">lambda = 2 时：最优选 [4,1]+[2]，数量 2，价值 3</text>
  <text x="280" y="230" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">lambda = 3 时：最优数量降为 1（< 2）</text>
  <text x="280" y="260" text-anchor="middle" font-size="14" fill="#333" filter="url(#rough2)">最大 lambda 使数量 >= 2 为 lambda* = 2</text>
  <rect x="60" y="290" width="440" height="50" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="315" text-anchor="middle" font-size="15" fill="#333" filter="url(#rough2)">答案 = value + lambda* * m = 3 + 2 * 2 = 7 = best[2]</text>

</svg>