<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：初始化 → while 队列非空 → for 处理一整层</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n)，每个节点入队出队各 1 次</text>

  <g font-size="10" fill="#333">
    <!-- Step 1 -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="140" y="84" font-family="monospace" font-size="10" fill="#555">if (!root) return {};  queue.push(root);</text>
    <text x="140" y="100" font-size="9" fill="#888">特判空树，根节点入队</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: while -->
    <rect x="40" y="128" width="440" height="120" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② while 队列非空</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">while (!queue.empty()) {</text>
    <text x="70" y="182" font-family="monospace" font-size="10" fill="#d6a040">int size = queue.size();        // 当前层节点数快照</text>
    <text x="70" y="198" font-family="monospace" font-size="10" fill="#555">vector&lt;int&gt; level;</text>
    <text x="70" y="214" font-family="monospace" font-size="10" fill="#446688">for (int i = 0; i &lt; size; ++i) { // 恰好一整层</text>
    <text x="86" y="230" font-family="monospace" font-size="10" fill="#b85450">node = queue.front(); queue.pop();</text>
    <text x="86" y="244" font-family="monospace" font-size="10" fill="#b85450">level.push_back(node-&gt;val);</text>
    <text x="86" y="258" font-family="monospace" font-size="10" fill="#4a7a3a">if (node-&gt;left)  queue.push(node-&gt;left);</text>

    <!-- Step 3: outside loop -->
    <rect x="40" y="260" width="440" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="278" font-family="monospace" font-size="10" fill="#4a7a3a">  if (node-&gt;right) queue.push(node-&gt;right);</text>
    <text x="54" y="294" font-family="monospace" font-size="10" fill="#555">}  // end for</text>
    <text x="54" y="310" font-family="monospace" font-size="10" fill="#b85450">result.push_back(level);   // 收集本层</text>

    <path d="M 260 320 L 260 334" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4 -->
    <rect x="40" y="338" width="440" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="358" font-size="12" fill="#b85450" font-weight="bold">③ 返回</text>
    <text x="110" y="358" font-family="monospace" font-size="10" fill="#555">return result;   // [[3],[9,20],[15,7]]</text>
    <text x="110" y="374" font-size="9" fill="#888">每层一个子列表，外层按层顺序排列</text>
  </g>

  <text x="260" y="394" text-anchor="middle" font-size="9" fill="#888">for 循环跑 size 次 → 只处理当前层，子节点入队留到下一轮</text>
</svg>
