<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="440" fill="#fafafa"/>

  <!-- Title -->
  <text x="280" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">两数之和流程：一次遍历，边查边存哈希表</text>

  <!-- Start -->
  <ellipse cx="280" cy="56" rx="70" ry="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="60" text-anchor="middle" font-size="11" fill="#333">map = {}，i = 0</text>

  <path d="M 280 74 L 280 88" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Loop -->
  <polygon points="280,92 390,134 280,176 170,134" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="128" text-anchor="middle" font-size="11" fill="#333">i &lt; n ?</text>
  <text x="280" y="144" text-anchor="middle" font-size="10" fill="#888">(还有元素没遍历)</text>

  <!-- No -> not found -->
  <path d="M 390 134 L 460 134" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="425" y="126" text-anchor="middle" font-size="10" fill="#b85450">否</text>
  <ellipse cx="500" cy="134" rx="50" ry="18" fill="#f5f5f5" stroke="#bbb" stroke-width="1.3" filter="url(#rough2)"/>
  <text x="500" y="138" text-anchor="middle" font-size="11" fill="#888">返回 [] (无解)</text>

  <!-- Yes: compute complement -->
  <path d="M 280 176 L 280 190" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="292" y="186" font-size="10" fill="#82b366">是</text>

  <rect x="140" y="194" width="280" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="280" y="216" text-anchor="middle" font-size="11" fill="#333">complement = target − nums[i]</text>

  <path d="M 280 228 L 280 242" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Check map -->
  <polygon points="280,246 400,288 280,330 160,288" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="282" text-anchor="middle" font-size="11" fill="#333">complement 在 map 里？</text>
  <text x="280" y="298" text-anchor="middle" font-size="10" fill="#888">(查哈希表 O(1))</text>

  <!-- Yes: found -->
  <path d="M 400 288 L 470 288" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="435" y="280" text-anchor="middle" font-size="10" fill="#82b366">是</text>
  <rect x="430" y="270" width="120" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="490" y="288" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">返回</text>
  <text x="490" y="302" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">[map[comp], i] ⭐</text>

  <!-- No: store and continue -->
  <path d="M 280 330 L 280 344" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="292" y="340" font-size="10" fill="#b85450">否</text>

  <rect x="160" y="348" width="240" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="280" y="370" text-anchor="middle" font-size="11" fill="#333">map[nums[i]] = i（存入哈希表）</text>

  <path d="M 280 382 L 280 396" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="200" y="400" width="160" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="280" y="420" text-anchor="middle" font-size="11" fill="#333">i++，回到循环开头</text>

  <!-- loop back -->
  <path d="M 200 415 L 80 415 L 80 134 L 170 134" stroke="#888" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="72" y="275" text-anchor="middle" font-size="10" fill="#888" transform="rotate(-90 72 275)">继续下一个</text>

  <!-- summary -->
  <text x="280" y="436" text-anchor="middle" font-size="10" fill="#888">每个元素只查一次、存一次 → O(n)</text>
</svg>
