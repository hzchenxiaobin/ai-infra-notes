<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="380" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：快慢同发 → fast 走 2 slow 走 1 → 相遇则有环</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n)，空间 O(1)；Floyd 判圈法</text>

  <g font-size="10" fill="#333">
    <!-- Step 1: init -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="130" y="84" font-family="monospace" font-size="10" fill="#555">if (!head || !head.next) return false;</text>
    <text x="130" y="100" font-size="9" fill="#888">0 或 1 个节点不可能有环</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: loop -->
    <rect x="40" y="128" width="440" height="120" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② while fast &amp;&amp; fast.next</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">while (fast &amp;&amp; fast.next) {</text>
    <text x="70" y="184" font-family="monospace" font-size="10" fill="#446688">slow = slow.next;          // 慢走 1</text>
    <text x="70" y="200" font-family="monospace" font-size="10" fill="#b85450">fast = fast.next.next;     // 快走 2</text>
    <text x="70" y="216" font-family="monospace" font-size="10" fill="#d6a040">if (slow == fast) return true;  // 相遇 → 有环</text>
    <text x="54" y="236" font-family="monospace" font-size="10" fill="#555">}</text>

    <path d="M 260 252 L 260 266" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: no cycle -->
    <rect x="40" y="270" width="440" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="290" font-size="12" fill="#b85450" font-weight="bold">③ fast 到 null</text>
    <text x="160" y="290" font-family="monospace" font-size="10" fill="#555">return false;   // 无环</text>
    <text x="160" y="306" font-size="9" fill="#888">快指针先到尾部，说明链表无环</text>

    <!-- key -->
    <rect x="40" y="324" width="440" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
    <text x="260" y="344" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">循环条件 fast &amp;&amp; fast.next：保证 fast.next.next 安全</text>
    <text x="260" y="360" text-anchor="middle" font-size="10" fill="#555">访问 node.next.next 前必须确保 node.next 非空</text>
  </g>
</svg>
