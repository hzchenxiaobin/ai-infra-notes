<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">频率平衡判定逻辑</text>
  <path d="M 220 42 Q 340 50 460 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Case A: single element -->
  <g filter="url(#sk)">
    <rect x="40" y="70" width="290" height="150" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="185" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">情况 A：只含一种元素</text>
  <text x="185" y="118" text-anchor="middle" font-size="11" fill="#444">freq = {c: 1}（1 种值，出现 c 次）</text>
  <!-- visualize: [5][5][5][5] -->
  <g font-size="14" font-weight="bold" fill="#2e6e2e">
    <g filter="url(#sk)"><rect x="70" y="134" width="36" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="88" y="156" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="106" y="134" width="36" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="124" y="156" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="142" y="134" width="36" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="160" y="156" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="178" y="134" width="36" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="196" y="156" text-anchor="middle">5</text>
  </g>
  <text x="185" y="190" text-anchor="middle" font-size="11" fill="#444">freq = {4: 1} → freq[4]==1 ✓</text>
  <text x="185" y="208" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">→ 平衡！</text>

  <!-- Case B: two frequencies f and 2f -->
  <g filter="url(#sk)">
    <rect x="350" y="70" width="290" height="150" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="495" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">情况 B：两种频率 f 和 2f</text>
  <text x="495" y="118" text-anchor="middle" font-size="11" fill="#444">freq 有 2 个 key: a &lt; b, 且 b == 2a</text>
  <!-- visualize: [2][1][2][3][3] freq: 2→2, 1→1, 3→2 -->
  <g font-size="13" font-weight="bold">
    <g filter="url(#sk)"><rect x="370" y="134" width="34" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="387" y="155" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="404" y="134" width="34" height="30" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2" rx="4"/></g>
    <text x="421" y="155" text-anchor="middle" fill="#7a5415">1</text>
    <g filter="url(#sk)"><rect x="438" y="134" width="34" height="30" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" rx="4"/></g>
    <text x="455" y="155" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="472" y="134" width="34" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="489" y="155" text-anchor="middle" fill="#2e6e2e">3</text>
    <g filter="url(#sk)"><rect x="506" y="134" width="34" height="30" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="4"/></g>
    <text x="523" y="155" text-anchor="middle" fill="#2e6e2e">3</text>
  </g>
  <text x="495" y="190" text-anchor="middle" font-size="11" fill="#444">freq = {2:2, 1:1} → keys={1,2}</text>
  <text x="495" y="208" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">2 == 2×1 → 平衡！</text>

  <!-- Not balanced examples -->
  <g filter="url(#sk)">
    <rect x="40" y="240" width="290" height="100" rx="10" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="185" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">不平衡：只有一种频率但多种元素</text>
  <text x="185" y="288" text-anchor="middle" font-size="11" fill="#444">[1,2,3,4] → freq={1:4}</text>
  <text x="185" y="308" text-anchor="middle" font-size="11" fill="#444">keys={1}, freq[1]=4 ≠ 1</text>
  <text x="185" y="328" text-anchor="middle" font-size="12" fill="#b03a3a">4 种值各 1 次 → 不平衡</text>

  <g filter="url(#sk)">
    <rect x="350" y="240" width="290" height="100" rx="10" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" opacity="0.5"/>
  </g>
  <text x="495" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">不平衡：两频率非 2 倍</text>
  <text x="495" y="288" text-anchor="middle" font-size="11" fill="#444">[2,2,2,1,3] → freq={3:1, 1:2}</text>
  <text x="495" y="308" text-anchor="middle" font-size="11" fill="#444">keys={1,3}, 3 ≠ 2×1</text>
  <text x="495" y="328" text-anchor="middle" font-size="12" fill="#b03a3a">频率 1 和 3 不是 2 倍关系</text>

  <!-- Algorithm box -->
  <g filter="url(#sk)">
    <rect x="40" y="355" width="600" height="52" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="378" font-size="12" font-weight="bold" fill="#2b2b2b">判定算法：</text>
  <text x="60" y="396" font-size="11" fill="#444">keys = sorted(freq.keys()); 若 len==1 且 freq[keys[0]]==1 → 平衡; 若 len==2 且 keys[1]==2×keys[0] → 平衡; 否则不平衡</text>
</svg>
