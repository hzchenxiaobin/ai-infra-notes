<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="360" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">示例演算</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="340" y="62" text-anchor="middle" font-size="12" fill="#444">occupied=[[2,6],[4,8],[10,10],[10,12],[14,16]], free=[7,11]</text>

  <!-- Number line -->
  <g filter="url(#sk)">
    <line x1="40" y1="100" x2="640" y2="100" stroke="#999" stroke-width="1.2"/>
  </g>
  <g font-size="9" fill="#888">
    <text x="60" y="115" text-anchor="middle">1</text>
    <text x="100" y="115" text-anchor="middle">2</text>
    <text x="220" y="115" text-anchor="middle">6</text>
    <text x="260" y="115" text-anchor="middle">7</text>
    <text x="340" y="115" text-anchor="middle">8</text>
    <text x="380" y="115" text-anchor="middle">9</text>
    <text x="420" y="115" text-anchor="middle">10</text>
    <text x="500" y="115" text-anchor="middle">11</text>
    <text x="540" y="115" text-anchor="middle">12</text>
    <text x="580" y="115" text-anchor="middle">13</text>
    <text x="620" y="115" text-anchor="middle">14</text>
  </g>

  <!-- Before merge: raw intervals -->
  <text x="40" y="140" font-size="11" fill="#888">原始：</text>
  <g filter="url(#sk)"><rect x="100" y="128" width="120" height="14" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8" rx="2"/></g>
  <text x="160" y="138" text-anchor="middle" font-size="8" fill="#2b6e9e">[2,6]</text>
  <g filter="url(#sk)"><rect x="180" y="128" width="160" height="14" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8" rx="2" opacity="0.5"/></g>
  <text x="260" y="138" text-anchor="middle" font-size="8" fill="#2b6e9e">[4,8]</text>
  <g filter="url(#sk)"><rect x="420" y="128" width="10" height="14" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="2"/></g>
  <text x="425" y="138" text-anchor="middle" font-size="7" fill="#7a5415">[10,10]</text>
  <g filter="url(#sk)"><rect x="420" y="145" width="120" height="14" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8" rx="2" opacity="0.5"/></g>
  <text x="480" y="155" text-anchor="middle" font-size="8" fill="#7a5415">[10,12]</text>

  <!-- After merge -->
  <text x="40" y="175" font-size="11" fill="#888">合并：</text>
  <g filter="url(#sk)"><rect x="100" y="165" width="240" height="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5" rx="3"/></g>
  <text x="220" y="176" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">[2,8]</text>
  <g filter="url(#sk)"><rect x="420" y="165" width="120" height="16" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5" rx="3"/></g>
  <text x="480" y="176" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">[10,12]</text>

  <!-- Free interval overlay -->
  <text x="40" y="200" font-size="11" fill="#888">空闲：</text>
  <g filter="url(#sk)"><rect x="260" y="190" width="240" height="16" fill="#f5e0e0" stroke="#b85450" stroke-width="1.5" rx="3" opacity="0.6"/></g>
  <text x="380" y="201" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">[7,11]</text>

  <!-- Result -->
  <text x="40" y="230" font-size="11" fill="#888">结果：</text>
  <g filter="url(#sk)"><rect x="100" y="220" width="120" height="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5" rx="3"/></g>
  <text x="160" y="231" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">[2,6]</text>
  <g filter="url(#sk)"><rect x="540" y="220" width="10" height="16" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5" rx="3"/></g>
  <text x="545" y="231" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">[12,12]</text>
  <text x="40" y="255" font-size="11" fill="#888">     </text>
  <g filter="url(#sk)"><rect x="620" y="220" width="20" height="16" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
  <text x="630" y="231" text-anchor="middle" font-size="7" fill="#2e6e2e" font-weight="bold">[14,16]</text>

  <!-- Step-by-step explanation -->
  <g filter="url(#sk)">
    <rect x="40" y="265" width="600" height="85" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="287" font-size="12" font-weight="bold" fill="#2b2b2b">逐步分析：</text>
  <text x="60" y="305" font-size="11" fill="#2b6e9e">[2,8] ∩ [7,11]：7在内部 → 截右端至 fs−1=6 → [2,6] ✓</text>
  <text x="60" y="323" font-size="11" fill="#7a5415">[10,12] ∩ [7,11]：11在内部 → 截左端至 fe+1=12 → [12,12] ✓</text>
  <text x="60" y="341" font-size="11" fill="#2e6e2e">[14,16] ∩ [7,11]：无交集 → 保留 [14,16] ✓</text>
</svg>
