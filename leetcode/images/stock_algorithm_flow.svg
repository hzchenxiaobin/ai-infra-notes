<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">买卖股票一次遍历算法流程</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step boxes -->
  <g filter="url(#sk)">
    <rect x="60" y="68" width="200" height="48" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="160" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 初始化</text>
  <text x="160" y="106" text-anchor="middle" font-size="10" fill="#555">min_price = +∞, ans = 0</text>

  <path d="M 260 92 L 300 92" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="300" y="68" width="200" height="48" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="400" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">② 遍历每个 price</text>
  <text x="400" y="106" text-anchor="middle" font-size="10" fill="#555">for price in prices</text>

  <path d="M 500 92 L 540 92" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="540" y="68" width="280" height="48" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="680" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">③ ans = max(ans, price - min_price)</text>
  <text x="680" y="106" text-anchor="middle" font-size="10" fill="#555">今天卖出的最大利润</text>

  <path d="M 680 116 L 680 146" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="540" y="146" width="280" height="48" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="680" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">④ min_price = min(min_price, price)</text>
  <text x="680" y="184" text-anchor="middle" font-size="10" fill="#555">更新历史最低买入价</text>

  <!-- loop back arrow -->
  <path d="M 540 170 Q 400 170 400 130 Q 400 92 500 92" stroke="#888" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="380" y="150" font-size="10" fill="#888">循环下一个 price</text>

  <!-- exit -->
  <path d="M 820 170 L 840 170 L 840 230 L 440 230" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="780" y="222" font-size="10" fill="#888">遍历结束</text>

  <g filter="url(#sk)">
    <rect x="300" y="210" width="280" height="48" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="440" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">⑤ 返回 ans</text>
  <text x="440" y="248" text-anchor="middle" font-size="10" fill="#555">最大利润</text>

  <!-- key insight -->
  <g filter="url(#sk)">
    <rect x="60" y="280" width="760" height="64" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="304" font-size="12" font-weight="bold" fill="#444">关键顺序：先更新 ans，再更新 min_price</text>
  <text x="80" y="324" font-size="11" fill="#2e6e2e">保证同一天不会既买入又卖出（差为 0，结果相同但语义更严谨）</text>
  <text x="80" y="340" font-size="11" fill="#b85450">O(n) 时间，O(1) 空间 —— 把枚举买入日压缩为维护历史最小值</text>
</svg>
