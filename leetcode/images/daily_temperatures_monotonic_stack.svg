<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="400" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">单调递减栈：遇到更大温度时连续弹栈结算</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">栈存下标（温度递减），新温度大于栈顶则弹栈算 answer</text>

  <!-- ===== Temperature array ===== -->
  <text x="30" y="76" font-size="11" fill="#446688" font-weight="bold">temperatures[]</text>
  <g font-size="10" fill="#333">
    <rect x="30" y="84" width="44" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="52" y="104" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">73</text>
    <text x="52" y="78" text-anchor="middle" font-size="8" fill="#888">[0]</text>

    <rect x="78" y="84" width="44" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="100" y="104" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">74</text>
    <text x="100" y="78" text-anchor="middle" font-size="8" fill="#888">[1]</text>

    <rect x="126" y="84" width="44" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="148" y="104" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">75</text>
    <text x="148" y="78" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">[2] 当前</text>

    <rect x="174" y="84" width="44" height="32" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="196" y="104" text-anchor="middle" font-size="10" fill="#888">71</text>
    <text x="196" y="78" text-anchor="middle" font-size="8" fill="#888">[3]</text>

    <rect x="222" y="84" width="44" height="32" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="244" y="104" text-anchor="middle" font-size="10" fill="#888">69</text>
    <text x="244" y="78" text-anchor="middle" font-size="8" fill="#888">[4]</text>

    <rect x="270" y="84" width="44" height="32" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="292" y="104" text-anchor="middle" font-size="10" fill="#888">72</text>
    <text x="292" y="78" text-anchor="middle" font-size="8" fill="#888">[5]</text>

    <rect x="318" y="84" width="44" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="340" y="104" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">76</text>
    <text x="340" y="78" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">[6] 新来的</text>

    <rect x="366" y="84" width="44" height="32" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="388" y="104" text-anchor="middle" font-size="10" fill="#888">73</text>
    <text x="388" y="78" text-anchor="middle" font-size="8" fill="#888">[7]</text>
  </g>

  <!-- arrow from i=6 to stack -->
  <path d="M 340 120 L 340 160" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Stack (before processing 76) ===== -->
  <text x="30" y="154" font-size="11" fill="#d6a040" font-weight="bold">栈（存下标，温度递减）</text>
  <g font-size="10">
    <!-- stack bottom to top: [2(75), 5(72)] -->
    <rect x="200" y="168" width="80" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="240" y="186" text-anchor="middle" fill="#b85450" font-weight="bold">[2] = 75°</text>

    <rect x="200" y="200" width="80" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="240" y="218" text-anchor="middle" fill="#446688" font-weight="bold">[5] = 72° ← 栈顶</text>

    <text x="300" y="218" font-size="9" fill="#888">76 &gt; 72 → 弹！</text>
  </g>

  <!-- pop arrow -->
  <path d="M 200 214 L 160 214" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="120" y="218" font-size="9" fill="#b85450" font-weight="bold">弹出 [5]</text>
  <text x="120" y="232" font-size="8" fill="#b85450">ans[5]=6-5=1</text>

  <!-- ===== After popping [5], check [2] ===== -->
  <text x="30" y="252" font-size="11" fill="#d6a040" font-weight="bold">继续弹（76 仍 &gt; 75）</text>
  <g font-size="10">
    <rect x="200" y="262" width="80" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="240" y="280" text-anchor="middle" fill="#b85450" font-weight="bold">[2] = 75° ← 栈顶</text>
    <text x="300" y="280" font-size="9" fill="#888">76 &gt; 75 → 弹！</text>
  </g>
  <path d="M 200 276 L 160 276" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="110" y="280" font-size="9" fill="#b85450" font-weight="bold">弹出 [2]</text>
  <text x="110" y="294" font-size="8" fill="#b85450">ans[2]=6-2=4</text>

  <!-- ===== Summary ===== -->
  <rect x="30" y="316" width="480" height="72" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="50" y="336" font-size="11" fill="#4a7a3a" font-weight="bold">一次新温度可连续弹多个栈顶：</text>
  <text x="50" y="354" font-size="10" fill="#555">i=6 (76°) 进来时弹出 [5](72°) 和 [2](75°)，一次结算 2 个答案</text>
  <text x="50" y="370" font-size="10" fill="#555">每个元素入栈 1 次 + 出栈 1 次 → 总操作 O(n)</text>
  <text x="50" y="384" font-size="10" fill="#4a7a3a" font-weight="bold">找更大用递减栈，找更小用递增栈</text>
</svg>
