<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300"
     font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#446688"/>
    </marker>
  </defs>
  <rect width="520" height="300" fill="#fafafa"/>
  <text x="260" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">从谷底出发，每个峰值比上一个峰值多 m-1</text>
  <polyline points="60,220 140,100 220,120 300,40 380,60" fill="none" stroke="#446688" stroke-width="2.5" filter="url(#rough2)"/>
  <circle cx="60" cy="220" r="4" fill="#b85450" filter="url(#rough2)"/>
  <circle cx="140" cy="100" r="4" fill="#b85450" filter="url(#rough2)"/>
  <circle cx="220" cy="120" r="4" fill="#4a7a3a" filter="url(#rough2)"/>
  <circle cx="300" cy="40" r="4" fill="#b85450" filter="url(#rough2)"/>
  <circle cx="380" cy="60" r="4" fill="#4a7a3a" filter="url(#rough2)"/>
  <text x="60" y="250" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">s</text>
  <text x="140" y="85" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">s+m</text>
  <text x="220" y="145" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">s+m-1</text>
  <text x="300" y="25" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">s+2m-1</text>
  <text x="380" y="85" text-anchor="middle" font-size="12" fill="#333" filter="url(#rough2)">s+2m-2</text>
  <path d="M140 100 L220 120" fill="none" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#rough2)"/>
  <text x="180" y="100" text-anchor="middle" font-size="11" fill="#d6a040" filter="url(#rough2)">落差 m</text>
  <path d="M220 120 L300 40" fill="none" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="4,3" filter="url(#rough2)"/>
  <text x="260" y="75" text-anchor="middle" font-size="11" fill="#d6a040" filter="url(#rough2)">落差 m</text>
  <text x="260" y="280" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">相邻峰值的增长上限是 m-1，构造达到了这个上界</text>
</svg>
