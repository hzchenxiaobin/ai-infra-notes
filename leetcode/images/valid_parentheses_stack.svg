<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="380" fill="#fafafa"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">有效括号：栈匹配（push 开 / pop 闭）</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="72" text-anchor="middle" font-size="12" fill="#666">s = "(){[]}" → 遇开括号 push，遇闭括号检查栈顶匹配后 pop</text>

  <!-- 步骤表 -->
  <g font-size="10" fill="#555" font-weight="bold">
    <rect x="30" y="84" width="50" height="24" fill="#f6f6f6" stroke="#ccc" rx="3" filter="url(#sk)"/>
    <text x="55" y="100" text-anchor="middle">步骤</text>
    <rect x="80" y="84" width="50" height="24" fill="#f6f6f6" stroke="#ccc" rx="3" filter="url(#sk)"/>
    <text x="105" y="100" text-anchor="middle">字符</text>
    <rect x="130" y="84" width="160" height="24" fill="#f6f6f6" stroke="#ccc" rx="3" filter="url(#sk)"/>
    <text x="210" y="100" text-anchor="middle">操作</text>
    <rect x="290" y="84" width="180" height="24" fill="#f6f6f6" stroke="#ccc" rx="3" filter="url(#sk)"/>
    <text x="380" y="100" text-anchor="middle">栈</text>
  </g>

  <!-- rows -->
  <g font-size="11" fill="#333">
    <!-- step 1: ( push -->
    <rect x="30" y="108" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="124" text-anchor="middle">1</text>
    <rect x="80" y="108" width="50" height="24" fill="#e8f0fe" stroke="#446688" rx="2" filter="url(#sk)"/>
    <text x="105" y="124" text-anchor="middle" font-weight="bold">(</text>
    <rect x="130" y="108" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="124" text-anchor="middle" fill="#2e6e2e">push</text>
    <rect x="290" y="108" width="180" height="24" fill="#eaf6ee" stroke="#4a8e4a" rx="2" filter="url(#sk)"/>
    <text x="380" y="124" text-anchor="middle" font-weight="bold">(</text>

    <!-- step 2: ) pop -->
    <rect x="30" y="132" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="148" text-anchor="middle">2</text>
    <rect x="80" y="132" width="50" height="24" fill="#fce4ec" stroke="#b85450" rx="2" filter="url(#sk)"/>
    <text x="105" y="148" text-anchor="middle" font-weight="bold">)</text>
    <rect x="130" y="132" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="148" text-anchor="middle" fill="#b85450">栈顶=( 匹配 → pop</text>
    <rect x="290" y="132" width="180" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="380" y="148" text-anchor="middle" fill="#888">空</text>

    <!-- step 3: { push -->
    <rect x="30" y="156" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="172" text-anchor="middle">3</text>
    <rect x="80" y="156" width="50" height="24" fill="#e8f0fe" stroke="#446688" rx="2" filter="url(#sk)"/>
    <text x="105" y="172" text-anchor="middle" font-weight="bold">{</text>
    <rect x="130" y="156" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="172" text-anchor="middle" fill="#2e6e2e">push</text>
    <rect x="290" y="156" width="180" height="24" fill="#eaf6ee" stroke="#4a8e4a" rx="2" filter="url(#sk)"/>
    <text x="380" y="172" text-anchor="middle" font-weight="bold">{</text>

    <!-- step 4: [ push -->
    <rect x="30" y="180" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="196" text-anchor="middle">4</text>
    <rect x="80" y="180" width="50" height="24" fill="#e8f0fe" stroke="#446688" rx="2" filter="url(#sk)"/>
    <text x="105" y="196" text-anchor="middle" font-weight="bold">[</text>
    <rect x="130" y="180" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="196" text-anchor="middle" fill="#2e6e2e">push</text>
    <rect x="290" y="180" width="180" height="24" fill="#eaf6ee" stroke="#4a8e4a" rx="2" filter="url(#sk)"/>
    <text x="380" y="196" text-anchor="middle" font-weight="bold">{ [</text>

    <!-- step 5: ] pop -->
    <rect x="30" y="204" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="220" text-anchor="middle">5</text>
    <rect x="80" y="204" width="50" height="24" fill="#fce4ec" stroke="#b85450" rx="2" filter="url(#sk)"/>
    <text x="105" y="220" text-anchor="middle" font-weight="bold">]</text>
    <rect x="130" y="204" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="220" text-anchor="middle" fill="#b85450">栈顶=[ 匹配 → pop</text>
    <rect x="290" y="204" width="180" height="24" fill="#eaf6ee" stroke="#4a8e4a" rx="2" filter="url(#sk)"/>
    <text x="380" y="220" text-anchor="middle" font-weight="bold">{</text>

    <!-- step 6: } pop -->
    <rect x="30" y="228" width="50" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="55" y="244" text-anchor="middle">6</text>
    <rect x="80" y="228" width="50" height="24" fill="#fce4ec" stroke="#b85450" rx="2" filter="url(#sk)"/>
    <text x="105" y="244" text-anchor="middle" font-weight="bold">}</text>
    <rect x="130" y="228" width="160" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="210" y="244" text-anchor="middle" fill="#b85450">栈顶={ 匹配 → pop</text>
    <rect x="290" y="228" width="180" height="24" fill="#fff" stroke="#ddd" rx="2" filter="url(#sk)"/>
    <text x="380" y="244" text-anchor="middle" fill="#888">空</text>

    <!-- result -->
    <rect x="30" y="252" width="440" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" filter="url(#sk)"/>
    <text x="250" y="270" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">栈空 → 有效 ✓</text>
  </g>

  <!-- 类比 -->
  <g filter="url(#sk)">
    <rect x="490" y="108" width="410" height="172" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="4 3"/>
  </g>
  <text x="695" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">与 Continuous Batching 的类比</text>
  <text x="510" y="156" font-size="11" fill="#444">栈 push = 请求加入 batch（submit → RUNNING）</text>
  <text x="510" y="176" font-size="11" fill="#444">栈 pop = 请求完成退出（FINISHED → 释放）</text>
  <text x="510" y="196" font-size="11" fill="#444">栈空 = 所有请求处理完毕</text>
  <text x="510" y="222" font-size="11" fill="#7a2828" font-weight="bold">共同模式：动态集合的入/出管理</text>
  <text x="510" y="242" font-size="11" fill="#444">括号 LIFO 匹配 ↔ 序列生命周期管理</text>
  <text x="510" y="262" font-size="11" fill="#444">"后入先出" ↔ 最近加入的短请求先完成退出</text>
</svg>
