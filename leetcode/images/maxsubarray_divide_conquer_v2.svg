<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrowD" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M0,0 L4,7 L8,0 Z" fill="#888"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">分治法：最大子数组和来自三种情况</text>

  <!-- Top: full array [l, r] -->
  <rect x="120" y="40" width="280" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="260" y="62" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">区间 [l, r]</text>

  <!-- Arrow down to mid -->
  <path d="M 260 80 L 260 96" stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrowD)" filter="url(#rough2)"/>
  <text x="290" y="92" font-size="10" fill="#888">取 mid = (l+r)/2</text>

  <!-- Three branches -->
  <!-- Left: [l, mid] -->
  <path d="M 260 100 L 100 100 L 100 130" stroke="#888" stroke-width="1.8" fill="none" marker-end="url(#arrowD)" filter="url(#rough2)"/>
  <rect x="40" y="134" width="120" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="100" y="156" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">① 左半 [l, mid]</text>

  <!-- Center: cross -->
  <path d="M 260 100 L 260 130" stroke="#888" stroke-width="1.8" fill="none" marker-end="url(#arrowD)" filter="url(#rough2)"/>
  <rect x="180" y="134" width="160" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="260" y="156" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">② 跨越中点 (cross)</text>

  <!-- Right: [mid+1, r] -->
  <path d="M 260 100 L 420 100 L 420 130" stroke="#888" stroke-width="1.8" fill="none" marker-end="url(#arrowD)" filter="url(#rough2)"/>
  <rect x="360" y="134" width="120" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="420" y="156" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">③ 右半 [mid+1, r]</text>

  <!-- Left and Right recurse note -->
  <text x="100" y="186" text-anchor="middle" font-size="10" fill="#4a7a3a">递归 solve(l, mid)</text>
  <text x="420" y="186" text-anchor="middle" font-size="10" fill="#4a7a3a">递归 solve(mid+1, r)</text>

  <!-- Cross explanation box -->
  <rect x="30" y="205" width="460" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="260" y="226" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">② 跨越中点的子数组怎么求？</text>
  <text x="260" y="246" text-anchor="middle" font-size="11" fill="#555">从 mid 向左扫：求最大后缀和 left_max</text>
  <text x="260" y="264" text-anchor="middle" font-size="11" fill="#555">从 mid+1 向右扫：求最大前缀和 right_max</text>
  <text x="260" y="280" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">cross_max = left_max + right_max</text>

  <!-- Merge box -->
  <rect x="80" y="305" width="360" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="10" filter="url(#rough2)"/>
  <text x="260" y="332" text-anchor="middle" font-size="12.5" fill="#333" font-weight="bold">return max(①, ②, ③)</text>

  <!-- Complexity -->
  <text x="260" y="372" text-anchor="middle" font-size="11" fill="#888">T(n) = 2T(n/2) + O(n) → O(n log n)</text>
  <text x="260" y="390" text-anchor="middle" font-size="10" fill="#aaa" font-style="italic">递归深度 log n，每层合并 O(n)</text>
</svg>