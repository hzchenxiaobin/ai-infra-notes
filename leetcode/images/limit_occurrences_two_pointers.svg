<svg xmlns="http://www.w3.org/2000/svg" width="780" height="500" viewBox="0 0 780 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
  </defs>
  <rect width="780" height="500" fill="#fdfcf7"/>
  <text x="390" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">限制出现次数：双指针读写扫描（k = 2）</text>
  <path d="M 220 40 Q 390 48 560 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="390" y="58" text-anchor="middle" font-size="11" fill="#888">读指针 r 顺序扫描；写指针 w 仅在「当前值计数 count &lt; k」时写入，跳过多余重复</text>

  <!-- ===== Top: input array visual ===== -->
  <text x="40" y="98" font-size="12" font-weight="bold" fill="#446688">nums（输入，已升序）</text>

  <!-- boxes: [1,1,1,2,2,3], width 56, stride 64, x=150.., y=108..154 -->
  <!-- idx0: 1 keep -->
  <g filter="url(#sk)"><rect x="150" y="108" width="56" height="46" rx="6" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/></g>
  <text x="178" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="178" y="172" text-anchor="middle" font-size="10" fill="#888">idx0 ✓</text>

  <!-- idx1: 1 keep -->
  <g filter="url(#sk)"><rect x="214" y="108" width="56" height="46" rx="6" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/></g>
  <text x="242" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="242" y="172" text-anchor="middle" font-size="10" fill="#888">idx1 ✓</text>

  <!-- idx2: 1 skip -->
  <g filter="url(#sk)"><rect x="278" y="108" width="56" height="46" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="306" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#b03a3a">1</text>
  <text x="306" y="172" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">idx2 ✗ 跳过</text>
  <!-- r pointer arrow down onto idx2 -->
  <path d="M 306 74 L 306 104" stroke="#b85450" stroke-width="1.6" fill="none" marker-end="url(#arR)" filter="url(#sk)"/>
  <text x="316" y="70" font-size="11" fill="#b03a3a" font-weight="bold">r 读（count=2 已满）</text>

  <!-- idx3: 2 keep -->
  <g filter="url(#sk)"><rect x="342" y="108" width="56" height="46" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="370" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b6e9e">2</text>
  <text x="370" y="172" text-anchor="middle" font-size="10" fill="#888">idx3 ✓ 新值</text>

  <!-- idx4: 2 keep -->
  <g filter="url(#sk)"><rect x="406" y="108" width="56" height="46" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="434" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b6e9e">2</text>
  <text x="434" y="172" text-anchor="middle" font-size="10" fill="#888">idx4 ✓</text>

  <!-- idx5: 3 keep -->
  <g filter="url(#sk)"><rect x="470" y="108" width="56" height="46" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/></g>
  <text x="498" y="138" text-anchor="middle" font-size="20" font-weight="bold" fill="#7a5415">3</text>
  <text x="498" y="172" text-anchor="middle" font-size="10" fill="#888">idx5 ✓ 新值</text>

  <!-- ===== Step walkthrough table ===== -->
  <text x="40" y="206" font-size="12" font-weight="bold" fill="#2b2b2b">逐步演算（cur = 当前正在处理的值，count = cur 已写入次数）</text>

  <!-- header row y=214 -->
  <g font-size="11" fill="#666" font-weight="bold">
    <g filter="url(#sk)"><rect x="40" y="214" width="60" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="70" y="231" text-anchor="middle">r</text>
    <g filter="url(#sk)"><rect x="100" y="214" width="70" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="135" y="231" text-anchor="middle">nums[r]</text>
    <g filter="url(#sk)"><rect x="170" y="214" width="70" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="205" y="231" text-anchor="middle">count</text>
    <g filter="url(#sk)"><rect x="240" y="214" width="160" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="320" y="231" text-anchor="middle">动作</text>
    <g filter="url(#sk)"><rect x="400" y="214" width="50" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="425" y="231" text-anchor="middle">w</text>
    <g filter="url(#sk)"><rect x="450" y="214" width="290" height="24" fill="#f0f0f0" stroke="#bbb" stroke-width="0.8"/></g>
    <text x="595" y="231" text-anchor="middle">已写入 ans</text>
  </g>

  <!-- rows: y=238,264,290,316,342,368 ; height 26 -->
  <g font-size="11">
    <!-- r=0 -->
    <g filter="url(#sk)"><rect x="40" y="238" width="60" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="70" y="256" text-anchor="middle" fill="#2e6e2e">0</text>
    <g filter="url(#sk)"><rect x="100" y="238" width="70" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="135" y="256" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="170" y="238" width="70" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="205" y="256" text-anchor="middle" fill="#2e6e2e">0→1</text>
    <g filter="url(#sk)"><rect x="240" y="238" width="160" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="320" y="256" text-anchor="middle" fill="#2e6e2e">写入（新值）</text>
    <g filter="url(#sk)"><rect x="400" y="238" width="50" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="425" y="256" text-anchor="middle" fill="#2e6e2e">0→1</text>
    <g filter="url(#sk)"><rect x="450" y="238" width="290" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="595" y="256" text-anchor="middle" fill="#2e6e2e" font-family="monospace">[1]</text>

    <!-- r=1 -->
    <g filter="url(#sk)"><rect x="40" y="264" width="60" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="70" y="282" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="100" y="264" width="70" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="135" y="282" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="170" y="264" width="70" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="205" y="282" text-anchor="middle" fill="#2e6e2e">1→2</text>
    <g filter="url(#sk)"><rect x="240" y="264" width="160" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="320" y="282" text-anchor="middle" fill="#2e6e2e">写入</text>
    <g filter="url(#sk)"><rect x="400" y="264" width="50" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="425" y="282" text-anchor="middle" fill="#2e6e2e">1→2</text>
    <g filter="url(#sk)"><rect x="450" y="264" width="290" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="595" y="282" text-anchor="middle" fill="#2e6e2e" font-family="monospace">[1, 1]</text>

    <!-- r=2 skip -->
    <g filter="url(#sk)"><rect x="40" y="290" width="60" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="70" y="308" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="100" y="290" width="70" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="135" y="308" text-anchor="middle" fill="#b03a3a" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="170" y="290" width="70" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="205" y="308" text-anchor="middle" fill="#b03a3a" font-weight="bold">2（=k）</text>
    <g filter="url(#sk)"><rect x="240" y="290" width="160" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="320" y="308" text-anchor="middle" fill="#b03a3a" font-weight="bold">跳过（已满）</text>
    <g filter="url(#sk)"><rect x="400" y="290" width="50" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="425" y="308" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="450" y="290" width="290" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="595" y="308" text-anchor="middle" fill="#b03a3a" font-family="monospace">[1, 1]（不变）</text>

    <!-- r=3 -->
    <g filter="url(#sk)"><rect x="40" y="316" width="60" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="70" y="334" text-anchor="middle" fill="#2b6e9e">3</text>
    <g filter="url(#sk)"><rect x="100" y="316" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="135" y="334" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="170" y="316" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="205" y="334" text-anchor="middle" fill="#2b6e9e">0→1</text>
    <g filter="url(#sk)"><rect x="240" y="316" width="160" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="320" y="334" text-anchor="middle" fill="#2b6e9e">写入（新值）</text>
    <g filter="url(#sk)"><rect x="400" y="316" width="50" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="425" y="334" text-anchor="middle" fill="#2b6e9e">2→3</text>
    <g filter="url(#sk)"><rect x="450" y="316" width="290" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="595" y="334" text-anchor="middle" fill="#2b6e9e" font-family="monospace">[1, 1, 2]</text>

    <!-- r=4 -->
    <g filter="url(#sk)"><rect x="40" y="342" width="60" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="70" y="360" text-anchor="middle" fill="#2b6e9e">4</text>
    <g filter="url(#sk)"><rect x="100" y="342" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="135" y="360" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="170" y="342" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="205" y="360" text-anchor="middle" fill="#2b6e9e">1→2</text>
    <g filter="url(#sk)"><rect x="240" y="342" width="160" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="320" y="360" text-anchor="middle" fill="#2b6e9e">写入</text>
    <g filter="url(#sk)"><rect x="400" y="342" width="50" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="425" y="360" text-anchor="middle" fill="#2b6e9e">3→4</text>
    <g filter="url(#sk)"><rect x="450" y="342" width="290" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="0.8"/></g>
    <text x="595" y="360" text-anchor="middle" fill="#2b6e9e" font-family="monospace">[1, 1, 2, 2]</text>

    <!-- r=5 -->
    <g filter="url(#sk)"><rect x="40" y="368" width="60" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="70" y="386" text-anchor="middle" fill="#7a5415">5</text>
    <g filter="url(#sk)"><rect x="100" y="368" width="70" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="135" y="386" text-anchor="middle" fill="#7a5415">3</text>
    <g filter="url(#sk)"><rect x="170" y="368" width="70" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="205" y="386" text-anchor="middle" fill="#7a5415">0→1</text>
    <g filter="url(#sk)"><rect x="240" y="368" width="160" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="320" y="386" text-anchor="middle" fill="#7a5415">写入（新值）</text>
    <g filter="url(#sk)"><rect x="400" y="368" width="50" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="425" y="386" text-anchor="middle" fill="#7a5415">4→5</text>
    <g filter="url(#sk)"><rect x="450" y="368" width="290" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="595" y="386" text-anchor="middle" fill="#7a5415" font-family="monospace">[1, 1, 2, 2, 3]</text>
  </g>

  <!-- ===== Bottom: rule + result ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="410" width="430" height="70" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3"/>
  </g>
  <text x="56" y="432" font-size="12" font-weight="bold" fill="#2e6e2e">写入判定（单趟扫描）</text>
  <text x="56" y="452" font-size="11" fill="#444" font-family="monospace">if nums[r] != cur: cur = nums[r]; count = 0</text>
  <text x="56" y="470" font-size="11" fill="#444" font-family="monospace">if count &lt; k: ans[w++] = nums[r]; count++   // 否则跳过</text>

  <g filter="url(#sk)">
    <rect x="490" y="410" width="250" height="70" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
  </g>
  <text x="615" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">最终结果 ans</text>
  <text x="615" y="462" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a5415" font-family="monospace">[1, 1, 2, 2, 3]</text>
  <text x="615" y="478" text-anchor="middle" font-size="10" fill="#888">时间 O(n) · 空间 O(1) 原地</text>
</svg>
