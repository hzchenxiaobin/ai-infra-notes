<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="440" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：[3,9,20,null,null,15,7] 逐层出队</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">3 轮 while 循环，每轮处理一层，最终 [[3],[9,20],[15,7]]</text>

  <!-- ===== Round 1 ===== -->
  <text x="30" y="74" font-size="11" fill="#b85450" font-weight="bold">轮次 1：队列=[3], size=1</text>
  <g font-size="10">
    <rect x="30" y="84" width="40" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="50" y="102" text-anchor="middle" fill="#b85450" font-weight="bold">3</text>
    <text x="80" y="98" font-size="9" fill="#888">→ 出队 3，入队子节点 9, 20</text>
    <rect x="240" y="84" width="36" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="258" y="100" text-anchor="middle" fill="#446688" font-size="9">9</text>
    <rect x="280" y="84" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="298" y="100" text-anchor="middle" fill="#4a7a3a" font-size="9">20</text>
    <rect x="340" y="84" width="50" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="365" y="98" text-anchor="middle" font-size="9" fill="#b85450">[3]</text>
    <text x="400" y="98" font-size="9" fill="#888">← level</text>
    <text x="340" y="116" font-size="8" fill="#888">result: [[3]]</text>
  </g>

  <!-- ===== Round 2 ===== -->
  <text x="30" y="140" font-size="11" fill="#446688" font-weight="bold">轮次 2：队列=[9,20], size=2</text>
  <g font-size="10">
    <rect x="30" y="150" width="36" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="48" y="166" text-anchor="middle" fill="#446688" font-size="9">9</text>
    <rect x="68" y="150" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="86" y="166" text-anchor="middle" fill="#4a7a3a" font-size="9">20</text>
    <text x="115" y="164" font-size="9" fill="#888">→ 出队 9（无子），出队 20（入队 15, 7）</text>
    <rect x="320" y="150" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="338" y="166" text-anchor="middle" fill="#d6a040" font-size="9">15</text>
    <rect x="360" y="150" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="378" y="166" text-anchor="middle" fill="#d6a040" font-size="9">7</text>
    <rect x="410" y="150" width="60" height="22" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="440" y="164" text-anchor="middle" font-size="9" fill="#446688">[9,20]</text>
    <text x="410" y="182" font-size="8" fill="#888">result: [[3],[9,20]]</text>
  </g>
  <text x="30" y="188" font-size="8" fill="#d6a040">注：for 跑 size=2 次，15/7 不在本轮处理</text>

  <!-- ===== Round 3 ===== -->
  <text x="30" y="210" font-size="11" fill="#d6a040" font-weight="bold">轮次 3：队列=[15,7], size=2</text>
  <g font-size="10">
    <rect x="30" y="220" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="48" y="236" text-anchor="middle" fill="#d6a040" font-size="9">15</text>
    <rect x="68" y="220" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="86" y="236" text-anchor="middle" fill="#d6a040" font-size="9">7</text>
    <text x="115" y="234" font-size="9" fill="#888">→ 出队 15（无子），出队 7（无子）</text>
    <rect x="320" y="220" width="40" height="22" fill="#eee" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="340" y="234" text-anchor="middle" font-size="9" fill="#888">空</text>
    <rect x="380" y="220" width="60" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="410" y="234" text-anchor="middle" font-size="9" fill="#d6a040">[15,7]</text>
    <text x="380" y="252" font-size="8" fill="#888">result: [[3],[9,20],[15,7]]</text>
  </g>

  <!-- ===== Round 4: end ===== -->
  <text x="30" y="276" font-size="11" fill="#888" font-weight="bold">轮次 4：队列=[]，while 结束</text>
  <rect x="30" y="284" width="40" height="22" fill="#eee" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
  <text x="50" y="298" text-anchor="middle" font-size="9" fill="#888">空</text>
  <text x="80" y="298" font-size="9" fill="#888">→ 队列为空，退出 while，返回 result</text>

  <!-- ===== Final result ===== -->
  <line x1="20" y1="320" x2="520" y2="320" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <rect x="30" y="336" width="480" height="80" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="270" y="358" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">最终结果：[[3], [9, 20], [15, 7]]</text>
  <text x="270" y="378" text-anchor="middle" font-size="10" fill="#555">3 轮 while = 3 层，每轮 for 跑 size 次</text>
  <text x="270" y="396" text-anchor="middle" font-size="10" fill="#555">共 5 个节点，每节点入队出队各 1 次 → O(n)</text>
  <text x="270" y="412" text-anchor="middle" font-size="9" fill="#888">size 快照保证每轮 for 只处理当前层，子节点留到下一轮</text>
</svg>
