<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">设备评分操作策略</text>
  <path d="M 220 42 Q 340 50 460 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Device model -->
  <text x="340" y="66" text-anchor="middle" font-size="13" fill="#444">每个设备：评分 = min(容量集合)</text>

  <!-- Device 0 (source) -->
  <g filter="url(#sk)">
    <rect x="40" y="85" width="180" height="130" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="130" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">设备 i（作源）</text>
  <g font-size="12">
    <g filter="url(#sk)"><rect x="55" y="118" width="36" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" rx="4"/></g>
    <text x="73" y="136" text-anchor="middle" fill="#b03a3a" font-weight="bold">1</text>
    <text x="73" y="156" text-anchor="middle" font-size="9" fill="#b03a3a">min</text>
    <g filter="url(#sk)"><rect x="91" y="118" width="36" height="26" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8" rx="4"/></g>
    <text x="109" y="136" text-anchor="middle" fill="#2b6e9e">3</text>
    <text x="109" y="156" text-anchor="middle" font-size="9" fill="#888">2nd</text>
  </g>
  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#444">移除最小值 1 →</text>
  <text x="130" y="193" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">评分: 1 → 3 ↑</text>

  <!-- Arrow: removed unit -->
  <path d="M 220 130 Q 280 110 340 130" stroke="#b85450" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#arR)" filter="url(#sk)"/>
  <text x="280" y="108" text-anchor="middle" font-size="10" fill="#b03a3a">移除 min=1</text>

  <!-- Device d (dump) -->
  <g filter="url(#sk)">
    <rect x="340" y="85" width="180" height="130" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="430" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">设备 d（dump 接收）</text>
  <g font-size="12">
    <g filter="url(#sk)"><rect x="355" y="118" width="36" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="4"/></g>
    <text x="373" y="136" text-anchor="middle" fill="#7a5415">2</text>
    <g filter="url(#sk)"><rect x="391" y="118" width="36" height="26" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="4"/></g>
    <text x="409" y="136" text-anchor="middle" fill="#7a5415">2</text>
    <g filter="url(#sk)"><rect x="427" y="118" width="36" height="26" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" rx="4"/></g>
    <text x="445" y="136" text-anchor="middle" fill="#b03a3a" font-weight="bold">1</text>
    <text x="445" y="156" text-anchor="middle" font-size="9" fill="#b03a3a">收到</text>
  </g>
  <text x="430" y="175" text-anchor="middle" font-size="11" fill="#444">接收 min=1 →</text>
  <text x="430" y="193" text-anchor="middle" font-size="12" fill="#b03a3a" font-weight="bold">评分: 2 → 1 ↓</text>

  <!-- Formula box -->
  <g filter="url(#sk)">
    <rect x="540" y="95" width="120" height="105" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="600" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">关键量</text>
  <text x="555" y="136" font-size="10" fill="#444" font-family="monospace">min_i: 最小</text>
  <text x="555" y="152" font-size="10" fill="#444" font-family="monospace">2nd_i: 次小</text>
  <text x="555" y="172" font-size="10" fill="#2e6e2e" font-family="monospace">global_min</text>
  <text x="555" y="188" font-size="10" fill="#444" font-family="monospace">= min(all min_i)</text>

  <!-- Strategy -->
  <line x1="30" y1="235" x2="650" y2="235" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>
  <text x="340" y="258" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">最优策略：dump = second_min 最小的设备</text>

  <!-- Strategy steps -->
  <g filter="url(#sk)">
    <rect x="40" y="275" width="180" height="70" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="130" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">① 全作源（除 dump）</text>
  <text x="130" y="318" text-anchor="middle" font-size="11" fill="#444">每个 i≠d 移除 min_i</text>
  <text x="130" y="335" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">评分 → second_min_i</text>

  <g filter="url(#sk)">
    <rect x="250" y="275" width="180" height="70" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="340" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">② dump 接收全部</text>
  <text x="340" y="318" text-anchor="middle" font-size="11" fill="#444">收所有 min_i</text>
  <text x="340" y="335" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">评分 → global_min</text>

  <g filter="url(#sk)">
    <rect x="460" y="275" width="180" height="70" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="550" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">③ 总和最大化</text>
  <text x="550" y="318" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">global_min</text>
  <text x="550" y="335" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">+ Σ 2nd_i (i≠d)</text>

  <!-- Arrows between steps -->
  <path d="M 220 310 L 250 310" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 430 310 L 460 310" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Why dump = 2nd_min smallest -->
  <g filter="url(#sk)">
    <rect x="40" y="365" width="600" height="45" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="386" font-size="11" font-weight="bold" fill="#2b2b2b">为什么 dump 选 second_min 最小？</text>
  <text x="60" y="402" font-size="11" fill="#444">总和 = global_min + Σ2nd_i − 2nd_d，要最大化则最小化 2nd_d。且 2nd_d ≤ 2nd_j 保证少作源不更优（引理 4）</text>
</svg>
