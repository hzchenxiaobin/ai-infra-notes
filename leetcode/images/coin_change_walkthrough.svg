<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
  </defs>
  <rect width="920" height="400" fill="#fafafa"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">示例演算：coins=[1,2,5], amount=11</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 表头 -->
  <g filter="url(#sk)">
    <rect x="40" y="64" width="60" height="36" rx="4" fill="#fffdf3" stroke="#9e9e9e"/>
    <rect x="100" y="64" width="700" height="36" rx="4" fill="#e8f0fe" stroke="#446688"/>
  </g>
  <text x="70" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">i</text>
  <text x="120" y="80" font-size="9" fill="#666">0</text>
  <text x="184" y="80" text-anchor="middle" font-size="9" fill="#666">1</text>
  <text x="248" y="80" text-anchor="middle" font-size="9" fill="#666">2</text>
  <text x="312" y="80" text-anchor="middle" font-size="9" fill="#666">3</text>
  <text x="376" y="80" text-anchor="middle" font-size="9" fill="#666">4</text>
  <text x="440" y="80" text-anchor="middle" font-size="9" fill="#666">5</text>
  <text x="504" y="80" text-anchor="middle" font-size="9" fill="#666">6</text>
  <text x="568" y="80" text-anchor="middle" font-size="9" fill="#666">7</text>
  <text x="632" y="80" text-anchor="middle" font-size="9" fill="#666">8</text>
  <text x="696" y="80" text-anchor="middle" font-size="9" fill="#666">9</text>
  <text x="760" y="80" text-anchor="middle" font-size="9" fill="#666">10</text>
  <text x="788" y="80" font-size="9" fill="#666">11</text>

  <!-- dp 行 -->
  <g filter="url(#sk)">
    <rect x="40" y="100" width="60" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b"/>
    <rect x="100" y="100" width="700" height="36" rx="4" fill="#fbf3e0"/>
  </g>
  <text x="70" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">dp[i]</text>
  <text x="120" y="124" font-size="11" fill="#2e6e2e" font-weight="bold">0</text>
  <text x="184" y="124" text-anchor="middle" font-size="11" fill="#444">1</text>
  <text x="248" y="124" text-anchor="middle" font-size="11" fill="#444">1</text>
  <text x="312" y="124" text-anchor="middle" font-size="11" fill="#444">2</text>
  <text x="376" y="124" text-anchor="middle" font-size="11" fill="#444">2</text>
  <text x="440" y="124" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">1</text>
  <text x="504" y="124" text-anchor="middle" font-size="11" fill="#444">2</text>
  <text x="568" y="124" text-anchor="middle" font-size="11" fill="#444">2</text>
  <text x="632" y="124" text-anchor="middle" font-size="11" fill="#444">3</text>
  <text x="696" y="124" text-anchor="middle" font-size="11" fill="#444">3</text>
  <text x="760" y="124" text-anchor="middle" font-size="11" fill="#444">2</text>
  <text x="788" y="124" font-size="11" fill="#b03a3a" font-weight="bold">3</text>

  <!-- 推导说明 -->
  <g filter="url(#sk)">
    <rect x="40" y="156" width="840" height="130" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="180" font-size="12" font-weight="bold" fill="#2b2b2b">关键推导步骤</text>
  <text x="60" y="202" font-size="11" fill="#444">dp[5] = min(dp[4]+1, dp[3]+1, dp[0]+1) = min(3, 3, 1) = 1  ← 用一枚 5 分硬币</text>
  <text x="60" y="222" font-size="11" fill="#444">dp[10] = min(dp[9]+1, dp[8]+1, dp[5]+1) = min(4, 4, 2) = 2  ← 5+5</text>
  <text x="60" y="242" font-size="11" fill="#b03a3a" font-weight="bold">dp[11] = min(dp[10]+1, dp[9]+1, dp[6]+1) = min(3, 4, 3) = 3  ← 5+5+1</text>
  <text x="60" y="266" font-size="11" fill="#2e6e2e">答案：3 枚硬币（5+5+1）</text>

  <!-- 复杂度 -->
  <g filter="url(#sk)">
    <rect x="40" y="300" width="840" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb"/>
  </g>
  <text x="60" y="324" font-size="12" font-weight="bold" fill="#2b6e9e">复杂度</text>
  <text x="60" y="344" font-size="11" fill="#444">时间 O(amount × n)：两重循环，外层遍历金额，内层遍历硬币</text>
  <text x="60" y="362" font-size="11" fill="#444">空间 O(amount)：dp 数组</text>
  <text x="60" y="376" font-size="10" fill="#666">初始化 dp[1..amount] = ∞（INT_MAX），无法凑出时保持 ∞，返回 -1</text>
</svg>
