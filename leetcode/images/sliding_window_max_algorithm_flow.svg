<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：过期出队 → 入队弹尾 → 队头即最大</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n) 均摊，空间 O(k)；顺序不能换：先清理再维护</text>

  <g font-size="10" fill="#333">
    <!-- Step 1: init -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="130" y="84" font-family="monospace" font-size="10" fill="#555">deque&lt;int&gt; dq;  // 存下标，值单调递减</text>
    <text x="130" y="100" font-size="9" fill="#888">双端队列，两端 O(1) 操作</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: for loop -->
    <rect x="40" y="128" width="440" height="160" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② 遍历 i = 0..n-1</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">for (int i = 0; i &lt; n; ++i) {</text>

    <text x="70" y="184" font-family="monospace" font-size="10" fill="#b85450">// ① 过期出队（左端）：队头滑出窗口</text>
    <text x="70" y="200" font-family="monospace" font-size="10" fill="#b85450">while (!dq.empty() &amp;&amp; dq.front() &lt;= i - k)</text>
    <text x="86" y="214" font-family="monospace" font-size="10" fill="#b85450">dq.pop_front();</text>

    <text x="70" y="232" font-family="monospace" font-size="10" fill="#d6a040">// ② 入队弹尾（右端）：弹掉比 nums[i] 小的</text>
    <text x="70" y="248" font-family="monospace" font-size="10" fill="#d6a040">while (!dq.empty() &amp;&amp; nums[dq.back()] &lt;= nums[i])</text>
    <text x="86" y="262" font-family="monospace" font-size="10" fill="#d6a040">dq.pop_back();</text>
    <text x="70" y="276" font-family="monospace" font-size="10" fill="#555">dq.push_back(i);</text>

    <path d="M 260 292 L 260 306" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: collect -->
    <rect x="40" y="310" width="440" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="330" font-size="12" fill="#d6a040" font-weight="bold">③ 收集结果</text>
    <text x="140" y="330" font-family="monospace" font-size="10" fill="#555">if (i &gt;= k - 1) result.push_back(nums[dq.front()]);</text>
    <text x="140" y="346" font-size="9" fill="#888">窗口已满时，队头下标对应值即窗口最大</text>

    <path d="M 260 358 L 260 372" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4: return -->
    <rect x="40" y="376" width="440" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
    <text x="260" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#b85450" font-weight="bold">return result;  // 每个元素入队 1 次 + 出队 1 次 → O(n)</text>
  </g>
</svg>
