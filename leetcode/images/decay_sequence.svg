<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300">
  <rect width="720" height="300" fill="#f6f8fa"/>
  <text x="360" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#24292f">单个下标的收益序列</text>
  
  <!-- Blocks representing each selection -->
  <rect x="90" y="100" width="80" height="100" rx="6" fill="#0969da" opacity="0.9"/>
  <text x="130" y="140" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="130" y="165" text-anchor="middle" font-size="12" fill="#ffffff">第 1 次</text>
  <text x="130" y="185" text-anchor="middle" font-size="11" fill="#ffffff">t = 1</text>
  
  <rect x="190" y="120" width="80" height="80" rx="6" fill="#1f883d" opacity="0.85"/>
  <text x="230" y="152" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="230" y="170" text-anchor="middle" font-size="11" fill="#ffffff">- decay[i]</text>
  <text x="230" y="190" text-anchor="middle" font-size="11" fill="#ffffff">t = 2</text>
  
  <rect x="290" y="140" width="80" height="60" rx="6" fill="#d29922" opacity="0.85"/>
  <text x="330" y="165" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">value[i]</text>
  <text x="330" y="180" text-anchor="middle" font-size="10" fill="#ffffff">- 2·decay[i]</text>
  <text x="330" y="195" text-anchor="middle" font-size="10" fill="#ffffff">t = 3</text>
  
  <rect x="390" y="160" width="80" height="40" rx="6" fill="#cf222e" opacity="0.8"/>
  <text x="430" y="178" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">...</text>
  <text x="430" y="192" text-anchor="middle" font-size="10" fill="#ffffff">t = ...</text>
  
  <!-- Arrow showing decay direction -->
  <line x1="130" y1="230" x2="430" y2="230" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="255" text-anchor="middle" font-size="13" fill="#57606a">每次选择后价值减少 decay[i]</text>
  
  <!-- Formula -->
  <rect x="140" y="265" width="440" height="28" rx="6" fill="#eaeef2"/>
  <text x="360" y="283" text-anchor="middle" font-size="14" fill="#24292f">第 t 次选择下标 i 的收益 = value[i] - (t - 1) × decay[i]</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
  </defs>
</svg>