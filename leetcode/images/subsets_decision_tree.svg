<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrN" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#888"/>
    </marker>
    <marker id="arrY" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="560" height="420" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">选/不选 二叉决策树（nums=[1,2,3]）</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#888">每个元素一层，左=不选，右=选；每节点收集一个子集，共 2³=8 个</text>

  <!-- ===== Tree ===== -->
  <g font-size="11" filter="url(#rough2)">
    <!-- Layer labels -->
    <text x="32" y="92" font-size="10" fill="#888" font-weight="bold">根</text>
    <text x="32" y="172" font-size="10" fill="#888" font-weight="bold">决策1</text>
    <text x="32" y="252" font-size="10" fill="#888" font-weight="bold">决策2</text>
    <text x="32" y="332" font-size="10" fill="#888" font-weight="bold">决策3</text>

    <!-- Root: path=[] -->
    <rect x="265" y="76" width="70" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6"/>
    <text x="300" y="95" text-anchor="middle" fill="#446688" font-weight="bold">[]</text>

    <!-- Layer 1: decide on 1 -->
    <!-- left (not pick 1): [] -->
    <rect x="155" y="156" width="70" height="28" fill="#f5f5f5" stroke="#888" stroke-width="1.3" rx="6"/>
    <text x="190" y="175" text-anchor="middle" fill="#555" font-weight="bold">[]</text>
    <!-- right (pick 1): [1] -->
    <rect x="375" y="156" width="70" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6"/>
    <text x="410" y="175" text-anchor="middle" fill="#4a7a3a" font-weight="bold">[1]</text>

    <!-- Layer 2: decide on 2 -->
    <!-- left-left (not pick 2): [] -->
    <rect x="85" y="236" width="70" height="28" fill="#f5f5f5" stroke="#888" stroke-width="1.3" rx="6"/>
    <text x="120" y="255" text-anchor="middle" fill="#555" font-weight="bold">[]</text>
    <!-- left-right (pick 2): [2] -->
    <rect x="225" y="236" width="70" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6"/>
    <text x="260" y="255" text-anchor="middle" fill="#4a7a3a" font-weight="bold">[2]</text>
    <!-- right-left (not pick 2): [1] -->
    <rect x="335" y="236" width="70" height="28" fill="#f5f5f5" stroke="#888" stroke-width="1.3" rx="6"/>
    <text x="370" y="255" text-anchor="middle" fill="#555" font-weight="bold">[1]</text>
    <!-- right-right (pick 2): [1,2] -->
    <rect x="445" y="236" width="80" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6"/>
    <text x="485" y="255" text-anchor="middle" fill="#4a7a3a" font-weight="bold">[1,2]</text>

    <!-- Layer 3: decide on 3 (leaves) -->
    <!-- [] not pick 3 → [] -->
    <rect x="35" y="316" width="70" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="70" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[]</text>
    <!-- [] pick 3 → [3] -->
    <rect x="125" y="316" width="70" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="160" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[3]</text>
    <!-- [2] not pick 3 → [2] -->
    <rect x="205" y="316" width="70" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="240" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[2]</text>
    <!-- [2] pick 3 → [2,3] -->
    <rect x="295" y="316" width="80" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="335" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[2,3]</text>
    <!-- [1] not pick 3 → [1] -->
    <rect x="395" y="316" width="70" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="430" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[1]</text>
    <!-- [1] pick 3 → [1,3] -->
    <rect x="475" y="316" width="70" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6"/>
    <text x="510" y="335" text-anchor="middle" fill="#d6a040" font-weight="bold">[1,3]</text>
    <!-- [1,2] not pick 3 → [1,2] (would be off-screen, omit; noted) -->
    <!-- [1,2] pick 3 → [1,2,3] (off-screen; noted in caption) -->

    <!-- edges: root → L1 -->
    <path d="M 285 104 L 200 156" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arrN)"/>
    <path d="M 315 104 L 400 156" stroke="#4a7a3a" stroke-width="1.4" fill="none" marker-end="url(#arrY)"/>
    <text x="232" y="130" font-size="9" fill="#888" font-weight="bold">不选1</text>
    <text x="360" y="130" font-size="9" fill="#4a7a3a" font-weight="bold">选1</text>

    <!-- edges: L1 → L2 -->
    <path d="M 175 184 L 130 236" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arrN)"/>
    <path d="M 205 184 L 250 236" stroke="#4a7a3a" stroke-width="1.4" fill="none" marker-end="url(#arrY)"/>
    <path d="M 390 184 L 360 236" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arrN)"/>
    <path d="M 425 184 L 470 236" stroke="#4a7a3a" stroke-width="1.4" fill="none" marker-end="url(#arrY)"/>
    <text x="140" y="210" font-size="9" fill="#888">不选2</text>
    <text x="250" y="210" font-size="9" fill="#4a7a3a">选2</text>
    <text x="358" y="210" font-size="9" fill="#888">不选2</text>
    <text x="460" y="210" font-size="9" fill="#4a7a3a">选2</text>

    <!-- edges: L2 → leaves (partial,示意) -->
    <path d="M 110 264 L 80 316" stroke="#888" stroke-width="1.1" fill="none" marker-end="url(#arrN)"/>
    <path d="M 135 264 L 150 316" stroke="#4a7a3a" stroke-width="1.3" fill="none" marker-end="url(#arrY)"/>
    <path d="M 245 264 L 235 316" stroke="#888" stroke-width="1.1" fill="none" marker-end="url(#arrN)"/>
    <path d="M 275 264 L 320 316" stroke="#4a7a3a" stroke-width="1.3" fill="none" marker-end="url(#arrY)"/>
    <path d="M 360 264 L 425 316" stroke="#888" stroke-width="1.1" fill="none" marker-end="url(#arrN)"/>
    <path d="M 390 264 L 495 316" stroke="#4a7a3a" stroke-width="1.3" fill="none" marker-end="url(#arrY)"/>
  </g>

  <!-- ===== Legend ===== -->
  <rect x="40" y="368" width="480" height="42" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="8" filter="url(#rough2)"/>
  <rect x="56" y="380" width="16" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="3"/>
  <text x="80" y="392" font-size="10" fill="#4a7a3a">选该元素（右分支）</text>
  <rect x="200" y="380" width="16" height="14" fill="#f5f5f5" stroke="#888" stroke-width="1.3" rx="3"/>
  <text x="224" y="392" font-size="10" fill="#555">不选（左分支）</text>
  <rect x="320" y="380" width="16" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="3"/>
  <text x="344" y="392" font-size="10" fill="#d6a040">叶子（决策完3个元素）</text>
  <text x="280" y="406" text-anchor="middle" font-size="9" fill="#666">每节点（含内部）都收集一个子集；另有 [1,2]、[1,2,3] 未画出</text>
</svg>
