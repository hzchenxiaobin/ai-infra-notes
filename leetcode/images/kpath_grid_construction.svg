<svg xmlns="http://www.w3.org/2000/svg" width="960" height="780" viewBox="0 0 960 780" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="37" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
    <marker id="arP" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#8e5db8"/>
    </marker>
  </defs>
  <rect width="960" height="780" fill="#fdfcf7"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">三种构造方式总览</text>
  <path d="M 280 42 Q 480 50 680 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Construction 1: 2-row strip + vertical corridor ===== -->
  <text x="480" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">构造一：2 行条带 + 竖直走廊（n ≥ k，示例 m=4, n=5, k=3）</text>

  <!-- grid: 4 rows x 5 cols, cell 44px, origin (110, 88) -->
  <g font-size="14">
    <!-- Row 0: all open -->
    <text x="92" y="114" font-size="9" fill="#888">行0</text>
    <g filter="url(#sk)"><rect x="110" y="88" width="44" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="132" y="109" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="154" y="88" width="44" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="176" y="109" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="198" y="88" width="44" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="220" y="109" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="242" y="88" width="44" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="264" y="109" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="286" y="88" width="44" height="32" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="308" y="109" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>

    <!-- Row 1: cols 0,1 blocked, cols 2,3,4 open -->
    <text x="92" y="146" font-size="9" fill="#888">行1</text>
    <g filter="url(#sk)"><rect x="110" y="120" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="132" y="141" text-anchor="middle" fill="#b03a3a" font-weight="bold">#</text>
    <g filter="url(#sk)"><rect x="154" y="120" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="176" y="141" text-anchor="middle" fill="#b03a3a" font-weight="bold">#</text>
    <g filter="url(#sk)"><rect x="198" y="120" width="44" height="32" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="220" y="141" text-anchor="middle" fill="#7a5415" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="242" y="120" width="44" height="32" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="264" y="141" text-anchor="middle" fill="#7a5415" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="286" y="120" width="44" height="32" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="308" y="141" text-anchor="middle" fill="#7a5415" font-weight="bold">.</text>

    <!-- Row 2: only col 4 open -->
    <text x="92" y="178" font-size="9" fill="#888">行2</text>
    <g filter="url(#sk)"><rect x="110" y="152" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="132" y="173" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="154" y="152" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="176" y="173" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="198" y="152" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="220" y="173" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="242" y="152" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="264" y="173" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="286" y="152" width="44" height="32" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="308" y="173" text-anchor="middle" fill="#2b6e9e" font-weight="bold">.</text>

    <!-- Row 3: only col 4 open (end) -->
    <text x="92" y="210" font-size="9" fill="#888">行3</text>
    <g filter="url(#sk)"><rect x="110" y="184" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="132" y="205" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="154" y="184" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="176" y="205" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="198" y="184" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="220" y="205" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="242" y="184" width="44" height="32" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.5"/></g>
    <text x="264" y="205" text-anchor="middle" fill="#ccc">#</text>
    <g filter="url(#sk)"><rect x="286" y="184" width="44" height="32" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <text x="308" y="205" text-anchor="middle" fill="#2b6e9e" font-weight="bold">.</text>
  </g>

  <!-- column labels -->
  <g font-size="9" fill="#888">
    <text x="132" y="80" text-anchor="middle">列0</text>
    <text x="176" y="80" text-anchor="middle">列1</text>
    <text x="220" y="80" text-anchor="middle">列2</text>
    <text x="264" y="80" text-anchor="middle">列3</text>
    <text x="308" y="80" text-anchor="middle">列4</text>
  </g>

  <!-- annotations for construction 1 -->
  <!-- top corridor bracket -->
  <path d="M 110 82 L 106 76 L 334 76 L 330 82" stroke="#4a8e4a" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="220" y="68" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">顶部走廊（全开放）</text>

  <!-- blocked suffix bracket -->
  <path d="M 110 156 L 106 162 L 196 162 L 198 156" stroke="#b85450" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="153" y="174" text-anchor="middle" font-size="8" fill="#b03a3a">封 n-k=2 列</text>

  <!-- open suffix bracket -->
  <path d="M 198 156 L 200 162 L 334 162 L 330 156" stroke="#c98a2b" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="266" y="174" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">k=3 列开放 → 3 个转弯点</text>

  <!-- vertical corridor -->
  <path d="M 308 120 L 314 116 L 314 220 L 308 216" stroke="#4a8edb" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="350" y="176" font-size="9" fill="#2b6e9e" font-weight="bold">竖直走廊</text>

  <!-- path arrows: 3 turning columns -->
  <path d="M 132 104 Q 220 96 220 120" stroke="#4a8e4a" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#arG)" filter="url(#sk)" opacity="0.6"/>
  <path d="M 264 104 Q 264 112 264 120" stroke="#c98a2b" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#arO)" filter="url(#sk)" opacity="0.6"/>
  <path d="M 308 104 Q 308 112 308 120" stroke="#c98a2b" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#arO)" filter="url(#sk)" opacity="0.6"/>

  <!-- explanation box -->
  <g filter="url(#sk)">
    <rect x="400" y="88" width="540" height="128" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="420" y="112" font-size="12" font-weight="bold" fill="#2b6e9e">路径 = 转弯列 j 的选择</text>
  <text x="420" y="134" font-size="11" fill="#444" font-family="monospace">j 合法 ⟺ (1,j)..(1,n-1) 全开放</text>
  <text x="420" y="154" font-size="11" fill="#7a5415" font-weight="bold">合法 j = {n-k, ..., n-1}，共 k 个</text>
  <text x="420" y="176" font-size="11" fill="#444">每条路径：行0右行→下转→行1右行→竖直下</text>
  <text x="420" y="196" font-size="11" fill="#2e6e2e" font-weight="bold">适用条件：n ≥ k 且 m ≥ 2</text>

  <line x1="60" y1="240" x2="900" y2="240" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>

  <!-- ===== Construction 3: 3x3 bottleneck ===== -->
  <text x="480" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a">构造三：瓶颈乘法（m &lt; k 且 n &lt; k，唯一 case m=n=3, k=4）</text>

  <!-- 3x3 grid, cell 60px, origin (180, 290) -->
  <g font-size="18">
    <!-- Row 0: . . # -->
    <text x="162" y="318" font-size="9" fill="#888">行0</text>
    <g filter="url(#sk)"><rect x="180" y="290" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="210" y="318" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="240" y="290" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="270" y="318" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="300" y="290" width="60" height="44" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="330" y="318" text-anchor="middle" fill="#b03a3a" font-weight="bold">#</text>

    <!-- Row 1: . . . (bottleneck center) -->
    <text x="162" y="372" font-size="9" fill="#888">行1</text>
    <g filter="url(#sk)"><rect x="180" y="334" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="210" y="362" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="240" y="334" width="60" height="44" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/></g>
    <text x="270" y="362" text-anchor="middle" fill="#5a3a7a" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="300" y="334" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="330" y="362" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>

    <!-- Row 2: # . . -->
    <text x="162" y="426" font-size="9" fill="#888">行2</text>
    <g filter="url(#sk)"><rect x="180" y="378" width="60" height="44" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="210" y="406" text-anchor="middle" fill="#b03a3a" font-weight="bold">#</text>
    <g filter="url(#sk)"><rect x="240" y="378" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="270" y="406" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
    <g filter="url(#sk)"><rect x="300" y="378" width="60" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="330" y="406" text-anchor="middle" fill="#2e6e2e" font-weight="bold">.</text>
  </g>

  <!-- column labels -->
  <g font-size="9" fill="#888">
    <text x="210" y="282" text-anchor="middle">列0</text>
    <text x="270" y="282" text-anchor="middle">列1</text>
    <text x="330" y="282" text-anchor="middle">列2</text>
  </g>

  <!-- bottleneck circle around (1,1) -->
  <g filter="url(#sk)">
    <circle cx="270" cy="356" r="34" fill="none" stroke="#8e5db8" stroke-width="1.8" stroke-dasharray="4 3"/>
  </g>
  <text x="270" y="448" text-anchor="middle" font-size="10" fill="#5a3a7a" font-weight="bold">瓶颈 (1,1)</text>

  <!-- left gadget bracket -->
  <path d="M 180 286 L 176 280 L 300 280 L 296 286" stroke="#4a8e4a" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="238" y="272" text-anchor="middle" font-size="9" fill="#2e6e2e">2×2 开放 → 左上 2 条路</text>

  <!-- right gadget bracket -->
  <path d="M 240 430 L 244 436 L 366 436 L 360 430" stroke="#4a8e4a" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="304" y="452" text-anchor="middle" font-size="9" fill="#2e6e2e">2×2 开放 → 右下 2 条路</text>

  <!-- path arrows: 2 paths left -->
  <path d="M 210 312 Q 230 330 250 348" stroke="#4a8e4a" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arG)" filter="url(#sk)" opacity="0.6"/>
  <path d="M 210 356 L 244 356" stroke="#4a8e4a" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arG)" filter="url(#sk)" opacity="0.6"/>

  <!-- path arrows: 2 paths right -->
  <path d="M 296 360 Q 316 376 334 398" stroke="#4a8e4a" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arG)" filter="url(#sk)" opacity="0.6"/>
  <path d="M 270 380 L 270 398" stroke="#4a8e4a" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arG)" filter="url(#sk)" opacity="0.6"/>

  <!-- explanation -->
  <g filter="url(#sk)">
    <rect x="440" y="290" width="500" height="160" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="460" y="314" font-size="12" font-weight="bold" fill="#5a3a7a">瓶颈乘法原理</text>
  <text x="460" y="338" font-size="11" fill="#444">封死 (0,2) 和 (2,0) → 所有路径必经 (1,1)</text>
  <text x="460" y="362" font-size="12" fill="#444" font-family="monospace">总路径 = 左上路径 × 右下路径</text>
  <text x="460" y="386" font-size="12" fill="#5a3a7a" font-family="monospace" font-weight="bold">         = C(2,1) × C(2,1) = 2 × 2 = 4</text>
  <text x="460" y="410" font-size="11" fill="#888">左上 2×2 子网格：2 条路（经上或经左）</text>
  <text x="460" y="430" font-size="11" fill="#888">右下 2×2 子网格：2 条路（经下或经右）</text>

  <line x1="60" y1="470" x2="900" y2="470" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>

  <!-- ===== DP verification for example 2 ===== -->
  <text x="480" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">DP 验证（示例 2：m=3, n=3, k=4）</text>

  <!-- DP table 3x3, cell 60px, origin (300, 515) -->
  <g font-size="16">
    <!-- Row 0: 1 1 0 -->
    <text x="282" y="543" font-size="9" fill="#888">行0</text>
    <g filter="url(#sk)"><rect x="300" y="515" width="60" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="330" y="541" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="360" y="515" width="60" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="390" y="541" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="420" y="515" width="60" height="40" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.6"/></g>
    <text x="450" y="541" text-anchor="middle" fill="#ccc">0</text>

    <!-- Row 1: 1 2 2 -->
    <text x="282" y="583" font-size="9" fill="#888">行1</text>
    <g filter="url(#sk)"><rect x="300" y="555" width="60" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="330" y="581" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="360" y="555" width="60" height="40" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>
    <text x="390" y="581" text-anchor="middle" fill="#5a3a7a" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="420" y="555" width="60" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="450" y="581" text-anchor="middle" fill="#2b6e9e" font-weight="bold">2</text>

    <!-- Row 2: 0 2 4 -->
    <text x="282" y="623" font-size="9" fill="#888">行2</text>
    <g filter="url(#sk)"><rect x="300" y="595" width="60" height="40" fill="#f5e0e0" stroke="#b85450" stroke-width="1" opacity="0.6"/></g>
    <text x="330" y="621" text-anchor="middle" fill="#ccc">0</text>
    <g filter="url(#sk)"><rect x="360" y="595" width="60" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="390" y="621" text-anchor="middle" fill="#2b6e9e" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="420" y="595" width="60" height="40" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
    <text x="450" y="621" text-anchor="middle" fill="#2e6e2e" font-weight="bold">4</text>
  </g>

  <!-- DP formula -->
  <g filter="url(#sk)">
    <rect x="520" y="530" width="380" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
  <text x="540" y="554" font-size="11" font-weight="bold" fill="#2b2b2b">DP 转移</text>
  <text x="540" y="576" font-size="11" fill="#444" font-family="monospace">dp[i][j] = dp[i-1][j] + dp[i][j-1]</text>
  <text x="540" y="598" font-size="11" fill="#b03a3a" font-family="monospace">dp[i][j] = 0  if grid[i][j] == '#'</text>
  <text x="540" y="620" font-size="11" fill="#2e6e2e" font-weight="bold">dp[2][2] = 2 + 2 = 4 = k ✓</text>

  <!-- ===== Summary table ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="660" width="840" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="684" font-size="12" font-weight="bold" fill="#2b2b2b">分派总结</text>
  <text x="80" y="706" font-size="11" fill="#444">① 不可能（C(m+n-2,m-1) &lt; k）→ 返回 []</text>
  <text x="80" y="724" font-size="11" fill="#2e6e2e">② n ≥ k, m ≥ 2 → 2 行条带：第 0 行全开，第 1 行开后 k 列，余行仅开末列</text>
  <text x="80" y="742" font-size="11" fill="#c98a2b">③ m ≥ k, n ≥ 2 → 2 列条带（②的转置）</text>
  <text x="490" y="706" font-size="11" fill="#5a3a7a">④ m &lt; k 且 n &lt; k → 仅 m=n=3, k=4：瓶颈 (1,1)，2×2=4</text>
  <text x="490" y="724" font-size="11" fill="#888">构造二（转置）：列 0 全开，列 1 开后 k 行，余列仅开末行</text>
  <text x="490" y="742" font-size="11" fill="#888">时间 O(mn)，空间 O(mn)</text>
</svg>
