<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="r"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="31"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
  </defs>
  <rect width="540" height="320" fill="#fafafa"/>
  <text x="270" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" filter="url(#r)">示例演算：nums=[5724,111,350]</text>

  <g filter="url(#r)" font-size="11" font-family="monospace">
    <text x="20" y="62" fill="#446688" font-weight="bold">i</text>
    <text x="60" y="62" fill="#446688" font-weight="bold">nums[i]</text>
    <text x="160" y="62" fill="#446688" font-weight="bold">数位</text>
    <text x="280" y="62" fill="#446688" font-weight="bold">max</text>
    <text x="340" y="62" fill="#446688" font-weight="bold">min</text>
    <text x="400" y="62" fill="#446688" font-weight="bold">范围</text>

    <text x="20" y="88" fill="#333">0</text><text x="60" y="88" fill="#333">5724</text><text x="160" y="88" fill="#333">5,7,2,4</text><text x="280" y="88" fill="#b85450" font-weight="bold">7</text><text x="340" y="88" fill="#446688" font-weight="bold">2</text><text x="400" y="88" fill="#4a7a3a" font-weight="bold">5</text>
    <text x="20" y="114" fill="#333">1</text><text x="60" y="114" fill="#333">111</text><text x="160" y="114" fill="#333">1,1,1</text><text x="280" y="114" fill="#333">1</text><text x="340" y="114" fill="#333">1</text><text x="400" y="114" fill="#888">0</text>
    <text x="20" y="140" fill="#333">2</text><text x="60" y="140" fill="#333">350</text><text x="160" y="140" fill="#333">3,5,0</text><text x="280" y="140" fill="#b85450" font-weight="bold">5</text><text x="340" y="140" fill="#446688" font-weight="bold">0</text><text x="400" y="140" fill="#4a7a3a" font-weight="bold">5</text>
  </g>

  <rect x="20" y="160" width="500" height="44" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#r)"/>
  <text x="35" y="182" font-size="12" fill="#d6a040" font-weight="bold" filter="url(#r)">第一遍：maxRange = max(5, 0, 5) = 5</text>
  <text x="35" y="198" font-size="10" fill="#888" filter="url(#r)">数位极值初始化 maxD=0, minD=9（数位范围 0-9 安全初值）</text>

  <rect x="20" y="215" width="500" height="80" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#r)"/>
  <text x="35" y="238" font-size="12" fill="#4a7a3a" font-weight="bold" filter="url(#r)">第二遍：筛 range_i == 5 求和</text>
  <text x="35" y="258" font-size="11" fill="#333" filter="url(#r)">i=0: range=5 ✓ → +5724</text>
  <text x="35" y="276" font-size="11" fill="#333" filter="url(#r)">i=2: range=5 ✓ → +350</text>
  <text x="35" y="294" font-size="12" fill="#b85450" font-weight="bold" filter="url(#r)">答案 = 5724 + 350 = 6074 ✓</text>
</svg>
