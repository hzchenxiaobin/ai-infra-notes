<svg xmlns="http://www.w3.org/2000/svg" width="940" height="680" viewBox="0 0 940 680" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="61" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
  </defs>
  <rect width="940" height="680" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Manacher 对称性加速原理</text>
  <path d="M 280 42 Q 470 50 660 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Top: the known palindrome [l, r] with center mr ===== -->
  <text x="470" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">已知最远右端回文 [l, r]，中心 mr</text>

  <!-- array cells -->
  <g font-size="10" fill="#2b2b2b">
    <!-- 11 cells, indices 0..10 -->
    <g filter="url(#sk)"><rect x="80" y="82" width="60" height="40" fill="#f0ede4" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="110" y="100" text-anchor="middle" font-size="8" fill="#888">0</text>
    <g filter="url(#sk)"><rect x="140" y="82" width="60" height="40" fill="#dbeaf6" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="170" y="100" text-anchor="middle" font-size="8" fill="#888">1</text>
    <!-- l at index 2 -->
    <g filter="url(#sk)"><rect x="200" y="82" width="60" height="40" fill="#bdd5ed" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="230" y="100" text-anchor="middle" font-size="8" fill="#2b6e9e">2=l</text>
    <g filter="url(#sk)"><rect x="260" y="82" width="60" height="40" fill="#dbeaf6" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="290" y="100" text-anchor="middle" font-size="8" fill="#888">3</text>
    <!-- mirror center -->
    <g filter="url(#sk)"><rect x="320" y="82" width="60" height="40" fill="#8e5db8" opacity="0.3" stroke="#8e5db8" stroke-width="1.4"/></g>
    <text x="350" y="100" text-anchor="middle" font-size="8" fill="#5a3a7a" font-weight="bold">4=mir</text>
    <g filter="url(#sk)"><rect x="380" y="82" width="60" height="40" fill="#dbeaf6" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="410" y="100" text-anchor="middle" font-size="8" fill="#888">5</text>
    <!-- mr center -->
    <g filter="url(#sk)"><rect x="440" y="82" width="60" height="40" fill="#4a8edb" opacity="0.5" stroke="#2b6e9e" stroke-width="1.6"/></g>
    <text x="470" y="100" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">6=mr</text>
    <g filter="url(#sk)"><rect x="500" y="82" width="60" height="40" fill="#dbeaf6" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="530" y="100" text-anchor="middle" font-size="8" fill="#888">7</text>
    <!-- i = mirror of mir -->
    <g filter="url(#sk)"><rect x="560" y="82" width="60" height="40" fill="#e8a838" opacity="0.4" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="590" y="100" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">8=i</text>
    <g filter="url(#sk)"><rect x="620" y="82" width="60" height="40" fill="#dbeaf6" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="650" y="100" text-anchor="middle" font-size="8" fill="#888">9</text>
    <!-- r at index 10 -->
    <g filter="url(#sk)"><rect x="680" y="82" width="60" height="40" fill="#bdd5ed" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="710" y="100" text-anchor="middle" font-size="8" fill="#2b6e9e">10=r</text>
    <!-- beyond r -->
    <g filter="url(#sk)"><rect x="740" y="82" width="60" height="40" fill="#f0ede4" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="770" y="100" text-anchor="middle" font-size="8" fill="#888">11</text>
    <g filter="url(#sk)"><rect x="800" y="82" width="60" height="40" fill="#f0ede4" stroke="#9e9e9e" stroke-width="1"/></g>
    <text x="830" y="100" text-anchor="middle" font-size="8" fill="#888">12</text>
  </g>

  <!-- bracket [l, r] -->
  <path d="M 200 70 L 195 64 L 745 64 L 740 70" stroke="#4a8edb" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="470" y="58" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">已知回文 [l=2, r=10]</text>

  <!-- symmetry line through mr -->
  <path d="M 470 76 L 470 130" stroke="#8e5db8" stroke-width="1.4" stroke-dasharray="4 3" fill="none" filter="url(#sk)"/>
  <text x="470" y="146" text-anchor="middle" font-size="9" fill="#8e5db8" font-style="italic">对称轴 mr=6</text>

  <!-- mirror arrows: mir(4) ↔ i(8) -->
  <path d="M 350 130 Q 470 150 590 130" stroke="#8e5db8" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="3 2"/>
  <text x="470" y="164" text-anchor="middle" font-size="10" fill="#5a3a7a">i = 2·mr - mir = 2×6 - 4 = 8（mr 的镜像）</text>

  <!-- mir explanation box -->
  <g filter="url(#sk)">
    <rect x="745" y="76" width="180" height="92" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/>
  </g>
  <text x="755" y="96" font-size="10" fill="#5a3a7a" font-weight="bold">mir = mirror（镜像）</text>
  <text x="755" y="114" font-size="9" fill="#444">i 关于 mr 的对称点</text>
  <text x="755" y="130" font-size="9" fill="#444" font-family="monospace">mir = 2·mr - i</text>
  <text x="755" y="146" font-size="9" fill="#444">= l + r - i</text>
  <text x="755" y="162" font-size="8" fill="#888">已算过 d1[mir]，可复用</text>

  <!-- ===== Case A: i + d1[mir] < r (fully inside) ===== -->
  <text x="470" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8e4a">情况 A：镜像回文完全在 [l, r] 内（i + d1[mir] &lt; r）</text>
  <g filter="url(#sk)">
    <rect x="60" y="210" width="820" height="100" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="80" y="234" font-size="12" fill="#444">mir 的回文 [2, 6] 完全在 [l, r] 内 → i 的回文与 mir 对称，半径相等</text>
  <text x="80" y="256" font-size="12" fill="#2e6e2e" font-weight="bold" font-family="monospace">d1[i] = d1[mir]  （直接复用，无需扩展！）</text>
  <text x="80" y="278" font-size="11" fill="#888">mir 回文 [2,6] ⟷ i 回文 [6,10]，都在 [l=2, r=10] 内，由 [l,r] 的回文性保证</text>
  <text x="80" y="296" font-size="10" fill="#888">→ O(1) 完成，不进入 while 扩展循环</text>

  <!-- ===== Case B: i + d1[mir] >= r (extends beyond) ===== -->
  <text x="470" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98a2b">情况 B：镜像回文超出 [l, r]（i + d1[mir] ≥ r）</text>
  <g filter="url(#sk)">
    <rect x="60" y="352" width="820" height="110" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="80" y="376" font-size="12" fill="#444">mir 的回文超出 [l, r] 左边界 → i 的回文至少延伸到 r，但右侧未知</text>
  <text x="80" y="398" font-size="12" fill="#7a5415" font-weight="bold" font-family="monospace">d1[i] = r - i  （只能保证到 r，再从 r+1 开始扩展）</text>
  <text x="80" y="420" font-size="11" fill="#888">i 的回文至少是 [2i-r, r]，右侧 [r+1, ...] 需要逐个比较</text>
  <text x="80" y="438" font-size="10" fill="#888">→ 从 r-i 开始扩展，而非从 1 开始，节省了 [l, r] 内的比较</text>
  <text x="80" y="456" font-size="10" fill="#888">→ r 单调递增，每个元素最多被比较 1 次 → 总 O(n)</text>

  <!-- ===== Bottom: the min() formula ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="486" width="820" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="470" y="510" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold">统一初始化公式</text>
  <text x="470" y="536" text-anchor="middle" font-size="15" fill="#2b2b2b" font-family="monospace" font-weight="bold">d1[i] = min(d1[2·mr - i], r - i)</text>
  <text x="470" y="556" text-anchor="middle" font-size="11" fill="#666">情况 A 取 d1[mir]（小），情况 B 取 r-i（小）→ 取 min 恰好覆盖两种情况</text>

  <!-- ===== Key invariant ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="590" width="820" height="70" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="614" font-size="12" font-weight="bold" fill="#2b2b2b">为什么总复杂度是 O(n)？</text>
  <text x="80" y="636" font-size="11" fill="#444">关键不变量：右边界 r 单调递增，且每次扩展只比较 r 之外的元素</text>
  <text x="80" y="654" font-size="11" fill="#444">每个元素最多被"扩展比较"1 次（之后被 r 覆盖）→ 总比较次数 ≤ 2n → O(n)</text>
</svg>
