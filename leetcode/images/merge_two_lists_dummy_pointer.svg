<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="360" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">哑节点 + 双指针：每次取较小者接到 tail 后</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">dummy 统一头节点处理，tail 指向结果末尾，p1/p2 扫两个输入</text>

  <!-- ===== Two input lists ===== -->
  <text x="30" y="74" font-size="11" fill="#446688" font-weight="bold">l1:</text>
  <g font-size="11">
    <rect x="60" y="62" width="40" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="80" y="80" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <path d="M 100 76 L 110 76" stroke="#446688" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="112" y="62" width="40" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="132" y="80" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <path d="M 152 76 L 162 76" stroke="#446688" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="164" y="62" width="40" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="184" y="80" text-anchor="middle" fill="#446688" font-weight="bold">4</text>
    <text x="214" y="80" font-size="9" fill="#888">→ null</text>
  </g>
  <text x="60" y="104" font-size="9" fill="#446688" font-weight="bold">p1 ↑</text>

  <text x="30" y="134" font-size="11" fill="#4a7a3a" font-weight="bold">l2:</text>
  <g font-size="11">
    <rect x="60" y="122" width="40" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="80" y="140" text-anchor="middle" fill="#4a7a3a" font-weight="bold">1</text>
    <path d="M 100 136 L 110 136" stroke="#4a7a3a" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="112" y="122" width="40" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="132" y="140" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <path d="M 152 136 L 162 136" stroke="#4a7a3a" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="164" y="122" width="40" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="184" y="140" text-anchor="middle" fill="#4a7a3a" font-weight="bold">4</text>
    <text x="214" y="140" font-size="9" fill="#888">→ null</text>
  </g>
  <text x="60" y="164" font-size="9" fill="#4a7a3a" font-weight="bold">p2 ↑</text>

  <!-- ===== Result with dummy ===== -->
  <text x="30" y="200" font-size="11" fill="#b85450" font-weight="bold">结果:</text>
  <g font-size="11">
    <!-- dummy -->
    <rect x="60" y="188" width="50" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="3,2" rx="4" filter="url(#rough2)"/>
    <text x="85" y="206" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">dummy</text>
    <text x="60" y="230" font-size="9" fill="#d6a040">↑ 虚拟头</text>

    <path d="M 110 202 L 130 202" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- merged nodes (partial, showing pattern) -->
    <rect x="132" y="188" width="36" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="150" y="206" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <path d="M 168 202 L 178 202" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="180" y="188" width="36" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="198" y="206" text-anchor="middle" fill="#4a7a3a" font-weight="bold">1</text>
    <path d="M 216 202 L 226 202" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="228" y="188" width="36" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="246" y="206" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <text x="276" y="206" font-size="9" fill="#888">→ ...</text>
  </g>
  <text x="132" y="230" font-size="9" fill="#b85450" font-weight="bold">tail ↑</text>

  <!-- ===== Rule ===== -->
  <rect x="30" y="248" width="460" height="44" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="268" font-family="monospace" font-size="10" fill="#446688">if (p1.val ≤ p2.val): tail.next = p1; p1 = p1.next</text>
  <text x="44" y="284" font-family="monospace" font-size="10" fill="#4a7a3a">else:               tail.next = p2; p2 = p2.next</text>

  <!-- ===== Dummy benefit ===== -->
  <rect x="30" y="304" width="460" height="44" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="260" y="324" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">哑节点的好处：头节点处理与后续统一，无需 if(head==null) 特判</text>
  <text x="260" y="340" text-anchor="middle" font-size="10" fill="#555">返回 dummy.next 即真正的头；dummy 本身是局部变量，不算结果</text>
</svg>
