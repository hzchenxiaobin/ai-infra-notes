<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="580" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text x="290" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">示例演算：s = "abcabcbb"，求最长无重复字符子串</text>

  <text x="40" y="52" font-size="11" fill="#888">下标:</text>
  <text x="120" y="52" font-size="11" fill="#888" font-weight="bold">0</text>
  <text x="170" y="52" font-size="11" fill="#888" font-weight="bold">1</text>
  <text x="220" y="52" font-size="11" fill="#888" font-weight="bold">2</text>
  <text x="270" y="52" font-size="11" fill="#888" font-weight="bold">3</text>
  <text x="320" y="52" font-size="11" fill="#888" font-weight="bold">4</text>
  <text x="370" y="52" font-size="11" fill="#888" font-weight="bold">5</text>
  <text x="420" y="52" font-size="11" fill="#888" font-weight="bold">6</text>
  <text x="470" y="52" font-size="11" fill="#888" font-weight="bold">7</text>

  <!-- char cells -->
  <rect x="100" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="122" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">a</text>
  <rect x="146" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="168" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">b</text>
  <rect x="192" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="214" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">c</text>
  <rect x="238" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="260" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">a</text>
  <rect x="284" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="306" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">b</text>
  <rect x="330" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="352" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">c</text>
  <rect x="376" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="398" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">b</text>
  <rect x="422" y="58" width="44" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="444" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">b</text>

  <!-- Steps table -->
  <text x="40" y="118" font-size="12" fill="#444" font-weight="bold">步骤</text>
  <text x="100" y="118" font-size="12" fill="#444" font-weight="bold">right</text>
  <text x="170" y="118" font-size="12" fill="#444" font-weight="bold">字符</text>
  <text x="230" y="118" font-size="12" fill="#444" font-weight="bold">动作</text>
  <text x="410" y="118" font-size="12" fill="#444" font-weight="bold">窗口</text>
  <text x="500" y="118" font-size="12" fill="#444" font-weight="bold">max</text>

  <line x1="30" y1="124" x2="550" y2="124" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step rows -->
  <!-- 1 -->
  <text x="40" y="144" font-size="11" fill="#333">1</text>
  <text x="100" y="144" font-size="11" fill="#333">0</text>
  <text x="170" y="144" font-size="11" fill="#333" font-weight="bold">a</text>
  <text x="230" y="144" font-size="11" fill="#82b366">加入，无重复</text>
  <text x="410" y="144" font-size="11" fill="#4a7a3a" font-weight="bold">[a]</text>
  <text x="500" y="144" font-size="11" fill="#333" font-weight="bold">1</text>

  <!-- 2 -->
  <text x="40" y="166" font-size="11" fill="#333">2</text>
  <text x="100" y="166" font-size="11" fill="#333">1</text>
  <text x="170" y="166" font-size="11" fill="#333" font-weight="bold">b</text>
  <text x="230" y="166" font-size="11" fill="#82b366">加入，无重复</text>
  <text x="410" y="166" font-size="11" fill="#4a7a3a" font-weight="bold">[a,b]</text>
  <text x="500" y="166" font-size="11" fill="#333" font-weight="bold">2</text>

  <!-- 3 -->
  <text x="40" y="188" font-size="11" fill="#333">3</text>
  <text x="100" y="188" font-size="11" fill="#333">2</text>
  <text x="170" y="188" font-size="11" fill="#333" font-weight="bold">c</text>
  <text x="230" y="188" font-size="11" fill="#82b366">加入，无重复</text>
  <text x="410" y="188" font-size="11" fill="#4a7a3a" font-weight="bold">[a,b,c]</text>
  <text x="500" y="188" font-size="11" fill="#333" font-weight="bold">3 ⭐</text>

  <!-- 4 -->
  <text x="40" y="210" font-size="11" fill="#333">4</text>
  <text x="100" y="210" font-size="11" fill="#333">3</text>
  <text x="170" y="210" font-size="11" fill="#333" font-weight="bold">a</text>
  <text x="230" y="210" font-size="11" fill="#b85450">重复! left→1</text>
  <text x="410" y="210" font-size="11" fill="#d6a040" font-weight="bold">[b,c,a]</text>
  <text x="500" y="210" font-size="11" fill="#333">3</text>

  <!-- 5 -->
  <text x="40" y="232" font-size="11" fill="#333">5</text>
  <text x="100" y="232" font-size="11" fill="#333">4</text>
  <text x="170" y="232" font-size="11" fill="#333" font-weight="bold">b</text>
  <text x="230" y="232" font-size="11" fill="#b85450">重复! left→2</text>
  <text x="410" y="232" font-size="11" fill="#d6a040" font-weight="bold">[c,a,b]</text>
  <text x="500" y="232" font-size="11" fill="#333">3</text>

  <!-- 6 -->
  <text x="40" y="254" font-size="11" fill="#333">6</text>
  <text x="100" y="254" font-size="11" fill="#333">5</text>
  <text x="170" y="254" font-size="11" fill="#333" font-weight="bold">c</text>
  <text x="230" y="254" font-size="11" fill="#b85450">重复! left→3</text>
  <text x="410" y="254" font-size="11" fill="#d6a040" font-weight="bold">[a,b,c]</text>
  <text x="500" y="254" font-size="11" fill="#333">3</text>

  <!-- 7 -->
  <text x="40" y="276" font-size="11" fill="#333">7</text>
  <text x="100" y="276" font-size="11" fill="#333">6</text>
  <text x="170" y="276" font-size="11" fill="#333" font-weight="bold">b</text>
  <text x="230" y="276" font-size="11" fill="#b85450">重复! left→5</text>
  <text x="410" y="276" font-size="11" fill="#d6a040" font-weight="bold">[c,b]</text>
  <text x="500" y="276" font-size="11" fill="#333">3</text>

  <!-- 8 -->
  <text x="40" y="298" font-size="11" fill="#333">8</text>
  <text x="100" y="298" font-size="11" fill="#333">7</text>
  <text x="170" y="298" font-size="11" fill="#333" font-weight="bold">b</text>
  <text x="230" y="298" font-size="11" fill="#b85450">重复! left→7</text>
  <text x="410" y="298" font-size="11" fill="#d6a040" font-weight="bold">[b]</text>
  <text x="500" y="298" font-size="11" fill="#333">3</text>

  <!-- result box -->
  <rect x="60" y="330" width="460" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="290" y="352" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">答案 = 3，最长子串 "abc"（下标 0-2 或 3-5）</text>
  <text x="290" y="372" text-anchor="middle" font-size="11" fill="#888">注意 left 只增不减，right 只增不减 → 整体 O(n)</text>

  <!-- legend -->
  <rect x="60" y="404" width="14" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="2" filter="url(#rough2)"/>
  <text x="80" y="415" font-size="11" fill="#555">无重复加入</text>
  <rect x="170" y="404" width="14" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="2" filter="url(#rough2)"/>
  <text x="190" y="415" font-size="11" fill="#555">重复收缩 left</text>
  <rect x="290" y="404" width="14" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="2" filter="url(#rough2)"/>
  <text x="310" y="415" font-size="11" fill="#555">结果</text>
  <text x="400" y="415" font-size="11" fill="#888">⭐ = 当前全局最大</text>
</svg>
