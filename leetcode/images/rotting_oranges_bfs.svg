<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="560" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">腐烂的橘子：多源 BFS 逐层传播</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Grid evolution ===== -->
  <text x="440" y="62" text-anchor="middle" font-size="11" fill="#888">每分钟腐烂的橘子向四周传播一层（BFS frontier 扩展）</text>

  <!-- t=0 -->
  <text x="120" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#888">t = 0（初始）</text>
  <g font-size="13">
    <g filter="url(#sk)">
      <rect x="60" y="100" width="40" height="40" fill="#fce4ec" stroke="#b85450"/><text x="80" y="125" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
      <rect x="100" y="100" width="40" height="40" fill="#eaf6ee" stroke="#4a8e4a"/><text x="120" y="125" text-anchor="middle" fill="#2e6e2e">1</text>
      <rect x="140" y="100" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="160" y="125" text-anchor="middle" fill="#888">0</text>
      <rect x="60" y="140" width="40" height="40" fill="#eaf6ee" stroke="#4a8e4a"/><text x="80" y="165" text-anchor="middle" fill="#2e6e2e">1</text>
      <rect x="100" y="140" width="40" height="40" fill="#fce4ec" stroke="#b85450"/><text x="120" y="165" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
      <rect x="140" y="140" width="40" height="40" fill="#eaf6ee" stroke="#4a8e4a"/><text x="160" y="165" text-anchor="middle" fill="#2e6e2e">1</text>
      <rect x="60" y="180" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="80" y="205" text-anchor="middle" fill="#888">0</text>
      <rect x="100" y="180" width="40" height="40" fill="#eaf6ee" stroke="#4a8e4a"/><text x="120" y="205" text-anchor="middle" fill="#2e6e2e">1</text>
      <rect x="140" y="180" width="40" height="40" fill="#fce4ec" stroke="#b85450"/><text x="160" y="205" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
    </g>
  </g>
  <text x="120" y="244" text-anchor="middle" font-size="9" fill="#888">2=腐烂(源) 1=新鲜 0=空</text>

  <!-- arrow -->
  <path d="M 200 160 L 260 160" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- t=1 -->
  <text x="320" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#c98a2b">t = 1</text>
  <g font-size="13">
    <g filter="url(#sk)">
      <rect x="260" y="100" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="280" y="125" text-anchor="middle" fill="#7a5415" font-weight="bold">2</text>
      <rect x="300" y="100" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="320" y="125" text-anchor="middle" fill="#7a5415" font-weight="bold">2</text>
      <rect x="340" y="100" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="360" y="125" text-anchor="middle" fill="#888">0</text>
      <rect x="260" y="140" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="280" y="165" text-anchor="middle" fill="#7a5415" font-weight="bold">2</text>
      <rect x="300" y="140" width="40" height="40" fill="#fce4ec" stroke="#b85450"/><text x="320" y="165" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
      <rect x="340" y="140" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="360" y="165" text-anchor="middle" fill="#7a5415" font-weight="bold">2</text>
      <rect x="260" y="180" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="80" y="205" text-anchor="middle" fill="#888">0</text>
      <rect x="300" y="180" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="320" y="205" text-anchor="middle" fill="#7a5415" font-weight="bold">2</text>
      <rect x="340" y="180" width="40" height="40" fill="#fce4ec" stroke="#b85450"/><text x="360" y="205" text-anchor="middle" fill="#b03a3a" font-weight="bold">2</text>
    </g>
  </g>
  <text x="320" y="244" text-anchor="middle" font-size="9" fill="#c98a2b">4 邻居被感染</text>

  <path d="M 400 160 L 460 160" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- t=2 (done) -->
  <text x="520" y="92" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">t = 2（完成）</text>
  <g font-size="13">
    <g filter="url(#sk)">
      <rect x="460" y="100" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="480" y="125" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="500" y="100" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="520" y="125" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="540" y="100" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="560" y="125" text-anchor="middle" fill="#888">0</text>
      <rect x="460" y="140" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="480" y="165" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="500" y="140" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="520" y="165" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="540" y="140" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="560" y="165" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="460" y="180" width="40" height="40" fill="#fff" stroke="#bbb"/><text x="480" y="205" text-anchor="middle" fill="#888">0</text>
      <rect x="500" y="180" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="520" y="205" text-anchor="middle" fill="#7a5415">2</text>
      <rect x="540" y="180" width="40" height="40" fill="#fef6e6" stroke="#c98a2b"/><text x="560" y="205" text-anchor="middle" fill="#7a5415">2</text>
    </g>
  </g>
  <text x="520" y="244" text-anchor="middle" font-size="9" fill="#2e6e2e">全部腐烂，答案 = 2</text>

  <!-- ===== BFS queue illustration ===== -->
  <g filter="url(#sk)">
    <rect x="620" y="92" width="240" height="160" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="740" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">BFS 队列演化</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <text x="636" y="134">init:  [(0,0), (1,1), (2,2)]</text>
    <text x="636" y="150" fill="#888">       ← 多源同时入队</text>
    <text x="636" y="172">t=1:  pop 3 源 → push 4 邻居</text>
    <text x="636" y="194">t=2:  pop 4 → push 0（无新鲜）</text>
    <text x="636" y="216">queue 空 → 结束</text>
    <text x="636" y="238" fill="#b03a3a" font-weight="bold">层数 = 经过的分钟数</text>
  </g>

  <!-- ===== Bottom: analogy with continuous batching ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="280" width="800" height="260" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="5 3"/>
  </g>
  <text x="460" y="306" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">多源 BFS ↔ Continuous Batching 的同构</text>

  <g font-size="11" fill="#444">
    <text x="80" y="334"><tspan font-weight="bold" fill="#b85450">多源 BFS</tspan></text>
    <text x="80" y="354">· 初始：多个腐烂橘子同时入队（多源）</text>
    <text x="80" y="372">· 每轮：frontier 中所有橘子同时感染邻居</text>
    <text x="80" y="390">· 层数 = 所有橘子腐烂所需分钟数</text>
    <text x="80" y="408">· 新感染的橘子加入下一轮 frontier</text>

    <text x="500" y="334"><tspan font-weight="bold" fill="#4a8edb">Continuous Batching</tspan></text>
    <text x="500" y="354">· 初始：多个请求同时 submit 入队</text>
    <text x="500" y="372">· 每轮：RUNNING 中的请求同时 forward 一步</text>
    <text x="500" y="390">· 迭代数 = 所有请求完成的总步数</text>
    <text x="500" y="408">· 新请求每轮可加入 batch（如 R3 在 iter2 加入）</text>
  </g>

  <g filter="url(#sk)">
    <rect x="80" y="430" width="760" height="90" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <g font-size="11" fill="#444">
    <text x="100" y="454"><tspan font-weight="bold" fill="#2e6e2e">共同模式</tspan>：多源 + 逐层扩展 + frontier 动态更新</text>
    <text x="100" y="476">BFS：frontier = 本轮新腐烂的橘子，下一轮从它们继续扩散</text>
    <text x="100" y="496">调度：frontier = 本轮 RUNNING 的请求，下一轮完成的退出、新的加入</text>
    <text x="100" y="516"><tspan fill="#b03a3a" font-weight="bold">面试类比</tspan>：画 continuous batching 时间线 = 画多源 BFS 的层级扩展图</text>
  </g>
</svg>
