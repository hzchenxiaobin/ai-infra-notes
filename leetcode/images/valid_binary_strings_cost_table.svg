  <text x="220" y="195" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">1</text>
  <rect x="280" y="175" width="100" height="30" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="330" y="195" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">1</text>
  <rect x="390" y="175" width="100" height="30" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="440" y="195" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">✓</text>
  <rect x="60" y="215" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">001</text>
  <rect x="170" y="215" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="220" y="235" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">2</text>
  <rect x="280" y="215" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="330" y="235" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">2</text>
  <rect x="390" y="215" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="440" y="235" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">✗</text>
  <rect x="60" y="255" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
