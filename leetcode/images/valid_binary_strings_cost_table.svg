  <text x="330" y="155" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">0</text>
  <rect x="390" y="135" width="100" height="30" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="440" y="155" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">✓</text>
  <rect x="60" y="175" width="100" height="30" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="110" y="195" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">010</text>
