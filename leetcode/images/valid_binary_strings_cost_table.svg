  <rect x="170" y="255" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="220" y="275" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">0,2</text>
  <rect x="280" y="255" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="330" y="275" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">2</text>
  <rect x="390" y="255" width="100" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="440" y="275" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">✗</text>
  <text x="260" y="330" text-anchor="middle" font-size="14" fill="#555" filter="url(#rough2)">k=1 时，绿色行即为答案：000、100、010</text>

</svg>