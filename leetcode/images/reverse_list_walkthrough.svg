<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#446688"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#b85450"/>
    </marker>
  </defs>

  <rect width="600" height="480" fill="#fafafa"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">示例演算：1→2→3→4→5 逐轮迭代反转</text>

  <!-- helper: each node = rect 46x30 -->

  <!-- Step 0: initial -->
  <text x="30" y="58" font-size="12" fill="#444" font-weight="bold">初始</text>
  <text x="30" y="74" font-size="10" fill="#888">prev=∅</text>
  <text x="30" y="88" font-size="10" fill="#888">curr=节点1</text>
  <!-- prev marker -->
  <rect x="80" y="44" width="40" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="100" y="58" text-anchor="middle" font-size="9" fill="#333">prev</text>
  <text x="100" y="40" text-anchor="middle" font-size="9" fill="#d6a040">∅</text>
  <!-- curr -->
  <rect x="120" y="44" width="40" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="140" y="58" text-anchor="middle" font-size="9" fill="#333">curr</text>
  <path d="M 140 64 L 143 76" stroke="#b85450" stroke-width="1" fill="none" filter="url(#rough2)"/>

  <rect x="120" y="78" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="143" y="98" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <line x1="166" y1="93" x2="190" y2="93" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="194" y="78" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="217" y="98" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="240" y1="93" x2="264" y2="93" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="268" y="78" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="291" y="98" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <line x1="314" y1="93" x2="338" y2="93" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="342" y="78" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="365" y="98" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <line x1="388" y1="93" x2="412" y2="93" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="416" y="78" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="439" y="98" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="462" y1="93" x2="486" y2="93" stroke="#446688" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="498" y="98" font-size="11" fill="#888">∅</text>

  <line x1="20" y1="118" x2="560" y2="118" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step 1: after processing node 1 -->
  <text x="30" y="148" font-size="12" fill="#444" font-weight="bold">第1轮后</text>
  <text x="30" y="164" font-size="10" fill="#888">prev=节点1</text>
  <text x="30" y="178" font-size="10" fill="#888">curr=节点2</text>

  <rect x="120" y="168" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="143" y="188" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <line x1="120" y1="183" x2="100" y2="183" stroke="#4a7a3a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <text x="78" y="187" font-size="10" fill="#888">∅</text>
  <rect x="194" y="168" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="217" y="188" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="240" y1="183" x2="264" y2="183" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="268" y="168" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="291" y="188" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <line x1="314" y1="183" x2="338" y2="183" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="342" y="168" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="365" y="188" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <line x1="388" y1="183" x2="412" y2="183" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="416" y="168" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="439" y="188" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="462" y1="183" x2="486" y2="183" stroke="#446688" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="498" y="188" font-size="11" fill="#888">∅</text>
  <!-- pointers -->
  <rect x="118" y="148" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="138" y="161" text-anchor="middle" font-size="8" fill="#333">prev</text>
  <rect x="192" y="148" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="212" y="161" text-anchor="middle" font-size="8" fill="#333">curr</text>

  <line x1="20" y1="208" x2="560" y2="208" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step 2: after node 2 -->
  <text x="30" y="238" font-size="12" fill="#444" font-weight="bold">第2轮后</text>
  <text x="30" y="254" font-size="10" fill="#888">prev=节点2</text>
  <text x="30" y="268" font-size="10" fill="#888">curr=节点3</text>

  <rect x="120" y="258" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="143" y="278" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <rect x="194" y="258" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="217" y="278" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="194" y1="273" x2="170" y2="273" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="268" y="258" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="291" y="278" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <line x1="314" y1="273" x2="338" y2="273" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="342" y="258" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="365" y="278" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <line x1="388" y1="273" x2="412" y2="273" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="416" y="258" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="439" y="278" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="462" y1="273" x2="486" y2="273" stroke="#446688" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="498" y="278" font-size="11" fill="#888">∅</text>
  <rect x="192" y="238" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="212" y="251" text-anchor="middle" font-size="8" fill="#333">prev</text>
  <rect x="266" y="238" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="286" y="251" text-anchor="middle" font-size="8" fill="#333">curr</text>

  <line x1="20" y1="298" x2="560" y2="298" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step 3: after node 3 -->
  <text x="30" y="328" font-size="12" fill="#444" font-weight="bold">第3轮后</text>
  <text x="30" y="344" font-size="10" fill="#888">prev=节点3</text>
  <text x="30" y="358" font-size="10" fill="#888">curr=节点4</text>

  <rect x="120" y="348" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="143" y="368" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <rect x="194" y="348" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="217" y="368" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="194" y1="363" x2="170" y2="363" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="268" y="348" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="291" y="368" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <line x1="268" y1="363" x2="244" y2="363" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="342" y="348" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="365" y="368" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <line x1="388" y1="363" x2="412" y2="363" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="416" y="348" width="46" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="5" filter="url(#rough2)"/>
  <text x="439" y="368" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="462" y1="363" x2="486" y2="363" stroke="#446688" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="498" y="368" font-size="11" fill="#888">∅</text>
  <rect x="266" y="328" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="286" y="341" text-anchor="middle" font-size="8" fill="#333">prev</text>
  <rect x="340" y="328" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="360" y="341" text-anchor="middle" font-size="8" fill="#333">curr</text>

  <line x1="20" y1="388" x2="560" y2="388" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- Final: fully reversed -->
  <text x="30" y="418" font-size="12" fill="#444" font-weight="bold">完成 ⭐</text>
  <text x="30" y="434" font-size="10" fill="#888">prev=节点5</text>
  <text x="30" y="448" font-size="10" fill="#888">curr=∅ → 返回prev</text>

  <text x="498" y="418" font-size="10" fill="#888">∅ ←</text>
  <rect x="416" y="424" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="439" y="444" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="416" y1="439" x2="392" y2="439" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="342" y="424" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="365" y="444" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <line x1="342" y1="439" x2="318" y2="439" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="268" y="424" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="291" y="444" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <line x1="268" y1="439" x2="244" y2="439" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="194" y="424" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="217" y="444" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">2</text>
  <line x1="194" y1="439" x2="170" y2="439" stroke="#4a7a3a" stroke-width="1.5" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <rect x="120" y="424" width="46" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="143" y="444" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <rect x="416" y="404" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="436" y="417" text-anchor="middle" font-size="8" fill="#333">prev</text>
</svg>
