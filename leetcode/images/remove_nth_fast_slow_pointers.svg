<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">删除倒数第 N 个节点：快慢双指针制造间距</text>
  <path d="M 290 40 Q 450 48 610 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="450" y="66" text-anchor="middle" font-size="12" fill="#666">head = 1 → 2 → 3 → 4 → 5, n = 2（删除倒数第 2 个 = 节点 4）</text>

  <!-- Phase 1: fast 先走 n=2 步 -->
  <text x="60" y="96" font-size="13" font-weight="bold" fill="#2b6e9e">① fast 先走 n=2 步，制造间距</text>

  <!-- linked list with dummy -->
  <g filter="url(#sk)"><rect x="40" y="112" width="50" height="40" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/></g>
  <text x="65" y="136" text-anchor="middle" font-size="11" fill="#888">dummy</text>

  <g filter="url(#sk)"><rect x="130" y="112" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="160" y="136" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold">1</text>

  <g filter="url(#sk)"><rect x="240" y="112" width="60" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="270" y="136" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">2</text>

  <g filter="url(#sk)"><rect x="350" y="112" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="380" y="136" text-anchor="middle" font-size="13" fill="#444">3</text>

  <g filter="url(#sk)"><rect x="460" y="112" width="60" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="490" y="136" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">4</text>

  <g filter="url(#sk)"><rect x="570" y="112" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="600" y="136" text-anchor="middle" font-size="13" fill="#444">5</text>

  <text x="690" y="136" font-size="11" fill="#888">→ null</text>

  <!-- arrows -->
  <path d="M 90 132 L 126 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 190 132 L 236 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 300 132 L 346 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 410 132 L 456 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 520 132 L 566 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 630 132 L 676 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- pointer labels after phase 1 -->
  <text x="65" y="172" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">slow</text>
  <path d="M 65 176 L 65 112" stroke="#7a5415" stroke-width="1" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>
  <text x="270" y="172" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">fast（走了 2 步）</text>
  <path d="M 270 176 L 270 152" stroke="#2e6e2e" stroke-width="1" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>

  <text x="700" y="172" font-size="10" fill="#888">间距 = 2 条边</text>

  <!-- Phase 2: 同速推进 -->
  <text x="60" y="210" font-size="13" font-weight="bold" fill="#7a5415">② 同速推进，直到 fast.next == null</text>

  <!-- second linked list -->
  <g filter="url(#sk)"><rect x="40" y="226" width="50" height="40" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/></g>
  <text x="65" y="250" text-anchor="middle" font-size="11" fill="#888">dummy</text>

  <g filter="url(#sk)"><rect x="130" y="226" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="160" y="250" text-anchor="middle" font-size="13" fill="#444">1</text>
  <g filter="url(#sk)"><rect x="240" y="226" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="270" y="250" text-anchor="middle" font-size="13" fill="#444">2</text>
  <g filter="url(#sk)"><rect x="350" y="226" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="380" y="250" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold">3</text>
  <g filter="url(#sk)"><rect x="460" y="226" width="60" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="490" y="250" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">4</text>
  <g filter="url(#sk)"><rect x="570" y="226" width="60" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="600" y="250" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">5</text>
  <text x="690" y="250" font-size="11" fill="#888">→ null</text>

  <path d="M 90 246 L 126 246" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 190 246 L 236 246" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 300 246 L 346 246" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 410 246 L 456 246" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 520 246 L 566 246" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <text x="380" y="286" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">slow</text>
  <path d="M 380 282 L 380 266" stroke="#2b6e9e" stroke-width="1" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>
  <text x="600" y="286" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">fast（fast.next=null, 停止）</text>
  <path d="M 600 282 L 600 266" stroke="#2e6e2e" stroke-width="1" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>

  <!-- Phase 3: delete -->
  <text x="60" y="320" font-size="13" font-weight="bold" fill="#b85450">③ slow.next = slow.next.next（删除节点 4）</text>

  <!-- result linked list -->
  <g filter="url(#sk)"><rect x="40" y="336" width="50" height="40" rx="4" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.2"/></g>
  <text x="65" y="360" text-anchor="middle" font-size="11" fill="#888">dummy</text>
  <g filter="url(#sk)"><rect x="130" y="336" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="160" y="360" text-anchor="middle" font-size="13" fill="#444">1</text>
  <g filter="url(#sk)"><rect x="240" y="336" width="60" height="40" rx="4" fill="#fff" stroke="#ddd" stroke-width="1.2"/></g>
  <text x="270" y="360" text-anchor="middle" font-size="13" fill="#444">2</text>
  <g filter="url(#sk)"><rect x="350" y="336" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="380" y="360" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold">3</text>
  <g filter="url(#sk)"><rect x="460" y="336" width="60" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="490" y="360" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">5</text>
  <text x="550" y="360" font-size="11" fill="#888">→ null</text>

  <path d="M 90 352 L 126 352" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 190 352 L 236 352" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 300 352 L 346 352" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- skip arrow from 3 to 5 -->
  <path d="M 410 348 Q 435 330 456 348" stroke="#b85450" stroke-width="1.6" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="433" y="326" text-anchor="middle" font-size="9" fill="#b85450">跳过 4</text>

  <text x="640" y="360" font-size="11" fill="#7a5415" font-weight="bold">结果：1→2→3→5</text>
</svg>
