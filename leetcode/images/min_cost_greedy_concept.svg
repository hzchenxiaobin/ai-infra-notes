<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="127" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">批量操作：算需要几次，等差数列求和</text>
  <path d="M 180 42 Q 340 50 500 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="340" y="62" text-anchor="middle" font-size="12" fill="#444">资源不足时，一次性算出操作次数 x，用等差数列求和计算成本</text>

  <!-- Step 1: compute ops -->
  <g filter="url(#sk)">
    <rect x="40" y="75" width="600" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="60" y="98" font-size="13" font-weight="bold" fill="#2b6e9e">① 计算需要几次操作</text>
  <text x="60" y="118" font-size="12" fill="#444" font-family="monospace">need = nums[i] - cur</text>
  <text x="60" y="132" font-size="12" fill="#444" font-family="monospace">x = ceil(need / k) = (need + k - 1) / k    # 向上取整</text>

  <!-- Step 2: arithmetic sum -->
  <g filter="url(#sk)">
    <rect x="40" y="145" width="600" height="70" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="60" y="168" font-size="13" font-weight="bold" fill="#2e6e2e">② 等差数列求和（成本 = cnt+1, cnt+2, ..., cnt+x）</text>
  <text x="60" y="188" font-size="12" fill="#444" font-family="monospace">cost = x × (2×cnt + x + 1) / 2</text>
  <text x="60" y="206" font-size="11" fill="#888">首项 cnt+1，末项 cnt+x，项数 x，等差数列和 = 项数 × (首+末) / 2</text>

  <!-- Step 3: update -->
  <g filter="url(#sk)">
    <rect x="40" y="225" width="600" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="60" y="248" font-size="13" font-weight="bold" fill="#7a5415">③ 更新状态</text>
  <text x="60" y="266" font-size="12" fill="#444" font-family="monospace">cur += x × k - nums[i];  cnt += x;  ans += cost</text>

  <!-- Greedy insight -->
  <g filter="url(#sk)">
    <rect x="40" y="285" width="600" height="55" rx="8" fill="#f5e0e0" stroke="#b85450" stroke-width="1.2" opacity="0.4"/>
  </g>
  <text x="60" y="307" font-size="12" font-weight="bold" fill="#b03a3a">贪心正确性</text>
  <text x="60" y="325" font-size="11" fill="#444">只在不足时操作（成本递增，推迟最优）；恰好够用（不多操作攒资源，攒的资源成本比未来更高）</text>

  <!-- Complexity -->
  <g filter="url(#sk)">
    <rect x="40" y="350" width="600" height="55" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="372" font-size="12" font-weight="bold" fill="#2b2b2b">复杂度</text>
  <text x="60" y="390" font-size="11" fill="#444">时间 O(n)：每个元素 O(1) 计算（批量而非逐次）。空间 O(1)。</text>
  <text x="60" y="404" font-size="11" fill="#b03a3a">溢出注意：cnt 可达 10^14，cost 计算需分步取模或用 __int128</text>
</svg>
