<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220"
     font-family="'Comic Sans MS','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <filter id="rough2"><feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#446688"/>
    </marker>
  </defs>
  <rect width="520" height="220" fill="#fafafa"/>
  <text x="260" y="30" text-anchor="middle" font-size="16" fill="#333" filter="url(#rough2)">DP：dp[i] 表示前缀 [0, i-1] 的最小成本</text>
  <rect x="60" y="80" width="360" height="50" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="6" filter="url(#rough2)"/>
  <text x="70" y="110" font-size="14" fill="#333" filter="url(#rough2)">已处理前缀</text>
  <rect x="430" y="80" width="60" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="6" filter="url(#rough2)"/>
  <text x="440" y="110" font-size="14" fill="#333" filter="url(#rough2)">区间</text>
  <path d="M420 105 L430 105" fill="none" stroke="#446688" stroke-width="1.5" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="260" y="170" text-anchor="middle" font-size="13" fill="#333" filter="url(#rough2)">dp[r+1] = min(dp[r+1], dp[l] + cost(l,r))</text>
  <text x="260" y="200" text-anchor="middle" font-size="12" fill="#555" filter="url(#rough2)">区间互不重叠，因此从前缀状态转移即可保证合法性</text>
</svg>
