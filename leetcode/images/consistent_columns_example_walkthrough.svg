<svg xmlns="http://www.w3.org/2000/svg" width="860" height="600" viewBox="0 0 860 600" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
  </defs>
  <rect width="860" height="600" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">示例演算：grid=[[1,-1,1],[2,2,2]], limit=1</text>
  <path d="M 250 40 Q 430 48 610 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Grid ===== -->
  <text x="430" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">① 网格（m=2 行，n=3 列）</text>

  <g font-size="13">
    <!-- column labels -->
    <text x="180" y="96" font-size="10" fill="#888" font-weight="bold">列号:</text>
    <text x="260" y="96" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">0</text>
    <text x="440" y="96" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">1</text>
    <text x="620" y="96" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">2</text>

    <!-- row 0 -->
    <text x="180" y="128" font-size="10" fill="#888" font-weight="bold">行0:</text>
    <g filter="url(#sk)"><rect x="200" y="108" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="260" y="134" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>
    <g filter="url(#sk)"><rect x="380" y="108" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="440" y="134" text-anchor="middle" fill="#2b6e9e" font-weight="bold">-1</text>
    <g filter="url(#sk)"><rect x="560" y="108" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="620" y="134" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>

    <!-- row 1 -->
    <text x="180" y="170" font-size="10" fill="#888" font-weight="bold">行1:</text>
    <g filter="url(#sk)"><rect x="200" y="150" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="260" y="176" text-anchor="middle" fill="#2b6e9e" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="380" y="150" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="440" y="176" text-anchor="middle" fill="#2b6e9e" font-weight="bold">2</text>
    <g filter="url(#sk)"><rect x="560" y="150" width="120" height="40" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
    <text x="620" y="176" text-anchor="middle" fill="#2b6e9e" font-weight="bold">2</text>
  </g>

  <!-- ===== Compatibility checks ===== -->
  <text x="430" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3a7a">② 兼容性检查（逐行比较列差值，短路求值）</text>

  <!-- (0,1) not compatible -->
  <g filter="url(#sk)">
    <rect x="60" y="236" width="740" height="42" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="78" y="256" font-size="11" fill="#444" font-family="monospace">(0,1): |grid[0][1] − grid[0][0]| = |−1 − 1| = 2 &gt; 1</text>
  <text x="500" y="256" font-size="12" fill="#b03a3a" font-weight="bold">✗ 不兼容（行0即失败，短路跳过行1）</text>
  <text x="780" y="256" font-size="11" fill="#b03a3a" font-weight="bold">→ dp[1] 不从 0 转移</text>

  <!-- (0,2) compatible -->
  <g filter="url(#sk)">
    <rect x="60" y="286" width="740" height="56" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="78" y="306" font-size="11" fill="#444" font-family="monospace">(0,2): |grid[0][2] − grid[0][0]| = |1 − 1| = 0 ≤ 1  ✓</text>
  <text x="500" y="306" font-size="11" fill="#2e6e2e" font-weight="bold">行0 通过</text>
  <text x="78" y="328" font-size="11" fill="#444" font-family="monospace">       |grid[1][2] − grid[1][0]| = |2 − 2| = 0 ≤ 1  ✓</text>
  <text x="500" y="328" font-size="12" fill="#2e6e2e" font-weight="bold">→ 兼容！dp[2] = dp[0]+1 = 2</text>

  <!-- (1,2) not compatible -->
  <g filter="url(#sk)">
    <rect x="60" y="350" width="740" height="42" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="78" y="370" font-size="11" fill="#444" font-family="monospace">(1,2): |grid[0][2] − grid[0][1]| = |1 − (−1)| = 2 &gt; 1</text>
  <text x="500" y="370" font-size="12" fill="#b03a3a" font-weight="bold">✗ 不兼容</text>
  <text x="780" y="370" font-size="11" fill="#b03a3a" font-weight="bold">→ dp[2] 不从 1 转移</text>

  <!-- ===== DP array ===== -->
  <text x="430" y="424" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">③ DP 填表（按列下标顺序扫描）</text>

  <g font-size="12">
    <!-- column indices -->
    <text x="180" y="450" font-size="10" fill="#888" font-weight="bold">列 b:</text>
    <text x="290" y="450" text-anchor="middle" font-size="11" fill="#888">0</text>
    <text x="450" y="450" text-anchor="middle" font-size="11" fill="#888">1</text>
    <text x="610" y="450" text-anchor="middle" font-size="11" fill="#888">2</text>

    <!-- dp[0]=1 -->
    <g filter="url(#sk)"><rect x="250" y="458" width="80" height="36" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4" rx="4"/></g>
    <text x="290" y="482" text-anchor="middle" fill="#2b6e9e" font-weight="bold">1</text>
    <text x="290" y="508" text-anchor="middle" font-size="8" fill="#888">初值</text>

    <!-- dp[1]=1 -->
    <g filter="url(#sk)"><rect x="410" y="458" width="80" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="4"/></g>
    <text x="450" y="482" text-anchor="middle" fill="#b85450" font-weight="bold">1</text>
    <text x="450" y="508" text-anchor="middle" font-size="8" fill="#b85450">(0,1)✗ 无 a 可转移</text>

    <!-- dp[2]=2 -->
    <g filter="url(#sk)"><rect x="570" y="458" width="80" height="36" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2" rx="4"/></g>
    <text x="610" y="482" text-anchor="middle" fill="#2e6e2e" font-weight="bold">2</text>
    <text x="610" y="508" text-anchor="middle" font-size="8" fill="#2e6e2e">从 dp[0]+1</text>
  </g>

  <!-- arrow dp[0] -> dp[2] -->
  <path d="M 330 476 Q 450 440 568 476" stroke="#4a8e4a" stroke-width="1.4" fill="none" marker-end="url(#arG)" filter="url(#sk)" stroke-dasharray="4 3"/>
  <text x="450" y="438" text-anchor="middle" font-size="9" fill="#2e6e2e">兼容转移 +1</text>

  <!-- ===== Result ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="530" width="740" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="430" y="556" text-anchor="middle" font-size="14" fill="#2e6e2e" font-weight="bold">答案 = max(dp) = 2</text>
  <text x="430" y="576" text-anchor="middle" font-size="10" fill="#555">保留列 {0, 2}：相邻差值均为 0 ≤ limit=1，一致 ✓</text>
</svg>
