<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640"
     font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="900" height="640" fill="#fafafa"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">建模：0/1「首件礼包」+ 最便宜类型「散件」</text>

  <!-- ① 首件礼包 -->
  <text x="70" y="72" font-size="13" font-weight="bold" fill="#2b6e9e">① 每种类型 i ⇒ 一件 0/1 礼包：买首件即解锁 1 + c_i 个物品（示例 1 的三件礼包）</text>

  <rect x="60" y="92" width="190" height="100" rx="10" fill="#e8f0fe" stroke="#446688" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="155" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#446688">礼包 0</text>
  <text x="80" y="144" font-size="12" fill="#333">花费 p₀ = 2</text>
  <text x="80" y="168" font-size="12" font-weight="bold" fill="#b85450">价值 1+c₀ = 1</text>

  <rect x="270" y="92" width="190" height="100" rx="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="365" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7a3a">礼包 1</text>
  <text x="290" y="144" font-size="12" fill="#333">花费 p₁ = 6</text>
  <text x="290" y="168" font-size="12" font-weight="bold" fill="#b85450">价值 1+c₁ = 2</text>

  <rect x="480" y="92" width="190" height="100" rx="10" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="575" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#b08020">礼包 2</text>
  <text x="500" y="144" font-size="12" fill="#333">花费 p₂ = 4</text>
  <text x="500" y="168" font-size="12" font-weight="bold" fill="#b85450">价值 1+c₂ = 2</text>

  <rect x="690" y="92" width="170" height="100" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <text x="775" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">类型 i（通用）</text>
  <text x="708" y="144" font-size="12" fill="#333">花费 p_i</text>
  <text x="708" y="168" font-size="12" fill="#333">价值 1 + c_i（至多一件）</text>

  <!-- ② 散件 -->
  <text x="70" y="232" font-size="13" font-weight="bold" fill="#2e6e2e">② 散件：非首件不再产生免费 ⇒ 全买最便宜类型（价格 p1）不劣，无限供应</text>

  <rect x="70" y="252" width="56" height="56" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="98" y="285" text-anchor="middle" font-size="11" fill="#2e6e2e">散件</text>
  <rect x="146" y="252" width="56" height="56" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="174" y="285" text-anchor="middle" font-size="11" fill="#2e6e2e">散件</text>
  <rect x="222" y="252" width="56" height="56" rx="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="250" y="285" text-anchor="middle" font-size="11" fill="#2e6e2e">散件</text>
  <text x="300" y="285" font-size="18" font-weight="bold" fill="#4a7a3a">··· 无限</text>

  <text x="420" y="274" font-size="12" fill="#333">每件：花费 p1（全场最低价），价值 1</text>
  <text x="420" y="296" font-size="12" fill="#888">示例 1：p1 = 2（类型 0 最便宜）；示例 2：p1 = 1（类型 2）</text>

  <!-- ③ budget 横条 -->
  <text x="70" y="348" font-size="13" font-weight="bold" fill="#7a5415">③ budget 横条：礼包花费 + 散件填充（示例 1，budget = 9，1 格 = 1 元）</text>

  <text x="340" y="366" text-anchor="middle" font-size="11" fill="#446688">Σ p_i（i∈S）= 6</text>
  <path d="M 100 378 L 100 372 L 580 372 L 580 378" stroke="#446688" stroke-width="1.4" fill="none" filter="url(#rough2)"/>
  <text x="660" y="366" text-anchor="middle" font-size="11" fill="#4a7a3a">k·p1 = 2</text>
  <path d="M 580 378 L 580 372 L 740 372 L 740 378" stroke="#4a7a3a" stroke-width="1.4" fill="none" filter="url(#rough2)"/>

  <rect x="100" y="384" width="160" height="38" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="180" y="408" text-anchor="middle" font-size="12" fill="#446688">礼包 0（2 元）</text>
  <rect x="260" y="384" width="320" height="38" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="420" y="408" text-anchor="middle" font-size="12" fill="#446688">礼包 2（4 元）</text>
  <rect x="580" y="384" width="160" height="38" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="660" y="408" text-anchor="middle" font-size="12" fill="#2e6e2e">散件 ×1（2 元）</text>
  <rect x="740" y="384" width="80" height="38" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="1.2" stroke-dasharray="4 3" filter="url(#rough2)"/>
  <text x="780" y="408" text-anchor="middle" font-size="11" fill="#999">剩 1 元</text>

  <text x="100" y="452" font-size="12" fill="#333">总花费 8 ≤ 9；物品总数 = (1+0) + (1+1) + 1 = 4 ✓（购买 3 件 + 免费 1 件）</text>

  <!-- ④ DP 定义 -->
  <rect x="70" y="478" width="760" height="118" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="92" y="504" font-size="13" font-weight="bold" fill="#2b6e9e">④ dp[b] = 恰好花费 b 能获得的最大物品数（不可达 = −∞，dp[0] = 0）</text>
  <text x="92" y="528" font-size="12" fill="#444" font-family="monospace">阶段 1：0/1 背包（b 逆序） dp[b] = max(dp[b], dp[b−p_i] + 1 + c_i)</text>
  <text x="92" y="550" font-size="12" fill="#444" font-family="monospace">阶段 2：完全背包（b 正序） dp[b] = max(dp[b], dp[b−p1] + 1)</text>
  <text x="92" y="574" font-size="12" fill="#b85450" font-weight="bold">答案 = max(dp[0..budget])（允许花不满，剩余钱闲置）</text>
</svg>
