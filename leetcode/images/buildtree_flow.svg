<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">分治构造：递归流程</text>

  <!-- 入口 -->
  <rect x="170" y="50" width="240" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" fill="#333">预建 idx 哈希；全局 preIdx = 0</text>

  <path d="M 290 84 L 290 100" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- build(inL, inR) -->
  <rect x="200" y="104" width="180" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="126" text-anchor="middle" font-size="12" fill="#333">build(inL, inR)</text>

  <path d="M 290 138 L 290 154" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 判空 -->
  <polygon points="290,156 410,198 290,240 170,198" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="290" y="194" text-anchor="middle" font-size="12" fill="#333">inL &gt; inR ?</text>
  <text x="290" y="212" text-anchor="middle" font-size="11" fill="#888">区间为空</text>

  <path d="M 410 198 L 470 198 L 470 144" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="432" y="190" font-size="10" fill="#b85450">是</text>
  <rect x="410" y="128" width="120" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="470" y="149" text-anchor="middle" font-size="12" fill="#888">返回 null</text>

  <path d="M 290 240 L 290 258" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="254" font-size="10" fill="#82b366">否</text>

  <!-- 取根 -->
  <rect x="170" y="262" width="240" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="6" filter="url(#rough2)"/>
  <text x="290" y="284" text-anchor="middle" font-size="11" fill="#333">rootVal = preorder[preIdx++]；建节点 root</text>

  <path d="M 290 296 L 290 310" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 查mid -->
  <rect x="190" y="314" width="200" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="290" y="334" text-anchor="middle" font-size="11" fill="#333">mid = idx[rootVal]  (O(1))</text>

  <!-- 左右递归 -->
  <rect x="80" y="354" width="170" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="165" y="374" text-anchor="middle" font-size="11" fill="#333">root.left = build(inL, mid-1)</text>

  <rect x="330" y="354" width="180" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="420" y="374" text-anchor="middle" font-size="11" fill="#333">root.right = build(mid+1, inR)</text>

  <text x="290" y="394" text-anchor="middle" font-size="11" fill="#888">必须先递归左再递归右，前序指针才能按序取根</text>
</svg>
