<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#999"/>
    </marker>
  </defs>
  <rect width="960" height="660" fill="#fafafa"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">槽位模型与阈值贪心</text>
  <path d="M 340 42 Q 480 50 620 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Panel 1: slot decomposition ===== -->
  <text x="480" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#446688">① 每个类型 = c_i 个双倍槽（花 p_i 得 2 件）＋ ∞ 个单倍槽（花 p_i 得 1 件）</text>

  <g filter="url(#sk)"><rect x="70" y="96" width="140" height="64" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6"/></g>
  <text x="140" y="122" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">类型 i</text>
  <text x="140" y="144" text-anchor="middle" font-size="11" fill="#446688">价格 p_i</text>

  <path d="M 214 128 L 270 128" stroke="#999" stroke-width="1.4" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="280" y="96" width="60" height="60" rx="4" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/></g>
  <text x="310" y="132" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">2 件</text>
  <g filter="url(#sk)"><rect x="352" y="96" width="60" height="60" rx="4" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/></g>
  <text x="382" y="132" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">2 件</text>
  <text x="346" y="180" text-anchor="middle" font-size="10" fill="#7a5415">双倍槽：花 p_i 得 2 件，共 c_i 个</text>

  <text x="448" y="134" text-anchor="middle" font-size="18" fill="#666">＋</text>

  <g filter="url(#sk)"><rect x="486" y="100" width="52" height="52" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="512" y="131" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">1 件</text>
  <g filter="url(#sk)"><rect x="550" y="100" width="52" height="52" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="576" y="131" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">1 件</text>
  <text x="648" y="133" text-anchor="middle" font-size="16" fill="#4a7a3a" font-weight="bold">… ∞</text>
  <text x="566" y="180" text-anchor="middle" font-size="10" fill="#4a7a3a">单倍槽：花 p_i 得 1 件，无限个</text>

  <text x="480" y="206" text-anchor="middle" font-size="11" fill="#b85450">★ 单倍件收益恒为 1 件 → 只需买全场最低价 p1 的类型</text>

  <!-- ===== Panel 2: sorted slots + threshold (slots from example 2) ===== -->
  <text x="480" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a7a3a">② 双倍槽按价格升序：p ≤ 2·p1 全拿，p &gt; 2·p1 放弃（槽位取自示例 2）</text>

  <text x="215" y="268" text-anchor="middle" font-size="15" fill="#4a7a3a" font-weight="bold">✓</text>
  <text x="390" y="268" text-anchor="middle" font-size="15" fill="#4a7a3a" font-weight="bold">✓</text>
  <text x="565" y="268" text-anchor="middle" font-size="15" fill="#b85450" font-weight="bold">✗</text>
  <text x="740" y="268" text-anchor="middle" font-size="15" fill="#b85450" font-weight="bold">✗</text>

  <g filter="url(#sk)"><rect x="150" y="276" width="130" height="70" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6"/></g>
  <text x="215" y="302" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">p = 8</text>
  <text x="215" y="324" text-anchor="middle" font-size="10" fill="#4a7a3a">c = 2 槽 · 得 2 件/槽</text>
  <text x="215" y="364" text-anchor="middle" font-size="9" fill="#888">类型 0</text>

  <g filter="url(#sk)"><rect x="325" y="276" width="130" height="70" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6"/></g>
  <text x="390" y="302" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">p = 10</text>
  <text x="390" y="324" text-anchor="middle" font-size="10" fill="#4a7a3a">c = 5 槽 · 得 2 件/槽</text>
  <text x="390" y="364" text-anchor="middle" font-size="9" fill="#888">类型 1</text>

  <g filter="url(#sk)"><rect x="500" y="276" width="130" height="70" rx="4" fill="#f0ede4" stroke="#ccc" stroke-width="1.2" opacity="0.75"/></g>
  <text x="565" y="302" text-anchor="middle" font-size="12" fill="#aaa" font-weight="bold">p = 17</text>
  <text x="565" y="324" text-anchor="middle" font-size="10" fill="#bbb">c = 1 槽 · 得 2 件/槽</text>
  <text x="565" y="364" text-anchor="middle" font-size="9" fill="#aaa">类型 5</text>

  <g filter="url(#sk)"><rect x="675" y="276" width="130" height="70" rx="4" fill="#f0ede4" stroke="#ccc" stroke-width="1.2" opacity="0.75"/></g>
  <text x="740" y="302" text-anchor="middle" font-size="12" fill="#aaa" font-weight="bold">p = 20</text>
  <text x="740" y="324" text-anchor="middle" font-size="10" fill="#bbb">c = 1 槽 · 得 2 件/槽</text>
  <text x="740" y="364" text-anchor="middle" font-size="9" fill="#aaa">类型 4</text>

  <!-- threshold line -->
  <path d="M 477 254 L 477 396" stroke="#b85450" stroke-width="2" stroke-dasharray="7 5" fill="none" filter="url(#sk)"/>
  <text x="477" y="414" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">阈值 2·p1 = 12</text>

  <!-- sort arrow -->
  <path d="M 150 386 L 800 386" stroke="#999" stroke-width="1.3" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="838" y="390" text-anchor="middle" font-size="9" fill="#888">升序</text>

  <text x="480" y="440" text-anchor="middle" font-size="11" fill="#555">线左全拿：p ≤ 2·p1 ⟹ ⌈p/p1⌉ ≤ 2，不亏 ｜ 线右放弃：p &gt; 2·p1，双倍不如单倍</text>

  <!-- ===== Panel 3: leftover budget ===== -->
  <text x="480" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#446688">③ 扫完双倍槽，余钱全部买 p1 价单倍件</text>

  <g filter="url(#sk)"><rect x="120" y="496" width="720" height="70" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="480" y="524" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">单倍件数 = ⌊rem / p1⌋（加入答案）</text>
  <text x="480" y="548" text-anchor="middle" font-size="11" fill="#666">余钱买更贵类型件数只会更少，p1 最优</text>

  <!-- key insight -->
  <g filter="url(#sk)"><rect x="60" y="584" width="840" height="56" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3"/></g>
  <text x="480" y="608" text-anchor="middle" font-size="12" fill="#2b2b2b">贪心核心：拿 p 价双倍槽 = 花 p 元得 2 件，等价于放弃 ⌈p/p1⌉ 个单倍件</text>
  <text x="480" y="628" text-anchor="middle" font-size="11" fill="#666">同价槽顺序无关；每类拿的数量受 c_i 与剩余预算限制，取 min</text>
</svg>
