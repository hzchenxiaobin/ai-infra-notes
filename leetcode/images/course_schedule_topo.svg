<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">课程表：BFS 拓扑排序（入度法）</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- graph -->
  <text x="60" y="76" font-size="12" font-weight="bold" fill="#2b6e9e">有向图（先修依赖）</text>

  <g filter="url(#sk)">
    <circle cx="120" cy="120" r="26" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="120" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">0</text>
  <text x="120" y="162" text-anchor="middle" font-size="10" fill="#888">入度=0</text>

  <g filter="url(#sk)">
    <circle cx="260" cy="120" r="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="260" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="260" y="162" text-anchor="middle" font-size="10" fill="#888">入度=1</text>

  <g filter="url(#sk)">
    <circle cx="400" cy="120" r="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="400" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">2</text>
  <text x="400" y="162" text-anchor="middle" font-size="10" fill="#888">入度=1</text>

  <g filter="url(#sk)">
    <circle cx="540" cy="120" r="26" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="540" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">3</text>
  <text x="540" y="162" text-anchor="middle" font-size="10" fill="#888">入度=2</text>

  <!-- edges: prereq [a,b] means b->a (b 先修) -->
  <path d="M 146 120 L 232 120" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="189" y="112" text-anchor="middle" font-size="9" fill="#666">0→1</text>
  <path d="M 286 120 L 372 120" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="329" y="112" text-anchor="middle" font-size="9" fill="#666">1→2</text>
  <path d="M 426 120 L 512 120" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="469" y="112" text-anchor="middle" font-size="9" fill="#666">2→3</text>
  <path d="M 262 146 Q 400 220 538 146" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="400" y="214" text-anchor="middle" font-size="9" fill="#666">1→3</text>

  <!-- BFS steps -->
  <text x="60" y="248" font-size="12" font-weight="bold" fill="#7a5415">BFS 拓扑排序过程</text>

  <g filter="url(#sk)">
    <rect x="60" y="258" width="700" height="30" rx="6" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="75" y="278" font-size="11" fill="#444">① 入度 0 入队：queue=[0]</text>

  <g filter="url(#sk)">
    <rect x="60" y="292" width="700" height="30" rx="6" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="75" y="312" font-size="11" fill="#444">② 取 0，邻居 1 入度-1→0 入队：queue=[1]，访问=1</text>

  <g filter="url(#sk)">
    <rect x="60" y="326" width="700" height="30" rx="6" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="75" y="346" font-size="11" fill="#444">③ 取 1，邻居 2/3 入度-1，2→0 入队：queue=[2]，访问=2</text>

  <g filter="url(#sk)">
    <rect x="60" y="360" width="700" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="75" y="380" font-size="11" fill="#2e6e2e">④ 取 2，邻居 3 入度-1→0 入队：queue=[3]，访问=3 → 取 3，访问=4=numCourses ✓ 无环</text>
</svg>
