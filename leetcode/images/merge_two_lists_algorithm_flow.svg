<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">迭代流程：dummy + tail 逐个比较拼接</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(m+n)，空间 O(1)；面试首选写法</text>

  <g font-size="10" fill="#333">
    <!-- Step 1 -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="140" y="84" font-family="monospace" font-size="10" fill="#555">ListNode dummy(0); ListNode* tail = &amp;dummy;</text>
    <text x="140" y="100" font-size="9" fill="#888">哑节点 + tail 指针，p1=l1, p2=l2</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2 -->
    <rect x="40" y="128" width="440" height="100" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② 循环比较（while p1 &amp;&amp; p2）</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">while (l1 &amp;&amp; l2) {</text>
    <text x="70" y="182" font-family="monospace" font-size="10" fill="#446688">if (l1->val ≤ l2->val) { tail->next = l1; l1 = l1->next; }</text>
    <text x="70" y="198" font-family="monospace" font-size="10" fill="#4a7a3a">else                  { tail->next = l2; l2 = l2->next; }</text>
    <text x="70" y="214" font-family="monospace" font-size="10" fill="#b85450">tail = tail->next;   // 末尾前进</text>
    <text x="54" y="226" font-family="monospace" font-size="10" fill="#555">}</text>

    <path d="M 260 232 L 260 246" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3 -->
    <rect x="40" y="250" width="440" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="270" font-size="12" fill="#d6a040" font-weight="bold">③ 拼接剩余</text>
    <text x="150" y="270" font-family="monospace" font-size="10" fill="#555">tail->next = (l1) ? l1 : l2;</text>
    <text x="54" y="288" font-size="9" fill="#888">一个链表耗尽后，另一个剩余部分已有序，整体接上即可</text>
    <text x="54" y="302" font-size="9" fill="#888">这是 O(m+n) 而非 O(m·n) 的关键</text>

    <path d="M 260 310 L 260 324" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4 -->
    <rect x="40" y="328" width="440" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="348" font-size="12" fill="#b85450" font-weight="bold">④ 返回</text>
    <text x="110" y="348" font-family="monospace" font-size="10" fill="#555">return dummy.next;   // 真正的头节点</text>
    <text x="110" y="364" font-size="9" fill="#888">dummy 是局部变量，不算结果节点</text>
  </g>

  <!-- complexity -->
  <rect x="40" y="382" width="440" height="14" fill="none" filter="url(#rough2)"/>
  <text x="260" y="394" text-anchor="middle" font-size="10" fill="#888">时间 O(m+n)  ·  空间 O(1)  ·  原地拼接，不新建节点</text>
</svg>
