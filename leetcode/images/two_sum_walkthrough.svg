<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <!-- Title -->
  <text x="320" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">示例演算：nums=[2,7,11,15], target=9 → [0,1]</text>

  <!-- Header -->
  <text x="20" y="56" font-size="11" fill="#444" font-weight="bold">i</text>
  <text x="60" y="56" font-size="11" fill="#444" font-weight="bold">nums[i]</text>
  <text x="150" y="56" font-size="11" fill="#444" font-weight="bold">补数 = target − nums[i]</text>
  <text x="360" y="56" font-size="11" fill="#444" font-weight="bold">查哈希表</text>
  <text x="500" y="56" font-size="11" fill="#444" font-weight="bold">动作 / 结果</text>
  <line x1="10" y1="62" x2="630" y2="62" stroke="#ddd" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step 0 -->
  <text x="20" y="84" font-size="11" fill="#333">0</text>
  <text x="60" y="84" font-size="11" fill="#333" font-weight="bold">2</text>
  <text x="150" y="84" font-size="11" fill="#333">9 − 2 = 7</text>
  <text x="360" y="84" font-size="11" fill="#888">map={} → 不在</text>
  <rect x="495" y="72" width="120" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="5" filter="url(#rough2)"/>
  <text x="555" y="88" text-anchor="middle" font-size="11" fill="#333">存 map[2]=0</text>

  <line x1="10" y1="100" x2="630" y2="100" stroke="#f0f0f0" stroke-width="1" filter="url(#rough2)"/>

  <!-- Step 1: hit -->
  <text x="20" y="124" font-size="11" fill="#333">1</text>
  <text x="60" y="124" font-size="11" fill="#333" font-weight="bold">7</text>
  <text x="150" y="124" font-size="11" fill="#333">9 − 7 = 2</text>
  <text x="360" y="124" font-size="11" fill="#4a7a3a" font-weight="bold">map={2:0} → 命中！</text>
  <rect x="495" y="112" width="120" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="5" filter="url(#rough2)"/>
  <text x="555" y="128" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">返回 [0,1] ⭐</text>

  <line x1="10" y1="140" x2="630" y2="140" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- (would-be) Step 2 -->
  <text x="20" y="164" font-size="11" fill="#888">2</text>
  <text x="60" y="164" font-size="11" fill="#888">11</text>
  <text x="150" y="164" font-size="11" fill="#888">9 − 11 = −2</text>
  <text x="360" y="164" font-size="11" fill="#888">（不会执行，已返回）</text>
  <text x="555" y="164" text-anchor="middle" font-size="11" fill="#888">—</text>

  <!-- HashMap state visualization -->
  <text x="20" y="200" font-size="12" fill="#444" font-weight="bold">哈希表状态变化：</text>

  <!-- after step 0 -->
  <text x="20" y="228" font-size="11" fill="#888">i=0 后：</text>
  <rect x="80" y="216" width="120" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="100" y="234" text-anchor="middle" font-size="11" fill="#333">2 → 0</text>
  <text x="160" y="234" font-size="11" fill="#888">(空)</text>

  <!-- after step 1 -->
  <text x="20" y="262" font-size="11" fill="#888">i=1 时：</text>
  <rect x="80" y="250" width="120" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
  <text x="100" y="268" text-anchor="middle" font-size="11" fill="#333">2 → 0</text>
  <text x="180" y="268" font-size="11" fill="#b85450" font-weight="bold">查 7？无；查 2？有！</text>

  <text x="20" y="296" font-size="11" fill="#888">i=1 补数=2，命中 map[2]=0</text>
  <text x="280" y="296" font-size="11" fill="#4a7a3a" font-weight="bold">→ 返回 [map[2], 1] = [0, 1]</text>

  <!-- why one-pass -->
  <line x1="20" y1="320" x2="620" y2="320" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="20" y="344" font-size="12" fill="#444" font-weight="bold">为什么"边查边存"比"先全存再查"更好？</text>
  <text x="20" y="364" font-size="11" fill="#555">• 先全存：需两遍遍历（存一遍 + 查一遍），且要处理"元素等于补数"的重复下标问题</text>
  <text x="20" y="382" font-size="11" fill="#555">• 边查边存：查的时候表里只有"之前"的元素，天然避免了用自己配自己</text>
  <text x="20" y="400" font-size="11" fill="#555">• 例如 nums=[3,3], target=6：i=0 存{3:0}，i=1 查补数 3 → 命中 map[3]=0，返回 [0,1]</text>

  <!-- result -->
  <rect x="60" y="420" width="520" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="320" y="440" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">答案 [0,1]：nums[0]+nums[1] = 2+7 = 9 = target ✓</text>
</svg>
