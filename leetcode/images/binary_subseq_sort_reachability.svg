<svg xmlns="http://www.w3.org/2000/svg" width="940" height="580" viewBox="0 0 940 580" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b85450"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
  </defs>
  <rect width="940" height="580" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">可达性 = 前缀 1 计数曲线逐点支配 + 总数相等</text>
  <path d="M 230 42 Q 470 50 710 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Left panel: reachable (s="101", t="011") ===== -->
  <text x="240" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">✓ 可达：t 的曲线 ≤ s 的曲线</text>

  <!-- axes -->
  <line x1="80" y1="260" x2="420" y2="260" stroke="#888" stroke-width="1" filter="url(#sk)"/>
  <line x1="80" y1="100" x2="80" y2="260" stroke="#888" stroke-width="1" filter="url(#sk)"/>
  <text x="70" y="104" text-anchor="end" font-size="10" fill="#888">2</text>
  <text x="70" y="184" text-anchor="end" font-size="10" fill="#888">1</text>
  <text x="70" y="264" text-anchor="end" font-size="10" fill="#888">0</text>
  <line x1="78" y1="180" x2="82" y2="180" stroke="#888" stroke-width="1"/>
  <line x1="78" y1="100" x2="82" y2="100" stroke="#888" stroke-width="1"/>

  <!-- x labels 0..2 -->
  <g font-size="10" fill="#888">
    <text x="160" y="276" text-anchor="middle">i=0</text>
    <text x="250" y="276" text-anchor="middle">i=1</text>
    <text x="340" y="276" text-anchor="middle">i=2</text>
  </g>

  <!-- s="101" prefix-ones = [1,1,2] staircase (red) -->
  <path d="M 80 260 L 160 260 L 160 180 L 250 180 L 250 100 L 340 100 L 340 100 L 420 100"
        stroke="#b85450" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <!-- t="011" prefix-ones = [0,1,2] staircase (green) -->
  <path d="M 80 260 L 250 260 L 250 180 L 340 180 L 340 100 L 420 100"
        stroke="#4a8e4a" stroke-width="2.4" fill="none" filter="url(#sk)"/>

  <!-- points -->
  <g filter="url(#sk)"><circle cx="160" cy="180" r="4" fill="#b85450"/></g>
  <g filter="url(#sk)"><circle cx="250" cy="180" r="4" fill="#b85450"/></g>
  <g filter="url(#sk)"><circle cx="340" cy="100" r="4" fill="#b85450"/></g>
  <g filter="url(#sk)"><circle cx="250" cy="180" r="4" fill="#4a8e4a" opacity="0.9"/></g>
  <g filter="url(#sk)"><circle cx="340" cy="100" r="4" fill="#4a8e4a" opacity="0.9"/></g>

  <text x="395" y="115" font-size="10" fill="#b85450" font-weight="bold">s=[1,1,2]</text>
  <text x="395" y="170" font-size="10" fill="#2e6e2e" font-weight="bold">t=[0,1,2]</text>

  <!-- pairing L/R annotation -->
  <g font-size="11">
    <text x="90" y="300" font-size="11" fill="#444">s="101" → t="011"：差异位</text>
    <text x="90" y="318" font-size="11" fill="#b85450" font-weight="bold">L: idx0 (s=1,t=0)</text>
    <text x="90" y="336" font-size="11" fill="#2e6e2e" font-weight="bold">R: idx1 (s=0,t=1)</text>
  </g>
  <!-- arc L(160) -> R(250) at y~295 -->
  <path d="M 160 312 Q 205 290 250 312" stroke="#7a3a7a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="4 2"/>
  <text x="205" y="348" text-anchor="middle" font-size="10" fill="#7a3a7a">配对 (l=0, r=1)，排序 {0,1} "10"→"01"</text>

  <text x="240" y="378" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">总数相等 (2=2) ✓  曲线逐点 ≤ ✓ → 可达</text>

  <!-- ===== Right panel: NOT reachable (s="101", t="110") ===== -->
  <text x="700" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">✗ 不可达：t 曲线在某处越过 s</text>

  <line x1="540" y1="260" x2="880" y2="260" stroke="#888" stroke-width="1" filter="url(#sk)"/>
  <line x1="540" y1="100" x2="540" y2="260" stroke="#888" stroke-width="1" filter="url(#sk)"/>
  <text x="530" y="104" text-anchor="end" font-size="10" fill="#888">2</text>
  <text x="530" y="184" text-anchor="end" font-size="10" fill="#888">1</text>
  <text x="530" y="264" text-anchor="end" font-size="10" fill="#888">0</text>
  <line x1="538" y1="180" x2="542" y2="180" stroke="#888" stroke-width="1"/>
  <line x1="538" y1="100" x2="542" y2="100" stroke="#888" stroke-width="1"/>

  <g font-size="10" fill="#888">
    <text x="620" y="276" text-anchor="middle">i=0</text>
    <text x="710" y="276" text-anchor="middle">i=1</text>
    <text x="800" y="276" text-anchor="middle">i=2</text>
  </g>

  <!-- s="101" [1,1,2] -->
  <path d="M 540 260 L 620 260 L 620 180 L 710 180 L 710 100 L 800 100 L 800 100 L 880 100"
        stroke="#b85450" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <!-- t="110" [1,2,2] -->
  <path d="M 540 260 L 620 260 L 620 180 L 710 180 L 710 100 L 800 100 L 800 100 L 880 100"
        stroke="#7a3a7a" stroke-width="2.4" fill="none" filter="url(#sk)" stroke-dasharray="5 3"/>

  <!-- t curve: [1,2,2] -->
  <path d="M 540 260 L 620 260 L 620 180 L 710 100 L 800 100 L 880 100"
        stroke="#7a3a7a" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <!-- highlight violation at i=1: t=2 > s=1 -->
  <g filter="url(#sk)"><circle cx="710" cy="100" r="5" fill="#b85450"/></g>
  <g filter="url(#sk)"><circle cx="710" cy="180" r="5" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <path d="M 710 180 L 710 100" stroke="#b85450" stroke-width="2.5" fill="none" marker-end="url(#arR)" filter="url(#sk)"/>
  <text x="730" y="140" font-size="11" fill="#b85450" font-weight="bold">越界！</text>
  <text x="730" y="156" font-size="10" fill="#b85450">t[1]=2 &gt; s[1]=1</text>

  <text x="855" y="115" font-size="10" fill="#b85450" font-weight="bold">s=[1,1,2]</text>
  <text x="855" y="130" font-size="10" fill="#7a3a7a" font-weight="bold">t=[1,2,2]</text>

  <text x="700" y="378" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">i=1 处 t 越过 s → 不可达（总数虽相等 2=2）</text>

  <!-- ===== Bottom: general theorem box ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="405" width="820" height="155" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="80" y="431" font-size="13" font-weight="bold" fill="#2e6e2e">定理</text>
  <text x="80" y="456" font-size="13" fill="#444" font-family="monospace">t 可由 s 经若干次「排序子序列」操作得到</text>
  <text x="80" y="478" font-size="13" fill="#b03a3a" font-family="monospace" font-weight="bold">⟺ ones(t[0..i]) ≤ ones(s[0..i])  ∀i ，且 ones(t) = ones(s)</text>
  <text x="80" y="502" font-size="12" fill="#666">几何上：t 的前缀 1 计数阶梯曲线整条落在 s 的曲线下方（可在端点重合）。</text>
  <text x="80" y="524" font-size="12" fill="#666">等价地：zeros(t[0..i]) ≥ zeros(s[0..i]) ∀i —— t 比 s「更靠左地排好了 0」。</text>
  <text x="80" y="546" font-size="12" fill="#7a2828" font-weight="bold">★ 推论：完全排序串（000...111）从任何同组成的 s 都可达；s 自身平凡可达。</text>
</svg>
