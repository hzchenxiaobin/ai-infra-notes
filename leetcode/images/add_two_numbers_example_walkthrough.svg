<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="99" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">示例演算：l1=[9,9,9,9,9,9,9] + l2=[9,9,9,9]</text>
  <path d="M 300 40 Q 460 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="62" text-anchor="middle" font-size="11" fill="#666">9999999 + 9999 = 10009998 → 结果 [8,9,9,9,0,0,0,1]</text>

  <!-- table header -->
  <g filter="url(#sk)"><rect x="40" y="76" width="840" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="70" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">步骤</text>
  <text x="160" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">l1</text>
  <text x="250" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">l2</text>
  <text x="360" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">carry(入)</text>
  <text x="470" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">sum</text>
  <text x="580" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">新节点</text>
  <text x="690" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">carry(出)</text>
  <text x="830" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">说明</text>

  <!-- rows -->
  <g font-size="11" fill="#444">
    <!-- step 1 -->
    <g filter="url(#sk)"><rect x="40" y="106" width="840" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="70" y="124" text-anchor="middle">1</text><text x="160" y="124" text-anchor="middle">9</text><text x="250" y="124" text-anchor="middle">9</text>
    <text x="360" y="124" text-anchor="middle">0</text><text x="470" y="124" text-anchor="middle">18</text>
    <text x="580" y="124" text-anchor="middle" fill="#7a5415" font-weight="bold">8</text><text x="690" y="124" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="124" text-anchor="middle" font-size="10" fill="#888">9+9+0</text>

    <!-- step 2 -->
    <g filter="url(#sk)"><rect x="40" y="134" width="840" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="70" y="152" text-anchor="middle">2</text><text x="160" y="152" text-anchor="middle">9</text><text x="250" y="152" text-anchor="middle">9</text>
    <text x="360" y="152" text-anchor="middle">1</text><text x="470" y="152" text-anchor="middle">19</text>
    <text x="580" y="152" text-anchor="middle" fill="#7a5415" font-weight="bold">9</text><text x="690" y="152" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="152" text-anchor="middle" font-size="10" fill="#888">9+9+1</text>

    <!-- step 3 -->
    <g filter="url(#sk)"><rect x="40" y="162" width="840" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="70" y="180" text-anchor="middle">3</text><text x="160" y="180" text-anchor="middle">9</text><text x="250" y="180" text-anchor="middle">9</text>
    <text x="360" y="180" text-anchor="middle">1</text><text x="470" y="180" text-anchor="middle">19</text>
    <text x="580" y="180" text-anchor="middle" fill="#7a5415" font-weight="bold">9</text><text x="690" y="180" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="180" text-anchor="middle" font-size="10" fill="#888">9+9+1</text>

    <!-- step 4 -->
    <g filter="url(#sk)"><rect x="40" y="190" width="840" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="70" y="208" text-anchor="middle">4</text><text x="160" y="208" text-anchor="middle">9</text><text x="250" y="208" text-anchor="middle">9</text>
    <text x="360" y="208" text-anchor="middle">1</text><text x="470" y="208" text-anchor="middle">19</text>
    <text x="580" y="208" text-anchor="middle" fill="#7a5415" font-weight="bold">9</text><text x="690" y="208" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="208" text-anchor="middle" font-size="10" fill="#888">9+9+1</text>

    <!-- step 5: l2 exhausted -->
    <g filter="url(#sk)"><rect x="40" y="218" width="840" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="70" y="236" text-anchor="middle">5</text><text x="160" y="236" text-anchor="middle">9</text><text x="250" y="236" text-anchor="middle" fill="#b85450">0(尽)</text>
    <text x="360" y="236" text-anchor="middle">1</text><text x="470" y="236" text-anchor="middle">10</text>
    <text x="580" y="236" text-anchor="middle" fill="#7a5415" font-weight="bold">0</text><text x="690" y="236" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="236" text-anchor="middle" font-size="10" fill="#7a5415">l2 尽, 按 0</text>

    <!-- step 6 -->
    <g filter="url(#sk)"><rect x="40" y="246" width="840" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="70" y="264" text-anchor="middle">6</text><text x="160" y="264" text-anchor="middle">9</text><text x="250" y="264" text-anchor="middle" fill="#b85450">0</text>
    <text x="360" y="264" text-anchor="middle">1</text><text x="470" y="264" text-anchor="middle">10</text>
    <text x="580" y="264" text-anchor="middle" fill="#7a5415" font-weight="bold">0</text><text x="690" y="264" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="264" text-anchor="middle" font-size="10" fill="#7a5415">l2 尽, 按 0</text>

    <!-- step 7 -->
    <g filter="url(#sk)"><rect x="40" y="274" width="840" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="70" y="292" text-anchor="middle">7</text><text x="160" y="292" text-anchor="middle">9</text><text x="250" y="292" text-anchor="middle" fill="#b85450">0</text>
    <text x="360" y="292" text-anchor="middle">1</text><text x="470" y="292" text-anchor="middle">10</text>
    <text x="580" y="292" text-anchor="middle" fill="#7a5415" font-weight="bold">0</text><text x="690" y="292" text-anchor="middle" fill="#b85450">1</text>
    <text x="830" y="292" text-anchor="middle" font-size="10" fill="#7a5415">l2 尽, 按 0</text>

    <!-- step 8: both exhausted, carry=1 -->
    <g filter="url(#sk)"><rect x="40" y="302" width="840" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="70" y="320" text-anchor="middle">8</text>
    <text x="160" y="320" text-anchor="middle" fill="#b85450">0(尽)</text><text x="250" y="320" text-anchor="middle" fill="#b85450">0</text>
    <text x="360" y="320" text-anchor="middle" fill="#b85450" font-weight="bold">1</text><text x="470" y="320" text-anchor="middle">1</text>
    <text x="580" y="320" text-anchor="middle" fill="#7a5415" font-weight="bold">1</text><text x="690" y="320" text-anchor="middle">0</text>
    <text x="830" y="320" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">★ carry 追加</text>
  </g>

  <!-- Result linked list -->
  <g filter="url(#sk)"><rect x="40" y="348" width="840" height="100" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="60" y="372" font-size="13" font-weight="bold" fill="#7a5415">结果链表（逆序）：</text>
  <g font-size="14" font-weight="bold">
    <g filter="url(#sk)"><rect x="60" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="80" y="408" text-anchor="middle" fill="#7a5415">8</text>
    <g filter="url(#sk)"><rect x="120" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="140" y="408" text-anchor="middle" fill="#7a5415">9</text>
    <g filter="url(#sk)"><rect x="180" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="200" y="408" text-anchor="middle" fill="#7a5415">9</text>
    <g filter="url(#sk)"><rect x="240" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="260" y="408" text-anchor="middle" fill="#7a5415">9</text>
    <g filter="url(#sk)"><rect x="300" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="320" y="408" text-anchor="middle" fill="#7a5415">0</text>
    <g filter="url(#sk)"><rect x="360" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="380" y="408" text-anchor="middle" fill="#7a5415">0</text>
    <g filter="url(#sk)"><rect x="420" y="384" width="40" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
    <text x="440" y="408" text-anchor="middle" fill="#7a5415">0</text>
    <g filter="url(#sk)"><rect x="480" y="384" width="40" height="36" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.8"/></g>
    <text x="500" y="408" text-anchor="middle" fill="#b85450">1</text>
    <text x="540" y="408" font-size="11" fill="#888">→ null</text>
  </g>
  <path d="M 100 402 L 116 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 160 402 L 176 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 220 402 L 236 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 280 402 L 296 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 340 402 L 356 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 400 402 L 416 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 460 402 L 476 402" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <text x="600" y="396" font-size="11" fill="#b85450" font-weight="bold">★ 第 8 步：两链表尽但 carry=1</text>
  <text x="600" y="412" font-size="11" fill="#7a5415">循环条件含 carry != 0</text>
  <text x="600" y="428" font-size="11" fill="#555">→ 追加最高位节点 1</text>
</svg>
