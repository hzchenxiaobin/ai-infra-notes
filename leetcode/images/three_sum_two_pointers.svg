<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="360" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">双指针：固定 nums[i]，left/right 向中间夹逼</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">排序后，根据两数之和与 target 的大小关系单调移动指针</text>

  <!-- ===== Sorted array ===== -->
  <text x="30" y="76" font-size="11" fill="#446688" font-weight="bold">排序后的 nums（升序）</text>

  <g font-size="11" fill="#333">
    <!-- i fixed -->
    <rect x="40" y="86" width="50" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="65" y="108" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">-1</text>
    <text x="65" y="134" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">i（固定）</text>

    <!-- left -->
    <rect x="100" y="86" width="50" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="125" y="108" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">-1</text>
    <text x="125" y="134" text-anchor="middle" font-size="9" fill="#446688" font-weight="bold">left</text>

    <!-- middle -->
    <rect x="160" y="86" width="50" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="185" y="108" text-anchor="middle" font-size="13" fill="#888">0</text>

    <rect x="220" y="86" width="50" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="245" y="108" text-anchor="middle" font-size="13" fill="#888">1</text>

    <rect x="280" y="86" width="50" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="305" y="108" text-anchor="middle" font-size="13" fill="#888">2</text>

    <!-- right -->
    <rect x="340" y="86" width="50" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="365" y="108" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">2</text>
    <text x="365" y="134" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">right</text>
  </g>

  <!-- target -->
  <rect x="400" y="86" width="100" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="450" y="100" text-anchor="middle" font-size="9" fill="#d6a040">target =</text>
  <text x="450" y="116" text-anchor="middle" font-size="12" fill="#d6a040" font-weight="bold">-nums[i] = 1</text>

  <!-- ===== Movement rules ===== -->
  <line x1="20" y1="156" x2="500" y2="156" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="180" font-size="12" fill="#444" font-weight="bold">指针移动规则：</text>

  <rect x="30" y="190" width="145" height="70" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="210" font-size="10" fill="#446688" font-weight="bold">和 &lt; target</text>
  <text x="44" y="226" font-size="9" fill="#555">nums[l]+nums[r] 太小</text>
  <text x="44" y="246" font-family="monospace" font-size="11" fill="#446688" font-weight="bold">left++</text>

  <rect x="190" y="190" width="145" height="70" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="204" y="210" font-size="10" fill="#4a7a3a" font-weight="bold">和 &gt; target</text>
  <text x="204" y="226" font-size="9" fill="#555">nums[l]+nums[r] 太大</text>
  <text x="204" y="246" font-family="monospace" font-size="11" fill="#4a7a3a" font-weight="bold">right--</text>

  <rect x="350" y="190" width="145" height="70" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="364" y="210" font-size="10" fill="#b85450" font-weight="bold">和 == target</text>
  <text x="364" y="226" font-size="9" fill="#555">找到一组解！</text>
  <text x="364" y="246" font-family="monospace" font-size="10" fill="#b85450" font-weight="bold">left++, right--</text>

  <!-- ===== Correctness ===== -->
  <rect x="30" y="280" width="465" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="44" y="300" font-size="11" fill="#444" font-weight="bold">为什么不会漏解？</text>
  <text x="44" y="318" font-size="10" fill="#555">和 &lt; target 时，当前 left 与任何 right'&lt;right 配对都更小，</text>
  <text x="44" y="334" font-size="10" fill="#555">不可能等于 target → left 可安全右移（单调性保证）</text>
</svg>
