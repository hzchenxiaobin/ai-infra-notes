<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="61" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="680" height="440" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">枚举子数组示例演算</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="340" y="62" text-anchor="middle" font-size="13" fill="#444">nums = [1, 100, 1], x = 1, pre = [0, 1, 101, 102]</text>

  <!-- Table header -->
  <g font-size="12">
    <g filter="url(#sk)"><rect x="40" y="80" width="40" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="60" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">l</text>
    <g filter="url(#sk)"><rect x="80" y="80" width="40" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="100" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">r</text>
    <g filter="url(#sk)"><rect x="120" y="80" width="80" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="160" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">sum</text>
    <g filter="url(#sk)"><rect x="200" y="80" width="60" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="230" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">末位</text>
    <g filter="url(#sk)"><rect x="260" y="80" width="60" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="290" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">首位</text>
    <g filter="url(#sk)"><rect x="320" y="80" width="60" height="26" fill="#fffdf3" stroke="#c98a2b" stroke-width="1"/></g>
    <text x="350" y="98" text-anchor="middle" fill="#2b2b2b" font-weight="bold">有效?</text>
  </g>

  <!-- Rows -->
  <g font-size="12">
    <!-- l=0 r=0 sum=1 -->
    <g filter="url(#sk)"><rect x="40" y="106" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="60" y="123" text-anchor="middle" fill="#2b6e9e">0</text>
    <g filter="url(#sk)"><rect x="80" y="106" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="100" y="123" text-anchor="middle" fill="#2b6e9e">0</text>
    <g filter="url(#sk)"><rect x="120" y="106" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="123" text-anchor="middle" fill="#444">1</text>
    <g filter="url(#sk)"><rect x="200" y="106" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="230" y="123" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="260" y="106" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="290" y="123" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="320" y="106" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="350" y="123" text-anchor="middle" fill="#2e6e2e" font-weight="bold">✓</text>

    <!-- l=0 r=1 sum=101 -->
    <g filter="url(#sk)"><rect x="40" y="130" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="60" y="147" text-anchor="middle" fill="#2b6e9e">0</text>
    <g filter="url(#sk)"><rect x="80" y="130" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="100" y="147" text-anchor="middle" fill="#2b6e9e">1</text>
    <g filter="url(#sk)"><rect x="120" y="130" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="147" text-anchor="middle" fill="#444">101</text>
    <g filter="url(#sk)"><rect x="200" y="130" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="230" y="147" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="260" y="130" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="290" y="147" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="320" y="130" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="350" y="147" text-anchor="middle" fill="#2e6e2e" font-weight="bold">✓</text>

    <!-- l=0 r=2 sum=102 -->
    <g filter="url(#sk)"><rect x="40" y="154" width="40" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="60" y="171" text-anchor="middle" fill="#b03a3a">0</text>
    <g filter="url(#sk)"><rect x="80" y="154" width="40" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="100" y="171" text-anchor="middle" fill="#b03a3a">2</text>
    <g filter="url(#sk)"><rect x="120" y="154" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="160" y="171" text-anchor="middle" fill="#444">102</text>
    <g filter="url(#sk)"><rect x="200" y="154" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="230" y="171" text-anchor="middle" fill="#b03a3a">2</text>
    <g filter="url(#sk)"><rect x="260" y="154" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="290" y="171" text-anchor="middle" fill="#7a5415">1</text>
    <g filter="url(#sk)"><rect x="320" y="154" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="350" y="171" text-anchor="middle" fill="#b03a3a">✗</text>

    <!-- l=1 r=1 sum=100 -->
    <g filter="url(#sk)"><rect x="40" y="178" width="40" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="60" y="195" text-anchor="middle" fill="#b03a3a">1</text>
    <g filter="url(#sk)"><rect x="80" y="178" width="40" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="100" y="195" text-anchor="middle" fill="#b03a3a">1</text>
    <g filter="url(#sk)"><rect x="120" y="178" width="80" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="160" y="195" text-anchor="middle" fill="#444">100</text>
    <g filter="url(#sk)"><rect x="200" y="178" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="230" y="195" text-anchor="middle" fill="#b03a3a">0</text>
    <g filter="url(#sk)"><rect x="260" y="178" width="60" height="24" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g>
    <text x="290" y="195" text-anchor="middle" fill="#7a5415">1</text>
    <g filter="url(#sk)"><rect x="320" y="178" width="60" height="24" fill="#f5e0e0" stroke="#b85450" stroke-width="0.8" opacity="0.6"/></g>
    <text x="350" y="195" text-anchor="middle" fill="#b03a3a">✗</text>

    <!-- l=1 r=2 sum=101 -->
    <g filter="url(#sk)"><rect x="40" y="202" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="60" y="219" text-anchor="middle" fill="#2b6e9e">1</text>
    <g filter="url(#sk)"><rect x="80" y="202" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="100" y="219" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="120" y="202" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="219" text-anchor="middle" fill="#444">101</text>
    <g filter="url(#sk)"><rect x="200" y="202" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="230" y="219" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="260" y="202" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="290" y="219" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="320" y="202" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="350" y="219" text-anchor="middle" fill="#2e6e2e" font-weight="bold">✓</text>

    <!-- l=2 r=2 sum=1 -->
    <g filter="url(#sk)"><rect x="40" y="226" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="60" y="243" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="80" y="226" width="40" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="100" y="243" text-anchor="middle" fill="#2b6e9e">2</text>
    <g filter="url(#sk)"><rect x="120" y="226" width="80" height="24" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g>
    <text x="160" y="243" text-anchor="middle" fill="#444">1</text>
    <g filter="url(#sk)"><rect x="200" y="226" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="230" y="243" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="260" y="226" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="290" y="243" text-anchor="middle" fill="#2e6e2e">1</text>
    <g filter="url(#sk)"><rect x="320" y="226" width="60" height="24" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g>
    <text x="350" y="243" text-anchor="middle" fill="#2e6e2e" font-weight="bold">✓</text>
  </g>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="420" y="106" width="220" height="145" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="530" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">有效子数组</text>
  <text x="440" y="152" font-size="11" fill="#444">nums[0..0] = 1 ✓</text>
  <text x="440" y="170" font-size="11" fill="#444">nums[0..1] = 101 ✓</text>
  <text x="440" y="188" font-size="11" fill="#444">nums[1..2] = 101 ✓</text>
  <text x="440" y="206" font-size="11" fill="#444">nums[2..2] = 1 ✓</text>
  <text x="530" y="234" text-anchor="middle" font-size="15" fill="#2e6e2e" font-weight="bold">答案 = 4</text>

  <!-- Short circuit note -->
  <g filter="url(#sk)">
    <rect x="40" y="275" width="600" height="40" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="60" y="297" font-size="11" font-weight="bold" fill="#2b2b2b">短路优化：</text>
  <text x="60" y="312" font-size="11" fill="#444">先检查 sum % 10 != x 则 continue（O(1)），避免不必要的首位计算</text>

  <!-- Code snippet -->
  <g filter="url(#sk)">
    <rect x="40" y="325" width="600" height="105" rx="8" fill="#f6f8fa" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="55" y="346" font-size="11" fill="#888" font-family="monospace">for l in range(n):</text>
  <text x="55" y="362" font-size="11" fill="#888" font-family="monospace">    for r in range(l, n):</text>
  <text x="55" y="378" font-size="11" fill="#888" font-family="monospace">        s = pre[r+1] - pre[l]</text>
  <text x="55" y="394" font-size="11" fill="#888" font-family="monospace">        if s % 10 != x: continue    # 末位不匹配，跳过</text>
  <text x="55" y="410" font-size="11" fill="#888" font-family="monospace">        if first_digit(s) == x: ans += 1  # 首位也匹配</text>
</svg>
