<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="400" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：nums=[1,2,3]，DFS 收集 8 个子集</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#888">先走"不选"分支（左）深入到底，再逐层回溯走"选"分支</text>

  <!-- ===== Steps table ===== -->
  <text x="280" y="74" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">DFS 访问顺序与收集</text>
  <g font-size="10" filter="url(#rough2)">
    <!-- header -->
    <rect x="30" y="84" width="500" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3"/>
    <text x="60" y="100" text-anchor="middle" fill="#446688" font-weight="bold">步骤</text>
    <text x="160" y="100" text-anchor="middle" fill="#446688" font-weight="bold">决策</text>
    <text x="280" y="100" text-anchor="middle" fill="#446688" font-weight="bold">path</text>
    <text x="430" y="100" text-anchor="middle" fill="#446688" font-weight="bold">收集</text>

    <!-- row 1: root -->
    <rect x="30" y="108" width="500" height="22" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="123" text-anchor="middle" fill="#555">0</text>
    <text x="160" y="123" text-anchor="middle" fill="#888">入根</text>
    <text x="280" y="123" text-anchor="middle" fill="#555" font-family="monospace">[]</text>
    <text x="430" y="123" text-anchor="middle" fill="#d6a040" font-weight="bold">[] ⭐</text>

    <!-- row 2 -->
    <rect x="30" y="130" width="500" height="22" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="145" text-anchor="middle" fill="#555">1</text>
    <text x="160" y="145" text-anchor="middle" fill="#888">不选1</text>
    <text x="280" y="145" text-anchor="middle" fill="#555" font-family="monospace">[]</text>
    <text x="430" y="145" text-anchor="middle" fill="#888">(已收)</text>

    <!-- row 3 -->
    <rect x="30" y="152" width="500" height="22" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="167" text-anchor="middle" fill="#555">2</text>
    <text x="160" y="167" text-anchor="middle" fill="#888">不选2</text>
    <text x="280" y="167" text-anchor="middle" fill="#555" font-family="monospace">[]</text>
    <text x="430" y="167" text-anchor="middle" fill="#888">(已收)</text>

    <!-- row 4 -->
    <rect x="30" y="174" width="500" height="22" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <text x="60" y="189" text-anchor="middle" fill="#555">3</text>
    <text x="160" y="189" text-anchor="middle" fill="#888">不选3</text>
    <text x="280" y="189" text-anchor="middle" fill="#555" font-family="monospace">[]</text>
    <text x="430" y="189" text-anchor="middle" fill="#888">(已收,到底)</text>

    <!-- row 5: pick 3 -->
    <rect x="30" y="196" width="500" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2"/>
    <text x="60" y="211" text-anchor="middle" fill="#555">4</text>
    <text x="160" y="211" text-anchor="middle" fill="#4a7a3a" font-weight="bold">选3</text>
    <text x="280" y="211" text-anchor="middle" fill="#4a7a3a" font-family="monospace" font-weight="bold">[3]</text>
    <text x="430" y="211" text-anchor="middle" fill="#d6a040" font-weight="bold">[3] ⭐</text>

    <!-- row 6: pick 2 -->
    <rect x="30" y="218" width="500" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2"/>
    <text x="60" y="233" text-anchor="middle" fill="#555">5</text>
    <text x="160" y="233" text-anchor="middle" fill="#4a7a3a" font-weight="bold">选2</text>
    <text x="280" y="233" text-anchor="middle" fill="#4a7a3a" font-family="monospace" font-weight="bold">[2]</text>
    <text x="430" y="233" text-anchor="middle" fill="#d6a040" font-weight="bold">[2] ⭐</text>

    <!-- row 7: pick 2 then pick 3 -->
    <rect x="30" y="240" width="500" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2"/>
    <text x="60" y="255" text-anchor="middle" fill="#555">6</text>
    <text x="160" y="255" text-anchor="middle" fill="#4a7a3a" font-weight="bold">选3</text>
    <text x="280" y="255" text-anchor="middle" fill="#4a7a3a" font-family="monospace" font-weight="bold">[2,3]</text>
    <text x="430" y="255" text-anchor="middle" fill="#d6a040" font-weight="bold">[2,3] ⭐</text>

    <!-- row 8: pick 1 -->
    <rect x="30" y="262" width="500" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2"/>
    <text x="60" y="277" text-anchor="middle" fill="#555">7</text>
    <text x="160" y="277" text-anchor="middle" fill="#4a7a3a" font-weight="bold">选1</text>
    <text x="280" y="277" text-anchor="middle" fill="#4a7a3a" font-family="monospace" font-weight="bold">[1]</text>
    <text x="430" y="277" text-anchor="middle" fill="#d6a040" font-weight="bold">[1] ⭐</text>

    <!-- row 9-11: remaining -->
    <rect x="30" y="284" width="500" height="22" fill="#f5f5f5" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="60" y="299" text-anchor="middle" fill="#888">8-10</text>
    <text x="160" y="299" text-anchor="middle" fill="#888">1 的右子树</text>
    <text x="280" y="299" text-anchor="middle" fill="#888" font-family="monospace">[1,3] / [1,2] / [1,2,3]</text>
    <text x="430" y="299" text-anchor="middle" fill="#d6a040" font-weight="bold">3 个 ⭐</text>
  </g>

  <!-- ===== Result box ===== -->
  <rect x="30" y="320" width="500" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="280" y="340" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">共 2³ = 8 个子集，无重复无遗漏</text>

  <!-- ===== Insight ===== -->
  <rect x="30" y="360" width="500" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="280" y="378" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">DFS 先深探"全不选"得空集 []，再回溯尝试"选"</text>
  <text x="280" y="390" text-anchor="middle" font-size="9" fill="#555">每进入一个节点就收集一次 path，所以步骤 0 的空集也是结果之一</text>
</svg>
