<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a7a3a"/>
    </marker>
  </defs>
  <rect width="960" height="470" fill="#fafafa"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">免费规则对比：I 版 vs II 版</text>
  <path d="M 300 42 Q 480 50 660 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Left panel: version I ===== -->
  <text x="245" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#446688">① I 版：买 1 件类型 i → 解锁全部 c_i 件免费</text>

  <g filter="url(#sk)"><rect x="60" y="145" width="110" height="58" rx="6" fill="#e8f0fe" stroke="#446688" stroke-width="1.6"/></g>
  <text x="115" y="170" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">购买类型 i</text>
  <text x="115" y="190" text-anchor="middle" font-size="11" fill="#446688">× 1 件</text>

  <text x="382" y="77" text-anchor="middle" font-size="10" fill="#4a7a3a">c_i = 3 个可送目标</text>
  <g filter="url(#sk)"><rect x="330" y="85" width="105" height="46" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="382" y="113" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">免费 j₁ ×1</text>
  <g filter="url(#sk)"><rect x="330" y="155" width="105" height="46" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="382" y="183" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">免费 j₂ ×1</text>
  <g filter="url(#sk)"><rect x="330" y="225" width="105" height="46" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="382" y="253" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">免费 j₃ ×1</text>

  <path d="M 174 168 Q 250 130 322 110" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <path d="M 174 174 Q 250 176 322 178" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <path d="M 174 180 Q 250 222 322 246" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>

  <text x="245" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a7a3a">买过即送满：免费数 = c_i = 3 件</text>

  <!-- divider -->
  <path d="M 480 60 L 480 330" stroke="#ccc" stroke-width="1.3" stroke-dasharray="5 4" fill="none" filter="url(#sk)"/>

  <!-- ===== Right panel: version II ===== -->
  <text x="715" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">② II 版：每件至多送 1 件，有序对 (i,j) 至多一次</text>

  <g filter="url(#sk)"><rect x="545" y="85" width="100" height="46" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="595" y="113" text-anchor="middle" font-size="11" fill="#2b2b2b" font-weight="bold">购买 #1</text>
  <g filter="url(#sk)"><rect x="545" y="155" width="100" height="46" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="595" y="183" text-anchor="middle" font-size="11" fill="#2b2b2b" font-weight="bold">购买 #2</text>
  <g filter="url(#sk)"><rect x="545" y="225" width="100" height="46" rx="4" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/></g>
  <text x="595" y="253" text-anchor="middle" font-size="11" fill="#2b2b2b" font-weight="bold">购买 #3</text>

  <g filter="url(#sk)"><rect x="770" y="85" width="105" height="46" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="822" y="113" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">免费 j₁ ×1</text>
  <g filter="url(#sk)"><rect x="770" y="155" width="105" height="46" rx="4" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/></g>
  <text x="822" y="183" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">免费 j₂ ×1</text>

  <path d="M 649 108 L 762 108" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <path d="M 649 178 L 762 178" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>

  <!-- third purchase: no target left -->
  <path d="M 649 248 L 786 248" stroke="#b85450" stroke-width="1.4" stroke-dasharray="4 3" fill="none" filter="url(#sk)"/>
  <path d="M 800 236 L 844 268" stroke="#b85450" stroke-width="2.5" fill="none" filter="url(#sk)"/>
  <path d="M 844 236 L 800 268" stroke="#b85450" stroke-width="2.5" fill="none" filter="url(#sk)"/>
  <text x="822" y="290" text-anchor="middle" font-size="10" fill="#b85450">目标已送完（c_i = 2）</text>

  <text x="715" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">免费数 = min(x_i, c_i) = min(3, 2) = 2 件</text>

  <!-- ===== Conclusion ===== -->
  <g filter="url(#sk)"><rect x="60" y="352" width="840" height="88" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/></g>
  <text x="88" y="378" font-size="13" font-weight="bold" fill="#7a5415">结论</text>
  <text x="88" y="402" font-size="12" fill="#444">II 版：买 x_i 件类型 i 的免费数 = min(x_i, c_i)（I 版则是买过 1 件即得全部 c_i 件）</text>
  <text x="88" y="424" font-size="11" fill="#666">上界：每件至多 1 份（≤ x_i）· 每个目标至多 1 次（≤ c_i）；可达：任选 min(x_i, c_i) 个目标一一配对</text>
</svg>
