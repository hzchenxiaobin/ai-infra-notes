<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">两数相加：算法流程</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1 -->
  <g filter="url(#sk)"><rect x="60" y="66" width="760" height="44" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="80" y="86" font-size="13" font-weight="bold" fill="#2b6e9e">① 建哑节点</text>
  <text x="80" y="102" font-size="11" fill="#555" font-family="monospace">dummy = ListNode(0); tail = dummy; carry = 0</text>
  <text x="620" y="94" font-size="10" fill="#888">统一尾部追加</text>

  <!-- Step 2 -->
  <g filter="url(#sk)"><rect x="60" y="120" width="760" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="80" y="140" font-size="13" font-weight="bold" fill="#2e6e2e">② 循环遍历</text>
  <text x="80" y="156" font-size="11" fill="#555" font-family="monospace">while l1 or l2 or carry != 0:</text>
  <text x="620" y="148" font-size="10" fill="#b85450" font-weight="bold">★ 条件带 carry</text>

  <!-- Step 3 -->
  <g filter="url(#sk)"><rect x="60" y="174" width="760" height="44" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="80" y="194" font-size="13" font-weight="bold" fill="#7a5415">③ 取值 + 求和</text>
  <text x="80" y="210" font-size="11" fill="#555" font-family="monospace">x = l1.val if l1 else 0; y = l2.val if l2 else 0</text>
  <text x="80" y="224" font-size="11" fill="#555" font-family="monospace">s = x + y + carry</text>
  <text x="620" y="202" font-size="10" fill="#888">短链表按 0 参与</text>

  <!-- Step 4 -->
  <g filter="url(#sk)"><rect x="60" y="234" width="760" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="80" y="254" font-size="13" font-weight="bold" fill="#b85450">④ 写节点 + 更新进位</text>
  <text x="80" y="270" font-size="11" fill="#555" font-family="monospace">tail.next = ListNode(s % 10); carry = s // 10; tail = tail.next</text>
  <text x="620" y="262" font-size="10" fill="#888">取模写值，整除进位</text>

  <!-- Step 5 -->
  <g filter="url(#sk)"><rect x="60" y="288" width="760" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="80" y="308" font-size="13" font-weight="bold" fill="#7a5415">⑤ 前进 + 返回</text>
  <text x="80" y="324" font-size="11" fill="#555" font-family="monospace">if l1: l1 = l1.next; if l2: l2 = l2.next  →  return dummy.next</text>
  <text x="620" y="316" font-size="10" fill="#888">循环结束后返回</text>

  <!-- key notes -->
  <g filter="url(#sk)"><rect x="60" y="342" width="760" height="30" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="80" y="362" font-size="11" fill="#b85450" font-weight="bold">⚠ carry != 0 必须在循环条件中</text>
  <text x="400" y="362" font-size="11" fill="#7a5415">→ 否则最高位进位被丢弃（如 9999999+9999=10009998 的末尾 1）</text>
</svg>
