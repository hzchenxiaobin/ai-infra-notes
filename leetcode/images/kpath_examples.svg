<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="r"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="43"/><feDisplacementMap in="SourceGraphic" scale="1.5"/></filter>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#3a3a3a"/></marker>
  </defs>
  <rect width="560" height="360" fill="#fafafa"/>
  <text x="280" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333" filter="url(#r)">三种构造：使 m×n 网格恰好有 k 条路径</text>

  <text x="30" y="58" font-size="12" fill="#446688" font-weight="bold" filter="url(#r)">构造 1：2 行条带（m=2, n≥2）</text>
  <g filter="url(#r)" font-size="10" font-family="monospace">
    <rect x="40" y="68" width="30" height="30" rx="3" fill="#e8f0fe" stroke="#446688"/><text x="55" y="88" text-anchor="middle">S</text>
    <path d="M 70 83 L 100 83" stroke="#446688" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="100" y="68" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/><text x="115" y="88" text-anchor="middle">·</text>
    <path d="M 130 83 L 160 83" stroke="#446688" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="160" y="68" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/><text x="175" y="88" text-anchor="middle">·</text>
    <path d="M 190 83 L 220 83" stroke="#446688" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="220" y="68" width="30" height="30" rx="3" fill="#e6f4ea" stroke="#4a7a3a"/><text x="235" y="88" text-anchor="middle">T</text>
    <text x="270" y="80" fill="#333">上方水平走廊</text>
    <rect x="40" y="100" width="30" height="30" rx="3" fill="none" stroke="#ccc" stroke-dasharray="3 2"/>
    <rect x="100" y="100" width="30" height="30" rx="3" fill="none" stroke="#ccc" stroke-dasharray="3 2"/>
    <rect x="160" y="100" width="30" height="30" rx="3" fill="none" stroke="#ccc" stroke-dasharray="3 2"/>
    <rect x="220" y="100" width="30" height="30" rx="3" fill="none" stroke="#ccc" stroke-dasharray="3 2"/>
    <text x="270" y="120" fill="#888">下方无走廊 → 路径唯一</text>
  </g>
  <text x="40" y="148" font-size="10" fill="#888" filter="url(#r)">k = n（每列一个向下岔路）</text>

  <text x="30" y="178" font-size="12" fill="#4a7a3a" font-weight="bold" filter="url(#r)">构造 2：2 列条带（n=2, m≥2）</text>
  <text x="40" y="198" font-size="10" fill="#888" filter="url(#r)">对称旋转，k = m</text>

  <text x="30" y="228" font-size="12" fill="#d6a040" font-weight="bold" filter="url(#r)">构造 3：3×3 瓶颈（m=n=3, k=4）</text>
  <g filter="url(#r)" font-size="10" font-family="monospace">
    <rect x="40" y="238" width="30" height="30" rx="3" fill="#e8f0fe" stroke="#446688"/><text x="55" y="258" text-anchor="middle">S</text>
    <rect x="80" y="238" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="120" y="238" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="40" y="278" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="80" y="278" width="30" height="30" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="2"/><text x="95" y="298" text-anchor="middle" fill="#b85450" font-weight="bold">B</text>
    <rect x="120" y="278" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="40" y="318" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="80" y="318" width="30" height="30" rx="3" fill="#fff8e1" stroke="#d6a040"/>
    <rect x="120" y="318" width="30" height="30" rx="3" fill="#e6f4ea" stroke="#4a7a3a"/><text x="135" y="338" text-anchor="middle">T</text>
    <text x="170" y="258" fill="#333">S→B 有 2 路</text>
    <text x="170" y="298" fill="#b85450" font-weight="bold">瓶颈 B</text>
    <text x="170" y="338" fill="#333">B→T 有 2 路</text>
    <text x="300" y="298" fill="#4a7a3a" font-weight="bold">总路径 = 2×2 = 4</text>
  </g>
</svg>
