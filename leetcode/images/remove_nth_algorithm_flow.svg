<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="18" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">删除倒数第 N 个节点：算法流程</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1 -->
  <g filter="url(#sk)"><rect x="60" y="66" width="760" height="44" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="80" y="86" font-size="13" font-weight="bold" fill="#2b6e9e">① 建哑节点</text>
  <text x="80" y="102" font-size="11" fill="#555" font-family="monospace">dummy.next = head; slow = fast = dummy</text>
  <text x="620" y="94" font-size="10" fill="#888">统一处理删除头节点</text>

  <!-- Step 2 -->
  <g filter="url(#sk)"><rect x="60" y="120" width="760" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="80" y="140" font-size="13" font-weight="bold" fill="#2e6e2e">② 快指针先发</text>
  <text x="80" y="156" font-size="11" fill="#555" font-family="monospace">for i in range(n): fast = fast.next</text>
  <text x="620" y="148" font-size="10" fill="#888">制造 n 条边间距</text>

  <!-- Step 3 -->
  <g filter="url(#sk)"><rect x="60" y="174" width="760" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="80" y="194" font-size="13" font-weight="bold" fill="#7a5415">③ 同速推进</text>
  <text x="80" y="210" font-size="11" fill="#555" font-family="monospace">while fast.next != null: slow = slow.next; fast = fast.next</text>
  <text x="620" y="202" font-size="10" fill="#888">slow 停在前驱</text>

  <!-- Step 4 -->
  <g filter="url(#sk)"><rect x="60" y="228" width="760" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="80" y="248" font-size="13" font-weight="bold" fill="#b85450">④ 删除</text>
  <text x="80" y="264" font-size="11" fill="#555" font-family="monospace">slow.next = slow.next.next</text>
  <text x="620" y="256" font-size="10" fill="#888">跳过待删节点</text>

  <!-- Step 5 -->
  <g filter="url(#sk)"><rect x="60" y="282" width="760" height="44" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.5"/></g>
  <text x="80" y="302" font-size="13" font-weight="bold" fill="#444">⑤ 返回</text>
  <text x="80" y="318" font-size="11" fill="#555" font-family="monospace">return dummy.next</text>
  <text x="620" y="310" font-size="10" fill="#888">真正的头节点</text>

  <!-- key notes -->
  <g filter="url(#sk)"><rect x="60" y="338" width="760" height="34" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="80" y="358" font-size="11" fill="#b85450" font-weight="bold">⚠ 循环条件是 fast.next != null（不是 fast != null）</text>
  <text x="400" y="358" font-size="11" fill="#7a5415">→ fast 停在最后一个节点，slow 恰停在前驱</text>
</svg>
