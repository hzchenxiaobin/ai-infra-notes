<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="420" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">递增后的数对数量：分块维护频率</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">nums1≤5 个元素 → 每个 type-2 查询只需查 5 个 target 的频率</text>

  <!-- ===== nums2 array with blocks ===== -->
  <text x="30" y="72" font-size="12" fill="#446688" font-weight="bold">nums2 数组分块（每块 √n 个元素）</text>

  <g font-size="10" fill="#333">
    <!-- Block 0 -->
    <rect x="30" y="80" width="80" height="50" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="70" y="100" text-anchor="middle" font-size="10" fill="#446688" font-weight="bold">Block 0</text>
    <text x="70" y="118" text-anchor="middle" font-size="9" fill="#555">freq map</text>

    <!-- Block 1 -->
    <rect x="115" y="80" width="80" height="50" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="155" y="100" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">Block 1</text>
    <text x="155" y="118" text-anchor="middle" font-size="9" fill="#555">freq map</text>

    <!-- Block 2 -->
    <rect x="200" y="80" width="80" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="240" y="100" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">Block 2</text>
    <text x="240" y="118" text-anchor="middle" font-size="9" fill="#555">freq map</text>

    <text x="295" y="108" font-size="14" fill="#888">...</text>

    <!-- Block last -->
    <rect x="330" y="80" width="80" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="370" y="100" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">Block B-1</text>
    <text x="370" y="118" text-anchor="middle" font-size="9" fill="#555">freq map</text>
  </g>

  <!-- ===== Type 1: range add ===== -->
  <line x1="20" y1="145" x2="620" y2="145" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="168" font-size="12" fill="#d6a040" font-weight="bold">Type-1 查询 [1, x, y, val]：区间加 val</text>

  <g font-size="10" fill="#333">
    <rect x="30" y="178" width="380" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="44" y="196" font-size="10" fill="#555">完整块：lazy[block] += val（O(1)/块）</text>
    <text x="44" y="212" font-size="10" fill="#555">边缘块：逐元素修改 freq map（O(√n)/边缘）</text>
    <text x="44" y="228" font-size="10" fill="#d6a040" font-weight="bold">总复杂度：O(√n) per type-1</text>
  </g>

  <!-- ===== Type 2: count pairs ===== -->
  <line x1="20" y1="255" x2="620" y2="255" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="278" font-size="12" fill="#4a7a3a" font-weight="bold">Type-2 查询 [2, tot]：数对计数</text>

  <g font-size="10" fill="#333">
    <rect x="30" y="288" width="580" height="70" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="44" y="306" font-size="10" fill="#555">for each nums1[j] (≤5 个):</text>
    <text x="44" y="322" font-size="10" fill="#555">  target = tot - nums1[j]</text>
    <text x="44" y="338" font-size="10" fill="#555">  ans += Σ block.freq[target + block.lazy]  for each block</text>
    <text x="44" y="354" font-size="10" fill="#4a7a3a" font-weight="bold">总复杂度：O(5 × B) = O(5√n) per type-2</text>
  </g>

  <!-- ===== Summary ===== -->
  <rect x="30" y="375" width="580" height="35" fill="#f6f6f6" stroke="#ccc" rx="6" filter="url(#rough2)"/>
  <text x="320" y="397" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">总复杂度：O(Q × √n × |nums1|)，n=5×10⁴, Q=5×10⁴ → ~5×10⁷</text>
</svg>
