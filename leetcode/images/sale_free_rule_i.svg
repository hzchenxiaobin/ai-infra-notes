<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560"
     font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#d6a040"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fafafa"/>

  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">免费规则：买 i 送 j（factor_i 整除 factor_j）</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">示例 1：items = [[6,2],[2,6],[3,4]] → c = [0, 1, 1]</text>

  <!-- 物品 0 卡片（被赠送的一方） -->
  <rect x="350" y="85" width="200" height="120" rx="10" fill="#e8f0fe" stroke="#446688" stroke-width="2" filter="url(#rough2)"/>
  <text x="450" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#446688">物品 0</text>
  <text x="372" y="140" font-size="13" fill="#333">factor = 6</text>
  <text x="372" y="162" font-size="13" fill="#333">price = 2</text>
  <text x="372" y="186" font-size="13" font-weight="bold" fill="#b85450">c₀ = 0（送 0 件）</text>

  <!-- 物品 1 卡片 -->
  <rect x="90" y="300" width="200" height="120" rx="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
  <text x="190" y="327" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a7a3a">物品 1</text>
  <text x="112" y="355" font-size="13" fill="#333">factor = 2</text>
  <text x="112" y="377" font-size="13" fill="#333">price = 6</text>
  <text x="112" y="401" font-size="13" font-weight="bold" fill="#b85450">c₁ = 1（送 1 件）</text>

  <!-- 物品 2 卡片 -->
  <rect x="610" y="300" width="200" height="120" rx="10" fill="#fff8e1" stroke="#d6a040" stroke-width="2" filter="url(#rough2)"/>
  <text x="710" y="327" text-anchor="middle" font-size="16" font-weight="bold" fill="#b08020">物品 2</text>
  <text x="632" y="355" font-size="13" fill="#333">factor = 3</text>
  <text x="632" y="377" font-size="13" fill="#333">price = 4</text>
  <text x="632" y="401" font-size="13" font-weight="bold" fill="#b85450">c₂ = 1（送 1 件）</text>

  <!-- 买 1 送 0：2 | 6 -->
  <path d="M 205 300 Q 250 240 385 205" stroke="#4a7a3a" stroke-width="2" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <text x="160" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a7a3a">2 | 6 → 送物品0 ×1</text>

  <!-- 买 2 送 0：3 | 6 -->
  <path d="M 695 300 Q 650 240 515 205" stroke="#d6a040" stroke-width="2" fill="none" marker-end="url(#arrO)" filter="url(#rough2)"/>
  <text x="740" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#b08020">3 | 6 → 送物品0 ×1</text>

  <!-- 规则要点 -->
  <rect x="60" y="452" width="780" height="86" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5 3" filter="url(#rough2)"/>
  <text x="82" y="478" font-size="12" font-weight="bold" fill="#2b2b2b">★ 买 ≥1 件类型 i 即一次性解锁全部 c_i 件免费物品，多买不送（免费数与购买数量无关）</text>
  <text x="82" y="500" font-size="12" fill="#444">★ 同一 j 可被不同来源 i 各送一份（物品 0 可同时被物品 1、物品 2 送），按来源分别计数</text>
  <text x="82" y="522" font-size="12" fill="#888">c_i = 满足 j≠i 且 factor_i | factor_j 的 j 个数 =（factor_i 倍数的类型总数）− 1</text>
</svg>
