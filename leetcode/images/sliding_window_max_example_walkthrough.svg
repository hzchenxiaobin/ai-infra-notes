<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="460" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：[1,3,-1,-3,5,3,6,7] k=3</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#888">8 步遍历，关注步骤 5（连续弹 3 个）和步骤 7（连续弹 2 个）</text>

  <!-- table header -->
  <g font-size="9" fill="#444" font-weight="bold">
    <rect x="20" y="56" width="24" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="32" y="69" text-anchor="middle">步</text>
    <rect x="44" y="56" width="24" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="56" y="69" text-anchor="middle">i</text>
    <rect x="68" y="56" width="36" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="86" y="69" text-anchor="middle">nums[i]</text>
    <rect x="104" y="56" width="120" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="164" y="69" text-anchor="middle">deque（下标）</text>
    <rect x="224" y="56" width="200" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="324" y="69" text-anchor="middle">动作</text>
    <rect x="424" y="56" width="116" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="482" y="69" text-anchor="middle">result</text>
  </g>

  <!-- rows -->
  <g font-size="9" fill="#333">
    <!-- step 1 -->
    <rect x="20" y="76" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="90" text-anchor="middle">1</text>
    <rect x="44" y="76" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="56" y="90" text-anchor="middle">0</text>
    <rect x="68" y="76" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="90" text-anchor="middle">1</text>
    <rect x="104" y="76" width="120" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="164" y="90" text-anchor="middle">[0]</text>
    <rect x="224" y="76" width="200" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="90" text-anchor="middle" fill="#4a7a3a">入队，i&lt;2 不收集</text>
    <rect x="424" y="76" width="116" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="482" y="90" text-anchor="middle" fill="#888">[]</text>

    <!-- step 2 -->
    <rect x="20" y="98" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="112" text-anchor="middle">2</text>
    <rect x="44" y="98" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="56" y="112" text-anchor="middle">1</text>
    <rect x="68" y="98" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="112" text-anchor="middle">3</text>
    <rect x="104" y="98" width="120" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="164" y="112" text-anchor="middle">[1]</text>
    <rect x="224" y="98" width="200" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="112" text-anchor="middle" fill="#b85450">3&gt;1 弹尾0；入队1；i&lt;2 不收集</text>
    <rect x="424" y="98" width="116" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="482" y="112" text-anchor="middle" fill="#888">[]</text>

    <!-- step 3 -->
    <rect x="20" y="120" width="24" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="32" y="134" text-anchor="middle" fill="#d6a040" font-weight="bold">3</text>
    <rect x="44" y="120" width="24" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="56" y="134" text-anchor="middle" fill="#d6a040" font-weight="bold">2</text>
    <rect x="68" y="120" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="134" text-anchor="middle">-1</text>
    <rect x="104" y="120" width="120" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="164" y="134" text-anchor="middle">[1,2]</text>
    <rect x="224" y="120" width="200" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="134" text-anchor="middle" fill="#4a7a3a">-1&lt;3 入队；i≥2 收集 nums[1]=3</text>
    <rect x="424" y="120" width="116" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="482" y="134" text-anchor="middle" fill="#d6a040">[3]</text>

    <!-- step 4 -->
    <rect x="20" y="142" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="156" text-anchor="middle">4</text>
    <rect x="44" y="142" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="56" y="156" text-anchor="middle">3</text>
    <rect x="68" y="142" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="156" text-anchor="middle">-3</text>
    <rect x="104" y="142" width="120" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="164" y="156" text-anchor="middle">[1,2,3]</text>
    <rect x="224" y="142" width="200" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="156" text-anchor="middle" fill="#4a7a3a">-3&lt;-1 入队；front=1&gt;0 不过期；收集 3</text>
    <rect x="424" y="142" width="116" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="482" y="156" text-anchor="middle" fill="#888">[3,3]</text>

    <!-- step 5 (key!) -->
    <rect x="20" y="164" width="24" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="32" y="178" text-anchor="middle" fill="#b85450" font-weight="bold">5</text>
    <rect x="44" y="164" width="24" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="56" y="178" text-anchor="middle" fill="#b85450" font-weight="bold">4</text>
    <rect x="68" y="164" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="178" text-anchor="middle" fill="#446688" font-weight="bold">5</text>
    <rect x="104" y="164" width="120" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="164" y="178" text-anchor="middle" fill="#b85450" font-weight="bold">[4]</text>
    <rect x="224" y="164" width="200" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="324" y="178" text-anchor="middle" fill="#b85450" font-weight="bold">5&gt;-3 弹3; 5&gt;-1 弹2; 5&gt;3 弹1; 收集 5</text>
    <rect x="424" y="164" width="116" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="482" y="178" text-anchor="middle" fill="#b85450">[3,3,5]</text>

    <!-- step 6 -->
    <rect x="20" y="186" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="200" text-anchor="middle">6</text>
    <rect x="44" y="186" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="56" y="200" text-anchor="middle">5</text>
    <rect x="68" y="186" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="200" text-anchor="middle">3</text>
    <rect x="104" y="186" width="120" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="164" y="200" text-anchor="middle">[4,5]</text>
    <rect x="224" y="186" width="200" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="200" text-anchor="middle" fill="#4a7a3a">3&lt;5 入队；front=4&gt;2 不过期；收集 5</text>
    <rect x="424" y="186" width="116" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="482" y="200" text-anchor="middle" fill="#888">[3,3,5,5]</text>

    <!-- step 7 (key!) -->
    <rect x="20" y="208" width="24" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="32" y="222" text-anchor="middle" fill="#b85450" font-weight="bold">7</text>
    <rect x="44" y="208" width="24" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="56" y="222" text-anchor="middle" fill="#b85450" font-weight="bold">6</text>
    <rect x="68" y="208" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="222" text-anchor="middle" fill="#446688" font-weight="bold">6</text>
    <rect x="104" y="208" width="120" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="164" y="222" text-anchor="middle" fill="#b85450" font-weight="bold">[6]</text>
    <rect x="224" y="208" width="200" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="324" y="222" text-anchor="middle" fill="#b85450" font-weight="bold">6&gt;3 弹5; 6&gt;5 弹4; 收集 6</text>
    <rect x="424" y="208" width="116" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="482" y="222" text-anchor="middle" fill="#b85450">[3,3,5,5,6]</text>

    <!-- step 8 -->
    <rect x="20" y="230" width="24" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="32" y="244" text-anchor="middle" fill="#d6a040" font-weight="bold">8</text>
    <rect x="44" y="230" width="24" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="56" y="244" text-anchor="middle" fill="#d6a040" font-weight="bold">7</text>
    <rect x="68" y="230" width="36" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="86" y="244" text-anchor="middle" fill="#446688" font-weight="bold">7</text>
    <rect x="104" y="230" width="120" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="164" y="244" text-anchor="middle">[7]</text>
    <rect x="224" y="230" width="200" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="324" y="244" text-anchor="middle" fill="#4a7a3a">7&gt;6 弹6；入队7；收集 7</text>
    <rect x="424" y="230" width="116" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="482" y="244" text-anchor="middle" fill="#d6a040">[3,3,5,5,6,7]</text>
  </g>

  <!-- ===== Final result ===== -->
  <line x1="20" y1="264" x2="540" y2="264" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <rect x="30" y="280" width="500" height="80" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="280" y="302" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">最终结果：[3, 3, 5, 5, 6, 7]</text>
  <text x="280" y="322" text-anchor="middle" font-size="10" fill="#555">步骤 5（5 入队）连续弹 3 个；步骤 7（6 入队）连续弹 2 个</text>
  <text x="280" y="340" text-anchor="middle" font-size="10" fill="#555">8 次入队 + 7 次出队 = 15 次操作 = O(n)</text>
  <text x="280" y="356" text-anchor="middle" font-size="9" fill="#888">每步队头即当前窗口最大值，无需额外求 max</text>
</svg>
