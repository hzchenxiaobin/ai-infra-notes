<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="520" height="360" fill="#fafafa"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">Kadane 算法：dp[i] = max(nums[i], dp[i−1] + nums[i])</text>

  <!-- nums row -->
  <text x="30" y="64" font-size="12" fill="#888">nums:</text>
  <rect x="80" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="105" y="68" text-anchor="middle" font-size="12" fill="#333">−2</text>
  <rect x="135" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="68" text-anchor="middle" font-size="12" fill="#333">1</text>
  <rect x="190" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="215" y="68" text-anchor="middle" font-size="12" fill="#333">−3</text>
  <rect x="245" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="270" y="68" text-anchor="middle" font-size="12" fill="#333">4</text>
  <rect x="300" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="325" y="68" text-anchor="middle" font-size="12" fill="#333">−1</text>
  <rect x="355" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="380" y="68" text-anchor="middle" font-size="12" fill="#333">2</text>
  <rect x="410" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="435" y="68" text-anchor="middle" font-size="12" fill="#333">1</text>
  <rect x="465" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="490" y="68" text-anchor="middle" font-size="12" fill="#333">−5</text>

  <!-- dp row -->
  <text x="30" y="124" font-size="12" fill="#888">dp[i]:</text>
  <rect x="80" y="108" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="105" y="128" text-anchor="middle" font-size="12" fill="#333">−2</text>
  <rect x="135" y="108" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="128" text-anchor="middle" font-size="12" fill="#333">1</text>
  <rect x="190" y="108" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="215" y="128" text-anchor="middle" font-size="12" fill="#333">−2</text>
  <rect x="245" y="108" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="270" y="128" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">4</text>
  <rect x="300" y="108" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="325" y="128" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <rect x="355" y="108" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="380" y="128" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <rect x="410" y="108" width="50" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="2.5" rx="4" filter="url(#rough2)"/>
  <text x="435" y="128" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">6</text>
  <rect x="465" y="108" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="490" y="128" text-anchor="middle" font-size="12" fill="#333">1</text>

  <!-- Decision annotations -->
  <!-- i=0: restart -->
  <text x="105" y="92" text-anchor="middle" font-size="9" fill="#b85450">重启</text>
  <!-- i=1: extend -->
  <text x="160" y="92" text-anchor="middle" font-size="9" fill="#82b366">接上</text>
  <!-- i=2: restart (dp[1]=1>0, but 1+(-3)=-2 > -3, so extend) -->
  <text x="215" y="92" text-anchor="middle" font-size="9" fill="#82b366">接上</text>
  <!-- i=3: restart (dp[2]=-2<0) -->
  <text x="270" y="92" text-anchor="middle" font-size="9" fill="#b85450">重启</text>
  <!-- i=4: extend (dp[3]=4>0) -->
  <text x="325" y="92" text-anchor="middle" font-size="9" fill="#82b366">接上</text>
  <!-- i=5: extend -->
  <text x="380" y="92" text-anchor="middle" font-size="9" fill="#82b366">接上</text>
  <!-- i=6: extend (max!) -->
  <text x="435" y="92" text-anchor="middle" font-size="9" fill="#82b366">接上</text>
  <!-- i=7: restart -->
  <text x="490" y="92" text-anchor="middle" font-size="9" fill="#b85450">重启</text>

  <!-- max_sum annotation -->
  <path d="M 435 140 L 435 160 L 380 175" stroke="#b85450" stroke-width="1.5" fill="none" stroke-dasharray="4,2" filter="url(#rough2)"/>
  <rect x="300" y="170" width="160" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="380" y="189" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">max_sum = 6 ⭐</text>

  <!-- Rule box 1: dp[i-1] > 0 -->
  <rect x="40" y="215" width="210" height="55" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="145" y="237" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">dp[i−1] > 0 → 接上</text>
  <text x="145" y="256" text-anchor="middle" font-size="11" fill="#555">dp[i] = dp[i−1] + nums[i]</text>

  <!-- Rule box 2: dp[i-1] <= 0 -->
  <rect x="270" y="215" width="210" height="55" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="375" y="237" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">dp[i−1] ≤ 0 → 重启</text>
  <text x="375" y="256" text-anchor="middle" font-size="11" fill="#555">dp[i] = nums[i]</text>

  <!-- Summary -->
  <rect x="40" y="290" width="440" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="260" y="312" text-anchor="middle" font-size="12" fill="#444">核心直觉：负的前缀只会拖累后面，不如丢弃重新开始</text>
  <text x="260" y="330" text-anchor="middle" font-size="11" fill="#888">答案 = max(dp[0], dp[1], ..., dp[n−1])</text>
</svg>