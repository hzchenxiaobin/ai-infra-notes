<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b85450"/>
    </marker>
  </defs>

  <rect width="600" height="470" fill="#fafafa"/>

  <text x="300" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：word="SEE"，从 S(1,3) 出发</text>
  <text x="300" y="44" text-anchor="middle" font-size="11" fill="#888">上方分支失败回溯 → 下方分支成功 S→E→E</text>

  <!-- ===== grid state 1: start ===== -->
  <text x="120" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">步骤 1：起点 S(1,3)</text>
  <g font-size="12">
    <rect x="60" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="77" y="102" text-anchor="middle" fill="#446688">A</text>
    <rect x="94" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="111" y="102" text-anchor="middle" fill="#446688">B</text>
    <rect x="128" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="145" y="102" text-anchor="middle" fill="#446688">C</text>
    <rect x="162" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="179" y="102" text-anchor="middle" fill="#446688">E</text>
    <rect x="60" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="77" y="136" text-anchor="middle" fill="#446688">S</text>
    <rect x="94" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="111" y="136" text-anchor="middle" fill="#446688">F</text>
    <rect x="128" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="145" y="136" text-anchor="middle" fill="#446688">C</text>
    <rect x="162" y="114" width="34" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/><text x="179" y="136" text-anchor="middle" fill="#4a7a3a" font-weight="bold">S</text>
    <rect x="60" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="77" y="170" text-anchor="middle" fill="#446688">A</text>
    <rect x="94" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="111" y="170" text-anchor="middle" fill="#446688">D</text>
    <rect x="128" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="145" y="170" text-anchor="middle" fill="#446688">E</text>
    <rect x="162" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="179" y="170" text-anchor="middle" fill="#446688">E</text>
  </g>
  <text x="120" y="196" text-anchor="middle" font-size="9" fill="#4a7a3a">匹配 word[0]='S' ✓</text>

  <!-- arrow -->
  <path d="M 210 140 L 240 140" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>

  <!-- ===== grid state 2: try up (0,3)=E, mark ===== -->
  <text x="350" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">步骤 2：上方 (0,3)=E</text>
  <g font-size="12">
    <rect x="290" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="307" y="102" text-anchor="middle" fill="#446688">A</text>
    <rect x="324" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="341" y="102" text-anchor="middle" fill="#446688">B</text>
    <rect x="358" y="80" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="375" y="102" text-anchor="middle" fill="#446688">C</text>
    <rect x="392" y="80" width="34" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/><text x="409" y="102" text-anchor="middle" fill="#4a7a3a" font-weight="bold">E</text>
    <rect x="290" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="307" y="136" text-anchor="middle" fill="#446688">S</text>
    <rect x="324" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="341" y="136" text-anchor="middle" fill="#446688">F</text>
    <rect x="358" y="114" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="375" y="136" text-anchor="middle" fill="#446688">C</text>
    <rect x="392" y="114" width="34" height="34" fill="#f0f0f0" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2" filter="url(#rough2)"/><text x="409" y="136" text-anchor="middle" fill="#888">#</text>
    <rect x="290" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="307" y="170" text-anchor="middle" fill="#446688">A</text>
    <rect x="324" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="341" y="170" text-anchor="middle" fill="#446688">D</text>
    <rect x="358" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="375" y="170" text-anchor="middle" fill="#446688">E</text>
    <rect x="392" y="148" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="409" y="170" text-anchor="middle" fill="#446688">E</text>
  </g>
  <text x="350" y="196" text-anchor="middle" font-size="9" fill="#d6a040">word[1]='E' ✓，标记#</text>

  <!-- arrow -->
  <path d="M 440 140 L 470 140" stroke="#b85450" stroke-width="1.4" fill="none" stroke-dasharray="3,2" marker-end="url(#arrR)" filter="url(#rough2)"/>

  <!-- ===== grid state 3: up branch fails ===== -->
  <text x="520" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">步骤 3-5：失败回溯</text>
  <rect x="470" y="80" width="100" height="114" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="520" y="102" text-anchor="middle" font-size="9" fill="#b85450">(0,2)=C≠E ✗</text>
  <text x="520" y="118" text-anchor="middle" font-size="9" fill="#b85450">(1,3)=# 已访问 ✗</text>
  <text x="520" y="134" text-anchor="middle" font-size="9" fill="#b85450">无方向可走</text>
  <text x="520" y="156" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">回溯恢复</text>
  <text x="520" y="172" text-anchor="middle" font-size="9" fill="#d6a040">board[0][3]='E'</text>
  <text x="520" y="188" text-anchor="middle" font-size="9" fill="#888">→ 试下方</text>

  <!-- ===== grid state 4: try down (2,3)=E, success ===== -->
  <text x="180" y="234" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">步骤 6-7：下方 (2,3)=E → (2,2)=E 成功</text>
  <g font-size="12">
    <rect x="110" y="244" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="127" y="266" text-anchor="middle" fill="#446688">A</text>
    <rect x="144" y="244" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="161" y="266" text-anchor="middle" fill="#446688">B</text>
    <rect x="178" y="244" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="195" y="266" text-anchor="middle" fill="#446688">C</text>
    <rect x="212" y="244" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="229" y="266" text-anchor="middle" fill="#446688">E</text>
    <rect x="110" y="278" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="127" y="300" text-anchor="middle" fill="#446688">S</text>
    <rect x="144" y="278" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="161" y="300" text-anchor="middle" fill="#446688">F</text>
    <rect x="178" y="278" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="195" y="300" text-anchor="middle" fill="#446688">C</text>
    <rect x="212" y="278" width="34" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/><text x="229" y="300" text-anchor="middle" fill="#4a7a3a" font-weight="bold">S</text>
    <rect x="110" y="312" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="127" y="334" text-anchor="middle" fill="#446688">A</text>
    <rect x="144" y="312" width="34" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/><text x="161" y="334" text-anchor="middle" fill="#446688">D</text>
    <rect x="178" y="312" width="34" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/><text x="195" y="334" text-anchor="middle" fill="#4a7a3a" font-weight="bold">E</text>
    <rect x="212" y="312" width="34" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/><text x="229" y="334" text-anchor="middle" fill="#4a7a3a" font-weight="bold">E</text>
  </g>
  <!-- path arrows -->
  <text x="252" y="300" font-size="14" fill="#4a7a3a" font-weight="bold">↓</text>
  <text x="206" y="334" font-size="14" fill="#4a7a3a" font-weight="bold">←</text>
  <text x="180" y="362" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">路径 S(1,3)→E(2,3)→E(2,2) ✓</text>

  <!-- ===== summary table ===== -->
  <rect x="330" y="244" width="240" height="120" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="450" y="264" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">回溯的「回」</text>
  <text x="345" y="284" font-size="10" fill="#555">• 上方分支失败后</text>
  <text x="345" y="300" font-size="10" fill="#555">  必须恢复 board[0][3]='E'</text>
  <text x="345" y="316" font-size="10" fill="#555">  否则该格被永久封死</text>
  <text x="345" y="336" font-size="10" fill="#4a7a3a" font-weight="bold">• 回溯让兄弟分支</text>
  <text x="345" y="352" font-size="10" fill="#4a7a3a" font-weight="bold">  能复用该格子</text>

  <!-- ===== key ===== -->
  <rect x="40" y="380" width="520" height="76" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="300" y="402" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">回溯 = 选择-递归-撤销</text>
  <text x="60" y="422" font-size="10" fill="#555">• 选择：board[i][j]='#'（标记已访问，防止路径内重复）</text>
  <text x="60" y="438" font-size="10" fill="#555">• 递归：四方向 dfs，任一成功则返回 true</text>
  <text x="60" y="454" font-size="10" fill="#555">• 撤销：board[i][j]=word[index]（恢复，让兄弟分支可用）</text>
</svg>
