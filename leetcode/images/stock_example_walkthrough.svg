<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">示例演算：prices = [7, 1, 5, 3, 6, 4]</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- table header -->
  <g filter="url(#sk)">
    <rect x="40" y="66" width="800" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="90" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">i</text>
  <text x="210" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">prices[i]</text>
  <text x="370" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">min_price</text>
  <text x="540" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">今日卖出利润</text>
  <text x="730" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">ans</text>

  <!-- rows -->
  <g font-size="12" fill="#444">
    <!-- i=0 -->
    <g filter="url(#sk)"><rect x="40" y="98" width="800" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="90" y="116" text-anchor="middle">0</text>
    <text x="210" y="116" text-anchor="middle" fill="#888">7</text>
    <text x="370" y="116" text-anchor="middle" fill="#888">7</text>
    <text x="540" y="116" text-anchor="middle" fill="#888">0</text>
    <text x="730" y="116" text-anchor="middle" fill="#888">0</text>

    <!-- i=1, min drops to 1 -->
    <g filter="url(#sk)"><rect x="40" y="126" width="800" height="28" fill="#eaf6ee" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="90" y="144" text-anchor="middle">1</text>
    <text x="210" y="144" text-anchor="middle" fill="#2e6e2e" font-weight="bold">1</text>
    <text x="370" y="144" text-anchor="middle" fill="#2e6e2e" font-weight="bold">1 ← 更新最小</text>
    <text x="540" y="144" text-anchor="middle">0</text>
    <text x="730" y="144" text-anchor="middle">0</text>

    <!-- i=2, profit=4 -->
    <g filter="url(#sk)"><rect x="40" y="154" width="800" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="90" y="172" text-anchor="middle">2</text>
    <text x="210" y="172" text-anchor="middle">5</text>
    <text x="370" y="172" text-anchor="middle">1</text>
    <text x="540" y="172" text-anchor="middle" fill="#4a8edb">5 - 1 = 4</text>
    <text x="730" y="172" text-anchor="middle" fill="#4a8edb" font-weight="bold">4</text>

    <!-- i=3 -->
    <g filter="url(#sk)"><rect x="40" y="182" width="800" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="90" y="200" text-anchor="middle">3</text>
    <text x="210" y="200" text-anchor="middle">3</text>
    <text x="370" y="200" text-anchor="middle">1</text>
    <text x="540" y="200" text-anchor="middle">3 - 1 = 2</text>
    <text x="730" y="200" text-anchor="middle">4</text>

    <!-- i=4, profit=5 max -->
    <g filter="url(#sk)"><rect x="40" y="210" width="800" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
    <text x="90" y="228" text-anchor="middle">4</text>
    <text x="210" y="228" text-anchor="middle">6</text>
    <text x="370" y="228" text-anchor="middle">1</text>
    <text x="540" y="228" text-anchor="middle" fill="#b85450" font-weight="bold">6 - 1 = 5 ★</text>
    <text x="730" y="228" text-anchor="middle" fill="#b85450" font-weight="bold">5 ← 最大</text>

    <!-- i=5 -->
    <g filter="url(#sk)"><rect x="40" y="238" width="800" height="28" fill="#fff" stroke="#ddd" stroke-width="0.8"/></g>
    <text x="90" y="256" text-anchor="middle">5</text>
    <text x="210" y="256" text-anchor="middle">4</text>
    <text x="370" y="256" text-anchor="middle">1</text>
    <text x="540" y="256" text-anchor="middle">4 - 1 = 3</text>
    <text x="730" y="256" text-anchor="middle">5</text>
  </g>

  <!-- price chart mini -->
  <g filter="url(#sk)">
    <rect x="60" y="290" width="760" height="110" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="314" font-size="12" font-weight="bold" fill="#444">价格走势与买卖点：</text>
  <line x1="80" y1="380" x2="780" y2="380" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>

  <!-- price points -->
  <path d="M 120 350 L 200 310 L 280 335 L 360 345 L 440 320 L 520 330" stroke="#4a8edb" stroke-width="2" fill="none" filter="url(#sk)"/>
  <circle cx="200" cy="310" r="5" fill="#2e6e2e" filter="url(#sk)"/>
  <text x="200" y="300" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">买入 1</text>
  <circle cx="440" cy="320" r="5" fill="#b85450" filter="url(#sk)"/>
  <text x="440" y="310" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">卖出 6</text>
  <path d="M 200 310 L 440 320" stroke="#7a5415" stroke-width="1.4" stroke-dasharray="5 3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="320" y="348" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">profit = 6 - 1 = 5</text>
</svg>
