<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="420" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">合并区间示例演算</text>
  <path d="M 300 40 Q 460 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="66" text-anchor="middle" font-size="12" fill="#666">intervals = [[1,3],[2,6],[8,10],[15,18]]（已按 start 排序）</text>

  <!-- Step i=0: init -->
  <g filter="url(#sk)"><rect x="40" y="84" width="840" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="60" y="108" font-size="12" fill="#2b6e9e" font-weight="bold">初始：</text>
  <text x="120" y="108" font-size="11" fill="#444" font-family="monospace">merged = [[1,3]]</text>

  <!-- Step i=1: overlap -->
  <g filter="url(#sk)"><rect x="40" y="132" width="840" height="56" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="60" y="156" font-size="12" fill="#2e6e2e" font-weight="bold">i=1:</text>
  <text x="100" y="156" font-size="11" fill="#444" font-family="monospace">cur=[2,6], 2 ≤ 3 → 重叠</text>
  <text x="380" y="156" font-size="11" fill="#7a5415" font-family="monospace">end = max(3, 6) = 6</text>
  <text x="60" y="176" font-size="11" fill="#444" font-family="monospace">merged = [[1,6]]</text>

  <!-- number line visualization for i=1 -->
  <line x1="560" y1="160" x2="860" y2="160" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="580" y="150" width="50" height="20" rx="3" fill="#bcd6f0" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="605" y="164" text-anchor="middle" font-size="9" fill="#234">[1,3]</text>
  <g filter="url(#sk)"><rect x="600" y="150" width="100" height="20" rx="3" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="650" y="164" text-anchor="middle" font-size="9" fill="#2e6e2e">[2,6]</text>

  <!-- Step i=2: no overlap -->
  <g filter="url(#sk)"><rect x="40" y="196" width="840" height="56" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1"/></g>
  <text x="60" y="220" font-size="12" fill="#b85450" font-weight="bold">i=2:</text>
  <text x="100" y="220" font-size="11" fill="#444" font-family="monospace">cur=[8,10], 8 &gt; 6 → 不重叠</text>
  <text x="380" y="220" font-size="11" fill="#7a5415" font-family="monospace">push → 新增区间</text>
  <text x="60" y="240" font-size="11" fill="#444" font-family="monospace">merged = [[1,6],[8,10]]</text>

  <line x1="560" y1="224" x2="860" y2="224" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="580" y="214" width="140" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
  <text x="650" y="228" text-anchor="middle" font-size="9" fill="#7a5415">[1,6]</text>
  <g filter="url(#sk)"><rect x="740" y="214" width="70" height="20" rx="3" fill="#bcd6f0" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="775" y="228" text-anchor="middle" font-size="9" fill="#234">[8,10]</text>

  <!-- Step i=3: no overlap -->
  <g filter="url(#sk)"><rect x="40" y="260" width="840" height="56" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1"/></g>
  <text x="60" y="284" font-size="12" fill="#b85450" font-weight="bold">i=3:</text>
  <text x="100" y="284" font-size="11" fill="#444" font-family="monospace">cur=[15,18], 15 &gt; 10 → 不重叠</text>
  <text x="380" y="284" font-size="11" fill="#7a5415" font-family="monospace">push → 新增区间</text>
  <text x="60" y="304" font-size="11" fill="#444" font-family="monospace">merged = [[1,6],[8,10],[15,18]]</text>

  <!-- Final result -->
  <g filter="url(#sk)">
    <rect x="40" y="330" width="840" height="76" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="460" y="356" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">最终结果：[[1,6], [8,10], [15,18]]</text>

  <line x1="80" y1="378" x2="840" y2="378" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="80" y="368" width="140" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="150" y="382" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">[1,6]</text>
  <g filter="url(#sk)"><rect x="300" y="368" width="70" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="335" y="382" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">[8,10]</text>
  <g filter="url(#sk)"><rect x="500" y="368" width="90" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="545" y="382" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">[15,18]</text>
</svg>
