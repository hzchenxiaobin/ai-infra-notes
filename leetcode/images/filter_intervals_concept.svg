<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="83" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="680" height="380" fill="#fdfcf7"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">区间操作：合并 → 减去空闲</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1: Merge -->
  <text x="340" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① 合并重叠或相接的区间</text>

  <!-- Before merge -->
  <text x="40" y="90" font-size="11" fill="#888">合并前：</text>
  <g filter="url(#sk)"><rect x="100" y="78" width="80" height="18" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" rx="3"/></g>
  <text x="140" y="91" text-anchor="middle" font-size="9" fill="#2b6e9e">[2,6]</text>
  <g filter="url(#sk)"><rect x="180" y="78" width="80" height="18" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" rx="3"/></g>
  <text x="220" y="91" text-anchor="middle" font-size="9" fill="#2b6e9e">[4,8]</text>
  <g filter="url(#sk)"><rect x="270" y="78" width="30" height="18" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="3"/></g>
  <text x="285" y="91" text-anchor="middle" font-size="8" fill="#7a5415">[10,10]</text>
  <g filter="url(#sk)"><rect x="300" y="78" width="50" height="18" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="3"/></g>
  <text x="325" y="91" text-anchor="middle" font-size="8" fill="#7a5415">[10,12]</text>
  <g filter="url(#sk)"><rect x="360" y="78" width="50" height="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="3"/></g>
  <text x="385" y="91" text-anchor="middle" font-size="8" fill="#2e6e2e">[14,16]</text>

  <!-- Arrow down -->
  <path d="M 340 100 L 340 115" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#ar)" filter="url(#sk)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/></marker></defs>

  <!-- After merge -->
  <text x="40" y="130" font-size="11" fill="#888">合并后：</text>
  <g filter="url(#sk)"><rect x="100" y="118" width="160" height="18" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5" rx="3"/></g>
  <text x="180" y="131" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">[2,8]</text>
  <g filter="url(#sk)"><rect x="270" y="118" width="80" height="18" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5" rx="3"/></g>
  <text x="310" y="131" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">[10,12]</text>
  <g filter="url(#sk)"><rect x="360" y="118" width="50" height="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
  <text x="385" y="131" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">[14,16]</text>

  <!-- Merge rules -->
  <g filter="url(#sk)">
    <rect x="440" y="78" width="220" height="60" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="460" y="98" font-size="11" font-weight="bold" fill="#2b2b2b">合并条件</text>
  <text x="460" y="116" font-size="10" fill="#444" font-family="monospace">next.start ≤ cur.end + 1</text>
  <text x="460" y="130" font-size="10" fill="#888">重叠或相接（端点+1）</text>

  <!-- Step 2: Subtract -->
  <line x1="30" y1="155" x2="650" y2="155" stroke="#e0e0e0" stroke-width="1" filter="url(#sk)"/>
  <text x="340" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">② 减去空闲区间 [7, 11]</text>

  <!-- Free interval visualization -->
  <g filter="url(#sk)">
    <rect x="250" y="190" width="120" height="20" fill="#f5e0e0" stroke="#b85450" stroke-width="1.5" rx="3" opacity="0.6"/>
  </g>
  <text x="310" y="204" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">空闲 [7,11]</text>

  <!-- Number line -->
  <g filter="url(#sk)">
    <line x1="80" y1="230" x2="600" y2="230" stroke="#999" stroke-width="1.2"/>
  </g>
  <g font-size="9" fill="#888">
    <text x="100" y="245" text-anchor="middle">2</text>
    <text x="160" y="245" text-anchor="middle">6</text>
    <text x="180" y="245" text-anchor="middle">7</text>
    <text x="240" y="245" text-anchor="middle">8</text>
    <text x="270" y="245" text-anchor="middle">10</text>
    <text x="310" y="245" text-anchor="middle">11</text>
    <text x="330" y="245" text-anchor="middle">12</text>
    <text x="385" y="245" text-anchor="middle">14</text>
    <text x="425" y="245" text-anchor="middle">16</text>
  </g>

  <!-- Merged intervals on number line -->
  <g filter="url(#sk)">
    <rect x="100" y="222" width="140" height="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" rx="2" opacity="0.7"/>
  </g>
  <g filter="url(#sk)">
    <rect x="270" y="222" width="60" height="16" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" rx="2" opacity="0.7"/>
  </g>
  <g filter="url(#sk)">
    <rect x="385" y="222" width="40" height="16" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" rx="2" opacity="0.7"/>
  </g>

  <!-- Free interval overlay -->
  <g filter="url(#sk)">
    <rect x="180" y="218" width="130" height="24" fill="#b85450" stroke="#b85450" stroke-width="1" rx="2" opacity="0.3"/>
  </g>

  <!-- Result -->
  <text x="40" y="270" font-size="11" fill="#888">结果：</text>
  <g filter="url(#sk)"><rect x="100" y="258" width="60" height="18" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5" rx="3"/></g>
  <text x="130" y="271" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">[2,6]</text>
  <g filter="url(#sk)"><rect x="170" y="258" width="20" height="18" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5" rx="3"/></g>
  <text x="180" y="271" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">[12,12]</text>
  <g filter="url(#sk)"><rect x="200" y="258" width="40" height="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5" rx="3"/></g>
  <text x="220" y="271" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">[14,16]</text>

  <!-- Explanation -->
  <g filter="url(#sk)">
    <rect x="280" y="258" width="380" height="60" rx="8" fill="#fffdf3" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="300" y="278" font-size="11" font-weight="bold" fill="#2b2b2b">逐区间减去 [7,11]：</text>
  <text x="300" y="294" font-size="10" fill="#444">[2,8] → [2,6]（截右端至 fs−1=6）</text>
  <text x="300" y="308" font-size="10" fill="#444">[10,12] → [12,12]（截左端至 fe+1=12）</text>
  <text x="300" y="322" font-size="10" fill="#444">[14,16] → [14,16]（无交集，不变）</text>

  <!-- Summary -->
  <g filter="url(#sk)">
    <rect x="40" y="330" width="600" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="340" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">两步：合并（O(n log n)）→ 减去空闲（O(n)）</text>
  <text x="340" y="363" text-anchor="middle" font-size="11" fill="#444">每个区间减去空闲后至多分裂为两段，需检查有效性</text>
</svg>
