<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="420" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：阶段一相遇 → 阶段二同速走 → 入口</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n)，空间 O(1)；Floyd 判圈法两阶段</text>

  <g font-size="10" fill="#333">
    <!-- Step 0: special case -->
    <rect x="40" y="64" width="460" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 特判</text>
    <text x="120" y="84" font-family="monospace" font-size="10" fill="#555">if (!head || !head.next) return null;</text>
    <text x="120" y="98" font-size="9" fill="#888">0 或 1 个节点无环</text>

    <path d="M 270 106 L 270 120" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: phase 1 -->
    <rect x="40" y="124" width="460" height="104" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="144" font-size="12" fill="#4a7a3a" font-weight="bold">② 阶段一：找相遇点</text>
    <text x="54" y="162" font-family="monospace" font-size="10" fill="#555">while (fast &amp;&amp; fast.next) {</text>
    <text x="70" y="180" font-family="monospace" font-size="10" fill="#446688">slow = slow.next;          // 慢走 1</text>
    <text x="70" y="196" font-family="monospace" font-size="10" fill="#b85450">fast = fast.next.next;     // 快走 2</text>
    <text x="70" y="212" font-family="monospace" font-size="10" fill="#d6a040">if (slow == fast) break;   // 相遇 → 进阶段二</text>
    <text x="54" y="224" font-family="monospace" font-size="10" fill="#555">}</text>

    <path d="M 270 230 L 270 244" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: no cycle -->
    <rect x="40" y="248" width="460" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="268" font-size="12" fill="#b85450" font-weight="bold">③ 若 fast 到 null</text>
    <text x="170" y="268" font-family="monospace" font-size="10" fill="#555">return null;   // 无环</text>
    <text x="170" y="282" font-size="9" fill="#888">循环正常结束（非 break）说明快指针到尾</text>

    <path d="M 270 290 L 270 304" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4: phase 2 -->
    <rect x="40" y="308" width="460" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="328" font-size="12" fill="#d6a040" font-weight="bold">④ 阶段二：找入口</text>
    <text x="54" y="346" font-family="monospace" font-size="10" fill="#555">slow = head;</text>
    <text x="54" y="360" font-family="monospace" font-size="10" fill="#555">while (slow != fast) { slow=slow.next; fast=fast.next; }   // 都走 1</text>

    <path d="M 270 370 L 270 384" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 5: return -->
    <rect x="40" y="388" width="460" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="406" font-family="monospace" font-size="11" fill="#4a7a3a" font-weight="bold">return slow;   // 再次相遇 = 环入口</text>
  </g>
</svg>
