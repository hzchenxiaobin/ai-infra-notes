<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode 题解</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="/js/marked.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <link href="/css/prism-tomorrow.min.css" rel="stylesheet">
    <script src="/js/prism.min.js"></script>
    <script src="/js/prism-c.min.js"></script>
    <script src="/js/prism-bash.min.js"></script>
    <script src="/js/prism-python.min.js"></script>
</head>
<body>
    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <div class="site-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/index.html" style="text-decoration: none;">
                    <h1 class="sidebar-title">AI Infra 学习笔记</h1>
                    <p class="sidebar-subtitle">LeetCode 题解</p>
                </a>
            </div>
            <nav class="sidebar-nav">
<a class="nav-link active" href="/leetcode/index.html">📌 题解列表</a>
<div class="nav-section-title">题目</div>
<a class="nav-link" href="/leetcode/problems/最大总价值题解.html">最大总价值</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">LeetCode 题解</h1>
                <a class="back-link" href="/leetcode/index.html">← 返回题解列表</a>
            </div>
            <article class="content" id="content"></article>
            <div class="day-nav-bottom"><a class="back-link" href="/leetcode/index.html">← 返回题解列表</a></div>
        </main>
    </div>

    <button class="back-to-top" aria-label="Back to top">↑</button>

    <script>
        const markdown = `# LeetCode 题解

> 算法题解题笔记与思路整理。

## 题目列表

<div class="day-cards">
<a class="day-card" href="/leetcode/problems/最大总价值题解.html">
  <div class="day-card-number">LeetCode</div>
  <div class="day-card-title">最大总价值</div>
</a>
</div>
`;

        const renderer = new marked.Renderer();
        marked.setOptions({
            renderer: renderer,
            headerIds: false,
            gfm: true,
            breaks: false,
            sanitize: false
        });

        try {
            if (typeof marked === 'undefined') {
                throw new Error('marked.js failed to load.');
            }
            document.getElementById('content').innerHTML = marked.parse(markdown);

            if (window.Prism) {
                Prism.highlightAll();
            }
        } catch (err) {
            document.getElementById('content').innerHTML = '<div style="padding: 20px; color: #ff7b72; background: #2d1515; border-radius: 8px;">' +
                '<h2>⚠️ 页面渲染失败</h2>' +
                '<p>' + err.message + '</p>' +
                '</div>';
            console.error('Markdown render error:', err);
        }
    </script>
    <script src="/js/main.js"></script>
</body>
</html>
