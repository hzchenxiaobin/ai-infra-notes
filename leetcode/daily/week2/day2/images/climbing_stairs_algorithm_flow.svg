<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">DP 四步法：状态 → 转移 → 初始化 → 计算</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">所有动态规划题通用的解题骨架</text>

  <!-- ===== Four steps as boxes ===== -->
  <g font-size="10" fill="#333">
    <!-- Step 1: 状态定义 -->
    <rect x="40" y="70" width="200" height="64" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="140" y="90" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">① 状态定义</text>
    <text x="140" y="108" text-anchor="middle" font-size="10" fill="#555">f(i) = 爬到第 i 阶的方法数</text>
    <text x="140" y="124" text-anchor="middle" font-size="9" fill="#888">「i 阶对应什么子问题？」</text>

    <!-- arrow down -->
    <path d="M 140 134 L 140 148" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: 转移方程 -->
    <rect x="40" y="150" width="200" height="64" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="140" y="170" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">② 转移方程</text>
    <text x="140" y="188" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">f(i) = f(i-1) + f(i-2)</text>
    <text x="140" y="204" text-anchor="middle" font-size="9" fill="#888">「最后一步怎么来？」</text>

    <!-- arrow down -->
    <path d="M 140 214 L 140 228" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: 初始条件 -->
    <rect x="40" y="230" width="200" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="140" y="250" text-anchor="middle" font-size="12" fill="#d6a040" font-weight="bold">③ 初始条件</text>
    <text x="140" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">f(1) = 1, f(2) = 2</text>
    <text x="140" y="284" text-anchor="middle" font-size="9" fill="#888">「最小子问题的答案」</text>

    <!-- arrow down -->
    <path d="M 140 294 L 140 308" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4: 计算顺序 -->
    <rect x="40" y="310" width="200" height="64" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="140" y="330" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">④ 计算顺序</text>
    <text x="140" y="348" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">i = 3 → 4 → ... → n</text>
    <text x="140" y="364" text-anchor="middle" font-size="9" fill="#888">「自底向上，小问题先算」</text>
  </g>

  <!-- ===== Right: rolling array note ===== -->
  <rect x="280" y="150" width="210" height="120" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="385" y="172" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">滚动数组优化</text>
  <text x="296" y="192" font-family="monospace" font-size="10" fill="#333">int prev2 = 1;  // f(i-2)</text>
  <text x="296" y="208" font-family="monospace" font-size="10" fill="#333">int prev1 = 2;  // f(i-1)</text>
  <text x="296" y="224" font-family="monospace" font-size="10" fill="#4a7a3a">cur = prev1 + prev2;</text>
  <text x="296" y="240" font-family="monospace" font-size="10" fill="#446688">prev2 = prev1;</text>
  <text x="296" y="256" font-family="monospace" font-size="10" fill="#b85450">prev1 = cur;</text>

  <rect x="280" y="285" width="210" height="50" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="385" y="305" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">空间：O(n) → O(1)</text>
  <text x="385" y="322" text-anchor="middle" font-size="9" fill="#555">f(i) 只依赖前 2 个状态</text>
</svg>
