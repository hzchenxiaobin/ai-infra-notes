<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="380" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">BFS 队列：逐层出队，子节点入队尾</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">FIFO 保证距离根近的节点先处理 → 广度优先</text>

  <!-- ===== Tree ===== -->
  <text x="30" y="74" font-size="11" fill="#446688" font-weight="bold">二叉树</text>
  <g font-size="11">
    <!-- root -->
    <circle cx="120" cy="90" r="18" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
    <text x="120" y="95" text-anchor="middle" fill="#b85450" font-weight="bold">3</text>
    <!-- left child -->
    <circle cx="70" cy="150" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="70" y="155" text-anchor="middle" fill="#446688" font-weight="bold">9</text>
    <!-- right child -->
    <circle cx="180" cy="150" r="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="180" y="155" text-anchor="middle" fill="#4a7a3a" font-weight="bold">20</text>
    <!-- edges -->
    <line x1="108" y1="102" x2="80" y2="138" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <line x1="132" y1="102" x2="168" y2="138" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <!-- grandchildren -->
    <circle cx="145" cy="210" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="145" y="215" text-anchor="middle" fill="#d6a040" font-weight="bold">15</text>
    <circle cx="215" cy="210" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="215" y="215" text-anchor="middle" fill="#d6a040" font-weight="bold">7</text>
    <line x1="172" y1="162" x2="148" y2="198" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <line x1="188" y1="162" x2="212" y2="198" stroke="#888" stroke-width="1" filter="url(#rough2)"/>

    <!-- layer labels -->
    <text x="20" y="95" font-size="9" fill="#b85450" font-weight="bold">L0</text>
    <text x="20" y="155" font-size="9" fill="#446688" font-weight="bold">L1</text>
    <text x="20" y="215" font-size="9" fill="#d6a040" font-weight="bold">L2</text>
  </g>

  <!-- arrow to queue -->
  <path d="M 250 150 L 290 150" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Queue ===== -->
  <text x="300" y="74" font-size="11" fill="#444" font-weight="bold">队列（FIFO）</text>
  <g font-size="11">
    <!-- queue cells -->
    <rect x="300" y="90" width="36" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="318" y="108" text-anchor="middle" fill="#b85450" font-weight="bold">3</text>
    <text x="300" y="86" font-size="8" fill="#b85450">出队←</text>
    <text x="338" y="86" font-size="8" fill="#4a7a3a">←入队</text>

    <!-- after processing 3 -->
    <rect x="300" y="130" width="36" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="318" y="146" text-anchor="middle" fill="#446688" font-size="10">9</text>
    <rect x="338" y="130" width="36" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="356" y="146" text-anchor="middle" fill="#4a7a3a" font-size="10">20</text>
    <text x="300" y="126" font-size="8" fill="#888">L1 入队（3 的子节点）</text>

    <!-- after processing L1 -->
    <rect x="300" y="170" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="318" y="186" text-anchor="middle" fill="#d6a040" font-size="10">15</text>
    <rect x="338" y="170" width="36" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="356" y="186" text-anchor="middle" fill="#d6a040" font-size="10">7</text>
    <text x="300" y="166" font-size="8" fill="#888">L2 入队（20 的子节点）</text>
  </g>

  <!-- ===== Size snapshot ===== -->
  <rect x="40" y="250" width="440" height="60" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="60" y="270" font-size="11" fill="#4a7a3a" font-weight="bold">关键技巧：size 快照锁定层边界</text>
  <text x="60" y="286" font-family="monospace" font-size="10" fill="#333">int size = queue.size();   // 处理前快照</text>
  <text x="60" y="302" font-family="monospace" font-size="10" fill="#333">for (i = 0; i &lt; size; ++i) { ... }  // 恰好一整层，子节点入队不影响</text>

  <rect x="40" y="324" width="440" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="260" y="342" text-anchor="middle" font-size="10" fill="#555">不固定 size → for 会跨层处理，level 列表混乱</text>
  <text x="260" y="358" text-anchor="middle" font-size="10" fill="#555">固定 size → 每轮 for 恰好处理一层，层边界清晰</text>
</svg>
