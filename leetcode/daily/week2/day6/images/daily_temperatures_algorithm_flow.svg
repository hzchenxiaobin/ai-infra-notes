<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="400" fill="#fafafa"/>

  <text x="260" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">算法流程：遍历 → 比栈顶大则弹栈结算 → 入栈</text>
  <text x="260" y="44" text-anchor="middle" font-size="11" fill="#888">时间 O(n) 均摊，空间 O(n)；每元素入栈出栈各 1 次</text>

  <g font-size="10" fill="#333">
    <!-- Step 1: init -->
    <rect x="40" y="64" width="440" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="84" font-size="12" fill="#446688" font-weight="bold">① 初始化</text>
    <text x="130" y="84" font-family="monospace" font-size="10" fill="#555">answer = [0] * n;  stack = []</text>
    <text x="130" y="100" font-size="9" fill="#888">answer 全填 0（无更高温度的默认值），栈空</text>

    <path d="M 260 110 L 260 124" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 2: for loop -->
    <rect x="40" y="128" width="440" height="130" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="148" font-size="12" fill="#4a7a3a" font-weight="bold">② 遍历每天 i</text>
    <text x="54" y="166" font-family="monospace" font-size="10" fill="#555">for (int i = 0; i &lt; n; ++i) {</text>
    <text x="70" y="184" font-family="monospace" font-size="10" fill="#d6a040">// while 栈非空 且 当前温度 &gt; 栈顶温度</text>
    <text x="70" y="200" font-family="monospace" font-size="10" fill="#b85450">while (!stk.empty() &amp;&amp; T[i] &gt; T[stk.top()]) {</text>
    <text x="86" y="216" font-family="monospace" font-size="10" fill="#b85450">int top = stk.top(); stk.pop();</text>
    <text x="86" y="232" font-family="monospace" font-size="10" fill="#b85450">answer[top] = i - top;  // 结算：隔 i-top 天</text>
    <text x="70" y="248" font-family="monospace" font-size="10" fill="#555">}</text>

    <path d="M 260 262 L 260 276" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 3: push -->
    <rect x="40" y="280" width="440" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="300" font-size="12" fill="#d6a040" font-weight="bold">③ 入栈</text>
    <text x="110" y="300" font-family="monospace" font-size="10" fill="#555">stk.push(i);   // 当前入栈，等后续更大的结算</text>
    <text x="110" y="316" font-size="9" fill="#888">保持栈内温度单调递减</text>
    <text x="110" y="330" font-size="9" fill="#888">}</text>

    <path d="M 260 340 L 260 354" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- Step 4: return -->
    <rect x="40" y="358" width="440" height="34" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="54" y="378" font-size="12" fill="#b85450" font-weight="bold">④ 返回</text>
    <text x="110" y="378" font-family="monospace" font-size="10" fill="#555">return answer;  // 栈中剩余元素 answer 已是 0</text>
  </g>
</svg>
