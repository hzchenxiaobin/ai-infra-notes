<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="540" height="400" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：i=1（nums[i]=-1）找到两组解</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">nums = [-4,-1,-1,0,1,2]（排序后），target = -(-1) = 1</text>

  <!-- ===== Step 1: first solution [-1,-1,2] ===== -->
  <text x="30" y="74" font-size="11" fill="#b85450" font-weight="bold">步骤 1：left=2(nums[2]=-1), right=5(nums[5]=2)</text>

  <g font-size="11" fill="#333">
    <!-- array -->
    <rect x="40" y="84" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="62" y="106" text-anchor="middle" font-size="12" fill="#888">-4</text>
    <text x="62" y="76" text-anchor="middle" font-size="8" fill="#888">[0]</text>

    <rect x="88" y="84" width="44" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="110" y="106" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">-1</text>
    <text x="110" y="76" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">i</text>

    <rect x="136" y="84" width="44" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="158" y="106" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">-1</text>
    <text x="158" y="76" text-anchor="middle" font-size="8" fill="#446688" font-weight="bold">left</text>

    <rect x="184" y="84" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="206" y="106" text-anchor="middle" font-size="12" fill="#888">0</text>

    <rect x="232" y="84" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="254" y="106" text-anchor="middle" font-size="12" fill="#888">1</text>

    <rect x="280" y="84" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="302" y="106" text-anchor="middle" font-size="12" fill="#888">2</text>

    <rect x="328" y="84" width="44" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="350" y="106" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">2</text>
    <text x="350" y="76" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">right</text>
  </g>

  <rect x="400" y="84" width="120" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="460" y="100" text-anchor="middle" font-size="9" fill="#888">-1 + (-1) + 2 =</text>
  <text x="460" y="116" text-anchor="middle" font-size="12" fill="#d6a040" font-weight="bold">0 ✓ 找到！</text>

  <rect x="40" y="128" width="200" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="140" y="143" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">记录 [-1, -1, 2]，left++, right--</text>

  <path d="M 260 144 L 260 158" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Step 2: second solution [-1,0,1] ===== -->
  <text x="30" y="178" font-size="11" fill="#4a7a3a" font-weight="bold">步骤 2：left=3(nums[3]=0), right=4(nums[4]=1)</text>

  <g font-size="11" fill="#333">
    <rect x="40" y="188" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="62" y="210" text-anchor="middle" font-size="12" fill="#888">-4</text>

    <rect x="88" y="188" width="44" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="110" y="210" text-anchor="middle" font-size="13" fill="#b85450" font-weight="bold">-1</text>
    <text x="110" y="180" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">i</text>

    <rect x="136" y="188" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="158" y="210" text-anchor="middle" font-size="12" fill="#aaa">-1</text>

    <rect x="184" y="188" width="44" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="206" y="210" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">0</text>
    <text x="206" y="180" text-anchor="middle" font-size="8" fill="#446688" font-weight="bold">left</text>

    <rect x="232" y="188" width="44" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="254" y="210" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">1</text>
    <text x="254" y="180" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">right</text>

    <rect x="280" y="188" width="44" height="36" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="302" y="210" text-anchor="middle" font-size="12" fill="#888">2</text>
  </g>

  <rect x="400" y="188" width="120" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="460" y="204" text-anchor="middle" font-size="9" fill="#888">-1 + 0 + 1 =</text>
  <text x="460" y="220" text-anchor="middle" font-size="12" fill="#d6a040" font-weight="bold">0 ✓ 找到！</text>

  <rect x="40" y="232" width="200" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="140" y="247" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">记录 [-1, 0, 1]，left++, right--</text>

  <!-- ===== Dedup note ===== -->
  <line x1="20" y1="276" x2="520" y2="276" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="298" font-size="11" fill="#d6a040" font-weight="bold">i=2 时 nums[2]=-1 == nums[1]=-1 → 去重跳过</text>
  <text x="30" y="314" font-size="10" fill="#555">避免再次找到 [-1, 0, 1]（与 i=1 重复）</text>

  <!-- ===== Result ===== -->
  <rect x="30" y="332" width="480" height="56" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="270" y="354" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">最终结果：[[-1,-1,2], [-1,0,1]]</text>
  <text x="270" y="374" text-anchor="middle" font-size="10" fill="#555">i=1 找到 2 组，i=2 去重跳过，i=3 起 nums[i]≥0 无解</text>
</svg>
