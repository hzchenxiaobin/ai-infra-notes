<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">买卖股票：一次遍历维护历史最低价</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- price line chart -->
  <line x1="80" y1="280" x2="820" y2="280" stroke="#5a5a5a" stroke-width="1.4" filter="url(#sk)"/>
  <line x1="80" y1="80" x2="80" y2="280" stroke="#5a5a5a" stroke-width="1.4" filter="url(#sk)"/>
  <text x="60" y="86" font-size="10" fill="#666">价格</text>
  <text x="820" y="300" font-size="10" fill="#666">天数 →</text>

  <!-- price points -->
  <path d="M 100 240 L 160 220 L 220 250 L 280 200 L 340 180 L 400 210 L 460 150 L 520 170 L 580 130 L 640 160 L 700 120 L 760 140" stroke="#4a8edb" stroke-width="2" fill="none" filter="url(#sk)"/>

  <circle cx="220" cy="250" r="5" fill="#2e6e2e" filter="url(#sk)"/>
  <text x="220" y="270" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">min=1（买入）</text>

  <circle cx="700" cy="120" r="5" fill="#b85450" filter="url(#sk)"/>
  <text x="700" y="110" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">max profit（卖出）</text>

  <path d="M 220 250 L 700 120" stroke="#7a5415" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="460" y="180" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">profit = 6 - 1 = 5</text>

  <!-- algorithm -->
  <g filter="url(#sk)">
    <rect x="60" y="300" width="760" height="68" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="322" font-size="12" font-weight="bold" fill="#444">一次遍历 O(n)：</text>
  <text x="80" y="342" font-size="11" fill="#2e6e2e">min_price = min(min_price, price[i])    ← 维护历史最低</text>
  <text x="80" y="360" font-size="11" fill="#b85450">max_profit = max(max_profit, price[i] - min_price)    ← 今天卖的最大利润</text>
</svg>
