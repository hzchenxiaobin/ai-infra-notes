<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="400" fill="#fafafa"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">合并区间：排序后贪心合并相邻重叠</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="72" text-anchor="middle" font-size="12" fill="#666">intervals = [[1,3],[2,6],[8,10],[15,18]] → 排序 → 遍历 → 合并重叠</text>

  <!-- 排序后的区间（数轴表示）-->
  <text x="40" y="100" font-size="12" font-weight="bold" fill="#2b6e9e">排序后：</text>
  <line x1="40" y1="130" x2="860" y2="130" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>

  <!-- [1,3] -->
  <g filter="url(#sk)">
    <rect x="60" y="116" width="60" height="28" rx="4" fill="#bcd6f0" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="90" y="134" text-anchor="middle" font-size="10" fill="#234">[1,3]</text>

  <!-- [2,6] overlaps with [1,3] -->
  <g filter="url(#sk)">
    <rect x="100" y="116" width="120" height="28" rx="4" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="160" y="134" text-anchor="middle" font-size="10" fill="#2e6e2e">[2,6]</text>

  <!-- [8,10] -->
  <g filter="url(#sk)">
    <rect x="340" y="116" width="80" height="28" rx="4" fill="#bcd6f0" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="380" y="134" text-anchor="middle" font-size="10" fill="#234">[8,10]</text>

  <!-- [15,18] -->
  <g filter="url(#sk)">
    <rect x="600" y="116" width="100" height="28" rx="4" fill="#bcd6f0" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="650" y="134" text-anchor="middle" font-size="10" fill="#234">[15,18]</text>

  <!-- 合并标注 -->
  <text x="200" y="166" font-size="11" fill="#b85450" font-weight="bold">2 ≤ 3 → 重叠，合并为 [1,6]</text>
  <path d="M 160 140 L 160 158" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <text x="380" y="166" font-size="11" fill="#4a8e4a" font-weight="bold">8 > 6 → 不重叠，追加</text>
  <text x="650" y="166" font-size="11" fill="#4a8e4a" font-weight="bold">15 > 10 → 不重叠，追加</text>

  <!-- 合并结果 -->
  <line x1="20" y1="190" x2="900" y2="190" stroke="#eee" stroke-width="1" filter="url(#sk)"/>

  <text x="40" y="218" font-size="12" font-weight="bold" fill="#7a5415">合并结果：</text>
  <line x1="40" y1="248" x2="860" y2="248" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>

  <!-- [1,6] merged -->
  <g filter="url(#sk)">
    <rect x="60" y="234" width="160" height="28" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="140" y="252" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">[1,6]</text>

  <!-- [8,10] -->
  <g filter="url(#sk)">
    <rect x="340" y="234" width="80" height="28" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="380" y="252" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">[8,10]</text>

  <!-- [15,18] -->
  <g filter="url(#sk)">
    <rect x="600" y="234" width="100" height="28" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="650" y="252" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">[15,18]</text>

  <!-- 与 Dynamic Batching 类比 -->
  <g filter="url(#sk)">
    <rect x="40" y="284" width="840" height="100" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="4 3"/>
  </g>
  <text x="460" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">与 Dynamic Batching 的模式类比</text>
  <text x="60" y="330" font-size="11" fill="#444">合并区间：排序后，时间上重叠的区间贪心合并为一个</text>
  <text x="60" y="348" font-size="11" fill="#444">Dynamic Batching：时间窗口内到达的请求贪心聚合为一个 batch</text>
  <text x="60" y="372" font-size="11" fill="#7a2828" font-weight="bold">共同模式：有序遍历 + 贪心聚合 —— 在重叠/窗口范围内合并，超出则新建</text>
</svg>
