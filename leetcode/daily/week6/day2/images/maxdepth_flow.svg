<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">两种求最大深度的流程</text>

  <!-- 左：DFS 递归 -->
  <text x="140" y="56" text-anchor="middle" font-size="13" fill="#446688" font-weight="bold">方法一：后序 DFS</text>

  <rect x="60" y="68" width="160" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="140" y="89" text-anchor="middle" font-size="11" fill="#333">dfs(root)</text>

  <path d="M 140 100 L 140 116" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="140,118 230,150 140,182 50,150" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="140" y="146" text-anchor="middle" font-size="11" fill="#333">root == null ?</text>
  <text x="140" y="162" text-anchor="middle" font-size="10" fill="#888">空树</text>

  <path d="M 50 150 L 30 150 L 30 196" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="58" y="142" font-size="10" fill="#b85450">是</text>
  <rect x="0" y="200" width="60" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="30" y="219" text-anchor="middle" font-size="11" fill="#333">返回 0</text>

  <path d="M 140 182 L 140 202" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="152" y="198" font-size="10" fill="#82b366">否</text>

  <rect x="50" y="206" width="180" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="140" y="226" text-anchor="middle" font-size="10" fill="#333">l=dfs(left)；r=dfs(right)</text>

  <path d="M 140 236 L 140 254" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="50" y="258" width="180" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="6" filter="url(#rough2)"/>
  <text x="140" y="278" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">返回 max(l, r) + 1</text>

  <text x="140" y="312" text-anchor="middle" font-size="10" fill="#888">空间 O(h)，递归栈</text>

  <!-- 右：BFS -->
  <text x="430" y="56" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">方法二：BFS 层序计数</text>

  <rect x="350" y="68" width="160" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="430" y="89" text-anchor="middle" font-size="11" fill="#333">q = [root]; depth = 0</text>

  <path d="M 430 100 L 430 116" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <polygon points="430,118 530,150 430,182 330,150" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="430" y="146" text-anchor="middle" font-size="11" fill="#333">q 非空 ?</text>
  <text x="430" y="162" text-anchor="middle" font-size="10" fill="#888">还有层</text>

  <path d="M 530 150 L 560 150 L 560 196" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="538" y="142" font-size="10" fill="#b85450">否</text>
  <rect x="510" y="200" width="60" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="540" y="219" text-anchor="middle" font-size="11" fill="#333">返回 depth</text>

  <path d="M 430 182 L 430 202" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="442" y="198" font-size="10" fill="#82b366">是</text>

  <rect x="340" y="206" width="180" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="430" y="226" text-anchor="middle" font-size="10" fill="#333">depth++；处理本层全部节点</text>

  <path d="M 430 236 L 430 254" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="340" y="258" width="180" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="430" y="278" text-anchor="middle" font-size="10" fill="#333">子节点入队，回到判空</text>

  <text x="430" y="312" text-anchor="middle" font-size="10" fill="#888">空间 O(n)，最宽层</text>

  <text x="290" y="356" text-anchor="middle" font-size="11" fill="#888">两者时间都 O(n)；深窄树 DFS 省</text>
  <text x="290" y="374" text-anchor="middle" font-size="11" fill="#888">空间，宽树 BFS 队列宽。最小深度题 BFS 更优（遇叶即返）</text>
</svg>
