<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="420" fill="#fafafa"/>

  <!-- Title -->
  <text x="290" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">LCA 核心递归：左子树 / 右子树 / 当前节点 三路决策</text>

  <!-- Example tree (left side) -->
  <text x="30" y="58" font-size="12" fill="#888">示例树:</text>
  <!-- root 3 -->
  <circle cx="120" cy="80" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="120" y="84" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3</text>
  <!-- 5 -->
  <circle cx="80" cy="130" r="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="80" y="134" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">5</text>
  <line x1="110" y1="92" x2="92" y2="118" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 1 -->
  <circle cx="160" cy="130" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="160" y="134" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">1</text>
  <line x1="130" y1="92" x2="148" y2="118" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
  <!-- 6 -->
  <circle cx="50" cy="180" r="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="50" y="184" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">6</text>
  <line x1="70" y1="142" x2="58" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 2 -->
  <circle cx="110" cy="180" r="14" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="110" y="184" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">2</text>
  <line x1="90" y1="142" x2="102" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 0 -->
  <circle cx="145" cy="180" r="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="145" y="184" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">0</text>
  <line x1="156" y1="142" x2="147" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 8 -->
  <circle cx="190" cy="180" r="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="190" y="184" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">8</text>
  <line x1="168" y1="142" x2="184" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 7 -->
  <circle cx="90" cy="230" r="13" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="90" y="234" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">7</text>
  <line x1="104" y1="194" x2="94" y2="220" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  <!-- 4 -->
  <circle cx="130" cy="230" r="13" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="130" y="234" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">4</text>
  <line x1="116" y1="194" x2="126" y2="220" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <!-- target markers -->
  <text x="110" y="208" text-anchor="middle" font-size="9" fill="#b85450">p=5</text>
  <text x="146" y="252" text-anchor="middle" font-size="9" fill="#b85450">q=1</text>

  <!-- LCA annotation -->
  <path d="M 120 96 L 120 270 L 60 285" stroke="#82b366" stroke-width="1.3" fill="none" stroke-dasharray="4,3" filter="url(#rough2)"/>
  <text x="40" y="300" font-size="11" fill="#4a7a3a" font-weight="bold">LCA=3?</text>
  <text x="40" y="316" font-size="10" fill="#888">(看右侧决策)</text>

  <!-- Right side: the 3-way decision -->
  <text x="340" y="58" font-size="12" fill="#444" font-weight="bold">dfs(root) 返回值的含义：</text>
  <text x="340" y="76" font-size="11" fill="#555">= root 子树中是否包含 p 或 q</text>

  <rect x="340" y="92" width="220" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="450" y="114" text-anchor="middle" font-size="11" fill="#333">left = dfs(root.left)</text>
  <rect x="340" y="130" width="220" height="34" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="450" y="152" text-anchor="middle" font-size="11" fill="#333">right = dfs(root.right)</text>

  <path d="M 450 164 L 450 178" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Decision diamond -->
  <polygon points="450,182 560,232 450,282 340,232" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="450" y="222" text-anchor="middle" font-size="11" fill="#333">left 和 right</text>
  <text x="450" y="238" text-anchor="middle" font-size="11" fill="#333">都不为空？</text>
  <text x="450" y="254" text-anchor="middle" font-size="10" fill="#888">(p、q 分居两侧)</text>

  <!-- Yes -> root is LCA -->
  <path d="M 450 282 L 450 296" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="462" y="292" font-size="10" fill="#82b366">是</text>
  <rect x="350" y="300" width="200" height="34" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="450" y="322" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">root 就是 LCA ⭐</text>

  <!-- No branches -->
  <path d="M 340 232 L 300 232 L 300 340" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="316" y="224" text-anchor="middle" font-size="10" fill="#b85450">否</text>
  <rect x="250" y="344" width="180" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="6" filter="url(#rough2)"/>
  <text x="340" y="364" text-anchor="middle" font-size="11" fill="#333">返回 left 或 right（非空者）</text>

  <!-- both null case -->
  <path d="M 560 232 L 580 232 L 580 340" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="500" y="344" width="80" height="30" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="540" y="364" text-anchor="middle" font-size="11" fill="#888">都空→null</text>

  <!-- summary -->
  <text x="290" y="400" text-anchor="middle" font-size="11" fill="#888">关键直觉：p、q 第一次"分居两侧"的节点就是 LCA；都在一侧则继续往下找</text>
</svg>
