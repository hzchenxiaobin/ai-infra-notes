<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="560" height="340" fill="#fafafa"/>

  <!-- Title -->
  <text x="280" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">滑动窗口：维护一个无重复字符的区间 [left, right]</text>

  <!-- Step 1: window = "abc", right moves to 'a' (duplicate) -->
  <text x="40" y="68" font-size="12" fill="#888">字符串:</text>
  <!-- char cells -->
  <rect x="90" y="52" width="44" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="112" y="73" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">a</text>
  <rect x="136" y="52" width="44" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="158" y="73" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">b</text>
  <rect x="182" y="52" width="44" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="204" y="73" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">c</text>
  <rect x="228" y="52" width="44" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="250" y="73" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">a</text>
  <rect x="274" y="52" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="296" y="73" text-anchor="middle" font-size="13" fill="#999">b</text>
  <rect x="320" y="52" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="342" y="73" text-anchor="middle" font-size="13" fill="#999">c</text>
  <rect x="366" y="52" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="388" y="73" text-anchor="middle" font-size="13" fill="#999">b</text>
  <rect x="412" y="52" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="434" y="73" text-anchor="middle" font-size="13" fill="#999">b</text>

  <!-- window bracket step1 -->
  <path d="M 90 96 Q 90 104 96 104 L 222 104 Q 228 104 228 96" stroke="#4a7a3a" stroke-width="1.5" fill="none" filter="url(#rough2)"/>
  <text x="159" y="120" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">窗口 = "abc" (无重复)</text>

  <!-- right pointer hits 'a' again -->
  <text x="250" y="44" text-anchor="middle" font-size="10" fill="#b85450">right → 重复!</text>
  <path d="M 250 46 L 250 50" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>

  <!-- Arrow: left must move past old 'a' -->
  <text x="280" y="148" text-anchor="middle" font-size="11" fill="#d6a040">↓ 遇到重复，left 右移跳过旧位置</text>

  <!-- Step 2: window = "bca" after moving left -->
  <text x="40" y="184" font-size="12" fill="#888">移动后:</text>
  <rect x="90" y="168" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="112" y="189" text-anchor="middle" font-size="13" fill="#999">a</text>
  <rect x="136" y="168" width="44" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="158" y="189" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">b</text>
  <rect x="182" y="168" width="44" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="204" y="189" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">c</text>
  <rect x="228" y="168" width="44" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="250" y="189" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">a</text>
  <rect x="274" y="168" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="296" y="189" text-anchor="middle" font-size="13" fill="#999">b</text>
  <rect x="320" y="168" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="342" y="189" text-anchor="middle" font-size="13" fill="#999">c</text>
  <rect x="366" y="168" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="388" y="189" text-anchor="middle" font-size="13" fill="#999">b</text>
  <rect x="412" y="168" width="44" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
  <text x="434" y="189" text-anchor="middle" font-size="13" fill="#999">b</text>

  <path d="M 136 212 Q 136 220 142 220 L 266 220 Q 272 220 272 212" stroke="#4a7a3a" stroke-width="1.5" fill="none" filter="url(#rough2)"/>
  <text x="204" y="236" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">窗口 = "bca" (left 跳到 1，再次无重复)</text>

  <!-- Core idea box -->
  <rect x="50" y="258" width="460" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="280" y="280" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">核心直觉：用两个指针维护"无重复字符的窗口"</text>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#666">right 不断右扩；遇到重复时 left 收缩到重复字符之后</text>
  <text x="280" y="316" text-anchor="middle" font-size="11" fill="#888">答案 = 窗口最大宽度 max(right − left + 1)</text>
</svg>
