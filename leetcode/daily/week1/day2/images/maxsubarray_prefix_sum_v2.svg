<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
  </defs>

  <rect width="520" height="340" fill="#fafafa"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">前缀和：sum(i,j) = prefix[j+1] − prefix[i]</text>

  <!-- Array nums -->
  <text x="30" y="64" font-size="12" fill="#888">nums:</text>
  <rect x="80" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="105" y="68" text-anchor="middle" font-size="13" fill="#333">-2</text>
  <rect x="135" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="68" text-anchor="middle" font-size="13" fill="#333">1</text>
  <rect x="190" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="215" y="68" text-anchor="middle" font-size="13" fill="#333">-3</text>
  <rect x="245" y="48" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="270" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">4</text>
  <rect x="300" y="48" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="325" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">-1</text>
  <rect x="355" y="48" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="380" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">2</text>
  <rect x="410" y="48" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="435" y="68" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">1</text>
  <rect x="465" y="48" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="490" y="68" text-anchor="middle" font-size="13" fill="#333">-5</text>

  <!-- Subarray bracket -->
  <path d="M 248 84 Q 270 90 292 84" stroke="#d6a040" stroke-width="1.5" fill="none" filter="url(#rough2)"/>
  <path d="M 248 84 L 248 90" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <path d="M 292 84 L 292 90" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="270" y="100" text-anchor="middle" font-size="10" fill="#d6a040">子数组 [4,−1,2,1]</text>

  <!-- Prefix array -->
  <text x="30" y="140" font-size="12" fill="#888">prefix:</text>
  <rect x="80" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="105" y="144" text-anchor="middle" font-size="12" fill="#333">0</text>
  <rect x="135" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="144" text-anchor="middle" font-size="12" fill="#333">-2</text>
  <rect x="190" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="215" y="144" text-anchor="middle" font-size="12" fill="#333">-1</text>
  <rect x="245" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="270" y="144" text-anchor="middle" font-size="12" fill="#333">-4</text>
  <rect x="300" y="124" width="50" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="4" filter="url(#rough2)"/>
  <text x="325" y="144" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">0</text>
  <rect x="355" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="380" y="144" text-anchor="middle" font-size="12" fill="#333">-1</text>
  <rect x="410" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="435" y="144" text-anchor="middle" font-size="12" fill="#333">1</text>
  <rect x="465" y="124" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="490" y="144" text-anchor="middle" font-size="12" fill="#333">2</text>

  <!-- Arrow from nums to prefix -->
  <path d="M 270 78 L 270 120" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrowR)" filter="url(#rough2)" transform="rotate(90 270 99)"/>

  <!-- Explanation box -->
  <rect x="40" y="180" width="440" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="260" y="202" text-anchor="middle" font-size="12" fill="#444">子数组 [4, −1, 2, 1] 的和 = prefix[7] − prefix[3]</text>
  <text x="260" y="220" text-anchor="middle" font-size="12" fill="#444">= 2 − (−4) = <tspan font-weight="bold" fill="#82b366">6</tspan></text>

  <!-- Min prefix annotation -->
  <rect x="40" y="260" width="440" height="60" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="260" y="282" text-anchor="middle" font-size="12" fill="#444">关键：对于每个 j，找最小的 prefix[i] (i ≤ j)</text>
  <text x="260" y="300" text-anchor="middle" font-size="12" fill="#444">min_prefix = <tspan font-weight="bold" fill="#b85450">−4</tspan> → max_sum = 2 − (−4) = <tspan font-weight="bold" fill="#82b366">6</tspan></text>
</svg>