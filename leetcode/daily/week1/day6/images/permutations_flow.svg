<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="440" fill="#fafafa"/>

  <!-- Title -->
  <text x="280" y="24" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">回溯算法流程：递归 + 终止收集 + 撤销</text>

  <!-- Start -->
  <ellipse cx="280" cy="56" rx="70" ry="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="60" text-anchor="middle" font-size="11" fill="#333">backtrack(path, used)</text>

  <path d="M 280 74 L 280 88" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Termination check -->
  <polygon points="280,92 400,130 280,168 160,130" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="126" text-anchor="middle" font-size="11" fill="#333">path.size == n ?</text>
  <text x="280" y="142" text-anchor="middle" font-size="10" fill="#888">(路径已满 = 叶子)</text>

  <!-- Yes: collect result -->
  <path d="M 400 130 L 470 130" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="435" y="122" text-anchor="middle" font-size="10" fill="#82b366">是</text>
  <rect x="470" y="112" width="80" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="510" y="130" text-anchor="middle" font-size="11" fill="#333">ans.push_back</text>
  <text x="510" y="142" text-anchor="middle" font-size="11" fill="#333">(path); return</text>

  <!-- No: enumerate candidates -->
  <path d="M 280 168 L 280 182" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="292" y="178" font-size="10" fill="#b85450">否</text>

  <rect x="140" y="186" width="280" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="280" y="210" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">for (i = 0 .. n-1)：遍历每个候选</text>

  <path d="M 280 226 L 280 240" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- skip if used -->
  <polygon points="280,244 380,278 280,312 180,278" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="280" y="274" text-anchor="middle" font-size="11" fill="#333">used[i] ?</text>
  <text x="280" y="290" text-anchor="middle" font-size="10" fill="#888">(该数已选过)</text>

  <!-- yes skip -->
  <path d="M 380 278 L 440 278" stroke="#666" stroke-width="1.3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="410" y="270" text-anchor="middle" font-size="10" fill="#b85450">是</text>
  <rect x="440" y="262" width="60" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="470" y="282" text-anchor="middle" font-size="11" fill="#888">continue</text>

  <!-- no: do select-recurse-undo -->
  <path d="M 280 312 L 280 326" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="292" y="322" font-size="10" fill="#82b366">否</text>

  <rect x="120" y="330" width="320" height="74" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="280" y="350" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">① used[i] = true; path.push_back(nums[i])</text>
  <text x="280" y="368" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">② backtrack(path, used)</text>
  <text x="280" y="386" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">③ path.pop_back(); used[i] = false</text>

  <!-- loop back to for -->
  <path d="M 120 367 L 60 367 L 60 206 L 140 206" stroke="#888" stroke-width="1.3" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="52" y="290" text-anchor="middle" font-size="10" fill="#888" transform="rotate(-90 52 290)">撤销后试下一个</text>

  <!-- summary -->
  <text x="280" y="426" text-anchor="middle" font-size="11" fill="#888">用 used[] 标记已选元素，避免重复；撤销时必须同时回退 path 和 used</text>
</svg>
