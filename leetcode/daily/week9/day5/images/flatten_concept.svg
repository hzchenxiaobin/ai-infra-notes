<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="580" height="340" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">二叉树展开为链表：前序顺序 → 右单链</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">right 指向下一个，left 恒为 null</text>

  <!-- ===== 原树 (left) ===== -->
  <text x="130" y="66" text-anchor="middle" font-size="12" fill="#888">原二叉树</text>
  <g font-size="11">
    <!-- 1 -->
    <circle cx="130" cy="90" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="130" y="94" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <!-- 2 -->
    <circle cx="90" cy="148" r="15" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="90" y="152" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <!-- 5 -->
    <circle cx="185" cy="148" r="15" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="185" y="152" text-anchor="middle" fill="#446688" font-weight="bold">5</text>
    <!-- edges 1-2, 1-5 -->
    <line x1="116" y1="102" x2="100" y2="136" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
    <line x1="144" y1="102" x2="173" y2="136" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
    <!-- 3 -->
    <circle cx="60" cy="210" r="13" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="60" y="214" text-anchor="middle" font-size="10" fill="#446688" font-weight="bold">3</text>
    <!-- 4 -->
    <circle cx="125" cy="210" r="13" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="125" y="214" text-anchor="middle" font-size="10" fill="#446688" font-weight="bold">4</text>
    <!-- 6 -->
    <circle cx="215" cy="210" r="13" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="215" y="214" text-anchor="middle" font-size="10" fill="#446688" font-weight="bold">6</text>
    <!-- edges 2-3, 2-4, 5-6 -->
    <line x1="78" y1="161" x2="68" y2="199" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <line x1="102" y1="161" x2="118" y2="199" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <line x1="198" y1="161" x2="210" y2="199" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
  </g>
  <text x="130" y="246" text-anchor="middle" font-size="10" fill="#888">前序：1 → 2 → 3 → 4 → 5 → 6</text>

  <!-- ===== 中间箭头 ===== -->
  <path d="M 255 150 L 335 150" stroke="#4a7a3a" stroke-width="2" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <text x="295" y="142" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">展开</text>
  <text x="295" y="164" text-anchor="middle" font-size="9" fill="#888">（原地）</text>

  <!-- ===== 展开后链表 (right) ===== -->
  <text x="440" y="66" text-anchor="middle" font-size="12" fill="#888">展开后（右单链）</text>
  <g font-size="11">
    <!-- vertical chain at x=440 -->
    <circle cx="440" cy="92" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="440" y="96" text-anchor="middle" fill="#4a7a3a" font-weight="bold">1</text>
    <circle cx="440" cy="132" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="440" y="136" text-anchor="middle" fill="#4a7a3a" font-weight="bold">2</text>
    <circle cx="440" cy="172" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="440" y="176" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <circle cx="440" cy="212" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="440" y="216" text-anchor="middle" fill="#4a7a3a" font-weight="bold">4</text>
    <circle cx="440" cy="252" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="440" y="256" text-anchor="middle" fill="#4a7a3a" font-weight="bold">5</text>
    <circle cx="440" cy="292" r="15" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="440" y="296" text-anchor="middle" fill="#4a7a3a" font-weight="bold">6</text>
    <!-- right arrows (downward) -->
    <path d="M 440 107 L 440 117" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <path d="M 440 147 L 440 157" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <path d="M 440 187 L 440 197" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <path d="M 440 227 L 440 237" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <path d="M 440 267 L 440 277" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <!-- labels -->
    <text x="478" y="110" font-size="9" fill="#4a7a3a">right</text>
    <text x="478" y="124" font-size="9" fill="#888">left=null</text>
  </g>

  <!-- ===== key insight ===== -->
  <rect x="30" y="300" width="520" height="32" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="290" y="320" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">关键：反向后序（右→左→根）逆序产生前序，prev 指针从尾部向头部逐节点串接</text>
</svg>
