<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 430" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="580" height="430" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：[1,2,5,3,4,null,6]</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">反向后序访问 6→5→4→3→2→1，prev 从尾部走到头部</text>

  <!-- ===== table ===== -->
  <g font-size="10" fill="#333">
    <!-- header -->
    <rect x="30" y="64" width="520" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" rx="4" filter="url(#rough2)"/>
    <text x="55" y="80" font-weight="bold">步骤</text>
    <text x="110" y="80" font-weight="bold">访问节点</text>
    <text x="210" y="80" font-weight="bold">操作 root.right=prev</text>
    <text x="380" y="80" font-weight="bold">prev</text>
    <text x="450" y="80" font-weight="bold">已构建链表</text>

    <!-- row 1: node 6 -->
    <rect x="30" y="88" width="520" height="34" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="109">1</text>
    <circle cx="130" cy="105" r="11" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="130" y="109" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">6</text>
    <text x="210" y="109" font-family="monospace" font-size="9" fill="#555">6.right = null</text>
    <text x="380" y="109" fill="#4a7a3a" font-weight="bold">6</text>
    <circle cx="475" cy="105" r="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="475" y="109" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">6</text>

    <!-- row 2: node 5 -->
    <rect x="30" y="122" width="520" height="34" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="143">2</text>
    <circle cx="130" cy="139" r="11" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="130" y="143" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">5</text>
    <text x="210" y="143" font-family="monospace" font-size="9" fill="#555">5.right = 6</text>
    <text x="380" y="143" fill="#4a7a3a" font-weight="bold">5</text>
    <circle cx="465" cy="139" r="9" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" filter="url(#rough2)"/>
    <text x="465" y="143" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">5</text>
    <path d="M 474 139 L 478 139" stroke="#4a7a3a" stroke-width="1.2" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <circle cx="490" cy="139" r="9" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" filter="url(#rough2)"/>
    <text x="490" y="143" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">6</text>

    <!-- row 3: node 4 -->
    <rect x="30" y="156" width="520" height="34" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="177">3</text>
    <circle cx="130" cy="173" r="11" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="130" y="177" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">4</text>
    <text x="210" y="177" font-family="monospace" font-size="9" fill="#555">4.right = 5</text>
    <text x="380" y="177" fill="#4a7a3a" font-weight="bold">4</text>
    <circle cx="455" cy="173" r="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="455" y="177" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">4</text>
    <path d="M 463 173 L 467 173" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <circle cx="475" cy="173" r="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="475" y="177" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">5</text>
    <path d="M 483 173 L 487 173" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
    <circle cx="495" cy="173" r="8" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="495" y="177" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">6</text>

    <!-- row 4: node 3 -->
    <rect x="30" y="190" width="520" height="34" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="211">4</text>
    <circle cx="130" cy="207" r="11" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="130" y="211" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">3</text>
    <text x="210" y="211" font-family="monospace" font-size="9" fill="#555">3.right = 4</text>
    <text x="380" y="211" fill="#4a7a3a" font-weight="bold">3</text>
    <text x="450" y="211" font-size="9" fill="#4a7a3a">3 → 4 → 5 → 6</text>

    <!-- row 5: node 2 -->
    <rect x="30" y="224" width="520" height="34" fill="#fafafa" stroke="#ccc" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="245">5</text>
    <circle cx="130" cy="241" r="11" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="130" y="245" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">2</text>
    <text x="210" y="245" font-family="monospace" font-size="9" fill="#555">2.right = 3</text>
    <text x="380" y="245" fill="#4a7a3a" font-weight="bold">2</text>
    <text x="450" y="245" font-size="9" fill="#4a7a3a">2 → 3 → 4 → 5 → 6</text>

    <!-- row 6: node 1 (final, highlighted) -->
    <rect x="30" y="258" width="520" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
    <text x="55" y="280" font-weight="bold" fill="#4a7a3a">6</text>
    <circle cx="130" cy="276" r="12" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
    <text x="130" y="280" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">1</text>
    <text x="210" y="280" font-family="monospace" font-size="9" fill="#555" font-weight="bold">1.right = 2</text>
    <text x="380" y="280" fill="#4a7a3a" font-weight="bold">1</text>
    <text x="450" y="280" font-size="9" fill="#4a7a3a" font-weight="bold">1 → 2 → 3 → 4 → 5 → 6 ✓</text>
  </g>

  <!-- ===== key insight ===== -->
  <rect x="30" y="310" width="520" height="100" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="290" y="332" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">为什么有效？</text>
  <text x="50" y="354" font-size="11" fill="#555">• 反向后序访问顺序 = 前序的逆序，先访问链表末尾</text>
  <text x="50" y="372" font-size="11" fill="#555">• prev 始终指向「当前节点在最终链表中的直接后继」</text>
  <text x="50" y="390" font-size="11" fill="#555">• 每步 root.right = prev 像「头插法」，把当前节点插到链表最前</text>
  <text x="50" y="404" font-size="10" fill="#888">  叶子（6/4/3）prev 接 null 或前步链头；非叶（5/2/1）prev = 右链头+左链头依次前移</text>
</svg>
