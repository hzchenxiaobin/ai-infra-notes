<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360"
     font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="520" height="360" fill="#fafafa"/>

  <text x="260" y="28" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">有效括号：栈匹配过程</text>
  <text x="260" y="46" text-anchor="middle" font-size="11" fill="#888">输入 "()[]{}" 逐字符扫描，左括号入栈，右括号匹配弹出</text>

  <!-- ===== Step-by-step stack ===== -->
  <g font-size="11" fill="#333">
    <!-- Step 1: read ( → push -->
    <text x="30" y="76" font-size="10" fill="#446688" font-weight="bold">① 读 '(' → 入栈</text>
    <rect x="40" y="82" width="36" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="100" text-anchor="middle" font-weight="bold">(</text>
    <text x="90" y="100" font-size="10" fill="#888">栈: [(]</text>

    <!-- Step 2: read ) → match pop -->
    <text x="30" y="126" font-size="10" fill="#4a7a3a" font-weight="bold">② 读 ')' → 匹配 '(' 弹出</text>
    <rect x="40" y="132" width="36" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="150" text-anchor="middle" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="90" y="150" font-size="10" fill="#888">栈: [] (空)</text>

    <!-- Step 3: read [ → push -->
    <text x="30" y="176" font-size="10" fill="#446688" font-weight="bold">③ 读 '[' → 入栈</text>
    <rect x="40" y="182" width="36" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="200" text-anchor="middle" font-weight="bold">[</text>
    <text x="90" y="200" font-size="10" fill="#888">栈: [[]</text>

    <!-- Step 4: read ] → match pop -->
    <text x="30" y="226" font-size="10" fill="#4a7a3a" font-weight="bold">④ 读 ']' → 匹配 '[' 弹出</text>
    <rect x="40" y="232" width="36" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="250" text-anchor="middle" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="90" y="250" font-size="10" fill="#888">栈: [] (空)</text>

    <!-- Step 5: read { → push -->
    <text x="30" y="276" font-size="10" fill="#446688" font-weight="bold">⑤ 读 '{' → 入栈</text>
    <rect x="40" y="282" width="36" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="300" text-anchor="middle" font-weight="bold">{</text>
    <text x="90" y="300" font-size="10" fill="#888">栈: [{]</text>

    <!-- Step 6: read } → match pop -->
    <text x="30" y="326" font-size="10" fill="#4a7a3a" font-weight="bold">⑥ 读 '}' → 匹配 '{' 弹出</text>
    <rect x="40" y="332" width="36" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="58" y="350" text-anchor="middle" fill="#4a7a3a" font-weight="bold">✓</text>
    <text x="90" y="350" font-size="10" fill="#888">栈: [] (空) → 合法 ✓</text>
  </g>

  <!-- ===== Right side: mismatch cases ===== -->
  <text x="280" y="76" font-size="12" fill="#b85450" font-weight="bold">非法情况</text>

  <rect x="280" y="84" width="220" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="294" y="104" font-size="10" fill="#b85450" font-weight="bold">① 右括号不匹配</text>
  <text x="294" y="120" font-size="10" fill="#555">栈顶 '(' 但读到 ']' → ✗</text>

  <rect x="280" y="142" width="220" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="294" y="162" font-size="10" fill="#b85450" font-weight="bold">② 栈空时读右括号</text>
  <text x="294" y="178" font-size="10" fill="#555">栈空但读到 ')' → ✗</text>

  <rect x="280" y="200" width="220" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="294" y="220" font-size="10" fill="#b85450" font-weight="bold">③ 结束时栈非空</text>
  <text x="294" y="236" font-size="10" fill="#555">扫描完栈还有 '(' → ✗</text>

  <rect x="280" y="258" width="220" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="294" y="278" font-size="10" fill="#d6a040" font-weight="bold">💡 技巧</text>
  <text x="294" y="294" font-size="10" fill="#555">遇到右括号时，检查栈顶是否</text>
  <text x="294" y="308" font-size="10" fill="#555">为对应左括号。可用哈希表</text>
  <text x="294" y="322" font-size="10" fill="#555">映射 ')''→''(' 简化匹配。</text>
</svg>
