<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#b85450"/>
    </marker>
  </defs>

  <rect width="580" height="360" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">核心观察：用左右余量控制选择，剪枝保证合法前缀</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">open = 剩余可放 ( 数，close = 剩余可放 ) 数</text>

  <!-- ===== two counters ===== -->
  <text x="60" y="78" font-size="12" fill="#446688" font-weight="bold">两个剩余计数器</text>
  <rect x="60" y="88" width="200" height="56" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="78" y="108" font-family="monospace" font-size="11" fill="#446688">open  = 剩余 (</text>
  <text x="78" y="126" font-family="monospace" font-size="11" fill="#446688">close = 剩余 )</text>
  <text x="78" y="140" font-size="9" fill="#888">初始都 = n，放一个减 1</text>

  <!-- ===== rule 1 ===== -->
  <text x="60" y="172" font-size="12" fill="#4a7a3a" font-weight="bold">规则①：放 ( 的条件</text>
  <rect x="60" y="182" width="460" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="78" y="204" font-family="monospace" font-size="11" fill="#4a7a3a">if (open > 0)  →  可放 (</text>
  <text x="300" y="204" font-size="10" fill="#888">左括号还有余量</text>

  <!-- ===== rule 2 ===== -->
  <text x="60" y="240" font-size="12" fill="#d6a040" font-weight="bold">规则②：放 ) 的条件</text>
  <rect x="60" y="250" width="460" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="78" y="272" font-family="monospace" font-size="11" fill="#d6a040">if (close > open)  →  可放 )</text>
  <text x="300" y="272" font-size="10" fill="#888">有未闭合的左括号</text>

  <!-- ===== equivalence ===== -->
  <rect x="60" y="298" width="460" height="48" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="290" y="318" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">close > open  ⟺  已放 ( 数 &gt; 已放 ) 数</text>
  <text x="290" y="336" text-anchor="middle" font-size="10" fill="#555">前缀有未闭合左括号，此时放 ) 才合法</text>
</svg>
