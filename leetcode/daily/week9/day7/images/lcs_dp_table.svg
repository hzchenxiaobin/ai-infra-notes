<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#d6a040"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">二维 DP：dp[i][j] = text1[0..i-1] 与 text2[0..j-1] 的 LCS 长度</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">匹配时 +1 走对角，不匹配时 max(上,左)</text>

  <!-- ===== dp table grid ===== -->
  <g font-size="10" fill="#333">
    <!-- corner label -->
    <rect x="100" y="60" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="125" y="79" text-anchor="middle" font-size="9" fill="#888">text2→</text>
    <text x="92" y="50" font-size="9" fill="#888" font-weight="bold">text1↓</text>

    <!-- column headers: "" a c e -->
    <rect x="150" y="60" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="175" y="79" text-anchor="middle" fill="#888">""</text>
    <rect x="200" y="60" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="225" y="79" text-anchor="middle" fill="#446688" font-weight="bold">a</text>
    <rect x="250" y="60" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="275" y="79" text-anchor="middle" fill="#446688" font-weight="bold">c</text>
    <rect x="300" y="60" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="325" y="79" text-anchor="middle" fill="#446688" font-weight="bold">e</text>

    <!-- row headers: "" a b c d e -->
    <rect x="100" y="90" width="50" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="125" y="109" text-anchor="middle" fill="#888">""</text>
    <rect x="100" y="120" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="125" y="139" text-anchor="middle" fill="#446688" font-weight="bold">a</text>
    <rect x="100" y="150" width="50" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>
    <text x="125" y="169" text-anchor="middle" fill="#446688" font-weight="bold">b</text>

    <!-- grid cells (simplified 3x4: rows "" a b, cols "" a c e) -->
    <!-- row "" -->
    <rect x="150" y="90" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="175" y="109" text-anchor="middle" fill="#aaa">0</text>
    <rect x="200" y="90" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="225" y="109" text-anchor="middle" fill="#aaa">0</text>
    <rect x="250" y="90" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="275" y="109" text-anchor="middle" fill="#aaa">0</text>
    <rect x="300" y="90" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="325" y="109" text-anchor="middle" fill="#aaa">0</text>
    <!-- row a -->
    <rect x="150" y="120" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="175" y="139" text-anchor="middle" fill="#aaa">0</text>
    <rect x="200" y="120" width="50" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="225" y="139" text-anchor="middle" fill="#4a7a3a" font-weight="bold">1</text>
    <rect x="250" y="120" width="50" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>
    <text x="275" y="139" text-anchor="middle" fill="#555">1</text>
    <rect x="300" y="120" width="50" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>
    <text x="325" y="139" text-anchor="middle" fill="#555">1</text>
    <!-- row b -->
    <rect x="150" y="150" width="50" height="30" fill="#f0f0f0" stroke="#bbb" stroke-width="1" filter="url(#rough2)"/>
    <text x="175" y="169" text-anchor="middle" fill="#aaa">0</text>
    <rect x="200" y="150" width="50" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>
    <text x="225" y="169" text-anchor="middle" fill="#555">1</text>
    <rect x="250" y="150" width="50" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>
    <text x="275" y="169" text-anchor="middle" fill="#555">1</text>
    <rect x="300" y="150" width="50" height="30" fill="#fafafa" stroke="#ccc" stroke-width="1" filter="url(#rough2)"/>
    <text x="325" y="169" text-anchor="middle" fill="#555">1</text>
  </g>

  <!-- ===== transition arrows from dp[a][a]=1 ===== -->
  <!-- diagonal arrow (match) from dp[0][0] to dp[1][1] -->
  <path d="M 160 110 L 215 125" stroke="#4a7a3a" stroke-width="1.8" fill="none" stroke-dasharray="4,2" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <text x="165" y="105" font-size="9" fill="#4a7a3a" font-weight="bold">匹配 +1</text>

  <!-- ===== transition legend ===== -->
  <rect x="380" y="90" width="180" height="100" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="470" y="110" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">状态转移</text>
  <text x="394" y="130" font-size="10" fill="#4a7a3a" font-weight="bold">匹配: dp[i-1][j-1]+1</text>
  <text x="394" y="144" font-size="9" fill="#888">→ 对角线方向</text>
  <text x="394" y="162" font-size="10" fill="#d6a040" font-weight="bold">不匹配: max(上,左)</text>
  <text x="394" y="176" font-size="9" fill="#888">→ 上方或左方较大</text>

  <!-- ===== formulas ===== -->
  <rect x="40" y="210" width="500" height="56" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="60" y="232" font-family="monospace" font-size="11" fill="#4a7a3a">if text1[i-1] == text2[j-1]:  dp[i][j] = dp[i-1][j-1] + 1</text>
  <text x="60" y="252" font-family="monospace" font-size="11" fill="#d6a040">else:                        dp[i][j] = max(dp[i-1][j], dp[i][j-1])</text>

  <!-- ===== boundary ===== -->
  <rect x="40" y="280" width="500" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="290" y="302" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">边界：dp[0][j] = 0, dp[i][0] = 0（空串与任意串的 LCS = 0）</text>

  <!-- ===== answer ===== -->
  <rect x="40" y="328" width="500" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="290" y="350" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">答案：dp[m][n]（右下角）</text>

  <!-- ===== key insight ===== -->
  <rect x="40" y="374" width="500" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="290" y="388" text-anchor="middle" font-size="10" fill="#555">填表顺序：从左到右、从上到下（依赖左上、上、左）</text>
</svg>
