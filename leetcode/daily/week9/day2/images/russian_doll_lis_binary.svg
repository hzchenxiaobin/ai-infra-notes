<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="680" height="440" fill="#fafafa"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">LIS 二分：维护单调递增 tails 数组</text>

  <!-- tails definition -->
  <g filter="url(#sk)">
    <rect x="30" y="55" width="620" height="50" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.3"/>
  </g>
  <text x="50" y="78" font-size="12" font-weight="bold" fill="#446688">tails[i] = 长度为 i+1 的递增子序列中，最小的末尾值</text>
  <text x="50" y="96" font-size="11" fill="#555">tails 始终单调递增 → 可二分查找。len(tails) = LIS 长度</text>

  <!-- Process table -->
  <text x="340" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">高度序列 [3, 4, 7, 4] 的处理过程</text>

  <g font-size="11">
    <!-- Header -->
    <g filter="url(#sk)"><rect x="40" y="140" width="40" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1"/></g>
    <text x="60" y="158" text-anchor="middle" fill="#333" font-weight="bold">步</text>
    <g filter="url(#sk)"><rect x="80" y="140" width="50" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1"/></g>
    <text x="105" y="158" text-anchor="middle" fill="#333" font-weight="bold">h</text>
    <g filter="url(#sk)"><rect x="130" y="140" width="120" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1"/></g>
    <text x="190" y="158" text-anchor="middle" fill="#333" font-weight="bold">操作</text>
    <g filter="url(#sk)"><rect x="250" y="140" width="140" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1"/></g>
    <text x="320" y="158" text-anchor="middle" fill="#333" font-weight="bold">tails（变化后）</text>

    <!-- Step 1: h=3 -->
    <g filter="url(#sk)"><rect x="40" y="166" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="60" y="183" text-anchor="middle" fill="#4a7a3a">1</text>
    <g filter="url(#sk)"><rect x="80" y="166" width="50" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="105" y="183" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <g filter="url(#sk)"><rect x="130" y="166" width="120" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="190" y="183" text-anchor="middle" fill="#4a7a3a">append 3</text>
    <g filter="url(#sk)"><rect x="250" y="166" width="140" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="320" y="183" text-anchor="middle" fill="#4a7a3a" font-family="monospace">[3]</text>

    <!-- Step 2: h=4 -->
    <g filter="url(#sk)"><rect x="40" y="190" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="60" y="207" text-anchor="middle" fill="#4a7a3a">2</text>
    <g filter="url(#sk)"><rect x="80" y="190" width="50" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="105" y="207" text-anchor="middle" fill="#4a7a3a" font-weight="bold">4</text>
    <g filter="url(#sk)"><rect x="130" y="190" width="120" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="190" y="207" text-anchor="middle" fill="#4a7a3a">4 &gt; 3, append</text>
    <g filter="url(#sk)"><rect x="250" y="190" width="140" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="320" y="207" text-anchor="middle" fill="#4a7a3a" font-family="monospace">[3, 4]</text>

    <!-- Step 3: h=7 -->
    <g filter="url(#sk)"><rect x="40" y="214" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="60" y="231" text-anchor="middle" fill="#4a7a3a">3</text>
    <g filter="url(#sk)"><rect x="80" y="214" width="50" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="105" y="231" text-anchor="middle" fill="#4a7a3a" font-weight="bold">7</text>
    <g filter="url(#sk)"><rect x="130" y="214" width="120" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="190" y="231" text-anchor="middle" fill="#4a7a3a">7 &gt; 4, append</text>
    <g filter="url(#sk)"><rect x="250" y="214" width="140" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8"/></g>
    <text x="320" y="231" text-anchor="middle" fill="#4a7a3a" font-family="monospace">[3, 4, 7]</text>

    <!-- Step 4: h=4 -->
    <g filter="url(#sk)"><rect x="40" y="238" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="60" y="255" text-anchor="middle" fill="#d6a040">4</text>
    <g filter="url(#sk)"><rect x="80" y="238" width="50" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="105" y="255" text-anchor="middle" fill="#d6a040" font-weight="bold">4</text>
    <g filter="url(#sk)"><rect x="130" y="238" width="120" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="190" y="255" text-anchor="middle" fill="#d6a040">lower_bound(4)=1</text>
    <g filter="url(#sk)"><rect x="250" y="238" width="140" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8"/></g>
    <text x="320" y="255" text-anchor="middle" fill="#d6a040" font-family="monospace">[3, 4, 7]</text>
    <text x="320" y="270" text-anchor="middle" fill="#888" font-size="9">替换 tails[1]=4（无变化）</text>
  </g>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="100" y="285" width="280" height="40" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="240" y="310" text-anchor="middle" font-size="14" fill="#b85450" font-weight="bold">LIS 长度 = len(tails) = 3 ✓</text>

  <!-- Lower bound explanation -->
  <g filter="url(#sk)">
    <rect x="420" y="140" width="240" height="185" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="540" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#d6a040">lower_bound vs upper_bound</text>
  <text x="440" y="184" font-size="10" fill="#555" font-family="monospace">lower_bound(h):</text>
  <text x="440" y="198" font-size="10" fill="#555">  第一个 >= h 的位置</text>
  <text x="440" y="212" font-size="10" fill="#4a7a3a">  → 严格递增 LIS</text>
  <text x="440" y="232" font-size="10" fill="#555" font-family="monospace">upper_bound(h):</text>
  <text x="440" y="246" font-size="10" fill="#555">  第一个 > h 的位置</text>
  <text x="440" y="260" font-size="10" fill="#b85450">  → 非严格递增 LIS</text>
  <text x="440" y="280" font-size="10" fill="#555">本题需严格嵌套，用</text>
  <text x="440" y="294" font-size="10" fill="#4a7a3a" font-weight="bold">lower_bound</text>

  <!-- Complexity -->
  <g filter="url(#sk)">
    <rect x="30" y="340" width="620" height="80" rx="8" fill="#e8f0fe" stroke="#446688" stroke-width="1.2"/>
  </g>
  <text x="50" y="362" font-size="12" font-weight="bold" fill="#446688">复杂度</text>
  <text x="50" y="380" font-size="11" fill="#555">时间 O(n log n)：每个元素二分查找 O(log n)，共 n 次</text>
  <text x="50" y="398" font-size="11" fill="#555">空间 O(n)：tails 数组。朴素 DP O(n²) 在 n=10^5 时超时</text>
  <text x="50" y="414" font-size="11" fill="#888">tails 不一定是实际 LIS，但长度等于 LIS 长度</text>
</svg>
