<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" viewBox="0 0 660 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="660" height="360" fill="#fafafa"/>
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">哈希集合求交集</text>

  <!-- Step 1: build set -->
  <g filter="url(#sk)">
    <rect x="30" y="55" width="280" height="130" rx="10" fill="#e8f0fe" stroke="#446688" stroke-width="1.5"/>
  </g>
  <text x="170" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#446688">① nums1 → 哈希集合 set1</text>
  <g font-size="13">
    <text x="50" y="100" fill="#555">nums1 = [4, 9, 5]</text>
    <g filter="url(#sk)">
      <rect x="50" y="110" width="50" height="28" rx="4" fill="#fff" stroke="#446688" stroke-width="1.2"/>
    </g>
    <text x="75" y="129" text-anchor="middle" fill="#446688" font-weight="bold">4</text>
    <g filter="url(#sk)">
      <rect x="105" y="110" width="50" height="28" rx="4" fill="#fff" stroke="#446688" stroke-width="1.2"/>
    </g>
    <text x="130" y="129" text-anchor="middle" fill="#446688" font-weight="bold">9</text>
    <g filter="url(#sk)">
      <rect x="160" y="110" width="50" height="28" rx="4" fill="#fff" stroke="#446688" stroke-width="1.2"/>
    </g>
    <text x="185" y="129" text-anchor="middle" fill="#446688" font-weight="bold">5</text>
    <text x="50" y="160" fill="#888" font-size="11">set1 = {4, 9, 5}（自动去重）</text>
  </g>

  <!-- Arrow -->
  <path d="M 310 120 L 350 120" stroke="#555" stroke-width="2" marker-end="url(#arr)" filter="url(#sk)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Step 2: scan nums2 -->
  <g filter="url(#sk)">
    <rect x="350" y="55" width="280" height="130" rx="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/>
  </g>
  <text x="490" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7a3a">② 遍历 nums2，查 set1</text>
  <g font-size="12">
    <text x="370" y="100" fill="#555">nums2 = [9, 4, 9, 8, 4]</text>
    <text x="370" y="122" fill="#4a7a3a">9 ∈ set1 ✓ → 加入，移除</text>
    <text x="370" y="140" fill="#4a7a3a">4 ∈ set1 ✓ → 加入，移除</text>
    <text x="370" y="158" fill="#b85450">9 ∉ set1 ✗（已移除）</text>
    <text x="370" y="176" fill="#b85450">8 ∉ set1 ✗</text>
  </g>

  <!-- Result -->
  <g filter="url(#sk)">
    <rect x="180" y="210" width="300" height="50" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="330" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">结果（唯一元素）</text>
  <text x="330" y="252" text-anchor="middle" font-size="16" fill="#b85450" font-weight="bold">[9, 4]</text>

  <!-- Key insight -->
  <g filter="url(#sk)">
    <rect x="30" y="280" width="600" height="65" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="50" y="302" font-size="12" font-weight="bold" fill="#333">关键：移除已匹配元素</text>
  <text x="50" y="320" font-size="11" fill="#555">nums2 中 9 出现两次。不移除则 9 会被加入两次，违反"唯一"要求。</text>
  <text x="50" y="336" font-size="11" fill="#555">移除后第二次遇到 9 时 set1.count(9)==0，自动跳过。</text>
</svg>
