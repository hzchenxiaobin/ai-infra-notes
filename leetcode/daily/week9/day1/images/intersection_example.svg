<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>
  <rect width="680" height="380" fill="#fafafa"/>
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">示例演算</text>
  <text x="340" y="56" text-anchor="middle" font-size="12" fill="#888">nums1 = [4,9,5], nums2 = [9,4,9,8,4]</text>

  <!-- HashSet method -->
  <g filter="url(#sk)">
    <rect x="20" y="75" width="320" height="200" rx="10" fill="#e8f0fe" stroke="#446688" stroke-width="1.4"/>
  </g>
  <text x="180" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#446688">哈希集合法</text>

  <g font-size="11">
    <text x="40" y="120" fill="#555" font-weight="bold">set1 = {4, 9, 5}</text>
    <text x="40" y="145" fill="#555">遍历 nums2：</text>
    <text x="50" y="163" fill="#4a7a3a">9 ∈ set1 ✓ → 加入9，移除9</text>
    <text x="50" y="181" fill="#4a7a3a">4 ∈ set1 ✓ → 加入4，移除4</text>
    <text x="50" y="199" fill="#b85450">9 ∉ set1 ✗（已移除）</text>
    <text x="50" y="217" fill="#b85450">8 ∉ set1 ✗</text>
    <text x="50" y="235" fill="#b85450">4 ∉ set1 ✗（已移除）</text>
    <text x="40" y="260" fill="#446688" font-weight="bold">结果：[9, 4] ✓</text>
  </g>

  <!-- Two pointers method -->
  <g filter="url(#sk)">
    <rect x="360" y="75" width="300" height="200" rx="10" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4"/>
  </g>
  <text x="510" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a7a3a">双指针法</text>

  <g font-size="11">
    <text x="380" y="120" fill="#555">排序后：</text>
    <text x="380" y="138" fill="#555" font-family="monospace">nums1=[4,5,9]</text>
    <text x="380" y="156" fill="#555" font-family="monospace">nums2=[4,4,8,9,9]</text>
    <text x="380" y="180" fill="#555">双指针扫描：</text>
    <text x="390" y="198" fill="#4a7a3a">4==4 → 加入4, i++ j++</text>
    <text x="390" y="216" fill="#446688">5&gt;4 → j++</text>
    <text x="390" y="234" fill="#446688">5&lt;8 → i++</text>
    <text x="390" y="252" fill="#4a7a3a">9==9 → 加入9, i++ j++</text>
    <text x="380" y="270" fill="#4a7a3a" font-weight="bold">结果：[4, 9] ✓</text>
  </g>

  <!-- Comparison -->
  <g filter="url(#sk)">
    <rect x="20" y="290" width="640" height="75" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="40" y="312" font-size="12" font-weight="bold" fill="#333">两种方法对比</text>
  <text x="40" y="330" font-size="11" fill="#555">哈希集合：O(n+m) 时间，O(n) 空间。一次遍历，最快。适合未排序数组。</text>
  <text x="40" y="348" font-size="11" fill="#555">排序双指针：O(n log n + m log m) 时间，O(1) 额外空间。无额外开销，适合已排序或内存受限。</text>
</svg>
