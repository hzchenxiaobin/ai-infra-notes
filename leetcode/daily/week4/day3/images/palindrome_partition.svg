<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">回溯：从 start 尝试每一段回文，递归剩余部分</text>

  <!-- s = aab 切分示意 -->
  <text x="40" y="62" font-size="12" fill="#888">s = "aab"，在 start=0 尝试不同 end：</text>

  <!-- 方案1: a | a | b -->
  <rect x="40" y="76" width="40" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="60" y="97" text-anchor="middle" font-size="13" fill="#333">a</text>
  <text x="92" y="96" text-anchor="middle" font-size="12" fill="#888">|</text>
  <rect x="100" y="76" width="40" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="120" y="97" text-anchor="middle" font-size="13" fill="#333">a</text>
  <text x="152" y="96" text-anchor="middle" font-size="12" fill="#888">|</text>
  <rect x="160" y="76" width="40" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="180" y="97" text-anchor="middle" font-size="13" fill="#333">b</text>
  <text x="220" y="97" font-size="11" fill="#4a7a3a" font-weight="bold">方案 1 ✓</text>

  <!-- 方案2: aa | b -->
  <rect x="40" y="124" width="82" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="4" filter="url(#rough2)"/>
  <text x="81" y="145" text-anchor="middle" font-size="13" fill="#333">aa</text>
  <text x="134" y="144" text-anchor="middle" font-size="12" fill="#888">|</text>
  <rect x="142" y="124" width="40" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="4" filter="url(#rough2)"/>
  <text x="162" y="145" text-anchor="middle" font-size="13" fill="#333">b</text>
  <text x="200" y="145" font-size="11" fill="#4a7a3a" font-weight="bold">方案 2 ✓</text>

  <!-- 失败: aab -->
  <rect x="40" y="172" width="124" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="102" y="193" text-anchor="middle" font-size="13" fill="#333">aab</text>
  <text x="180" y="193" font-size="11" fill="#b85450" font-weight="bold">✗ 不是回文，跳过</text>

  <!-- 决策树说明 -->
  <text x="320" y="62" font-size="12" fill="#888">决策树（每层选下一段长度）：</text>

  <circle cx="400" cy="90" r="14" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="400" y="94" text-anchor="middle" font-size="11" fill="#333">0</text>

  <circle cx="350" cy="140" r="13" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="350" y="144" text-anchor="middle" font-size="10" fill="#333">1</text>
  <line x1="392" y1="100" x2="358" y2="130" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="356" y="120" font-size="9" fill="#82b366">"a"</text>

  <circle cx="450" cy="140" r="13" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="450" y="144" text-anchor="middle" font-size="10" fill="#333">2</text>
  <line x1="408" y1="100" x2="442" y2="130" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="432" y="120" font-size="9" fill="#82b366">"aa"</text>

  <circle cx="350" cy="185" r="12" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="350" y="189" text-anchor="middle" font-size="10" fill="#333">2</text>
  <line x1="350" y1="153" x2="350" y2="173" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="360" y="168" font-size="9" fill="#82b366">"a"</text>

  <circle cx="350" cy="225" r="12" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="350" y="229" text-anchor="middle" font-size="10" fill="#333">3</text>
  <line x1="350" y1="197" x2="350" y2="213" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="360" y="210" font-size="9" fill="#82b366">"b"</text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">✓ 记录</text>

  <circle cx="450" cy="185" r="12" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="450" y="189" text-anchor="middle" font-size="10" fill="#333">3</text>
  <line x1="450" y1="153" x2="450" y2="173" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
  <text x="460" y="168" font-size="9" fill="#82b366">"b"</text>
  <text x="450" y="212" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">✓ 记录</text>

  <text x="290" y="300" text-anchor="middle" font-size="11" fill="#888">每个节点 = 当前切到 start；尝试所有 end 使 s[start..end] 为回文</text>
  <text x="290" y="318" text-anchor="middle" font-size="11" fill="#888">start == n 时收集 path；非回文的 end 直接跳过（天然剪枝）</text>
  <text x="290" y="346" text-anchor="middle" font-size="11" fill="#888">回溯三步：push 段 → dfs(end+1) → pop 恢复现场</text>
</svg>
