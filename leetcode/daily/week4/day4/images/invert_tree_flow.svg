<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">翻转二叉树：递归流程（前序交换）</text>

  <!-- 入口 -->
  <rect x="210" y="50" width="160" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" fill="#333">invert(root)</text>

  <path d="M 290 84 L 290 100" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 判空 -->
  <polygon points="290,102 410,144 290,186 170,144" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="290" y="140" text-anchor="middle" font-size="12" fill="#333">root == null ?</text>
  <text x="290" y="158" text-anchor="middle" font-size="11" fill="#888">空树</text>

  <path d="M 410 144 L 470 144 L 470 90" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="432" y="136" font-size="10" fill="#b85450">是</text>
  <rect x="410" y="74" width="120" height="32" fill="#f5f5f5" stroke="#bbb" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="470" y="95" text-anchor="middle" font-size="12" fill="#888">返回 null</text>

  <path d="M 290 186 L 290 206" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="202" font-size="10" fill="#82b366">否</text>

  <!-- 交换 -->
  <rect x="180" y="210" width="220" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="226" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">交换 root.left ⇄ root.right</text>
  <text x="290" y="242" text-anchor="middle" font-size="10" fill="#888">O(1) 指针操作</text>

  <path d="M 290 250 L 290 268" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 递归左右 -->
  <rect x="120" y="272" width="150" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="195" y="294" text-anchor="middle" font-size="11" fill="#333">invert(root.left)</text>

  <rect x="310" y="272" width="150" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="385" y="294" text-anchor="middle" font-size="11" fill="#333">invert(root.right)</text>

  <path d="M 195 306 L 195 322" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 385 306 L 385 322" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 返回 -->
  <rect x="210" y="326" width="160" height="34" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="8" filter="url(#rough2)"/>
  <text x="290" y="348" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">返回 root</text>

  <text x="290" y="372" text-anchor="middle" font-size="11" fill="#888">每个节点访问一次 → O(n)；递归栈 = 树高 → O(h)</text>
</svg>
