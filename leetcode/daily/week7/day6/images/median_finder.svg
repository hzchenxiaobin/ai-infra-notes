<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="380" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">双堆求中位数</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">大顶堆存较小一半，小顶堆存较大一半，中位数在堆顶</text>

  <!-- ===== Left: Max heap (smaller half) ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="76" width="340" height="220" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="230" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">大顶堆 left（较小的一半）</text>
  <text x="230" y="114" text-anchor="middle" font-size="9" fill="#888">堆顶 = 左半最大值</text>

  <!-- Heap nodes (tree) -->
  <g filter="url(#sk)">
    <circle cx="230" cy="140" r="20" fill="#fff" stroke="#4a8edb" stroke-width="2"/>
    <circle cx="170" cy="190" r="18" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/>
    <circle cx="290" cy="190" r="18" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <g font-size="12" text-anchor="middle" font-weight="bold">
    <text x="230" y="145" fill="#2b6e9e">2</text>
    <text x="170" y="195" fill="#2b6e9e">1</text>
    <text x="290" y="195" fill="#2b6e9e">1</text>
  </g>
  <text x="230" y="230" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">堆顶 = 2（左半最大）</text>
  <text x="230" y="250" text-anchor="middle" font-size="9" fill="#888">存了 [1, 1, 2]</text>
  <text x="230" y="270" text-anchor="middle" font-size="9" fill="#555">≤ right 的所有元素</text>

  <!-- Arrow between heaps -->
  <path d="M 400 186 L 540 186" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="470" y="178" text-anchor="middle" font-size="9" fill="#c04050" font-weight="bold">left.max ≤ right.min</text>

  <!-- ===== Right: Min heap (larger half) ===== -->
  <g filter="url(#sk)">
    <rect x="540" y="76" width="340" height="220" rx="10" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
  </g>
  <text x="710" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">小顶堆 right（较大的一半）</text>
  <text x="710" y="114" text-anchor="middle" font-size="9" fill="#888">堆顶 = 右半最小值</text>

  <g filter="url(#sk)">
    <circle cx="710" cy="140" r="20" fill="#fff" stroke="#2e8b57" stroke-width="2"/>
    <circle cx="650" cy="190" r="18" fill="#fff" stroke="#2e8b57" stroke-width="1.2"/>
    <circle cx="770" cy="190" r="18" fill="#fff" stroke="#2e8b57" stroke-width="1.2"/>
  </g>
  <g font-size="12" text-anchor="middle" font-weight="bold">
    <text x="710" y="145" fill="#2e6e2e">3</text>
    <text x="650" y="195" fill="#2e6e2e">4</text>
    <text x="770" y="195" fill="#2e6e2e">5</text>
  </g>
  <text x="710" y="230" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">堆顶 = 3（右半最小）</text>
  <text x="710" y="250" text-anchor="middle" font-size="9" fill="#888">存了 [3, 4, 5]</text>
  <text x="710" y="270" text-anchor="middle" font-size="9" fill="#555">≥ left 的所有元素</text>

  <!-- ===== Bottom: Median ===== -->
  <line x1="60" y1="306" x2="880" y2="306" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="280" y="316" width="380" height="52" rx="8" fill="#fce4ec" stroke="#c04050" stroke-width="1.5"/>
  </g>
  <text x="470" y="338" text-anchor="middle" font-size="12" fill="#a03040" font-weight="bold">中位数 = (left.top + right.top) / 2 = (2 + 3) / 2 = 2.5</text>
  <text x="470" y="358" text-anchor="middle" font-size="9" fill="#888">left.size == right.size → 取两堆顶平均；left 多 1 → 取 left.top</text>

  <!-- Analogy note -->
  <text x="470" y="374" text-anchor="middle" font-size="8" fill="#2b6e9e">💡 与 P50 延迟统计同构：P50 = 中位数，双堆 O(log N) 插入 + O(1) 查询</text>
</svg>
