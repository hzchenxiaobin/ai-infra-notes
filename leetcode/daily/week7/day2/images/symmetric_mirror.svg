<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">对称 = 左右子树互为镜像（交叉比较）</text>

  <!-- 对称树 -->
  <circle cx="290" cy="60" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="290" y="64" text-anchor="middle" font-size="12" fill="#333">1</text>

  <circle cx="240" cy="120" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="240" y="124" text-anchor="middle" font-size="11" fill="#333">2</text>
  <line x1="278" y1="72" x2="250" y2="108" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>

  <circle cx="340" cy="120" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="340" y="124" text-anchor="middle" font-size="11" fill="#333">2</text>
  <line x1="302" y1="72" x2="330" y2="108" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>

  <circle cx="200" cy="180" r="13" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="200" y="184" text-anchor="middle" font-size="10" fill="#333">3</text>
  <line x1="228" y1="130" x2="208" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <circle cx="270" cy="180" r="13" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="270" y="184" text-anchor="middle" font-size="10" fill="#333">4</text>
  <line x1="248" y1="130" x2="266" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <circle cx="310" cy="180" r="13" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="310" y="184" text-anchor="middle" font-size="10" fill="#333">4</text>
  <line x1="332" y1="130" x2="314" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <circle cx="380" cy="180" r="13" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="380" y="184" text-anchor="middle" font-size="10" fill="#333">3</text>
  <line x1="352" y1="130" x2="372" y2="168" stroke="#446688" stroke-width="1.2" filter="url(#rough2)"/>

  <!-- 竖直对称轴 -->
  <path d="M 290 44 L 290 220" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,4" fill="none" filter="url(#rough2)"/>
  <text x="300" y="40" font-size="10" fill="#b85450">对称轴</text>

  <!-- 镜像配对说明 -->
  <text x="40" y="250" font-size="12" fill="#333" font-weight="bold">交叉配对（镜像精髓）：</text>

  <rect x="40" y="262" width="240" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="160" y="283" text-anchor="middle" font-size="11" fill="#333">左.左 ↔ 右.右 （外侧对外侧）</text>

  <rect x="300" y="262" width="240" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="420" y="283" text-anchor="middle" font-size="11" fill="#333">左.右 ↔ 右.左 （内侧对内侧）</text>

  <text x="40" y="318" font-size="11" fill="#888">每对节点：值相等，再递归检查其「交叉」孩子</text>
  <text x="40" y="336" font-size="11" fill="#888">都空 → 对称；一空一非空 → 不对称；都非空 → 比值并递归</text>
  <text x="40" y="358" font-size="11" fill="#888">整棵树对称 ⟺ 根的左右子树互为镜像</text>
</svg>
