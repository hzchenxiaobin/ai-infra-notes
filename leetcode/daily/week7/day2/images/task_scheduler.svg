<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">贪心框架法：任务调度器</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">最高频任务决定骨架，低频任务填充空位。frame = (max_freq-1)*(n+1) + count</text>

  <!-- ===== Example: A A A B B B, n=2 ===== -->
  <text x="40" y="86" font-size="12" font-weight="bold" fill="#2b2b2b">示例：tasks = [A,A,A,B,B,B], n = 2</text>
  <text x="440" y="86" font-size="11" fill="#555">max_freq=3, count=2, frame=(3-1)*(2+1)+2=8</text>

  <!-- Timeline row 1: A B _ A B _ A B -->
  <!-- Tick labels -->
  <g font-size="9" fill="#888">
    <text x="120" y="112" text-anchor="middle">t0</text>
    <text x="160" y="112" text-anchor="middle">t1</text>
    <text x="200" y="112" text-anchor="middle">t2</text>
    <text x="240" y="112" text-anchor="middle">t3</text>
    <text x="280" y="112" text-anchor="middle">t4</text>
    <text x="320" y="112" text-anchor="middle">t5</text>
    <text x="360" y="112" text-anchor="middle">t6</text>
    <text x="400" y="112" text-anchor="middle">t7</text>
  </g>

  <!-- Period brackets -->
  <path d="M 100 120 L 100 126 L 220 126 L 220 120" stroke="#4a8edb" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="160" y="142" text-anchor="middle" font-size="9" fill="#4a8edb">周期1 (n+1=3)</text>
  <path d="M 240 120 L 240 126 L 360 126 L 360 120" stroke="#4a8edb" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="300" y="142" text-anchor="middle" font-size="9" fill="#4a8edb">周期2 (n+1=3)</text>
  <text x="400" y="142" text-anchor="middle" font-size="9" fill="#c98a2b">末轮 (count=2)</text>

  <!-- Task cells -->
  <g filter="url(#sk)">
    <rect x="100" y="90" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="140" y="90" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
    <rect x="180" y="90" width="40" height="30" rx="4" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="220" y="90" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="260" y="90" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
    <rect x="300" y="90" width="40" height="30" rx="4" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="340" y="90" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="380" y="90" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
  </g>
  <g font-size="13" font-weight="bold">
    <text x="120" y="110" text-anchor="middle" fill="#2b6e9e">A</text>
    <text x="160" y="110" text-anchor="middle" fill="#2e6e2e">B</text>
    <text x="200" y="110" text-anchor="middle" fill="#aaa">idle</text>
    <text x="240" y="110" text-anchor="middle" fill="#2b6e9e">A</text>
    <text x="280" y="110" text-anchor="middle" fill="#2e6e2e">B</text>
    <text x="320" y="110" text-anchor="middle" fill="#aaa">idle</text>
    <text x="360" y="110" text-anchor="middle" fill="#2b6e9e">A</text>
    <text x="400" y="110" text-anchor="middle" fill="#2e6e2e">B</text>
  </g>
  <text x="440" y="110" font-size="11" fill="#c98a2b" font-weight="bold">→ 答案 = 8</text>

  <!-- ===== Legend ===== -->
  <g filter="url(#sk)">
    <rect x="500" y="155" width="12" height="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
    <rect x="580" y="155" width="12" height="10" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
    <rect x="660" y="155" width="12" height="10" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="2,1"/>
  </g>
  <text x="516" y="164" font-size="9" fill="#555">任务 A (max_freq=3)</text>
  <text x="596" y="164" font-size="9" fill="#555">任务 B (max_freq=3)</text>
  <text x="676" y="164" font-size="9" fill="#555">idle (冷却空位)</text>

  <!-- ===== Formula ===== -->
  <line x1="40" y1="190" x2="900" y2="190" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="214" font-size="13" font-weight="bold" fill="#2b2b2b">公式推导</text>

  <g filter="url(#sk)">
    <rect x="40" y="224" width="400" height="100" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="56" y="248" font-size="11" fill="#444" font-weight="bold">框架时间：</text>
  <text x="56" y="268" font-family="monospace" font-size="11" fill="#7a5415">frame = (max_freq - 1) * (n + 1) + count</text>
  <text x="56" y="288" font-size="10" fill="#555">• max_freq-1 个完整周期（每周期 n+1 长度）</text>
  <text x="56" y="304" font-size="10" fill="#555">• count 种最高频任务组成最后一轮</text>
  <text x="56" y="320" font-size="10" fill="#555">• count = 出现 max_freq 次的任务种类数</text>

  <g filter="url(#sk)">
    <rect x="460" y="224" width="400" height="100" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="476" y="248" font-size="11" fill="#444" font-weight="bold">最终答案：</text>
  <text x="476" y="268" font-family="monospace" font-size="11" fill="#2b6e9e">answer = max(frame, len(tasks))</text>
  <text x="476" y="288" font-size="10" fill="#555">• frame > len(tasks)：有空闲，答案=frame</text>
  <text x="476" y="304" font-size="10" fill="#555">• frame < len(tasks)：无空闲，答案=len(tasks)</text>
  <text x="476" y="320" font-size="10" fill="#555">• 任务足够多时冷却槽被自然填满</text>

  <!-- ===== Second example ===== -->
  <line x1="40" y1="340" x2="900" y2="340" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="364" font-size="12" font-weight="bold" fill="#2b2b2b">对比：tasks = [A,A,A,B,B,B,C,C,D,D], n = 2</text>
  <text x="500" y="364" font-size="11" fill="#555">max_freq=3, count=2, frame=8, len=10</text>

  <!-- Timeline row 2 -->
  <g font-size="13" font-weight="bold" filter="url(#sk)">
    <rect x="100" y="376" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <text x="120" y="396" text-anchor="middle" fill="#2b6e9e">A</text>
    <rect x="140" y="376" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
    <text x="160" y="396" text-anchor="middle" fill="#2e6e2e">B</text>
    <rect x="180" y="376" width="40" height="30" rx="4" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.3"/>
    <text x="200" y="396" text-anchor="middle" fill="#6a3d8a">C</text>
    <rect x="220" y="376" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <text x="240" y="396" text-anchor="middle" fill="#2b6e9e">A</text>
    <rect x="260" y="376" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
    <text x="280" y="396" text-anchor="middle" fill="#2e6e2e">B</text>
    <rect x="300" y="376" width="40" height="30" rx="4" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.3"/>
    <text x="320" y="396" text-anchor="middle" fill="#6a3d8a">C</text>
    <rect x="340" y="376" width="40" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <text x="360" y="396" text-anchor="middle" fill="#2b6e9e">A</text>
    <rect x="380" y="376" width="40" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
    <text x="400" y="396" text-anchor="middle" fill="#2e6e2e">B</text>
    <rect x="420" y="376" width="40" height="30" rx="4" fill="#e0f7fa" stroke="#00838f" stroke-width="1.3"/>
    <text x="440" y="396" text-anchor="middle" fill="#005f6b">D</text>
    <rect x="460" y="376" width="40" height="30" rx="4" fill="#e0f7fa" stroke="#00838f" stroke-width="1.3"/>
    <text x="480" y="396" text-anchor="middle" fill="#005f6b">D</text>
  </g>
  <text x="520" y="396" font-size="11" fill="#2e8b57" font-weight="bold">→ 答案 = max(8, 10) = 10 ✓</text>
  <text x="100" y="424" font-size="10" fill="#888">无 idle！低频任务 C/D 填满了冷却槽 → frame < len(tasks) → 答案 = len(tasks)</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="438" width="860" height="16" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/>
  </g>
  <text x="470" y="450" text-anchor="middle" font-size="9" fill="#2b6e9e">💡 与调度器资源预算同构：冷却 n = token_budget 约束，先排最高频 = 高优先级先分配资源，空位填低频 = 剩余预算给低优先级</text>
</svg>
