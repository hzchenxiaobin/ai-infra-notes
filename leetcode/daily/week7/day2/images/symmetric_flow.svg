<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">check(p, q)：判断两棵树互为镜像</text>

  <!-- 入口 -->
  <rect x="190" y="50" width="200" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="72" text-anchor="middle" font-size="12" fill="#333">check(root.left, root.right)</text>

  <path d="M 290 84 L 290 100" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- 都空？ -->
  <polygon points="290,102 400,138 290,174 180,138" fill="#fff8e1" stroke="#d6a040" stroke-width="1.7" filter="url(#rough2)"/>
  <text x="290" y="134" text-anchor="middle" font-size="12" fill="#333">p 和 q 都空？</text>
  <text x="290" y="152" text-anchor="middle" font-size="10" fill="#888">两子树都到头</text>

  <path d="M 180 138 L 130 138 L 130 190" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="150" y="130" font-size="10" fill="#82b366">是</text>
  <rect x="90" y="194" width="80" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.6" rx="8" filter="url(#rough2)"/>
  <text x="130" y="214" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">true</text>

  <!-- 一空？ -->
  <path d="M 290 174 L 290 196" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="190" font-size="10" fill="#b85450">否</text>

  <polygon points="290,198 400,232 290,266 180,232" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" filter="url(#rough2)"/>
  <text x="290" y="228" text-anchor="middle" font-size="11" fill="#333">一空一非空？</text>
  <text x="290" y="246" text-anchor="middle" font-size="10" fill="#888">结构不对称</text>

  <path d="M 400 232 L 450 232 L 450 194" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="420" y="224" font-size="10" fill="#b85450">是</text>
  <rect x="410" y="180" width="80" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1.6" rx="8" filter="url(#rough2)"/>
  <text x="450" y="200" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">false</text>

  <!-- 都非空 -->
  <path d="M 290 266 L 290 284" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="280" font-size="10" fill="#82b366">否</text>

  <rect x="160" y="288" width="260" height="34" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="290" y="310" text-anchor="middle" font-size="11" fill="#333">p.val == q.val ?</text>

  <path d="M 290 322 L 290 338" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="302" y="334" font-size="10" fill="#82b366">是</text>

  <!-- 递归两侧 -->
  <rect x="60" y="342" width="220" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="170" y="362" text-anchor="middle" font-size="10" fill="#333">check(p.left, q.right) 外侧</text>

  <rect x="300" y="342" width="220" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="410" y="362" text-anchor="middle" font-size="10" fill="#333">check(p.right, q.left) 内侧</text>

  <text x="290" y="392" text-anchor="middle" font-size="11" fill="#888">三者（值相等、外侧镜像、内侧镜像）都成立 → true；否则 false</text>
</svg>
