<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">皇后攻击范围：同行、同列、同对角线</text>

  <!-- 棋盘 5x5 -->
  <g filter="url(#rough2)">
    <!-- 格子 -->
    <rect x="60" y="60" width="200" height="200" fill="#fff" stroke="#888" stroke-width="1.4"/>
    <line x1="100" y1="60" x2="100" y2="260" stroke="#888" stroke-width="1"/>
    <line x1="140" y1="60" x2="140" y2="260" stroke="#888" stroke-width="1"/>
    <line x1="180" y1="60" x2="180" y2="260" stroke="#888" stroke-width="1"/>
    <line x1="220" y1="60" x2="220" y2="260" stroke="#888" stroke-width="1"/>
    <line x1="60" y1="100" x2="260" y2="100" stroke="#888" stroke-width="1"/>
    <line x1="60" y1="140" x2="260" y2="140" stroke="#888" stroke-width="1"/>
    <line x1="60" y1="180" x2="260" y2="180" stroke="#888" stroke-width="1"/>
    <line x1="60" y1="220" x2="260" y2="220" stroke="#888" stroke-width="1"/>
  </g>

  <!-- 皇后在 (1,1) 即格 (row=1,col=1) 中心 (120,120) -->
  <circle cx="120" cy="120" r="14" fill="#fce4ec" stroke="#b85450" stroke-width="2" filter="url(#rough2)"/>
  <text x="120" y="125" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Q</text>

  <!-- 同行高亮 -->
  <rect x="60" y="100" width="200" height="40" fill="#b85450" opacity="0.12" filter="url(#rough2)"/>
  <!-- 同列高亮 -->
  <rect x="100" y="60" width="40" height="200" fill="#b85450" opacity="0.12" filter="url(#rough2)"/>
  <!-- 对角线 ↘ -->
  <line x1="60" y1="60" x2="260" y2="260" stroke="#d6a040" stroke-width="2" opacity="0.5" filter="url(#rough2)"/>
  <!-- 对角线 ↙ -->
  <line x1="180" y1="60" x2="60" y2="180" stroke="#d6a040" stroke-width="2" opacity="0.5" filter="url(#rough2)"/>

  <text x="160" y="290" text-anchor="middle" font-size="11" fill="#b85450">同行 / 同列（红）+ 两条对角线（橙）全部被攻击</text>

  <!-- 右侧：三个集合 -->
  <text x="410" y="62" font-size="12" fill="#446688" font-weight="bold">三集合 O(1) 判冲突：</text>

  <rect x="340" y="76" width="220" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="450" y="94" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">cols</text>
  <text x="450" y="110" text-anchor="middle" font-size="10" fill="#555">记录已占用的列 col</text>

  <rect x="340" y="124" width="220" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="450" y="142" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">diag1 = row - col</text>
  <text x="450" y="158" text-anchor="middle" font-size="10" fill="#555">主对角线 ↘ 标识</text>

  <rect x="340" y="172" width="220" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">diag2 = row + col</text>
  <text x="450" y="206" text-anchor="middle" font-size="10" fill="#555">副对角线 ↙ 标识</text>

  <rect x="320" y="228" width="240" height="60" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="440" y="250" text-anchor="middle" font-size="11" fill="#333">放 (row,col) 前：</text>
  <text x="440" y="266" text-anchor="middle" font-size="10" fill="#555">col∉cols ∧ row-col∉diag1</text>
  <text x="440" y="280" text-anchor="middle" font-size="10" fill="#555">∧ row+col∉diag2</text>

  <text x="290" y="332" text-anchor="middle" font-size="11" fill="#888">关键：每行恰好一个皇后 → 行约束编码进搜索结构</text>
  <text x="290" y="350" text-anchor="middle" font-size="11" fill="#888">只需再判列 + 两条对角线，三集合各 O(1)</text>
  <text x="290" y="372" text-anchor="middle" font-size="11" fill="#888">回溯：放入三个集合 → 递归下一行 → 移除（恢复现场）</text>
</svg>
