<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">LRU 缓存：哈希表 + 双向链表</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">哈希表 O(1) 查找 + 双向链表 O(1) 维护顺序</text>

  <!-- ===== Hash Table (left) ===== -->
  <text x="40" y="84" font-size="12" font-weight="bold" fill="#4a8edb">哈希表（O(1) 查找）</text>
  <g filter="url(#sk)">
    <rect x="40" y="92" width="180" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="40" y="120" width="180" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="40" y="148" width="180" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <g font-size="10" fill="#333">
    <text x="50" y="111">key=1 → Node(1,1)</text>
    <text x="50" y="139">key=2 → Node(2,2)</text>
    <text x="50" y="167">key=3 → Node(3,3)</text>
  </g>

  <!-- Arrows from hash to linked list -->
  <path d="M 220 106 L 300 130" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 220 134 L 360 150" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 220 162 L 420 170" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Doubly Linked List (right) ===== -->
  <text x="300" y="84" font-size="12" font-weight="bold" fill="#2e8b57">双向链表（O(1) 维护顺序）</text>

  <!-- Dummy head -->
  <g filter="url(#sk)">
    <rect x="280" y="92" width="50" height="36" rx="4" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="305" y="115" text-anchor="middle" font-size="9" fill="#888">head</text>

  <!-- Node 1 (most recent) -->
  <g filter="url(#sk)">
    <rect x="340" y="92" width="80" height="36" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
  </g>
  <text x="380" y="108" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">Node(3,3)</text>
  <text x="380" y="122" text-anchor="middle" font-size="8" fill="#888">最近使用</text>

  <!-- Node 2 -->
  <g filter="url(#sk)">
    <rect x="430" y="92" width="80" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="470" y="108" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">Node(2,2)</text>

  <!-- Node 3 (least recent) -->
  <g filter="url(#sk)">
    <rect x="520" y="92" width="80" height="36" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
  </g>
  <text x="560" y="108" text-anchor="middle" font-size="10" fill="#a03040" font-weight="bold">Node(1,1)</text>
  <text x="560" y="122" text-anchor="middle" font-size="8" fill="#888">最久未用</text>

  <!-- Dummy tail -->
  <g filter="url(#sk)">
    <rect x="610" y="92" width="50" height="36" rx="4" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="635" y="115" text-anchor="middle" font-size="9" fill="#888">tail</text>

  <!-- Bidirectional arrows -->
  <g stroke="#5a5a5a" stroke-width="1" fill="none" filter="url(#sk)">
    <path d="M 330 100 L 340 100" marker-end="url(#ar)"/>
    <path d="M 340 120 L 330 120" marker-end="url(#ar)"/>
    <path d="M 420 100 L 430 100" marker-end="url(#ar)"/>
    <path d="M 430 120 L 420 120" marker-end="url(#ar)"/>
    <path d="M 510 100 L 520 100" marker-end="url(#ar)"/>
    <path d="M 520 120 L 510 120" marker-end="url(#ar)"/>
    <path d="M 600 100 L 610 100" marker-end="url(#ar)"/>
    <path d="M 610 120 L 600 120" marker-end="url(#ar)"/>
  </g>

  <!-- ===== Operations ===== -->
  <line x1="40" y1="146" x2="880" y2="146" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="170" font-size="12" font-weight="bold" fill="#2b2b2b">操作示例（capacity=2）</text>

  <g filter="url(#sk)">
    <rect x="40" y="180" width="840" height="180" rx="8" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <g font-size="10" fill="#444">
    <text x="56" y="204" font-weight="bold" fill="#4a8edb">put(1,1)</text>
    <text x="160" y="204" fill="#555">→ 链表: [1] ← 哈希表: {1}</text>
    <text x="56" y="224" font-weight="bold" fill="#4a8edb">put(2,2)</text>
    <text x="160" y="224" fill="#555">→ 链表: [2, 1] ← 哈希表: {1, 2}</text>
    <text x="56" y="244" font-weight="bold" fill="#2e8b57">get(1)</text>
    <text x="160" y="244" fill="#555">→ 移到头部 → 链表: [1, 2] → 返回 1</text>
    <text x="56" y="264" font-weight="bold" fill="#c04050">put(3,3)</text>
    <text x="160" y="264" fill="#555">→ 容量满！淘汰尾部 key=2 → 链表: [3, 1] ← 哈希表: {1, 3}</text>
    <text x="56" y="284" font-weight="bold" fill="#c04050">get(2)</text>
    <text x="160" y="284" fill="#555">→ 哈希表无 key=2 → 返回 -1</text>
    <text x="56" y="304" font-weight="bold" fill="#c04050">put(4,4)</text>
    <text x="160" y="304" fill="#555">→ 容量满！淘汰尾部 key=1 → 链表: [4, 3] ← 哈希表: {3, 4}</text>
    <text x="56" y="324" font-weight="bold" fill="#2e8b57">get(3)</text>
    <text x="160" y="324" fill="#555">→ 移到头部 → 返回 3</text>
    <text x="56" y="344" font-weight="bold" fill="#2e8b57">get(4)</text>
    <text x="160" y="344" fill="#555">→ 移到头部 → 返回 4</text>
  </g>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="372" width="840" height="20" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/>
  </g>
  <text x="470" y="386" text-anchor="middle" font-size="9" fill="#2b6e9e">💡 与 Prefix Caching 同构：move_to_end = 访问后提升优先级，popitem(last=False) = 淘汰最久未用的 KV Cache block</text>
</svg>
