<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="81" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">最长连续序列：哈希集合 + 起点枚举</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input -->
  <text x="60" y="72" font-size="12" font-weight="bold" fill="#2b6e9e">输入 nums = [100, 4, 200, 1, 3, 2]</text>

  <!-- hash set -->
  <text x="60" y="100" font-size="12" font-weight="bold" fill="#7a5415">① 全部入哈希集合：{1, 2, 3, 4, 100, 200}</text>

  <!-- enumerate from start points -->
  <text x="60" y="128" font-size="12" font-weight="bold" fill="#2e6e2e">② 枚举每个数，只从"起点"向后查</text>

  <!-- num=100 -->
  <g filter="url(#sk)"><rect x="60" y="140" width="240" height="34" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
  <text x="180" y="162" text-anchor="middle" font-size="11" fill="#2b6e9e">100：99 不在集合 → 起点，查 101× → 长度1</text>

  <!-- num=4 -->
  <g filter="url(#sk)"><rect x="60" y="180" width="240" height="34" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.3"/></g>
  <text x="180" y="202" text-anchor="middle" font-size="11" fill="#7a2828">4：3 在集合 → 非起点，跳过</text>

  <!-- num=200 -->
  <g filter="url(#sk)"><rect x="60" y="220" width="240" height="34" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
  <text x="180" y="242" text-anchor="middle" font-size="11" fill="#2b6e9e">200：199 不在 → 起点，查 201× → 长度1</text>

  <!-- num=1 -->
  <g filter="url(#sk)"><rect x="60" y="260" width="240" height="34" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/></g>
  <text x="180" y="282" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">1：0 不在 → 起点，查 2✓3✓4✓5× → 长度4</text>

  <!-- result -->
  <g filter="url(#sk)"><rect x="340" y="140" width="240" height="80" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/></g>
  <text x="460" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">最长序列：1,2,3,4</text>
  <text x="460" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">长度 = 4</text>
  <text x="460" y="210" text-anchor="middle" font-size="10" fill="#888">只从起点枚举 → O(n)</text>

  <!-- key insight -->
  <g filter="url(#sk)">
    <rect x="60" y="310" width="760" height="70" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="334" font-size="12" font-weight="bold" fill="#444">关键：只从"起点"枚举</text>
  <text x="80" y="354" font-size="10" fill="#444">起点 = num-1 不在集合（说明 num 是某连续序列的最小值）→ 向后查 num+1, num+2...</text>
  <text x="80" y="370" font-size="10" fill="#7a5415">每个数最多被查 2 次（起点枚举 1 次 + 被前驱查到 1 次）→ 总 O(n)</text>
</svg>
