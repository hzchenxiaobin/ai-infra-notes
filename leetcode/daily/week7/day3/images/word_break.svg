<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2e8b57"/>
    </marker>
  </defs>
  <rect width="940" height="420" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">单词拆分：DP 前缀缓存</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">dp[j] = 前缀缓存命中，s[j:i] in set = 增量计算</text>

  <!-- ===== String visualization ===== -->
  <text x="40" y="84" font-size="12" font-weight="bold" fill="#2b2b2b">s = "leetcode", wordDict = ["leet", "code"]</text>

  <!-- Character cells -->
  <g filter="url(#sk)">
    <rect x="100" y="94" width="60" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="160" y="94" width="60" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="220" y="94" width="60" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="280" y="94" width="60" height="30" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="340" y="94" width="60" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
    <rect x="400" y="94" width="60" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
    <rect x="460" y="94" width="60" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
    <rect x="520" y="94" width="60" height="30" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
  </g>
  <g font-size="14" font-weight="bold" text-anchor="middle">
    <text x="130" y="114" fill="#2b6e9e">l</text>
    <text x="190" y="114" fill="#2b6e9e">e</text>
    <text x="250" y="114" fill="#2b6e9e">e</text>
    <text x="310" y="114" fill="#2b6e9e">t</text>
    <text x="370" y="114" fill="#2e6e2e">c</text>
    <text x="430" y="114" fill="#2e6e2e">o</text>
    <text x="490" y="114" fill="#2e6e2e">d</text>
    <text x="550" y="114" fill="#2e6e2e">e</text>
  </g>

  <!-- Position labels -->
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="100" y="140">0</text>
    <text x="340" y="140">4</text>
    <text x="580" y="140">8</text>
  </g>

  <!-- Word brackets -->
  <path d="M 100 148 L 100 156 L 340 156 L 340 148" stroke="#4a8edb" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="220" y="172" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">"leet"</text>
  <path d="M 340 148 L 340 156 L 580 156 L 580 148" stroke="#2e8b57" stroke-width="1.2" fill="none" filter="url(#sk)"/>
  <text x="460" y="172" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">"code"</text>

  <!-- ===== DP table ===== -->
  <line x1="40" y1="190" x2="900" y2="190" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="214" font-size="13" font-weight="bold" fill="#2b2b2b">DP 推演</text>

  <!-- Table header -->
  <g filter="url(#sk)">
    <rect x="80" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="140" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="200" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="260" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="320" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="380" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="440" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="500" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="560" y="224" width="60" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
  </g>
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="110" y="241">dp[0]</text>
    <text x="170" y="241">dp[1]</text>
    <text x="230" y="241">dp[2]</text>
    <text x="290" y="241">dp[3]</text>
    <text x="350" y="241">dp[4]</text>
    <text x="410" y="241">dp[5]</text>
    <text x="470" y="241">dp[6]</text>
    <text x="530" y="241">dp[7]</text>
    <text x="590" y="241">dp[8]</text>
  </g>

  <!-- DP values -->
  <g filter="url(#sk)">
    <rect x="80" y="250" width="60" height="26" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5" rx="3"/>
    <rect x="140" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="200" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="260" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="320" y="250" width="60" height="26" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5" rx="3"/>
    <rect x="380" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="440" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="500" y="250" width="60" height="26" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="560" y="250" width="60" height="26" fill="#e6f4ea" stroke="#2e8b57" stroke-width="2" rx="3"/>
  </g>
  <g font-size="12" font-weight="bold" text-anchor="middle">
    <text x="110" y="268" fill="#2e6e2e">T</text>
    <text x="170" y="268" fill="#a03040">F</text>
    <text x="230" y="268" fill="#a03040">F</text>
    <text x="290" y="268" fill="#a03040">F</text>
    <text x="350" y="268" fill="#2e6e2e">T</text>
    <text x="410" y="268" fill="#a03040">F</text>
    <text x="470" y="268" fill="#a03040">F</text>
    <text x="530" y="268" fill="#a03040">F</text>
    <text x="590" y="268" fill="#2e6e2e">T</text>
  </g>

  <!-- Arrows: dp[0] → dp[4], dp[4] → dp[8] -->
  <path d="M 110 276 Q 110 300 350 276" stroke="#2e8b57" stroke-width="1.2" fill="none" stroke-dasharray="3,2" marker-end="url(#arG)" filter="url(#sk)"/>
  <text x="230" y="296" text-anchor="middle" font-size="9" fill="#2e6e2e">dp[0]=T + "leet" ✓</text>
  <path d="M 350 276 Q 350 310 590 276" stroke="#2e8b57" stroke-width="1.2" fill="none" stroke-dasharray="3,2" marker-end="url(#arG)" filter="url(#sk)"/>
  <text x="470" y="310" text-anchor="middle" font-size="9" fill="#2e6e2e">dp[4]=T + "code" ✓</text>

  <!-- ===== Analogy with Prefix Caching ===== -->
  <line x1="40" y1="326" x2="900" y2="326" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="60" y="340" width="380" height="70" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="76" y="362" font-size="11" fill="#2b6e9e" font-weight="bold">单词拆分 DP</text>
  <text x="76" y="378" font-size="10" fill="#555">dp[j] = 前缀 s[0..j] 已解决（缓存命中）</text>
  <text x="76" y="394" font-size="10" fill="#555">s[j:i] in set = 增量计算（只处理新增部分）</text>

  <g filter="url(#sk)">
    <rect x="500" y="340" width="380" height="70" rx="8" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
  </g>
  <text x="516" y="362" font-size="11" fill="#2e6e2e" font-weight="bold">Prefix Caching</text>
  <text x="516" y="378" font-size="10" fill="#555">cache.get(prefix) = KV Cache 命中（缓存命中）</text>
  <text x="516" y="394" font-size="10" fill="#555">prefill(new_tokens) = 增量计算（只 prefill 新增）</text>

  <!-- Arrow between -->
  <text x="470" y="380" text-anchor="middle" font-size="14" fill="#c98a2b" font-weight="bold">≡</text>
</svg>
