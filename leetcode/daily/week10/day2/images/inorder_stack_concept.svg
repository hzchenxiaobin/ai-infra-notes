<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#d6a040"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">栈迭代：一路向左压栈 → 弹出访问 → 转向右子树</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">用显式栈模拟递归，访问时机 = 弹出栈顶之时</text>

  <!-- ===== tree (left side) ===== -->
  <text x="130" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">二叉树</text>
  <g font-size="12">
    <!-- root 1 -->
    <circle cx="130" cy="90" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="130" y="94" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <!-- 2 (right child of 1) -->
    <circle cx="180" cy="150" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="180" y="154" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <line x1="142" y1="102" x2="168" y2="138" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>
    <!-- 3 (left child of 2) -->
    <circle cx="130" cy="210" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.6" filter="url(#rough2)"/>
    <text x="130" y="214" text-anchor="middle" fill="#446688" font-weight="bold">3</text>
    <line x1="168" y1="162" x2="142" y2="198" stroke="#446688" stroke-width="1.3" filter="url(#rough2)"/>

    <!-- arrow labels for edges -->
    <text x="148" y="118" font-size="9" fill="#888">右</text>
    <text x="142" y="188" font-size="9" fill="#888">左</text>
  </g>
  <text x="130" y="248" text-anchor="middle" font-size="10" fill="#888">中序：1 → 3 → 2</text>

  <!-- arrow to stack -->
  <path d="M 230 150 L 290 150" stroke="#666" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== stack visualization (right side) ===== -->
  <text x="400" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">显式栈（底→顶）</text>
  <g font-size="12">
    <!-- empty stack frame -->
    <rect x="350" y="84" width="100" height="132" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3" rx="4" filter="url(#rough2)"/>

    <!-- step 1: push 1 -->
    <rect x="365" y="184" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="400" y="202" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <text x="455" y="200" font-size="9" fill="#4a7a3a">压栈①</text>

    <!-- step 2: push 2,3 -->
    <rect x="365" y="184" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="400" y="202" text-anchor="middle" fill="#446688" font-weight="bold">1</text>
    <rect x="365" y="154" width="70" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <text x="400" y="172" text-anchor="middle" fill="#446688" font-weight="bold">2</text>
    <rect x="365" y="124" width="70" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="4" filter="url(#rough2)"/>
    <text x="400" y="142" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <text x="455" y="140" font-size="9" fill="#4a7a3a">栈顶</text>

    <!-- pop arrow -->
    <path d="M 435 137 L 470 110" stroke="#d6a040" stroke-width="1.6" fill="none" marker-end="url(#arrO)" filter="url(#rough2)"/>
    <text x="475" y="108" font-size="10" fill="#d6a040" font-weight="bold">弹出</text>
    <text x="475" y="122" font-size="9" fill="#d6a040">访问</text>
  </g>

  <!-- ===== three steps ===== -->
  <rect x="40" y="270" width="500" height="44" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="60" y="290" font-size="11" fill="#4a7a3a" font-weight="bold">三步循环：</text>
  <text x="60" y="306" font-size="10" fill="#555">① 一路向左压栈（curr→curr.left 直到 null）② 弹出栈顶，访问 ③ curr = curr.right（转向右子树）</text>

  <!-- ===== key insight ===== -->
  <rect x="40" y="324" width="500" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="60" y="344" font-size="11" fill="#d6a040" font-weight="bold">核心：压栈=待访问，弹栈=此刻访问</text>
  <text x="60" y="360" font-size="10" fill="#555">弹栈后转向右子树，右子树作为新子问题重复「向左压栈」</text>
</svg>
