<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">核心观察：网格 DFS + 回溯，原地标记防重复</text>
  <text x="290" y="44" text-anchor="middle" font-size="11" fill="#888">从匹配首字母的格子出发，四方向探索，标记-递归-撤销</text>

  <!-- ===== grid (SEE example) ===== -->
  <text x="140" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">网格 board</text>
  <g font-size="12">
    <!-- row 0: A B C E -->
    <rect x="80" y="80" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="100" y="105" text-anchor="middle" fill="#446688">A</text>
    <rect x="120" y="80" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="140" y="105" text-anchor="middle" fill="#446688">B</text>
    <rect x="160" y="80" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="180" y="105" text-anchor="middle" fill="#446688">C</text>
    <rect x="200" y="80" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="220" y="105" text-anchor="middle" fill="#446688">E</text>
    <!-- row 1: S F C S -->
    <rect x="80" y="120" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="100" y="145" text-anchor="middle" fill="#446688">S</text>
    <rect x="120" y="120" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="140" y="145" text-anchor="middle" fill="#446688">F</text>
    <rect x="160" y="120" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="180" y="145" text-anchor="middle" fill="#446688">C</text>
    <rect x="200" y="120" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/>
    <text x="220" y="145" text-anchor="middle" fill="#4a7a3a" font-weight="bold">S</text>
    <text x="220" y="172" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">起点 (1,3)</text>
    <!-- row 2: A D E E -->
    <rect x="80" y="160" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="100" y="185" text-anchor="middle" fill="#446688">A</text>
    <rect x="120" y="160" width="40" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
    <text x="140" y="185" text-anchor="middle" fill="#446688">D</text>
    <rect x="160" y="160" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/>
    <text x="180" y="185" text-anchor="middle" fill="#4a7a3a" font-weight="bold">E</text>
    <rect x="200" y="160" width="40" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2.4" filter="url(#rough2)"/>
    <text x="220" y="185" text-anchor="middle" fill="#4a7a3a" font-weight="bold">E</text>
  </g>

  <!-- path arrows on grid -->
  <path d="M 220 160 L 220 161 L 220 160" stroke="#4a7a3a" stroke-width="2" fill="none" marker-end="url(#arrG)" filter="url(#rough2)"/>
  <text x="248" y="145" font-size="9" fill="#4a7a3a" font-weight="bold">↓</text>
  <text x="248" y="185" font-size="9" fill="#4a7a3a" font-weight="bold">←</text>

  <!-- ===== right side: three-step pattern ===== -->
  <text x="420" y="72" text-anchor="middle" font-size="11" fill="#888" font-weight="bold">回溯三步走</text>
  <rect x="330" y="80" width="220" height="36" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="345" y="103" font-size="11" fill="#4a7a3a" font-weight="bold">① 选择：board[i][j] = '#'</text>

  <rect x="330" y="124" width="220" height="36" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="345" y="147" font-size="11" fill="#446688" font-weight="bold">② 递归：dfs(四方向)</text>

  <rect x="330" y="168" width="220" height="36" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="345" y="191" font-size="11" fill="#d6a040" font-weight="bold">③ 撤销：board[i][j] = 原</text>

  <path d="M 440 116 L 440 122" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 440 160 L 440 166" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== bottom: pruning ===== -->
  <rect x="40" y="230" width="500" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="60" y="252" font-size="12" fill="#b85450" font-weight="bold">剪枝条件（递归入口判断）</text>
  <text x="60" y="268" font-size="10" fill="#555">越界 / board[i][j] ≠ word[index] / 已访问('#') → 直接返回 false</text>

  <!-- ===== key insight ===== -->
  <rect x="40" y="286" width="500" height="44" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="60" y="308" font-size="12" fill="#4a7a3a" font-weight="bold">关键：原地标记 = O(1) 额外空间</text>
  <text x="60" y="324" font-size="10" fill="#555">标记后递归，返回后恢复，让兄弟分支能复用该格子</text>

  <!-- ===== complexity ===== -->
  <rect x="40" y="340" width="500" height="30" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="290" y="360" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">时间 O(m·n·3^L)，空间 O(L)（递归栈深度 = word 长度）</text>
</svg>
