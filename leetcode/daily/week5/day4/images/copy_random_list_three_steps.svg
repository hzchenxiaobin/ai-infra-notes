<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="540" fill="#fafafa"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">O(1) 空间拼接拆分法：三步深拷贝</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ============ Step 1：插入副本 ============ -->
  <text x="40" y="74" font-size="13" font-weight="bold" fill="#2b6e9e">① 在每个节点后插入它的副本：A → A' → B → B' → ...</text>
  <g filter="url(#sk)">
    <rect x="40" y="86" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="104" y="86" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="168" y="86" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="232" y="86" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="296" y="86" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="360" y="86" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
  </g>
  <text x="70" y="110" text-anchor="middle" font-size="11" fill="#234">A</text>
  <text x="134" y="110" text-anchor="middle" font-size="11" fill="#2e6e2e">A'</text>
  <text x="198" y="110" text-anchor="middle" font-size="11" fill="#234">B</text>
  <text x="262" y="110" text-anchor="middle" font-size="11" fill="#2e6e2e">B'</text>
  <text x="326" y="110" text-anchor="middle" font-size="11" fill="#234">C</text>
  <text x="390" y="110" text-anchor="middle" font-size="11" fill="#2e6e2e">C'</text>
  <text x="500" y="110" font-size="11" fill="#666">每个旧节点 .next 指向其副本，副本 .next 指向下一个旧节点</text>

  <!-- ============ Step 2：设置 random ============ -->
  <text x="40" y="158" font-size="13" font-weight="bold" fill="#7a5415">② 设副本的 random：cur.next.random = cur.random.next</text>
  <g filter="url(#sk)">
    <rect x="40" y="170" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="104" y="170" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="2"/>
    <rect x="168" y="170" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="232" y="170" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="2"/>
    <rect x="296" y="170" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="360" y="170" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="70" y="194" text-anchor="middle" font-size="11" fill="#234">A</text>
  <text x="134" y="194" text-anchor="middle" font-size="11" fill="#2e6e2e">A'</text>
  <text x="198" y="194" text-anchor="middle" font-size="11" fill="#234">B</text>
  <text x="262" y="194" text-anchor="middle" font-size="11" fill="#2e6e2e">B'</text>
  <text x="326" y="194" text-anchor="middle" font-size="11" fill="#234">C</text>
  <text x="390" y="194" text-anchor="middle" font-size="11" fill="#2e6e2e">C'</text>
  <!-- A.random = C → A'.random = C'（即 A.random.next）-->
  <path d="M 90 170 Q 200 230 316 170" stroke="#b85450" stroke-width="1.3" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 134 170 Q 260 245 380 170" stroke="#2e6e2e" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="500" y="180" font-size="10" fill="#b85450">A.random → C（旧）</text>
  <text x="500" y="198" font-size="10" fill="#2e6e2e">A'.random = A.random.next = C'（新）</text>
  <text x="500" y="216" font-size="10" fill="#666">关键：旧 random 指向的旧节点的 .next 就是新副本</text>

  <!-- ============ Step 3：拆分 ============ -->
  <text x="40" y="258" font-size="13" font-weight="bold" fill="#2e6e2e">③ 拆分奇偶链表：奇数位是原链表，偶数位是新链表</text>

  <!-- 原链表 -->
  <text x="40" y="288" font-size="12" font-weight="bold" fill="#234">原链表：</text>
  <g filter="url(#sk)">
    <rect x="110" y="274" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="240" y="274" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
    <rect x="370" y="274" width="60" height="40" rx="4" fill="#e8f0fe" stroke="#446688"/>
  </g>
  <text x="140" y="298" text-anchor="middle" font-size="11" fill="#234">A</text>
  <text x="270" y="298" text-anchor="middle" font-size="11" fill="#234">B</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" fill="#234">C</text>
  <path d="M 170 294 L 238 294" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 300 294 L 368 294" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 新链表 -->
  <text x="40" y="352" font-size="12" font-weight="bold" fill="#2e6e2e">新链表：</text>
  <g filter="url(#sk)">
    <rect x="110" y="338" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="240" y="338" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="370" y="338" width="60" height="40" rx="4" fill="#bfe0bf" stroke="#4a8e4a"/>
  </g>
  <text x="140" y="362" text-anchor="middle" font-size="11" fill="#2e6e2e">A'</text>
  <text x="270" y="362" text-anchor="middle" font-size="11" fill="#2e6e2e">B'</text>
  <text x="400" y="362" text-anchor="middle" font-size="11" fill="#2e6e2e">C'</text>
  <path d="M 170 358 L 238 358" stroke="#2e6e2e" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 300 358 L 368 358" stroke="#2e6e2e" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- random 也正确 -->
  <path d="M 140 338 Q 250 390 400 338" stroke="#2e6e2e" stroke-width="1.2" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 复杂度 -->
  <g filter="url(#sk)">
    <rect x="40" y="410" width="860" height="56" rx="8" fill="#e8f0fa" stroke="#4a8edb"/>
  </g>
  <text x="60" y="434" font-size="12" font-weight="bold" fill="#2b6e9e">复杂度：时间 O(n)（三次遍历），空间 O(1)（不用哈希表，借用原链表的 next 指针）</text>
  <text x="60" y="454" font-size="11" fill="#444">关键洞察：旧节点 .next 暂时指向新副本 → 旧 random 指向的旧节点的 .next 就是新副本 → 无需哈希表</text>

  <!-- CoW 类比 -->
  <g filter="url(#sk)">
    <rect x="40" y="480" width="860" height="46" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="4 3"/>
  </g>
  <text x="470" y="504" text-anchor="middle" font-size="11" fill="#7a2828" font-weight="bold">与 PagedAttention CoW 的模式同构：复制带共享引用的结构 → 先建映射（旧→新）→ 再修正所有引用</text>
  <text x="470" y="520" text-anchor="middle" font-size="10" fill="#7a2828">CoW 复制 block table 后更新各 sequence 对物理 block 的引用 = 深拷贝链表后修正 next/random</text>
</svg>
