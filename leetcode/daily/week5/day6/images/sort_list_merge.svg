<svg xmlns="http://www.w3.org/2000/svg" width="940" height="480" viewBox="0 0 940 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="480" fill="#fafafa"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">排序链表：自底向上归并（O(n log n) / O(1) 空间）</text>
  <path d="M 290 42 Q 470 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">步长 sz = 1,2,4,... 每趟合并相邻的 2×sz 段，共 log n 趟，每趟 O(n)</text>

  <!-- 原链表 -->
  <text x="40" y="100" font-size="12" font-weight="bold" fill="#2b2b2b">原链表：4 → 2 → 1 → 3</text>
  <g filter="url(#sk)">
    <g fill="#e8f0fe" stroke="#446688">
      <rect x="40" y="110" width="50" height="32" rx="4"/>
      <rect x="120" y="110" width="50" height="32" rx="4"/>
      <rect x="200" y="110" width="50" height="32" rx="4"/>
      <rect x="280" y="110" width="50" height="32" rx="4"/>
    </g>
  </g>
  <text x="65" y="131" text-anchor="middle" font-size="12" fill="#234">4</text>
  <text x="145" y="131" text-anchor="middle" font-size="12" fill="#234">2</text>
  <text x="225" y="131" text-anchor="middle" font-size="12" fill="#234">1</text>
  <text x="305" y="131" text-anchor="middle" font-size="12" fill="#234">3</text>

  <!-- sz=1 -->
  <text x="40" y="170" font-size="12" font-weight="bold" fill="#7a5415">sz=1：合并相邻 2 段（每段 1 个）</text>
  <g filter="url(#sk)">
    <g fill="#fef6e6" stroke="#c98a2b">
      <rect x="40" y="180" width="50" height="32" rx="4"/>
      <rect x="120" y="180" width="50" height="32" rx="4"/>
      <rect x="200" y="180" width="50" height="32" rx="4"/>
      <rect x="280" y="180" width="50" height="32" rx="4"/>
    </g>
  </g>
  <text x="65" y="201" text-anchor="middle" font-size="12" fill="#5a3a0a">2</text>
  <text x="145" y="201" text-anchor="middle" font-size="12" fill="#5a3a0a">4</text>
  <text x="225" y="201" text-anchor="middle" font-size="12" fill="#5a3a0a">1</text>
  <text x="305" y="201" text-anchor="middle" font-size="12" fill="#5a3a0a">3</text>
  <text x="90" y="222" text-anchor="middle" font-size="9" fill="#7a5415">merge(4,2)→[2,4]</text>
  <text x="250" y="222" text-anchor="middle" font-size="9" fill="#7a5415">merge(1,3)→[1,3]</text>

  <!-- sz=2 -->
  <text x="40" y="250" font-size="12" font-weight="bold" fill="#2e6e2e">sz=2：合并相邻 2 段（每段 2 个）</text>
  <g filter="url(#sk)">
    <g fill="#eaf6ee" stroke="#4a8e4a">
      <rect x="40" y="260" width="50" height="32" rx="4"/>
      <rect x="120" y="260" width="50" height="32" rx="4"/>
      <rect x="200" y="260" width="50" height="32" rx="4"/>
      <rect x="280" y="260" width="50" height="32" rx="4"/>
    </g>
  </g>
  <text x="65" y="281" text-anchor="middle" font-size="12" fill="#2e6e2e">1</text>
  <text x="145" y="281" text-anchor="middle" font-size="12" fill="#2e6e2e">2</text>
  <text x="225" y="281" text-anchor="middle" font-size="12" fill="#2e6e2e">3</text>
  <text x="305" y="281" text-anchor="middle" font-size="12" fill="#2e6e2e">4</text>
  <text x="170" y="302" text-anchor="middle" font-size="9" fill="#2e6e2e">merge([2,4],[1,3])→[1,2,3,4]</text>

  <!-- sz=4 -->
  <text x="40" y="330" font-size="12" font-weight="bold" fill="#2b6e9e">sz=4：已覆盖全部，排序完成</text>
  <g filter="url(#sk)">
    <g fill="#e8f0fa" stroke="#4a8edb">
      <rect x="40" y="340" width="50" height="32" rx="4"/>
      <rect x="120" y="340" width="50" height="32" rx="4"/>
      <rect x="200" y="340" width="50" height="32" rx="4"/>
      <rect x="280" y="340" width="50" height="32" rx="4"/>
    </g>
  </g>
  <text x="65" y="361" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">1</text>
  <text x="145" y="361" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">2</text>
  <text x="225" y="361" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">3</text>
  <text x="305" y="361" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">4</text>

  <!-- 复杂度 + 类比 -->
  <g filter="url(#sk)">
    <rect x="400" y="180" width="500" height="200" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="650" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">复杂度与模式类比</text>
  <text x="420" y="230" font-size="11" fill="#444">时间 O(n log n)：log n 趟，每趟 O(n) 遍历合并</text>
  <text x="420" y="250" font-size="11" fill="#444">空间 O(1)：迭代法只用几个指针，无递归栈</text>
  <text x="420" y="278" font-size="11" fill="#7a5415" font-weight="bold">与 profiling 三层方法论同构：</text>
  <text x="420" y="296" font-size="11" fill="#444">归并：自底向上（小段→大段），每趟覆盖全部</text>
  <text x="420" y="314" font-size="11" fill="#444">profiling：自顶向下拆（系统→阶段→kernel），每层覆盖全部</text>
  <text x="420" y="338" font-size="11" fill="#2e6e2e" font-weight="bold">都是"分层处理 + 每层全覆盖 + 逐步收敛"</text>
  <text x="420" y="358" font-size="11" fill="#666">归并收敛到有序，profiling 收敛到瓶颈定位</text>

  <!-- 底部 -->
  <g filter="url(#sk)">
    <rect x="40" y="410" width="860" height="56" rx="8" fill="#e8f0fa" stroke="#4a8edb"/>
  </g>
  <text x="60" y="434" font-size="12" font-weight="bold" fill="#2b6e9e">关键：merge 两个有序链表是基础操作（双指针，O(n)）；外层控制步长 sz 倍增</text>
  <text x="60" y="454" font-size="11" fill="#444">每趟从头扫，每 2×sz 个节点切一段，相邻两段 merge；用 dummy 节点串接结果</text>
</svg>
