<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="400" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="14" fill="#555" font-weight="bold">组合总和解空间：决策树（remain = 剩余目标）</text>

  <!-- 根 -->
  <circle cx="200" cy="60" r="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="200" y="64" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">7</text>
  <text x="200" y="92" text-anchor="middle" font-size="9" fill="#888">start=0</text>

  <!-- 选2 -->
  <path d="M 188 74 L 100 120" stroke="#666" stroke-width="1.3" fill="none" filter="url(#rough2)"/>
  <text x="130" y="92" font-size="9" fill="#82b366">选2</text>
  <circle cx="90" cy="130" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="90" y="134" text-anchor="middle" font-size="10" fill="#333">5</text>

  <path d="M 80 144 L 60 186" stroke="#666" stroke-width="1.2" fill="none" filter="url(#rough2)"/>
  <text x="55" y="166" font-size="9" fill="#82b366">选2</text>
  <circle cx="55" cy="196" r="15" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="55" y="200" text-anchor="middle" font-size="10" fill="#333">3</text>

  <path d="M 45 210 L 35 250" stroke="#666" stroke-width="1.2" fill="none" filter="url(#rough2)"/>
  <text x="28" y="232" font-size="9" fill="#b85450">选2→1</text>
  <circle cx="35" cy="260" r="13" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="35" y="264" text-anchor="middle" font-size="9" fill="#333">1</text>
  <text x="35" y="288" text-anchor="middle" font-size="8" fill="#b85450">2&gt;1 剪枝</text>

  <path d="M 70 210 L 105 250" stroke="#666" stroke-width="1.2" fill="none" filter="url(#rough2)"/>
  <text x="92" y="232" font-size="9" fill="#82b366">选3→0</text>
  <circle cx="110" cy="260" r="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="110" y="264" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">0</text>
  <text x="110" y="288" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">✓ [2,2,3]</text>

  <!-- 选3 -->
  <path d="M 200 78 L 280 130" stroke="#666" stroke-width="1.3" fill="none" filter="url(#rough2)"/>
  <text x="250" y="92" font-size="9" fill="#82b366">选3</text>
  <circle cx="290" cy="140" r="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
  <text x="290" y="144" text-anchor="middle" font-size="10" fill="#333">4</text>
  <text x="290" y="172" text-anchor="middle" font-size="8" fill="#888">start=1</text>

  <path d="M 290 156 L 290 196" stroke="#666" stroke-width="1.2" fill="none" filter="url(#rough2)"/>
  <text x="300" y="180" font-size="9" fill="#b85450">选3→1</text>
  <circle cx="290" cy="206" r="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" filter="url(#rough2)"/>
  <text x="290" y="210" text-anchor="middle" font-size="10" fill="#333">1</text>
  <text x="290" y="234" text-anchor="middle" font-size="8" fill="#b85450">3&gt;1 剪枝</text>

  <!-- 选7 -->
  <path d="M 215 70 L 440 120" stroke="#666" stroke-width="1.3" fill="none" filter="url(#rough2)"/>
  <text x="350" y="86" font-size="9" fill="#82b366">选7</text>
  <circle cx="450" cy="130" r="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8" filter="url(#rough2)"/>
  <text x="450" y="134" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">0</text>
  <text x="450" y="160" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">✓ [7]</text>

  <!-- 说明 -->
  <rect x="40" y="310" width="500" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="10" filter="url(#rough2)"/>
  <text x="60" y="332" font-size="12" fill="#333" font-weight="bold">关键：</text>
  <text x="60" y="350" font-size="11" fill="#555">• 递归传 start=i（非 i+1）→ 同一数可重复选</text>
  <text x="60" y="368" font-size="11" fill="#555">• 每层只选 candidates[start..] → 组合非递减 → 自动去重（无 [3,2]）</text>
  <text x="60" y="384" font-size="11" fill="#555">• 排序后 candidates[i] &gt; remain 直接 break → 砍掉整棵子树</text>
</svg>
