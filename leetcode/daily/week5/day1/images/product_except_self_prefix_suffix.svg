<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <marker id="arL" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fafafa"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">除自身以外数组的乘积：前缀积 × 后缀积</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="72" text-anchor="middle" font-size="12" fill="#666">answer[i] = 左边所有元素的乘积 × 右边所有元素的乘积</text>

  <!-- nums 行 -->
  <text x="40" y="110" font-size="13" font-weight="bold" fill="#2b2b2b">nums</text>
  <g filter="url(#sk)">
    <g stroke="#446688" fill="#e8f0fe">
      <rect x="110" y="90" width="80" height="40" rx="4"/>
      <rect x="190" y="90" width="80" height="40" rx="4"/>
      <rect x="270" y="90" width="80" height="40" rx="4"/>
      <rect x="350" y="90" width="80" height="40" rx="4"/>
      <rect x="430" y="90" width="80" height="40" rx="4"/>
    </g>
  </g>
  <text x="150" y="115" text-anchor="middle" font-size="13" fill="#333">a</text>
  <text x="230" y="115" text-anchor="middle" font-size="13" fill="#333">b</text>
  <text x="310" y="115" text-anchor="middle" font-size="13" fill="#333">c</text>
  <text x="390" y="115" text-anchor="middle" font-size="13" fill="#333">d</text>
  <text x="470" y="115" text-anchor="middle" font-size="13" fill="#333">e</text>

  <!-- left 行 -->
  <text x="40" y="180" font-size="13" font-weight="bold" fill="#2b6e9e">left</text>
  <text x="40" y="198" font-size="10" fill="#666">(正序扫)</text>
  <g filter="url(#sk)">
    <g stroke="#4a8edb" fill="#d9e8f7">
      <rect x="110" y="160" width="80" height="40" rx="4"/>
      <rect x="190" y="160" width="80" height="40" rx="4"/>
      <rect x="270" y="160" width="80" height="40" rx="4"/>
      <rect x="350" y="160" width="80" height="40" rx="4"/>
      <rect x="430" y="160" width="80" height="40" rx="4"/>
    </g>
  </g>
  <text x="150" y="185" text-anchor="middle" font-size="12" fill="#2b6e9e">1</text>
  <text x="230" y="185" text-anchor="middle" font-size="12" fill="#2b6e9e">a</text>
  <text x="310" y="185" text-anchor="middle" font-size="12" fill="#2b6e9e">a·b</text>
  <text x="390" y="185" text-anchor="middle" font-size="12" fill="#2b6e9e">a·b·c</text>
  <text x="470" y="185" text-anchor="middle" font-size="12" fill="#2b6e9e">a·b·c·d</text>
  <!-- 正序箭头 -->
  <path d="M 120 220 L 500 220" stroke="#4a8edb" stroke-width="1.6" fill="none" marker-end="url(#arL)" filter="url(#sk)"/>
  <text x="310" y="236" text-anchor="middle" font-size="11" fill="#4a8edb">left[i] = left[i-1] × nums[i-1]</text>

  <!-- right 行 -->
  <text x="40" y="300" font-size="13" font-weight="bold" fill="#7a5415">right</text>
  <text x="40" y="318" font-size="10" fill="#666">(逆序扫)</text>
  <g filter="url(#sk)">
    <g stroke="#c98a2b" fill="#f0d9a8">
      <rect x="110" y="280" width="80" height="40" rx="4"/>
      <rect x="190" y="280" width="80" height="40" rx="4"/>
      <rect x="270" y="280" width="80" height="40" rx="4"/>
      <rect x="350" y="280" width="80" height="40" rx="4"/>
      <rect x="430" y="280" width="80" height="40" rx="4"/>
    </g>
  </g>
  <text x="150" y="305" text-anchor="middle" font-size="12" fill="#7a5415">b·c·d·e</text>
  <text x="230" y="305" text-anchor="middle" font-size="12" fill="#7a5415">c·d·e</text>
  <text x="310" y="305" text-anchor="middle" font-size="12" fill="#7a5415">d·e</text>
  <text x="390" y="305" text-anchor="middle" font-size="12" fill="#7a5415">e</text>
  <text x="470" y="305" text-anchor="middle" font-size="12" fill="#7a5415">1</text>
  <!-- 逆序箭头 -->
  <path d="M 500 340 L 120 340" stroke="#c98a2b" stroke-width="1.6" fill="none" marker-end="url(#arL)" filter="url(#sk)"/>
  <text x="310" y="356" text-anchor="middle" font-size="11" fill="#7a5415">right[i] = right[i+1] × nums[i+1]</text>

  <!-- answer 行 -->
  <text x="40" y="410" font-size="13" font-weight="bold" fill="#2e6e2e">answer</text>
  <g filter="url(#sk)">
    <g stroke="#4a8e4a" fill="#eaf6ee">
      <rect x="110" y="390" width="80" height="40" rx="4"/>
      <rect x="190" y="390" width="80" height="40" rx="4"/>
      <rect x="270" y="390" width="80" height="40" rx="4"/>
      <rect x="350" y="390" width="80" height="40" rx="4"/>
      <rect x="430" y="390" width="80" height="40" rx="4"/>
    </g>
  </g>
  <text x="150" y="415" text-anchor="middle" font-size="11" fill="#2e6e2e">1×(b·c·d·e)</text>
  <text x="230" y="415" text-anchor="middle" font-size="11" fill="#2e6e2e">a×(c·d·e)</text>
  <text x="310" y="415" text-anchor="middle" font-size="11" fill="#2e6e2e">(a·b)×(d·e)</text>
  <text x="390" y="415" text-anchor="middle" font-size="11" fill="#2e6e2e">(a·b·c)×e</text>
  <text x="470" y="415" text-anchor="middle" font-size="11" fill="#2e6e2e">(a·b·c·d)×1</text>

  <!-- 乘号 -->
  <text x="620" y="200" font-size="22" font-weight="bold" fill="#2e6e2e">×</text>
  <text x="640" y="200" font-size="11" fill="#666">answer[i] = left[i] × right[i]</text>
</svg>
