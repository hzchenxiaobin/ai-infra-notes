<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#446688"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
  </defs>

  <rect width="540" height="380" fill="#fafafa"/>

  <text x="270" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">上下界递归：每个节点的值必须落在 (min, max) 开区间</text>
  <text x="270" y="44" text-anchor="middle" font-size="11" fill="#888">左子树区间 (min, root) ，右子树区间 (root, max) ，逐层收紧</text>

  <!-- ===== Tree ===== -->
  <g font-size="12" filter="url(#rough2)">
    <!-- root 10 -->
    <circle cx="270" cy="90" r="20" fill="#e8f0fe" stroke="#446688" stroke-width="2"/>
    <text x="270" y="96" text-anchor="middle" fill="#446688" font-weight="bold">10</text>
    <text x="270" y="70" text-anchor="middle" font-size="9" fill="#888">(−∞, +∞)</text>

    <!-- left child 5 -->
    <circle cx="150" cy="170" r="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.8"/>
    <text x="150" y="176" text-anchor="middle" fill="#4a7a3a" font-weight="bold">5</text>
    <text x="150" y="152" text-anchor="middle" font-size="9" fill="#888">(−∞, 10)</text>

    <!-- right child 15 -->
    <circle cx="390" cy="170" r="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.8"/>
    <text x="390" y="176" text-anchor="middle" fill="#d6a040" font-weight="bold">15</text>
    <text x="390" y="152" text-anchor="middle" font-size="9" fill="#888">(10, +∞)</text>

    <!-- edges -->
    <path d="M 254 102 L 168 156" stroke="#666" stroke-width="1.3" fill="none"/>
    <path d="M 286 102 L 372 156" stroke="#666" stroke-width="1.3" fill="none"/>

    <!-- 5's left child 3 -->
    <circle cx="80" cy="250" r="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/>
    <text x="80" y="256" text-anchor="middle" fill="#4a7a3a" font-weight="bold">3</text>
    <text x="80" y="232" text-anchor="middle" font-size="9" fill="#888">(−∞, 5)</text>

    <!-- 5's right child 8 -->
    <circle cx="200" cy="250" r="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5"/>
    <text x="200" y="256" text-anchor="middle" fill="#4a7a3a" font-weight="bold">8</text>
    <text x="200" y="232" text-anchor="middle" font-size="9" fill="#888">(5, 10)</text>

    <!-- 15's right child 17 -->
    <circle cx="460" cy="250" r="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
    <text x="460" y="256" text-anchor="middle" fill="#d6a040" font-weight="bold">17</text>
    <text x="460" y="232" text-anchor="middle" font-size="9" fill="#888">(15, +∞)</text>

    <path d="M 136 182 L 94 236" stroke="#666" stroke-width="1.2" fill="none"/>
    <path d="M 164 182 L 188 236" stroke="#666" stroke-width="1.2" fill="none"/>
    <path d="M 406 182 L 446 236" stroke="#666" stroke-width="1.2" fill="none"/>
  </g>

  <!-- ===== arrows showing bound propagation ===== -->
  <g filter="url(#rough2)">
    <path d="M 150 116 Q 110 130 96 232" stroke="#4a7a3a" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
    <path d="M 150 116 Q 180 180 196 232" stroke="#4a7a3a" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrG)"/>
    <text x="118" y="300" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">左子树：上界 ← root</text>

    <path d="M 390 116 Q 430 180 456 232" stroke="#d6a040" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
    <text x="430" y="300" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">右子树：下界 ← root</text>
  </g>

  <!-- ===== Rule box ===== -->
  <rect x="30" y="318" width="480" height="50" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="8" filter="url(#rough2)"/>
  <text x="270" y="338" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">规则：node.val ∈ (min, max) 开区间</text>
  <text x="270" y="356" text-anchor="middle" font-size="10" fill="#555">dfs(left, min, node.val) ∩ dfs(right, node.val, max)</text>
</svg>
