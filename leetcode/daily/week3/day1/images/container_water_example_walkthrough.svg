<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="460" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">示例演算：[1,8,6,2,5,4,8,3,7] 夹逼过程</text>
  <text x="280" y="44" text-anchor="middle" font-size="11" fill="#888">步骤 2 达到全局最大面积 49，之后面积递减</text>

  <!-- table header -->
  <g font-size="9" fill="#444" font-weight="bold">
    <rect x="20" y="56" width="24" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="32" y="69" text-anchor="middle">步</text>
    <rect x="44" y="56" width="50" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="69" y="69" text-anchor="middle">left, right</text>
    <rect x="94" y="56" width="60" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="124" y="69" text-anchor="middle">h[l], h[r]</text>
    <rect x="154" y="56" width="36" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="172" y="69" text-anchor="middle">距离</text>
    <rect x="190" y="56" width="50" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="215" y="69" text-anchor="middle">面积</text>
    <rect x="240" y="56" width="60" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="270" y="69" text-anchor="middle">maxArea</text>
    <rect x="300" y="56" width="180" height="18" fill="#f6f6f6" stroke="#ccc" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="390" y="69" text-anchor="middle">移动</text>
  </g>

  <!-- rows -->
  <g font-size="9" fill="#333">
    <!-- step 1 -->
    <rect x="20" y="76" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="90" text-anchor="middle">1</text>
    <rect x="44" y="76" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="90" text-anchor="middle">0, 8</text>
    <rect x="94" y="76" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="90" text-anchor="middle">1, 7</text>
    <rect x="154" y="76" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="90" text-anchor="middle">8</text>
    <rect x="190" y="76" width="50" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="215" y="90" text-anchor="middle" fill="#446688">1×8=8</text>
    <rect x="240" y="76" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="270" y="90" text-anchor="middle" fill="#446688">8</text>
    <rect x="300" y="76" width="180" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="90" text-anchor="middle" fill="#b85450">左矮(1&lt;7) → left++</text>

    <!-- step 2 (key!) -->
    <rect x="20" y="98" width="24" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="32" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">2</text>
    <rect x="44" y="98" width="50" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="69" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">1, 8</text>
    <rect x="94" y="98" width="60" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="124" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">8, 7</text>
    <rect x="154" y="98" width="36" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="172" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">7</text>
    <rect x="190" y="98" width="50" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="215" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">7×7=49</text>
    <rect x="240" y="98" width="60" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="1" filter="url(#rough2)"/>
    <text x="270" y="112" text-anchor="middle" fill="#d6a040" font-weight="bold">49 ★</text>
    <rect x="300" y="98" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="112" text-anchor="middle" fill="#4a7a3a">右矮(7&lt;8) → right--</text>

    <!-- step 3 -->
    <rect x="20" y="120" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="134" text-anchor="middle">3</text>
    <rect x="44" y="120" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="134" text-anchor="middle">1, 7</text>
    <rect x="94" y="120" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="134" text-anchor="middle">8, 3</text>
    <rect x="154" y="120" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="134" text-anchor="middle">6</text>
    <rect x="190" y="120" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="134" text-anchor="middle" fill="#888">3×6=18</text>
    <rect x="240" y="120" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="134" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="120" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="134" text-anchor="middle" fill="#4a7a3a">右矮(3&lt;8) → right--</text>

    <!-- step 4 -->
    <rect x="20" y="142" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="156" text-anchor="middle">4</text>
    <rect x="44" y="142" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="156" text-anchor="middle">1, 6</text>
    <rect x="94" y="142" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="156" text-anchor="middle">8, 8</text>
    <rect x="154" y="142" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="156" text-anchor="middle">5</text>
    <rect x="190" y="142" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="156" text-anchor="middle" fill="#888">8×5=40</text>
    <rect x="240" y="142" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="156" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="142" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="156" text-anchor="middle" fill="#4a7a3a">相等(8=8) → right--</text>

    <!-- step 5 -->
    <rect x="20" y="164" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="178" text-anchor="middle">5</text>
    <rect x="44" y="164" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="178" text-anchor="middle">1, 5</text>
    <rect x="94" y="164" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="178" text-anchor="middle">8, 4</text>
    <rect x="154" y="164" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="178" text-anchor="middle">4</text>
    <rect x="190" y="164" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="178" text-anchor="middle" fill="#888">4×4=16</text>
    <rect x="240" y="164" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="178" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="164" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="178" text-anchor="middle" fill="#4a7a3a">右矮(4&lt;8) → right--</text>

    <!-- step 6 -->
    <rect x="20" y="186" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="200" text-anchor="middle">6</text>
    <rect x="44" y="186" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="200" text-anchor="middle">1, 4</text>
    <rect x="94" y="186" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="200" text-anchor="middle">8, 5</text>
    <rect x="154" y="186" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="200" text-anchor="middle">3</text>
    <rect x="190" y="186" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="200" text-anchor="middle" fill="#888">5×3=15</text>
    <rect x="240" y="186" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="200" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="186" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="200" text-anchor="middle" fill="#4a7a3a">右矮(5&lt;8) → right--</text>

    <!-- step 7 -->
    <rect x="20" y="208" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="222" text-anchor="middle">7</text>
    <rect x="44" y="208" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="222" text-anchor="middle">1, 3</text>
    <rect x="94" y="208" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="222" text-anchor="middle">8, 2</text>
    <rect x="154" y="208" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="222" text-anchor="middle">2</text>
    <rect x="190" y="208" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="222" text-anchor="middle" fill="#888">2×2=4</text>
    <rect x="240" y="208" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="222" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="208" width="180" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="390" y="222" text-anchor="middle" fill="#4a7a3a">右矮(2&lt;8) → right--</text>

    <!-- step 8 -->
    <rect x="20" y="230" width="24" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="32" y="244" text-anchor="middle">8</text>
    <rect x="44" y="230" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="69" y="244" text-anchor="middle">1, 2</text>
    <rect x="94" y="230" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="124" y="244" text-anchor="middle">8, 6</text>
    <rect x="154" y="230" width="36" height="20" fill="#fff" stroke="#eee" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="172" y="244" text-anchor="middle">1</text>
    <rect x="190" y="230" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="215" y="244" text-anchor="middle" fill="#888">6×1=6</text>
    <rect x="240" y="230" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="270" y="244" text-anchor="middle" fill="#888">49</text>
    <rect x="300" y="230" width="180" height="20" fill="#eee" stroke="#ccc" stroke-width="0.4" rx="1" filter="url(#rough2)"/>
    <text x="390" y="244" text-anchor="middle" fill="#888">left≥right，结束</text>
  </g>

  <!-- ===== Final result ===== -->
  <line x1="20" y1="264" x2="540" y2="264" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <rect x="30" y="280" width="500" height="80" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="280" y="302" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">最终结果：maxArea = 49</text>
  <text x="280" y="322" text-anchor="middle" font-size="10" fill="#555">步骤 2（left=1 高 8, right=8 高 7）达到全局最大，面积 = min(8,7)×7 = 49</text>
  <text x="280" y="340" text-anchor="middle" font-size="10" fill="#555">之后 right 一直比 8 矮，距离缩小，面积递减</text>
  <text x="280" y="356" text-anchor="middle" font-size="9" fill="#888">共 8 步，left+right 合计移动 8 次 = O(n)</text>
</svg>
