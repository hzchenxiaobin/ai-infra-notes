<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="780" height="420" fill="#fdfcf7"/>

  <text x="390" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">排序链表：归并分治三步</text>
  <path d="M 250 42 Q 390 50 530 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="56" text-anchor="middle" font-size="11" fill="#888">找中点（快慢双指针）→ 切两半 → 递归排序 → 合并</text>

  <!-- 原链表 -->
  <text x="40" y="92" font-size="12" fill="#888" font-weight="bold">原链表</text>
  <g filter="url(#sk)">
    <rect x="120" y="80" width="60" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="200" y="80" width="60" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="280" y="80" width="60" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="360" y="80" width="60" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="150" y="100" text-anchor="middle" font-size="13" fill="#2b2b2b">4</text>
  <text x="230" y="100" text-anchor="middle" font-size="13" fill="#2b2b2b">2</text>
  <text x="310" y="100" text-anchor="middle" font-size="13" fill="#2b2b2b">1</text>
  <text x="390" y="100" text-anchor="middle" font-size="13" fill="#2b2b2b">3</text>
  <path d="M 180 96 L 198 96" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 260 96 L 278 96" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 340 96 L 358 96" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 快慢指针 -->
  <text x="150" y="130" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">slow↓</text>
  <text x="310" y="130" text-anchor="middle" font-size="10" fill="#4a8e4a" font-weight="bold">fast↓</text>

  <!-- 步骤1 切半 -->
  <path d="M 250 140 L 250 168" stroke="#c98a2b" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="270" y="158" font-size="10" fill="#c98a2b">① 找中点切半</text>

  <!-- 左半 -->
  <text x="40" y="192" font-size="11" fill="#888">左半</text>
  <g filter="url(#sk)">
    <rect x="120" y="180" width="60" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="200" y="180" width="60" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="150" y="200" text-anchor="middle" font-size="13" fill="#2b2b2b">4</text>
  <text x="230" y="200" text-anchor="middle" font-size="13" fill="#2b2b2b">2</text>
  <path d="M 180 196 L 198 196" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 右半 -->
  <text x="320" y="192" font-size="11" fill="#888">右半</text>
  <g filter="url(#sk)">
    <rect x="360" y="180" width="60" height="32" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="440" y="180" width="60" height="32" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="390" y="200" text-anchor="middle" font-size="13" fill="#2b2b2b">1</text>
  <text x="470" y="200" text-anchor="middle" font-size="13" fill="#2b2b2b">3</text>
  <path d="M 420 196 L 438 196" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 步骤2 递归排序 -->
  <path d="M 180 220 L 180 248" stroke="#4a8edb" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 420 220 L 420 248" stroke="#4a8edb" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="220" y="238" font-size="10" fill="#4a8edb">② 递归排序</text>

  <!-- 排序后左 -->
  <g filter="url(#sk)">
    <rect x="120" y="260" width="60" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="200" y="260" width="60" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="150" y="280" text-anchor="middle" font-size="13" fill="#2b2b2b">2</text>
  <text x="230" y="280" text-anchor="middle" font-size="13" fill="#2b2b2b">4</text>
  <path d="M 180 276 L 198 276" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 排序后右 -->
  <g filter="url(#sk)">
    <rect x="360" y="260" width="60" height="32" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="440" y="260" width="60" height="32" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="390" y="280" text-anchor="middle" font-size="13" fill="#2b2b2b">1</text>
  <text x="470" y="280" text-anchor="middle" font-size="13" fill="#2b2b2b">3</text>
  <path d="M 420 276 L 438 276" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 步骤3 合并 -->
  <path d="M 250 300 L 250 328" stroke="#b03a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 390 300 L 390 328" stroke="#b03a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="440" y="318" font-size="10" fill="#b03a3a">③ merge 两有序链表</text>

  <!-- 合并结果 -->
  <text x="40" y="360" font-size="12" fill="#888" font-weight="bold">结果</text>
  <g filter="url(#sk)">
    <rect x="120" y="348" width="50" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
    <rect x="190" y="348" width="50" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
    <rect x="260" y="348" width="50" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
    <rect x="330" y="348" width="50" height="32" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="145" y="368" text-anchor="middle" font-size="13" fill="#2b2b2b">1</text>
  <text x="215" y="368" text-anchor="middle" font-size="13" fill="#2b2b2b">2</text>
  <text x="285" y="368" text-anchor="middle" font-size="13" fill="#2b2b2b">3</text>
  <text x="355" y="368" text-anchor="middle" font-size="13" fill="#2b2b2b">4</text>
  <path d="M 170 364 L 188 364" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 240 364 L 258 364" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 310 364 L 328 364" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 右侧说明 -->
  <g filter="url(#sk)">
    <rect x="540" y="180" width="220" height="200" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5,3"/>
  </g>
  <text x="650" y="206" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">复杂度</text>
  <text x="560" y="232" font-size="11" fill="#4a8edb">时间：O(n log n)</text>
  <text x="560" y="252" font-size="11" fill="#4a8e4a">空间：O(log n) 递归</text>
  <text x="560" y="272" font-size="11" fill="#4a8e4a">　　 O(1) 迭代</text>
  <text x="560" y="300" font-size="11" fill="#c98a2b" font-weight="bold">关键模板：</text>
  <text x="560" y="318" font-size="10" fill="#444">① 快慢指针找中点</text>
  <text x="560" y="336" font-size="10" fill="#444">② 从中点断开</text>
  <text x="560" y="354" font-size="10" fill="#444">③ merge 两有序链表</text>
  <text x="560" y="372" font-size="10" fill="#888">（Week2/Day4 已练）</text>
</svg>
