<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="780" height="420" fill="#fdfcf7"/>

  <text x="390" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">迭代归并：自底向上 subLength 倍增</text>
  <path d="M 240 42 Q 390 50 540 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="56" text-anchor="middle" font-size="11" fill="#888">每轮把相邻长度 subLength 的两段合并为 2·subLength，O(1) 空间</text>

  <!-- 原始 -->
  <text x="40" y="92" font-size="12" fill="#888" font-weight="bold">初始</text>
  <g filter="url(#sk)">
    <rect x="100" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="146" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="192" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="238" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="284" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="330" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="376" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="422" y="80" width="44" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="122" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">4</text>
  <text x="168" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">2</text>
  <text x="214" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">1</text>
  <text x="260" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">3</text>
  <text x="306" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">5</text>
  <text x="352" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">8</text>
  <text x="398" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">7</text>
  <text x="444" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">6</text>

  <!-- sub=1 -->
  <path d="M 261 112 L 261 134" stroke="#c98a2b" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="490" y="98" font-size="11" fill="#c98a2b" font-weight="bold">subLength=1</text>
  <text x="490" y="114" font-size="10" fill="#666">两两合并成长度 2 的有序段</text>

  <text x="40" y="158" font-size="11" fill="#888">sub=1 后</text>
  <g filter="url(#sk)">
    <rect x="100" y="146" width="88" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
    <rect x="190" y="146" width="88" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
    <rect x="280" y="146" width="88" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
    <rect x="370" y="146" width="88" height="28" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="122" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">2</text>
  <text x="168" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">4</text>
  <text x="212" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">1</text>
  <text x="258" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">3</text>
  <text x="302" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">5</text>
  <text x="348" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">8</text>
  <text x="392" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">6</text>
  <text x="438" y="164" text-anchor="middle" font-size="11" fill="#2b2b2b">7</text>

  <!-- sub=2 -->
  <path d="M 261 178 L 261 200" stroke="#4a8e4a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="490" y="158" font-size="11" fill="#4a8e4a" font-weight="bold">subLength=2</text>
  <text x="490" y="174" font-size="10" fill="#666">合并成长度 4 的有序段</text>

  <text x="40" y="224" font-size="11" fill="#888">sub=2 后</text>
  <g filter="url(#sk)">
    <rect x="100" y="212" width="176" height="28" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="278" y="212" width="176" height="28" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="122" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">1</text>
  <text x="168" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">2</text>
  <text x="214" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">3</text>
  <text x="260" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">4</text>
  <text x="300" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">5</text>
  <text x="346" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">6</text>
  <text x="392" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">7</text>
  <text x="438" y="230" text-anchor="middle" font-size="11" fill="#2b2b2b">8</text>

  <!-- sub=4 -->
  <path d="M 261 244 L 261 266" stroke="#4a8edb" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="490" y="218" font-size="11" fill="#4a8edb" font-weight="bold">subLength=4</text>
  <text x="490" y="234" font-size="10" fill="#666">合并成长度 8 的有序段</text>

  <text x="40" y="290" font-size="11" fill="#888">sub=4 后</text>
  <g filter="url(#sk)">
    <rect x="100" y="278" width="354" height="28" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="122" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">1</text>
  <text x="168" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">2</text>
  <text x="214" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">3</text>
  <text x="260" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">4</text>
  <text x="306" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">5</text>
  <text x="352" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">6</text>
  <text x="398" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">7</text>
  <text x="444" y="296" text-anchor="middle" font-size="11" fill="#2b2b2b">8</text>
  <text x="277" y="324" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">✓ 排序完成</text>

  <!-- 底部说明 -->
  <g filter="url(#sk)">
    <rect x="40" y="340" width="700" height="64" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="5,3"/>
  </g>
  <text x="60" y="364" font-size="11" fill="#2b2b2b" font-weight="bold">迭代归并要点：</text>
  <text x="60" y="382" font-size="11" fill="#444">• subLength 从 1 倍增（1→2→4→8...），共 log n 轮，每轮 O(n) → 总 O(n log n)</text>
  <text x="60" y="398" font-size="11" fill="#444">• 只用 prev/cur/tail 指针，无递归栈、无额外数组 → O(1) 空间，满足进阶要求</text>
</svg>
