<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="520" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">零钱兑换：完全背包 DP</text>
  <path d="M 280 40 Q 430 48 580 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- formula -->
  <g filter="url(#sk)">
    <rect x="60" y="58" width="740" height="48" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="430" y="88" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold" font-family="monospace">dp[i] = min(dp[i], dp[i - coin] + 1)  for coin in coins if i ≥ coin</text>

  <!-- ===== Example: coins=[1,2,5], amount=11 ===== -->
  <text x="430" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">示例演算：coins=[1,2,5], amount=11 → 答案 3（5+5+1）</text>

  <!-- dp table header -->
  <g font-size="10">
    <text x="60" y="156" font-weight="bold" fill="#888">金额 i:</text>
    <text x="120" y="156" text-anchor="middle">0</text>
    <text x="170" y="156" text-anchor="middle">1</text>
    <text x="220" y="156" text-anchor="middle">2</text>
    <text x="270" y="156" text-anchor="middle">3</text>
    <text x="320" y="156" text-anchor="middle">4</text>
    <text x="370" y="156" text-anchor="middle">5</text>
    <text x="420" y="156" text-anchor="middle">6</text>
    <text x="470" y="156" text-anchor="middle">7</text>
    <text x="520" y="156" text-anchor="middle">8</text>
    <text x="570" y="156" text-anchor="middle">9</text>
    <text x="620" y="156" text-anchor="middle">10</text>
    <text x="670" y="156" text-anchor="middle">11</text>
  </g>

  <!-- dp values -->
  <g font-size="11">
    <g filter="url(#sk)"><rect x="100" y="166" width="40" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
    <text x="120" y="187" text-anchor="middle" fill="#2e6e2e" font-weight="bold">0</text>

    <g filter="url(#sk)"><rect x="150" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="170" y="187" text-anchor="middle" fill="#2b6e9e">1</text>

    <g filter="url(#sk)"><rect x="200" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="220" y="187" text-anchor="middle" fill="#2b6e9e">1</text>

    <g filter="url(#sk)"><rect x="250" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="270" y="187" text-anchor="middle" fill="#2b6e9e">2</text>

    <g filter="url(#sk)"><rect x="300" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="320" y="187" text-anchor="middle" fill="#2b6e9e">2</text>

    <g filter="url(#sk)"><rect x="350" y="166" width="40" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
    <text x="370" y="187" text-anchor="middle" fill="#7a5415" font-weight="bold">1</text>

    <g filter="url(#sk)"><rect x="400" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="420" y="187" text-anchor="middle" fill="#2b6e9e">2</text>

    <g filter="url(#sk)"><rect x="450" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="470" y="187" text-anchor="middle" fill="#2b6e9e">2</text>

    <g filter="url(#sk)"><rect x="500" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="520" y="187" text-anchor="middle" fill="#2b6e9e">3</text>

    <g filter="url(#sk)"><rect x="550" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="570" y="187" text-anchor="middle" fill="#2b6e9e">3</text>

    <g filter="url(#sk)"><rect x="600" y="166" width="40" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
    <text x="620" y="187" text-anchor="middle" fill="#2b6e9e">2</text>

    <g filter="url(#sk)"><rect x="650" y="166" width="40" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
    <text x="670" y="187" text-anchor="middle" fill="#b03a3a" font-weight="bold">3</text>
  </g>

  <text x="670" y="218" text-anchor="middle" font-size="9" fill="#b03a3a">dp[11]=3 (5+5+1)</text>

  <!-- ===== Transition illustration ===== -->
  <text x="430" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3a7a">dp[11] 的转移：dp[11] = min(dp[10]+1, dp[9]+1, dp[6]+1) = min(3,4,3) = 3</text>

  <g font-size="10">
    <!-- dp[10] + coin 1 -->
    <g filter="url(#sk)"><rect x="100" y="270" width="120" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="160" y="288" text-anchor="middle" fill="#2b6e9e">dp[10]=2</text>
    <text x="160" y="302" text-anchor="middle" fill="#888" font-size="9">+ coin 1</text>
    <path d="M 222 290 L 360 290" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <text x="290" y="282" text-anchor="middle" font-size="9" fill="#888">2+1=3</text>

    <!-- dp[9] + coin 2 -->
    <g filter="url(#sk)"><rect x="100" y="320" width="120" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="160" y="338" text-anchor="middle" fill="#2b6e9e">dp[9]=3</text>
    <text x="160" y="352" text-anchor="middle" fill="#888" font-size="9">+ coin 2</text>
    <path d="M 222 340 L 360 320" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <text x="290" y="328" text-anchor="middle" font-size="9" fill="#888">3+1=4</text>

    <!-- dp[6] + coin 5 -->
    <g filter="url(#sk)"><rect x="100" y="370" width="120" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="160" y="388" text-anchor="middle" fill="#2b6e9e">dp[6]=2</text>
    <text x="160" y="402" text-anchor="middle" fill="#888" font-size="9">+ coin 5</text>
    <path d="M 222 380 L 360 340" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <text x="290" y="368" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">2+1=3 ✓</text>

    <!-- result -->
    <g filter="url(#sk)"><rect x="370" y="310" width="100" height="40" rx="5" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
    <text x="420" y="336" text-anchor="middle" fill="#b03a3a" font-weight="bold">dp[11]=3</text>
  </g>

  <!-- ===== Analogy box ===== -->
  <g filter="url(#sk)">
    <rect x="500" y="270" width="340" height="220" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="5 3"/>
  </g>
  <text x="670" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">DP 复用 ↔ GPU 存储层次</text>
  <g font-size="10" fill="#444">
    <text x="520" y="318"><tspan font-weight="bold" fill="#4a8edb">DP 复用子问题解</tspan></text>
    <text x="530" y="336">dp[i] 查 dp[i-coin]（已算好）</text>
    <text x="530" y="352">→ 不重算，O(1) 转移</text>

    <text x="520" y="378"><tspan font-weight="bold" fill="#4a8e4a">GPU 复用数据</tspan></text>
    <text x="530" y="396">kernel 从 shared mem 读 tile</text>
    <text x="530" y="412">（已从 HBM 加载）→ 不重读</text>

    <text x="520" y="440" fill="#b03a3a" font-weight="bold">共同模式：缓存已计算/已加载</text>
    <text x="530" y="458">的结果，避免重复计算/访存</text>
    <text x="530" y="476" fill="#888">DP 表 = shared mem tile = 缓存</text>
  </g>
</svg>
