<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">系统级瓶颈分类与优化</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">五大瓶颈类型 × 症状 × nsys/ncu 表现 × 优化方案</text>

  <!-- Table header -->
  <g filter="url(#sk)">
    <rect x="20" y="72" width="120" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="140" y="72" width="180" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="320" y="72" width="200" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
    <rect x="520" y="72" width="400" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3"/>
  </g>
  <g font-size="10" fill="#555" font-weight="bold" text-anchor="middle">
    <text x="80" y="91">瓶颈类型</text>
    <text x="230" y="91">症状</text>
    <text x="420" y="91">nsys / ncu 表现</text>
    <text x="720" y="91">优化方案</text>
  </g>

  <!-- Row 1: Python Scheduler -->
  <g filter="url(#sk)">
    <rect x="20" y="100" width="120" height="56" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1" rx="3"/>
    <rect x="140" y="100" width="180" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="320" y="100" width="200" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="520" y="100" width="400" height="56" fill="#fff" stroke="#ddd" rx="2"/>
  </g>
  <g font-size="9" fill="#444">
    <text x="30" y="120" font-weight="bold" fill="#6a3d8a">Python</text>
    <text x="30" y="136" font-weight="bold" fill="#6a3d8a">Scheduler</text>
    <text x="30" y="152" fill="#888">CPU-bound</text>
    <text x="150" y="120">schedule 时间占比高</text>
    <text x="150" y="136">CPU 利用率高</text>
    <text x="150" y="152">GPU 空闲等待</text>
    <text x="330" y="120">nsys: kernel 间隙大</text>
    <text x="330" y="136">CPU 段长，GPU 段短</text>
    <text x="330" y="152">ncu: kernel 本身正常</text>
    <text x="530" y="120">• C++ 重写调度器</text>
    <text x="530" y="136">• 简化调度逻辑</text>
    <text x="530" y="152">• 预计算 batch，减少锁</text>
  </g>

  <!-- Row 2: Memory allocation -->
  <g filter="url(#sk)">
    <rect x="20" y="156" width="120" height="56" fill="#fff8e1" stroke="#c98a2b" stroke-width="1" rx="3"/>
    <rect x="140" y="156" width="180" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="320" y="156" width="200" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="520" y="156" width="400" height="56" fill="#fff" stroke="#ddd" rx="2"/>
  </g>
  <g font-size="9" fill="#444">
    <text x="30" y="176" font-weight="bold" fill="#7a5415">内存分配</text>
    <text x="30" y="192" fill="#888">cudaMalloc</text>
    <text x="30" y="208" fill="#888">频繁</text>
    <text x="150" y="176">显存分配耗时长</text>
    <text x="150" y="192">OOM 风险</text>
    <text x="150" y="208">碎片化</text>
    <text x="330" y="176">nsys: cudaMalloc 调用多</text>
    <text x="330" y="192">每次 10-100μs</text>
    <text x="330" y="208">ncu: 无关</text>
    <text x="530" y="176">• 预分配 buffer / memory pool</text>
    <text x="530" y="192">• PagedAttention block 复用</text>
    <text x="530" y="208">• torch.cuda.caching_allocator</text>
  </g>

  <!-- Row 3: Kernel launch -->
  <g filter="url(#sk)">
    <rect x="20" y="212" width="120" height="56" fill="#e0f7fa" stroke="#00838f" stroke-width="1" rx="3"/>
    <rect x="140" y="212" width="180" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="320" y="212" width="200" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="520" y="212" width="400" height="56" fill="#fff" stroke="#ddd" rx="2"/>
  </g>
  <g font-size="9" fill="#444">
    <text x="30" y="232" font-weight="bold" fill="#005f6b">Kernel Launch</text>
    <text x="30" y="248" fill="#888">Overhead</text>
    <text x="150" y="232">kernel 间隙大</text>
    <text x="150" y="248">小 kernel 太多</text>
    <text x="150" y="264">GPU 利用率低</text>
    <text x="330" y="232">nsys: kernel 间有空白</text>
    <text x="330" y="248">每个间隙 5-10μs</text>
    <text x="330" y="264">ncu: 单个 kernel 正常</text>
    <text x="530" y="232">• CUDA Graph（录制+回放）</text>
    <text x="530" y="248">• 算子融合（减少 launch 数）</text>
    <text x="530" y="264">• torch.compile 自动融合</text>
  </g>

  <!-- Row 4: GIL contention -->
  <g filter="url(#sk)">
    <rect x="20" y="268" width="120" height="56" fill="#fce4ec" stroke="#c04050" stroke-width="1" rx="3"/>
    <rect x="140" y="268" width="180" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="320" y="268" width="200" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="520" y="268" width="400" height="56" fill="#fff" stroke="#ddd" rx="2"/>
  </g>
  <g font-size="9" fill="#444">
    <text x="30" y="288" font-weight="bold" fill="#a03040">Python GIL</text>
    <text x="30" y="304" fill="#888">多线程竞争</text>
    <text x="150" y="288">多线程下 CPU 高</text>
    <text x="150" y="304">但性能不提升</text>
    <text x="150" y="320">submit 卡顿</text>
    <text x="330" y="288">nsys: CPU 段交替</text>
    <text x="330" y="304">无并行 CPU 段</text>
    <text x="330" y="320">ncu: 无关</text>
    <text x="530" y="288">• 减少 Python 层逻辑</text>
    <text x="530" y="304">• C++ 扩展释放 GIL</text>
    <text x="530" y="320">• 多进程替代多线程</text>
  </g>

  <!-- Row 5: CPU-GPU copy -->
  <g filter="url(#sk)">
    <rect x="20" y="324" width="120" height="56" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" rx="3"/>
    <rect x="140" y="324" width="180" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="320" y="324" width="200" height="56" fill="#fff" stroke="#ddd" rx="2"/>
    <rect x="520" y="324" width="400" height="56" fill="#fff" stroke="#ddd" rx="2"/>
  </g>
  <g font-size="9" fill="#444">
    <text x="30" y="344" font-weight="bold" fill="#2b6e9e">CPU-GPU</text>
    <text x="30" y="360" fill="#888">数据传输</text>
    <text x="150" y="344">input/output 传输慢</text>
    <text x="150" y="360">cudaMemcpy 多</text>
    <text x="150" y="376">PCIe 瓶颈</text>
    <text x="330" y="344">nsys: memcpy 段多</text>
    <text x="330" y="360">带宽远低于 HBM</text>
    <text x="330" y="376">ncu: 无关</text>
    <text x="530" y="344">• Pinned memory</text>
    <text x="530" y="360">• Zero-copy（映射 GPU 内存）</text>
    <text x="530" y="376">• 异步 memcpy + stream 重叠</text>
  </g>

  <!-- ===== Bottom: optimization priority ===== -->
  <line x1="20" y1="392" x2="910" y2="392" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="30" y="402" width="880" height="48" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="470" y="422" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">优化优先级（按收益/复杂度性价比）</text>
  <text x="470" y="438" text-anchor="middle" font-size="9" fill="#555">① CUDA Graph（降 launch，中复杂度）→ ② 官方 FlashAttention（降 forward，低复杂度）→ ③ C++ Scheduler（降调度，高复杂度）→ ④ Memory Pool（降分配，中复杂度）</text>
</svg>
