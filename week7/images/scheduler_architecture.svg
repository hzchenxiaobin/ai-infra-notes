<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arO" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c98a2b"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">完整调度器六大功能架构</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Central: schedule() core ===== -->
  <g filter="url(#sk)">
    <rect x="350" y="230" width="240" height="100" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="470" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">schedule()</text>
  <text x="470" y="278" text-anchor="middle" font-size="10" fill="#555">每轮 iteration 调用一次</text>
  <text x="470" y="296" text-anchor="middle" font-size="10" fill="#555">返回本轮执行 batch</text>
  <text x="470" y="316" text-anchor="middle" font-size="9" fill="#888">① restore → ② continue → ③ admit</text>

  <!-- ===== 1. 优先级调度 (top-left) ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="66" width="200" height="86" rx="8" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
  </g>
  <text x="130" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">① 优先级调度</text>
  <text x="42" y="108" font-size="10" fill="#444">• heapq (-priority, time)</text>
  <text x="42" y="124" font-size="10" fill="#444">• 高优先级先获得资源</text>
  <text x="42" y="140" font-size="10" fill="#444">• 高优先级可突破预留块</text>
  <path d="M 230 130 Q 290 160 350 240" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 2. 超时控制 (top-center) ===== -->
  <g filter="url(#sk)">
    <rect x="370" y="66" width="200" height="86" rx="8" fill="#fce4ec" stroke="#c04050" stroke-width="1.5"/>
  </g>
  <text x="470" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#a03040">② 超时控制</text>
  <text x="382" y="108" font-size="10" fill="#444">• 等待超时：waiting 太久</text>
  <text x="382" y="124" font-size="10" fill="#444">• 执行超时：running 太久</text>
  <text x="382" y="140" font-size="10" fill="#444">• 超时 → set_exception</text>
  <path d="M 470 152 L 470 228" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 3. 资源预算 (top-right) ===== -->
  <g filter="url(#sk)">
    <rect x="710" y="66" width="200" height="86" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="810" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">③ 资源预算</text>
  <text x="722" y="108" font-size="10" fill="#444">• token_budget：计算预算</text>
  <text x="722" y="124" font-size="10" fill="#444">• memory_budget：显存块</text>
  <text x="722" y="140" font-size="10" fill="#444">• max_num_seqs：并发上限</text>
  <path d="M 710 130 Q 650 160 590 240" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 4. 抢占 (bottom-left) ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="400" width="200" height="86" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5"/>
  </g>
  <text x="130" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#6a3d8a">④ 抢占</text>
  <text x="42" y="442" font-size="10" fill="#444">• 显存不足时触发</text>
  <text x="42" y="458" font-size="10" fill="#444">• 选最低优先级 victim</text>
  <text x="42" y="474" font-size="10" fill="#444">• recompute 或 swap</text>
  <path d="M 230 430 Q 290 380 350 330" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 5. 公平性 (bottom-center) ===== -->
  <g filter="url(#sk)">
    <rect x="370" y="400" width="200" height="86" rx="8" fill="#e0f7fa" stroke="#00838f" stroke-width="1.5"/>
  </g>
  <text x="470" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#005f6b">⑤ 公平性</text>
  <text x="382" y="442" font-size="10" fill="#444">• aging：等待久自动升优先级</text>
  <text x="382" y="458" font-size="10" fill="#444">• 防止低优先级饥饿</text>
  <text x="382" y="474" font-size="10" fill="#444">• aging_threshold 控制</text>
  <path d="M 470 400 L 470 332" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 6. Continuous Batching (bottom-right) ===== -->
  <g filter="url(#sk)">
    <rect x="710" y="400" width="200" height="86" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="810" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">⑥ Continuous Batching</text>
  <text x="722" y="442" font-size="10" fill="#444">• running 每轮 decode 1 token</text>
  <text x="722" y="458" font-size="10" fill="#444">• 新请求动态加入 batch</text>
  <text x="722" y="474" font-size="10" fill="#444">• 完成的请求释放资源</text>
  <path d="M 710 430 Q 650 380 590 330" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Three queues at bottom ===== -->
  <g filter="url(#sk)">
    <rect x="80" y="516" width="140" height="30" rx="5" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
  </g>
  <text x="150" y="536" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">waiting (heapq)</text>

  <g filter="url(#sk)">
    <rect x="400" y="516" width="140" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="470" y="536" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">running (dict)</text>

  <g filter="url(#sk)">
    <rect x="720" y="516" width="140" height="30" rx="5" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  </g>
  <text x="790" y="536" text-anchor="middle" font-size="10" fill="#6a3d8a" font-weight="bold">swapped (list)</text>
</svg>
