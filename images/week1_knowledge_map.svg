<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="520" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Week 1 知识地图</text>

  <!-- Center -->
  <circle cx="360" cy="160" r="50" fill="#4a8edb" stroke="#6ab0ff" stroke-width="3"/>
  <text x="360" y="155" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">GPU 性能</text>
  <text x="360" y="175" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">= Memory + 并行度</text>

  <!-- Branches -->
  <line x1="320" y1="200" x2="180" y2="280" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="400" y1="200" x2="540" y2="280" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="360" y1="210" x2="360" y2="300" stroke="#6ab0ff" stroke-width="2"/>

  <!-- Day 1-2 -->
  <rect x="60" y="280" width="180" height="180" rx="8" fill="#4a8edb" opacity="0.2" stroke="#6ab0ff" stroke-width="2"/>
  <text x="150" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#6ab0ff">执行模型</text>
  <text x="75" y="340" font-size="12" fill="#2b2b2b">• SM / Warp / SIMT</text>
  <text x="75" y="365" font-size="12" fill="#2b2b2b">• Grid / Block / Thread</text>
  <text x="75" y="390" font-size="12" fill="#2b2b2b">• Occupancy</text>
  <text x="75" y="415" font-size="12" fill="#666666">Day 1-2</text>

  <!-- Day 3 -->
  <rect x="270" y="300" width="180" height="160" rx="8" fill="#4a9d5f" opacity="0.2" stroke="#5cb86c" stroke-width="2"/>
  <text x="360" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#5cb86c">硬件认知</text>
  <text x="285" y="360" font-size="12" fill="#2b2b2b">• deviceQuery</text>
  <text x="285" y="385" font-size="12" fill="#2b2b2b">• GPU 峰值算力</text>
  <text x="285" y="410" font-size="12" fill="#2b2b2b">• 显存带宽</text>
  <text x="285" y="435" font-size="12" fill="#666666">Day 3</text>

  <!-- Day 4-6 -->
  <rect x="480" y="280" width="180" height="180" rx="8" fill="#e8a838" opacity="0.2" stroke="#f0c050" stroke-width="2"/>
  <text x="570" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0c050">内存优化</text>
  <text x="495" y="340" font-size="12" fill="#2b2b2b">• Coalescing</text>
  <text x="495" y="365" font-size="12" fill="#2b2b2b">• Shared Memory Tiling</text>
  <text x="495" y="390" font-size="12" fill="#2b2b2b">• Bank Conflict</text>
  <text x="495" y="415" font-size="12" fill="#2b2b2b">• Nsight Profiling</text>
  <text x="495" y="440" font-size="12" fill="#666666">Day 4-6</text>

  <!-- Bottom note -->
  <text x="360" y="500" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Week 1 核心：建立 GPU 性能直觉</text>
  </g>
</svg>