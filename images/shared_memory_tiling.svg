<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="420" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Shared Memory Tiling 原理</text>

  <!-- Global memory matrix -->
  <rect x="60" y="80" width="240" height="240" fill="none" stroke="#6ab0ff" stroke-width="2"/>
  <text x="180" y="70" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Global Memory（大矩阵）</text>

  <!-- Tiles in global -->
  <rect x="60" y="80" width="80" height="80" fill="#4a8edb" opacity="0.3" stroke="#6ab0ff" stroke-width="2"/>
  <text x="100" y="125" text-anchor="middle" font-size="11" fill="#2b2b2b">Tile 0</text>
  <rect x="140" y="80" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="220" y="80" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="60" y="160" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="140" y="160" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="220" y="160" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="60" y="240" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="140" y="240" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>
  <rect x="220" y="240" width="80" height="80" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="1"/>

  <!-- Shared memory tile -->
  <rect x="420" y="120" width="120" height="120" rx="4" fill="#4a9d5f" opacity="0.3" stroke="#5cb86c" stroke-width="2"/>
  <text x="480" y="115" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Shared Memory（Tile）</text>

  <line x1="320" y1="160" x2="420" y2="180" stroke="#666666" stroke-width="2" marker-end="url(#arrowRight)"/>
  <text x="370" y="160" text-anchor="middle" font-size="12" fill="#666666">加载</text>

  <line x1="480" y1="240" x2="480" y2="300" stroke="#666666" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="520" y="280" text-anchor="start" font-size="12" fill="#666666">在 SM 内快速复用</text>

  <!-- Steps -->
  <rect x="60" y="350" width="600" height="50" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="380" text-anchor="middle" font-size="13" fill="#2b2b2b">1. 将大矩阵分块  →  2. 加载一个 tile 到 Shared Memory  →  3. 在线程间复用数据</text>
  </g>
</svg>