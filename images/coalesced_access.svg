<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="320" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Coalesced Global Memory Access</text>

  <!-- Threads -->
  <text x="80" y="80" text-anchor="middle" font-size="14" fill="#666666">Warp Threads</text>
  <circle cx="80" cy="110" r="14" fill="#6ab0ff"/>
  <text x="80" y="115" text-anchor="middle" font-size="10" fill="#fdfcf7" font-weight="bold">T0</text>
  <circle cx="80" cy="150" r="14" fill="#6ab0ff"/>
  <text x="80" y="155" text-anchor="middle" font-size="10" fill="#fdfcf7" font-weight="bold">T1</text>
  <circle cx="80" cy="190" r="14" fill="#6ab0ff"/>
  <text x="80" y="195" text-anchor="middle" font-size="10" fill="#fdfcf7" font-weight="bold">T2</text>
  <circle cx="80" cy="230" r="14" fill="#6ab0ff"/>
  <text x="80" y="235" text-anchor="middle" font-size="10" fill="#fdfcf7" font-weight="bold">T3</text>

  <!-- Arrows -->
  <line x1="94" y1="110" x2="250" y2="110" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="94" y1="150" x2="250" y2="150" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="94" y1="190" x2="250" y2="190" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="94" y1="230" x2="250" y2="230" stroke="#6ab0ff" stroke-width="2"/>

  <!-- Memory blocks -->
  <rect x="250" y="90" width="60" height="40" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="280" y="115" text-anchor="middle" font-size="12" fill="#2b2b2b">addr+0</text>
  <rect x="310" y="90" width="60" height="40" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-size="12" fill="#2b2b2b">addr+4</text>
  <rect x="370" y="90" width="60" height="40" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-size="12" fill="#2b2b2b">addr+8</text>
  <rect x="430" y="90" width="60" height="40" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="460" y="115" text-anchor="middle" font-size="12" fill="#2b2b2b">addr+12</text>

  <text x="250" y="75" font-size="13" fill="#666666">Global Memory（连续地址）</text>

  <!-- Result -->
  <rect x="560" y="150" width="120" height="50" rx="8" fill="#4a8edb" opacity="0.3" stroke="#6ab0ff" stroke-width="2"/>
  <text x="620" y="172" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">合并为</text>
  <text x="620" y="190" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">1 次事务</text>
  </g>
</svg>