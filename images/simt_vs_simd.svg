<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="360" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">SIMT vs SIMD</text>

  <!-- SIMD -->
  <text x="180" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">SIMD</text>
  <text x="180" y="105" text-anchor="middle" font-size="13" fill="#666666">Single Instruction Multiple Data</text>

  <rect x="80" y="130" width="200" height="140" rx="8" fill="#4a8edb" opacity="0.2" stroke="#6ab0ff" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">一条指令</text>
  <text x="180" y="190" text-anchor="middle" font-size="13" fill="#666666">同时处理多组数据</text>
  <text x="180" y="215" text-anchor="middle" font-size="13" fill="#666666">数据向量宽度固定</text>
  <text x="180" y="240" text-anchor="middle" font-size="13" fill="#666666">如：AVX-512</text>

  <!-- SIMT -->
  <text x="540" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">SIMT</text>
  <text x="540" y="105" text-anchor="middle" font-size="13" fill="#666666">Single Instruction Multiple Threads</text>

  <rect x="440" y="130" width="200" height="140" rx="8" fill="#4a9d5f" opacity="0.2" stroke="#5cb86c" stroke-width="2"/>
  <text x="540" y="165" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">一条指令</text>
  <text x="540" y="190" text-anchor="middle" font-size="13" fill="#666666">多个线程各自执行</text>
  <text x="540" y="215" text-anchor="middle" font-size="13" fill="#666666">每个线程有独立 PC</text>
  <text x="540" y="240" text-anchor="middle" font-size="13" fill="#666666">如：NVIDIA GPU Warp</text>

  <!-- Comparison -->
  <text x="360" y="310" text-anchor="middle" font-size="15" fill="#2b2b2b" font-weight="bold">SIMT 可以模拟 SIMD，但 SIMD 无法模拟 SIMT 的分支行为</text>
  </g>
</svg>