<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="400" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">CUDA C Programming Guide 第 5 章核心要点</text>

  <!-- Central node -->
  <rect x="280" y="90" width="160" height="60" rx="8" fill="#4a8edb" stroke="#6ab0ff" stroke-width="2"/>
  <text x="360" y="125" text-anchor="middle" font-size="15" fill="#2b2b2b" font-weight="bold">Performance Guidelines</text>

  <!-- Branches -->
  <rect x="60" y="200" width="150" height="80" rx="8" fill="#4a9d5f" opacity="0.2" stroke="#5cb86c" stroke-width="2"/>
  <text x="135" y="235" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Memory Coalescing</text>
  <text x="135" y="260" text-anchor="middle" font-size="11" fill="#666666">合并全局内存访问</text>

  <rect x="220" y="200" width="150" height="80" rx="8" fill="#e8a838" opacity="0.2" stroke="#f0c050" stroke-width="2"/>
  <text x="295" y="235" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Shared Memory</text>
  <text x="295" y="260" text-anchor="middle" font-size="11" fill="#666666">Bank conflict / Tiling</text>

  <rect x="380" y="200" width="150" height="80" rx="8" fill="#9b6dd9" opacity="0.2" stroke="#b689e8" stroke-width="2"/>
  <text x="455" y="235" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Occupancy</text>
  <text x="455" y="260" text-anchor="middle" font-size="11" fill="#666666">隐藏延迟能力</text>

  <rect x="540" y="200" width="150" height="80" rx="8" fill="#e57373" opacity="0.2" stroke="#e57373" stroke-width="2"/>
  <text x="615" y="235" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Instruction Throughput</text>
  <text x="615" y="260" text-anchor="middle" font-size="11" fill="#666666">指令吞吐优化</text>

  <!-- Lines -->
  <line x1="320" y1="150" x2="135" y2="200" stroke="#666666" stroke-width="2"/>
  <line x1="360" y1="150" x2="295" y2="200" stroke="#666666" stroke-width="2"/>
  <line x1="400" y1="150" x2="455" y2="200" stroke="#666666" stroke-width="2"/>
  <line x1="440" y1="150" x2="615" y2="200" stroke="#666666" stroke-width="2"/>

  <!-- Bottom note -->
  <text x="360" y="330" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">这一章是 CUDA 性能优化的官方圣经</text>
  <text x="360" y="355" text-anchor="middle" font-size="13" fill="#666666">建议通读一遍，后续 Day 4-6 会反复用到这些概念</text>
  </g>
</svg>