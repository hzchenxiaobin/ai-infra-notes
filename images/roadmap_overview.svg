  <path d="M 320 50 Q 500 58 680 50" stroke="#2b2b2b" stroke-width="1.6" fill="none" filter="url(#sk)"/>
  <text x="500" y="74" text-anchor="middle" font-size="12" fill="#888">5 周已完成 · 35 个教程日 · 27 道 LeetGPU · 34 道 LeetCode · 27 个 CUDA kernel · 467 张手绘 SVG</text>

