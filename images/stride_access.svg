<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="360" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Coalesced vs Stride Access</text>

  <!-- Coalesced -->
  <text x="180" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#5cb86c">✅ Coalesced</text>

  <circle cx="80" cy="120" r="14" fill="#6ab0ff"/>
  <text x="80" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T0</text>
  <circle cx="120" cy="120" r="14" fill="#6ab0ff"/>
  <text x="120" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T1</text>
  <circle cx="160" cy="120" r="14" fill="#6ab0ff"/>
  <text x="160" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T2</text>
  <circle cx="200" cy="120" r="14" fill="#6ab0ff"/>
  <text x="200" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T3</text>

  <line x1="80" y1="134" x2="80" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="120" y1="134" x2="120" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="160" y1="134" x2="160" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="200" y1="134" x2="200" y2="170" stroke="#6ab0ff" stroke-width="2"/>

  <rect x="70" y="170" width="150" height="40" rx="4" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="145" y="195" text-anchor="middle" font-size="12" fill="#fdfcf7" font-weight="bold">1 次内存事务</text>

  <!-- Stride -->
  <text x="540" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#e57373">❌ Stride</text>

  <circle cx="440" cy="120" r="14" fill="#6ab0ff"/>
  <text x="440" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T0</text>
  <circle cx="480" cy="120" r="14" fill="#6ab0ff"/>
  <text x="480" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T1</text>
  <circle cx="520" cy="120" r="14" fill="#6ab0ff"/>
  <text x="520" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T2</text>
  <circle cx="560" cy="120" r="14" fill="#6ab0ff"/>
  <text x="560" y="125" text-anchor="middle" font-size="9" fill="#fdfcf7" font-weight="bold">T3</text>

  <line x1="440" y1="134" x2="440" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="480" y1="134" x2="520" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="520" y1="134" x2="600" y2="170" stroke="#6ab0ff" stroke-width="2"/>
  <line x1="560" y1="134" x2="680" y2="170" stroke="#6ab0ff" stroke-width="2"/>

  <rect x="430" y="170" width="60" height="40" rx="4" fill="#e8a838" stroke="#f0c050" stroke-width="2"/>
  <rect x="500" y="170" width="60" height="40" rx="4" fill="#e8a838" stroke="#f0c050" stroke-width="2"/>
  <rect x="570" y="170" width="60" height="40" rx="4" fill="#e8a838" stroke="#f0c050" stroke-width="2"/>
  <rect x="640" y="170" width="60" height="40" rx="4" fill="#e8a838" stroke="#f0c050" stroke-width="2"/>
  <text x="565" y="235" text-anchor="middle" font-size="12" fill="#e57373" font-weight="bold">4 次内存事务</text>

  <!-- Code examples -->
  <rect x="60" y="270" width="280" height="70" rx="8" fill="#f0ede4" stroke="#3a3a3a"/>
  <text x="70" y="295" font-family="monospace" font-size="12" fill="#2b2b2b">// Coalesced</text>
  <text x="70" y="315" font-family="monospace" font-size="12" fill="#2b2b2b">x[idx]</text>

  <rect x="380" y="270" width="320" height="70" rx="8" fill="#f0ede4" stroke="#3a3a3a"/>
  <text x="390" y="295" font-family="monospace" font-size="12" fill="#2b2b2b">// Stride</text>
  <text x="390" y="315" font-family="monospace" font-size="12" fill="#2b2b2b">x[idx * 32]</text>
  </g>
</svg>