<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="440" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">SM (Streaming Multiprocessor) 架构简图</text>

  <!-- SM box -->
  <rect x="60" y="60" width="600" height="360" rx="12" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#6ab0ff">一个 Streaming Multiprocessor</text>

  <!-- Components -->
  <rect x="90" y="110" width="160" height="80" rx="8" fill="#4a8edb" opacity="0.3" stroke="#6ab0ff" stroke-width="2"/>
  <text x="170" y="145" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">CUDA Cores</text>
  <text x="170" y="168" text-anchor="middle" font-size="12" fill="#666666">整数 / FP32 / FP64</text>

  <rect x="280" y="110" width="160" height="80" rx="8" fill="#4a8edb" opacity="0.3" stroke="#6ab0ff" stroke-width="2"/>
  <text x="360" y="145" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Tensor Cores</text>
  <text x="360" y="168" text-anchor="middle" font-size="12" fill="#666666">矩阵计算加速</text>

  <rect x="470" y="110" width="160" height="80" rx="8" fill="#4a8edb" opacity="0.3" stroke="#6ab0ff" stroke-width="2"/>
  <text x="550" y="145" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Warp Scheduler</text>
  <text x="550" y="168" text-anchor="middle" font-size="12" fill="#666666">调度 32-thread warp</text>

  <rect x="90" y="220" width="220" height="80" rx="8" fill="#4a9d5f" opacity="0.3" stroke="#5cb86c" stroke-width="2"/>
  <text x="200" y="255" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Register File</text>
  <text x="200" y="278" text-anchor="middle" font-size="12" fill="#666666">~256 KB / SM</text>

  <rect x="350" y="220" width="280" height="80" rx="8" fill="#e8a838" opacity="0.3" stroke="#f0c050" stroke-width="2"/>
  <text x="490" y="255" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Shared Memory / L1 Cache</text>
  <text x="490" y="278" text-anchor="middle" font-size="12" fill="#666666">~100-164 KB / SM</text>

  <rect x="90" y="330" width="540" height="60" rx="8" fill="#9b6dd9" opacity="0.3" stroke="#b689e8" stroke-width="2"/>
  <text x="360" y="365" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Load / Store 单元</text>
  </g>
</svg>