<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="560" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Multi-Stream H2D / Compute / D2H 重叠流水线</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Top: sequential (no stream) ===== -->
  <text x="430" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">顺序执行（无 Stream）：总计 = H2D + Compute + D2H</text>

  <text x="80" y="100" font-size="12" fill="#666" font-weight="bold">Default</text>
  <!-- batch 1 -->
  <g filter="url(#sk)">
    <rect x="100" y="84" width="100" height="32" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="150" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)">
    <rect x="200" y="84" width="100" height="32" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="250" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">Compute</text>
  <g filter="url(#sk)">
    <rect x="300" y="84" width="100" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="350" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H</text>
  <!-- batch 2 -->
  <g filter="url(#sk)">
    <rect x="400" y="84" width="100" height="32" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="450" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)">
    <rect x="500" y="84" width="100" height="32" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="550" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">Compute</text>
  <g filter="url(#sk)">
    <rect x="600" y="84" width="100" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="650" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H</text>

  <!-- time arrow -->
  <path d="M 100 132 L 700 132" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="710" y="136" font-size="10" fill="#888">时间</text>

  <!-- divider -->
  <path d="M 60 152 L 800 152" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="6 4" filter="url(#sk)"/>

  <!-- ===== Bottom: multi-stream (parallel) ===== -->
  <text x="430" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8e4a">Multi-Stream 重叠：总计 ≈ max(H2D, Compute) + 流水线填充</text>

  <!-- Stream 1 -->
  <text x="80" y="212" font-size="12" fill="#666" font-weight="bold">Stream 1</text>
  <g filter="url(#sk)"><rect x="100" y="196" width="80" height="30" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="140" y="216" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="180" y="196" width="80" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="220" y="216" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="260" y="196" width="80" height="30" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="300" y="216" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 2 -->
  <text x="80" y="256" font-size="12" fill="#666" font-weight="bold">Stream 2</text>
  <g filter="url(#sk)"><rect x="140" y="240" width="80" height="30" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="180" y="260" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="220" y="240" width="80" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="260" y="260" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="300" y="240" width="80" height="30" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="340" y="260" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 3 -->
  <text x="80" y="300" font-size="12" fill="#666" font-weight="bold">Stream 3</text>
  <g filter="url(#sk)"><rect x="180" y="284" width="80" height="30" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="220" y="304" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="260" y="284" width="80" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="300" y="304" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="340" y="284" width="80" height="30" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="380" y="304" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 4 -->
  <text x="80" y="344" font-size="12" fill="#666" font-weight="bold">Stream 4</text>
  <g filter="url(#sk)"><rect x="220" y="328" width="80" height="30" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="260" y="348" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="300" y="328" width="80" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="340" y="348" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="380" y="328" width="80" height="30" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="420" y="348" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- overlap highlight -->
  <g filter="url(#sk)">
    <rect x="140" y="196" width="200" height="162" fill="none" stroke="#4a8e4a" stroke-width="2" stroke-dasharray="5 3" rx="6"/>
  </g>
  <text x="240" y="376" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">↑ H2D 与 Compute 重叠</text>

  <!-- time arrow -->
  <path d="M 100 396 L 500 396" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="510" y="400" font-size="10" fill="#888">时间</text>

  <!-- ===== Hardware engines ===== -->
  <text x="80" y="436" font-size="13" fill="#2b2b2b" font-weight="bold">硬件引擎独立并行：</text>
  <g filter="url(#sk)"><rect x="260" y="420" width="140" height="28" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="330" y="439" text-anchor="middle" font-size="11" fill="#c98a2b" font-weight="bold">Copy Engine（DMA）</text>
  <g filter="url(#sk)"><rect x="420" y="420" width="160" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="500" y="439" text-anchor="middle" font-size="11" fill="#4a8edb" font-weight="bold">Compute Engine（SM）</text>

  <!-- speedup -->
  <g filter="url(#sk)">
    <rect x="160" y="470" width="520" height="36" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="420" y="493" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">加速比通常 1.2x ~ 1.8x（取决于 Copy Engine 数量）</text>

  <!-- note -->
  <text x="430" y="530" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Copy Engine 和 Compute Engine 物理独立，可真正并行（非时间片模拟）</text>
</svg>
