<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="480" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FlashAttention HBM 访问对比（N=4096, d=64）</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Top: Standard Attention ===== -->
  <text x="430" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#b03a3a">标准 Attention（物化 S/P 到 HBM）</text>
  <g filter="url(#sk)">
    <rect x="40" y="82" width="780" height="150" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <!-- left column -->
  <g font-size="11" fill="#2b2b2b" font-family="monospace">
    <text x="60" y="106">读 Q:  N×d = 262K</text>
    <text x="60" y="126">读 K:  N×d = 262K</text>
    <text x="60" y="146" fill="#b03a3a" font-weight="bold">写 S:  N×N = 16M  ← O(N²) 瓶颈</text>
    <text x="60" y="166" fill="#b03a3a" font-weight="bold">读 S:  N×N = 16M</text>
    <text x="60" y="186" fill="#b03a3a" font-weight="bold">写 P:  N×N = 16M  ← O(N²) 瓶颈</text>
  </g>
  <!-- right column -->
  <g font-size="11" fill="#2b2b2b" font-family="monospace">
    <text x="420" y="106">读 P:  N×N = 16M</text>
    <text x="420" y="126">读 V:  N×d = 262K</text>
    <text x="420" y="146">写 O:  N×d = 262K</text>
  </g>
  <!-- total -->
  <g filter="url(#sk)">
    <rect x="420" y="170" width="360" height="42" rx="6" fill="#b03a3a" opacity="0.2" stroke="#b03a3a" stroke-width="1.3"/>
  </g>
  <text x="600" y="197" text-anchor="middle" font-size="14" fill="#7a2828" font-weight="bold">总计 ≈ 48M elements ≈ 192MB</text>

  <!-- divider -->
  <path d="M 60 250 L 800 250" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="6 4" filter="url(#sk)"/>

  <!-- ===== Bottom: FlashAttention ===== -->
  <text x="430" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a8e4a">FlashAttention（S/P 在 SRAM，不落 HBM）</text>
  <g filter="url(#sk)">
    <rect x="40" y="290" width="780" height="130" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <g font-size="11" fill="#2b2b2b" font-family="monospace">
    <text x="60" y="314" fill="#4a8e4a" font-weight="bold">读 Q:  N×d = 262K  （Q tile 驻留 SRAM）</text>
    <text x="60" y="334">读 K:  N×d = 262K  （K tile 逐块滑入）</text>
    <text x="60" y="354">读 V:  N×d = 262K  （V tile 逐块滑入）</text>
    <text x="60" y="374">写 O:  N×d = 262K</text>
  </g>
  <g font-size="11" fill="#2e6e2e" font-family="monospace">
    <text x="440" y="334" font-weight="bold">S, P 在 SRAM 中计算</text>
    <text x="440" y="354" font-weight="bold">不写入 HBM</text>
  </g>
  <g filter="url(#sk)">
    <rect x="440" y="370" width="340" height="38" rx="6" fill="#4a8e4a" opacity="0.2" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="610" y="394" text-anchor="middle" font-size="14" fill="#2e6e2e" font-weight="bold">总计 ≈ 1M elements ≈ 4MB</text>

  <!-- speedup -->
  <g filter="url(#sk)">
    <rect x="160" y="438" width="520" height="34" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="420" y="460" text-anchor="middle" font-size="14" fill="#2b6e9e" font-weight="bold">HBM 访问减少 ~48x → 长序列加速 2-4x</text>
</svg>
