name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'build.py'
      - 'docs/**'
      - 'aiinfra/week1/**'
      - 'aiinfra/week2/**'
      - 'aiinfra/week3/**'
      - 'aiinfra/week4/**'
      - 'aiinfra/week5/**'
      - 'leetcode/**'
      - 'leetgpu/**'
      - 'public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build combined website
        run: |
          python3 build.py
          echo "--- public directory structure ---"
          ls -la public/
          echo "--- leetcode directory structure ---"
          ls -la public/leetcode/
          echo "--- file count ---"
          find public -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
