<svg xmlns="http://www.w3.org/2000/svg" width="940" height="460" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">请求生命周期：WAITING → RUNNING → FINISHED / SWAPPED</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 请求到达 -->
  <g filter="url(#sk)">
    <rect x="40" y="80" width="120" height="50" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
  </g>
  <text x="100" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">请求到达</text>
  <text x="100" y="126" text-anchor="middle" font-size="10" fill="#666">add_request()</text>
  <path d="M 160 105 L 200 105" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>

  <!-- WAITING -->
  <g filter="url(#sk)">
    <rect x="200" y="80" width="140" height="50" rx="8" fill="#f0d9a8" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="270" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a0a">WAITING</text>
  <text x="270" y="126" text-anchor="middle" font-size="10" fill="#666">等待调度</text>

  <path d="M 340 105 L 380 105" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="360" y="98" text-anchor="middle" font-size="9" fill="#666">schedule()</text>
  <text x="360" y="120" text-anchor="middle" font-size="9" fill="#666">选中</text>

  <!-- RUNNING -->
  <g filter="url(#sk)">
    <rect x="380" y="80" width="140" height="50" rx="8" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">RUNNING</text>
  <text x="450" y="126" text-anchor="middle" font-size="10" fill="#666">执行中，生成 token</text>

  <!-- RUNNING 循环：生成新 token -->
  <path d="M 450 130 Q 450 165 480 165 Q 510 165 510 130" stroke="#4a8e4a" stroke-width="1.4" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="540" y="160" font-size="10" fill="#2e6e2e">生成新 token</text>
  <text x="540" y="174" font-size="10" fill="#2e6e2e">（decode 循环）</text>

  <!-- RUNNING → FINISHED -->
  <path d="M 450 130 L 450 220" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="460" y="180" font-size="10" fill="#666">达到 max_tokens</text>
  <text x="460" y="194" font-size="10" fill="#666">或遇到 EOS</text>

  <g filter="url(#sk)">
    <rect x="380" y="224" width="140" height="50" rx="8" fill="#d9e8f7" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="450" y="254" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">FINISHED</text>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#666">释放 KV cache</text>

  <!-- RUNNING → SWAPPED (preemption) -->
  <path d="M 520 105 L 640 105" stroke="#b85450" stroke-width="1.6" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="580" y="96" text-anchor="middle" font-size="10" fill="#b85450">显存不足</text>
  <text x="580" y="120" text-anchor="middle" font-size="10" fill="#b85450">preempt</text>

  <g filter="url(#sk)">
    <rect x="640" y="80" width="140" height="50" rx="8" fill="#f4b8b0" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="710" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2828">SWAPPED</text>
  <text x="710" y="126" text-anchor="middle" font-size="10" fill="#666">KV 换出到 CPU</text>

  <!-- SWAPPED → RUNNING (显存恢复) -->
  <path d="M 710 130 Q 710 300 520 300 Q 450 300 450 130" stroke="#4a8e4a" stroke-width="1.4" fill="none" stroke-dasharray="5 3" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="600" y="294" text-anchor="middle" font-size="10" fill="#2e6e2e">显存恢复 → swap in 回 RUNNING</text>

  <!-- 抢占的两种策略 -->
  <g filter="url(#sk)">
    <rect x="640" y="180" width="260" height="120" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" stroke-dasharray="4 3"/>
  </g>
  <text x="770" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">抢占的两种策略</text>
  <text x="656" y="226" font-size="11" fill="#444">① Recomputation（默认）：</text>
  <text x="668" y="244" font-size="10" fill="#666">丢弃 KV cache，重新 prefill</text>
  <text x="668" y="260" font-size="10" fill="#666">通常更快（短 prompt 重算便宜）</text>
  <text x="656" y="280" font-size="11" fill="#444">② Swapping：</text>
  <text x="668" y="294" font-size="10" fill="#666">KV 换出到 CPU，之后换回</text>

  <!-- 底部 step 流程 -->
  <g filter="url(#sk)">
    <rect x="40" y="340" width="860" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="364" font-size="13" font-weight="bold" fill="#2b2b2b">LLMEngine.step() 一轮执行流程</text>
  <text x="60" y="388" font-size="12" fill="#444">1. seq_group_metadata, sched_out = scheduler.schedule()   ← Scheduler 决策本轮 batch</text>
  <text x="60" y="408" font-size="12" fill="#444">2. outputs = model_executor.execute_model(seq_group_metadata)   ← Worker 跑前向</text>
  <text x="60" y="428" font-size="12" fill="#444">3. request_outputs = _process_model_outputs(outputs, sched_out)   ← 采样、更新状态、回收 cache</text>
</svg>
