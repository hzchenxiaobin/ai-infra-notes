<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="940" height="500" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Continuous Batching vs Static Batching</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ============ Static Batching ============ -->
  <text x="240" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a2828">Static Batching（传统）</text>
  <text x="240" y="92" text-anchor="middle" font-size="11" fill="#666">凑齐一个 batch 后才开始，最慢的请求拖累所有人</text>

  <!-- 时间轴 -->
  <text x="40" y="120" font-size="11" fill="#666">时间→</text>
  <g filter="url(#sk)">
    <line x1="60" y1="116" x2="440" y2="116" stroke="#bbb" stroke-width="1"/>
  </g>

  <!-- req A: 短 -->
  <g filter="url(#sk)">
    <rect x="60" y="126" width="120" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
  </g>
  <text x="120" y="144" text-anchor="middle" font-size="11" fill="#234">req A (5 tok)</text>
  <!-- req B: 长 -->
  <g filter="url(#sk)">
    <rect x="60" y="158" width="300" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
  </g>
  <text x="210" y="176" text-anchor="middle" font-size="11" fill="#234">req B (12 tok)</text>
  <!-- req C: 中 -->
  <g filter="url(#sk)">
    <rect x="60" y="190" width="200" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
  </g>
  <text x="160" y="208" text-anchor="middle" font-size="11" fill="#5a3a0a">req C (8 tok)</text>

  <!-- 等待区（灰色，浪费） -->
  <g filter="url(#sk)">
    <rect x="180" y="126" width="180" height="28" rx="3" fill="#eee" stroke="#ccc" stroke-dasharray="3 2"/>
    <rect x="260" y="190" width="100" height="28" rx="3" fill="#eee" stroke="#ccc" stroke-dasharray="3 2"/>
  </g>
  <text x="270" y="144" text-anchor="middle" font-size="10" fill="#999">A 空等 B</text>
  <text x="310" y="208" text-anchor="middle" font-size="10" fill="#999">C 空等 B</text>

  <!-- 下一 batch -->
  <g filter="url(#sk)">
    <rect x="60" y="228" width="100" height="24" rx="3" fill="#d9e8f7" stroke="#4a8edb" opacity="0.7"/>
  </g>
  <text x="110" y="244" text-anchor="middle" font-size="10" fill="#666">batch 2...</text>
  <text x="240" y="270" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">GPU 空闲多（A/C 跑完仍占位等 B）</text>

  <!-- ============ Continuous Batching ============ -->
  <text x="720" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">Continuous Batching（vLLM）</text>
  <text x="720" y="92" text-anchor="middle" font-size="11" fill="#666">每轮 iteration 重建 batch，完成即走、新请求随时插入</text>

  <text x="520" y="120" font-size="11" fill="#666">时间→</text>
  <g filter="url(#sk)">
    <line x1="540" y1="116" x2="900" y2="116" stroke="#bbb" stroke-width="1"/>
  </g>

  <!-- iter 1: 只有 A -->
  <g filter="url(#sk)">
    <rect x="540" y="126" width="40" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="540" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="540" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
  </g>
  <text x="560" y="144" text-anchor="middle" font-size="9" fill="#234">A</text>
  <text x="560" y="176" text-anchor="middle" font-size="9" fill="#234">B</text>
  <text x="560" y="208" text-anchor="middle" font-size="9" fill="#234">C</text>
  <text x="560" y="232" text-anchor="middle" font-size="9" fill="#666">i1</text>

  <!-- iter 2-5: A B C 都在 -->
  <g filter="url(#sk)">
    <rect x="580" y="126" width="40" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="580" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="580" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="620" y="126" width="40" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="620" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="620" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="660" y="126" width="40" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="660" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="660" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="700" y="126" width="40" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="700" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="700" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
  </g>
  <!-- A 在 iter 5 完成 (5 tok) -->
  <text x="720" y="144" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">A✔</text>
  <text x="740" y="232" text-anchor="middle" font-size="9" fill="#666">i5</text>

  <!-- iter 6-8: A 走了，新 req D 加入，B C 继续 -->
  <g filter="url(#sk)">
    <rect x="740" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="740" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="740" y="222" width="40" height="28" rx="3" fill="#f4b8b0" stroke="#b85450"/>
    <rect x="780" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="780" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="780" y="222" width="40" height="28" rx="3" fill="#f4b8b0" stroke="#b85450"/>
    <rect x="820" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="820" y="190" width="40" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="820" y="222" width="40" height="28" rx="3" fill="#f4b8b0" stroke="#b85450"/>
  </g>
  <text x="760" y="208" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">C✔</text>
  <text x="740" y="262" text-anchor="middle" font-size="9" fill="#7a2828">D 新加入</text>
  <text x="840" y="262" text-anchor="middle" font-size="9" fill="#666">i8</text>

  <!-- B 继续到 iter 12 -->
  <g filter="url(#sk)">
    <rect x="860" y="158" width="40" height="28" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
  </g>
  <text x="900" y="176" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">B...</text>

  <text x="720" y="288" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">GPU 始终满载：A 完成立刻让位给 D，无空等</text>

  <!-- ============ 对比总结 ============ -->
  <g filter="url(#sk)">
    <rect x="40" y="320" width="860" height="160" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="346" font-size="13" font-weight="bold" fill="#2b2b2b">核心差异</text>
  <text x="60" y="370" font-size="12" fill="#b03a3a">Static：batch 边界固定，一个请求完成 → 它的 slot 空闲到整个 batch 都完成（GPU 浪费）</text>
  <text x="60" y="392" font-size="12" fill="#2e6e2e">Continuous：每轮 iteration 重建 batch，完成的请求立即释放 slot，新请求立即填入（GPU 满载）</text>
  <text x="60" y="418" font-size="12" fill="#444">实现关键：Scheduler 每轮重新调度 running 队列 + 从 waiting 补入 + KV cache 按 block 管理（Day 4 PagedAttention）</text>
  <text x="60" y="442" font-size="12" fill="#444">收益：decode 吞吐提升 2-8×（取决于请求长度方差，方差越大收益越大）</text>
  <text x="60" y="466" font-size="11" fill="#7a5415" font-weight="bold">前提：需要 PagedAttention 的细粒度 block 管理，否则完成请求的 cache 释放会产生碎片（Day 4 详讲）</text>
</svg>
