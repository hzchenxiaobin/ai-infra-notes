<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b85450"/>
    </marker>
  </defs>
  <rect width="940" height="440" fill="#fdfcf7"/>

  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Preemption 两种模式：Recompute vs Swap</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- trigger banner -->
  <g filter="url(#sk)">
    <rect x="280" y="62" width="380" height="38" rx="8" fill="#fff3e0" stroke="#d6a040" stroke-width="1.5"/>
  </g>
  <text x="470" y="86" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">触发：running 序列需要新 block，但显存不足</text>

  <path d="M 470 100 L 240 130" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <path d="M 470 100 L 700 130" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="300" y="120" font-size="10" fill="#2e6e2e">默认</text>
  <text x="620" y="120" font-size="10" fill="#7a2828">显存/CPU 权衡</text>

  <!-- ===== Recompute (left) ===== -->
  <g filter="url(#sk)">
    <rect x="50" y="134" width="380" height="240" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="240" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">RECOMPUTE（默认）</text>

  <text x="70" y="184" font-size="11" fill="#444" font-weight="bold">做法：</text>
  <text x="70" y="202" font-size="11" fill="#444">① 丢弃被抢占请求的 KV Cache</text>
  <text x="70" y="220" font-size="11" fill="#444">② 序列回到 waiting 队首</text>
  <text x="70" y="238" font-size="11" fill="#444">③ 之后重新从 prompt 完整 prefill</text>

  <text x="70" y="266" font-size="11" fill="#2e6e2e" font-weight="bold">优点：</text>
  <text x="70" y="284" font-size="11" fill="#444">• 不需要额外 CPU 内存</text>
  <text x="70" y="302" font-size="11" fill="#444">• 通常比 PCIe 换入更快</text>
  <text x="70" y="320" font-size="11" fill="#444">• 实现简单</text>

  <text x="70" y="346" font-size="11" fill="#b85450" font-weight="bold">缺点：重新计算有额外开销</text>
  <text x="70" y="364" font-size="10" fill="#888">适合：prompt 不长、抢占频繁的场景</text>

  <!-- ===== Swap (right) ===== -->
  <g filter="url(#sk)">
    <rect x="510" y="134" width="380" height="240" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="700" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a2828">SWAP</text>

  <text x="530" y="184" font-size="11" fill="#444" font-weight="bold">做法：</text>
  <text x="530" y="202" font-size="11" fill="#444">① KV Cache block 换出到 CPU 内存</text>
  <text x="530" y="220" font-size="11" fill="#444">② 序列进入 swapped 队列</text>
  <text x="530" y="238" font-size="11" fill="#444">③ 显存恢复时 swap in 换回 GPU</text>

  <text x="530" y="266" font-size="11" fill="#2e6e2e" font-weight="bold">优点：</text>
  <text x="530" y="284" font-size="11" fill="#444">• 不重新计算，保留进度</text>
  <text x="530" y="302" font-size="11" fill="#444">• decode 进度不丢失</text>

  <text x="530" y="328" font-size="11" fill="#b85450" font-weight="bold">缺点：</text>
  <text x="530" y="346" font-size="11" fill="#444">• 需要 CPU 内存</text>
  <text x="530" y="364" font-size="11" fill="#444">• PCIe 传输慢</text>

  <!-- bottom note -->
  <g filter="url(#sk)">
    <rect x="120" y="394" width="700" height="34" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="470" y="416" text-anchor="middle" font-size="11" fill="#444">vLLM 默认 RECOMPUTE：重算开销 &lt; PCIe 换入延迟（尤其被抢占时间不长时）</text>
</svg>
