<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>

  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Dynamic Batcher 工作流程</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">请求入队 → timer 等待 → 凑满或超时 → 聚合 batch → forward → 返回结果</text>

  <!-- Step 1: submit -->
  <g filter="url(#sk)">
    <rect x="40" y="90" width="160" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="120" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">① submit()</text>
  <text x="120" y="132" text-anchor="middle" font-size="10" fill="#444">请求入队</text>
  <text x="120" y="146" text-anchor="middle" font-size="9" fill="#888">thread-safe deque</text>

  <path d="M 200 120 L 240 120" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>

  <!-- Step 2: collect -->
  <g filter="url(#sk)">
    <rect x="240" y="90" width="180" height="60" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="330" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">② _collect_batch()</text>
  <text x="330" y="128" text-anchor="middle" font-size="10" fill="#444">等待凑满或超时</text>
  <text x="330" y="142" text-anchor="middle" font-size="9" fill="#888">max_batch_size / max_wait_time</text>

  <path d="M 420 120 L 460 120" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>

  <!-- Step 3: pad -->
  <g filter="url(#sk)">
    <rect x="460" y="90" width="160" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
  </g>
  <text x="540" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">③ Padding</text>
  <text x="540" y="128" text-anchor="middle" font-size="10" fill="#444">pad 到 max_len</text>
  <text x="540" y="142" text-anchor="middle" font-size="9" fill="#888">+ attention mask</text>

  <path d="M 620 120 L 660 120" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>

  <!-- Step 4: forward -->
  <g filter="url(#sk)">
    <rect x="660" y="90" width="180" height="60" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="750" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">④ _process_batch()</text>
  <text x="750" y="128" text-anchor="middle" font-size="10" fill="#444">模型 forward</text>
  <text x="750" y="142" text-anchor="middle" font-size="9" fill="#888">M=batch_size, GEMM 利用率高</text>

  <path d="M 750 150 L 750 190" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar2)" filter="url(#sk)"/>

  <!-- Step 5: return -->
  <g filter="url(#sk)">
    <rect x="660" y="194" width="180" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="750" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">⑤ 返回结果</text>
  <text x="750" y="232" text-anchor="middle" font-size="10" fill="#444">done_event.set()</text>

  <!-- loop back -->
  <path d="M 660 219 Q 400 219 120 219 L 120 150" stroke="#5a5a5a" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#ar2)" filter="url(#sk)"/>
  <text x="400" y="212" text-anchor="middle" font-size="10" fill="#888">循环：处理完一个 batch 回到 collect</text>

  <!-- ===== Trade-off section ===== -->
  <line x1="20" y1="270" x2="920" y2="270" stroke="#eee" stroke-width="1" filter="url(#sk)"/>

  <text x="470" y="296" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">参数 Trade-off</text>

  <g filter="url(#sk)">
    <rect x="40" y="310" width="400" height="130" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="60" y="334" font-size="12" font-weight="bold" fill="#2e6e2e">max_batch_size 大 + timeout 长</text>
  <text x="60" y="356" font-size="11" fill="#444">✓ batch 更满 → 吞吐高</text>
  <text x="60" y="376" font-size="11" fill="#b85450">✗ 请求等待久 → 延迟高</text>
  <text x="60" y="396" font-size="11" fill="#444">适用：吞吐优先、离线批处理</text>

  <g filter="url(#sk)">
    <rect x="500" y="310" width="400" height="130" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="520" y="334" font-size="12" font-weight="bold" fill="#7a5415">max_batch_size 小 + timeout 短</text>
  <text x="520" y="356" font-size="11" fill="#444">✓ 请求几乎不等 → 延迟低</text>
  <text x="520" y="376" font-size="11" fill="#b85450">✗ batch 不满 → GPU 利用率低</text>
  <text x="520" y="396" font-size="11" fill="#444">适用：延迟优先、交互式服务</text>

  <text x="470" y="448" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">实际系统按 SLA 调参：latency SLO → 短 timeout；throughput SLO → 大 batch</text>
</svg>
