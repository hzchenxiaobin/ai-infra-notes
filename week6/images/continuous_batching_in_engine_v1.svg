<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="35" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="400" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Continuous Batching in Mini Engine v1（实测时间线）</text>
  <path d="M 270 40 Q 460 48 650 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- column headers -->
  <text x="70" y="74" font-size="11" font-weight="bold" fill="#444">iter</text>
  <text x="130" y="74" font-size="11" font-weight="bold" fill="#444">batch</text>
  <text x="200" y="74" font-size="11" font-weight="bold" fill="#444">batch 内容（priority, phase）</text>
  <text x="820" y="74" font-size="11" font-weight="bold" fill="#444">W/R</text>

  <!-- iter rows -->
  <g filter="url(#sk)">
    <rect x="60" y="82" width="780" height="30" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.1"/>
  </g>
  <text x="75" y="102" font-size="11" fill="#444">1</text>
  <text x="135" y="102" font-size="11" fill="#444" font-weight="bold">4</text>
  <text x="200" y="102" font-size="10" fill="#7a5415">R0(p1,prefill), R1(p0,prefill), R2(p0,prefill), R3(p0,prefill)</text>
  <text x="820" y="102" font-size="10" fill="#444">0/4</text>

  <g filter="url(#sk)">
    <rect x="60" y="114" width="780" height="30" rx="4" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="75" y="134" font-size="11" fill="#444">2</text>
  <text x="135" y="134" font-size="11" fill="#444" font-weight="bold">4</text>
  <text x="200" y="134" font-size="10" fill="#2e6e2e">R0(p1,decode), R1(p0,decode), R2(p0,decode), R3(p0,decode)</text>
  <text x="820" y="134" font-size="10" fill="#444">0/4</text>

  <g filter="url(#sk)">
    <rect x="60" y="146" width="780" height="30" rx="4" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="75" y="166" font-size="11" fill="#444">3</text>
  <text x="135" y="166" font-size="11" fill="#444" font-weight="bold">4</text>
  <text x="200" y="166" font-size="10" fill="#2e6e2e">R0(p1,decode), R1(p0,decode), R2(p0,decode), R3(p0,decode)</text>
  <text x="820" y="166" font-size="10" fill="#444">0/4</text>

  <g filter="url(#sk)">
    <rect x="60" y="178" width="780" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
  </g>
  <text x="75" y="198" font-size="11" fill="#444">4</text>
  <text x="135" y="198" font-size="11" fill="#444" font-weight="bold">4</text>
  <text x="200" y="198" font-size="10" fill="#2e6e2e">R0(p1,decode), R1(p0,decode), R2(p0,</text>
  <text x="430" y="198" font-size="10" fill="#b85450" font-weight="bold">done</text>
  <text x="465" y="198" font-size="10" fill="#2e6e2e">), R3(p0,decode)</text>
  <text x="820" y="198" font-size="10" fill="#444">0/4</text>

  <g filter="url(#sk)">
    <rect x="60" y="210" width="780" height="30" rx="4" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="75" y="230" font-size="11" fill="#444">5</text>
  <text x="135" y="230" font-size="11" fill="#444" font-weight="bold">3</text>
  <text x="200" y="230" font-size="10" fill="#2e6e2e">R0(p1,decode), R1(p0,decode), R3(p0,</text>
  <text x="465" y="230" font-size="10" fill="#b85450" font-weight="bold">done</text>
  <text x="500" y="230" font-size="10" fill="#2e6e2e">)</text>
  <text x="820" y="230" font-size="10" fill="#444">0/3</text>

  <g filter="url(#sk)">
    <rect x="60" y="242" width="780" height="30" rx="4" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="75" y="262" font-size="11" fill="#444">6</text>
  <text x="135" y="262" font-size="11" fill="#444" font-weight="bold">2</text>
  <text x="200" y="262" font-size="10" fill="#2e6e2e">R0(p1,decode), R1(p0,</text>
  <text x="365" y="262" font-size="10" fill="#b85450" font-weight="bold">done</text>
  <text x="400" y="262" font-size="10" fill="#2e6e2e">)</text>
  <text x="820" y="262" font-size="10" fill="#444">0/2</text>

  <g filter="url(#sk)">
    <rect x="60" y="274" width="780" height="30" rx="4" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>
  <text x="75" y="294" font-size="11" fill="#444">7</text>
  <text x="135" y="294" font-size="11" fill="#444" font-weight="bold">1</text>
  <text x="200" y="294" font-size="10" fill="#2e6e2e">R0(p1,decode)</text>
  <text x="820" y="294" font-size="10" fill="#444">0/1</text>

  <g filter="url(#sk)">
    <rect x="60" y="306" width="780" height="30" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
  </g>
  <text x="75" y="326" font-size="11" fill="#444">8</text>
  <text x="135" y="326" font-size="11" fill="#444" font-weight="bold">1</text>
  <text x="200" y="326" font-size="10" fill="#b85450" font-weight="bold">R0(p1,done)</text>
  <text x="820" y="326" font-size="10" fill="#444">0/0</text>

  <!-- observations -->
  <g filter="url(#sk)">
    <rect x="60" y="346" width="780" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="80" y="366" font-size="11" fill="#2e6e2e" font-weight="bold">观察：</text>
  <text x="80" y="382" font-size="10" fill="#444">① R2(gen=4) iter4 完成立即退出，不等 R1(gen=6) ② batch size 动态变化 4→4→4→4→3→2→1→1 ③ R0 高优先级但 gen 长，最后完成</text>
</svg>
