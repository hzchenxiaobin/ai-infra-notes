<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#3a7d8c"/>
    </marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c98a2b"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#fdfcf7"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Naive GEMM：每个线程计算 C 的一个元素</text>
  <path d="M 280 42 Q 480 50 680 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Matrix A (M×K) ===== -->
  <text x="180" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a7d8c">A (M×K)</text>
  <g filter="url(#sk)">
    <rect x="80" y="104" width="200" height="200" fill="none" stroke="#2b2b2b" stroke-width="1.8"/>
  </g>
  <!-- grid lines A (5 rows x 6 cols) -->
  <g stroke="#bdbdbd" stroke-width="0.8" filter="url(#sk)">
    <line x1="80" y1="144" x2="280" y2="144"/>
    <line x1="80" y1="184" x2="280" y2="184"/>
    <line x1="80" y1="224" x2="280" y2="224"/>
    <line x1="80" y1="264" x2="280" y2="264"/>
    <line x1="113" y1="104" x2="113" y2="304"/>
    <line x1="146" y1="104" x2="146" y2="304"/>
    <line x1="179" y1="104" x2="179" y2="304"/>
    <line x1="212" y1="104" x2="212" y2="304"/>
    <line x1="245" y1="104" x2="245" y2="304"/>
  </g>
  <!-- highlight row i (row 2) -->
  <g filter="url(#sk)">
    <rect x="80" y="184" width="200" height="40" fill="#3a7d8c" opacity="0.45" stroke="#2b6470" stroke-width="1"/>
  </g>
  <text x="180" y="209" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">row i (A[i][:])</text>

  <!-- ===== Matrix B (K×N) ===== -->
  <text x="480" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98a2b">B (K×N)</text>
  <g filter="url(#sk)">
    <rect x="380" y="104" width="200" height="200" fill="none" stroke="#2b2b2b" stroke-width="1.8"/>
  </g>
  <g stroke="#bdbdbd" stroke-width="0.8" filter="url(#sk)">
    <line x1="380" y1="144" x2="580" y2="144"/>
    <line x1="380" y1="184" x2="580" y2="184"/>
    <line x1="380" y1="224" x2="580" y2="224"/>
    <line x1="380" y1="264" x2="580" y2="264"/>
    <line x1="420" y1="104" x2="420" y2="304"/>
    <line x1="460" y1="104" x2="460" y2="304"/>
    <line x1="500" y1="104" x2="500" y2="304"/>
    <line x1="540" y1="104" x2="540" y2="304"/>
  </g>
  <!-- highlight col j (col 3) -->
  <g filter="url(#sk)">
    <rect x="460" y="104" width="40" height="200" fill="#c98a2b" opacity="0.45" stroke="#a66f1f" stroke-width="1"/>
  </g>
  <text x="480" y="120" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">col j</text>
  <text x="480" y="318" text-anchor="middle" font-size="10" fill="#7a5415" font-style="italic">(B[:][j])</text>

  <!-- ===== Matrix C (M×N) ===== -->
  <text x="780" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8e4a">C (M×N)</text>
  <g filter="url(#sk)">
    <rect x="680" y="104" width="200" height="200" fill="none" stroke="#2b2b2b" stroke-width="1.8"/>
  </g>
  <g stroke="#bdbdbd" stroke-width="0.8" filter="url(#sk)">
    <line x1="680" y1="144" x2="880" y2="144"/>
    <line x1="680" y1="184" x2="880" y2="184"/>
    <line x1="680" y1="224" x2="880" y2="224"/>
    <line x1="680" y1="264" x2="880" y2="264"/>
    <line x1="720" y1="104" x2="720" y2="304"/>
    <line x1="760" y1="104" x2="760" y2="304"/>
    <line x1="800" y1="104" x2="800" y2="304"/>
    <line x1="840" y1="104" x2="840" y2="304"/>
  </g>
  <!-- highlight C[i][j] -->
  <g filter="url(#sk)">
    <rect x="760" y="184" width="40" height="40" fill="#4a8e4a" opacity="0.6" stroke="#2e6e2e" stroke-width="1.4"/>
  </g>
  <text x="780" y="209" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">C[i][j]</text>

  <!-- arrows: A row -> C cell, B col -> C cell -->
  <path d="M 282 204 Q 470 160 758 200" stroke="#3a7d8c" stroke-width="2.2" fill="none" marker-end="url(#arA)" filter="url(#sk)"/>
  <path d="M 482 306 Q 620 250 762 226" stroke="#c98a2b" stroke-width="2.2" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>

  <!-- formula box -->
  <g filter="url(#sk)">
    <rect x="200" y="360" width="560" height="60" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.5"/>
  </g>
  <text x="480" y="384" text-anchor="middle" font-size="14" fill="#2b2b2b">C[i][j] = Σₖ A[i][k] × B[k][j]</text>
  <text x="480" y="406" text-anchor="middle" font-size="11" fill="#555">每个线程：读 A 的一整行 + B 的一整列 → 写 C 的一个元素</text>

  <!-- bottleneck note -->
  <g filter="url(#sk)">
    <rect x="200" y="446" width="560" height="56" rx="10" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="480" y="470" text-anchor="middle" font-size="12" fill="#b03a3a" font-weight="bold">⚠ 瓶颈：A 的同一行 / B 的同一列被多个线程重复读取</text>
  <text x="480" y="490" text-anchor="middle" font-size="10" fill="#7a2828">每个元素从 HBM 读 M+N 次，算术强度低 → memory-bound</text>
</svg>
