<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk4" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="15" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar4" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="420" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">PyTorch profiler vs 昇腾 msprof 对照</text>
  <path d="M 230 40 Q 430 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk4)"/>

  <!-- Left: PyTorch profiler -->
  <g filter="url(#sk4)">
    <rect x="30" y="60" width="380" height="320" rx="14" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="2"/>
    <text x="220" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">PyTorch profiler</text>
    <line x1="50" y1="96" x2="390" y2="96" stroke="#3a3a3a" stroke-width="0.8" stroke-dasharray="4 4"/>
  </g>
  <text x="50" y="118" font-size="11" font-weight="bold" fill="#2b2b2b">采集命令</text>
  <text x="50" y="134" font-size="10" fill="#444" font-family="monospace">torch.profiler.profile(</text>
  <text x="60" y="148" font-size="10" fill="#444" font-family="monospace">activities=[CPU, CUDA])</text>
  <text x="50" y="172" font-size="11" font-weight="bold" fill="#2b2b2b">输出格式</text>
  <text x="50" y="188" font-size="10" fill="#444">Chrome trace JSON</text>
  <text x="50" y="212" font-size="11" font-weight="bold" fill="#2b2b2b">算子级视图</text>
  <text x="50" y="228" font-size="10" fill="#444">key_averages().table()</text>
  <text x="50" y="252" font-size="11" font-weight="bold" fill="#2b2b2b">GPU 利用率</text>
  <text x="50" y="268" font-size="10" fill="#444">需配合 nsys 看 SM 占用</text>
  <text x="50" y="292" font-size="11" font-weight="bold" fill="#2b2b2b">适用场景</text>
  <text x="50" y="308" font-size="10" fill="#444">PyTorch 模型快速 profile</text>
  <text x="50" y="340" font-size="10" fill="#666" font-style="italic">关注点：算子级时间分解</text>
  <text x="50" y="356" font-size="10" fill="#666" font-style="italic">SM 利用率需额外 nsys/ncu</text>

  <!-- Right: msprof -->
  <g filter="url(#sk4)">
    <rect x="450" y="60" width="380" height="320" rx="14" fill="#fce4ec" stroke="#3a3a3a" stroke-width="2"/>
    <text x="640" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">昇腾 msprof</text>
    <line x1="470" y1="96" x2="810" y2="96" stroke="#3a3a3a" stroke-width="0.8" stroke-dasharray="4 4"/>
  </g>
  <text x="470" y="118" font-size="11" font-weight="bold" fill="#2b2b2b">采集命令</text>
  <text x="470" y="134" font-size="10" fill="#444" font-family="monospace">msprof --application=</text>
  <text x="480" y="148" font-size="10" fill="#444" font-family="monospace">"python train.py"</text>
  <text x="480" y="162" font-size="10" fill="#444" font-family="monospace">--output=./prof_data</text>
  <text x="470" y="186" font-size="11" font-weight="bold" fill="#2b2b2b">输出格式</text>
  <text x="470" y="202" font-size="10" fill="#444">.npu 离线文件 + timeline</text>
  <text x="470" y="226" font-size="11" font-weight="bold" fill="#2b2b2b">算子级视图</text>
  <text x="470" y="242" font-size="10" fill="#444">Operator 详情面板</text>
  <text x="470" y="266" font-size="11" font-weight="bold" fill="#2b2b2b">GPU 利用率</text>
  <text x="470" y="282" font-size="10" fill="#444">直接给出 AI Core 利用率</text>
  <text x="470" y="306" font-size="11" font-weight="bold" fill="#2b2b2b">适用场景</text>
  <text x="470" y="322" font-size="10" fill="#444">NPU 模型部署后 profile</text>
  <text x="470" y="354" font-size="10" fill="#666" font-style="italic">关注点：算子时间 + 硬件利用率</text>
  <text x="470" y="370" font-size="10" fill="#666" font-style="italic">两层信息合并到一个工具</text>

  <!-- Bridge arrow -->
  <path d="M 414 200 L 446 200" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="5 3" fill="none" marker-end="url(#ar4)"/>
  <text x="430" y="192" text-anchor="middle" font-size="9" fill="#888">对照</text>
</svg>
