<svg xmlns="http://www.w3.org/2000/svg" width="920" height="580" viewBox="0 0 920 580" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="25" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="580" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">标准 Attention 的 Roofline 与瓶颈判定</text>
  <path d="M 280 42 Q 460 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Left: Roofline plot ===== -->
  <text x="280" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Roofline 图（RTX 5090 FP32）</text>

  <!-- axes -->
  <path d="M 100 420 L 100 100" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="50" y="260" font-size="11" fill="#444" transform="rotate(-90 50 260)">可达算力 (GFLOP/s, log)</text>
  <path d="M 100 420 L 540 420" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="320" y="450" text-anchor="middle" font-size="11" fill="#444">算术强度 AI (FLOP/Byte, log)</text>

  <!-- ridge point marker -->
  <line x1="260" y1="100" x2="260" y2="420" stroke="#c98a2b" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>
  <text x="268" y="120" font-size="10" fill="#c98a2b" font-weight="bold">Ridge Point</text>
  <text x="268" y="134" font-size="9" fill="#c98a2b">AI=12.6</text>

  <!-- memory bandwidth line (slope) -->
  <path d="M 100 420 L 260 160" stroke="#4a8edb" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <text x="150" y="280" font-size="10" fill="#4a8edb" font-weight="bold" transform="rotate(-45 150 280)">内存带宽线</text>

  <!-- compute ceiling (flat) -->
  <path d="M 260 160 L 540 160" stroke="#4a8e4a" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <text x="400" y="152" font-size="10" fill="#4a8e4a" font-weight="bold">算力天花板 19.5 TFLOP/s</text>

  <!-- softmax point (AI≈0.4, memory-bound) -->
  <g filter="url(#sk)">
    <circle cx="140" cy="380" r="8" fill="#b03a3a" stroke="#7a2828" stroke-width="1.5"/>
  </g>
  <text x="152" y="384" font-size="10" fill="#b03a3a" font-weight="bold">softmax</text>
  <text x="152" y="398" font-size="9" fill="#7a2828">AI≈0.4 → memory-bound</text>

  <!-- GEMM QK^T point (AI≈85, compute-bound) -->
  <g filter="url(#sk)">
    <circle cx="440" cy="160" r="8" fill="#4a8e4a" stroke="#2e6e2e" stroke-width="1.5"/>
  </g>
  <text x="452" y="156" font-size="10" fill="#2e6e2e" font-weight="bold">QK^T GEMM</text>
  <text x="452" y="170" font-size="9" fill="#2e6e2e">AI≈85 → compute-bound</text>

  <!-- PV GEMM point -->
  <g filter="url(#sk)">
    <circle cx="480" cy="160" r="8" fill="#4a8e4a" stroke="#2e6e2e" stroke-width="1.5"/>
  </g>
  <text x="492" y="186" font-size="10" fill="#2e6e2e" font-weight="bold">PV GEMM</text>

  <!-- regions -->
  <text x="160" y="200" font-size="10" fill="#888" font-style="italic">memory-bound 区</text>
  <text x="380" y="200" font-size="10" fill="#888" font-style="italic">compute-bound 区</text>

  <!-- ===== Right: softmax AI calculation ===== -->
  <text x="740" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">softmax 部分判定</text>
  <g filter="url(#sk)">
    <rect x="580" y="86" width="320" height="220" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.4"/>
  </g>
  <text x="598" y="110" font-size="12" fill="#2b2b2b" font-weight="bold">softmax 的 Arithmetic Intensity</text>
  <text x="598" y="134" font-size="11" fill="#444" font-family="monospace">FLOPs ≈ 3N²  (exp+add+div)</text>
  <text x="598" y="154" font-size="11" fill="#444" font-family="monospace">Bytes = 2N² × 4B (读S+写P)</text>
  <text x="598" y="180" font-size="13" fill="#b03a3a" font-weight="bold" font-family="monospace">AI = 3 / 8 ≈ 0.375</text>
  <text x="598" y="204" font-size="11" fill="#444">Ridge Point = 12.6</text>
  <text x="598" y="226" font-size="12" fill="#b03a3a" font-weight="bold">AI &lt;&lt; Ridge → 纯 memory-bound</text>
  <text x="598" y="252" font-size="11" fill="#666">优化方向：</text>
  <text x="598" y="270" font-size="11" fill="#2e6e2e">FlashAttention 把 softmax</text>
  <text x="598" y="286" font-size="11" fill="#2e6e2e">从 HBM 搬到 SRAM</text>

  <!-- ===== Bottom: conclusion ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="480" width="840" height="80" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="504" font-size="13" font-weight="bold" fill="#2b2b2b">结论：标准 Attention 是混合瓶颈</text>
  <text x="80" y="526" font-size="12" fill="#444">① QK^T / PV 两个 GEMM：AI≈85 >> 12.6 → <tspan font-weight="bold" fill="#4a8e4a">compute-bound</tspan>（大矩阵乘，算力主导）</text>
  <text x="80" y="546" font-size="12" fill="#444">② softmax：AI≈0.4 &lt;&lt; 12.6 → <tspan font-weight="bold" fill="#b03a3a">memory-bound</tspan>（O(N²) 读写，带宽主导）← FlashAttention 要消除的瓶颈</text>
</svg>
