<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk1" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#fdfcf7"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Prefill vs Decode 执行特征对比</text>
  <path d="M 250 42 Q 440 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk1)"/>

  <!-- Prefill side -->
  <g filter="url(#sk1)">
    <rect x="30" y="64" width="400" height="380" rx="14" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="2"/>
    <text x="230" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b2b2b">Prefill 阶段</text>
    <text x="230" y="112" text-anchor="middle" font-size="12" fill="#666">并行处理整条 prompt</text>
    <line x1="50" y1="124" x2="410" y2="124" stroke="#3a3a3a" stroke-width="0.8" stroke-dasharray="4 4"/>
  </g>
  <text x="50" y="148" font-size="12" font-weight="bold" fill="#2b2b2b">输入形状</text>
  <text x="160" y="148" font-size="11" fill="#444">(B, N_prompt, d), N=1024~8192</text>
  <text x="50" y="174" font-size="12" font-weight="bold" fill="#2b2b2b">Attention 矩阵</text>
  <text x="160" y="174" font-size="11" fill="#444">N × N 完整矩阵</text>
  <text x="50" y="200" font-size="12" font-weight="bold" fill="#2b2b2b">计算量</text>
  <text x="160" y="200" font-size="11" fill="#444">大 (M×N×K 大矩阵乘)</text>
  <text x="50" y="226" font-size="12" font-weight="bold" fill="#2b2b2b">瓶颈类型</text>
  <text x="160" y="226" font-size="11" fill="#4a8edb" font-weight="bold">Compute-bound (GEMM 主导)</text>
  <text x="50" y="252" font-size="12" font-weight="bold" fill="#2b2b2b">GPU 利用率</text>
  <text x="160" y="252" font-size="11" fill="#444">高 (SM 充分利用 60-85%)</text>
  <text x="50" y="278" font-size="12" font-weight="bold" fill="#2b2b2b">典型优化</text>
  <text x="160" y="278" font-size="11" fill="#444">Tensor Core, FlashAttention</text>

  <!-- SM utilization bar - prefill -->
  <g filter="url(#sk1)">
    <rect x="50" y="300" width="360" height="24" rx="4" fill="#f0ede4" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="50" y="300" width="280" height="24" rx="4" fill="#4a9d5f" stroke="#3a3a3a" stroke-width="1"/>
  </g>
  <text x="230" y="346" text-anchor="middle" font-size="10" fill="#666">SM 利用率 ~75%</text>

  <!-- GEMM dominates -->
  <g filter="url(#sk1)">
    <rect x="50" y="370" width="250" height="20" rx="3" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="60" y="384" font-size="9" fill="#fff">GEMM 65%</text>
    <rect x="300" y="370" width="60" height="20" rx="3" fill="#e8a838" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="306" y="384" font-size="9" fill="#fff">LN 15%</text>
    <rect x="360" y="370" width="50" height="20" rx="3" fill="#e57373" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="364" y="384" font-size="9" fill="#fff">SM 13%</text>
  </g>
  <text x="230" y="420" text-anchor="middle" font-size="10" fill="#666" font-style="italic">GEMM 是绝对主导</text>

  <!-- Decode side -->
  <g filter="url(#sk1)">
    <rect x="450" y="64" width="400" height="380" rx="14" fill="#fce4ec" stroke="#3a3a3a" stroke-width="2"/>
    <text x="650" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b2b2b">Decode 阶段</text>
    <text x="650" y="112" text-anchor="middle" font-size="12" fill="#666">逐 token 自回归生成</text>
    <line x1="470" y1="124" x2="830" y2="124" stroke="#3a3a3a" stroke-width="0.8" stroke-dasharray="4 4"/>
  </g>
  <text x="470" y="148" font-size="12" font-weight="bold" fill="#2b2b2b">输入形状</text>
  <text x="580" y="148" font-size="11" fill="#444">(B, 1, d), 每次只处理 1 token</text>
  <text x="470" y="174" font-size="12" font-weight="bold" fill="#2b2b2b">Attention 矩阵</text>
  <text x="580" y="174" font-size="11" fill="#444">1 × N (单 query 对历史 key)</text>
  <text x="470" y="200" font-size="12" font-weight="bold" fill="#2b2b2b">计算量</text>
  <text x="580" y="200" font-size="11" fill="#444">小 (GEMM 退化为向量×矩阵)</text>
  <text x="470" y="226" font-size="12" font-weight="bold" fill="#2b2b2b">瓶颈类型</text>
  <text x="580" y="226" font-size="11" fill="#e57373" font-weight="bold">Memory-bound (KV Cache 读取)</text>
  <text x="470" y="252" font-size="12" font-weight="bold" fill="#2b2b2b">GPU 利用率</text>
  <text x="580" y="252" font-size="11" fill="#444">低 (SM 空闲, 等显存 10-30%)</text>
  <text x="470" y="278" font-size="12" font-weight="bold" fill="#2b2b2b">典型优化</text>
  <text x="580" y="278" font-size="11" fill="#444">KV Cache, PagedAttention, CUDA Graph</text>

  <!-- SM utilization bar - decode -->
  <g filter="url(#sk1)">
    <rect x="470" y="300" width="360" height="24" rx="4" fill="#f0ede4" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="470" y="300" width="90" height="24" rx="4" fill="#e57373" stroke="#3a3a3a" stroke-width="1"/>
  </g>
  <text x="650" y="346" text-anchor="middle" font-size="10" fill="#666">SM 利用率 ~20%</text>

  <!-- Memory dominates -->
  <g filter="url(#sk1)">
    <rect x="470" y="370" width="100" height="20" rx="3" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="476" y="384" font-size="9" fill="#fff">GEMM 25%</text>
    <rect x="570" y="370" width="100" height="20" rx="3" fill="#e8a838" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="576" y="384" font-size="9" fill="#fff">KV Read 40%</text>
    <rect x="670" y="370" width="80" height="20" rx="3" fill="#e57373" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="676" y="384" font-size="9" fill="#fff">SM 20%</text>
    <rect x="750" y="370" width="60" height="20" rx="3" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="756" y="384" font-size="9" fill="#fff">Gap 15%</text>
  </g>
  <text x="650" y="420" text-anchor="middle" font-size="10" fill="#666" font-style="italic">KV Cache 读取 + Launch Gap 主导</text>

  <!-- Arrow between -->
  <path d="M 432 250 L 446 250" stroke="#3a3a3a" stroke-width="1.8" fill="none" marker-end="url(#ar1)"/>
  <text x="439" y="240" text-anchor="middle" font-size="9" fill="#888">生成1个token后</text>
</svg>
