<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="115" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">NCU 瓶颈诊断决策树</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Root: NCU Report -->
  <g filter="url(#sk)"><rect x="340" y="56" width="200" height="40" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/></g>
  <text x="440" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3a7a">NCU Report</text>

  <!-- Branch 1: DRAM check -->
  <path d="M 440 96 L 440 116" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="320" y="116" width="240" height="40" rx="6" fill="#fff" stroke="#888" stroke-width="1.2"/></g>
  <text x="440" y="140" text-anchor="middle" font-size="10" fill="#444">DRAM Throughput?</text>

  <!-- DRAM < 50% (left) -->
  <path d="M 340 136 L 200 156" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="270" y="152" text-anchor="middle" font-size="8" fill="#2e6e2e">&lt; 50%</text>

  <g filter="url(#sk)"><rect x="60" y="156" width="220" height="44" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="170" y="174" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">compute-bound</text>
  <text x="170" y="190" text-anchor="middle" font-size="8" fill="#888">检查 Tensor Core 利用率</text>

  <!-- Tensor check -->
  <path d="M 170 200 L 170 220" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Tensor > 70% -->
  <path d="M 130 232 L 60 252" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="20" y="252" width="120" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="80" y="270" text-anchor="middle" font-size="8" fill="#2e6e2e" font-weight="bold">✅ 理想状态</text>
  <text x="80" y="284" text-anchor="middle" font-size="7" fill="#888">接近最优,试低精度</text>

  <!-- Tensor < 50% -->
  <path d="M 210 232 L 280 252" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="220" y="252" width="130" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="285" y="270" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">⚠️ TC 未利用</text>
  <text x="285" y="284" text-anchor="middle" font-size="7" fill="#888">检查 MMA 效率</text>

  <!-- DRAM > 70% (right) -->
  <path d="M 540 136 L 680 156" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="610" y="152" text-anchor="middle" font-size="8" fill="#b85450">&gt; 70%</text>

  <g filter="url(#sk)"><rect x="600" y="156" width="220" height="44" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="710" y="174" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">memory-bound</text>
  <text x="710" y="190" text-anchor="middle" font-size="8" fill="#888">增大 tile 减少重复加载</text>

  <!-- SM low check -->
  <path d="M 710 200 L 710 220" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="600" y="220" width="220" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="710" y="238" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">SM Throughput &lt; 70%?</text>
  <text x="710" y="252" text-anchor="middle" font-size="7" fill="#888">SM 未填满</text>

  <path d="M 660 260 L 580 280" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="480" y="272" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="545" y="290" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">增大 tile</text>
  <text x="545" y="304" text-anchor="middle" font-size="7" fill="#888">或减小 Stages</text>

  <path d="M 760 260 L 820 280" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="740" y="272" width="120" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="800" y="290" text-anchor="middle" font-size="8" fill="#2e6e2e" font-weight="bold">✅ SM 满</text>
  <text x="800" y="304" text-anchor="middle" font-size="7" fill="#888">已是 compute-bound</text>

  <!-- Bottom: register check -->
  <g filter="url(#sk)"><rect x="320" y="330" width="240" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" stroke-dasharray="4 2"/></g>
  <text x="440" y="348" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">寄存器占用 &gt; 90%?</text>
  <text x="440" y="362" text-anchor="middle" font-size="8" fill="#888">→ 减小 tile 或 Stages 释放寄存器</text>

  <path d="M 440 292 L 440 330" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="460" y="316" font-size="7" fill="#888">额外检查</text>

  <!-- Legend -->
  <g font-size="8" fill="#888">
    <text x="40" y="340" fill="#2e6e2e">✅ = 理想</text>
    <text x="40" y="356" fill="#7a5415">⚠️ = 需优化</text>
    <text x="40" y="372" fill="#b85450">❌ = 瓶颈</text>
  </g>
</svg>
