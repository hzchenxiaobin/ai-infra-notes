<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="33" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
  </defs>
  <rect width="860" height="400" fill="#fdfcf7"/>

  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Column-Major 与 Row-Major 的 offset 映射对比</text>
  <path d="M 260 40 Q 430 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Column-Major grid -->
  <text x="200" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Column-Major (Stride=1,4)</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <!-- Header row -->
    <text x="120" y="90" text-anchor="middle" fill="#888">j=0</text>
    <text x="160" y="90" text-anchor="middle" fill="#888">j=1</text>
    <text x="200" y="90" text-anchor="middle" fill="#888">j=2</text>
    <text x="240" y="90" text-anchor="middle" fill="#888">j=3</text>

    <text x="95" y="112" text-anchor="middle" fill="#888">i=0</text>
    <g filter="url(#sk)"><rect x="105" y="98" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="122" y="114" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="145" y="98" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="162" y="114" text-anchor="middle">4</text>
    <g filter="url(#sk)"><rect x="185" y="98" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="202" y="114" text-anchor="middle">8</text>
    <g filter="url(#sk)"><rect x="225" y="98" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="242" y="114" text-anchor="middle">12</text>

    <text x="95" y="138" text-anchor="middle" fill="#888">i=1</text>
    <g filter="url(#sk)"><rect x="105" y="124" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="122" y="140" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="145" y="124" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="162" y="140" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="185" y="124" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="202" y="140" text-anchor="middle">9</text>
    <g filter="url(#sk)"><rect x="225" y="124" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="242" y="140" text-anchor="middle">13</text>

    <text x="95" y="164" text-anchor="middle" fill="#888">i=2</text>
    <g filter="url(#sk)"><rect x="105" y="150" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="122" y="166" text-anchor="middle">2</text>
    <g filter="url(#sk)"><rect x="145" y="150" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="162" y="166" text-anchor="middle">6</text>
    <g filter="url(#sk)"><rect x="185" y="150" width="35" height="24" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g><text x="202" y="166" text-anchor="middle" font-weight="bold" fill="#7a5415">10</text>
    <g filter="url(#sk)"><rect x="225" y="150" width="35" height="24" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g><text x="242" y="166" text-anchor="middle" font-weight="bold" fill="#b85450">14</text>

    <text x="95" y="190" text-anchor="middle" fill="#888">i=3</text>
    <g filter="url(#sk)"><rect x="105" y="176" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="122" y="192" text-anchor="middle">3</text>
    <g filter="url(#sk)"><rect x="145" y="176" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="162" y="192" text-anchor="middle">7</text>
    <g filter="url(#sk)"><rect x="185" y="176" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="202" y="192" text-anchor="middle">11</text>
    <g filter="url(#sk)"><rect x="225" y="176" width="35" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="242" y="192" text-anchor="middle">15</text>
  </g>
  <text x="200" y="226" text-anchor="middle" font-size="10" fill="#555" font-family="monospace">(2,3) -> 2*1 + 3*4 = 14</text>

  <!-- Divider -->
  <line x1="430" y1="60" x2="430" y2="250" stroke="#eee" stroke-width="1" filter="url(#sk)"/>

  <!-- Row-Major grid -->
  <text x="630" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Row-Major (Stride=4,1)</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <text x="550" y="90" text-anchor="middle" fill="#888">j=0</text>
    <text x="590" y="90" text-anchor="middle" fill="#888">j=1</text>
    <text x="630" y="90" text-anchor="middle" fill="#888">j=2</text>
    <text x="670" y="90" text-anchor="middle" fill="#888">j=3</text>

    <text x="525" y="112" text-anchor="middle" fill="#888">i=0</text>
    <g filter="url(#sk)"><rect x="535" y="98" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="552" y="114" text-anchor="middle">0</text>
    <g filter="url(#sk)"><rect x="575" y="98" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="592" y="114" text-anchor="middle">1</text>
    <g filter="url(#sk)"><rect x="615" y="98" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="632" y="114" text-anchor="middle">2</text>
    <g filter="url(#sk)"><rect x="655" y="98" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="672" y="114" text-anchor="middle">3</text>

    <text x="525" y="138" text-anchor="middle" fill="#888">i=1</text>
    <g filter="url(#sk)"><rect x="535" y="124" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="552" y="140" text-anchor="middle">4</text>
    <g filter="url(#sk)"><rect x="575" y="124" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="592" y="140" text-anchor="middle">5</text>
    <g filter="url(#sk)"><rect x="615" y="124" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="632" y="140" text-anchor="middle">6</text>
    <g filter="url(#sk)"><rect x="655" y="124" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="672" y="140" text-anchor="middle">7</text>

    <text x="525" y="164" text-anchor="middle" fill="#888">i=2</text>
    <g filter="url(#sk)"><rect x="535" y="150" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="552" y="166" text-anchor="middle">8</text>
    <g filter="url(#sk)"><rect x="575" y="150" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="592" y="166" text-anchor="middle">9</text>
    <g filter="url(#sk)"><rect x="615" y="150" width="35" height="24" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g><text x="632" y="166" text-anchor="middle" font-weight="bold" fill="#7a5415">10</text>
    <g filter="url(#sk)"><rect x="655" y="150" width="35" height="24" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g><text x="672" y="166" text-anchor="middle" font-weight="bold" fill="#b85450">11</text>

    <text x="525" y="190" text-anchor="middle" fill="#888">i=3</text>
    <g filter="url(#sk)"><rect x="535" y="176" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="552" y="192" text-anchor="middle">12</text>
    <g filter="url(#sk)"><rect x="575" y="176" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="592" y="192" text-anchor="middle">13</text>
    <g filter="url(#sk)"><rect x="615" y="176" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="632" y="192" text-anchor="middle">14</text>
    <g filter="url(#sk)"><rect x="655" y="176" width="35" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="672" y="192" text-anchor="middle">15</text>
  </g>
  <text x="630" y="226" text-anchor="middle" font-size="10" fill="#555" font-family="monospace">(2,3) -> 2*4 + 3*1 = 11</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="80" y="260" width="700" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="100" y="286" font-size="12" font-weight="bold" fill="#444">关键观察：</text>
  <text x="100" y="308" font-size="11" fill="#2e6e2e">同一数据指针，不同 Layout → 完全不同的逻辑视图</text>
  <text x="100" y="328" font-size="11" fill="#7a5415">(2,2) 在两种布局中 offset 相同（10），但 (2,3) 完全不同（14 vs 11）</text>
  <text x="100" y="348" font-size="11" fill="#b85450">Column-Major 列内连续（stride=1），Row-Major 行内连续（stride=1）</text>
  <text x="100" y="368" font-size="11" fill="#888">CuTe 只需改 Layout 定义，Tensor 访问代码 tensor(i,j) 完全不变</text>
</svg>
