<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="262" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="360" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">torch.compile 工作流程</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- PyTorch eager -->
  <g filter="url(#sk)"><rect x="20" y="60" width="170" height="70" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="105" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">PyTorch eager</text>
  <text x="105" y="100" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">x + bias</text>
  <text x="105" y="114" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">gelu(...)</text>

  <path d="M 190 95 L 220 95" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="205" y="88" text-anchor="middle" font-size="6" fill="#888">@compile</text>

  <!-- TorchDynamo -->
  <g filter="url(#sk)"><rect x="220" y="60" width="170" height="70" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="305" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">TorchDynamo</text>
  <text x="305" y="100" text-anchor="middle" font-size="8" fill="#555">图捕获</text>
  <text x="305" y="114" text-anchor="middle" font-size="7" fill="#888">Python → FX Graph</text>

  <path d="M 390 95 L 420 95" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- TorchInductor -->
  <g filter="url(#sk)"><rect x="420" y="60" width="170" height="70" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="505" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">TorchInductor</text>
  <text x="505" y="100" text-anchor="middle" font-size="8" fill="#555">后端编译</text>
  <text x="505" y="114" text-anchor="middle" font-size="7" fill="#888">FX Graph → Triton</text>

  <path d="M 590 95 L 620 95" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Triton -->
  <g filter="url(#sk)"><rect x="620" y="60" width="170" height="70" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="705" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">Triton</text>
  <text x="705" y="100" text-anchor="middle" font-size="8" fill="#555">kernel 生成</text>
  <text x="705" y="114" text-anchor="middle" font-size="7" fill="#888">@triton.jit → PTX</text>

  <path d="M 705 130 L 705 160" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Output -->
  <g filter="url(#sk)"><rect x="600" y="160" width="210" height="44" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/></g>
  <text x="705" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#5a3a7a">Fused Triton Kernel</text>
  <text x="705" y="196" text-anchor="middle" font-size="8" fill="#888">gelu(x+bias) 单 kernel</text>

  <!-- User code example -->
  <g filter="url(#sk)"><rect x="20" y="160" width="540" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="40" y="182" font-size="10" font-weight="bold" fill="#7a5415">用户代码（无需手写 Triton）：</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <text x="40" y="202">@torch.compile  # ← 自动用 Triton</text>
    <text x="40" y="218">def fused_gelu_bias(x, bias):</text>
    <text x="40" y="234">    return F.gelu(x + bias)</text>
    <text x="40" y="250" fill="#2e6e2e"># Dynamo 自动融合为 1 个 Triton kernel</text>
  </g>

  <!-- Bottom note -->
  <g filter="url(#sk)"><rect x="20" y="280" width="860" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="5 3"/></g>
  <text x="40" y="304" font-size="11" font-weight="bold" fill="#b85450">关键：torch.compile 让普通 PyTorch 用户无需手写 Triton 就能获得 fused kernel 性能</text>
  <text x="40" y="324" font-size="10" fill="#444">但理解 Triton 原理能帮你调试和优化 torch.compile 生成的代码（如查看 TTIR/PTX、调 autotune）</text>
</svg>
