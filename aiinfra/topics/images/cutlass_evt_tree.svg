<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="103" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="700" height="440" fill="#fdfcf7"/>

  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">EVT 树形结构</text>
  <path d="M 220 40 Q 350 48 480 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="350" y="62" text-anchor="middle" font-size="11" fill="#888">D = ReLU(alpha × acc + beta × C + bias)</text>

  <!-- Root: ReLU -->
  <g filter="url(#sk)">
    <rect x="270" y="80" width="160" height="44" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
  </g>
  <text x="350" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">Sm90ReLU</text>
  <text x="350" y="116" text-anchor="middle" font-size="9" fill="#888">max(x, 0)</text>

  <!-- Edge to Add -->
  <path d="M 350 124 L 350 148" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add node -->
  <g filter="url(#sk)">
    <rect x="220" y="148" width="260" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="350" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">Sm90Add</text>
  <text x="350" y="184" text-anchor="middle" font-size="9" fill="#888">left + right</text>

  <!-- Edges to children -->
  <path d="M 290 192 L 200 222" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 410 192 L 500 222" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Left child: LinearCombination -->
  <g filter="url(#sk)">
    <rect x="60" y="222" width="280" height="64" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="200" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Sm90LinearCombination</text>
  <text x="200" y="260" text-anchor="middle" font-size="9" fill="#555" font-family="monospace">alpha * acc + beta * C</text>
  <text x="200" y="276" text-anchor="middle" font-size="8" fill="#888">叶节点：从 MMA 累加器和 C 读取</text>

  <!-- Right child: bias -->
  <g filter="url(#sk)">
    <rect x="420" y="222" width="160" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="500" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">bias</text>
  <text x="500" y="262" text-anchor="middle" font-size="9" fill="#888">Global Memory</text>
  <text x="500" y="276" text-anchor="middle" font-size="8" fill="#888">行向量 [1, N]</text>

  <!-- Leaf annotations -->
  <path d="M 200 286 L 140 316" stroke="#5a5a5a" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 200 286 L 260 316" stroke="#5a5a5a" stroke-width="1" fill="none" stroke-dasharray="3 2" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="80" y="316" width="120" height="36" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="140" y="332" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">acc (MMA 结果)</text>
  <text x="140" y="346" text-anchor="middle" font-size="8" fill="#888">Register</text>

  <g filter="url(#sk)"><rect x="210" y="316" width="100" height="36" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="260" y="332" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">C (源矩阵)</text>
  <text x="260" y="346" text-anchor="middle" font-size="8" fill="#888">Global Memory</text>

  <!-- Bottom: node types -->
  <g filter="url(#sk)">
    <rect x="40" y="370" width="620" height="56" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="390" font-size="10" font-weight="bold" fill="#444">EVT 可用节点类型：</text>
  <text x="60" y="406" font-size="9" fill="#2b6e9e">LinearCombination</text>
  <text x="190" y="406" font-size="9" fill="#7a5415">Add</text>
  <text x="230" y="406" font-size="9" fill="#b85450">ReLU / GELU</text>
  <text x="320" y="406" font-size="9" fill="#2e6e2e">Scale</text>
  <text x="370" y="406" font-size="9" fill="#5a3a7a">AuxStore</text>
  <text x="440" y="406" font-size="9" fill="#888">→ 树形组合任意后处理</text>
  <text x="60" y="420" font-size="9" fill="#888">自底向上求值：叶节点读数据 → 中间节点组合 → 根节点输出最终结果</text>
</svg>
