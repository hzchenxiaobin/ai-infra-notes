<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="263" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
  </defs>
  <rect width="900" height="440" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">三种 GPU 编程方案的完整对比</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Three columns -->
  <!-- CUDA -->
  <g filter="url(#sk)"><rect x="20" y="56" width="280" height="360" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="160" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">手写 CUDA</text>

  <g font-size="9" fill="#444">
    <text x="40" y="104" fill="#2b6e9e" font-weight="bold">语言:</text>
    <text x="100" y="104">C/C++</text>
    <text x="40" y="122" fill="#2b6e9e" font-weight="bold">编译:</text>
    <text x="100" y="122">AOT (nvcc)</text>
    <text x="40" y="140" fill="#2b6e9e" font-weight="bold">抽象:</text>
    <text x="100" y="140">Thread 级</text>
    <text x="40" y="158" fill="#2b6e9e" font-weight="bold">smem:</text>
    <text x="100" y="158">完全手动</text>
    <text x="40" y="176" fill="#2b6e9e" font-weight="bold">TC:</text>
    <text x="100" y="176">手写 PTX</text>
    <text x="40" y="194" fill="#2b6e9e" font-weight="bold">TMA:</text>
    <text x="100" y="194">手动</text>

    <text x="40" y="222" fill="#b85450" font-weight="bold">性能:</text>
    <text x="100" y="222">取决于优化</text>
    <text x="40" y="240" fill="#b85450" font-weight="bold">代码量:</text>
    <text x="100" y="240">200+ 行</text>
    <text x="40" y="258" fill="#b85450" font-weight="bold">开发:</text>
    <text x="100" y="258">数天~数周</text>

    <text x="40" y="288" fill="#7a5415" font-weight="bold">优势:</text>
    <text x="40" y="306">- 完全控制</text>
    <text x="40" y="322">- 非标准操作</text>
    <text x="40" y="346" fill="#888" font-weight="bold">适用:</text>
    <text x="40" y="364">系统工程师</text>
    <text x="40" y="382">自研 kernel</text>
    <text x="40" y="402" fill="#888">代表: 自研算子</text>
  </g>

  <!-- CUTLASS -->
  <g filter="url(#sk)"><rect x="310" y="56" width="280" height="360" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="450" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">CUTLASS</text>

  <g font-size="9" fill="#444">
    <text x="330" y="104" fill="#7a5415" font-weight="bold">语言:</text>
    <text x="390" y="104">C++ 模板</text>
    <text x="330" y="122" fill="#7a5415" font-weight="bold">编译:</text>
    <text x="390" y="122">AOT (nvcc)</text>
    <text x="330" y="140" fill="#7a5415" font-weight="bold">抽象:</text>
    <text x="390" y="140">Block/Warp/Thread</text>
    <text x="330" y="158" fill="#7a5415" font-weight="bold">smem:</text>
    <text x="390" y="158">模板半自动</text>
    <text x="330" y="176" fill="#7a5415" font-weight="bold">TC:</text>
    <text x="390" y="176">自动 (mma/WGMMA)</text>
    <text x="330" y="194" fill="#7a5415" font-weight="bold">TMA:</text>
    <text x="390" y="194">原生支持</text>

    <text x="330" y="222" fill="#2e6e2e" font-weight="bold">性能:</text>
    <text x="390" y="222">90-98% cuBLAS</text>
    <text x="330" y="240" fill="#2e6e2e" font-weight="bold">代码量:</text>
    <text x="390" y="240">50+ 行 C++</text>
    <text x="330" y="258" fill="#2e6e2e" font-weight="bold">开发:</text>
    <text x="390" y="258">数天</text>

    <text x="330" y="288" fill="#7a5415" font-weight="bold">优势:</text>
    <text x="330" y="306">- 极致性能</text>
    <text x="330" y="322">- EVT 任意融合</text>
    <text x="330" y="346" fill="#888" font-weight="bold">适用:</text>
    <text x="330" y="364">库开发者</text>
    <text x="330" y="382">vLLM/TensorRT</text>
    <text x="330" y="402" fill="#888">代表: vLLM GEMM</text>
  </g>

  <!-- Triton -->
  <g filter="url(#sk)"><rect x="600" y="56" width="280" height="360" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="740" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">Triton</text>

  <g font-size="9" fill="#444">
    <text x="620" y="104" fill="#2e6e2e" font-weight="bold">语言:</text>
    <text x="680" y="104">Python DSL</text>
    <text x="620" y="122" fill="#2e6e2e" font-weight="bold">编译:</text>
    <text x="680" y="122">JIT (运行时)</text>
    <text x="620" y="140" fill="#2e6e2e" font-weight="bold">抽象:</text>
    <text x="680" y="140">Block 级</text>
    <text x="620" y="158" fill="#2e6e2e" font-weight="bold">smem:</text>
    <text x="680" y="158">完全自动</text>
    <text x="620" y="176" fill="#2e6e2e" font-weight="bold">TC:</text>
    <text x="680" y="176">自动 (tl.dot)</text>
    <text x="620" y="194" fill="#2e6e2e" font-weight="bold">TMA:</text>
    <text x="680" y="194">暂不支持</text>

    <text x="620" y="222" fill="#2e6e2e" font-weight="bold">性能:</text>
    <text x="680" y="222">85-90% cuBLAS</text>
    <text x="620" y="240" fill="#2e6e2e" font-weight="bold">代码量:</text>
    <text x="680" y="240">30 行 Python</text>
    <text x="620" y="258" fill="#2e6e2e" font-weight="bold">开发:</text>
    <text x="680" y="258">数小时</text>

    <text x="620" y="288" fill="#7a5415" font-weight="bold">优势:</text>
    <text x="620" y="306">- 快速开发</text>
    <text x="620" y="322">- Python 生态</text>
    <text x="620" y="346" fill="#888" font-weight="bold">适用:</text>
    <text x="620" y="364">算法工程师</text>
    <text x="620" y="382">FlashAttention</text>
    <text x="620" y="402" fill="#888">代表: FlashAttn</text>
  </g>
</svg>
