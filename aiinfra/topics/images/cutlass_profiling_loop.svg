<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="111" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="700" height="340" fill="#fdfcf7"/>

  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Profiling 驱动的性能优化循环</text>
  <path d="M 220 40 Q 350 48 480 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 4 phases in a cycle -->
  <!-- Phase 1: Profile -->
  <g filter="url(#sk)"><rect x="200" y="60" width="140" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="270" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">① Profile</text>
  <text x="270" y="98" text-anchor="middle" font-size="9" fill="#888">用 ncu 采集指标</text>

  <!-- Arrow 1 -->
  <path d="M 340 85 L 400 85" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Phase 2: Diagnose -->
  <g filter="url(#sk)"><rect x="400" y="60" width="140" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="470" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">② 诊断</text>
  <text x="470" y="98" text-anchor="middle" font-size="9" fill="#888">定位瓶颈</text>

  <!-- Arrow 2 (down) -->
  <path d="M 470 110 L 470 150" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Phase 3: Optimize -->
  <g filter="url(#sk)"><rect x="400" y="150" width="140" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="470" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">③ 优化</text>
  <text x="470" y="188" text-anchor="middle" font-size="9" fill="#888">调 tile/stages/精度</text>

  <!-- Arrow 3 (left) -->
  <path d="M 400 175 L 340 175" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Phase 4: Verify -->
  <g filter="url(#sk)"><rect x="200" y="150" width="140" height="50" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="270" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">④ 验证</text>
  <text x="270" y="188" text-anchor="middle" font-size="9" fill="#888">再 Profile 确认</text>

  <!-- Arrow 4 (up, back to start) -->
  <path d="M 270 150 L 270 110" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Center label -->
  <text x="335" y="130" text-anchor="middle" font-size="10" fill="#888" font-style="italic">迭代循环</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="230" width="620" height="90" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="254" font-size="12" font-weight="bold" fill="#7a5415">核心方法论：</text>
  <text x="60" y="274" font-size="11" fill="#b85450">❌ 盲调 = 猜测（改参数 → 看结果 → 不知为什么快/慢）</text>
  <text x="60" y="294" font-size="11" fill="#2e6e2e">✅ Profile = 诊断（看指标 → 定位瓶颈 → 针对性优化 → 验证）</text>
  <text x="60" y="312" font-size="10" fill="#888">示例：DRAM 58% → memory-bound → 增大 tile → DRAM 降到 23% → compute-bound ✅</text>
</svg>
