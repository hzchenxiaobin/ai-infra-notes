<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="22" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fdfcf7"/>

  <text x="340" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Layout 的 Shape 与 Stride 映射原理</text>
  <path d="M 180 40 Q 340 48 500 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: Shape (grid) -->
  <text x="160" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Shape (4, 4) — 元素个数</text>
  <g font-size="11" fill="#444">
    <g filter="url(#sk)"><rect x="60" y="84" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="85" y="108" text-anchor="middle">(0,0)</text></g>
    <g filter="url(#sk)"><rect x="110" y="84" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="135" y="108" text-anchor="middle">(0,1)</text></g>
    <g filter="url(#sk)"><rect x="160" y="84" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="185" y="108" text-anchor="middle">(0,2)</text></g>
    <g filter="url(#sk)"><rect x="210" y="84" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="235" y="108" text-anchor="middle">(0,3)</text></g>

    <g filter="url(#sk)"><rect x="60" y="124" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="85" y="148" text-anchor="middle">(1,0)</text></g>
    <g filter="url(#sk)"><rect x="110" y="124" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="135" y="148" text-anchor="middle">(1,1)</text></g>
    <g filter="url(#sk)"><rect x="160" y="124" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="185" y="148" text-anchor="middle">(1,2)</text></g>
    <g filter="url(#sk)"><rect x="210" y="124" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="235" y="148" text-anchor="middle">(1,3)</text></g>

    <g filter="url(#sk)"><rect x="60" y="164" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="85" y="188" text-anchor="middle">(2,0)</text></g>
    <g filter="url(#sk)"><rect x="110" y="164" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="135" y="188" text-anchor="middle">(2,1)</text></g>
    <g filter="url(#sk)"><rect x="160" y="164" width="50" height="40" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/><text x="185" y="188" text-anchor="middle" font-weight="bold" fill="#7a5415">(2,2)</text></g>
    <g filter="url(#sk)"><rect x="210" y="164" width="50" height="40" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/><text x="235" y="188" text-anchor="middle" font-weight="bold" fill="#7a5415">(2,3)</text></g>

    <g filter="url(#sk)"><rect x="60" y="204" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="85" y="228" text-anchor="middle">(3,0)</text></g>
    <g filter="url(#sk)"><rect x="110" y="204" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="135" y="228" text-anchor="middle">(3,1)</text></g>
    <g filter="url(#sk)"><rect x="160" y="204" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="185" y="228" text-anchor="middle">(3,2)</text></g>
    <g filter="url(#sk)"><rect x="210" y="204" width="50" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/><text x="235" y="228" text-anchor="middle">(3,3)</text></g>
  </g>

  <!-- Arrow to offset -->
  <path d="M 270 184 L 330 184" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="300" y="178" text-anchor="middle" font-size="9" fill="#888">Layout 函数</text>

  <!-- Right: Stride formula -->
  <g filter="url(#sk)">
    <rect x="340" y="84" width="310" height="200" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.5"/>
  </g>
  <text x="495" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">Stride 决定映射规则</text>

  <text x="360" y="138" font-size="11" fill="#2b6e9e" font-weight="bold">Column-Major: Stride = (1, 4)</text>
  <text x="360" y="156" font-size="10" fill="#555" font-family="monospace">offset = i*1 + j*4</text>
  <text x="360" y="172" font-size="10" fill="#7a5415" font-family="monospace">(2,2) -> 2+8 = 10</text>
  <text x="360" y="186" font-size="10" fill="#7a5415" font-family="monospace">(2,3) -> 2+12 = 14</text>

  <text x="360" y="214" font-size="11" fill="#2e6e2e" font-weight="bold">Row-Major: Stride = (4, 1)</text>
  <text x="360" y="232" font-size="10" fill="#555" font-family="monospace">offset = i*4 + j*1</text>
  <text x="360" y="248" font-size="10" fill="#7a5415" font-family="monospace">(2,2) -> 8+2 = 10</text>
  <text x="360" y="262" font-size="10" fill="#7a5415" font-family="monospace">(2,3) -> 8+3 = 11</text>

  <text x="360" y="280" font-size="9" fill="#888">同一坐标，不同 Stride → 不同 offset</text>

  <!-- Bottom analogy -->
  <g filter="url(#sk)">
    <rect x="40" y="310" width="600" height="90" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="334" font-size="12" font-weight="bold" fill="#2e6e2e">类比：</text>
  <text x="60" y="354" font-size="11" fill="#444">Shape = 盒子的尺寸（每维几个格子）</text>
  <text x="60" y="372" font-size="11" fill="#444">Stride = 盒子间的间距（沿该维走一步跳几个位置）</text>
  <text x="60" y="390" font-size="11" fill="#444">Layout = 地图（坐标 → 物理位置的映射函数）</text>
</svg>
