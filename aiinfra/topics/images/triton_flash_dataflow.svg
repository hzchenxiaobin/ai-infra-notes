<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="244" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">FlashAttention 完整数据流</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Global Memory (Q/K/V input) -->
  <g filter="url(#sk)"><rect x="20" y="60" width="130" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="85" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b6e9e">Global Memory</text>
  <text x="85" y="98" text-anchor="middle" font-size="8" fill="#555">Q, K, V (N×d each)</text>

  <!-- Step 1: load Q -->
  <path d="M 150 85 L 190 85" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="170" y="78" text-anchor="middle" font-size="7" fill="#2e6e2e" font-weight="bold">① load Q</text>

  <!-- Register (Q) -->
  <g filter="url(#sk)"><rect x="190" y="62" width="80" height="46" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="230" y="82" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">Register</text>
  <text x="230" y="96" text-anchor="middle" font-size="7" fill="#888">Q (Br×d)</text>

  <!-- Inner loop box -->
  <g filter="url(#sk)"><rect x="190" y="120" width="520" height="200" rx="10" fill="#fffdf3" stroke="#c98a2b" stroke-width="2" stroke-dasharray="6 3"/></g>
  <text x="450" y="140" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">内循环：遍历 K/V blocks</text>

  <!-- Step 2: load K/V -->
  <path d="M 85 110 Q 85 155 200 155" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="140" y="150" text-anchor="middle" font-size="7" fill="#2e6e2e" font-weight="bold">② load K,V</text>

  <g filter="url(#sk)"><rect x="210" y="148" width="120" height="36" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="270" y="170" text-anchor="middle" font-size="8" fill="#2e6e2e" font-family="monospace">K, V (Bc×d) Register</text>

  <!-- Step 3: S = Q × K^T -->
  <path d="M 330 166 L 360 166" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="360" y="148" width="100" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="410" y="166" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">③ S=Q×K^T</text>
  <text x="410" y="178" text-anchor="middle" font-size="6" fill="#888">tl.dot (Tensor Core)</text>

  <!-- Step 4: online softmax -->
  <path d="M 460 166 L 490 166" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="490" y="148" width="100" height="36" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="540" y="166" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">④ online softmax</text>
  <text x="540" y="178" text-anchor="middle" font-size="6" fill="#888">max/exp/sum/rescale</text>

  <!-- Step 5: acc += P × V -->
  <path d="M 590 166 L 620 166" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="620" y="148" width="80" height="36" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="660" y="166" text-anchor="middle" font-size="8" fill="#5a3a7a" font-weight="bold">⑤ acc+=P×V</text>
  <text x="660" y="178" text-anchor="middle" font-size="6" fill="#888">tl.dot</text>

  <!-- Loop back arrow -->
  <path d="M 660 184 Q 660 210 450 210 Q 210 210 210 184" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="430" y="226" text-anchor="middle" font-size="8" fill="#888">⑥ 下一个 K/V block（循环）</text>

  <!-- Register bar -->
  <g filter="url(#sk)"><rect x="210" y="240" width="490" height="24" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" stroke-dasharray="4 2"/></g>
  <text x="455" y="256" text-anchor="middle" font-size="8" fill="#2e6e2e" font-weight="bold">↑ 步骤 ③④⑤ 全在 Register 中（S, P, acc 不落盘 Global）</text>

  <!-- Step 7: write O -->
  <path d="M 450 120 Q 450 280 760 85" stroke="#b85450" stroke-width="1.4" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="650" y="282" text-anchor="middle" font-size="7" fill="#b85450" font-weight="bold">⑦ store O</text>

  <!-- Global Memory (O output) -->
  <g filter="url(#sk)"><rect x="750" y="60" width="130" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="815" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b6e9e">Global Memory</text>
  <text x="815" y="98" text-anchor="middle" font-size="8" fill="#555">O (N×d)</text>

  <!-- IO comparison -->
  <g filter="url(#sk)"><rect x="20" y="336" width="860" height="52" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="5 3"/></g>
  <g font-size="10" fill="#444">
    <text x="40" y="358" fill="#b85450" font-weight="bold">标准 Attention:</text>
    <text x="160" y="358">~4×N² Global 读写（S, P 各 N×N，读+写）</text>
    <text x="500" y="358" fill="#2e6e2e" font-weight="bold">FlashAttention:</text>
    <text x="620" y="358">~2×N×d Global 读写（只读 Q/K/V，写 O）</text>
    <text x="40" y="378" fill="#7a5415" font-weight="bold">★ S, P 全程在 Register 中 → N=4096 时从 256MB 降到 4MB IO</text>
  </g>
</svg>
