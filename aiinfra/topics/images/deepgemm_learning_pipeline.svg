<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 720" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="560" height="720" fill="#fdfcf7"/>

  <text x="280" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">DeepGEMM 一周学习路径</text>
  <path d="M 160 42 Q 280 50 400 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Day 1 -->
  <g filter="url(#sk)">
    <rect x="40" y="68" width="480" height="64" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="60" y="96" font-size="15" font-weight="bold" fill="#2b6e9e">Day 1</text>
  <text x="140" y="92" font-size="13" font-weight="bold" fill="#2b2b2b">总览 + JIT 环境 + 源码地图</text>
  <text x="140" y="112" font-size="10" fill="#666">设计哲学 / 运行时 JIT / 目录结构</text>
  <path d="M 280 132 L 280 150" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 2 -->
  <g filter="url(#sk)">
    <rect x="40" y="154" width="480" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="60" y="182" font-size="15" font-weight="bold" fill="#2e6e2e">Day 2</text>
  <text x="140" y="178" font-size="13" font-weight="bold" fill="#2b2b2b">FP8/FP4 + Per-128-Channel Scaling</text>
  <text x="140" y="198" font-size="10" fill="#666">e4m3/e5m2/FP4 / UE8M0 / KernelType</text>
  <path d="M 280 218 L 280 236" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 3 -->
  <g filter="url(#sk)">
    <rect x="40" y="240" width="480" height="64" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="60" y="268" font-size="15" font-weight="bold" fill="#7a5415">Day 3</text>
  <text x="140" y="264" font-size="13" font-weight="bold" fill="#2b2b2b">SM90 FP8 GEMM 源码精读（上）</text>
  <text x="140" y="284" font-size="10" fill="#666">TMA descriptor / WGMMA / mbarrier</text>
  <path d="M 280 304 L 280 322" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 4 -->
  <g filter="url(#sk)">
    <rect x="40" y="326" width="480" height="64" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
  </g>
  <text x="60" y="354" font-size="15" font-weight="bold" fill="#b85450">Day 4</text>
  <text x="140" y="350" font-size="13" font-weight="bold" fill="#2b2b2b">Warp Spec + 寄存器重配 + 持久化</text>
  <text x="140" y="370" font-size="10" fill="#666">reg_dealloc/alloc / Stream-K / multicast</text>
  <path d="M 280 390 L 280 408" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 5 -->
  <g filter="url(#sk)">
    <rect x="40" y="412" width="480" height="64" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/>
  </g>
  <text x="60" y="440" font-size="15" font-weight="bold" fill="#5a3a7a">Day 5</text>
  <text x="140" y="436" font-size="13" font-weight="bold" fill="#2b2b2b">Grouped GEMM for MoE</text>
  <text x="140" y="456" font-size="10" fill="#666">contiguous / masked / k-grouped / psum</text>
  <path d="M 280 476 L 280 494" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 6 -->
  <g filter="url(#sk)">
    <rect x="40" y="498" width="480" height="64" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="60" y="526" font-size="15" font-weight="bold" fill="#2b6e9e">Day 6</text>
  <text x="140" y="522" font-size="13" font-weight="bold" fill="#2b2b2b">Mega MoE + SM100/Blackwell</text>
  <text x="140" y="542" font-size="10" fill="#666">单 kernel 融合 / TCgen05 / FP4</text>
  <path d="M 280 562 L 280 580" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 7 -->
  <g filter="url(#sk)">
    <rect x="40" y="584" width="480" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="60" y="612" font-size="15" font-weight="bold" fill="#2e6e2e">Day 7</text>
  <text x="140" y="608" font-size="13" font-weight="bold" fill="#2b2b2b">Profiling 调优 + 面试复盘</text>
  <text x="140" y="628" font-size="10" fill="#666">ncu/nsys / 三版本对比 / 12 道面试题</text>

  <!-- Bottom milestone -->
  <g filter="url(#sk)">
    <rect x="40" y="664" width="480" height="40" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="280" y="690" text-anchor="middle" font-size="11" fill="#666">周日里程碑：FP8 GEMM + Grouped + Mega MoE 达 H800 峰值 85%+</text>
</svg>
