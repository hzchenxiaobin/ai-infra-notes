<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="221" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="800" height="360" fill="#fdfcf7"/>

  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Softmax 数学公式与数值稳定性</text>
  <path d="M 240 40 Q 400 48 560 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Naive formula -->
  <g filter="url(#sk)"><rect x="30" y="60" width="340" height="140" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="200" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">朴素公式（数值不稳定）</text>
  <text x="200" y="112" text-anchor="middle" font-size="14" fill="#444" font-family="monospace">softmax(x) = exp(x) / Σexp(x)</text>
  <text x="200" y="140" text-anchor="middle" font-size="10" fill="#b85450">x=1000 → exp(1000) = inf</text>
  <text x="200" y="158" text-anchor="middle" font-size="10" fill="#b85450">inf / inf = NaN</text>
  <text x="200" y="184" text-anchor="middle" font-size="9" fill="#888">大输入导致溢出</text>

  <!-- Stable formula -->
  <g filter="url(#sk)"><rect x="430" y="60" width="340" height="140" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="600" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">数值稳定公式（减 max）</text>
  <text x="600" y="112" text-anchor="middle" font-size="13" fill="#444" font-family="monospace">m = max(x)</text>
  <text x="600" y="130" text-anchor="middle" font-size="13" fill="#444" font-family="monospace">softmax = exp(x-m) / Σexp(x-m)</text>
  <text x="600" y="158" text-anchor="middle" font-size="10" fill="#2e6e2e">x=1000, m=1000 → exp(0)=1</text>
  <text x="600" y="176" text-anchor="middle" font-size="10" fill="#2e6e2e">最大值为 1，不溢出</text>
  <text x="600" y="194" text-anchor="middle" font-size="9" fill="#888">数学等价：softmax(x)=softmax(x-C)</text>

  <!-- Why it works -->
  <g filter="url(#sk)"><rect x="30" y="220" width="740" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="50" y="244" font-size="12" font-weight="bold" fill="#7a5415">为什么减 max 有效？</text>
  <g font-size="10" fill="#444">
    <text x="50" y="266">softmax(x) = exp(x) / Σexp(x)</text>
    <text x="50" y="284">           = exp(x-C)·exp(C) / [Σexp(x-C)·exp(C)]</text>
    <text x="50" y="302">           = exp(x-C) / Σexp(x-C)</text>
    <text x="50" y="320" fill="#2e6e2e" font-weight="bold">→ C 被约掉，取 C=max(x) 保证 exp 最大值为 1</text>
  </g>
</svg>
