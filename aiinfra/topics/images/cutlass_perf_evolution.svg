<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="58" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="860" height="420" fill="#fdfcf7"/>

  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">GEMM 性能演进路径（4096×4096 FP16）</text>
  <path d="M 270 40 Q 430 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="340" stroke="#888" stroke-width="1.4" filter="url(#sk)"/>
  <text x="60" y="200" font-size="11" fill="#888" transform="rotate(-90,60,200)">vs cuBLAS (%)</text>

  <!-- X-axis -->
  <line x1="100" y1="340" x2="800" y2="340" stroke="#888" stroke-width="1.4" filter="url(#sk)"/>
  <text x="430" y="365" text-anchor="middle" font-size="11" fill="#888">优化步骤 →</text>

  <!-- Grid lines -->
  <line x1="100" y1="90" x2="800" y2="90" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="150" x2="800" y2="150" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="210" x2="800" y2="210" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="270" x2="800" y2="270" stroke="#eee" stroke-width="0.8"/>

  <!-- Y-axis labels -->
  <text x="90" y="94" text-anchor="end" font-size="10" fill="#888">100%</text>
  <text x="90" y="154" text-anchor="end" font-size="10" fill="#888">75%</text>
  <text x="90" y="214" text-anchor="end" font-size="10" fill="#888">50%</text>
  <text x="90" y="274" text-anchor="end" font-size="10" fill="#888">25%</text>
  <text x="90" y="344" text-anchor="end" font-size="10" fill="#888">0%</text>

  <!-- Bars: each bar height = pct/100 * 250 (340-90) -->
  <!-- Naive ~5% -->
  <g filter="url(#sk)"><rect x="120" y="327.5" width="70" height="12.5" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="155" y="320" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">~5%</text>
  <text x="155" y="356" text-anchor="middle" font-size="9" fill="#555">Naive</text>
  <text x="155" y="370" text-anchor="middle" font-size="8" fill="#aaa">W1 D1</text>

  <!-- + Shared Memory ~30% -->
  <g filter="url(#sk)"><rect x="210" y="265" width="70" height="75" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="245" y="258" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">~30%</text>
  <text x="245" y="356" text-anchor="middle" font-size="9" fill="#555">+ SM Tiling</text>
  <text x="245" y="370" text-anchor="middle" font-size="8" fill="#aaa">W1 D4</text>

  <!-- + Register Blocking ~40% -->
  <g filter="url(#sk)"><rect x="300" y="240" width="70" height="100" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="335" y="233" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">~40%</text>
  <text x="335" y="356" text-anchor="middle" font-size="9" fill="#555">+ Reg Block</text>
  <text x="335" y="370" text-anchor="middle" font-size="8" fill="#aaa">W2 D2</text>

  <!-- + Double Buffering ~55% -->
  <g filter="url(#sk)"><rect x="390" y="202.5" width="70" height="137.5" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="425" y="196" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">~55%</text>
  <text x="425" y="356" text-anchor="middle" font-size="9" fill="#555">+ DblBuf</text>

  <!-- + Tensor Core ~70% -->
  <g filter="url(#sk)"><rect x="480" y="165" width="70" height="175" rx="3" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="515" y="158" text-anchor="middle" font-size="10" fill="#5a3a7a" font-weight="bold">~70%</text>
  <text x="515" y="356" text-anchor="middle" font-size="9" fill="#555">+ TensorCore</text>

  <!-- + Swizzle + 调参 ~85% -->
  <g filter="url(#sk)"><rect x="570" y="127.5" width="70" height="212.5" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="605" y="120" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">~85%</text>
  <text x="605" y="356" text-anchor="middle" font-size="9" fill="#555">+ Swizzle+Tune</text>

  <!-- + PTX 调度 ~90% (CUTLASS) -->
  <g filter="url(#sk)"><rect x="660" y="115" width="70" height="225" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="695" y="108" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">~90%</text>
  <text x="695" y="356" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">+ PTX 调度</text>
  <text x="695" y="370" text-anchor="middle" font-size="8" fill="#2e6e2e" font-weight="bold">← CUTLASS</text>

  <!-- 100% cuBLAS line -->
  <line x1="100" y1="90" x2="800" y2="90" stroke="#b85450" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#sk)"/>
  <text x="780" y="85" text-anchor="end" font-size="10" fill="#b85450" font-weight="bold">cuBLAS 100%</text>

  <!-- Trend arrow -->
  <path d="M 155 327 Q 400 250 695 115" stroke="#888" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="100" y="384" width="700" height="28" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="4 2"/>
  </g>
  <text x="450" y="402" text-anchor="middle" font-size="11" fill="#7a5415">手写 GEMM 逐步优化的路径，CUTLASS 把所有优化封装为模板，编译期自动完成</text>
</svg>
