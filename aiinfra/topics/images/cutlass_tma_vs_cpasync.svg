<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="122" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">TMA vs cp.async：硬件级数据搬运的优势</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: cp.async -->
  <g filter="url(#sk)">
    <rect x="30" y="60" width="400" height="300" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="230" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">cp.async（Ampere, Sm80+）</text>

  <g font-size="10" fill="#444">
    <text x="50" y="110" fill="#2b6e9e" font-weight="bold">工作方式：</text>
    <text x="50" y="126" fill="#555" font-size="9">每个线程计算自己的 Global 地址</text>
    <text x="50" y="140" fill="#555" font-size="9">发起 cp.async 指令搬运 16B</text>
    <text x="50" y="154" fill="#555" font-size="9">线程参与地址计算 → 占用线程</text>

    <text x="50" y="182" fill="#7a5415" font-weight="bold">特点：</text>
    <text x="50" y="198" fill="#555" font-size="9">✅ 异步（与计算重叠）</text>
    <text x="50" y="212" fill="#555" font-size="9">✅ 每 线程 16B 向量化</text>
    <text x="50" y="226" fill="#b85450" font-size="9">❌ 线程需计算地址</text>
    <text x="50" y="240" fill="#b85450" font-size="9">❌ 不支持 multicast</text>
    <text x="50" y="254" fill="#b85450" font-size="9">❌ tile 大小受线程数限制</text>

    <text x="50" y="284" fill="#888" font-size="9">线程开销：128 线程 × 地址计算</text>
    <text x="50" y="300" fill="#888" font-size="9">最大搬运：128 × 16B = 2KB/step</text>
    <text x="50" y="320" fill="#888" font-size="9">适用：Sm80/Sm89（Ampere/Ada）</text>
  </g>

  <!-- Right: TMA -->
  <g filter="url(#sk)">
    <rect x="470" y="60" width="400" height="300" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="670" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">TMA（Hopper, Sm90+）</text>

  <g font-size="10" fill="#444">
    <text x="490" y="110" fill="#2e6e2e" font-weight="bold">工作方式：</text>
    <text x="490" y="126" fill="#555" font-size="9">用 descriptor 描述 tile 形状和位置</text>
    <text x="490" y="140" fill="#555" font-size="9">硬件自动计算所有地址</text>
    <text x="490" y="154" fill="#555" font-size="9">线程不需要参与地址计算</text>

    <text x="490" y="182" fill="#7a5415" font-weight="bold">特点：</text>
    <text x="490" y="198" fill="#555" font-size="9">✅ 异步（cp.async.bulk）</text>
    <text x="490" y="212" fill="#555" font-size="9">✅ 任意大小 tile（不受线程数限制）</text>
    <text x="490" y="226" fill="#2e6e2e" font-size="9" font-weight="bold">✅ 支持 multicast（广播到多 SM）</text>
    <text x="490" y="240" fill="#2e6e2e" font-size="9" font-weight="bold">✅ 零线程开销</text>
    <text x="490" y="254" fill="#2e6e2e" font-size="9" font-weight="bold">✅ 硬件自动处理 swizzle</text>

    <text x="490" y="284" fill="#888" font-size="9">线程开销：零（硬件全包）</text>
    <text x="490" y="300" fill="#888" font-size="9">最大搬运：整个 tile（如 128×256）</text>
    <text x="490" y="320" fill="#888" font-size="9">适用：Sm90+（Hopper/Blackwell）</text>
  </g>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="30" y="372" width="840" height="20" rx="4" fill="#fce4ec" stroke="#b85450" stroke-dasharray="4 2"/>
  </g>
  <text x="450" y="386" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">★ CuTe 的 copy() 在 Sm90+ 自动使用 TMA，用户代码无需修改——"透明升级"</text>
</svg>
