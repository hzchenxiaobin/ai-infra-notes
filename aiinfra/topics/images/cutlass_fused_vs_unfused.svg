<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="101" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">未融合 vs 融合：Global Memory 访问对比</text>
  <path d="M 280 40 Q 450 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: Unfused -->
  <text x="220" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">未融合（3 个 kernel）</text>

  <!-- Kernel 1: GEMM -->
  <g filter="url(#sk)"><rect x="40" y="76" width="360" height="44" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="220" y="94" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">Kernel 1: GEMM</text>
  <text x="220" y="108" text-anchor="middle" font-size="9" fill="#888">读 A,B → 写 D（临时）</text>

  <path d="M 220 120 L 220 132" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Kernel 2: Add Bias -->
  <g filter="url(#sk)"><rect x="40" y="132" width="360" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="220" y="150" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">Kernel 2: Add Bias</text>
  <text x="220" y="164" text-anchor="middle" font-size="9" fill="#888">读 D(临时),bias → 写 D</text>

  <path d="M 220 176 L 220 188" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Kernel 3: ReLU -->
  <g filter="url(#sk)"><rect x="40" y="188" width="360" height="44" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>
  <text x="220" y="206" text-anchor="middle" font-size="11" fill="#5a3a7a" font-weight="bold">Kernel 3: ReLU</text>
  <text x="220" y="220" text-anchor="middle" font-size="9" fill="#888">读 D → 写 D（最终）</text>

  <!-- Memory access summary -->
  <g filter="url(#sk)"><rect x="40" y="246" width="360" height="64" rx="6" fill="#fff" stroke="#ddd" stroke-dasharray="4 2"/></g>
  <text x="60" y="266" font-size="10" fill="#b85450" font-weight="bold">Global Memory 访问：</text>
  <text x="60" y="282" font-size="10" fill="#444">读：A + B + D×2 + bias = 4 次</text>
  <text x="60" y="298" font-size="10" fill="#444">写：D×3 = 3 次</text>
  <text x="60" y="314" font-size="10" fill="#b85450" font-weight="bold">Launch：3 次</text>

  <!-- Right: Fused -->
  <text x="680" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">融合（1 个 kernel）</text>

  <g filter="url(#sk)"><rect x="500" y="100" width="360" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="680" y="124" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">Fused Kernel: GEMM+Bias+ReLU</text>
  <text x="680" y="140" text-anchor="middle" font-size="10" fill="#444">D = ReLU(A×B + bias)</text>
  <text x="680" y="154" text-anchor="middle" font-size="9" fill="#888">全部在 Register 中完成</text>

  <!-- Register processing -->
  <g filter="url(#sk)"><rect x="540" y="180" width="280" height="56" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2" stroke-dasharray="4 2"/></g>
  <text x="680" y="200" text-anchor="middle" font-size="9" fill="#2b6e9e">Register 级处理（~2 cycles）：</text>
  <text x="680" y="216" text-anchor="middle" font-size="9" fill="#555" font-family="monospace">acc = alpha*A*B</text>
  <text x="680" y="230" text-anchor="middle" font-size="9" fill="#555" font-family="monospace">acc += bias  →  ReLU(acc)</text>

  <!-- Memory access summary -->
  <g filter="url(#sk)"><rect x="500" y="246" width="360" height="64" rx="6" fill="#fff" stroke="#ddd" stroke-dasharray="4 2"/></g>
  <text x="520" y="266" font-size="10" fill="#2e6e2e" font-weight="bold">Global Memory 访问：</text>
  <text x="520" y="282" font-size="10" fill="#444">读：A + B + bias = 3 次</text>
  <text x="520" y="298" font-size="10" fill="#444">写：D = 1 次</text>
  <text x="520" y="314" font-size="10" fill="#2e6e2e" font-weight="bold">Launch：1 次</text>

  <!-- Bottom comparison -->
  <g filter="url(#sk)">
    <rect x="40" y="332" width="820" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="356" font-size="12" font-weight="bold" fill="#b85450">加速比：</text>
  <text x="140" y="356" font-size="11" fill="#444">未融合 3 次 launch + 7 次 Global 访问</text>
  <text x="460" y="356" font-size="14" fill="#2e6e2e" font-weight="bold">→ 融合 1 次 launch + 4 次 Global 访问</text>
  <text x="60" y="376" font-size="11" fill="#7a5415" font-weight="bold">典型加速 1.4-2x（大矩阵更明显，kernel launch 开销占比小）</text>
</svg>
