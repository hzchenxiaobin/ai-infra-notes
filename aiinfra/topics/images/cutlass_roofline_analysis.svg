<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="113" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Roofline 模型：GEMM 在算术强度-性能图上的位置</text>
  <path d="M 260 40 Q 440 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Axes -->
  <line x1="80" y1="360" x2="820" y2="360" stroke="#888" stroke-width="1.4" filter="url(#sk)"/>
  <line x1="80" y1="60" x2="80" y2="360" stroke="#888" stroke-width="1.4" filter="url(#sk)"/>

  <text x="440" y="390" text-anchor="middle" font-size="11" fill="#888">算术强度 (FLOP/Byte, log scale) →</text>
  <text x="30" y="210" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,30,210)">性能 (TFLOPS, log scale) →</text>

  <!-- Y-axis labels -->
  <text x="70" y="364" text-anchor="end" font-size="8" fill="#888">1</text>
  <text x="70" y="304" text-anchor="end" font-size="8" fill="#888">10</text>
  <text x="70" y="244" text-anchor="end" font-size="8" fill="#888">100</text>
  <text x="70" y="184" text-anchor="end" font-size="8" fill="#888">1000</text>
  <text x="70" y="124" text-anchor="end" font-size="8" fill="#888">10000</text>

  <!-- X-axis labels -->
  <text x="80" y="375" text-anchor="middle" font-size="8" fill="#888">1</text>
  <text x="200" y="375" text-anchor="middle" font-size="8" fill="#888">10</text>
  <text x="350" y="375" text-anchor="middle" font-size="8" fill="#888">100</text>
  <text x="500" y="375" text-anchor="middle" font-size="8" fill="#888">1000</text>
  <text x="680" y="375" text-anchor="middle" font-size="8" fill="#888">10000</text>

  <!-- Memory bandwidth line (slope, left part) -->
  <line x1="80" y1="360" x2="350" y2="184" stroke="#4a8edb" stroke-width="2" filter="url(#sk)"/>
  <text x="180" y="240" font-size="9" fill="#4a8edb" font-weight="bold" transform="rotate(-40,180,240)">带宽限制 (3350 GB/s)</text>

  <!-- Compute ceiling line (horizontal, right part) -->
  <line x1="350" y1="184" x2="820" y2="184" stroke="#b85450" stroke-width="2" filter="url(#sk)"/>
  <text x="600" y="178" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">计算天花板 (989 TFLOPS FP16)</text>

  <!-- Balance point -->
  <g filter="url(#sk)">
    <circle cx="350" cy="184" r="6" fill="#7a5415" stroke="#7a5415" stroke-width="2"/>
  </g>
  <text x="360" y="200" font-size="9" fill="#7a5415" font-weight="bold">平衡点 ~50 FLOP/Byte</text>

  <!-- GEMM 4096 point -->
  <g filter="url(#sk)">
    <circle cx="520" cy="196" r="7" fill="#2e6e2e" stroke="#2e6e2e" stroke-width="2"/>
  </g>
  <text x="530" y="200" font-size="10" fill="#2e6e2e" font-weight="bold">GEMM 4096×4096</text>
  <text x="530" y="214" font-size="8" fill="#2e6e2e">1365 FLOP/Byte → 112 TFLOPS</text>
  <text x="530" y="226" font-size="8" fill="#2e6e2e">compute-bound ✅</text>

  <!-- GEMM 512 point -->
  <g filter="url(#sk)">
    <circle cx="460" cy="270" r="5" fill="#c98a2b" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="470" y="274" font-size="9" fill="#7a5415" font-weight="bold">GEMM 512×512</text>
  <text x="470" y="286" font-size="8" fill="#7a5415">170 FLOP/Byte → 14 TFLOPS</text>
  <text x="470" y="298" font-size="8" fill="#7a5415">SM 未填满 → 实际低</text>

  <!-- Memory-bound zone -->
  <g filter="url(#sk)">
    <rect x="80" y="184" width="270" height="176" rx="4" fill="none" stroke="#4a8edb" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
  <text x="180" y="340" text-anchor="middle" font-size="9" fill="#4a8edb">memory-bound 区</text>

  <!-- Compute-bound zone -->
  <g filter="url(#sk)">
    <rect x="350" y="60" width="470" height="124" rx="4" fill="none" stroke="#b85450" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
  <text x="650" y="80" text-anchor="middle" font-size="9" fill="#b85450">compute-bound 区</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="80" y="396" width="740" height="16" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="4 2"/>
  </g>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">★ GEMM 算术强度远超平衡点 → 大尺寸必然 compute-bound → 受峰值算力限制</text>
</svg>
