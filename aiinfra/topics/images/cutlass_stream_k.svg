<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="123" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Stream-K vs 传统 GEMM：负载均衡对比</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: Traditional GEMM -->
  <text x="220" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">传统 GEMM：按 tile 分配 SM</text>

  <!-- SM grid (traditional) -->
  <g font-size="7" fill="#444" font-family="monospace">
    <!-- Row 1: all SMs busy -->
    <g filter="url(#sk)"><rect x="40" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="65" y="90" text-anchor="middle">SM0</text>
    <g filter="url(#sk)"><rect x="95" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="120" y="90" text-anchor="middle">SM1</text>
    <text x="155" y="90" font-size="8" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="180" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="205" y="90" text-anchor="middle">SM131</text>

    <!-- Row 2: some SMs idle -->
    <text x="20" y="114" font-size="8" fill="#888">末轮:</text>
    <g filter="url(#sk)"><rect x="40" y="104" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="65" y="118" text-anchor="middle">SM0</text>
    <g filter="url(#sk)"><rect x="95" y="104" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="120" y="118" text-anchor="middle">SM1</text>
    <text x="155" y="118" font-size="8" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="180" y="104" width="50" height="20" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" stroke-dasharray="3 2"/></g><text x="205" y="118" text-anchor="middle" fill="#b85450">idle</text>
  </g>

  <text x="220" y="144" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">末轮部分 SM 空闲（长尾效应）</text>

  <g font-size="9" fill="#444">
    <text x="40" y="168" fill="#888">961 tile / 132 SM = 7.28 轮</text>
    <text x="40" y="184" fill="#b85450">最后一轮：97 SM 工作, 35 SM 空闲</text>
    <text x="40" y="200" fill="#888">→ 性能损失 ~3-5%</text>
  </g>

  <!-- Divider -->
  <line x1="380" y1="60" x2="380" y2="220" stroke="#eee" stroke-width="1" filter="url(#sk)"/>

  <!-- Right: Stream-K -->
  <text x="640" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Stream-K：计算量均匀打散</text>

  <g font-size="7" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="460" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="485" y="90" text-anchor="middle">SM0</text>
    <g filter="url(#sk)"><rect x="515" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="540" y="90" text-anchor="middle">SM1</text>
    <text x="575" y="90" font-size="8" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="600" y="76" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="625" y="90" text-anchor="middle">SM131</text>

    <text x="440" y="114" font-size="8" fill="#888">末轮:</text>
    <g filter="url(#sk)"><rect x="460" y="104" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="485" y="118" text-anchor="middle">SM0</text>
    <g filter="url(#sk)"><rect x="515" y="104" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="540" y="118" text-anchor="middle">SM1</text>
    <text x="575" y="118" font-size="8" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="600" y="104" width="50" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="625" y="118" text-anchor="middle">SM131</text>
  </g>

  <text x="640" y="144" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">所有 SM 满载到最后一刻</text>

  <g font-size="9" fill="#444">
    <text x="460" y="168" fill="#888">总计算量 / 132 SM = 均匀分配</text>
    <text x="460" y="184" fill="#2e6e2e">所有 SM 工作量相同，零空闲</text>
    <text x="460" y="200" fill="#888">→ 消除长尾，+3-5% 性能</text>
  </g>

  <!-- Bottom: comparison table -->
  <g filter="url(#sk)">
    <rect x="30" y="240" width="840" height="160" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="50" y="264" font-size="12" font-weight="bold" fill="#444">方案对比：</text>

  <g font-size="10" fill="#444">
    <text x="50" y="288" fill="#4a8edb" font-weight="bold">传统 GEMM:</text>
    <text x="160" y="288">每个 SM 处理若干完整 tile</text>
    <text x="400" y="288" fill="#b85450">尾部 SM 空闲</text>

    <text x="50" y="310" fill="#7a5415" font-weight="bold">Split-K:</text>
    <text x="160" y="310">按 K 切分，最后 reduce</text>
    <text x="400" y="310" fill="#b85450">需额外 reduce kernel</text>

    <text x="50" y="332" fill="#2e6e2e" font-weight="bold">Stream-K:</text>
    <text x="160" y="332">计算量均匀打散到所有 SM</text>
    <text x="400" y="332" fill="#2e6e2e">零 SM 空闲 ✅</text>

    <text x="50" y="358" fill="#5a3a7a" font-weight="bold">代价:</text>
    <text x="110" y="358">Stream-K 需要在 epilogue 中做局部 reduce（跨 tile 边界累加）</text>

    <text x="50" y="380" fill="#b85450" font-weight="bold">适用:</text>
    <text x="110" y="380">小/中等尺寸（tile 数接近 SM 数时收益最大），大尺寸收益小</text>
  </g>
</svg>
