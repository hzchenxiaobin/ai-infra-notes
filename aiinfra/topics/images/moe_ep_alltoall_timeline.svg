<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="44" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b85450"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">MoE Expert Parallelism 的双 All-to-All 时序</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="40" y="72" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="80" y1="68" x2="860" y2="68" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>

  <!-- GPU 0 lane -->
  <text x="40" y="108" font-size="12" fill="#2b6e9e" font-weight="bold">GPU 0</text>
  <text x="40" y="122" font-size="9" fill="#888">专家 0-3</text>

  <!-- GPU 0 phases -->
  <g filter="url(#sk)"><rect x="90" y="92" width="110" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="145" y="110" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">门控</text>
  <text x="145" y="124" text-anchor="middle" font-size="8" fill="#888">top-k 路由</text>

  <path d="M 200 112 L 220 112" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="220" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="285" y="108" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">① dispatch</text>
  <text x="285" y="122" text-anchor="middle" font-size="8" fill="#888">all-to-all</text>

  <path d="M 350 112 L 370 112" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="370" y="92" width="130" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="435" y="108" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">专家 FFN</text>
  <text x="435" y="122" text-anchor="middle" font-size="8" fill="#888">Grouped GEMM</text>

  <path d="M 500 112 L 520 112" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="520" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="585" y="108" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">② combine</text>
  <text x="585" y="122" text-anchor="middle" font-size="8" fill="#888">all-to-all</text>

  <path d="M 650 112 L 670 112" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="670" y="92" width="110" height="40" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>
  <text x="725" y="110" text-anchor="middle" font-size="10" fill="#5a3a7a" font-weight="bold">加权求和</text>
  <text x="725" y="124" text-anchor="middle" font-size="8" fill="#888">out = Σ g·E</text>

  <!-- GPU 1 lane -->
  <text x="40" y="178" font-size="12" fill="#2b6e9e" font-weight="bold">GPU 1</text>
  <text x="40" y="192" font-size="9" fill="#888">专家 4-7</text>

  <g filter="url(#sk)"><rect x="90" y="162" width="110" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="145" y="180" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">门控</text>
  <text x="145" y="194" text-anchor="middle" font-size="8" fill="#888">top-k 路由</text>

  <path d="M 200 182 L 220 182" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="220" y="162" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="285" y="178" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">① dispatch</text>
  <text x="285" y="192" text-anchor="middle" font-size="8" fill="#888">all-to-all</text>

  <path d="M 350 182 L 370 182" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="370" y="162" width="130" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="435" y="178" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">专家 FFN</text>
  <text x="435" y="192" text-anchor="middle" font-size="8" fill="#888">Grouped GEMM</text>

  <path d="M 500 182 L 520 182" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="520" y="162" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="585" y="178" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">② combine</text>
  <text x="585" y="192" text-anchor="middle" font-size="8" fill="#888">all-to-all</text>

  <path d="M 650 182 L 670 182" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="670" y="162" width="110" height="40" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>
  <text x="725" y="180" text-anchor="middle" font-size="10" fill="#5a3a7a" font-weight="bold">加权求和</text>
  <text x="725" y="194" text-anchor="middle" font-size="8" fill="#888">out = Σ g·E</text>

  <!-- Overlap arrow between FFN and dispatch/combine -->
  <g filter="url(#sk)">
    <path d="M 435 142 Q 500 156 585 142" stroke="#2e6e2e" stroke-width="1.2" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)"/>
  </g>
  <text x="510" y="156" text-anchor="middle" font-size="8" fill="#2e6e2e">通信与计算可 overlap</text>

  <!-- Bottom: key points -->
  <g filter="url(#sk)">
    <rect x="40" y="232" width="820" height="200" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="256" font-size="12" font-weight="bold" fill="#444">关键观察：</text>

  <text x="60" y="280" font-size="10" fill="#b85450" font-weight="bold">① 两次 all-to-all</text>
  <text x="180" y="280" font-size="10" fill="#444">dispatch 把 token 发到专家卡，combine 把结果发回原卡</text>

  <text x="60" y="302" font-size="10" fill="#7a5415" font-weight="bold">② 通信量</text>
  <text x="180" y="302" font-size="10" fill="#444">朴素 EP：每 token 发 K_r 台设备，O(K_r · D)</text>

  <text x="60" y="324" font-size="10" fill="#2e6e2e" font-weight="bold">③ 设备受限路由（DeepSeek）</text>
  <text x="180" y="324" font-size="10" fill="#444">限制到 M 台（M &lt; K_r），通信量 O(M)，代价是丢弃超出的专家</text>

  <text x="60" y="346" font-size="10" fill="#5a3a7a" font-weight="bold">④ NCCL API</text>
  <text x="180" y="346" font-size="10" fill="#444" font-family="monospace">dist.all_to_all_single(recv, send, recv_counts, send_counts)</text>

  <text x="60" y="368" font-size="10" fill="#2b6e9e" font-weight="bold">⑤ 隐式开销</text>
  <text x="180" y="368" font-size="10" fill="#444">send/recv_counts 需预先 allgather 同步（NCCL 要知道每对 src,dst 数据量）</text>

  <text x="60" y="392" font-size="10" fill="#b85450" font-weight="bold">⑥ Mega MoE（DeepGEMM）</text>
  <text x="180" y="392" font-size="10" fill="#444">把 dispatch + 2×GEMM + SwiGLU + combine 融合成单 kernel，NVLink 藏在 WGMMA 影子里</text>

  <text x="60" y="416" font-size="10" fill="#888" font-style="italic">EP 的 all-to-all 是 MoE 训练/推理的核心通信开销，也是设备受限路由压制的目标</text>
</svg>
