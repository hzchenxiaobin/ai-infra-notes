<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="1000" height="320" fill="#fdfcf7"/>

  <text x="500" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">本日在本周知识图谱中的位置</text>
  <path d="M 320 40 Q 500 48 680 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Day 1 -->
  <g filter="url(#sk)"><rect x="20" y="70" width="120" height="90" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="80" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Day 1</text>
  <text x="80" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">总览</text>
  <text x="80" y="128" text-anchor="middle" font-size="9" fill="#666">算法动机</text>
  <text x="80" y="142" text-anchor="middle" font-size="9" fill="#666">朴素实现</text>

  <path d="M 140 115 L 158 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 2 -->
  <g filter="url(#sk)"><rect x="160" y="70" width="120" height="90" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
  <text x="220" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Day 2</text>
  <text x="220" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">Gating+TopK</text>
  <text x="220" y="128" text-anchor="middle" font-size="9" fill="#666">Triton 融合</text>

  <path d="M 280 115 L 298 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 3 -->
  <g filter="url(#sk)"><rect x="300" y="70" width="120" height="90" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="360" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">Day 3</text>
  <text x="360" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">Grouped GEMM</text>
  <text x="360" y="128" text-anchor="middle" font-size="9" fill="#666">cuBLAS 对照</text>

  <path d="M 420 115 L 438 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 4 (highlighted) -->
  <g filter="url(#sk)"><rect x="440" y="62" width="140" height="106" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="2.5"/></g>
  <text x="510" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#b85450">Day 4</text>
  <text x="510" y="108" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">Expert Parallel</text>
  <text x="510" y="124" text-anchor="middle" font-size="9" fill="#666">all-to-all</text>
  <text x="510" y="138" text-anchor="middle" font-size="9" fill="#666">Megatron 通信</text>
  <text x="510" y="154" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">← 你在这里</text>

  <path d="M 580 115 L 598 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 5 -->
  <g filter="url(#sk)"><rect x="600" y="70" width="120" height="90" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/></g>
  <text x="660" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a">Day 5</text>
  <text x="660" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">vLLM fused_moe</text>
  <text x="660" y="128" text-anchor="middle" font-size="9" fill="#666">源码精读</text>

  <path d="M 720 115 L 738 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 6 -->
  <g filter="url(#sk)"><rect x="740" y="70" width="120" height="90" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="800" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Day 6</text>
  <text x="800" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">完整 Triton MoE</text>
  <text x="800" y="128" text-anchor="middle" font-size="9" fill="#666">性能对比</text>

  <path d="M 860 115 L 878 115" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day 7 -->
  <g filter="url(#sk)"><rect x="880" y="70" width="100" height="90" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
  <text x="930" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Day 7</text>
  <text x="930" y="112" text-anchor="middle" font-size="9" fill="#444" font-weight="bold">调优</text>
  <text x="930" y="128" text-anchor="middle" font-size="9" fill="#666">ncu 报告</text>

  <!-- "你在这里" annotation -->
  <g filter="url(#sk)">
    <path d="M 510 200 L 510 172" stroke="#b85450" stroke-width="1.8" fill="none" marker-end="url(#ar)" stroke-dasharray="4 2"/>
  </g>
  <g filter="url(#sk)">
    <rect x="260" y="206" width="540" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="4 2"/>
  </g>
  <text x="530" y="230" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">你在这里</text>
  <text x="530" y="250" text-anchor="middle" font-size="10" fill="#7a3a3a">通信瓶颈：all-to-all 是 EP 的核心开销</text>

  <!-- bottom note -->
  <text x="500" y="296" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Day 4 转通信：单卡计算 → 多卡 all-to-all；Day 5 读 vLLM 单卡融合（无 EP）</text>
</svg>
