<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="41" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="880" height="360" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Column-Major 与 Row-Major 索引映射</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left table: Column-Major -->
  <text x="230" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Column-Major (stride=1,4)</text>
  <g font-size="10" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="40" y="80" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="87" y="104" text-anchor="middle">(0,0)→0</text>
    <g filter="url(#sk)"><rect x="135" y="80" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="182" y="104" text-anchor="middle">(0,1)→4</text>
    <g filter="url(#sk)"><rect x="230" y="80" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="277" y="104" text-anchor="middle">(0,2)→8</text>
    <g filter="url(#sk)"><rect x="325" y="80" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="372" y="104" text-anchor="middle">(0,3)→12</text>

    <g filter="url(#sk)"><rect x="40" y="120" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="87" y="144" text-anchor="middle">(1,0)→1</text>
    <g filter="url(#sk)"><rect x="135" y="120" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="182" y="144" text-anchor="middle">(1,1)→5</text>
    <g filter="url(#sk)"><rect x="230" y="120" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="277" y="144" text-anchor="middle">(1,2)→9</text>
    <g filter="url(#sk)"><rect x="325" y="120" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="372" y="144" text-anchor="middle">(1,3)→13</text>

    <g filter="url(#sk)"><rect x="40" y="160" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="87" y="184" text-anchor="middle">(2,0)→2</text>
    <g filter="url(#sk)"><rect x="135" y="160" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="182" y="184" text-anchor="middle">(2,1)→6</text>
    <g filter="url(#sk)"><rect x="230" y="160" width="95" height="38" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g><text x="277" y="184" text-anchor="middle" font-weight="bold" fill="#7a5415">(2,2)→10</text>
    <g filter="url(#sk)"><rect x="325" y="160" width="95" height="38" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g><text x="372" y="184" text-anchor="middle" font-weight="bold" fill="#b85450">(2,3)→14</text>

    <g filter="url(#sk)"><rect x="40" y="200" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="87" y="224" text-anchor="middle">(3,0)→3</text>
    <g filter="url(#sk)"><rect x="135" y="200" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="182" y="224" text-anchor="middle">(3,1)→7</text>
    <g filter="url(#sk)"><rect x="230" y="200" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="277" y="224" text-anchor="middle">(3,2)→11</text>
    <g filter="url(#sk)"><rect x="325" y="200" width="95" height="38" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="372" y="224" text-anchor="middle">(3,3)→15</text>
  </g>
  <text x="230" y="256" text-anchor="middle" font-size="10" fill="#555" font-family="monospace">offset(i,j) = i*1 + j*4</text>

  <!-- Right table: Row-Major -->
  <text x="650" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Row-Major (stride=4,1)</text>
  <g font-size="10" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="460" y="80" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="507" y="104" text-anchor="middle">(0,0)→0</text>
    <g filter="url(#sk)"><rect x="555" y="80" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="602" y="104" text-anchor="middle">(0,1)→1</text>
    <g filter="url(#sk)"><rect x="650" y="80" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="697" y="104" text-anchor="middle">(0,2)→2</text>
    <g filter="url(#sk)"><rect x="745" y="80" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="792" y="104" text-anchor="middle">(0,3)→3</text>

    <g filter="url(#sk)"><rect x="460" y="120" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="507" y="144" text-anchor="middle">(1,0)→4</text>
    <g filter="url(#sk)"><rect x="555" y="120" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="602" y="144" text-anchor="middle">(1,1)→5</text>
    <g filter="url(#sk)"><rect x="650" y="120" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="697" y="144" text-anchor="middle">(1,2)→6</text>
    <g filter="url(#sk)"><rect x="745" y="120" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="792" y="144" text-anchor="middle">(1,3)→7</text>

    <g filter="url(#sk)"><rect x="460" y="160" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="507" y="184" text-anchor="middle">(2,0)→8</text>
    <g filter="url(#sk)"><rect x="555" y="160" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="602" y="184" text-anchor="middle">(2,1)→9</text>
    <g filter="url(#sk)"><rect x="650" y="160" width="95" height="38" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g><text x="697" y="184" text-anchor="middle" font-weight="bold" fill="#7a5415">(2,2)→10</text>
    <g filter="url(#sk)"><rect x="745" y="160" width="95" height="38" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g><text x="792" y="184" text-anchor="middle" font-weight="bold" fill="#b85450">(2,3)→11</text>

    <g filter="url(#sk)"><rect x="460" y="200" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="507" y="224" text-anchor="middle">(3,0)→12</text>
    <g filter="url(#sk)"><rect x="555" y="200" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="602" y="224" text-anchor="middle">(3,1)→13</text>
    <g filter="url(#sk)"><rect x="650" y="200" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="697" y="224" text-anchor="middle">(3,2)→14</text>
    <g filter="url(#sk)"><rect x="745" y="200" width="95" height="38" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="792" y="224" text-anchor="middle">(3,3)→15</text>
  </g>
  <text x="650" y="256" text-anchor="middle" font-size="10" fill="#555" font-family="monospace">offset(i,j) = i*4 + j*1</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="60" y="280" width="760" height="64" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="304" font-size="11" font-weight="bold" fill="#444">关键观察：</text>
  <text x="80" y="324" font-size="11" fill="#7a5415">(2,2) 在两种布局中 offset 相同（10），但 (2,3) 完全不同（14 vs 11）——这就是布局差异的本质</text>
  <text x="80" y="340" font-size="11" fill="#888">Column-Major 列内连续（stride=1），Row-Major 行内连续（stride=1）</text>
</svg>
