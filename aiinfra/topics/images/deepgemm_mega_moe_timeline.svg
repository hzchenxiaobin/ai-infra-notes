<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 880" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="99" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="880" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">Mega MoE 完整时序图：6 类 Warp 并行流水线</text>
  <path d="M 280 40 Q 460 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time arrow (vertical, downward) -->
  <text x="32" y="72" font-size="12" fill="#888" font-weight="bold">时间</text>
  <path d="M 40 60 L 40 850" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="32" y="860" font-size="11" fill="#888">↓</text>

  <!-- ===== Lane 1: Dispatch warps ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="60" width="840" height="140" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="60" width="200" height="28" rx="6" fill="#b85450" stroke="none"/></g>
  <text x="160" y="79" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Dispatch warps</text>
  <text x="270" y="79" font-size="9" fill="#888" font-style="italic">warp 0 .. kNumDispatchWarps-1</text>
  <g font-size="10" fill="#444">
    <text x="80" y="108">├─ 读 input_topk_idx，统计每 expert 的 token 数</text>
    <text x="80" y="126">├─ NVLink 写远端 rank 的 src_token_topk_idx</text>
    <text x="80" y="144">├─ grid_sync + nvlink_barrier</text>
    <text x="80" y="162">└─ Pull token + SF from remote → l1_token_buffer（TMA）</text>
    <text x="100" y="178" font-size="9" fill="#888">├─ wait l1_empty_count（ring 可覆盖）→ TMA load 远端 → TMA store 本地</text>
    <text x="100" y="194" font-size="9" fill="#b85450" font-weight="bold">└─ red_add l1_full_count → 通知 L1 可消费</text>
  </g>

  <!-- ===== Lane 2: TMA load warp ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="210" width="840" height="110" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="210" width="200" height="28" rx="6" fill="#4a8edb" stroke="none"/></g>
  <text x="160" y="229" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">TMA load warp</text>
  <text x="270" y="229" font-size="9" fill="#888" font-style="italic">warp kNumDispatchWarps</text>
  <g font-size="10" fill="#444">
    <text x="80" y="258">├─ scheduler.get_next_task（TaskInfo）</text>
    <text x="80" y="276">├─ wait l1_full_count（token 到达）</text>
    <text x="80" y="294">├─ TMA load l1_acts + l1_weights → smem</text>
    <text x="80" y="312" fill="#4a8edb" font-weight="bold">└─ arrive full_barriers → 通知 MMA issue</text>
  </g>

  <!-- ===== Lane 3: MMA issue warp ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="330" width="840" height="110" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="330" width="200" height="28" rx="6" fill="#4a8e4a" stroke="none"/></g>
  <text x="160" y="349" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">MMA issue warp</text>
  <text x="270" y="349" font-size="9" fill="#888" font-style="italic">warp kNumDispatchWarps+1, leader CTA only</text>
  <g font-size="10" fill="#444">
    <text x="80" y="378">├─ wait with_sf_full_barriers（SF 转置完成）</text>
    <text x="80" y="396">├─ UTCCP: smem_sfa → TMEM</text>
    <text x="80" y="414">├─ tcgen05.mma.block_scale（FP8×FP4）</text>
    <text x="80" y="432" fill="#2e6e2e" font-weight="bold">└─ arrive empty_barriers + tmem_full_barriers</text>
  </g>

  <!-- ===== Lane 4: UTCCP transpose warp ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="450" width="840" height="90" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="450" width="200" height="28" rx="6" fill="#c98a2b" stroke="none"/></g>
  <text x="160" y="469" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">UTCCP transpose</text>
  <text x="270" y="469" font-size="9" fill="#888" font-style="italic">warp kNumDispatchWarps+2</text>
  <g font-size="10" fill="#444">
    <text x="80" y="498">├─ wait full_barriers（TMA 加载完成）</text>
    <text x="80" y="516">├─ ld_shared + st_shared 转置 SFA/SFB（MN-major → K-major）</text>
    <text x="80" y="534" fill="#7a5415" font-weight="bold">└─ arrive with_sf_full_barriers → 通知 MMA issue</text>
  </g>

  <!-- ===== Lane 5: Scheduler warp ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="550" width="840" height="90" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="550" width="200" height="28" rx="6" fill="#8e5db8" stroke="none"/></g>
  <text x="160" y="569" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Scheduler warp</text>
  <text x="270" y="569" font-size="9" fill="#888" font-style="italic">warp kNumDispatchWarps+3</text>
  <g font-size="10" fill="#444">
    <text x="80" y="598">├─ fetch_expert_recv_count（NVLink 读远端 expert 计数）</text>
    <text x="80" y="616">├─ get_next_task（L1/L2 交替 + warmup waves 防死锁）</text>
    <text x="80" y="634" fill="#5a3a7a" font-weight="bold">└─ publish_task（st_async_cluster 写 task_infos）</text>
  </g>

  <!-- ===== Lane 6: Epilogue warps ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="650" width="840" height="200" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5 3"/>
  </g>
  <g filter="url(#sk)"><rect x="60" y="650" width="200" height="28" rx="6" fill="#5a5a5a" stroke="none"/></g>
  <text x="160" y="669" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Epilogue warps</text>
  <text x="270" y="669" font-size="9" fill="#888" font-style="italic">warp ≥ kNumDispatchWarps+kNumMMANonEpilogueWarps</text>

  <!-- Linear1 sub-block -->
  <g filter="url(#sk)"><rect x="80" y="688" width="250" height="72" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
  <text x="92" y="706" font-size="10" fill="#7a5415" font-weight="bold">Linear1 epilogue:</text>
  <text x="92" y="722" font-size="9" fill="#444">wait tmem_full → TMEM load</text>
  <text x="92" y="736" font-size="9" fill="#444">→ SwiGLU + FP8 quant</text>
  <text x="92" y="752" font-size="9" fill="#7a5415" font-weight="bold">→ TMA store l2_acts</text>
  <text x="92" y="766" font-size="8" fill="#888" font-style="italic">+ red_add l2_full + l1_empty</text>

  <!-- Linear2 sub-block -->
  <g filter="url(#sk)"><rect x="345" y="688" width="260" height="72" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="357" y="706" font-size="10" fill="#2b6e9e" font-weight="bold">Linear2 epilogue:</text>
  <text x="357" y="722" font-size="9" fill="#444">wait tmem_full → TMEM load</text>
  <text x="357" y="736" font-size="9" fill="#444">→ BF16 cast</text>
  <text x="357" y="752" font-size="9" fill="#2b6e9e" font-weight="bold">→ NVLink 写远端 combine_buffer</text>
  <text x="357" y="766" font-size="8" fill="#888" font-style="italic">+ red_add l2_empty</text>

  <!-- Combine sub-block -->
  <g filter="url(#sk)"><rect x="620" y="688" width="260" height="72" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="632" y="706" font-size="10" fill="#2e6e2e" font-weight="bold">Combine reduce:</text>
  <text x="632" y="722" font-size="9" fill="#444">nvlink_barrier（等所有 L2）</text>
  <text x="632" y="736" font-size="9" fill="#444">→ top-k 加权 reduce（FP32）</text>
  <text x="632" y="752" font-size="9" fill="#2e6e2e" font-weight="bold">→ TMA store y（BF16）</text>
  <text x="632" y="766" font-size="8" fill="#888" font-style="italic">双缓冲 load overlap</text>

  <!-- Epilogue summary -->
  <text x="460" y="790" text-anchor="middle" font-size="9" fill="#5a5a5a" font-style="italic">三套 epilogue 分工：L1 产 l2_acts → L2 产远端 combine buffer → Combine 汇总写 y</text>
  <text x="460" y="806" text-anchor="middle" font-size="9" fill="#5a5a5a" font-style="italic">所有阶段通过 workspace 原子计数器同步，无 global barrier</text>

  <!-- overlap annotation on right side -->
  <g filter="url(#sk)">
    <path d="M 905 80 Q 920 400 905 720" stroke="#4a8edb" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  </g>
  <text x="900" y="430" font-size="9" fill="#4a8edb" font-weight="bold" transform="rotate(90 900 430)">↑ 各 warp 异步并行，通过 barrier / 原子计数器握手 ↑</text>
</svg>
