<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">PDL（Programmatic Dependent Launch）：launch 重叠</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="50" y="72" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="80" y1="68" x2="820" y2="68" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>

  <!-- ====== Top: Traditional launch ====== -->
  <text x="50" y="108" font-size="12" fill="#b85450" font-weight="bold">传统 launch</text>
  <text x="50" y="122" font-size="9" fill="#888">串行：A 结束 → B launch → B 执行</text>

  <!-- kernel A execution -->
  <g filter="url(#sk)"><rect x="100" y="100" width="260" height="34" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="230" y="122" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">kernel A 执行</text>

  <!-- arrow A→B (serial) -->
  <path d="M 360 117 L 410 117" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="385" y="110" text-anchor="middle" font-size="9" fill="#888">launch</text>
  <text x="385" y="130" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">overhead</text>

  <!-- kernel B launch + execution (serial) -->
  <g filter="url(#sk)"><rect x="410" y="100" width="80" height="34" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3 2"/></g>
  <text x="450" y="122" text-anchor="middle" font-size="9" fill="#888">B launch</text>

  <g filter="url(#sk)"><rect x="490" y="100" width="260" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="620" y="122" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">kernel B 执行</text>

  <!-- ====== Bottom: PDL launch ====== -->
  <text x="50" y="208" font-size="12" fill="#2e6e2e" font-weight="bold">PDL launch</text>
  <text x="50" y="222" font-size="9" fill="#888">重叠：A 执行 ‖ B launch → B 执行</text>

  <!-- kernel A execution (same as above) -->
  <g filter="url(#sk)"><rect x="100" y="200" width="260" height="34" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="230" y="222" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">kernel A 执行</text>

  <!-- kernel B launch overlapping with A tail -->
  <g filter="url(#sk)"><rect x="280" y="244" width="160" height="34" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="3 2"/></g>
  <text x="360" y="266" text-anchor="middle" font-size="10" fill="#888">kernel B launch</text>
  <text x="360" y="278" text-anchor="middle" font-size="8" fill="#888" font-style="italic">（B 在 A 还没结束时启动）</text>

  <!-- overlap region indicator -->
  <g filter="url(#sk)">
    <path d="M 280 234 L 280 244" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
    <path d="M 360 234 L 360 244" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
  </g>
  <g filter="url(#sk)">
    <rect x="280" y="288" width="80" height="22" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="320" y="303" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">overlap</text>
  <path d="M 320 286 L 320 280" stroke="#4a8edb" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- kernel B execution right after A ends -->
  <g filter="url(#sk)"><rect x="440" y="244" width="260" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="570" y="266" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">kernel B 执行</text>

  <!-- cudaGridDependencySynchronize marker -->
  <g filter="url(#sk)">
    <line x1="440" y1="240" x2="440" y2="284" stroke="#c98a2b" stroke-width="1.4" stroke-dasharray="2 2"/>
  </g>
  <text x="440" y="332" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">cudaGridDependencySynchronize</text>
  <text x="440" y="346" text-anchor="middle" font-size="8" fill="#888" font-style="italic">B 在此处等 A 完成</text>

  <!-- ====== Bottom: summary ====== -->
  <g filter="url(#sk)">
    <rect x="40" y="354" width="800" height="20" rx="3" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="3 2"/>
  </g>
  <text x="440" y="368" text-anchor="middle" font-size="10" fill="#444">PDL 流水线 <tspan font-weight="bold" fill="#2e6e2e">launch</tspan>（不是 kernel）——节省 5-10% 端到端延迟（MoE 多 kernel 场景）</text>
</svg>
