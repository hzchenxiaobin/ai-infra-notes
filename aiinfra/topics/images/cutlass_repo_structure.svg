<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="44" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
  </defs>
  <rect width="680" height="540" fill="#fdfcf7"/>

  <text x="340" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS 仓库目录结构</text>
  <path d="M 200 38 Q 340 46 480 38" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Background panel -->
  <g filter="url(#sk)">
    <rect x="20" y="50" width="640" height="480" rx="8" fill="#fffdf3" stroke="#ddd" stroke-width="1"/>
  </g>

  <!-- Tree structure using monospace text -->
  <g font-family="'Courier New','Comic Sans MS',monospace" font-size="12">
    <!-- Root -->
    <text x="40" y="76" fill="#2b2b2b" font-weight="bold">cutlass/</text>

    <!-- include/ -->
    <text x="40" y="98" fill="#888">├──</text>
    <text x="70" y="98" fill="#2b6e9e" font-weight="bold">include/cutlass/</text>
    <text x="220" y="98" fill="#888" font-size="10"># 核心头文件（header-only）</text>

    <!-- gemm/ -->
    <text x="40" y="118" fill="#888">│   ├──</text>
    <text x="90" y="118" fill="#7a5415" font-weight="bold">gemm/</text>
    <text x="140" y="118" fill="#888" font-size="10"># GEMM 核心</text>

    <text x="40" y="136" fill="#888">│   │   ├── device/</text>
    <text x="220" y="136" fill="#888" font-size="10"># device API（用户入口）</text>

    <text x="40" y="154" fill="#888">│   │   ├── kernel/</text>
    <text x="220" y="154" fill="#888" font-size="10"># kernel 模板（mainloop + epilogue）</text>

    <text x="40" y="172" fill="#888">│   │   ├── collective/</text>
    <text x="220" y="172" fill="#888" font-size="10"># 3.x: collective builder</text>

    <text x="40" y="190" fill="#888">│   │   ├── threadblock/</text>
    <text x="220" y="190" fill="#888" font-size="10"># 2.x: MmaMultistage 等</text>

    <text x="40" y="208" fill="#888">│   │   ├── warp/</text>
    <text x="220" y="208" fill="#888" font-size="10"># 2.x: MmaTensorOp 等</text>

    <text x="40" y="226" fill="#888">│   │   └── thread/</text>
    <text x="220" y="226" fill="#888" font-size="10"># 2.x: mma 指令包装</text>

    <!-- epilogue/ -->
    <text x="40" y="248" fill="#888">│   ├──</text>
    <text x="90" y="248" fill="#7a5415" font-weight="bold">epilogue/</text>
    <text x="160" y="248" fill="#888" font-size="10"># Epilogue 融合</text>

    <text x="40" y="266" fill="#888">│   │   ├── thread/</text>
    <text x="220" y="266" fill="#888" font-size="10"># LinearCombination, ReLU...</text>

    <text x="40" y="284" fill="#888">│   │   └── collective/</text>
    <text x="220" y="284" fill="#888" font-size="10"># 3.x: epilogue builder</text>

    <!-- cute/ -->
    <text x="40" y="306" fill="#888">│   ├──</text>
    <text x="90" y="306" fill="#2e6e2e" font-weight="bold">cute/</text>
    <text x="130" y="306" fill="#888" font-size="10"># CuTe 编程模型（3.x 核心）</text>

    <text x="40" y="324" fill="#888">│   │   ├── tensor.hpp</text>
    <text x="220" y="324" fill="#888" font-size="10"># Tensor 抽象</text>

    <text x="40" y="342" fill="#888">│   │   ├── layout.hpp</text>
    <text x="220" y="342" fill="#888" font-size="10"># Layout 抽象</text>

    <text x="40" y="360" fill="#888">│   │   └── copy.hpp</text>
    <text x="220" y="360" fill="#888" font-size="10"># copy（自动向量化/swizzle/TMA）</text>

    <!-- arch/ -->
    <text x="40" y="382" fill="#888">│   ├──</text>
    <text x="90" y="382" fill="#b85450" font-weight="bold">arch/</text>
    <text x="130" y="382" fill="#888" font-size="10"># 硬件指令抽象</text>

    <text x="40" y="400" fill="#888">│   │   ├── mma.h</text>
    <text x="220" y="400" fill="#888" font-size="10"># MMA 指令（sm_80+）</text>

    <text x="40" y="418" fill="#888">│   │   ├── tma.h</text>
    <text x="220" y="418" fill="#888" font-size="10"># TMA 指令（sm_90+）</text>

    <text x="40" y="436" fill="#888">│   │   └── wmma.h</text>
    <text x="220" y="436" fill="#888" font-size="10"># WMMA 指令（sm_70+）</text>

    <text x="40" y="458" fill="#888">│   └── layout/</text>
    <text x="220" y="458" fill="#888" font-size="10"># RowMajor, ColumnMajor...</text>

    <!-- examples/ -->
    <text x="40" y="480" fill="#888">├── examples/</text>
    <text x="220" y="480" fill="#888" font-size="10"># 示例代码</text>

    <text x="40" y="498" fill="#888">├── test/</text>
    <text x="220" y="498" fill="#888" font-size="10"># 单元测试</text>

    <text x="40" y="516" fill="#888">└── tools/</text>
    <text x="220" y="516" fill="#888" font-size="10"># library/ + profiler/</text>
  </g>

  <!-- Color legend -->
  <g filter="url(#sk)">
    <rect x="430" y="490" width="12" height="12" rx="2" fill="#eaf6ee" stroke="#2e6e2e" stroke-width="1"/>
  </g>
  <text x="448" y="500" font-size="9" fill="#2e6e2e">3.x 核心</text>
  <g filter="url(#sk)">
    <rect x="430" y="506" width="12" height="12" rx="2" fill="#fef6e6" stroke="#7a5415" stroke-width="1"/>
  </g>
  <text x="448" y="516" font-size="9" fill="#7a5415">GEMM/Epilogue</text>
  <g filter="url(#sk)">
    <rect x="520" y="490" width="12" height="12" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1"/>
  </g>
  <text x="538" y="500" font-size="9" fill="#b85450">硬件指令</text>
  <g filter="url(#sk)">
    <rect x="520" y="506" width="12" height="12" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="538" y="516" font-size="9" fill="#4a8edb">入口/布局</text>
</svg>
