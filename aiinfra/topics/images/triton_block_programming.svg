<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="202" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Block 级编程：Triton 操作向量而非标量</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Data array visualization -->
  <text x="450" y="62" text-anchor="middle" font-size="11" fill="#888">Global Memory: x[0], x[1], ..., x[n-1]</text>

  <!-- Array cells -->
  <g font-size="8" fill="#444" font-family="monospace">
    <!-- Full array -->
    <g filter="url(#sk)"><rect x="40" y="74" width="40" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="60" y="90" text-anchor="middle">x[0]</text>
    <g filter="url(#sk)"><rect x="80" y="74" width="40" height="24" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="100" y="90" text-anchor="middle">x[1]</text>
    <text x="130" y="90" font-size="7" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="150" y="74" width="40" height="24" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g><text x="170" y="90" text-anchor="middle">x[1024]</text>
    <text x="200" y="90" font-size="7" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="220" y="74" width="40" height="24" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g><text x="240" y="90" text-anchor="middle">x[2048]</text>
    <text x="270" y="90" font-size="7" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="290" y="74" width="40" height="24" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g><text x="310" y="90" text-anchor="middle">x[n-1]</text>
  </g>

  <!-- Program 0 -->
  <g filter="url(#sk)"><rect x="40" y="120" width="150" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="115" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">Program 0 (pid=0)</text>
  <text x="115" y="156" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">offsets = 0..1023</text>
  <text x="115" y="170" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">x = tl.load(x_ptr + offsets)</text>

  <!-- Program 1 -->
  <g filter="url(#sk)"><rect x="210" y="120" width="150" height="60" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="285" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">Program 1 (pid=1)</text>
  <text x="285" y="156" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">offsets = 1024..2047</text>
  <text x="285" y="170" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">x = tl.load(x_ptr + offsets)</text>

  <!-- Program 2 -->
  <g filter="url(#sk)"><rect x="380" y="120" width="150" height="60" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="455" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">Program 2 (pid=2)</text>
  <text x="455" y="156" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">offsets = 2048..3071</text>
  <text x="455" y="170" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">x = tl.load(x_ptr + offsets)</text>

  <!-- Last program -->
  <g filter="url(#sk)"><rect x="550" y="120" width="150" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="625" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">Program N (pid=N)</text>
  <text x="625" y="156" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">offsets = ... &lt; n (mask!)</text>
  <text x="625" y="170" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">x = tl.load(..., mask=mask)</text>

  <!-- Arrows from array to programs -->
  <path d="M 60 98 L 100 120" stroke="#4a8edb" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 170 98 L 285 120" stroke="#4a8e4a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 240 98 L 455 120" stroke="#c98a2b" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- tl.arange illustration -->
  <g filter="url(#sk)">
    <rect x="40" y="210" width="660" height="90" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="234" font-size="11" font-weight="bold" fill="#444">tl.arange(0, BLOCK_SIZE) 生成 block 级索引向量：</text>

  <g font-size="9" fill="#444" font-family="monospace">
    <text x="60" y="256" fill="#2b6e9e">pid=0: offsets = [0, 1, 2, ..., 1023]</text>
    <text x="350" y="256" fill="#888">→ tl.load 一次加载 1024 个元素</text>

    <text x="60" y="274" fill="#2e6e2e">pid=1: offsets = [1024, 1025, ..., 2047]</text>
    <text x="350" y="274" fill="#888">→ 向量化运算 x + y</text>

    <text x="60" y="292" fill="#b85450">pid=N: offsets = [..., n-1, n, n+1, ...]</text>
    <text x="350" y="292" fill="#888">→ mask = offsets &lt; n 处理边界</text>
  </g>

  <!-- Comparison -->
  <g filter="url(#sk)">
    <rect x="40" y="320" width="820" height="84" rx="8" fill="#fce4ec" stroke="#b85450" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="344" font-size="11" font-weight="bold" fill="#b85450">关键区别：</text>
  <g font-size="10" fill="#444">
    <text x="60" y="364" fill="#4a8edb">CUDA: 1 thread → 1 element（标量操作，需 threadIdx）</text>
    <text x="460" y="364" fill="#2e6e2e">Triton: 1 program → BLOCK_SIZE elements（向量操作，tl.arange）</text>
    <text x="60" y="384" fill="#7a5415">★ Triton 编译器自动把 block 级向量分配到底层线程——你不需要知道有几个线程、每个线程做什么</text>
  </g>
</svg>
