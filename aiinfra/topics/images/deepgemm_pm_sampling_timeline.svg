<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="111" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">Mega MoE PM Sampling 时序图（280 us）</text>
  <path d="M 280 40 Q 450 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis (top) -->
  <line x1="180" y1="72" x2="840" y2="72" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>
  <g font-size="10" fill="#888" text-anchor="middle">
    <text x="180" y="64">0</text>
    <text x="274" y="64">50</text>
    <text x="368" y="64">100</text>
    <text x="462" y="64">150</text>
    <text x="556" y="64">200</text>
    <text x="650" y="64">250</text>
    <text x="744" y="64">280</text>
    <text x="790" y="64" fill="#aaa" font-style="italic">us</text>
  </g>
  <!-- vertical guides -->
  <g stroke="#eee" stroke-width="1" filter="url(#sk)">
    <line x1="274" y1="72" x2="274" y2="368"/>
    <line x1="368" y1="72" x2="368" y2="368"/>
    <line x1="462" y1="72" x2="462" y2="368"/>
    <line x1="556" y1="72" x2="556" y2="368"/>
    <line x1="650" y1="72" x2="650" y2="368"/>
    <line x1="744" y1="72" x2="744" y2="368"/>
  </g>

  <!-- Phase labels at top -->
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="227" y="88">dispatch</text>
    <text x="406" y="88">L1 GEMM</text>
    <text x="543" y="88">L2 GEMM</text>
    <text x="688" y="88">combine</text>
  </g>

  <!-- ====== Row 1: Tensor Pipe ====== -->
  <text x="40" y="116" font-size="11" fill="#7a5415" font-weight="bold">Tensor Pipe</text>
  <text x="40" y="130" font-size="9" fill="#888">Tensor Core</text>
  <!-- bar background (dim) -->
  <g filter="url(#sk)"><rect x="180" y="108" width="564" height="22" rx="3" fill="#fef6e6" stroke="#eee" stroke-width="0.8"/></g>
  <!-- active segments: L1/L2 alternating peaks -->
  <g filter="url(#sk)">
    <rect x="180" y="108" width="188" height="22" rx="2" fill="#c98a2b" stroke="#7a5415" stroke-width="1"/>
    <rect x="368" y="108" width="75" height="22" rx="2" fill="#fef6e6" stroke="#eee" stroke-width="0.8"/>
    <rect x="443" y="108" width="188" height="22" rx="2" fill="#c98a2b" stroke="#7a5415" stroke-width="1"/>
    <rect x="631" y="108" width="113" height="22" rx="2" fill="#fef6e6" stroke="#eee" stroke-width="0.8"/>
  </g>
  <text x="752" y="124" font-size="9" fill="#7a5415" font-style="italic">← L1/L2 交替高峰</text>

  <!-- ====== Row 2: NVLink TX ====== -->
  <text x="40" y="166" font-size="11" fill="#b85450" font-weight="bold">NVLink TX</text>
  <text x="40" y="180" font-size="9" fill="#888">dispatch + combine</text>
  <g filter="url(#sk)"><rect x="180" y="158" width="564" height="22" rx="3" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/></g>
  <g filter="url(#sk)">
    <rect x="180" y="158" width="94" height="22" rx="2" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/>
    <rect x="274" y="158" width="94" height="22" rx="2" fill="#b85450" stroke="#7a3a3a" stroke-width="1"/>
    <rect x="368" y="158" width="263" height="22" rx="2" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/>
    <rect x="631" y="158" width="113" height="22" rx="2" fill="#b85450" stroke="#7a3a3a" stroke-width="1"/>
  </g>
  <text x="752" y="174" font-size="9" fill="#b85450" font-style="italic">← dispatch 头 + combine 尾</text>

  <!-- ====== Row 3: NVLink RX ====== -->
  <text x="40" y="216" font-size="11" fill="#b85450" font-weight="bold">NVLink RX</text>
  <text x="40" y="230" font-size="9" fill="#888">对应远端 TX</text>
  <g filter="url(#sk)"><rect x="180" y="208" width="564" height="22" rx="3" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/></g>
  <g filter="url(#sk)">
    <rect x="180" y="208" width="94" height="22" rx="2" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/>
    <rect x="274" y="208" width="94" height="22" rx="2" fill="#b85450" stroke="#7a3a3a" stroke-width="1"/>
    <rect x="368" y="208" width="263" height="22" rx="2" fill="#fce4ec" stroke="#eee" stroke-width="0.8"/>
    <rect x="631" y="208" width="113" height="22" rx="2" fill="#b85450" stroke="#7a3a3a" stroke-width="1"/>
  </g>
  <text x="752" y="224" font-size="9" fill="#b85450" font-style="italic">← 对应远端 TX</text>

  <!-- ====== Row 4: HBM ====== -->
  <text x="40" y="266" font-size="11" fill="#4a8edb" font-weight="bold">HBM</text>
  <text x="40" y="280" font-size="9" fill="#888">weight + 写 y</text>
  <g filter="url(#sk)"><rect x="180" y="258" width="564" height="22" rx="3" fill="#e8f0fa" stroke="#eee" stroke-width="0.8"/></g>
  <g filter="url(#sk)">
    <rect x="180" y="258" width="56" height="22" rx="2" fill="#4a8edb" stroke="#2b6e9e" stroke-width="1"/>
    <rect x="236" y="258" width="395" height="22" rx="2" fill="#e8f0fa" stroke="#eee" stroke-width="0.8"/>
    <rect x="631" y="258" width="113" height="22" rx="2" fill="#4a8edb" stroke="#2b6e9e" stroke-width="1"/>
  </g>
  <text x="752" y="274" font-size="9" fill="#4a8edb" font-style="italic">← weight 加载 + 写 y</text>

  <!-- ====== Row 5: SM Active ====== -->
  <text x="40" y="316" font-size="11" fill="#2e6e2e" font-weight="bold">SM Active</text>
  <text x="40" y="330" font-size="9" fill="#888">几乎全程活跃</text>
  <g filter="url(#sk)"><rect x="180" y="308" width="564" height="22" rx="3" fill="#eaf6ee" stroke="#eee" stroke-width="0.8"/></g>
  <g filter="url(#sk)">
    <rect x="180" y="308" width="564" height="22" rx="2" fill="#4a8e4a" stroke="#2e6e2e" stroke-width="1"/>
  </g>
  <text x="752" y="324" font-size="9" fill="#2e6e2e" font-style="italic">← 几乎全程活跃</text>

  <!-- Overlap annotation -->
  <g filter="url(#sk)">
    <path d="M 320 130 L 320 158" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
    <path d="M 500 130 L 500 158" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
  </g>
  <text x="410" y="152" text-anchor="middle" font-size="9" fill="#4a8edb" font-weight="bold">↑ Tensor 与 NVLink overlap ↑</text>

  <!-- Bottom: key insight -->
  <g filter="url(#sk)">
    <rect x="40" y="384" width="820" height="60" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="408" font-size="11" font-weight="bold" fill="#444">PM Sampling 的价值：</text>
  <text x="60" y="428" font-size="10" fill="#444">从时序图能看出 Mega MoE 的"通信/计算 overlap"是否真的生效——</text>
  <text x="60" y="442" font-size="10" fill="#444">Tensor Pipe 与 NVLink TX 的活跃区间应重叠（dispatch 与 L1 GEMM 在 overlap）；若串行则调度有问题。</text>
</svg>
