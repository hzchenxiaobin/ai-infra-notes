<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="242" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Online Softmax 在 Attention 中的应用</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- K/V blocks timeline -->
  <text x="450" y="62" text-anchor="middle" font-size="10" fill="#888">遍历 K/V blocks（内循环）</text>

  <g font-size="8" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="50" y="72" width="120" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="110" y="90" text-anchor="middle">K[0], V[0]</text>

    <g filter="url(#sk)"><rect x="210" y="72" width="120" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
    <text x="270" y="90" text-anchor="middle">K[1], V[1]</text>

    <g filter="url(#sk)"><rect x="370" y="72" width="120" height="28" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
    <text x="430" y="90" text-anchor="middle">K[2], V[2]</text>

    <text x="510" y="90" font-size="7" fill="#888">...</text>

    <g filter="url(#sk)"><rect x="540" y="72" width="120" height="28" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
    <text x="600" y="90" text-anchor="middle">K[N/Bc], V[...]</text>
  </g>

  <!-- State update per block -->
  <!-- Block 0 -->
  <g filter="url(#sk)"><rect x="40" y="120" width="140" height="170" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">处理 Block 0</text>
  <g font-size="8" fill="#444" font-family="monospace">
    <text x="50" y="158">S = Q × K[0]^T</text>
    <text x="50" y="174">m_block = max(S)</text>
    <text x="50" y="190">m_new = max(m_old, m_block)</text>
    <text x="50" y="206">alpha = exp(m_old - m_new)</text>
    <text x="50" y="222">P = exp(S - m_new)</text>
    <text x="50" y="238">l_i = l_i*alpha + sum(P)</text>
    <text x="50" y="254">acc = acc*alpha + P×V[0]</text>
    <text x="50" y="274" fill="#2b6e9e">m=m0, l=l0</text>
  </g>

  <!-- Block 1 -->
  <g filter="url(#sk)"><rect x="200" y="120" width="140" height="170" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="270" y="140" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">处理 Block 1</text>
  <g font-size="8" fill="#444" font-family="monospace">
    <text x="210" y="158">S = Q × K[1]^T</text>
    <text x="210" y="174">m_block = max(S)</text>
    <text x="210" y="190">m_new = max(m0, m_block)</text>
    <text x="210" y="206" fill="#b85450">alpha = exp(m0 - m_new)</text>
    <text x="210" y="222">P = exp(S - m_new)</text>
    <text x="210" y="238">l_i = l_i*alpha + sum(P)</text>
    <text x="210" y="254" fill="#b85450">acc = acc*alpha + P×V[1]</text>
    <text x="210" y="274" fill="#2e6e2e">m=m1, l=l1</text>
  </g>

  <!-- Block 2 -->
  <g filter="url(#sk)"><rect x="360" y="120" width="140" height="170" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="430" y="140" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">处理 Block 2</text>
  <g font-size="8" fill="#444" font-family="monospace">
    <text x="370" y="158">S = Q × K[2]^T</text>
    <text x="370" y="174">m_block = max(S)</text>
    <text x="370" y="190">m_new = max(m1, m_block)</text>
    <text x="370" y="206" fill="#b85450">alpha = exp(m1 - m_new)</text>
    <text x="370" y="222">P = exp(S - m_new)</text>
    <text x="370" y="238">l_i = l_i*alpha + sum(P)</text>
    <text x="370" y="254" fill="#b85450">acc = acc*alpha + P×V[2]</text>
    <text x="370" y="274" fill="#7a5415">m=m2, l=l2</text>
  </g>

  <!-- Final -->
  <g filter="url(#sk)"><rect x="700" y="120" width="160" height="170" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="780" y="140" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">最终输出</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <text x="720" y="164" fill="#b85450" font-weight="bold">O = acc / l_i</text>
    <text x="720" y="186" fill="#888">acc: 累积的 P×V</text>
    <text x="720" y="202" fill="#888">l_i: 全局 sum</text>
    <text x="720" y="226" fill="#888">S, P 全程在</text>
    <text x="720" y="240" fill="#888">Register 中</text>
    <text x="720" y="264" fill="#2e6e2e" font-weight="bold">→ 写 O 到 Global</text>
  </g>

  <!-- Arrows between blocks -->
  <path d="M 180 200 L 200 200" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 340 200 L 360 200" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 500 200 L 700 200" stroke="#5a5a5a" stroke-width="1" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="600" y="194" text-anchor="middle" font-size="7" fill="#888">所有 block 处理完</text>

  <!-- Bottom: key insight -->
  <g filter="url(#sk)"><rect x="40" y="310" width="820" height="90" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="60" y="334" font-size="11" font-weight="bold" fill="#b85450">关键：acc 也要 rescale！</text>
  <g font-size="10" fill="#444">
    <text x="60" y="356">acc = P × V，P 依赖 max 基准。当 max 从 m_old 更新为 m_new 时：</text>
    <text x="60" y="374">acc 必须乘以 exp(m_old - m_new) 来调整到新基准（与 l_i 同步 rescale）</text>
    <text x="60" y="392" fill="#7a5415" font-weight="bold">★ 如果只 rescale l_i 而忘记 rescale acc → 结果错误</text>
  </g>
</svg>
