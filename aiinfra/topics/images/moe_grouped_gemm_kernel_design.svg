<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="99" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">Triton Grouped GEMM Kernel 设计与 tile 分配问题</text>
  <path d="M 280 40 Q 450 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ====== Top: Kernel design (6 steps) ====== -->
  <text x="40" y="78" font-size="13" font-weight="bold" fill="#2b2b2b">① 每个 program 处理一个 tile [BLOCK_M, BLOCK_N]：</text>

  <!-- Step 1 -->
  <g filter="url(#sk)"><rect x="40" y="92" width="820" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="60" y="112" font-size="10" fill="#2b6e9e" font-weight="bold">Step 1</text>
  <text x="120" y="112" font-size="10" fill="#444">根据 program_id 查表找到 (expert_idx, m_block_in_expert, n_block)</text>

  <!-- Step 2 -->
  <g filter="url(#sk)"><rect x="40" y="128" width="820" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="60" y="148" font-size="10" fill="#2e6e2e" font-weight="bold">Step 2</text>
  <text x="120" y="148" font-size="10" fill="#444" font-family="monospace">计算全局 m 偏移 = group_offsets[expert_idx] + m_block * BLOCK_M</text>

  <!-- Step 3 -->
  <g filter="url(#sk)"><rect x="40" y="164" width="820" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="60" y="184" font-size="10" fill="#7a5415" font-weight="bold">Step 3</text>
  <text x="120" y="184" font-size="10" fill="#444" font-family="monospace">加载 x_tile: [BLOCK_M, BLOCK_K]</text>

  <!-- Step 4 -->
  <g filter="url(#sk)"><rect x="40" y="200" width="820" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="60" y="220" font-size="10" fill="#b85450" font-weight="bold">Step 4</text>
  <text x="120" y="220" font-size="10" fill="#444" font-family="monospace">加载 w_tile: [BLOCK_N, BLOCK_K]（从 expert_idx 对应的权重）</text>

  <!-- Step 5 -->
  <g filter="url(#sk)"><rect x="40" y="236" width="820" height="32" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="60" y="256" font-size="10" fill="#5a3a7a" font-weight="bold">Step 5</text>
  <text x="120" y="256" font-size="10" fill="#444" font-family="monospace">tl.dot 累加 K 维</text>

  <!-- Step 6 -->
  <g filter="url(#sk)"><rect x="40" y="272" width="820" height="32" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="60" y="292" font-size="10" fill="#2e6e2e" font-weight="bold">Step 6</text>
  <text x="120" y="292" font-size="10" fill="#444" font-family="monospace">写回 d_tile: [BLOCK_M, BLOCK_N]</text>

  <!-- ====== Middle: tile 分配问题 ====== -->
  <text x="40" y="338" font-size="13" font-weight="bold" fill="#2b2b2b">② 朴素 tile 分配的问题（同一专家的 tile 在 program_id 上连续）：</text>

  <!-- program_id bar -->
  <g filter="url(#sk)"><rect x="60" y="354" width="240" height="36" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="180" y="372" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">expert 0 的 tile</text>
  <text x="180" y="384" text-anchor="middle" font-size="8" fill="#888" font-family="monospace">program_id: 0..E0_tiles-1</text>

  <g filter="url(#sk)"><rect x="310" y="354" width="200" height="36" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="410" y="372" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">expert 1 的 tile</text>
  <text x="410" y="384" text-anchor="middle" font-size="8" fill="#888" font-family="monospace">E0_tiles..E0+E1-1</text>

  <text x="540" y="376" font-size="14" fill="#888" font-weight="bold">. . .</text>

  <!-- problem annotations -->
  <g font-size="9" fill="#b85450">
    <text x="60" y="410" font-weight="bold">问题：</text>
    <text x="110" y="410">同一专家的 tile 集中在相邻 program_id</text>
    <text x="60" y="426">→ GPU 调度器把相邻 program_id 分到相邻 SM</text>
    <text x="60" y="442">→ 同一专家的权重 [N, K] 被多个 SM 重复加载</text>
    <text x="60" y="458">→ L2 缓存被其他专家挤出，命中率下降</text>
  </g>

  <!-- ====== Bottom: Swizzle solution ====== -->
  <g filter="url(#sk)">
    <rect x="40" y="476" width="820" height="72" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4" stroke-dasharray="4 2"/>
  </g>
  <text x="60" y="500" font-size="12" font-weight="bold" fill="#2e6e2e">L2 友好的 Swizzle 解决方案：</text>
  <text x="60" y="520" font-size="10" fill="#444">组内沿 N 排开（复用 A），组间沿 M 推进——相邻 program_id 的 tile 共享 A 的同一块、用 B 的不同块</text>
  <text x="60" y="538" font-size="10" fill="#888" font-style="italic">借鉴 DeepGEMM Day 4 的 kNum1DBlocksPerGroup ∈ {8, 16}，下一轮换 A 块时 L2 还保留着上一轮的 B</text>
</svg>
