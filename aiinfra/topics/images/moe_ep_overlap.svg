<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="88" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">DeepSeek-V2 通信/计算 Overlap：共享专家 ‖ Dispatch</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="40" y="78" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="80" y1="74" x2="820" y2="74" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>

  <!-- ====== Lane 1: 共享专家（与 dispatch overlap） ====== -->
  <text x="40" y="108" font-size="11" fill="#2e6e2e" font-weight="bold">共享专家</text>
  <text x="40" y="122" font-size="9" fill="#888">稠密计算</text>

  <g filter="url(#sk)"><rect x="100" y="92" width="320" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="260" y="110" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">共享专家计算（所有 token 必过）</text>
  <text x="260" y="124" text-anchor="middle" font-size="9" fill="#888">不依赖 dispatch，可与通信 overlap</text>

  <!-- ====== Lane 2: Dispatch all-to-all ====== -->
  <text x="40" y="170" font-size="11" fill="#b85450" font-weight="bold">Dispatch</text>
  <text x="40" y="184" font-size="9" fill="#888">all-to-all</text>

  <g filter="url(#sk)"><rect x="100" y="154" width="320" height="48" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="260" y="172" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">Dispatch all-to-all</text>
  <text x="260" y="186" text-anchor="middle" font-size="9" fill="#888">发送 token 到远端卡 / 接收远端 token</text>
  <text x="260" y="198" text-anchor="middle" font-size="8" fill="#aaa" font-style="italic">NCCL 通信 stream</text>

  <!-- overlap region indicator -->
  <g filter="url(#sk)">
    <path d="M 100 132 L 100 154" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
    <path d="M 420 132 L 420 154" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
  </g>
  <g filter="url(#sk)">
    <rect x="100" y="210" width="320" height="22" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="260" y="225" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">↑ overlap 区间：通信藏进共享专家计算 ↑</text>

  <!-- arrow after overlap -->
  <path d="M 420 174 L 440 174" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ====== Lane 1 continued: shared output ready -->
  <g filter="url(#sk)"><rect x="440" y="92" width="80" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" stroke-dasharray="3 2"/></g>
  <text x="480" y="116" text-anchor="middle" font-size="9" fill="#2e6e2e">shared_out</text>

  <!-- ====== Lane 2 continued: dispatch done, routed experts begin ====== -->
  <g filter="url(#sk)"><rect x="440" y="154" width="240" height="48" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="560" y="172" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">路由专家 Grouped GEMM</text>
  <text x="560" y="186" text-anchor="middle" font-size="9" fill="#888">等 dispatch 完成（需要接收到的 token）</text>
  <text x="560" y="198" text-anchor="middle" font-size="8" fill="#aaa" font-style="italic">默认 stream</text>

  <path d="M 680 178 L 700 178" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ====== Combine all-to-all ====== -->
  <g filter="url(#sk)"><rect x="700" y="154" width="120" height="48" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="760" y="172" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">Combine</text>
  <text x="760" y="186" text-anchor="middle" font-size="9" fill="#888">all-to-all 反向</text>

  <!-- ====== Bottom: stream-level overlap explanation ====== -->
  <g filter="url(#sk)">
    <rect x="40" y="270" width="800" height="190" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="294" font-size="12" font-weight="bold" fill="#444">Overlap 的工程实现：</text>

  <text x="60" y="318" font-size="10" fill="#b85450" font-weight="bold">Megatron-LM（stream 级）</text>
  <text x="240" y="318" font-size="10" fill="#444">一个 CUDA stream 跑 dispatch（NCCL 通信）</text>
  <text x="60" y="336" font-size="10" fill="#2e6e2e" font-weight="bold">共享专家（默认 stream）</text>
  <text x="240" y="336" font-size="10" fill="#444">另一个 stream 跑共享专家 GEMM，两个 stream 并发</text>
  <text x="60" y="354" font-size="10" fill="#7a5415" font-weight="bold">路由专家（默认 stream）</text>
  <text x="240" y="354" font-size="10" fill="#444">wait_stream(dispatch) 后跑路由专家 GEMM</text>

  <line x1="60" y1="370" x2="820" y2="370" stroke="#eee" stroke-width="1"/>

  <text x="60" y="392" font-size="10" fill="#5a3a7a" font-weight="bold">DeepGEMM Mega MoE（warp 级，更细粒度）</text>
  <text x="60" y="410" font-size="10" fill="#444">单 kernel 内 warp specialization：dispatch warp 拉远端 token 时，MMA warp 算上一个 expert</text>
  <text x="60" y="426" font-size="10" fill="#444">通信与计算在 warp 级 overlap，比 stream 级更充分，但实现复杂度更高</text>
  <text x="60" y="446" font-size="10" fill="#888" font-style="italic">两种粒度：Megatron stream 级 vs DeepGEMM warp 级（Day 6 详讲）</text>
</svg>
