<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="66" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">DeepGEMM 双 Barrier 流水线：TMA warpgroup × Math warpgroup</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="40" y="72" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="80" y1="68" x2="860" y2="68" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>

  <!-- TMA warpgroup lane -->
  <text x="40" y="110" font-size="12" fill="#b85450" font-weight="bold">TMA wg</text>
  <text x="40" y="124" font-size="9" fill="#888">producer</text>

  <!-- TMA stage 0 -->
  <g filter="url(#sk)"><rect x="90" y="92" width="120" height="44" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="150" y="110" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">TMA load</text>
  <text x="150" y="124" text-anchor="middle" font-size="8" fill="#888">stage 0: A,B,SFA,SFB</text>

  <!-- arrive full[0] -->
  <path d="M 210 114 L 240 114" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="225" y="108" text-anchor="middle" font-size="7" fill="#b85450">arrive</text>
  <text x="225" y="130" text-anchor="middle" font-size="7" fill="#b85450">full[0]</text>

  <!-- TMA stage 1 -->
  <g filter="url(#sk)"><rect x="240" y="92" width="120" height="44" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="300" y="110" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">TMA load</text>
  <text x="300" y="124" text-anchor="middle" font-size="8" fill="#888">stage 1</text>

  <path d="M 360 114 L 390 114" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="375" y="108" text-anchor="middle" font-size="7" fill="#b85450">arrive</text>
  <text x="375" y="130" text-anchor="middle" font-size="7" fill="#b85450">full[1]</text>

  <!-- TMA wait empty[0] -->
  <g filter="url(#sk)"><rect x="390" y="92" width="100" height="44" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3 2"/></g>
  <text x="440" y="110" text-anchor="middle" font-size="9" fill="#888">wait</text>
  <text x="440" y="124" text-anchor="middle" font-size="8" fill="#888">empty[0]</text>

  <!-- TMA stage 0' (reuse) -->
  <g filter="url(#sk)"><rect x="490" y="92" width="120" height="44" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="550" y="110" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">TMA load</text>
  <text x="550" y="124" text-anchor="middle" font-size="8" fill="#888">stage 0' (reuse)</text>

  <path d="M 610 114 L 640 114" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="625" y="108" text-anchor="middle" font-size="7" fill="#b85450">arrive</text>
  <text x="625" y="130" text-anchor="middle" font-size="7" fill="#b85450">full[0]</text>

  <g filter="url(#sk)"><rect x="640" y="92" width="120" height="44" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="700" y="110" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">TMA load</text>
  <text x="700" y="124" text-anchor="middle" font-size="8" fill="#888">stage 1'</text>

  <!-- Math warpgroup lane -->
  <text x="40" y="186" font-size="12" fill="#2e6e2e" font-weight="bold">Math wg</text>
  <text x="40" y="200" font-size="9" fill="#888">consumer</text>

  <!-- Math idle (waiting for stage 0) -->
  <g filter="url(#sk)"><rect x="90" y="168" width="120" height="44" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3 2"/></g>
  <text x="150" y="186" text-anchor="middle" font-size="9" fill="#888">wait</text>
  <text x="150" y="200" text-anchor="middle" font-size="8" fill="#888">full[0]</text>

  <!-- Math compute stage 0 -->
  <g filter="url(#sk)"><rect x="240" y="168" width="150" height="44" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="315" y="186" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">WGMMA + scale</text>
  <text x="315" y="200" text-anchor="middle" font-size="8" fill="#888">stage 0: 4×wgmma + sf mul</text>

  <!-- arrive empty[0] -->
  <path d="M 390 190 L 420 190" stroke="#2e6e2e" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="405" y="184" text-anchor="middle" font-size="7" fill="#2e6e2e">arrive</text>
  <text x="405" y="206" text-anchor="middle" font-size="7" fill="#2e6e2e">empty[0]</text>

  <!-- Math compute stage 1 -->
  <g filter="url(#sk)"><rect x="420" y="168" width="150" height="44" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="495" y="186" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">WGMMA + scale</text>
  <text x="495" y="200" text-anchor="middle" font-size="8" fill="#888">stage 1</text>

  <path d="M 570 190 L 600 190" stroke="#2e6e2e" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="585" y="184" text-anchor="middle" font-size="7" fill="#2e6e2e">arrive</text>
  <text x="585" y="206" text-anchor="middle" font-size="7" fill="#2e6e2e">empty[1]</text>

  <!-- Math compute stage 0' -->
  <g filter="url(#sk)"><rect x="600" y="168" width="150" height="44" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="675" y="186" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">WGMMA + scale</text>
  <text x="675" y="200" text-anchor="middle" font-size="8" fill="#888">stage 0'</text>

  <!-- Overlap annotation -->
  <g filter="url(#sk)">
    <path d="M 300 142 L 300 168" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
    <path d="M 550 142 L 550 168" stroke="#4a8edb" stroke-width="1.2" fill="none" stroke-dasharray="3 2"/>
  </g>
  <text x="425" y="158" text-anchor="middle" font-size="9" fill="#4a8edb" font-weight="bold">↑ overlap：TMA 搬 stage N+1 时 Math 算 stage N ↑</text>

  <!-- Barrier table -->
  <g filter="url(#sk)">
    <rect x="40" y="240" width="820" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="264" font-size="12" font-weight="bold" fill="#444">双 Barrier 设计：</text>

  <text x="60" y="288" font-size="10" fill="#b85450" font-weight="bold">full_barriers[stage]</text>
  <text x="220" y="288" font-size="10" fill="#444">TMA arrive_and_expect_tx → Math wait</text>
  <text x="540" y="288" font-size="10" fill="#888">"数据已满，可算"</text>

  <text x="60" y="310" font-size="10" fill="#2e6e2e" font-weight="bold">empty_barriers[stage]</text>
  <text x="220" y="310" font-size="10" fill="#444">Math arrive → TMA wait</text>
  <text x="540" y="310" font-size="10" fill="#888">"数据用完，可覆盖"</text>

  <text x="60" y="332" font-size="10" fill="#7a5415" font-weight="bold">关键：</text>
  <text x="120" y="332" font-size="10" fill="#444">两者完全解耦，流水线深度 = kNumStages（典型 3-4 stage），谁不等谁</text>

  <!-- SMEM layout -->
  <g filter="url(#sk)">
    <rect x="40" y="360" width="820" height="104" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2" stroke-dasharray="4 2"/>
  </g>
  <text x="60" y="384" font-size="12" font-weight="bold" fill="#5a3a7a">SMEM 布局（kNumStages=3）：</text>

  <g font-size="9" fill="#444" font-family="monospace">
    <text x="60" y="406">┌──────────┬───────┬───────────────────────────┬───────────────────┐</text>
    <text x="60" y="420">│ D (out)  │ A×3   │ B×3   │ SFA×3  │ SFB×3  │ full_bar[3] + empty_bar[3] │</text>
    <text x="60" y="434">│ M×N×FP32 │ stage │ stage │ stage  │ stage  │  mbarrier 对               │</text>
    <text x="60" y="448">└──────────┴───────┴───────────────────────────┴───────────────────┘</text>
  </g>
  <text x="60" y="460" font-size="9" fill="#5a3a7a" font-style="italic">scale factor 也在 SMEM 流水线中——scale 读取与 WGMMA 完全 overlap</text>
</svg>
