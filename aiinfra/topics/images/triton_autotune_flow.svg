<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="233" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">@triton.autotune 运行时搜索流程</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1: First call -->
  <g filter="url(#sk)"><rect x="30" y="60" width="180" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="120" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">① 首次调用</text>
  <text x="120" y="98" text-anchor="middle" font-size="9" fill="#555">kernel[grid](args)</text>
  <text x="120" y="112" text-anchor="middle" font-size="8" fill="#888">key=(M,N,K)</text>

  <path d="M 210 90 L 250 90" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 2: Try configs -->
  <g filter="url(#sk)"><rect x="250" y="60" width="200" height="60" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="350" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">② 遍历所有 configs</text>
  <text x="350" y="98" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">Config 1: 128x256x64</text>
  <text x="350" y="112" text-anchor="middle" font-size="8" fill="#555" font-family="monospace">Config 2: 64x128x32 ...</text>

  <path d="M 450 90 L 490 90" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 3: Measure -->
  <g filter="url(#sk)"><rect x="490" y="60" width="170" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="575" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">③ 测量时间</text>
  <text x="575" y="98" text-anchor="middle" font-size="9" fill="#555">每个 config 运行</text>
  <text x="575" y="112" text-anchor="middle" font-size="8" fill="#888">取最快</text>

  <path d="M 660 90 L 700 90" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 4: Cache -->
  <g filter="url(#sk)"><rect x="700" y="60" width="170" height="60" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="785" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">④ 缓存最优</text>
  <text x="785" y="98" text-anchor="middle" font-size="8" fill="#555">按 key=(M,N,K)</text>
  <text x="785" y="112" text-anchor="middle" font-size="8" fill="#888">~/.triton/cache/</text>

  <!-- Step 5: Subsequent calls -->
  <path d="M 785 120 Q 785 150 500 150 Q 120 150 120 130" stroke="#2e6e2e" stroke-width="1.4" fill="none" stroke-dasharray="4 2" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="450" y="146" text-anchor="middle" font-size="9" fill="#2e6e2e">⑤ 后续调用（相同 key）→ 直接用缓存</text>

  <!-- Comparison table -->
  <g filter="url(#sk)"><rect x="30" y="170" width="840" height="190" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="50" y="194" font-size="12" font-weight="bold" fill="#444">Triton autotune vs CUTLASS CollectiveBuilder：</text>

  <g font-size="10" fill="#444">
    <text x="50" y="218" fill="#2e6e2e" font-weight="bold">维度           Triton @autotune        CUTLASS CollectiveBuilder</text>
    <text x="50" y="238">搜索时机       运行时（首次调用）       编译期（nvcc 编译）</text>
    <text x="50" y="256">搜索空间       给定 configs 列表         全部组合（Tile×Stages×MMA）</text>
    <text x="50" y="274">缓存           按 key (M,N,K) 缓存       无（编译期固定）</text>
    <text x="50" y="292">灵活性         不同尺寸可选不同配置      编译后不可变</text>
    <text x="50" y="310">首次开销       慢（需搜索）              无</text>
    <text x="50" y="328">后续开销       零（缓存命中）            零</text>
  </g>

  <text x="50" y="350" font-size="10" fill="#7a5415" font-weight="bold">★ Triton 更灵活（运行时适配不同尺寸），CUTLASS 更可预测（编译期确定）</text>
</svg>
