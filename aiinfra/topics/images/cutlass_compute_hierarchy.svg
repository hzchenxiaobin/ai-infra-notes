<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="680" height="420" fill="#fdfcf7"/>

  <text x="340" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS 三级计算层级</text>
  <path d="M 200 42 Q 340 50 480 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Threadblock (outer) -->
  <g filter="url(#sk)">
    <rect x="30" y="64" width="620" height="320" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="340" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">Threadblock 级（Grid 的一个 block）</text>
  <text x="340" y="112" text-anchor="middle" font-size="11" fill="#555">处理 M_tile × N_tile × K 的分块　|　Global → Shared Memory</text>

  <!-- Warp (middle) -->
  <g filter="url(#sk)">
    <rect x="80" y="134" width="520" height="230" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="340" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">Warp 级（block 内的一个 warp）</text>
  <text x="340" y="182" text-anchor="middle" font-size="11" fill="#555">处理 M_warp × N_warp × K_tile 的分块　|　Shared → Register</text>

  <!-- Thread (inner) -->
  <g filter="url(#sk)">
    <rect x="140" y="204" width="400" height="130" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
  </g>
  <text x="340" y="232" text-anchor="middle" font-size="14" font-weight="bold" fill="#b85450">Thread 级（warp 内的一个线程）</text>
  <text x="340" y="252" text-anchor="middle" font-size="11" fill="#555">处理 M_thread × N_thread</text>
  <text x="340" y="278" text-anchor="middle" font-size="11" fill="#555">用 mma.m16n8k16 指令</text>
  <text x="340" y="304" text-anchor="middle" font-size="10" fill="#888">Register 级累加</text>

  <!-- Bottom note -->
  <text x="340" y="404" text-anchor="middle" font-size="10" fill="#888">三级嵌套匹配 GPU 硬件层级：SM（Threadblock）→ Warp → Thread</text>
</svg>
