<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="27" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">CUTLASS 版本演进与架构对比</text>
  <path d="M 290 40 Q 460 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Timeline arrow -->
  <line x1="60" y1="80" x2="860" y2="80" stroke="#bbb" stroke-width="1.5" filter="url(#sk)"/>
  <text x="60" y="72" font-size="10" fill="#888">2017</text>
  <text x="340" y="72" font-size="10" fill="#888">2022</text>
  <text x="560" y="72" font-size="10" fill="#888">2023</text>
  <text x="780" y="72" font-size="10" fill="#888">2024+</text>

  <!-- Version markers -->
  <circle cx="80" cy="80" r="5" fill="#4a8edb" filter="url(#sk)"/>
  <circle cx="360" cy="80" r="5" fill="#4a8e4a" filter="url(#sk)"/>
  <circle cx="580" cy="80" r="5" fill="#c98a2b" filter="url(#sk)"/>
  <circle cx="800" cy="80" r="5" fill="#b85450" filter="url(#sk)"/>

  <!-- 2.x box -->
  <g filter="url(#sk)">
    <rect x="40" y="100" width="380" height="150" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="230" y="124" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e6e2e">CUTLASS 2.x</text>
  <text x="230" y="142" text-anchor="middle" font-size="11" fill="#555">三层抽象：Threadblock → Warp → Thread</text>

  <!-- 2.x hierarchy -->
  <g filter="url(#sk)">
    <rect x="60" y="154" width="340" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="230" y="172" text-anchor="middle" font-size="10" fill="#2b6e9e">Threadblock（SM 级：Global → Shared）</text>

  <g filter="url(#sk)">
    <rect x="90" y="186" width="280" height="28" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="230" y="204" text-anchor="middle" font-size="10" fill="#7a5415">Warp（Warp 级：Shared → Register + MMA）</text>

  <g filter="url(#sk)">
    <rect x="120" y="218" width="220" height="24" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="230" y="234" text-anchor="middle" font-size="10" fill="#b85450">Thread（Register 级累加）</text>

  <!-- 3.x box -->
  <g filter="url(#sk)">
    <rect x="480" y="100" width="400" height="150" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="680" y="124" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5415">CUTLASS 3.x</text>
  <text x="680" y="142" text-anchor="middle" font-size="11" fill="#555">CuTe 模型 + CollectiveBuilder</text>

  <!-- 3.x components -->
  <g filter="url(#sk)">
    <rect x="500" y="154" width="170" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="585" y="176" text-anchor="middle" font-size="10" fill="#2b6e9e">CuTe Layout（Shape + Stride）</text>

  <g filter="url(#sk)">
    <rect x="690" y="154" width="170" height="36" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="775" y="176" text-anchor="middle" font-size="10" fill="#2e6e2e">CuTe Tensor（数据 + Layout）</text>

  <g filter="url(#sk)">
    <rect x="500" y="198" width="170" height="36" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="585" y="220" text-anchor="middle" font-size="10" fill="#b85450">CollectiveBuilder（auto-tuning）</text>

  <g filter="url(#sk)">
    <rect x="690" y="198" width="170" height="36" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/>
  </g>
  <text x="775" y="220" text-anchor="middle" font-size="10" fill="#5a3a7a">TMA / WGMMA（Hopper+）</text>

  <!-- Comparison table -->
  <g filter="url(#sk)">
    <rect x="40" y="270" width="840" height="150" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="294" font-size="13" font-weight="bold" fill="#444">核心差异对比：</text>

  <g font-size="11" fill="#444">
    <text x="60" y="316" fill="#2e6e2e" font-weight="bold">2.x：</text>
    <text x="100" y="316">手动指定每层 TileShape → 手写索引 offset → cp.async 手动管理</text>
    <text x="60" y="336" fill="#2e6e2e" font-weight="bold">     </text>
    <text x="100" y="336">代码量大（模板参数爆炸），但存量项目多（vLLM / TensorRT）</text>

    <text x="60" y="362" fill="#7a5415" font-weight="bold">3.x：</text>
    <text x="100" y="362">CuTe Layout/Tensor 声明式访问 → Builder 自动选 kernel → TMA 自动</text>
    <text x="60" y="382" fill="#7a5415" font-weight="bold">     </text>
    <text x="100" y="382">代码量少，开发快，新项目首选，但 API 仍在演进中</text>

    <text x="60" y="408" fill="#b85450" font-weight="bold">★ 共存策略：</text>
    <text x="180" y="408">3.x 做新开发，2.x 读旧代码，两者共存而非替代</text>
  </g>

  <!-- Arrow from 2.x to 3.x -->
  <path d="M 420 175 L 470 175" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="445" y="168" text-anchor="middle" font-size="9" fill="#888">演进</text>
</svg>
