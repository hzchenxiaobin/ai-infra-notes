<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="211" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">2D Block Pointer：声明式访问矩阵子块</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Full matrix grid -->
  <text x="200" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#888">矩阵 A (M × N) = (8 × 8)</text>
  <g font-size="8" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="60" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="100" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="140" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="180" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <text x="230" y="88" font-size="7" fill="#888">...</text>
    <g filter="url(#sk)"><rect x="260" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="300" y="72" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>

    <!-- Highlighted block (BLOCK_M=4, BLOCK_N=4) at offset (4, 0) -->
    <g filter="url(#sk)"><rect x="60" y="100" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="100" y="100" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="140" y="100" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>
    <g filter="url(#sk)"><rect x="180" y="100" width="40" height="28" rx="2" fill="#fff" stroke="#ddd" stroke-width="0.6"/></g>

    <!-- Block at offset (4, 0) -->
    <g filter="url(#sk)"><rect x="60" y="128" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <text x="80" y="146" text-anchor="middle">A[4,0]</text>
    <g filter="url(#sk)"><rect x="100" y="128" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <text x="120" y="146" text-anchor="middle">A[4,1]</text>
    <g filter="url(#sk)"><rect x="140" y="128" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <text x="160" y="146" text-anchor="middle">A[4,2]</text>
    <g filter="url(#sk)"><rect x="180" y="128" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <text x="200" y="146" text-anchor="middle">A[4,3]</text>

    <g filter="url(#sk)"><rect x="60" y="156" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <g filter="url(#sk)"><rect x="100" y="156" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <g filter="url(#sk)"><rect x="140" y="156" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
    <g filter="url(#sk)"><rect x="180" y="156" width="40" height="28" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>

    <!-- Block outline -->
    <g filter="url(#sk)"><rect x="58" y="126" width="164" height="60" rx="3" fill="none" stroke="#4a8edb" stroke-width="2" stroke-dasharray="5 2"/></g>
    <text x="140" y="200" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">block_shape=(4,4) at offsets=(4,0)</text>
  </g>

  <!-- Arrow to code -->
  <path d="M 330 156 L 400 156" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="365" y="150" text-anchor="middle" font-size="8" fill="#888">tl.make_block_ptr</text>

  <!-- Code box -->
  <g filter="url(#sk)">
    <rect x="400" y="62" width="480" height="200" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
  <text x="420" y="84" font-size="9" fill="#444" font-family="monospace">a_block_ptr = tl.make_block_ptr(</text>
  <text x="440" y="100" font-size="9" fill="#2e6e2e" font-family="monospace">base=a_ptr,</text>
  <text x="440" y="116" font-size="9" fill="#2b6e9e" font-family="monospace">shape=(M, N),</text>
  <text x="440" y="132" font-size="9" fill="#7a5415" font-family="monospace">strides=(stride_m, stride_n),</text>
  <text x="440" y="148" font-size="9" fill="#b85450" font-family="monospace">offsets=(pid_m*BLOCK_M, 0),</text>
  <text x="440" y="164" font-size="9" fill="#5a3a7a" font-family="monospace">block_shape=(BLOCK_M, BLOCK_N),</text>
  <text x="440" y="180" font-size="9" fill="#4a8e4a" font-family="monospace">order=(1, 0),  # RowMajor</text>
  <text x="420" y="196" font-size="9" fill="#444" font-family="monospace">)</text>

  <text x="420" y="222" font-size="9" fill="#2b6e2e" font-family="monospace">x = tl.load(a_block_ptr)  # 加载子块</text>
  <text x="420" y="238" font-size="9" fill="#7a5415" font-family="monospace">a_block_ptr = tl.advance(a_block_ptr, (0, BLOCK_K))</text>
  <text x="420" y="254" font-size="9" fill="#888" font-family="monospace"># 移动到下一个子块</text>

  <!-- Parameter table -->
  <g filter="url(#sk)">
    <rect x="60" y="280" width="820" height="140" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="304" font-size="12" font-weight="bold" fill="#2e6e2e">参数详解：</text>

  <g font-size="10" fill="#444">
    <text x="80" y="324" fill="#2e6e2e" font-weight="bold">base</text>
    <text x="140" y="324">矩阵起始地址（PyTorch tensor 的 .data_ptr()）</text>
    <text x="80" y="342" fill="#2b6e9e" font-weight="bold">shape</text>
    <text x="140" y="342">矩阵完整形状 (M, N) —— 用于边界检查</text>
    <text x="80" y="360" fill="#7a5415" font-weight="bold">strides</text>
    <text x="140" y="360">步长：RowMajor=(N,1)，ColMajor=(1,M)</text>
    <text x="80" y="378" fill="#b85450" font-weight="bold">offsets</text>
    <text x="140" y="378">当前子块的起始坐标 (pid_m*BLOCK_M, pid_n*BLOCK_N)</text>
    <text x="80" y="396" fill="#5a3a7a" font-weight="bold">block_shape</text>
    <text x="160" y="396">子块大小 (BLOCK_M, BLOCK_N)</text>
    <text x="80" y="414" fill="#4a8e4a" font-weight="bold">order</text>
    <text x="140" y="414">(1,0)=RowMajor  (0,1)=ColMajor —— 决定向量化加载策略</text>
  </g>
</svg>
