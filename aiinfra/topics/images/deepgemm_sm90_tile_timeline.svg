<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="88" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="960" height="620" fill="#fdfcf7"/>

  <text x="480" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">单 tile 时序图（kNumStages=3，num_k_blocks=6）</text>
  <path d="M 280 40 Q 480 48 680 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="50" y="72" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="80" y1="68" x2="900" y2="68" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3" filter="url(#sk)"/>

  <!-- iter labels -->
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="155" y="60">iter 0</text>
    <text x="285" y="60">iter 1</text>
    <text x="415" y="60">iter 2</text>
    <text x="545" y="60">iter 3</text>
    <text x="675" y="60">iter 4</text>
    <text x="805" y="60">iter 5</text>
  </g>
  <!-- vertical guides -->
  <g stroke="#eee" stroke-width="1" filter="url(#sk)">
    <line x1="220" y1="68" x2="220" y2="500"/>
    <line x1="350" y1="68" x2="350" y2="500"/>
    <line x1="480" y1="68" x2="480" y2="500"/>
    <line x1="610" y1="68" x2="610" y2="500"/>
    <line x1="740" y1="68" x2="740" y2="500"/>
  </g>

  <!-- ====== Lane 1: TMA warpgroup ====== -->
  <text x="50" y="108" font-size="12" fill="#b85450" font-weight="bold">TMA wg</text>
  <text x="50" y="122" font-size="9" fill="#888">1 thread elect</text>

  <!-- iter 0: stage 0 -->
  <g filter="url(#sk)"><rect x="90" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="155" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[0])</text>
  <text x="155" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 0</text>
  <text x="155" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[0])</text>

  <!-- iter 1: stage 1 -->
  <g filter="url(#sk)"><rect x="220" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="285" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[1])</text>
  <text x="285" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 1</text>
  <text x="285" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[1])</text>

  <!-- iter 2: stage 2 -->
  <g filter="url(#sk)"><rect x="350" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="415" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[2])</text>
  <text x="415" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 2</text>
  <text x="415" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[2])</text>

  <!-- iter 3: reuse stage 0 -->
  <g filter="url(#sk)"><rect x="480" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="3 2"/></g>
  <text x="545" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[0])</text>
  <text x="545" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 0'</text>
  <text x="545" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[0])</text>

  <!-- iter 4: reuse stage 1 -->
  <g filter="url(#sk)"><rect x="610" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="3 2"/></g>
  <text x="675" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[1])</text>
  <text x="675" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 1'</text>
  <text x="675" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[1])</text>

  <!-- iter 5: reuse stage 2 -->
  <g filter="url(#sk)"><rect x="740" y="92" width="130" height="40" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="3 2"/></g>
  <text x="805" y="110" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">wait(empty[2])</text>
  <text x="805" y="124" text-anchor="middle" font-size="8" fill="#888">TMA → stage 2'</text>
  <text x="805" y="136" text-anchor="middle" font-size="8" fill="#b85450">arrive(full[2])</text>

  <!-- ====== Lane 2: Math warpgroup ====== -->
  <text x="50" y="208" font-size="12" fill="#2e6e2e" font-weight="bold">Math wg</text>
  <text x="50" y="222" font-size="9" fill="#888">128/256 threads</text>

  <!-- iter 0 -->
  <g filter="url(#sk)"><rect x="90" y="192" width="130" height="56" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="155" y="210" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">wait(full[0])</text>
  <text x="155" y="224" text-anchor="middle" font-size="8" fill="#444">ld_shared(SF)</text>
  <text x="155" y="236" text-anchor="middle" font-size="8" fill="#444">WGMMA×4</text>
  <text x="155" y="246" text-anchor="middle" font-size="8" fill="#2e6e2e">arrive(empty[0])</text>

  <!-- iter 1 -->
  <g filter="url(#sk)"><rect x="220" y="192" width="130" height="56" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="285" y="210" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">wait(full[1])</text>
  <text x="285" y="224" text-anchor="middle" font-size="8" fill="#444">ld_shared(SF)</text>
  <text x="285" y="236" text-anchor="middle" font-size="8" fill="#444">WGMMA×4</text>
  <text x="285" y="246" text-anchor="middle" font-size="8" fill="#2e6e2e">arrive(empty[1])</text>

  <!-- ellipsis -->
  <text x="415" y="224" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">. . .</text>

  <!-- iter 5 -->
  <g filter="url(#sk)"><rect x="740" y="192" width="130" height="56" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="805" y="210" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">wait(full[2])</text>
  <text x="805" y="224" text-anchor="middle" font-size="8" fill="#444">WGMMA×4</text>
  <text x="805" y="236" text-anchor="middle" font-size="8" fill="#444">arrive(empty[2])</text>
  <text x="805" y="246" text-anchor="middle" font-size="8" fill="#2e6e2e">promote scales</text>

  <!-- promote label below math -->
  <text x="155" y="266" text-anchor="middle" font-size="8" fill="#7a5415" font-style="italic">promote with scales</text>
  <text x="285" y="266" text-anchor="middle" font-size="8" fill="#7a5415" font-style="italic">promote with scales</text>
  <text x="805" y="266" text-anchor="middle" font-size="8" fill="#7a5415" font-style="italic">promote with scales</text>

  <!-- overlap annotation between TMA and Math -->
  <g filter="url(#sk)">
    <path d="M 220 132 L 220 192" stroke="#4a8edb" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <path d="M 350 132 L 350 192" stroke="#4a8edb" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
  </g>
  <text x="285" y="170" text-anchor="middle" font-size="9" fill="#4a8edb" font-weight="bold">↑ overlap：TMA 搬 stage N+1 时 Math 算 stage N ↑</text>

  <!-- ====== Lane 3: Epilogue (tile 结束后) ====== -->
  <text x="50" y="316" font-size="12" fill="#5a3a7a" font-weight="bold">Epilogue</text>
  <text x="50" y="330" font-size="9" fill="#888">tile 结束后</text>

  <g filter="url(#sk)"><rect x="90" y="300" width="780" height="100" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>

  <!-- 5 steps inside epilogue -->
  <g filter="url(#sk)"><rect x="110" y="316" width="140" height="40" rx="4" fill="#fff" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="180" y="334" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">tma_store_wait&lt;0&gt;</text>
  <text x="180" y="348" text-anchor="middle" font-size="8" fill="#888">等上一 tile store</text>

  <path d="M 250 336 L 268 336" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="270" y="316" width="140" height="40" rx="4" fill="#fff" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="340" y="334" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">st_shared</text>
  <text x="340" y="348" text-anchor="middle" font-size="8" fill="#888">final_accum → smem_d</text>

  <path d="M 410 336 L 428 336" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="430" y="316" width="140" height="40" rx="4" fill="#fff" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="500" y="334" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">tma_store_fence</text>
  <text x="500" y="348" text-anchor="middle" font-size="8" fill="#888">+ NamedBarrier sync</text>

  <path d="M 570 336 L 588 336" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="590" y="316" width="160" height="40" rx="4" fill="#fff" stroke="#8e5db8" stroke-width="1.4"/></g>
  <text x="670" y="334" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">SM90_TMA_REDUCE_ADD_2D</text>
  <text x="670" y="348" text-anchor="middle" font-size="8" fill="#888">smem_d → gmem_d</text>

  <path d="M 750 336 L 768 336" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)"><rect x="770" y="316" width="100" height="40" rx="4" fill="#fff" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="820" y="334" text-anchor="middle" font-size="9" fill="#5a3a7a" font-weight="bold">tma_store_arrive</text>
  <text x="820" y="348" text-anchor="middle" font-size="8" fill="#888">+ __syncwarp</text>

  <text x="480" y="384" text-anchor="middle" font-size="9" fill="#5a3a7a" font-style="italic">5 步流程：wait → st_shared → fence+sync → REDUCE_ADD → arrive</text>

  <!-- ====== Bottom: barrier handshake table ====== -->
  <g filter="url(#sk)">
    <rect x="40" y="420" width="880" height="180" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="444" font-size="12" font-weight="bold" fill="#444">完整 barrier 握手点（验收标准 ① 的核心）：</text>

  <g font-size="10">
    <text x="60" y="468" fill="#b85450" font-weight="bold">full_barriers[stage]</text>
    <text x="240" y="468" fill="#444">TMA arrive_and_expect_tx → Math wait(phase)</text>
    <text x="560" y="468" fill="#888">"数据已满，可算"</text>
    <text x="730" y="468" fill="#888" font-style="italic">流水线内</text>

    <text x="60" y="490" fill="#2e6e2e" font-weight="bold">empty_barriers[stage]</text>
    <text x="240" y="490" fill="#444">Math arrive(target_cta) → TMA wait(phase^1)</text>
    <text x="560" y="490" fill="#888">"数据用完，可覆盖"</text>
    <text x="730" y="490" fill="#888" font-style="italic">流水线内</text>

    <text x="60" y="512" fill="#5a3a7a" font-weight="bold">NamedBarrier(math_wg_idx)</text>
    <text x="240" y="512" fill="#444">Math wg 128 threads sync</text>
    <text x="560" y="512" fill="#888">tma_store_wait 后 / st_shared 后</text>
    <text x="730" y="512" fill="#888" font-style="italic">Epilogue 内</text>

    <text x="60" y="534" fill="#7a5415" font-weight="bold">__syncwarp()</text>
    <text x="240" y="534" fill="#444">Warp 32 threads sync</text>
    <text x="560" y="534" fill="#888">tma_store_arrive 后</text>
    <text x="730" y="534" fill="#888" font-style="italic">Epilogue 内</text>

    <text x="60" y="556" fill="#4a8edb" font-weight="bold">Cluster barrier</text>
    <text x="240" y="556" fill="#444">cluster_arrive_relaxed → cluster_wait</text>
    <text x="560" y="556" fill="#888">barrier init 后</text>
    <text x="730" y="556" fill="#888" font-style="italic">Kernel 启动</text>
  </g>

  <text x="60" y="586" font-size="10" fill="#444" font-style="italic">phase 翻转：<tspan font-family="monospace">(iter_idx / kNumStages) &amp; 1</tspan>；stage 循环复用：<tspan font-family="monospace">iter_idx % kNumStages</tspan></text>
</svg>
