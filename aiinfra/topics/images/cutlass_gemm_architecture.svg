<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="760" height="360" fill="#fdfcf7"/>

  <text x="380" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS 3.x GEMM 架构</text>
  <path d="M 240 42 Q 380 50 520 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Device API (top, full width) -->
  <g filter="url(#sk)">
    <rect x="40" y="64" width="680" height="70" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/>
  </g>
  <text x="380" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#5a3a7a">Device API</text>
  <text x="380" y="114" text-anchor="middle" font-size="11" fill="#555">参数配置 + kernel 选择 + launch</text>

  <!-- Down arrows to three columns -->
  <path d="M 155 134 L 155 158" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 380 134 L 380 158" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 605 134 L 605 158" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Column 1: Collective Mainloop -->
  <g filter="url(#sk)">
    <rect x="50" y="162" width="210" height="140" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="155" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">Collective</text>
  <text x="155" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">Mainloop</text>
  <text x="155" y="234" text-anchor="middle" font-size="11" fill="#555">MMA 计算</text>
  <text x="155" y="262" text-anchor="middle" font-size="10" fill="#888" font-family="monospace">gmem → smem → rmem</text>
  <text x="155" y="280" text-anchor="middle" font-size="10" fill="#888">cp.async / TMA + WGMMA</text>

  <!-- Column 2: Collective Store -->
  <g filter="url(#sk)">
    <rect x="275" y="162" width="210" height="140" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="380" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">Collective</text>
  <text x="380" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">Store</text>
  <text x="380" y="234" text-anchor="middle" font-size="11" fill="#555">结果写回</text>
  <text x="380" y="262" text-anchor="middle" font-size="10" fill="#888" font-family="monospace">rmem → gmem</text>
  <text x="380" y="280" text-anchor="middle" font-size="10" fill="#888">stmatrix / TMA store</text>

  <!-- Column 3: Epilogue -->
  <g filter="url(#sk)">
    <rect x="500" y="162" width="210" height="140" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="605" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">Epilogue</text>
  <text x="605" y="208" text-anchor="middle" font-size="11" fill="#7a5415">(后处理融合)</text>
  <text x="605" y="234" text-anchor="middle" font-size="11" fill="#555">Bias / ReLU / ...</text>
  <text x="605" y="262" text-anchor="middle" font-size="10" fill="#888" font-family="monospace">EVT 融合树</text>
  <text x="605" y="280" text-anchor="middle" font-size="10" fill="#888">寄存器级零额外访存</text>

  <!-- Bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="318" width="680" height="32" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="380" y="338" text-anchor="middle" font-size="10" fill="#888">三个组件通过 C++ 模板在编译期组装，运行时只需传 Arguments 参数</text>
</svg>
