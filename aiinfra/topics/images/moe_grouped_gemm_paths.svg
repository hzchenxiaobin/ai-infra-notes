<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="33" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">MoE 专家计算两条路径：逐专家 GEMM vs Grouped GEMM</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: Scatter-Gather per-expert -->
  <text x="220" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#b85450">路径 A：Scatter-Gather 逐专家 GEMM</text>

  <!-- Loop header -->
  <g filter="url(#sk)"><rect x="40" y="82" width="360" height="26" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="220" y="100" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold" font-family="monospace">for e in range(num_experts):</text>

  <!-- Expert 0 -->
  <g filter="url(#sk)"><rect x="60" y="118" width="320" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
  <text x="80" y="134" font-size="10" fill="#7a5415" font-weight="bold">expert 0</text>
  <text x="80" y="150" font-size="9" fill="#555">gather tokens → cuBLAS GEMM → scatter back</text>

  <!-- Expert 1 -->
  <g filter="url(#sk)"><rect x="60" y="164" width="320" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
  <text x="80" y="180" font-size="10" fill="#7a5415" font-weight="bold">expert 1</text>
  <text x="80" y="196" font-size="9" fill="#555">gather → GEMM → scatter</text>

  <!-- dots -->
  <text x="220" y="222" text-anchor="middle" font-size="12" fill="#888">...</text>

  <!-- Expert N -->
  <g filter="url(#sk)"><rect x="60" y="232" width="320" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/></g>
  <text x="80" y="248" font-size="10" fill="#7a5415" font-weight="bold">expert N-1</text>
  <text x="80" y="264" font-size="9" fill="#555">gather → GEMM → scatter</text>

  <!-- Summary -->
  <g filter="url(#sk)"><rect x="40" y="288" width="360" height="76" rx="6" fill="#fff" stroke="#ddd" stroke-dasharray="4 2"/></g>
  <text x="60" y="308" font-size="10" fill="#b85450" font-weight="bold">特点：</text>
  <text x="60" y="324" font-size="9" fill="#444">• N 次 kernel launch</text>
  <text x="60" y="340" font-size="9" fill="#444">• 负载不均时小 GEMM 浪费 SM</text>
  <text x="60" y="356" font-size="9" fill="#444">• 实现简单，每次是标准 cuBLAS</text>

  <!-- Divider -->
  <line x1="420" y1="60" x2="420" y2="380" stroke="#eee" stroke-width="1" filter="url(#sk)"/>

  <!-- Right: Grouped GEMM -->
  <text x="660" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">路径 B：Grouped GEMM（1 次 launch）</text>

  <!-- Dispatch -->
  <g filter="url(#sk)"><rect x="480" y="88" width="360" height="44" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="660" y="106" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">① Dispatch（argsort + gather）</text>
  <text x="660" y="122" text-anchor="middle" font-size="9" fill="#888">把 token 按 expert 连续排列 + group_offsets</text>
  <path d="M 660 132 L 660 146" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Single Grouped GEMM -->
  <g filter="url(#sk)"><rect x="480" y="148" width="360" height="80" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="660" y="170" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">② Grouped GEMM（单 kernel）</text>
  <text x="660" y="188" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">tile_to_expert[pid] → 反查 expert</text>
  <text x="660" y="204" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">SM 跨专家调度，负载均衡</text>
  <text x="660" y="220" text-anchor="middle" font-size="9" fill="#888">所有专家的 GEMM 打包成 1 次调用</text>
  <path d="M 660 228 L 660 242" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Combine -->
  <g filter="url(#sk)"><rect x="480" y="244" width="360" height="44" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/></g>
  <text x="660" y="262" text-anchor="middle" font-size="11" fill="#5a3a7a" font-weight="bold">③ Combine（加权 scatter 回原顺序）</text>
  <text x="660" y="278" text-anchor="middle" font-size="9" fill="#888">out += topk_val * expert_out</text>

  <!-- Summary -->
  <g filter="url(#sk)"><rect x="480" y="288" width="360" height="76" rx="6" fill="#fff" stroke="#ddd" stroke-dasharray="4 2"/></g>
  <text x="500" y="308" font-size="10" fill="#2e6e2e" font-weight="bold">特点：</text>
  <text x="500" y="324" font-size="9" fill="#444">• 1 次 kernel launch</text>
  <text x="500" y="340" font-size="9" fill="#444">• SM 跨专家调度，无小 GEMM 浪费</text>
  <text x="500" y="356" font-size="9" fill="#444">• vLLM fused_moe / CUTLASS GemmGroup</text>

  <!-- Bottom: when to use -->
  <g filter="url(#sk)">
    <rect x="40" y="400" width="820" height="64" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="422" font-size="11" font-weight="bold" fill="#444">取舍：</text>
  <text x="120" y="422" font-size="10" fill="#b85450">逐专家——专家少、每专家 token 多</text>
  <text x="430" y="422" font-size="10" fill="#2e6e2e">Grouped GEMM——专家多、每专家 token 中等</text>
  <text x="60" y="442" font-size="10" fill="#7a5415" font-weight="bold">注意：</text>
  <text x="120" y="442" font-size="10" fill="#555">DeepSeek-V3（256 专家、每专家 ~8 token）对 Grouped GEMM 不友好，per-group 开销摊薄收益</text>
  <text x="60" y="458" font-size="10" fill="#5a3a7a">→ 此时更适合 DeepGEMM 的 M-grouped（只分 M 轴，N/K 固定）</text>
</svg>
