<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="114" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">GEMM 调参四维度及其影响</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 4 quadrants -->
  <!-- Top-left: TileShape -->
  <g filter="url(#sk)"><rect x="20" y="60" width="410" height="150" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="225" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">① TileShape</text>
  <text x="225" y="100" text-anchor="middle" font-size="9" fill="#555">(M_tile, N_tile, K_tile)</text>

  <g font-size="9" fill="#444">
    <text x="40" y="124" fill="#2e6e2e" font-weight="bold">影响：</text>
    <text x="90" y="124">SM 利用率、矩阵复用、Shared Memory 占用</text>
    <text x="40" y="142" fill="#7a5415" font-weight="bold">调优：</text>
    <text x="90" y="142">方形矩阵试 128×256×64</text>
    <text x="40" y="160" fill="#b85450" font-weight="bold">代价：</text>
    <text x="90" y="160">tile↑ → smem↑ → SM 并行度↓</text>
    <text x="40" y="184" fill="#888">实测 128×256×64 最优 (112 TFLOPS)</text>
  </g>

  <!-- Top-right: Stages -->
  <g filter="url(#sk)"><rect x="450" y="60" width="410" height="150" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/></g>
  <text x="655" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">② Stages</text>
  <text x="655" y="100" text-anchor="middle" font-size="9" fill="#555">2 / 3 / 4（多阶段流水线）</text>

  <g font-size="9" fill="#444">
    <text x="470" y="124" fill="#2e6e2e" font-weight="bold">影响：</text>
    <text x="520" y="124">延迟隐藏（加载与计算重叠）</text>
    <text x="470" y="142" fill="#7a5415" font-weight="bold">调优：</text>
    <text x="520" y="142">Shared Memory 允许则增大</text>
    <text x="470" y="160" fill="#b85450" font-weight="bold">代价：</text>
    <text x="520" y="160">stages↑ → smem↑（2x/3x/4x）</text>
    <text x="470" y="184" fill="#888">Stages=3 通用默认，充裕时试 4</text>
  </g>

  <!-- Bottom-left: Precision -->
  <g filter="url(#sk)"><rect x="20" y="230" width="410" height="150" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2"/></g>
  <text x="225" y="254" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">③ 精度</text>
  <text x="225" y="270" text-anchor="middle" font-size="9" fill="#555">FP16 / BF16 / INT8 / FP8</text>

  <g font-size="9" fill="#444">
    <text x="40" y="294" fill="#2e6e2e" font-weight="bold">影响：</text>
    <text x="90" y="294">峰值算力（FP8 = 4x FP16）</text>
    <text x="40" y="312" fill="#7a5415" font-weight="bold">调优：</text>
    <text x="90" y="312">精度允许则用低精度</text>
    <text x="40" y="330" fill="#b85450" font-weight="bold">代价：</text>
    <text x="90" y="330">精度损失（FP8 &lt; INT8 &lt; BF16 &lt; FP16）</text>
    <text x="40" y="354" fill="#888">FP8: 420 TOPS vs FP16: 112 TFLOPS</text>
  </g>

  <!-- Bottom-right: Layout -->
  <g filter="url(#sk)"><rect x="450" y="230" width="410" height="150" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2"/></g>
  <text x="655" y="254" text-anchor="middle" font-size="14" font-weight="bold" fill="#b85450">④ 布局</text>
  <text x="655" y="270" text-anchor="middle" font-size="9" fill="#555">RowMajor / ColumnMajor</text>

  <g font-size="9" fill="#444">
    <text x="470" y="294" fill="#2e6e2e" font-weight="bold">影响：</text>
    <text x="520" y="294">访存模式（coalesced vs strided）</text>
    <text x="470" y="312" fill="#7a5415" font-weight="bold">调优：</text>
    <text x="520" y="312">A=RowMajor, B=ColMajor 最优</text>
    <text x="470" y="330" fill="#b85450" font-weight="bold">代价：</text>
    <text x="520" y="330">非自然布局需额外转置</text>
    <text x="470" y="354" fill="#888">A=Row,B=Col: 112 vs A=Col,B=Col: 108</text>
  </g>
</svg>
