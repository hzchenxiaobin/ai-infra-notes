<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="47" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS 3.x GEMM 完整数据流</text>
  <path d="M 280 40 Q 450 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Memory hierarchy columns -->
  <text x="130" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a8edb">Global Memory</text>
  <text x="350" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Shared Memory</text>
  <text x="570" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">Register</text>
  <text x="790" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Global (输出)</text>

  <!-- Column backgrounds -->
  <g filter="url(#sk)"><rect x="40" y="80" width="180" height="300" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" stroke-dasharray="4 2"/></g>
  <g filter="url(#sk)"><rect x="260" y="80" width="180" height="300" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1" stroke-dasharray="4 2"/></g>
  <g filter="url(#sk)"><rect x="480" y="80" width="180" height="300" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1" stroke-dasharray="4 2"/></g>
  <g filter="url(#sk)"><rect x="700" y="80" width="180" height="300" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" stroke-dasharray="4 2"/></g>

  <!-- Step 1: Load A/B -->
  <g filter="url(#sk)"><rect x="55" y="94" width="70" height="30" rx="4" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="90" y="113" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">A tile</text>
  <g filter="url(#sk)"><rect x="135" y="94" width="70" height="30" rx="4" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="170" y="113" text-anchor="middle" font-size="9" fill="#2b6e9e" font-weight="bold">B tile</text>

  <path d="M 180 120 L 280 120" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="230" y="114" text-anchor="middle" font-size="8" fill="#5a3a7a">① TMA / cp.async</text>

  <!-- Step 1: Shared Memory -->
  <g filter="url(#sk)"><rect x="275" y="94" width="70" height="30" rx="4" fill="#fff" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="310" y="113" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">sA (swizzled)</text>
  <g filter="url(#sk)"><rect x="355" y="94" width="70" height="30" rx="4" fill="#fff" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="390" y="113" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">sB (swizzled)</text>

  <text x="350" y="138" text-anchor="middle" font-size="8" fill="#888">② Swizzle 消除 bank conflict</text>

  <!-- Step 2: Load fragment -->
  <path d="M 395 130 L 500 130" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="445" y="124" text-anchor="middle" font-size="8" fill="#5a3a7a">③ ldmatrix</text>

  <g filter="url(#sk)"><rect x="495" y="114" width="70" height="30" rx="4" fill="#fff" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="530" y="133" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">rA frag</text>
  <g filter="url(#sk)"><rect x="575" y="114" width="70" height="30" rx="4" fill="#fff" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="610" y="133" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">rB frag</text>

  <!-- Step 3: MMA -->
  <text x="570" y="164" text-anchor="middle" font-size="8" fill="#888">④ mma.m16n8k16 / WGMMA</text>

  <g filter="url(#sk)"><rect x="510" y="172" width="120" height="36" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="570" y="190" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">rC += rA × rB</text>
  <text x="570" y="202" text-anchor="middle" font-size="8" fill="#888">Register 级累加</text>

  <!-- K loop arrow -->
  <path d="M 570 208 Q 570 230 490 230 Q 350 230 310 210 Q 310 180 310 130" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="440" y="248" text-anchor="middle" font-size="8" fill="#888">⑤ K 维度迭代（double buffering: 加载与计算重叠）</text>

  <!-- Step 4: Epilogue -->
  <path d="M 620 190 L 700 190" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="660" y="184" text-anchor="middle" font-size="8" fill="#5a3a7a">⑥ alpha/beta + 写回</text>

  <g filter="url(#sk)"><rect x="710" y="174" width="80" height="36" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="750" y="192" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">D = α·rC</text>
  <text x="750" y="204" text-anchor="middle" font-size="8" fill="#888">+ β·C</text>

  <!-- Double buffer visualization -->
  <g filter="url(#sk)">
    <rect x="55" y="280" width="830" height="90" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="75" y="304" font-size="11" font-weight="bold" fill="#444">三阶段流水线（Stages=3）：</text>

  <g font-size="9" fill="#444" font-family="monospace">
    <text x="75" y="324" fill="#888">Step 0:</text>
    <text x="130" y="324" fill="#4a8edb">加载 A[0],B[0]</text>
    <text x="280" y="324" fill="#ccc">—</text>
    <text x="380" y="324" fill="#ccc">—</text>

    <text x="75" y="340" fill="#888">Step 1:</text>
    <text x="130" y="340" fill="#4a8edb">加载 A[1],B[1]</text>
    <text x="280" y="340" fill="#c98a2b">计算 A[0]×B[0]</text>
    <text x="380" y="340" fill="#ccc">—</text>

    <text x="75" y="356" fill="#888">Step 2:</text>
    <text x="130" y="356" fill="#4a8edb">加载 A[2],B[2]</text>
    <text x="280" y="356" fill="#c98a2b">计算 A[1]×B[1]</text>
    <text x="380" y="356" fill="#ccc">—</text>

    <text x="75" y="372" fill="#888">...</text>
    <text x="130" y="372" fill="#4a8edb">加载 +</text>
    <text x="280" y="372" fill="#c98a2b">计算 完全重叠</text>
    <text x="380" y="372" fill="#2e6e2e">→ Global 延迟被掩盖</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="400" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">★ 整个数据流由 CuTe Layout/Tensor 驱动：每个阶段都是 copy() 或 mma()，Layout 自动处理地址映射和 swizzle</text>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#888">Global → Shared（copy + TMA）→ Register（ldmatrix）→ MMA → Register → Global（stmatrix / TMA store）</text>
</svg>
