<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="73" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Multi-stage Buffering：加载与计算重叠</text>
  <path d="M 280 40 Q 450 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Time axis -->
  <text x="40" y="70" font-size="11" fill="#888" font-weight="bold">时间 →</text>
  <line x1="40" y1="76" x2="860" y2="76" stroke="#bbb" stroke-width="1" filter="url(#sk)"/>

  <!-- Step headers -->
  <text x="140" y="70" text-anchor="middle" font-size="9" fill="#888">Step 0</text>
  <text x="280" y="70" text-anchor="middle" font-size="9" fill="#888">Step 1</text>
  <text x="420" y="70" text-anchor="middle" font-size="9" fill="#888">Step 2</text>
  <text x="560" y="70" text-anchor="middle" font-size="9" fill="#888">Step 3</text>
  <text x="720" y="70" text-anchor="middle" font-size="9" fill="#888">Step 4</text>

  <!-- Vertical step dividers -->
  <line x1="210" y1="76" x2="210" y2="310" stroke="#eee" stroke-width="0.8"/>
  <line x1="350" y1="76" x2="350" y2="310" stroke="#eee" stroke-width="0.8"/>
  <line x1="490" y1="76" x2="490" y2="310" stroke="#eee" stroke-width="0.8"/>
  <line x1="630" y1="76" x2="630" y2="310" stroke="#eee" stroke-width="0.8"/>

  <!-- Buffer 0 row -->
  <text x="40" y="110" font-size="10" fill="#4a8edb" font-weight="bold">Buffer 0</text>
  <g filter="url(#sk)"><rect x="80" y="96" width="120" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="140" y="114" text-anchor="middle" font-size="9" fill="#2b6e9e">加载 A[0],B[0]</text>
  <g filter="url(#sk)"><rect x="360" y="96" width="120" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="420" y="114" text-anchor="middle" font-size="9" fill="#2e6e2e">计算 A[0]×B[0]</text>
  <g filter="url(#sk)"><rect x="640" y="96" width="120" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="700" y="114" text-anchor="middle" font-size="9" fill="#2b6e9e">加载 A[3],B[3]</text>

  <!-- Buffer 1 row -->
  <text x="40" y="150" font-size="10" fill="#7a5415" font-weight="bold">Buffer 1</text>
  <g filter="url(#sk)"><rect x="220" y="136" width="120" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="280" y="154" text-anchor="middle" font-size="9" fill="#2b6e9e">加载 A[1],B[1]</text>
  <g filter="url(#sk)"><rect x="500" y="136" width="120" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="560" y="154" text-anchor="middle" font-size="9" fill="#2e6e2e">计算 A[1]×B[1]</text>
  <g filter="url(#sk)"><rect x="780" y="136" width="80" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="820" y="154" text-anchor="middle" font-size="8" fill="#2b6e9e">加载[4]</text>

  <!-- Buffer 2 row -->
  <text x="40" y="190" font-size="10" fill="#b85450" font-weight="bold">Buffer 2</text>
  <g filter="url(#sk)"><rect x="360" y="176" width="120" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="420" y="194" text-anchor="middle" font-size="9" fill="#2b6e9e">加载 A[2],B[2]</text>
  <g filter="url(#sk)"><rect x="640" y="176" width="120" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
  <text x="700" y="194" text-anchor="middle" font-size="9" fill="#2e6e2e">计算 A[2]×B[2]</text>

  <!-- Overlap annotation -->
  <g filter="url(#sk)">
    <rect x="360" y="96" width="120" height="28" rx="4" fill="none" stroke="#b85450" stroke-width="1.5" stroke-dasharray="4 2"/>
  </g>
  <path d="M 360 90 Q 360 80 350 80" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="490" y="240" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">↑ 加载与计算同时进行（重叠）</text>

  <!-- Legend -->
  <g filter="url(#sk)"><rect x="60" y="260" width="16" height="12" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="84" y="270" font-size="9" fill="#444">cp.async 加载（Global→Shared）</text>
  <g filter="url(#sk)"><rect x="280" y="260" width="16" height="12" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="304" y="270" font-size="9" fill="#444">MMA 计算（Shared→Register→MMA）</text>

  <!-- Stages comparison -->
  <g filter="url(#sk)">
    <rect x="60" y="294" width="780" height="90" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="316" font-size="11" font-weight="bold" fill="#444">Stages 参数对比：</text>
  <g font-size="10" fill="#444">
    <text x="80" y="336" fill="#4a8edb" font-weight="bold">Stages=2:</text>
    <text x="160" y="336">2× Shared Memory，基础 double buffer</text>
    <text x="80" y="354" fill="#7a5415" font-weight="bold">Stages=3:</text>
    <text x="160" y="354">3× Shared Memory，更好的重叠（默认推荐）</text>
    <text x="80" y="372" fill="#b85450" font-weight="bold">Stages=4:</text>
    <text x="160" y="372">4× Shared Memory，最大化重叠（需充裕 Shared Memory）</text>
  </g>
</svg>
