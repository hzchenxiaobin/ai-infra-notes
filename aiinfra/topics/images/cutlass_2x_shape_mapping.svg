<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="51" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">三层 Shape 参数的逐级映射关系</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Threadblock tile (outer) -->
  <g filter="url(#sk)">
    <rect x="40" y="60" width="540" height="350" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="310" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">MmaTileShape (128, 128, 64)</text>
  <text x="310" y="100" text-anchor="middle" font-size="10" fill="#555">一个 block 处理 128×128 输出 tile，K 维每次 64</text>

  <!-- Warp tiles (4 = 2×2) -->
  <g filter="url(#sk)"><rect x="70" y="118" width="230" height="130" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="185" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Warp(0,0) 64×64</text>

  <g filter="url(#sk)"><rect x="320" y="118" width="230" height="130" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="435" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Warp(1,0) 64×64</text>

  <g filter="url(#sk)"><rect x="70" y="262" width="230" height="130" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="185" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Warp(0,1) 64×64</text>

  <g filter="url(#sk)"><rect x="320" y="262" width="230" height="130" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="435" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Warp(1,1) 64×64</text>

  <!-- Instruction tiles inside Warp(0,0) -->
  <g font-size="7" fill="#b85450" font-family="monospace">
    <g filter="url(#sk)"><rect x="80" y="150" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="104" y="166" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="128" y="150" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="152" y="166" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="176" y="150" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="200" y="166" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="224" y="150" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="248" y="166" text-anchor="middle">16×8</text>

    <g filter="url(#sk)"><rect x="80" y="178" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="104" y="194" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="128" y="178" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="152" y="194" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="176" y="178" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="200" y="194" text-anchor="middle">16×8</text>
    <g filter="url(#sk)"><rect x="224" y="178" width="48" height="24" rx="2" fill="none" stroke="#b85450" stroke-width="0.8"/></g>
    <text x="248" y="194" text-anchor="middle">16×8</text>

    <text x="185" y="230" text-anchor="middle" font-size="8">每个 16×8 = 一条 mma.sync 指令</text>
    <text x="185" y="244" text-anchor="middle" font-size="7">Warp(0,0) = (64/16)×(64/8) = 4×8 = 32 条</text>
  </g>

  <!-- Right side: computation -->
  <g filter="url(#sk)">
    <rect x="610" y="60" width="240" height="350" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.5"/>
  </g>
  <text x="730" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">计算关系</text>

  <g font-size="10" fill="#444">
    <text x="630" y="110" fill="#2b6e9e" font-weight="bold">Threadblock tile:</text>
    <text x="630" y="124" font-family="monospace" font-size="9">  (128, 128, 64)</text>

    <text x="630" y="148" fill="#7a5415" font-weight="bold">Warp tile:</text>
    <text x="630" y="162" font-family="monospace" font-size="9">  (64, 64, 64)</text>

    <text x="630" y="186" fill="#b85450" font-weight="bold">Instruction:</text>
    <text x="630" y="200" font-family="monospace" font-size="9">  (16, 8, 16)</text>

    <text x="630" y="228" fill="#5a3a7a" font-weight="bold">Warps per block:</text>
    <text x="630" y="242" font-family="monospace" font-size="9">  128/64 × 128/64</text>
    <text x="630" y="256" font-family="monospace" font-size="9">  = 2 × 2 = 4 warps</text>

    <text x="630" y="284" fill="#5a3a7a" font-weight="bold">Threads per block:</text>
    <text x="630" y="298" font-family="monospace" font-size="9">  4 × 32 = 128</text>

    <text x="630" y="326" fill="#2e6e2e" font-weight="bold">MMA per warp:</text>
    <text x="630" y="340" font-family="monospace" font-size="9">  (64/16)×(64/8)×(64/16)</text>
    <text x="630" y="354" font-family="monospace" font-size="9">  = 4×8×4 = 128 条</text>

    <text x="630" y="382" fill="#b85450" font-weight="bold">约束:</text>
    <text x="630" y="396" font-size="9" fill="#888">  Warp 整除 Threadblock</text>
    <text x="630" y="408" font-size="9" fill="#888">  Inst 整除 Warp</text>
  </g>
</svg>
