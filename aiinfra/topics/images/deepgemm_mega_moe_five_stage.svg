<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="88" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="660" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2b2b2b">sm100_fp8_fp4_mega_moe_impl：五阶段单 Kernel 架构</text>
  <path d="M 270 40 Q 450 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Outer container -->
  <g filter="url(#sk)">
    <rect x="30" y="58" width="840" height="580" rx="10" fill="#fffdf3" stroke="#5a5a5a" stroke-width="2"/>
  </g>
  <!-- Container title bar -->
  <g filter="url(#sk)">
    <rect x="30" y="58" width="840" height="34" rx="10" fill="#f0f0f0" stroke="#5a5a5a" stroke-width="2"/>
    <rect x="30" y="80" width="840" height="12" fill="#f0f0f0" stroke="none"/>
  </g>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b" font-family="monospace">sm100_fp8_fp4_mega_moe_impl</text>

  <!-- ===== Stage 1: EP Dispatch ===== -->
  <g filter="url(#sk)">
    <rect x="50" y="108" width="800" height="130" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="68" y="132" font-size="13" font-weight="bold" fill="#b85450">阶段 1：EP Dispatch</text>
  <text x="320" y="132" font-size="10" fill="#888" font-style="italic">warp 0 .. kNumDispatchWarps-1</text>
  <g font-size="10" fill="#444">
    <text x="80" y="156">├─ 读 input_topk_idx，统计每 expert 的 token 数</text>
    <text x="80" y="174">├─ NVLink 写远端 rank 的 src_token_topk_idx</text>
    <text x="80" y="192">├─ grid_sync + nvlink_barrier</text>
    <text x="80" y="210">└─ 从远端 pull token + SF → 本地 l1_token_buffer（TMA）</text>
  </g>
  <text x="540" y="226" font-size="9" fill="#b85450" font-style="italic">→ red_add l1_full_count 通知 L1 可消费</text>

  <!-- arrow Stage1 → Stage2-4 -->
  <path d="M 450 238 L 450 250" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Stage 2-4: GEMM + SwiGLU + GEMM ===== -->
  <g filter="url(#sk)">
    <rect x="50" y="252" width="800" height="240" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="68" y="276" font-size="13" font-weight="bold" fill="#7a5415">阶段 2-4：GEMM + SwiGLU + GEMM</text>
  <text x="370" y="276" font-size="10" fill="#888" font-style="italic">warp kNumDispatchWarps .. end</text>

  <!-- 4 warp roles inside -->
  <g filter="url(#sk)"><rect x="68" y="288" width="180" height="28" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/></g>
  <text x="158" y="306" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">TMA load warp</text>
  <text x="260" y="306" font-size="10" fill="#444">加载 l1_acts + l1_weights → smem</text>

  <g filter="url(#sk)"><rect x="68" y="322" width="180" height="28" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/></g>
  <text x="158" y="340" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">MMA issue warp</text>
  <text x="260" y="340" font-size="10" fill="#444">发射 tcgen05.mma（FP8×FP4）+ UTCCP</text>

  <g filter="url(#sk)"><rect x="68" y="356" width="180" height="28" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1"/></g>
  <text x="158" y="374" text-anchor="middle" font-size="10" fill="#5a3a7a" font-weight="bold">Scheduler warp</text>
  <text x="260" y="374" font-size="10" fill="#444">发布 TaskInfo（L1/L2 交替）</text>

  <g filter="url(#sk)"><rect x="68" y="390" width="180" height="28" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1"/></g>
  <text x="158" y="408" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">Epilogue warps</text>
  <text x="260" y="408" font-size="10" fill="#444" font-weight="bold">两套 epilogue：</text>

  <!-- Epilogue sub-blocks -->
  <g filter="url(#sk)"><rect x="80" y="424" width="370" height="28" rx="4" fill="#fff" stroke="#c98a2b" stroke-width="0.8" stroke-dasharray="3 2"/></g>
  <text x="90" y="442" font-size="9" fill="#7a5415" font-weight="bold">Linear1:</text>
  <text x="150" y="442" font-size="9" fill="#444">SwiGLU + FP8 量化 → l2_acts</text>

  <g filter="url(#sk)"><rect x="460" y="424" width="380" height="28" rx="4" fill="#fff" stroke="#c98a2b" stroke-width="0.8" stroke-dasharray="3 2"/></g>
  <text x="470" y="442" font-size="9" fill="#7a5415" font-weight="bold">Linear2:</text>
  <text x="530" y="442" font-size="9" fill="#444">cast BF16 → 远端 combine_token_buffer（NVLink）</text>

  <text x="450" y="476" text-anchor="middle" font-size="9" fill="#7a5415" font-style="italic">→ red_add l2_full / l2_empty 通知 L2 可消费 / ring 可覆盖</text>

  <!-- arrow Stage2-4 → Stage5 -->
  <path d="M 450 492 L 450 504" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Stage 5: EP Combine ===== -->
  <g filter="url(#sk)">
    <rect x="50" y="506" width="800" height="118" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="68" y="530" font-size="13" font-weight="bold" fill="#2e6e2e">阶段 5：EP Combine</text>
  <text x="280" y="530" font-size="10" fill="#888" font-style="italic">epilogue warps，与 dispatch cleanup overlap</text>
  <g font-size="10" fill="#444">
    <text x="80" y="554">├─ nvlink_barrier：等所有 rank 的 L2 完成</text>
    <text x="80" y="572">├─ 读 combine_token_buffer，top-k 加权 reduce</text>
    <text x="80" y="590">└─ TMA store 到 y [num_tokens, hidden] BF16</text>
  </g>
  <text x="540" y="612" font-size="9" fill="#2e6e2e" font-style="italic">双缓冲 load：2 load + 1 store overlap</text>
</svg>
