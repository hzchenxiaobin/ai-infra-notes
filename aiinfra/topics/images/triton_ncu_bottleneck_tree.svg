<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="253" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">NCU 瓶颈诊断决策树：Triton kernel 优化方向</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Root -->
  <g filter="url(#sk)"><rect x="340" y="56" width="220" height="36" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="2"/></g>
  <text x="450" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a3a7a">NCU Report</text>

  <!-- DRAM check -->
  <path d="M 450 92 L 450 110" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="330" y="110" width="240" height="36" rx="6" fill="#fff" stroke="#888" stroke-width="1.2"/></g>
  <text x="450" y="132" text-anchor="middle" font-size="10" fill="#444">DRAM Throughput?</text>

  <!-- DRAM < 50% (left) -->
  <path d="M 360 128 L 220 150" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="290" y="146" text-anchor="middle" font-size="8" fill="#2e6e2e">&lt; 50%</text>

  <g filter="url(#sk)"><rect x="80" y="150" width="280" height="44" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="220" y="168" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">compute-bound ✅</text>
  <text x="220" y="182" text-anchor="middle" font-size="8" fill="#888">检查 Tensor Core 利用率</text>

  <!-- Tensor check -->
  <path d="M 220 194 L 220 210" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <path d="M 170 218 L 80 236" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="20" y="236" width="120" height="44" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/></g>
  <text x="80" y="254" text-anchor="middle" font-size="8" fill="#2e6e2e" font-weight="bold">✅ 理想状态</text>
  <text x="80" y="268" text-anchor="middle" font-size="7" fill="#888">接近最优</text>

  <path d="M 270 218 L 360 236" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="300" y="236" width="140" height="44" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="370" y="254" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">⚠️ TC 未利用</text>
  <text x="370" y="268" text-anchor="middle" font-size="7" fill="#888">检查 tl.dot 输入</text>

  <!-- DRAM > 70% (right) -->
  <path d="M 540 128 L 680 150" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="610" y="146" text-anchor="middle" font-size="8" fill="#b85450">&gt; 70%</text>

  <g filter="url(#sk)"><rect x="560" y="150" width="280" height="44" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="700" y="168" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">memory-bound ⚠️</text>
  <text x="700" y="182" text-anchor="middle" font-size="8" fill="#888">增大 BLOCK 减少重复加载</text>

  <!-- SM check -->
  <path d="M 700 194 L 700 210" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <path d="M 640 218 L 560 236" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="470" y="236" width="120" height="44" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/></g>
  <text x="530" y="254" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">SM &lt; 70%</text>
  <text x="530" y="268" text-anchor="middle" font-size="7" fill="#888">增大 BLOCK</text>

  <path d="M 760 218 L 830 236" stroke="#5a5a5a" stroke-width="1" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="760" y="236" width="110" height="44" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="815" y="254" text-anchor="middle" font-size="8" fill="#7a5415" font-weight="bold">SM 满</text>
  <text x="815" y="268" text-anchor="middle" font-size="7" fill="#888">已是 cb</text>

  <!-- Bottom examples -->
  <g filter="url(#sk)"><rect x="20" y="300" width="860" height="64" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="40" y="322" font-size="10" font-weight="bold" fill="#7a5415">Triton kernel 实例：</text>
  <g font-size="9" fill="#444">
    <text x="40" y="340" fill="#2e6e2e">GEMM: DRAM 21% + TC 65% → compute-bound ✅</text>
    <text x="340" y="340" fill="#b85450">Softmax: DRAM 72% → memory-bound（符合预期）</text>
    <text x="40" y="356" fill="#7a5415">FlashAttn: DRAM 15% → compute-bound（S/P 不落盘）</text>
  </g>
</svg>
