<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="#fdfcf7"/>

  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS 2.x 三层抽象</text>
  <path d="M 220 40 Q 360 48 500 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Threadblock level (outer) -->
  <g filter="url(#sk)">
    <rect x="30" y="60" width="660" height="340" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="360" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">Threadblock 级（SM 上一个 block）</text>
  <text x="360" y="106" text-anchor="middle" font-size="11" fill="#555">处理 M_tile × N_tile × K 的分块　职责：Global → Shared Memory 数据搬运</text>

  <!-- Warp level (middle) -->
  <g filter="url(#sk)">
    <rect x="80" y="124" width="560" height="240" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="360" y="152" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">Warp 级（block 内的一个 warp）</text>
  <text x="360" y="170" text-anchor="middle" font-size="11" fill="#555">处理 M_warp × N_warp × K_tile　职责：Shared → Register，执行 MMA</text>

  <!-- Thread level (inner) -->
  <g filter="url(#sk)">
    <rect x="140" y="190" width="440" height="140" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="2"/>
  </g>
  <text x="360" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#b85450">Thread 级（warp 内的一个线程）</text>
  <text x="360" y="238" text-anchor="middle" font-size="11" fill="#555">执行 mma.m16n8k16 指令</text>
  <text x="360" y="256" text-anchor="middle" font-size="11" fill="#555">职责：Register 级累加</text>

  <!-- Data flow annotations on left -->
  <text x="20" y="340" font-size="10" fill="#2b6e9e" font-weight="bold" transform="rotate(-90,20,340)">Global → Shared</text>
  <text x="70" y="340" font-size="10" fill="#7a5415" font-weight="bold" transform="rotate(-90,70,340)">Shared → Register</text>
  <text x="125" y="340" font-size="10" fill="#b85450" font-weight="bold" transform="rotate(-90,125,340)">MMA → Register</text>

  <!-- Hardware mapping on right -->
  <g filter="url(#sk)">
    <rect x="600" y="340" width="80" height="24" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="0.8"/>
  </g>
  <text x="640" y="356" text-anchor="middle" font-size="10" fill="#888">= 一个 SM</text>
  <g filter="url(#sk)">
    <rect x="580" y="300" width="80" height="24" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="0.8"/>
  </g>
  <text x="620" y="316" text-anchor="middle" font-size="10" fill="#888">= 一个 Warp</text>
  <g filter="url(#sk)">
    <rect x="560" y="260" width="80" height="24" rx="4" fill="#fffdf3" stroke="#9e9e9e" stroke-width="0.8"/>
  </g>
  <text x="600" y="276" text-anchor="middle" font-size="10" fill="#888">= 一个 Thread</text>

  <!-- Bottom analogy -->
  <text x="360" y="380" text-anchor="middle" font-size="11" fill="#888">类比：车间（领料）→ 班组（取料组装）→ 工人（执行组装动作）</text>
  <text x="360" y="398" text-anchor="middle" font-size="10" fill="#aaa">每层只关注自己的数据搬运与计算，层级间通过 Shared Memory / Register 传递</text>
</svg>
