<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="234" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="900" height="400" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">GROUP_M：L2 Cache 友好的 tile 排序</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Left: Default order -->
  <text x="220" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">默认顺序（行优先）</text>
  <g font-size="7" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="60" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="75" y="86" text-anchor="middle">0,0</text>
    <g filter="url(#sk)"><rect x="90" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="105" y="86" text-anchor="middle">0,1</text>
    <g filter="url(#sk)"><rect x="120" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="135" y="86" text-anchor="middle">0,2</text>
    <g filter="url(#sk)"><rect x="150" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="165" y="86" text-anchor="middle">0,3</text>

    <g filter="url(#sk)"><rect x="60" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="75" y="106" text-anchor="middle">1,0</text>
    <g filter="url(#sk)"><rect x="90" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="105" y="106" text-anchor="middle">1,1</text>
    <g filter="url(#sk)"><rect x="120" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="135" y="106" text-anchor="middle">1,2</text>
    <g filter="url(#sk)"><rect x="150" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="165" y="106" text-anchor="middle">1,3</text>

    <g filter="url(#sk)"><rect x="60" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="75" y="126" text-anchor="middle">2,0</text>
    <g filter="url(#sk)"><rect x="90" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="105" y="126" text-anchor="middle">2,1</text>
    <g filter="url(#sk)"><rect x="120" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="135" y="126" text-anchor="middle">2,2</text>
    <g filter="url(#sk)"><rect x="150" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="165" y="126" text-anchor="middle">2,3</text>
  </g>

  <text x="220" y="150" text-anchor="middle" font-size="9" fill="#b85450">相邻 SM 读不同 B tile</text>
  <text x="220" y="164" text-anchor="middle" font-size="9" fill="#b85450">→ L2 cache miss</text>

  <!-- Right: GROUP_M order -->
  <text x="640" y="62" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">GROUP_M=2（分组列优先）</text>
  <g font-size="7" fill="#444" font-family="monospace">
    <g filter="url(#sk)"><rect x="480" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="495" y="86" text-anchor="middle">0,0</text>
    <g filter="url(#sk)"><rect x="510" y="72" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="525" y="86" text-anchor="middle">1,0</text>
    <g filter="url(#sk)"><rect x="540" y="72" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="555" y="86" text-anchor="middle">0,1</text>
    <g filter="url(#sk)"><rect x="570" y="72" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="585" y="86" text-anchor="middle">1,1</text>

    <g filter="url(#sk)"><rect x="480" y="92" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="495" y="106" text-anchor="middle">0,2</text>
    <g filter="url(#sk)"><rect x="510" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="525" y="106" text-anchor="middle">1,2</text>
    <g filter="url(#sk)"><rect x="540" y="92" width="30" height="20" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="0.8"/></g><text x="555" y="106" text-anchor="middle">0,3</text>
    <g filter="url(#sk)"><rect x="570" y="92" width="30" height="20" rx="2" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="0.8"/></g><text x="585" y="106" text-anchor="middle">1,3</text>

    <g filter="url(#sk)"><rect x="480" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="495" y="126" text-anchor="middle">2,0</text>
    <g filter="url(#sk)"><rect x="510" y="112" width="30" height="20" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="0.8"/></g><text x="525" y="126" text-anchor="middle">3,0</text>
    <g filter="url(#sk)"><rect x="540" y="112" width="30" height="20" rx="2" fill="#fef6e6" stroke="#c98a2b" stroke-width="0.8"/></g><text x="555" y="126" text-anchor="middle">2,1</text>
    <g filter="url(#sk)"><rect x="570" y="112" width="30" height="20" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="0.8"/></g><text x="585" y="126" text-anchor="middle">3,1</text>
  </g>

  <text x="640" y="150" text-anchor="middle" font-size="9" fill="#2e6e2e">相邻 SM 读相同 B tile</text>
  <text x="640" y="164" text-anchor="middle" font-size="9" fill="#2e6e2e">→ L2 cache hit ↑</text>

  <!-- Code -->
  <g filter="url(#sk)"><rect x="40" y="190" width="840" height="80" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/></g>
  <text x="60" y="214" font-size="11" font-weight="bold" fill="#7a5415">GROUP_M 代码：</text>
  <g font-size="9" fill="#444" font-family="monospace">
    <text x="60" y="234">num_pid_in_group = GROUP_M * num_pid_n</text>
    <text x="60" y="250">group_id = pid // num_pid_in_group</text>
    <text x="60" y="262">pid_m = first_pid_m + (pid % group_size_m)  # 组内按列优先</text>
  </g>

  <!-- Effect -->
  <g filter="url(#sk)"><rect x="40" y="286" width="840" height="90" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-dasharray="5 3"/></g>
  <text x="60" y="310" font-size="11" font-weight="bold" fill="#2e6e2e">效果：</text>
  <g font-size="10" fill="#444">
    <text x="60" y="332">默认: pid_m=0 的所有 pid_n 先启动 → 相邻 SM 读不同 B tile → L2 cache miss</text>
    <text x="60" y="350">GROUP_M: 把 GROUP_M 行分组，组内按列优先 → 相邻 SM 读相同 B tile → L2 cache hit</text>
    <text x="60" y="368" fill="#7a5415" font-weight="bold">★ GROUP_M=8 通常提升 5-10% 性能</text>
  </g>
</svg>
