<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="124" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5"/>
    </filter>
  </defs>
  <rect width="900" height="440" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">CUTLASS vs Triton：定位与特性对比</text>
  <path d="M 260 40 Q 450 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- CUTLASS column -->
  <g filter="url(#sk)">
    <rect x="30" y="60" width="410" height="360" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="235" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b6e9e">CUTLASS</text>
  <text x="235" y="104" text-anchor="middle" font-size="10" fill="#888">C++ 模板 · 编译期优化</text>

  <g font-size="10" fill="#444">
    <text x="50" y="128" fill="#2b6e9e" font-weight="bold">语言:</text>
    <text x="120" y="128">C++ 模板（header-only）</text>

    <text x="50" y="148" fill="#2b6e9e" font-weight="bold">编译:</text>
    <text x="120" y="148">nvcc 编译期展开</text>

    <text x="50" y="168" fill="#2b6e9e" font-weight="bold">Auto-tuning:</text>
    <text x="160" y="168">编译期（CollectiveBuilder）</text>

    <text x="50" y="188" fill="#2b6e9e" font-weight="bold">性能:</text>
    <text x="120" y="188">90-98% cuBLAS</text>

    <text x="50" y="208" fill="#2b6e9e" font-weight="bold">学习曲线:</text>
    <text x="160" y="208">陡（C++ 模板 + CuTe）</text>

    <text x="50" y="228" fill="#2b6e9e" font-weight="bold">灵活性:</text>
    <text x="120" y="228">极高（EVT 任意融合）</text>

    <text x="50" y="248" fill="#2b6e9e" font-weight="bold">硬件:</text>
    <text x="120" y="248">全架构（Sm70+）</text>

    <text x="50" y="268" fill="#2b6e9e" font-weight="bold">生态:</text>
    <text x="120" y="268">vLLM / TensorRT / xformers</text>

    <text x="50" y="298" fill="#7a5415" font-weight="bold">优势:</text>
    <text x="120" y="298">极致性能 + 完全控制</text>
    <text x="120" y="314">复杂 Epilogue 融合（EVT）</text>
    <text x="120" y="330">全架构支持</text>

    <text x="50" y="358" fill="#b85450" font-weight="bold">劣势:</text>
    <text x="120" y="358">编译时间长（30+ 分钟）</text>
    <text x="120" y="374">模板报错信息极长</text>
    <text x="120" y="390">学习门槛高</text>
  </g>

  <!-- Triton column -->
  <g filter="url(#sk)">
    <rect x="460" y="60" width="410" height="360" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="665" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a5415">Triton</text>
  <text x="665" y="104" text-anchor="middle" font-size="10" fill="#888">Python DSL · 运行时 JIT</text>

  <g font-size="10" fill="#444">
    <text x="480" y="128" fill="#7a5415" font-weight="bold">语言:</text>
    <text x="550" y="128">Python DSL（类 NumPy 语法）</text>

    <text x="480" y="148" fill="#7a5415" font-weight="bold">编译:</text>
    <text x="550" y="148">运行时 JIT 编译</text>

    <text x="480" y="168" fill="#7a5415" font-weight="bold">Auto-tuning:</text>
    <text x="590" y="168">运行时（cache 搜索）</text>

    <text x="480" y="188" fill="#7a5415" font-weight="bold">性能:</text>
    <text x="550" y="188">~90% CUTLASS</text>

    <text x="480" y="208" fill="#7a5415" font-weight="bold">学习曲线:</text>
    <text x="590" y="208">平缓（Python 语法）</text>

    <text x="480" y="228" fill="#7a5415" font-weight="bold">灵活性:</text>
    <text x="550" y="228">高（但不如 CUTLASS）</text>

    <text x="480" y="248" fill="#7a5415" font-weight="bold">硬件:</text>
    <text x="550" y="248">主要 Sm80+</text>

    <text x="480" y="268" fill="#7a5415" font-weight="bold">生态:</text>
    <text x="550" y="268">FlashAttention / vLLM / Mistral</text>

    <text x="480" y="298" fill="#2e6e2e" font-weight="bold">优势:</text>
    <text x="550" y="298">快速开发 + 易维护</text>
    <text x="550" y="314">Python 生态原生集成</text>
    <text x="550" y="330">运行时调参（灵活）</text>

    <text x="480" y="358" fill="#b85450" font-weight="bold">劣势:</text>
    <text x="550" y="358">性能略低于 CUTLASS</text>
    <text x="550" y="374">首次运行慢（JIT 编译）</text>
    <text x="550" y="390">Epilogue 融合不如 EVT 灵活</text>
  </g>
</svg>
