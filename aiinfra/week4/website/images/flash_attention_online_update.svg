<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="520" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Online Softmax 扩展：(m, l, O) 三元组增量更新</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">Softmax #5 只更新 (m, l)；FlashAttention 多维护 O 累加器，softmax 与 matmul 融合</text>

  <!-- ===== Comparison: Softmax #5 vs FlashAttention ===== -->
  <line x1="20" y1="64" x2="620" y2="64" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- Left: Softmax #5 -->
  <text x="30" y="86" font-size="12" fill="#446688" font-weight="bold">Softmax #5：维护 (m, l)</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="96" width="270" height="100" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
    <text x="44" y="116" font-family="monospace" font-size="10" fill="#333">m_new = max(m, m_block)</text>
    <text x="44" y="132" font-family="monospace" font-size="10" fill="#333">l = l·exp(m - m_new) + Σexp(x - m_new)</text>
    <text x="44" y="156" font-size="9" fill="#888">最后：output[i] = exp(x[i]-m) / l</text>
    <text x="44" y="172" font-size="9" fill="#446688">→ 只算 softmax，无 matmul 融合</text>
    <text x="44" y="188" font-size="9" fill="#888">状态：2 个标量 (m, l)</text>
  </g>

  <!-- Right: FlashAttention -->
  <text x="340" y="86" font-size="12" fill="#4a7a3a" font-weight="bold">FlashAttention：维护 (m, l, O)</text>
  <g font-size="9" fill="#333">
    <rect x="340" y="96" width="270" height="100" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
    <text x="354" y="116" font-family="monospace" font-size="10" fill="#333">m_new = max(m, m_block)</text>
    <text x="354" y="132" font-family="monospace" font-size="10" fill="#333">l = l·exp(m - m_new) + Σexp(s - m_new)</text>
    <text x="354" y="148" font-family="monospace" font-size="10" fill="#b85450">O = O·exp(m - m_new) + Σexp(s - m_new)·V</text>
    <text x="354" y="172" font-size="9" fill="#4a7a3a">→ softmax 与 P·V 融合</text>
    <text x="354" y="188" font-size="9" fill="#888">状态：2 标量 + d 维向量 O</text>
  </g>

  <line x1="20" y1="216" x2="620" y2="216" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- ===== Step-by-step example ===== -->
  <text x="30" y="240" font-size="12" fill="#444" font-weight="bold">分步示例（Q 行 × 2 个 K/V tile，d=2 简化）：</text>

  <!-- table header -->
  <g font-size="9" fill="#444" font-weight="bold">
    <rect x="30" y="250" width="50" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="55" y="264" text-anchor="middle">step</text>
    <rect x="80" y="250" width="100" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="130" y="264" text-anchor="middle">K/V tile</text>
    <rect x="180" y="250" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="210" y="264" text-anchor="middle">m</text>
    <rect x="240" y="250" width="60" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="270" y="264" text-anchor="middle">l</text>
    <rect x="300" y="250" width="160" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="380" y="264" text-anchor="middle">O（未归一化）</text>
    <rect x="460" y="250" width="150" height="20" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="535" y="264" text-anchor="middle">操作</text>
  </g>

  <!-- init -->
  <g font-size="9" fill="#333">
    <rect x="30" y="270" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="55" y="284" text-anchor="middle">init</text>
    <rect x="80" y="270" width="100" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="130" y="284" text-anchor="middle">—</text>
    <rect x="180" y="270" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="210" y="284" text-anchor="middle">-∞</text>
    <rect x="240" y="270" width="60" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="270" y="284" text-anchor="middle">0</text>
    <rect x="300" y="270" width="160" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="380" y="284" text-anchor="middle">[0, 0]</text>
    <rect x="460" y="270" width="150" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="535" y="284" text-anchor="middle">初始化</text>
  </g>

  <!-- step 1: tile 0, S=[0.7, 0.5], V=[[1,2],[3,4]] -->
  <g font-size="9" fill="#333">
    <rect x="30" y="290" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="55" y="304" text-anchor="middle">1</text>
    <rect x="80" y="290" width="100" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="130" y="304" text-anchor="middle">tile 0</text>
    <rect x="180" y="290" width="60" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="210" y="304" text-anchor="middle">0.7</text>
    <rect x="240" y="290" width="60" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="270" y="304" text-anchor="middle">1.82</text>
    <rect x="300" y="290" width="160" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="380" y="304" text-anchor="middle">[1·1+0.61·3, 1·2+0.61·4]</text>
    <rect x="460" y="290" width="150" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="535" y="304" text-anchor="middle" font-size="8">S 片段 max=0.7</text>
  </g>

  <!-- step 2: tile 1, S=[0.9, 0.3], max changes! -->
  <g font-size="9" fill="#333">
    <rect x="30" y="310" width="50" height="20" fill="#fff" stroke="#eee" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="55" y="324" text-anchor="middle">2</text>
    <rect x="80" y="310" width="100" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="130" y="324" text-anchor="middle">tile 1</text>
    <rect x="180" y="310" width="60" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="210" y="324" text-anchor="middle" fill="#b85450" font-weight="bold">0.9</text>
    <rect x="240" y="310" width="60" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="270" y="324" text-anchor="middle">2.39</text>
    <rect x="300" y="310" width="160" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="380" y="324" text-anchor="middle" font-size="8">rescale + 累加</text>
    <rect x="460" y="310" width="150" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="535" y="324" text-anchor="middle" font-size="8" fill="#b85450">m 变大→rescale O,l</text>
  </g>

  <!-- final -->
  <g font-size="9" fill="#333">
    <rect x="30" y="330" width="50" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="55" y="344" text-anchor="middle" font-weight="bold">final</text>
    <rect x="80" y="330" width="100" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="130" y="344" text-anchor="middle">—</text>
    <rect x="180" y="330" width="60" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="210" y="344" text-anchor="middle">0.9</text>
    <rect x="240" y="330" width="60" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="270" y="344" text-anchor="middle">2.39</text>
    <rect x="300" y="330" width="160" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="380" y="344" text-anchor="middle">O_final</text>
    <rect x="460" y="330" width="150" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="535" y="344" text-anchor="middle" font-weight="bold" fill="#d6a040">O_output = O / l</text>
  </g>

  <!-- ===== Key formulas ===== -->
  <rect x="30" y="370" width="580" height="100" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="390" font-size="11" fill="#444" font-weight="bold">每步更新公式（max 从 m → m_new 时）：</text>
  <text x="60" y="408" font-family="monospace" font-size="10" fill="#b85450">α = exp(m - m_new)                          // 旧状态缩放因子</text>
  <text x="60" y="424" font-family="monospace" font-size="10" fill="#333">m_new = max(m, m_block)</text>
  <text x="60" y="440" font-family="monospace" font-size="10" fill="#446688">l = l · α + Σ exp(s_j - m_new)              // l rescale + 累加</text>
  <text x="60" y="456" font-family="monospace" font-size="10" fill="#4a7a3a">O = O · α + Σ exp(s_j - m_new) · V_j        // O rescale + 累加（融合 P·V）</text>

  <!-- summary -->
  <rect x="30" y="480" width="580" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="320" y="500" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">本质：softmax 归一化被拆成"增量累加 + 末尾除 l"，让 P·V 也能在扫描中融合</text>
</svg>
