<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="480" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Warp Shuffle：__shfl_down_sync 原理</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">warp 内线程直接交换寄存器值，无需 shared memory，无需同步</text>

  <!-- ===== Concept ===== -->
  <text x="30" y="72" font-size="12" fill="#446688" font-weight="bold">概念：lane 间的"传话游戏"</text>
  <text x="30" y="88" font-size="10" fill="#666">__shfl_down_sync(mask, val, delta)：把 val 向下传 delta 个 lane</text>
  <rect x="30" y="96" width="560" height="24" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="44" y="112" font-family="monospace" font-size="11" fill="#333">float __shfl_down_sync(0xffffffff, val, delta);  // mask=全 warp 参与</text>

  <!-- ===== 8 lanes (simplified from 32) ===== -->
  <text x="30" y="142" font-size="12" fill="#446688" font-weight="bold">演示：8 个 lane（实际 warp 有 32 个）</text>

  <!-- lane labels -->
  <g font-size="9" fill="#888">
    <text x="50" y="160" text-anchor="middle">lane</text>
    <text x="90"  y="160" text-anchor="middle">0</text>
    <text x="150" y="160" text-anchor="middle">1</text>
    <text x="210" y="160" text-anchor="middle">2</text>
    <text x="270" y="160" text-anchor="middle">3</text>
    <text x="330" y="160" text-anchor="middle">4</text>
    <text x="390" y="160" text-anchor="middle">5</text>
    <text x="450" y="160" text-anchor="middle">6</text>
    <text x="510" y="160" text-anchor="middle">7</text>
  </g>

  <!-- Step 0: initial values -->
  <text x="30" y="182" font-size="11" fill="#666" font-weight="bold">初始：</text>
  <g font-size="10" fill="#333">
    <rect x="70"  y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="184" text-anchor="middle">1</text>
    <rect x="130" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="150" y="184" text-anchor="middle">2</text>
    <rect x="190" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="210" y="184" text-anchor="middle">3</text>
    <rect x="250" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="270" y="184" text-anchor="middle">4</text>
    <rect x="310" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="330" y="184" text-anchor="middle">5</text>
    <rect x="370" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="390" y="184" text-anchor="middle">6</text>
    <rect x="430" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="450" y="184" text-anchor="middle">7</text>
    <rect x="490" y="168" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="510" y="184" text-anchor="middle">8</text>
  </g>

  <!-- Step 1: delta=4 -->
  <text x="30" y="218" font-size="11" fill="#4a7a3a" font-weight="bold">delta=4：</text>
  <text x="90" y="218" font-size="10" fill="#4a7a3a">lane 0 收到 lane 4 的值 → 1+5=6</text>

  <!-- arrows: lane 4->0, 5->1, 6->2, 7->3 -->
  <g stroke="#4a7a3a" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 330 192 L 330 198 L 90 198 L 90 204" marker-end="url(#arr)"/>
    <path d="M 390 192 L 390 198 L 150 198 L 150 204" marker-end="url(#arr)"/>
    <path d="M 450 192 L 450 198 L 210 198 L 210 204" marker-end="url(#arr)"/>
    <path d="M 510 192 L 510 198 L 270 198 L 270 204" marker-end="url(#arr)"/>
  </g>

  <g font-size="10" fill="#333">
    <rect x="70"  y="208" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="224" text-anchor="middle">6</text>
    <rect x="130" y="208" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="150" y="224" text-anchor="middle">8</text>
    <rect x="190" y="208" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="210" y="224" text-anchor="middle">10</text>
    <rect x="250" y="208" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="270" y="224" text-anchor="middle">12</text>
    <!-- lanes 4-7 become inactive (out of range) -->
    <rect x="310" y="208" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="330" y="224" text-anchor="middle" fill="#ccc">-</text>
    <rect x="370" y="208" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="390" y="224" text-anchor="middle" fill="#ccc">-</text>
    <rect x="430" y="208" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="450" y="224" text-anchor="middle" fill="#ccc">-</text>
    <rect x="490" y="208" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="510" y="224" text-anchor="middle" fill="#ccc">-</text>
  </g>

  <!-- Step 2: delta=2 -->
  <text x="30" y="258" font-size="11" fill="#d6a040" font-weight="bold">delta=2：</text>
  <text x="90" y="258" font-size="10" fill="#d6a040">lane 0 收到 lane 2 的值 → 6+10=16</text>
  <g stroke="#d6a040" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 210 232 L 210 238 L 90 238 L 90 244" marker-end="url(#arr)"/>
    <path d="M 270 232 L 270 238 L 150 238 L 150 244" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#333">
    <rect x="70"  y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="264" text-anchor="middle">16</text>
    <rect x="130" y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="150" y="264" text-anchor="middle">20</text>
    <rect x="190" y="248" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="210" y="264" text-anchor="middle" fill="#ccc">-</text>
    <rect x="250" y="248" width="40" height="24" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="270" y="264" text-anchor="middle" fill="#ccc">-</text>
  </g>

  <!-- Step 3: delta=1 -->
  <text x="30" y="298" font-size="11" fill="#b85450" font-weight="bold">delta=1：</text>
  <text x="90" y="298" font-size="10" fill="#b85450">lane 0 收到 lane 1 的值 → 16+20=36 ✓</text>
  <g stroke="#b85450" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 150 272 L 150 278 L 90 278 L 90 284" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#333">
    <rect x="70"  y="288" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="304" text-anchor="middle" font-weight="bold" fill="#b85450">36</text>
  </g>
  <text x="120" y="304" font-size="10" fill="#b85450" font-weight="bold">→ lane 0 持有最终结果</text>

  <!-- ===== Comparison ===== -->
  <line x1="20" y1="328" x2="620" y2="328" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="352" font-size="12" fill="#446688" font-weight="bold">对比：shared memory 归约 vs warp shuffle 归约</text>

  <rect x="30" y="364" width="280" height="96" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="384" font-size="11" fill="#b85450" font-weight="bold">shared memory 方式</text>
  <text x="44" y="402" font-size="10" fill="#555">• 数据先存 shared[s]</text>
  <text x="44" y="418" font-size="10" fill="#555">• 每步 __syncthreads()</text>
  <text x="44" y="434" font-size="10" fill="#555">• 有 bank conflict 风险</text>
  <text x="44" y="450" font-size="10" fill="#555">• 占用 shared memory 容量</text>

  <rect x="330" y="364" width="280" height="96" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="344" y="384" font-size="11" fill="#4a7a3a" font-weight="bold">warp shuffle 方式 ★</text>
  <text x="344" y="402" font-size="10" fill="#555">• 数据在寄存器里直接交换</text>
  <text x="344" y="418" font-size="10" fill="#555">• warp 内自动同步，无需 __syncthreads</text>
  <text x="344" y="434" font-size="10" fill="#555">• 无 bank conflict</text>
  <text x="344" y="450" font-size="10" fill="#555">• 不占 shared memory，延迟更低</text>
</svg>
