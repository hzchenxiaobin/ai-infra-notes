<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="760" height="460" fill="#fdfcf7"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">float4 向量化加载 vs 逐元素加载</text>
  <path d="M 250 42 Q 380 50 510 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>

  <!-- 左：逐元素加载（红） -->
  <text x="40" y="74" font-size="13" fill="#b03a3a" font-weight="bold">逐元素加载：4 条 32-bit load</text>
  <g filter="url(#sk)">
    <rect x="40" y="82" width="320" height="150" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="54" y="110" font-family="monospace" font-size="12" fill="#2b2b2b">float a0 = ptr[0];  // 32-bit</text>
  <text x="54" y="130" font-family="monospace" font-size="12" fill="#2b2b2b">float a1 = ptr[1];  // 32-bit</text>
  <text x="54" y="150" font-family="monospace" font-size="12" fill="#2b2b2b">float a2 = ptr[2];  // 32-bit</text>
  <text x="54" y="170" font-family="monospace" font-size="12" fill="#2b2b2b">float a3 = ptr[3];  // 32-bit</text>
  <g filter="url(#sk)">
    <rect x="54" y="190" width="130" height="28" rx="6" fill="#b03a3a" opacity="0.18" stroke="#b03a3a" stroke-width="1.2"/>
  </g>
  <text x="119" y="209" text-anchor="middle" font-size="12" fill="#b03a3a" font-weight="bold">4 条指令</text>

  <!-- 右：float4 加载（绿） -->
  <text x="400" y="74" font-size="13" fill="#4a8e4a" font-weight="bold">float4 加载：1 条 128-bit load</text>
  <g filter="url(#sk)">
    <rect x="400" y="82" width="320" height="150" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="414" y="110" font-family="monospace" font-size="12" fill="#2b2b2b">float4 val =</text>
  <text x="414" y="130" font-family="monospace" font-size="12" fill="#2b2b2b">  reinterpret_cast&lt;const float4*&gt;(ptr)[0];</text>
  <text x="414" y="156" font-size="11" fill="#888">// val.x=ptr[0]  val.y=ptr[1]</text>
  <text x="414" y="174" font-size="11" fill="#888">// val.z=ptr[2]  val.w=ptr[3]</text>
  <g filter="url(#sk)">
    <rect x="576" y="190" width="130" height="28" rx="6" fill="#4a8e4a" opacity="0.18" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="641" y="209" text-anchor="middle" font-size="12" fill="#4a8e4a" font-weight="bold">1 条指令</text>

  <!-- 中间对比箭头 -->
  <path d="M 366 157 L 394 157" stroke="#3a3a3a" stroke-width="1.8" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 使用条件 -->
  <g filter="url(#sk)">
    <rect x="40" y="252" width="680" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4"/>
    <rect x="40" y="252" width="680" height="26" fill="#4a8edb" opacity="0.12" rx="8"/>
  </g>
  <text x="380" y="270" text-anchor="middle" font-size="13" fill="#4a8edb" font-weight="bold">使用条件</text>
  <text x="60" y="304" font-size="12" fill="#4a8e4a" font-weight="bold">✓ 地址 16 字节对齐</text>
  <text x="250" y="304" font-size="11" fill="#666">cudaMalloc 分配的内存天然对齐</text>
  <text x="60" y="330" font-size="12" fill="#4a8e4a" font-weight="bold">✓ Coalesced 访问模式</text>
  <text x="250" y="330" font-size="11" fill="#666">连续线程访问连续地址，合并为最少 cache line</text>
  <text x="60" y="356" font-size="12" fill="#4a8e4a" font-weight="bold">✓ 数据布局支持</text>
  <text x="250" y="356" font-size="11" fill="#666">行优先矩阵的连续行元素天然连续</text>

  <!-- 收益底栏 -->
  <g filter="url(#sk)">
    <rect x="150" y="392" width="460" height="42" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="380" y="419" text-anchor="middle" font-size="13" fill="#4a8edb" font-weight="bold">收益：Global Memory 带宽利用率提升 10-15%</text>
</svg>
