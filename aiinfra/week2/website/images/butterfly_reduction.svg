<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8e4a"/>
    </marker>
  </defs>
  <rect width="860" height="500" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Warp Reduce Butterfly 模式（5 步归约）</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Column headers -->
  <g font-size="11" font-weight="bold">
    <text x="100" y="76" text-anchor="middle" fill="#4a8edb">初始值</text>
    <text x="250" y="76" text-anchor="middle" fill="#c98a2b">Step 1</text>
    <text x="250" y="90" text-anchor="middle" fill="#c98a2b" font-size="9">offset=16</text>
    <text x="390" y="76" text-anchor="middle" fill="#c98a2b">Step 2</text>
    <text x="390" y="90" text-anchor="middle" fill="#c98a2b" font-size="9">offset=8</text>
    <text x="530" y="76" text-anchor="middle" fill="#c98a2b">Step 3</text>
    <text x="530" y="90" text-anchor="middle" fill="#c98a2b" font-size="9">offset=4</text>
    <text x="650" y="76" text-anchor="middle" fill="#c98a2b">Step 4</text>
    <text x="650" y="90" text-anchor="middle" fill="#c98a2b" font-size="9">offset=2</text>
    <text x="770" y="76" text-anchor="middle" fill="#4a8e4a">Step 5</text>
    <text x="770" y="90" text-anchor="middle" fill="#4a8e4a" font-size="9">offset=1</text>
  </g>

  <!-- Lane labels (left side, showing 8 representative lanes) -->
  <g font-size="10" fill="#555">
    <text x="40" y="118">Lane 0</text>
    <text x="40" y="158">Lane 1</text>
    <text x="40" y="198">...</text>
    <text x="40" y="238">Lane 15</text>
    <text x="40" y="278">Lane 16</text>
    <text x="40" y="318">...</text>
    <text x="40" y="358">Lane 30</text>
    <text x="40" y="398">Lane 31</text>
  </g>

  <!-- ===== Step 0: initial values ===== -->
  <g font-size="9" fill="#2b2b2b">
    <g filter="url(#sk)"><circle cx="100" cy="114" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="117" text-anchor="middle">v0</text></g>
    <g filter="url(#sk)"><circle cx="100" cy="154" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="157" text-anchor="middle">v1</text></g>
    <g filter="url(#sk)"><circle cx="100" cy="194" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g>
    <g filter="url(#sk)"><circle cx="100" cy="234" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="237" text-anchor="middle">v15</text></g>
    <g filter="url(#sk)"><circle cx="100" cy="274" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="277" text-anchor="middle">v16</text></g>
    <g filter="url(#sk)"><circle cx="100" cy="314" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.8"/></g>
    <g filter="url(#sk)"><circle cx="100" cy="354" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="357" text-anchor="middle">v30</text></g>
    <g filter="url(#sk)"><circle cx="100" cy="394" r="11" fill="#f0ede4" stroke="#4a8edb" stroke-width="1.2"/><text x="100" y="397" text-anchor="middle">v31</text></g>
  </g>

  <!-- ===== Step 1: offset=16 (lane0↔lane16, lane1↔lane17...) ===== -->
  <!-- arrows: lane0 ↔ lane16 -->
  <g stroke="#c98a2b" stroke-width="1.4" fill="none">
    <path d="M 112 114 Q 180 200 238 270" marker-end="url(#arO)" filter="url(#sk)"/>
    <path d="M 112 274 Q 180 200 238 110" marker-end="url(#arO)" filter="url(#sk)"/>
  </g>
  <g font-size="9" fill="#2b2b2b">
    <g filter="url(#sk)"><circle cx="250" cy="114" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/><text x="250" y="117" text-anchor="middle" font-size="7">v0+16</text></g>
    <g filter="url(#sk)"><circle cx="250" cy="154" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="194" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="234" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="274" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="314" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="354" r="11" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="250" cy="394" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
  </g>

  <!-- ===== Step 2: offset=8 (lane0↔lane8) ===== -->
  <g stroke="#c98a2b" stroke-width="1.4" fill="none">
    <path d="M 262 114 Q 320 160 378 194" marker-end="url(#arO)" filter="url(#sk)"/>
    <path d="M 262 194 Q 320 160 378 110" marker-end="url(#arO)" filter="url(#sk)"/>
  </g>
  <g font-size="9" fill="#2b2b2b">
    <g filter="url(#sk)"><circle cx="390" cy="114" r="11" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1"/><text x="390" y="117" text-anchor="middle" font-size="7">+v8</text></g>
    <g filter="url(#sk)"><circle cx="390" cy="154" r="11" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="194" r="11" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="234" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="274" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="314" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="354" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="390" cy="394" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
  </g>

  <!-- ===== Step 3: offset=4 (lane0↔lane4) ===== -->
  <g stroke="#c98a2b" stroke-width="1.4" fill="none">
    <path d="M 402 114 Q 460 140 518 154" marker-end="url(#arO)" filter="url(#sk)"/>
    <path d="M 402 154 Q 460 140 518 110" marker-end="url(#arO)" filter="url(#sk)"/>
  </g>
  <g font-size="9" fill="#2b2b2b">
    <g filter="url(#sk)"><circle cx="530" cy="114" r="11" fill="#c98a2b" opacity="0.55" stroke="#c98a2b" stroke-width="1"/><text x="530" y="117" text-anchor="middle" font-size="7">+v4</text></g>
    <g filter="url(#sk)"><circle cx="530" cy="154" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="194" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="234" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="274" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="314" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="354" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
    <g filter="url(#sk)"><circle cx="530" cy="394" r="11" fill="#f0ede4" stroke="#9e9e9e" stroke-width="0.6" opacity="0.5"/></g>
  </g>

  <!-- ===== Step 4: offset=2 (lane0↔lane2) ===== -->
  <g stroke="#c98a2b" stroke-width="1.4" fill="none">
    <path d="M 542 114 Q 590 130 638 154" marker-end="url(#arO)" filter="url(#sk)"/>
  </g>
  <g font-size="9" fill="#2b2b2b">
    <g filter="url(#sk)"><circle cx="650" cy="114" r="11" fill="#c98a2b" opacity="0.7" stroke="#c98a2b" stroke-width="1.2"/><text x="650" y="117" text-anchor="middle" font-size="7">+v2</text></g>
  </g>

  <!-- ===== Step 5: offset=1 (lane0↔lane1) → final SUM ===== -->
  <g stroke="#4a8e4a" stroke-width="1.6" fill="none">
    <path d="M 662 114 Q 710 120 758 114" marker-end="url(#arG)" filter="url(#sk)"/>
  </g>
  <g filter="url(#sk)">
    <circle cx="770" cy="114" r="14" fill="#4a8e4a" opacity="0.8" stroke="#2e6e2e" stroke-width="2"/>
    <text x="770" y="118" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">SUM</text>
  </g>

  <!-- Result annotation -->
  <g filter="url(#sk)">
    <rect x="200" y="430" width="460" height="30" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="430" y="450" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">5 步后 lane 0 持有 32 线程的累加和</text>

  <text x="430" y="480" text-anchor="middle" font-size="11" fill="#666" font-family="monospace">每步: val += __shfl_down_sync(0xFFFFFFFF, val, offset)</text>
</svg>
