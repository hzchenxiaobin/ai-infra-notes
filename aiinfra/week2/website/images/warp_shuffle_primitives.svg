<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#446688"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#4a7a3a"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#d6a040"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b85450"/>
    </marker>
  </defs>

  <rect width="820" height="680" fill="#fafafa"/>

  <text x="410" y="28" text-anchor="middle" font-size="16" fill="#444" font-weight="bold">Warp Shuffle 四大家族数据流向</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#888">展示 8 个 lane（实际 32 个），虚线 = 数据来源</text>

  <!-- ===== ① __shfl_sync (broadcast) ===== -->
  <rect x="30" y="60" width="370" height="180" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" rx="8" filter="url(#rough2)" opacity="0.35"/>
  <text x="215" y="80" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">① __shfl_sync(mask, val, srcLane=4)</text>
  <text x="215" y="96" text-anchor="middle" font-size="10" fill="#666">广播：所有 lane 都得到 lane 4 的值</text>

  <g font-size="9" fill="#555">
    <text x="50" y="118">lane 0</text><text x="50" y="138">lane 1</text><text x="50" y="158">lane 2</text>
    <text x="50" y="178">lane 3</text><text x="50" y="198">lane 4</text><text x="50" y="218">lane 5</text>
  </g>
  <!-- src column -->
  <g font-size="9" fill="#333">
    <rect x="95"  y="108" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="120" text-anchor="middle">V0</text>
    <rect x="95"  y="128" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="140" text-anchor="middle">V1</text>
    <rect x="95"  y="148" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="160" text-anchor="middle">V2</text>
    <rect x="95"  y="168" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="180" text-anchor="middle">V3</text>
    <rect x="95"  y="188" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="2" filter="url(#rough2)"/>
    <text x="112" y="200" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="95"  y="208" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="220" text-anchor="middle">V5</text>
  </g>
  <!-- arrows from V4 to all results -->
  <g stroke="#446688" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 130 196 Q 220 120 280 116" marker-end="url(#arrB)"/>
    <path d="M 130 196 Q 220 135 280 136" marker-end="url(#arrB)"/>
    <path d="M 130 196 Q 220 150 280 156" marker-end="url(#arrB)"/>
    <path d="M 130 196 Q 220 170 280 176" marker-end="url(#arrB)"/>
    <path d="M 130 196 L 280 196" marker-end="url(#arrB)"/>
    <path d="M 130 196 Q 220 210 280 216" marker-end="url(#arrB)"/>
  </g>
  <!-- result column -->
  <g font-size="9" fill="#446688">
    <rect x="280" y="108" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="120" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="128" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="140" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="148" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="160" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="168" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="180" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="188" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="200" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="208" width="34" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="220" text-anchor="middle" font-weight="bold">V4</text>
  </g>
  <text x="330" y="160" font-size="10" fill="#446688" font-weight="bold">← 全变 V4</text>

  <!-- ===== ② __shfl_up_sync ===== -->
  <rect x="420" y="60" width="370" height="180" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)" opacity="0.35"/>
  <text x="605" y="80" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">② __shfl_up_sync(mask, val, delta=2)</text>
  <text x="605" y="96" text-anchor="middle" font-size="10" fill="#666">前缀和：lane i 读 lane (i-2)</text>

  <g font-size="9" fill="#555">
    <text x="440" y="118">lane 0</text><text x="440" y="138">lane 1</text><text x="440" y="158">lane 2</text>
    <text x="440" y="178">lane 3</text><text x="440" y="198">lane 4</text><text x="440" y="218">lane 5</text>
  </g>
  <g font-size="9" fill="#333">
    <rect x="485" y="108" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="120" text-anchor="middle">V0</text>
    <rect x="485" y="128" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="140" text-anchor="middle">V1</text>
    <rect x="485" y="148" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="160" text-anchor="middle">V2</text>
    <rect x="485" y="168" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="180" text-anchor="middle">V3</text>
    <rect x="485" y="188" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="200" text-anchor="middle">V4</text>
    <rect x="485" y="208" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="220" text-anchor="middle">V5</text>
  </g>
  <!-- arrows: up by 2, lane2<-lane0, lane3<-lane1... lane0,1 无来源 -->
  <g stroke="#4a7a3a" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 520 116 Q 580 132 640 156" marker-end="url(#arrG)"/>
    <path d="M 520 136 Q 580 152 640 176" marker-end="url(#arrG)"/>
    <path d="M 520 156 Q 580 172 640 196" marker-end="url(#arrG)"/>
    <path d="M 520 176 Q 580 192 640 216" marker-end="url(#arrG)"/>
  </g>
  <g font-size="9" fill="#4a7a3a">
    <rect x="640" y="108" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="657" y="120" text-anchor="middle" fill="#bbb">-</text>
    <rect x="640" y="128" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="657" y="140" text-anchor="middle" fill="#bbb">-</text>
    <rect x="640" y="148" width="34" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="160" text-anchor="middle" font-weight="bold">V0</text>
    <rect x="640" y="168" width="34" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="180" text-anchor="middle" font-weight="bold">V1</text>
    <rect x="640" y="188" width="34" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="200" text-anchor="middle" font-weight="bold">V2</text>
    <rect x="640" y="208" width="34" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="220" text-anchor="middle" font-weight="bold">V3</text>
  </g>
  <text x="690" y="160" font-size="10" fill="#4a7a3a" font-weight="bold">← 低 2 不变</text>

  <!-- ===== ③ __shfl_down_sync ===== -->
  <rect x="30" y="260" width="370" height="180" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)" opacity="0.35"/>
  <text x="215" y="280" text-anchor="middle" font-size="12" fill="#d6a040" font-weight="bold">③ __shfl_down_sync(mask, val, delta=2)</text>
  <text x="215" y="296" text-anchor="middle" font-size="10" fill="#666">归约：lane i 读 lane (i+2)</text>

  <g font-size="9" fill="#555">
    <text x="50" y="318">lane 0</text><text x="50" y="338">lane 1</text><text x="50" y="358">lane 2</text>
    <text x="50" y="378">lane 3</text><text x="50" y="398">lane 4</text><text x="50" y="418">lane 5</text>
  </g>
  <g font-size="9" fill="#333">
    <rect x="95" y="308" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="320" text-anchor="middle">V0</text>
    <rect x="95" y="328" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="340" text-anchor="middle">V1</text>
    <rect x="95" y="348" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="360" text-anchor="middle">V2</text>
    <rect x="95" y="368" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="380" text-anchor="middle">V3</text>
    <rect x="95" y="388" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="400" text-anchor="middle">V4</text>
    <rect x="95" y="408" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="112" y="420" text-anchor="middle">V5</text>
  </g>
  <g stroke="#d6a040" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 130 316 Q 220 316 280 336" marker-end="url(#arrO)"/>
    <path d="M 130 336 Q 220 336 280 356" marker-end="url(#arrO)"/>
    <path d="M 130 356 Q 220 356 280 376" marker-end="url(#arrO)"/>
    <path d="M 130 376 Q 220 376 280 396" marker-end="url(#arrO)"/>
  </g>
  <g font-size="9" fill="#d6a040">
    <rect x="280" y="308" width="34" height="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="320" text-anchor="middle" font-weight="bold">V2</text>
    <rect x="280" y="328" width="34" height="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="340" text-anchor="middle" font-weight="bold">V3</text>
    <rect x="280" y="348" width="34" height="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="360" text-anchor="middle" font-weight="bold">V4</text>
    <rect x="280" y="368" width="34" height="16" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="297" y="380" text-anchor="middle" font-weight="bold">V5</text>
    <rect x="280" y="388" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="297" y="400" text-anchor="middle" fill="#bbb">-</text>
    <rect x="280" y="408" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="297" y="420" text-anchor="middle" fill="#bbb">-</text>
  </g>
  <text x="330" y="360" font-size="10" fill="#d6a040" font-weight="bold">← 高 2 不变</text>

  <!-- ===== ④ __shfl_xor_sync ===== -->
  <rect x="420" y="260" width="370" height="180" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="8" filter="url(#rough2)" opacity="0.35"/>
  <text x="605" y="280" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">④ __shfl_xor_sync(mask, val, laneMask=2)</text>
  <text x="605" y="296" text-anchor="middle" font-size="10" fill="#666">蝶形交换：lane i 读 lane (i^2)</text>

  <g font-size="9" fill="#555">
    <text x="440" y="318">lane 0</text><text x="440" y="338">lane 1</text><text x="440" y="358">lane 2</text>
    <text x="440" y="378">lane 3</text><text x="440" y="398">lane 4</text><text x="440" y="418">lane 5</text>
  </g>
  <g font-size="9" fill="#333">
    <rect x="485" y="308" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="320" text-anchor="middle">V0</text>
    <rect x="485" y="328" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="340" text-anchor="middle">V1</text>
    <rect x="485" y="348" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="360" text-anchor="middle">V2</text>
    <rect x="485" y="368" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="380" text-anchor="middle">V3</text>
    <rect x="485" y="388" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="400" text-anchor="middle">V4</text>
    <rect x="485" y="408" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="502" y="420" text-anchor="middle">V5</text>
  </g>
  <!-- arrows: 0<->2, 1<->3, 4<->6(未画), 5<->7(未画) -->
  <g stroke="#b85450" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 520 316 Q 580 340 640 356" marker-end="url(#arrR)"/>
    <path d="M 520 356 Q 580 340 640 316" marker-end="url(#arrR)"/>
    <path d="M 520 336 Q 580 360 640 376" marker-end="url(#arrR)"/>
    <path d="M 520 376 Q 580 360 640 336" marker-end="url(#arrR)"/>
  </g>
  <g font-size="9" fill="#b85450">
    <rect x="640" y="308" width="34" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="320" text-anchor="middle" font-weight="bold">V2</text>
    <rect x="640" y="328" width="34" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="340" text-anchor="middle" font-weight="bold">V3</text>
    <rect x="640" y="348" width="34" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="360" text-anchor="middle" font-weight="bold">V0</text>
    <rect x="640" y="368" width="34" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="657" y="380" text-anchor="middle" font-weight="bold">V1</text>
    <rect x="640" y="388" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="657" y="400" text-anchor="middle" fill="#bbb">V6</text>
    <rect x="640" y="408" width="34" height="16" fill="#f6f6f6" stroke="#ccc" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
    <text x="657" y="420" text-anchor="middle" fill="#bbb">V7</text>
  </g>
  <text x="690" y="360" font-size="10" fill="#b85450" font-weight="bold">← 互换</text>

  <!-- ===== Summary table ===== -->
  <line x1="20" y1="464" x2="800" y2="464" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="488" font-size="12" fill="#444" font-weight="bold">四原语对比：</text>

  <g font-size="10" fill="#333">
    <!-- header -->
    <text x="30" y="508" font-weight="bold" fill="#446688">原语</text>
    <text x="160" y="508" font-weight="bold" fill="#446688">数据流向</text>
    <text x="320" y="508" font-weight="bold" fill="#446688">结果分布</text>
    <text x="460" y="508" font-weight="bold" fill="#446688">典型场景</text>

    <text x="30" y="528" fill="#446688">__shfl_sync</text>
    <text x="160" y="528">srcLane → 所有 lane</text>
    <text x="320" y="528">全部相同</text>
    <text x="460" y="528">广播（broadcast）</text>

    <text x="30" y="546" fill="#4a7a3a">__shfl_up_sync</text>
    <text x="160" y="546">低 lane → 高 lane</text>
    <text x="320" y="546">前缀（N 个值）</text>
    <text x="460" y="546">前缀和（scan）</text>

    <text x="30" y="564" fill="#d6a040">__shfl_down_sync</text>
    <text x="160" y="564">高 lane → 低 lane</text>
    <text x="320" y="564">汇聚 lane 0（1 个值）</text>
    <text x="460" y="564">归约（reduce）</text>

    <text x="30" y="582" fill="#b85450">__shfl_xor_sync</text>
    <text x="160" y="582">双向蝶形交换</text>
    <text x="320" y="582">全部相同</text>
    <text x="460" y="582">归约+广播</text>
  </g>

  <!-- latency note -->
  <rect x="30" y="602" width="760" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="410" y="624" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">核心优势：延迟对比</text>
  <text x="410" y="644" text-anchor="middle" font-size="11" fill="#4a7a3a">Warp Shuffle ~1-2 cycles（寄存器直连，硬件同步，1 条指令）</text>
  <text x="410" y="660" text-anchor="middle" font-size="11" fill="#b85450">Shared Memory ~20-30 cycles（需 __syncthreads，store+load 两条指令，慢 10-20×）</text>
</svg>
