<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="860" height="560" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Multi-Stream H2D / Compute / D2H 重叠流水线</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Top: sequential (no stream) ===== -->
  <text x="430" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">顺序执行（无 Stream）：总计 = H2D + Compute + D2H</text>

  <!-- row label right-aligned -->
  <text x="90" y="104" font-size="12" fill="#666" font-weight="bold" text-anchor="end">Default</text>
  <!-- batch 1 -->
  <g filter="url(#sk)">
    <rect x="100" y="86" width="100" height="32" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="150" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)">
    <rect x="200" y="86" width="100" height="32" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="250" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">Compute</text>
  <g filter="url(#sk)">
    <rect x="300" y="86" width="100" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="350" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H</text>
  <!-- batch 2 -->
  <g filter="url(#sk)">
    <rect x="400" y="86" width="100" height="32" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="450" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)">
    <rect x="500" y="86" width="100" height="32" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="550" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">Compute</text>
  <g filter="url(#sk)">
    <rect x="600" y="86" width="100" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="650" y="107" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H</text>

  <!-- time arrow -->
  <path d="M 100 132 L 700 132" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="712" y="136" font-size="10" fill="#888">时间</text>

  <!-- divider -->
  <path d="M 60 152 L 800 152" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="6 4" filter="url(#sk)"/>

  <!-- ===== Bottom: multi-stream (parallel) ===== -->
  <text x="430" y="176" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8e4a">Multi-Stream 重叠：总计 ≈ max(H2D, Compute) + 流水线填充</text>

  <!-- Stream 1 -->
  <text x="90" y="210" font-size="12" fill="#666" font-weight="bold" text-anchor="end">Stream 1</text>
  <g filter="url(#sk)"><rect x="100" y="192" width="70" height="28" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="135" y="211" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="170" y="192" width="70" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="205" y="211" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="240" y="192" width="70" height="28" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="275" y="211" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 2 -->
  <text x="90" y="248" font-size="12" fill="#666" font-weight="bold" text-anchor="end">Stream 2</text>
  <g filter="url(#sk)"><rect x="135" y="230" width="70" height="28" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="170" y="249" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="205" y="230" width="70" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="240" y="249" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="275" y="230" width="70" height="28" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="310" y="249" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 3 -->
  <text x="90" y="286" font-size="12" fill="#666" font-weight="bold" text-anchor="end">Stream 3</text>
  <g filter="url(#sk)"><rect x="170" y="268" width="70" height="28" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="205" y="287" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="240" y="268" width="70" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="275" y="287" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="310" y="268" width="70" height="28" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="345" y="287" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- Stream 4 -->
  <text x="90" y="324" font-size="12" fill="#666" font-weight="bold" text-anchor="end">Stream 4</text>
  <g filter="url(#sk)"><rect x="205" y="306" width="70" height="28" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="240" y="325" text-anchor="middle" font-size="10" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="275" y="306" width="70" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="310" y="325" text-anchor="middle" font-size="10" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="345" y="306" width="70" height="28" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.2"/></g>
  <text x="380" y="325" text-anchor="middle" font-size="10" fill="#2b2b2b">D2H</text>

  <!-- targeted overlap annotation: vertical dashed line + bracket at the overlap point -->
  <!-- Stream1.Comp [170-240] overlaps in time with Stream2.H2D [135-205], shared window ~[170-205] -->
  <path d="M 187 220 L 187 230" stroke="#4a8e4a" stroke-width="1.6" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>
  <path d="M 172 222 L 172 228 L 202 228 L 202 222" stroke="#4a8e4a" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="430" y="352" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">↑ 此刻：Copy Engine 做 Stream2 H2D，Compute Engine 做 Stream1 Comp — 真正并行</text>

  <!-- time arrow -->
  <path d="M 100 376 L 415 376" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="427" y="380" font-size="10" fill="#888">时间</text>

  <!-- divider -->
  <path d="M 60 398 L 800 398" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="6 4" filter="url(#sk)"/>

  <!-- ===== Hardware engines ===== -->
  <text x="430" y="424" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">硬件引擎物理独立，可真正并行</text>
  <g filter="url(#sk)"><rect x="180" y="438" width="160" height="30" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="260" y="458" text-anchor="middle" font-size="11" fill="#c98a2b" font-weight="bold">Copy Engine（DMA）</text>
  <g filter="url(#sk)"><rect x="380" y="438" width="180" height="30" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="470" y="458" text-anchor="middle" font-size="11" fill="#4a8edb" font-weight="bold">Compute Engine（SM）</text>

  <!-- speedup -->
  <g filter="url(#sk)">
    <rect x="160" y="486" width="540" height="36" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="430" y="509" text-anchor="middle" font-size="13" fill="#2e6e2e" font-weight="bold">加速比通常 1.2x ~ 1.8x（取决于 Copy Engine 数量）</text>

  <!-- note -->
  <text x="430" y="542" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Copy Engine 和 Compute Engine 物理独立，可真正并行（非时间片模拟）</text>
</svg>
