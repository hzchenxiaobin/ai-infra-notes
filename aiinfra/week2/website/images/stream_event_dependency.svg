<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
  </defs>
  <rect width="860" height="460" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">cudaEvent 跨 Stream 依赖管理</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- scenario description -->
  <text x="430" y="66" text-anchor="middle" font-size="12" fill="#555">场景：Stream C 必须等待 Stream A 和 Stream B 的 D2H 都完成</text>

  <!-- ===== Stream A ===== -->
  <text x="80" y="100" font-size="13" fill="#4a8edb" font-weight="bold">Stream A</text>
  <g filter="url(#sk)"><rect x="160" y="84" width="110" height="32" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/></g>
  <text x="215" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">Kernel A</text>
  <g filter="url(#sk)"><rect x="270" y="84" width="110" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/></g>
  <text x="325" y="105" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H A</text>
  <!-- Event 1 -->
  <g filter="url(#sk)"><circle cx="410" cy="100" r="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="410" y="104" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">E1</text>
  <text x="430" y="104" font-size="10" fill="#c98a2b" font-family="monospace">cudaEventRecord(event1, streamA)</text>

  <!-- ===== Stream B ===== -->
  <text x="80" y="156" font-size="13" fill="#4a8e4a" font-weight="bold">Stream B</text>
  <g filter="url(#sk)"><rect x="160" y="140" width="110" height="32" rx="5" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/></g>
  <text x="215" y="161" text-anchor="middle" font-size="11" fill="#2b2b2b">Kernel B</text>
  <g filter="url(#sk)"><rect x="270" y="140" width="110" height="32" rx="5" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/></g>
  <text x="325" y="161" text-anchor="middle" font-size="11" fill="#2b2b2b">D2H B</text>
  <!-- Event 2 -->
  <g filter="url(#sk)"><circle cx="410" cy="156" r="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="410" y="160" text-anchor="middle" font-size="9" fill="#7a5415" font-weight="bold">E2</text>
  <text x="430" y="160" font-size="10" fill="#c98a2b" font-family="monospace">cudaEventRecord(event2, streamB)</text>

  <!-- ===== Arrows: events to Stream C ===== -->
  <path d="M 410 112 Q 410 180 410 210" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="4 3" fill="none" marker-end="url(#arO)" filter="url(#sk)"/>
  <path d="M 410 168 Q 410 190 410 210" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="4 3" fill="none" marker-end="url(#arO)" filter="url(#sk)"/>
  <text x="430" y="196" font-size="10" fill="#c98a2b" font-weight="bold">cudaStreamWaitEvent</text>

  <!-- ===== Stream C ===== -->
  <text x="80" y="232" font-size="13" fill="#c98a2b" font-weight="bold">Stream C</text>
  <g filter="url(#sk)"><rect x="350" y="216" width="140" height="32" rx="5" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/></g>
  <text x="420" y="237" text-anchor="middle" font-size="11" fill="#2b2b2b">Post-process</text>
  <text x="510" y="236" font-size="10" fill="#4a8e4a" font-weight="bold">← 仅在 E1 和 E2 都完成后才开始</text>

  <!-- ===== Code snippet ===== -->
  <g filter="url(#sk)">
    <rect x="80" y="280" width="700" height="150" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4"/>
  </g>
  <text x="95" y="304" font-size="11" fill="#888" font-family="monospace">// 1. 在 Stream A 和 B 中记录事件</text>
  <text x="95" y="326" font-size="12" fill="#4a8edb" font-family="monospace" font-weight="bold">cudaEventRecord(event1, streamA);</text>
  <text x="95" y="350" font-size="12" fill="#4a8e4a" font-family="monospace" font-weight="bold">cudaEventRecord(event2, streamB);</text>
  <text x="95" y="378" font-size="11" fill="#888" font-family="monospace">// 2. Stream C 等待两个事件（非阻塞，仅插入依赖）</text>
  <text x="95" y="400" font-size="12" fill="#c98a2b" font-family="monospace" font-weight="bold">cudaStreamWaitEvent(streamC, event1, 0);</text>
  <text x="95" y="420" font-size="12" fill="#c98a2b" font-family="monospace" font-weight="bold">cudaStreamWaitEvent(streamC, event2, 0);</text>
</svg>
