<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Week 5 知识地图：从两阶段到推理引擎</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">主线：Prefill/Decode 分析 → KV Cache 实现 → vLLM 架构 → PagedAttention → Mini 引擎 → Profiling → 核心问题总结</text>

  <!-- Day1 -->
  <g filter="url(#sk)">
    <rect x="40" y="92" width="200" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="140" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Day 1：Prefill vs Decode</text>
  <text x="140" y="134" text-anchor="middle" font-size="10" fill="#444">两阶段本质差异</text>
  <text x="140" y="150" text-anchor="middle" font-size="10" fill="#444">compute vs memory-bound</text>
  <text x="140" y="166" text-anchor="middle" font-size="9" fill="#888">TTFT / TBT 指标</text>

  <path d="M 240 132 L 280 132" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day2 -->
  <g filter="url(#sk)">
    <rect x="280" y="92" width="200" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="380" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Day 2：实现 KV Cache</text>
  <text x="380" y="134" text-anchor="middle" font-size="10" fill="#444">5D 内存布局</text>
  <text x="380" y="150" text-anchor="middle" font-size="10" fill="#444">append/get_cache/reset</text>
  <text x="380" y="166" text-anchor="middle" font-size="9" fill="#888">静态/动态/Paged 分配</text>

  <path d="M 480 132 L 520 132" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day3 -->
  <g filter="url(#sk)">
    <rect x="520" y="92" width="200" height="80" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="620" y="114" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Day 3：vLLM 整体架构</text>
  <text x="620" y="134" text-anchor="middle" font-size="10" fill="#444">LLMEngine→Scheduler→Worker</text>
  <text x="620" y="150" text-anchor="middle" font-size="10" fill="#444">Continuous Batching</text>
  <text x="620" y="166" text-anchor="middle" font-size="9" fill="#888">SchedulingBudget + 抢占</text>

  <path d="M 620 172 L 620 212" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day4 -->
  <g filter="url(#sk)">
    <rect x="520" y="216" width="200" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="620" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Day 4：PagedAttention</text>
  <text x="620" y="258" text-anchor="middle" font-size="10" fill="#444">block table 逻辑→物理</text>
  <text x="620" y="274" text-anchor="middle" font-size="10" fill="#444">Copy-on-Write</text>
  <text x="620" y="290" text-anchor="middle" font-size="9" fill="#888">解决静态浪费+动态碎片</text>

  <path d="M 520 256 L 480 256" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day5 -->
  <g filter="url(#sk)">
    <rect x="280" y="216" width="200" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="380" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Day 5：Mini 引擎 v0</text>
  <text x="380" y="258" text-anchor="middle" font-size="10" fill="#444">5 大组件 + generate 循环</text>
  <text x="380" y="274" text-anchor="middle" font-size="10" fill="#444">with/without cache 验证</text>
  <text x="380" y="290" text-anchor="middle" font-size="9" fill="#888">Prefill+Decode 闭环</text>

  <path d="M 280 256 L 240 256" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day6 -->
  <g filter="url(#sk)">
    <rect x="40" y="216" width="200" height="80" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="140" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Day 6：端到端 Profiling</text>
  <text x="140" y="258" text-anchor="middle" font-size="10" fill="#444">三层方法论 nsys/Event/ncu</text>
  <text x="140" y="274" text-anchor="middle" font-size="10" fill="#444">TTFT/TBT breakdown</text>
  <text x="140" y="290" text-anchor="middle" font-size="9" fill="#888">瓶颈定位决策树</text>

  <path d="M 140 296 L 140 336" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day7 -->
  <g filter="url(#sk)">
    <rect x="40" y="340" width="680" height="80" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.8"/>
  </g>
  <text x="380" y="364" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2828">Day 7：推理系统核心问题总结</text>
  <text x="380" y="384" text-anchor="middle" font-size="11" fill="#444">四大核心问题：内存管理 / Batch 策略 / Latency 隐藏 / 调度开销</text>
  <text x="380" y="402" text-anchor="middle" font-size="11" fill="#444">优化速查表 + 17 道面试题复盘</text>
  <text x="380" y="418" text-anchor="middle" font-size="10" fill="#7a2828">→ Week 6：Batching &amp; 调度优化</text>

  <!-- 主线说明 -->
  <g filter="url(#sk)">
    <rect x="40" y="440" width="860" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="464" font-size="12" font-weight="bold" fill="#2b2b2b">主线逻辑</text>
  <text x="60" y="486" font-size="11" fill="#444">Day1 算清两阶段瓶颈 → Day2 造 KV Cache 零件 → Day3 读 vLLM 调度层 → Day4 深入 PagedAttention 内存管理</text>
  <text x="60" y="506" font-size="11" fill="#444">→ Day5 组装成 Mini 引擎（零件→整车）→ Day6 装仪表盘 profiling → Day7 总结四大核心问题</text>
  <text x="60" y="528" font-size="11" fill="#2e6e2e" font-weight="bold">本质：从"理解单个机制"到"组装系统"到"测量优化"到"提炼方法论"</text>
</svg>
