<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="400" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">SchedulingBudget：双预算约束每轮调度</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- token_budget bar -->
  <text x="60" y="82" font-size="13" font-weight="bold" fill="#2b6e9e">① token_budget（每轮 token 上限）</text>
  <g filter="url(#sk)">
    <rect x="60" y="92" width="760" height="44" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <!-- prefill segment -->
  <g filter="url(#sk)">
    <rect x="62" y="94" width="260" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="192" y="118" text-anchor="middle" font-size="11" fill="#7a5415">prefill tokens（大块）</text>
  <!-- decode segment -->
  <g filter="url(#sk)">
    <rect x="322" y="94" width="120" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="382" y="118" text-anchor="middle" font-size="11" fill="#2e6e2e">decode×N</text>
  <!-- remaining -->
  <g filter="url(#sk)">
    <rect x="442" y="94" width="376" height="40" rx="4" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
  <text x="630" y="118" text-anchor="middle" font-size="11" fill="#888">剩余 budget（不调度）</text>

  <text x="60" y="158" font-size="11" fill="#555">长 prompt 的 prefill 一次吃掉大块 budget → 限制每轮 prefill token 数，避免 decode 饿死</text>

  <!-- max_num_seqs -->
  <text x="60" y="196" font-size="13" font-weight="bold" fill="#7a2828">② max_num_seqs（并发 sequence 上限）</text>
  <g filter="url(#sk)">
    <rect x="60" y="206" width="760" height="44" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <!-- slots -->
  <g filter="url(#sk)">
    <rect x="70" y="214" width="80" height="30" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="110" y="234" text-anchor="middle" font-size="11" fill="#2e6e2e">S1</text>
  <g filter="url(#sk)">
    <rect x="160" y="214" width="80" height="30" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="200" y="234" text-anchor="middle" font-size="11" fill="#2e6e2e">S2</text>
  <g filter="url(#sk)">
    <rect x="250" y="214" width="80" height="30" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="290" y="234" text-anchor="middle" font-size="11" fill="#2e6e2e">S3</text>
  <g filter="url(#sk)">
    <rect x="340" y="214" width="80" height="30" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="380" y="234" text-anchor="middle" font-size="11" fill="#2e6e2e">S4</text>
  <g filter="url(#sk)">
    <rect x="430" y="214" width="80" height="30" rx="4" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
  <text x="470" y="234" text-anchor="middle" font-size="11" fill="#888">空</text>
  <g filter="url(#sk)">
    <rect x="520" y="214" width="80" height="30" rx="4" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4 2"/>
  </g>
  <text x="560" y="234" text-anchor="middle" font-size="11" fill="#888">空</text>

  <text x="620" y="234" font-size="11" fill="#b85450">↑ max=4，第 5 个请求须等空位</text>

  <text x="60" y="272" font-size="11" fill="#555">并发数受限 → 控制 batch 大小，避免显存/算力过载</text>

  <!-- can_schedule -->
  <g filter="url(#sk)">
    <rect x="60" y="292" width="760" height="76" rx="10" fill="#fffdf3" stroke="#7a4a9e" stroke-width="1.5"/>
  </g>
  <text x="80" y="316" font-size="12" font-weight="bold" fill="#5a2e7e">can_schedule(num_new_tokens, num_new_seqs) =</text>
  <text x="100" y="336" font-size="11" fill="#444">batched_tokens + num_new_tokens ≤ token_budget</text>
  <text x="460" y="336" font-size="11" fill="#888">且</text>
  <text x="480" y="336" font-size="11" fill="#444">curr_seqs + num_new_seqs ≤ max_num_seqs</text>
  <text x="80" y="356" font-size="11" fill="#b85450">两个约束都满足才允许加入 → 既不超算力也不超显存并发</text>
</svg>
