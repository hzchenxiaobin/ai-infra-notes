<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Naive Prefill vs Chunked Prefill：延迟曲线对比</text>
  <path d="M 290 40 Q 460 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Naive (top) ===== -->
  <text x="60" y="72" font-size="13" font-weight="bold" fill="#b85450">① Naive Prefill：长 prompt 一次性 prefill</text>

  <!-- iter timeline boxes -->
  <g filter="url(#sk)">
    <rect x="60" y="82" width="120" height="120" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
  </g>
  <text x="120" y="100" text-anchor="middle" font-size="11" fill="#7a2828" font-weight="bold">iter 1</text>
  <g filter="url(#sk)">
    <rect x="68" y="108" width="104" height="30" rx="4" fill="#b85450" stroke="#7a2828" stroke-width="1.2"/>
  </g>
  <text x="120" y="127" text-anchor="middle" font-size="10" fill="#fff">S3 prefill ALL 24tk</text>
  <g filter="url(#sk)">
    <rect x="68" y="144" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="93" y="159" text-anchor="middle" font-size="9" fill="#2e6e2e">S1 decode</text>
  <g filter="url(#sk)">
    <rect x="122" y="144" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="147" y="159" text-anchor="middle" font-size="9" fill="#2e6e2e">S2 decode</text>
  <text x="120" y="190" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">延迟尖峰 2.0ms!</text>

  <path d="M 180 142 L 200 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="202" y="82" width="120" height="120" rx="6" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
  <text x="262" y="100" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">iter 2</text>
  <g filter="url(#sk)">
    <rect x="210" y="108" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="235" y="123" text-anchor="middle" font-size="9" fill="#2e6e2e">S1 decode</text>
  <g filter="url(#sk)">
    <rect x="264" y="108" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="289" y="123" text-anchor="middle" font-size="9" fill="#2e6e2e">S2 decode</text>
  <g filter="url(#sk)">
    <rect x="210" y="136" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="235" y="151" text-anchor="middle" font-size="9" fill="#2e6e2e">S3 decode</text>
  <text x="262" y="180" text-anchor="middle" font-size="10" fill="#2e6e2e">0.6ms 平稳</text>

  <text x="350" y="100" font-size="11" fill="#888">iter 3-6 ...</text>
  <text x="350" y="120" font-size="10" fill="#888">decode 平稳</text>

  <!-- summary -->
  <g filter="url(#sk)">
    <rect x="60" y="212" width="560" height="28" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="340" y="231" text-anchor="middle" font-size="11" fill="#7a2828">S3 prefill 占满 iter 1 → S1/S2 decode 延迟飙到 2.0ms，TPOT 抖动</text>

  <!-- ===== Chunked (bottom) ===== -->
  <text x="60" y="270" font-size="13" font-weight="bold" fill="#2e6e2e">② Chunked Prefill：长 prompt 分 3 块与 decode 交错</text>

  <g filter="url(#sk)">
    <rect x="60" y="280" width="120" height="120" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="120" y="298" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">iter 1</text>
  <g filter="url(#sk)">
    <rect x="68" y="306" width="104" height="22" rx="4" fill="#c98a2b" stroke="#7a5415" stroke-width="1.2"/>
  </g>
  <text x="120" y="321" text-anchor="middle" font-size="9" fill="#fff">S3 prefill +8(8/24)</text>
  <g filter="url(#sk)">
    <rect x="68" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="93" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S1 decode</text>
  <g filter="url(#sk)">
    <rect x="122" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="147" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S2 decode</text>
  <text x="120" y="388" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">1.2ms 可控</text>

  <path d="M 180 340 L 200 340" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="202" y="280" width="120" height="120" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="262" y="298" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">iter 2</text>
  <g filter="url(#sk)">
    <rect x="210" y="306" width="104" height="22" rx="4" fill="#c98a2b" stroke="#7a5415" stroke-width="1.2"/>
  </g>
  <text x="262" y="321" text-anchor="middle" font-size="9" fill="#fff">S3 prefill +8(16/24)</text>
  <g filter="url(#sk)">
    <rect x="210" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="235" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S1 decode</text>
  <g filter="url(#sk)">
    <rect x="264" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="289" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S2 decode</text>
  <text x="262" y="388" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">1.2ms 可控</text>

  <path d="M 322 340 L 342 340" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="344" y="280" width="120" height="120" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="404" y="298" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">iter 3</text>
  <g filter="url(#sk)">
    <rect x="352" y="306" width="104" height="22" rx="4" fill="#c98a2b" stroke="#7a5415" stroke-width="1.2"/>
  </g>
  <text x="404" y="321" text-anchor="middle" font-size="9" fill="#fff">S3 prefill +8(24/24)</text>
  <g filter="url(#sk)">
    <rect x="352" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="377" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S1 decode</text>
  <g filter="url(#sk)">
    <rect x="406" y="334" width="50" height="22" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="431" y="349" text-anchor="middle" font-size="9" fill="#2e6e2e">S2 decode</text>
  <text x="404" y="388" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">1.2ms 可控</text>

  <g filter="url(#sk)">
    <rect x="60" y="410" width="560" height="24" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="340" y="426" text-anchor="middle" font-size="11" fill="#2e6e2e">每轮 prefill 被 chunk_size=8 封顶 → decode 延迟稳定 1.2ms，TPOT 平滑</text>

  <!-- legend -->
  <g filter="url(#sk)">
    <rect x="660" y="280" width="220" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="680" y="302" font-size="11" font-weight="bold" fill="#444">图例</text>
  <g filter="url(#sk)">
    <rect x="680" y="312" width="18" height="14" rx="3" fill="#b85450" stroke="#7a2828"/>
  </g>
  <text x="706" y="324" font-size="10" fill="#444">naive 一次性 prefill</text>
  <g filter="url(#sk)">
    <rect x="680" y="334" width="18" height="14" rx="3" fill="#c98a2b" stroke="#7a5415"/>
  </g>
  <text x="706" y="346" font-size="10" fill="#444">chunked prefill 块</text>
  <g filter="url(#sk)">
    <rect x="680" y="356" width="18" height="14" rx="3" fill="#eaf6ee" stroke="#4a8e4a"/>
  </g>
  <text x="706" y="368" font-size="10" fill="#444">decode 步</text>
  <text x="680" y="392" font-size="10" fill="#888">延迟尖峰 2.0→1.2 (↓40%)</text>
</svg>
