<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="560" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">调度策略选择决策树</text>
  <path d="M 300 40 Q 460 48 620 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- root -->
  <g filter="url(#sk)">
    <rect x="340" y="60" width="240" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="460" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">是否要求最低延迟（交互式）？</text>

  <!-- yes branch -->
  <path d="M 460 100 L 460 120 L 160 120 L 160 138" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="300" y="116" font-size="10" fill="#2e6e2e" font-weight="bold">是</text>
  <g filter="url(#sk)">
    <rect x="40" y="140" width="240" height="40" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="160" y="165" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">Static / 小 batch + Priority</text>

  <!-- no branch -->
  <path d="M 460 100 L 460 120 L 640 120 L 640 138" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="560" y="116" font-size="10" fill="#b85450" font-weight="bold">否</text>

  <!-- Q2 -->
  <g filter="url(#sk)">
    <rect x="520" y="140" width="240" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="640" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">是否 LLM 自回归生成？</text>

  <!-- Q2 no -->
  <path d="M 640 180 L 640 200 L 520 200 L 520 218" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="570" y="196" font-size="10" fill="#b85450" font-weight="bold">否</text>
  <g filter="url(#sk)">
    <rect x="400" y="220" width="240" height="40" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="520" y="245" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">Dynamic Batching</text>

  <!-- Q2 yes -->
  <path d="M 640 180 L 640 218" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="650" y="200" font-size="10" fill="#2e6e2e" font-weight="bold">是</text>
  <g filter="url(#sk)">
    <rect x="520" y="220" width="240" height="40" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/>
  </g>
  <text x="640" y="245" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">Continuous Batching ✓</text>

  <!-- additive features -->
  <path d="M 640 260 L 640 282" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="340" y="284" width="600" height="40" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
  <text x="640" y="309" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">在 Continuous 基础上叠加（按需）：</text>

  <!-- 4 additive cards -->
  <g filter="url(#sk)">
    <rect x="60" y="340" width="200" height="60" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
  </g>
  <text x="160" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a2828">多租户/多 SLA？</text>
  <text x="160" y="380" text-anchor="middle" font-size="10" fill="#555">→ + Priority Scheduling</text>
  <text x="160" y="394" text-anchor="middle" font-size="9" fill="#888">高优先级先保 decode</text>

  <g filter="url(#sk)">
    <rect x="280" y="340" width="200" height="60" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="380" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">有长 prompt？</text>
  <text x="380" y="380" text-anchor="middle" font-size="10" fill="#555">→ + Chunked Prefill</text>
  <text x="380" y="394" text-anchor="middle" font-size="9" fill="#888">TPOT 平滑</text>

  <g filter="url(#sk)">
    <rect x="500" y="340" width="200" height="60" rx="8" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
  </g>
  <text x="600" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a2e7e">显存紧张？</text>
  <text x="600" y="380" text-anchor="middle" font-size="10" fill="#555">→ + Preemption</text>
  <text x="600" y="394" text-anchor="middle" font-size="9" fill="#888">Recompute / Swap</text>

  <g filter="url(#sk)">
    <rect x="720" y="340" width="180" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="810" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">有 draft model？</text>
  <text x="810" y="380" text-anchor="middle" font-size="10" fill="#555">→ + Speculative Dec</text>
  <text x="810" y="394" text-anchor="middle" font-size="9" fill="#888">降 TBT</text>

  <!-- bottom standard config -->
  <g filter="url(#sk)">
    <rect x="60" y="430" width="840" height="56" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/>
  </g>
  <text x="480" y="454" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">LLM 推理服务标配组合</text>
  <text x="480" y="474" text-anchor="middle" font-size="11" fill="#444">Continuous Batching + PagedAttention + Chunked Prefill</text>

  <text x="480" y="510" text-anchor="middle" font-size="10" fill="#888">vLLM / TensorRT-LLM / LightLLM / 昇腾 MindIE 均支持此组合</text>
  <text x="480" y="528" text-anchor="middle" font-size="10" fill="#888">差异在实现语言（Python vs C++）与 KV Cache 管理（Paged vs Token Attention）</text>
</svg>
