<svg xmlns="http://www.w3.org/2000/svg" width="940" height="540" viewBox="0 0 940 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="540" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Block Table：逻辑连续 ↔ 物理不连续</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">借鉴 OS 虚拟内存分页：逻辑 block 对序列连续，物理 block 在显存中可任意散布，block table 维护映射</text>

  <!-- ============ 逻辑 view（序列视角）============ -->
  <text x="40" y="104" font-size="14" font-weight="bold" fill="#2b6e9e">逻辑 view（序列视角，连续）</text>
  <g filter="url(#sk)">
    <g stroke="#4a8edb" stroke-width="1.2">
      <rect x="40" y="114" width="100" height="50" rx="4" fill="#bcd6f0"/>
      <rect x="140" y="114" width="100" height="50" rx="4" fill="#bcd6f0"/>
      <rect x="240" y="114" width="100" height="50" rx="4" fill="#bcd6f0"/>
      <rect x="340" y="114" width="100" height="50" rx="4" fill="#bcd6f0"/>
    </g>
  </g>
  <text x="90" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">逻辑 block 0</text>
  <text x="190" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">逻辑 block 1</text>
  <text x="290" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">逻辑 block 2</text>
  <text x="390" y="144" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">逻辑 block 3</text>
  <text x="90" y="180" text-anchor="middle" font-size="10" fill="#666">token 0..15</text>
  <text x="190" y="180" text-anchor="middle" font-size="10" fill="#666">token 16..31</text>
  <text x="290" y="180" text-anchor="middle" font-size="10" fill="#666">token 32..47</text>
  <text x="390" y="180" text-anchor="middle" font-size="10" fill="#666">token 48..49</text>

  <!-- Block Table -->
  <g filter="url(#sk)">
    <rect x="500" y="114" width="200" height="50" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
  </g>
  <text x="600" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Block Table</text>
  <text x="600" y="154" text-anchor="middle" font-size="11" fill="#444" font-family="monospace">[7, 1, 12, 3]</text>
  <text x="600" y="180" text-anchor="middle" font-size="10" fill="#888">block_table[l] = 物理 block 号</text>

  <!-- 映射箭头 -->
  <path d="M 140 166 Q 300 200 540 220" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 240 166 Q 300 195 460 280" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 340 166 Q 400 200 700 340" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 440 166 Q 500 200 560 280" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ============ 物理 view（显存中实际位置，散布）============ -->
  <text x="40" y="220" font-size="14" font-weight="bold" fill="#7a5415">物理 view（显存 block 池，散布）</text>
  <text x="40" y="238" font-size="11" fill="#666">物理 block 池有 16 个 block，本序列用了散布的 4 个</text>

  <!-- 4×4 物理 block 网格 -->
  <g filter="url(#sk)">
    <g stroke="#bbb" stroke-width="0.8">
      <!-- row 0: block 0,1,2,3 -->
      <rect x="40" y="250" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="122" y="250" width="80" height="50" rx="3" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.8"/>
      <rect x="204" y="250" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="286" y="250" width="80" height="50" rx="3" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.8"/>
      <!-- row 1: block 4,5,6,7 -->
      <rect x="40" y="304" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="122" y="304" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="204" y="304" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="286" y="304" width="80" height="50" rx="3" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.8"/>
      <!-- row 2: block 8,9,10,11 -->
      <rect x="40" y="358" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="122" y="358" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="204" y="358" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="286" y="358" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <!-- row 3: block 12,13,14,15 -->
      <rect x="40" y="412" width="80" height="50" rx="3" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1.8"/>
      <rect x="122" y="412" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="204" y="412" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="286" y="412" width="80" height="50" rx="3" fill="#fff" stroke-dasharray="3 2"/>
    </g>
  </g>
  <!-- 物理 block 编号 -->
  <text x="80" y="280" text-anchor="middle" font-size="10" fill="#999">P0 空闲</text>
  <text x="162" y="280" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">P1 ✓</text>
  <text x="244" y="280" text-anchor="middle" font-size="10" fill="#999">P2 空闲</text>
  <text x="326" y="280" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">P3 ✓</text>
  <text x="80" y="334" text-anchor="middle" font-size="10" fill="#999">P4</text>
  <text x="162" y="334" text-anchor="middle" font-size="10" fill="#999">P5</text>
  <text x="244" y="334" text-anchor="middle" font-size="10" fill="#999">P6</text>
  <text x="326" y="334" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">P7 ✓</text>
  <text x="80" y="388" text-anchor="middle" font-size="10" fill="#999">P8</text>
  <text x="162" y="388" text-anchor="middle" font-size="10" fill="#999">P9</text>
  <text x="244" y="388" text-anchor="middle" font-size="10" fill="#999">P10</text>
  <text x="326" y="388" text-anchor="middle" font-size="10" fill="#999">P11</text>
  <text x="80" y="442" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">P12 ✓</text>
  <text x="162" y="442" text-anchor="middle" font-size="10" fill="#999">P13</text>
  <text x="244" y="442" text-anchor="middle" font-size="10" fill="#999">P14</text>
  <text x="326" y="442" text-anchor="middle" font-size="10" fill="#999">P15</text>

  <!-- 逻辑→物理 标注 -->
  <text x="162" y="300" text-anchor="middle" font-size="9" fill="#7a2828">← 逻辑 block 1</text>
  <text x="326" y="300" text-anchor="middle" font-size="9" fill="#7a2828">← 逻辑 block 3</text>
  <text x="326" y="354" text-anchor="middle" font-size="9" fill="#7a2828">← 逻辑 block 0</text>
  <text x="80" y="462" text-anchor="middle" font-size="9" fill="#7a2828">← 逻辑 block 2</text>

  <!-- 右侧说明 -->
  <g filter="url(#sk)">
    <rect x="500" y="250" width="400" height="212" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="520" y="274" font-size="13" font-weight="bold" fill="#2b2b2b">为什么这样设计？</text>
  <text x="520" y="298" font-size="12" fill="#444">① 物理 block 可不连续 → 无外部碎片</text>
  <text x="520" y="318" font-size="12" fill="#444">② 按需分配 block → 无静态浪费</text>
  <text x="520" y="338" font-size="12" fill="#444">③ 完成/换出时整 block 回收 → 无内部碎片累积</text>
  <text x="520" y="358" font-size="12" fill="#444">④ block table 间接寻址 → kernel 多一次查表</text>
  <text x="520" y="388" font-size="12" fill="#b03a3a" font-weight="bold">类比 OS 虚拟内存：</text>
  <text x="520" y="408" font-size="11" fill="#444">逻辑 block = 虚拟页，物理 block = 物理页框</text>
  <text x="520" y="426" font-size="11" fill="#444">block table = 页表</text>
  <text x="520" y="444" font-size="11" fill="#444">block allocator = 内存管理单元（MMU）</text>

  <text x="470" y="500" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">序列只需 50 token → 用 4 个 block（含 14 个空 slot），物理散布在 P1/P3/P7/P12，逻辑连续由 block table [7,1,12,3] 保证</text>
  <text x="470" y="520" text-anchor="middle" font-size="11" fill="#666">attention kernel 遍历逻辑 block 0→3，每步查 block_table 得物理地址，再读 KV 数据</text>
</svg>
