  <text x="120" y="360" text-anchor="middle" font-size="11" fill="#4a8edb" font-weight="bold">① 项目文档</text>
  <text x="120" y="376" text-anchor="middle" font-size="9" fill="#666">README + 架构图 + Benchmark</text>

  <g filter="url(#sk)">
    <rect x="225" y="338" width="180" height="46" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="315" y="360" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">② 面试题库</text>
  <text x="315" y="376" text-anchor="middle" font-size="9" fill="#666">50+ 题 · 自问自答</text>

  <g filter="url(#sk)">
    <rect x="420" y="338" width="180" height="46" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
