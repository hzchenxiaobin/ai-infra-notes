<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">vLLM 分层架构：LLMEngine → Scheduler → Worker</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">用户请求经 LLMEngine.add_request 进入，每轮 step() 由 Scheduler 决策、Worker 执行、Engine 收尾</text>

  <!-- User -->
  <g filter="url(#sk)">
    <rect x="380" y="92" width="180" height="44" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5"/>
  </g>
  <text x="470" y="119" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">User Request</text>
  <path d="M 470 136 L 470 156" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- LLMEngine -->
  <g filter="url(#sk)">
    <rect x="200" y="160" width="540" height="110" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.8"/>
  </g>
  <text x="470" y="186" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">LLMEngine（对外接口）</text>
  <text x="470" y="208" text-anchor="middle" font-size="12" fill="#444">add_request() —— 请求入队</text>
  <text x="470" y="228" text-anchor="middle" font-size="12" fill="#444">step() —— 一轮推理：schedule → execute → process_outputs</text>
  <text x="470" y="250" text-anchor="middle" font-size="11" fill="#888">管理整个推理生命周期，对外只暴露 add_request / step 两个 API</text>
  <path d="M 470 270 L 470 290" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Scheduler -->
  <g filter="url(#sk)">
    <rect x="120" y="294" width="700" height="120" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.8"/>
  </g>
  <text x="470" y="320" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5415">Scheduler（调度决策）</text>
  <!-- 三个队列 -->
  <g filter="url(#sk)">
    <rect x="140" y="334" width="180" height="60" rx="6" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="380" y="334" width="180" height="60" rx="6" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="620" y="334" width="180" height="60" rx="6" fill="#f4b8b0" stroke="#b85450"/>
  </g>
  <text x="230" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a3a0a">WAITING 队列</text>
  <text x="230" y="376" text-anchor="middle" font-size="10" fill="#666">待调度的新请求</text>
  <text x="230" y="390" text-anchor="middle" font-size="10" fill="#666">按 FCFS 排队</text>
  <text x="470" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">RUNNING 队列</text>
  <text x="470" y="376" text-anchor="middle" font-size="10" fill="#666">本轮运行的 batch</text>
  <text x="470" y="390" text-anchor="middle" font-size="10" fill="#666">continuous batching</text>
  <text x="710" y="356" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">SWAPPED 队列</text>
  <text x="710" y="376" text-anchor="middle" font-size="10" fill="#666">被抢占，KV 换出</text>
  <text x="710" y="390" text-anchor="middle" font-size="10" fill="#666">显存够再换回</text>
  <text x="470" y="408" text-anchor="middle" font-size="11" fill="#7a5415">schedule() —— 依 SchedulingBudget（token/num_seqs/显存）决策，必要时抢占（preempt）</text>
  <path d="M 470 414 L 470 434" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Worker -->
  <g filter="url(#sk)">
    <rect x="200" y="438" width="540" height="100" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/>
  </g>
  <text x="470" y="464" text-anchor="middle" font-size="15" font-weight="bold" fill="#2e6e2e">Worker（执行模型前向）</text>
  <text x="470" y="486" text-anchor="middle" font-size="12" fill="#444">execute_model(seq_group_metadata_list)</text>
  <text x="470" y="506" text-anchor="middle" font-size="11" fill="#666">构建 input tensors + attention metadata（含 block table）→ ModelRunner.run() → 采样</text>
  <text x="470" y="524" text-anchor="middle" font-size="11" fill="#888">实际跑 Transformer 前向，返回每个 sequence 的下一个 token</text>
</svg>
