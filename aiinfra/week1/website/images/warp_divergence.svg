<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#fdfcf7"/>

  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Warp Divergence（分支发散）</text>
  <path d="M 230 44 Q 360 52 490 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>

  <!-- Warp 线程：偶数蓝、奇数红（threadIdx.x % 2 == 0） -->
  <text x="80" y="76" font-size="13" fill="#666">一个 Warp 中的 8 个线程（实际 32 个），执行 <tspan font-family="monospace" fill="#2b2b2b">if (threadIdx.x % 2 == 0)</tspan></text>

  <!-- T0 蓝 -->
  <g filter="url(#sk)"><circle cx="100" cy="106" r="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="100" y="111" text-anchor="middle" font-size="10" fill="#4a8edb" font-weight="bold">T0</text>
  <!-- T1 红 -->
  <g filter="url(#sk)"><circle cx="150" cy="106" r="16" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/></g>
  <text x="150" y="111" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">T1</text>
  <!-- T2 蓝 -->
  <g filter="url(#sk)"><circle cx="200" cy="106" r="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="200" y="111" text-anchor="middle" font-size="10" fill="#4a8edb" font-weight="bold">T2</text>
  <!-- T3 红 -->
  <g filter="url(#sk)"><circle cx="250" cy="106" r="16" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/></g>
  <text x="250" y="111" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">T3</text>
  <!-- T4 蓝 -->
  <g filter="url(#sk)"><circle cx="300" cy="106" r="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="300" y="111" text-anchor="middle" font-size="10" fill="#4a8edb" font-weight="bold">T4</text>
  <!-- T5 红 -->
  <g filter="url(#sk)"><circle cx="350" cy="106" r="16" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/></g>
  <text x="350" y="111" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">T5</text>
  <!-- T6 蓝 -->
  <g filter="url(#sk)"><circle cx="400" cy="106" r="16" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="400" y="111" text-anchor="middle" font-size="10" fill="#4a8edb" font-weight="bold">T6</text>
  <!-- T7 红 -->
  <g filter="url(#sk)"><circle cx="450" cy="106" r="16" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/></g>
  <text x="450" y="111" text-anchor="middle" font-size="10" fill="#b03a3a" font-weight="bold">T7</text>

  <!-- 代码 -->
  <g filter="url(#sk)">
    <rect x="80" y="142" width="560" height="56" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3"/>
  </g>
  <text x="100" y="168" font-family="monospace" font-size="13" fill="#2b2b2b">if (threadIdx.x % 2 == 0) { /* 蓝色线程执行路径 A */ }</text>
  <text x="100" y="188" font-family="monospace" font-size="13" fill="#2b2b2b">else                    { /* 红色线程执行路径 B */ }</text>

  <!-- 串行执行示意 -->
  <text x="80" y="228" font-size="13" fill="#666" font-weight="bold">硬件串行执行两条路径：</text>

  <!-- 路径 A -->
  <g filter="url(#sk)">
    <rect x="80" y="242" width="280" height="90" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="220" y="268" text-anchor="middle" font-size="13" fill="#4a8edb" font-weight="bold">先执行路径 A（偶数线程）</text>
  <text x="220" y="290" text-anchor="middle" font-size="12" fill="#444">活跃：T0, T2, T4, T6</text>
  <text x="220" y="310" text-anchor="middle" font-size="11" fill="#888">T1, T3, T5, T7 被 mask 掉</text>
  <text x="220" y="326" text-anchor="middle" font-size="10" fill="#888">（空闲等待）</text>

  <!-- 箭头 A → B -->
  <path d="M 362 287 L 398 287" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 路径 B -->
  <g filter="url(#sk)">
    <rect x="400" y="242" width="280" height="90" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="540" y="268" text-anchor="middle" font-size="13" fill="#b03a3a" font-weight="bold">再执行路径 B（奇数线程）</text>
  <text x="540" y="290" text-anchor="middle" font-size="12" fill="#444">活跃：T1, T3, T5, T7</text>
  <text x="540" y="310" text-anchor="middle" font-size="11" fill="#888">T0, T2, T4, T6 被 mask 掉</text>
  <text x="540" y="326" text-anchor="middle" font-size="10" fill="#888">（空闲等待）</text>

  <!-- 底部结论 -->
  <g filter="url(#sk)">
    <rect x="120" y="356" width="480" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="360" y="384" text-anchor="middle" font-size="13" fill="#c98a2b" font-weight="bold">两条路径串行 → 有效算力减半 → 性能下降</text>
</svg>
