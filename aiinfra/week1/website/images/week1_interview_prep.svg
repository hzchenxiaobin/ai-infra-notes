<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="400" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Week 1 面试准备框架</text>

  <!-- Three pillars -->
  <rect x="60" y="90" width="190" height="220" rx="8" fill="#4a8edb" opacity="0.2" stroke="#6ab0ff" stroke-width="2"/>
  <text x="155" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#6ab0ff">概念</text>
  <text x="80" y="160" font-size="12" fill="#2b2b2b">• SM / Warp / SIMT</text>
  <text x="80" y="185" font-size="12" fill="#2b2b2b">• Occupancy</text>
  <text x="80" y="210" font-size="12" fill="#2b2b2b">• Coalescing</text>
  <text x="80" y="235" font-size="12" fill="#2b2b2b">• Bank Conflict</text>
  <text x="80" y="260" font-size="12" fill="#2b2b2b">• Roofline</text>

  <rect x="265" y="90" width="190" height="220" rx="8" fill="#4a9d5f" opacity="0.2" stroke="#5cb86c" stroke-width="2"/>
  <text x="360" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#5cb86c">代码</text>
  <text x="285" y="160" font-size="12" fill="#2b2b2b">• 写第一个 CUDA</text>
  <text x="285" y="185" font-size="12" fill="#2b2b2b">• 查寄存器用量</text>
  <text x="285" y="210" font-size="12" fill="#2b2b2b">• 矩阵转置优化</text>
  <text x="285" y="235" font-size="12" fill="#2b2b2b">• Bank conflict 实验</text>
  <text x="285" y="260" font-size="12" fill="#2b2b2b">• ncu / nsys 使用</text>

  <rect x="470" y="90" width="190" height="220" rx="8" fill="#e8a838" opacity="0.2" stroke="#f0c050" stroke-width="2"/>
  <text x="565" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#f0c050">表达</text>
  <text x="490" y="160" font-size="12" fill="#2b2b2b">• 用自己的话解释</text>
  <text x="490" y="185" font-size="12" fill="#2b2b2b">• 画图说明</text>
  <text x="490" y="210" font-size="12" fill="#2b2b2b">• 举实际例子</text>
  <text x="490" y="235" font-size="12" fill="#2b2b2b">• 说出优化思路</text>
  <text x="490" y="260" font-size="12" fill="#2b2b2b">• 承认不懂的地方</text>

  <!-- Bottom -->
  <rect x="60" y="340" width="600" height="40" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="365" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">面试不是背诵，而是展示你理解概念、能动手、会思考</text>
  </g>
</svg>