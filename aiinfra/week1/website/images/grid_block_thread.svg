<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <rect width="720" height="480" fill="#fdfcf7"/>

  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Grid / Block / Thread 层次结构</text>
  <path d="M 220 44 Q 360 52 500 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>

  <!-- Grid 外框（虚线） -->
  <g filter="url(#sk)">
    <rect x="60" y="64" width="600" height="360" rx="12" fill="none" stroke="#4a8edb" stroke-width="2.5" stroke-dasharray="8,4"/>
  </g>
  <text x="360" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a8edb">Grid（gridDim = 2 × 2 = 4 blocks）</text>

  <!-- Block (0,0) -->
  <g filter="url(#sk)">
    <rect x="90" y="112" width="250" height="140" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="215" y="136" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Block (0, 0)</text>

  <!-- Block (1,0) -->
  <g filter="url(#sk)">
    <rect x="370" y="112" width="250" height="140" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="495" y="136" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Block (1, 0)</text>

  <!-- Block (0,1) -->
  <g filter="url(#sk)">
    <rect x="90" y="270" width="250" height="140" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="215" y="294" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Block (0, 1)</text>

  <!-- Block (1,1) -->
  <g filter="url(#sk)">
    <rect x="370" y="270" width="250" height="140" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="495" y="294" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">Block (1, 1)</text>

  <!-- Block (0,0) 内的 threads（绿） -->
  <g filter="url(#sk)">
    <circle cx="130" cy="172" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="175" cy="172" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="220" cy="172" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="265" cy="172" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="130" cy="210" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="175" cy="210" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="220" cy="210" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="265" cy="210" r="13" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="130" y="177" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T0</text>
  <text x="175" y="177" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T1</text>
  <text x="220" y="177" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T2</text>
  <text x="265" y="177" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T3</text>
  <text x="130" y="215" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T4</text>
  <text x="175" y="215" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T5</text>
  <text x="220" y="215" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T6</text>
  <text x="265" y="215" text-anchor="middle" font-size="8" fill="#4a8e4a" font-weight="bold">T7</text>
  <text x="215" y="238" text-anchor="middle" font-size="11" fill="#666">blockDim = 4 × 2 = 8 threads</text>

  <!-- 其他 block 的 thread 占位 -->
  <text x="495" y="190" text-anchor="middle" font-size="11" fill="#888">...</text>
  <text x="215" y="348" text-anchor="middle" font-size="11" fill="#888">...</text>
  <text x="495" y="348" text-anchor="middle" font-size="11" fill="#888">...</text>

  <!-- 底部公式 -->
  <g filter="url(#sk)">
    <rect x="90" y="436" width="540" height="34" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="360" y="458" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">总线程 = gridDim.x × gridDim.y × blockDim.x × blockDim.y = 2 × 2 × 8 = 32</text>
</svg>
