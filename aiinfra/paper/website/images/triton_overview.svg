<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57a773"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fdfcf7"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Triton 三层架构（论文 Figure 2）</text>
  <path d="M 260 42 Q 450 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="11" fill="#666">Triton-C → Triton-IR → Triton-JIT → 机器码；auto-tuner 从 IR 直接抽优化空间</text>

  <!-- ===== 顶部：Triton-C 前端 ===== -->
  <g filter="url(#sk)"><rect x="330" y="86" width="240" height="56" rx="8" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">Triton-C（前端）</text>
  <text x="450" y="128" text-anchor="middle" font-size="11" fill="#28455c">CUDA-like 语法 · tunable tile 形状 · 单线程 SPMD</text>

  <!-- Triton-C → Triton-IR -->
  <path d="M 450 142 L 450 168" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 中间：Triton-IR ===== -->
  <g filter="url(#sk)"><rect x="300" y="170" width="300" height="80" rx="10" fill="#57a773" opacity="0.28" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="450" y="194" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">Triton-IR（中间表示）</text>
  <text x="450" y="214" text-anchor="middle" font-size="11" fill="#2f5238">LLVM-IR + tile 类型（i32&lt;8,8&gt;）</text>
  <text x="450" y="232" text-anchor="middle" font-size="11" fill="#2f5238">dot / trans / reshape / broadcast · PSSA 谓词化</text>

  <!-- Triton-IR → Triton-JIT -->
  <path d="M 450 250 L 450 278" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Triton-JIT 大框（含两列 pass） ===== -->
  <g filter="url(#sk)">
    <rect x="140" y="280" width="620" height="200" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="450" y="302" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">Triton-JIT（后端编译器）</text>

  <!-- 左列：机器无关 pass -->
  <g filter="url(#sk)"><rect x="165" y="316" width="270" height="148" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.5"/></g>
  <text x="300" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">机器无关 Pass</text>
  <g filter="url(#sk)"><rect x="185" y="350" width="230" height="24" rx="6" fill="#fdfcf7" stroke="#8a8471" stroke-width="1.2"/></g>
  <text x="300" y="367" text-anchor="middle" font-size="11" fill="#2b2b2b">Pre-Fetching（循环内自动预取）</text>
  <g filter="url(#sk)"><rect x="185" y="382" width="230" height="24" rx="6" fill="#fdfcf7" stroke="#8a8471" stroke-width="1.2"/></g>
  <text x="300" y="399" text-anchor="middle" font-size="11" fill="#2b2b2b">Tile-Level Peephole（(Xᵀ)ᵀ=X）</text>
  <text x="300" y="438" text-anchor="middle" font-size="10" fill="#666">不依赖具体硬件目标</text>

  <!-- 右列：机器相关 pass -->
  <g filter="url(#sk)"><rect x="465" y="316" width="270" height="148" rx="8" fill="#c98a2b" opacity="0.20" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="600" y="338" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">机器相关 Pass</text>
  <g filter="url(#sk)"><rect x="485" y="350" width="230" height="24" rx="6" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="600" y="367" text-anchor="middle" font-size="11" fill="#2b2b2b">Hierarchical Tiling</text>
  <g filter="url(#sk)"><rect x="485" y="378" width="230" height="24" rx="6" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="600" y="395" text-anchor="middle" font-size="11" fill="#2b2b2b">Memory Coalescing</text>
  <g filter="url(#sk)"><rect x="485" y="406" width="230" height="24" rx="6" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="600" y="423" text-anchor="middle" font-size="11" fill="#2b2b2b">Shared Memory Alloc + Sync</text>
  <text x="600" y="450" text-anchor="middle" font-size="10" fill="#5c4a28">RAW/WAR 数据流自动插 barrier</text>

  <!-- 左右列之间小箭头 -->
  <path d="M 435 392 L 463 392" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Auto-tuner（右侧外挂，反馈到机器相关 pass） -->
  <g filter="url(#sk)"><rect x="790" y="340" width="100" height="80" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="840" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Auto-Tuner</text>
  <text x="840" y="383" text-anchor="middle" font-size="10" fill="#2f5238">从 IR 抽参数</text>
  <text x="840" y="398" text-anchor="middle" font-size="10" fill="#2f5238">穷举 2 的幂</text>
  <text x="840" y="413" text-anchor="middle" font-size="10" fill="#2f5238">tile/micro/nano</text>

  <!-- Auto-tuner → 机器相关 pass（虚线反馈） -->
  <path d="M 790 380 C 770 380 760 380 740 380" stroke="#57a773" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arG)" fill="none" filter="url(#sk)"/>

  <!-- Triton-JIT → Machine Code -->
  <path d="M 450 480 L 450 508" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 底部：机器码 ===== -->
  <g filter="url(#sk)"><rect x="330" y="510" width="240" height="40" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="450" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">GPU 机器码（LLVM bitcode）</text>

  <!-- 左下角关键观察 -->
  <g filter="url(#sk)"><rect x="20" y="500" width="280" height="50" rx="8" fill="none" stroke="#c98a2b" stroke-width="1.4" stroke-dasharray="6 4"/></g>
  <text x="160" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#5c4a28">关键观察：tile 是 IR 一等公民</text>
  <text x="160" y="538" text-anchor="middle" font-size="10" fill="#5c4a28">编译器看得见 tile 边界 → 自动 coalescing/sync</text>
</svg>
