<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="83" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Online Softmax：增量更新 (m, ℓ, O)</text>
  <path d="M 250 44 Q 450 52 650 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#555">分块后全局 max 未知 → 维护 running 状态，每来一个新块就"换参考点"重缩放</text>

  <!-- old state -->
  <g filter="url(#sk)"><rect x="60" y="120" width="220" height="120" rx="10" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="170" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">旧状态（已处理块）</text>
  <text x="170" y="174" text-anchor="middle" font-size="12" fill="#28455c">m：running max</text>
  <text x="170" y="196" text-anchor="middle" font-size="12" fill="#28455c">ℓ：以 m 为参考的指数和</text>
  <text x="170" y="218" text-anchor="middle" font-size="12" fill="#28455c">O：未归一化的输出累加器</text>

  <!-- new block -->
  <g filter="url(#sk)"><rect x="60" y="290" width="220" height="110" rx="10" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="170" y="318" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">新块 S̃_ij（Br×Bc）</text>
  <text x="170" y="344" text-anchor="middle" font-size="12" fill="#5c4a28">m̃ = rowmax(S̃)</text>
  <text x="170" y="366" text-anchor="middle" font-size="12" fill="#5c4a28">P̃ = exp(S̃ − m̃)</text>
  <text x="170" y="386" text-anchor="middle" font-size="12" fill="#5c4a28">ℓ̃ = rowsum(P̃)</text>

  <!-- update box -->
  <path d="M 280 180 L 365 215" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 280 345 L 365 290" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="370" y="150" width="270" height="190" rx="12" fill="#57a773" opacity="0.25" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="505" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">三个更新公式</text>
  <text x="505" y="210" text-anchor="middle" font-size="12" fill="#2b2b2b">m_new = max(m, m̃)</text>
  <text x="505" y="238" text-anchor="middle" font-size="12" fill="#2b2b2b">ℓ_new = e^(m−m_new)·ℓ + e^(m̃−m_new)·ℓ̃</text>
  <text x="505" y="266" text-anchor="middle" font-size="12" fill="#2b2b2b">O ← e^(m−m_new)·O + e^(m̃−m_new)·P̃·V_j</text>
  <text x="505" y="298" text-anchor="middle" font-size="11" fill="#2f5238">e^(m−m_new)：把旧值换到新参考点</text>
  <text x="505" y="318" text-anchor="middle" font-size="11" fill="#2f5238">（FA1 论文形式：最后才 O/diag(ℓ) 归一化）</text>

  <!-- new state -->
  <path d="M 640 245 L 720 245" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="725" y="185" width="140" height="120" rx="10" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="795" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">新状态</text>
  <text x="795" y="242" text-anchor="middle" font-size="12" fill="#28455c">m_new, ℓ_new</text>
  <text x="795" y="264" text-anchor="middle" font-size="12" fill="#28455c">O（更新后）</text>
  <text x="795" y="288" text-anchor="middle" font-size="10" fill="#28455c">继续吃下一块</text>

  <!-- footnote -->
  <g filter="url(#sk)"><rect x="230" y="400" width="440" height="60" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="450" y="426" text-anchor="middle" font-size="11" fill="#555">全部 tile 处理完后：O_final = O / diag(ℓ)，结果与标准 softmax 严格相等（精确注意力）</text>
  <text x="450" y="446" text-anchor="middle" font-size="11" fill="#555">backward 只需存 (O, ℓ, m)，S/P 在 SRAM 里重算（recomputation）</text>
</svg>
