<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="560" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Multi-Head Attention：h 个头并行</text>
  <path d="M 240 42 Q 440 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="62" text-anchor="middle" font-size="12" fill="#555">head_i = Attention(X·W_i^Q, X·W_i^K, X·W_i^V)；MultiHead = Concat(head_1..head_h) · W_O</text>

  <!-- ===== 输出（顶部，补上原来的缺失框） ===== -->
  <g filter="url(#sk)"><rect x="370" y="72" width="140" height="40" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="440" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">输出</text>
  <text x="440" y="106" text-anchor="middle" font-size="10" fill="#5c4a28">n × d_model(512)</text>

  <!-- Concat + Linear -->
  <path d="M 440 112 L 440 126" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="340" y="128" width="200" height="52" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="440" y="151" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Concat + Linear（W_O）</text>
  <text x="440" y="169" text-anchor="middle" font-size="10" fill="#2f5238">8 × 64 → 512 → d_model</text>

  <!-- ===== 三个 head（fan-in 到 Concat） ===== -->
  <!-- head_1 → Concat -->
  <path d="M 240 220 L 240 195 L 380 195 L 380 180" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_2 → Concat -->
  <path d="M 420 220 L 420 180" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_h → Concat -->
  <path d="M 640 220 L 640 195 L 500 195 L 500 180" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- head_1 -->
  <g filter="url(#sk)"><rect x="170" y="220" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="240" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_1</text>
  <text x="240" y="266" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="240" y="282" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="240" y="302" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- head_2 -->
  <g filter="url(#sk)"><rect x="350" y="220" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="420" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_2</text>
  <text x="420" y="266" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="420" y="282" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="420" y="302" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- dots -->
  <text x="530" y="278" text-anchor="middle" font-size="24" fill="#888">···</text>

  <!-- head_h -->
  <g filter="url(#sk)"><rect x="570" y="220" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="640" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_h</text>
  <text x="640" y="266" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="640" y="282" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="640" y="302" text-anchor="middle" font-size="10" fill="#555">h = 8 个头</text>

  <!-- ===== Linear ×3 投影 + 输入 X（底部） ===== -->
  <!-- fan-out: Linear → 各 head -->
  <path d="M 205 392 L 240 320" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 205 398 L 420 320" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 205 404 L 640 320" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Linear ×3 -->
  <g filter="url(#sk)"><rect x="45" y="370" width="160" height="56" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="125" y="394" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Linear ×3（Q/K/V）</text>
  <text x="125" y="412" text-anchor="middle" font-size="10" fill="#28455c">W_i^Q, W_i^K, W_i^V</text>

  <!-- X → Linear -->
  <path d="M 125 470 L 125 426" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 输入 X -->
  <g filter="url(#sk)"><rect x="60" y="470" width="130" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="125" y="494" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输入 X</text>
  <text x="125" y="512" text-anchor="middle" font-size="11" fill="#555">n × d_model(512)</text>

  <!-- ===== 侧注：为什么多头不增加 FLOPs ===== -->
  <g filter="url(#sk)"><rect x="560" y="400" width="280" height="110" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="7 4"/></g>
  <text x="700" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c4a28">为什么多头不增加 FLOPs？</text>
  <text x="700" y="450" text-anchor="middle" font-size="11" fill="#5c4a28">每头维度降为 d_model/h = 64</text>
  <text x="700" y="468" text-anchor="middle" font-size="11" fill="#5c4a28">8 头 × 64 维 = 512 维，总计算量</text>
  <text x="700" y="486" text-anchor="middle" font-size="11" fill="#5c4a28">与单头全维度基本相当——</text>
  <text x="700" y="504" text-anchor="middle" font-size="11" fill="#5c4a28">表达力提升几乎"免费"</text>
</svg>
