<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="900" height="500" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FlashAttention 主要实验结果一览</text>
  <path d="M 240 44 Q 450 52 660 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- axis -->
  <line x1="330" y1="70" x2="330" y2="430" stroke="#8a8471" stroke-width="1.2"/>
  <line x1="330" y1="430" x2="840" y2="430" stroke="#8a8471" stroke-width="1.2"/>
  <text x="330" y="450" text-anchor="middle" font-size="11" fill="#777">0×</text>
  <text x="457" y="450" text-anchor="middle" font-size="11" fill="#777">2×</text>
  <text x="585" y="450" text-anchor="middle" font-size="11" fill="#777">4×</text>
  <text x="712" y="450" text-anchor="middle" font-size="11" fill="#777">6×</text>
  <text x="840" y="450" text-anchor="middle" font-size="11" fill="#777">8×</text>
  <line x1="457" y1="70" x2="457" y2="430" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="585" y1="70" x2="585" y2="430" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="712" y1="70" x2="712" y2="430" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>

  <!-- bars (x = 330 + value*63.75) -->
  <!-- 7.6x kernel -->
  <text x="320" y="105" text-anchor="end" font-size="11" fill="#2b2b2b">Attention kernel（GPT-2, 最长序列）</text>
  <g filter="url(#sk)"><rect x="330" y="88" width="485" height="30" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="822" y="108" text-anchor="end" font-size="12" font-weight="bold" fill="#fff">7.6×</text>

  <!-- 3.5x gpt2 vs HF -->
  <text x="320" y="165" text-anchor="end" font-size="11" fill="#2b2b2b">GPT-2 端到端训练 vs HuggingFace</text>
  <g filter="url(#sk)"><rect x="330" y="148" width="223" height="30" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="560" y="168" font-size="12" font-weight="bold" fill="#28455c">3.5×</text>

  <!-- 3.0x LRA? no: LRA 2.4; use vs Megatron 1.7 -->
  <text x="320" y="225" text-anchor="end" font-size="11" fill="#2b2b2b">GPT-2 端到端训练 vs Megatron-LM</text>
  <g filter="url(#sk)"><rect x="330" y="208" width="109" height="30" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="446" y="228" font-size="12" font-weight="bold" fill="#28455c">1.7×</text>

  <!-- LRA 2.4 -->
  <text x="320" y="285" text-anchor="end" font-size="11" fill="#2b2b2b">Long-Range Arena（1K–4K）</text>
  <g filter="url(#sk)"><rect x="330" y="268" width="153" height="30" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="490" y="288" font-size="12" font-weight="bold" fill="#2f5238">2.4×</text>

  <!-- block sparse 2.8 -->
  <text x="320" y="345" text-anchor="end" font-size="11" fill="#2b2b2b">Block-sparse FA（LRA，vs 标准实现）</text>
  <g filter="url(#sk)"><rect x="330" y="328" width="179" height="30" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="516" y="348" font-size="12" font-weight="bold" fill="#2f5238">2.8×</text>

  <!-- BERT 15% -->
  <text x="320" y="405" text-anchor="end" font-size="11" fill="#2b2b2b">BERT-large vs MLPerf 1.1 纪录</text>
  <g filter="url(#sk)"><rect x="330" y="388" width="70" height="30" rx="6" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="408" y="408" font-size="12" font-weight="bold" fill="#5c4a28">快 15%（20.0→17.4 min）</text>

  <!-- side notes -->
  <g filter="url(#sk)"><rect x="520" y="60" width="340" height="52" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="6 4"/></g>
  <text x="690" y="80" text-anchor="middle" font-size="11" fill="#555">显存：线性 O(N)，最多 20× 更省</text>
  <text x="690" y="98" text-anchor="middle" font-size="11" fill="#555">HBM 访问：最多 9× 减少（Fig. 2）</text>
</svg>
