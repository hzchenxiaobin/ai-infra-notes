<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="460" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Scaled Dot-Product Attention 数据流</text>
  <path d="M 240 42 Q 430 50 620 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="430" y="64" text-anchor="middle" font-size="13" fill="#2b2b2b">Attention(Q, K, V) = softmax(Q·Kᵀ / √d_k) · V</text>

  <!-- ===== 上排：Q,K → MatMul → Scale → Mask → Softmax（从左到右） ===== -->

  <!-- Q -->
  <g filter="url(#sk)"><rect x="30" y="90" width="80" height="50" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="70" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Q</text>
  <text x="70" y="130" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <!-- K -->
  <g filter="url(#sk)"><rect x="30" y="175" width="80" height="50" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="70" y="198" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">K</text>
  <text x="70" y="215" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <!-- Q,K → MatMul1 arrows -->
  <path d="M 110 125 L 153 150" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 110 200 L 153 176" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- MatMul1 (Q·Kᵀ) -->
  <g filter="url(#sk)"><rect x="155" y="135" width="95" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="202" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="202" y="177" text-anchor="middle" font-size="11" fill="#555">Q · Kᵀ</text>
  <path d="M 250 163 L 278 163" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Scale -->
  <g filter="url(#sk)"><rect x="280" y="135" width="85" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="322" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Scale</text>
  <text x="322" y="177" text-anchor="middle" font-size="11" fill="#555">× 1/√d_k</text>
  <path d="M 365 163 L 388 163" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Mask (optional) -->
  <g filter="url(#sk)"><rect x="390" y="135" width="95" height="56" rx="8" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="437" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Mask</text>
  <text x="437" y="177" text-anchor="middle" font-size="10" fill="#555">（可选）上三角 -∞</text>
  <path d="M 485 163 L 513 163" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Softmax -->
  <g filter="url(#sk)"><rect x="515" y="135" width="100" height="56" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="565" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <text x="565" y="177" text-anchor="middle" font-size="10" fill="#2f5238">按行归一化</text>

  <!-- S 标注 -->
  <text x="265" y="125" text-anchor="middle" font-size="11" fill="#666">S（相似度得分，n × n）</text>

  <!-- ===== 右侧竖向：Softmax → P → MatMul2 ===== -->
  <path d="M 565 191 L 565 243" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- P -->
  <g filter="url(#sk)"><rect x="510" y="245" width="110" height="46" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="565" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">P（注意力权重）</text>
  <text x="565" y="282" text-anchor="middle" font-size="10" fill="#28455c">n × n，每行和为 1</text>
  <path d="M 565 291 L 565 343" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 下排：V → MatMul2 ← P ; MatMul2 → Output ===== -->

  <!-- V -->
  <g filter="url(#sk)"><rect x="30" y="345" width="80" height="50" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="70" y="368" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">V</text>
  <text x="70" y="385" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- V → MatMul2 arrow (长水平线) -->
  <path d="M 110 370 L 508 373" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="300" y="362" text-anchor="middle" font-size="11" fill="#666">V</text>

  <!-- MatMul2 (P·V) -->
  <g filter="url(#sk)"><rect x="510" y="345" width="110" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="565" y="369" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="565" y="387" text-anchor="middle" font-size="11" fill="#555">P · V</text>

  <!-- MatMul2 → Output -->
  <path d="M 620 373 L 678 373" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Output O -->
  <g filter="url(#sk)"><rect x="680" y="345" width="110" height="56" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="735" y="369" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输出 O</text>
  <text x="735" y="387" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- 底部注释 -->
  <text x="430" y="432" text-anchor="middle" font-size="11" fill="#666">两次 MatMul 占主要 FLOPs；Mask 只在 Decoder 自注意力中使用（因果掩码防止偷看未来）</text>
</svg>
