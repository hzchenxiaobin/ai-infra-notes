<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="41" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="880" height="520" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Positional Encoding：不同频率的 sin/cos 叠加</text>
  <path d="M 230 42 Q 440 50 650 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="62" text-anchor="middle" font-size="12" fill="#2b2b2b">PE(pos, 2i) = sin(pos / 10000^(2i/d_model))　　PE(pos, 2i+1) = cos(pos / 10000^(2i/d_model))</text>

  <!-- ===== 坐标轴 ===== -->
  <line x1="70" y1="80" x2="70" y2="380" stroke="#8a8471" stroke-width="1.2" filter="url(#sk)"/>
  <text x="40" y="85" font-size="11" fill="#555">+1</text>
  <text x="44" y="234" font-size="11" fill="#555">0</text>
  <text x="40" y="334" font-size="11" fill="#555">−1</text>
  <text x="30" y="230" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90 30 230)">PE 值</text>

  <!-- 零线 -->
  <line x1="70" y1="230" x2="820" y2="230" stroke="#8a8471" stroke-width="0.8" stroke-dasharray="2 4" filter="url(#sk)"/>
  <!-- +1 / -1 参考线 -->
  <line x1="70" y1="130" x2="820" y2="130" stroke="#ccc" stroke-width="0.6" stroke-dasharray="1 5"/>
  <line x1="70" y1="330" x2="820" y2="330" stroke="#ccc" stroke-width="0.6" stroke-dasharray="1 5"/>
  <text x="826" y="234" font-size="12" fill="#555">pos →</text>

  <!-- ===== 三条曲线（同一基线 y=230，振幅 100） ===== -->
  <!-- 高频：i 小，波长约 100（对应 sin(pos)，波长 2π） -->
  <polyline points="70.0,230.0 78.0,181.8 86.0,145.6 94.0,130.2 102.0,139.5 110.0,171.2 118.0,217.5 126.0,266.8 134.0,307.1 142.0,328.2 150.0,325.1 158.0,298.5 166.0,254.9 174.0,205.1 182.0,161.5 190.0,134.9 198.0,131.8 206.0,152.9 214.0,193.2 222.0,242.5 230.0,288.8 238.0,320.5 246.0,329.8 254.0,314.4 262.0,278.2 270.0,230.0 278.0,181.8 286.0,145.6 294.0,130.2 302.0,139.5 310.0,171.2 318.0,217.5 326.0,266.8 334.0,307.1 342.0,328.2 350.0,325.1 358.0,298.5 366.0,254.9 374.0,205.1 382.0,161.5 390.0,134.9 398.0,131.8 406.0,152.9 414.0,193.2 422.0,242.5 430.0,288.8 438.0,320.5 446.0,329.8 454.0,314.4 462.0,278.2 470.0,230.0 478.0,181.8 486.0,145.6 494.0,130.2 502.0,139.5 510.0,171.2 518.0,217.5 526.0,266.8 534.0,307.1 542.0,328.2 550.0,325.1 558.0,298.5 566.0,254.9 574.0,205.1 582.0,161.5 590.0,134.9 598.0,131.8 606.0,152.9 614.0,193.2 622.0,242.5 630.0,288.8 638.0,320.5 646.0,329.8 654.0,314.4 662.0,278.2 670.0,230.0 678.0,181.8 686.0,145.6 694.0,130.2 702.0,139.5 710.0,171.2 718.0,217.5 726.0,266.8 734.0,307.1 742.0,328.2 750.0,325.1 758.0,298.5 766.0,254.9 774.0,205.1 782.0,161.5 790.0,134.9 798.0,131.8 806.0,152.9 814.0,193.2 820.0,230.0" stroke="#4a8edb" stroke-width="2" fill="none" filter="url(#sk)"/>

  <!-- 中频：i 中等，波长约 300 -->
  <polyline points="70.0,230.0 85.0,199.1 100.0,171.2 115.0,149.1 130.0,134.9 145.0,130.0 160.0,134.9 175.0,149.1 190.0,171.2 205.0,199.1 220.0,230.0 235.0,260.9 250.0,288.8 265.0,310.9 280.0,325.1 295.0,330.0 310.0,325.1 325.0,310.9 340.0,288.8 355.0,260.9 370.0,230.0 385.0,199.1 400.0,171.2 415.0,149.1 430.0,134.9 445.0,130.0 460.0,134.9 475.0,149.1 490.0,171.2 505.0,199.1 520.0,230.0 535.0,260.9 550.0,288.8 565.0,310.9 580.0,325.1 595.0,330.0 610.0,325.1 625.0,310.9 640.0,288.8 655.0,260.9 670.0,230.0 685.0,199.1 700.0,171.2 715.0,149.1 730.0,134.9 745.0,130.0 760.0,134.9 775.0,149.1 790.0,171.2 805.0,199.1 820.0,230.0" stroke="#c98a2b" stroke-width="2" fill="none" filter="url(#sk)"/>

  <!-- 低频：i 大，波长约 1500（接近线性，对应最大波长 10000·2π） -->
  <polyline points="70.0,230.0 100.0,217.5 130.0,205.1 160.0,193.2 190.0,181.8 220.0,171.2 250.0,161.5 280.0,152.9 310.0,145.6 340.0,139.5 370.0,134.9 400.0,131.8 430.0,130.2 460.0,130.2 490.0,131.8 520.0,134.9 550.0,139.5 580.0,145.6 610.0,152.9 640.0,161.5 670.0,171.2 700.0,181.8 730.0,193.2 760.0,205.1 790.0,217.5 820.0,230.0" stroke="#57a773" stroke-width="2" fill="none" filter="url(#sk)"/>

  <!-- ===== 图例（右上角） ===== -->
  <g filter="url(#sk)"><rect x="600" y="78" width="225" height="78" rx="8" fill="#fdfcf7" stroke="#8a8471" stroke-width="1.2" stroke-dasharray="4 3"/></g>
  <line x1="612" y1="98" x2="636" y2="98" stroke="#4a8edb" stroke-width="2" filter="url(#sk)"/>
  <text x="642" y="102" font-size="11" fill="#2b2b2b">i 小（低维）：高频，波长 ~2π</text>
  <line x1="612" y1="118" x2="636" y2="118" stroke="#c98a2b" stroke-width="2" filter="url(#sk)"/>
  <text x="642" y="122" font-size="11" fill="#2b2b2b">i 中等：中频，波长 ~20</text>
  <line x1="612" y1="138" x2="636" y2="138" stroke="#57a773" stroke-width="2" filter="url(#sk)"/>
  <text x="642" y="142" font-size="11" fill="#2b2b2b">i 大（高维）：低频，波长 ~10000·2π</text>

  <!-- ===== 底部注释 ===== -->
  <g filter="url(#sk)"><rect x="150" y="400" width="580" height="105" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="440" y="426" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">每个位置 = 512 维向量（256 对 sin/cos）</text>
  <text x="440" y="446" text-anchor="middle" font-size="11" fill="#555">相邻维度频率几何递减，覆盖 2π ~ 10000·2π 波长</text>
  <text x="440" y="466" text-anchor="middle" font-size="11" fill="#555">PE(pos+k) 是 PE(pos) 的线性函数 → 模型容易学到相对位置</text>
  <text x="440" y="486" text-anchor="middle" font-size="11" fill="#555">与 Embedding 直接相加（同为 d_model 维），注入顺序信息</text>
</svg>
