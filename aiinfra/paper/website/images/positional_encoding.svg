  <g filter="url(#sk)"><rect x="230" y="445" width="460" height="100" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="460" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">每个位置 = 512 维向量（256 对 sin/cos）</text>
  <text x="460" y="490" text-anchor="middle" font-size="11" fill="#555">相邻维度频率几何递减，覆盖 2π ~ 10000·2π 波长</text>
