<svg xmlns="http://www.w3.org/2000/svg" width="940" height="810" viewBox="0 0 940 810" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
  </defs>
  <rect width="940" height="810" fill="#fdfcf7"/>
  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 整体架构（论文 Figure 1）</text>
  <path d="M 250 42 Q 470 50 690 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Decoder 顶部：Output Probabilities / Softmax / Linear ===== -->
  <text x="740" y="64" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Output Probabilities</text>
  <path d="M 740 70 L 740 84" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="660" y="86" width="160" height="36" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="740" y="109" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <path d="M 740 122 L 740 136" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="660" y="138" width="160" height="36" rx="8" fill="#c98a2b" opacity="0.22" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="740" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Linear</text>
  <path d="M 740 174 L 740 188" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Encoder ×6 box (left) ===== -->
  <text x="200" y="64" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Encoder</text>
  <g filter="url(#sk)">
    <rect x="70" y="320" width="260" height="300" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="338" y="318" font-size="13" font-weight="bold" fill="#3a3a3a">×6</text>

  <!-- Encoder sublayers (bottom-up): MHA → AddNorm → FFN → AddNorm -->
  <!-- MHA -->
  <g filter="url(#sk)"><rect x="110" y="555" width="180" height="45" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="200" y="577" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="200" y="592" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention：Q=K=V</text>
  <!-- MHA → AddNorm arrow -->
  <path d="M 200 555 L 200 540" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- residual: MHA → AddNorm -->
  <path d="M 110 588 C 76 588 76 519 105 519" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (after MHA) -->
  <g filter="url(#sk)"><rect x="110" y="500" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="200" y="524" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <!-- AddNorm → FFN arrow -->
  <path d="M 200 500 L 200 484" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- FFN -->
  <g filter="url(#sk)"><rect x="110" y="435" width="180" height="45" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="200" y="457" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <text x="200" y="472" text-anchor="middle" font-size="10" fill="#5c4a28">d_model 512 → d_ff 2048 → 512</text>
  <!-- FFN → AddNorm arrow -->
  <path d="M 200 435 L 200 420" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- residual: FFN → AddNorm -->
  <path d="M 110 468 C 76 468 76 399 105 399" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (after FFN) -->
  <g filter="url(#sk)"><rect x="110" y="380" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="200" y="404" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>

  <!-- z exits encoder top → routes to decoder cross-attn -->
  <path d="M 200 380 L 200 285 L 475 285 L 475 460 L 645 460" stroke="#4a8edb" stroke-width="2" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="215" y="305" font-size="12" font-weight="bold" fill="#4a8edb">z（源表示）</text>
  <text x="345" y="277" text-anchor="middle" font-size="11" fill="#4a8edb">Encoder 输出作为 Cross-Attention 的 K / V</text>

  <!-- ===== Decoder ×6 box (right) ===== -->
  <text x="740" y="196" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Decoder</text>
  <g filter="url(#sk)">
    <rect x="610" y="200" width="260" height="420" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="878" y="198" font-size="13" font-weight="bold" fill="#3a3a3a">×6</text>

  <!-- Decoder sublayers (bottom-up): MaskedMHA → AddNorm → CrossAttn → AddNorm → FFN → AddNorm -->
  <!-- Masked MHA -->
  <g filter="url(#sk)"><rect x="650" y="555" width="180" height="42" rx="8" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="740" y="576" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Masked Multi-Head Attn</text>
  <text x="740" y="590" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention + 因果掩码</text>
  <path d="M 740 555 L 740 540" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 582 C 618 582 618 518 645 518" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm -->
  <g filter="url(#sk)"><rect x="650" y="500" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="524" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 500 L 740 484" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Cross-Attention -->
  <g filter="url(#sk)"><rect x="650" y="440" width="180" height="42" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="740" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="740" y="475" text-anchor="middle" font-size="10" fill="#28455c">Cross：Q←Decoder，K/V←Encoder</text>
  <path d="M 740 440 L 740 424" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 465 C 618 465 618 403 645 403" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm -->
  <g filter="url(#sk)"><rect x="650" y="385" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="409" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 385 L 740 374" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- FFN -->
  <g filter="url(#sk)"><rect x="650" y="330" width="180" height="42" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="740" y="351" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <text x="740" y="365" text-anchor="middle" font-size="10" fill="#5c4a28">512 → 2048 → 512</text>
  <path d="M 740 330 L 740 314" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 352 C 618 352 618 293 645 293" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (top) -->
  <g filter="url(#sk)"><rect x="650" y="275" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="299" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 275 L 740 204" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Embedding + PE (bottom, both sides) ===== -->
  <!-- Encoder bottom -->
  <path d="M 200 620 L 200 644" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="110" y="646" width="180" height="38" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="5 3"/></g>
  <text x="200" y="670" text-anchor="middle" font-size="11" fill="#2b2b2b">⊕ Positional Encoding（sin/cos）</text>
  <path d="M 200 684 L 200 703" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="110" y="705" width="180" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="200" y="723" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Input Embedding</text>
  <text x="200" y="738" text-anchor="middle" font-size="10" fill="#555">× √d_model</text>
  <path d="M 200 745 L 200 762" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="200" y="780" text-anchor="middle" font-size="13" fill="#2b2b2b">Inputs（源序列）</text>

  <!-- Decoder bottom -->
  <path d="M 740 620 L 740 644" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="650" y="646" width="180" height="38" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="5 3"/></g>
  <text x="740" y="670" text-anchor="middle" font-size="11" fill="#2b2b2b">⊕ Positional Encoding（sin/cos）</text>
  <path d="M 740 684 L 740 703" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="650" y="705" width="180" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="740" y="723" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Output Embedding</text>
  <text x="740" y="738" text-anchor="middle" font-size="10" fill="#555">× √d_model</text>
  <path d="M 740 745 L 740 762" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="740" y="780" text-anchor="middle" font-size="13" fill="#2b2b2b">Outputs（右移一位）</text>
</svg>
