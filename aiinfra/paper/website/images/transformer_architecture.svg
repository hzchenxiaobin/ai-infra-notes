<svg xmlns="http://www.w3.org/2000/svg" width="900" height="660" viewBox="0 0 900 660" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
  </defs>
  <rect width="900" height="660" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 整体架构（论文 Figure 1）</text>
  <path d="M 240 44 Q 450 52 660 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Encoder (left) ===== -->
  <text x="215" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Encoder（×N=6）</text>
  <g filter="url(#sk)">
    <rect x="70" y="90" width="290" height="400" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <!-- encoder sublayers top-down: AddNorm, FFN, AddNorm, MHA -->
  <g filter="url(#sk)"><rect x="100" y="115" width="230" height="46" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="215" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm（残差+层归一化）</text>
  <g filter="url(#sk)"><rect x="100" y="180" width="230" height="46" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="215" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <text x="215" y="218" text-anchor="middle" font-size="10" fill="#5c4a28">d_model 512 → d_ff 2048 → 512</text>
  <g filter="url(#sk)"><rect x="100" y="245" width="230" height="46" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="215" y="273" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <g filter="url(#sk)"><rect x="100" y="310" width="230" height="46" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="215" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="215" y="348" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention：Q=K=V</text>
  <!-- embedding + PE -->
  <g filter="url(#sk)"><rect x="100" y="392" width="230" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="215" y="416" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Input Embedding ×√d_model</text>
  <g filter="url(#sk)"><rect x="100" y="445" width="230" height="36" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="5 3"/></g>
  <text x="215" y="468" text-anchor="middle" font-size="11" fill="#2b2b2b">⊕ Positional Encoding（sin/cos）</text>
  <text x="215" y="525" text-anchor="middle" font-size="13" fill="#2b2b2b">Inputs（源序列）</text>
  <path d="M 215 512 L 215 488" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 215 392 L 215 362" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- encoder output to decoder cross-attn -->
  <path d="M 215 115 L 215 70 L 450 70 L 450 365 L 565 365" stroke="#4a8edb" stroke-width="2" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="395" y="62" text-anchor="middle" font-size="11" fill="#4a8edb">Encoder 输出作为 Cross-Attention 的 K/V</text>

  <!-- ===== Decoder (right) ===== -->
  <text x="685" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Decoder（×N=6）</text>
  <g filter="url(#sk)">
    <rect x="540" y="90" width="290" height="480" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <!-- decoder sublayers top-down: Softmax, Linear, AddNorm, FFN, AddNorm, CrossMHA, AddNorm, MaskedMHA -->
  <g filter="url(#sk)"><rect x="600" y="105" width="170" height="34" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="685" y="127" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <g filter="url(#sk)"><rect x="600" y="150" width="170" height="34" rx="8" fill="#c98a2b" opacity="0.22" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="685" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Linear</text>
  <g filter="url(#sk)"><rect x="570" y="195" width="230" height="40" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="685" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <g filter="url(#sk)"><rect x="570" y="245" width="230" height="40" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="685" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <g filter="url(#sk)"><rect x="570" y="295" width="230" height="40" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="685" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <g filter="url(#sk)"><rect x="570" y="345" width="230" height="40" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="685" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="685" y="379" text-anchor="middle" font-size="10" fill="#28455c">Cross：Q 来自 Decoder，K/V 来自 Encoder</text>
  <g filter="url(#sk)"><rect x="570" y="395" width="230" height="40" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="685" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <g filter="url(#sk)"><rect x="570" y="445" width="230" height="44" rx="8" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="685" y="464" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Masked Multi-Head Attn</text>
  <text x="685" y="480" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention + 因果掩码</text>
  <g filter="url(#sk)"><rect x="570" y="505" width="230" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="685" y="529" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Output Embedding ⊕ PE</text>
  <text x="685" y="605" text-anchor="middle" font-size="13" fill="#2b2b2b">Outputs（右移一位）</text>
  <path d="M 685 592 L 685 552" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="685" y="640" text-anchor="middle" font-size="12" fill="#666">输出概率从顶部 Softmax 引出（图上方）</text>
  <path d="M 685 105 L 685 92" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
</svg>
