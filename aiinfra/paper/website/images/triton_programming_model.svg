<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fdfcf7"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">CUDA vs Triton 编程模型（论文 Figure 3）</text>
  <path d="M 260 42 Q 450 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="11" fill="#666">CUDA：程序员手写多线程并发；Triton：单线程 kernel 自动并行化</text>

  <!-- ===== 左侧：CUDA 模型 ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="86" width="380" height="440" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="230" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">CUDA 编程模型</text>
  <text x="230" y="130" text-anchor="middle" font-size="11" fill="#666">kernel 关联一个 thread-block，多线程</text>

  <!-- CUDA: grid 里多个 thread-block，每个 block 多线程 -->
  <!-- Thread-block 大框 -->
  <g filter="url(#sk)"><rect x="80" y="150" width="300" height="180" rx="8" fill="#4a8edb" opacity="0.18" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="230" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Thread-Block（多线程）</text>

  <!-- 8 个小线程方块 -->
  <g filter="url(#sk)">
    <rect x="100" y="185" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="150" y="185" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="200" y="185" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="250" y="185" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="300" y="185" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="100" y="235" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="150" y="235" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="200" y="235" width="40" height="40" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="120" y="210" text-anchor="middle" font-size="10" fill="#2b2b2b">t₀</text>
  <text x="170" y="210" text-anchor="middle" font-size="10" fill="#2b2b2b">t₁</text>
  <text x="220" y="210" text-anchor="middle" font-size="10" fill="#2b2b2b">t₂</text>
  <text x="270" y="210" text-anchor="middle" font-size="10" fill="#2b2b2b">t₃</text>
  <text x="320" y="210" text-anchor="middle" font-size="10" fill="#2b2b2b">t₄</text>
  <text x="320" y="295" text-anchor="middle" font-size="14" fill="#888">···</text>

  <!-- CUDA 并发原语 -->
  <g filter="url(#sk)"><rect x="80" y="350" width="300" height="150" rx="8" fill="#c98a2b" opacity="0.18" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="230" y="372" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c4a28">程序员手写的并发原语</text>
  <text x="230" y="396" text-anchor="middle" font-size="11" fill="#5c4a28">__syncthreads()（barrier）</text>
  <text x="230" y="416" text-anchor="middle" font-size="11" fill="#5c4a28">shared memory 分配 / bank conflict</text>
  <text x="230" y="436" text-anchor="middle" font-size="11" fill="#5c4a28">warp shuffle / 线程映射 / coalescing</text>
  <text x="230" y="462" text-anchor="middle" font-size="10" fill="#888">正确性由程序员保证，易出 bug</text>

  <!-- ===== 右侧：Triton 模型 ===== -->
  <g filter="url(#sk)">
    <rect x="480" y="86" width="380" height="440" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="670" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Triton 编程模型</text>
  <text x="670" y="130" text-anchor="middle" font-size="11" fill="#666">kernel 单线程，自动并行化到 thread-block</text>

  <!-- Triton: 单线程 kernel 实例 -->
  <g filter="url(#sk)"><rect x="520" y="150" width="300" height="180" rx="8" fill="#57a773" opacity="0.22" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="670" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Kernel 实例（单线程）</text>

  <!-- 单个 kernel 实例方块 -->
  <g filter="url(#sk)"><rect x="600" y="195" width="140" height="60" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="670" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">single-threaded</text>
  <text x="670" y="240" text-anchor="middle" font-size="10" fill="#2f5238">get_global_range(axis)</text>
  <text x="670" y="280" text-anchor="middle" font-size="11" fill="#2f5238">编译器自动并行化 →</text>
  <text x="670" y="296" text-anchor="middle" font-size="11" fill="#2f5238">映射到多线程</text>

  <!-- Triton: 编译器自动管理 -->
  <g filter="url(#sk)"><rect x="520" y="350" width="300" height="150" rx="8" fill="#4a8edb" opacity="0.18" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="670" y="372" text-anchor="middle" font-size="12" font-weight="bold" fill="#28455c">编译器自动管理</text>
  <text x="670" y="396" text-anchor="middle" font-size="11" fill="#28455c">barrier 自动插入（RAW/WAR 分析）</text>
  <text x="670" y="416" text-anchor="middle" font-size="11" fill="#28455c">shared memory 自动分配（live interval）</text>
  <text x="670" y="436" text-anchor="middle" font-size="11" fill="#28455c">线程顺序自动排列（保证 coalescing）</text>
  <text x="670" y="462" text-anchor="middle" font-size="10" fill="#888">正确性由编译器保证，kernel 更简单</text>

  <!-- 底部对比注解 -->
  <g filter="url(#sk)"><rect x="40" y="538" width="820" height="18" rx="4" fill="none" stroke="#8a8471" stroke-width="1.2" stroke-dasharray="5 3"/></g>
  <text x="450" y="551" text-anchor="middle" font-size="11" fill="#5c4a28">关键观察：Triton 把并发管理从程序员移到编译器——简化 kernel，但放弃手动 warp 级优化的可能</text>
</svg>
