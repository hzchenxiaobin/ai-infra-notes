<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="67" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Softmax + TopK 融合：一次扫描同时维护 (m, d, TopK)</text>
  <path d="M 210 44 Q 450 52 690 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#555">自回归推理中 TopK 不需要全部 y_i，只输出最大的 K 个</text>

  <!-- input -->
  <text x="110" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8edb">logits x</text>
  <g filter="url(#sk)"><rect x="50" y="150" width="120" height="46" rx="6" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="110" y="178" text-anchor="middle" font-size="12" fill="#2b2b2b">x_1 ... x_V</text>
  <path d="M 170 173 L 230 173" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="200" y="160" text-anchor="middle" font-size="10" fill="#555">每元素 1 次 load</text>

  <!-- fused kernel -->
  <g filter="url(#sk)"><rect x="240" y="110" width="400" height="200" rx="12" fill="#57a773" opacity="0.18" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="440" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Online Softmax + TopK（Algorithm 4）</text>

  <text x="440" y="166" text-anchor="middle" font-size="12" fill="#2b2b2b">m_j = max(m_{j-1}, x_j)</text>
  <text x="440" y="188" text-anchor="middle" font-size="12" fill="#2b2b2b">d_j = d_{j-1} × e^{m_{j-1}-m_j} + e^{x_j-m_j}</text>
  <text x="440" y="214" text-anchor="middle" font-size="11" fill="#555">u, p：维护当前 TopK 的值与下标（K+1 槽位）</text>
  <text x="440" y="238" text-anchor="middle" font-size="11" fill="#555">把新 x_j 插入已排序的 u，O(K) 插入排序</text>
  <text x="440" y="262" text-anchor="middle" font-size="11" fill="#2f5238">K 小时额外开销低；K 大时 TopK 成为主导</text>
  <text x="440" y="286" text-anchor="middle" font-size="11" fill="#2f5238">V=25000、K=5 时实测接近 5× 加速</text>

  <!-- output -->
  <text x="770" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98a2b">输出</text>
  <g filter="url(#sk)"><rect x="710" y="150" width="120" height="70" rx="8" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="770" y="180" text-anchor="middle" font-size="12" fill="#2b2b2b">TopK 概率 + 下标</text>
  <text x="770" y="200" text-anchor="middle" font-size="10" fill="#555">只 store K 个结果</text>
  <path d="M 640 185 L 705 185" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- note -->
  <g filter="url(#sk)"><rect x="240" y="335" width="400" height="60" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="440" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">为什么融合有效</text>
  <text x="440" y="382" text-anchor="middle" font-size="11" fill="#555">避免把全部 y_i 写回再读，内存访问从 5 次/元素降到 1 次/元素</text>
</svg>
