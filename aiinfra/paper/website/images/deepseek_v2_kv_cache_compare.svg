<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="920" height="480" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">四种注意力的 KV Cache 与能力对比（Fig. 3 / Table 1）</text>
  <path d="M 150 46 Q 460 54 770 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">GQA/MQA 用"减少 KV 头数"换显存，MLA 用"低秩联合压缩"换显存——后者缓存更小且能力反超 MHA</text>

  <!-- MHA -->
  <text x="130" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MHA</text>
  <g filter="url(#sk)"><rect x="60" y="120" width="140" height="150" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="130" y="175" text-anchor="middle" font-size="10" fill="#28455c">每头独立 K、V</text>
  <text x="130" y="195" text-anchor="middle" font-size="10" fill="#28455c">2·n_h·d_h·l</text>
  <text x="130" y="215" text-anchor="middle" font-size="10" fill="#28455c">= 256·d_h·l</text>
  <text x="130" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">能力：强</text>

  <!-- GQA -->
  <text x="330" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">GQA</text>
  <g filter="url(#sk)"><rect x="260" y="120" width="140" height="150" rx="8" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="330" y="165" text-anchor="middle" font-size="10" fill="#6b4a14">组内共享 K、V</text>
  <text x="330" y="185" text-anchor="middle" font-size="10" fill="#6b4a14">2·n_g·d_h·l</text>
  <text x="330" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">能力：中等</text>
  <text x="330" y="238" text-anchor="middle" font-size="9" fill="#7a2e2b">7B 消融：MMLU 41.2</text>
  <text x="330" y="254" text-anchor="middle" font-size="9" fill="#7a2e2b">vs MHA 45.2</text>

  <!-- MQA -->
  <text x="530" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MQA</text>
  <g filter="url(#sk)"><rect x="460" y="120" width="140" height="150" rx="8" fill="#b8514d" opacity="0.25" stroke="#b8514d" stroke-width="1.8"/></g>
  <text x="530" y="165" text-anchor="middle" font-size="10" fill="#7a2e2b">全头共享 1 份 K、V</text>
  <text x="530" y="185" text-anchor="middle" font-size="10" fill="#7a2e2b">2·d_h·l</text>
  <text x="530" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">能力：弱</text>
  <text x="530" y="238" text-anchor="middle" font-size="9" fill="#7a2e2b">MMLU 仅 37.9</text>

  <!-- MLA -->
  <text x="730" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#57a773">MLA（本文）</text>
  <g filter="url(#sk)"><rect x="640" y="120" width="180" height="150" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="2.2"/></g>
  <text x="730" y="155" text-anchor="middle" font-size="10" fill="#2f5238">K、V 联合压成隐向量 c_t^KV</text>
  <text x="730" y="175" text-anchor="middle" font-size="10" fill="#2f5238">(d_c + d_h^R)·l ≈ 4.5·d_h·l</text>
  <text x="730" y="195" text-anchor="middle" font-size="10" fill="#2f5238">≈ GQA 仅 2.25 组</text>
  <text x="730" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f5238">能力：比 MHA 更强</text>
  <text x="730" y="248" text-anchor="middle" font-size="9" fill="#2f5238">大 MoE 消融：MMLU 59.0</text>
  <text x="730" y="263" text-anchor="middle" font-size="9" fill="#2f5238">vs MHA 57.5（KV 仅 4%）</text>

  <!-- bar comparison -->
  <text x="460" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">每 token KV Cache 相对大小（越大越费显存）</text>
  <g filter="url(#sk)"><rect x="120" y="330" width="640" height="34" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="440" y="352" text-anchor="middle" font-size="11" fill="#fff">MHA（128 头）：256·d_h·l　＝　100%</text>
  <g filter="url(#sk)"><rect x="120" y="374" width="80" height="34" rx="6" fill="#c98a2b" opacity="0.40" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="245" y="396" font-size="11" fill="#6b4a14">GQA-8 组：6.3%</text>
  <g filter="url(#sk)"><rect x="120" y="418" width="11" height="34" rx="4" fill="#57a773" opacity="0.50" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="145" y="440" font-size="11" fill="#2f5238">MLA：1.76%（≈ GQA-2.25 组；部署时再叠 6-bit 量化 → 总降幅 93.3%）</text>
</svg>
