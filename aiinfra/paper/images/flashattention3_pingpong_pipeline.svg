<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="157" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">两级重叠：GEMM 与 softmax 互相隐藏</text>
  <path d="M 230 44 Q 450 52 670 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#555">H100：FP16 GEMM 989 TFLOPs/s vs SFU（exp）约 3.9 TFLOPs/s —— softmax 必须藏在 GEMM 的影子下</text>

  <!-- time axis -->
  <line x1="120" y1="430" x2="850" y2="430" stroke="#8a8471" stroke-width="1.2"/>
  <text x="852" y="450" font-size="11" fill="#777">时间 →</text>

  <!-- legend -->
  <g filter="url(#sk)"><rect x="130" y="80" width="22" height="14" rx="3" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="160" y="92" font-size="11" fill="#2b2b2b">WGMMA（Tensor Core）</text>
  <g filter="url(#sk)"><rect x="330" y="80" width="22" height="14" rx="3" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="360" y="92" font-size="11" fill="#2b2b2b">softmax（CUDA Core / SFU）</text>
  <g filter="url(#sk)"><rect x="580" y="80" width="22" height="14" rx="3" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="610" y="92" font-size="11" fill="#2b2b2b">TMA 搬数</text>

  <!-- WG0 lane -->
  <text x="110" y="150" text-anchor="end" font-size="12" font-weight="bold" fill="#2b2b2b">Consumer wg0</text>
  <g filter="url(#sk)"><rect x="130" y="130" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="205" y="152" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：QKᵀ (j)</text>
  <g filter="url(#sk)"><rect x="290" y="130" width="110" height="34" rx="6" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="345" y="152" text-anchor="middle" font-size="10" fill="#2b2b2b">softmax (j)</text>
  <g filter="url(#sk)"><rect x="410" y="130" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="485" y="152" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：PV (j)</text>
  <g filter="url(#sk)"><rect x="570" y="130" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="645" y="152" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：QKᵀ (j+2)</text>
  <g filter="url(#sk)"><rect x="730" y="130" width="110" height="34" rx="6" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="785" y="152" text-anchor="middle" font-size="10" fill="#2b2b2b">softmax (j+2)</text>

  <!-- WG1 lane (pingpong, offset) -->
  <text x="110" y="230" text-anchor="end" font-size="12" font-weight="bold" fill="#2b2b2b">Consumer wg1</text>
  <g filter="url(#sk)"><rect x="130" y="210" width="110" height="34" rx="6" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="185" y="232" text-anchor="middle" font-size="10" fill="#2b2b2b">softmax (i)</text>
  <g filter="url(#sk)"><rect x="250" y="210" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="325" y="232" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：QKᵀ (i+1)</text>
  <g filter="url(#sk)"><rect x="410" y="210" width="110" height="34" rx="6" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="465" y="232" text-anchor="middle" font-size="10" fill="#2b2b2b">softmax (i+1)</text>
  <g filter="url(#sk)"><rect x="530" y="210" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="605" y="232" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：PV (i+1)</text>
  <g filter="url(#sk)"><rect x="690" y="210" width="150" height="34" rx="6" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="765" y="232" text-anchor="middle" font-size="10" fill="#2b2b2b">GEMM：QKᵀ (i+2)</text>

  <!-- producer lane -->
  <text x="110" y="310" text-anchor="end" font-size="12" font-weight="bold" fill="#2b2b2b">Producer</text>
  <g filter="url(#sk)"><rect x="130" y="290" width="180" height="34" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="220" y="312" text-anchor="middle" font-size="10" fill="#2b2b2b">TMA：K/V tile (j+1)</text>
  <g filter="url(#sk)"><rect x="320" y="290" width="180" height="34" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="410" y="312" text-anchor="middle" font-size="10" fill="#2b2b2b">TMA：K/V tile (j+2)</text>
  <g filter="url(#sk)"><rect x="510" y="290" width="180" height="34" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="600" y="312" text-anchor="middle" font-size="10" fill="#2b2b2b">TMA：K/V tile (j+3)</text>
  <g filter="url(#sk)"><rect x="700" y="290" width="140" height="34" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="770" y="312" text-anchor="middle" font-size="10" fill="#2b2b2b">TMA：…</text>

  <!-- overlap annotations -->
  <path d="M 300 168 L 340 205" stroke="#2b2b2b" stroke-width="1.2" fill="none" stroke-dasharray="3 3"/>
  <text x="360" y="192" font-size="10" fill="#2b2b2b">wg1 的 GEMM 与 wg0 的 softmax 同时进行（pingpong）</text>

  <!-- intra-warpgroup note -->
  <g filter="url(#sk)"><rect x="130" y="350" width="710" height="60" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="485" y="374" text-anchor="middle" font-size="11" fill="#2b2b2b">warpgroup 内部还有第二级重叠（2-stage）：同一 wg 内，块 j 的 softmax（CUDA core）</text>
  <text x="485" y="394" text-anchor="middle" font-size="11" fill="#2b2b2b">与块 j+1 的 QKᵀ WGMMA（Tensor Core，异步）并行 —— 需要重排 FA2 打破 softmax→GEMM 的串行依赖</text>
</svg>
