<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="139" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FA2 在 A100 上的吞吐（TFLOPs/s，越高越好）</text>
  <path d="M 200 44 Q 450 52 700 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#777">fwd+bwd，无 causal mask，head dim 64，序列 512→16k 取峰值；理论峰值 312（FP16/BF16 GEMM）</text>

  <!-- axis: 312 peak -> x = 200 + v/312*640 -->
  <line x1="200" y1="80" x2="200" y2="400" stroke="#8a8471" stroke-width="1.2"/>
  <line x1="200" y1="400" x2="850" y2="400" stroke="#8a8471" stroke-width="1.2"/>
  <text x="200" y="420" text-anchor="middle" font-size="11" fill="#777">0</text>
  <text x="405" y="420" text-anchor="middle" font-size="11" fill="#777">100</text>
  <text x="610" y="420" text-anchor="middle" font-size="11" fill="#777">200</text>
  <text x="815" y="420" text-anchor="middle" font-size="11" fill="#777">312（峰值）</text>
  <line x1="405" y1="80" x2="405" y2="400" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="610" y1="80" x2="610" y2="400" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="815" y1="80" x2="815" y2="400" stroke="#c0504d" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- PyTorch 46 -->
  <text x="190" y="110" text-anchor="end" font-size="11" fill="#2b2b2b">PyTorch 标准实现</text>
  <g filter="url(#sk)"><rect x="200" y="94" width="94" height="28" rx="6" fill="#8a8471" opacity="0.45" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="302" y="113" font-size="11" font-weight="bold" fill="#555">46（~15%）</text>

  <!-- xformers 77 -->
  <text x="190" y="160" text-anchor="end" font-size="11" fill="#2b2b2b">xformers（cutlass）</text>
  <g filter="url(#sk)"><rect x="200" y="144" width="158" height="28" rx="6" fill="#8a8471" opacity="0.45" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="366" y="163" font-size="11" font-weight="bold" fill="#555">77（~25%）</text>

  <!-- FA Triton 100 -->
  <text x="190" y="210" text-anchor="end" font-size="11" fill="#2b2b2b">FlashAttention（Triton）</text>
  <g filter="url(#sk)"><rect x="200" y="194" width="205" height="28" rx="6" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="413" y="213" font-size="11" font-weight="bold" fill="#28455c">100（~32%）</text>

  <!-- FA2 176 -->
  <text x="190" y="260" text-anchor="end" font-size="11" fill="#2b2b2b">FlashAttention-2</text>
  <g filter="url(#sk)"><rect x="200" y="244" width="361" height="28" rx="6" fill="#4a8edb" opacity="0.50" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="569" y="263" font-size="11" font-weight="bold" fill="#28455c">176（~56%）</text>

  <!-- FA2 fwd only 230 -->
  <text x="190" y="310" text-anchor="end" font-size="11" fill="#2b2b2b">FA2 仅 forward</text>
  <g filter="url(#sk)"><rect x="200" y="294" width="471" height="28" rx="6" fill="#57a773" opacity="0.45" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="679" y="313" font-size="11" font-weight="bold" fill="#2f5238">230（73%，接近 GEMM 效率）</text>

  <!-- e2e note -->
  <g filter="url(#sk)"><rect x="200" y="335" width="500" height="52" rx="8" fill="none" stroke="#c98a2b" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="450" y="356" text-anchor="middle" font-size="11" fill="#5c4a28">端到端 GPT 训练：FA1 189 → FA2 最高 225 TFLOPs/s</text>
  <text x="450" y="376" text-anchor="middle" font-size="11" fill="#5c4a28">= 72% MFU（vs FA1 提升 1.3×，vs 无 FA 基线 2.8×）</text>
</svg>
