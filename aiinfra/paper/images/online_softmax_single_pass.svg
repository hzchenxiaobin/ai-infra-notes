<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="67" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="460" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Online Softmax 单遍更新（m, d）</text>
  <path d="M 260 44 Q 450 52 640 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#555">每处理一个元素 x_j：先更新 running max，再按新 max 缩放并累加 running sum</text>

  <!-- input stream -->
  <text x="120" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8edb">输入向量 x</text>
  <g filter="url(#sk)"><rect x="60" y="150" width="120" height="46" rx="6" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="120" y="178" text-anchor="middle" font-size="12" fill="#2b2b2b">x_1 ... x_V</text>
  <path d="M 180 173 L 250 173" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="215" y="160" text-anchor="middle" font-size="10" fill="#555">一次 load</text>

  <!-- update box -->
  <g filter="url(#sk)"><rect x="260" y="115" width="380" height="180" rx="12" fill="#57a773" opacity="0.18" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="450" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Online 更新（Algorithm 3）</text>

  <text x="450" y="168" text-anchor="middle" font-size="12" fill="#2b2b2b">① m_j = max(m_{j-1}, x_j)</text>
  <text x="450" y="192" text-anchor="middle" font-size="12" fill="#2b2b2b">② d_j = d_{j-1} × e^{m_{j-1}-m_j} + e^{x_j-m_j}</text>
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#555">旧 sum 按新参考点缩放，再加新元素的指数</text>
  <text x="450" y="244" text-anchor="middle" font-size="11" fill="#2f5238">额外计算：每元素仅 2 次浮点操作</text>
  <text x="450" y="266" text-anchor="middle" font-size="11" fill="#2f5238">m 单调不减 → e^{m_{j-1}-m_j} ≤ 1，数值稳定</text>

  <!-- state -->
  <text x="760" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98a2b">running 状态</text>
  <g filter="url(#sk)"><rect x="700" y="150" width="120" height="70" rx="8" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="760" y="180" text-anchor="middle" font-size="12" fill="#2b2b2b">m, d</text>
  <text x="760" y="200" text-anchor="middle" font-size="10" fill="#555">寄存器/共享内存</text>
  <path d="M 640 185 L 695 185" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- final pass -->
  <g filter="url(#sk)"><rect x="260" y="330" width="380" height="70" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="450" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">第二遍（可选，也可与下一算子融合）</text>
  <text x="450" y="380" text-anchor="middle" font-size="11" fill="#555">y_i = e^{x_i - m_V} / d_V（再 load 一次，store 一次）</text>
</svg>
