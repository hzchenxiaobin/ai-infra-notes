<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="149" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#c98a2b"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Warp Specialization：Producer / Consumer 异步流水</text>
  <path d="M 170 44 Q 450 52 730 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#555">Hopper 的 TMA（异步拷贝）与 WGMMA（异步 Tensor Core）让"搬数"和"计算"可以真正的硬件级并行</text>

  <!-- GMEM -->
  <g filter="url(#sk)"><rect x="60" y="90" width="180" height="80" rx="10" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="150" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">GMEM（HBM）</text>
  <text x="150" y="144" text-anchor="middle" font-size="10" fill="#555">80 GiB @ 3.35 TB/s</text>

  <!-- producer -->
  <g filter="url(#sk)"><rect x="330" y="85" width="230" height="90" rx="10" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="445" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Producer warpgroup</text>
  <text x="445" y="134" text-anchor="middle" font-size="10" fill="#5c4a28">只发 TMA 指令搬 K/V tile</text>
  <text x="445" y="152" text-anchor="middle" font-size="10" fill="#5c4a28">1 个线程即可驱动 → 寄存器少分</text>

  <!-- SMEM -->
  <g filter="url(#sk)"><rect x="640" y="90" width="200" height="80" rx="10" fill="#57a773" opacity="0.25" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="740" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">SMEM 缓冲</text>
  <text x="740" y="144" text-anchor="middle" font-size="10" fill="#2f5238">228 KiB/SM，多 stage 流水</text>

  <path d="M 240 130 L 325 130" stroke="#c98a2b" stroke-width="2" fill="none" marker-end="url(#arO)" filter="url(#sk)"/>
  <path d="M 560 130 L 635 130" stroke="#c98a2b" stroke-width="2" fill="none" marker-end="url(#arO)" filter="url(#sk)"/>

  <!-- consumers -->
  <g filter="url(#sk)"><rect x="330" y="230" width="230" height="80" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="445" y="256" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Consumer warpgroup 0</text>
  <text x="445" y="278" text-anchor="middle" font-size="10" fill="#28455c">WGMMA(GEMM) + softmax</text>
  <text x="445" y="296" text-anchor="middle" font-size="10" fill="#28455c">寄存器多分（setmaxnreg 重分配）</text>
  <g filter="url(#sk)"><rect x="330" y="330" width="230" height="80" rx="10" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="445" y="356" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Consumer warpgroup 1</text>
  <text x="445" y="378" text-anchor="middle" font-size="10" fill="#28455c">与 wg0 交替（pingpong）</text>
  <text x="445" y="396" text-anchor="middle" font-size="10" fill="#28455c">一个 softmax 时另一个 GEMM</text>

  <path d="M 640 160 L 565 240" stroke="#4a8edb" stroke-width="1.8" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <path d="M 640 165 L 565 340" stroke="#4a8edb" stroke-width="1.8" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>

  <!-- async notes -->
  <g filter="url(#sk)"><rect x="640" y="230" width="220" height="120" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="750" y="256" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">关键硬件特性</text>
  <text x="750" y="280" text-anchor="middle" font-size="10" fill="#555">TMA：专用拷贝单元，不占 SM</text>
  <text x="750" y="300" text-anchor="middle" font-size="10" fill="#555">WGMMA：warpgroup 级异步 GEMM</text>
  <text x="750" y="320" text-anchor="middle" font-size="10" fill="#555">setmaxnreg：warpgroup 间寄存器重分配</text>
  <text x="750" y="340" text-anchor="middle" font-size="10" fill="#555">mbarrier：生产者-消费者同步原语</text>

  <!-- bottom note -->
  <g filter="url(#sk)"><rect x="60" y="425" width="780" height="56" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#5c4a28">分工即优化：producer 只搬数、consumer 只算 → 编译器更容易排布指令，</text>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#5c4a28">且搬数等待时间被另一个 warpgroup 的计算填满（pingpong：570 → 620–640 TFLOPs/s）</text>
</svg>
