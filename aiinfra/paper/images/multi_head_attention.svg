<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#fdfcf7"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Multi-Head Attention：h 个头并行</text>
  <path d="M 240 44 Q 440 52 640 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="64" text-anchor="middle" font-size="12" fill="#555">head_i = Attention(X·W_i^Q, X·W_i^K, X·W_i^V)；MultiHead = Concat(head_1..head_h) · W_O</text>

  <!-- Input X -->
  <g filter="url(#sk)"><rect x="60" y="440" width="130" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="125" y="466" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输入 X</text>
  <text x="125" y="484" text-anchor="middle" font-size="11" fill="#555">n × d_model(512)</text>

  <!-- linear projections -->
  <path d="M 125 440 L 125 392" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="45" y="330" width="160" height="56" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="125" y="354" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Linear ×3（Q/K/V）</text>
  <text x="125" y="372" text-anchor="middle" font-size="10" fill="#28455c">W_i^Q, W_i^K, W_i^V</text>

  <!-- fan out to heads -->
  <path d="M 205 348 L 250 290" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 205 352 L 430 290" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 205 356 L 650 292" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- head 1 -->
  <g filter="url(#sk)"><rect x="215" y="180" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="285" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_1</text>
  <text x="285" y="226" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="285" y="242" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="285" y="262" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- head 2 -->
  <g filter="url(#sk)"><rect x="395" y="180" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="465" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_2</text>
  <text x="465" y="226" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="465" y="242" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="465" y="262" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- dots -->
  <text x="575" y="238" text-anchor="middle" font-size="24" fill="#888">···</text>

  <!-- head 8 -->
  <g filter="url(#sk)"><rect x="615" y="180" width="140" height="100" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="685" y="206" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_8</text>
  <text x="685" y="226" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="685" y="242" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="685" y="262" text-anchor="middle" font-size="10" fill="#555">h = 8 个头</text>

  <!-- concat -->
  <path d="M 285 180 L 285 130 L 460 130 L 460 116" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 465 180 L 465 116" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 685 180 L 685 130 L 500 130 L 500 116" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="380" y="60" width="200" height="52" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="480" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Concat + Linear（W_O）</text>
  <text x="480" y="102" text-anchor="middle" font-size="10" fill="#2f5238">8×64 → 512 → d_model</text>

  <!-- output -->
  <path d="M 480 60 L 480 28" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- side annotation -->
  <g filter="url(#sk)"><rect x="560" y="400" width="280" height="96" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="7 4"/></g>
  <text x="700" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c4a28">为什么多头不增加 FLOPs？</text>
  <text x="700" y="450" text-anchor="middle" font-size="11" fill="#5c4a28">每头维度降为 d_model/h = 64</text>
  <text x="700" y="468" text-anchor="middle" font-size="11" fill="#5c4a28">8 头 × 64 维 = 512 维，总计算量</text>
  <text x="700" y="486" text-anchor="middle" font-size="11" fill="#5c4a28">与单头全维度基本相当</text>
</svg>
