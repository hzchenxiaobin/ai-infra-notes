<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="580" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Multi-Head Attention：h 个头并行</text>
  <path d="M 240 42 Q 440 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="62" text-anchor="middle" font-size="12" fill="#555">head_i = Attention(X·W_i^Q, X·W_i^K, X·W_i^V)；MultiHead = Concat(head_1..head_h) · W_O</text>

  <!-- ===== 输出（顶部） ===== -->
  <g filter="url(#sk)"><rect x="370" y="78" width="140" height="44" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="440" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">输出</text>
  <text x="440" y="114" text-anchor="middle" font-size="10" fill="#5c4a28">n × d_model(512)</text>

  <!-- Concat + Linear -->
  <path d="M 440 122 L 440 138" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="330" y="140" width="220" height="52" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="440" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Concat + Linear（W_O）</text>
  <text x="440" y="181" text-anchor="middle" font-size="10" fill="#2f5238">h × d_v = 8 × 64 → 512</text>

  <!-- ===== 三个 head（fan-in 到 Concat） ===== -->
  <!-- head_1 → Concat -->
  <path d="M 220 232 L 220 207 L 360 207 L 360 192" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_2 → Concat -->
  <path d="M 420 232 L 420 192" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_h → Concat -->
  <path d="M 660 232 L 660 207 L 520 207 L 520 192" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- head_1 -->
  <g filter="url(#sk)"><rect x="150" y="232" width="140" height="110" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="220" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_1</text>
  <text x="220" y="278" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="220" y="294" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="220" y="318" text-anchor="middle" font-size="10" fill="#555">Q_1, K_1, V_1</text>
  <text x="220" y="333" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- head_2 -->
  <g filter="url(#sk)"><rect x="350" y="232" width="140" height="110" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="420" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_2</text>
  <text x="420" y="278" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="420" y="294" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="420" y="318" text-anchor="middle" font-size="10" fill="#555">Q_2, K_2, V_2</text>
  <text x="420" y="333" text-anchor="middle" font-size="10" fill="#555">d_k = d_v = 64</text>

  <!-- dots -->
  <text x="540" y="294" text-anchor="middle" font-size="28" fill="#888">···</text>

  <!-- head_h -->
  <g filter="url(#sk)"><rect x="590" y="232" width="140" height="110" rx="10" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="660" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">head_h</text>
  <text x="660" y="278" text-anchor="middle" font-size="10" fill="#28455c">Scaled Dot-Product</text>
  <text x="660" y="294" text-anchor="middle" font-size="10" fill="#28455c">Attention</text>
  <text x="660" y="318" text-anchor="middle" font-size="10" fill="#555">Q_h, K_h, V_h</text>
  <text x="660" y="333" text-anchor="middle" font-size="10" fill="#555">h = 8 个头</text>

  <!-- ===== Linear ×3 投影（中间） + 各头独立投影 ===== -->
  <!-- 每个头有自己的 W_i^Q, W_i^K, W_i^V；这里画成一组共享标注 -->
  <!-- head_1 ← 投影 -->
  <path d="M 200 432 L 220 342" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_2 ← 投影 -->
  <path d="M 220 432 L 420 342" stroke="#3a3a3a" stroke-width="1.4" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- head_h ← 投影 -->
  <path d="M 240 432 L 660 342" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Linear ×3 -->
  <g filter="url(#sk)"><rect x="45" y="432" width="320" height="56" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="205" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Linear ×3（每头 W_i^Q, W_i^K, W_i^V）</text>
  <text x="205" y="474" text-anchor="middle" font-size="10" fill="#28455c">d_model(512) → d_k(64)，h 组并行 = 单个大 GEMM</text>

  <!-- X → Linear -->
  <path d="M 205 532 L 205 488" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 输入 X -->
  <g filter="url(#sk)"><rect x="140" y="532" width="130" height="44" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="205" y="553" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输入 X</text>
  <text x="205" y="569" text-anchor="middle" font-size="11" fill="#555">n × d_model(512)</text>

  <!-- ===== 侧注：为什么多头不增加 FLOPs ===== -->
  <g filter="url(#sk)"><rect x="560" y="410" width="290" height="148" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="7 4"/></g>
  <text x="705" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c4a28">为什么多头不增加 FLOPs？</text>
  <text x="705" y="462" text-anchor="middle" font-size="11" fill="#5c4a28">单头全维度：d_model × d_model = 512²</text>
  <text x="705" y="482" text-anchor="middle" font-size="11" fill="#5c4a28">多头切分：h × (d_model × d_k) = 8 × 512 × 64</text>
  <text x="705" y="502" text-anchor="middle" font-size="11" fill="#5c4a28">　 = 512²，总计算量与单头相当——</text>
  <text x="705" y="522" text-anchor="middle" font-size="11" fill="#5c4a28">表达力提升几乎"免费"</text>
  <text x="705" y="544" text-anchor="middle" font-size="10" fill="#888">不同头可学不同子空间关系（语法/指代…）</text>
</svg>
