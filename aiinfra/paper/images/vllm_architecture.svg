<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="42" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57a773"/>
    </marker>
  </defs>
  <rect width="920" height="560" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">vLLM 系统架构（Fig. 4）：集中式调度 + 分页 KV 管理</text>
  <path d="M 200 46 Q 460 54 720 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- centralized scheduler -->
  <g filter="url(#sk)"><rect x="250" y="70" width="420" height="150" rx="12" fill="#4a8edb" opacity="0.14" stroke="#4a8edb" stroke-width="2"/></g>
  <text x="460" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">集中式 Scheduler（Python）</text>
  <g filter="url(#sk)"><rect x="270" y="110" width="180" height="60" rx="8" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="360" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">FCFS 调度 / 抢占</text>
  <text x="360" y="152" text-anchor="middle" font-size="10" fill="#28455c">iteration-level 选批</text>
  <g filter="url(#sk)"><rect x="470" y="110" width="180" height="60" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="560" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">KV Cache Manager</text>
  <text x="560" y="152" text-anchor="middle" font-size="10" fill="#6b4a14">维护 Block Tables</text>
  <g filter="url(#sk)"><rect x="290" y="180" width="160" height="32" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="370" y="200" text-anchor="middle" font-size="10" fill="#2f5238">GPU Block Allocator</text>
  <g filter="url(#sk)"><rect x="470" y="180" width="160" height="32" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="550" y="200" text-anchor="middle" font-size="10" fill="#2f5238">CPU Block Allocator</text>

  <!-- CPU RAM swap -->
  <g filter="url(#sk)"><rect x="40" y="290" width="170" height="110" rx="12" fill="#8a8471" opacity="0.22" stroke="#8a8471" stroke-width="1.8"/></g>
  <text x="125" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">CPU RAM</text>
  <text x="125" y="340" text-anchor="middle" font-size="11" fill="#4a463c">swap 区（被抢占</text>
  <text x="125" y="358" text-anchor="middle" font-size="11" fill="#4a463c">序列的 KV 块）</text>
  <text x="125" y="382" text-anchor="middle" font-size="10" fill="#777">大小 ≤ GPU KV 总量</text>
  <path d="M 250 250 L 145 288" stroke="#8a8471" stroke-width="1.8" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="6 4"/>
  <text x="160" y="258" text-anchor="middle" font-size="10" fill="#4a463c">swap out / in</text>

  <!-- workers -->
  <g filter="url(#sk)"><rect x="290" y="310" width="180" height="130" rx="12" fill="#c98a2b" opacity="0.18" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="380" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Worker 0 (GPU)</text>
  <g filter="url(#sk)"><rect x="305" y="346" width="150" height="38" rx="6" fill="#4a8edb" opacity="0.28" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="380" y="370" text-anchor="middle" font-size="10" fill="#28455c">Model Shard 0</text>
  <g filter="url(#sk)"><rect x="305" y="392" width="150" height="38" rx="6" fill="#57a773" opacity="0.28" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="380" y="416" text-anchor="middle" font-size="10" fill="#2f5238">Cache Engine 0</text>

  <g filter="url(#sk)"><rect x="500" y="310" width="180" height="130" rx="12" fill="#c98a2b" opacity="0.18" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="590" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Worker 1 (GPU)</text>
  <g filter="url(#sk)"><rect x="515" y="346" width="150" height="38" rx="6" fill="#4a8edb" opacity="0.28" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="590" y="370" text-anchor="middle" font-size="10" fill="#28455c">Model Shard 1</text>
  <g filter="url(#sk)"><rect x="515" y="392" width="150" height="38" rx="6" fill="#57a773" opacity="0.28" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="590" y="416" text-anchor="middle" font-size="10" fill="#2f5238">Cache Engine 1</text>

  <g filter="url(#sk)"><rect x="710" y="310" width="180" height="130" rx="12" fill="#c98a2b" opacity="0.18" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="800" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Worker N−1</text>
  <g filter="url(#sk)"><rect x="725" y="346" width="150" height="38" rx="6" fill="#4a8edb" opacity="0.28" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="800" y="370" text-anchor="middle" font-size="10" fill="#28455c">Model Shard N−1</text>
  <g filter="url(#sk)"><rect x="725" y="392" width="150" height="38" rx="6" fill="#57a773" opacity="0.28" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="800" y="416" text-anchor="middle" font-size="10" fill="#2f5238">Cache Engine N−1</text>
  <text x="485" y="380" text-anchor="middle" font-size="16" fill="#888">…</text>
  <text x="695" y="380" text-anchor="middle" font-size="16" fill="#888">…</text>

  <!-- control flow arrows -->
  <path d="M 370 222 L 375 306" stroke="#4a8edb" stroke-width="1.8" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <path d="M 480 222 L 575 306" stroke="#4a8edb" stroke-width="1.8" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <path d="M 630 222 L 790 306" stroke="#4a8edb" stroke-width="1.8" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="250" y="262" text-anchor="middle" font-size="10" fill="#28455c">广播 token ids</text>
  <text x="250" y="278" text-anchor="middle" font-size="10" fill="#28455c">+ block table</text>

  <path d="M 420 306 L 415 226" stroke="#57a773" stroke-width="1.8" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <path d="M 620 306 L 545 226" stroke="#57a773" stroke-width="1.8" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <text x="700" y="262" text-anchor="middle" font-size="10" fill="#2f5238">返回采样 token</text>

  <!-- all-reduce -->
  <path d="M 470 395 L 500 395" stroke="#c98a2b" stroke-width="2" fill="none" filter="url(#sk)"/>
  <path d="M 680 395 L 710 395" stroke="#c98a2b" stroke-width="2" fill="none" filter="url(#sk)"/>
  <text x="590" y="462" text-anchor="middle" font-size="11" fill="#6b4a14">层内 NCCL all-reduce（不经过 scheduler）</text>

  <!-- key point -->
  <g filter="url(#sk)"><rect x="120" y="478" width="680" height="62" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="460" y="502" text-anchor="middle" font-size="11" fill="#4a463c">关键设计：所有 worker 共享同一份 block table（TP 下各卡处理相同 token、相同位置），</text>
  <text x="460" y="524" text-anchor="middle" font-size="11" fill="#4a463c">因此只需 1 个 KV Cache Manager；worker 每步开始拿到 block 映射，无需再为内存管理同步</text>
</svg>
