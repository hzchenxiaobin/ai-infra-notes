<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="67" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="900" height="480" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">三种 Softmax 实现的内存访问次数对比</text>
  <path d="M 230 44 Q 450 52 670 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#555">每输入元素的 load/store 次数；Softmax+TopK 融合后收益更大</text>

  <!-- axes -->
  <path d="M 110 420 L 110 90" stroke="#3a3a3a" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <path d="M 110 420 L 820 420" stroke="#3a3a3a" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="40" y="250" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90 40 250)">内存访问次数 / 元素</text>

  <!-- softmax group -->
  <text x="260" y="448" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>

  <g filter="url(#sk)"><rect x="150" y="330" width="60" height="90" rx="4" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="180" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">3</text>
  <text x="180" y="405" text-anchor="middle" font-size="10" fill="#555">Naive</text>

  <g filter="url(#sk)"><rect x="230" y="300" width="60" height="120" rx="4" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="260" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">4</text>
  <text x="260" y="390" text-anchor="middle" font-size="10" fill="#555">Safe</text>

  <g filter="url(#sk)"><rect x="310" y="330" width="60" height="90" rx="4" fill="#57a773" opacity="0.45" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="340" y="380" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">3</text>
  <text x="340" y="405" text-anchor="middle" font-size="10" fill="#555">Online</text>

  <text x="260" y="250" text-anchor="middle" font-size="12" fill="#2f5238">Online 比 Safe 少 1 次扫描（1.33× ↓）</text>

  <!-- softmax+topk group -->
  <text x="620" y="448" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax + TopK</text>

  <g filter="url(#sk)"><rect x="490" y="270" width="60" height="150" rx="4" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="520" y="350" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">5</text>
  <text x="520" y="375" text-anchor="middle" font-size="10" fill="#555">Safe 分开</text>

  <g filter="url(#sk)"><rect x="570" y="300" width="60" height="120" rx="4" fill="#c98a2b" opacity="0.45" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="600" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">4</text>
  <text x="600" y="390" text-anchor="middle" font-size="10" fill="#555">Online 分开</text>

  <g filter="url(#sk)"><rect x="650" y="390" width="60" height="30" rx="4" fill="#57a773" opacity="0.45" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="680" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">1</text>
  <text x="680" y="432" text-anchor="middle" font-size="10" fill="#555">Online 融合</text>

  <text x="620" y="200" text-anchor="middle" font-size="12" fill="#2f5238">融合后每元素只需 1 次 load（5× ↓）</text>
  <text x="620" y="222" text-anchor="middle" font-size="11" fill="#555">V100 实测 Softmax+TopK 最高 5× 加速</text>
</svg>
