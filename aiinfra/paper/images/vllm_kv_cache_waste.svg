<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">已有系统的 KV Cache 三种浪费（Fig. 3）</text>
  <path d="M 260 46 Q 460 54 660 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">连续预分配：按最大可能长度预留一整块，无论实际用多少</text>

  <!-- Request A bar: 2048 slots -->
  <text x="60" y="112" font-size="13" font-weight="bold" fill="#2b2b2b">请求 A</text>
  <text x="60" y="130" font-size="11" fill="#555">max = 2048</text>
  <!-- used: 8 tokens -->
  <g filter="url(#sk)"><rect x="150" y="92" width="26" height="56" rx="4" fill="#57a773" opacity="0.45" stroke="#57a773" stroke-width="1.6"/></g>
  <!-- reserved: a bit more -->
  <g filter="url(#sk)"><rect x="176" y="92" width="30" height="56" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.6"/></g>
  <!-- internal frag: rest of chunk -->
  <g filter="url(#sk)"><rect x="206" y="92" width="430" height="56" rx="4" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="163" y="170" text-anchor="middle" font-size="9" fill="#2f5238">8 个 prompt</text>
  <text x="163" y="183" text-anchor="middle" font-size="9" fill="#2f5238">KV 状态</text>
  <text x="191" y="170" text-anchor="middle" font-size="9" fill="#28455c">2 个</text>
  <text x="191" y="183" text-anchor="middle" font-size="9" fill="#28455c">预留</text>
  <text x="421" y="124" text-anchor="middle" font-size="12" fill="#6b4a14">内部碎片：2038 个槽位永远不会被用到</text>
  <text x="163" y="80" text-anchor="middle" font-size="10" fill="#555">当前迭代</text>

  <!-- external frag gap -->
  <g filter="url(#sk)"><rect x="646" y="92" width="40" height="56" rx="4" fill="#b8514d" opacity="0.35" stroke="#b8514d" stroke-width="1.6"/></g>
  <text x="666" y="124" text-anchor="middle" font-size="9" fill="#7a2e2b">外部</text>
  <text x="666" y="136" text-anchor="middle" font-size="9" fill="#7a2e2b">碎片</text>

  <!-- Request B bar: 512 slots -->
  <text x="60" y="232" font-size="13" font-weight="bold" fill="#2b2b2b">请求 B</text>
  <text x="60" y="250" font-size="11" fill="#555">max = 512</text>
  <g filter="url(#sk)"><rect x="696" y="212" width="12" height="56" rx="4" fill="#57a773" opacity="0.45" stroke="#57a773" stroke-width="1.6"/></g>
  <g filter="url(#sk)"><rect x="708" y="212" width="14" height="56" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.6"/></g>
  <g filter="url(#sk)"><rect x="722" y="212" width="120" height="56" rx="4" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="782" y="244" text-anchor="middle" font-size="10" fill="#6b4a14">内部碎片 507 槽</text>

  <!-- legend -->
  <g filter="url(#sk)"><rect x="150" y="300" width="620" height="46" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="7 4"/></g>
  <rect x="172" y="316" width="16" height="16" rx="3" fill="#57a773" opacity="0.45" stroke="#57a773"/>
  <text x="196" y="329" font-size="11" fill="#2b2b2b">真实 token 状态</text>
  <rect x="312" y="316" width="16" height="16" rx="3" fill="#4a8edb" opacity="0.35" stroke="#4a8edb"/>
  <text x="336" y="329" font-size="11" fill="#2b2b2b">预留（未来会用）</text>
  <rect x="478" y="316" width="16" height="16" rx="3" fill="#c98a2b" opacity="0.35" stroke="#c98a2b"/>
  <text x="502" y="329" font-size="11" fill="#2b2b2b">内部碎片（永不使用）</text>
  <rect x="640" y="316" width="16" height="16" rx="3" fill="#b8514d" opacity="0.35" stroke="#b8514d"/>
  <text x="664" y="329" font-size="11" fill="#2b2b2b">外部碎片</text>

  <!-- waste stats from Fig 2 -->
  <text x="460" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">实测（Fig. 2）：已有系统中真正存 token 状态的 KV 显存只有 20.4% ~ 38.2%</text>
  <text x="460" y="416" text-anchor="middle" font-size="12" fill="#6b4a14">其余全部消耗在「预留 + 内部碎片 + 外部碎片」上 → batch 装不下 → 吞吐被显存锁死</text>
  <text x="460" y="440" text-anchor="middle" font-size="11" fill="#777">（预留与内部碎片的区别：预留的空间最终会被生成 token 用上，内部碎片则永远浪费）</text>
</svg>
