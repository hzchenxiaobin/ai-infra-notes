<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Scaled Dot-Product Attention 数据流</text>
  <path d="M 240 42 Q 440 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="62" text-anchor="middle" font-size="13" fill="#2b2b2b">Attention(Q, K, V) = softmax(Q·Kᵀ / √d_k) · V</text>

  <!-- ===== 上排：Q,K → MatMul → Scale → Mask → Softmax（从左到右） ===== -->

  <!-- Q -->
  <g filter="url(#sk)"><rect x="30" y="100" width="80" height="50" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="70" y="123" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Q</text>
  <text x="70" y="140" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <!-- K -->
  <g filter="url(#sk)"><rect x="30" y="185" width="80" height="50" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="70" y="208" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">K</text>
  <text x="70" y="225" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <!-- Q,K → MatMul1 arrows -->
  <path d="M 110 135 L 153 160" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 110 210 L 153 186" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- MatMul1 (Q·Kᵀ) -->
  <g filter="url(#sk)"><rect x="155" y="145" width="95" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="202" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="202" y="187" text-anchor="middle" font-size="11" fill="#555">Q · Kᵀ</text>
  <path d="M 250 173 L 278 173" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- S 标注（相似度得分） -->
  <text x="265" y="133" text-anchor="middle" font-size="10" fill="#888">S：n × n</text>

  <!-- Scale -->
  <g filter="url(#sk)"><rect x="280" y="145" width="85" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="322" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Scale</text>
  <text x="322" y="187" text-anchor="middle" font-size="11" fill="#555">× 1/√d_k</text>
  <path d="M 365 173 L 388 173" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Mask (optional) -->
  <g filter="url(#sk)"><rect x="390" y="145" width="95" height="56" rx="8" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="437" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Mask</text>
  <text x="437" y="187" text-anchor="middle" font-size="10" fill="#555">（可选）上三角 -∞</text>
  <path d="M 485 173 L 513 173" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Softmax -->
  <g filter="url(#sk)"><rect x="515" y="145" width="100" height="56" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="565" y="169" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <text x="565" y="187" text-anchor="middle" font-size="10" fill="#2f5238">按行归一化</text>

  <!-- ===== 右侧竖向：Softmax → P → MatMul2 ===== -->
  <path d="M 565 201 L 565 253" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- P -->
  <g filter="url(#sk)"><rect x="510" y="255" width="110" height="46" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="565" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">P（注意力权重）</text>
  <text x="565" y="292" text-anchor="middle" font-size="10" fill="#28455c">n × n，每行和为 1</text>
  <path d="M 565 301 L 565 353" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== 下排：V → MatMul2 ← P ; MatMul2 → Output ===== -->

  <!-- V -->
  <g filter="url(#sk)"><rect x="30" y="355" width="80" height="50" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="70" y="378" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">V</text>
  <text x="70" y="395" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- V → MatMul2 arrow (长水平线) -->
  <path d="M 110 380 L 508 383" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="300" y="372" text-anchor="middle" font-size="11" fill="#666">V</text>

  <!-- MatMul2 (P·V) -->
  <g filter="url(#sk)"><rect x="510" y="355" width="110" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="565" y="379" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="565" y="397" text-anchor="middle" font-size="11" fill="#555">P · V</text>

  <!-- MatMul2 → Output -->
  <path d="M 620 383 L 678 383" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Output O -->
  <g filter="url(#sk)"><rect x="680" y="355" width="120" height="56" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="740" y="379" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输出 O</text>
  <text x="740" y="397" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- 右侧注解：两段 MatMul 的角色 -->
  <g filter="url(#sk)"><rect x="680" y="100" width="170" height="180" rx="10" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="6 4"/></g>
  <text x="765" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">两段 MatMul 的角色</text>
  <text x="765" y="148" text-anchor="middle" font-size="11" fill="#555">① Q·Kᵀ：算相似度</text>
  <text x="765" y="166" text-anchor="middle" font-size="11" fill="#555">　 输出 n × n 得分矩阵</text>
  <text x="765" y="194" text-anchor="middle" font-size="11" fill="#555">② P·V：加权聚合 Value</text>
  <text x="765" y="212" text-anchor="middle" font-size="11" fill="#555">　 输出 n × d_v 上下文</text>
  <text x="765" y="244" text-anchor="middle" font-size="11" fill="#5c4a28">两次 GEMM 是 FLOPs 主体</text>
  <text x="765" y="262" text-anchor="middle" font-size="11" fill="#5c4a28">softmax 物化 n² 是显存瓶颈</text>

  <!-- 底部注释 -->
  <text x="440" y="450" text-anchor="middle" font-size="11" fill="#666">Mask 只在 Decoder 自注意力中使用（因果掩码防止偷看未来）；Scale 中 1/√d_k 防止 softmax 饱和</text>
</svg>
