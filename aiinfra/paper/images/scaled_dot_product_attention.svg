<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="470" fill="#fdfcf7"/>
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Scaled Dot-Product Attention 数据流</text>
  <path d="M 250 44 Q 440 52 630 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#2b2b2b">Attention(Q, K, V) = softmax(Q·Kᵀ / √d_k) · V</text>

  <!-- Q, K, V inputs -->
  <g filter="url(#sk)"><rect x="40" y="120" width="90" height="56" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="85" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">Q</text>
  <text x="85" y="163" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <g filter="url(#sk)"><rect x="40" y="220" width="90" height="56" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="85" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">K</text>
  <text x="85" y="263" text-anchor="middle" font-size="11" fill="#28455c">n × d_k</text>

  <g filter="url(#sk)"><rect x="40" y="360" width="90" height="56" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="85" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">V</text>
  <text x="85" y="403" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- MatMul Q·K^T -->
  <path d="M 130 148 L 200 170" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 130 248 L 200 226" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="205" y="168" width="110" height="60" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="260" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="260" y="212" text-anchor="middle" font-size="11" fill="#555">Q · Kᵀ</text>

  <!-- Scale -->
  <path d="M 315 198 L 370 198" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="375" y="168" width="110" height="60" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="430" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Scale</text>
  <text x="430" y="212" text-anchor="middle" font-size="11" fill="#555">× 1/√d_k</text>

  <!-- Mask (optional) -->
  <path d="M 485 198 L 540 198" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="545" y="168" width="110" height="60" rx="8" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="600" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Mask（可选）</text>
  <text x="600" y="212" text-anchor="middle" font-size="11" fill="#555">上三角置 -∞</text>

  <!-- Softmax -->
  <path d="M 655 198 L 710 198" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="715" y="168" width="120" height="60" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="775" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <text x="775" y="212" text-anchor="middle" font-size="11" fill="#2f5238">按行归一化</text>

  <!-- P matrix -->
  <path d="M 775 228 L 775 300" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="715" y="305" width="120" height="56" rx="8" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="775" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">P（注意力权重）</text>
  <text x="775" y="348" text-anchor="middle" font-size="11" fill="#28455c">n × n，每行和为 1</text>

  <!-- MatMul P·V -->
  <path d="M 130 388 L 380 380" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 715 333 L 500 372" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="385" y="352" width="110" height="56" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="440" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">MatMul</text>
  <text x="440" y="396" text-anchor="middle" font-size="11" fill="#555">P · V</text>

  <!-- Output -->
  <path d="M 495 380 L 560 380" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="565" y="352" width="110" height="56" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.8"/></g>
  <text x="620" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">输出 O</text>
  <text x="620" y="396" text-anchor="middle" font-size="11" fill="#5c4a28">n × d_v</text>

  <!-- annotations -->
  <text x="260" y="250" text-anchor="middle" font-size="11" fill="#666">相似度得分 S（n × n）</text>
  <text x="440" y="436" text-anchor="middle" font-size="11" fill="#666">两次 MatMul 占主要 FLOPs；Mask 只在 Decoder 自注意力中使用</text>
</svg>
