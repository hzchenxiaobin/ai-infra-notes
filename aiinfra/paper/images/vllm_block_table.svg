<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Block Table：逻辑块 → 物理块（Fig. 6，块大小 B = 4）</text>
  <path d="M 190 46 Q 460 54 730 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">Prompt：“Four score and seven years ago our” → 生成 “fathers” → “brought” → …</text>

  <!-- logical blocks -->
  <text x="170" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8edb">请求 A 的逻辑 KV 块（连续视角）</text>
  <g filter="url(#sk)"><rect x="60" y="115" width="110" height="50" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="115" y="137" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 0</text>
  <text x="115" y="153" text-anchor="middle" font-size="9" fill="#28455c">Four score and seven</text>
  <g filter="url(#sk)"><rect x="178" y="115" width="110" height="50" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="233" y="137" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 1</text>
  <text x="233" y="153" text-anchor="middle" font-size="9" fill="#28455c">years ago our fathers</text>
  <g filter="url(#sk)"><rect x="296" y="115" width="110" height="50" rx="6" fill="#4a8edb" opacity="0.18" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="351" y="137" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 2</text>
  <text x="351" y="153" text-anchor="middle" font-size="9" fill="#28455c">brought（1/4 满）</text>
  <g filter="url(#sk)"><rect x="414" y="115" width="60" height="50" rx="6" fill="#4a8edb" opacity="0.08" stroke="#4a8edb" stroke-width="1.2" stroke-dasharray="5 4"/></g>
  <text x="444" y="137" text-anchor="middle" font-size="10" fill="#888">Block 3</text>
  <text x="444" y="153" text-anchor="middle" font-size="9" fill="#999">未分配</text>

  <!-- block table -->
  <text x="565" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#c98a2b">Block Table</text>
  <g filter="url(#sk)"><rect x="505" y="115" width="120" height="34" rx="5" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="540" y="137" text-anchor="middle" font-size="11" fill="#2b2b2b">7</text>
  <text x="590" y="137" text-anchor="middle" font-size="11" fill="#555">#filled 4</text>
  <g filter="url(#sk)"><rect x="505" y="155" width="120" height="34" rx="5" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="540" y="177" text-anchor="middle" font-size="11" fill="#2b2b2b">1</text>
  <text x="590" y="177" text-anchor="middle" font-size="11" fill="#555">3 → 4</text>
  <g filter="url(#sk)"><rect x="505" y="195" width="120" height="34" rx="5" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="540" y="217" text-anchor="middle" font-size="11" fill="#2b2b2b">3</text>
  <text x="590" y="217" text-anchor="middle" font-size="11" fill="#555">1</text>
  <g filter="url(#sk)"><rect x="505" y="235" width="120" height="34" rx="5" fill="#fdfcf7" stroke="#c98a2b" stroke-width="1.2" stroke-dasharray="5 4"/></g>
  <text x="540" y="257" text-anchor="middle" font-size="11" fill="#999">–</text>
  <text x="590" y="257" text-anchor="middle" font-size="11" fill="#999">–</text>
  <text x="565" y="288" text-anchor="middle" font-size="9" fill="#6b4a14">物理块号 | 已填槽数</text>

  <!-- mapping arrows -->
  <path d="M 170 142 L 501 132" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 288 150 L 501 172" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 406 142 L 501 210" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- physical blocks on GPU DRAM -->
  <text x="460" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#57a773">物理 KV 块（GPU DRAM，非连续分布）</text>
  <g filter="url(#sk)"><rect x="60" y="348" width="800" height="110" rx="12" fill="#57a773" opacity="0.10" stroke="#57a773" stroke-width="1.6"/></g>
  <g filter="url(#sk)"><rect x="80" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="116" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 0</text>
  <text x="116" y="404" text-anchor="middle" font-size="9" fill="#777">其他请求</text>
  <g filter="url(#sk)"><rect x="168" y="365" width="72" height="60" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="204" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 1</text>
  <text x="204" y="404" text-anchor="middle" font-size="9" fill="#28455c">years ago our f…</text>
  <g filter="url(#sk)"><rect x="256" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="292" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 2</text>
  <text x="292" y="404" text-anchor="middle" font-size="9" fill="#777">空闲</text>
  <g filter="url(#sk)"><rect x="344" y="365" width="72" height="60" rx="6" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="380" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 3</text>
  <text x="380" y="404" text-anchor="middle" font-size="9" fill="#28455c">brought _ _ _</text>
  <g filter="url(#sk)"><rect x="432" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="468" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 4</text>
  <text x="468" y="404" text-anchor="middle" font-size="9" fill="#777">空闲</text>
  <g filter="url(#sk)"><rect x="520" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="556" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 5</text>
  <text x="556" y="404" text-anchor="middle" font-size="9" fill="#777">其他请求</text>
  <g filter="url(#sk)"><rect x="608" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="644" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 6</text>
  <text x="644" y="404" text-anchor="middle" font-size="9" fill="#777">空闲</text>
  <g filter="url(#sk)"><rect x="696" y="365" width="72" height="60" rx="6" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="732" y="388" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Block 7</text>
  <text x="732" y="404" text-anchor="middle" font-size="9" fill="#28455c">Four score and…</text>
  <g filter="url(#sk)"><rect x="784" y="365" width="72" height="60" rx="6" fill="#57a773" opacity="0.15" stroke="#57a773" stroke-width="1.2"/></g>
  <text x="820" y="388" text-anchor="middle" font-size="10" fill="#2f5238">Block 8</text>
  <text x="820" y="404" text-anchor="middle" font-size="9" fill="#777">空闲</text>

  <!-- mapping arrows down -->
  <path d="M 540 235 C 540 300 760 290 736 361" stroke="#c98a2b" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 540 189 C 560 260 240 280 206 361" stroke="#c98a2b" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 540 229 L 384 361" stroke="#c98a2b" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <text x="460" y="492" text-anchor="middle" font-size="11" fill="#4a463c">按需分配：只有最后一个逻辑块可能有空位 → 每个请求的浪费被限制在一个块以内（&lt; 4 token）</text>
</svg>
