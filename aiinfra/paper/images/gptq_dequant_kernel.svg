<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57a773"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b8514d"/>
    </marker>
  </defs>
  <rect width="920" height="500" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">反量化 GEMV Kernel：用带宽省出来的 3.25×~4.5×</text>
  <path d="M 190 46 Q 460 54 730 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">生成式推理（batch=1）是 GEMV、memory-bound：瓶颈是搬权重，不是算乘法</text>

  <!-- FP16 path -->
  <text x="210" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#b8514d">FP16 路径（基线）</text>
  <g filter="url(#sk)"><rect x="60" y="120" width="300" height="60" rx="8" fill="#b8514d" opacity="0.28" stroke="#b8514d" stroke-width="1.8"/></g>
  <text x="210" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">HBM：16 bit × d_row × d_col</text>
  <text x="210" y="165" text-anchor="middle" font-size="11" fill="#7a2e2b">OPT-175B：326 GB（需 5×A100）</text>
  <path d="M 210 185 L 210 235" stroke="#b8514d" stroke-width="2.5" fill="none" marker-end="url(#arR)" filter="url(#sk)"/>
  <text x="260" y="215" font-size="11" fill="#7a2e2b">搬 5.3× 的字节</text>
  <g filter="url(#sk)"><rect x="60" y="240" width="300" height="55" rx="8" fill="#8a8471" opacity="0.25" stroke="#8a8471" stroke-width="1.6"/></g>
  <text x="210" y="263" text-anchor="middle" font-size="11" fill="#2b2b2b">GEMV：W · x（FP16 × FP16）</text>
  <text x="210" y="282" text-anchor="middle" font-size="10" fill="#4a463c">A100: 230 ms/token（5 卡）</text>

  <!-- GPTQ path -->
  <text x="690" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#57a773">GPTQ 3-bit 路径</text>
  <g filter="url(#sk)"><rect x="540" y="120" width="300" height="60" rx="8" fill="#57a773" opacity="0.28" stroke="#57a773" stroke-width="1.8"/></g>
  <text x="690" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">HBM：3 bit 权重 + FP16 零点/scale</text>
  <text x="690" y="165" text-anchor="middle" font-size="11" fill="#2f5238">OPT-175B：63 GB（+9GB KV，单卡 A100）</text>
  <path d="M 690 185 L 690 215" stroke="#57a773" stroke-width="2.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="540" y="220" width="300" height="50" rx="8" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="690" y="241" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">片上动态反量化：w ≈ s·(q − z)</text>
  <text x="690" y="259" text-anchor="middle" font-size="10" fill="#6b4a14">额外 ALU 几乎免费（反正算力在等数据）</text>
  <path d="M 690 275 L 690 305" stroke="#57a773" stroke-width="2.5" fill="none" marker-end="url(#arG)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="540" y="310" width="300" height="55" rx="8" fill="#57a773" opacity="0.20" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="690" y="333" text-anchor="middle" font-size="11" fill="#2b2b2b">GEMV：dequant(W) · x（W4A16）</text>
  <text x="690" y="352" text-anchor="middle" font-size="10" fill="#2f5238">A100: 71 ms/token（1 卡）　A6000: 130 ms（2 卡）</text>

  <!-- speedup summary -->
  <g filter="url(#sk)"><rect x="180" y="400" width="560" height="75" rx="12" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="460" y="428" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">加速全部来自少搬字节，而不是算得更快</text>
  <text x="460" y="452" text-anchor="middle" font-size="11" fill="#4a463c">A100 3.24×｜A6000 4.53×（带宽越低收益越大）；GPU 数量 5→1 / 8→2；activation 保持 FP16</text>
  <text x="460" y="470" text-anchor="middle" font-size="10" fill="#777">注：大 batch / compute-bound 场景可先整体解压权重再 GEMM（175B FC2 解压 &lt;1.5ms，计算 76ms）</text>
</svg>
