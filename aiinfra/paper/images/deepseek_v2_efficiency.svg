<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="109" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="920" height="420" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">效率总账（Fig. 1b）：DeepSeek-V2 vs DeepSeek 67B</text>
  <path d="M 190 46 Q 460 54 730 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">性能更强的同时：训练省 42.5%，KV Cache 减 93.3%，最大生成吞吐 ×5.76</text>

  <!-- panel 1: training cost -->
  <text x="170" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">训练成本（K GPU 小时 / T tokens）</text>
  <g filter="url(#sk)"><rect x="70" y="130" width="200" height="46" rx="6" fill="#b8514d" opacity="0.35" stroke="#b8514d" stroke-width="1.6"/></g>
  <text x="170" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">67B Dense：300.6</text>
  <g filter="url(#sk)"><rect x="70" y="186" width="115" height="46" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="127" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f5238">V2：172.8</text>
  <text x="205" y="214" font-size="11" font-weight="bold" fill="#57a773">−42.5%</text>
  <text x="170" y="252" text-anchor="middle" font-size="10" fill="#4a463c">稀疏激活 21B ⇒ 每 token FLOPs 大降</text>

  <!-- panel 2: KV cache -->
  <text x="470" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">生成的 KV Cache（KB / token）</text>
  <g filter="url(#sk)"><rect x="380" y="130" width="200" height="46" rx="6" fill="#b8514d" opacity="0.35" stroke="#b8514d" stroke-width="1.6"/></g>
  <text x="480" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">67B（MHA）</text>
  <g filter="url(#sk)"><rect x="380" y="186" width="14" height="46" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="412" y="214" font-size="12" font-weight="bold" fill="#2f5238">V2（MLA）</text>
  <text x="480" y="214" font-size="11" font-weight="bold" fill="#57a773">−93.3%</text>
  <text x="470" y="252" text-anchor="middle" font-size="10" fill="#4a463c">MLA 低秩压缩 + 部署 6-bit KV 量化</text>

  <!-- panel 3: throughput -->
  <text x="740" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">最大生成吞吐（tokens/s）</text>
  <g filter="url(#sk)"><rect x="660" y="130" width="30" height="46" rx="6" fill="#b8514d" opacity="0.35" stroke="#b8514d" stroke-width="1.6"/></g>
  <text x="705" y="158" font-size="12" font-weight="bold" fill="#2b2b2b">67B</text>
  <g filter="url(#sk)"><rect x="660" y="186" width="170" height="46" rx="6" fill="#57a773" opacity="0.40" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="745" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f5238">V2：&gt;50K（8×H800）</text>
  <text x="845" y="158" font-size="11" font-weight="bold" fill="#57a773">×5.76</text>
  <text x="740" y="252" text-anchor="middle" font-size="10" fill="#4a463c">KV 小 ⇒ batch 大；输入吞吐 &gt;100K/s</text>

  <!-- bottom causal chain -->
  <g filter="url(#sk)"><rect x="110" y="290" width="700" height="100" rx="12" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="460" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">因果链</text>
  <text x="460" y="344" text-anchor="middle" font-size="11" fill="#4a463c">DeepSeekMoE（稀疏激活 21B/236B）→ 训练 FLOPs↓ 42.5%、推理计算↓</text>
  <text x="460" y="368" text-anchor="middle" font-size="11" fill="#4a463c">MLA（KV 压成 576 维隐向量）→ KV Cache↓ 93.3% ⇒ batch↑ ⇒ 吞吐 ×5.76</text>
</svg>
