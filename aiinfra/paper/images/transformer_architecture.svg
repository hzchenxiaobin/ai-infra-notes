<svg xmlns="http://www.w3.org/2000/svg" width="940" height="820" viewBox="0 0 940 820" font-family="'Comic Sans MS','Kaiti SC','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
  </defs>
  <rect width="940" height="820" fill="#fdfcf7"/>
  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 整体架构（论文 Figure 1）</text>
  <path d="M 250 42 Q 470 50 690 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="60" text-anchor="middle" font-size="11" fill="#666">数据流自下而上；残差 = LayerNorm(x + Sublayer(x))，d_model = 512</text>

  <!-- ===== 左上：关键观察注解（利用原 Encoder 标签留白的空位） ===== -->
  <g filter="url(#sk)"><rect x="70" y="84" width="260" height="124" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="200" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#5c4a28">关键观察：瓶颈接口</text>
  <text x="200" y="132" text-anchor="middle" font-size="11" fill="#5c4a28">Encoder ↔ Decoder 唯一耦合</text>
  <text x="200" y="150" text-anchor="middle" font-size="11" fill="#5c4a28">通道 = Cross-Attention 的 K / V</text>
  <text x="200" y="176" text-anchor="middle" font-size="11" fill="#5c4a28">encoder-only（BERT）：裁掉右半</text>
  <text x="200" y="194" text-anchor="middle" font-size="11" fill="#5c4a28">decoder-only（GPT）：裁掉左半</text>

  <!-- ===== Decoder 顶部：Linear → Softmax → Output Probabilities（数据流向上） ===== -->
  <text x="740" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Output Probabilities</text>
  <!-- arrow Softmax → Output Probabilities (UP) -->
  <path d="M 740 106 L 740 90" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="660" y="106" width="160" height="36" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="740" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Softmax</text>
  <!-- arrow Linear → Softmax (UP) -->
  <path d="M 740 158 L 740 142" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="660" y="158" width="160" height="36" rx="8" fill="#c98a2b" opacity="0.22" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="740" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Linear</text>
  <!-- arrow Decoder top → Linear (UP) -->
  <path d="M 740 220 L 740 196" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Encoder ×6 box (left) ===== -->
  <text x="200" y="332" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Encoder</text>
  <g filter="url(#sk)">
    <rect x="70" y="340" width="260" height="300" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="338" y="336" font-size="13" font-weight="bold" fill="#3a3a3a">×6</text>

  <!-- Encoder sublayers (bottom-up): MHA → AddNorm → FFN → AddNorm -->
  <!-- MHA -->
  <g filter="url(#sk)"><rect x="110" y="575" width="180" height="45" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="200" y="597" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="200" y="612" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention：Q=K=V</text>
  <!-- MHA → AddNorm arrow (UP) -->
  <path d="M 200 575 L 200 560" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- residual: MHA → AddNorm -->
  <path d="M 110 608 C 76 608 76 539 105 539" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (after MHA) -->
  <g filter="url(#sk)"><rect x="110" y="520" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="200" y="544" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <!-- AddNorm → FFN arrow (UP) -->
  <path d="M 200 520 L 200 504" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- FFN -->
  <g filter="url(#sk)"><rect x="110" y="455" width="180" height="45" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="200" y="477" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <text x="200" y="492" text-anchor="middle" font-size="10" fill="#5c4a28">d_model 512 → d_ff 2048 → 512</text>
  <!-- FFN → AddNorm arrow (UP) -->
  <path d="M 200 455 L 200 440" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <!-- residual: FFN → AddNorm -->
  <path d="M 110 488 C 76 488 76 419 105 419" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (after FFN) -->
  <g filter="url(#sk)"><rect x="110" y="400" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="200" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>

  <!-- z exits encoder top → routes to decoder cross-attn -->
  <path d="M 200 400 L 200 305 L 475 305 L 475 480 L 645 480" stroke="#4a8edb" stroke-width="2" fill="none" marker-end="url(#arB)" filter="url(#sk)"/>
  <text x="215" y="325" font-size="12" font-weight="bold" fill="#4a8edb">z（源表示）</text>
  <text x="345" y="297" text-anchor="middle" font-size="11" fill="#4a8edb">Encoder 输出作为 Cross-Attention 的 K / V</text>

  <!-- ===== Decoder ×6 box (right) ===== -->
  <text x="740" y="213" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">Decoder</text>
  <g filter="url(#sk)">
    <rect x="610" y="220" width="260" height="420" rx="10" fill="none" stroke="#3a3a3a" stroke-width="1.6" stroke-dasharray="7 4"/>
  </g>
  <text x="878" y="216" font-size="13" font-weight="bold" fill="#3a3a3a">×6</text>

  <!-- Decoder sublayers (bottom-up): MaskedMHA → AddNorm → CrossAttn → AddNorm → FFN → AddNorm -->
  <!-- Masked MHA -->
  <g filter="url(#sk)"><rect x="650" y="575" width="180" height="42" rx="8" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="740" y="596" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Masked Multi-Head Attn</text>
  <text x="740" y="610" text-anchor="middle" font-size="10" fill="#28455c">Self-Attention + 因果掩码</text>
  <path d="M 740 575 L 740 560" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 602 C 618 602 618 538 645 538" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm -->
  <g filter="url(#sk)"><rect x="650" y="520" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="544" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 520 L 740 504" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Cross-Attention -->
  <g filter="url(#sk)"><rect x="650" y="460" width="180" height="42" rx="8" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.8"/></g>
  <text x="740" y="481" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Multi-Head Attention</text>
  <text x="740" y="495" text-anchor="middle" font-size="10" fill="#28455c">Cross：Q←Decoder，K/V←Encoder</text>
  <path d="M 740 460 L 740 444" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 485 C 618 485 618 423 645 423" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm -->
  <g filter="url(#sk)"><rect x="650" y="405" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="429" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 405 L 740 394" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- FFN -->
  <g filter="url(#sk)"><rect x="650" y="350" width="180" height="42" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="740" y="371" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Feed Forward</text>
  <text x="740" y="385" text-anchor="middle" font-size="10" fill="#5c4a28">512 → 2048 → 512</text>
  <path d="M 740 350 L 740 334" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 650 372 C 618 372 618 313 645 313" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Add & Norm (top) -->
  <g filter="url(#sk)"><rect x="650" y="295" width="180" height="38" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.6"/></g>
  <text x="740" y="319" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Add &amp; Norm</text>
  <path d="M 740 295 L 740 224" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Embedding + PE (bottom, both sides) ===== -->
  <!-- Encoder bottom -->
  <path d="M 200 640 L 200 664" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="110" y="666" width="180" height="38" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="5 3"/></g>
  <text x="200" y="690" text-anchor="middle" font-size="11" fill="#2b2b2b">⊕ Positional Encoding（sin/cos）</text>
  <path d="M 200 704 L 200 723" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="110" y="725" width="180" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="200" y="743" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Input Embedding</text>
  <text x="200" y="758" text-anchor="middle" font-size="10" fill="#555">× √d_model</text>
  <path d="M 200 765 L 200 782" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="200" y="800" text-anchor="middle" font-size="13" fill="#2b2b2b">Inputs（源序列）</text>

  <!-- Decoder bottom -->
  <path d="M 740 640 L 740 664" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="650" y="666" width="180" height="38" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="5 3"/></g>
  <text x="740" y="690" text-anchor="middle" font-size="11" fill="#2b2b2b">⊕ Positional Encoding（sin/cos）</text>
  <path d="M 740 704 L 740 723" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="650" y="725" width="180" height="40" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="740" y="743" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Output Embedding</text>
  <text x="740" y="758" text-anchor="middle" font-size="10" fill="#555">× √d_model</text>
  <path d="M 740 765 L 740 782" stroke="#3a3a3a" stroke-width="1.6" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="740" y="800" text-anchor="middle" font-size="13" fill="#2b2b2b">Outputs（右移一位）</text>
</svg>
