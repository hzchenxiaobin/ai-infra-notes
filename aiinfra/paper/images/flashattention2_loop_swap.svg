<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="101" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="540" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FA1 vs FA2：循环顺序对调 + 并行维度扩展</text>
  <path d="M 210 44 Q 450 52 690 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== FA1 ===== -->
  <text x="225" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0504d">FA1：外循环 KV，内循环 Q</text>
  <!-- attention matrix -->
  <g filter="url(#sk)"><rect x="95" y="100" width="260" height="220" rx="8" fill="none" stroke="#8a8471" stroke-width="1.6"/></g>
  <!-- column highlight (KV block) -->
  <g filter="url(#sk)"><rect x="165" y="108" width="52" height="204" rx="4" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="191" y="340" text-anchor="middle" font-size="11" fill="#c98a2b">外层：K_j, V_j 列块驻留</text>
  <!-- row blocks iterated -->
  <g filter="url(#sk)"><rect x="103" y="160" width="244" height="34" rx="4" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.3"/></g>
  <text x="225" y="182" text-anchor="middle" font-size="10" fill="#28455c">内层逐个扫 Q_i 行块</text>
  <!-- O rewritten -->
  <g filter="url(#sk)"><rect x="95" y="380" width="260" height="60" rx="8" fill="#c0504d" opacity="0.20" stroke="#c0504d" stroke-width="1.5" stroke-dasharray="5 3"/></g>
  <text x="225" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0504d">O_i 每个 KV 块都要读写一次 HBM</text>
  <text x="225" y="425" text-anchor="middle" font-size="11" fill="#c0504d">并行度 = batch × heads（长序列时不够用）</text>

  <!-- ===== FA2 ===== -->
  <text x="675" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7d5b">FA2：外循环 Q，内循环 KV</text>
  <g filter="url(#sk)"><rect x="545" y="100" width="260" height="220" rx="8" fill="none" stroke="#8a8471" stroke-width="1.6"/></g>
  <!-- row highlight -->
  <g filter="url(#sk)"><rect x="553" y="160" width="244" height="40" rx="4" fill="#4a8edb" opacity="0.40" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="675" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#28455c">外层：Q_i 行块驻留 SRAM</text>
  <!-- column blocks iterated -->
  <g filter="url(#sk)"><rect x="615" y="108" width="52" height="204" rx="4" fill="#c98a2b" opacity="0.25" stroke="#c98a2b" stroke-width="1.3" stroke-dasharray="4 3"/></g>
  <text x="675" y="340" text-anchor="middle" font-size="11" fill="#c98a2b">内层逐个扫 K_j, V_j 列块</text>
  <g filter="url(#sk)"><rect x="545" y="380" width="260" height="60" rx="8" fill="#57a773" opacity="0.22" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="675" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f5238">O_i 全程留在片上，只写回一次</text>
  <text x="675" y="425" text-anchor="middle" font-size="11" fill="#2f5238">并行度 = batch × heads × Q 块（占满 108 个 SM）</text>

  <!-- divider & note -->
  <line x1="450" y1="70" x2="450" y2="455" stroke="#8a8471" stroke-width="1" stroke-dasharray="4 4"/>
  <g filter="url(#sk)"><rect x="180" y="465" width="540" height="56" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#555">对调由 Phil Tillet 的 Triton 实现首先提出（论文致谢注明）</text>
  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#555">backward 则按列块分配 thread block，dQ 用 atomic add 通信</text>
</svg>
