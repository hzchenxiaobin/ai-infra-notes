<svg xmlns="http://www.w3.org/2000/svg" width="920" height="480" viewBox="0 0 920 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="61" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#b8514d"/>
    </marker>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a8edb"/>
    </marker>
  </defs>
  <rect width="920" height="480" fill="#fdfcf7"/>
  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">OBQ 误差补偿：量化一个权重，其余权重买单</text>
  <path d="M 210 46 Q 460 54 710 46" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="460" y="62" text-anchor="middle" font-size="12" fill="#555">目标：min‖WX − ŴX‖²　→　舍入误差按 Hessian 逆的列分摊给未量化权重，保持层输出几乎不变</text>

  <!-- grid and weight -->
  <text x="230" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">① 把 w_q 舍入到最近的量化格点</text>
  <!-- quant grid lines -->
  <g filter="url(#sk)"><line x1="80" y1="140" x2="380" y2="140" stroke="#8a8471" stroke-width="1.4"/></g>
  <g filter="url(#sk)"><line x1="80" y1="180" x2="380" y2="180" stroke="#8a8471" stroke-width="1.4"/></g>
  <g filter="url(#sk)"><line x1="80" y1="220" x2="380" y2="220" stroke="#8a8471" stroke-width="1.4"/></g>
  <g filter="url(#sk)"><line x1="80" y1="260" x2="380" y2="260" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="60" y="145" font-size="10" fill="#777">q₃</text>
  <text x="60" y="185" font-size="10" fill="#777">q₂</text>
  <text x="60" y="225" font-size="10" fill="#777">q₁</text>
  <text x="60" y="265" font-size="10" fill="#777">q₀</text>
  <!-- w_q point -->
  <circle cx="230" cy="196" r="6" fill="#4a8edb" stroke="#2b2b2b" stroke-width="1.5" filter="url(#sk)"/>
  <text x="230" y="126" text-anchor="middle" font-size="11" fill="#28455c">w_q（原始值）</text>
  <path d="M 230 200 L 230 216" stroke="#b8514d" stroke-width="2" fill="none" marker-end="url(#arR)" filter="url(#sk)"/>
  <circle cx="230" cy="220" r="5" fill="#b8514d" opacity="0.8" filter="url(#sk)"/>
  <text x="250" y="224" font-size="11" fill="#b8514d">quant(w_q)</text>
  <path d="M 300 196 L 300 218" stroke="#b8514d" stroke-width="1.6" fill="none" filter="url(#sk)"/>
  <text x="330" y="210" font-size="11" fill="#7a2e2b">误差 e = w_q − quant(w_q)</text>

  <!-- compensation -->
  <text x="690" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">② 未量化权重按 H⁻¹ 的列分摊误差</text>
  <!-- remaining weights bars -->
  <g filter="url(#sk)"><rect x="520" y="150" width="34" height="110" rx="4" fill="#4a8edb" opacity="0.45" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="570" y="170" width="34" height="90" rx="4" fill="#4a8edb" opacity="0.35" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="620" y="185" width="34" height="75" rx="4" fill="#4a8edb" opacity="0.28" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="670" y="200" width="34" height="60" rx="4" fill="#4a8edb" opacity="0.22" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="720" y="215" width="34" height="45" rx="4" fill="#4a8edb" opacity="0.18" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="770" y="225" width="34" height="35" rx="4" fill="#4a8edb" opacity="0.15" stroke="#4a8edb" stroke-width="1.5"/></g>
  <g filter="url(#sk)"><rect x="820" y="232" width="34" height="28" rx="4" fill="#4a8edb" opacity="0.12" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="690" y="285" text-anchor="middle" font-size="10" fill="#28455c">补偿幅度 ∝ [H⁻¹]_,:q（与 w_q 的“相关性”）</text>

  <!-- formula box -->
  <g filter="url(#sk)"><rect x="140" y="315" width="640" height="140" rx="12" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="460" y="344" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">δ_F = − e / [H⁻¹]_qq · [H⁻¹]_,:q</text>
  <text x="460" y="374" text-anchor="middle" font-size="11" fill="#4a463c">H = 2X_F X_Fᵀ 是层输出平方误差关于权重的 Hessian：只含输入 X，不含权重</text>
  <text x="460" y="398" text-anchor="middle" font-size="11" fill="#4a463c">直觉：与 w_q 输入相关性强的权重多承担一点，把舍入造成的输出偏移抵消掉</text>
  <text x="460" y="422" text-anchor="middle" font-size="11" fill="#4a463c">RTN 没有这一步 ⇒ 误差逐层累积；补偿是 GPTQ 在 3-4 bit 不崩的根本原因</text>
  <path d="M 385 200 L 510 205" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
</svg>
