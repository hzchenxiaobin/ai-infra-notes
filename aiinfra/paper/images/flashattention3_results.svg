<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="173" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="900" height="460" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FA3 在 H100 上的吞吐（TFLOPs/s，forward，越高越好）</text>
  <path d="M 160 44 Q 450 52 740 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#777">FP16 理论峰值 989　｜　FP8 理论峰值 ≈ 1978（2×）</text>

  <!-- axis: FP16 peak 989 -> x = 180 + v/1978*680 -->
  <line x1="180" y1="80" x2="180" y2="390" stroke="#8a8471" stroke-width="1.2"/>
  <line x1="180" y1="390" x2="870" y2="390" stroke="#8a8471" stroke-width="1.2"/>
  <text x="180" y="410" text-anchor="middle" font-size="11" fill="#777">0</text>
  <text x="352" y="410" text-anchor="middle" font-size="11" fill="#777">500</text>
  <text x="524" y="410" text-anchor="middle" font-size="11" fill="#777">1000</text>
  <text x="695" y="410" text-anchor="middle" font-size="11" fill="#777">1500</text>
  <text x="867" y="410" text-anchor="middle" font-size="11" fill="#777">2000</text>
  <line x1="352" y1="80" x2="352" y2="390" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="524" y1="80" x2="524" y2="390" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <line x1="695" y1="80" x2="695" y2="390" stroke="#8a8471" stroke-width="0.6" stroke-dasharray="2 5"/>
  <!-- FP16 peak line at 989 -->
  <line x1="520" y1="80" x2="520" y2="390" stroke="#c0504d" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="520" y="74" text-anchor="middle" font-size="10" fill="#c0504d">FP16 峰值 989</text>

  <!-- FA2 350 (35%) -->
  <text x="170" y="115" text-anchor="end" font-size="11" fill="#2b2b2b">FlashAttention-2（FP16）</text>
  <g filter="url(#sk)"><rect x="180" y="99" width="120" height="28" rx="6" fill="#8a8471" opacity="0.45" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="308" y="118" font-size="11" font-weight="bold" fill="#555">~350（35%）</text>

  <!-- FA3 no ws 570 -->
  <text x="170" y="165" text-anchor="end" font-size="11" fill="#2b2b2b">FA3 仅 GEMM-softmax 流水</text>
  <g filter="url(#sk)"><rect x="180" y="149" width="196" height="28" rx="6" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="384" y="168" font-size="11" font-weight="bold" fill="#28455c">570</text>

  <!-- FA3 +pingpong 640 -->
  <text x="170" y="215" text-anchor="end" font-size="11" fill="#2b2b2b">+ pingpong 调度</text>
  <g filter="url(#sk)"><rect x="180" y="199" width="220" height="28" rx="6" fill="#4a8edb" opacity="0.38" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="408" y="218" font-size="11" font-weight="bold" fill="#28455c">620–640</text>

  <!-- FA3 full 661/740 -->
  <text x="170" y="265" text-anchor="end" font-size="11" fill="#2b2b2b">FA3 完整（消融 661 / 峰值 740）</text>
  <g filter="url(#sk)"><rect x="180" y="249" width="254" height="28" rx="6" fill="#4a8edb" opacity="0.50" stroke="#4a8edb" stroke-width="1.6"/></g>
  <text x="442" y="268" font-size="11" font-weight="bold" fill="#28455c">740（75%，hd256）</text>

  <!-- FP8 1171 -->
  <text x="170" y="315" text-anchor="end" font-size="11" fill="#2b2b2b">FA3 FP8（causal，hd256）</text>
  <g filter="url(#sk)"><rect x="180" y="299" width="402" height="28" rx="6" fill="#c98a2b" opacity="0.50" stroke="#c98a2b" stroke-width="1.6"/></g>
  <text x="590" y="318" font-size="11" font-weight="bold" fill="#5c4a28">1171 ≈ 1.2 PFLOPs/s</text>

  <!-- note -->
  <g filter="url(#sk)"><rect x="180" y="345" width="560" height="36" rx="8" fill="none" stroke="#8a8471" stroke-width="1.4" stroke-dasharray="6 4"/></g>
  <text x="460" y="368" text-anchor="middle" font-size="11" fill="#555">vs FA2：FP16 1.5–2.0×，backward 1.5–1.75×；中长序列 FP16 超 cuDNN</text>
</svg>
