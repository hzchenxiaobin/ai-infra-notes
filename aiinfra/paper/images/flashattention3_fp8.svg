<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="163" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FP8 的两座大山：布局冲突与量化误差</text>
  <path d="M 220 44 Q 450 52 680 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Left: layout ===== -->
  <text x="225" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a8edb">① 布局（Layout）问题</text>
  <g filter="url(#sk)"><rect x="50" y="90" width="350" height="150" rx="10" fill="#4a8edb" opacity="0.12" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="225" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">约束：FP8 WGMMA 只收 k-major 操作数</text>
  <text x="225" y="140" text-anchor="middle" font-size="10" fill="#28455c">V 在 GMEM 按 head dim 连续 → 需转成按序列维连续</text>
  <text x="225" y="162" text-anchor="middle" font-size="10" fill="#28455c">且第一个 GEMM 的 FP32 累加器寄存器布局</text>
  <text x="225" y="180" text-anchor="middle" font-size="10" fill="#28455c">≠ 第二个 GEMM 的 FP8 操作数 A 布局</text>
  <text x="225" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">解法（全部在 kernel 内完成）：</text>
  <text x="225" y="230" text-anchor="middle" font-size="10" fill="#28455c">LDSM/STSM 指令做 V tile 的片上转置（藏在 WGMMA 影子下）</text>

  <g filter="url(#sk)"><rect x="80" y="255" width="290" height="60" rx="8" fill="#4a8edb" opacity="0.25" stroke="#4a8edb" stroke-width="1.5"/></g>
  <text x="225" y="280" text-anchor="middle" font-size="10" fill="#2b2b2b">byte permute 重排累加器：</text>
  <text x="225" y="298" text-anchor="middle" font-size="10" fill="#2b2b2b">{d0 d1 d4 d5 d2 d3 d6 d7}（配合 V 的行置换）</text>

  <!-- ===== Right: accuracy ===== -->
  <text x="675" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#c98a2b">② 精度（Accuracy）问题</text>
  <g filter="url(#sk)"><rect x="500" y="90" width="350" height="150" rx="10" fill="#c98a2b" opacity="0.15" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="675" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">FP8 e4m3：4 位指数 + 3 位尾数</text>
  <text x="675" y="140" text-anchor="middle" font-size="10" fill="#5c4a28">LLM 的 outlier 值让 per-tensor 量化误差爆炸</text>
  <text x="675" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">解法 1：block quantization</text>
  <text x="675" y="190" text-anchor="middle" font-size="10" fill="#5c4a28">每块（Br×d / Bc×d）独立缩放因子，可融入 RoPE</text>
  <text x="675" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b2b2b">解法 2：incoherent processing</text>
  <text x="675" y="230" text-anchor="middle" font-size="10" fill="#5c4a28">Q、K 乘随机正交矩阵 M（±1 对角 × Hadamard）</text>

  <g filter="url(#sk)"><rect x="530" y="255" width="290" height="60" rx="8" fill="#c98a2b" opacity="0.30" stroke="#c98a2b" stroke-width="1.5"/></g>
  <text x="675" y="280" text-anchor="middle" font-size="10" fill="#2b2b2b">(QM)(KM)ᵀ = QKᵀ（数学上零代价）</text>
  <text x="675" y="298" text-anchor="middle" font-size="10" fill="#2b2b2b">outlier 被"摊平"→ 量化误差 2.6× 下降</text>

  <!-- bottom: pipeline of FP8 flow -->
  <text x="450" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">FP8 forward 数据流</text>
  <g filter="url(#sk)"><rect x="60" y="368" width="130" height="46" rx="8" fill="#e6e1d3" stroke="#8a8471" stroke-width="1.4"/></g>
  <text x="125" y="396" text-anchor="middle" font-size="10" fill="#2b2b2b">Q,K 乘 M + 分块量化</text>
  <path d="M 190 391 L 220 391" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="225" y="368" width="130" height="46" rx="8" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="290" y="389" text-anchor="middle" font-size="10" fill="#2b2b2b">WGMMA1：QKᵀ</text>
  <text x="290" y="405" text-anchor="middle" font-size="9" fill="#28455c">FP8 输入，FP32 累加</text>
  <path d="M 355 391 L 385 391" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="390" y="368" width="130" height="46" rx="8" fill="#57a773" opacity="0.30" stroke="#57a773" stroke-width="1.4"/></g>
  <text x="455" y="389" text-anchor="middle" font-size="10" fill="#2b2b2b">softmax（FP32）</text>
  <text x="455" y="405" text-anchor="middle" font-size="9" fill="#2f5238">+ byte permute 换布局</text>
  <path d="M 520 391 L 550 391" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="555" y="368" width="130" height="46" rx="8" fill="#4a8edb" opacity="0.30" stroke="#4a8edb" stroke-width="1.4"/></g>
  <text x="620" y="389" text-anchor="middle" font-size="10" fill="#2b2b2b">WGMMA2：PV</text>
  <text x="620" y="405" text-anchor="middle" font-size="9" fill="#28455c">V 已片上转置</text>
  <path d="M 685 391 L 715 391" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <g filter="url(#sk)"><rect x="720" y="368" width="120" height="46" rx="8" fill="#c98a2b" opacity="0.35" stroke="#c98a2b" stroke-width="1.4"/></g>
  <text x="780" y="389" text-anchor="middle" font-size="10" fill="#2b2b2b">输出 O</text>
  <text x="780" y="405" text-anchor="middle" font-size="9" fill="#5c4a28">~1.2 PFLOPs/s</text>

  <!-- footer -->
  <g filter="url(#sk)"><rect x="150" y="445" width="600" height="56" rx="10" fill="none" stroke="#8a8471" stroke-width="1.5" stroke-dasharray="7 4"/></g>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#555">FP8 Tensor Core 吞吐是 FP16 的 2×，但只有把布局转换全部藏进异步流水</text>
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#555">（LDSM/STSM 转置 + permute 不占关键路径），这 2× 才拿得到手</text>
</svg>
