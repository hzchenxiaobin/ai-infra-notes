<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="131" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">减少 non-matmul FLOPs：推迟归一化 + logsumexp</text>
  <path d="M 180 44 Q 450 52 720 44" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#555">A100：FP16 matmul 312 TFLOPs/s vs FP32 non-matmul 19.5 TFLOPs/s —— 1 个 non-matmul FLOP 顶 16 个 matmul FLOP</text>

  <!-- FA1 loop -->
  <text x="225" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0504d">FA1：每步都归一化</text>
  <g filter="url(#sk)"><rect x="60" y="110" width="330" height="180" rx="10" fill="#c0504d" opacity="0.12" stroke="#c0504d" stroke-width="1.5"/></g>
  <text x="225" y="140" text-anchor="middle" font-size="11" fill="#2b2b2b">for j in KV 块:</text>
  <text x="225" y="166" text-anchor="middle" font-size="11" fill="#c0504d">O ← diag(ℓ_new)⁻¹ · (… + P̃·V_j)</text>
  <text x="225" y="192" text-anchor="middle" font-size="11" fill="#c0504d">每个 tile 都做 Br×d 次除法/rescale</text>
  <text x="225" y="224" text-anchor="middle" font-size="11" fill="#2b2b2b">backward 要存 m 和 ℓ 两份统计量</text>
  <text x="225" y="256" text-anchor="middle" font-size="10" fill="#c0504d">Tc 个块 → Tc 次归一化（non-matmul）</text>

  <!-- FA2 loop -->
  <text x="675" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f7d5b">FA2：循环内不除 ℓ，最后只除一次</text>
  <g filter="url(#sk)"><rect x="510" y="110" width="330" height="180" rx="10" fill="#57a773" opacity="0.14" stroke="#57a773" stroke-width="1.5"/></g>
  <text x="675" y="140" text-anchor="middle" font-size="11" fill="#2b2b2b">for j in KV 块:</text>
  <text x="675" y="166" text-anchor="middle" font-size="11" fill="#2f5238">Õ ← e^(m−m_new)·Õ + P̃·V_j（未归一化）</text>
  <text x="675" y="192" text-anchor="middle" font-size="11" fill="#2f5238">循环内只剩一次 e^(m−m_new) 缩放</text>
  <text x="675" y="224" text-anchor="middle" font-size="11" fill="#2b2b2b">循环结束后：O = Õ / ℓ（只做一次）</text>
  <text x="675" y="256" text-anchor="middle" font-size="10" fill="#2f5238">backward 只存 L = m + log ℓ（logsumexp）</text>

  <!-- divider -->
  <line x1="450" y1="85" x2="450" y2="300" stroke="#8a8471" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- bottom: causal skip -->
  <g filter="url(#sk)"><rect x="130" y="330" width="640" height="110" rx="10" fill="none" stroke="#c98a2b" stroke-width="1.6" stroke-dasharray="7 4"/></g>
  <text x="450" y="358" text-anchor="middle" font-size="13" font-weight="bold" fill="#5c4a28">顺手优化：causal mask 的块级跳过</text>
  <text x="450" y="384" text-anchor="middle" font-size="11" fill="#555">① 对角线以右的整块 KV 直接跳过（不载入、不计算）→ 比无 mask 快 1.7–1.8×</text>
  <text x="450" y="406" text-anchor="middle" font-size="11" fill="#555">② 完全在对角线左侧的块不做任何 mask 判断 → 每行只有 1 个块需要逐元素掩码</text>
  <text x="450" y="428" text-anchor="middle" font-size="11" fill="#555">分块结构让"因果"从逐元素判断变成块级控制流</text>
</svg>
