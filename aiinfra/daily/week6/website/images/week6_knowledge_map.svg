<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="52" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Week 6 知识地图：从凑批到并发服务</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- timeline chain -->
  <!-- Day1 -->
  <g filter="url(#sk)">
    <rect x="40" y="66" width="200" height="66" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="140" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Day 1: Dynamic Batching</text>
  <text x="140" y="106" text-anchor="middle" font-size="10" fill="#555">请求聚合·padding·timeout</text>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#888">request-level 凑批</text>

  <path d="M 240 99 L 270 99" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day2 -->
  <g filter="url(#sk)">
    <rect x="272" y="66" width="200" height="66" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="372" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Day 2: Continuous Batching</text>
  <text x="372" y="106" text-anchor="middle" font-size="10" fill="#555">iteration-level·动态加入退出</text>
  <text x="372" y="122" text-anchor="middle" font-size="9" fill="#888">每轮重建 batch</text>

  <path d="M 472 99 L 502 99" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day3 -->
  <g filter="url(#sk)">
    <rect x="504" y="66" width="200" height="66" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="604" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Day 3: vLLM Scheduler</text>
  <text x="604" y="106" text-anchor="middle" font-size="10" fill="#555">schedule()·Budget·Preemption</text>
  <text x="604" y="122" text-anchor="middle" font-size="9" fill="#888">5 步调度+抢占</text>

  <path d="M 704 99 L 734 99" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day4 -->
  <g filter="url(#sk)">
    <rect x="736" y="66" width="180" height="66" rx="10" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.5"/>
  </g>
  <text x="826" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#5a2e7e">Day 4: 框架对比</text>
  <text x="826" y="106" text-anchor="middle" font-size="10" fill="#555">TRT-LLM·Chunked Prefill</text>
  <text x="826" y="122" text-anchor="middle" font-size="9" fill="#888">Inflight=Continuous</text>

  <!-- second row -->
  <path d="M 826 132 L 826 160 L 140 160 L 140 180" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day5 -->
  <g filter="url(#sk)">
    <rect x="40" y="182" width="200" height="66" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.5"/>
  </g>
  <text x="140" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">Day 5: Mini 引擎 v1</text>
  <text x="140" y="222" text-anchor="middle" font-size="10" fill="#555">多请求·Scheduler·Future</text>
  <text x="140" y="238" text-anchor="middle" font-size="9" fill="#888">submit() 异步并发</text>

  <path d="M 240 215 L 270 215" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day6 -->
  <g filter="url(#sk)">
    <rect x="272" y="182" width="200" height="66" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="372" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Day 6: Benchmark</text>
  <text x="372" y="222" text-anchor="middle" font-size="10" fill="#555">throughput-latency·饱和点</text>
  <text x="372" y="238" text-anchor="middle" font-size="9" fill="#888">P99·瓶颈分析</text>

  <path d="M 472 215 L 502 215" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Day7 -->
  <g filter="url(#sk)">
    <rect x="504" y="182" width="200" height="66" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.8"/>
  </g>
  <text x="604" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Day 7: 策略总结</text>
  <text x="604" y="222" text-anchor="middle" font-size="10" fill="#555">决策树·面试复盘</text>
  <text x="604" y="238" text-anchor="middle" font-size="9" fill="#888">收官</text>

  <!-- key progression -->
  <g filter="url(#sk)">
    <rect x="40" y="276" width="860" height="160" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="300" font-size="13" font-weight="bold" fill="#444">主线演进：从单请求串行到多请求高吞吐服务</text>

  <text x="60" y="324" font-size="11" fill="#2b6e9e" font-weight="bold">阶段 1（Day1-2）：凑批 → 每轮重建</text>
  <text x="320" y="324" font-size="10" fill="#555">Dynamic(request级) 升级为 Continuous(iteration级)</text>

  <text x="60" y="346" font-size="11" fill="#7a5415" font-weight="bold">阶段 2（Day3-4）：读源码 → 框架对比</text>
  <text x="320" y="346" font-size="10" fill="#555">vLLM Scheduler 5步+抢占；TRT-LLM C++调度+Chunked Prefill</text>

  <text x="60" y="368" font-size="11" fill="#7a2828" font-weight="bold">阶段 3（Day5-6）：造引擎 → 测性能</text>
  <text x="320" y="368" font-size="10" fill="#555">Mini引擎v1 多请求并发；benchmark 找饱和点+瓶颈</text>

  <text x="60" y="390" font-size="11" fill="#2e6e2e" font-weight="bold">阶段 4（Day7）：策略总结</text>
  <text x="320" y="390" font-size="10" fill="#555">7种策略对比 + 决策树 + 15道面试题复盘</text>

  <text x="60" y="420" font-size="11" fill="#b85450" font-weight="bold">核心洞察：</text>
  <text x="160" y="420" font-size="10" fill="#555">LLM 推理调度 = iteration 级动态平衡 prefill/decode·吞吐/延迟·优先级/公平</text>
</svg>
