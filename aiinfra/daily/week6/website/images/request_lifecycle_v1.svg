<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="380" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">请求生命周期：WAITING → RUNNING → FINISHED</text>
  <path d="M 290 40 Q 460 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- WAITING -->
  <g filter="url(#sk)">
    <rect x="60" y="90" width="200" height="80" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="160" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">WAITING</text>
  <text x="160" y="134" text-anchor="middle" font-size="10" fill="#555">submit() 入队</text>
  <text x="160" y="150" text-anchor="middle" font-size="10" fill="#555">等待 token budget</text>
  <text x="160" y="164" text-anchor="middle" font-size="10" fill="#555">priority 决定顺序</text>

  <path d="M 260 130 L 320 130" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="290" y="124" text-anchor="middle" font-size="9" fill="#2e6e2e">schedule 选中</text>

  <!-- RUNNING prefill -->
  <g filter="url(#sk)">
    <rect x="322" y="90" width="240" height="80" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="442" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">RUNNING</text>
  <g filter="url(#sk)">
    <rect x="332" y="124" width="100" height="34" rx="6" fill="#fff" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="382" y="146" text-anchor="middle" font-size="10" fill="#2e6e2e">Prefill（prompt）</text>
  <g filter="url(#sk)">
    <rect x="442" y="124" width="110" height="34" rx="6" fill="#fff" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="497" y="146" text-anchor="middle" font-size="10" fill="#2e6e2e">Decode（1 token）</text>
  <text x="442" y="166" text-anchor="middle" font-size="9" fill="#888">KV Cache 复用，每轮 decode 1 步</text>

  <path d="M 562 130 L 622 130" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="592" y="124" text-anchor="middle" font-size="9" fill="#b85450">gen 满 max_new_tokens</text>

  <!-- FINISHED -->
  <g filter="url(#sk)">
    <rect x="624" y="90" width="220" height="80" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="734" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a2828">FINISHED</text>
  <text x="734" y="134" text-anchor="middle" font-size="10" fill="#555">从 running 移除</text>
  <text x="734" y="150" text-anchor="middle" font-size="10" fill="#555">future.set_result()</text>
  <text x="734" y="164" text-anchor="middle" font-size="10" fill="#555">释放 KV Cache</text>

  <!-- key fields -->
  <g filter="url(#sk)">
    <rect x="60" y="200" width="800" height="150" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="224" font-size="12" font-weight="bold" fill="#444">Request 关键字段（v1 新增 vs v0）</text>

  <text x="80" y="248" font-size="11" fill="#2b6e9e" font-weight="bold">异步与并发：</text>
  <text x="100" y="266" font-size="10" fill="#444">• future: Future —— submit() 立即返回，完成时 set_result()（v0 无）</text>
  <text x="100" y="282" font-size="10" fill="#444">• status: waiting/running/finished —— 生命周期状态机（v0 无）</text>
  <text x="100" y="298" font-size="10" fill="#444">• priority: int —— 优先级，Scheduler 按此排序（v0 无）</text>

  <text x="80" y="322" font-size="11" fill="#7a5415" font-weight="bold">KV Cache 管理：</text>
  <text x="100" y="340" font-size="10" fill="#444">• kv_cache: per-layer (k,v) —— 每请求独立维护，prefill 建立后 decode 复用（v0 也有，但 v1 多请求各自一份）</text>
</svg>
