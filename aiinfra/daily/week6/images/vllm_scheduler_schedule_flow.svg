<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">vLLM Scheduler.schedule() 五步流程</text>
  <path d="M 280 42 Q 460 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- vertical pipeline of 5 steps -->
  <!-- Step 1 -->
  <g filter="url(#sk)">
    <rect x="60" y="70" width="470" height="56" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="80" y="92" font-size="13" font-weight="bold" fill="#2e6e2e">Step 1 · _free_finished_seq_groups()</text>
  <text x="80" y="112" font-size="11" fill="#555">处理已完成的 running 序列 → 释放 KV Cache block → 从 running 移除</text>

  <path d="M 295 126 L 295 146" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 2 -->
  <g filter="url(#sk)">
    <rect x="60" y="148" width="470" height="56" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="80" y="170" font-size="13" font-weight="bold" fill="#7a5415">Step 2 · _schedule_running()</text>
  <text x="80" y="190" font-size="11" fill="#555">继续 running 的 decode；显存不足时 preempt（recompute / swap）</text>

  <path d="M 295 204 L 295 224" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 3 -->
  <g filter="url(#sk)">
    <rect x="60" y="226" width="470" height="56" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="80" y="248" font-size="13" font-weight="bold" fill="#7a2828">Step 3 · _schedule_swapped()</text>
  <text x="80" y="268" font-size="11" fill="#555">把 swapped 队列换回 GPU（显存允许时 swap in）</text>

  <path d="M 295 282 L 295 302" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 4 -->
  <g filter="url(#sk)">
    <rect x="60" y="304" width="470" height="56" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="80" y="326" font-size="13" font-weight="bold" fill="#2b6e9e">Step 4 · _schedule_waiting()</text>
  <text x="80" y="346" font-size="11" fill="#555">从 waiting 加入新请求做 prefill（swapped 非空时跳过，防饿死）</text>

  <path d="M 295 360 L 295 380" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 5 -->
  <g filter="url(#sk)">
    <rect x="60" y="382" width="470" height="50" rx="10" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.6"/>
  </g>
  <text x="80" y="404" font-size="13" font-weight="bold" fill="#5a2e7e">Step 5 · 构建 SchedulerOutputs</text>
  <text x="80" y="422" font-size="11" fill="#555">scheduled_seq_groups + blocks_to_swap_in/out + 统计</text>

  <!-- right side: budget + queues -->
  <g filter="url(#sk)">
    <rect x="580" y="70" width="300" height="130" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="600" y="94" font-size="12" font-weight="bold" fill="#446688">SchedulingBudget（双预算约束）</text>
  <text x="600" y="116" font-size="11" fill="#444">• token_budget：每轮 token 上限</text>
  <text x="600" y="134" font-size="10" fill="#777">  prefill tokens + decode tokens ≤ 上限</text>
  <text x="600" y="156" font-size="11" fill="#444">• max_num_seqs：并发 sequence 上限</text>
  <text x="600" y="174" font-size="10" fill="#777">  running + swapped + 新加入 ≤ 上限</text>
  <text x="600" y="194" font-size="10" fill="#b85450">can_schedule() = 两约束都满足</text>

  <g filter="url(#sk)">
    <rect x="580" y="220" width="300" height="212" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="600" y="244" font-size="12" font-weight="bold" fill="#446688">三队列（FIFO）</text>

  <g filter="url(#sk)">
    <rect x="600" y="256" width="260" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="730" y="276" text-anchor="middle" font-size="11" fill="#7a5415">waiting ← 新请求 / recompute 回流</text>

  <g filter="url(#sk)">
    <rect x="600" y="300" width="260" height="32" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="730" y="320" text-anchor="middle" font-size="11" fill="#2e6e2e">running ← 正在 prefill / decode</text>

  <g filter="url(#sk)">
    <rect x="600" y="344" width="260" height="32" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.3"/>
  </g>
  <text x="730" y="364" text-anchor="middle" font-size="11" fill="#7a2828">swapped ← 被抢占(swap) 换出到 CPU</text>

  <text x="600" y="398" font-size="10" fill="#666">调度优先级：running &gt; swapped &gt; waiting</text>
  <text x="600" y="416" font-size="10" fill="#666">swapped 非空时 waiting 不加入新请求</text>
</svg>
