<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="41" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fdfcf7"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Throughput-Latency 曲线与饱和点</text>
  <path d="M 290 40 Q 460 48 630 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- axes -->
  <line x1="90" y1="370" x2="860" y2="370" stroke="#5a5a5a" stroke-width="1.5" filter="url(#sk)"/>
  <line x1="90" y1="370" x2="90" y2="70" stroke="#5a5a5a" stroke-width="1.5" filter="url(#sk)"/>
  <text x="475" y="402" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">并发数 / QPS（→）</text>
  <text x="50" y="220" text-anchor="middle" font-size="12" fill="#444" font-weight="bold" transform="rotate(-90 50 220)">Throughput / Latency</text>

  <!-- throughput curve (rises then flat) -->
  <path d="M 90 370 Q 200 200 350 120 L 860 118" stroke="#2e6e2e" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <text x="700" y="110" font-size="12" fill="#2e6e2e" font-weight="bold">Throughput（tok/s）</text>

  <!-- latency curve (flat then rises sharply) -->
  <path d="M 90 360 L 350 340 Q 450 320 550 250 Q 650 170 860 80" stroke="#b85450" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <text x="700" y="70" font-size="12" fill="#b85450" font-weight="bold">Latency（ms）</text>

  <!-- saturation point marker -->
  <circle cx="350" cy="120" r="6" fill="#c98a2b" stroke="#7a5415" stroke-width="1.5" filter="url(#sk)"/>
  <line x1="350" y1="120" x2="350" y2="370" stroke="#c98a2b" stroke-width="1.2" stroke-dasharray="4 3" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="280" y="376" width="140" height="24" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="350" y="392" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">饱和点（拐点）</text>

  <!-- regions -->
  <text x="180" y="340" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">线性增长区</text>
  <text x="180" y="356" text-anchor="middle" font-size="9" fill="#888">throughput↑ latency 平稳</text>

  <text x="550" y="200" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">排队区（饱和后）</text>
  <text x="550" y="216" text-anchor="middle" font-size="9" fill="#888">throughput 平 latency↑↑</text>

  <!-- data points on throughput -->
  <circle cx="120" cy="330" r="3" fill="#2e6e2e" filter="url(#sk)"/>
  <circle cx="180" cy="250" r="3" fill="#2e6e2e" filter="url(#sk)"/>
  <circle cx="260" cy="170" r="3" fill="#2e6e2e" filter="url(#sk)"/>
  <circle cx="350" cy="120" r="3" fill="#2e6e2e" filter="url(#sk)"/>
  <circle cx="500" cy="119" r="3" fill="#2e6e2e" filter="url(#sk)"/>
  <circle cx="700" cy="118" r="3" fill="#2e6e2e" filter="url(#sk)"/>

  <!-- data points on latency -->
  <circle cx="120" cy="358" r="3" fill="#b85450" filter="url(#sk)"/>
  <circle cx="180" cy="352" r="3" fill="#b85450" filter="url(#sk)"/>
  <circle cx="260" cy="345" r="3" fill="#b85450" filter="url(#sk)"/>
  <circle cx="350" cy="340" r="3" fill="#b85450" filter="url(#sk)"/>
  <circle cx="500" cy="280" r="3" fill="#b85450" filter="url(#sk)"/>
  <circle cx="700" cy="150" r="3" fill="#b85450" filter="url(#sk)"/>

  <!-- annotation box -->
  <g filter="url(#sk)">
    <rect x="560" y="280" width="280" height="80" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="580" y="302" font-size="11" font-weight="bold" fill="#444">饱和点判定：</text>
  <text x="580" y="320" font-size="10" fill="#444">• throughput 增长率 &lt; 5%</text>
  <text x="580" y="336" font-size="10" fill="#444">• latency 开始快速上升</text>
  <text x="580" y="352" font-size="10" fill="#b85450">• GPU util ≈ 100%，队列堆积</text>
</svg>
