<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2e8b57"/>
    </marker>
  </defs>
  <rect width="940" height="520" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">系统联调：六步分层验证</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">从单请求到稳定性测试，逐步叠加组件，每步验证正确性</text>

  <!-- ===== Step 1 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="76" width="260" height="66" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="160" y="98" text-anchor="middle" font-size="12" fill="#2b6e9e" font-weight="bold">Step 1: 单请求正确性</text>
  <text x="44" y="116" font-size="10" fill="#555">• Mini 引擎 v0 基础 forward</text>
  <text x="44" y="132" font-size="10" fill="#555">• 验证：输出 token 数正确</text>
  <path d="M 160 142 L 160 156" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 2 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="158" width="260" height="66" rx="8" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
  </g>
  <text x="160" y="180" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">Step 2: 多请求并发正确性</text>
  <text x="44" y="198" font-size="10" fill="#555">• 5 请求并发提交</text>
  <text x="44" y="214" font-size="10" fill="#555">• 验证：全部完成，结果隔离</text>
  <path d="M 160 224 L 160 238" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 3 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="240" width="260" height="66" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="160" y="262" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">Step 3: KV Cache 一致性</text>
  <text x="44" y="280" font-size="10" fill="#555">• 2 请求各自的 KV Cache 隔离</text>
  <text x="44" y="296" font-size="10" fill="#555">• 验证：完成后 KV Cache 全释放</text>
  <path d="M 160 306 L 160 320" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 4 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="322" width="260" height="66" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.3"/>
  </g>
  <text x="160" y="344" text-anchor="middle" font-size="12" fill="#6a3d8a" font-weight="bold">Step 4: Scheduler 正确性</text>
  <text x="44" y="362" font-size="10" fill="#555">• 优先级 + 资源预算 + 超时</text>
  <text x="44" y="378" font-size="10" fill="#555">• 验证：所有请求完成，资源释放</text>
  <path d="M 160 388 L 160 402" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 5 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="404" width="260" height="66" rx="8" fill="#fce4ec" stroke="#c04050" stroke-width="1.3"/>
  </g>
  <text x="160" y="426" text-anchor="middle" font-size="12" fill="#a03040" font-weight="bold">Step 5: 自定义 Kernel 集成</text>
  <text x="44" y="444" font-size="10" fill="#555">• PyTorch vs Custom kernel 对比</text>
  <text x="44" y="460" font-size="10" fill="#555">• 验证：结果一致，性能提升</text>
  <path d="M 160 470 L 160 484" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 6 ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="486" width="260" height="28" rx="6" fill="#e0f7fa" stroke="#00838f" stroke-width="1.3"/>
  </g>
  <text x="160" y="504" text-anchor="middle" font-size="11" fill="#005f6b" font-weight="bold">Step 6: 稳定性测试（500+ 请求）</text>

  <!-- ===== Right: Components tested ===== -->
  <g filter="url(#sk)">
    <rect x="340" y="76" width="560" height="438" rx="10" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="620" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">每步叠加的组件</text>

  <!-- Step 1 components -->
  <g filter="url(#sk)">
    <rect x="360" y="86" width="80" height="22" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="400" y="101" text-anchor="middle" font-size="9" fill="#2b6e9e">MiniLLM</text>
  <text x="460" y="101" font-size="10" fill="#888">Step 1 验证基础 forward</text>

  <!-- Step 2 adds -->
  <g filter="url(#sk)">
    <rect x="360" y="168" width="80" height="22" rx="4" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1"/>
  </g>
  <text x="400" y="183" text-anchor="middle" font-size="9" fill="#2e6e2e">+ Queue</text>
  <text x="460" y="183" font-size="10" fill="#888">Day1 ConcurrentEngine</text>

  <!-- Step 3 adds -->
  <g filter="url(#sk)">
    <rect x="360" y="250" width="80" height="22" rx="4" fill="#fff8e1" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <text x="400" y="265" text-anchor="middle" font-size="9" fill="#7a5415">+ KV Cache</text>
  <text x="460" y="265" font-size="10" fill="#888">Week5 PagedAttention 模拟</text>

  <!-- Step 4 adds -->
  <g filter="url(#sk)">
    <rect x="360" y="332" width="80" height="22" rx="4" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  </g>
  <text x="400" y="347" text-anchor="middle" font-size="9" fill="#6a3d8a">+ Scheduler</text>
  <text x="460" y="347" font-size="10" fill="#888">Day2 FullScheduler</text>

  <!-- Step 5 adds -->
  <g filter="url(#sk)">
    <rect x="360" y="414" width="80" height="22" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1"/>
  </g>
  <text x="400" y="429" text-anchor="middle" font-size="9" fill="#a03040">+ Custom Kernel</text>
  <text x="460" y="429" font-size="10" fill="#888">Day4 C++ Extension</text>

  <!-- Step 6 adds -->
  <g filter="url(#sk)">
    <rect x="360" y="488" width="80" height="22" rx="4" fill="#e0f7fa" stroke="#00838f" stroke-width="1"/>
  </g>
  <text x="400" y="503" text-anchor="middle" font-size="9" fill="#005f6b">+ Stability</text>
  <text x="460" y="503" font-size="10" fill="#888">500+ 请求，监控内存泄漏</text>

  <!-- ===== Key verification criteria (bottom right) ===== -->
  <g filter="url(#sk)">
    <rect x="620" y="120" width="260" height="380" rx="6" fill="#fff8e1" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <text x="750" y="142" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">验收标准</text>

  <text x="636" y="166" font-size="10" fill="#444" font-weight="bold">Step 1:</text>
  <text x="636" y="180" font-size="9" fill="#555">✓ token 数 = max_new_tokens</text>

  <text x="636" y="206" font-size="10" fill="#444" font-weight="bold">Step 2:</text>
  <text x="636" y="220" font-size="9" fill="#555">✓ 全部 FINISHED</text>
  <text x="636" y="234" font-size="9" fill="#555">✓ 结果互不干扰</text>

  <text x="636" y="258" font-size="10" fill="#444" font-weight="bold">Step 3:</text>
  <text x="636" y="272" font-size="9" fill="#555">✓ 完成后 KV blocks = 0</text>
  <text x="636" y="286" font-size="9" fill="#555">✓ 无内存泄漏</text>

  <text x="636" y="310" font-size="10" fill="#444" font-weight="bold">Step 4:</text>
  <text x="636" y="324" font-size="9" fill="#555">✓ 优先级高的先处理</text>
  <text x="636" y="338" font-size="9" fill="#555">✓ 超时请求被取消</text>

  <text x="636" y="362" font-size="10" fill="#444" font-weight="bold">Step 5:</text>
  <text x="636" y="376" font-size="9" fill="#555">✓ 结果与 PyTorch 一致</text>
  <text x="636" y="390" font-size="9" fill="#555">✓ 性能 ≥ PyTorch（或可解释）</text>

  <text x="636" y="414" font-size="10" fill="#444" font-weight="bold">Step 6:</text>
  <text x="636" y="428" font-size="9" fill="#555">✓ 成功率 > 95%</text>
  <text x="636" y="442" font-size="9" fill="#555">✓ 无内存泄漏</text>
  <text x="636" y="456" font-size="9" fill="#555">✓ P99 延迟稳定</text>
  <text x="636" y="470" font-size="9" fill="#555">✓ 异常输入不崩溃</text>
</svg>
