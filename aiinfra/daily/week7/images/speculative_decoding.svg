<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2e8b57"/>
    </marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c04050"/>
    </marker>
  </defs>
  <rect width="940" height="480" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Speculative Decoding：小模型 Draft + 大模型 Verify</text>
  <path d="M 280 40 Q 470 48 660 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Traditional decode (top) ===== -->
  <text x="40" y="72" font-size="12" font-weight="bold" fill="#c04050">传统 Decode：每步 1 token</text>
  <g filter="url(#sk)">
    <rect x="40" y="80" width="60" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
    <rect x="110" y="80" width="60" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
    <rect x="180" y="80" width="60" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
    <rect x="250" y="80" width="60" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
    <rect x="320" y="80" width="60" height="28" rx="4" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
  </g>
  <g font-size="10" fill="#a03040" text-anchor="middle">
    <text x="70" y="98">T_fwd</text>
    <text x="140" y="98">T_fwd</text>
    <text x="210" y="98">T_fwd</text>
    <text x="280" y="98">T_fwd</text>
    <text x="350" y="98">T_fwd</text>
  </g>
  <text x="400" y="98" font-size="10" fill="#888">→ 5 tokens / 5×T_fwd</text>
  <text x="560" y="98" font-size="10" fill="#c04050" font-weight="bold">每步只出 1 token，GPU 算力浪费</text>

  <!-- ===== Speculative decode (bottom) ===== -->
  <line x1="40" y1="126" x2="900" y2="126" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="152" font-size="12" font-weight="bold" fill="#2e8b57">Speculative Decode：每步 k 个 draft + 1 次 verify</text>

  <!-- Draft model box -->
  <g filter="url(#sk)">
    <rect x="40" y="162" width="320" height="56" rx="6" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
  </g>
  <text x="56" y="182" font-size="11" fill="#2e6e2e" font-weight="bold">Draft Model（小/快）</text>
  <g filter="url(#sk)">
    <rect x="56" y="190" width="50" height="22" rx="3" fill="#fff" stroke="#2e8b57" stroke-width="1"/>
    <rect x="112" y="190" width="50" height="22" rx="3" fill="#fff" stroke="#2e8b57" stroke-width="1"/>
    <rect x="168" y="190" width="50" height="22" rx="3" fill="#fff" stroke="#2e8b57" stroke-width="1"/>
    <rect x="224" y="190" width="50" height="22" rx="3" fill="#fff" stroke="#2e8b57" stroke-width="1"/>
  </g>
  <g font-size="9" fill="#2e6e2e" text-anchor="middle">
    <text x="81" y="205">t_d</text>
    <text x="137" y="205">t_d</text>
    <text x="193" y="205">t_d</text>
    <text x="249" y="205">t_d</text>
  </g>
  <text x="290" y="205" font-size="9" fill="#888">k=4 个 draft</text>

  <!-- Arrow to verify -->
  <path d="M 200 220 L 200 236" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Verify model box -->
  <g filter="url(#sk)">
    <rect x="40" y="240" width="320" height="56" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="56" y="260" font-size="11" fill="#2b6e9e" font-weight="bold">Target Model（大/慢）：一次验证 k+1 个</text>
  <g filter="url(#sk)">
    <rect x="56" y="268" width="280" height="22" rx="3" fill="#fff" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="196" y="283" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">1 次 T_fwd（批量验证，高效！）</text>

  <!-- Arrow to results -->
  <path d="M 200 296 L 200 312" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Results: accept/reject -->
  <text x="40" y="330" font-size="11" fill="#444" font-weight="bold">验证结果（α=0.7, k=4）：</text>
  <g filter="url(#sk)">
    <rect x="56" y="338" width="50" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="112" y="338" width="50" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="168" y="338" width="50" height="24" rx="3" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
    <rect x="224" y="338" width="50" height="24" rx="3" fill="#fce4ec" stroke="#c04050" stroke-width="1.5"/>
    <rect x="280" y="338" width="50" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <g font-size="9" text-anchor="middle">
    <text x="81" y="354" fill="#2e6e2e" font-weight="bold">✓</text>
    <text x="137" y="354" fill="#2e6e2e" font-weight="bold">✓</text>
    <text x="193" y="354" fill="#2e6e2e" font-weight="bold">✓</text>
    <text x="249" y="354" fill="#c04050" font-weight="bold">✗</text>
    <text x="305" y="354" fill="#2b6e9e" font-weight="bold">+1</text>
  </g>
  <text x="350" y="354" font-size="10" fill="#444">→ 接受 3 + bonus 1 = </text>
  <text x="500" y="354" font-size="11" fill="#2e8b57" font-weight="bold">4 tokens</text>
  <text x="560" y="354" font-size="10" fill="#888">/ (4×t_d + 1×T_fwd)</text>

  <!-- ===== Speedup formula ===== -->
  <line x1="40" y1="380" x2="900" y2="380" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="120" y="394" width="700" height="72" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="140" y="416" font-size="11" fill="#7a5415" font-weight="bold">加速条件：</text>
  <text x="220" y="416" font-family="monospace" font-size="10" fill="#444">spec_time = k × t_d + T_fwd   →   tokens = k × α + 1</text>
  <text x="140" y="436" font-size="11" fill="#7a5415" font-weight="bold">加速比：</text>
  <text x="220" y="436" font-family="monospace" font-size="10" fill="#444">speedup = (k×α+1) × T_fwd / (k×t_d + T_fwd)</text>
  <text x="140" y="456" font-size="10" fill="#2e8b57">💡 draft 快（t_d ≪ T_fwd）+ 接受率高（α 高）→ 显著加速；k=4,α=0.7,t_d=0.005,T_fwd=0.03 → ~2x speedup</text>
</svg>
