<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk2" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="620" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Block 级 Reduce 两级结构（复用 Week2 Warp Shuffle）</text>
  <path d="M 260 42 Q 460 50 660 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk2)"/>

  <!-- Level 0: threads -->
  <text x="460" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">第一级：Warp 内 Shuffle 归约（32 线程，无 smem）</text>
  <g filter="url(#sk2)">
    <rect x="40" y="92" width="840" height="90" rx="8" fill="#f4f0e6" stroke="#3a3a3a" stroke-width="1.4"/>
  </g>
  <!-- 8 warps representation -->
  <g font-size="9" fill="#2b2b2b">
    <!-- warp 0 -->
    <g filter="url(#sk2)">
      <rect x="60" y="106" width="190" height="60" rx="6" fill="#dbeaf6" stroke="#4a8edb" stroke-width="1.2"/>
      <text x="155" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Warp 0 (lane 0..31)</text>
      <text x="70" y="138" font-size="9">lane0: v0  lane1: v1 ... lane31: v31</text>
      <text x="70" y="152" font-size="9">__shfl_down_sync ↓16 ↓8 ↓4 ↓2 ↓1</text>
      <text x="70" y="164" font-size="9" font-weight="bold" fill="#1b5e8c">→ lane0 持有 sum_w0</text>
    </g>
    <g filter="url(#sk2)">
      <rect x="270" y="106" width="120" height="60" rx="6" fill="#dbeaf6" stroke="#4a8edb" stroke-width="1.2"/>
      <text x="330" y="120" text-anchor="middle" font-size="10" font-weight="bold">Warp 1</text>
      <text x="330" y="158" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e8c">→ sum_w1</text>
    </g>
    <g filter="url(#sk2)">
      <rect x="410" y="106" width="120" height="60" rx="6" fill="#dbeaf6" stroke="#4a8edb" stroke-width="1.2"/>
      <text x="470" y="120" text-anchor="middle" font-size="10" font-weight="bold">Warp 2</text>
      <text x="470" y="158" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e8c">→ sum_w2</text>
    </g>
    <text x="560" y="138" font-size="16" fill="#3a3a3a">...</text>
    <g filter="url(#sk2)">
      <rect x="690" y="106" width="170" height="60" rx="6" fill="#dbeaf6" stroke="#4a8edb" stroke-width="1.2"/>
      <text x="775" y="120" text-anchor="middle" font-size="10" font-weight="bold">Warp 7</text>
      <text x="775" y="158" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e8c">→ sum_w7</text>
    </g>
  </g>

  <!-- arrows down: lane0 writes smem -->
  <path d="M 155 168 L 155 196" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <path d="M 330 168 L 330 196" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <path d="M 470 168 L 470 196" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <path d="M 775 168 L 775 196" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <text x="560" y="186" text-anchor="middle" font-size="10" fill="#888" font-style="italic">if (lane==0) smem[wid] = val;</text>

  <!-- shared memory bank -->
  <text x="460" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">中转：Shared Memory smem[32]（warp 部分和）</text>
  <g filter="url(#sk2)">
    <rect x="200" y="222" width="520" height="56" rx="6" fill="#fff3cf" stroke="#e8a838" stroke-width="1.4"/>
  </g>
  <g font-size="9" fill="#2b2b2b">
    <text x="215" y="242">smem[0]</text>
    <text x="275" y="242">smem[1]</text>
    <text x="335" y="242">smem[2]</text>
    <text x="430" y="242">...</text>
    <text x="640" y="242">smem[7]</text>
    <text x="215" y="262" font-size="8" fill="#888">sum_w0</text>
    <text x="275" y="262" font-size="8" fill="#888">sum_w1</text>
    <text x="335" y="262" font-size="8" fill="#888">sum_w2</text>
    <text x="640" y="262" font-size="8" fill="#888">sum_w7</text>
  </g>
  <path d="M 460 282 L 460 296" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <text x="540" y="292" font-size="10" fill="#888" font-style="italic">__syncthreads()；只 warp0 读</text>

  <!-- Level 2: warp0 final -->
  <text x="460" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">第二级：Warp 0 最终归约（读 smem，再 shuffle 一次）</text>
  <g filter="url(#sk2)">
    <rect x="280" y="322" width="360" height="70" rx="8" fill="#dbeaf6" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="460" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#2b2b2b">Warp 0 (32 个 lane)</text>
    <text x="300" y="358" font-size="9">val = (lane &lt; numWarps) ? smem[lane] : 0;</text>
    <text x="300" y="372" font-size="9">val = warpReduceSum(val);   // 再 5 步 shuffle</text>
    <text x="300" y="386" font-size="9" font-weight="bold" fill="#1b5e8c">→ lane0 持有 block 级总和</text>
  </g>

  <!-- broadcast note -->
  <path d="M 460 396 L 460 410" stroke="#3a3a3a" stroke-width="1.3" fill="none" marker-end="url(#ar3)"/>
  <g filter="url(#sk2)">
    <rect x="280" y="414" width="360" height="34" rx="6" fill="#eaf6ee" stroke="#2e7d4f" stroke-width="1.3"/>
    <text x="460" y="435" text-anchor="middle" font-size="10" fill="#2b2b2b">if (tid==0) row_max = val;  __syncthreads();  广播给全 block</text>
  </g>

  <!-- key takeaways -->
  <g filter="url(#sk2)">
    <rect x="40" y="470" width="840" height="130" rx="8" fill="#fffdf3" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="60" y="492" font-size="12" font-weight="bold" fill="#2b2b2b">为什么两级？关键工程要点</text>
    <text x="60" y="512" font-size="11" fill="#444">① 一个 block 可达 1024 线程 = 32 个 warp，单次 warp shuffle 只能归约 32 个 lane</text>
    <text x="60" y="530" font-size="11" fill="#444">② smem[32] 正好放下 32 个 warp 的部分和——这是“最多 32 warp”设计的来源</text>
    <text x="60" y="548" font-size="11" fill="#444">③ 两处 __syncthreads()：写 smem 后（保证可见）、广播前（保证 warp0 读到完整结果）</text>
    <text x="60" y="566" font-size="11" fill="#444">④ 返回值只有 lane0 正确，必须经 shared 变量 + __syncthreads 广播给全 block</text>
    <text x="60" y="584" font-size="11" fill="#b03a3a">⑤ blockReduceMax 同构，仅把 += 换成 fmaxf、初值换 -INFINITY</text>
  </g>
</svg>
