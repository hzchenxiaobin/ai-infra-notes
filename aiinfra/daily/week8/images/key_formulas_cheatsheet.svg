<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <rect width="820" height="520" fill="#fdfcf7"/>

  <text x="410" y="34" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">关键公式与参数速查表</text>
  <path d="M 280 44 Q 410 52 540 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="410" y="58" text-anchor="middle" font-size="11" fill="#888">面试前必须能秒写、秒背、秒算</text>

  <!-- 左：关键公式 -->
  <text x="200" y="86" text-anchor="middle" font-size="14" fill="#4a8edb" font-weight="bold">关键公式</text>

  <!-- 公式 1 Online Softmax -->
  <g filter="url(#sk)">
    <rect x="30" y="96" width="380" height="78" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="44" y="116" font-size="12" fill="#b03a3a" font-weight="bold">① Online Softmax</text>
  <text x="44" y="136" font-family="monospace" font-size="11" fill="#2b2b2b">m_new = max(m, max(xj))</text>
  <text x="44" y="152" font-family="monospace" font-size="11" fill="#2b2b2b">l_new = l·exp(m-m_new) + Σexp(xj-m_new)</text>
  <text x="44" y="168" font-family="monospace" font-size="11" fill="#2b2b2b">o_new = o·(l·exp(m-m_new)/l_new) + ...</text>

  <!-- 公式 2 KV Cache -->
  <g filter="url(#sk)">
    <rect x="30" y="184" width="380" height="62" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="44" y="204" font-size="12" fill="#4a8e4a" font-weight="bold">② KV Cache 内存</text>
  <text x="44" y="224" font-family="monospace" font-size="11" fill="#2b2b2b">bytes/token = 2 × L × H × d × bytes_per_elem</text>
  <text x="44" y="240" font-size="11" fill="#666">LLaMA-7B: 2×32×32×128×2 ≈ 524 KB/token</text>

  <!-- 公式 3 GEMM FLOPs / AI -->
  <g filter="url(#sk)">
    <rect x="30" y="256" width="380" height="62" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="44" y="276" font-size="12" fill="#c98a2b" font-weight="bold">③ FLOPs 与算术强度</text>
  <text x="44" y="296" font-family="monospace" font-size="11" fill="#2b2b2b">FLOPs = 2·M·N·K ;  AI = FLOPs / Bytes</text>
  <text x="44" y="312" font-size="11" fill="#666">Decode M=1 时 AI 极低 → memory-bound</text>

  <!-- 公式 4 Roofline / Ridge -->
  <g filter="url(#sk)">
    <rect x="30" y="328" width="380" height="62" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
  </g>
  <text x="44" y="348" font-size="12" fill="#8e5db8" font-weight="bold">④ Roofline Ridge Point</text>
  <text x="44" y="368" font-family="monospace" font-size="11" fill="#2b2b2b">Ridge = Peak FLOP/s / Peak Bandwidth</text>
  <text x="44" y="384" font-size="11" fill="#666">AI &lt; Ridge → memory-bound；AI &gt; Ridge → compute-bound</text>

  <!-- 公式 5 FA HBM IO -->
  <g filter="url(#sk)">
    <rect x="30" y="400" width="380" height="50" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.4"/>
  </g>
  <text x="44" y="420" font-size="12" fill="#b03a3a" font-weight="bold">⑤ FlashAttention HBM IO</text>
  <text x="44" y="440" font-family="monospace" font-size="11" fill="#2b2b2b">Standard: O(N²+Nd)  →  FA: O(Nd)</text>

  <!-- 右：RTX 5090 关键参数 -->
  <text x="610" y="86" text-anchor="middle" font-size="14" fill="#c98a2b" font-weight="bold">RTX 5090 关键参数</text>

  <g filter="url(#sk)">
    <rect x="430" y="96" width="360" height="354" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4"/>
  </g>
  <text x="450" y="124" font-size="12" fill="#2b2b2b">FP32 Peak</text>
  <text x="770" y="124" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">19.5 TFLOPS</text>
  <text x="450" y="152" font-size="12" fill="#2b2b2b">Tensor Core FP16</text>
  <text x="770" y="152" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">312 TFLOPS</text>
  <text x="450" y="180" font-size="12" fill="#2b2b2b">Memory Bandwidth</text>
  <text x="770" y="180" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">1.55 TB/s</text>
  <text x="450" y="208" font-size="12" fill="#2b2b2b">Ridge Point</text>
  <text x="770" y="208" text-anchor="end" font-size="12" fill="#8e5db8" font-weight="bold">~12.6 FLOP/Byte</text>
  <text x="450" y="236" font-size="12" fill="#2b2b2b">Shared Memory / SM</text>
  <text x="770" y="236" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">164 KB</text>
  <text x="450" y="264" font-size="12" fill="#2b2b2b">Max Threads / SM</text>
  <text x="770" y="264" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">2048</text>
  <text x="450" y="292" font-size="12" fill="#2b2b2b">Warp Size</text>
  <text x="770" y="292" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">32</text>
  <text x="450" y="320" font-size="12" fill="#2b2b2b">Max Registers / Thread</text>
  <text x="770" y="320" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">255</text>
  <text x="450" y="348" font-size="12" fill="#2b2b2b">Compute Capability</text>
  <text x="770" y="348" text-anchor="end" font-size="12" fill="#4a8edb" font-weight="bold">sm_120</text>
  <path d="M 450 364 L 770 364" stroke="#e2dccd" stroke-width="1" filter="url(#sk)"/>
  <text x="450" y="388" font-size="11" fill="#666">LLaMA-7B KV/4096 token</text>
  <text x="770" y="388" text-anchor="end" font-size="12" fill="#b03a3a" font-weight="bold">~2 GB</text>
  <text x="450" y="412" font-size="11" fill="#666">GEMM 2·4096³</text>
  <text x="770" y="412" text-anchor="end" font-size="12" fill="#4a8e4a" font-weight="bold">~137 GFLOP</text>

  <text x="410" y="488" text-anchor="middle" font-size="12" fill="#888">背诵技巧：先记"量纲"（FLOP/Byte、TFLOPS），再记"数字"，最后记"含义"</text>
  <text x="410" y="508" text-anchor="middle" font-size="11" fill="#888">Ridge = 19.5/1.55 = 12.6 → 用算力÷带宽自己推，不要硬背</text>
</svg>
