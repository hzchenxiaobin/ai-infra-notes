<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <rect width="720" height="440" fill="#fdfcf7"/>

  <text x="360" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">SM（Streaming Multiprocessor）架构简图</text>
  <path d="M 230 46 Q 360 54 490 46" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>

  <!-- SM 外框 -->
  <g filter="url(#sk)">
    <rect x="60" y="62" width="600" height="358" rx="12" fill="#fffdf3" stroke="#3a3a3a" stroke-width="2"/>
  </g>
  <text x="360" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#4a8edb">一个 Streaming Multiprocessor（SM）</text>

  <!-- 第一行：计算单元（蓝） -->
  <g filter="url(#sk)">
    <rect x="90" y="108" width="160" height="82" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="170" y="142" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">CUDA Cores</text>
  <text x="170" y="166" text-anchor="middle" font-size="12" fill="#666">整数 / FP32 / FP64</text>

  <g filter="url(#sk)">
    <rect x="280" y="108" width="160" height="82" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="360" y="142" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Tensor Cores</text>
  <text x="360" y="166" text-anchor="middle" font-size="12" fill="#666">矩阵乘加加速</text>

  <g filter="url(#sk)">
    <rect x="470" y="108" width="160" height="82" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="550" y="142" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Warp Scheduler</text>
  <text x="550" y="166" text-anchor="middle" font-size="12" fill="#666">调度 32-thread warp</text>

  <!-- 第二行：存储单元（绿 + 橙） -->
  <g filter="url(#sk)">
    <rect x="90" y="218" width="220" height="82" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="200" y="252" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Register File</text>
  <text x="200" y="276" text-anchor="middle" font-size="12" fill="#666">~256 KB / SM</text>

  <g filter="url(#sk)">
    <rect x="350" y="218" width="280" height="82" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="490" y="252" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Shared Memory / L1 Cache</text>
  <text x="490" y="276" text-anchor="middle" font-size="12" fill="#666">~100-164 KB / SM</text>

  <!-- 第三行：访存单元（紫） -->
  <g filter="url(#sk)">
    <rect x="90" y="328" width="540" height="62" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/>
  </g>
  <text x="360" y="365" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Load / Store 单元</text>

  <!-- 左侧图例 -->
  <text x="40" y="120" font-size="10" fill="#4a8edb" font-weight="bold" transform="rotate(-90, 40, 120)">计算</text>
  <text x="40" y="230" font-size="10" fill="#4a8e4a" font-weight="bold" transform="rotate(-90, 40, 230)">存储</text>
  <text x="40" y="340" font-size="10" fill="#8e5db8" font-weight="bold" transform="rotate(-90, 40, 340)">访存</text>
</svg>
