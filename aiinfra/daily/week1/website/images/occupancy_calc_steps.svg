<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="540" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Occupancy 手算四步法（RTX 5090 示例）</text>

  <!-- Step 1 -->
  <rect x="40" y="60" width="640" height="60" rx="8" fill="#4a8edb" opacity="0.1" stroke="#6ab0ff" stroke-width="2"/>
  <text x="60" y="85" font-size="14" fill="#6ab0ff" font-weight="bold">Step 1: warps_per_block = ceil(threads / 32)</text>
  <text x="60" y="108" font-size="13" fill="#2b2b2b" font-family="monospace">threads=256 → warps_per_block = ceil(256/32) = 8</text>

  <!-- Step 2 -->
  <rect x="40" y="135" width="640" height="145" rx="8" fill="#e8a838" opacity="0.1" stroke="#e8a838" stroke-width="2"/>
  <text x="60" y="160" font-size="14" fill="#e8a838" font-weight="bold">Step 2: 分别从四种资源算 block 上限</text>

  <text x="60" y="185" font-size="12" fill="#2b2b2b">Threads:  floor(2048 / 256) = 8</text>
  <text x="320" y="185" font-size="11" fill="#666666">← max_threads_per_sm / threads_per_block</text>

  <text x="60" y="210" font-size="12" fill="#2b2b2b">Registers: ceil(256×64/256)×256 = 16384</text>
  <text x="60" y="230" font-size="12" fill="#2b2b2b">           floor(65536 / 16384) = 4</text>
  <text x="320" y="220" font-size="11" fill="#e57373">← 瓶颈！寄存器限制</text>

  <text x="60" y="255" font-size="12" fill="#2b2b2b">Shared Mem: 未使用 → ∞</text>
  <text x="60" y="273" font-size="12" fill="#2b2b2b">硬上限: 32 blocks/SM</text>

  <!-- Step 3 -->
  <rect x="40" y="295" width="640" height="60" rx="8" fill="#b689e8" opacity="0.1" stroke="#b689e8" stroke-width="2"/>
  <text x="60" y="320" font-size="14" fill="#b689e8" font-weight="bold">Step 3: active_blocks = min(8, 4, ∞, 32) = 4</text>
  <text x="60" y="343" font-size="12" fill="#e57373">瓶颈资源：Registers per thread</text>

  <!-- Step 4 -->
  <rect x="40" y="370" width="640" height="80" rx="8" fill="#4a9d5f" opacity="0.1" stroke="#5cb86c" stroke-width="2"/>
  <text x="60" y="395" font-size="14" fill="#5cb86c" font-weight="bold">Step 4: 换算 Occupancy</text>
  <text x="60" y="420" font-size="13" fill="#2b2b2b" font-family="monospace">active_warps = 4 × 8 = 32</text>
  <text x="60" y="442" font-size="13" fill="#2b2b2b" font-family="monospace">occupancy = 32 / 64 = 50%</text>

  <!-- Summary -->
  <rect x="120" y="470" width="480" height="50" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="492" text-anchor="middle" font-size="14" fill="#2b2b2b">RTX 5090: 256 threads, 64 regs/thread, 0 smem</text>
  <text x="360" y="512" text-anchor="middle" font-size="15" fill="#5cb86c" font-weight="bold">→ 理论 Occupancy = 50%（瓶颈：寄存器）</text>
  </g>
</svg>