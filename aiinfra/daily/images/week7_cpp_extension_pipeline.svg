<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="860" height="380" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">PyTorch C++ Extension 编译流水线</text>
  <path d="M 270 44 Q 430 52 590 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="430" y="60" text-anchor="middle" font-size="11" fill="#888">源码 → load_inline 编译 → Python 模块 → 集成到模型 · 四步把 CUDA kernel 接入 PyTorch</text>

  <!-- 4 stage boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="20"  y="90" width="195" height="180" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="117" y="114" fill="#2b6e9e" font-weight="bold" font-size="14">① 源码编写</text>
    <text x="117" y="138" fill="#2b6e9e" font-size="10" font-weight="bold">CUDA_SOURCE (.cu)</text>
    <text x="117" y="154" fill="#2b6e9e" font-size="10">__global__ kernel 实现</text>
    <text x="117" y="180" fill="#2b6e9e" font-size="10" font-weight="bold">CPP_SOURCE (.cpp)</text>
    <text x="117" y="196" fill="#2b6e9e" font-size="10">at::Tensor wrapper</text>
    <text x="117" y="210" fill="#2b6e9e" font-size="10">声明</text>
    <text x="117" y="248" fill="#2b6e9e" font-size="10" font-style="italic" fill="#5d3a7e">人写源码</text>

    <rect x="229" y="90" width="195" height="180" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="326" y="114" fill="#2e6e2e" font-weight="bold" font-size="14">② load_inline 编译</text>
    <text x="326" y="138" fill="#2e6e2e" font-size="10">torch.utils.cpp_extension</text>
    <text x="326" y="152" fill="#2e6e2e" font-size="10">.load_inline()</text>
    <text x="326" y="176" fill="#2e6e2e" font-size="10">→ nvcc -O3 编译 .cu</text>
    <text x="326" y="192" fill="#2e6e2e" font-size="10">→ g++ 编译 .cpp</text>
    <text x="326" y="208" fill="#2e6e2e" font-size="10">→ 链接生成 .so</text>
    <text x="326" y="248" fill="#2e6e2e" font-size="10" font-style="italic">自动编译</text>

    <rect x="438" y="90" width="195" height="180" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="535" y="114" fill="#7a5415" font-weight="bold" font-size="14">③ Python 模块</text>
    <text x="535" y="138" fill="#7a5415" font-size="10">custom_ops = load_inline(...)</text>
    <text x="535" y="162" fill="#7a5415" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">.softmax_forward(input)</text>
    <text x="535" y="180" fill="#7a5415" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">.layernorm_forward(...)</text>
    <text x="535" y="198" fill="#7a5415" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">.flash_attention_forward(...)</text>
    <text x="535" y="248" fill="#7a5415" font-size="10" font-style="italic">Python 可调用</text>

    <rect x="647" y="90" width="195" height="180" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="744" y="114" fill="#5d3a7e" font-weight="bold" font-size="14">④ 集成到模型</text>
    <text x="744" y="138" fill="#5d3a7e" font-size="10">TransformerLayer</text>
    <text x="744" y="152" fill="#5d3a7e" font-size="10">(use_custom=True)</text>
    <text x="744" y="178" fill="#5d3a7e" font-size="10">→ forward 中调用</text>
    <text x="744" y="194" fill="#5d3a7e" font-size="10">自定义 kernel</text>
    <text x="744" y="248" fill="#5d3a7e" font-size="10" font-style="italic">端到端可用</text>
  </g>

  <!-- arrows between stages -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 217 180 L 227 180" marker-end="url(#ar)"/>
    <path d="M 426 180 L 436 180" marker-end="url(#ar)"/>
    <path d="M 635 180 L 645 180" marker-end="url(#ar)"/>
  </g>

  <!-- footer -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="40" y="296" width="780" height="56" rx="10" fill="#fdfcf7" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="430" y="318" fill="#2b2b2b" font-weight="bold">C++ Wrapper 三板斧</text>
    <text x="430" y="336" fill="#5a5a5a">at::empty_like() 分配输出 · data_ptr&lt;float&gt;() 取裸指针 · size()/dim() 取形状</text>
    <text x="430" y="350" fill="#888" font-size="10" font-style="italic">生产环境：FlashAttention/Softmax/LayerNorm 用官方实现，教学版用于理解原理</text>
  </g>

  <text x="430" y="370" text-anchor="middle" font-size="9" fill="#aaa">.cu + .cpp → nvcc/g++ → .so → custom_ops → TransformerLayer</text>
</svg>
