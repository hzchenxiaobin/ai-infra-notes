<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="500" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">每周 7 天循环节奏</text>
  <path d="M 250 46 Q 380 54 510 46" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="62" text-anchor="middle" font-size="11" fill="#888">理论学习 → 源码分析 → 项目推进 → Profiling → 复盘缓冲</text>

  <!-- circular guide -->
  <circle cx="380" cy="260" r="170" fill="none" stroke="#d8d8d8" stroke-width="1.2" stroke-dasharray="3 5" filter="url(#sk)"/>

  <!-- arc arrows (clockwise) -->
  <g filter="url(#sk)">
    <path d="M 452 106 A 170 170 0 0 1 504 144" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M 549 281 A 170 170 0 0 1 529 342" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M 412 427 A 170 170 0 0 1 347 427" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M 231 342 A 170 170 0 0 1 211 281" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
    <path d="M 256 144 A 170 170 0 0 1 308 106" stroke="#5a5a5a" stroke-width="1.6" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- center label -->
  <text x="380" y="252" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">每周循环</text>
  <text x="380" y="274" text-anchor="middle" font-size="11" fill="#888">7 天一个闭环</text>

  <!-- Node 1: Day 1-2 (top) -->
  <g filter="url(#sk)">
    <rect x="310" y="57" width="140" height="66" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="380" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">Day 1-2</text>
  <text x="380" y="98" text-anchor="middle" font-size="11" fill="#2b2b2b">🔬 核心学习 + Coding</text>
  <text x="380" y="114" text-anchor="middle" font-size="9" fill="#666">理论 + 动手写 kernel</text>

  <!-- Node 2: Day 3-4 (right) -->
  <g filter="url(#sk)">
    <rect x="472" y="174" width="140" height="66" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="542" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Day 3-4</text>
  <text x="542" y="215" text-anchor="middle" font-size="11" fill="#2b2b2b">📖 源码分析</text>
  <text x="542" y="231" text-anchor="middle" font-size="9" fill="#666">cuBLAS / vLLM / FA</text>

  <!-- Node 3: Day 5 (bottom-right) -->
  <g filter="url(#sk)">
    <rect x="410" y="365" width="140" height="66" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="480" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">Day 5</text>
  <text x="480" y="406" text-anchor="middle" font-size="11" fill="#2b2b2b">🛠 项目推进</text>
  <text x="480" y="422" text-anchor="middle" font-size="9" fill="#666">整合到 Mini 引擎</text>

  <!-- Node 4: Day 6 (bottom-left) -->
  <g filter="url(#sk)">
    <rect x="210" y="365" width="140" height="66" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="280" y="388" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">Day 6</text>
  <text x="280" y="406" text-anchor="middle" font-size="11" fill="#2b2b2b">📊 Profiler + Debug</text>
  <text x="280" y="422" text-anchor="middle" font-size="9" fill="#666">瓶颈定位 + 文档</text>

  <!-- Node 5: Day 7 (left) -->
  <g filter="url(#sk)">
    <rect x="148" y="174" width="140" height="66" rx="10" fill="#f0f0f0" stroke="#888888" stroke-width="1.6"/>
  </g>
  <text x="218" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#555555">Day 7</text>
  <text x="218" y="215" text-anchor="middle" font-size="11" fill="#2b2b2b">🧘 弹性 / 缓冲</text>
  <text x="218" y="231" text-anchor="middle" font-size="9" fill="#666">补进度 · 复盘</text>

  <!-- footer -->
  <text x="380" y="478" text-anchor="middle" font-size="10" fill="#aaa">Day 7 收尾后进入下一周主题，形成递进闭环</text>
</svg>
