<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="400" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">没有 Chunked Prefill 时</text>
  <path d="M 240 44 Q 380 52 520 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="60" text-anchor="middle" font-size="11" fill="#888">长 prefill（512 token）一次性吃满整轮 → S1/S2 decode 被阻塞</text>

  <!-- iter axis -->
  <g filter="url(#sk)" stroke="#ccc" stroke-width="1" fill="none">
    <line x1="120" y1="100" x2="640" y2="100"/>
  </g>
  <g font-size="12" fill="#888" text-anchor="middle">
    <text x="210" y="92">iter N</text>
    <text x="380" y="92" font-weight="bold" fill="#b85450">iter N+1</text>
    <text x="550" y="92">iter N+2</text>
  </g>
  <g filter="url(#sk)" stroke="#ddd" stroke-width="0.8" fill="none" stroke-dasharray="2 3">
    <line x1="295" y1="104" x2="295" y2="320"/>
    <line x1="465" y1="104" x2="465" y2="320"/>
  </g>

  <!-- Lane labels -->
  <g font-size="12" fill="#444" text-anchor="end">
    <text x="110" y="148" font-weight="bold">S1</text>
    <text x="110" y="208" font-weight="bold">S2</text>
    <text x="110" y="268" font-weight="bold">S3</text>
  </g>

  <!-- iter N column: S1 decode, S2 decode, S3 - -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="130" y="128" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="210" y="153" fill="#2e6e2e">S1 decode</text>

    <rect x="130" y="188" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="210" y="213" fill="#2e6e2e">S2 decode</text>

    <text x="210" y="268" fill="#bbb" font-size="10">—</text>
  </g>
  <text x="210" y="312" text-anchor="middle" font-size="9" fill="#2e6e2e">正常 · 延迟 0.6ms</text>

  <!-- iter N+1 column: S3 prefill spans all 3 lanes (blocks S1/S2) -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="300" y="128" width="160" height="160" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.8"/>
    <text x="380" y="200" fill="#7a5415" font-weight="bold" font-size="14">S3 prefill</text>
    <text x="380" y="220" fill="#7a5415" font-size="12">512 token</text>
    <text x="380" y="240" fill="#b85450" font-size="10" font-style="italic">整轮被占满！</text>
  </g>
  <!-- S1/S2 blocked markers -->
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="300" y="128" width="160" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.55"/>
    <text x="380" y="153" fill="#b85450">S1 ⛔ decode 被阻塞</text>
    <rect x="300" y="188" width="160" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.55"/>
    <text x="380" y="213" fill="#b85450">S2 ⛔ decode 被阻塞</text>
  </g>
  <text x="380" y="312" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">TPOT 0.6ms → 几十 ms（卡顿）</text>

  <!-- iter N+2 column: S1 decode, S2 decode, S3 decode -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="470" y="128" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="550" y="153" fill="#2e6e2e">S1 decode</text>

    <rect x="470" y="188" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="550" y="213" fill="#2e6e2e">S2 decode</text>

    <rect x="470" y="248" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="550" y="273" fill="#2e6e2e">S3 decode</text>
  </g>
  <text x="550" y="312" text-anchor="middle" font-size="9" fill="#2e6e2e">恢复</text>

  <!-- legend -->
  <g font-size="10" fill="#666">
    <rect x="130" y="350" width="14" height="11" rx="2" fill="#eaf6ee" stroke="#4a8e4a"/>
    <text x="150" y="360">decode</text>
    <rect x="220" y="350" width="14" height="11" rx="2" fill="#fef6e6" stroke="#c98a2b"/>
    <text x="240" y="360">prefill（整轮占用）</text>
    <rect x="380" y="350" width="14" height="11" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <text x="400" y="360">被阻塞</text>
  </g>

  <text x="380" y="385" text-anchor="middle" font-size="10" fill="#5d3a7e">用户感知"卡顿" · decode 延迟尖峰 = prompt_len 相关 · 长请求饿死短请求</text>
</svg>
