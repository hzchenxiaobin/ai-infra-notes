<svg xmlns="http://www.w3.org/2000/svg" width="860" height="470" viewBox="0 0 860 470" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="860" height="470" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">GPU 硬件层次总览</text>
  <path d="M 300 44 Q 430 52 560 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="430" y="60" text-anchor="middle" font-size="11" fill="#888">GPU → 多个 SM → 核心资源 · 外挂 L2 / Global Memory</text>

  <!-- GPU root -->
  <g filter="url(#sk)">
    <rect x="360" y="72" width="140" height="46" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="430" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">GPU</text>

  <!-- connector bus -->
  <path d="M 430 118 L 430 138" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>
  <path d="M 210 138 L 730 138" stroke="#5a5a5a" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <path d="M 210 138 L 210 158" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>
  <path d="M 515 138 L 515 168" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>
  <path d="M 730 138 L 730 168" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>

  <!-- SM box (with sub-components) -->
  <g filter="url(#sk)">
    <rect x="40" y="158" width="340" height="290" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="210" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">SM × N（Streaming Multiprocessor）</text>

  <!-- SM sub-components -->
  <g filter="url(#sk)">
    <rect x="60" y="198" width="300" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="60" y="240" width="300" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="60" y="282" width="300" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="60" y="324" width="300" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="60" y="366" width="300" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="210" y="220" text-anchor="middle" font-size="11" fill="#2b2b2b">CUDA Cores / Tensor Cores</text>
  <text x="210" y="262" text-anchor="middle" font-size="11" fill="#2b2b2b">寄存器文件（Register File）</text>
  <text x="210" y="304" text-anchor="middle" font-size="11" fill="#2b2b2b">Shared Memory / L1 Cache</text>
  <text x="210" y="346" text-anchor="middle" font-size="11" fill="#2b2b2b">Warp Scheduler</text>
  <text x="210" y="388" text-anchor="middle" font-size="11" fill="#2b2b2b">Load/Store 单元</text>
  <text x="210" y="434" text-anchor="middle" font-size="9" fill="#888">SM 是 GPU 并行的基本单位</text>

  <!-- L2 Cache -->
  <g filter="url(#sk)">
    <rect x="420" y="168" width="190" height="64" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="515" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">L2 Cache</text>
  <text x="515" y="216" text-anchor="middle" font-size="10" fill="#666">（跨 SM 共享）</text>

  <!-- Global Memory -->
  <g filter="url(#sk)">
    <rect x="630" y="168" width="200" height="64" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="730" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2828">Global Memory</text>
  <text x="730" y="216" text-anchor="middle" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">（HBM / GDDR）</text>

  <!-- footer -->
  <text x="430" y="458" text-anchor="middle" font-size="10" fill="#aaa">block 被分配到 SM 上执行 · 同一个 block 不能跨 SM</text>
</svg>
