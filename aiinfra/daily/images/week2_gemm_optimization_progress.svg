<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b85450"/>
      <stop offset="30%" stop-color="#c98a2b"/>
      <stop offset="60%" stop-color="#4a8e4a"/>
      <stop offset="100%" stop-color="#4a8edb"/>
    </linearGradient>
  </defs>

  <rect width="880" height="260" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">GEMM 优化进阶之路</text>
  <path d="M 300 44 Q 440 52 580 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="440" y="60" text-anchor="middle" font-size="11" fill="#888">从 Naive(1%) 到整合版(70%) · cuBLAS 为 100% 基准</text>

  <!-- gain labels above arrows -->
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="140" y="124">+14%</text>
    <text x="260" y="124">+30%</text>
    <text x="380" y="124">+10%</text>
    <text x="500" y="124">+5%</text>
    <text x="620" y="124">+10%</text>
    <text x="740" y="124">+30%</text>
  </g>

  <!-- 7 progression boxes -->
  <g filter="url(#sk)" text-anchor="middle">
    <!-- 1. Naive 1% (red) -->
    <rect x="28" y="132" width="104" height="76" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="80" y="152" font-size="11" font-weight="bold" fill="#7a2828">Naive</text>
    <text x="80" y="178" font-size="16" font-weight="bold" fill="#b85450">1%</text>
    <text x="80" y="198" font-size="9" fill="#999">Day 1</text>
    <!-- 2. SM Tiling 15% (orange) -->
    <rect x="148" y="132" width="104" height="76" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="200" y="152" font-size="11" font-weight="bold" fill="#7a5415">SM Tiling</text>
    <text x="200" y="178" font-size="16" font-weight="bold" fill="#c98a2b">15%</text>
    <text x="200" y="198" font-size="9" fill="#999">Day 1</text>
    <!-- 3. Register Blocking 45% (orange) -->
    <rect x="268" y="132" width="104" height="76" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="320" y="152" font-size="11" font-weight="bold" fill="#7a5415">Reg Blocking</text>
    <text x="320" y="178" font-size="16" font-weight="bold" fill="#c98a2b">45%</text>
    <text x="320" y="198" font-size="9" fill="#999">Day 2</text>
    <!-- 4. +float4 55% (green) -->
    <rect x="388" y="132" width="104" height="76" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="440" y="152" font-size="11" font-weight="bold" fill="#2e6e2e">+float4</text>
    <text x="440" y="178" font-size="16" font-weight="bold" fill="#4a8e4a">55%</text>
    <text x="440" y="198" font-size="9" fill="#999">Day 6</text>
    <!-- 5. +Warp Shuffle 60% (green) -->
    <rect x="508" y="132" width="104" height="76" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="560" y="152" font-size="11" font-weight="bold" fill="#2e6e2e">+Warp Shuffle</text>
    <text x="560" y="178" font-size="16" font-weight="bold" fill="#4a8e4a">60%</text>
    <text x="560" y="198" font-size="9" fill="#999">Day 1+6</text>
    <!-- 6. +Double Buffer 70% (green) -->
    <rect x="628" y="132" width="104" height="76" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="680" y="152" font-size="11" font-weight="bold" fill="#2e6e2e">+Double Buffer</text>
    <text x="680" y="178" font-size="16" font-weight="bold" fill="#4a8e4a">70%</text>
    <text x="680" y="198" font-size="9" fill="#999">Day 6</text>
    <!-- 7. cuBLAS 100% (blue, gold standard) -->
    <rect x="748" y="132" width="104" height="76" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="800" y="152" font-size="11" font-weight="bold" fill="#2b6e9e">cuBLAS</text>
    <text x="800" y="178" font-size="16" font-weight="bold" fill="#4a8edb">100%</text>
    <text x="800" y="198" font-size="9" fill="#999">基准</text>
  </g>

  <!-- arrows between boxes -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)">
    <path d="M 134 170 L 144 170"/>
    <path d="M 254 170 L 264 170"/>
    <path d="M 374 170 L 384 170"/>
    <path d="M 494 170 L 504 170"/>
    <path d="M 614 170 L 624 170"/>
    <path d="M 734 170 L 744 170"/>
  </g>

  <!-- bottom scale bar -->
  <g filter="url(#sk)">
    <rect x="28" y="222" width="824" height="8" rx="4" fill="url(#sg)" stroke="#bbb" stroke-width="0.8"/>
  </g>
  <text x="28" y="244" font-size="9" fill="#888">0% (慢)</text>
  <text x="852" y="244" text-anchor="end" font-size="9" fill="#888">100% (cuBLAS)</text>
</svg>
