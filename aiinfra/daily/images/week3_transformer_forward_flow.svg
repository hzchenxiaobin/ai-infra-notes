<svg xmlns="http://www.w3.org/2000/svg" width="780" height="580" viewBox="0 0 780 580" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="580" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 单层前向数据流</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">Input → LayerNorm → QKV → Attention → FFN · 含 KV Cache append</text>

  <!-- Input x -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="310" y="80" width="160" height="38" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="390" y="104" fill="#5d3a7e" font-weight="bold">Input x (B, N, d)</text>
  </g>

  <!-- residual side bus (right) -->
  <g filter="url(#sk)" stroke="#8e5db8" stroke-width="1.6" fill="none" stroke-dasharray="5 3">
    <path d="M 470 99 L 690 99 L 690 506"/>
  </g>
  <text x="704" y="300" text-anchor="middle" font-size="10" fill="#8e5db8" font-weight="bold" transform="rotate(90 704 300)">residual</text>

  <!-- arrow Input -> LayerNorm1 -->
  <g filter="url(#sk)">
    <path d="M 390 118 L 390 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- Row: LayerNorm1 -> QKV Linear -> Q,K,V -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="120" y="146" width="150" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="195" y="171" fill="#2b6e9e" font-weight="bold">LayerNorm1</text>

    <rect x="310" y="146" width="180" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="400" y="171" fill="#2b6e9e" font-weight="bold">QKV Linear (GEMM)</text>

    <rect x="530" y="146" width="150" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="605" y="171" fill="#2b6e9e" font-weight="bold">Q, K, V</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 270 166 L 308 166" marker-end="url(#ar)"/>
    <path d="M 490 166 L 528 166" marker-end="url(#ar)"/>
  </g>

  <!-- arrow down to Attention -->
  <g filter="url(#sk)">
    <path d="M 390 186 L 390 214" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- Attention box -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="200" y="218" width="380" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="390" y="240" fill="#2e6e2e" font-weight="bold">Attention: S = QK^T → softmax → PV</text>
    <text x="390" y="258" fill="#2e6e2e" font-size="10">（Prefill: N×N 矩阵；Decode: 1×N）</text>
  </g>

  <!-- KV Cache append side note -->
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="610" y="226" width="140" height="36" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="680" y="248" fill="#b85450" font-weight="bold">KV Cache append</text>
  </g>
  <g filter="url(#sk)" stroke="#b85450" stroke-width="1.2" fill="none" stroke-dasharray="3 2">
    <path d="M 580 243 L 608 243" marker-end="url(#ar)"/>
  </g>

  <!-- arrow Attention -> Out GEMM -->
  <g filter="url(#sk)">
    <path d="M 390 268 L 390 296" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- Out GEMM + residual add -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="200" y="300" width="180" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="290" y="325" fill="#2b6e9e" font-weight="bold">Output Linear (GEMM)</text>

    <rect x="420" y="300" width="140" height="40" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="490" y="325" fill="#7a5415" font-weight="bold">residual add</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 380 320 L 418 320" marker-end="url(#ar)"/>
    <!-- residual merge from bus -->
    <path d="M 690 320 L 562 320" stroke="#8e5db8" stroke-dasharray="5 3"/>
  </g>

  <!-- arrow to LayerNorm2 -->
  <g filter="url(#sk)">
    <path d="M 490 340 L 490 366" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- LayerNorm2 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="410" y="370" width="160" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="490" y="395" fill="#2b6e9e" font-weight="bold">LayerNorm2</text>
  </g>

  <!-- arrow to FFN -->
  <g filter="url(#sk)">
    <path d="M 490 410 L 490 436" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- FFN row -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="180" y="440" width="380" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="370" y="462" fill="#2e6e2e" font-weight="bold">FFN: Linear(GELU(Linear(x)))</text>
    <text x="370" y="478" fill="#2e6e2e" font-size="10">两个大 GEMM</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 490 436 L 490 440"/>
    <!-- residual merge from bus to FFN output -->
    <path d="M 690 462 L 562 462" stroke="#8e5db8" stroke-dasharray="5 3"/>
  </g>

  <!-- arrow to residual add + next layer -->
  <g filter="url(#sk)">
    <path d="M 370 484 L 370 510" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="270" y="514" width="200" height="38" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="370" y="538" fill="#7a5415" font-weight="bold">residual add → 下一层</text>
  </g>
</svg>
