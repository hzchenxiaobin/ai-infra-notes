<svg xmlns="http://www.w3.org/2000/svg" width="780" height="540" viewBox="0 0 780 540" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="57" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="540" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Mini Transformer Engine v2 数据流</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">用自定义 FlashAttention 替换 QK^T → softmax → PV · GEMM 仍用 cuBLAS</text>

  <!-- Input x -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="310" y="80" width="160" height="38" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="390" y="104" fill="#5d3a7e" font-weight="bold">Input x (B, N, d)</text>
  </g>

  <!-- residual side bus -->
  <g filter="url(#sk)" stroke="#8e5db8" stroke-width="1.6" fill="none" stroke-dasharray="5 3">
    <path d="M 470 99 L 690 99 L 690 470"/>
  </g>
  <text x="704" y="280" text-anchor="middle" font-size="10" fill="#8e5db8" font-weight="bold" transform="rotate(90 704 280)">residual</text>

  <!-- arrow Input -> LayerNorm1 -->
  <g filter="url(#sk)">
    <path d="M 390 118 L 390 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- Row: LayerNorm1 -> QKV GEMM -> Q,K,V -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="100" y="146" width="150" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="175" y="171" fill="#2b6e9e" font-weight="bold">[LayerNorm1]</text>

    <rect x="290" y="146" width="200" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="390" y="171" fill="#2b6e9e" font-weight="bold">[QKV GEMM (cuBLAS)]</text>

    <rect x="530" y="146" width="150" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="605" y="171" fill="#2b6e9e" font-weight="bold">Q, K, V</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 250 166 L 288 166" marker-end="url(#ar)"/>
    <path d="M 490 166 L 528 166" marker-end="url(#ar)"/>
  </g>

  <!-- arrow down to FlashAttention -->
  <g filter="url(#sk)">
    <path d="M 390 186 L 390 216" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- FlashAttention (highlighted) -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="220" y="220" width="340" height="58" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="2.2"/>
    <text x="390" y="244" fill="#2e6e2e" font-weight="bold">[FlashAttention ★] → O</text>
    <text x="390" y="264" fill="#2e6e2e" font-size="10">替换 QK^T → softmax → PV</text>
  </g>
  <text x="580" y="252" font-size="14" fill="#2e6e2e" font-weight="bold">★</text>
  <text x="600" y="252" font-size="10" fill="#888">自定义 CUDA kernel</text>

  <!-- arrow FlashAttention -> Out GEMM -->
  <g filter="url(#sk)">
    <path d="M 390 278 L 390 308" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- Out GEMM + residual merge -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="290" y="312" width="200" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="390" y="337" fill="#2b6e9e" font-weight="bold">[Out GEMM]</text>
  </g>
  <g filter="url(#sk)" stroke="#8e5db8" stroke-width="1.3" fill="none" stroke-dasharray="5 3">
    <path d="M 690 332 L 492 332"/>
  </g>

  <!-- arrow to LayerNorm2 -->
  <g filter="url(#sk)">
    <path d="M 390 352 L 390 378" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- LayerNorm2 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="310" y="382" width="160" height="40" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="390" y="407" fill="#2b6e9e" font-weight="bold">[LayerNorm2]</text>
  </g>

  <!-- arrow to FFN -->
  <g filter="url(#sk)">
    <path d="M 390 422 L 390 446" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>

  <!-- FFN -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="290" y="450" width="200" height="40" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="390" y="475" fill="#7a5415" font-weight="bold">[FFN]</text>
  </g>
  <g filter="url(#sk)" stroke="#8e5db8" stroke-width="1.3" fill="none" stroke-dasharray="5 3">
    <path d="M 690 470 L 492 470"/>
  </g>

  <text x="390" y="516" text-anchor="middle" font-size="10" fill="#888">★ = 自定义 CUDA FlashAttention kernel（Day 2 实现）· 其余 GEMM/LayerNorm 走 cuBLAS/PyTorch</text>
</svg>
