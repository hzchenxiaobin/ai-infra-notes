<svg xmlns="http://www.w3.org/2000/svg" width="840" height="320" viewBox="0 0 840 320" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="24" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="840" height="320" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="420" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">调试方法论 · 增量集成</text>
  <path d="M 270 44 Q 420 52 570 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="420" y="60" text-anchor="middle" font-size="11" fill="#888">单请求 → 多请求 → Scheduler → Kernel → 稳定性压测 · 每步只新增一个变量</text>

  <!-- 5 step boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="20"  y="100" width="152" height="100" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="96"  y="124" fill="#2b6e9e" font-weight="bold" font-size="13">Step 1</text>
    <text x="96"  y="146" fill="#2b6e9e" font-size="11">单请求正确性</text>
    <text x="96"  y="168" fill="#2b6e9e" font-size="10">MiniLLM</text>
    <text x="96"  y="188" fill="#2b6e9e" font-size="10" font-style="italic" fill="#5d3a7e">排除并发干扰</text>

    <rect x="188" y="100" width="152" height="100" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="264" y="124" fill="#2e6e2e" font-weight="bold" font-size="13">Step 2</text>
    <text x="264" y="146" fill="#2e6e2e" font-size="11">多请求并发</text>
    <text x="264" y="168" fill="#2e6e2e" font-size="10">+ Queue（Day1）</text>
    <text x="264" y="188" fill="#2e6e2e" font-size="10" font-style="italic">排除 KV Cache 干扰</text>

    <rect x="356" y="100" width="152" height="100" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="432" y="124" fill="#7a5415" font-weight="bold" font-size="13">Step 3</text>
    <text x="432" y="146" fill="#7a5415" font-size="11">加 Scheduler</text>
    <text x="432" y="168" fill="#7a5415" font-size="10">+ KV Cache（W5）</text>
    <text x="432" y="188" fill="#7a5415" font-size="10" font-style="italic">排除调度干扰</text>

    <rect x="524" y="100" width="152" height="100" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="600" y="124" fill="#5d3a7e" font-weight="bold" font-size="13">Step 4</text>
    <text x="600" y="146" fill="#5d3a7e" font-size="11">加 Kernel</text>
    <text x="600" y="168" fill="#5d3a7e" font-size="10">+ Custom（Day4）</text>
    <text x="600" y="188" fill="#5d3a7e" font-size="10" font-style="italic">排除算子干扰</text>

    <rect x="692" y="100" width="132" height="100" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="758" y="124" fill="#b85450" font-weight="bold" font-size="13">Step 5</text>
    <text x="758" y="146" fill="#b85450" font-size="11">稳定性压测</text>
    <text x="758" y="168" fill="#b85450" font-size="10">全部组件</text>
    <text x="758" y="188" fill="#b85450" font-size="10" font-style="italic">500+ 请求</text>
  </g>

  <!-- arrows between steps -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 174 150 L 186 150" marker-end="url(#ar)"/>
    <path d="M 342 150 L 354 150" marker-end="url(#ar)"/>
    <path d="M 510 150 L 522 150" marker-end="url(#ar)"/>
    <path d="M 678 150 L 690 150" marker-end="url(#ar)"/>
  </g>

  <!-- rationale box -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="40" y="232" width="760" height="62" rx="10" fill="#fdfcf7" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="420" y="254" fill="#2b2b2b" font-weight="bold">核心原则</text>
    <text x="420" y="272" fill="#5a5a5a">每步只新增一个变量，出错时能精确定位是哪个组件的问题</text>
    <text x="420" y="288" fill="#888" font-size="10" font-style="italic">⚠ 反例：一次性集成所有组件 → "请求 3 结果错了" 无法判断是 KV Cache 串台 / Scheduler 错误 / Kernel 精度</text>
  </g>

  <text x="420" y="310" text-anchor="middle" font-size="9" fill="#aaa">逐层叠加 · 控制变量 · 精确定位</text>
</svg>
