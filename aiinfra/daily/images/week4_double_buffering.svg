<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" viewBox="0 0 780 380" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="48" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="380" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">单缓冲 vs 双缓冲（FlashAttention cp_async）</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">官方用 cp_async + 双缓冲掩盖 global→shared 加载延迟</text>

  <!-- ====== Single buffer (sequential) ====== -->
  <text x="40" y="108" font-size="13" font-weight="bold" fill="#7a2828">单缓冲</text>
  <text x="40" y="124" font-size="10" fill="#888">Day 2 手写版</text>
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="120" y="92" width="130" height="32" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="185" y="112" fill="#7a2828">Load Tile 0</text>
    <rect x="270" y="92" width="130" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="335" y="112" fill="#7a5415">Compute Tile 0</text>
    <rect x="420" y="92" width="130" height="32" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="485" y="112" fill="#7a2828">Load Tile 1</text>
    <rect x="570" y="92" width="130" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="635" y="112" fill="#7a5415">Compute Tile 1</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 252 108 L 268 108" marker-end="url(#ar)"/>
    <path d="M 402 108 L 418 108" marker-end="url(#ar)"/>
    <path d="M 552 108 L 568 108" marker-end="url(#ar)"/>
  </g>
  <text x="390" y="146" text-anchor="middle" font-size="10" fill="#b85450">▲ Load 期间 SM 空闲 · 总耗时 = Σ(Load + Compute)</text>

  <!-- divider -->
  <path d="M 40 166 L 740 166" stroke="#888" stroke-width="1.2" stroke-dasharray="5 4" fill="none" filter="url(#sk)"/>

  <!-- ====== Double buffer (overlapped) ====== -->
  <text x="40" y="206" font-size="13" font-weight="bold" fill="#2e6e2e">双缓冲</text>
  <text x="40" y="222" font-size="10" fill="#888">官方 cp_async</text>

  <!-- Load track -->
  <text x="110" y="248" text-anchor="end" font-size="10" font-weight="bold" fill="#2b6e9e">Load</text>
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="120" y="232" width="140" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="190" y="250" fill="#2b6e9e">Load Tile 0 → Buf0</text>
    <rect x="260" y="232" width="140" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="330" y="250" fill="#2b6e9e">Load Tile 1 → Buf1</text>
    <rect x="400" y="232" width="140" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="470" y="250" fill="#2b6e9e">Load Tile 2 → Buf0</text>
  </g>

  <!-- Compute track (offset to overlap) -->
  <text x="110" y="286" text-anchor="end" font-size="10" font-weight="bold" fill="#2e6e2e">Compute</text>
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="260" y="270" width="140" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="330" y="288" fill="#2e6e2e">Compute Buf0</text>
    <rect x="400" y="270" width="140" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="470" y="288" fill="#2e6e2e">Compute Buf1</text>
    <rect x="540" y="270" width="140" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="610" y="288" fill="#2e6e2e">Compute Buf0</text>
  </g>

  <!-- overlap brackets -->
  <g filter="url(#sk)" fill="none" stroke="#8e5db8" stroke-width="1.2">
    <path d="M 262 220 L 262 214 L 400 214 L 400 220"/>
    <path d="M 402 220 L 402 214 L 540 214 L 540 220"/>
  </g>
  <text x="331" y="210" text-anchor="middle" font-size="9" fill="#8e5db8" font-weight="bold">overlap</text>
  <text x="471" y="210" text-anchor="middle" font-size="9" fill="#8e5db8" font-weight="bold">overlap</text>

  <!-- time arrows Load -> Compute -->
  <g filter="url(#sk)">
    <path d="M 262 246 L 260 270" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
    <path d="M 402 246 L 400 270" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  </g>

  <text x="390" y="324" text-anchor="middle" font-size="10" fill="#2e6e2e">▲ Compute 与 Load 重叠 · 掩盖传输延迟 · Buf0/Buf1 交替使用</text>
  <text x="390" y="344" text-anchor="middle" font-size="10" fill="#888">总耗时 ≈ max(Load, Compute) × N · 流水线稳定后每个 tile 只花 max 两者的时间</text>
  <text x="390" y="362" text-anchor="middle" font-size="9" fill="#aaa">需要 Blackwell+（CC 12.0）cp_async · 多消耗一倍 smem（可能降 occupancy）</text>
</svg>
