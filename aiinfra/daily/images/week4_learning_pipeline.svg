<svg xmlns="http://www.w3.org/2000/svg" width="780" height="290" viewBox="0 0 780 290" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="77" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="290" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Week 4 学习主线</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">FlashAttention 论文 → 手写 Kernel → 读源码 → FA2 改进 → 集成引擎 → 性能对比 → IO 优化方法论</text>

  <!-- Row 1: 4 boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="30"  y="90" width="160" height="60" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="110" y="114" fill="#2b6e9e" font-weight="bold" font-size="12">Day 1</text>
    <text x="110" y="134" fill="#2b6e9e">FlashAttention</text>
    <text x="110" y="146" fill="#2b6e9e" font-size="10">论文精读</text>

    <rect x="220" y="90" width="160" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="300" y="114" fill="#2e6e2e" font-weight="bold" font-size="12">Day 1</text>
    <text x="300" y="134" fill="#2e6e2e">Online Softmax</text>
    <text x="300" y="146" fill="#2e6e2e" font-size="10">三公式</text>

    <rect x="410" y="90" width="160" height="60" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="490" y="114" fill="#7a5415" font-weight="bold" font-size="12">Day 2</text>
    <text x="490" y="134" fill="#7a5415">手写完整</text>
    <text x="490" y="146" fill="#7a5415" font-size="10">Forward Kernel</text>

    <rect x="600" y="90" width="160" height="60" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="680" y="114" fill="#b85450" font-weight="bold" font-size="12">Day 3</text>
    <text x="680" y="134" fill="#b85450">读官方源码</text>
    <text x="680" y="146" fill="#b85450" font-size="10">找差距</text>
  </g>

  <!-- arrows row 1 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 192 120 L 218 120" marker-end="url(#ar)"/>
    <path d="M 382 120 L 408 120" marker-end="url(#ar)"/>
    <path d="M 572 120 L 598 120" marker-end="url(#ar)"/>
  </g>

  <!-- wrap arrow row1 -> row2 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 680 152 L 680 178 Q 680 188 670 188 L 120 188 Q 110 188 110 198 L 110 212" marker-end="url(#ar)"/>
  </g>

  <!-- Row 2: 4 boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="30"  y="216" width="160" height="60" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="110" y="240" fill="#5d3a7e" font-weight="bold" font-size="12">Day 4</text>
    <text x="110" y="260" fill="#5d3a7e">FA2 改进</text>
    <text x="110" y="272" fill="#5d3a7e" font-size="10">work partition</text>

    <rect x="220" y="216" width="160" height="60" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="300" y="240" fill="#2b6e9e" font-weight="bold" font-size="12">Day 5</text>
    <text x="300" y="260" fill="#2b6e9e">集成到 Mini 引擎</text>
    <text x="300" y="272" fill="#2b6e9e" font-size="10">C++ Extension</text>

    <rect x="410" y="216" width="160" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="490" y="240" fill="#2e6e2e" font-weight="bold" font-size="12">Day 6</text>
    <text x="490" y="260" fill="#2e6e2e">性能对比验证</text>
    <text x="490" y="272" fill="#2e6e2e" font-size="10">3-way benchmark</text>

    <rect x="600" y="216" width="160" height="60" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="680" y="240" fill="#7a5415" font-weight="bold" font-size="12">Day 7</text>
    <text x="680" y="260" fill="#7a5415">IO 优化方法论</text>
    <text x="680" y="272" fill="#7a5415" font-size="10">六大策略</text>
  </g>

  <!-- arrows row 2 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 192 246 L 218 246" marker-end="url(#ar)"/>
    <path d="M 382 246 L 408 246" marker-end="url(#ar)"/>
    <path d="M 572 246 L 598 246" marker-end="url(#ar)"/>
  </g>
</svg>
