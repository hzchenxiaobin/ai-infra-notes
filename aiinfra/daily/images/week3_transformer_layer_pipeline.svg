<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="800" height="300" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 单层算子执行流水线</text>
  <path d="M 260 44 Q 400 52 540 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="400" y="60" text-anchor="middle" font-size="11" fill="#888">按依赖顺序串行执行 · LayerNorm/Softmax 为 memory-bound，GEMM 随 M 切换 bound</text>

  <!-- Row 1: 6 boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="20"  y="92" width="118" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="79" y="115" fill="#2b6e9e" font-weight="bold">LayerNorm1</text>
    <text x="79" y="131" fill="#2b6e9e" font-size="9">memory-bound</text>

    <rect x="158" y="92" width="118" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="217" y="115" fill="#7a5415" font-weight="bold">QKV GEMM</text>
    <text x="217" y="131" fill="#7a5415" font-size="9">compute / memory</text>

    <rect x="296" y="92" width="138" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="365" y="112" fill="#2e6e2e" font-weight="bold">Attention</text>
    <text x="365" y="128" fill="#2e6e2e" font-size="9">QK^T → Softmax → PV</text>

    <rect x="454" y="92" width="118" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="513" y="115" fill="#7a5415" font-weight="bold">Out GEMM</text>
    <text x="513" y="131" fill="#7a5415" font-size="9">compute / memory</text>

    <rect x="592" y="92" width="90" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="637" y="115" fill="#7a5415" font-weight="bold">Residual</text>
    <text x="637" y="131" fill="#7a5415" font-size="9">add</text>

    <rect x="702" y="92" width="80" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="742" y="115" fill="#2b6e9e" font-weight="bold">Layer-</text>
    <text x="742" y="131" fill="#2b6e9e" font-size="9">Norm2</text>
  </g>

  <!-- arrows row 1 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 140 117 L 156 117" marker-end="url(#ar)"/>
    <path d="M 278 117 L 294 117" marker-end="url(#ar)"/>
    <path d="M 436 117 L 452 117" marker-end="url(#ar)"/>
    <path d="M 574 117 L 590 117" marker-end="url(#ar)"/>
    <path d="M 684 117 L 700 117" marker-end="url(#ar)"/>
  </g>

  <!-- wrap arrow row1 -> row2 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 742 142 L 742 176 Q 742 186 732 186 L 90 186 Q 80 186 80 196 L 80 214" marker-end="url(#ar)"/>
  </g>

  <!-- Row 2: 5 boxes -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="20"  y="218" width="130" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="85" y="241" fill="#7a5415" font-weight="bold">FFN GEMM1</text>
    <text x="85" y="257" fill="#7a5415" font-size="9">compute / memory</text>

    <rect x="170" y="218" width="100" height="50" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="220" y="241" fill="#2b6e9e" font-weight="bold">GELU</text>
    <text x="220" y="257" fill="#2b6e9e" font-size="9">memory-bound</text>

    <rect x="290" y="218" width="130" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="355" y="241" fill="#7a5415" font-weight="bold">FFN GEMM2</text>
    <text x="355" y="257" fill="#7a5415" font-size="9">compute / memory</text>

    <rect x="440" y="218" width="100" height="50" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="490" y="241" fill="#7a5415" font-weight="bold">Residual</text>
    <text x="490" y="257" fill="#7a5415" font-size="9">add</text>

    <rect x="560" y="218" width="140" height="50" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="630" y="241" fill="#5d3a7e" font-weight="bold">下一层</text>
    <text x="630" y="257" fill="#5d3a7e" font-size="9">循环 N_layers 次</text>
  </g>

  <!-- arrows row 2 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 152 243 L 168 243" marker-end="url(#ar)"/>
    <path d="M 272 243 L 288 243" marker-end="url(#ar)"/>
    <path d="M 422 243 L 438 243" marker-end="url(#ar)"/>
    <path d="M 542 243 L 558 243" marker-end="url(#ar)"/>
  </g>
</svg>
