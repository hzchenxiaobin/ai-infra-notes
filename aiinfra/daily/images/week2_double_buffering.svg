<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" viewBox="0 0 780 380" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="380" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">单缓冲 vs 双缓冲（软件流水线）</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">声明两份 shared memory buffer · 奇偶 tile 交替使用</text>

  <!-- ====== Single buffer (sequential) ====== -->
  <text x="40" y="118" font-size="13" font-weight="bold" fill="#7a2828">单缓冲</text>
  <text x="40" y="134" font-size="10" fill="#888">顺序执行</text>
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="140" y="96" width="120" height="32" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="200" y="116" fill="#7a2828">Load Tile 0</text>
    <rect x="280" y="96" width="120" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="340" y="116" fill="#7a5415">Compute Tile 0</text>
    <rect x="420" y="96" width="120" height="32" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="480" y="116" fill="#7a2828">Load Tile 1</text>
    <rect x="560" y="96" width="120" height="32" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="620" y="116" fill="#7a5415">Compute Tile 1</text>
  </g>
  <g filter="url(#sk)">
    <path d="M 262 112 L 278 112" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
    <path d="M 402 112 L 418 112" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
    <path d="M 542 112 L 558 112" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)"/>
  </g>
  <text x="390" y="150" text-anchor="middle" font-size="10" fill="#b85450">▲ 空闲等待 · Load 不能被 Compute 掩盖 · 总耗时 = Σ(Load + Compute)</text>

  <!-- divider -->
  <path d="M 40 170 L 740 170" stroke="#888" stroke-width="1.2" stroke-dasharray="5 4" fill="none" filter="url(#sk)"/>

  <!-- ====== Double buffer (overlapped) ====== -->
  <text x="40" y="210" font-size="13" font-weight="bold" fill="#2e6e2e">双缓冲</text>
  <text x="40" y="226" font-size="10" fill="#888">Load/Compute 并行</text>

  <!-- track labels -->
  <text x="120" y="248" text-anchor="end" font-size="10" font-weight="bold" fill="#2b6e9e">Load</text>
  <text x="120" y="286" text-anchor="end" font-size="10" font-weight="bold" fill="#2e6e2e">Compute</text>

  <!-- Load track: Load0→Buf0, Load1→Buf1, Load2→Buf0 -->
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="140" y="232" width="120" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="200" y="250" fill="#2b6e9e">Load 0 → Buf0</text>
    <rect x="260" y="232" width="120" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="320" y="250" fill="#2b6e9e">Load 1 → Buf1</text>
    <rect x="380" y="232" width="120" height="28" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="440" y="250" fill="#2b6e9e">Load 2 → Buf0</text>
  </g>
  <!-- Compute track: Compute0, Compute1 (offset to overlap Load1, Load2) -->
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="260" y="270" width="120" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="320" y="288" fill="#2e6e2e">Compute Tile 0</text>
    <rect x="380" y="270" width="120" height="28" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="440" y="288" fill="#2e6e2e">Compute Tile 1</text>
  </g>

  <!-- overlap brackets -->
  <g filter="url(#sk)" fill="none" stroke="#8e5db8" stroke-width="1.2">
    <path d="M 262 220 L 262 214 L 380 214 L 380 220"/>
    <path d="M 382 220 L 382 214 L 500 214 L 500 220"/>
  </g>
  <text x="321" y="210" text-anchor="middle" font-size="9" fill="#8e5db8" font-weight="bold">overlap</text>
  <text x="441" y="210" text-anchor="middle" font-size="9" fill="#8e5db8" font-weight="bold">overlap</text>

  <!-- time axis arrows -->
  <g filter="url(#sk)">
    <path d="M 262 246 L 260 270" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
    <path d="M 382 246 L 380 270" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  </g>

  <text x="390" y="324" text-anchor="middle" font-size="10" fill="#2e6e2e">▲ Compute 与 Load 并行执行 · 掩盖传输延迟 · Buf0/Buf1 交替使用</text>
  <text x="390" y="344" text-anchor="middle" font-size="10" fill="#888">总耗时 ≈ max(Load, Compute) × N · 流水线稳定后每个 tile 只花 max 两者的时间</text>
  <text x="390" y="362" text-anchor="middle" font-size="9" fill="#aaa">关键：__syncthreads 位置需保证 Compute 读 Buf(n-1) 与 Load 写 Buf(n) 不冲突</text>
</svg>
