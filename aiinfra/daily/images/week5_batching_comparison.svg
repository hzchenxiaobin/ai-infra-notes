<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="500" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Static vs Continuous Batching</text>
  <path d="M 240 44 Q 380 52 520 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="60" text-anchor="middle" font-size="11" fill="#888">batch=3：A=5tok · B=12tok · C=8tok · 横轴为 iteration</text>

  <!-- iter axis -->
  <g filter="url(#sk)" stroke="#ccc" stroke-width="1" fill="none">
    <line x1="100" y1="96" x2="600" y2="96"/>
  </g>
  <g font-size="9" fill="#aaa" text-anchor="middle">
    <text x="100" y="88">iter 1</text>
    <text x="220" y="88">5</text>
    <text x="370" y="88">8</text>
    <text x="580" y="88">12</text>
    <text x="620" y="88">iter →</text>
  </g>
  <g filter="url(#sk)" stroke="#ddd" stroke-width="0.8" fill="none" stroke-dasharray="2 3">
    <line x1="220" y1="100" x2="220" y2="448"/>
    <line x1="370" y1="100" x2="370" y2="448"/>
    <line x1="580" y1="100" x2="580" y2="448"/>
  </g>

  <!-- Static Batching section -->
  <text x="80" y="128" font-size="13" font-weight="bold" fill="#b85450">Static Batching</text>
  <text x="80" y="144" font-size="10" fill="#888">A 在 iter 5 完成 → A 的 slot 空等到 iter 12（B 完成）</text>

  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <!-- A: iter 1..5 active, iter 5..12 wasted -->
    <rect x="100" y="156" width="120" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="160" y="175" fill="#2e6e2e">A · active</text>
    <rect x="220" y="156" width="360" height="30" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="400" y="175" fill="#b85450">A slot 空等（浪费 7 iter）</text>

    <!-- B: iter 1..12 active -->
    <rect x="100" y="192" width="480" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="340" y="211" fill="#2e6e2e">B · active（12 tok）</text>

    <!-- C: iter 1..8 active, iter 8..12 wasted -->
    <rect x="100" y="228" width="270" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="235" y="247" fill="#2e6e2e">C · active</text>
    <rect x="370" y="228" width="210" height="30" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="475" y="247" fill="#b85450">C slot 空等</text>
  </g>

  <!-- Continuous Batching section -->
  <text x="80" y="296" font-size="13" font-weight="bold" fill="#2e6e2e">Continuous Batching</text>
  <text x="80" y="312" font-size="10" fill="#888">A 在 iter 5 完成 → 立刻从 waiting 补入 D → slot 不浪费</text>

  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <!-- A: iter 1..5, then D fills iter 5..12 -->
    <rect x="100" y="324" width="120" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="160" y="343" fill="#2e6e2e">A · 5tok</text>
    <rect x="220" y="324" width="360" height="30" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="400" y="343" fill="#2b6e9e">D 补入（从 waiting 接力）</text>

    <rect x="100" y="360" width="480" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="340" y="379" fill="#2e6e2e">B · active（12 tok）</text>

    <rect x="100" y="396" width="270" height="30" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="235" y="415" fill="#2e6e2e">C · 8tok</text>
    <rect x="370" y="396" width="210" height="30" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="475" y="415" fill="#7a5415">E 补入</text>
  </g>

  <!-- right side indicators -->
  <text x="620" y="175" font-size="10" fill="#b85450" font-style="italic">GPU 空等</text>
  <text x="620" y="343" font-size="10" fill="#2b6e9e" font-style="italic">GPU 满载</text>

  <!-- legend -->
  <g font-size="10" fill="#666">
    <rect x="100" y="460" width="14" height="11" rx="2" fill="#eaf6ee" stroke="#4a8e4a"/>
    <text x="120" y="470">活跃请求</text>
    <rect x="200" y="460" width="14" height="11" rx="2" fill="#e8f0fa" stroke="#4a8edb"/>
    <text x="220" y="470">补入请求（D）</text>
    <rect x="320" y="460" width="14" height="11" rx="2" fill="#fef6e6" stroke="#c98a2b"/>
    <text x="340" y="470">补入请求（E）</text>
    <rect x="440" y="460" width="14" height="11" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <text x="460" y="470">空等浪费</text>
  </g>

  <text x="380" y="490" text-anchor="middle" font-size="10" fill="#5d3a7e">吞吐提升 2-8×（请求长度方差越大，收益越大）</text>
</svg>
