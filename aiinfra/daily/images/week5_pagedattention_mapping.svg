<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">PagedAttention 逻辑→物理 block 映射</text>
  <path d="M 220 44 Q 360 52 500 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#888">逻辑连续 ↔ 物理不连续 · block table 维护映射 · seq_len=50, block_size=16</text>

  <!-- Logical view header -->
  <text x="60" y="92" font-size="12" font-weight="bold" fill="#2b6e9e">逻辑 view（序列视角，连续）</text>
  <text x="60" y="108" font-size="10" fill="#888">Seq 0：4 个逻辑 block 顺序拼接，token 连续</text>

  <!-- Logical blocks -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="80" y="120" width="130" height="56" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="145" y="142" fill="#2b6e9e" font-weight="bold">逻辑 block 0</text>
    <text x="145" y="160" fill="#2b6e9e" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">token 0..15</text>

    <rect x="215" y="120" width="130" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="280" y="142" fill="#2e6e2e" font-weight="bold">逻辑 block 1</text>
    <text x="280" y="160" fill="#2e6e2e" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">token 16..31</text>

    <rect x="350" y="120" width="130" height="56" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="415" y="142" fill="#7a5415" font-weight="bold">逻辑 block 2</text>
    <text x="415" y="160" fill="#7a5415" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">token 32..47</text>

    <rect x="485" y="120" width="130" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="550" y="142" fill="#b85450" font-weight="bold">逻辑 block 3</text>
    <text x="550" y="160" fill="#b85450" font-size="10" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">token 48..49</text>
  </g>

  <!-- Arrows down to block table -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.2" fill="none">
    <path d="M 145 178 L 145 212" marker-end="url(#ar)"/>
    <path d="M 280 178 L 280 212" marker-end="url(#ar)"/>
    <path d="M 415 178 L 415 212" marker-end="url(#ar)"/>
    <path d="M 550 178 L 550 212" marker-end="url(#ar)"/>
  </g>

  <!-- Block Table -->
  <text x="60" y="226" font-size="12" font-weight="bold" fill="#5d3a7e">Block Table for Seq 0</text>
  <g filter="url(#sk)" font-size="12" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">
    <rect x="80" y="232" width="130" height="32" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="145" y="253" fill="#5d3a7e" font-weight="bold">[0] → 7</text>
    <rect x="215" y="232" width="130" height="32" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="280" y="253" fill="#5d3a7e" font-weight="bold">[1] → 1</text>
    <rect x="350" y="232" width="130" height="32" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="415" y="253" fill="#5d3a7e" font-weight="bold">[2] → 12</text>
    <rect x="485" y="232" width="130" height="32" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="550" y="253" fill="#5d3a7e" font-weight="bold">[3] → 3</text>
  </g>
  <text x="630" y="253" font-size="11" fill="#5d3a7e" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">= [7, 1, 12, 3]</text>

  <!-- Arrows down to physical -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.2" fill="none">
    <path d="M 145 266 L 145 300" marker-end="url(#ar)"/>
    <path d="M 280 266 L 280 300" marker-end="url(#ar)"/>
    <path d="M 415 266 L 415 300" marker-end="url(#ar)"/>
    <path d="M 550 266 L 550 300" marker-end="url(#ar)"/>
  </g>

  <!-- Physical view header -->
  <text x="60" y="314" font-size="12" font-weight="bold" fill="#2e6e2e">物理 view（显存池中，散布）</text>
  <text x="60" y="330" font-size="10" fill="#888">物理 block 池（高亮为 Seq 0 占用的 4 个 block）</text>

  <!-- Physical pool: 6 cols x 2 rows = 12 blocks (numbered 0..11) + another row 12..17 -->
  <!-- Row 1: blocks 0..5 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="80"  y="340" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="125" y="365" fill="#888">blk 0</text>
    <rect x="175" y="340" width="90" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="220" y="365" fill="#2e6e2e" font-weight="bold">blk 1 ✓</text>
    <rect x="270" y="340" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="315" y="365" fill="#888">blk 2</text>
    <rect x="365" y="340" width="90" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="410" y="365" fill="#b85450" font-weight="bold">blk 3 ✓</text>
    <rect x="460" y="340" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="505" y="365" fill="#888">blk 4</text>
    <rect x="555" y="340" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="600" y="365" fill="#888">blk 5</text>

    <!-- Row 2: blocks 6..11 -->
    <rect x="80"  y="386" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="125" y="411" fill="#888">blk 6</text>
    <rect x="175" y="386" width="90" height="40" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="220" y="411" fill="#2b6e9e" font-weight="bold">blk 7 ✓</text>
    <rect x="270" y="386" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="315" y="411" fill="#888">blk 8</text>
    <rect x="365" y="386" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="410" y="411" fill="#888">blk 9</text>
    <rect x="460" y="386" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="505" y="411" fill="#888">blk 10</text>
    <rect x="555" y="386" width="90" height="40" rx="6" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <text x="600" y="411" fill="#888">blk 11</text>
  </g>

  <!-- blk 12 indicator (overflow) -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="80" y="432" width="90" height="22" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="125" y="447" fill="#7a5415" font-weight="bold">blk 12 ✓</text>
    <text x="200" y="447" font-size="10" fill="#888">…（其他空闲 block）</text>
  </g>

  <!-- bottom note -->
  <text x="360" y="450" text-anchor="middle" font-size="9" fill="#aaa">kernel 通过 block_table[lb] 间接寻址 · 每 16 token 查一次表 · amortized 开销可忽略</text>
</svg>
