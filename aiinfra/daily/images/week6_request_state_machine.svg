<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Scheduler 请求状态机</text>
  <path d="M 230 44 Q 360 52 490 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#888">WAITING → RUNNING → FINISHED / SWAPPED / RUNNING(next iter)</text>

  <!-- WAITING -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="260" y="84" width="200" height="60" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="360" y="110" fill="#2b6e9e" font-weight="bold" font-size="16">WAITING</text>
    <text x="360" y="130" fill="#2b6e9e" font-size="11">请求到达，等待调度</text>
  </g>

  <!-- arrow WAITING -> RUNNING -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 146 L 360 184" marker-end="url(#ar)"/>
  </g>
  <text x="372" y="170" font-size="10" fill="#666">scheduler 选择</text>
  <text x="372" y="182" font-size="10" fill="#666">(token budget 允许)</text>

  <!-- RUNNING -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="260" y="190" width="200" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="360" y="216" fill="#2e6e2e" font-weight="bold" font-size="16">RUNNING</text>
    <text x="360" y="236" fill="#2e6e2e" font-size="11">正在 prefill / decode</text>
  </g>

  <!-- branch lines from RUNNING -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 260 220 L 180 220 L 180 300" marker-end="url(#ar)"/>
    <path d="M 460 220 L 540 220 L 540 300" marker-end="url(#ar)"/>
    <path d="M 360 250 L 360 300" marker-end="url(#ar)"/>
  </g>

  <!-- SWAPPED (left) -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="90" y="304" width="180" height="60" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="180" y="330" fill="#b85450" font-weight="bold" font-size="15">SWAPPED</text>
    <text x="180" y="350" fill="#b85450" font-size="11">被抢占（换出 CPU）</text>
  </g>
  <text x="180" y="296" text-anchor="middle" font-size="10" fill="#b85450">显存不足</text>

  <!-- RUNNING next (center) -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="270" y="304" width="180" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="360" y="330" fill="#2e6e2e" font-weight="bold" font-size="15">RUNNING</text>
    <text x="360" y="350" fill="#2e6e2e" font-size="11">(next iter) 继续 decode</text>
  </g>
  <text x="360" y="296" text-anchor="middle" font-size="10" fill="#2e6e2e">未完成</text>

  <!-- FINISHED (right) -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="450" y="304" width="180" height="60" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="540" y="330" fill="#7a5415" font-weight="bold" font-size="15">FINISHED</text>
    <text x="540" y="350" fill="#7a5415" font-size="11">完成退出，释放 KV</text>
  </g>
  <text x="540" y="296" text-anchor="middle" font-size="10" fill="#7a5415">gen 满 / EOS</text>

  <!-- SWAPPED loop back to RUNNING -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M 90 334 Q 40 334 40 220 Q 40 160 260 200" marker-end="url(#ar)"/>
  </g>
  <text x="50" y="250" font-size="9" fill="#888" transform="rotate(-90 50 250)">显存恢复 swap in</text>

  <text x="360" y="396" text-anchor="middle" font-size="10" fill="#5d3a7e">每轮 iteration：RUNNING 完成→FINISHED · 显存压力→SWAPPED · 其余继续 RUNNING</text>
</svg>
