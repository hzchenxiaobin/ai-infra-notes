<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="720" height="440" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">请求生命周期状态流转</text>
  <path d="M 230 44 Q 360 52 490 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#888">WAITING → RUNNING → FINISHED / SWAPPED（显存不足换出，恢复后回归 RUNNING）</text>

  <!-- Request arrival -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="270" y="84" width="180" height="36" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="360" y="107" fill="#5d3a7e" font-weight="bold">请求到达 (add_request)</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 122 L 360 152" marker-end="url(#ar)"/>
  </g>

  <!-- WAITING -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="260" y="156" width="200" height="56" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="360" y="181" fill="#2b6e9e" font-weight="bold" font-size="15">WAITING</text>
    <text x="360" y="201" fill="#2b6e9e" font-size="11">等待调度</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 214 L 360 244" marker-end="url(#ar)"/>
  </g>
  <text x="372" y="234" font-size="10" fill="#666">Scheduler.schedule() 选中</text>

  <!-- RUNNING -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="260" y="248" width="200" height="56" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="360" y="273" fill="#2e6e2e" font-weight="bold" font-size="15">RUNNING</text>
    <text x="360" y="293" fill="#2e6e2e" font-size="11">执行中，每轮生成 1 token</text>
  </g>

  <!-- Right branch: RUNNING → FINISHED -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 460 276 L 540 276" marker-end="url(#ar)"/>
  </g>
  <text x="500" y="262" text-anchor="middle" font-size="10" fill="#7a5415">达到 max_tokens</text>
  <text x="500" y="274" text-anchor="middle" font-size="10" fill="#7a5415">/ 遇到 EOS</text>

  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="540" y="248" width="150" height="56" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="615" y="273" fill="#7a5415" font-weight="bold" font-size="15">FINISHED</text>
    <text x="615" y="293" fill="#7a5415" font-size="11">释放 KV cache</text>
  </g>

  <!-- Left branch: RUNNING → SWAPPED -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 260 276 L 180 276" marker-end="url(#ar)"/>
  </g>
  <text x="220" y="262" text-anchor="middle" font-size="10" fill="#b85450">显存不足</text>

  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="40" y="248" width="140" height="56" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="110" y="273" fill="#b85450" font-weight="bold" font-size="15">SWAPPED</text>
    <text x="110" y="293" fill="#b85450" font-size="11">KV 换出到 CPU</text>
  </g>

  <!-- SWAPPED back to RUNNING (curve up and right) -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none" stroke-dasharray="4 3">
    <path d="M 110 248 Q 110 180 260 220" marker-end="url(#ar)"/>
  </g>
  <text x="170" y="196" text-anchor="middle" font-size="10" fill="#888">显存恢复 → swap in</text>

  <!-- bottom notes -->
  <text x="360" y="368" text-anchor="middle" font-size="10" fill="#888">每轮 iteration：schedule() 决策哪些 WAITING 进 RUNNING · RUNNING 完成 → FINISHED · 显存压力 → SWAPPED</text>
  <text x="360" y="386" text-anchor="middle" font-size="10" fill="#888">SWAPPED 在显存恢复后通过 swap in 重新进入 RUNNING（output_len 保留 / Recomputation 则重置）</text>
  <text x="360" y="412" text-anchor="middle" font-size="9" fill="#aaa">反复 step() 直到所有请求 FINISHED · SequenceStatus 四态切换是 Scheduler 调度的核心</text>
</svg>
