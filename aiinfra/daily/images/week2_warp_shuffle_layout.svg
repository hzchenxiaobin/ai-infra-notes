    <rect x="400" y="166" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb"/><text x="423" y="182" fill="#2b6e9e">V4</text>
    <rect x="450" y="166" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb"/><text x="473" y="182" fill="#2b6e9e">V4</text>
    <rect x="500" y="166" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb"/><text x="523" y="182" fill="#2b6e9e">V4</text>
  </g>
  <text x="340" y="206" text-anchor="middle" font-size="10" fill="#2b6e9e">↑ srcLane=4 的值广播给 warp 内所有 lane</text>

