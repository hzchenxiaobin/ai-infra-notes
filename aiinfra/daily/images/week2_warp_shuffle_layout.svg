    <rect x="300" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="323" y="148" fill="#999">?</text>
    <rect x="350" y="132" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/><text x="373" y="148" fill="#2b6e9e" font-weight="bold">V4</text>
    <rect x="400" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="423" y="148" fill="#999">?</text>
    <rect x="450" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="473" y="148" fill="#999">?</text>
    <rect x="500" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="523" y="148" fill="#999">?</text>
  </g>
  <g filter="url(#sk)" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="11" text-anchor="middle">
    <rect x="150" y="166" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb"/><text x="173" y="182" fill="#2b6e9e">V4</text>
    <rect x="200" y="166" width="46" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb"/><text x="223" y="182" fill="#2b6e9e">V4</text>
