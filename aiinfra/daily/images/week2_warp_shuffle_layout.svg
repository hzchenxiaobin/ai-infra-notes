<svg xmlns="http://www.w3.org/2000/svg" width="680" height="640" viewBox="0 0 680 640" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="680" height="640" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Warp Shuffle 四原语数据流向</text>
  <path d="M 210 44 Q 340 52 470 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="340" y="60" text-anchor="middle" font-size="11" fill="#888">同一 warp 内 32 lane 通过寄存器直接交换 · 图示前 8 个 lane</text>

  <!-- ============ Section 1: __shfl_sync (broadcast) ============ -->
  <text x="40" y="96" font-size="13" font-weight="bold" fill="#2b6e9e">① __shfl_sync(mask, val, srcLane=4) — 广播</text>
  <text x="120" y="148" text-anchor="end" font-size="10" fill="#888">数据</text>
  <text x="120" y="182" text-anchor="end" font-size="10" fill="#888">结果</text>
  <g font-size="9" fill="#999" text-anchor="middle">
    <text x="173" y="126">0</text><text x="223" y="126">1</text><text x="273" y="126">2</text><text x="323" y="126">3</text>
    <text x="373" y="126">4</text><text x="423" y="126">5</text><text x="473" y="126">6</text><text x="523" y="126">7</text>
  </g>
  <g filter="url(#sk)" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="11" text-anchor="middle">
    <rect x="150" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="173" y="148" fill="#999">?</text>
    <rect x="200" y="132" width="46" height="24" rx="4" fill="#f4f4f0" stroke="#bbb"/><text x="223" y="148" fill="#999">?</text>
