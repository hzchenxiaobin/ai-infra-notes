  <text x="340" y="611" text-anchor="middle" font-size="10" fill="#5d3a7e">↑ lane i 与 lane (i^2) 互换：0↔2, 1↔3, 4↔6, 5↔7</text>

  <text x="340" y="632" text-anchor="middle" font-size="9" fill="#aaa">warp 共 32 lane · 所有交换在寄存器间完成，不经共享内存</text>
