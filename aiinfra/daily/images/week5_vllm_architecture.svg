<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="600" height="480" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="300" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">vLLM 三层分层架构</text>
  <path d="M 180 44 Q 300 52 420 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="300" y="60" text-anchor="middle" font-size="11" fill="#888">LLMEngine（接口）→ Scheduler（调度）→ Worker（执行）</text>

  <!-- User Request -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="220" y="84" width="160" height="36" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <text x="300" y="107" fill="#5d3a7e" font-weight="bold">User Request</text>
  </g>

  <!-- arrow add_request -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 300 122 L 300 152" marker-end="url(#ar)"/>
  </g>
  <text x="312" y="142" font-size="11" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">add_request()</text>

  <!-- LLMEngine -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="140" y="156" width="320" height="56" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="300" y="181" fill="#2b6e9e" font-weight="bold" font-size="15">LLMEngine</text>
    <text x="300" y="201" fill="#2b6e9e" font-size="11">对外接口，编排 step() 循环</text>
  </g>

  <!-- arrow schedule -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 300 214 L 300 244" marker-end="url(#ar)"/>
  </g>
  <text x="312" y="234" font-size="11" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">schedule()</text>

  <!-- Scheduler -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="140" y="248" width="320" height="56" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="300" y="273" fill="#2e6e2e" font-weight="bold" font-size="15">Scheduler</text>
    <text x="300" y="293" fill="#2e6e2e" font-size="11">三个队列 + 预算决策</text>
  </g>

  <!-- arrow execute_model -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 300 306 L 300 336" marker-end="url(#ar)"/>
  </g>
  <text x="312" y="326" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">execute_model(seq_group_metadata)</text>

  <!-- Worker -->
  <g filter="url(#sk)" font-size="13" text-anchor="middle">
    <rect x="140" y="340" width="320" height="56" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="300" y="365" fill="#7a5415" font-weight="bold" font-size="15">Worker</text>
    <text x="300" y="385" fill="#7a5415" font-size="11">ModelRunner.run() → 采样 → 返回 token</text>
  </g>

  <!-- side notes -->
  <text x="80" y="188" text-anchor="middle" font-size="10" fill="#4a8edb" font-style="italic">接口层</text>
  <text x="80" y="280" text-anchor="middle" font-size="10" fill="#4a8e4a" font-style="italic">调度层</text>
  <text x="80" y="372" text-anchor="middle" font-size="10" fill="#c98a2b" font-style="italic">执行层</text>

  <text x="300" y="432" text-anchor="middle" font-size="10" fill="#888">三层解耦：接口层不问调度细节 · 执行层封装硬件（可多卡 TP/PP）</text>
  <text x="300" y="450" text-anchor="middle" font-size="9" fill="#aaa">每调用一次 step()，所有 running sequence 各生成 1 个 token</text>
</svg>
