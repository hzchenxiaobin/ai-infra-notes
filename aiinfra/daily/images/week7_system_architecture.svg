<svg xmlns="http://www.w3.org/2000/svg" width="720" height="500" viewBox="0 0 720 500" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="25" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="720" height="500" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Mini AI Infra 系统架构</text>
  <path d="M 220 44 Q 360 52 500 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#888">六层架构：API → Engine → Scheduler → Kernel → KV Cache → Profiling</text>

  <!-- Layer 1: 用户 API -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="80" width="360" height="52" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="360" y="104" fill="#2b6e9e" font-weight="bold" font-size="15">用户 API</text>
    <text x="360" y="122" fill="#2b6e9e" font-size="11">submit(prompt, ...) → Future</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 132 L 360 150" marker-end="url(#ar)"/>
  </g>

  <!-- Layer 2: ConcurrentEngine -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="154" width="360" height="52" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="360" y="178" fill="#2e6e2e" font-weight="bold" font-size="15">ConcurrentEngine</text>
    <text x="360" y="196" fill="#2e6e2e" font-size="11">三线程协作 + 线程安全队列 + 生命周期管理</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 206 L 360 224" marker-end="url(#ar)"/>
  </g>

  <!-- Layer 3: FullScheduler -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="228" width="360" height="52" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="360" y="252" fill="#7a5415" font-weight="bold" font-size="15">FullScheduler</text>
    <text x="360" y="270" fill="#7a5415" font-size="11">双预算 + 抢占 + aging + Continuous Batching</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 280 L 360 298" marker-end="url(#ar)"/>
  </g>

  <!-- Layer 4: Custom Kernel -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="302" width="360" height="52" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="360" y="326" fill="#b85450" font-weight="bold" font-size="15">Custom Kernel</text>
    <text x="360" y="344" fill="#b85450" font-size="11">Softmax / LayerNorm / FlashAttention（C++ Extension）</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 354 L 360 372" marker-end="url(#ar)"/>
  </g>

  <!-- Layer 5: KV Cache -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="376" width="360" height="52" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="360" y="400" fill="#5d3a7e" font-weight="bold" font-size="15">KV Cache</text>
    <text x="360" y="418" fill="#5d3a7e" font-size="11">Block 级分配/释放 + PagedAttention 模拟</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.4" fill="none">
    <path d="M 360 428 L 360 446" marker-end="url(#ar)"/>
  </g>

  <!-- Layer 6: Profiling -->
  <g filter="url(#sk)" font-size="12" text-anchor="middle">
    <rect x="180" y="450" width="360" height="40" rx="10" fill="#fdfcf7" stroke="#5a5a5a" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="360" y="468" fill="#2b2b2b" font-weight="bold" font-size="13">Profiling</text>
    <text x="360" y="482" fill="#5a5a5a" font-size="10">nsys / ncu / 阶段计时 + vLLM 对比</text>
  </g>

  <!-- right-side layer labels -->
  <g font-size="10" fill="#888" text-anchor="start">
    <text x="560" y="110">接口层</text>
    <text x="560" y="184">运行时</text>
    <text x="560" y="258">调度层</text>
    <text x="560" y="332">算子层</text>
    <text x="560" y="406">存储层</text>
    <text x="560" y="472">观测层</text>
  </g>
</svg>
