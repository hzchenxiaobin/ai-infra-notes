<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Dynamic vs Continuous Batching</text>
  <path d="M 250 44 Q 400 52 550 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="400" y="60" text-anchor="middle" font-size="11" fill="#888">request-level（整批） vs iteration-level（每轮）</text>

  <!-- Dynamic Batching row -->
  <text x="40" y="120" font-size="14" font-weight="bold" fill="#b85450">Dynamic</text>
  <text x="40" y="138" font-size="10" fill="#888">Day1 · request-level</text>

  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="120" y="92" width="120" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="180" y="116" fill="#b85450" font-weight="bold">请求入队</text>
    <text x="180" y="134" fill="#b85450" font-size="9">submit</text>

    <rect x="252" y="92" width="120" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="312" y="116" fill="#b85450" font-weight="bold">等满/超时</text>
    <text x="312" y="134" fill="#b85450" font-size="9">凑批</text>

    <rect x="384" y="92" width="120" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="444" y="116" fill="#b85450" font-weight="bold">整批 forward</text>
    <text x="444" y="134" fill="#b85450" font-size="9">padding</text>

    <rect x="516" y="92" width="120" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="576" y="116" fill="#b85450" font-weight="bold">整批完成</text>
    <text x="576" y="134" fill="#b85450" font-size="9">一起结束</text>

    <rect x="648" y="92" width="120" height="56" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <text x="708" y="116" fill="#b85450" font-weight="bold">下一批</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 242 120 L 250 120" marker-end="url(#ar)"/>
    <path d="M 374 120 L 382 120" marker-end="url(#ar)"/>
    <path d="M 506 120 L 514 120" marker-end="url(#ar)"/>
    <path d="M 638 120 L 646 120" marker-end="url(#ar)"/>
  </g>
  <!-- loop back to 下一批 -> 请求入队 -->
  <g filter="url(#sk)" stroke="#b85450" stroke-width="1.2" fill="none" stroke-dasharray="4 3">
    <path d="M 708 148 L 708 168 L 180 168 L 180 148" marker-end="url(#ar)"/>
  </g>

  <text x="400" y="186" text-anchor="middle" font-size="11" fill="#b85450" font-style="italic">⚠ 问题：长请求阻塞短请求 · batch 内所有请求一起结束 · slot 空等</text>

  <!-- Continuous Batching row -->
  <text x="40" y="260" font-size="14" font-weight="bold" fill="#2e6e2e">Continuous</text>
  <text x="40" y="278" font-size="10" fill="#888">Day2 · iteration-level</text>

  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="120" y="232" width="150" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="195" y="256" fill="#2e6e2e" font-weight="bold">每轮 iteration</text>
    <text x="195" y="274" fill="#2e6e2e" font-size="9">重建 batch</text>

    <rect x="282" y="232" width="160" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="362" y="252" fill="#2e6e2e" font-weight="bold">保留 running</text>
    <text x="362" y="268" fill="#2e6e2e" font-size="9">+ 补入 waiting</text>
    <text x="362" y="282" fill="#2e6e2e" font-size="9">完成即退</text>

    <rect x="454" y="232" width="150" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="529" y="256" fill="#2e6e2e" font-weight="bold">forward 1 步</text>
    <text x="529" y="274" fill="#2e6e2e" font-size="9">decode 1 token</text>

    <rect x="616" y="232" width="150" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="691" y="256" fill="#2e6e2e" font-weight="bold">完成的退出</text>
    <text x="691" y="274" fill="#2e6e2e" font-size="9">释放 slot</text>
  </g>

  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 272 260 L 280 260" marker-end="url(#ar)"/>
    <path d="M 444 260 L 452 260" marker-end="url(#ar)"/>
    <path d="M 606 260 L 614 260" marker-end="url(#ar)"/>
  </g>
  <!-- loop back to next iteration -->
  <g filter="url(#sk)" stroke="#4a8e4a" stroke-width="1.2" fill="none" stroke-dasharray="4 3">
    <path d="M 691 288 L 691 308 L 195 308 L 195 288" marker-end="url(#ar)"/>
  </g>
  <text x="443" y="324" text-anchor="middle" font-size="9" fill="#2e6e2e">下一轮 iteration</text>

  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#2e6e2e" font-style="italic">✓ 优势：短请求完成即走 · 新请求随时插入 · GPU 始终满载（吞吐 2-8x）</text>

  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#5d3a7e">调度粒度：request-level（整批） → iteration-level（每轮）是 LLM 推理的关键跃迁</text>
</svg>
