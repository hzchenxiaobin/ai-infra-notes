<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="440" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Continuous Batching 迭代时间线</text>
  <path d="M 250 44 Q 390 52 530 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">Time 0-5：S1/S2 同时 prefill · S3/S4 随时加入 · 完成即退出</text>

  <!-- Time axis header -->
  <g filter="url(#sk)" stroke="#ccc" stroke-width="1" fill="none">
    <line x1="120" y1="100" x2="730" y2="100"/>
  </g>
  <g font-size="11" fill="#888" text-anchor="middle">
    <text x="176" y="92">Time 0</text>
    <text x="276" y="92">Time 1</text>
    <text x="376" y="92">Time 2</text>
    <text x="476" y="92">Time 3</text>
    <text x="576" y="92">Time 4</text>
    <text x="676" y="92">Time 5</text>
  </g>
  <g filter="url(#sk)" stroke="#ddd" stroke-width="0.8" fill="none" stroke-dasharray="2 3">
    <line x1="226" y1="104" x2="226" y2="372"/>
    <line x1="326" y1="104" x2="326" y2="372"/>
    <line x1="426" y1="104" x2="426" y2="372"/>
    <line x1="526" y1="104" x2="526" y2="372"/>
    <line x1="626" y1="104" x2="626" y2="372"/>
  </g>

  <!-- Lane labels -->
  <g font-size="12" fill="#444" text-anchor="end">
    <text x="110" y="142" font-weight="bold">S1 (gen=4)</text>
    <text x="110" y="198" font-weight="bold">S2 (长)</text>
    <text x="110" y="254" font-weight="bold">S3 (gen=3)</text>
    <text x="110" y="310" font-weight="bold">S4</text>
  </g>

  <!-- S1 row: prefill, decode, decode, exit, -, - -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="128" y="124" width="96" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="176" y="142" fill="#7a5415" font-weight="bold">S1 prefill</text>
    <text x="176" y="156" fill="#7a5415" font-size="9">建立 KV</text>

    <rect x="228" y="124" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="276" y="149" fill="#2e6e2e">S1 decode</text>

    <rect x="328" y="124" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="376" y="149" fill="#2e6e2e">S1 decode</text>

    <rect x="428" y="124" width="96" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="476" y="149" fill="#b85450">S1 退出</text>
  </g>

  <!-- S2 row: prefill, decode x5 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="128" y="180" width="96" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="176" y="198" fill="#7a5415" font-weight="bold">S2 prefill</text>
    <text x="176" y="212" fill="#7a5415" font-size="9">建立 KV</text>

    <rect x="228" y="180" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="276" y="205" fill="#2e6e2e">S2 decode</text>

    <rect x="328" y="180" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="376" y="205" fill="#2e6e2e">S2 decode</text>

    <rect x="428" y="180" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="476" y="205" fill="#2e6e2e">S2 decode</text>

    <rect x="528" y="180" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="576" y="205" fill="#2e6e2e">S2 decode</text>

    <rect x="628" y="180" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="676" y="205" fill="#2e6e2e">S2 decode</text>
  </g>

  <!-- S3 row: -, -, prefill, decode, decode, exit -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="328" y="236" width="96" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="376" y="254" fill="#7a5415" font-weight="bold">S3 prefill</text>
    <text x="376" y="268" fill="#7a5415" font-size="9">立刻加入</text>

    <rect x="428" y="236" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="476" y="261" fill="#2e6e2e">S3 decode</text>

    <rect x="528" y="236" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="576" y="261" fill="#2e6e2e">S3 decode</text>

    <rect x="628" y="236" width="96" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="676" y="261" fill="#b85450">S3 退出</text>
  </g>
  <!-- S3 arrival marker at Time 2 -->
  <text x="376" y="226" text-anchor="middle" font-size="9" fill="#7a5415" font-style="italic">↑ 新请求到达</text>

  <!-- S4 row: -, -, -, -, prefill, decode -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="528" y="292" width="96" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <text x="576" y="310" fill="#7a5415" font-weight="bold">S4 prefill</text>
    <text x="576" y="324" fill="#7a5415" font-size="9">填入 S1 slot</text>

    <rect x="628" y="292" width="96" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="676" y="317" fill="#2e6e2e">S4 decode</text>
  </g>
  <text x="576" y="282" text-anchor="middle" font-size="9" fill="#7a5415" font-style="italic">↑ 新请求到达</text>

  <!-- batch size indicator -->
  <g font-size="10" fill="#666" text-anchor="middle">
    <text x="176" y="358">batch=2</text>
    <text x="276" y="358">batch=2</text>
    <text x="376" y="358">batch=3</text>
    <text x="476" y="358">batch=2</text>
    <text x="576" y="358">batch=3</text>
    <text x="676" y="358">batch=2</text>
  </g>

  <!-- legend -->
  <g font-size="10" fill="#666">
    <rect x="128" y="390" width="14" height="11" rx="2" fill="#fef6e6" stroke="#c98a2b"/>
    <text x="148" y="400">prefill</text>
    <rect x="210" y="390" width="14" height="11" rx="2" fill="#eaf6ee" stroke="#4a8e4a"/>
    <text x="230" y="400">decode</text>
    <rect x="290" y="390" width="14" height="11" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <text x="310" y="400">完成退出</text>
  </g>

  <text x="390" y="425" text-anchor="middle" font-size="10" fill="#5d3a7e">batch size 动态变化 2→2→3→2→3→2 · 短请求完成即退、新请求随时插入 · GPU 不空等</text>
</svg>
