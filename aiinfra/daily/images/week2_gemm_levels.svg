<svg xmlns="http://www.w3.org/2000/svg" width="820" height="600" viewBox="0 0 820 600" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="18" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="820" height="600" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">GEMM 优化层次全景（Level 0 → 6）</text>
  <path d="M 270 44 Q 410 52 550 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="410" y="60" text-anchor="middle" font-size="11" fill="#888">从 Naive 到 Tensor Core · 每一级叠加前一层的优化</text>

  <!-- ====== Level 0: Naive (~1%) red ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="75" width="700" height="64" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <rect x="60" y="75" width="68" height="64" rx="8" fill="#b85450"/>
  </g>
  <text x="94" y="103" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="123" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">0</text>
  <text x="140" y="97" font-size="13" font-weight="bold" fill="#7a2828">Naive GEMM</text>
  <text x="140" y="115" font-size="10" fill="#666">每线程算一个元素，直接访问 Global Memory</text>
  <text x="140" y="131" font-size="10" fill="#7a2828" font-style="italic">关键：基线实现 · 无复用</text>
  <text x="790" y="105" text-anchor="end" font-size="16" font-weight="bold" fill="#b85450">~1%</text>
  <text x="790" y="123" text-anchor="end" font-size="9" fill="#999">基线</text>

  <!-- ====== Level 1: SM Tiling (~15%) orange ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="144" width="700" height="64" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="60" y="144" width="68" height="64" rx="8" fill="#c98a2b"/>
  </g>
  <text x="94" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="192" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">1</text>
  <text x="140" y="166" font-size="13" font-weight="bold" fill="#7a5415">Shared Memory Tiling</text>
  <text x="140" y="184" font-size="10" fill="#666">A/B tile 预取到 Shared Memory，K 维复用</text>
  <text x="140" y="200" font-size="10" fill="#7a5415" font-style="italic">关键：协作加载 + __syncthreads</text>
  <text x="790" y="174" text-anchor="end" font-size="16" font-weight="bold" fill="#c98a2b">~15%</text>
  <text x="790" y="192" text-anchor="end" font-size="9" fill="#999">Day 1 基础</text>

  <!-- ====== Level 2: Register Blocking (~45%) orange ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="213" width="700" height="64" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="60" y="213" width="68" height="64" rx="8" fill="#c98a2b"/>
  </g>
  <text x="94" y="241" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="261" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">2</text>
  <text x="140" y="235" font-size="13" font-weight="bold" fill="#7a5415">Register Blocking</text>
  <text x="140" y="253" font-size="10" fill="#666">每线程算 TM×TN 子块，acc 驻留寄存器</text>
  <text x="140" y="269" font-size="10" fill="#7a5415" font-style="italic">关键：threadRow/threadCol 映射 + r_A/r_B</text>
  <text x="790" y="243" text-anchor="end" font-size="16" font-weight="bold" fill="#c98a2b">~45%</text>
  <text x="790" y="261" text-anchor="end" font-size="9" fill="#999">Day 2</text>

  <!-- ====== Level 3: Vectorized Load (~55%) green ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="282" width="700" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="60" y="282" width="68" height="64" rx="8" fill="#4a8e4a"/>
  </g>
  <text x="94" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">3</text>
  <text x="140" y="304" font-size="13" font-weight="bold" fill="#2e6e2e">Vectorized Load</text>
  <text x="140" y="322" font-size="10" fill="#666">float4 做 128-bit Global Memory 加载</text>
  <text x="140" y="338" font-size="10" fill="#2e6e2e" font-style="italic">关键：地址 16 字节对齐</text>
  <text x="790" y="312" text-anchor="end" font-size="16" font-weight="bold" fill="#4a8e4a">~55%</text>
  <text x="790" y="330" text-anchor="end" font-size="9" fill="#999">Day 6</text>

  <!-- ====== Level 4: Warp-level Optimize (~60%) green ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="351" width="700" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="60" y="351" width="68" height="64" rx="8" fill="#4a8e4a"/>
  </g>
  <text x="94" y="379" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="399" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">4</text>
  <text x="140" y="373" font-size="13" font-weight="bold" fill="#2e6e2e">Warp-level Optimize</text>
  <text x="140" y="391" font-size="10" fill="#666">Warp Shuffle 协作 + 优化写回</text>
  <text x="140" y="407" font-size="10" fill="#2e6e2e" font-style="italic">关键：__shfl_xor_sync 减少非合并访问</text>
  <text x="790" y="381" text-anchor="end" font-size="16" font-weight="bold" fill="#4a8e4a">~60%</text>
  <text x="790" y="399" text-anchor="end" font-size="9" fill="#999">Day 1+6</text>

  <!-- ====== Level 5: Double Buffering (~70%) green ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="420" width="700" height="64" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="60" y="420" width="68" height="64" rx="8" fill="#4a8e4a"/>
  </g>
  <text x="94" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="468" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">5</text>
  <text x="140" y="442" font-size="13" font-weight="bold" fill="#2e6e2e">Double Buffering</text>
  <text x="140" y="460" font-size="10" fill="#666">两份 Shared Memory 交替，计算掩盖传输</text>
  <text x="140" y="476" font-size="10" fill="#2e6e2e" font-style="italic">关键：软件流水线 + __syncthreads 位置</text>
  <text x="790" y="450" text-anchor="end" font-size="16" font-weight="bold" fill="#4a8e4a">~70%</text>
  <text x="790" y="468" text-anchor="end" font-size="9" fill="#999">Day 6</text>

  <!-- ====== Level 6: Tensor Core (~90%+) purple ====== -->
  <g filter="url(#sk)">
    <rect x="60" y="489" width="700" height="64" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
    <rect x="60" y="489" width="68" height="64" rx="8" fill="#8e5db8"/>
  </g>
  <text x="94" y="517" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Level</text>
  <text x="94" y="537" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">6</text>
  <text x="140" y="511" font-size="13" font-weight="bold" fill="#5d3a7e">Tensor Core / CUTLASS</text>
  <text x="140" y="529" font-size="10" fill="#666">WMMA 指令调用 Tensor Core</text>
  <text x="140" y="545" font-size="10" fill="#5d3a7e" font-style="italic">关键：超出本周范围 · 硬件级矩阵加速</text>
  <text x="790" y="519" text-anchor="end" font-size="16" font-weight="bold" fill="#8e5db8">~90%+</text>
  <text x="790" y="537" text-anchor="end" font-size="9" fill="#999">超出本周</text>

  <!-- bottom note -->
  <text x="410" y="578" text-anchor="middle" font-size="10" fill="#888">每一级叠加前一层的优化 · 颜色由红→橙→绿→紫表示性能从低到高</text>
  <text x="410" y="594" text-anchor="middle" font-size="9" fill="#aaa">本周覆盖 Level 0-5 · Level 6 需学习 WMMA / CUTLASS</text>
</svg>
