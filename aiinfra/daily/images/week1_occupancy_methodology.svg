<svg xmlns="http://www.w3.org/2000/svg" width="620" height="470" viewBox="0 0 620 470" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="620" height="470" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Occupancy 计算方法论</text>
  <path d="M 180 44 Q 310 52 440 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="310" y="60" text-anchor="middle" font-size="11" fill="#888">认识你的 GPU → 建立理论上限 → 算 Occupancy → 验证</text>

  <!-- Step 1 -->
  <g filter="url(#sk)">
    <rect x="80" y="80" width="460" height="64" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="100" y="108" font-size="13" font-weight="bold" fill="#2b6e9e">① 运行 deviceQuery</text>
  <text x="100" y="128" font-size="11" fill="#666">查 GPU 硬件参数（SM 数 / 寄存器 / 共享内存 / 带宽 / 算力）</text>

  <path d="M 310 146 L 310 173" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 2 -->
  <g filter="url(#sk)">
    <rect x="80" y="175" width="460" height="64" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="100" y="203" font-size="13" font-weight="bold" fill="#2e6e2e">② 计算峰值算力 + 显存带宽</text>
  <text x="100" y="223" font-size="11" fill="#666">建立理论上限直觉（Roofline 的两个端点）</text>

  <path d="M 310 241 L 310 268" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 3 -->
  <g filter="url(#sk)">
    <rect x="80" y="270" width="460" height="64" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="100" y="298" font-size="13" font-weight="bold" fill="#7a5415">③ 用 Occupancy Calculator 算理论 Occupancy</text>
  <text x="100" y="318" font-size="11" fill="#666">四步法：寄存器 / 共享内存 / block size / 取最小值</text>

  <path d="M 310 336 L 310 363" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 4 -->
  <g filter="url(#sk)">
    <rect x="80" y="365" width="460" height="64" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
  </g>
  <text x="100" y="393" font-size="13" font-weight="bold" fill="#5d3a7e">④ 手算练习 + occupancy_verify.cu 验证</text>
  <text x="100" y="413" font-size="11" fill="#666">理论 vs. 实测对比 · 建立量化手感</text>

  <text x="310" y="454" text-anchor="middle" font-size="10" fill="#aaa">只有「认识你的 GPU」 · 后续调优才有依据</text>
</svg>
