<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="14" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="440" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">FlashAttention 分块计算结构</text>
  <path d="M 240 44 Q 380 52 520 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="60" text-anchor="middle" font-size="11" fill="#888">Q tile 驻留 SRAM · K/V tile 逐块滑入 · 在线更新 softmax 与输出累加</text>

  <!-- Outer box: Attention Output O -->
  <g filter="url(#sk)">
    <rect x="60" y="78" width="640" height="242" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
  </g>
  <text x="80" y="100" font-size="13" font-weight="bold" fill="#5d3a7e">Attention Output O (N×d)</text>
  <text x="680" y="100" text-anchor="end" font-size="10" fill="#8e5db8" font-style="italic">分块装入 SRAM</text>

  <!-- Q Tiles row -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="110" y="115" width="140" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="180" y="150" fill="#2b6e9e" font-weight="bold">Q Tile</text>
    <text x="180" y="170" fill="#2b6e9e" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Br × d</text>
    <text x="180" y="186" fill="#888" font-size="9">Br rows</text>

    <rect x="270" y="115" width="140" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="340" y="150" fill="#2b6e9e" font-weight="bold">Q Tile</text>
    <text x="340" y="170" fill="#2b6e9e" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Br × d</text>
    <text x="340" y="186" fill="#888" font-size="9">Br rows</text>

    <rect x="430" y="115" width="140" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <text x="500" y="150" fill="#2b6e9e" font-weight="bold">Q Tile</text>
    <text x="500" y="170" fill="#2b6e9e" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Br × d</text>
    <text x="500" y="186" fill="#888" font-size="9">Br rows</text>
  </g>
  <text x="600" y="158" font-size="14" fill="#888">…</text>
  <text x="640" y="158" font-size="10" fill="#888" font-style="italic">行方向</text>
  <text x="640" y="172" font-size="10" fill="#888" font-style="italic">步长 Br</text>

  <!-- arrows from Q tiles merging down -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 180 195 L 180 210 L 340 210"/>
    <path d="M 500 195 L 500 210 L 340 210"/>
    <path d="M 340 195 L 340 230" marker-end="url(#ar)"/>
  </g>
  <text x="354" y="222" font-size="9" fill="#888">Q tile 驻留</text>

  <!-- KV Tile iteration row: past (faded), current (solid), future (faded) -->
  <g filter="url(#sk)" font-size="10" text-anchor="middle">
    <rect x="120" y="246" width="120" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" opacity="0.35"/>
    <text x="180" y="270" fill="#2e6e2e" opacity="0.5">KV Tile (已)</text>
    <text x="180" y="286" fill="#888" opacity="0.5" font-size="9" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Bc×d</text>

    <rect x="280" y="246" width="120" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="340" y="270" fill="#2e6e2e" font-weight="bold">KV Tile (当前)</text>
    <text x="340" y="286" fill="#2e6e2e" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Bc × d</text>

    <rect x="440" y="246" width="120" height="50" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1" opacity="0.35"/>
    <text x="500" y="270" fill="#2e6e2e" opacity="0.5">KV Tile (下一)</text>
    <text x="500" y="286" fill="#888" opacity="0.5" font-size="9" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Bc×d</text>
  </g>
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)">
    <path d="M 242 271 L 276 271"/>
    <path d="M 402 271 L 436 271"/>
  </g>
  <text x="580" y="276" font-size="10" fill="#888" font-style="italic">K/V 逐块滑入</text>

  <!-- formula box -->
  <g filter="url(#sk)">
    <rect x="120" y="340" width="520" height="34" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="380" y="362" text-anchor="middle" font-size="11" fill="#7a5415" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">每步：S_tile = Q_tile × KV_tile^T  (Br×Bc) → 在线更新 softmax + 输出累加</text>

  <!-- loop notes -->
  <text x="80" y="398" font-size="10" fill="#2b6e9e">外循环：遍历 Q tile（行方向，步长 Br） · Q tile 驻留 SRAM 不移动</text>
  <text x="80" y="416" font-size="10" fill="#2e6e2e">内循环：遍历 KV tile（行方向，步长 Bc） · 约束：Br×d + Bc×d×2 + Br×Bc ≤ SRAM</text>
  <text x="380" y="434" text-anchor="middle" font-size="9" fill="#aaa">每完成一个 KV tile 立即更新 running softmax 状态 m(x)、l(x) 与输出累加器 O</text>
</svg>
