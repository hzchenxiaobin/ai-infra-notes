<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="55" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="280" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Week 5 学习主线</text>
  <path d="M 240 44 Q 380 52 520 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="60" text-anchor="middle" font-size="11" fill="#888">从理解两阶段 → 造零件 → 读系统 → 组装引擎 → 测量优化 → 提炼方法论</text>

  <!-- Row 1: Day1 → Day2 → Day3 → Day4 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="40"  y="90" width="150" height="60" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="115" y="112" fill="#2b6e9e" font-weight="bold" font-size="13">Day 1</text>
    <text x="115" y="132" fill="#2b6e9e">Prefill/Decode</text>
    <text x="115" y="146" fill="#2b6e9e" font-size="10">分析</text>

    <rect x="210" y="90" width="150" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="285" y="112" fill="#2e6e2e" font-weight="bold" font-size="13">Day 2</text>
    <text x="285" y="132" fill="#2e6e2e">KV Cache</text>
    <text x="285" y="146" fill="#2e6e2e" font-size="10">实现</text>

    <rect x="380" y="90" width="150" height="60" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="455" y="112" fill="#7a5415" font-weight="bold" font-size="13">Day 3</text>
    <text x="455" y="132" fill="#7a5415">vLLM 整体</text>
    <text x="455" y="146" fill="#7a5415" font-size="10">架构</text>

    <rect x="550" y="90" width="150" height="60" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <text x="625" y="112" fill="#b85450" font-weight="bold" font-size="13">Day 4</text>
    <text x="625" y="132" fill="#b85450">PagedAttention</text>
    <text x="625" y="146" fill="#b85450" font-size="10">内存管理</text>
  </g>

  <!-- horizontal arrows row 1 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 192 120 L 208 120" marker-end="url(#ar)"/>
    <path d="M 362 120 L 378 120" marker-end="url(#ar)"/>
    <path d="M 532 120 L 548 120" marker-end="url(#ar)"/>
  </g>

  <!-- wrap arrow: Day4 → Day5 (down and left) -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 625 152 L 625 178 Q 625 188 615 188 L 125 188 Q 115 188 115 198 L 115 212" marker-end="url(#ar)"/>
  </g>

  <!-- Row 2: Day5 → Day6 → Day7 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="40"  y="216" width="150" height="60" rx="10" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
    <text x="115" y="238" fill="#5d3a7e" font-weight="bold" font-size="13">Day 5</text>
    <text x="115" y="258" fill="#5d3a7e">Mini 引擎 v0</text>
    <text x="115" y="272" fill="#5d3a7e" font-size="10">组装</text>

    <rect x="290" y="216" width="150" height="60" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
    <text x="365" y="238" fill="#2b6e9e" font-weight="bold" font-size="13">Day 6</text>
    <text x="365" y="258" fill="#2b6e9e">端到端 Profiling</text>
    <text x="365" y="272" fill="#2b6e9e" font-size="10">测量</text>

    <rect x="540" y="216" width="150" height="60" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="615" y="238" fill="#2e6e2e" font-weight="bold" font-size="13">Day 7</text>
    <text x="615" y="258" fill="#2e6e2e">核心问题总结</text>
    <text x="615" y="272" fill="#2e6e2e" font-size="10">方法论</text>
  </g>

  <!-- horizontal arrows row 2 -->
  <g filter="url(#sk)" stroke="#5a5a5a" stroke-width="1.3" fill="none">
    <path d="M 192 246 L 288 246" marker-end="url(#ar)"/>
    <path d="M 442 246 L 538 246" marker-end="url(#ar)"/>
  </g>
</svg>
