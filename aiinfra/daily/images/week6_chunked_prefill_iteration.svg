<svg xmlns="http://www.w3.org/2000/svg" width="780" height="440" viewBox="0 0 780 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="15" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="780" height="440" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Chunked Prefill 迭代时间线</text>
  <path d="M 240 44 Q 390 52 540 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="390" y="60" text-anchor="middle" font-size="11" fill="#888">prompt_len=24 · chunk_size=8 · token_budget=32 · prefill 拆 3 轮 + decode</text>

  <!-- iter axis -->
  <g filter="url(#sk)" stroke="#ccc" stroke-width="1" fill="none">
    <line x1="120" y1="100" x2="710" y2="100"/>
  </g>
  <g font-size="12" fill="#888" text-anchor="middle">
    <text x="200" y="92">iter 1</text>
    <text x="360" y="92">iter 2</text>
    <text x="520" y="92">iter 3</text>
    <text x="660" y="92">iter 4</text>
  </g>
  <g filter="url(#sk)" stroke="#ddd" stroke-width="0.8" fill="none" stroke-dasharray="2 3">
    <line x1="280" y1="104" x2="280" y2="330"/>
    <line x1="440" y1="104" x2="440" y2="330"/>
    <line x1="600" y1="104" x2="600" y2="330"/>
  </g>

  <!-- Lane labels -->
  <g font-size="12" fill="#444" text-anchor="end">
    <text x="110" y="148" font-weight="bold">S1</text>
    <text x="110" y="208" font-weight="bold">S2</text>
    <text x="110" y="268" font-weight="bold">S3</text>
  </g>

  <!-- S1 row: decode x4 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="120" y="128" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="200" y="153" fill="#2e6e2e">S1 decode</text>
    <rect x="280" y="128" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="360" y="153" fill="#2e6e2e">S1 decode</text>
    <rect x="440" y="128" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="520" y="153" fill="#2e6e2e">S1 decode</text>
    <rect x="600" y="128" width="110" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="655" y="153" fill="#2e6e2e">S1 decode</text>
  </g>

  <!-- S2 row: decode x4 -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="120" y="188" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="200" y="213" fill="#2e6e2e">S2 decode</text>
    <rect x="280" y="188" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="360" y="213" fill="#2e6e2e">S2 decode</text>
    <rect x="440" y="188" width="160" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="520" y="213" fill="#2e6e2e">S2 decode</text>
    <rect x="600" y="188" width="110" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <text x="655" y="213" fill="#2e6e2e">S2 decode</text>
  </g>

  <!-- S3 row: prefill 8/24, 16/24, 24/24, then decode -->
  <g filter="url(#sk)" font-size="11" text-anchor="middle">
    <rect x="120" y="248" width="160" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="200" y="266" fill="#7a5415" font-weight="bold">S3 prefill +8</text>
    <text x="200" y="280" fill="#7a5415" font-size="10">8/24</text>

    <rect x="280" y="248" width="160" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="360" y="266" fill="#7a5415" font-weight="bold">S3 prefill +8</text>
    <text x="360" y="280" fill="#7a5415" font-size="10">16/24</text>

    <rect x="440" y="248" width="160" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <text x="520" y="266" fill="#7a5415" font-weight="bold">S3 prefill +8</text>
    <text x="520" y="280" fill="#7a5415" font-size="10">24/24 ✓</text>

    <rect x="600" y="248" width="110" height="40" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <text x="655" y="273" fill="#2e6e2e" font-weight="bold">S3 decode</text>
  </g>

  <!-- budget annotations -->
  <g font-size="10" fill="#666" text-anchor="middle">
    <text x="200" y="312">预算 8+1+1=10</text>
    <text x="360" y="312">继续分块</text>
    <text x="520" y="312">prefill 完成</text>
    <text x="655" y="312">S3 开始 decode</text>
  </g>
  <text x="200" y="326" text-anchor="middle" font-size="9" fill="#2e6e2e" font-weight="bold">&lt; 32 ✓</text>

  <!-- S3 prefill progress bar -->
  <g filter="url(#sk)" font-size="9" text-anchor="middle">
    <rect x="120" y="346" width="480" height="14" rx="3" fill="#fdfcf7" stroke="#ccc" stroke-width="1"/>
    <rect x="120" y="346" width="160" height="14" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="280" y="346" width="160" height="14" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="440" y="346" width="160" height="14" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <text x="200" y="357" fill="#7a5415">chunk 1</text>
    <text x="360" y="357" fill="#7a5415">chunk 2</text>
    <text x="520" y="357" fill="#7a5415">chunk 3</text>
  </g>
  <text x="80" y="357" font-size="9" fill="#888" text-anchor="end">S3 prefill 进度</text>

  <!-- legend -->
  <g font-size="10" fill="#666">
    <rect x="120" y="390" width="14" height="11" rx="2" fill="#eaf6ee" stroke="#4a8e4a"/>
    <text x="140" y="400">decode</text>
    <rect x="210" y="390" width="14" height="11" rx="2" fill="#fef6e6" stroke="#c98a2b"/>
    <text x="230" y="400">prefill chunk（每轮 chunk_size=8）</text>
  </g>

  <text x="390" y="425" text-anchor="middle" font-size="10" fill="#5d3a7e">每轮 prefill 只消耗 chunk_size · 剩余预算留 decode · TPOT 平滑（尖峰降 40%）</text>
</svg>
