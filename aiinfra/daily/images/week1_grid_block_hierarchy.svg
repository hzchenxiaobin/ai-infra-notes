<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="760" height="440" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Grid / Block / Warp / Thread 层次</text>
  <path d="M 240 44 Q 380 52 520 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="60" text-anchor="middle" font-size="11" fill="#888">一个 kernel 的所有 block 组成 grid · block 内线程共享 Shared Memory</text>

  <!-- Grid root -->
  <g filter="url(#sk)">
    <rect x="300" y="72" width="160" height="46" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="380" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">Grid</text>

  <!-- connectors -->
  <path d="M 380 118 L 380 138" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>
  <path d="M 220 138 L 540 138" stroke="#5a5a5a" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <path d="M 220 138 L 220 162" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>
  <path d="M 540 138 L 540 162" stroke="#5a5a5a" stroke-width="1.4" fill="none"/>

  <!-- Block 0 -->
  <g filter="url(#sk)">
    <rect x="60" y="162" width="320" height="220" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="220" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">Block 0</text>
  <g filter="url(#sk)">
    <rect x="80" y="202" width="280" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="80" y="244" width="280" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="80" y="286" width="280" height="34" rx="6" fill="#ffffff" stroke="#4a8e4a" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="220" y="224" text-anchor="middle" font-size="11" fill="#2b2b2b" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Warp 0 (thread 0 ~ 31)</text>
  <text x="220" y="266" text-anchor="middle" font-size="11" fill="#2b2b2b" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">Warp 1 (thread 32 ~ 63)</text>
  <text x="220" y="308" text-anchor="middle" font-size="12" fill="#888">…</text>
  <text x="220" y="368" text-anchor="middle" font-size="9" fill="#888">block = 协作单位 · __syncthreads() 同步</text>

  <!-- Block 1 -->
  <g filter="url(#sk)">
    <rect x="400" y="162" width="320" height="220" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="560" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">Block 1</text>
  <g filter="url(#sk)">
    <rect x="420" y="202" width="280" height="34" rx="6" fill="#ffffff" stroke="#c98a2b" stroke-width="1.2" stroke-dasharray="4 3"/>
    <rect x="420" y="244" width="280" height="34" rx="6" fill="#ffffff" stroke="#c98a2b" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="560" y="224" text-anchor="middle" font-size="12" fill="#888">…</text>
  <text x="560" y="266" text-anchor="middle" font-size="12" fill="#888">…</text>
  <text x="560" y="368" text-anchor="middle" font-size="9" fill="#888">grid 覆盖整个计算任务</text>

  <!-- footer -->
  <text x="380" y="424" text-anchor="middle" font-size="10" fill="#aaa">thread → warp(32) → block → grid · 软件抽象层次</text>
</svg>
