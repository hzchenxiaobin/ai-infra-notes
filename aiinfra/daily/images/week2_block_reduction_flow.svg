<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <rect width="720" height="520" fill="#fdfcf7"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Block 两级归约执行流程</text>
  <path d="M 230 44 Q 360 52 490 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#888">Warp Shuffle（快路径）+ Shared Memory 中转 + Warp 0 二次 Shuffle</text>

  <!-- Context box: Block -->
  <g filter="url(#sk)">
    <rect x="180" y="78" width="360" height="34" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.6"/>
  </g>
  <text x="360" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#5d3a7e">Block（1024 threads = 32 warps）</text>

  <path d="M 360 114 L 360 132" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 1 -->
  <g filter="url(#sk)">
    <rect x="80" y="136" width="560" height="62" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="80" y="136" width="64" height="62" rx="10" fill="#4a8edb"/>
  </g>
  <text x="112" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Step</text>
  <text x="112" y="184" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">1</text>
  <text x="160" y="162" font-size="13" font-weight="bold" fill="#2b6e9e">每个线程从 Global Memory 读取并做 per-thread 累加</text>
  <text x="160" y="182" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">使用 grid-stride loop 处理大数组 · 结果存入寄存器</text>

  <path d="M 360 200 L 360 218" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 2 -->
  <g filter="url(#sk)">
    <rect x="80" y="222" width="560" height="62" rx="10" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="80" y="222" width="64" height="62" rx="10" fill="#4a8e4a"/>
  </g>
  <text x="112" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Step</text>
  <text x="112" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">2</text>
  <text x="160" y="248" font-size="13" font-weight="bold" fill="#2e6e2e">Warp 级归约：每个 Warp 的 32 线程累加到 lane 0</text>
  <text x="160" y="268" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">使用 __shfl_down_sync 的 butterfly 模式（5 轮折半）</text>

  <path d="M 360 286 L 360 304" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 3 -->
  <g filter="url(#sk)">
    <rect x="80" y="308" width="560" height="62" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="80" y="308" width="64" height="62" rx="10" fill="#c98a2b"/>
  </g>
  <text x="112" y="338" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Step</text>
  <text x="112" y="356" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">3</text>
  <text x="160" y="334" font-size="13" font-weight="bold" fill="#7a5415">lane 0 将 Warp 的部分和写入 Shared Memory</text>
  <text x="160" y="354" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">warpSums[0..31] · __syncthreads() 等待所有 Warp 完成</text>

  <path d="M 360 372 L 360 390" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- Step 4 -->
  <g filter="url(#sk)">
    <rect x="80" y="394" width="560" height="62" rx="10" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <rect x="80" y="394" width="64" height="62" rx="10" fill="#b85450"/>
  </g>
  <text x="112" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Step</text>
  <text x="112" y="442" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">4</text>
  <text x="160" y="420" font-size="13" font-weight="bold" fill="#7a2828">Warp 0 做最终归约</text>
  <text x="160" y="440" font-size="10" fill="#666" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">lane 0~31 读 warpSums[0..31] → warpReduceSum → lane 0 写 Global Memory</text>

  <text x="360" y="486" text-anchor="middle" font-size="10" fill="#888">Warp 0 的 32 lane 正好处理 32 个 Warp 的部分和 · 二级归约复用 Shuffle 而非 Shared Memory 循环</text>
  <text x="360" y="504" text-anchor="middle" font-size="9" fill="#aaa">两级归约 = Warp Shuffle + Shared Memory 中转 + Warp 0 二次 Shuffle</text>
</svg>
