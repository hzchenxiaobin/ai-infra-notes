<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="940" height="500" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">内存碎片对比：Static / Dynamic / PagedAttention</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ============ Static ============ -->
  <text x="40" y="76" font-size="14" font-weight="bold" fill="#2b6e9e">Static（静态分配）</text>
  <text x="40" y="94" font-size="11" fill="#666">每请求预分配 max_seq_len，实际长度可能远小于 → 内部碎片（浪费）</text>
  <!-- 3 个请求，各预分配 128 slot，实际用 20/40/15 -->
  <g filter="url(#sk)">
    <rect x="40" y="104" width="800" height="32" rx="3" fill="#fff" stroke="#4a8edb"/>
    <rect x="40" y="104" width="125" height="32" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="40" y="140" width="800" height="32" rx="3" fill="#fff" stroke="#4a8edb"/>
    <rect x="40" y="140" width="250" height="32" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="40" y="176" width="800" height="32" rx="3" fill="#fff" stroke="#4a8edb"/>
    <rect x="40" y="176" width="94" height="32" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
  </g>
  <text x="102" y="124" text-anchor="middle" font-size="10" fill="#2b6e9e">req0: 20/128</text>
  <text x="540" y="124" text-anchor="middle" font-size="10" fill="#b03a3a">浪费 108 slot</text>
  <text x="165" y="160" text-anchor="middle" font-size="10" fill="#2b6e9e">req1: 40/128</text>
  <text x="540" y="160" text-anchor="middle" font-size="10" fill="#b03a3a">浪费 88 slot</text>
  <text x="87" y="196" text-anchor="middle" font-size="10" fill="#2b6e9e">req2: 15/128</text>
  <text x="540" y="196" text-anchor="middle" font-size="10" fill="#b03a3a">浪费 113 slot</text>
  <text x="40" y="220" font-size="11" fill="#b03a3a" font-weight="bold">显存利用率: (20+40+15)/(128×3) = 19.5% → 80% 浪费在内部碎片</text>

  <!-- ============ Dynamic ============ -->
  <text x="40" y="256" font-size="14" font-weight="bold" fill="#7a5415">Dynamic（动态分配）</text>
  <text x="40" y="274" font-size="11" fill="#666">按实际长度分配，利用率高，但频繁 alloc/free 产生外部碎片</text>
  <!-- 紧密排列但有外部碎片 -->
  <g filter="url(#sk)">
    <rect x="40" y="284" width="800" height="80" rx="3" fill="#fff" stroke="#c98a2b"/>
    <rect x="44" y="288" width="125" height="32" rx="2" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="172" y="288" width="22" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <rect x="197" y="288" width="250" height="32" rx="2" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="450" y="288" width="35" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <rect x="488" y="288" width="94" height="32" rx="2" fill="#f0d9a8" stroke="#c98a2b"/>
    <rect x="585" y="288" width="50" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <rect x="638" y="288" width="200" height="32" rx="2" fill="#f0d9a8" stroke="#c98a2b"/>
  </g>
  <text x="107" y="308" text-anchor="middle" font-size="9" fill="#7a5415">req0(20)</text>
  <text x="183" y="308" text-anchor="middle" font-size="8" fill="#b85450">碎片</text>
  <text x="322" y="308" text-anchor="middle" font-size="9" fill="#7a5415">req1(40)</text>
  <text x="468" y="308" text-anchor="middle" font-size="8" fill="#b85450">碎片</text>
  <text x="535" y="308" text-anchor="middle" font-size="9" fill="#7a5415">req2(15)</text>
  <text x="610" y="308" text-anchor="middle" font-size="8" fill="#b85450">碎片</text>
  <text x="738" y="308" text-anchor="middle" font-size="9" fill="#7a5415">req3(新)</text>

  <text x="40" y="340" font-size="11" fill="#444">请求完成释放后留下不连续的小空洞，新请求若比空洞大就放不下 → OOM</text>
  <text x="40" y="358" font-size="11" fill="#b03a3a" font-weight="bold">显存利用率高（无内部碎片），但外部碎片累积 → 大请求可能 OOM，需 compact（搬移，开销大）</text>

  <!-- ============ PagedAttention ============ -->
  <text x="40" y="394" font-size="14" font-weight="bold" fill="#2e6e2e">PagedAttention（分页）</text>
  <text x="40" y="412" font-size="11" fill="#666">固定大小 block + block table 映射 → 无外部碎片，完成时整 block 回收</text>
  <!-- 物理 block 池，block 粒度分配 -->
  <g filter="url(#sk)">
    <g stroke="#4a8e4a" stroke-width="0.8">
      <rect x="40" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="82" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="124" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="166" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="208" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="250" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="292" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="334" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="376" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="418" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="460" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="502" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="544" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="586" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="628" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="670" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="712" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
      <rect x="754" y="422" width="40" height="28" rx="2" fill="#bfe0bf"/>
      <rect x="796" y="422" width="40" height="28" rx="2" fill="#fff" stroke-dasharray="3 2"/>
    </g>
  </g>
  <text x="60" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">A</text>
  <text x="102" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">A</text>
  <text x="144" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="186" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">B</text>
  <text x="228" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="270" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">B</text>
  <text x="312" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">C</text>
  <text x="354" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="396" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">C</text>
  <text x="438" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="480" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">A</text>
  <text x="522" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="564" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">B</text>
  <text x="606" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">D</text>
  <text x="648" y="440" text-anchor="middle" font-size="8" fill="#999">空</text>
  <text x="690" y="440" text-anchor="middle" font-size="8" fill="#2e6e2e">C</text>

  <text x="40" y="472" font-size="11" fill="#444">各序列的 block 散布在池中（逻辑连续由 block table 保证），空闲 block 随时可被任意序列使用</text>
  <text x="40" y="490" font-size="11" fill="#2e6e2e" font-weight="bold">显存利用率高 + 无外部碎片（block 粒度回收）+ 支持动态扩缩 —— 综合最优</text>
</svg>
