<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Decode 为什么 memory-bound：算术强度 vs Ridge Point</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ============ 左：算术强度公式 ============ -->
  <g filter="url(#sk)">
    <rect x="40" y="68" width="410" height="250" rx="10" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="60" y="92" font-size="14" font-weight="bold" fill="#7a5415">Decode 单步的 AI 计算</text>
  <text x="60" y="118" font-size="12" fill="#444">每步处理 1 个新 token，需读取：</text>
  <text x="60" y="140" font-size="12" fill="#444">  • 历史 KV Cache：2·L·d·bytes</text>
  <text x="60" y="160" font-size="12" fill="#444">  • 模型权重：≈ 2·d²·bytes</text>
  <text x="60" y="182" font-size="12" fill="#444">计算量：O(L·d + d²)</text>
  <text x="60" y="212" font-size="13" font-weight="bold" fill="#b03a3a">AI = FLOPs / Bytes ≈ d / (2·d·bytes) ≈ 0.125</text>
  <text x="60" y="234" font-size="12" fill="#444">（fp16，约 0.125 FLOP/Byte）</text>
  <g filter="url(#sk)">
    <rect x="60" y="250" width="370" height="56" rx="6" fill="#fce4ec" stroke="#b85450"/>
  </g>
  <text x="72" y="272" font-size="12" font-weight="bold" fill="#7a2828">结论：AI ≪ Ridge Point (~12.6 on RTX 5090)</text>
  <text x="72" y="292" font-size="11" fill="#7a2828">→ 完全卡在 HBM 带宽，SM 空闲等数据</text>

  <!-- ============ 右：Ridge Point 屋顶线 ============ -->
  <g filter="url(#sk)">
    <rect x="480" y="68" width="420" height="250" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="700" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">Roofline：算术强度 vs 性能</text>
  <!-- 坐标轴 -->
  <g filter="url(#sk)">
    <line x1="520" y1="290" x2="870" y2="290" stroke="#3a3a3a" stroke-width="1.4"/>
    <line x1="520" y1="120" x2="520" y2="290" stroke="#3a3a3a" stroke-width="1.4"/>
  </g>
  <text x="695" y="310" text-anchor="middle" font-size="11" fill="#666">算术强度 (FLOP/Byte)</text>
  <text x="500" y="205" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 500 205)">吞吐 (FLOP/s)</text>
  <!-- 内存带宽线（左侧斜线） -->
  <g filter="url(#sk)">
    <line x1="520" y1="290" x2="660" y2="150" stroke="#b03a3a" stroke-width="2"/>
  </g>
  <text x="556" y="232" font-size="11" fill="#b03a3a" transform="rotate(-49 556 232)">HBM 带宽</text>
  <!-- 算力线（右侧水平） -->
  <g filter="url(#sk)">
    <line x1="660" y1="150" x2="860" y2="150" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="760" y="142" text-anchor="middle" font-size="11" fill="#2b6e9e">峰值算力</text>
  <!-- Ridge point -->
  <g filter="url(#sk)">
    <circle cx="660" cy="150" r="5" fill="#7a5415" stroke="#fff" stroke-width="1.5"/>
  </g>
  <text x="668" y="172" font-size="11" fill="#7a5415">Ridge ≈ 12.6</text>
  <!-- Decode 点（左侧，低 AI） -->
  <g filter="url(#sk)">
    <circle cx="545" cy="265" r="5" fill="#b03a3a"/>
  </g>
  <text x="553" y="262" font-size="11" font-weight="bold" fill="#b03a3a">Decode (AI≈0.1)</text>
  <text x="553" y="277" font-size="10" fill="#b03a3a">卡在带宽线</text>
  <!-- Prefill 点（右侧，高 AI） -->
  <g filter="url(#sk)">
    <circle cx="800" cy="150" r="5" fill="#2e6e2e"/>
  </g>
  <text x="740" y="180" font-size="11" font-weight="bold" fill="#2e6e2e">Prefill (AI≈400)</text>
  <text x="740" y="195" font-size="10" fill="#2e6e2e">卡在算力线</text>

  <!-- ============ 底部：优化方向 ============ -->
  <g filter="url(#sk)">
    <rect x="40" y="340" width="860" height="200" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="366" font-size="14" font-weight="bold" fill="#2b2b2b">Decode 的优化方向（把 M=1 的 memory-bound 往右上推）</text>
  <g filter="url(#sk)">
    <rect x="60" y="380" width="200" height="70" rx="6" fill="#eaf6ee" stroke="#4a8e4a"/>
  </g>
  <text x="160" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">① 减少读取</text>
  <text x="160" y="420" text-anchor="middle" font-size="11" fill="#444">KV Cache 量化 (INT8/FP8)</text>
  <text x="160" y="436" text-anchor="middle" font-size="11" fill="#444">PagedAttention / 滑窗</text>
  <g filter="url(#sk)">
    <rect x="280" y="380" width="200" height="70" rx="6" fill="#e8f0fa" stroke="#4a8edb"/>
  </g>
  <text x="380" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6e9e">② 抬高 M</text>
  <text x="380" y="420" text-anchor="middle" font-size="11" fill="#444">Continuous Batching</text>
  <text x="380" y="436" text-anchor="middle" font-size="11" fill="#444">合并多个 decode 请求</text>
  <g filter="url(#sk)">
    <rect x="500" y="380" width="200" height="70" rx="6" fill="#fef6e6" stroke="#c98a2b"/>
  </g>
  <text x="600" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">③ 减调度开销</text>
  <text x="600" y="420" text-anchor="middle" font-size="11" fill="#444">CUDA Graph</text>
  <text x="600" y="436" text-anchor="middle" font-size="11" fill="#444">torch.compile</text>
  <g filter="url(#sk)">
    <rect x="720" y="380" width="160" height="70" rx="6" fill="#fce4ec" stroke="#b85450"/>
  </g>
  <text x="800" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a2828">④ 隐藏延迟</text>
  <text x="800" y="420" text-anchor="middle" font-size="11" fill="#444">计算/通信 overlap</text>
  <text x="800" y="436" text-anchor="middle" font-size="11" fill="#444">Pipeline / Async</text>
  <text x="60" y="478" font-size="11" fill="#666">本周 Day 2 实现 KV Cache、Day 3-4 读 vLLM 的 Continuous Batching + PagedAttention、Day 6 用 nsys 实测这些收益。</text>
  <text x="60" y="500" font-size="11" fill="#b03a3a" font-weight="bold">一句话：Decode 每步只算 1 个 token，但要把整个 KV Cache 搬过来看一遍 → 带宽是命门。</text>
</svg>
