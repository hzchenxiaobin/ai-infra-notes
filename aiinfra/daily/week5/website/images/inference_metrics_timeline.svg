<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="420" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">推理时延指标：TTFT 与 TBT 时间线</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 时间轴 -->
  <g filter="url(#sk)">
    <line x1="60" y1="230" x2="880" y2="230" stroke="#3a3a3a" stroke-width="1.6"/>
  </g>
  <text x="60" y="252" font-size="11" fill="#666">请求到达</text>
  <text x="880" y="252" font-size="11" fill="#666" text-anchor="end">... 生成完成</text>
  <g filter="url(#sk)">
    <line x1="60" y1="224" x2="60" y2="236" stroke="#3a3a3a" stroke-width="1.4"/>
    <line x1="880" y1="224" x2="880" y2="236" stroke="#3a3a3a" stroke-width="1.4"/>
  </g>

  <!-- Prefill 区段 -->
  <g filter="url(#sk)">
    <rect x="60" y="130" width="300" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="210" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Prefill 阶段</text>
  <text x="210" y="176" text-anchor="middle" font-size="11" fill="#444">处理 N_prompt 个 token</text>
  <text x="210" y="194" text-anchor="middle" font-size="11" fill="#444">compute-bound</text>

  <!-- TTFT 标注 -->
  <g filter="url(#sk)">
    <line x1="60" y1="100" x2="360" y2="100" stroke="#b03a3a" stroke-width="1.4" stroke-dasharray="6 4"/>
    <line x1="60" y1="92" x2="60" y2="108" stroke="#b03a3a" stroke-width="1.4"/>
    <line x1="360" y1="92" x2="360" y2="108" stroke="#b03a3a" stroke-width="1.4"/>
  </g>
  <text x="210" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">TTFT（首 token 时延）</text>

  <!-- Decode 区段（多个 token） -->
  <g filter="url(#sk)">
    <rect x="360" y="130" width="120" height="80" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
    <rect x="480" y="130" width="120" height="80" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
    <rect x="600" y="130" width="120" height="80" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
    <rect x="720" y="130" width="120" height="80" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2" stroke-dasharray="4 3"/>
  </g>
  <text x="420" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Decode</text>
  <text x="420" y="190" text-anchor="middle" font-size="10" fill="#7a5415">token 1</text>
  <text x="540" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Decode</text>
  <text x="540" y="190" text-anchor="middle" font-size="10" fill="#7a5415">token 2</text>
  <text x="660" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">Decode</text>
  <text x="660" y="190" text-anchor="middle" font-size="10" fill="#7a5415">token 3</text>
  <text x="780" y="172" text-anchor="middle" font-size="12" fill="#7a5415">...</text>

  <!-- TBT 标注 -->
  <g filter="url(#sk)">
    <line x1="420" y1="290" x2="540" y2="290" stroke="#7a5415" stroke-width="1.4" stroke-dasharray="6 4"/>
    <line x1="420" y1="282" x2="420" y2="298" stroke="#7a5415" stroke-width="1.4"/>
    <line x1="540" y1="282" x2="540" y2="298" stroke="#7a5415" stroke-width="1.4"/>
  </g>
  <text x="480" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">TBT（逐 token 间隔）</text>

  <!-- TPOT / E2E 标注 -->
  <g filter="url(#sk)">
    <line x1="360" y1="350" x2="880" y2="350" stroke="#2e6e2e" stroke-width="1.4" stroke-dasharray="6 4"/>
    <line x1="360" y1="342" x2="360" y2="358" stroke="#2e6e2e" stroke-width="1.4"/>
    <line x1="880" y1="342" x2="880" y2="358" stroke="#2e6e2e" stroke-width="1.4"/>
  </g>
  <text x="620" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">TPOT = 总 decode 时延 / 输出 token 数</text>
  <text x="470" y="398" text-anchor="middle" font-size="12" fill="#666">E2E Latency = TTFT + (输出 token 数 − 1) × TBT</text>
</svg>
