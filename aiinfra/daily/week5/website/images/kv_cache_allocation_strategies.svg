<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="520" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">KV Cache 分配策略：静态 vs 动态 vs PagedAttention</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ============ 静态分配 ============ -->
  <g filter="url(#sk)">
    <rect x="30" y="64" width="280" height="360" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="170" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">静态分配</text>
  <text x="170" y="106" text-anchor="middle" font-size="11" fill="#666">预先分配 max_seq_len 空间</text>
  <!-- 3 个请求，各占满 max -->
  <g filter="url(#sk)">
    <rect x="50" y="120" width="240" height="60" rx="4" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="50" y="120" width="60" height="60" fill="#4a8edb" opacity="0.5"/>
    <text x="80" y="156" text-anchor="middle" font-size="10" fill="#234">req1: 4/10</text>
  </g>
  <g filter="url(#sk)">
    <rect x="50" y="188" width="240" height="60" rx="4" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="50" y="188" width="180" height="60" fill="#4a8edb" opacity="0.5"/>
    <text x="170" y="224" text-anchor="middle" font-size="10" fill="#234">req2: 8/10</text>
  </g>
  <g filter="url(#sk)">
    <rect x="50" y="256" width="240" height="60" rx="4" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="50" y="256" width="30" height="60" fill="#4a8edb" opacity="0.5"/>
    <text x="80" y="292" text-anchor="middle" font-size="10" fill="#234">req3: 2/10</text>
  </g>
  <text x="170" y="312" text-anchor="middle" font-size="10" fill="#b03a3a">深色=实际用，浅色=浪费</text>
  <g filter="url(#sk)">
    <rect x="50" y="328" width="240" height="80" rx="5" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="4 3"/>
  </g>
  <text x="60" y="348" font-size="11" font-weight="bold" fill="#2b2b2b">优点：简单，无碎片</text>
  <text x="60" y="368" font-size="11" font-weight="bold" fill="#b03a3a">缺点：内存浪费严重</text>
  <text x="60" y="386" font-size="10" fill="#666">实际长度常远小于 max</text>
  <text x="60" y="400" font-size="10" fill="#666">→ batch size 受限</text>

  <!-- ============ 动态分配 ============ -->
  <g filter="url(#sk)">
    <rect x="330" y="64" width="280" height="360" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="470" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">动态分配</text>
  <text x="470" y="106" text-anchor="middle" font-size="11" fill="#666">按实际长度分配/扩展</text>
  <!-- 请求紧密排列但有碎片 -->
  <g filter="url(#sk)">
    <rect x="350" y="120" width="96" height="60" rx="4" fill="#f0d9a8" stroke="#c98a2b"/>
    <text x="398" y="156" text-anchor="middle" font-size="10" fill="#5a3a0a">req1</text>
  </g>
  <g filter="url(#sk)">
    <rect x="450" y="120" width="48" height="60" rx="4" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <text x="474" y="156" text-anchor="middle" font-size="9" fill="#999">碎片</text>
  </g>
  <g filter="url(#sk)">
    <rect x="500" y="120" width="120" height="60" rx="4" fill="#f0d9a8" stroke="#c98a2b"/>
    <text x="560" y="156" text-anchor="middle" font-size="10" fill="#5a3a0a">req2</text>
  </g>
  <g filter="url(#sk)">
    <rect x="350" y="188" width="36" height="60" rx="4" fill="#f0d9a8" stroke="#c98a2b"/>
    <text x="368" y="224" text-anchor="middle" font-size="10" fill="#5a3a0a">req3</text>
  </g>
  <g filter="url(#sk)">
    <rect x="388" y="188" width="40" height="60" rx="4" fill="#fce4ec" stroke="#b85450" stroke-dasharray="3 2"/>
    <text x="408" y="224" text-anchor="middle" font-size="9" fill="#999">碎片</text>
  </g>
  <g filter="url(#sk)">
    <rect x="430" y="188" width="100" height="60" rx="4" fill="#f0d9a8" stroke="#c98a2b"/>
    <text x="480" y="224" text-anchor="middle" font-size="10" fill="#5a3a0a">req4</text>
  </g>
  <text x="470" y="280" text-anchor="middle" font-size="10" fill="#b03a3a">频繁 alloc/free → 外部碎片</text>
  <text x="470" y="296" text-anchor="middle" font-size="10" fill="#b03a3a">无法拼出大连续块</text>
  <g filter="url(#sk)">
    <rect x="350" y="328" width="240" height="80" rx="5" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="4 3"/>
  </g>
  <text x="360" y="348" font-size="11" font-weight="bold" fill="#2b2b2b">优点：内存利用率高</text>
  <text x="360" y="368" font-size="11" font-weight="bold" fill="#b03a3a">缺点：碎片 + 分配开销</text>
  <text x="360" y="386" font-size="10" fill="#666">请求长度不确定</text>
  <text x="360" y="400" font-size="10" fill="#666">→ 大请求可能 OOM</text>

  <!-- ============ PagedAttention ============ -->
  <g filter="url(#sk)">
    <rect x="630" y="64" width="280" height="360" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="770" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">PagedAttention（vLLM）</text>
  <text x="770" y="106" text-anchor="middle" font-size="11" fill="#666">分页：固定大小 block + block table</text>
  <!-- 物理 block 池 -->
  <g filter="url(#sk)">
    <g stroke="#4a8e4a" stroke-width="1">
      <rect x="650" y="120" width="40" height="32" fill="#bfe0bf"/>
      <rect x="690" y="120" width="40" height="32" fill="#bfe0bf"/>
      <rect x="730" y="120" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-dasharray="2 2"/>
      <rect x="770" y="120" width="40" height="32" fill="#bfe0bf"/>
      <rect x="810" y="120" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-dasharray="2 2"/>
      <rect x="850" y="120" width="40" height="32" fill="#bfe0bf"/>

      <rect x="650" y="156" width="40" height="32" fill="#bfe0bf"/>
      <rect x="690" y="156" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-dasharray="2 2"/>
      <rect x="730" y="156" width="40" height="32" fill="#bfe0bf"/>
      <rect x="770" y="156" width="40" height="32" fill="#bfe0bf"/>
      <rect x="810" y="156" width="40" height="32" fill="#fce4ec" stroke="#b85450" stroke-dasharray="2 2"/>
      <rect x="850" y="156" width="40" height="32" fill="#bfe0bf"/>
    </g>
  </g>
  <text x="770" y="206" text-anchor="middle" font-size="10" fill="#666">物理 block 池（绿=占用，粉=空闲）</text>
  <!-- block table -->
  <g filter="url(#sk)">
    <rect x="650" y="218" width="100" height="56" rx="4" fill="#fff8e1" stroke="#d6a040"/>
  </g>
  <text x="700" y="234" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">req1 block table</text>
  <text x="700" y="250" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">[0, 1, 3, 6]</text>
  <text x="700" y="266" text-anchor="middle" font-size="9" fill="#888">逻辑连续，物理不连续</text>
  <g filter="url(#sk)">
    <rect x="760" y="218" width="100" height="56" rx="4" fill="#fff8e1" stroke="#d6a040"/>
  </g>
  <text x="810" y="234" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">req2 block table</text>
  <text x="810" y="250" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">[2, 4, 5]</text>
  <text x="810" y="266" text-anchor="middle" font-size="9" fill="#888">共享 prompt block（CoW）</text>
  <g filter="url(#sk)">
    <rect x="650" y="328" width="240" height="80" rx="5" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="4 3"/>
  </g>
  <text x="660" y="348" font-size="11" font-weight="bold" fill="#2b2b2b">优点：无碎片，利用率高</text>
  <text x="660" y="368" font-size="11" font-weight="bold" fill="#2e6e2e">支持共享/CoW/动态扩容</text>
  <text x="660" y="386" font-size="10" fill="#666">借鉴 OS 虚拟内存分页</text>
  <text x="660" y="400" font-size="10" fill="#666">→ Day 4 详读 vLLM 源码</text>

  <!-- ============ 底部演进箭头 ============ -->
  <path d="M 310 470 L 330 470" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar3)" filter="url(#sk)"/>
  <path d="M 610 470 L 630 470" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar3)" filter="url(#sk)"/>
  <text x="470" y="476" text-anchor="middle" font-size="11" fill="#666">解决浪费</text>
  <text x="470" y="490" text-anchor="middle" font-size="11" fill="#666">↓ 引入新问题（碎片）</text>
  <text x="770" y="476" text-anchor="middle" font-size="11" fill="#666">解决碎片</text>
  <text x="770" y="490" text-anchor="middle" font-size="11" fill="#2e6e2e">↓ 分页 + 映射表</text>
</svg>
