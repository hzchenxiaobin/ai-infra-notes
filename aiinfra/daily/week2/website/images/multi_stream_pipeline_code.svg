<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="920" height="760" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">multi_stream_pipeline.cu 代码图解</text>
  <path d="M 280 44 Q 460 52 640 44" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="460" y="58" text-anchor="middle" font-size="11" fill="#888">数据分 chunk → 4 Stream 重叠 H2D / Compute / D2H → Copy Engine 与 Compute Engine 并行</text>

  <!-- ===== Section 1: 数据流 + 分块 ===== -->
  <text x="40" y="86" font-size="14" fill="#4a8edb" font-weight="bold">① 数据流与分块</text>

  <!-- Host pinned memory -->
  <g filter="url(#sk)">
    <rect x="40" y="96" width="180" height="64" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="130" y="118" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">Host Pinned Memory</text>
  <text x="130" y="138" text-anchor="middle" font-size="10" fill="#666">cudaMallocHost</text>
  <text x="130" y="152" text-anchor="middle" font-size="10" fill="#666">h_A, h_B, h_C (64MB)</text>

  <!-- 分块示意 -->
  <text x="130" y="178" text-anchor="middle" font-size="10" fill="#c98a2b" font-weight="bold">↓ 分 64 个 chunk（每 chunk 1MB）</text>
  <g filter="url(#sk)">
    <rect x="48" y="186" width="38" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="90" y="186" width="38" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="132" y="186" width="38" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
    <rect x="174" y="186" width="38" height="20" rx="3" fill="#fef6e6" stroke="#c98a2b" stroke-width="1"/>
  </g>
  <text x="67" y="220" text-anchor="middle" font-size="9" fill="#888">chunk0</text>
  <text x="109" y="220" text-anchor="middle" font-size="9" fill="#888">chunk1</text>
  <text x="151" y="220" text-anchor="middle" font-size="9" fill="#888">chunk2</text>
  <text x="193" y="220" text-anchor="middle" font-size="9" fill="#888">chunk3</text>
  <text x="130" y="236" text-anchor="middle" font-size="9" fill="#888">... 共 64 个 chunk</text>

  <!-- 箭头 → device -->
  <path d="M 230 128 L 340 128" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="285" y="120" text-anchor="middle" font-size="10" fill="#666">H2D (Async)</text>

  <!-- Device memory -->
  <g filter="url(#sk)">
    <rect x="350" y="96" width="180" height="64" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="440" y="118" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">Device Memory</text>
  <text x="440" y="138" text-anchor="middle" font-size="10" fill="#666">cudaMalloc</text>
  <text x="440" y="152" text-anchor="middle" font-size="10" fill="#666">d_A, d_B, d_C</text>

  <!-- vecAdd kernel box -->
  <g filter="url(#sk)">
    <rect x="370" y="180" width="140" height="48" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="440" y="200" text-anchor="middle" font-size="12" fill="#4a8e4a" font-weight="bold">vecAdd kernel</text>
  <text x="440" y="218" text-anchor="middle" font-family="monospace" font-size="10" fill="#444">C[i] = A[i]+B[i]</text>
  <path d="M 440 162 L 440 178" stroke="#4a8e4a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 箭头 → host back -->
  <path d="M 530 128 L 640 128" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="585" y="120" text-anchor="middle" font-size="10" fill="#666">D2H (Async)</text>

  <!-- Host result -->
  <g filter="url(#sk)">
    <rect x="650" y="96" width="180" height="64" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
  </g>
  <text x="740" y="118" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">Host Result</text>
  <text x="740" y="138" text-anchor="middle" font-size="10" fill="#666">h_C (pinned)</text>
  <text x="740" y="152" text-anchor="middle" font-size="10" fill="#666">cudaFreeHost</text>

  <!-- ===== Section 2: 4-Stream 时间线 ===== -->
  <text x="40" y="270" font-size="14" fill="#4a8e4a" font-weight="bold">② Multi-Stream 重叠时间线（4 Stream）</text>
  <text x="40" y="288" font-size="10" fill="#888">每个 chunk 的 H2D→Comp→D2H 在同一 Stream 内 FIFO；不同 Stream 间 Copy Engine 与 Compute Engine 并行</text>

  <!-- 时间轴标签 -->
  <text x="90" y="310" font-size="9" fill="#888" text-anchor="end">t→</text>

  <!-- Stream 1 -->
  <text x="90" y="334" font-size="11" fill="#666" font-weight="bold" text-anchor="end">S1</text>
  <g filter="url(#sk)"><rect x="100" y="320" width="60" height="24" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.1"/></g>
  <text x="130" y="337" text-anchor="middle" font-size="9" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="160" y="320" width="60" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/></g>
  <text x="190" y="337" text-anchor="middle" font-size="9" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="220" y="320" width="60" height="24" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.1"/></g>
  <text x="250" y="337" text-anchor="middle" font-size="9" fill="#2b2b2b">D2H</text>

  <!-- Stream 2 -->
  <text x="90" y="362" font-size="11" fill="#666" font-weight="bold" text-anchor="end">S2</text>
  <g filter="url(#sk)"><rect x="130" y="348" width="60" height="24" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.1"/></g>
  <text x="160" y="365" text-anchor="middle" font-size="9" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="190" y="348" width="60" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/></g>
  <text x="220" y="365" text-anchor="middle" font-size="9" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="250" y="348" width="60" height="24" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.1"/></g>
  <text x="280" y="365" text-anchor="middle" font-size="9" fill="#2b2b2b">D2H</text>

  <!-- Stream 3 -->
  <text x="90" y="390" font-size="11" fill="#666" font-weight="bold" text-anchor="end">S3</text>
  <g filter="url(#sk)"><rect x="160" y="376" width="60" height="24" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.1"/></g>
  <text x="190" y="393" text-anchor="middle" font-size="9" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="220" y="376" width="60" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/></g>
  <text x="250" y="393" text-anchor="middle" font-size="9" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="280" y="376" width="60" height="24" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.1"/></g>
  <text x="310" y="393" text-anchor="middle" font-size="9" fill="#2b2b2b">D2H</text>

  <!-- Stream 4 -->
  <text x="90" y="418" font-size="11" fill="#666" font-weight="bold" text-anchor="end">S4</text>
  <g filter="url(#sk)"><rect x="190" y="404" width="60" height="24" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.1"/></g>
  <text x="220" y="421" text-anchor="middle" font-size="9" fill="#2b2b2b">H2D</text>
  <g filter="url(#sk)"><rect x="250" y="404" width="60" height="24" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/></g>
  <text x="280" y="421" text-anchor="middle" font-size="9" fill="#2b2b2b">Comp</text>
  <g filter="url(#sk)"><rect x="310" y="404" width="60" height="24" rx="4" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.1"/></g>
  <text x="340" y="421" text-anchor="middle" font-size="9" fill="#2b2b2b">D2H</text>

  <!-- 重叠标注：S1.Comp 与 S2.H2D 重叠 -->
  <path d="M 175 322 L 175 348" stroke="#4a8e4a" stroke-width="1.4" fill="none" stroke-dasharray="3 2" filter="url(#sk)"/>
  <text x="430" y="338" font-size="10" fill="#4a8e4a" font-weight="bold">← 此刻：Copy Engine 做 S2 H2D</text>
  <text x="430" y="352" font-size="10" fill="#4a8e4a" font-weight="bold">         Compute Engine 做 S1 Comp</text>
  <text x="430" y="366" font-size="10" fill="#4a8e4a" font-weight="bold">         两个硬件引擎真正并行！</text>

  <!-- 时间轴 -->
  <path d="M 100 440 L 380 440" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="392" y="444" font-size="10" fill="#888">时间</text>

  <!-- ===== Section 3: 代码三阶段映射 ===== -->
  <text x="40" y="476" font-size="14" fill="#c98a2b" font-weight="bold">③ 代码三阶段映射（循环体内）</text>

  <!-- 阶段 1 H2D -->
  <g filter="url(#sk)">
    <rect x="40" y="488" width="270" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="55" y="510" font-size="11" fill="#c98a2b" font-weight="bold">阶段 1：H2D（Copy Engine）</text>
  <text x="55" y="528" font-family="monospace" font-size="9" fill="#444">cudaMemcpyAsync(d_A+offset,</text>
  <text x="55" y="542" font-family="monospace" font-size="9" fill="#444">  h_A+offset, bytes,</text>
  <text x="55" y="556" font-family="monospace" font-size="9" fill="#444">  H2D, streams[i%N])</text>

  <!-- 箭头 -->
  <path d="M 312 528 L 338 528" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 阶段 2 Compute -->
  <g filter="url(#sk)">
    <rect x="340" y="488" width="270" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="355" y="510" font-size="11" fill="#4a8edb" font-weight="bold">阶段 2：Compute（SM）</text>
  <text x="355" y="528" font-family="monospace" font-size="9" fill="#444">vecAdd&lt;&lt;&lt;blocks, threads,</text>
  <text x="355" y="542" font-family="monospace" font-size="9" fill="#444">  0, streams[i%N]&gt;&gt;&gt;(</text>
  <text x="355" y="556" font-family="monospace" font-size="9" fill="#444">  d_A+off, d_B+off, ...)</text>

  <!-- 箭头 -->
  <path d="M 612 528 L 638 528" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 阶段 3 D2H -->
  <g filter="url(#sk)">
    <rect x="640" y="488" width="250" height="80" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/>
  </g>
  <text x="655" y="510" font-size="11" fill="#8e5db8" font-weight="bold">阶段 3：D2H（Copy Engine）</text>
  <text x="655" y="528" font-family="monospace" font-size="9" fill="#444">cudaMemcpyAsync(h_C+offset,</text>
  <text x="655" y="542" font-family="monospace" font-size="9" fill="#444">  d_C+offset, bytes,</text>
  <text x="655" y="556" font-family="monospace" font-size="9" fill="#444">  D2H, streams[i%N])</text>

  <!-- 底部说明 -->
  <text x="460" y="588" text-anchor="middle" font-size="10" fill="#888">同一 Stream 内三阶段 FIFO 顺序执行；streamIdx = i % nStreams 轮转分配 → 相邻 chunk 落入不同 Stream → 跨 Stream 重叠</text>

  <!-- ===== Section 4: 顺序 vs Multi-Stream 对比 ===== -->
  <text x="40" y="614" font-size="14" fill="#b03a3a" font-weight="bold">④ 顺序 vs Multi-Stream 性能对比</text>

  <!-- 顺序 -->
  <text x="90" y="640" font-size="11" fill="#b03a3a" font-weight="bold" text-anchor="end">顺序</text>
  <g filter="url(#sk)">
    <rect x="100" y="626" width="540" height="24" rx="4" fill="#fdecec" stroke="#b03a3a" stroke-width="1.2"/>
  </g>
  <text x="370" y="643" text-anchor="middle" font-size="10" fill="#b03a3a">H2D ── Comp ── D2H │ H2D ── Comp ── D2H │ ... 串行 64 次</text>
  <text x="660" y="643" font-size="11" fill="#b03a3a" font-weight="bold">~5.2 ms</text>

  <!-- Multi-Stream -->
  <text x="90" y="672" font-size="11" fill="#4a8e4a" font-weight="bold" text-anchor="end">重叠</text>
  <g filter="url(#sk)">
    <rect x="100" y="658" width="340" height="24" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="270" y="675" text-anchor="middle" font-size="10" fill="#4a8e4a">S1,S2,S3,S4 重叠流水线</text>
  <text x="660" y="675" font-size="11" fill="#4a8e4a" font-weight="bold">~3.4 ms</text>

  <!-- 加速比 -->
  <g filter="url(#sk)">
    <rect x="280" y="700" width="360" height="36" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="460" y="723" text-anchor="middle" font-size="13" fill="#c98a2b" font-weight="bold">加速比 ≈ 1.5x（Copy + Compute 引擎并行）</text>

  <!-- 底部注释 -->
  <text x="460" y="752" text-anchor="middle" font-size="10" fill="#888" font-style="italic">关键：cudaMallocHost（pinned）+ cudaStreamNonBlocking + cudaMemcpyAsync → DMA 与 SM 真正并行</text>
</svg>
