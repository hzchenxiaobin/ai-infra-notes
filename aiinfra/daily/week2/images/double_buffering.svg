<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="27" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="860" height="480" fill="#fdfcf7"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Double Buffering（软件流水线）</text>
  <path d="M 260 42 Q 430 50 600 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Top: single buffer (serial) ===== -->
  <text x="430" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#b03a3a">单缓冲：Load 和 Compute 串行，存在空闲等待</text>

  <g filter="url(#sk)">
    <rect x="80" y="84" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="145" y="107" text-anchor="middle" font-size="12" fill="#2b2b2b">Load Tile 0</text>

  <g filter="url(#sk)">
    <rect x="210" y="84" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="275" y="107" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 0</text>

  <g filter="url(#sk)">
    <rect x="340" y="84" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="405" y="107" text-anchor="middle" font-size="12" fill="#2b2b2b">Load Tile 1</text>

  <g filter="url(#sk)">
    <rect x="470" y="84" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="535" y="107" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 1</text>

  <!-- idle gap annotation -->
  <g filter="url(#sk)">
    <rect x="210" y="128" width="130" height="18" fill="none" stroke="#b03a3a" stroke-width="1.2" stroke-dasharray="3 3"/>
  </g>
  <text x="275" y="141" text-anchor="middle" font-size="10" fill="#b03a3a">↑ Compute 等 Load 时空闲</text>

  <!-- time arrow -->
  <path d="M 80 162 L 600 162" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="610" y="166" font-size="10" fill="#888">时间</text>

  <!-- divider -->
  <path d="M 60 184 L 800 184" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="6 4" filter="url(#sk)"/>

  <!-- ===== Bottom: double buffer (parallel) ===== -->
  <text x="430" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a8e4a">双缓冲：Compute 和 Load 并行，掩盖传输延迟</text>

  <!-- Lane 1: Buf 0 (Load even tiles) -->
  <text x="70" y="244" text-anchor="end" font-size="11" fill="#666" font-weight="bold">Buf 0</text>
  <g filter="url(#sk)">
    <rect x="80" y="228" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3" opacity="0.85"/>
  </g>
  <text x="145" y="251" text-anchor="middle" font-size="12" fill="#2b2b2b">Load 0</text>
  <g filter="url(#sk)">
    <rect x="340" y="228" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3" opacity="0.85"/>
  </g>
  <text x="405" y="251" text-anchor="middle" font-size="12" fill="#2b2b2b">Load 2</text>
  <g filter="url(#sk)">
    <rect x="600" y="228" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3" opacity="0.85"/>
  </g>
  <text x="665" y="251" text-anchor="middle" font-size="12" fill="#2b2b2b">Load 4</text>

  <!-- Lane 2: Buf 1 (Load odd tiles) -->
  <text x="70" y="296" text-anchor="end" font-size="11" fill="#666" font-weight="bold">Buf 1</text>
  <g filter="url(#sk)">
    <rect x="210" y="280" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3" opacity="0.85"/>
  </g>
  <text x="275" y="303" text-anchor="middle" font-size="12" fill="#2b2b2b">Load 1</text>
  <g filter="url(#sk)">
    <rect x="470" y="280" width="130" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3" opacity="0.85"/>
  </g>
  <text x="535" y="303" text-anchor="middle" font-size="12" fill="#2b2b2b">Load 3</text>

  <!-- Lane 3: Compute -->
  <text x="70" y="352" text-anchor="end" font-size="11" fill="#666" font-weight="bold">Compute</text>
  <g filter="url(#sk)">
    <rect x="210" y="336" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="275" y="359" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 0</text>
  <g filter="url(#sk)">
    <rect x="340" y="336" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="405" y="359" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 1</text>
  <g filter="url(#sk)">
    <rect x="470" y="336" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="535" y="359" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 2</text>
  <g filter="url(#sk)">
    <rect x="600" y="336" width="130" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="665" y="359" text-anchor="middle" font-size="12" fill="#2b2b2b">Compute 3</text>

  <!-- overlap annotation -->
  <g filter="url(#sk)">
    <rect x="210" y="280" width="130" height="92" fill="none" stroke="#4a8e4a" stroke-width="2" stroke-dasharray="5 3" rx="6"/>
  </g>
  <text x="275" y="392" text-anchor="middle" font-size="10" fill="#4a8e4a" font-weight="bold">↑ Load 1 与 Compute 0 重叠</text>

  <!-- time arrow -->
  <path d="M 80 412 L 730 412" stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="740" y="416" font-size="10" fill="#888">时间</text>

  <!-- bottom note -->
  <g filter="url(#sk)">
    <rect x="120" y="430" width="620" height="36" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="430" y="453" text-anchor="middle" font-size="12" fill="#2b2b2b">声明两份 shared memory buffer，奇偶 tile 交替使用</text>
</svg>
