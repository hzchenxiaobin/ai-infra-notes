<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">PyTorch C++ Extension 编译流水线</text>
  <path d="M 280 40 Q 470 48 660 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">.cu + .cpp → nvcc 编译 → .so → Python 调用</text>

  <!-- ===== Step 1: Source files ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="76" width="200" height="100" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="130" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">① 源码</text>
  <text x="44" y="118" font-size="10" fill="#555">CUDA_SOURCE (.cu)</text>
  <text x="44" y="132" font-size="9" fill="#888">__global__ kernels</text>
  <text x="44" y="148" font-size="10" fill="#555">CPP_SOURCE (.cpp)</text>
  <text x="44" y="162" font-size="9" fill="#888">at::Tensor wrappers</text>

  <!-- Arrow -->
  <path d="M 230 126 L 270 126" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 2: load_inline ===== -->
  <g filter="url(#sk)">
    <rect x="270" y="76" width="200" height="100" rx="8" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.3"/>
  </g>
  <text x="370" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">② load_inline 编译</text>
  <text x="284" y="118" font-size="10" fill="#555">torch.utils.cpp_extension</text>
  <text x="284" y="134" font-size="9" fill="#888">→ nvcc -O3 编译 .cu</text>
  <text x="284" y="148" font-size="9" fill="#888">→ g++ 编译 .cpp</text>
  <text x="284" y="162" font-size="9" fill="#888">→ 链接 → .so 动态库</text>

  <!-- Arrow -->
  <path d="M 470 126 L 510 126" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 3: Python module ===== -->
  <g filter="url(#sk)">
    <rect x="510" y="76" width="200" height="100" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="610" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">③ Python 模块</text>
  <text x="524" y="118" font-size="10" fill="#555">custom_ops = module</text>
  <text x="524" y="134" font-size="9" fill="#888">custom_ops.softmax_forward()</text>
  <text x="524" y="148" font-size="9" fill="#888">custom_ops.layernorm_forward()</text>
  <text x="524" y="162" font-size="9" fill="#888">custom_ops.flash_attention_forward()</text>

  <!-- Arrow -->
  <path d="M 710 126 L 750 126" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Step 4: Transformer ===== -->
  <g filter="url(#sk)">
    <rect x="750" y="76" width="170" height="100" rx="8" fill="#fce4ec" stroke="#c04050" stroke-width="1.3"/>
  </g>
  <text x="835" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#a03040">④ 集成到模型</text>
  <text x="764" y="118" font-size="10" fill="#555">TransformerLayer</text>
  <text x="764" y="134" font-size="9" fill="#888">use_custom=True</text>
  <text x="764" y="148" font-size="9" fill="#888">→ 调用自定义 kernel</text>
  <text x="764" y="162" font-size="9" fill="#888">use_custom=False</text>
  <text x="764" y="174" font-size="9" fill="#888">→ 调用 PyTorch</text>

  <!-- ===== Key points ===== -->
  <line x1="30" y1="196" x2="920" y2="196" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="220" font-size="13" font-weight="bold" fill="#2b2b2b">C++ Wrapper 关键点</text>

  <g filter="url(#sk)">
    <rect x="30" y="230" width="420" height="150" rx="8" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <text x="44" y="252" font-family="monospace" font-size="9" fill="#333">at::Tensor softmax_forward(at::Tensor input) {</text>
  <text x="44" y="266" font-family="monospace" font-size="9" fill="#333">    int M = input.size(0), N = input.size(1);</text>
  <text x="44" y="280" font-family="monospace" font-size="9" fill="#333">    auto output = at::empty_like(input);  // 分配输出</text>
  <text x="44" y="294" font-family="monospace" font-size="9" fill="#333">    softmax_kernel&lt;&lt;&lt;M, threads&gt;&gt;&gt;(</text>
  <text x="44" y="308" font-family="monospace" font-size="9" fill="#333">        input.data_ptr&lt;float&gt;(),       // 裸指针</text>
  <text x="44" y="322" font-family="monospace" font-size="9" fill="#333">        output.data_ptr&lt;float&gt;(),</text>
  <text x="44" y="336" font-family="monospace" font-size="9" fill="#333">        M, N);</text>
  <text x="44" y="350" font-family="monospace" font-size="9" fill="#333">    return output;</text>
  <text x="44" y="364" font-family="monospace" font-size="9" fill="#333">}</text>

  <g filter="url(#sk)">
    <rect x="470" y="230" width="440" height="150" rx="8" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="484" y="252" font-size="11" fill="#7a5415" font-weight="bold">注意事项：</text>
  <text x="484" y="272" font-size="10" fill="#444">① at::empty_like(input) 分配输出 tensor</text>
  <text x="484" y="290" font-size="10" fill="#444">② data_ptr&lt;float&gt;() 获取裸指针</text>
  <text x="484" y="308" font-size="10" fill="#444">③ size()/dim() 获取形状信息</text>
  <text x="484" y="326" font-size="10" fill="#444">④ stream 一致性：用 at::cuda::getCurrentCUDAStream()</text>
  <text x="484" y="344" font-size="10" fill="#c04050" font-weight="bold">⑤ 精度：FP32 reduce 用 atomicAdd 注意累积误差</text>
  <text x="484" y="362" font-size="10" fill="#c04050" font-weight="bold">⑥ 内存布局：row-major 与 PyTorch 一致</text>
</svg>
