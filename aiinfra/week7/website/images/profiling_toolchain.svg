<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="440" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Profiling 工具链：三层分析</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">nsys（系统级）→ ncu（kernel 级）→ 自定义计时（阶段级），从粗到细定位瓶颈</text>

  <!-- ===== Layer 1: nsys (system) ===== -->
  <g filter="url(#sk)">
    <rect x="30" y="76" width="280" height="140" rx="10" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="170" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① Nsight Systems (nsys)</text>
  <text x="170" y="114" text-anchor="middle" font-size="10" fill="#555">系统级时间线</text>

  <text x="44" y="136" font-size="10" fill="#444" font-weight="bold">看什么：</text>
  <text x="44" y="152" font-size="10" fill="#555">• kernel 间隙（launch overhead）</text>
  <text x="44" y="168" font-size="10" fill="#555">• CPU-GPU 同步点</text>
  <text x="44" y="184" font-size="10" fill="#555">• stream 利用率</text>
  <text x="44" y="200" font-size="10" fill="#555">• 内存传输时间线</text>

  <text x="44" y="216" font-family="monospace" font-size="9" fill="#333">nsys profile --trace=cuda,nvtx</text>

  <!-- Arrow -->
  <path d="M 310 146 L 340 146" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="325" y="140" text-anchor="middle" font-size="8" fill="#888">深入</text>

  <!-- ===== Layer 2: ncu (kernel) ===== -->
  <g filter="url(#sk)">
    <rect x="340" y="76" width="280" height="140" rx="10" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.5"/>
  </g>
  <text x="480" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">② Nsight Compute (ncu)</text>
  <text x="480" y="114" text-anchor="middle" font-size="10" fill="#555">Kernel 级指标</text>

  <text x="354" y="136" font-size="10" fill="#444" font-weight="bold">看什么：</text>
  <text x="354" y="152" font-size="10" fill="#555">• SM throughput（算力占比）</text>
  <text x="354" y="168" font-size="10" fill="#555">• DRAM throughput（带宽占比）</text>
  <text x="354" y="184" font-size="10" fill="#555">• compute vs memory bound</text>
  <text x="354" y="200" font-size="10" fill="#555">• warp stall 原因</text>

  <text x="354" y="216" font-family="monospace" font-size="9" fill="#333">ncu --metrics sm__throughput,dram__throughput</text>

  <!-- Arrow -->
  <path d="M 620 146 L 650 146" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="635" y="140" text-anchor="middle" font-size="8" fill="#888">深入</text>

  <!-- ===== Layer 3: custom timing (phase) ===== -->
  <g filter="url(#sk)">
    <rect x="650" y="76" width="260" height="140" rx="10" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="780" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">③ 自定义计时</text>
  <text x="780" y="114" text-anchor="middle" font-size="10" fill="#555">阶段级拆分</text>

  <text x="664" y="136" font-size="10" fill="#444" font-weight="bold">看什么：</text>
  <text x="664" y="152" font-size="10" fill="#555">• submit / schedule / forward</text>
  <text x="664" y="168" font-size="10" fill="#555">• forward 内 kernel 分解</text>
  <text x="664" y="184" font-size="10" fill="#555">• result callback 时间</text>
  <text x="664" y="200" font-size="10" fill="#555">• 各阶段占比（pie chart）</text>

  <text x="664" y="216" font-family="monospace" font-size="9" fill="#333">timer.start("forward") / timer.end()</text>

  <!-- ===== Bottom: analysis flow ===== -->
  <line x1="30" y1="232" x2="910" y2="232" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <text x="40" y="256" font-size="13" font-weight="bold" fill="#2b2b2b">分析流程：从粗到细定位瓶颈</text>

  <!-- Step boxes -->
  <g filter="url(#sk)">
    <rect x="40" y="270" width="180" height="60" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="130" y="292" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">Step 1: nsys 时间线</text>
  <text x="130" y="308" text-anchor="middle" font-size="9" fill="#555">找 kernel 间隙大的区域</text>
  <text x="130" y="322" text-anchor="middle" font-size="9" fill="#555">判断调度 vs launch 开销</text>

  <path d="M 220 300 L 250 300" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="250" y="270" width="180" height="60" rx="6" fill="#e6f4ea" stroke="#2e8b57" stroke-width="1.2"/>
  </g>
  <text x="340" y="292" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">Step 2: ncu 分析 top kernel</text>
  <text x="340" y="308" text-anchor="middle" font-size="9" fill="#555">判断 compute/memory bound</text>
  <text x="340" y="322" text-anchor="middle" font-size="9" fill="#555">与 PyTorch/cuBLAS 对比</text>

  <path d="M 430 300 L 460 300" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="460" y="270" width="180" height="60" rx="6" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="550" y="292" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">Step 3: 阶段计时拆分</text>
  <text x="550" y="308" text-anchor="middle" font-size="9" fill="#555">submit/schedule/forward/result</text>
  <text x="550" y="322" text-anchor="middle" font-size="9" fill="#555">各占多少百分比</text>

  <path d="M 640 300 L 670 300" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="670" y="270" width="200" height="60" rx="6" fill="#fce4ec" stroke="#c04050" stroke-width="1.2"/>
  </g>
  <text x="770" y="292" text-anchor="middle" font-size="10" fill="#a03040" font-weight="bold">Step 4: 提出优化方案</text>
  <text x="770" y="308" text-anchor="middle" font-size="9" fill="#555">kernel 融合 / CUDA Graph</text>
  <text x="770" y="322" text-anchor="middle" font-size="9" fill="#555">C++ scheduler / memory pool</text>

  <!-- ===== Tool comparison table ===== -->
  <line x1="30" y1="346" x2="910" y2="346" stroke="#eee" stroke-width="1" filter="url(#sk)"/>
  <g filter="url(#sk)">
    <rect x="40" y="378" width="860" height="52" rx="6" fill="#f6f6f6" stroke="#ccc" stroke-width="1"/>
  </g>
  <g font-size="10" fill="#444">
    <text x="56" y="398" font-weight="bold" fill="#4a8edb">nsys</text>
    <text x="120" y="398" fill="#555">→</text>
    <text x="280" y="398" fill="#888">|</text>
    <text x="300" y="398" font-weight="bold" fill="#2e8b57">ncu</text>
    <text x="340" y="398" fill="#555">→</text>
    <text x="540" y="398" fill="#888">|</text>
    <text x="560" y="398" font-weight="bold" fill="#c98a2b">torch profiler</text>
    <text x="680" y="398" fill="#555">→</text>
    </g>
</svg>