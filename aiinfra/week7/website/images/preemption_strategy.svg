<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c04050"/>
    </marker>
    <marker id="arP" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#8e44ad"/>
    </marker>
  </defs>
  <rect width="940" height="540" fill="#fdfcf7"/>

  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">抢占策略：Recompute vs Swap</text>
  <path d="M 300 40 Q 470 48 640 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>
  <text x="470" y="56" text-anchor="middle" font-size="11" fill="#888">显存不足时，高优先级请求抢占低优先级 running 请求的两种策略</text>

  <!-- ===== Trigger condition ===== -->
  <g filter="url(#sk)">
    <rect x="280" y="70" width="380" height="36" rx="6" fill="#fce4ec" stroke="#c04050" stroke-width="1.3"/>
  </g>
  <text x="470" y="93" text-anchor="middle" font-size="11" fill="#a03040" font-weight="bold">触发：新请求到来，显存不足，但有更低优先级 running 请求</text>

  <!-- ===== Select victim ===== -->
  <g filter="url(#sk)">
    <rect x="340" y="118" width="260" height="30" rx="5" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  </g>
  <text x="470" y="138" text-anchor="middle" font-size="10" fill="#6a3d8a">select_victim()：最低优先级 → 最少剩余 token → 最晚提交</text>
  <path d="M 470 148 L 470 160" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Branch arrow ===== -->
  <path d="M 470 162 L 470 172 L 240 172 L 240 186" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 470 172 L 700 172 L 700 186" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Left: Recompute ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="190" width="400" height="300" rx="10" fill="#fff8e1" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="240" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5415">策略一：Recompute（重计算）</text>

  <text x="56" y="240" font-size="11" fill="#444" font-weight="bold">流程：</text>
  <text x="56" y="258" font-size="10" fill="#444">1. 释放 victim 的 KV Cache（memory.free）</text>
  <text x="56" y="274" font-size="10" fill="#444">2. victim 状态 → WAITING</text>
  <text x="56" y="290" font-size="10" fill="#444">3. 重新放回 waiting 队列（heapq.push）</text>
  <text x="56" y="306" font-size="10" fill="#444">4. 新请求获得显存，加入 running</text>
  <text x="56" y="322" font-size="10" fill="#444">5. victim 重新调度时从头 prefill</text>

  <text x="56" y="350" font-size="11" fill="#2e8b57" font-weight="bold">优点：</text>
  <text x="56" y="368" font-size="10" fill="#444">• 实现简单，无需额外 CPU 内存</text>
  <text x="56" y="384" font-size="10" fill="#444">• 无 swap I/O 开销</text>

  <text x="56" y="412" font-size="11" fill="#c04050" font-weight="bold">缺点：</text>
  <text x="56" y="430" font-size="10" fill="#444">• 浪费已算的 prefill 计算</text>
  <text x="56" y="446" font-size="10" fill="#444">• 长 prompt 重算代价大</text>
  <text x="56" y="462" font-size="10" fill="#444">• victim 延迟显著增加</text>

  <text x="56" y="484" font-size="10" fill="#7a5415" font-weight="bold">适合：短 prompt、CPU 内存紧张</text>

  <!-- ===== Right: Swap ===== -->
  <g filter="url(#sk)">
    <rect x="500" y="190" width="400" height="300" rx="10" fill="#e0f7fa" stroke="#00838f" stroke-width="1.5"/>
  </g>
  <text x="700" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#005f6b">策略二：Swap（换出）</text>

  <text x="516" y="240" font-size="11" fill="#444" font-weight="bold">流程：</text>
  <text x="516" y="258" font-size="10" fill="#444">1. 释放 victim 的 GPU KV Cache</text>
  <text x="516" y="274" font-size="10" fill="#444">2. KV Cache 数据拷贝到 CPU 内存</text>
  <text x="516" y="290" font-size="10" fill="#444">3. victim 状态 → SWAPPED</text>
  <text x="516" y="306" font-size="10" fill="#444">4. 加入 swapped 列表</text>
  <text x="516" y="322" font-size="10" fill="#444">5. 显存足够时从 CPU 拷回，恢复 RUNNING</text>

  <text x="516" y="350" font-size="11" fill="#2e8b57" font-weight="bold">优点：</text>
  <text x="516" y="368" font-size="10" fill="#444">• 不浪费 prefill 计算</text>
  <text x="516" y="384" font-size="10" fill="#444">• 恢复快（拷回 vs 重算）</text>

  <text x="516" y="412" font-size="11" fill="#c04050" font-weight="bold">缺点：</text>
  <text x="516" y="430" font-size="10" fill="#444">• 需要 CPU 内存存储</text>
  <text x="516" y="446" font-size="10" fill="#444">• GPU↔CPU 拷贝有延迟</text>
  <text x="516" y="462" font-size="10" fill="#444">• 实现复杂（管理 swap 队列）</text>

  <text x="516" y="484" font-size="10" fill="#005f6b" font-weight="bold">适合：长 prompt、CPU 内存充足</text>

  <!-- ===== vLLM note ===== -->
  <g filter="url(#sk)">
    <rect x="40" y="504" width="860" height="28" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1"/>
  </g>
  <text x="470" y="522" text-anchor="middle" font-size="10" fill="#2b6e9e">💡 vLLM 默认用 recompute（简单），生产环境可根据 prompt 长度和 CPU 内存动态切换 swap</text>
</svg>
