<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">2D Jacobi Stencil：5 点平均 + 边界保留</text>
  <path d="M 260 42 Q 460 50 660 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- grid with stencil -->
  <text x="40" y="78" font-size="12" font-weight="bold" fill="#2b6e9e">输入网格 input[rows×cols]</text>

  <!-- 5x5 grid -->
  <g filter="url(#sk)">
    <!-- boundary cells (gray) -->
    <rect x="60" y="88" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="100" y="88" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="140" y="88" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="180" y="88" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="220" y="88" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="60" y="128" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="220" y="128" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="60" y="168" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="220" y="168" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="60" y="208" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="220" y="208" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="60" y="248" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="100" y="248" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="140" y="248" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="180" y="248" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="220" y="248" width="40" height="40" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <!-- top neighbor -->
    <rect x="140" y="128" width="40" height="40" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
    <!-- left neighbor -->
    <rect x="100" y="168" width="40" height="40" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
    <!-- center (output cell) -->
    <rect x="140" y="168" width="40" height="40" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="2.0"/>
    <!-- right neighbor -->
    <rect x="180" y="168" width="40" height="40" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
    <!-- bottom neighbor -->
    <rect x="140" y="208" width="40" height="40" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
  </g>

  <!-- labels -->
  <text x="160" y="113" text-anchor="middle" font-size="10" fill="#aaa">边界</text>
  <text x="160" y="273" text-anchor="middle" font-size="10" fill="#aaa">边界</text>
  <text x="160" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6e9e">output</text>
  <text x="160" y="153" text-anchor="middle" font-size="10" fill="#7a5415">上邻</text>
  <text x="120" y="193" text-anchor="middle" font-size="10" fill="#7a5415">左</text>
  <text x="200" y="193" text-anchor="middle" font-size="10" fill="#7a5415">右</text>
  <text x="160" y="233" text-anchor="middle" font-size="10" fill="#7a5415">下邻</text>

  <!-- arrows from neighbors to center -->
  <path d="M 160 170 L 160 152" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 178 188 L 162 188" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 142 188 L 158 188" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 160 206 L 160 190" stroke="#b85450" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- formula -->
  <g filter="url(#sk)">
    <rect x="320" y="88" width="560" height="50" rx="8" fill="#f0f7ff" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="600" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">output[i,j] = 0.25 × (input[i-1,j] + input[i+1,j] + input[i,j-1] + input[i,j+1])</text>
  <text x="600" y="128" text-anchor="middle" font-size="10" fill="#888">仅对内部点 1≤i≤rows-2, 1≤j≤cols-2 应用；边界点直接复制 input</text>

  <!-- boundary vs interior -->
  <text x="320" y="164" font-size="13" font-weight="bold" fill="#2b2b2b">边界 vs 内部处理</text>

  <g filter="url(#sk)">
    <rect x="320" y="176" width="270" height="100" rx="8" fill="#fff5f5" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="335" y="198" font-size="12" font-weight="bold" fill="#b85450">边界点（i=0 / i=rows-1 / j=0 / j=cols-1）</text>
  <text x="335" y="220" font-size="11" fill="#444">output[i,j] = input[i,j]</text>
  <text x="335" y="240" font-size="11" fill="#444">直接复制，不参与 stencil</text>
  <text x="335" y="260" font-size="10" fill="#888">保证边界条件不被破坏</text>

  <g filter="url(#sk)">
    <rect x="610" y="176" width="270" height="100" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="625" y="198" font-size="12" font-weight="bold" fill="#2e6e2e">内部点（1 ≤ i ≤ rows-2, 1 ≤ j ≤ cols-2）</text>
  <text x="625" y="220" font-size="11" fill="#444">output[i,j] = 0.25 × 四邻之和</text>
  <text x="625" y="240" font-size="11" fill="#444">5 点 stencil（自身不参与，只读四邻）</text>
  <text x="625" y="260" font-size="10" fill="#888">Jacobi 迭代的核心：用旧值算新值</text>

  <!-- naive vs tiled -->
  <text x="40" y="300" font-size="13" font-weight="bold" fill="#2b2b2b">朴素 vs tiled 访存对比</text>

  <g filter="url(#sk)">
    <rect x="40" y="312" width="410" height="128" rx="8" fill="#fff5f5" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="245" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">朴素：每 cell 从 global 读 4 个邻居</text>
  <text x="55" y="358" font-size="11" fill="#444">• 每个 input 元素被 4 个邻居各读一次</text>
  <text x="55" y="378" font-size="11" fill="#444">• 全局读 = 4 × rows × cols（冗余 4 倍）</text>
  <text x="55" y="398" font-size="11" fill="#b85450">• 8192² 网格 → 2.7 亿次读（~1 GB）</text>
  <text x="55" y="420" font-size="10" fill="#888">memory-bound，带宽浪费严重</text>

  <g filter="url(#sk)">
    <rect x="470" y="312" width="410" height="128" rx="8" fill="#f5fbf5" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="675" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">优化：tiled + halo —— 载入 shared 复用</text>
  <text x="485" y="358" font-size="11" fill="#444">• block 载入 tile + 1 圈 halo 到 shared</text>
  <text x="485" y="378" font-size="11" fill="#444">• 每个 input 元素只读 1 次，被 4 邻居复用</text>
  <text x="485" y="398" font-size="11" fill="#2e6e2e">• 全局读 ≈ rows × cols（无冗余）</text>
  <text x="485" y="420" font-size="10" fill="#888">shared memory 消除重复读，带宽节省 ~4 倍</text>
</svg>
