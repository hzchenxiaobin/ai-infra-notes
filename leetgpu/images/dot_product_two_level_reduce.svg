<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="480" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">融合单 kernel：grid-stride FMA + 两级 block 归约</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">归约部分完全复用 Day 1 的 warpReduceSum + blockReduceSum，唯一差别是循环体多了 a[i]*b[i]</text>

  <!-- ===== Inputs ===== -->
  <text x="30" y="76" font-size="12" fill="#446688" font-weight="bold">a[N], b[N]</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="84" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="60" y="98" text-anchor="middle" font-size="8">a[0]</text>
    <rect x="90" y="84" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="120" y="98" text-anchor="middle" font-size="8">a[1]</text>
    <rect x="150" y="84" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="180" y="98" text-anchor="middle" font-size="8">a[2]</text>
    <text x="230" y="98" font-size="10" fill="#888">...</text>

    <rect x="30" y="108" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="60" y="122" text-anchor="middle" font-size="8">b[0]</text>
    <rect x="90" y="108" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="120" y="122" text-anchor="middle" font-size="8">b[1]</text>
    <rect x="150" y="108" width="60" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="180" y="122" text-anchor="middle" font-size="8">b[2]</text>
    <text x="230" y="122" font-size="10" fill="#888">...</text>
  </g>
  <text x="300" y="100" font-size="9" fill="#888">global memory（各读 1 遍）</text>

  <!-- ===== grid-stride FMA loop ===== -->
  <path d="M 120 134 L 120 154" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="152" font-size="12" fill="#4a7a3a" font-weight="bold">① grid-stride FMA 累加（val 驻留寄存器）</text>

  <rect x="30" y="160" width="580" height="56" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="180" font-family="monospace" font-size="10" fill="#333">float val = 0;</text>
  <text x="44" y="196" font-family="monospace" font-size="10" fill="#333">for (int i = tid; i &lt; N; i += stride) {</text>
  <text x="60" y="210" font-family="monospace" font-size="10" fill="#b85450" font-weight="bold">    val += a[i] * b[i];   // 读 8B，1 乘 1 加，结果留寄存器（不落 HBM）</text>
  <text x="44" y="224" font-family="monospace" font-size="10" fill="#333">}</text>

  <!-- ===== block reduce ===== -->
  <path d="M 320 220 L 320 238" stroke="#d6a040" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="236" font-size="12" fill="#d6a040" font-weight="bold">② block 归约（复用 Day 1 模板）</text>

  <!-- warp reduce -->
  <rect x="30" y="246" width="270" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="266" font-size="11" fill="#d6a040" font-weight="bold">warp_reduce_sum（warp 内 32→1）</text>
  <g font-size="8" fill="#333">
    <rect x="44" y="276" width="22" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="55" y="288" text-anchor="middle">t0</text>
    <rect x="68" y="276" width="22" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="79" y="288" text-anchor="middle">t1</text>
    <rect x="92" y="276" width="22" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="103" y="288" text-anchor="middle">...</text>
    <rect x="116" y="276" width="22" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="127" y="288" text-anchor="middle">t31</text>
    <text x="150" y="288" font-size="9" fill="#d6a040">→ __shfl_down_sync</text>
    <text x="44" y="306" font-size="9" fill="#555">5 步折叠（offset=16,8,4,2,1）</text>
    <text x="44" y="320" font-size="9" fill="#555">lane 0 持 warp 和</text>
  </g>

  <!-- block reduce -->
  <rect x="320" y="246" width="290" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="334" y="266" font-size="11" fill="#d6a040" font-weight="bold">block_reduce_sum（warp 间汇总）</text>
  <g font-size="8" fill="#333">
    <rect x="334" y="276" width="40" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="354" y="288" text-anchor="middle">w0</text>
    <rect x="378" y="276" width="40" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="398" y="288" text-anchor="middle">w1</text>
    <rect x="422" y="276" width="40" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="442" y="288" text-anchor="middle">...</text>
    <text x="470" y="288" font-size="9" fill="#d6a040">→ shared[]</text>
    <text x="334" y="306" font-size="9" fill="#555">每 warp lane 0 写 shared</text>
    <text x="334" y="320" font-size="9" fill="#555">第一个 warp 再 warp_reduce → block 和</text>
  </g>

  <!-- ===== two-level: partial -> final ===== -->
  <path d="M 320 330 L 320 348" stroke="#446688" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="346" font-size="12" fill="#446688" font-weight="bold">③ 两级 kernel：partial[] → output</text>

  <g font-size="9" fill="#333">
    <!-- block 0..k -->
    <rect x="30" y="356" width="50" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="55" y="370" text-anchor="middle">p[0]</text>
    <rect x="82" y="356" width="50" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="107" y="370" text-anchor="middle">p[1]</text>
    <text x="145" y="370" font-size="10" fill="#888">...</text>
    <rect x="165" y="356" width="50" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="190" y="370" text-anchor="middle">p[k]</text>
    <text x="230" y="370" font-size="9" fill="#446688">partial[]（k 个 block 部分和）</text>

    <!-- second kernel -->
    <path d="M 100 378 L 100 396" stroke="#d6a040" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="40" y="398" width="180" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="130" y="414" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">dot_final kernel（单 block 归约）</text>

    <path d="M 130 424 L 130 442" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <rect x="90" y="444" width="80" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="130" y="459" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">output[0]</text>
  </g>

  <!-- annotation: reuse -->
  <rect x="280" y="398" width="320" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1" stroke-dasharray="3,2" rx="6" filter="url(#rough2)"/>
  <text x="440" y="416" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">与 Reduction #4 唯一差别：</text>
  <text x="440" y="432" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">val += input[i]  →  val += a[i] * b[i]</text>
</svg>
