<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Adder Transformer：一个 block 一个 batch，融合前向 + 11 步自回归</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- batch parallelism -->
  <text x="40" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">batch 维并行：grid=batch_size 个 block，每 block 独立推理</text>
  <g filter="url(#sk)">
    <rect x="40" y="84" width="150" height="40" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="40" y="128" width="150" height="40" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
    <rect x="40" y="172" width="150" height="40" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.3"/>
  </g>
  <text x="115" y="108" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">block 0 (batch 0)</text>
  <text x="115" y="152" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">block 1 (batch 1)</text>
  <text x="115" y="196" text-anchor="middle" font-size="11" fill="#7a2828" font-weight="bold">block 2 (batch 2)</text>
  <text x="115" y="230" text-anchor="middle" font-size="10" fill="#666">... (最多 100000)</text>

  <path d="M 190 148 L 220 148" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- fused forward pipeline -->
  <text x="240" y="74" font-size="12" font-weight="bold" fill="#444">融合前向 kernel（一个 block 内完成）</text>
  <g filter="url(#sk)">
    <rect x="230" y="84" width="600" height="200" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="5 3"/>
  </g>

  <text x="250" y="108" font-size="11" fill="#2b6e9e" font-weight="bold">① 各 thread 并行（tid ↔ 位置）：</text>
  <text x="265" y="126" font-size="10" fill="#444">embedding → unit rms norm → Q/K/V 投影 → QK norm → RoPE</text>
  <text x="265" y="142" font-size="10" fill="#666">写 s_k[tid], s_v[tid]（所有位置的 K/V，供 last 注意力）</text>

  <text x="250" y="170" font-size="11" fill="#b85450" font-weight="bold">② thread 0 串行（仅 last 位置）：</text>
  <text x="265" y="188" font-size="10" fill="#444">softmax attention: q_last · k_j → exp → Σ prob·v_j</text>
  <text x="265" y="204" font-size="10" fill="#444">O 投影 + 残差 → MLP(gate+SwiGLU+carry) + 残差</text>
  <text x="265" y="220" font-size="10" fill="#444">final RMSNorm → logits = h @ E^T (10 个)</text>
  <text x="265" y="236" font-size="10" fill="#2e6e2e">argmax(logits) → seq[cur_len] 追加下一 token</text>

  <text x="250" y="266" font-size="10" fill="#7a5415" font-weight="bold">last-only 优化：k_j,v_j 只依赖前注意力 embedding</text>
  <text x="265" y="280" font-size="10" fill="#666">→ 只算 last 的 attention/MLP，O(seq²) 降为 O(seq)</text>

  <!-- autoregressive loop -->
  <text x="40" y="312" font-size="12" font-weight="bold" fill="#7a5415">③ host 端 11 步自回归循环</text>
  <g filter="url(#sk)">
    <rect x="40" y="320" width="790" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="55" y="348" font-size="11" fill="#7a5415">for step in 0..10: cur_len=31+step; launch forward_step_kernel; output[b,step]=logits; seq.append(argmax)</text>

  <!-- key insight -->
  <g filter="url(#sk)">
    <rect x="40" y="376" width="790" height="36" rx="6" fill="#f0f7ff" stroke="#4a8edb" stroke-width="1.1" stroke-dasharray="4 2"/>
  </g>
  <text x="55" y="398" font-size="11" fill="#2b6e9e" font-weight="bold">关键：</text>
  <text x="110" y="398" font-size="11" fill="#444">融合前向消除 60+ 次 launch 开销 · last-only 把 attention 从 O(seq²) 降到 O(seq) · batch 维并行撑满 GPU</text>
</svg>
