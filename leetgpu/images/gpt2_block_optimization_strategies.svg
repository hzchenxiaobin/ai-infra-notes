<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="920" height="380" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">优化策略：融合 vs 分步 vs cuBLAS 调用</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 方案A: 全融合 -->
  <g filter="url(#sk)">
    <rect x="30" y="70" width="270" height="280" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="165" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">A. 全融合（最优）</text>
  <text x="46" y="118" font-size="11" fill="#444">LayerNorm + QKV + Attention</text>
  <text x="46" y="136" font-size="11" fill="#444">+ FFN 全在一个 mega-kernel</text>
  <text x="46" y="164" font-size="11" fill="#2e6e2e">✓ 零中间矩阵物化</text>
  <text x="46" y="182" font-size="11" fill="#2e6e2e">✓ 最少 HBM 往返</text>
  <text x="46" y="210" font-size="11" fill="#b03a3a">✗ 实现极复杂</text>
  <text x="46" y="228" font-size="11" fill="#b03a3a">✗ 灵活性差（改结构要重写）</text>
  <text x="46" y="262" font-size="10" fill="#666">代表：FlashAttention 的</text>
  <text x="46" y="278" font-size="10" fill="#666">全融合变体、Triton fused</text>
  <text x="46" y="294" font-size="10" fill="#666">transformer layer</text>
  <text x="46" y="324" font-size="10" fill="#2e6e2e" font-weight="bold">HBM IO: 最少</text>

  <!-- 方案B: 算子级调用 cuBLAS -->
  <g filter="url(#sk)">
    <rect x="325" y="70" width="270" height="280" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="460" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">B. cuBLAS + 自定义小 kernel</text>
  <text x="341" y="118" font-size="11" fill="#444">GEMM 调 cuBLAS（最优）</text>
  <text x="341" y="136" font-size="11" fill="#444">LayerNorm/softmax 自定义</text>
  <text x="341" y="164" font-size="11" fill="#2e6e2e">✓ GEMM 用 Tensor Core</text>
  <text x="341" y="182" font-size="11" fill="#2e6e2e">✓ 灵活（换结构只改拼装）</text>
  <text x="341" y="210" font-size="11" fill="#b03a3a">✗ 中间矩阵落 HBM</text>
  <text x="341" y="228" font-size="11" fill="#b03a3a">✗ launch 数多（gap 大）</text>
  <text x="341" y="262" font-size="10" fill="#666">代表：PyTorch eager、</text>
  <text x="341" y="278" font-size="10" fill="#666">vLLM 早期版本</text>
  <text x="341" y="324" font-size="10" fill="#4a8edb" font-weight="bold">HBM IO: 中等</text>

  <!-- 方案C: torch.compile -->
  <g filter="url(#sk)">
    <rect x="620" y="70" width="270" height="280" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="755" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">C. torch.compile（折中）</text>
  <text x="636" y="118" font-size="11" fill="#444">写 PyTorch 代码，编译器</text>
  <text x="636" y="136" font-size="11" fill="#444">自动 fuse element-wise</text>
  <text x="636" y="164" font-size="11" fill="#2e6e2e">✓ 易写易维护</text>
  <text x="636" y="182" font-size="11" fill="#2e6e2e">✓ 自动融合 LN/softmax/GELU</text>
  <text x="636" y="210" font-size="11" fill="#b03a3a">✗ GEMM 仍单独</text>
  <text x="636" y="228" font-size="11" fill="#b03a3a">✗ 融合不如手写极致</text>
  <text x="636" y="262" font-size="10" fill="#666">代表：vLLM + torch.compile、</text>
  <text x="636" y="278" font-size="10" fill="#666">生产推理框架主流</text>
  <text x="636" y="324" font-size="10" fill="#7a5415" font-weight="bold">HBM IO: 较少</text>
</svg>
