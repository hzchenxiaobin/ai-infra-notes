<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="23"/>
      <feDisplacementMap in="SourceGraphic" scale="1.6"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#fdfcf7"/>

  <text x="360" y="28" text-anchor="middle" font-size="16" fill="#2b2b2b" font-weight="bold">Subarray Sum：范围 [S, E] 内归约求和</text>
  <text x="360" y="46" text-anchor="middle" font-size="11" fill="#888">output[0] = Σ input[S..E]（含两端），range_len = E − S + 1</text>

  <!-- input array with range highlight -->
  <text x="30" y="82" font-size="12" fill="#446688" font-weight="bold">input[]</text>
  <g font-size="10" fill="#333">
    <rect x="60" y="68" width="48" height="26" fill="#eee" stroke="#aaa" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="84" y="86" text-anchor="middle" font-size="9" fill="#aaa">0</text>
    <text x="118" y="86" text-anchor="middle" font-size="10" fill="#888">...</text>
    <rect x="138" y="68" width="48" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" rx="3" filter="url(#rough2)"/>
    <text x="162" y="86" text-anchor="middle" font-size="9" fill="#7a5415">S</text>
    <rect x="186" y="68" width="48" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" rx="3" filter="url(#rough2)"/>
    <text x="210" y="86" text-anchor="middle" font-size="9" fill="#7a5415">S+1</text>
    <rect x="234" y="68" width="48" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" rx="3" filter="url(#rough2)"/>
    <text x="258" y="86" text-anchor="middle" font-size="9" fill="#7a5415">...</text>
    <rect x="282" y="68" width="48" height="26" fill="#fff8e1" stroke="#d6a040" stroke-width="1.6" rx="3" filter="url(#rough2)"/>
    <text x="306" y="86" text-anchor="middle" font-size="9" fill="#7a5415">E</text>
    <rect x="330" y="68" width="48" height="26" fill="#eee" stroke="#aaa" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="354" y="86" text-anchor="middle" font-size="9" fill="#aaa">...</text>
    <text x="392" y="86" font-size="11" fill="#888">N</text>
  </g>
  <path d="M 162 96 L 306 96" stroke="#d6a040" stroke-width="2" fill="none" filter="url(#rough2)"/>
  <text x="234" y="112" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">range_len = E − S + 1（只归约这一段）</text>

  <!-- grid-stride over [S,E] -->
  <path d="M 234 116 L 234 138" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="136" font-size="12" fill="#4a7a3a" font-weight="bold">① grid-stride 累加（off ∈ [0, range_len)，读 input[S+off]）</text>

  <rect x="30" y="146" width="660" height="44" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="166" font-family="monospace" font-size="11" fill="#333">long long sum = 0;</text>
  <text x="44" y="182" font-family="monospace" font-size="11" fill="#333">for (int off = tid; off &lt; range_len; off += stride) sum += input[S + off];</text>

  <!-- block reduce -->
  <path d="M 360 192 L 360 210" stroke="#d6a040" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="208" font-size="12" fill="#d6a040" font-weight="bold">② block 归约（warp shuffle → shared → warp 0 终约）</text>

  <rect x="30" y="218" width="320" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="238" font-size="11" fill="#7a5415" font-weight="bold">warp_reduce（__shfl_down_sync，5 步折叠）</text>
  <text x="44" y="254" font-size="10" fill="#555">32 lane → lane 0 持 warp 部分和（long long）</text>
  <text x="44" y="270" font-size="10" fill="#555">warp lane 0 → shared[warp_id]</text>

  <rect x="370" y="218" width="320" height="60" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1" rx="6" filter="url(#rough2)"/>
  <text x="384" y="238" font-size="11" fill="#7a5415" font-weight="bold">block 终约（第一个 warp）</text>
  <text x="384" y="254" font-size="10" fill="#555">__syncthreads 后，前 8 lane 读 shared[]</text>
  <text x="384" y="270" font-size="10" fill="#555">再 warp_reduce → block 部分和</text>

  <!-- cross-block atomicAdd -->
  <path d="M 360 280 L 360 298" stroke="#446688" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="296" font-size="12" fill="#446688" font-weight="bold">③ 跨 block 归约：atomicAdd 到 scratch（long long）</text>

  <rect x="220" y="306" width="280" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="360" y="324" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">scratch[0] = Σ block 部分和</text>
  <text x="360" y="338" text-anchor="middle" font-size="9" fill="#888">atomicAdd((unsigned long long*)scratch, ...)</text>

  <!-- cast to int -->
  <path d="M 360 348 L 360 366" stroke="#b85450" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <rect x="280" y="370" width="160" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="6" filter="url(#rough2)"/>
  <text x="360" y="390" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">cast：output[0] = (int)scratch[0]</text>

  <!-- insight -->
  <rect x="30" y="414" width="660" height="38" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="360" y="432" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">关键：用 long long 内部累加匹配 torch.sum 的 int64 语义，最后再 cast 到 int32 输出</text>
  <text x="360" y="446" text-anchor="middle" font-size="10" fill="#666">只读 [S,E] 一段 → memory-bound，归约树深度 O(log WARP)</text>
</svg>
