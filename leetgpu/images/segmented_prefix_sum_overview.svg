<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="15" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Segmented Prefix Sum：段内扫描 + 段间独立</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input -->
  <text x="60" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">① 输入 input[]（两段：A | B）</text>
  <g filter="url(#sk)">
    <rect x="60" y="84" width="50" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="110" y="84" width="50" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="160" y="84" width="50" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="85" y="106" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="135" y="106" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="185" y="106" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="110" y="76" font-size="9" fill="#2b6e9e" font-weight="bold">段A</text>

  <g filter="url(#sk)">
    <rect x="240" y="84" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="290" y="84" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="340" y="84" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="265" y="106" text-anchor="middle" font-size="12" fill="#333">4</text>
  <text x="315" y="106" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="365" y="106" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="315" y="76" font-size="9" fill="#7a5415" font-weight="bold">段B</text>

  <!-- segment boundary marker -->
  <path d="M 225 80 L 225 122" stroke="#b85450" stroke-width="2" stroke-dasharray="3 2" fill="none" filter="url(#sk)"/>
  <text x="225" y="138" text-anchor="middle" font-size="9" fill="#b85450">段边界</text>

  <!-- arrow down -->
  <path d="M 210 124 L 210 148" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- output exclusive prefix sum per segment -->
  <text x="60" y="164" font-size="12" font-weight="bold" fill="#2e6e2e">② 输出 output[]（段内 exclusive prefix sum，段间不 carry）</text>
  <g filter="url(#sk)">
    <rect x="60" y="174" width="50" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="110" y="174" width="50" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="160" y="174" width="50" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="85" y="196" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">0</text>
  <text x="135" y="196" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">3</text>
  <text x="185" y="196" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">4</text>

  <g filter="url(#sk)">
    <rect x="240" y="174" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="290" y="174" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="340" y="174" width="50" height="34" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="265" y="196" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">0</text>
  <text x="315" y="196" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">4</text>
  <text x="365" y="196" text-anchor="middle" font-size="12" fill="#7a5415" font-weight="bold">6</text>

  <text x="225" y="166" text-anchor="middle" font-size="9" fill="#888">段B 重新从 0 开始</text>

  <!-- key points -->
  <g filter="url(#sk)">
    <rect x="60" y="240" width="760" height="120" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="264" font-size="12" font-weight="bold" fill="#444">关键：段内 warp scan + 段边界处理</text>
  <text x="80" y="288" font-size="11" fill="#444">• 段内：用 __shfl_up_sync 做 exclusive prefix sum（同 Week2 Day1 的 prefix sum）</text>
  <text x="80" y="308" font-size="11" fill="#444">• 段边界：检测当前元素是否是段首，是则强制前缀=0（不 carry 前一段的和）</text>
  <text x="80" y="328" font-size="11" fill="#444">• 类比 Chunked Prefill：每个 chunk = 一个段，段内 attention 独立，段间通过 KV Cache 累积（carry）</text>
  <text x="80" y="348" font-size="11" fill="#7a5415">• 区别：segmented prefix sum 段间不 carry；chunked prefill 段间 carry（KV 状态传递）</text>
</svg>
