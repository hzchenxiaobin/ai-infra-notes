<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="47" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Worked Example：5 点 stencil 逐步演算（4×4 网格）</text>
  <path d="M 240 42 Q 460 50 680 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input grid -->
  <text x="40" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">输入 input[4×4]</text>
  <g filter="url(#sk)">
    <rect x="40" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="90" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="140" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="190" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="40" y="134" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="90" y="134" width="50" height="50" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="140" y="134" width="50" height="50" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="190" y="134" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="40" y="184" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="90" y="184" width="50" height="50" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="140" y="184" width="50" height="50" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="190" y="184" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="40" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="90" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="140" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="190" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
  </g>
  <text x="65" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">1</text>
  <text x="115" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">2</text>
  <text x="165" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">3</text>
  <text x="215" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">4</text>

  <text x="65" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">5</text>
  <text x="115" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">6</text>
  <text x="165" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">7</text>
  <text x="215" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">8</text>

  <text x="65" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">9</text>
  <text x="115" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">10</text>
  <text x="165" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">11</text>
  <text x="215" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">12</text>

  <text x="65" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">13</text>
  <text x="115" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">14</text>
  <text x="165" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">15</text>
  <text x="215" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">16</text>

  <text x="115" y="80" font-size="9" fill="#888">内部(蓝)  边界(灰)</text>

  <!-- computation for cell [1,1] -->
  <text x="300" y="74" font-size="12" font-weight="bold" fill="#7a5415">内部点 [1,1] 的 stencil 计算</text>
  <g filter="url(#sk)">
    <rect x="300" y="84" width="340" height="120" rx="8" fill="#fffdf3" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="315" y="108" font-size="12" font-weight="bold" fill="#7a5415">output[1,1] = 0.25 × (上+下+左+右)</text>
  <text x="315" y="130" font-size="11" fill="#444">上 = input[0,1] = 2</text>
  <text x="315" y="148" font-size="11" fill="#444">下 = input[2,1] = 10</text>
  <text x="315" y="166" font-size="11" fill="#444">左 = input[1,0] = 5</text>
  <text x="315" y="184" font-size="11" fill="#444">右 = input[1,2] = 7</text>
  <text x="315" y="200" font-size="12" font-weight="bold" fill="#2e6e2e">= 0.25 × (2+10+5+7) = 0.25 × 24 = 6.0</text>

  <!-- computation for cell [1,2] -->
  <text x="300" y="226" font-size="12" font-weight="bold" fill="#7a5415">内部点 [1,2] 的 stencil 计算</text>
  <g filter="url(#sk)">
    <rect x="300" y="236" width="340" height="120" rx="8" fill="#fffdf3" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="315" y="260" font-size="12" font-weight="bold" fill="#7a5415">output[1,2] = 0.25 × (上+下+左+右)</text>
  <text x="315" y="282" font-size="11" fill="#444">上 = input[0,2] = 3</text>
  <text x="315" y="300" font-size="11" fill="#444">下 = input[2,2] = 11</text>
  <text x="315" y="318" font-size="11" fill="#444">左 = input[1,1] = 6</text>
  <text x="315" y="336" font-size="11" fill="#444">右 = input[1,3] = 8</text>
  <text x="315" y="352" font-size="12" font-weight="bold" fill="#2e6e2e">= 0.25 × (3+11+6+8) = 0.25 × 28 = 7.0</text>

  <!-- output grid -->
  <path d="M 200 280 L 300 290" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <text x="680" y="74" font-size="12" font-weight="bold" fill="#2e6e2e">输出 output[4×4]</text>
  <g filter="url(#sk)">
    <rect x="680" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="730" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="780" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="830" y="84" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="680" y="134" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="730" y="134" width="50" height="50" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="780" y="134" width="50" height="50" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="830" y="134" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="680" y="184" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="730" y="184" width="50" height="50" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="780" y="184" width="50" height="50" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="830" y="184" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>

    <rect x="680" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="730" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="780" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
    <rect x="830" y="234" width="50" height="50" rx="3" fill="#f5f5f5" stroke="#ccc" stroke-width="1.0"/>
  </g>
  <text x="705" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">1</text>
  <text x="755" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">2</text>
  <text x="805" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">3</text>
  <text x="855" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">4</text>

  <text x="705" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">5</text>
  <text x="755" y="164" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">6.0</text>
  <text x="805" y="164" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">7.0</text>
  <text x="855" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">8</text>

  <text x="705" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">9</text>
  <text x="755" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">8.0</text>
  <text x="805" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e6e2e">9.0</text>
  <text x="855" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">12</text>

  <text x="705" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">13</text>
  <text x="755" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">14</text>
  <text x="805" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">15</text>
  <text x="855" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#aaa">16</text>

  <!-- bottom note -->
  <g filter="url(#sk)">
    <rect x="40" y="380" width="840" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="404" font-size="12" font-weight="bold" fill="#444">💡 关键观察</text>
  <text x="60" y="424" font-size="11" fill="#444">• 边界格（灰）直接复制：1,2,3,4,5,8,9,12,13,14,15,16 保持不变</text>
  <text x="60" y="442" font-size="11" fill="#444">• 内部格（绿）= 四邻平均：[1,1]=6.0, [1,2]=7.0, [2,1]=8.0, [2,2]=9.0</text>
  <text x="60" y="462" font-size="11" fill="#444">• Jacobi 特性：用 input 的旧值算 output 的新值（同一 pass 内不交叉更新）</text>
  <text x="60" y="482" font-size="11" fill="#b85450">• 每个内部 input 元素被 4 个邻居读取 → tiled + halo 消除冗余读</text>
</svg>
