<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="500" fill="#fafafa"/>

  <!-- ============ PHASE 2 ============ -->
  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">阶段二 scan_offsets_kernel：对 block_sums 做前缀和 → 全局偏移</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">单 block grid-stride 迭代，算出每个 block 的全局起始偏移</text>

  <!-- input: block_sums (orange) -->
  <text x="30" y="88" font-size="11" fill="#d6a040" font-weight="bold">block_sums[]</text>
  <g font-size="10" fill="#333">
    <rect x="110" y="74" width="54" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="137" y="89" text-anchor="middle">S0</text>
    <rect x="172" y="74" width="54" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="199" y="89" text-anchor="middle">S1</text>
    <rect x="234" y="74" width="54" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="261" y="89" text-anchor="middle">S2</text>
    <rect x="296" y="74" width="54" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="323" y="89" text-anchor="middle">S3</text>
    <text x="360" y="89" font-size="11" fill="#888">...</text>
  </g>

  <!-- exclusive scan arrows -->
  <g stroke="#4a7a3a" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 137 98 L 137 128" marker-end="url(#arr)"/>
    <path d="M 199 98 L 199 128" marker-end="url(#arr)"/>
    <path d="M 261 98 L 261 128" marker-end="url(#arr)"/>
    <path d="M 323 98 L 323 128" marker-end="url(#arr)"/>
  </g>
  <text x="400" y="116" font-size="10" fill="#4a7a3a" font-weight="bold">exclusive scan</text>
  <text x="400" y="129" font-size="9" fill="#888">(单 block 内串行/迭代)</text>

  <!-- output: block_offsets (green) -->
  <text x="30" y="148" font-size="11" fill="#4a7a3a" font-weight="bold">block_offsets[]</text>
  <g font-size="9" fill="#333">
    <rect x="110" y="132" width="54" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="137" y="147" text-anchor="middle">0</text>
    <rect x="172" y="132" width="54" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="199" y="147" text-anchor="middle">S0</text>
    <rect x="234" y="132" width="54" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="261" y="147" text-anchor="middle">S0+S1</text>
    <rect x="296" y="132" width="54" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="323" y="147" text-anchor="middle">S0+S1+S2</text>
    <text x="360" y="147" font-size="11" fill="#888">...</text>
  </g>

  <text x="30" y="176" font-size="10" fill="#555">block_offsets[i] = 前 i 个 block 的总和 = block i 的全局起始偏移</text>
  <text x="30" y="196" font-size="10" fill="#888">注：numBlocks &gt; 256 时用 grid-stride 迭代累积 running offset（一个 block 多次扫）</text>

  <!-- separator -->
  <line x1="20" y1="216" x2="620" y2="216" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- ============ PHASE 3 ============ -->
  <text x="320" y="238" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">阶段三 add_offset_kernel：加回全局偏移 + input → inclusive</text>
  <text x="320" y="256" text-anchor="middle" font-size="11" fill="#888">output[i] = exclusive[i] + block_offsets[blockIdx.x] + input[i]</text>

  <!-- Block 0 header -->
  <text x="160" y="282" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">Block 0  （offset = 0）</text>
  <!-- Block 1 header -->
  <text x="480" y="282" text-anchor="middle" font-size="11" fill="#446688" font-weight="bold">Block 1  （offset = S0）</text>

  <!-- shared row labels (center) -->
  <g font-size="9" fill="#888" text-anchor="middle">
    <text x="320" y="321">excl</text>
    <text x="320" y="347">+ off</text>
    <text x="320" y="373">+ in</text>
    <text x="320" y="399" font-weight="bold">= incl</text>
  </g>

  <!-- ===== Block 0 rows ===== -->
  <!-- excl (blue) -->
  <g font-size="10" fill="#333">
    <rect x="120" y="308" width="40" height="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="140" y="321" text-anchor="middle">0</text>
    <rect x="165" y="308" width="40" height="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="185" y="321" text-anchor="middle">3</text>
  </g>
  <!-- + off (green, broadcast) -->
  <g font-size="10" fill="#333">
    <rect x="120" y="334" width="85" height="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="162" y="347" text-anchor="middle">0  (广播)</text>
  </g>
  <!-- + in (orange) -->
  <g font-size="10" fill="#333">
    <rect x="120" y="360" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="140" y="373" text-anchor="middle">3</text>
    <rect x="165" y="360" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="185" y="373" text-anchor="middle">1</text>
  </g>
  <!-- = incl (red bold) -->
  <g font-size="10" fill="#b85450" font-weight="bold">
    <rect x="120" y="386" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="140" y="399" text-anchor="middle">3</text>
    <rect x="165" y="386" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="185" y="399" text-anchor="middle">4</text>
  </g>

  <!-- ===== Block 1 rows ===== -->
  <!-- excl (blue) -->
  <g font-size="10" fill="#333">
    <rect x="440" y="308" width="40" height="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="321" text-anchor="middle">0</text>
    <rect x="485" y="308" width="40" height="18" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="505" y="321" text-anchor="middle">4</text>
  </g>
  <!-- + off (green, broadcast) -->
  <g font-size="10" fill="#333">
    <rect x="440" y="334" width="85" height="18" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="482" y="347" text-anchor="middle">S0 = 4  (广播)</text>
  </g>
  <!-- + in (orange) -->
  <g font-size="10" fill="#333">
    <rect x="440" y="360" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="373" text-anchor="middle">4</text>
    <rect x="485" y="360" width="40" height="18" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="505" y="373" text-anchor="middle">2</text>
  </g>
  <!-- = incl (red bold) -->
  <g font-size="10" fill="#b85450" font-weight="bold">
    <rect x="440" y="386" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="460" y="399" text-anchor="middle">8</text>
    <rect x="485" y="386" width="40" height="18" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="505" y="399" text-anchor="middle">10</text>
  </g>

  <!-- whole-array check note -->
  <text x="320" y="416" text-anchor="middle" font-size="9" fill="#888">两 block 拼起来 = 全局 inclusive 前缀和 [3, 4, 8, 10] ✓</text>

  <!-- code snippet -->
  <rect x="25" y="426" width="590" height="62" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="38" y="445" font-family="monospace" font-size="10" fill="#333">__global__ void add_offset_kernel(float* out, const float* excl, const float* in, const float* off) {</text>
  <text x="38" y="461" font-family="monospace" font-size="10" fill="#333">    int i = blockIdx.x * blockDim.x + threadIdx.x;</text>
  <text x="38" y="477" font-family="monospace" font-size="10" fill="#b85450">    out[i] = excl[i] + off[blockIdx.x] + in[i];   // exclusive + 偏移 + input = inclusive</text>
</svg>
