<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="500" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Double Buffering：计算与访存重叠</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">两份 shared buffer 交替：当前 tile 计算时预取下一 tile，消除访存空窗</text>

  <!-- ===== Top: naive (no double buffer) ===== -->
  <text x="30" y="76" font-size="12" fill="#b85450" font-weight="bold">朴素版（单 buffer）：访存与计算严格串行</text>

  <g font-size="9" fill="#333">
    <!-- timeline axis -->
    <line x1="30" y1="100" x2="610" y2="100" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <text x="30" y="116" font-size="9" fill="#888">t→</text>

    <!-- tile 0 load -->
    <rect x="40" y="86" width="60" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="70" y="100" text-anchor="middle" font-size="9" fill="#b85450">load 0</text>
    <!-- sync -->
    <text x="108" y="100" font-size="8" fill="#888" text-anchor="middle">sync</text>
    <!-- tile 0 compute -->
    <rect x="120" y="86" width="80" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="160" y="100" text-anchor="middle" font-size="9" fill="#446688">compute 0</text>
    <!-- sync -->
    <text x="208" y="100" font-size="8" fill="#888" text-anchor="middle">sync</text>
    <!-- tile 1 load -->
    <rect x="220" y="86" width="60" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="250" y="100" text-anchor="middle" font-size="9" fill="#b85450">load 1</text>
    <text x="288" y="100" font-size="8" fill="#888" text-anchor="middle">sync</text>
    <!-- tile 1 compute -->
    <rect x="300" y="86" width="80" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="340" y="100" text-anchor="middle" font-size="9" fill="#446688">compute 1</text>
    <text x="388" y="100" font-size="8" fill="#888" text-anchor="middle">sync</text>
    <!-- tile 2 load -->
    <rect x="400" y="86" width="60" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="430" y="100" text-anchor="middle" font-size="9" fill="#b85450">load 2</text>
    <text x="468" y="100" font-size="8" fill="#888" text-anchor="middle">sync</text>
    <!-- ellipsis -->
    <text x="490" y="100" font-size="11" fill="#888">...</text>
  </g>

  <!-- idle gaps annotation -->
  <rect x="120" y="120" width="80" height="14" fill="none" stroke="#d6a040" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
  <text x="160" y="131" text-anchor="middle" font-size="8" fill="#d6a040">SM 计算时 HBM 空闲</text>
  <rect x="40" y="120" width="60" height="14" fill="none" stroke="#d6a040" stroke-width="0.8" stroke-dasharray="2,2" rx="2" filter="url(#rough2)"/>
  <text x="70" y="131" text-anchor="middle" font-size="8" fill="#d6a040">SM 等访存空转</text>
  <text x="320" y="146" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">总耗时 = Σ(load + compute)，无重叠</text>

  <line x1="20" y1="160" x2="620" y2="160" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <!-- ===== Bottom: double buffer ===== -->
  <text x="30" y="184" font-size="12" fill="#4a7a3a" font-weight="bold">Double Buffer（双 buffer）：访存与计算重叠</text>

  <!-- buf 0 row -->
  <text x="30" y="210" font-size="10" fill="#446688" font-weight="bold">buf 0</text>
  <g font-size="9" fill="#333">
    <!-- prologue load 0 -->
    <rect x="80" y="196" width="50" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="105" y="210" text-anchor="middle" font-size="8" fill="#b85450">load 0</text>
    <!-- compute 0 (on buf 0) -->
    <rect x="160" y="196" width="90" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="205" y="210" text-anchor="middle" font-size="9" fill="#446688">compute 0</text>
    <!-- compute 2 (on buf 0) -->
    <rect x="380" y="196" width="90" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="425" y="210" text-anchor="middle" font-size="9" fill="#446688">compute 2</text>
    <text x="500" y="210" font-size="11" fill="#888">...</text>
  </g>

  <!-- buf 1 row -->
  <text x="30" y="242" font-size="10" fill="#4a7a3a" font-weight="bold">buf 1</text>
  <g font-size="9" fill="#333">
    <!-- load 1 (prefetched during compute 0) -->
    <rect x="160" y="228" width="50" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="185" y="242" text-anchor="middle" font-size="8" fill="#b85450">load 1</text>
    <!-- compute 1 (on buf 1) -->
    <rect x="270" y="228" width="90" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="315" y="242" text-anchor="middle" font-size="9" fill="#4a7a3a">compute 1</text>
    <!-- load 3 (prefetched during compute 2) -->
    <rect x="380" y="228" width="50" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="405" y="242" text-anchor="middle" font-size="8" fill="#b85450">load 3</text>
    <text x="500" y="242" font-size="11" fill="#888">...</text>
  </g>

  <!-- overlap region highlight -->
  <rect x="160" y="194" width="50" height="56" fill="none" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
  <text x="185" y="270" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">重叠区</text>
  <text x="185" y="282" text-anchor="middle" font-size="8" fill="#888">load 1 与 compute 0 并行</text>

  <!-- sync markers -->
  <line x1="150" y1="192" x2="150" y2="254" stroke="#888" stroke-width="0.6" stroke-dasharray="2,2" filter="url(#rough2)"/>
  <text x="150" y="262" text-anchor="middle" font-size="8" fill="#888">sync</text>
  <line x1="260" y1="192" x2="260" y2="254" stroke="#888" stroke-width="0.6" stroke-dasharray="2,2" filter="url(#rough2)"/>
  <text x="260" y="262" text-anchor="middle" font-size="8" fill="#888">sync</text>
  <line x1="370" y1="192" x2="370" y2="254" stroke="#888" stroke-width="0.6" stroke-dasharray="2,2" filter="url(#rough2)"/>
  <text x="370" y="262" text-anchor="middle" font-size="8" fill="#888">sync</text>

  <!-- time comparison -->
  <text x="30" y="296" font-size="10" fill="#555">总耗时 ≈ max(load, compute) × N_tiles（访存被计算掩盖）</text>

  <!-- ===== Code snippet ===== -->
  <rect x="30" y="312" width="580" height="100" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="332" font-family="monospace" font-size="10" fill="#333">__shared__ float sA[2][BM][BK], sB[2][BK][BN];   // 双缓冲</text>
  <text x="44" y="348" font-family="monospace" font-size="10" fill="#333">loadTile(0, buf=0); __syncthreads();             // prologue</text>
  <text x="44" y="364" font-family="monospace" font-size="10" fill="#333">for (bk = 0; bk &lt; numTiles; ++bk) {</text>
  <text x="60" y="378" font-family="monospace" font-size="10" fill="#d6a040">if (bk+1 &lt; numTiles) loadTile(bk+1, 1-bk%2);  // 预取下一 tile</text>
  <text x="60" y="392" font-family="monospace" font-size="10" fill="#446688">compute(bk % 2);                            // 计算当前 tile</text>
  <text x="60" y="406" font-family="monospace" font-size="10" fill="#888">__syncthreads();                            // 确保预取完成</text>
  <text x="44" y="420" font-family="monospace" font-size="10" fill="#333">}</text>

  <!-- ===== Bottom summary ===== -->
  <rect x="30" y="424" width="580" height="62" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="44" y="446" font-size="12" fill="#4a7a3a" font-weight="bold">双缓冲的本质：</text>
  <text x="44" y="464" font-size="10" fill="#555">当前 tile 的 FMA 计算与下一 tile 的 global→shared 加载重叠，</text>
  <text x="44" y="478" font-size="10" fill="#555">warp 调度器在等访存的 warp 上切换到计算 warp，隐藏大部分延迟 → sm__throughput ↑</text>
</svg>
