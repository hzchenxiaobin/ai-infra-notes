<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Stream Compaction：Predicate + Scan + Scatter</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input array -->
  <text x="60" y="76" font-size="12" font-weight="bold" fill="#2b6e9e">① 输入 input[]</text>
  <g filter="url(#sk)">
    <rect x="60" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="120" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="180" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="240" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="300" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
    <rect x="360" y="84" width="60" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="90" y="106" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="150" y="106" text-anchor="middle" font-size="12" fill="#333">0</text>
  <text x="210" y="106" text-anchor="middle" font-size="12" fill="#333">5</text>
  <text x="270" y="106" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="330" y="106" text-anchor="middle" font-size="12" fill="#333">0</text>
  <text x="390" y="106" text-anchor="middle" font-size="12" fill="#333">7</text>

  <path d="M 210 124 L 210 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- predicate -->
  <text x="60" y="158" font-size="12" font-weight="bold" fill="#7a5415">② predicate[] = (x != 0)</text>
  <g filter="url(#sk)">
    <rect x="60" y="166" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="120" y="166" width="60" height="34" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <rect x="180" y="166" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="240" y="166" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
    <rect x="300" y="166" width="60" height="34" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
    <rect x="360" y="166" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="90" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="150" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">0</text>
  <text x="210" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="270" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">1</text>
  <text x="330" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">0</text>
  <text x="390" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">1</text>

  <path d="M 210 206 L 210 224" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- exclusive prefix sum -->
  <text x="60" y="240" font-size="12" font-weight="bold" fill="#5a2e7e">③ exclusive prefix sum（扫描）</text>
  <g filter="url(#sk)">
    <rect x="60" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
    <rect x="120" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
    <rect x="180" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
    <rect x="240" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
    <rect x="300" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
    <rect x="360" y="248" width="60" height="34" rx="4" fill="#f3e8fa" stroke="#7a4a9e" stroke-width="1.4"/>
  </g>
  <text x="90" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">0</text>
  <text x="150" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">1</text>
  <text x="210" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">1</text>
  <text x="270" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">2</text>
  <text x="330" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">3</text>
  <text x="390" y="270" text-anchor="middle" font-size="12" fill="#5a2e7e">3</text>
  <text x="430" y="270" font-size="10" fill="#888">← 新位置</text>

  <path d="M 210 288 L 460 288 Q 540 288 540 270 L 540 140" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- output -->
  <text x="540" y="76" font-size="12" font-weight="bold" fill="#2e6e2e">④ 输出 output[]（紧凑）</text>
  <g filter="url(#sk)">
    <rect x="540" y="124" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <rect x="600" y="124" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <rect x="660" y="124" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
    <rect x="720" y="124" width="60" height="34" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="570" y="146" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">3</text>
  <text x="630" y="146" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">5</text>
  <text x="690" y="146" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">2</text>
  <text x="750" y="146" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">7</text>

  <!-- scatter arrows -->
  <path d="M 90 124 Q 90 300 570 158" stroke="#4a8e4a" stroke-width="1" fill="none" stroke-dasharray="4 2" filter="url(#sk)"/>
  <path d="M 210 124 Q 210 320 630 158" stroke="#4a8e4a" stroke-width="1" fill="none" stroke-dasharray="4 2" filter="url(#sk)"/>
  <path d="M 270 124 Q 270 340 690 158" stroke="#4a8e4a" stroke-width="1" fill="none" stroke-dasharray="4 2" filter="url(#sk)"/>
  <path d="M 390 124 Q 390 360 750 158" stroke="#4a8e4a" stroke-width="1" fill="none" stroke-dasharray="4 2" filter="url(#sk)"/>

  <text x="440" y="348" text-anchor="middle" font-size="11" fill="#7a5415">scatter：pred[i]=1 时 output[ps[i]] = input[i]</text>
</svg>
