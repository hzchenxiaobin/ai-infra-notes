<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 620" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="660" height="620" fill="#fafafa"/>

  <text x="330" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Hillis-Steele vs Blelloch Scan 对比</text>
  <text x="330" y="44" text-anchor="middle" font-size="11" fill="#888">两种经典并行 scan 算法：步数优先 vs 工作量优先</text>

  <!-- ===== 左半：Hillis-Steele ===== -->
  <rect x="20" y="58" width="300" height="250" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="170" y="82" text-anchor="middle" font-size="13" fill="#4a7a3a" font-weight="bold">Hillis-Steele（蝶形扫描）</text>

  <text x="34" y="104" font-size="10" fill="#555" font-weight="bold">策略</text>
  <text x="34" y="120" font-size="10" fill="#555">每步所有元素 in-place 累加</text>
  <text x="34" y="134" font-size="10" fill="#555">offset = 1, 2, 4, 8, ...</text>

  <text x="34" y="158" font-size="10" fill="#555" font-weight="bold">复杂度</text>
  <text x="34" y="174" font-size="10" fill="#555">步数（深度）= O(log N)  ★ 最少</text>
  <text x="34" y="190" font-size="10" fill="#b85450">工作量 = O(N log N)  ✗ 非 work-efficient</text>

  <text x="34" y="214" font-size="10" fill="#555" font-weight="bold">活跃度</text>
  <text x="34" y="230" font-size="10" fill="#4a7a3a">★ 所有线程全程活跃</text>

  <text x="34" y="254" font-size="10" fill="#555" font-weight="bold">GPU 适配</text>
  <text x="34" y="270" font-size="10" fill="#555">★ __shfl_up_sync 天然匹配</text>
  <text x="34" y="286" font-size="10" fill="#555">Warp 内 5 步即完成</text>

  <!-- ===== 右半：Blelloch ===== -->
  <rect x="340" y="58" width="300" height="250" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="8" filter="url(#rough2)"/>
  <text x="490" y="82" text-anchor="middle" font-size="13" fill="#d6a040" font-weight="bold">Blelloch（工作高效扫描）</text>

  <text x="354" y="104" font-size="10" fill="#555" font-weight="bold">策略</text>
  <text x="354" y="120" font-size="10" fill="#555">两遍：上扫 build 树 + 下扫 distribute</text>
  <text x="354" y="134" font-size="10" fill="#555">类似归约树的正/逆过程</text>

  <text x="354" y="158" font-size="10" fill="#555" font-weight="bold">复杂度</text>
  <text x="354" y="174" font-size="10" fill="#555">步数（深度）= O(2 log N)  多一倍</text>
  <text x="354" y="190" font-size="10" fill="#4a7a3a">★ 工作量 = O(N)  work-efficient</text>

  <text x="354" y="214" font-size="10" fill="#555" font-weight="bold">活跃度</text>
  <text x="354" y="230" font-size="10" fill="#b85450">✗ 每步活跃线程减半（类似归约）</text>

  <text x="354" y="254" font-size="10" fill="#555" font-weight="bold">GPU 适配</text>
  <text x="354" y="270" font-size="10" fill="#555">需 shared memory + syncthreads</text>
  <text x="354" y="286" font-size="10" fill="#555">warp shuffle 利用率低</text>

  <!-- ===== 中间对比表 ===== -->
  <line x1="20" y1="324" x2="640" y2="324" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="330" y="348" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">核心对比</text>

  <!-- 表头 -->
  <g font-size="10" fill="#555" font-weight="bold">
    <rect x="30" y="358" width="150" height="24" fill="#f6f6f6" stroke="#ccc" rx="3" filter="url(#rough2)"/>
    <text x="105" y="374" text-anchor="middle">维度</text>
    <rect x="180" y="358" width="210" height="24" fill="#e6f4ea" stroke="#4a7a3a" rx="3" filter="url(#rough2)"/>
    <text x="285" y="374" text-anchor="middle">Hillis-Steele</text>
    <rect x="390" y="358" width="210" height="24" fill="#fff8e1" stroke="#d6a040" rx="3" filter="url(#rough2)"/>
    <text x="495" y="374" text-anchor="middle">Blelloch</text>
  </g>

  <!-- 行 -->
  <g font-size="10" fill="#555">
    <rect x="30" y="382" width="150" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="105" y="397" text-anchor="middle">步数（深度）</text>
    <rect x="180" y="382" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="285" y="397" text-anchor="middle" fill="#4a7a3a" font-weight="bold">O(log N) ★</text>
    <rect x="390" y="382" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="495" y="397" text-anchor="middle">O(2 log N)</text>

    <rect x="30" y="404" width="150" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="105" y="419" text-anchor="middle">工作量</text>
    <rect x="180" y="404" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="285" y="419" text-anchor="middle">O(N log N)</text>
    <rect x="390" y="404" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="495" y="419" text-anchor="middle" fill="#4a7a3a" font-weight="bold">O(N) ★</text>

    <rect x="30" y="426" width="150" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="105" y="441" text-anchor="middle">线程活跃度</text>
    <rect x="180" y="426" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="285" y="441" text-anchor="middle" fill="#4a7a3a" font-weight="bold">全程满载 ★</text>
    <rect x="390" y="426" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="495" y="441" text-anchor="middle">逐步减半</text>

    <rect x="30" y="448" width="150" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="105" y="463" text-anchor="middle">warp shuffle 友好</text>
    <rect x="180" y="448" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="285" y="463" text-anchor="middle" fill="#4a7a3a" font-weight="bold">★ 天然匹配</text>
    <rect x="390" y="448" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="495" y="463" text-anchor="middle">需 shared mem</text>

    <rect x="30" y="470" width="150" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="105" y="485" text-anchor="middle">scan 类型</text>
    <rect x="180" y="470" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="285" y="485" text-anchor="middle">inclusive（直接）</text>
    <rect x="390" y="470" width="210" height="22" fill="#fff" stroke="#ddd" rx="2" filter="url(#rough2)"/>
    <text x="495" y="485" text-anchor="middle">exclusive（天然）</text>
  </g>

  <!-- ===== 选择建议 ===== -->
  <line x1="20" y1="504" x2="640" y2="504" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="330" y="528" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">选择建议</text>

  <rect x="30" y="538" width="300" height="64" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="558" font-size="11" fill="#4a7a3a" font-weight="bold">选 Hillis-Steele（本题）</text>
  <text x="44" y="576" font-size="10" fill="#555">• N 小（warp/block 级，≤1024）</text>
  <text x="44" y="592" font-size="10" fill="#555">• 延迟敏感、warp shuffle 可用</text>

  <rect x="340" y="538" width="300" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="354" y="558" font-size="11" fill="#d6a040" font-weight="bold">选 Blelloch</text>
  <text x="354" y="576" font-size="10" fill="#555">• N 极大（≥10⁶，log 因子显著）</text>
  <text x="354" y="592" font-size="10" fill="#555">• CPU / 多核（无 warp shuffle）</text>
</svg>
