<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="540" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">presum.cu 两阶段架构总览</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">2 个 kernel + __device__ 静态数组，无需重读 input、无需 block_offsets 缓冲</text>

  <!-- ===== Input ===== -->
  <text x="30" y="76" font-size="11" fill="#446688" font-weight="bold">input[] (3 block × 4 元素 示例)</text>
  <g font-size="10" fill="#333">
    <rect x="80"  y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="100" y="100" text-anchor="middle">3</text>
    <rect x="120" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="140" y="100" text-anchor="middle">1</text>
    <rect x="160" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="180" y="100" text-anchor="middle">7</text>
    <rect x="200" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="220" y="100" text-anchor="middle">0</text>
    <rect x="260" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="280" y="100" text-anchor="middle">4</text>
    <rect x="300" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="320" y="100" text-anchor="middle">2</text>
    <rect x="340" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="360" y="100" text-anchor="middle">6</text>
    <rect x="380" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="400" y="100" text-anchor="middle">3</text>
    <rect x="440" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="100" text-anchor="middle">2</text>
    <rect x="480" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="500" y="100" text-anchor="middle">5</text>
    <rect x="520" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="540" y="100" text-anchor="middle">1</text>
    <rect x="560" y="84" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="580" y="100" text-anchor="middle">8</text>
  </g>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#888">Block 0</text>
  <text x="330" y="122" text-anchor="middle" font-size="9" fill="#888">Block 1</text>
  <text x="520" y="122" text-anchor="middle" font-size="9" fill="#888">Block 2</text>

  <!-- ===== Kernel 1 arrow ===== -->
  <path d="M 320 126 L 320 142" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Kernel 1 box ===== -->
  <rect x="30" y="146" width="580" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="320" y="165" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">Kernel 1: intra_block_reduce&lt;&lt;&lt;grid, 256&gt;&gt;&gt;</text>

  <!-- ===== Output after Kernel 1 ===== -->
  <text x="30" y="196" font-size="11" fill="#4a7a3a" font-weight="bold">output[] (block 内 inclusive scan)</text>
  <g font-size="10" fill="#333">
    <rect x="80"  y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="100" y="220" text-anchor="middle">3</text>
    <rect x="120" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="140" y="220" text-anchor="middle">4</text>
    <rect x="160" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="180" y="220" text-anchor="middle">11</text>
    <rect x="200" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="220" y="220" text-anchor="middle">11</text>
    <rect x="260" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="280" y="220" text-anchor="middle">4</text>
    <rect x="300" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="320" y="220" text-anchor="middle">6</text>
    <rect x="340" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="360" y="220" text-anchor="middle">12</text>
    <rect x="380" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="400" y="220" text-anchor="middle">15</text>
    <rect x="440" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="220" text-anchor="middle">2</text>
    <rect x="480" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="500" y="220" text-anchor="middle">7</text>
    <rect x="520" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="540" y="220" text-anchor="middle">8</text>
    <rect x="560" y="204" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="580" y="220" text-anchor="middle">16</text>
  </g>

  <!-- ===== g_block_sum ===== -->
  <path d="M 220 228 L 220 242 L 100 242 L 100 256" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 400 228 L 400 242 L 330 242 L 330 256" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 580 228 L 580 242 L 520 242 L 520 256" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="252" font-size="11" fill="#d6a040" font-weight="bold">g_block_sum[]</text>
  <text x="30" y="266" font-size="9" fill="#888">(__device__ 静态)</text>
  <g font-size="11" fill="#d6a040" font-weight="bold">
    <rect x="80"  y="256" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="100" y="272" text-anchor="middle">11</text>
    <rect x="310" y="256" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="330" y="272" text-anchor="middle">15</text>
    <rect x="500" y="256" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="520" y="272" text-anchor="middle">16</text>
  </g>
  <text x="100" y="294" text-anchor="middle" font-size="9" fill="#888">S0=11</text>
  <text x="330" y="294" text-anchor="middle" font-size="9" fill="#888">S1=15</text>
  <text x="520" y="294" text-anchor="middle" font-size="9" fill="#888">S2=16</text>

  <!-- ===== Kernel 2 arrow ===== -->
  <path d="M 320 298 L 320 314" stroke="#b85450" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Kernel 2 box ===== -->
  <rect x="30" y="318" width="580" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="320" y="337" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">Kernel 2: inter_block_reduce&lt;&lt;&lt;grid, 256&gt;&gt;&gt;</text>

  <!-- ===== Kernel 2 explanation ===== -->
  <text x="30" y="366" font-size="10" fill="#555">每 block b 读 g_block_sum[0..b-1] 求和（grid-stride + tree reduce）→ val = 前面所有 block 总和</text>

  <!-- ===== Add-back arrows ===== -->
  <text x="30" y="392" font-size="10" fill="#b85450" font-weight="bold">output[offset] += val</text>
  <g font-size="10" fill="#333">
    <rect x="80"  y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="100" y="415" text-anchor="middle">3</text>
    <rect x="120" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="140" y="415" text-anchor="middle">4</text>
    <rect x="160" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="180" y="415" text-anchor="middle">11</text>
    <rect x="200" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="220" y="415" text-anchor="middle">11</text>
    <rect x="260" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="280" y="415" text-anchor="middle">15</text>
    <rect x="300" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="320" y="415" text-anchor="middle">17</text>
    <rect x="340" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="360" y="415" text-anchor="middle">23</text>
    <rect x="380" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="400" y="415" text-anchor="middle">26</text>
    <rect x="440" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="460" y="415" text-anchor="middle">28</text>
    <rect x="480" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="500" y="415" text-anchor="middle">33</text>
    <rect x="520" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="540" y="415" text-anchor="middle">34</text>
    <rect x="560" y="400" width="40" height="22" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="580" y="415" text-anchor="middle">42</text>
  </g>
  <text x="100" y="436" text-anchor="middle" font-size="9" fill="#888">+0 (S0 前无 block)</text>
  <text x="330" y="436" text-anchor="middle" font-size="9" fill="#888">+11 (=S0)</text>
  <text x="520" y="436" text-anchor="middle" font-size="9" fill="#888">+26 (=S0+S1)</text>

  <text x="30" y="454" font-size="10" fill="#b85450" font-weight="bold">output[] = 全局 inclusive prefix sum ✓</text>

  <!-- ===== Comparison summary ===== -->
  <line x1="20" y1="470" x2="620" y2="470" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="490" font-size="11" fill="#446688" font-weight="bold">vs 三阶段方案的关键区别：</text>
  <rect x="30" y="500" width="185" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="122" y="519" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">2 kernel（非 3 kernel）</text>
  <rect x="227" y="500" width="185" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="319" y="519" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">不重读 input</text>
  <rect x="424" y="500" width="185" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="516" y="519" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">无 block_offsets 缓冲</text>
</svg>
