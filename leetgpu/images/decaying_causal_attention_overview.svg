<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">Decaying Causal Attention：因果掩码 × 指数衰减</text>
  <path d="M 280 42 Q 440 50 600 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="440" y="58" text-anchor="middle" font-size="11" fill="#888">decay_mask[n,m] = γ^(n−m) if m≤n else 0，衰减因子乘到 score 上（无 softmax）</text>

  <!-- 左侧：decay_mask 矩阵 6×6 -->
  <text x="190" y="84" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">衰减掩码矩阵（seq_len × seq_len）</text>

  <!-- gamma = 0.5, decay values: gamma^0=1, gamma^1=0.5, gamma^2=0.25, gamma^3=0.125, gamma^4=0.0625, gamma^5=0.031 -->
  <g filter="url(#sk)">
    <!-- Row 0: n=0, only m=0 is valid (gamma^0=1) -->
    <rect x="100" y="94" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="94" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="180" y="94" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="220" y="94" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="260" y="94" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="300" y="94" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Row 1: n=1, m=0 (gamma^1=0.5), m=1 (gamma^0=1) -->
    <rect x="100" y="128" width="40" height="34" fill="#d6ead6" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="128" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="128" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="220" y="128" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="260" y="128" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="300" y="128" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Row 2: n=2, m=0(g^2=0.25), m=1(g^1=0.5), m=2(g^0=1) -->
    <rect x="100" y="162" width="40" height="34" fill="#e8f3e8" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="162" width="40" height="34" fill="#d6ead6" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="162" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="162" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="260" y="162" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="300" y="162" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Row 3 -->
    <rect x="100" y="196" width="40" height="34" fill="#f0f8f0" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="196" width="40" height="34" fill="#e8f3e8" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="196" width="40" height="34" fill="#d6ead6" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="196" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="260" y="196" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="300" y="196" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Row 4 -->
    <rect x="100" y="230" width="40" height="34" fill="#f5faf5" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="230" width="40" height="34" fill="#f0f8f0" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="230" width="40" height="34" fill="#e8f3e8" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="230" width="40" height="34" fill="#d6ead6" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="260" y="230" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="300" y="230" width="40" height="34" fill="#eee" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Row 5 -->
    <rect x="100" y="264" width="40" height="34" fill="#f8fcf8" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="264" width="40" height="34" fill="#f5faf5" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="264" width="40" height="34" fill="#f0f8f0" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="264" width="40" height="34" fill="#e8f3e8" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="260" y="264" width="40" height="34" fill="#d6ead6" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="300" y="264" width="40" height="34" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="1"/>
  </g>

  <!-- 标注 -->
  <text x="120" y="88" text-anchor="middle" font-size="9" fill="#888">m=0</text>
  <text x="320" y="88" text-anchor="middle" font-size="9" fill="#888">m=5</text>
  <text x="92" y="115" text-anchor="end" font-size="9" fill="#888">n=0</text>
  <text x="92" y="285" text-anchor="end" font-size="9" fill="#888">n=5</text>

  <!-- 衰减值标注 -->
  <text x="120" y="115" text-anchor="middle" font-size="8" fill="#2e6e2e">1.0</text>
  <text x="160" y="149" text-anchor="middle" font-size="8" fill="#2e6e2e">1.0</text>
  <text x="120" y="149" text-anchor="middle" font-size="8" fill="#2e6e2e">0.5</text>
  <text x="200" y="183" text-anchor="middle" font-size="8" fill="#2e6e2e">1.0</text>
  <text x="280" y="251" text-anchor="middle" font-size="8" fill="#2e6e2e">1.0</text>
  <text x="320" y="285" text-anchor="middle" font-size="8" fill="#2e6e2e">1.0</text>

  <!-- 图例 -->
  <g filter="url(#sk)">
    <rect x="100" y="316" width="28" height="20" rx="3" fill="#bfe0bf" stroke="#4a8e4a"/>
  </g>
  <text x="136" y="331" font-size="10" fill="#2e6e2e">γ⁰=1（对角线）</text>
  <g filter="url(#sk)">
    <rect x="240" y="316" width="28" height="20" rx="3" fill="#d6ead6" stroke="#4a8e4a"/>
  </g>
  <text x="276" y="331" font-size="10" fill="#2e6e2e">γ¹（近邻）</text>
  <g filter="url(#sk)">
    <rect x="360" y="316" width="28" height="20" rx="3" fill="#eee" stroke="#bbb" stroke-dasharray="3,2"/>
  </g>
  <text x="396" y="331" font-size="10" fill="#999">0（因果屏蔽）</text>

  <!-- 右侧：计算流程 -->
  <text x="620" y="84" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">计算流程（per-query block）</text>

  <g filter="url(#sk)">
    <rect x="490" y="94" width="170" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="575" y="117" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">① s = Q[n]·K[m] / √d</text>

  <g filter="url(#sk)">
    <rect x="490" y="142" width="170" height="36" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="575" y="165" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">② w = s × γ^(n−m)</text>

  <g filter="url(#sk)">
    <rect x="490" y="190" width="170" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="575" y="213" text-anchor="middle" font-size="11" fill="#c98a2b" font-weight="bold">③ o += w × V[m]</text>

  <path d="M 575 130 L 575 140" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 575 178 L 575 188" stroke="#4a8e4a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 增量衰减说明 -->
  <g filter="url(#sk)">
    <rect x="690" y="94" width="175" height="90" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="710" y="116" font-size="11" fill="#7a5415" font-weight="bold">增量衰减计算</text>
  <text x="710" y="134" font-size="10" fill="#444">逆序遍历 m=n→0</text>
  <text x="710" y="150" font-size="10" fill="#444">初始 decay=1（m=n）</text>
  <text x="710" y="166" font-size="10" fill="#444">每步 decay *= γ</text>
  <text x="710" y="178" font-size="10" fill="#b03a3a">避免计算 γ^n</text>

  <!-- 关键观察 -->
  <g filter="url(#sk)">
    <rect x="690" y="200" width="175" height="80" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.2"/>
  </g>
  <text x="710" y="222" font-size="11" fill="#b03a3a" font-weight="bold">无 Softmax！</text>
  <text x="710" y="240" font-size="10" fill="#444">output = (score × decay) @ V</text>
  <text x="710" y="256" font-size="10" fill="#444">是加权求和，非归一化</text>
  <text x="710" y="272" font-size="10" fill="#444">比标准 attention 更简单</text>

  <!-- 底部公式 -->
  <g filter="url(#sk)">
    <rect x="100" y="360" width="680" height="60" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <text x="440" y="384" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">attn[n,m] = (Q[n]·K[m] / √d) × γ^(n−m)　　(m ≤ n)</text>
  <text x="440" y="404" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">output[n] = Σm≤n attn[n,m] × V[m]</text>

  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#666">grid = (seq_len,)，每 block 逆序遍历 m=n→0，增量维护 decay 因子</text>
</svg>
