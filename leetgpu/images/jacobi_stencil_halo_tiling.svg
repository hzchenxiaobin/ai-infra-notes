<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#fdfcf7"/>

  <text x="470" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Tiled + Halo：shared memory 载入 tile 与 1 圈边界</text>
  <path d="M 250 42 Q 470 50 690 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- global grid -->
  <text x="40" y="78" font-size="12" font-weight="bold" fill="#2b6e9e">全局网格（8192×8192 的局部）</text>
  <g filter="url(#sk)">
    <!-- halo cells (top row) -->
    <rect x="80" y="88" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="112" y="88" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="144" y="88" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="176" y="88" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <!-- halo left -->
    <rect x="48" y="120" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <!-- tile interior -->
    <rect x="80" y="120" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="112" y="120" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="144" y="120" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="176" y="120" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <!-- halo right -->
    <rect x="208" y="120" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <!-- halo left row2 -->
    <rect x="48" y="152" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="80" y="152" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="112" y="152" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="144" y="152" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="176" y="152" width="32" height="32" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="208" y="152" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <!-- halo bottom -->
    <rect x="48" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="80" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="112" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="144" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="176" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="208" y="184" width="32" height="32" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
  </g>
  <text x="64" y="108" text-anchor="middle" font-size="8" fill="#b85450">halo</text>
  <text x="128" y="140" text-anchor="middle" font-size="9" fill="#2b6e9e">tile</text>

  <!-- legend -->
  <rect x="260" y="88" width="14" height="14" rx="2" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1" filter="url(#sk)"/>
  <text x="280" y="100" font-size="10" fill="#444">tile 内部（每 thread 算一个 output）</text>
  <rect x="260" y="108" width="14" height="14" rx="2" fill="#fce4ec" stroke="#b85450" stroke-width="1" filter="url(#sk)"/>
  <text x="280" y="120" font-size="10" fill="#444">halo 边界（只读，供邻居 stencil 用）</text>

  <!-- shared memory layout -->
  <text x="40" y="240" font-size="13" font-weight="bold" fill="#7a5415">Shared memory 布局：smem[TILE+2][TILE+2]</text>
  <g filter="url(#sk)">
    <rect x="280" y="252" width="400" height="44" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
  </g>
  <text x="480" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a5415">smem[0..TILE+1][0..TILE+1]</text>
  <text x="480" y="289" text-anchor="middle" font-size="10" fill="#888">含 1 圈 halo：角点 + 上下左右边 + 内部 TILE×TILE</text>

  <!-- load steps -->
  <text x="40" y="320" font-size="13" font-weight="bold" fill="#2b2b2b">协作加载三步（block 内 256 thread）</text>

  <g filter="url(#sk)">
    <rect x="40" y="332" width="280" height="68" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.1"/>
  </g>
  <text x="55" y="354" font-size="11" font-weight="bold" fill="#2e6e2e">① 载入 tile 内部</text>
  <text x="55" y="372" font-size="10" fill="#444">每 thread 载 smem[ty+1][tx+1] = input[gid]</text>
  <text x="55" y="388" font-size="10" fill="#888">256 thread 各载 1 个内部点</text>

  <g filter="url(#sk)">
    <rect x="330" y="332" width="280" height="68" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.1"/>
  </g>
  <text x="345" y="354" font-size="11" font-weight="bold" fill="#2e6e2e">② 载入 halo 边</text>
  <text x="345" y="372" font-size="10" fill="#444">边缘 thread 载上/下/左/右 halo 行/列</text>
  <text x="345" y="388" font-size="10" fill="#888">如 tx==0 的 thread 额外载左 halo</text>

  <g filter="url(#sk)">
    <rect x="620" y="332" width="280" height="68" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.1"/>
  </g>
  <text x="635" y="354" font-size="11" font-weight="bold" fill="#2e6e2e">③ __syncthreads + 计算</text>
  <text x="635" y="372" font-size="10" fill="#444">等 halo 全部就位后从 smem 读四邻</text>
  <text x="635" y="388" font-size="10" fill="#888">output = 0.25×(上+下+左+右) from smem</text>

  <!-- sync insight -->
  <g filter="url(#sk)">
    <rect x="40" y="420" width="860" height="60" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="444" font-size="12" font-weight="bold" fill="#444">💡 halo 的意义</text>
  <text x="60" y="462" font-size="11" fill="#444">无 halo：tile 边缘 thread 的邻居在别的 block → 需读 global（冗余）。</text>
  <text x="60" y="478" font-size="11" fill="#b85450">有 halo：邻居提前载入 shared → 全部 stencil 计算只读 smem，零 global 冗余读。</text>
</svg>
