<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Segoe UI', 'Kaiti SC', 楷体, sans-serif">
  <defs><marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/></marker></defs>
  <rect width="640" height="480" fill="#fafafa"/>

  <text x="320" y="28" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Max Subarray Sum：前缀和 + 滑动窗口</text>
  <text x="320" y="46" text-anchor="middle" font-size="11" fill="#888">问题转化为 max(prefix[i+W] - prefix[i])，W 为窗口大小</text>

  <!-- ===== Input array ===== -->
  <text x="30" y="74" font-size="11" fill="#446688" font-weight="bold">input[N] =</text>
  <g font-size="10" fill="#333">
    <rect x="100" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="124" y="76" text-anchor="middle">2</text>
    <rect x="148" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="172" y="76" text-anchor="middle">-1</text>
    <rect x="196" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="220" y="76" text-anchor="middle">3</text>
    <rect x="244" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="268" y="76" text-anchor="middle">-2</text>
    <rect x="292" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="316" y="76" text-anchor="middle">4</text>
    <rect x="340" y="60" width="48" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="364" y="76" text-anchor="middle">1</text>
    <text x="400" y="76" font-size="10" fill="#888">(N=6, W=3)</text>
  </g>

  <!-- ===== Prefix sum ===== -->
  <text x="30" y="110" font-size="11" fill="#b85450" font-weight="bold">prefix[N+1] =</text>
  <g font-size="10" fill="#333">
    <rect x="100" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="124" y="112" text-anchor="middle">0</text>
    <rect x="148" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="172" y="112" text-anchor="middle">2</text>
    <rect x="196" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="220" y="112" text-anchor="middle">1</text>
    <rect x="244" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="268" y="112" text-anchor="middle">4</text>
    <rect x="292" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="316" y="112" text-anchor="middle">2</text>
    <rect x="340" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="364" y="112" text-anchor="middle">6</text>
    <rect x="388" y="96" width="48" height="24" fill="#fce4ec" stroke="#b85450" rx="3"/>
    <text x="412" y="112" text-anchor="middle">7</text>
  </g>
  <text x="450" y="112" font-size="9" fill="#888">prefix[0]=0, prefix[i]=Σinput[0..i-1]</text>

  <!-- ===== Sliding window ===== -->
  <line x1="20" y1="135" x2="620" y2="135" stroke="#eee" stroke-width="1"/>
  <text x="30" y="158" font-size="12" fill="#d6a040" font-weight="bold">滑动窗口 W=3：subarray[i..i+W-1] = prefix[i+W] - prefix[i]</text>

  <g font-size="10" fill="#333">
    <!-- Window 0: prefix[3]-prefix[0] = 4-0 = 4 -->
    <rect x="100" y="166" width="192" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3"/>
    <text x="120" y="184" font-size="10" fill="#d6a040">window 0: [0,1,2]</text>
    <text x="270" y="184" font-size="10" fill="#555">= 4 - 0 = 4</text>

    <!-- Window 1: prefix[4]-prefix[1] = 2-2 = 0 -->
    <rect x="100" y="200" width="192" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3"/>
    <text x="120" y="218" font-size="10" fill="#d6a040">window 1: [1,2,3]</text>
    <text x="270" y="218" font-size="10" fill="#555">= 2 - 2 = 0</text>

    <!-- Window 2: prefix[5]-prefix[2] = 6-1 = 5 -->
    <rect x="100" y="234" width="192" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3"/>
    <text x="120" y="252" font-size="10" fill="#4a7a3a" font-weight="bold">window 2: [2,3,4]</text>
    <text x="270" y="252" font-size="10" fill="#4a7a3a" font-weight="bold">= 6 - 1 = 5 ✓ max</text>

    <!-- Window 3: prefix[6]-prefix[3] = 7-4 = 3 -->
    <rect x="100" y="268" width="192" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3"/>
    <text x="120" y="286" font-size="10" fill="#d6a040">window 3: [3,4,5]</text>
    <text x="270" y="286" font-size="10" fill="#555">= 7 - 4 = 3</text>
  </g>

  <!-- Arrow to result -->
  <path d="M 300 300 L 300 320" stroke="#666" stroke-width="1" fill="none" marker-end="url(#a3)"/>

  <!-- ===== Output ===== -->
  <rect x="220" y="325" width="160" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="4"/>
  <text x="300" y="345" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">output = 5</text>

  <!-- ===== GPU implementation ===== -->
  <line x1="20" y1="375" x2="620" y2="375" stroke="#eee" stroke-width="1"/>
  <text x="30" y="398" font-size="12" fill="#444" font-weight="bold">GPU 实现：3 步流水线</text>
  <g font-size="10" fill="#333">
    <rect x="30" y="408" width="170" height="56" fill="#fce4ec" stroke="#b85450" rx="4"/>
    <text x="44" y="426" fill="#b85450" font-weight="bold">① prefix_sum_kernel</text>
    <text x="44" y="442" fill="#555">block inclusive scan</text>
    <text x="44" y="456" fill="#555">+ carry propagation</text>

    <rect x="220" y="408" width="170" height="56" fill="#fff8e1" stroke="#d6a040" rx="4"/>
    <text x="234" y="426" fill="#d6a040" font-weight="bold">② window_max_kernel</text>
    <text x="234" y="442" fill="#555">每个 thread 算一个窗口：</text>
    <text x="234" y="456" fill="#555">prefix[i+W] - prefix[i]</text>

    <rect x="410" y="408" width="170" height="56" fill="#e6f4ea" stroke="#4a7a3a" rx="4"/>
    <text x="424" y="426" fill="#4a7a3a" font-weight="bold">③ block_reduce_max</text>
    <text x="424" y="442" fill="#555">所有窗口求 max</text>
    <text x="424" y="456" fill="#555">→ 最终结果</text>
  </g>
</svg>
