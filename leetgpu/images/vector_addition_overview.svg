<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="560" height="380" fill="#fafafa"/>

  <text x="280" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">向量加法 C[i] = A[i] + B[i]</text>

  <!-- Array A -->
  <text x="40" y="68" font-size="12" fill="#446688" font-weight="bold">A</text>
  <rect x="70" y="54" width="60" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="100" y="75" text-anchor="middle" font-size="12" fill="#333">1.0</text>
  <rect x="130" y="54" width="60" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="75" text-anchor="middle" font-size="12" fill="#333">2.0</text>
  <rect x="190" y="54" width="60" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="220" y="75" text-anchor="middle" font-size="12" fill="#333">3.0</text>
  <rect x="250" y="54" width="60" height="32" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="280" y="75" text-anchor="middle" font-size="12" fill="#333">4.0</text>
  <text x="330" y="75" font-size="13" fill="#888">... N 个元素</text>

  <!-- plus -->
  <text x="280" y="108" text-anchor="middle" font-size="18" fill="#d6a040" font-weight="bold">+ （逐元素相加）</text>

  <!-- Array B -->
  <text x="40" y="142" font-size="12" fill="#4a7a3a" font-weight="bold">B</text>
  <rect x="70" y="128" width="60" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="100" y="149" text-anchor="middle" font-size="12" fill="#333">5.0</text>
  <rect x="130" y="128" width="60" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="149" text-anchor="middle" font-size="12" fill="#333">6.0</text>
  <rect x="190" y="128" width="60" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="220" y="149" text-anchor="middle" font-size="12" fill="#333">7.0</text>
  <rect x="250" y="128" width="60" height="32" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="280" y="149" text-anchor="middle" font-size="12" fill="#333">8.0</text>
  <text x="330" y="149" font-size="13" fill="#888">... N 个元素</text>

  <!-- equals arrow -->
  <text x="280" y="182" text-anchor="middle" font-size="16" fill="#b85450" font-weight="bold">↓</text>

  <!-- Array C -->
  <text x="40" y="216" font-size="12" fill="#b85450" font-weight="bold">C</text>
  <rect x="70" y="202" width="60" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="100" y="223" text-anchor="middle" font-size="12" fill="#333">6.0</text>
  <rect x="130" y="202" width="60" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="160" y="223" text-anchor="middle" font-size="12" fill="#333">8.0</text>
  <rect x="190" y="202" width="60" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="220" y="223" text-anchor="middle" font-size="12" fill="#333">10.0</text>
  <rect x="250" y="202" width="60" height="32" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
  <text x="280" y="223" text-anchor="middle" font-size="12" fill="#333">12.0</text>
  <text x="330" y="223" font-size="13" fill="#888">... N 个元素</text>

  <!-- Thread mapping -->
  <line x1="20" y1="256" x2="540" y2="256" stroke="#ddd" stroke-width="1" filter="url(#rough2)"/>
  <text x="20" y="280" font-size="13" fill="#444" font-weight="bold">线程映射：一个 thread 负责一个（或多个）下标 i</text>

  <!-- thread boxes under columns -->
  <text x="100" y="306" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 0</text>
  <text x="160" y="306" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 1</text>
  <text x="220" y="306" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 2</text>
  <text x="280" y="306" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 3</text>

  <line x1="100" y1="234" x2="100" y2="290" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>
  <line x1="160" y1="234" x2="160" y2="290" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>
  <line x1="220" y1="234" x2="220" y2="290" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>
  <line x1="280" y1="234" x2="280" y2="290" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>

  <!-- key insight -->
  <rect x="40" y="324" width="480" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="280" y="344" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">关键：N 个元素彼此独立 → 完美数据并行</text>
  <text x="280" y="360" text-anchor="middle" font-size="11" fill="#666">无依赖、无归约、无同步 → 瓶颈纯粹在内存带宽</text>
</svg>
