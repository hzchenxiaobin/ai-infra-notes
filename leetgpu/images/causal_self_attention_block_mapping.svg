<svg xmlns="http://www.w3.org/2000/svg" width="920" height="400" viewBox="0 0 920 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="920" height="400" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">并行映射：1 个 block 处理 1 行 query</text>
  <path d="M 290 42 Q 460 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="460" y="72" text-anchor="middle" font-size="12" fill="#666">grid = (M,)，每 block 处理 query i 对 key 0..i 的 causal attention（online softmax，只扫 i+1 个 key）</text>

  <!-- Q 矩阵 -->
  <text x="40" y="104" font-size="12" font-weight="bold" fill="#2b6e9e">Q (M×d)</text>
  <g filter="url(#sk)">
    <rect x="40" y="112" width="60" height="200" rx="4" fill="#e8f0fa" stroke="#4a8edb"/>
  </g>
  <g filter="url(#sk)">
    <rect x="40" y="148" width="60" height="28" rx="2" fill="#bcd6f0" stroke="#4a8edb" stroke-width="2"/>
  </g>
  <text x="70" y="166" text-anchor="middle" font-size="10" fill="#2b6e9e" font-weight="bold">Q[i]</text>
  <text x="120" y="166" font-size="10" fill="#666">行 i → block i</text>

  <!-- blocks -->
  <g filter="url(#sk)">
    <rect x="280" y="100" width="120" height="56" rx="6" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="280" y="160" width="120" height="56" rx="6" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="280" y="220" width="120" height="56" rx="6" fill="#bfe0bf" stroke="#4a8e4a"/>
    <rect x="280" y="280" width="120" height="40" rx="6" fill="#eee" stroke="#ccc" stroke-dasharray="4 3"/>
  </g>
  <text x="340" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">block i</text>
  <text x="340" y="142" text-anchor="middle" font-size="10" fill="#444">扫 key 0..i</text>
  <text x="340" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">block i+1</text>
  <text x="340" y="202" text-anchor="middle" font-size="10" fill="#444">扫 key 0..i+1</text>
  <text x="340" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">block i+2</text>
  <text x="340" y="262" text-anchor="middle" font-size="10" fill="#444">扫 key 0..i+2</text>
  <text x="340" y="304" text-anchor="middle" font-size="10" fill="#999">...</text>

  <!-- K, V -->
  <text x="480" y="104" font-size="12" font-weight="bold" fill="#7a5415">K, V (M×d)</text>
  <g filter="url(#sk)">
    <rect x="480" y="112" width="60" height="200" rx="4" fill="#fef6e6" stroke="#c98a2b"/>
  </g>
  <g filter="url(#sk)">
    <rect x="480" y="112" width="60" height="64" rx="2" fill="#f0d9a8" stroke="#c98a2b" stroke-width="2"/>
  </g>
  <text x="510" y="148" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">K[0..i]</text>
  <text x="560" y="148" font-size="10" fill="#666">block i 只读前 i+1 行</text>
  <text x="560" y="164" font-size="10" fill="#b03a3a">（causal: 不读 j&gt;i）</text>

  <!-- 输出 -->
  <text x="720" y="104" font-size="12" font-weight="bold" fill="#2e6e2e">output (M×d)</text>
  <g filter="url(#sk)">
    <rect x="720" y="112" width="60" height="200" rx="4" fill="#eaf6ee" stroke="#4a8e4a"/>
  </g>
  <g filter="url(#sk)">
    <rect x="720" y="148" width="60" height="28" rx="2" fill="#bfe0bf" stroke="#4a8e4a" stroke-width="2"/>
  </g>
  <text x="750" y="166" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">out[i]</text>

  <!-- 箭头 -->
  <path d="M 400 128 L 478 140" stroke="#4a8e4a" stroke-width="1.3" fill="none" filter="url(#sk)"/>
  <path d="M 540 128 L 718 140" stroke="#4a8e4a" stroke-width="1.3" fill="none" filter="url(#sk)"/>

  <!-- 底部说明 -->
  <g filter="url(#sk)">
    <rect x="40" y="330" width="840" height="56" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="354" font-size="12" font-weight="bold" fill="#2b2b2b">block 内执行（online softmax，无需物化 M×M 矩阵）</text>
  <text x="60" y="374" font-size="11" fill="#444">遍历 key 0..i：score = Q[i]·K[j]/√d → 若 j&gt;i 跳过（causal）→ online softmax 更新 m/l/o → 累加 V</text>
</svg>
