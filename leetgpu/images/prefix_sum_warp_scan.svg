<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="500" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Warp Scan：__shfl_up_sync 原理</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">与归约的 __shfl_down_sync 方向相反——向上传，做前缀和而非归约</text>

  <!-- ===== API ===== -->
  <rect x="30" y="58" width="560" height="24" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="44" y="74" font-family="monospace" font-size="11" fill="#333">float __shfl_up_sync(mask, val, delta);  // lane i 收到 lane (i-delta) 的 val（若 i-delta&lt;0 则不变）</text>

  <!-- ===== 8 lanes demo ===== -->
  <text x="30" y="106" font-size="12" fill="#446688" font-weight="bold">演示：8 个 lane（实际 32 个），目标做 inclusive scan</text>

  <!-- lane labels -->
  <g font-size="9" fill="#888">
    <text x="50" y="124" text-anchor="middle">lane</text>
    <text x="90"  y="124" text-anchor="middle">0</text>
    <text x="150" y="124" text-anchor="middle">1</text>
    <text x="210" y="124" text-anchor="middle">2</text>
    <text x="270" y="124" text-anchor="middle">3</text>
    <text x="330" y="124" text-anchor="middle">4</text>
    <text x="390" y="124" text-anchor="middle">5</text>
    <text x="450" y="124" text-anchor="middle">6</text>
    <text x="510" y="124" text-anchor="middle">7</text>
  </g>

  <!-- Step 0: initial -->
  <text x="30" y="146" font-size="11" fill="#666" font-weight="bold">初始：</text>
  <g font-size="10" fill="#333">
    <rect x="70"  y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="148" text-anchor="middle">1</text>
    <rect x="130" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="150" y="148" text-anchor="middle">2</text>
    <rect x="190" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="210" y="148" text-anchor="middle">3</text>
    <rect x="250" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="270" y="148" text-anchor="middle">4</text>
    <rect x="310" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="330" y="148" text-anchor="middle">5</text>
    <rect x="370" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="390" y="148" text-anchor="middle">6</text>
    <rect x="430" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="450" y="148" text-anchor="middle">7</text>
    <rect x="490" y="132" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="510" y="148" text-anchor="middle">8</text>
  </g>

  <!-- Step 1: delta=1 -->
  <text x="30" y="182" font-size="11" fill="#4a7a3a" font-weight="bold">delta=1：</text>
  <text x="90" y="182" font-size="10" fill="#4a7a3a">lane i 收到 lane (i-1) 的值，i≥1 才加</text>
  <!-- arrows: lane 0->1, 1->2, ... -->
  <g stroke="#4a7a3a" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 90 156 L 90 162 L 150 162 L 150 168" marker-end="url(#arr)"/>
    <path d="M 150 156 L 150 162 L 210 162 L 210 168" marker-end="url(#arr)"/>
    <path d="M 210 156 L 210 162 L 270 162 L 270 168" marker-end="url(#arr)"/>
    <path d="M 270 156 L 270 162 L 330 162 L 330 168" marker-end="url(#arr)"/>
    <path d="M 330 156 L 330 162 L 390 162 L 390 168" marker-end="url(#arr)"/>
    <path d="M 390 156 L 390 162 L 450 162 L 450 168" marker-end="url(#arr)"/>
    <path d="M 450 156 L 450 162 L 510 162 L 510 168" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#333">
    <rect x="70"  y="172" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="188" text-anchor="middle">1</text>
    <rect x="130" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="150" y="188" text-anchor="middle">3</text>
    <rect x="190" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="210" y="188" text-anchor="middle">5</text>
    <rect x="250" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="270" y="188" text-anchor="middle">7</text>
    <rect x="310" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="330" y="188" text-anchor="middle">9</text>
    <rect x="370" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="390" y="188" text-anchor="middle">11</text>
    <rect x="430" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="450" y="188" text-anchor="middle">13</text>
    <rect x="490" y="172" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="510" y="188" text-anchor="middle">15</text>
  </g>
  <text x="555" y="188" font-size="9" fill="#888">= 奇数和</text>

  <!-- Step 2: delta=2 -->
  <text x="30" y="218" font-size="11" fill="#d6a040" font-weight="bold">delta=2：</text>
  <text x="90" y="218" font-size="10" fill="#d6a040">lane i 收到 lane (i-2)，i≥2 才加</text>
  <g stroke="#d6a040" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 90 196 L 90 202 L 210 202 L 210 208" marker-end="url(#arr)"/>
    <path d="M 150 196 L 150 202 L 270 202 L 270 208" marker-end="url(#arr)"/>
    <path d="M 210 196 L 210 202 L 330 202 L 330 208" marker-end="url(#arr)"/>
    <path d="M 270 196 L 270 202 L 390 202 L 390 208" marker-end="url(#arr)"/>
    <path d="M 330 196 L 330 202 L 450 202 L 450 208" marker-end="url(#arr)"/>
    <path d="M 390 196 L 390 202 L 510 202 L 510 208" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#333">
    <rect x="70"  y="212" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="228" text-anchor="middle">1</text>
    <rect x="130" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="228" text-anchor="middle">3</text>
    <rect x="190" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="210" y="228" text-anchor="middle">6</text>
    <rect x="250" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="270" y="228" text-anchor="middle">10</text>
    <rect x="310" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="330" y="228" text-anchor="middle">15</text>
    <rect x="370" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="390" y="228" text-anchor="middle">21</text>
    <rect x="430" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="450" y="228" text-anchor="middle">28</text>
    <rect x="490" y="212" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="510" y="228" text-anchor="middle">36</text>
  </g>

  <!-- Step 3: delta=4 -->
  <text x="30" y="258" font-size="11" fill="#b85450" font-weight="bold">delta=4：</text>
  <text x="90" y="258" font-size="10" fill="#b85450">lane i 收到 lane (i-4)，i≥4 才加 → 完成！</text>
  <g stroke="#b85450" stroke-width="1.2" fill="none" filter="url(#rough2)">
    <path d="M 90 236 L 90 242 L 330 242 L 330 248" marker-end="url(#arr)"/>
    <path d="M 150 236 L 150 242 L 390 242 L 390 248" marker-end="url(#arr)"/>
    <path d="M 210 236 L 210 242 L 450 242 L 450 248" marker-end="url(#arr)"/>
    <path d="M 270 236 L 270 242 L 510 242 L 510 248" marker-end="url(#arr)"/>
  </g>
  <g font-size="10" fill="#333">
    <rect x="70"  y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="90"  y="268" text-anchor="middle" font-weight="bold" fill="#b85450">1</text>
    <rect x="130" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="150" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">3</text>
    <rect x="190" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="210" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">6</text>
    <rect x="250" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="270" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">10</text>
    <rect x="310" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="330" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">15</text>
    <rect x="370" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="390" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">21</text>
    <rect x="430" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="450" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">28</text>
    <rect x="490" y="252" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="510" y="268" text-anchor="middle" font-weight="bold" fill="#b85450">36</text>
  </g>
  <text x="555" y="268" font-size="10" fill="#b85450" font-weight="bold">✓ 前缀和！</text>

  <!-- ===== Comparison down vs up ===== -->
  <line x1="20" y1="296" x2="620" y2="296" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="320" font-size="12" fill="#446688" font-weight="bold">对比：归约（down）vs 扫描（up）</text>

  <rect x="30" y="334" width="280" height="80" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="354" font-size="11" fill="#b85450" font-weight="bold">__shfl_down_sync（Day 4 归约）</text>
  <text x="44" y="372" font-size="10" fill="#555">• lane i 收到 lane (i+delta)</text>
  <text x="44" y="388" font-size="10" fill="#555">• 数据从高 lane 流向低 lane</text>
  <text x="44" y="404" font-size="10" fill="#555">• 结果汇聚到 lane 0（1 个值）</text>

  <rect x="330" y="334" width="280" height="80" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="344" y="354" font-size="11" fill="#4a7a3a" font-weight="bold">__shfl_up_sync（Day 5 扫描）★</text>
  <text x="344" y="372" font-size="10" fill="#555">• lane i 收到 lane (i-delta)</text>
  <text x="344" y="388" font-size="10" fill="#555">• 数据从低 lane 流向高 lane</text>
  <text x="344" y="404" font-size="10" fill="#555">• 每个 lane 都保留结果（N 个值）</text>

  <!-- code -->
  <rect x="30" y="428" width="580" height="56" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="44" y="448" font-family="monospace" font-size="11" fill="#333">for (int d = 1; d &lt; 32; d &lt;&lt;= 1) {</text>
  <text x="44" y="464" font-family="monospace" font-size="11" fill="#333">    float n = __shfl_up_sync(0xffffffff, val, d);</text>
  <text x="44" y="478" font-family="monospace" font-size="11" fill="#333">    if ((lane &amp; 31) &gt;= d) val += n;   // 低 d 个 lane 不加</text>
</svg>
