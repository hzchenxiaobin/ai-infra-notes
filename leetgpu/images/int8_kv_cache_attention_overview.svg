<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ark" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="560" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">INT8 KV-Cache Attention：单 Query 对 KV Cache 的 Decode</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- 顶部说明 -->
  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">Decode 阶段：1 个新 token 的 Q 对全部历史 KV 做 attention（1×seq_len），memory-bound</text>

  <!-- Q 向量 -->
  <g filter="url(#sk)">
    <rect x="40" y="250" width="60" height="180" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="70" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">Q</text>
  <text x="70" y="446" text-anchor="middle" font-size="10" fill="#666">[H, d]</text>
  <text x="70" y="460" text-anchor="middle" font-size="10" fill="#666">单 query</text>

  <!-- KV Cache (int8) -->
  <g filter="url(#sk)">
    <rect x="200" y="110" width="540" height="100" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="220" y="134" font-size="13" font-weight="bold" fill="#7a5415">K_int8 Cache  [H, seq_len, d]  (int8 + per-token k_scale)</text>
  <!-- int8 小格子 -->
  <g filter="url(#sk)">
    <g fill="#f0d9a8" stroke="#c98a2b">
      <rect x="220" y="148" width="22" height="50" rx="2"/>
      <rect x="244" y="148" width="22" height="50" rx="2"/>
      <rect x="268" y="148" width="22" height="50" rx="2"/>
      <rect x="292" y="148" width="22" height="50" rx="2"/>
      <rect x="316" y="148" width="22" height="50" rx="2"/>
    </g>
    <text x="346" y="178" font-size="11" fill="#7a5415">... seq_len 个 token，每 token d 个 int8</text>
  </g>
  <text x="220" y="200" font-size="11" fill="#b03a3a">1 byte/elem（fp32 的 1/4）→ Decode 带宽直接降到 1/4</text>

  <g filter="url(#sk)">
    <rect x="200" y="370" width="540" height="100" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
  </g>
  <text x="220" y="394" font-size="13" font-weight="bold" fill="#7a5415">V_int8 Cache  [H, seq_len, d]  (int8 + per-token v_scale)</text>
  <g filter="url(#sk)">
    <g fill="#f0d9a8" stroke="#c98a2b">
      <rect x="220" y="408" width="22" height="50" rx="2"/>
      <rect x="244" y="408" width="22" height="50" rx="2"/>
      <rect x="268" y="408" width="22" height="50" rx="2"/>
      <rect x="292" y="408" width="22" height="50" rx="2"/>
      <rect x="316" y="408" width="22" height="50" rx="2"/>
    </g>
    <text x="346" y="438" font-size="11" fill="#7a5415">... 同上</text>
  </g>

  <!-- 反量化箭头 -->
  <path d="M 470 214 L 470 250" stroke="#7a5415" stroke-width="1.4" fill="none" marker-end="url(#ark)" filter="url(#sk)"/>
  <text x="480" y="236" font-size="11" fill="#7a5415">反量化 K_float = K_int8 × k_scale</text>
  <path d="M 470 366 L 470 330" stroke="#7a5415" stroke-width="1.4" fill="none" marker-end="url(#ark)" filter="url(#sk)"/>
  <text x="480" y="352" font-size="11" fill="#7a5415">反量化 V_float = V_int8 × v_scale</text>

  <!-- 中间 attention 计算 -->
  <g filter="url(#sk)">
    <rect x="360" y="250" width="220" height="110" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="470" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">scaled dot-product</text>
  <text x="470" y="298" text-anchor="middle" font-size="12" fill="#2e6e2e">scores = Q·K^T / √d</text>
  <text x="470" y="316" text-anchor="middle" font-size="12" fill="#2e6e2e">weights = softmax(scores)</text>
  <text x="470" y="334" text-anchor="middle" font-size="12" fill="#2e6e2e">out = weights · V</text>
  <text x="470" y="352" text-anchor="middle" font-size="10" fill="#666">shape: [H,1,d] → squeeze → [H,d]</text>

  <!-- Q 和 attention 的连线 -->
  <path d="M 100 340 L 358 305" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ark)" filter="url(#sk)"/>

  <!-- 输出 -->
  <g filter="url(#sk)">
    <rect x="820" y="250" width="80" height="110" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.6"/>
  </g>
  <text x="860" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">output</text>
  <text x="860" y="372" text-anchor="middle" font-size="10" fill="#666">[H, d]</text>
  <path d="M 582 305 L 818 305" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ark)" filter="url(#sk)"/>

  <!-- 底部并行策略 -->
  <g filter="url(#sk)">
    <rect x="40" y="490" width="860" height="56" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="56" y="512" font-size="12" font-weight="bold" fill="#2b2b2b">并行映射：1 个 block 处理 1 个 head 的 attention</text>
  <text x="56" y="532" font-size="11" fill="#444">block 内线程协作算 Q·K^T（块归约）+ online softmax + 加权 V；每 head 独立，H 个 block 并行。</text>
</svg>
