<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">MoE Top-K Gating：一个 block 一行，k 趟 argmax 归约 + softmax</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input logits row -->
  <text x="40" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">① logits 行 (M 行各 E 个专家分数, E=8, k=2)</text>
  <g filter="url(#sk)">
    <rect x="40" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="90" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="140" y="84" width="50" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.6"/>
    <rect x="190" y="84" width="50" height="32" rx="4" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
    <rect x="240" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="290" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="340" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="390" y="84" width="50" height="32" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="65" y="105" text-anchor="middle" font-size="11" fill="#333">1.0</text>
  <text x="115" y="105" text-anchor="middle" font-size="11" fill="#333">2.0</text>
  <text x="165" y="105" text-anchor="middle" font-size="11" fill="#7a5415" font-weight="bold">3.0</text>
  <text x="215" y="105" text-anchor="middle" font-size="11" fill="#7a2828" font-weight="bold">4.0</text>
  <text x="265" y="105" text-anchor="middle" font-size="11" fill="#333">1.5</text>
  <text x="315" y="105" text-anchor="middle" font-size="11" fill="#333">0.5</text>
  <text x="365" y="105" text-anchor="middle" font-size="11" fill="#333">2.5</text>
  <text x="415" y="105" text-anchor="middle" font-size="11" fill="#333">1.8</text>

  <path d="M 240 120 L 240 142" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- k iterations of argmax reduction -->
  <text x="40" y="160" font-size="12" font-weight="bold" fill="#7a5415">② k=2 趟并行 argmax 归约（带索引，剔除已选）</text>

  <g filter="url(#sk)">
    <rect x="40" y="170" width="400" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="240" y="195" text-anchor="middle" font-size="11" fill="#7a5415">趟 1: 树形归约 → max=4.0 @ idx=3；置 -inf 剔除</text>

  <g filter="url(#sk)">
    <rect x="40" y="216" width="400" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="240" y="241" text-anchor="middle" font-size="11" fill="#7a5415">趟 2: 树形归约 → max=3.0 @ idx=2；置 -inf 剔除</text>

  <path d="M 240 260 L 240 276" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- softmax + output -->
  <text x="40" y="296" font-size="12" font-weight="bold" fill="#2e6e2e">③ softmax over k 个选中值 → 输出（天然降序）</text>
  <g filter="url(#sk)">
    <rect x="40" y="306" width="400" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="240" y="331" text-anchor="middle" font-size="11" fill="#2e6e2e">softmax([4.0, 3.0]) = [0.731, 0.269]</text>

  <!-- right side: block mapping & insight -->
  <g filter="url(#sk)">
    <rect x="490" y="160" width="340" height="186" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="660" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">grid 映射 + 策略对比</text>
  <text x="510" y="206" font-size="11" fill="#2b6e9e">grid(M), block(next_pow2(E))</text>
  <text x="510" y="224" font-size="11" fill="#444">一行一 block，E 个 thread 并行</text>
  <text x="510" y="252" font-size="11" fill="#7a5415" font-weight="bold">k 趟归约: O(k·log E) 步</text>
  <text x="510" y="270" font-size="11" fill="#666">k≪E 时比全排序省 log²E/k 倍</text>
  <text x="510" y="298" font-size="11" fill="#b85450" font-weight="bold">bitonic 全排序: O(log²E) 步</text>
  <text x="510" y="316" font-size="11" fill="#666">k≈E 时才划算</text>
  <text x="510" y="338" font-size="10" fill="#2e6e2e">典型 MoE: k=2, E=64 → 归约完胜</text>

  <!-- bottom note -->
  <text x="440" y="378" text-anchor="middle" font-size="11" fill="#2b6e9e">类比：Mixtral / DeepSeek-MoE router 选 top-k 专家 + softmax 门控权重</text>
</svg>
