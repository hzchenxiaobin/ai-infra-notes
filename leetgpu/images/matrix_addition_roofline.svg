<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Roofline：Matrix Addition 是纯 memory-bound</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">AI = 0.083 FLOP/B ≪ Ridge Point（~60），性能上限由 HBM 带宽决定</text>

  <!-- ===== Roofline chart ===== -->
  <g font-size="9" fill="#333">
    <!-- axes -->
    <line x1="80" y1="380" x2="600" y2="380" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>
    <line x1="80" y1="380" x2="80" y2="80" stroke="#666" stroke-width="1.2" filter="url(#rough2)"/>

    <!-- axis labels -->
    <text x="340" y="408" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">算术强度 AI (FLOP / Byte)</text>
    <text x="40" y="230" text-anchor="middle" font-size="11" fill="#444" font-weight="bold" transform="rotate(-90 40 230)">性能 (TFLOPS)</text>

    <!-- x-axis ticks (log scale) -->
    <text x="80" y="396" text-anchor="middle" font-size="8" fill="#888">0.01</text>
    <text x="160" y="396" text-anchor="middle" font-size="8" fill="#888">0.1</text>
    <text x="240" y="396" text-anchor="middle" font-size="8" fill="#888">1</text>
    <text x="320" y="396" text-anchor="middle" font-size="8" fill="#888">10</text>
    <text x="400" y="396" text-anchor="middle" font-size="8" fill="#888">100</text>
    <text x="480" y="396" text-anchor="middle" font-size="8" fill="#888">1000</text>

    <!-- y-axis ticks -->
    <text x="72" y="384" text-anchor="end" font-size="8" fill="#888">0.1</text>
    <text x="72" y="304" text-anchor="end" font-size="8" fill="#888">1</text>
    <text x="72" y="224" text-anchor="end" font-size="8" fill="#888">10</text>
    <text x="72" y="144" text-anchor="end" font-size="8" fill="#888">100</text>

    <!-- memory bandwidth ceiling (slope=1, left part) -->
    <path d="M 80 380 L 240 220" stroke="#446688" stroke-width="2.5" fill="none" filter="url(#rough2)"/>
    <text x="130" y="280" font-size="9" fill="#446688" font-weight="bold" transform="rotate(-45 130 280)">HBM 带宽上限</text>

    <!-- compute ceiling (flat, right part) -->
    <path d="M 240 220 L 600 220" stroke="#b85450" stroke-width="2.5" fill="none" filter="url(#rough2)"/>
    <text x="500" y="212" font-size="9" fill="#b85450" font-weight="bold">算力上限 (19.5 TFLOPS)</text>

    <!-- Ridge Point -->
    <circle cx="240" cy="220" r="6" fill="#d6a040" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="250" y="240" font-size="9" fill="#d6a040" font-weight="bold">Ridge Point</text>
    <text x="250" y="254" font-size="8" fill="#d6a040">AI ≈ 60 FLOP/B</text>

    <!-- Matrix Addition point -->
    <circle cx="120" cy="340" r="7" fill="#4a7a3a" stroke="#4a7a3a" stroke-width="2" filter="url(#rough2)"/>
    <text x="135" y="344" font-size="10" fill="#4a7a3a" font-weight="bold">Matrix Add</text>
    <text x="135" y="358" font-size="8" fill="#4a7a3a">AI = 0.083 FLOP/B</text>

    <!-- arrow from matadd to ceiling -->
    <path d="M 120 332 L 130 312" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arr)" stroke-dasharray="2,2" filter="url(#rough2)"/>

    <!-- other kernels for comparison -->
    <circle cx="280" cy="270" r="5" fill="#e8f0fe" stroke="#446688" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="290" y="274" font-size="8" fill="#446688">Reduction (AI≈0.25)</text>

    <circle cx="360" cy="220" r="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="370" y="224" font-size="8" fill="#d6a040">GEMM tiled (AI≈8)</text>

    <circle cx="450" cy="220" r="5" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" filter="url(#rough2)"/>
    <text x="460" y="224" font-size="8" fill="#b85450">GEMM reg (AI≈56)</text>
  </g>

  <!-- ===== Bottom: analysis ===== -->
  <line x1="20" y1="420" x2="620" y2="420" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <rect x="30" y="428" width="580" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="6" filter="url(#rough2)"/>
  <text x="320" y="444" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">AI = 0.083 ≪ 60（Ridge）→ memory-bound，优化方向 = 最大化 HBM 带宽（dram__throughput）</text>
</svg>
