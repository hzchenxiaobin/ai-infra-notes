<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">CUDA Streams 分块：传输与计算重叠（Day 3 主题）</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">大矩阵按行分块，每块独立 stream，Copy Engine 与 Compute Engine 并行</text>

  <!-- ===== Matrix split into chunks ===== -->
  <text x="30" y="76" font-size="12" fill="#446688" font-weight="bold">input[H][W] 按行分块</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="84" width="120" height="200" fill="none" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <!-- chunk 0 -->
    <rect x="30" y="84" width="120" height="48" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="90" y="110" text-anchor="middle" font-size="9" fill="#446688" font-weight="bold">chunk 0</text>
    <!-- chunk 1 -->
    <rect x="30" y="134" width="120" height="48" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="90" y="160" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">chunk 1</text>
    <!-- chunk 2 -->
    <rect x="30" y="184" width="120" height="48" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="90" y="210" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">chunk 2</text>
    <!-- chunk 3 -->
    <rect x="30" y="234" width="120" height="48" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="90" y="260" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">chunk 3</text>

    <text x="90" y="304" text-anchor="middle" font-size="8" fill="#888">每块含 halo 行</text>
    <text x="90" y="316" text-anchor="middle" font-size="8" fill="#888">(多读 R 行边界)</text>
  </g>

  <!-- arrows to streams -->
  <path d="M 150 108 L 200 108" stroke="#446688" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 150 158 L 200 158" stroke="#4a7a3a" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 150 208 L 200 208" stroke="#d6a040" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 150 258 L 200 258" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Streams timeline ===== -->
  <text x="210" y="76" font-size="12" fill="#444" font-weight="bold">多 Stream 时间线（重叠执行）</text>

  <line x1="210" y1="88" x2="610" y2="88" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
  <text x="610" y="84" text-anchor="end" font-size="8" fill="#888">t →</text>

  <!-- stream 0 -->
  <text x="200" y="110" font-size="9" fill="#446688" font-weight="bold">s0</text>
  <g font-size="8">
    <rect x="210" y="100" width="60" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="240" y="112" text-anchor="middle" fill="#446688">H2D</text>
    <rect x="270" y="100" width="80" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="310" y="112" text-anchor="middle" fill="#b85450">compute</text>
    <rect x="350" y="100" width="50" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="375" y="112" text-anchor="middle" fill="#4a7a3a">D2H</text>
  </g>

  <!-- stream 1 (offset, overlapping) -->
  <text x="200" y="140" font-size="9" fill="#4a7a3a" font-weight="bold">s1</text>
  <g font-size="8">
    <rect x="240" y="130" width="60" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="270" y="142" text-anchor="middle" fill="#446688">H2D</text>
    <rect x="300" y="130" width="80" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="340" y="142" text-anchor="middle" fill="#b85450">compute</text>
    <rect x="380" y="130" width="50" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="405" y="142" text-anchor="middle" fill="#4a7a3a">D2H</text>
  </g>

  <!-- stream 2 -->
  <text x="200" y="170" font-size="9" fill="#d6a040" font-weight="bold">s2</text>
  <g font-size="8">
    <rect x="270" y="160" width="60" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="300" y="172" text-anchor="middle" fill="#446688">H2D</text>
    <rect x="330" y="160" width="80" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="370" y="172" text-anchor="middle" fill="#b85450">compute</text>
    <rect x="410" y="160" width="50" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="435" y="172" text-anchor="middle" fill="#4a7a3a">D2H</text>
  </g>

  <!-- stream 3 -->
  <text x="200" y="200" font-size="9" fill="#b85450" font-weight="bold">s3</text>
  <g font-size="8">
    <rect x="300" y="190" width="60" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="330" y="202" text-anchor="middle" fill="#446688">H2D</text>
    <rect x="360" y="190" width="80" height="16" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="400" y="202" text-anchor="middle" fill="#b85450">compute</text>
    <rect x="440" y="190" width="50" height="16" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="465" y="202" text-anchor="middle" fill="#4a7a3a">D2H</text>
  </g>

  <!-- overlap highlight -->
  <rect x="270" y="96" width="180" height="120" fill="none" stroke="#d6a040" stroke-width="1.5" stroke-dasharray="3,2" rx="4" filter="url(#rough2)"/>
  <text x="360" y="232" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">重叠区：H2D/compute/D2H 在不同引擎并行</text>

  <!-- ===== Engines ===== -->
  <line x1="20" y1="260" x2="620" y2="260" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="284" font-size="12" fill="#444" font-weight="bold">两个独立硬件引擎：</text>

  <rect x="30" y="294" width="280" height="44" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="314" font-size="11" fill="#446688" font-weight="bold">Copy Engine（DMA）</text>
  <text x="44" y="330" font-size="9" fill="#555">负责 H2D / D2H 传输，不占 SM</text>

  <rect x="330" y="294" width="280" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="344" y="314" font-size="11" fill="#b85450" font-weight="bold">Compute Engine（SM）</text>
  <text x="344" y="330" font-size="9" fill="#555">执行 kernel，不参与传输</text>

  <!-- ===== Code ===== -->
  <rect x="30" y="350" width="580" height="92" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="370" font-family="monospace" font-size="10" fill="#333">for (int c = 0; c &lt; N_CHUNKS; ++c) {</text>
  <text x="60" y="386" font-family="monospace" font-size="10" fill="#446688">  int s = c % N_STREAMS;</text>
  <text x="60" y="402" font-family="monospace" font-size="10" fill="#4a7a3a">  cudaMemcpyAsync(d_chunk, h_chunk, ..., streams[s]);   // H2D (pinned)</text>
  <text x="60" y="418" font-family="monospace" font-size="10" fill="#b85450">  conv2d_kernel&lt;&lt;&lt;grid, block, 0, streams[s]&gt;&gt;&gt;(d_chunk, d_out, ...);  // compute</text>
  <text x="60" y="434" font-family="monospace" font-size="10" fill="#4a7a3a">  cudaMemcpyAsync(h_out, d_out, ..., streams[s]);        // D2H</text>
  <text x="44" y="442" font-family="monospace" font-size="10" fill="#333">}</text>
</svg>
