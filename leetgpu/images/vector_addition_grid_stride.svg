<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="600" height="420" fill="#fafafa"/>

  <text x="300" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Grid-Stride Loop（跨步循环）</text>
  <text x="300" y="44" text-anchor="middle" font-size="11" fill="#888">线程数 &lt; N 时，每个 thread 沿 stride 步进，把整个数组吃完</text>

  <!-- formula -->
  <rect x="120" y="58" width="360" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.3" rx="6" filter="url(#rough2)"/>
  <text x="300" y="78" text-anchor="middle" font-size="12" fill="#333" font-family="monospace">stride = gridDim.x × blockDim.x</text>

  <!-- Array cells: 12 cells representing N -->
  <text x="20" y="118" font-size="11" fill="#666">数组下标 i:</text>
  <g font-size="10" fill="#333">
    <!-- indices 0..11 -->
    <text x="55"  y="118">0</text>
    <text x="95"  y="118">1</text>
    <text x="135" y="118">2</text>
    <text x="175" y="118">3</text>
    <text x="215" y="118">4</text>
    <text x="255" y="118">5</text>
    <text x="295" y="118">6</text>
    <text x="335" y="118">7</text>
    <text x="375" y="118">8</text>
    <text x="415" y="118">9</text>
    <text x="445" y="118">10</text>
    <text x="475" y="118">11</text>
  </g>

  <!-- cells colored by thread owner. assume blockDim*gridDim = 4 (stride=4) -->
  <!-- thread 0 owns 0,4,8 ; thread 1 owns 1,5,9 ; etc -->
  <g stroke="#446688" stroke-width="1.2" filter="url(#rough2)">
    <rect x="40"  y="126" width="30" height="26" fill="#e8f0fe" rx="3"/>
    <rect x="200" y="126" width="30" height="26" fill="#e8f0fe" rx="3"/>
    <rect x="360" y="126" width="30" height="26" fill="#e8f0fe" rx="3"/>
    <rect x="70"  y="126" width="30" height="26" fill="#e6f4ea" rx="3"/>
    <rect x="230" y="126" width="30" height="26" fill="#e6f4ea" rx="3"/>
    <rect x="390" y="126" width="30" height="26" fill="#e6f4ea" rx="3"/>
    <rect x="100" y="126" width="30" height="26" fill="#fff8e1" rx="3"/>
    <rect x="260" y="126" width="30" height="26" fill="#fff8e1" rx="3"/>
    <rect x="420" y="126" width="30" height="26" fill="#fff8e1" rx="3"/>
    <rect x="130" y="126" width="30" height="26" fill="#fce4ec" rx="3"/>
    <rect x="290" y="126" width="30" height="26" fill="#fce4ec" rx="3"/>
    <rect x="450" y="126" width="30" height="26" fill="#fce4ec" rx="3"/>
  </g>
  <text x="500" y="143" font-size="11" fill="#888">... N 个</text>

  <!-- stride bracket -->
  <path d="M 40 168 L 160 168 L 160 162 M 40 168 L 40 162" stroke="#888" stroke-width="1" fill="none" filter="url(#rough2)"/>
  <text x="100" y="184" text-anchor="middle" font-size="11" fill="#888">← stride = 4 →</text>

  <!-- thread 0 path -->
  <line x1="20" y1="222" x2="560" y2="222" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="20" y="210" font-size="12" fill="#446688" font-weight="bold">thread 0 (tid=0)</text>
  <g font-size="11" fill="#333">
    <rect x="40"  y="226" width="30" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="55" y="242" text-anchor="middle">i=0</text>
    <text x="100" y="242" font-size="13" fill="#d6a040">→ +stride</text>
    <rect x="200" y="226" width="30" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="215" y="242" text-anchor="middle">i=4</text>
    <text x="260" y="242" font-size="13" fill="#d6a040">→ +stride</text>
    <rect x="360" y="226" width="30" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="375" y="242" text-anchor="middle">i=8</text>
    <text x="420" y="242" font-size="11" fill="#888">→ ... 直到 i ≥ N 退出</text>
  </g>

  <!-- code snippet -->
  <line x1="20" y1="268" x2="580" y2="268" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="20" y="292" font-size="12" fill="#444" font-weight="bold">伪代码：</text>
  <rect x="40" y="300" width="520" height="76" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <g font-family="monospace" font-size="11" fill="#333">
    <text x="54" y="320">int tid    = blockIdx.x * blockDim.x + threadIdx.x;</text>
    <text x="54" y="338">int stride = gridDim.x  * blockDim.x;</text>
    <text x="54" y="356">for (int i = tid; i &lt; N; i += stride) {</text>
    <text x="54" y="370">    C[i] = A[i] + B[i];   // 每个 thread 处理 ceil(N/stride) 个</text>
    <text x="54" y="384">}</text>
  </g>

  <!-- benefit -->
  <rect x="40" y="388" width="520" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="300" y="404" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">好处：grid 规模可远小于 N，启动开销小且自动吃满任意长度</text>
</svg>
