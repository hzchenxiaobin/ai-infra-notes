<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#fdfcf7"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">ALiBi：线性位置偏置注意力</text>
  <path d="M 300 42 Q 450 50 600 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#888">pos_bias[m,n] = α × (m − n)，对角线以下为正（关注过去），以上为负（抑制未来）</text>

  <!-- 左侧：ALiBi bias 矩阵 6×6 -->
  <text x="180" y="84" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">ALiBi 偏置矩阵（M×N）</text>

  <g filter="url(#sk)">
    <!-- Row 0: m=0, bias = [0, -α, -2α, -3α, -4α, -5α] -->
    <rect x="100" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="140" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="180" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="220" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="260" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="300" y="94" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>

    <!-- Row 1: m=1, bias = [α, 0, -α, -2α, -3α, -4α] -->
    <rect x="100" y="128" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="128" width="40" height="34" fill="#fffdf3" stroke="#bbb" stroke-width="1"/>
    <rect x="180" y="128" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="220" y="128" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="260" y="128" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="300" y="128" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>

    <!-- Row 2 -->
    <rect x="100" y="162" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="162" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="162" width="40" height="34" fill="#fffdf3" stroke="#bbb" stroke-width="1"/>
    <rect x="220" y="162" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="260" y="162" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="300" y="162" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>

    <!-- Row 3 -->
    <rect x="100" y="196" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="196" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="196" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="196" width="40" height="34" fill="#fffdf3" stroke="#bbb" stroke-width="1"/>
    <rect x="260" y="196" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>
    <rect x="300" y="196" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>

    <!-- Row 4 -->
    <rect x="100" y="230" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="230" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="230" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="230" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="260" y="230" width="40" height="34" fill="#fffdf3" stroke="#bbb" stroke-width="1"/>
    <rect x="300" y="230" width="40" height="34" fill="#fdecec" stroke="#b03a3a" stroke-width="1"/>

    <!-- Row 5 -->
    <rect x="100" y="264" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="140" y="264" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="180" y="264" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="220" y="264" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="260" y="264" width="40" height="34" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1"/>
    <rect x="300" y="264" width="40" height="34" fill="#fffdf3" stroke="#bbb" stroke-width="1"/>
  </g>

  <!-- 标注 -->
  <text x="120" y="88" text-anchor="middle" font-size="9" fill="#888">n=0</text>
  <text x="320" y="88" text-anchor="middle" font-size="9" fill="#888">n=5</text>
  <text x="92" y="115" text-anchor="end" font-size="9" fill="#888">m=0</text>
  <text x="92" y="285" text-anchor="end" font-size="9" fill="#888">m=5</text>

  <!-- 图例 -->
  <g filter="url(#sk)">
    <rect x="100" y="316" width="28" height="20" rx="3" fill="#eaf6ee" stroke="#4a8e4a"/>
  </g>
  <text x="136" y="331" font-size="10" fill="#2e6e2e">α&gt;0（m&gt;n，关注过去）</text>
  <g filter="url(#sk)">
    <rect x="260" y="316" width="28" height="20" rx="3" fill="#fdecec" stroke="#b03a3a"/>
  </g>
  <text x="296" y="331" font-size="10" fill="#b03a3a">α&lt;0（m&lt;n，抑制未来）</text>

  <!-- 右侧：计算流程 -->
  <text x="640" y="84" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">计算流程（fused per-query）</text>

  <g filter="url(#sk)">
    <rect x="500" y="94" width="160" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="580" y="117" text-anchor="middle" font-size="11" fill="#2b6e9e" font-weight="bold">① s = Q[m]·K[n] / √d</text>

  <g filter="url(#sk)">
    <rect x="500" y="142" width="160" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/>
  </g>
  <text x="580" y="165" text-anchor="middle" font-size="11" fill="#c98a2b" font-weight="bold">② s += α × (m − n)</text>

  <g filter="url(#sk)">
    <rect x="500" y="190" width="160" height="36" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.3"/>
  </g>
  <text x="580" y="213" text-anchor="middle" font-size="11" fill="#8e5db8" font-weight="bold">③ online softmax</text>

  <g filter="url(#sk)">
    <rect x="500" y="238" width="160" height="36" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="580" y="261" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">④ o += p × V[n]</text>

  <path d="M 580 130 L 580 140" stroke="#4a8edb" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 580 178 L 580 188" stroke="#c98a2b" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 580 226 L 580 236" stroke="#8e5db8" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 右下：关键观察 -->
  <g filter="url(#sk)">
    <rect x="690" y="94" width="190" height="100" rx="8" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="710" y="116" font-size="11" fill="#7a5415" font-weight="bold">关键观察</text>
  <text x="710" y="134" font-size="10" fill="#444">非因果：所有 key 都参与</text>
  <text x="710" y="150" font-size="10" fill="#444">偏置是加性的（非掩码）</text>
  <text x="710" y="166" font-size="10" fill="#444">α 控制衰减斜率</text>
  <text x="710" y="182" font-size="10" fill="#b03a3a">远处 key 被线性抑制</text>

  <!-- 底部公式 -->
  <g filter="url(#sk)">
    <rect x="100" y="360" width="700" height="60" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2" stroke-dasharray="4,3"/>
  </g>
  <text x="450" y="384" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">attn = softmax( Q@K^T / √d + α·(m−n) )</text>
  <text x="450" y="404" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">output = attn @ V</text>

  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#666">grid = (M,)，每 block 处理一行 query，遍历所有 N 个 key（无因果截断）</text>
</svg>
