<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Batched Matrix Multiplication：batch 维并行</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- batch dim -->
  <text x="60" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">batch=3 个独立矩阵对，一个 kernel 并行处理</text>

  <!-- batch 0 -->
  <g filter="url(#sk)">
    <rect x="60" y="86" width="220" height="80" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/>
  </g>
  <text x="170" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">batch 0</text>
  <g filter="url(#sk)"><rect x="72" y="116" width="44" height="36" rx="3" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="94" y="138" text-anchor="middle" font-size="10" fill="#2b6e9e">A₀</text>
  <text x="124" y="138" text-anchor="middle" font-size="12" fill="#444">×</text>
  <g filter="url(#sk)"><rect x="138" y="116" width="44" height="36" rx="3" fill="#fff" stroke="#4a8edb" stroke-width="1.2"/></g>
  <text x="160" y="138" text-anchor="middle" font-size="10" fill="#2b6e9e">B₀</text>
  <text x="192" y="138" text-anchor="middle" font-size="12" fill="#444">=</text>
  <g filter="url(#sk)"><rect x="206" y="116" width="44" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
  <text x="228" y="138" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">C₀</text>

  <!-- batch 1 -->
  <g filter="url(#sk)">
    <rect x="60" y="178" width="220" height="80" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="170" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">batch 1</text>
  <g filter="url(#sk)"><rect x="72" y="208" width="44" height="36" rx="3" fill="#fff" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="94" y="230" text-anchor="middle" font-size="10" fill="#7a5415">A₁</text>
  <text x="124" y="230" text-anchor="middle" font-size="12" fill="#444">×</text>
  <g filter="url(#sk)"><rect x="138" y="208" width="44" height="36" rx="3" fill="#fff" stroke="#c98a2b" stroke-width="1.2"/></g>
  <text x="160" y="230" text-anchor="middle" font-size="10" fill="#7a5415">B₁</text>
  <text x="192" y="230" text-anchor="middle" font-size="12" fill="#444">=</text>
  <g filter="url(#sk)"><rect x="206" y="208" width="44" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
  <text x="228" y="230" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">C₁</text>

  <!-- batch 2 -->
  <g filter="url(#sk)">
    <rect x="60" y="270" width="220" height="80" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.4"/>
  </g>
  <text x="170" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a2828">batch 2</text>
  <g filter="url(#sk)"><rect x="72" y="300" width="44" height="36" rx="3" fill="#fff" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="94" y="322" text-anchor="middle" font-size="10" fill="#7a2828">A₂</text>
  <text x="124" y="322" text-anchor="middle" font-size="12" fill="#444">×</text>
  <g filter="url(#sk)"><rect x="138" y="300" width="44" height="36" rx="3" fill="#fff" stroke="#b85450" stroke-width="1.2"/></g>
  <text x="160" y="322" text-anchor="middle" font-size="10" fill="#7a2828">B₂</text>
  <text x="192" y="322" text-anchor="middle" font-size="12" fill="#444">=</text>
  <g filter="url(#sk)"><rect x="206" y="300" width="44" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/></g>
  <text x="228" y="322" text-anchor="middle" font-size="10" fill="#2e6e2e" font-weight="bold">C₂</text>

  <!-- grid mapping -->
  <path d="M 280 180 L 340 180" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <g filter="url(#sk)">
    <rect x="342" y="100" width="470" height="220" rx="10" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="577" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">grid 映射：batch 维 + 输出 tile 维</text>
  <text x="362" y="148" font-size="11" fill="#2b6e9e">dim3 grid((N + TILE - 1) / TILE, (M + TILE - 1) / TILE, batch);</text>
  <text x="362" y="166" font-size="11" fill="#7a5415">dim3 block(TILE, TILE);</text>
  <text x="362" y="188" font-size="11" fill="#444">// blockIdx.z = batch index → 选 A[b], B[b]</text>
  <text x="362" y="206" font-size="11" fill="#444">// blockIdx.x/y = 输出 C[b] 的 tile 位置</text>

  <text x="362" y="234" font-size="11" fill="#2e6e2e" font-weight="bold">关键：</text>
  <text x="362" y="252" font-size="11" fill="#444">• blockIdx.z 索引 batch，各 batch 独立计算</text>
  <text x="362" y="270" font-size="11" fill="#444">• 共享一份 kernel 代码，一次 launch 处理全部 batch</text>
  <text x="362" y="288" font-size="11" fill="#444">• A/B/C 用 stride 索引：A[b][i][k] = A_flat[b*M*K + i*K + k]</text>
  <text x="362" y="310" font-size="11" fill="#b85450">类比：v1 每轮 batch 个请求 forward → batched GEMM 的 batch 维</text>
</svg>
