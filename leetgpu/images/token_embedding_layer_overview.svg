<svg xmlns="http://www.w3.org/2000/svg" width="940" height="500" viewBox="0 0 940 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="940" height="500" fill="#fdfcf7"/>
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Token Embedding Layer：gather + 加 + LayerNorm 融合</text>
  <path d="M 300 42 Q 470 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <text x="470" y="72" text-anchor="middle" font-size="12" fill="#666">推理引擎第一个算子：token id → 向量。gather token emb + gather pos emb + 相加 + LayerNorm（gamma/beta）</text>

  <!-- 输入 token_ids -->
  <text x="40" y="104" font-size="12" font-weight="bold" fill="#2b6e9e">token_ids (B, T)</text>
  <g filter="url(#sk)">
    <g fill="#bcd6f0" stroke="#4a8edb">
      <rect x="40" y="112" width="40" height="30" rx="3"/>
      <rect x="82" y="112" width="40" height="30" rx="3"/>
      <rect x="124" y="112" width="40" height="30" rx="3"/>
    </g>
  </g>
  <text x="60" y="131" text-anchor="middle" font-size="10" fill="#234">id=5</text>
  <text x="102" y="131" text-anchor="middle" font-size="10" fill="#234">id=12</text>
  <text x="144" y="131" text-anchor="middle" font-size="10" fill="#234">id=3</text>

  <!-- position_ids -->
  <text x="40" y="160" font-size="12" font-weight="bold" fill="#7a5415">position_ids (T,)</text>
  <g filter="url(#sk)">
    <g fill="#f0d9a8" stroke="#c98a2b">
      <rect x="40" y="168" width="40" height="30" rx="3"/>
      <rect x="82" y="168" width="40" height="30" rx="3"/>
      <rect x="124" y="168" width="40" height="30" rx="3"/>
    </g>
  </g>
  <text x="60" y="187" text-anchor="middle" font-size="10" fill="#5a3a0a">pos=0</text>
  <text x="102" y="187" text-anchor="middle" font-size="10" fill="#5a3a0a">pos=1</text>
  <text x="144" y="187" text-anchor="middle" font-size="10" fill="#5a3a0a">pos=2</text>

  <!-- gather 箭头 -->
  <path d="M 100 142 L 280 200" stroke="#4a8edb" stroke-width="1.2" fill="none" filter="url(#sk)" marker-end="url(#ar)"/>
  <path d="M 100 198 L 280 230" stroke="#c98a2b" stroke-width="1.2" fill="none" filter="url(#sk)" marker-end="url(#ar)"/>

  <!-- embedding tables -->
  <text x="300" y="104" font-size="12" font-weight="bold" fill="#2b6e9e">token_emb (V, D)</text>
  <g filter="url(#sk)">
    <rect x="300" y="112" width="120" height="120" rx="4" fill="#e8f0fa" stroke="#4a8edb"/>
    <rect x="300" y="148" width="120" height="28" rx="2" fill="#bcd6f0" stroke="#4a8edb" stroke-width="2"/>
    <text x="420" y="166" font-size="9" fill="#2b6e9e">← row 5</text>
  </g>
  <text x="360" y="132" text-anchor="middle" font-size="9" fill="#888">V=30000 行</text>

  <text x="500" y="104" font-size="12" font-weight="bold" fill="#7a5415">pos_emb (P, D)</text>
  <g filter="url(#sk)">
    <rect x="500" y="112" width="120" height="120" rx="4" fill="#fef6e6" stroke="#c98a2b"/>
    <rect x="500" y="120" width="120" height="28" rx="2" fill="#f0d9a8" stroke="#c98a2b" stroke-width="2"/>
    <text x="620" y="138" font-size="9" fill="#7a5415">← row 0</text>
  </g>
  <text x="560" y="252" text-anchor="middle" font-size="9" fill="#888">P=2048 行</text>

  <!-- gather 结果 -->
  <text x="700" y="104" font-size="12" font-weight="bold" fill="#444">gather 结果 (B,T,D)</text>
  <g filter="url(#sk)">
    <rect x="700" y="112" width="50" height="28" rx="3" fill="#bcd6f0" stroke="#4a8edb"/>
    <rect x="752" y="112" width="50" height="28" rx="3" fill="#f0d9a8" stroke="#c98a2b"/>
  </g>
  <text x="725" y="130" text-anchor="middle" font-size="9" fill="#2b6e9e">tok emb</text>
  <text x="777" y="130" text-anchor="middle" font-size="9" fill="#7a5415">pos emb</text>
  <text x="710" y="158" font-size="10" fill="#666">相加 → s = tok + pos</text>

  <!-- LayerNorm -->
  <g filter="url(#sk)">
    <rect x="300" y="270" width="500" height="120" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="550" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">LayerNorm（沿 D 维归一化）</text>
  <text x="320" y="318" font-size="11" fill="#444">μ = mean(s),  σ² = var(s)</text>
  <text x="320" y="338" font-size="11" fill="#444">y = γ · (s - μ) / √(σ² + ε) + β</text>
  <text x="320" y="362" font-size="10" fill="#666">γ, β: 可学习的 scale/shift (D,)</text>
  <text x="320" y="380" font-size="10" fill="#2e6e2e">→ 输出 (B, T, D)</text>

  <!-- 融合说明 -->
  <g filter="url(#sk)">
    <rect x="40" y="410" width="860" height="70" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="60" y="434" font-size="12" font-weight="bold" fill="#2b2b2b">融合 kernel：gather + 加 + LayerNorm 一次完成（不物化中间结果）</text>
  <text x="60" y="454" font-size="11" fill="#444">每 (b,t) 一个 block/warp：gather 两行 D 维 → 相加 → 块归约求 μ/σ² → 归一化 × γ + β → 写回</text>
  <text x="60" y="470" font-size="11" fill="#7a5415" font-weight="bold">对应 Mini 引擎 v0 的 self.embedding(input_ids)，Week7 替换 PyTorch 后端时用此手写 kernel</text>
</svg>
