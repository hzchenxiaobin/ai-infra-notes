<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#222">
    Strided Loading：协作加载 input tile
  </text>
  <text x="500" y="62" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#666">
    OT=4, K=3 → tileH=tileW=6, 共 36 个 cell；16 个线程 (nTH=16) 用 strided loop 各加载 2~3 个
  </text>

  <!-- ========== Left: Pass 1 (idx = tid) ========== -->
  <text x="210" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    第一轮：idx = tid （0~15）
  </text>
  <text x="210" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">
    16 个线程各加载 1 个 cell
  </text>

  <g id="pass1" transform="translate(60,135)">
    <!-- 6x6 grid: cell=44, origin 0,0 -->
    <!-- halo cells (outer ring) - light orange -->
    <rect x="0"   y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="0"  width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="44" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="44" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="88" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="88" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="132" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="132" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="176" width="44" height="44" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <!-- inner 4x4 output tile - light green, overlaid with pass1 numbers -->
    <!-- idx 0..15 fill: row-major within inner tile starts at (1,1) -->
    <rect x="44"  y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2"/>

    <!-- idx labels: idx 0 at (sy=0,sx=0)... idx 15 at (sy=2,sx=3) -->
    <!-- idx = sy*6 + sx -->
    <text x="22"  y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">0</text>
    <text x="66"  y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">1</text>
    <text x="110" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">2</text>
    <text x="154" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">3</text>
    <text x="198" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">4</text>
    <text x="242" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">5</text>

    <text x="22"  y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">6</text>
    <text x="66"  y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">7</text>
    <text x="110" y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">8</text>
    <text x="154" y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">9</text>
    <text x="198" y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">10</text>
    <text x="242" y="72"  text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">11</text>

    <text x="22"  y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">12</text>
    <text x="66"  y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">13</text>
    <text x="110" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">14</text>
    <text x="154" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">15</text>

    <!-- axis labels -->
    <text x="-12" y="116" text-anchor="middle" font-size="12" fill="#444" transform="rotate(-90 -12 116)">sy</text>
    <text x="132" y="240" text-anchor="middle" font-size="12" fill="#444">sx</text>
  </g>

  <!-- Legend for pass1 -->
  <g transform="translate(60, 405)">
    <rect x="0" y="0" width="16" height="16" fill="#bbdefb" stroke="#90caf9" stroke-width="1"/>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#333">第一轮加载的 cell（idx 0~15）</text>
    <rect x="0" y="24" width="16" height="16" fill="#ffe0b2" stroke="#ffcc80" stroke-width="1"/>
    <text x="24" y="37" font-family="sans-serif" font-size="12" fill="#333">halo（待第二轮加载）</text>
  </g>

  <!-- ========== Right: Pass 2 (idx = tid + 16) ========== -->
  <text x="710" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    第二轮：idx = tid + 16 （16~31）
  </text>
  <text x="710" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">
    同一批线程继续加载剩余 20 个 cell
  </text>

  <g id="pass2" transform="translate(560,135)">
    <!-- 6x6 grid -->
    <!-- All cells now loaded, show pass2 cells in purple -->
    <!-- halo + remaining inner cells -->
    <!-- idx 16..35 -->
    <!-- idx 16 = (sy=2,sx=4), 17=(2,5), 18=(3,0)...35=(5,5) -->
    <rect x="0"   y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="0"  width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="44" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="44" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="88" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="88" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="88" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="132" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="132" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="44"  y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="88"  y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="132" y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="176" y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>
    <rect x="220" y="176" width="44" height="44" fill="#e1bee7" stroke="#fff" stroke-width="2"/>

    <!-- already loaded in pass1: idx 0..15 in light blue overlay -->
    <rect x="44"  y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="88"  y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="132" y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="176" y="44"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="44"  y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="88"  y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="132" y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="176" y="88"  width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="44"  y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="88"  y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="132" y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <rect x="176" y="132" width="44" height="44" fill="#bbdefb" stroke="#fff" stroke-width="2" opacity="0.4"/>

    <!-- idx labels for pass2: 16..35 -->
    <text x="198" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">16</text>
    <text x="242" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">17</text>
    <text x="22"  y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">18</text>
    <text x="66"  y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">19</text>
    <text x="110" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">20</text>
    <text x="154" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">21</text>
    <text x="198" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">22</text>
    <text x="242" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">23</text>
    <text x="22"  y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">24</text>
    <text x="66"  y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">25</text>
    <text x="110" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">26</text>
    <text x="154" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">27</text>
    <text x="198" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">28</text>
    <text x="242" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">29</text>
    <text x="22"  y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">30</text>
    <text x="66"  y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">31</text>
    <text x="110" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">32</text>
    <text x="154" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">33</text>
    <text x="198" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">34</text>
    <text x="242" y="28"  text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">35</text>

    <!-- axis labels -->
    <text x="-12" y="116" text-anchor="middle" font-size="12" fill="#444" transform="rotate(-90 -12 116)">sy</text>
    <text x="132" y="240" text-anchor="middle" font-size="12" fill="#444">sx</text>
  </g>

  <!-- Legend for pass2 -->
  <g transform="translate(560, 405)">
    <rect x="0" y="0" width="16" height="16" fill="#e1bee7" stroke="#ce93d8" stroke-width="1"/>
    <text x="24" y="13" font-family="sans-serif" font-size="12" fill="#333">第二轮加载的 cell（idx 16~35）</text>
    <rect x="0" y="24" width="16" height="16" fill="#bbdefb" stroke="#90caf9" stroke-width="1" opacity="0.5"/>
    <text x="24" y="37" font-family="sans-serif" font-size="12" fill="#333">第一轮已加载（半透明）</text>
  </g>

  <!-- ========== Bottom: formula explanation ========== -->
  <rect x="50" y="460" width="900" height="140" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="488" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    strided loop 公式与 worked example
  </text>

  <text x="80" y="518" font-family="monospace" font-size="13" fill="#333">
    for (idx = tid; idx &lt; tileH * tileW; idx += nTH)
  </text>
  <text x="80" y="540" font-family="monospace" font-size="13" fill="#333">
    sy = idx / tileW    // 行号 = idx ÷ 6
  </text>
  <text x="80" y="562" font-family="monospace" font-size="13" fill="#333">
    sx = idx % tileW    // 列号 = idx mod 6
  </text>

  <text x="500" y="518" font-family="sans-serif" font-size="13" fill="#333">
    例：tid=3 的线程
  </text>
  <text x="500" y="540" font-family="monospace" font-size="13" fill="#1565c0">
    第一轮: idx=3  → sy=0, sx=3 → smem[0][3]
  </text>
  <text x="500" y="562" font-family="monospace" font-size="13" fill="#6a1b9a">
    第二轮: idx=19 → sy=3, sx=1 → smem[3][1]
  </text>
  <text x="500" y="584" font-family="sans-serif" font-size="12" fill="#666">
    36 个 cell / 16 线程 = 2.25 → 每线程加载 2~3 个
  </text>
</svg>
