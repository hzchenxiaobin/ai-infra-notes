<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">2D 共享直方图：R 份副本分散 bank conflict</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">按 tid % R 分散到不同行，冲突域从 blockDim 降到 blockDim/R</text>

  <!-- ===== Left: 1D s_hist (bank conflict) ===== -->
  <text x="30" y="76" font-size="12" fill="#b85450" font-weight="bold">R=1（单份）：bank conflict 高</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="84" width="240" height="200" fill="none" stroke="#b85450" stroke-width="1" rx="6" filter="url(#rough2)"/>

    <!-- threads -->
    <rect x="40" y="94" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="50" y="104" text-anchor="middle" font-size="7">t0</text>
    <rect x="62" y="94" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="72" y="104" text-anchor="middle" font-size="7">t1</text>
    <rect x="84" y="94" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="94" y="104" text-anchor="middle" font-size="7">t2</text>
    <text x="120" y="104" font-size="9" fill="#888">...(256 threads)</text>

    <!-- all v=3 -->
    <text x="40" y="124" font-size="9" fill="#b85450">若多 thread 的 v 相同（如 v=3）：</text>

    <!-- s_hist 1D -->
    <rect x="40" y="134" width="30" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="55" y="148" text-anchor="middle" font-size="8">[0]</text>
    <rect x="72" y="134" width="30" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="87" y="148" text-anchor="middle" font-size="8">[1]</text>
    <rect x="104" y="134" width="30" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
    <text x="119" y="148" text-anchor="middle" font-size="8">[2]</text>
    <rect x="136" y="134" width="30" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="2" filter="url(#rough2)"/>
    <text x="151" y="148" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">[3]</text>
    <text x="180" y="148" font-size="9" fill="#888">...</text>

    <!-- conflict arrows -->
    <path d="M 50 110 L 151 132" stroke="#b85450" stroke-width="0.8" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
    <path d="M 72 110 L 151 132" stroke="#b85450" stroke-width="0.8" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
    <path d="M 94 110 L 151 132" stroke="#b85450" stroke-width="0.8" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>

    <text x="40" y="176" font-size="9" fill="#b85450" font-weight="bold">同 bank 排队 → 串行化</text>

    <rect x="40" y="186" width="210" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="145" y="204" text-anchor="middle" font-size="9" fill="#555">冲突域 = blockDim = 256</text>
    <text x="145" y="218" text-anchor="middle" font-size="9" fill="#b85450">bank conflict 严重</text>

    <text x="145" y="252" text-anchor="middle" font-size="8" fill="#888">shared memory 32 个 bank</text>
    <text x="145" y="266" text-anchor="middle" font-size="8" fill="#888">v 相同 → 同 bank → 冲突</text>
  </g>

  <!-- arrow -->
  <text x="300" y="180" text-anchor="middle" font-size="20" fill="#4a7a3a" font-weight="bold">→</text>
  <text x="300" y="200" text-anchor="middle" font-size="9" fill="#4a7a3a">R=4 分散</text>

  <!-- ===== Right: 2D s_hist (R=4) ===== -->
  <text x="350" y="76" font-size="12" fill="#4a7a3a" font-weight="bold">R=4（4 份副本）：冲突降 4×</text>
  <g font-size="9" fill="#333">
    <rect x="350" y="84" width="260" height="200" fill="none" stroke="#4a7a3a" stroke-width="1" rx="6" filter="url(#rough2)"/>

    <!-- threads with rid -->
    <rect x="360" y="94" width="20" height="14" fill="#e8f0fe" stroke="#446688" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="370" y="104" text-anchor="middle" font-size="7">t0</text>
    <text x="378" y="104" font-size="7" fill="#446688">r0</text>
    <rect x="392" y="94" width="20" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="402" y="104" text-anchor="middle" font-size="7">t1</text>
    <text x="410" y="104" font-size="7" fill="#4a7a3a">r1</text>
    <rect x="424" y="94" width="20" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="434" y="104" text-anchor="middle" font-size="7">t2</text>
    <text x="442" y="104" font-size="7" fill="#d6a040">r2</text>
    <text x="460" y="104" font-size="8" fill="#888">tid % R 分散</text>

    <!-- 2D s_hist: 4 rows -->
    <text x="360" y="126" font-size="9" fill="#4a7a3a">s_hist[4][256]：</text>

    <rect x="360" y="132" width="30" height="14" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="375" y="142" text-anchor="middle" font-size="7">r0</text>
    <rect x="392" y="132" width="30" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="422" y="142" text-anchor="middle" font-size="7">...</text>
    <rect x="436" y="132" width="30" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="1" filter="url(#rough2)"/>
    <text x="451" y="142" text-anchor="middle" font-size="7" fill="#b85450" font-weight="bold">[3]</text>

    <rect x="360" y="148" width="30" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="375" y="158" text-anchor="middle" font-size="7">r1</text>
    <rect x="392" y="148" width="30" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="422" y="158" text-anchor="middle" font-size="7">...</text>
    <rect x="436" y="148" width="30" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="1" filter="url(#rough2)"/>
    <text x="451" y="158" text-anchor="middle" font-size="7" fill="#b85450" font-weight="bold">[3]</text>

    <rect x="360" y="164" width="30" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="375" y="174" text-anchor="middle" font-size="7">r2</text>
    <rect x="436" y="164" width="30" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="1" filter="url(#rough2)"/>
    <text x="451" y="174" text-anchor="middle" font-size="7" fill="#b85450" font-weight="bold">[3]</text>

    <rect x="360" y="180" width="30" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.6" rx="1" filter="url(#rough2)"/>
    <text x="375" y="190" text-anchor="middle" font-size="7">r3</text>
    <rect x="436" y="180" width="30" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="1" filter="url(#rough2)"/>
    <text x="451" y="190" text-anchor="middle" font-size="7" fill="#b85450" font-weight="bold">[3]</text>

    <text x="480" y="160" font-size="8" fill="#888">v=3 写到</text>
    <text x="480" y="172" font-size="8" fill="#888">4 个不同行</text>
    <text x="480" y="184" font-size="8" fill="#4a7a3a">冲突分散</text>

    <!-- conflict arrows (dispersed) -->
    <path d="M 370 110 L 451 130" stroke="#446688" stroke-width="0.6" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
    <path d="M 402 110 L 451 146" stroke="#4a7a3a" stroke-width="0.6" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>
    <path d="M 434 110 L 451 162" stroke="#d6a040" stroke-width="0.6" fill="none" marker-end="url(#arr)" opacity="0.6" filter="url(#rough2)"/>

    <rect x="360" y="208" width="240" height="40" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="480" y="226" text-anchor="middle" font-size="9" fill="#555">冲突域 = blockDim/R = 64</text>
    <text x="480" y="240" text-anchor="middle" font-size="9" fill="#4a7a3a">bank conflict 降 4×</text>

    <text x="480" y="270" text-anchor="middle" font-size="8" fill="#888">代价：shared 占用 R×B×4B</text>
  </g>

  <!-- ===== Bottom: code + tradeoff ===== -->
  <line x1="20" y1="300" x2="620" y2="300" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

  <rect x="30" y="310" width="580" height="76" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="330" font-family="monospace" font-size="10" fill="#333">__shared__ int s_hist[R][B];   // R 份副本</text>
  <text x="44" y="346" font-family="monospace" font-size="10" fill="#333">int rid = tid % R;</text>
  <text x="44" y="362" font-family="monospace" font-size="10" fill="#4a7a3a">atomicAdd(&amp;s_hist[rid][input[i]], 1);   // 按 rid 分散到不同行</text>
  <text x="44" y="378" font-family="monospace" font-size="10" fill="#b85450">// 合并：R 份求和后 atomicAdd 到 global</text>

  <rect x="30" y="396" width="580" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="320" y="416" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">权衡：R 越大冲突越低，但 shared 占用 R×B×4B 增加</text>
  <text x="320" y="434" text-anchor="middle" font-size="10" fill="#555">B=256 时 R=4（4KB）是甜点；用 ncu 的 l1tex__data_bank_conflicts 指标指导调优</text>
</svg>
