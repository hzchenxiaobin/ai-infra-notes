<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#fdfcf7"/>
  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">SwiGLU：融合 Kernel 数据流</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- formula -->
  <g filter="url(#sk)">
    <rect x="60" y="58" width="760" height="44" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="440" y="86" text-anchor="middle" font-size="13" fill="#2b6e9e" font-weight="bold" font-family="monospace">SwiGLU(x) = SiLU(x₁) · x₂ ，其中 x₁ = x[:N/2], x₂ = x[N/2:]</text>

  <!-- ===== Data flow ===== -->
  <text x="440" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">数据流：split → SiLU(x₁) → 乘 x₂ → output</text>

  <g font-size="11">
    <!-- Input x -->
    <g filter="url(#sk)"><rect x="40" y="146" width="100" height="50" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.3"/></g>
    <text x="90" y="168" text-anchor="middle" fill="#7a5415" font-weight="bold">input x</text>
    <text x="90" y="184" text-anchor="middle" fill="#888" font-size="9">[N]</text>

    <!-- split -->
    <path d="M 142 160 L 180 140" stroke="#888" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <path d="M 142 180 L 180 200" stroke="#888" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

    <!-- x1 -->
    <g filter="url(#sk)"><rect x="190" y="124" width="80" height="36" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/></g>
    <text x="230" y="147" text-anchor="middle" fill="#2b6e9e" font-weight="bold">x₁ [N/2]</text>

    <!-- x2 -->
    <g filter="url(#sk)"><rect x="190" y="184" width="80" height="36" rx="5" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/></g>
    <text x="230" y="207" text-anchor="middle" fill="#2e6e2e" font-weight="bold">x₂ [N/2]</text>

    <!-- SiLU(x1) -->
    <path d="M 272 142 L 330 142" stroke="#888" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <g filter="url(#sk)"><rect x="340" y="120" width="110" height="46" rx="6" fill="#fce4ec" stroke="#b85450" stroke-width="1.3"/></g>
    <text x="395" y="140" text-anchor="middle" fill="#b03a3a" font-weight="bold">SiLU(x₁)</text>
    <text x="395" y="156" text-anchor="middle" fill="#888" font-size="9">x₁ · σ(x₁)</text>

    <!-- multiply -->
    <path d="M 450 142 Q 490 142 500 165" stroke="#888" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <path d="M 272 202 Q 400 202 500 185" stroke="#888" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

    <g filter="url(#sk)"><rect x="510" y="156" width="80" height="44" rx="6" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.4"/></g>
    <text x="550" y="174" text-anchor="middle" fill="#5a3a7a" font-weight="bold">⊙ 乘</text>
    <text x="550" y="190" text-anchor="middle" fill="#888" font-size="9">elementwise</text>

    <!-- output -->
    <path d="M 592 178 L 650 178" stroke="#888" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
    <g filter="url(#sk)"><rect x="660" y="156" width="100" height="44" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.4"/></g>
    <text x="710" y="174" text-anchor="middle" fill="#2b6e9e" font-weight="bold">output</text>
    <text x="710" y="190" text-anchor="middle" fill="#888" font-size="9">[N/2]</text>
  </g>

  <!-- ===== Fusion benefit ===== -->
  <g filter="url(#sk)">
    <rect x="60" y="240" width="380" height="200" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.3"/>
  </g>
  <text x="250" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#b03a3a">为什么融合？（面试核心问）</text>
  <g font-size="10" fill="#444">
    <text x="80" y="290"><tspan font-weight="bold" fill="#b03a3a">不融合（3 个 kernel）：</tspan></text>
    <text x="90" y="308">1. SiLU(x₁) → 写 tmp1 到 HBM → 读回</text>
    <text x="90" y="324">2. tmp1 × x₂ → 写 tmp2 到 HBM → 读回</text>
    <text x="90" y="340">3. output ← tmp2</text>
    <text x="90" y="360" fill="#888">3 次 HBM 往返，带宽浪费</text>

    <text x="80" y="386"><tspan font-weight="bold" fill="#2e6e2e">融合（1 个 kernel）：</tspan></text>
    <text x="90" y="404">读 x₁+x₂ → register 内算 SiLU+乘 → 写 output</text>
    <text x="90" y="420" fill="#2e6e2e">1 次 HBM 读 + 1 次写，省 2 次中间往返</text>
  </g>

  <!-- ===== Memory-bound analysis ===== -->
  <g filter="url(#sk)">
    <rect x="460" y="240" width="380" height="200" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="650" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">性能特征</text>
  <g font-size="10" fill="#444">
    <text x="480" y="290"><tspan font-weight="bold" fill="#2e6e2e">elementwise + memory-bound</tspan></text>
    <text x="480" y="310">每元素：~5 FLOP（sigmoid+乘+乘）</text>
    <text x="480" y="326">每元素访存：读 2×4B(x₁,x₂) + 写 4B(out) = 12B</text>
    <text x="480" y="346" fill="#b03a3a" font-weight="bold">AI ≈ 5/12 ≈ 0.42 FLOP/Byte</text>
    <text x="480" y="362" fill="#888">远低于 ridge point 12.6 → 纯带宽瓶颈</text>

    <text x="480" y="390"><tspan font-weight="bold" fill="#2e6e2e">优化重点</tspan></text>
    <text x="480" y="408">① __expf 快速数学 ② grid-stride ③ coalesced</text>
    <text x="480" y="424">④ 与上游 GEMM 融合（SwiGLU MLP 的 gate/up 投影）</text>
  </g>
</svg>
