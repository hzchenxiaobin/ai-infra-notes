<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Dot Product：两步分离 vs 融合单 kernel</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">分离版物化 tmp 数组到 HBM（写+读），融合版直接 FMA 累加到寄存器，流量减半</text>

  <!-- ===== Left: separate two kernels ===== -->
  <text x="30" y="76" font-size="12" fill="#b85450" font-weight="bold">分离两 kernel（物化 tmp）</text>

  <g font-size="9" fill="#333">
    <rect x="30" y="84" width="280" height="280" fill="none" stroke="#b85450" stroke-width="1" rx="6" filter="url(#rough2)"/>

    <!-- inputs a, b -->
    <rect x="40" y="94" width="100" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="90" y="110" text-anchor="middle" font-size="9" fill="#446688">a[N] (读)</text>
    <rect x="40" y="122" width="100" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="90" y="138" text-anchor="middle" font-size="9" fill="#446688">b[N] (读)</text>

    <!-- kernel 1 -->
    <rect x="160" y="100" width="80" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="200" y="116" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">kernel 1</text>
    <text x="200" y="130" text-anchor="middle" font-size="8" fill="#555">a[i]*b[i]</text>

    <!-- tmp in HBM -->
    <rect x="160" y="156" width="80" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="200" y="172" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">tmp[N]</text>
    <text x="200" y="192" text-anchor="middle" font-size="8" fill="#d6a040">物化到 HBM</text>
    <text x="200" y="204" text-anchor="middle" font-size="8" fill="#d6a040">(写 16MB + 读 16MB)</text>

    <!-- kernel 2 -->
    <rect x="160" y="216" width="80" height="40" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4" filter="url(#rough2)"/>
    <text x="200" y="232" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">kernel 2</text>
    <text x="200" y="246" text-anchor="middle" font-size="8" fill="#555">reduce(tmp)</text>

    <!-- output -->
    <rect x="160" y="268" width="80" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="200" y="284" text-anchor="middle" font-size="9" fill="#4a7a3a">output</text>

    <!-- arrows -->
    <path d="M 140 106 L 156 110" stroke="#446688" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 140 134 L 156 126" stroke="#446688" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 200 140 L 200 154" stroke="#d6a040" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 200 180 L 200 214" stroke="#d6a040" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 200 256 L 200 266" stroke="#4a7a3a" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- total -->
    <rect x="40" y="306" width="260" height="48" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="170" y="324" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">HBM 总流量 ≈ 16N 字节</text>
    <text x="170" y="340" text-anchor="middle" font-size="9" fill="#b85450">tmp 写+读 = 2N×4B 冗余</text>
  </g>

  <!-- arrow -->
  <text x="340" y="220" text-anchor="middle" font-size="20" fill="#4a7a3a" font-weight="bold">→</text>
  <text x="340" y="240" text-anchor="middle" font-size="10" fill="#4a7a3a">融合</text>

  <!-- ===== Right: fused single kernel ===== -->
  <text x="370" y="76" font-size="12" fill="#4a7a3a" font-weight="bold">融合单 kernel（tmp 不落 HBM）</text>

  <g font-size="9" fill="#333">
    <rect x="370" y="84" width="240" height="280" fill="none" stroke="#4a7a3a" stroke-width="1" rx="6" filter="url(#rough2)"/>

    <!-- inputs a, b -->
    <rect x="380" y="94" width="80" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="420" y="110" text-anchor="middle" font-size="9" fill="#446688">a[N] (读)</text>
    <rect x="380" y="122" width="80" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="420" y="138" text-anchor="middle" font-size="9" fill="#446688">b[N] (读)</text>

    <!-- fused kernel -->
    <rect x="480" y="100" width="120" height="80" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="540" y="118" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">单 kernel 融合</text>
    <text x="540" y="134" text-anchor="middle" font-size="8" fill="#555">val += a[i]*b[i]</text>
    <text x="540" y="148" text-anchor="middle" font-size="8" fill="#555">(FMA 累加到寄存器)</text>
    <text x="540" y="164" text-anchor="middle" font-size="8" fill="#555">+ block_reduce(val)</text>

    <!-- register -->
    <rect x="480" y="190" width="120" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
    <text x="540" y="206" text-anchor="middle" font-size="8" fill="#b85450">val 驻留寄存器</text>

    <!-- no tmp -->
    <rect x="480" y="224" width="120" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
    <text x="540" y="240" text-anchor="middle" font-size="8" fill="#b85450">tmp ✗ 不物化</text>

    <!-- output -->
    <rect x="480" y="260" width="120" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="540" y="276" text-anchor="middle" font-size="9" fill="#4a7a3a">output</text>

    <!-- arrows -->
    <path d="M 460 106 L 476 120" stroke="#446688" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 460 134 L 476 130" stroke="#446688" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 540 180 L 540 188" stroke="#b85450" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
    <path d="M 540 248 L 540 258" stroke="#4a7a3a" stroke-width="0.8" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

    <!-- total -->
    <rect x="380" y="306" width="220" height="48" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="4" filter="url(#rough2)"/>
    <text x="490" y="324" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">HBM 总流量 ≈ 8N 字节</text>
    <text x="490" y="340" text-anchor="middle" font-size="9" fill="#4a7a3a">只读 a+b，省一半</text>
  </g>

  <!-- ===== Bottom: bandwidth comparison ===== -->
  <line x1="20" y1="384" x2="620" y2="384" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="408" font-size="12" fill="#444" font-weight="bold">HBM 流量对比（N=4M）：</text>

  <rect x="30" y="418" width="280" height="24" fill="#b85450" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="170" y="434" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">分离：~64 MB（含 tmp 写+读）</text>

  <rect x="350" y="418" width="140" height="24" fill="#4a7a3a" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="420" y="434" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">融合：~32 MB</text>

  <text x="320" y="434" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">2×</text>
  <text x="510" y="434" font-size="10" fill="#4a7a3a">流量减半 → 带宽翻倍</text>
</svg>
