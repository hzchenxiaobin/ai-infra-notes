<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'Segoe UI', 'Kaiti SC', 楷体, sans-serif">
  <defs><marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/></marker></defs>
  <rect width="640" height="520" fill="#fafafa"/>

  <text x="320" y="28" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">FlashAttention Kernel 数据流（简化版）</text>
  <text x="320" y="46" text-anchor="middle" font-size="11" fill="#888">一个 block 处理一行 query，遍历 K/V 的 N 个 key，online softmax 增量更新</text>

  <!-- ===== Input matrices ===== -->
  <text x="30" y="76" font-size="11" fill="#446688" font-weight="bold">Q (1×d)    K (N×d)    V (N×d)</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="82" width="60" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="60" y="98" text-anchor="middle">Q[i]</text>
    <rect x="110" y="82" width="80" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="150" y="98" text-anchor="middle">K[0..N-1]</text>
    <rect x="210" y="82" width="80" height="24" fill="#e8f0fe" stroke="#446688" rx="3"/>
    <text x="250" y="98" text-anchor="middle">V[0..N-1]</text>
  </g>

  <!-- ===== k-loop ===== -->
  <line x1="20" y1="120" x2="620" y2="120" stroke="#eee" stroke-width="1"/>
  <text x="30" y="142" font-size="12" fill="#b85450" font-weight="bold">for (k = 0; k &lt; N; ++k) ——— 遍历每个 key</text>

  <!-- Step 1: dot product -->
  <rect x="30" y="152" width="580" height="50" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="4"/>
  <text x="50" y="172" font-size="10" fill="#b85450" font-weight="bold">① 点积 s_k = Q[i] · K[k] / √d</text>
  <text x="50" y="190" font-size="9" fill="#555">每 thread 算一维部分积 → block_reduce_sum → 标量 s_k</text>

  <!-- Step 2: online softmax -->
  <rect x="30" y="212" width="580" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="4"/>
  <text x="50" y="232" font-size="10" fill="#d6a040" font-weight="bold">② Online softmax 更新（tid=0 执行，广播 α, β）</text>
  <text x="50" y="250" font-family="monospace" font-size="10" fill="#555">m_new = max(m, s_k)       α = exp(m - m_new)</text>
  <text x="50" y="266" font-family="monospace" font-size="10" fill="#555">p = exp(s_k - m_new)       l_new = l·α + p</text>
  <text x="50" y="282" font-family="monospace" font-size="10" fill="#555">α_shm = l·α/l_new          β_shm = p/l_new</text>

  <!-- Step 3: accumulate output -->
  <rect x="30" y="302" width="580" height="44" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="4"/>
  <text x="50" y="322" font-size="10" fill="#4a7a3a" font-weight="bold">③ 累加输出 O = O·α + β·V[k]</text>
  <text x="50" y="338" font-size="9" fill="#555">每 thread 持有 O 的一个维度，独立更新（无冲突）</text>

  <!-- loop back arrow -->
  <path d="M 580 324 Q 610 324 610 160 L 610 160" stroke="#666" stroke-width="1" stroke-dasharray="3,2" fill="none" marker-end="url(#a2)"/>
  <text x="615" y="240" font-size="9" fill="#888">k++</text>

  <!-- ===== After loop: write output ===== -->
  <line x1="20" y1="360" x2="620" y2="360" stroke="#eee" stroke-width="1"/>
  <rect x="30" y="370" width="580" height="36" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="320" y="392" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">循环结束 → O[i] 已归一化（α/β 内含 l 缩放）→ 写回 output[i]</text>

  <!-- ===== Key insight ===== -->
  <rect x="30" y="420" width="580" height="85" fill="#f6f6f6" stroke="#ccc" rx="6"/>
  <text x="50" y="442" font-size="11" fill="#444" font-weight="bold">核心：S、P 不物化到 HBM</text>
  <text x="50" y="460" font-size="10" fill="#555">朴素版：S=QKᵀ(N×N) → HBM → softmax → P(N×N) → HBM → P·V → O</text>
  <text x="50" y="476" font-size="10" fill="#555">Fused版：s_k 是标量，算完立即用，m/l/O 只活在寄存器里</text>
  <text x="50" y="494" font-size="10" fill="#4a7a3a" font-weight="bold">显存 O(N²) → O(d)，IO 的 O(N²) 中间部分归零</text>
</svg>
