<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Nearest Neighbor：O(N²) pairwise distance + argmin 归约</text>
  <path d="M 260 42 Q 460 50 660 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- points cloud -->
  <text x="40" y="78" font-size="12" font-weight="bold" fill="#2b6e9e">N 个 3D 点（points[N*3]）</text>
  <g filter="url(#sk)">
    <rect x="40" y="88" width="40" height="26" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="80" y="88" width="40" height="26" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="120" y="88" width="40" height="26" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="160" y="88" width="40" height="26" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="200" y="88" width="40" height="26" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
  </g>
  <text x="60" y="106" text-anchor="middle" font-size="9" fill="#2b6e9e">p0</text>
  <text x="100" y="106" text-anchor="middle" font-size="9" fill="#2b6e9e">p1</text>
  <text x="140" y="106" text-anchor="middle" font-size="9" fill="#2b6e9e">p2</text>
  <text x="180" y="106" text-anchor="middle" font-size="9" fill="#2b6e9e">...</text>
  <text x="220" y="106" text-anchor="middle" font-size="9" fill="#2b6e9e">pN</text>
  <text x="40" y="124" font-size="9" fill="#888">每点 3 坐标 (x,y,z)</text>

  <!-- pairwise distance matrix -->
  <text x="290" y="78" font-size="12" font-weight="bold" fill="#7a5415">N×N 距离矩阵（每点对算一次）</text>
  <g filter="url(#sk)">
    <rect x="290" y="88" width="34" height="26" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="324" y="88" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="358" y="88" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="392" y="88" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>

    <rect x="290" y="114" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="324" y="114" width="34" height="26" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="358" y="114" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="392" y="114" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>

    <rect x="290" y="140" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="324" y="140" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
    <rect x="358" y="140" width="34" height="26" rx="3" fill="#fce4ec" stroke="#b85450" stroke-width="1.1"/>
    <rect x="392" y="140" width="34" height="26" rx="3" fill="#fff8e1" stroke="#d6a040" stroke-width="1.1"/>
  </g>
  <text x="307" y="106" text-anchor="middle" font-size="9" fill="#b85450">∞</text>
  <text x="341" y="106" text-anchor="middle" font-size="8" fill="#7a5415">d₀₁</text>
  <text x="375" y="106" text-anchor="middle" font-size="8" fill="#7a5415">d₀₂</text>
  <text x="409" y="106" text-anchor="middle" font-size="8" fill="#7a5415">...</text>
  <text x="307" y="132" text-anchor="middle" font-size="8" fill="#7a5415">d₁₀</text>
  <text x="341" y="132" text-anchor="middle" font-size="9" fill="#b85450">∞</text>
  <text x="307" y="158" text-anchor="middle" font-size="8" fill="#7a5415">d₂₀</text>
  <text x="375" y="158" text-anchor="middle" font-size="9" fill="#b85450">∞</text>
  <text x="270" y="106" font-size="9" fill="#2b6e9e" text-anchor="end">i=0</text>
  <text x="270" y="132" font-size="9" fill="#2b6e9e" text-anchor="end">i=1</text>
  <text x="270" y="158" font-size="9" fill="#2b6e9e" text-anchor="end">i=2</text>
  <text x="290" y="180" font-size="9" fill="#888">对角线=自距离→∞（排除 j=i）</text>

  <!-- arrow -->
  <path d="M 430 132 L 500 132" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="465" y="126" text-anchor="middle" font-size="10" fill="#2e6e2e">每行 argmin</text>

  <!-- output -->
  <text x="520" y="78" font-size="12" font-weight="bold" fill="#2e6e2e">输出 indices[N]（每点最近邻索引）</text>
  <g filter="url(#sk)">
    <rect x="520" y="100" width="40" height="26" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="560" y="100" width="40" height="26" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="600" y="100" width="40" height="26" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
    <rect x="640" y="100" width="40" height="26" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="540" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">j₀</text>
  <text x="580" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">j₁</text>
  <text x="620" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e6e2e">j₂</text>
  <text x="660" y="118" text-anchor="middle" font-size="11" fill="#888">...</text>
  <text x="520" y="142" font-size="9" fill="#888">indices[i] = argmin_j dist²(pᵢ,pⱼ), j≠i</text>

  <!-- formula -->
  <g filter="url(#sk)">
    <rect x="40" y="200" width="840" height="50" rx="8" fill="#f0f7ff" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="460" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">dist²(i,j) = (xᵢ-xⱼ)² + (yᵢ-yⱼ)² + (zᵢ-zⱼ)²　→　indices[i] = argmin_{j≠i} dist²(i,j)</text>
  <text x="460" y="240" text-anchor="middle" font-size="10" fill="#888">O(N²) 对距离计算，每对 ~8 FLOP；N=10000 → 10⁸ 对 → ~8×10⁸ FLOP（compute-bound）</text>

  <!-- naive vs tiled -->
  <text x="40" y="280" font-size="13" font-weight="bold" fill="#2b2b2b">两种实现对比</text>

  <g filter="url(#sk)">
    <rect x="40" y="292" width="410" height="128" rx="8" fill="#fff5f5" stroke="#b85450" stroke-width="1.2"/>
  </g>
  <text x="245" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85450">朴素：每线程算一个 i，遍历全部 N 个 j</text>
  <text x="55" y="338" font-size="11" fill="#444">• 每 thread 读 N 个点（从 global）</text>
  <text x="55" y="358" font-size="11" fill="#444">• N 个 thread 共 N² 次点读取 = N²×3 float</text>
  <text x="55" y="378" font-size="11" fill="#b85450">• reference 点被重复读 N 次（无复用）</text>
  <text x="55" y="400" font-size="11" fill="#b85450">• 看似 compute-bound，实则带宽浪费</text>
  <text x="55" y="416" font-size="10" fill="#888">N=10000 → 12亿次 float 读取，远超算力需求</text>

  <g filter="url(#sk)">
    <rect x="470" y="292" width="410" height="128" rx="8" fill="#f5fbf5" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="675" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e6e2e">优化：tiled —— reference 点分块载入 shared</text>
  <text x="485" y="338" font-size="11" fill="#444">• block 协作加载 256 个 reference 点到 shared</text>
  <text x="485" y="358" font-size="11" fill="#444">• 256 个 thread 共享同一 tile，各算自己的 i</text>
  <text x="485" y="378" font-size="11" fill="#2e6e2e">• reference 点每 block 只读 1 次，复用 256 次</text>
  <text x="485" y="400" font-size="11" fill="#2e6e2e">• 全局读流量降低 ~256 倍</text>
  <text x="485" y="416" font-size="10" fill="#888">算术强度↑128x，真正吃满 compute</text>
</svg>
