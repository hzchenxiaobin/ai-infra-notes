<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Comic Sans MS','Marker Felt','Kaiti SC',楷体,'Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>

  <rect width="760" height="420" fill="#fdfcf7"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" fill="#2b2b2b" font-weight="bold">BatchNorm 融合 Kernel 数据流</text>
  <path d="M 250 42 Q 380 50 510 42" stroke="#2b2b2b" stroke-width="1.4" fill="none" filter="url(#sk)"/>
  <text x="380" y="56" text-anchor="middle" font-size="11" fill="#888">一个 block 处理一个通道 c，三阶段融合在单 kernel 内</text>

  <!-- 输入 x -->
  <g filter="url(#sk)">
    <rect x="30" y="80" width="120" height="60" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="90" y="106" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">x[N,C,H,W]</text>
  <text x="90" y="124" text-anchor="middle" font-size="10" fill="#666">Global Memory</text>

  <!-- gamma/beta -->
  <g filter="url(#sk)">
    <rect x="30" y="160" width="120" height="44" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="90" y="180" text-anchor="middle" font-size="12" fill="#2b2b2b" font-weight="bold">gamma[C], beta[C]</text>
  <text x="90" y="196" text-anchor="middle" font-size="10" fill="#666">每通道常数</text>

  <!-- 阶段① mean -->
  <g filter="url(#sk)">
    <rect x="210" y="80" width="150" height="56" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="285" y="104" text-anchor="middle" font-size="12" fill="#4a8e4a" font-weight="bold">① 求 mean</text>
  <text x="285" y="122" text-anchor="middle" font-size="10" fill="#666">blockReduce(warp shuffle)</text>

  <!-- 阶段② var -->
  <g filter="url(#sk)">
    <rect x="210" y="150" width="150" height="56" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/>
  </g>
  <text x="285" y="174" text-anchor="middle" font-size="12" fill="#8e5db8" font-weight="bold">② 求 var</text>
  <text x="285" y="192" text-anchor="middle" font-size="10" fill="#666">E[(x-μ)²]，依赖 mean</text>

  <!-- 阶段③ normalize -->
  <g filter="url(#sk)">
    <rect x="210" y="220" width="150" height="56" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="285" y="244" text-anchor="middle" font-size="12" fill="#c98a2b" font-weight="bold">③ normalize</text>
  <text x="285" y="262" text-anchor="middle" font-size="10" fill="#666">y=γ(x-μ)/σ+β</text>

  <!-- 箭头 x → 阶段 -->
  <path d="M 150 100 L 208 100" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 150 178 L 208 178" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <path d="M 150 248 L 208 248" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- mean → var 依赖 -->
  <path d="M 285 136 L 285 148" stroke="#4a8e4a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="4,2"/>
  <text x="300" y="146" font-size="10" fill="#4a8e4a">μ</text>

  <!-- var → normalize 依赖 -->
  <path d="M 285 206 L 285 218" stroke="#8e5db8" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="4,2"/>
  <text x="300" y="216" font-size="10" fill="#8e5db8">σ⁻¹</text>

  <!-- gamma/beta → normalize -->
  <path d="M 150 182 Q 180 210 208 248" stroke="#c98a2b" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)" stroke-dasharray="4,2"/>
  <text x="178" y="222" font-size="10" fill="#c98a2b">γ,β</text>

  <!-- 输出 y -->
  <g filter="url(#sk)">
    <rect x="430" y="200" width="120" height="60" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="490" y="226" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">y[N,C,H,W]</text>
  <text x="490" y="244" text-anchor="middle" font-size="10" fill="#666">Global 写回</text>
  <path d="M 360 248 L 428 230" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- 右侧：IO 遍数对比 -->
  <text x="640" y="100" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">IO 遍数对比</text>
  <g filter="url(#sk)">
    <rect x="580" y="112" width="150" height="34" rx="6" fill="#fdecec" stroke="#b03a3a" stroke-width="1.2"/>
  </g>
  <text x="655" y="134" text-anchor="middle" font-size="11" fill="#b03a3a" font-weight="bold">朴素三遍：3× 读</text>
  <g filter="url(#sk)">
    <rect x="580" y="152" width="150" height="34" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="655" y="174" text-anchor="middle" font-size="11" fill="#4a8e4a" font-weight="bold">融合单遍：1× 读</text>

  <g filter="url(#sk)">
    <rect x="580" y="200" width="150" height="70" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.3" stroke-dasharray="4,3"/>
  </g>
  <text x="655" y="222" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">瓶颈：memory-bound</text>
  <text x="655" y="240" text-anchor="middle" font-size="10" fill="#666">AI ≈ 0.5 FLOP/Byte</text>
  <text x="655" y="256" text-anchor="middle" font-size="10" fill="#666">远低于 Ridge 12.6</text>

  <!-- 底部 -->
  <text x="380" y="350" text-anchor="middle" font-size="12" fill="#888">reduce 维度对比：</text>
  <g filter="url(#sk)">
    <rect x="80" y="362" width="280" height="36" rx="6" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="220" y="385" text-anchor="middle" font-size="11" fill="#4a8edb" font-weight="bold">BatchNorm：reduce 跨 (N,H,W)，按通道</text>
  <g filter="url(#sk)">
    <rect x="400" y="362" width="280" height="36" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="540" y="385" text-anchor="middle" font-size="11" fill="#c98a2b" font-weight="bold">LayerNorm：reduce 跨 (C,H,W)，按样本</text>
</svg>
