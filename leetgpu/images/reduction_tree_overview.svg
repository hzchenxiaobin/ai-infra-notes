<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="460" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">树形归约（Tree Reduction）：对半折叠</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">每步活跃线程减半，log₂N 步完成 —— 并行归约的经典骨架</text>

  <!-- ===== Step 0: 8 elements ===== -->
  <text x="30" y="74" font-size="12" fill="#446688" font-weight="bold">step 0：8 个元素（全部活跃）</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="68"  y="103" text-anchor="middle">1</text>
    <rect x="100" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="128" y="103" text-anchor="middle">2</text>
    <rect x="160" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="188" y="103" text-anchor="middle">3</text>
    <rect x="220" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="248" y="103" text-anchor="middle">4</text>
    <rect x="280" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="308" y="103" text-anchor="middle">5</text>
    <rect x="340" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="368" y="103" text-anchor="middle">6</text>
    <rect x="400" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="428" y="103" text-anchor="middle">7</text>
    <rect x="460" y="84" width="56" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="488" y="103" text-anchor="middle">8</text>
  </g>

  <!-- arrows: pairs -->
  <g stroke="#888" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 68 114 L 68 124 L 128 124 L 128 114" marker-end="url(#arr)"/>
    <path d="M 188 114 L 188 124 L 248 124 L 248 114" marker-end="url(#arr)"/>
    <path d="M 308 114 L 308 124 L 368 124 L 368 114" marker-end="url(#arr)"/>
    <path d="M 428 114 L 428 124 L 488 124 L 488 114" marker-end="url(#arr)"/>
  </g>
  <text x="540" y="103" font-size="10" fill="#888">线程 0,2,4,6 各加邻居</text>

  <!-- ===== Step 1: 4 elements ===== -->
  <text x="30" y="150" font-size="12" fill="#4a7a3a" font-weight="bold">step 1：4 个元素（半数活跃）</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="160" width="56" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="68"  y="179" text-anchor="middle">3</text>
    <text x="110" y="179" font-size="9" fill="#888">(1+2)</text>

    <rect x="160" y="160" width="56" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="188" y="179" text-anchor="middle">7</text>
    <text x="230" y="179" font-size="9" fill="#888">(3+4)</text>

    <rect x="280" y="160" width="56" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="308" y="179" text-anchor="middle">11</text>
    <text x="350" y="179" font-size="9" fill="#888">(5+6)</text>

    <rect x="400" y="160" width="56" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="428" y="179" text-anchor="middle">15</text>
    <text x="470" y="179" font-size="9" fill="#888">(7+8)</text>
  </g>
  <!-- grayed out inactive -->
  <g font-size="10" fill="#ccc">
    <rect x="100" y="160" width="56" height="28" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="128" y="179" text-anchor="middle" fill="#ccc">-</text>
    <rect x="220" y="160" width="56" height="28" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="248" y="179" text-anchor="middle" fill="#ccc">-</text>
    <rect x="340" y="160" width="56" height="28" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="368" y="179" text-anchor="middle" fill="#ccc">-</text>
    <rect x="460" y="160" width="56" height="28" fill="#f6f6f6" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="488" y="179" text-anchor="middle" fill="#ccc">-</text>
  </g>
  <g stroke="#888" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 68 190 L 68 200 L 188 200 L 188 190" marker-end="url(#arr)"/>
    <path d="M 308 190 L 308 200 L 428 200 L 428 190" marker-end="url(#arr)"/>
  </g>
  <text x="540" y="179" font-size="10" fill="#888">线程 0,2 各加邻居</text>

  <!-- ===== Step 2: 2 elements ===== -->
  <text x="30" y="226" font-size="12" fill="#d6a040" font-weight="bold">step 2：2 个元素</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="236" width="56" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="68"  y="255" text-anchor="middle">10</text>
    <text x="110" y="255" font-size="9" fill="#888">(3+7)</text>

    <rect x="280" y="236" width="56" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="308" y="255" text-anchor="middle">26</text>
    <text x="350" y="255" font-size="9" fill="#888">(11+15)</text>
  </g>
  <g stroke="#888" stroke-width="1" fill="none" filter="url(#rough2)">
    <path d="M 68 266 L 68 276 L 308 276 L 308 266" marker-end="url(#arr)"/>
  </g>
  <text x="540" y="255" font-size="10" fill="#888">线程 0 加邻居</text>

  <!-- ===== Step 3: 1 element ===== -->
  <text x="30" y="302" font-size="12" fill="#b85450" font-weight="bold">step 3：1 个元素 → 最终结果</text>
  <rect x="40" y="312" width="56" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="68" y="331" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">36</text>
  <text x="110" y="331" font-size="10" fill="#888">(10+26) = 1+2+...+8 ✓</text>

  <!-- ===== Key properties ===== -->
  <line x1="20" y1="358" x2="620" y2="358" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="382" font-size="12" fill="#446688" font-weight="bold">特性：</text>

  <rect x="30" y="394" width="180" height="50" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="412" font-size="11" fill="#333" font-weight="bold">步数 = log₂N</text>
  <text x="44" y="430" font-size="10" fill="#666">8 元素 → 3 步</text>
  <text x="44" y="442" font-size="10" fill="#666">4M 元素 → 22 步</text>

  <rect x="230" y="394" width="180" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="244" y="412" font-size="11" fill="#333" font-weight="bold">问题：线程利用率低</text>
  <text x="244" y="430" font-size="10" fill="#666">step 0: 8/8 活跃</text>
  <text x="244" y="442" font-size="10" fill="#666">step 1: 4/8, step 2: 2/8...</text>

  <rect x="430" y="394" width="180" height="50" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="444" y="412" font-size="11" fill="#333" font-weight="bold">改进方向</text>
  <text x="444" y="430" font-size="10" fill="#666">warp shuffle 替代 shared</text>
  <text x="444" y="442" font-size="10" fill="#666">block 两级归约</text>
</svg>
