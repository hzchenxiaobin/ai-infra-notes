<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 500" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="500" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Shared Memory 私有化：每 block 一份局部直方图</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">block 内对 s_hist 做 atomic（冲突域=block），最后合并到 global hist</text>

  <!-- ===== Input ===== -->
  <text x="30" y="76" font-size="12" fill="#446688" font-weight="bold">input[N]</text>
  <g font-size="9" fill="#333">
    <rect x="30" y="84" width="20" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <rect x="52" y="84" width="20" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <rect x="74" y="84" width="20" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="104" y="96" font-size="9" fill="#888">...</text>
    <rect x="120" y="84" width="20" height="16" fill="#e8f0fe" stroke="#446688" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
    <text x="150" y="96" font-size="9" fill="#888">(10M)</text>
  </g>

  <!-- ===== Blocks (each has private s_hist) ===== -->
  <path d="M 80 104 L 80 130" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <text x="30" y="124" font-size="12" fill="#4a7a3a" font-weight="bold">grid：多个 block，各有私有 s_hist</text>

  <!-- block 0 -->
  <g font-size="9">
    <rect x="30" y="134" width="170" height="120" fill="none" stroke="#4a7a3a" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="115" y="150" text-anchor="middle" font-size="10" fill="#4a7a3a" font-weight="bold">block 0</text>

    <!-- threads -->
    <rect x="40" y="158" width="20" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="62" y="158" width="20" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="84" y="158" width="20" height="14" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="115" y="168" font-size="8" fill="#888">256 threads</text>

    <!-- s_hist -->
    <rect x="40" y="180" width="150" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="115" y="196" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">s_hist[256]（私有）</text>
    <text x="115" y="212" text-anchor="middle" font-size="8" fill="#555">atomic 冲突域 = 256 threads</text>

    <text x="115" y="240" text-anchor="middle" font-size="8" fill="#4a7a3a">block 内 atomic</text>
  </g>

  <!-- block 1 -->
  <g font-size="9">
    <rect x="220" y="134" width="170" height="120" fill="none" stroke="#d6a040" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="305" y="150" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">block 1</text>
    <rect x="230" y="158" width="20" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="252" y="158" width="20" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="274" y="158" width="20" height="14" fill="#fff8e1" stroke="#d6a040" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="305" y="168" font-size="8" fill="#888">256 threads</text>
    <rect x="230" y="180" width="150" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="305" y="196" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">s_hist[256]（私有）</text>
    <text x="305" y="212" text-anchor="middle" font-size="8" fill="#555">冲突域 = 256 threads</text>
    <text x="305" y="240" text-anchor="middle" font-size="8" fill="#d6a040">block 内 atomic</text>
  </g>

  <!-- block ... -->
  <g font-size="9">
    <rect x="410" y="134" width="170" height="120" fill="none" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
    <text x="495" y="150" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">block k</text>
    <rect x="420" y="158" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="442" y="158" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <rect x="464" y="158" width="20" height="14" fill="#fce4ec" stroke="#b85450" stroke-width="0.5" rx="1" filter="url(#rough2)"/>
    <text x="495" y="168" font-size="8" fill="#888">256 threads</text>
    <rect x="420" y="180" width="150" height="40" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="495" y="196" text-anchor="middle" font-size="9" fill="#d6a040" font-weight="bold">s_hist[256]（私有）</text>
    <text x="495" y="212" text-anchor="middle" font-size="8" fill="#555">冲突域 = 256 threads</text>
    <text x="495" y="240" text-anchor="middle" font-size="8" fill="#b85450">block 内 atomic</text>
  </g>

  <!-- ===== Merge phase ===== -->
  <path d="M 115 256 L 115 280" stroke="#446688" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 305 256 L 305 280" stroke="#446688" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 495 256 L 495 280" stroke="#446688" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <text x="30" y="276" font-size="12" fill="#446688" font-weight="bold">③ 合并阶段：每 block 把 s_hist 加到 global hist</text>

  <!-- global hist -->
  <rect x="180" y="288" width="280" height="44" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="6" filter="url(#rough2)"/>
  <text x="320" y="308" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">global hist[256]</text>
  <text x="320" y="324" text-anchor="middle" font-size="9" fill="#555">每桶 gridDim 次 atomicAdd（冲突极低）</text>

  <!-- ===== Conflict reduction summary ===== -->
  <line x1="20" y1="356" x2="620" y2="356" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="380" font-size="12" fill="#444" font-weight="bold">冲突减少倍数：</text>

  <rect x="30" y="390" width="180" height="64" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="410" font-size="10" fill="#b85450" font-weight="bold">全局版</text>
  <text x="44" y="426" font-size="9" fill="#555">N=10M 线程争 256 桶</text>
  <text x="44" y="442" font-size="9" fill="#555">每桶 ~39000 次冲突</text>

  <text x="230" y="424" font-size="14" fill="#4a7a3a" font-weight="bold">→</text>
  <text x="230" y="442" font-size="8" fill="#888">私有化</text>

  <rect x="270" y="390" width="180" height="64" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="284" y="410" font-size="10" fill="#4a7a3a" font-weight="bold">私有化版</text>
  <text x="284" y="426" font-size="9" fill="#555">256 线程争 256 桶</text>
  <text x="284" y="442" font-size="9" fill="#555">每桶 ~1 次冲突</text>

  <rect x="470" y="390" width="140" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="540" y="410" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">冲突降</text>
  <text x="540" y="430" text-anchor="middle" font-size="14" fill="#d6a040" font-weight="bold">1000×</text>
  <text x="540" y="446" text-anchor="middle" font-size="8" fill="#555">(gridDim=1000)</text>

  <!-- code -->
  <rect x="30" y="466" width="580" height="26" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="484" font-family="monospace" font-size="10" fill="#333">atomicAdd(&amp;s_hist[input[i]], 1);  // shared atomic，冲突域 = block 内</text>
</svg>
