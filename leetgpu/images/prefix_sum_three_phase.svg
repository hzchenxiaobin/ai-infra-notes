<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="520" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">三阶段分块 Scan（Blelloch 算法）</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">局部 scan → 求块间前缀 → 加回偏移，把串行链拆成可并行的三层</text>

  <!-- ===== Input ===== -->
  <text x="30" y="72" font-size="11" fill="#666" font-weight="bold">input[] (N=12 示例)</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="60"  y="96" text-anchor="middle">3</text>
    <rect x="80"  y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="100" y="96" text-anchor="middle">1</text>
    <rect x="120" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="140" y="96" text-anchor="middle">7</text>
    <rect x="160" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="180" y="96" text-anchor="middle">0</text>
    <rect x="200" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="220" y="96" text-anchor="middle">4</text>
    <rect x="240" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="260" y="96" text-anchor="middle">1</text>
    <rect x="280" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="300" y="96" text-anchor="middle">6</text>
    <rect x="320" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="340" y="96" text-anchor="middle">3</text>
    <rect x="360" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="380" y="96" text-anchor="middle">9</text>
    <rect x="400" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="420" y="96" text-anchor="middle">8</text>
    <rect x="440" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="460" y="96" text-anchor="middle">2</text>
    <rect x="480" y="80" width="40" height="24" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="500" y="96" text-anchor="middle">5</text>
  </g>
  <!-- block dividers -->
  <g stroke="#888" stroke-width="1.5" fill="none" filter="url(#rough2)">
    <line x1="160" y1="76" x2="160" y2="108"/>
    <line x1="320" y1="76" x2="320" y2="108"/>
    <line x1="480" y1="76" x2="480" y2="108"/>
  </g>
  <text x="100" y="120" text-anchor="middle" font-size="9" fill="#888">block 0 (4 元素)</text>
  <text x="240" y="120" text-anchor="middle" font-size="9" fill="#888">block 1</text>
  <text x="400" y="120" text-anchor="middle" font-size="9" fill="#888">block 2</text>
  <text x="520" y="120" text-anchor="middle" font-size="9" fill="#888">block 3</text>

  <!-- ===== Phase 1 ===== -->
  <path d="M 320 124 L 320 140" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="146" font-size="12" fill="#4a7a3a" font-weight="bold">① Phase 1：每 block 内部 warp scan（局部前缀和）</text>

  <g font-size="10" fill="#333">
    <!-- block 0: 3,1,7,0 → prefix 3,4,11,11 -->
    <rect x="40"  y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="60"  y="172" text-anchor="middle">3</text>
    <rect x="80"  y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="100" y="172" text-anchor="middle">4</text>
    <rect x="120" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="140" y="172" text-anchor="middle">11</text>
    <rect x="160" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="180" y="172" text-anchor="middle">11</text>
    <!-- block 1: 4,1,6,3 → 4,5,11,14 -->
    <rect x="200" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="220" y="172" text-anchor="middle">4</text>
    <rect x="240" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="260" y="172" text-anchor="middle">5</text>
    <rect x="280" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="300" y="172" text-anchor="middle">11</text>
    <rect x="320" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="340" y="172" text-anchor="middle">14</text>
    <!-- block 2: 9,8,2,5 → 9,17,19,24 -->
    <rect x="360" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="380" y="172" text-anchor="middle">9</text>
    <rect x="400" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="420" y="172" text-anchor="middle">17</text>
    <rect x="440" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="172" text-anchor="middle">19</text>
    <rect x="480" y="156" width="40" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="500" y="172" text-anchor="middle">24</text>
  </g>
  <text x="540" y="172" font-size="10" fill="#4a7a3a">← 局部前缀</text>

  <!-- block sums to aux -->
  <path d="M 180 182 L 180 196 L 40 196 L 40 210" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 340 182 L 340 196 L 100 196 L 100 210" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 500 182 L 500 196 L 160 196 L 160 210" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Phase 2 ===== -->
  <text x="30" y="222" font-size="12" fill="#d6a040" font-weight="bold">② Phase 2：对 block 总和 aux[] 做前缀 scan</text>
  <text x="30" y="238" font-size="10" fill="#666">aux[0..3] = [11, 14, 24, 0(空)] → scan → [11, 25, 49, 49]</text>

  <g font-size="10" fill="#333">
    <rect x="20"  y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="40"  y="264" text-anchor="middle">11</text>
    <rect x="80"  y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="100" y="264" text-anchor="middle">14</text>
    <rect x="140" y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="160" y="264" text-anchor="middle">24</text>

    <text x="200" y="264" font-size="14" fill="#888">→</text>

    <rect x="220" y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="240" y="264" text-anchor="middle" font-weight="bold">11</text>
    <rect x="280" y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="300" y="264" text-anchor="middle" font-weight="bold">25</text>
    <rect x="340" y="248" width="40" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="360" y="264" text-anchor="middle" font-weight="bold">49</text>
  </g>
  <text x="400" y="264" font-size="10" fill="#d6a040" font-weight="bold">= 每 block 的起始偏移</text>

  <!-- offset arrows back to blocks -->
  <path d="M 240 272 L 240 288 L 100 288 L 100 304" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 300 272 L 300 288 L 260 288 L 260 304" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 360 272 L 360 288 L 420 288 L 420 304" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- ===== Phase 3 ===== -->
  <text x="30" y="316" font-size="12" fill="#b85450" font-weight="bold">③ Phase 3：把偏移加回各 block 的输出（block 0 不加）</text>

  <g font-size="10" fill="#333">
    <!-- block 0: no offset → 3,4,11,11 -->
    <rect x="40"  y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="60"  y="342" text-anchor="middle">3</text>
    <rect x="80"  y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="100" y="342" text-anchor="middle">4</text>
    <rect x="120" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="140" y="342" text-anchor="middle">11</text>
    <rect x="160" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="180" y="342" text-anchor="middle">11</text>
    <!-- block 1: +11 → 15,16,22,25 -->
    <rect x="200" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="220" y="342" text-anchor="middle">15</text>
    <rect x="240" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="260" y="342" text-anchor="middle">16</text>
    <rect x="280" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="300" y="342" text-anchor="middle">22</text>
    <rect x="320" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="340" y="342" text-anchor="middle">25</text>
    <!-- block 2: +25 → 34,42,44,49 -->
    <rect x="360" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="380" y="342" text-anchor="middle">34</text>
    <rect x="400" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="420" y="342" text-anchor="middle">42</text>
    <rect x="440" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="460" y="342" text-anchor="middle">44</text>
    <rect x="480" y="326" width="40" height="24" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="500" y="342" text-anchor="middle">49</text>
  </g>
  <text x="540" y="342" font-size="10" fill="#b85450" font-weight="bold">✓ 最终结果</text>

  <!-- ===== Summary ===== -->
  <line x1="20" y1="372" x2="620" y2="372" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="396" font-size="12" fill="#446688" font-weight="bold">三阶段各自可并行：</text>

  <rect x="30" y="410" width="180" height="64" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="430" font-size="11" fill="#333" font-weight="bold">Phase 1（多 block 并行）</text>
  <text x="44" y="446" font-size="10" fill="#666">每 block 内 warp scan</text>
  <text x="44" y="460" font-size="10" fill="#666">输出局部前缀 + block 总和</text>

  <rect x="230" y="410" width="180" height="64" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="244" y="430" font-size="11" fill="#333" font-weight="bold">Phase 2（单 block）</text>
  <text x="244" y="446" font-size="10" fill="#666">对 aux[] 做前缀 scan</text>
  <text x="244" y="460" font-size="10" fill="#666">block 数少，单 block 搞定</text>

  <rect x="430" y="410" width="180" height="64" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="444" y="430" font-size="11" fill="#333" font-weight="bold">Phase 3（多 block 并行）</text>
  <text x="444" y="446" font-size="10" fill="#666">每 block 加上各自偏移</text>
  <text x="444" y="460" font-size="10" fill="#666">无依赖，完全并行</text>

  <rect x="30" y="488" width="580" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="6" filter="url(#rough2)"/>
  <text x="320" y="504" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">串行链 O(N) → 并行深度 O(log BLOCK_SIZE)，三次 kernel 启动</text>
</svg>
