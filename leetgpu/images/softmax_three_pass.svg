<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="520" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">三遍扫描 Softmax：max → sum → normalize</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">一个 block 负责一行，三次 global 读 + 两次块归约，memory-bound</text>

  <!-- ===== Input row ===== -->
  <text x="30" y="76" font-size="12" fill="#446688" font-weight="bold">input[b][:]  (N 个元素，行主序)</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="102" text-anchor="middle">1.0</text>
    <rect x="84"  y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="102" text-anchor="middle">2.0</text>
    <rect x="128" y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="102" text-anchor="middle">3.0</text>
    <rect x="172" y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="102" text-anchor="middle">4.0</text>
    <rect x="216" y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="238" y="102" text-anchor="middle">2.5</text>
    <text x="280" y="102" font-size="11" fill="#888">...</text>
    <rect x="300" y="84" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="322" y="102" text-anchor="middle">1.5</text>
  </g>
  <text x="400" y="100" font-size="10" fill="#888">global memory（读 3 遍）</text>

  <!-- ===== Pass 1: max ===== -->
  <path d="M 180 116 L 180 140" stroke="#b85450" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="138" font-size="12" fill="#b85450" font-weight="bold">① Pass 1：求 row_max（数值稳定）</text>

  <!-- threads scanning -->
  <g font-size="9" fill="#b85450">
    <rect x="40" y="148" width="30" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="55" y="162" text-anchor="middle">t0</text>
    <rect x="76" y="148" width="30" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="91" y="162" text-anchor="middle">t1</text>
    <rect x="112" y="148" width="30" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="127" y="162" text-anchor="middle">t2</text>
    <rect x="148" y="148" width="30" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="163" y="162" text-anchor="middle">t3</text>
    <text x="200" y="162" font-size="10" fill="#888">grid-stride 扫描 → 各自局部 max</text>
  </g>

  <!-- block reduce -->
  <rect x="360" y="144" width="180" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="450" y="162" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">block_reduce_max（warp shuffle）</text>
  <path d="M 200 158 L 356 158" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- result -->
  <rect x="560" y="144" width="50" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="585" y="162" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">4.0</text>
  <text x="585" y="134" text-anchor="middle" font-size="9" fill="#b85450">row_max</text>

  <!-- ===== Pass 2: sum ===== -->
  <path d="M 180 180 L 180 204" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="202" font-size="12" fill="#4a7a3a" font-weight="bold">② Pass 2：求 row_sum = Σ exp(x - max)</text>

  <!-- re-read input with exp -->
  <g font-size="9" fill="#4a7a3a">
    <rect x="40" y="212" width="44" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="62" y="226" text-anchor="middle">e⁻³</text>
    <rect x="84" y="212" width="44" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="106" y="226" text-anchor="middle">e⁻²</text>
    <rect x="128" y="212" width="44" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="150" y="226" text-anchor="middle">e⁻¹</text>
    <rect x="172" y="212" width="44" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="0.8" rx="3" filter="url(#rough2)"/>
    <text x="194" y="226" text-anchor="middle">e⁰</text>
    <text x="230" y="226" font-size="10" fill="#888">再读一遍 input，算 exp 后累加</text>
  </g>

  <!-- block reduce sum -->
  <rect x="360" y="208" width="180" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="450" y="226" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">block_reduce_sum（warp shuffle）</text>
  <path d="M 280 222 L 356 222" stroke="#d6a040" stroke-width="1.2" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <rect x="560" y="208" width="50" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="585" y="226" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">1.553</text>
  <text x="585" y="198" text-anchor="middle" font-size="9" fill="#4a7a3a">row_sum</text>

  <!-- ===== Pass 3: normalize ===== -->
  <path d="M 180 248 L 180 272" stroke="#446688" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="30" y="270" font-size="12" fill="#446688" font-weight="bold">③ Pass 3：归一化 output[i] = exp(x[i]-max) / sum</text>

  <!-- output -->
  <g font-size="10" fill="#333">
    <rect x="40"  y="280" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="298" text-anchor="middle">.032</text>
    <rect x="84"  y="280" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="298" text-anchor="middle">.087</text>
    <rect x="128" y="280" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="298" text-anchor="middle">.237</text>
    <rect x="172" y="280" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="298" text-anchor="middle">.644</text>
    <rect x="216" y="280" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="238" y="298" text-anchor="middle">.16</text>
    <text x="280" y="298" font-size="11" fill="#888">...</text>
  </g>
  <text x="360" y="298" font-size="10" fill="#446688">← 第三遍读 input，写 output（Σ = 1.0）</text>

  <!-- ===== Summary: memory reads ===== -->
  <line x1="20" y1="330" x2="620" y2="330" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="354" font-size="12" fill="#444" font-weight="bold">global memory 访存统计：</text>

  <rect x="30" y="366" width="180" height="70" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="44" y="386" font-size="11" fill="#b85450" font-weight="bold">Pass 1：读 input ×1</text>
  <text x="44" y="404" font-size="10" fill="#555">求 max，block 归约</text>
  <text x="44" y="420" font-size="10" fill="#555">N × 4B 读取</text>

  <rect x="230" y="366" width="180" height="70" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="244" y="386" font-size="11" fill="#4a7a3a" font-weight="bold">Pass 2：读 input ×1</text>
  <text x="244" y="404" font-size="10" fill="#555">求 sum，block 归约</text>
  <text x="244" y="420" font-size="10" fill="#555">N × 4B 读取（重复！）</text>

  <rect x="430" y="366" width="180" height="70" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="444" y="386" font-size="11" fill="#446688" font-weight="bold">Pass 3：读 input ×1 + 写 ×1</text>
  <text x="444" y="404" font-size="10" fill="#555">归一化写 output</text>
  <text x="444" y="420" font-size="10" fill="#555">N×4B 读 + N×4B 写</text>

  <!-- total -->
  <rect x="30" y="450" width="580" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="320" y="472" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">总计：3 次读 + 1 次写 = 4N × 4B = 16N 字节</text>
  <text x="320" y="490" text-anchor="middle" font-size="10" fill="#888">算术强度 ≈ 0.3 FLOP/B → memory-bound，3 遍读有冗余（优化方向：online softmax 融合 + shared 缓存）</text>
</svg>
