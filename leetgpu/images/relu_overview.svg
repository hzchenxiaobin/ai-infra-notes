<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="580" height="380" fill="#fafafa"/>

  <text x="290" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">ReLU(x) = max(0, x)：负数截零，正数保留</text>

  <!-- ===== Left: function curve ===== -->
  <text x="40" y="58" font-size="12" fill="#446688" font-weight="bold">函数曲线</text>

  <!-- axes -->
  <line x1="60" y1="180" x2="240" y2="180" stroke="#888" stroke-width="1.2" filter="url(#rough2)" marker-end="url(#arr)"/>
  <line x1="150" y1="240" x2="150" y2="80" stroke="#888" stroke-width="1.2" filter="url(#rough2)" marker-end="url(#arr)"/>
  <text x="244" y="184" font-size="10" fill="#888">x</text>
  <text x="146" y="78" text-anchor="end" font-size="10" fill="#888">y</text>
  <text x="146" y="194" text-anchor="end" font-size="10" fill="#888">0</text>

  <!-- ReLU curve: flat at y=0 for x<0, diagonal y=x for x>=0 -->
  <path d="M 70 180 L 150 180 L 230 100" fill="none" stroke="#b85450" stroke-width="2.5" filter="url(#rough2)"/>

  <!-- labels on segments -->
  <text x="100" y="170" font-size="10" fill="#888">y = 0  (x &lt; 0)</text>
  <text x="170" y="130" font-size="10" fill="#4a7a3a">y = x  (x ≥ 0)</text>

  <!-- corner marker -->
  <circle cx="150" cy="180" r="3" fill="#b85450" filter="url(#rough2)"/>

  <!-- ===== Right: array transform ===== -->
  <text x="320" y="58" font-size="12" fill="#446688" font-weight="bold">逐元素变换</text>

  <!-- input array -->
  <text x="300" y="88" font-size="11" fill="#666">input:</text>
  <g font-size="11" fill="#333">
    <rect x="350" y="74" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="372" y="93" text-anchor="middle">-2.0</text>
    <rect x="394" y="74" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="416" y="93" text-anchor="middle">-1.0</text>
    <rect x="438" y="74" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="93" text-anchor="middle">0.0</text>
    <rect x="482" y="74" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="504" y="93" text-anchor="middle">1.0</text>
    <rect x="526" y="74" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="548" y="93" text-anchor="middle">2.0</text>
  </g>

  <!-- arrow down -->
  <text x="400" y="124" text-anchor="middle" font-size="13" fill="#d6a040" font-weight="bold">↓ ReLU</text>

  <!-- output array -->
  <text x="300" y="150" font-size="11" fill="#666">output:</text>
  <g font-size="11" fill="#333">
    <rect x="350" y="136" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="372" y="155" text-anchor="middle">0.0</text>
    <rect x="394" y="136" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="416" y="155" text-anchor="middle">0.0</text>
    <rect x="438" y="136" width="44" height="28" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="460" y="155" text-anchor="middle">0.0</text>
    <rect x="482" y="136" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="504" y="155" text-anchor="middle">1.0</text>
    <rect x="526" y="136" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="548" y="155" text-anchor="middle">2.0</text>
  </g>

  <!-- color legend -->
  <line x1="300" y1="184" x2="570" y2="184" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <rect x="350" y="196" width="14" height="12" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="370" y="206" font-size="10" fill="#666">负数 → 截零</text>
  <rect x="460" y="196" width="14" height="12" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
  <text x="480" y="206" font-size="10" fill="#666">正数 → 保留</text>

  <!-- key insight -->
  <rect x="30" y="232" width="540" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="300" y="252" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">与向量加法同属 elementwise kernel，但只读 1 个数组、写 1 个</text>
  <text x="300" y="268" text-anchor="middle" font-size="11" fill="#666">算术强度更低（0.25 FLOP/B）→ 更彻底的 memory-bound</text>

  <!-- divergence hint -->
  <rect x="30" y="296" width="540" height="60" fill="#fce4ec" stroke="#b85450" stroke-width="1.2" rx="8" filter="url(#rough2)"/>
  <text x="40" y="316" font-size="12" fill="#b85450" font-weight="bold">⚠️ 新问题：x 的符号决定走哪个分支</text>
  <text x="40" y="334" font-size="11" fill="#555">若用 if (x &lt; 0) out = 0; else out = x;，同一 warp 内正负混杂时</text>
  <text x="40" y="350" font-size="11" fill="#555">两个分支会被串行执行（warp divergence）→ 本题的核心优化点</text>
</svg>
