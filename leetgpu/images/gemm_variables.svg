<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="900" height="640" fill="#fafafa"/>
<text x="450" y="26" text-anchor="middle" font-size="16" fill="#444" font-weight="bold">GEMM kernel 关键变量作用一览</text>
<text x="450" y="44" text-anchor="middle" font-size="11" fill="#888" font-weight="normal">Register Blocking：BM×BN block tile + TM×TN thread tile + BK 步长滑动</text>
<text x="150" y="70" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">① Grid / Block / Thread 索引</text>
<rect x="40" y="82" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="64" y="82" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="88" y="82" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="40" y="106" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="64" y="106" width="24" height="24" fill="#e8f0fe" stroke="#b85450" stroke-width="2.0" rx="2" filter="url(#rough2)"/>
<text x="76" y="115" text-anchor="middle" font-size="7" fill="#b85450" font-weight="normal">
<tspan x="76" dy="0">当前 block</tspan>
</text>
<rect x="88" y="106" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="40" y="130" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="64" y="130" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="88" y="130" width="24" height="24" fill="#fff" stroke="#446688" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<text x="76" y="170" text-anchor="middle" font-size="9" fill="#446688" font-weight="normal">bx = blockIdx.x,  by = blockIdx.y</text>
<text x="150" y="192" text-anchor="middle" font-size="10" fill="#666" font-weight="normal">block 内 thread 布局 (16×16 示意)</text>
<rect x="40" y="200" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="60" y="200" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="80" y="200" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="100" y="200" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="40" y="220" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="60" y="220" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="80" y="220" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="100" y="220" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="40" y="240" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="60" y="240" width="20" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="2.0" rx="2" filter="url(#rough2)"/>
<text x="70" y="228" text-anchor="middle" font-size="8" fill="#b85450" font-weight="bold">Tid</text>
<rect x="80" y="240" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="100" y="240" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="40" y="260" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="60" y="260" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="80" y="260" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<rect x="100" y="260" width="20" height="20" fill="#fff" stroke="#4a7a3a" stroke-width="0.8" rx="2" filter="url(#rough2)"/>
<text x="80" y="289" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="normal">tx = threadIdx.x,  ty = threadIdx.y</text>
<rect x="20" y="305" width="260" height="125" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
<text x="30" y="325" text-anchor="start" font-size="10" fill="#333" font-weight="bold">linear = ty × (BN/TN) + tx  →  0..255</text>
<text x="30" y="345" text-anchor="start" font-size="10" fill="#333" font-weight="normal">row_base = by × BM + ty × TM</text>
<text x="30" y="365" text-anchor="start" font-size="10" fill="#333" font-weight="normal">col_base = bx × BN + tx × TN</text>
<text x="30" y="390" text-anchor="start" font-size="9" fill="#888" font-weight="normal">本 thread 负责的 C 子块左上角坐标</text>
<line x1="280" y1="380" x2="330" y2="250" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="450" y="62" text-anchor="middle" font-size="12" fill="#b85450" font-weight="bold">② Block Tile / Thread Tile 尺寸</text>
<rect x="330" y="82" width="240" height="240" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
<text x="450" y="78" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">C block tile: BM × BN = 128 × 128</text>
<rect x="330.0" y="82.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="390.0" y="82.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="450.0" y="82.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="510.0" y="82.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="330.0" y="142.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="390.0" y="142.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="450.0" y="142.0" width="60.0" height="60.0" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="2" filter="url(#rough2)"/>
<rect x="510.0" y="142.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="330.0" y="202.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="390.0" y="202.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="450.0" y="202.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="510.0" y="202.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="330.0" y="262.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="390.0" y="262.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="450.0" y="262.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<rect x="510.0" y="262.0" width="60.0" height="60.0" fill="none" stroke="#d6a040" stroke-width="0.6" rx="2" filter="url(#rough2)"/>
<text x="480.0" y="176.0" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">TM×TN</text>
<text x="480.0" y="192.0" text-anchor="middle" font-size="8" fill="#b85450" font-weight="normal">acc[8][8]</text>
<text x="326" y="202.0" text-anchor="end" font-size="10" fill="#666" font-weight="normal" transform="rotate(270 326 202.0)">BM</text>
<text x="450.0" y="336" text-anchor="middle" font-size="10" fill="#666" font-weight="normal">BN</text>
<rect x="330" y="360" width="160" height="40" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
<text x="410" y="378" text-anchor="middle" font-size="9" fill="#446688" font-weight="bold">As[BM][BK]  A 子块</text>
<text x="410" y="392" text-anchor="middle" font-size="8" fill="#666" font-weight="normal">BM × BK = 128 × 8</text>
<rect x="530" y="360" width="40" height="160" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
<text x="550" y="430" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold" transform="rotate(270 550 430)">Bs[BK][BN]</text>
<text x="550" y="448" text-anchor="middle" font-size="8" fill="#666" font-weight="normal" transform="rotate(270 550 448)">BK × BN = 8 × 128</text>
<text x="750" y="70" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">③ 加载 / 计算变量</text>
<rect x="620" y="82" width="260" height="120" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="6" filter="url(#rough2)"/>
<text x="630" y="100" text-anchor="start" font-size="10" fill="#446688" font-weight="bold">协作加载 A → As</text>
<text x="630" y="120" text-anchor="start" font-size="9" fill="#333" font-weight="normal">load_per_thread_A = BM·BK / NUM_THREADS</text>
<text x="630" y="136" text-anchor="start" font-size="9" fill="#333" font-weight="normal">= 4</text>
<text x="630" y="156" text-anchor="start" font-size="9" fill="#333" font-weight="normal">lin = linear × 4 + i</text>
<text x="630" y="174" text-anchor="start" font-size="9" fill="#333" font-weight="normal">r = lin / BK,  c = lin % BK</text>
<text x="630" y="192" text-anchor="start" font-size="9" fill="#333" font-weight="normal">ar = by·BM + r,  ac = bk + c</text>
<rect x="620" y="217" width="260" height="120" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="6" filter="url(#rough2)"/>
<text x="630" y="235" text-anchor="start" font-size="10" fill="#4a7a3a" font-weight="bold">协作加载 B → Bs</text>
<text x="630" y="255" text-anchor="start" font-size="9" fill="#333" font-weight="normal">load_per_thread_B = BK·BN / NUM_THREADS</text>
<text x="630" y="271" text-anchor="start" font-size="9" fill="#333" font-weight="normal">= 4</text>
<text x="630" y="291" text-anchor="start" font-size="9" fill="#333" font-weight="normal">lin = linear × 4 + i</text>
<text x="630" y="309" text-anchor="start" font-size="9" fill="#333" font-weight="normal">r = lin / BN,  c = lin % BN</text>
<text x="630" y="327" text-anchor="start" font-size="9" fill="#333" font-weight="normal">br = bk + r,  bc = bx·BN + c</text>
<rect x="620" y="352" width="260" height="110" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="6" filter="url(#rough2)"/>
<text x="630" y="370" text-anchor="start" font-size="10" fill="#d6a040" font-weight="bold">寄存器计算</text>
<text x="630" y="390" text-anchor="start" font-size="9" fill="#333" font-weight="normal">rA[m] = As[ty·TM + m][k]</text>
<text x="630" y="410" text-anchor="start" font-size="9" fill="#333" font-weight="normal">rB[n] = Bs[k][tx·TN + n]</text>
<text x="630" y="430" text-anchor="start" font-size="9" fill="#333" font-weight="normal">acc[m][n] += rA[m] * rB[n]</text>
<text x="630" y="448" text-anchor="start" font-size="9" fill="#666" font-weight="normal">m ∈ [0,TM), n ∈ [0,TN), k ∈ [0,BK)</text>
<rect x="20" y="555" width="860" height="90" fill="#fff" stroke="#ccc" stroke-width="1" rx="8" filter="url(#rough2)"/>
<text x="40" y="573" text-anchor="start" font-size="11" fill="#444" font-weight="bold">变量速查：</text>
<text x="40" y="593" text-anchor="start" font-size="9" fill="#333" font-weight="bold">BM/BN/BK:</text>
<text x="40" y="609" text-anchor="start" font-size="8" fill="#666" font-weight="normal">block tile 尺寸</text>
<text x="250" y="593" text-anchor="start" font-size="9" fill="#333" font-weight="bold">TM/TN:</text>
<text x="250" y="609" text-anchor="start" font-size="8" fill="#666" font-weight="normal">每线程输出子块</text>
<text x="460" y="593" text-anchor="start" font-size="9" fill="#333" font-weight="bold">bx/by:</text>
<text x="460" y="609" text-anchor="start" font-size="8" fill="#666" font-weight="normal">block 在 grid 坐标</text>
<text x="670" y="593" text-anchor="start" font-size="9" fill="#333" font-weight="bold">tx/ty:</text>
<text x="670" y="609" text-anchor="start" font-size="8" fill="#666" font-weight="normal">thread 在 block 坐标</text>
<text x="40" y="623" text-anchor="start" font-size="9" fill="#333" font-weight="bold">linear:</text>
<text x="40" y="639" text-anchor="start" font-size="8" fill="#666" font-weight="normal">展平线程编号</text>
<text x="250" y="623" text-anchor="start" font-size="9" fill="#333" font-weight="bold">As/Bs:</text>
<text x="250" y="639" text-anchor="start" font-size="8" fill="#666" font-weight="normal">shared memory 子块</text>
<text x="460" y="623" text-anchor="start" font-size="9" fill="#333" font-weight="bold">acc/rA/rB:</text>
<text x="460" y="639" text-anchor="start" font-size="8" fill="#666" font-weight="normal">寄存器累加器/片段</text>
<text x="670" y="623" text-anchor="start" font-size="9" fill="#333" font-weight="bold">bk/i/lin:</text>
<text x="670" y="639" text-anchor="start" font-size="8" fill="#666" font-weight="normal">K 循环与加载索引</text>
</svg>