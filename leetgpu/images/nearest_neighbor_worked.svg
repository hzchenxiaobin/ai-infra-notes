<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="61" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="920" height="560" fill="#fdfcf7"/>

  <text x="460" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Worked Example：tiled nearest neighbor 逐步演算（N=4, tile=2）</text>
  <path d="M 240 42 Q 460 50 680 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- points -->
  <text x="40" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">输入：4 个 2D 点（演示用 2D，实际 3D）</text>
  <g filter="url(#sk)">
    <rect x="40" y="84" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="100" y="84" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="160" y="84" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
    <rect x="220" y="84" width="60" height="40" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.2"/>
  </g>
  <text x="70" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">p0(0,0)</text>
  <text x="130" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">p1(1,0)</text>
  <text x="190" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">p2(5,5)</text>
  <text x="250" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#2b6e9e">p3(2,0)</text>

  <!-- block: 4 thread, tile=2 -->
  <text x="340" y="74" font-size="12" font-weight="bold" fill="#7a5415">配置：1 block × 4 thread，tile=2（每次处理 2 个 reference 点）</text>

  <!-- tile 0 -->
  <g filter="url(#sk)">
    <rect x="40" y="140" width="840" height="120" rx="8" fill="#fffdf3" stroke="#d6a040" stroke-width="1.3"/>
  </g>
  <text x="55" y="162" font-size="12" font-weight="bold" fill="#7a5415">Tile 0: shared 载入 p0, p1（tile_base=0）</text>
  <text x="55" y="184" font-size="10" fill="#444">协作加载后 __syncthreads，各 thread 用自己 query 算距：</text>

  <g filter="url(#sk)">
    <rect x="55" y="192" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="265" y="192" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="475" y="192" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="685" y="192" width="190" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
  </g>
  <text x="65" y="210" font-size="10" font-weight="bold" fill="#2e6e2e">t0 (query p0)</text>
  <text x="65" y="226" font-size="9" fill="#444">vs p0: 自身→跳过(∞)</text>
  <text x="65" y="240" font-size="9" fill="#444">vs p1: d²=1 → min=1,idx=1</text>

  <text x="275" y="210" font-size="10" font-weight="bold" fill="#2e6e2e">t1 (query p1)</text>
  <text x="275" y="226" font-size="9" fill="#444">vs p0: d²=1 → min=1,idx=0</text>
  <text x="275" y="240" font-size="9" fill="#444">vs p1: 自身→跳过(∞)</text>

  <text x="485" y="210" font-size="10" font-weight="bold" fill="#2e6e2e">t2 (query p2)</text>
  <text x="485" y="226" font-size="9" fill="#444">vs p0: d²=50 → min=50,idx=0</text>
  <text x="485" y="240" font-size="9" fill="#444">vs p1: d²=41 → min=41,idx=1</text>

  <text x="695" y="210" font-size="10" font-weight="bold" fill="#2e6e2e">t3 (query p3)</text>
  <text x="695" y="226" font-size="9" fill="#444">vs p0: d²=4 → min=4,idx=0</text>
  <text x="695" y="240" font-size="9" fill="#444">vs p1: d²=1 → min=1,idx=1</text>

  <!-- arrow -->
  <path d="M 460 264 L 460 282" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="472" y="278" font-size="9" fill="#b85450">__syncthreads 后加载下个 tile</text>

  <!-- tile 1 -->
  <g filter="url(#sk)">
    <rect x="40" y="290" width="840" height="120" rx="8" fill="#fffdf3" stroke="#d6a040" stroke-width="1.3"/>
  </g>
  <text x="55" y="312" font-size="12" font-weight="bold" fill="#7a5415">Tile 1: shared 载入 p2, p3（tile_base=2）</text>
  <text x="55" y="334" font-size="10" fill="#444">在已有 min 基础上继续更新（跨 tile 累积 argmin）：</text>

  <g filter="url(#sk)">
    <rect x="55" y="342" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="265" y="342" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="475" y="342" width="200" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
    <rect x="685" y="342" width="190" height="58" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.0"/>
  </g>
  <text x="65" y="360" font-size="10" font-weight="bold" fill="#2e6e2e">t0 (query p0)</text>
  <text x="65" y="376" font-size="9" fill="#444">vs p2: d²=50, 不更新</text>
  <text x="65" y="390" font-size="9" fill="#444">vs p3: d²=4, 不更新</text>
  <text x="65" y="404" font-size="9" font-weight="bold" fill="#7a5415">→ idx=1 (p1)</text>

  <text x="275" y="360" font-size="10" font-weight="bold" fill="#2e6e2e">t1 (query p1)</text>
  <text x="275" y="376" font-size="9" fill="#444">vs p2: d²=41, 不更新</text>
  <text x="275" y="390" font-size="9" fill="#444">vs p3: d²=1, 不更新</text>
  <text x="275" y="404" font-size="9" font-weight="bold" fill="#7a5415">→ idx=0 (p0)</text>

  <text x="485" y="360" font-size="10" font-weight="bold" fill="#2e6e2e">t2 (query p2)</text>
  <text x="485" y="376" font-size="9" fill="#444">vs p2: 自身→跳过(∞)</text>
  <text x="485" y="390" font-size="9" fill="#444">vs p3: d²=34, 不更新</text>
  <text x="485" y="404" font-size="9" font-weight="bold" fill="#7a5415">→ idx=1 (p1)</text>

  <text x="695" y="360" font-size="10" font-weight="bold" fill="#2e6e2e">t3 (query p3)</text>
  <text x="695" y="376" font-size="9" fill="#444">vs p2: d²=34, 不更新</text>
  <text x="695" y="390" font-size="9" fill="#444">vs p3: 自身→跳过(∞)</text>
  <text x="695" y="404" font-size="9" font-weight="bold" fill="#7a5415">→ idx=1 (p1)</text>

  <!-- output -->
  <path d="M 460 416 L 460 436" stroke="#5a5a5a" stroke-width="1.3" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="40" y="452" font-size="12" font-weight="bold" fill="#2b6e9e">输出 indices</text>
  <g filter="url(#sk)">
    <rect x="180" y="442" width="50" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="230" y="442" width="50" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="280" y="442" width="50" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
    <rect x="330" y="442" width="50" height="32" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="205" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">1</text>
  <text x="255" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">0</text>
  <text x="305" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">1</text>
  <text x="355" y="463" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">1</text>
  <text x="180" y="488" font-size="9" fill="#888">p0→p1  p1→p0  p2→p1  p3→p1</text>

  <!-- insight -->
  <g filter="url(#sk)">
    <rect x="430" y="442" width="450" height="50" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="445" y="464" font-size="11" font-weight="bold" fill="#444">💡 关键洞察</text>
  <text x="445" y="482" font-size="10" fill="#444">跨 tile 累积 argmin：每 thread 持 min_dist/min_idx，</text>
  <text x="445" y="496" font-size="10" fill="#444">新 tile 内若更小则更新，遍历完所有 tile 即全局最近邻。</text>
</svg>
