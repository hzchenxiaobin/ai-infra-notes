<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="580" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#222">
    三层坐标空间映射：Global → Shared → Output
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#666">
    以 block(1,1)、OT=4、K=3、H=W=10 为例
  </text>

  <!-- ========== Panel 1: Global Memory ========== -->
  <text x="160" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    ① Global Memory (H×W = 10×10)
  </text>
  <text x="160" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">
    input[gy * W + gx]
  </text>

  <g id="global-mem" transform="translate(40,135)">
    <!-- 10x10 grid, cell=24 -->
    <!-- non-tile cells: light gray -->
    <rect x="0" y="0" width="240" height="240" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
    <!-- grid lines -->
    <g stroke="#ccc" stroke-width="0.5">
      <line x1="24"  y1="0" x2="24"  y2="240"/>
      <line x1="48"  y1="0" x2="48"  y2="240"/>
      <line x1="72"  y1="0" x2="72"  y2="240"/>
      <line x1="96"  y1="0" x2="96"  y2="240"/>
      <line x1="120" y1="0" x2="120" y2="240"/>
      <line x1="144" y1="0" x2="144" y2="240"/>
      <line x1="168" y1="0" x2="168" y2="240"/>
      <line x1="192" y1="0" x2="192" y2="240"/>
      <line x1="216" y1="0" x2="216" y2="240"/>
      <line x1="0" y1="24"  x2="240" y2="24"/>
      <line x1="0" y1="48"  x2="240" y2="48"/>
      <line x1="0" y1="72"  x2="240" y2="72"/>
      <line x1="0" y1="96"  x2="240" y2="96"/>
      <line x1="0" y1="120" x2="240" y2="120"/>
      <line x1="0" y1="144" x2="240" y2="144"/>
      <line x1="0" y1="168" x2="240" y2="168"/>
      <line x1="0" y1="192" x2="240" y2="192"/>
      <line x1="0" y1="216" x2="240" y2="216"/>
    </g>
    <!-- tile area for block(1,1): ox0=4, oy0=4, tile spans gx=4..9, gy=4..9 (6x6) -->
    <!-- halo outer ring -->
    <rect x="96"  y="96"  width="144" height="144" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- output tile inner 4x4: gx=5..8, gy=5..8 -->
    <rect x="120" y="120" width="96" height="96" fill="#c8e6c9" stroke="#81c784" stroke-width="2" opacity="0.6"/>
    <!-- highlight the tile region (halo+output) = gx=4..9 -->
    <rect x="96"  y="96"  width="48" height="48" fill="#ffe0b2" opacity="0.5"/>
    <rect x="192" y="96"  width="48" height="48" fill="#ffe0b2" opacity="0.5"/>
    <rect x="96"  y="144" width="48" height="96" fill="#ffe0b2" opacity="0.5"/>
    <rect x="192" y="144" width="48" height="96" fill="#ffe0b2" opacity="0.5"/>
    <rect x="96"  y="192" width="48" height="48" fill="#ffe0b2" opacity="0.5"/>
    <rect x="144" y="192" width="48" height="48" fill="#ffe0b2" opacity="0.5"/>

    <!-- block label -->
    <text x="168" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">block(1,1)</text>
    <text x="168" y="186" text-anchor="middle" font-size="10" fill="#666">tile 6×6</text>

    <!-- coordinate annotations -->
    <text x="96"  y="92"  text-anchor="middle" font-size="10" fill="#e65100">gx=4</text>
    <text x="120" y="92"  text-anchor="middle" font-size="10" fill="#2e7d32">gx=5</text>
    <text x="216" y="92"  text-anchor="middle" font-size="10" fill="#e65100">gx=9</text>
    <text x="92"  y="100" text-anchor="end" font-size="10" fill="#e65100">gy=4</text>
    <text x="92"  y="124" text-anchor="end" font-size="10" fill="#2e7d32">gy=5</text>
    <text x="92"  y="220" text-anchor="end" font-size="10" fill="#e65100">gy=9</text>

    <!-- axis labels -->
    <text x="120" y="258" text-anchor="middle" font-size="12" fill="#444">gx (col)</text>
    <text x="20" y="120" text-anchor="middle" font-size="12" fill="#444" transform="rotate(-90 20 120)">gy (row)</text>
  </g>

  <!-- Arrow 1: Global -> Shared -->
  <path d="M 290 255 L 370 255" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  <text x="330" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">gx=ox0+sx</text>
  <text x="330" y="275" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">gy=oy0+sy</text>

  <!-- ========== Panel 2: Shared Memory ========== -->
  <text x="490" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    ② Shared Memory (tileH×tileW = 6×6)
  </text>
  <text x="490" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">
    smem[sy * tileW + sx]
  </text>

  <g id="shared-mem" transform="translate(370,135)">
    <!-- 6x6 grid, cell=40 -->
    <!-- halo cells -->
    <rect x="0"   y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="40"  y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="80"  y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="120" y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="160" y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="0"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="40"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="40"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="80"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="80"  width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="120" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="120" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <rect x="0"   y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="40"  y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="80"  y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="120" y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="160" y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>
    <rect x="200" y="160" width="40" height="40" fill="#ffe0b2" stroke="#fff" stroke-width="2"/>

    <!-- output tile 4x4 -->
    <rect x="40"  y="40"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="80"  y="40"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="120" y="40"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="160" y="40"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="40"  y="80"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="80"  y="80"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="120" y="80"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="160" y="80"  width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="40"  y="120" width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="80"  y="120" width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="120" y="120" width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>
    <rect x="160" y="120" width="40" height="40" fill="#c8e6c9" stroke="#fff" stroke-width="2"/>

    <!-- smem coordinate labels (sy,sx) -->
    <text x="20"  y="24"  text-anchor="middle" font-size="9" fill="#888">(0,0)</text>
    <text x="60"  y="24"  text-anchor="middle" font-size="9" fill="#888">(0,1)</text>
    <text x="100" y="24"  text-anchor="middle" font-size="9" fill="#888">(0,2)</text>
    <text x="140" y="24"  text-anchor="middle" font-size="9" fill="#888">(0,3)</text>
    <text x="180" y="24"  text-anchor="middle" font-size="9" fill="#888">(0,4)</text>
    <text x="220" y="24"  text-anchor="middle" font-size="9" fill="#888">(0,5)</text>
    <text x="20"  y="64"  text-anchor="middle" font-size="9" fill="#888">(1,0)</text>
    <text x="60"  y="64"  text-anchor="middle" font-size="9" fill="#333">(1,1)</text>
    <text x="100" y="64"  text-anchor="middle" font-size="9" fill="#333">(1,2)</text>
    <text x="140" y="64"  text-anchor="middle" font-size="9" fill="#333">(1,3)</text>
    <text x="180" y="64"  text-anchor="middle" font-size="9" fill="#333">(1,4)</text>
    <text x="220" y="64"  text-anchor="middle" font-size="9" fill="#888">(1,5)</text>

    <!-- K×K window for thread (tx=1,ty=1) -->
    <rect x="80" y="80" width="120" height="120" fill="none" stroke="#d32f2f" stroke-width="2.5" stroke-dasharray="5,3"/>
    <!-- thread cell -->
    <rect x="80" y="80" width="40" height="40" fill="#81c784" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="100" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">tx=1</text>
    <text x="100" y="116" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">ty=1</text>

    <!-- axis labels -->
    <text x="120" y="225" text-anchor="middle" font-size="12" fill="#444">sx</text>
    <text x="-10" y="120" text-anchor="middle" font-size="12" fill="#444" transform="rotate(-90 -10 120)">sy</text>
  </g>

  <!-- Arrow 2: Shared -> Output -->
  <path d="M 620 255 L 700 255" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow3)"/>
  <text x="660" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">ox=ox0+tx</text>
  <text x="660" y="275" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">oy=oy0+ty</text>

  <!-- ========== Panel 3: Output Memory ========== -->
  <text x="820" y="100" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    ③ Output (outH×outW = 8×8)
  </text>
  <text x="820" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">
    output[oy * outW + ox]
  </text>

  <g id="output-mem" transform="translate(700,135)">
    <!-- 8x8 grid, cell=30 -->
    <rect x="0" y="0" width="240" height="240" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
    <g stroke="#ccc" stroke-width="0.5">
      <line x1="30"  y1="0" x2="30"  y2="240"/>
      <line x1="60"  y1="0" x2="60"  y2="240"/>
      <line x1="90"  y1="0" x2="90"  y2="240"/>
      <line x1="120" y1="0" x2="120" y2="240"/>
      <line x1="150" y1="0" x2="150" y2="240"/>
      <line x1="180" y1="0" x2="180" y2="240"/>
      <line x1="210" y1="0" x2="210" y2="240"/>
      <line x1="0" y1="30"  x2="240" y2="30"/>
      <line x1="0" y1="60"  x2="240" y2="60"/>
      <line x1="0" y1="90"  x2="240" y2="90"/>
      <line x1="0" y1="120" x2="240" y2="120"/>
      <line x1="0" y1="150" x2="240" y2="150"/>
      <line x1="0" y1="180" x2="240" y2="180"/>
      <line x1="0" y1="210" x2="240" y2="210"/>
    </g>
    <!-- output tile for block(1,1): ox0=4, oy0=4, 4x4 -->
    <rect x="120" y="120" width="120" height="120" fill="#c8e6c9" stroke="#81c784" stroke-width="2" opacity="0.5"/>
    <!-- thread (tx=1, ty=1) output pixel -->
    <rect x="150" y="150" width="30" height="30" fill="#81c784" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="165" y="170" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">(5,5)</text>

    <!-- coordinate annotations -->
    <text x="120" y="116" text-anchor="middle" font-size="10" fill="#2e7d32">ox=4</text>
    <text x="150" y="116" text-anchor="middle" font-size="10" fill="#d32f2f">ox=5</text>
    <text x="116" y="125" text-anchor="end" font-size="10" fill="#2e7d32">oy=4</text>
    <text x="116" y="155" text-anchor="end" font-size="10" fill="#d32f2f">oy=5</text>

    <!-- axis labels -->
    <text x="120" y="258" text-anchor="middle" font-size="12" fill="#444">ox (col)</text>
    <text x="-10" y="120" text-anchor="middle" font-size="12" fill="#444" transform="rotate(-90 -10 120)">oy (row)</text>
  </g>

  <!-- ========== Bottom: worked example ========== -->
  <rect x="50" y="410" width="900" height="155" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="438" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#222">
    Worked Example：block(1,1), thread(tx=1, ty=1), OT=4, K=3
  </text>

  <text x="80" y="466" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0">步骤 1：确定 block 起点</text>
  <text x="80" y="486" font-family="monospace" font-size="12" fill="#333">ox0 = blockIdx.x * OT = 1 * 4 = 4</text>
  <text x="80" y="504" font-family="monospace" font-size="12" fill="#333">oy0 = blockIdx.y * OT = 1 * 4 = 4</text>

  <text x="370" y="466" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6a1b9a">步骤 2：thread → output 像素</text>
  <text x="370" y="486" font-family="monospace" font-size="12" fill="#333">ox = ox0 + tx = 4 + 1 = 5</text>
  <text x="370" y="504" font-family="monospace" font-size="12" fill="#333">oy = oy0 + ty = 4 + 1 = 5</text>
  <text x="370" y="522" font-family="monospace" font-size="12" fill="#333">output[5*8 + 5] = output[45]</text>

  <text x="680" y="466" font-family="sans-serif" font-size="13" font-weight="bold" fill="#d32f2f">步骤 3：读 K×K 卷积窗口</text>
  <text x="680" y="486" font-family="monospace" font-size="12" fill="#333">smem[(1+ky)*6 + (1+kx)]</text>
  <text x="680" y="504" font-family="monospace" font-size="12" fill="#333">ky,kx ∈ {0,1,2}</text>
  <text x="680" y="522" font-family="sans-serif" font-size="12" fill="#666">对应 global: input[(5+ky)*10 + (5+kx)]</text>

  <text x="80" y="548" font-family="sans-serif" font-size="12" fill="#555">
    💡 (tx,ty) 既是线程在输出 tile 中的坐标，也是它在 shared memory 中卷积窗口的左上角——这是 halo tiling 最核心的索引关系。
  </text>
</svg>
