<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="480" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Shared Memory Tiling：用 shared memory 中转</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">读 tile 到 shared（合并读）→ 转置写回 global（合并写）</text>

  <!-- ===== Step 1: read tile into shared ===== -->
  <text x="30" y="74" font-size="12" fill="#4a7a3a" font-weight="bold">① 读：一个 block 处理一个 TILE × TILE 块</text>

  <!-- Input matrix with tile highlighted -->
  <text x="30" y="96" font-size="10" fill="#666">输入 A（global，行主序）</text>
  <g font-size="9" fill="#888">
    <!-- dim grid 4x4, highlight tile at (1,2) -->
    <rect x="40" y="104" width="120" height="120" fill="none" stroke="#ddd" stroke-width="1" filter="url(#rough2)"/>
    <!-- grid lines -->
    <line x1="70" y1="104" x2="70" y2="224" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="100" y1="104" x2="100" y2="224" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="130" y1="104" x2="130" y2="224" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="40" y1="134" x2="160" y2="134" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="40" y1="164" x2="160" y2="164" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="40" y1="194" x2="160" y2="194" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>

    <!-- highlighted tile -->
    <rect x="100" y="134" width="60" height="60" fill="#e8f0fe" stroke="#446688" stroke-width="2" rx="2" filter="url(#rough2)"/>
    <text x="130" y="168" text-anchor="middle" font-size="9" fill="#446688" font-weight="bold">TILE</text>
    <text x="130" y="180" text-anchor="middle" font-size="8" fill="#446688">2×2 block</text>
  </g>
  <text x="170" y="170" font-size="10" fill="#4a7a3a" font-weight="bold">→ 按行读</text>
  <text x="170" y="184" font-size="10" fill="#4a7a3a">合并 ✓</text>

  <!-- arrow to shared -->
  <path d="M 240 160 L 290 160" stroke="#4a7a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Shared memory tile -->
  <text x="300" y="96" font-size="10" fill="#666">shared[TILE][TILE]</text>
  <g font-size="9" fill="#333">
    <rect x="300" y="104" width="120" height="120" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <line x1="360" y1="104" x2="360" y2="224" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="300" y1="164" x2="420" y2="164" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <text x="330" y="138" text-anchor="middle">s[0][0]</text>
    <text x="390" y="138" text-anchor="middle">s[0][1]</text>
    <text x="330" y="198" text-anchor="middle">s[1][0]</text>
    <text x="390" y="198" text-anchor="middle">s[1][1]</text>
  </g>
  <text x="300" y="240" font-size="10" fill="#d6a040" font-weight="bold">片上共享，极快</text>

  <!-- ===== Step 2: __syncthreads ===== -->
  <rect x="460" y="120" width="160" height="80" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="6" filter="url(#rough2)"/>
  <text x="540" y="142" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">② __syncthreads()</text>
  <text x="540" y="160" text-anchor="middle" font-size="10" fill="#666">确保整个 tile</text>
  <text x="540" y="174" text-anchor="middle" font-size="10" fill="#666">已写入 shared</text>
  <text x="540" y="190" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">block 级同步！</text>

  <!-- ===== Step 3: write transposed ===== -->
  <line x1="20" y1="260" x2="620" y2="260" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="284" font-size="12" fill="#b85450" font-weight="bold">③ 写：从 shared 转置读出，按行写入 A^T</text>

  <!-- shared again, transposed read -->
  <text x="30" y="306" font-size="10" fill="#666">shared（转置读）</text>
  <g font-size="9" fill="#333">
    <rect x="40" y="314" width="120" height="120" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="4" filter="url(#rough2)"/>
    <line x1="100" y1="314" x2="100" y2="434" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="40" y1="374" x2="160" y2="374" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <!-- read column 0 -->
    <rect x="42" y="316" width="56" height="56" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="2" filter="url(#rough2)"/>
    <text x="70" y="350" text-anchor="middle" font-size="8" fill="#4a7a3a" font-weight="bold">读列</text>
  </g>
  <text x="170" y="372" font-size="10" fill="#4a7a3a" font-weight="bold">→ 转置读</text>
  <text x="170" y="386" font-size="10" fill="#4a7a3a">s[t][s]</text>

  <!-- arrow -->
  <path d="M 240 374 L 290 374" stroke="#b85450" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Output A^T -->
  <text x="300" y="306" font-size="10" fill="#666">输出 A^T（global，行主序）</text>
  <g font-size="9" fill="#888">
    <rect x="300" y="314" width="120" height="120" fill="none" stroke="#ddd" stroke-width="1" filter="url(#rough2)"/>
    <line x1="330" y1="314" x2="330" y2="434" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="360" y1="314" x2="360" y2="434" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="390" y1="314" x2="390" y2="434" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="300" y1="344" x2="420" y2="344" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="300" y1="374" x2="420" y2="374" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <line x1="300" y1="404" x2="420" y2="404" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
    <!-- highlighted: tile transposed position -->
    <rect x="300" y="314" width="60" height="60" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="2" filter="url(#rough2)"/>
    <text x="330" y="350" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">TILE^T</text>
  </g>
  <text x="430" y="372" font-size="10" fill="#b85450" font-weight="bold">→ 按行写</text>
  <text x="430" y="386" font-size="10" fill="#b85450">合并 ✓</text>

  <!-- key insight -->
  <rect x="30" y="448" width="580" height="24" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.3" rx="6" filter="url(#rough2)"/>
  <text x="320" y="464" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">读 shared 列 → 写 A^T 行，两次访存都合并！带宽翻倍</text>
</svg>
