<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#fdfcf7"/>

  <text x="440" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Count Array Element：predicate 归约（input == K → 求和）</text>
  <path d="M 250 42 Q 440 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- K badge -->
  <g filter="url(#sk)">
    <rect x="730" y="62" width="120" height="40" rx="8" fill="#fce4ec" stroke="#b85450" stroke-width="1.6"/>
  </g>
  <text x="790" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#b85450">目标值 K = 1</text>

  <!-- input row -->
  <text x="60" y="84" font-size="12" font-weight="bold" fill="#2b6e9e">输入：input[]（int32，N 个元素）</text>
  <g filter="url(#sk)">
    <rect x="60" y="94" width="64" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="124" y="94" width="64" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="188" y="94" width="64" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="252" y="94" width="64" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="316" y="94" width="64" height="40" rx="5" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="92" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">1</text>
  <text x="156" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">2</text>
  <text x="220" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">3</text>
  <text x="284" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">4</text>
  <text x="348" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b6e9e">1</text>
  <text x="395" y="120" font-size="12" fill="#444">... (长度 N)</text>

  <!-- arrow + predicate label -->
  <path d="M 220 140 L 220 162" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="232" y="156" font-size="11" fill="#7a5415">predicate：input[i] == K ?</text>

  <!-- predicate row -->
  <text x="60" y="178" font-size="12" font-weight="bold" fill="#7a5415">逐元素判定：等于 K 记 1，否则记 0</text>
  <g filter="url(#sk)">
    <rect x="60" y="188" width="64" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
    <rect x="124" y="188" width="64" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
    <rect x="188" y="188" width="64" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
    <rect x="252" y="188" width="64" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
    <rect x="316" y="188" width="64" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3"/>
  </g>
  <text x="92" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5415">1</text>
  <text x="156" y="214" text-anchor="middle" font-size="15" fill="#aaa">0</text>
  <text x="220" y="214" text-anchor="middle" font-size="15" fill="#aaa">0</text>
  <text x="284" y="214" text-anchor="middle" font-size="15" fill="#aaa">0</text>
  <text x="348" y="214" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5415">1</text>

  <!-- arrow + reduce label -->
  <path d="M 220 234 L 220 256" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="232" y="250" font-size="11" fill="#2e6e2e">归约求和 Σ</text>

  <!-- reduction tree -->
  <text x="60" y="272" font-size="12" font-weight="bold" fill="#2e6e2e">归约：把所有 1/0 累加成计数</text>
  <g filter="url(#sk)">
    <circle cx="92" cy="300" r="16" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="348" cy="300" r="16" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <circle cx="220" cy="356" r="18" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="92" y="305" text-anchor="middle" font-size="11" fill="#2e6e2e">1</text>
  <text x="348" y="305" text-anchor="middle" font-size="11" fill="#2e6e2e">1</text>
  <text x="220" y="361" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">2</text>
  <path d="M 92 316 Q 150 336 206 346" stroke="#4a8e4a" stroke-width="1.3" fill="none" filter="url(#sk)"/>
  <path d="M 348 316 Q 290 336 234 346" stroke="#4a8e4a" stroke-width="1.3" fill="none" filter="url(#sk)"/>
  <text x="430" y="304" font-size="11" fill="#888">中间的 0 不影响求和</text>

  <!-- arrow to output -->
  <path d="M 220 378 L 220 398" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- output -->
  <text x="60" y="412" font-size="12" font-weight="bold" fill="#2e6e2e">输出：output[0]（int32，等于 K 的元素个数）</text>
  <g filter="url(#sk)">
    <rect x="60" y="420" width="80" height="0" rx="5" fill="none"/>
  </g>

  <!-- bottom insight -->
  <g filter="url(#sk)">
    <rect x="460" y="330" width="390" height="92" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="478" y="354" font-size="12" font-weight="bold" fill="#444">💡 核心洞察</text>
  <text x="478" y="374" font-size="11" fill="#444">count = Σ (input[i] == K)，本质是带</text>
  <text x="478" y="390" font-size="11" fill="#444">predicate 的归约。两种实现：</text>
  <text x="478" y="408" font-size="11" fill="#b85450">atomicAdd（写冲突）vs 树形归约（无冲突）</text>
</svg>
