<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#fafafa"/>

  <text x="310" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Interleave：output[2i]=A[i]，output[2i+1]=B[i]</text>
  <text x="310" y="44" text-anchor="middle" font-size="11" fill="#888">一个 thread 读 A[i]、B[i]，写相邻的 output[2i]、output[2i+1]</text>

  <!-- Array A -->
  <text x="30" y="78" font-size="12" fill="#446688" font-weight="bold">A</text>
  <rect x="60" y="64" width="56" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="88" y="84" text-anchor="middle" font-size="12" fill="#333">A0</text>
  <rect x="116" y="64" width="56" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="144" y="84" text-anchor="middle" font-size="12" fill="#333">A1</text>
  <rect x="172" y="64" width="56" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="200" y="84" text-anchor="middle" font-size="12" fill="#333">A2</text>
  <rect x="228" y="64" width="56" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="256" y="84" text-anchor="middle" font-size="12" fill="#333">A3</text>
  <text x="300" y="84" font-size="13" fill="#888">... N 个元素</text>

  <!-- Array B -->
  <text x="30" y="128" font-size="12" fill="#4a7a3a" font-weight="bold">B</text>
  <rect x="60" y="114" width="56" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="88" y="134" text-anchor="middle" font-size="12" fill="#333">B0</text>
  <rect x="116" y="114" width="56" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="144" y="134" text-anchor="middle" font-size="12" fill="#333">B1</text>
  <rect x="172" y="114" width="56" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="200" y="134" text-anchor="middle" font-size="12" fill="#333">B2</text>
  <rect x="228" y="114" width="56" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="256" y="134" text-anchor="middle" font-size="12" fill="#333">B3</text>
  <text x="300" y="134" font-size="13" fill="#888">... N 个元素</text>

  <!-- arrows from A[i],B[i] down to output -->
  <path d="M 88 96 L 88 184" stroke="#446688" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 88 146 L 104 184" stroke="#4a7a3a" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 144 96 L 160 184" stroke="#446688" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <path d="M 144 146 L 176 184" stroke="#4a7a3a" stroke-width="1" stroke-dasharray="3,3" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>

  <!-- Array output (interleaved) -->
  <text x="30" y="200" font-size="12" fill="#b85450" font-weight="bold">output</text>
  <rect x="60" y="186" width="44" height="30" fill="#fce4ec" stroke="#b85450" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="82" y="206" text-anchor="middle" font-size="11" fill="#333">A0</text>
  <rect x="104" y="186" width="44" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="126" y="206" text-anchor="middle" font-size="11" fill="#333">B0</text>
  <rect x="148" y="186" width="44" height="30" fill="#e8f0fe" stroke="#446688" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="170" y="206" text-anchor="middle" font-size="11" fill="#333">A1</text>
  <rect x="192" y="186" width="44" height="30" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="4" filter="url(#rough2)"/>
  <text x="214" y="206" text-anchor="middle" font-size="11" fill="#333">B1</text>
  <text x="248" y="206" font-size="12" fill="#888">... 长度 2N</text>

  <!-- thread mapping -->
  <line x1="20" y1="240" x2="600" y2="240" stroke="#ddd" stroke-width="1" filter="url(#rough2)"/>
  <text x="20" y="262" font-size="13" fill="#444" font-weight="bold">线程映射：thread i → output[2i]、output[2i+1]</text>

  <text x="82" y="290" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 0</text>
  <text x="170" y="290" text-anchor="middle" font-size="11" fill="#d6a040" font-weight="bold">thread 1</text>
  <line x1="104" y1="216" x2="104" y2="276" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>
  <line x1="192" y1="216" x2="192" y2="276" stroke="#d6a040" stroke-width="1" stroke-dasharray="3,3" filter="url(#rough2)"/>

  <!-- coalesced note -->
  <rect x="40" y="306" width="540" height="44" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="310" y="326" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">读：warp 内 32 thread 读 A[t..t+31]、B[t..t+31] → 两次 128B 合并事务</text>
  <text x="310" y="342" text-anchor="middle" font-size="11" fill="#666">写：相邻 thread 写相邻 (output[2t],output[2t+1]) 对 → 256B 仍是合并事务</text>

  <!-- key insight -->
  <rect x="40" y="362" width="540" height="44" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="310" y="382" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">关键：读与写都合并 → 纯 bandwidth-bound，grid-stride 兼顾大 N</text>
  <text x="310" y="398" text-anchor="middle" font-size="11" fill="#666">每个元素只读写一次，无复用，shared memory 无用武之地</text>
</svg>
