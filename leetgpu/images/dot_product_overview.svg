<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="65" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Dot Product：两级归约（block 内 + 跨 block）</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input vectors -->
  <text x="60" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">输入：a[] × b[]（N 个元素，点积 = Σ a[i]×b[i]）</text>
  <g filter="url(#sk)">
    <rect x="60" y="84" width="56" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="116" y="84" width="56" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="172" y="84" width="56" height="34" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="88" y="106" text-anchor="middle" font-size="11" fill="#2b6e9e">a₀×b₀</text>
  <text x="144" y="106" text-anchor="middle" font-size="11" fill="#2b6e9e">a₁×b₁</text>
  <text x="200" y="106" text-anchor="middle" font-size="11" fill="#2b6e9e">a₂×b₂</text>
  <text x="240" y="106" font-size="12" fill="#444">...</text>

  <path d="M 200 122 L 200 144" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- block reduce -->
  <text x="60" y="160" font-size="12" font-weight="bold" fill="#7a5415">① block 内归约（warp shuffle + shared memory）</text>
  <g filter="url(#sk)">
    <rect x="60" y="170" width="240" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="180" y="190" text-anchor="middle" font-size="11" fill="#7a5415">block 0: warp reduce → block_sum₀</text>
  <text x="180" y="206" text-anchor="middle" font-size="9" fill="#888">__shfl_down_sync 树形归约</text>

  <g filter="url(#sk)">
    <rect x="320" y="170" width="240" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="440" y="190" text-anchor="middle" font-size="11" fill="#7a5415">block 1: warp reduce → block_sum₁</text>
  <text x="440" y="206" text-anchor="middle" font-size="9" fill="#888">...</text>

  <g filter="url(#sk)">
    <rect x="580" y="170" width="240" height="44" rx="6" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.4"/>
  </g>
  <text x="700" y="190" text-anchor="middle" font-size="11" fill="#7a5415">block M: warp reduce → block_sum_M</text>

  <path d="M 440 214 L 440 236" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- cross block reduce -->
  <text x="60" y="252" font-size="12" font-weight="bold" fill="#2e6e2e">② 跨 block 归约（atomicAdd 或第二遍 kernel）</text>
  <g filter="url(#sk)">
    <rect x="300" y="262" width="280" height="44" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.6"/>
  </g>
  <text x="440" y="282" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">result = Σ block_sum</text>
  <text x="440" y="298" text-anchor="middle" font-size="9" fill="#888">atomicAdd 或 第二遍 kernel 归约</text>

  <!-- analogy -->
  <g filter="url(#sk)">
    <rect x="60" y="320" width="760" height="48" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="342" font-size="11" font-weight="bold" fill="#444">类比：</text>
  <text x="130" y="342" font-size="10" fill="#444">Week6 benchmark 的 percentile 统计 = 归约；Scheduler token budget 累加 = 归约；Batcher batch 聚合 = 归约</text>
  <text x="80" y="360" font-size="10" fill="#888">归约是推理系统所有"累加/统计"操作的底层模板——Week7 系统整合会频繁用到</text>
</svg>
