<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="480" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Bank Conflict 与 Padding 解决</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">shared memory 按 bank 分区（32 个 bank），同 bank 并发访问 → 串行化</text>

  <!-- ===== Bank concept ===== -->
  <text x="30" y="72" font-size="12" fill="#446688" font-weight="bold">背景：shared memory 的 32 个 bank</text>
  <text x="30" y="88" font-size="10" fill="#666">每 4 字节一个 bank，地址按 bank 轮转：addr % 32 → bank id</text>
  <g font-size="9" fill="#333">
    <!-- 32 banks as columns, show 8 for clarity -->
    <text x="30" y="110" font-size="9" fill="#888">bank:</text>
    <rect x="60"  y="100" width="44" height="20" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="82"  y="114" text-anchor="middle">0</text>
    <rect x="104" y="100" width="44" height="20" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="126" y="114" text-anchor="middle">1</text>
    <rect x="148" y="100" width="44" height="20" fill="#fff8e1" stroke="#d6a040" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="170" y="114" text-anchor="middle">2</text>
    <rect x="192" y="100" width="44" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="2" filter="url(#rough2)"/>
    <text x="214" y="114" text-anchor="middle">3</text>
    <text x="248" y="114" font-size="9" fill="#888">... 共 32 个</text>
  </g>

  <!-- ===== Bad: column read, bank conflict ===== -->
  <line x1="20" y1="138" x2="620" y2="138" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="162" font-size="12" fill="#b85450" font-weight="bold">✗ 无 padding：读 shared 列 → 全部撞同一 bank</text>

  <text x="30" y="182" font-size="10" fill="#666">shared[TILE][TILE]，TILE=32（简化为 4 展示）</text>

  <!-- 4x4 shared, no padding, highlight column 0 -->
  <g font-size="9" fill="#333">
    <!-- row 0 -->
    <rect x="40"  y="192" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="211" text-anchor="middle">s[0][0]</text>
    <rect x="84"  y="192" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="211" text-anchor="middle">s[0][1]</text>
    <rect x="128" y="192" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="211" text-anchor="middle">s[0][2]</text>
    <rect x="172" y="192" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="211" text-anchor="middle">s[0][3]</text>
    <!-- row 1 -->
    <rect x="40"  y="222" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="241" text-anchor="middle">s[1][0]</text>
    <rect x="84"  y="222" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="241" text-anchor="middle">s[1][1]</text>
    <rect x="128" y="222" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="241" text-anchor="middle">s[1][2]</text>
    <rect x="172" y="222" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="241" text-anchor="middle">s[1][3]</text>
    <!-- row 2 -->
    <rect x="40"  y="252" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="271" text-anchor="middle">s[2][0]</text>
    <rect x="84"  y="252" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="271" text-anchor="middle">s[2][1]</text>
    <rect x="128" y="252" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="271" text-anchor="middle">s[2][2]</text>
    <rect x="172" y="252" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="271" text-anchor="middle">s[2][3]</text>
    <!-- row 3 -->
    <rect x="40"  y="282" width="44" height="28" fill="#fce4ec" stroke="#b85450" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="301" text-anchor="middle">s[3][0]</text>
    <rect x="84"  y="282" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="301" text-anchor="middle">s[3][1]</text>
    <rect x="128" y="282" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="301" text-anchor="middle">s[3][2]</text>
    <rect x="172" y="282" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="301" text-anchor="middle">s[3][3]</text>
  </g>

  <text x="230" y="245" font-size="10" fill="#b85450" font-weight="bold">读列 0：</text>
  <text x="230" y="261" font-size="10" fill="#b85450">s[0][0], s[1][0], s[2][0], s[3][0]</text>
  <text x="230" y="277" font-size="10" fill="#b85450">地址间隔 = TILE × 4B</text>
  <text x="230" y="293" font-size="10" fill="#b85450">bank = (addr/4) % 32</text>
  <text x="230" y="309" font-size="10" fill="#b85450" font-weight="bold">→ 全落在 bank 0！32 路冲突 ✗</text>

  <!-- ===== Good: with padding ===== -->
  <line x1="20" y1="328" x2="620" y2="328" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="352" font-size="12" fill="#4a7a3a" font-weight="bold">✓ 加 padding：shared[TILE][TILE+1]，错开 bank</text>

  <text x="30" y="372" font-size="10" fill="#666">每行末尾多 1 个元素，地址错开 → bank 错开</text>

  <!-- 4x5 shared with padding column -->
  <g font-size="9" fill="#333">
    <!-- row 0 -->
    <rect x="40"  y="382" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="401" text-anchor="middle">s[0][0]</text>
    <rect x="84"  y="382" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="401" text-anchor="middle">s[0][1]</text>
    <rect x="128" y="382" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="401" text-anchor="middle">s[0][2]</text>
    <rect x="172" y="382" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="401" text-anchor="middle">s[0][3]</text>
    <rect x="216" y="382" width="20" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="226" y="401" text-anchor="middle" font-size="8" fill="#d6a040">pad</text>
    <!-- row 1 -->
    <rect x="40"  y="412" width="44" height="28" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="2" rx="3" filter="url(#rough2)"/>
    <text x="62"  y="431" text-anchor="middle">s[1][0]</text>
    <rect x="84"  y="412" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="106" y="431" text-anchor="middle">s[1][1]</text>
    <rect x="128" y="412" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="150" y="431" text-anchor="middle">s[1][2]</text>
    <rect x="172" y="412" width="44" height="28" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="194" y="431" text-anchor="middle">s[1][3]</text>
    <rect x="216" y="412" width="20" height="28" fill="#fff8e1" stroke="#d6a040" stroke-width="1" stroke-dasharray="2,2" rx="3" filter="url(#rough2)"/>
    <text x="226" y="431" text-anchor="middle" font-size="8" fill="#d6a040">pad</text>
  </g>
  <text x="250" y="401" font-size="10" fill="#4a7a3a" font-weight="bold">s[0][0] → bank 0</text>
  <text x="250" y="421" font-size="10" fill="#4a7a3a">s[1][0] → bank (TILE+1) = bank 1</text>
  <text x="250" y="437" font-size="10" fill="#4a7a3a">s[2][0] → bank 2, s[3][0] → bank 3</text>
  <text x="250" y="453" font-size="10" fill="#4a7a3a" font-weight="bold">→ 无冲突，并行读 ✓</text>

  <!-- cost note -->
  <rect x="460" y="382" width="160" height="80" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="540" y="402" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">代价</text>
  <text x="540" y="420" text-anchor="middle" font-size="10" fill="#666">shared 多用 TILE×4B</text>
  <text x="540" y="436" text-anchor="middle" font-size="10" fill="#666">（32×4=128B / block）</text>
  <text x="540" y="452" text-anchor="middle" font-size="10" fill="#4a7a3a">换 32× 加速，血赚</text>
</svg>
