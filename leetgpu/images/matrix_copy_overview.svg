<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="83" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Matrix Copy：coalesced 访存测带宽</text>
  <path d="M 290 40 Q 440 48 590 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- source matrix -->
  <text x="60" y="72" font-size="12" font-weight="bold" fill="#2b6e9e">输入 src[M×N]</text>
  <g filter="url(#sk)">
    <rect x="60" y="82" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="108" y="82" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="156" y="82" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="60" y="118" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="108" y="118" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="156" y="118" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="60" y="154" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="108" y="154" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="156" y="154" width="48" height="36" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="132" y="210" text-anchor="middle" font-size="9" fill="#888">row-major 连续存储</text>

  <path d="M 215 136 L 295 136" stroke="#5a5a5a" stroke-width="1.5" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="255" y="128" text-anchor="middle" font-size="10" fill="#7a5415" font-weight="bold">coalesced copy</text>

  <!-- dest matrix -->
  <text x="300" y="72" font-size="12" font-weight="bold" fill="#2e6e2e">输出 dst[M×N]</text>
  <g filter="url(#sk)">
    <rect x="300" y="82" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="348" y="82" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="396" y="82" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="300" y="118" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="348" y="118" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="396" y="118" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="300" y="154" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="348" y="154" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
    <rect x="396" y="154" width="48" height="36" rx="3" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>

  <!-- coalesced access pattern -->
  <text x="500" y="72" font-size="12" font-weight="bold" fill="#7a5415">coalesced 访问模式</text>
  <g filter="url(#sk)">
    <rect x="500" y="82" width="340" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="520" y="104" font-size="10" fill="#444" font-weight="bold">warp 内 thread 连续访问：</text>
  <text x="520" y="122" font-size="10" fill="#2b6e9e">thread 0 → dst[0], thread 1 → dst[1], ...</text>
  <text x="520" y="138" font-size="10" fill="#2e6e2e">→ 一个 warp 读 32 个连续 float</text>
  <text x="520" y="154" font-size="10" fill="#7a5415">→ 合并成 1 次 128-byte 事务</text>
  <text x="520" y="176" font-size="10" fill="#b85450" font-weight="bold">非 coalesced（跨行跳）：32 次事务，带宽 1/32</text>
  <text x="520" y="194" font-size="10" fill="#888">row-major + 连续 thread 映射 = coalesced</text>

  <!-- bandwidth -->
  <g filter="url(#sk)">
    <rect x="60" y="240" width="780" height="120" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="264" font-size="12" font-weight="bold" fill="#444">带宽测量：</text>
  <text x="80" y="286" font-size="11" fill="#444">有效带宽 = 2 × M × N × sizeof(float) / kernel_time</text>
  <text x="80" y="304" font-size="11" fill="#7a5415">（读 src + 写 dst = 2 倍数据量）</text>
  <text x="80" y="328" font-size="11" fill="#2e6e2e" font-weight="bold">RTX 5090 理论带宽 ~1555 GB/s，好的 copy kernel 可达 80-90%</text>
  <text x="80" y="346" font-size="10" fill="#888">类比：请求队列 put/get 的"搬运效率"= 线程间通信带宽</text>
</svg>
