<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 540" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="540" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Softmax 数学原理：logits → 概率分布</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">用 exp 放大差异、用归一化压到 [0,1] 且 Σ=1，是分类输出层与注意力权值的基石</text>

  <!-- ===== Formula box ===== -->
  <rect x="30" y="60" width="580" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="320" y="84" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">y_i = exp(x_i) / Σ_j exp(x_j)</text>
  <text x="320" y="104" text-anchor="middle" font-size="10" fill="#888">输入 x ∈ ℝ^D（logits，无约束）→ 输出 y ∈ (0,1)^D 且 Σ y_i = 1（概率分布）</text>

  <!-- ===== Three-step pipeline ===== -->
  <text x="30" y="140" font-size="12" fill="#446688" font-weight="bold">三步变换流水线</text>

  <!-- step 1: input logits -->
  <text x="40" y="160" font-size="10" fill="#888">① logits（任意实数）</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="168" width="48" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="64"  y="186" text-anchor="middle">1.0</text>
    <rect x="88"  y="168" width="48" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="112" y="186" text-anchor="middle">2.0</text>
    <rect x="136" y="168" width="48" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="160" y="186" text-anchor="middle">3.0</text>
    <rect x="184" y="168" width="48" height="26" fill="#e8f0fe" stroke="#446688" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="208" y="186" text-anchor="middle">4.0</text>
    <text x="244" y="186" font-size="9" fill="#888">值可负、可大，未归一</text>
  </g>

  <!-- arrow 1 -->
  <path d="M 150 200 L 150 218" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="158" y="214" font-size="9" fill="#888">exp(·)</text>

  <!-- step 2: exp -->
  <text x="40" y="234" font-size="10" fill="#888">② exp 放大差异（皆正）</text>
  <g font-size="9" fill="#333">
    <rect x="40"  y="242" width="48" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="64"  y="260" text-anchor="middle">2.72</text>
    <rect x="88"  y="242" width="48" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="112" y="260" text-anchor="middle">7.39</text>
    <rect x="136" y="242" width="48" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="160" y="260" text-anchor="middle">20.1</text>
    <rect x="184" y="242" width="48" height="26" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="208" y="260" text-anchor="middle">54.6</text>
    <text x="244" y="260" font-size="9" fill="#b85450">exp 单调 ↑，差距被放大</text>
  </g>

  <!-- arrow 2 -->
  <path d="M 150 274 L 150 292" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <text x="158" y="288" font-size="9" fill="#888">Σ = 84.8, ÷Σ</text>

  <!-- step 3: normalized -->
  <text x="40" y="308" font-size="10" fill="#888">③ 归一化（Σ = 1）</text>
  <g font-size="10" fill="#333">
    <rect x="40"  y="316" width="48" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="64"  y="334" text-anchor="middle">.032</text>
    <rect x="88"  y="316" width="48" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="112" y="334" text-anchor="middle">.087</text>
    <rect x="136" y="316" width="48" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="160" y="334" text-anchor="middle">.237</text>
    <rect x="184" y="316" width="48" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.4" rx="3" filter="url(#rough2)"/>
    <text x="208" y="334" text-anchor="middle" font-weight="bold">.644</text>
    <text x="244" y="334" font-size="9" fill="#4a7a3a">最大值占比最大</text>
  </g>

  <!-- ===== Right side: bar chart visualization ===== -->
  <text x="430" y="140" font-size="12" fill="#446688" font-weight="bold">几何直观：argmax 不变</text>
  <g font-size="9" fill="#333">
    <!-- axis -->
    <line x1="430" y1="330" x2="610" y2="330" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <line x1="430" y1="170" x2="430" y2="330" stroke="#888" stroke-width="1" filter="url(#rough2)"/>
    <text x="420" y="174" text-anchor="end" font-size="8" fill="#888">值</text>

    <!-- input bars (blue) -->
    <rect x="442" y="288" width="22" height="42" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
    <text x="453" y="282" text-anchor="middle" font-size="8" fill="#446688">1.0</text>
    <rect x="470" y="266" width="22" height="64" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
    <text x="481" y="260" text-anchor="middle" font-size="8" fill="#446688">2.0</text>
    <rect x="498" y="244" width="22" height="86" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
    <text x="509" y="238" text-anchor="middle" font-size="8" fill="#446688">3.0</text>
    <rect x="526" y="222" width="22" height="108" fill="#e8f0fe" stroke="#446688" stroke-width="1" filter="url(#rough2)"/>
    <text x="537" y="216" text-anchor="middle" font-size="8" fill="#446688">4.0</text>

    <!-- output bars (green, scaled to sum=1, taller for visibility) -->
    <rect x="560" y="304" width="18" height="26" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" filter="url(#rough2)"/>
    <text x="569" y="298" text-anchor="middle" font-size="8" fill="#4a7a3a">.03</text>
    <rect x="580" y="276" width="18" height="54" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" filter="url(#rough2)"/>
    <text x="589" y="270" text-anchor="middle" font-size="8" fill="#4a7a3a">.09</text>
    <rect x="600" y="196" width="18" height="134" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" filter="url(#rough2)"/>
    <text x="609" y="190" text-anchor="middle" font-size="8" fill="#4a7a3a">.64</text>
    <text x="568" y="346" text-anchor="middle" font-size="8" fill="#888">输出概率</text>
    <text x="475" y="346" text-anchor="middle" font-size="8" fill="#888">输入 logits</text>
  </g>

  <!-- ===== Properties ===== -->
  <line x1="20" y1="362" x2="620" y2="362" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="384" font-size="12" fill="#444" font-weight="bold">三大关键性质</text>

  <!-- property 1 -->
  <rect x="30" y="394" width="186" height="64" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.1" rx="6" filter="url(#rough2)"/>
  <text x="44" y="414" font-size="11" fill="#4a7a3a" font-weight="bold">① 输出和为 1</text>
  <text x="44" y="432" font-size="9" fill="#555">Σ y_i = Σ exp(x_i)/Σexp = 1</text>
  <text x="44" y="448" font-size="9" fill="#555">→ 可解释为概率分布</text>

  <!-- property 2 -->
  <rect x="227" y="394" width="186" height="64" fill="#e8f0fe" stroke="#446688" stroke-width="1.1" rx="6" filter="url(#rough2)"/>
  <text x="241" y="414" font-size="11" fill="#446688" font-weight="bold">② 平移不变性</text>
  <text x="241" y="432" font-size="9" fill="#555">softmax(x + c) = softmax(x)</text>
  <text x="241" y="448" font-size="9" fill="#555">→ 减 max 不改变结果（safe softmax）</text>

  <!-- property 3 -->
  <rect x="424" y="394" width="186" height="64" fill="#fce4ec" stroke="#b85450" stroke-width="1.1" rx="6" filter="url(#rough2)"/>
  <text x="438" y="414" font-size="11" fill="#b85450" font-weight="bold">③ 温度缩放</text>
  <text x="438" y="432" font-size="9" fill="#555">softmax(x / T)：T↑更平，T↓更陡</text>
  <text x="438" y="448" font-size="9" fill="#555">→ 控制分布锐度</text>

  <!-- ===== Usage ===== -->
  <rect x="30" y="472" width="580" height="56" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="44" y="492" font-size="11" fill="#d6a040" font-weight="bold">深度学习中的用途：</text>
  <text x="60" y="510" font-size="10" fill="#555">• 分类输出层：logits → 类别概率（交叉熵损失的标配前置）</text>
  <text x="60" y="524" font-size="10" fill="#555">• Attention 权重：QK^T 的 score → 对每个 key 的注意力分布（本题 row-wise softmax 的直接应用）</text>
</svg>
