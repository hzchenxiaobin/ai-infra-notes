<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#fdfcf7"/>

  <text x="440" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Top K Selection：bitonic 排序 + 取前 k</text>
  <path d="M 280 40 Q 440 48 600 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- input array -->
  <text x="60" y="74" font-size="12" font-weight="bold" fill="#2b6e9e">① 输入 input[]（N=8, k=3）</text>
  <g filter="url(#sk)">
    <rect x="60" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="116" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="172" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="228" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="284" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="340" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="396" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
    <rect x="452" y="84" width="56" height="36" rx="4" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.3"/>
  </g>
  <text x="88" y="107" text-anchor="middle" font-size="12" fill="#333">5</text>
  <text x="144" y="107" text-anchor="middle" font-size="12" fill="#333">2</text>
  <text x="200" y="107" text-anchor="middle" font-size="12" fill="#333">8</text>
  <text x="256" y="107" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="312" y="107" text-anchor="middle" font-size="12" fill="#333">9</text>
  <text x="368" y="107" text-anchor="middle" font-size="12" fill="#333">3</text>
  <text x="424" y="107" text-anchor="middle" font-size="12" fill="#333">7</text>
  <text x="480" y="107" text-anchor="middle" font-size="12" fill="#333">4</text>

  <path d="M 280 126 L 280 148" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- bitonic sort stages -->
  <text x="60" y="164" font-size="12" font-weight="bold" fill="#7a5415">② bitonic 排序（并行，O(log²N) 步）</text>

  <g filter="url(#sk)">
    <rect x="60" y="174" width="448" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="284" y="199" text-anchor="middle" font-size="11" fill="#7a5415">步 1: 相邻对比较交换 → [2,5,1,8,3,9,4,7]</text>

  <g filter="url(#sk)">
    <rect x="60" y="220" width="448" height="40" rx="4" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.2"/>
  </g>
  <text x="284" y="245" text-anchor="middle" font-size="11" fill="#7a5415">步 2: 4 元 bitonic merge → [1,2,5,8,3,4,7,9]</text>

  <g filter="url(#sk)">
    <rect x="60" y="266" width="448" height="40" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.4"/>
  </g>
  <text x="284" y="291" text-anchor="middle" font-size="11" fill="#2e6e2e" font-weight="bold">步 3: 8 元 bitonic merge → [1,2,3,4,5,7,8,9]（升序）</text>

  <path d="M 280 310 L 280 326" stroke="#5a5a5a" stroke-width="1.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- output top k -->
  <text x="60" y="346" font-size="12" font-weight="bold" fill="#2e6e2e">③ 取后 k=3 个（最大）：[7, 8, 9]</text>
  <g filter="url(#sk)">
    <rect x="340" y="332" width="56" height="36" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
    <rect x="396" y="332" width="56" height="36" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
    <rect x="452" y="332" width="56" height="36" rx="4" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="368" y="355" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">7</text>
  <text x="424" y="355" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">8</text>
  <text x="480" y="355" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">9</text>

  <!-- P99 analogy -->
  <g filter="url(#sk)">
    <rect x="540" y="174" width="300" height="194" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-dasharray="5 3"/>
  </g>
  <text x="690" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">类比：P99 latency</text>
  <text x="560" y="220" font-size="10" fill="#444">N=100 个请求的 latency</text>
  <text x="560" y="238" font-size="10" fill="#444">P99 = 第 99 大的 latency</text>
  <text x="560" y="256" font-size="10" fill="#2e6e2e">= top-k selection (k=1)</text>
  <text x="560" y="284" font-size="10" fill="#7a5415">串行：排序后取 int(N×0.99) 位</text>
  <text x="560" y="302" font-size="10" fill="#7a5415">并行：bitonic sort + 取前 k</text>
  <text x="560" y="328" font-size="10" fill="#b85450">百万级请求的 P99 统计用 GPU</text>
  <text x="560" y="346" font-size="10" fill="#b85450">加速 → bitonic sort</text>
</svg>
