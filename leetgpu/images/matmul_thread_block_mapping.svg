<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="960" height="580" fill="#fdfcf7"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Thread / Block 映射：一个 Block 负责 C 的一个 TILE</text>
  <path d="M 280 42 Q 480 50 680 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- ===== Left: C matrix divided into 3x3 tiles ===== -->
  <text x="240" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">C 矩阵 (M×N) 按 TILE 划分给 block</text>
  <g filter="url(#sk)">
    <rect x="80" y="92" width="320" height="320" fill="none" stroke="#2b2b2b" stroke-width="2"/>
  </g>
  <!-- tile grid 3x3, each tile 106.67 x 106.67 -->
  <g stroke="#bdbdbd" stroke-width="1.2" filter="url(#sk)">
    <line x1="80" y1="199" x2="400" y2="199"/>
    <line x1="80" y1="305" x2="400" y2="305"/>
    <line x1="187" y1="92" x2="187" y2="412"/>
    <line x1="293" y1="92" x2="293" y2="412"/>
  </g>
  <!-- tile labels with alternating wash -->
  <g font-size="11" fill="#2b2b2b" font-weight="bold">
    <g filter="url(#sk)"><rect x="80" y="92" width="107" height="107" fill="#eeeeee" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="133" y="149" text-anchor="middle">Block</text><text x="133" y="164" text-anchor="middle">(0,0)</text>

    <g filter="url(#sk)"><rect x="187" y="92" width="106" height="107" fill="#f6f6f6" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="240" y="149" text-anchor="middle">Block</text><text x="240" y="164" text-anchor="middle">(1,0)</text>

    <g filter="url(#sk)"><rect x="293" y="92" width="107" height="107" fill="#eeeeee" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="346" y="149" text-anchor="middle">Block</text><text x="346" y="164" text-anchor="middle">(2,0)</text>

    <g filter="url(#sk)"><rect x="80" y="199" width="107" height="106" fill="#f6f6f6" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="133" y="256" text-anchor="middle">Block</text><text x="133" y="271" text-anchor="middle">(0,1)</text>

    <!-- highlight center block (1,1) -->
    <g filter="url(#sk)"><rect x="187" y="199" width="106" height="106" fill="#fef3c7" opacity="0.8" stroke="#c98a2b" stroke-width="2"/></g>
    <text x="240" y="256" text-anchor="middle" fill="#7a5415">Block</text><text x="240" y="271" text-anchor="middle" fill="#7a5415">(1,1)</text>

    <g filter="url(#sk)"><rect x="293" y="199" width="107" height="106" fill="#f6f6f6" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="346" y="256" text-anchor="middle">Block</text><text x="346" y="271" text-anchor="middle">(2,1)</text>

    <g filter="url(#sk)"><rect x="80" y="305" width="107" height="107" fill="#eeeeee" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="133" y="362" text-anchor="middle">Block</text><text x="133" y="377" text-anchor="middle">(0,2)</text>

    <g filter="url(#sk)"><rect x="187" y="305" width="106" height="107" fill="#f6f6f6" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="240" y="362" text-anchor="middle">Block</text><text x="240" y="377" text-anchor="middle">(1,2)</text>

    <g filter="url(#sk)"><rect x="293" y="305" width="107" height="107" fill="#eeeeee" opacity="0.5" stroke="#bdbdbd" stroke-width="0.8"/></g>
    <text x="346" y="362" text-anchor="middle">Block</text><text x="346" y="377" text-anchor="middle">(2,2)</text>
  </g>

  <!-- arrow from center block to zoom -->
  <path d="M 346 252 Q 470 240 590 250" stroke="#3a3a3a" stroke-width="2.4" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>

  <!-- ===== Right: zoom into Block (1,1) ===== -->
  <text x="770" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Block (1,1) 内部：TILE_SIZE×TILE_SIZE 线程</text>
  <g filter="url(#sk)">
    <rect x="600" y="92" width="320" height="320" fill="none" stroke="#2b2b2b" stroke-width="2"/>
  </g>
  <!-- 4x4 thread grid inside the block -->
  <g stroke="#d4d4d4" stroke-width="0.9" filter="url(#sk)">
    <line x1="600" y1="172" x2="920" y2="172"/>
    <line x1="600" y1="252" x2="920" y2="252"/>
    <line x1="600" y1="332" x2="920" y2="332"/>
    <line x1="680" y1="92" x2="680" y2="412"/>
    <line x1="760" y1="92" x2="760" y2="412"/>
    <line x1="840" y1="92" x2="840" y2="412"/>
  </g>
  <!-- thread cells -->
  <g font-size="9" fill="#fff" font-weight="bold">
    <g filter="url(#sk)"><rect x="600" y="92" width="80" height="80" fill="#3a7d8c" opacity="0.7" stroke="#fff" stroke-width="1"/></g>
    <text x="640" y="128" text-anchor="middle">T(0,0)</text>
    <text x="640" y="142" text-anchor="middle" font-size="8">C[r][c]</text>

    <g filter="url(#sk)"><rect x="680" y="92" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="720" y="128" text-anchor="middle">T(0,1)</text>

    <g filter="url(#sk)"><rect x="760" y="92" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="800" y="128" text-anchor="middle">T(0,2)</text>

    <g filter="url(#sk)"><rect x="840" y="92" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="880" y="128" text-anchor="middle">T(0,3)</text>

    <g filter="url(#sk)"><rect x="600" y="172" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="640" y="208" text-anchor="middle">T(1,0)</text>

    <!-- highlight center thread (1,1) -->
    <g filter="url(#sk)"><rect x="680" y="172" width="80" height="80" fill="#c98a2b" opacity="0.85" stroke="#fff" stroke-width="1.4"/></g>
    <text x="720" y="208" text-anchor="middle">T(1,1)</text>
    <text x="720" y="222" text-anchor="middle" font-size="8">C[r][c]</text>

    <g filter="url(#sk)"><rect x="760" y="172" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="800" y="208" text-anchor="middle">T(1,2)</text>

    <g filter="url(#sk)"><rect x="840" y="172" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="880" y="208" text-anchor="middle">T(1,3)</text>

    <g filter="url(#sk)"><rect x="600" y="252" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="640" y="288" text-anchor="middle">T(2,0)</text>
    <g filter="url(#sk)"><rect x="680" y="252" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="720" y="288" text-anchor="middle">T(2,1)</text>
    <g filter="url(#sk)"><rect x="760" y="252" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="800" y="288" text-anchor="middle">T(2,2)</text>
    <g filter="url(#sk)"><rect x="840" y="252" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="880" y="288" text-anchor="middle">T(2,3)</text>

    <g filter="url(#sk)"><rect x="600" y="332" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="640" y="368" text-anchor="middle">T(3,0)</text>
    <g filter="url(#sk)"><rect x="680" y="332" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="720" y="368" text-anchor="middle">T(3,1)</text>
    <g filter="url(#sk)"><rect x="760" y="332" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="800" y="368" text-anchor="middle">T(3,2)</text>
    <g filter="url(#sk)"><rect x="840" y="332" width="80" height="80" fill="#3a7d8c" opacity="0.6" stroke="#fff" stroke-width="1"/></g>
    <text x="880" y="368" text-anchor="middle">T(3,3)</text>
  </g>

  <!-- formula box -->
  <g filter="url(#sk)">
    <rect x="120" y="450" width="720" height="100" rx="10" fill="#fef3c7" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="140" y="476" font-size="13" fill="#2b2b2b" font-family="monospace">row = blockIdx.y × TILE_SIZE + threadIdx.y</text>
  <text x="140" y="498" font-size="13" fill="#2b2b2b" font-family="monospace">col = blockIdx.x × TILE_SIZE + threadIdx.x</text>
  <text x="140" y="524" font-size="12" fill="#7a5415" font-weight="bold">每个线程负责 C[row][col] 的最终累加结果</text>
  <text x="140" y="542" font-size="10" fill="#888" font-style="italic">grid = (N/TILE, M/TILE)，block = (TILE, TILE)（二维）</text>
</svg>
