<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="'Comic Sans MS','Marker Felt','Segoe UI','Kaiti SC',楷体,cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="43" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="940" height="460" fill="#fdfcf7"/>

  <text x="470" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#2b2b2b">Tiled 数据复用：reference 点载入 shared，256 thread 共享</text>
  <path d="M 250 42 Q 470 50 690 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- query points (per thread) -->
  <text x="40" y="78" font-size="12" font-weight="bold" fill="#2b6e9e">Query 点（每 thread 一个 i）</text>
  <g filter="url(#sk)">
    <rect x="40" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="70" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="100" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="130" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="160" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
    <rect x="190" y="88" width="30" height="24" rx="3" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.1"/>
  </g>
  <text x="55" y="104" text-anchor="middle" font-size="8" fill="#2b6e9e">t0</text>
  <text x="85" y="104" text-anchor="middle" font-size="8" fill="#2b6e9e">t1</text>
  <text x="115" y="104" text-anchor="middle" font-size="8" fill="#2b6e9e">t2</text>
  <text x="145" y="104" text-anchor="middle" font-size="8" fill="#888">...</text>
  <text x="175" y="104" text-anchor="middle" font-size="8" fill="#2b6e9e">t254</text>
  <text x="205" y="104" text-anchor="middle" font-size="8" fill="#2b6e9e">t255</text>
  <text x="40" y="124" font-size="9" fill="#888">block 内 256 thread 各持一个 query</text>

  <!-- shared memory tile -->
  <text x="350" y="78" font-size="12" font-weight="bold" fill="#7a5415">Shared memory tile（256 个 reference 点）</text>
  <g filter="url(#sk)">
    <rect x="350" y="92" width="380" height="40" rx="6" fill="#fff8e1" stroke="#d6a040" stroke-width="1.4"/>
  </g>
  <text x="540" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a5415">shared_pts[256][3]  (3 KB)</text>
  <text x="540" y="124" text-anchor="middle" font-size="9" fill="#888">block 协作加载 global[tile_base .. tile_base+256] → shared</text>

  <!-- load arrow -->
  <path d="M 350 60 Q 300 70 270 80" stroke="#5a5a5a" stroke-width="1.2" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="300" y="58" font-size="9" fill="#7a5415">协作加载（每 thread 载 1 点）</text>

  <!-- tile loop -->
  <text x="40" y="160" font-size="13" font-weight="bold" fill="#2b2b2b">Tile 循环：遍历所有 reference 点分块</text>

  <g filter="url(#sk)">
    <rect x="40" y="172" width="200" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
    <rect x="250" y="172" width="200" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
    <rect x="460" y="172" width="200" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
    <rect x="670" y="172" width="220" height="40" rx="5" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2"/>
  </g>
  <text x="140" y="196" text-anchor="middle" font-size="11" fill="#7a5415">tile 0 [0..255]</text>
  <text x="350" y="196" text-anchor="middle" font-size="11" fill="#7a5415">tile 1 [256..511]</text>
  <text x="560" y="196" text-anchor="middle" font-size="11" fill="#7a5415">tile 2 [512..767]</text>
  <text x="780" y="196" text-anchor="middle" font-size="11" fill="#7a5415">... tile N/256-1</text>

  <!-- per-thread compute -->
  <text x="40" y="240" font-size="12" font-weight="bold" fill="#2e6e2e">每 thread 对当前 tile 内 256 点算距离 + 更新 argmin</text>
  <g filter="url(#sk)">
    <rect x="40" y="252" width="850" height="60" rx="6" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.2"/>
  </g>
  <text x="60" y="274" font-size="11" fill="#444">for k in [0,256):</text>
  <text x="100" y="290" font-size="11" fill="#444">d = (qx - sx[k])² + (qy - sy[k])² + (qz - sz[k])²</text>
  <text x="100" y="306" font-size="11" fill="#444">if d &lt; min_dist:  min_dist = d;  min_idx = tile_base + k   // 跳过 j==i</text>

  <!-- sync points -->
  <text x="40" y="340" font-size="12" font-weight="bold" fill="#b85450">同步屏障（两个 __syncthreads）</text>
  <g filter="url(#sk)">
    <rect x="40" y="352" width="415" height="80" rx="6" fill="#fff5f5" stroke="#b85450" stroke-width="1.1"/>
  </g>
  <text x="55" y="374" font-size="11" font-weight="bold" fill="#b85450">① 加载后 __syncthreads()</text>
  <text x="55" y="392" font-size="10" fill="#444">等所有 thread 把 global 点写入 shared</text>
  <text x="55" y="408" font-size="10" fill="#444">否则后续读 shared 会读到未初始化数据</text>
  <text x="55" y="424" font-size="10" fill="#888">作用域：block 内 256 thread</text>

  <g filter="url(#sk)">
    <rect x="475" y="352" width="415" height="80" rx="6" fill="#fff5f5" stroke="#b85450" stroke-width="1.1"/>
  </g>
  <text x="490" y="374" font-size="11" font-weight="bold" fill="#b85450">② 计算后 __syncthreads()</text>
  <text x="490" y="392" font-size="10" fill="#444">等所有 thread 完成距离计算再加载下个 tile</text>
  <text x="490" y="408" font-size="10" fill="#444">否则会覆盖 shared 影响慢 thread</text>
  <text x="490" y="424" font-size="10" fill="#888">保证 tile 间不互相干扰</text>
</svg>
