<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#d6a040"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b85450"/>
    </marker>
  </defs>

  <rect width="640" height="560" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Kernel 2 inter_block_reduce：求全局偏移 + 加回</text>
  <text x="320" y="44" text-anchor="middle" font-size="11" fill="#888">每 block b 独立读 g_block_sum[0..b-1]，tree reduce 求和后 output[offset] += val</text>

  <!-- ===== g_block_sum array ===== -->
  <text x="30" y="74" font-size="11" fill="#d6a040" font-weight="bold">g_block_sum[]（来自 Kernel 1）</text>
  <g font-size="11" fill="#d6a040" font-weight="bold">
    <rect x="160" y="60" width="56" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="188" y="76" text-anchor="middle">11</text>
    <rect x="220" y="60" width="56" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="248" y="76" text-anchor="middle">15</text>
    <rect x="280" y="60" width="56" height="24" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="3" filter="url(#rough2)"/>
    <text x="308" y="76" text-anchor="middle">16</text>
  </g>
  <text x="188" y="98" text-anchor="middle" font-size="9" fill="#888">S0 (block 0 总和)</text>
  <text x="248" y="98" text-anchor="middle" font-size="9" fill="#888">S1 (block 1 总和)</text>
  <text x="308" y="98" text-anchor="middle" font-size="9" fill="#888">S2 (block 2 总和)</text>

  <!-- ===== Read matrix header ===== -->
  <line x1="20" y1="110" x2="620" y2="110" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="128" font-size="11" fill="#446688" font-weight="bold">每 block 的 grid-stride 读取模式（size = blockIdx.x）</text>

  <!-- Column headers -->
  <text x="100" y="146" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">读取 g_block_sum</text>
  <text x="300" y="146" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">tree reduce</text>
  <text x="500" y="146" text-anchor="middle" font-size="10" fill="#888" font-weight="bold">val（全局偏移）</text>

  <!-- ===== Block 0 row ===== -->
  <text x="30" y="172" font-size="10" fill="#446688" font-weight="bold">Block 0</text>
  <text x="80" y="172" font-size="10" fill="#888">size=0</text>
  <!-- reads: nothing -->
  <rect x="160" y="158" width="176" height="22" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
  <text x="248" y="173" text-anchor="middle" font-size="10" fill="#aaa">— 不读任何 entry —</text>
  <!-- arrow -->
  <path d="M 340 169 L 375 169" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <!-- val -->
  <rect x="380" y="158" width="56" height="22" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="408" y="173" text-anchor="middle" font-size="11" fill="#888">0</text>
  <path d="M 440 169 L 475 169" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arrR)" filter="url(#rough2)"/>
  <text x="500" y="173" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">val = 0</text>

  <!-- ===== Block 1 row ===== -->
  <text x="30" y="206" font-size="10" fill="#446688" font-weight="bold">Block 1</text>
  <text x="80" y="206" font-size="10" fill="#888">size=1</text>
  <!-- reads: g_block_sum[0] -->
  <rect x="160" y="192" width="56" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="188" y="207" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">11</text>
  <rect x="220" y="192" width="56" height="22" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
  <text x="280" y="192" width="56" height="22" font-size="9" fill="#aaa" text-anchor="middle">—</text>
  <rect x="280" y="192" width="56" height="22" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
  <path d="M 340 203 L 375 203" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <!-- tree reduce: just one value, trivial -->
  <text x="300" y="207" text-anchor="middle" font-size="9" fill="#888">(单值，无需 reduce)</text>
  <rect x="380" y="192" width="56" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="408" y="207" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">11</text>
  <path d="M 440 203 L 475 203" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arrR)" filter="url(#rough2)"/>
  <text x="500" y="207" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">val = S0 = 11</text>

  <!-- ===== Block 2 row ===== -->
  <text x="30" y="240" font-size="10" fill="#446688" font-weight="bold">Block 2</text>
  <text x="80" y="240" font-size="10" fill="#888">size=2</text>
  <!-- reads: g_block_sum[0..1] -->
  <rect x="160" y="226" width="56" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="188" y="241" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">11</text>
  <rect x="220" y="226" width="56" height="22" fill="#fff8e1" stroke="#d6a040" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
  <text x="248" y="241" text-anchor="middle" font-size="10" fill="#d6a040" font-weight="bold">15</text>
  <rect x="280" y="226" width="56" height="22" fill="#f6f6f6" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" rx="3" filter="url(#rough2)"/>
  <path d="M 340 237 L 375 237" stroke="#888" stroke-width="1" fill="none" marker-end="url(#arr)" filter="url(#rough2)"/>
  <!-- tree reduce: 11 + 15 = 26 -->
  <text x="300" y="241" text-anchor="middle" font-size="9" fill="#4a7a3a" font-weight="bold">11 + 15 = 26</text>
  <rect x="380" y="226" width="56" height="22" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1" rx="3" filter="url(#rough2)"/>
  <text x="408" y="241" text-anchor="middle" font-size="11" fill="#4a7a3a" font-weight="bold">26</text>
  <path d="M 440 237 L 475 237" stroke="#b85450" stroke-width="1" fill="none" marker-end="url(#arrR)" filter="url(#rough2)"/>
  <text x="500" y="241" text-anchor="middle" font-size="11" fill="#b85450" font-weight="bold">val = S0+S1 = 26</text>

  <!-- ===== O(B²) triangle annotation ===== -->
  <path d="M 188 252 L 188 266 L 248 266 L 248 266" stroke="#d6a040" stroke-width="1" fill="none" stroke-dasharray="2,2" filter="url(#rough2)"/>
  <text x="320" y="264" font-size="9" fill="#d6a040">↑ 总读取量 = B(B-1)/2 = O(B²)（三角读取模式）</text>

  <!-- ===== Add-back section ===== -->
  <line x1="20" y1="278" x2="620" y2="278" stroke="#eee" stroke-width="1" filter="url(#rough2)"/>
  <text x="30" y="298" font-size="11" fill="#b85450" font-weight="bold">加回：output[offset] += val</text>
  <text x="250" y="298" font-size="10" fill="#555">（每线程一次加法，无需重读 input）</text>

  <!-- Block 0 add-back -->
  <text x="30" y="324" font-size="10" fill="#446688" font-weight="bold">Block 0:</text>
  <text x="80" y="324" font-size="10" fill="#555">output += 0 →</text>
  <g font-size="9" fill="#333">
    <rect x="170" y="312" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="186" y="326" text-anchor="middle">3</text>
    <rect x="202" y="312" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="218" y="326" text-anchor="middle">4</text>
    <rect x="234" y="312" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="250" y="326" text-anchor="middle">11</text>
    <rect x="266" y="312" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1" rx="3" filter="url(#rough2)"/>
    <text x="282" y="326" text-anchor="middle">11</text>
  </g>

  <!-- Block 1 add-back -->
  <text x="30" y="354" font-size="10" fill="#446688" font-weight="bold">Block 1:</text>
  <text x="80" y="354" font-size="10" fill="#555">output += 11 →</text>
  <g font-size="9" fill="#333">
    <rect x="170" y="342" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="186" y="356" text-anchor="middle">15</text>
    <rect x="202" y="342" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="218" y="356" text-anchor="middle">17</text>
    <rect x="234" y="342" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="250" y="356" text-anchor="middle">23</text>
    <rect x="266" y="342" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.5" rx="3" filter="url(#rough2)"/>
    <text x="282" y="356" text-anchor="middle">26</text>
  </g>
  <text x="310" y="356" font-size="9" fill="#888">= [4,6,12,15] + 11</text>

  <!-- Block 2 add-back -->
  <text x="30" y="384" font-size="10" fill="#446688" font-weight="bold">Block 2:</text>
  <text x="80" y="384" font-size="10" fill="#555">output += 26 →</text>
  <g font-size="9" fill="#333">
    <rect x="170" y="372" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="186" y="386" text-anchor="middle">28</text>
    <rect x="202" y="372" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="218" y="386" text-anchor="middle">33</text>
    <rect x="234" y="372" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="250" y="386" text-anchor="middle">34</text>
    <rect x="266" y="372" width="32" height="20" fill="#fce4ec" stroke="#b85450" stroke-width="1.8" rx="3" filter="url(#rough2)"/>
    <text x="282" y="386" text-anchor="middle">42</text>
  </g>
  <text x="310" y="386" font-size="9" fill="#888">= [2,7,8,16] + 26</text>

  <text x="320" y="408" text-anchor="middle" font-size="10" fill="#b85450" font-weight="bold">最终 output = 全局 inclusive prefix sum ✓</text>

  <!-- ===== Code box ===== -->
  <rect x="20" y="420" width="600" height="66" fill="#f6f6f6" stroke="#ccc" stroke-width="1" rx="4" filter="url(#rough2)"/>
  <text x="34" y="438" font-family="monospace" font-size="9.5" fill="#333">int size = blockIdx.x;  // 当前 block 只需读前面 size 个 block 的总和</text>
  <text x="34" y="452" font-family="monospace" font-size="9.5" fill="#333">for (int i = tid; i &lt; size; i += THREAD_PER_BLOCK)  val += g_block_sum[i];  // grid-stride</text>
  <text x="34" y="466" font-family="monospace" font-size="9.5" fill="#333">smem[tid] = val;  __syncthreads();</text>
  <text x="34" y="480" font-family="monospace" font-size="9.5" fill="#b85450">for (int i = TILE/2; i &gt;= 1; i /= 2) { if (tid &lt; i) smem[tid] += smem[tid+i]; __syncthreads(); }  // tree reduce</text>

  <!-- ===== O(B²) vs O(B) comparison ===== -->
  <rect x="20" y="498" width="290" height="50" fill="#fff8e1" stroke="#d6a040" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="34" y="516" font-size="10" fill="#d6a040" font-weight="bold">presum.cu：O(B²) 总读取</text>
  <text x="34" y="532" font-size="9" fill="#555">每 block 独立读 g_block_sum[0..b-1]</text>
  <text x="34" y="545" font-size="9" fill="#555">B=1024 时 ~50 万次读（~2MB），可接受</text>

  <rect x="330" y="498" width="290" height="50" fill="#e6f4ea" stroke="#4a7a3a" stroke-width="1.2" rx="6" filter="url(#rough2)"/>
  <text x="344" y="516" font-size="10" fill="#4a7a3a" font-weight="bold">三阶段方案：O(B) 总读取</text>
  <text x="344" y="532" font-size="9" fill="#555">单 block grid-stride scan，线性读取</text>
  <text x="344" y="545" font-size="9" fill="#555">但需额外 block_offsets 写+读 + 重读 input</text>
</svg>
