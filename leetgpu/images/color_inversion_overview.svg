<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Comic Sans MS', 'Segoe UI', 'Kaiti SC', 楷体, cursive">
  <defs>
    <filter id="rough2">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="13"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="640" height="400" fill="#fafafa"/>

  <text x="320" y="26" text-anchor="middle" font-size="15" fill="#444" font-weight="bold">Color Inversion：RGB 反转，Alpha 保留</text>

  <!-- ===== Top: single pixel transform ===== -->
  <text x="40" y="58" font-size="12" fill="#446688" font-weight="bold">单像素变换（RGBA = 4 字节）</text>

  <!-- input pixel -->
  <text x="40" y="92" font-size="11" fill="#666">输入像素:</text>
  <g font-size="11" fill="#333">
    <rect x="110" y="74" width="50" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="135" y="88" text-anchor="middle" font-size="9" fill="#b85450">R</text>
    <text x="135" y="102" text-anchor="middle">200</text>

    <rect x="160" y="74" width="50" height="36" fill="#e8f5e9" stroke="#4a7a3a" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="185" y="88" text-anchor="middle" font-size="9" fill="#4a7a3a">G</text>
    <text x="185" y="102" text-anchor="middle">100</text>

    <rect x="210" y="74" width="50" height="36" fill="#e3f2fd" stroke="#446688" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="235" y="88" text-anchor="middle" font-size="9" fill="#446688">B</text>
    <text x="235" y="102" text-anchor="middle">50</text>

    <rect x="260" y="74" width="50" height="36" fill="#f5f5f5" stroke="#888" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="285" y="88" text-anchor="middle" font-size="9" fill="#888">A</text>
    <text x="285" y="102" text-anchor="middle">255</text>
  </g>

  <!-- arrow -->
  <text x="345" y="98" text-anchor="middle" font-size="13" fill="#d6a040" font-weight="bold">→ 255 - x</text>

  <!-- output pixel -->
  <text x="410" y="92" font-size="11" fill="#666">输出像素:</text>
  <g font-size="11" fill="#333">
    <rect x="480" y="74" width="50" height="36" fill="#fce4ec" stroke="#b85450" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="505" y="88" text-anchor="middle" font-size="9" fill="#b85450">R</text>
    <text x="505" y="102" text-anchor="middle">55</text>

    <rect x="530" y="74" width="50" height="36" fill="#e8f5e9" stroke="#4a7a3a" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="555" y="88" text-anchor="middle" font-size="9" fill="#4a7a3a">G</text>
    <text x="555" y="102" text-anchor="middle">155</text>

    <rect x="580" y="74" width="50" height="36" fill="#e3f2fd" stroke="#446688" stroke-width="1.3" rx="3" filter="url(#rough2)"/>
    <text x="605" y="88" text-anchor="middle" font-size="9" fill="#446688">B</text>
    <text x="605" y="102" text-anchor="middle">205</text>
  </g>

  <!-- A kept note -->
  <text x="510" y="132" text-anchor="middle" font-size="10" fill="#888" font-style="italic">（A 通道不在反转范围，保持 255）</text>

  <!-- ===== Middle: uchar4 vectorized access ===== -->
  <rect x="30" y="150" width="580" height="100" fill="#fff8e1" stroke="#d6a040" stroke-width="1.3" rx="8" filter="url(#rough2)"/>
  <text x="320" y="174" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">uchar4 向量化访存：1 thread → 1 像素（4 字节）</text>

  <g font-size="10" fill="#555">
    <text x="50" y="198">朴素版：6 次单字节访存（3 读 + 3 写），指令数多</text>
    <text x="50" y="216" font-family="monospace" fill="#b85450">uchar4 px = ((uchar4*)image)[p];</text>
    <text x="50" y="232" font-family="monospace" fill="#4a7a3a">px.x=255-px.x; px.y=255-px.y; px.z=255-px.z;</text>
    <text x="50" y="246" font-family="monospace" fill="#446688">((uchar4*)image)[p] = px;</text>
    <text x="380" y="216" fill="#888">→ 2 次访存（1 读 + 1 写）</text>
    <text x="380" y="232" fill="#2e6e2e" font-weight="bold">32-bit load/store 指令</text>
  </g>

  <!-- ===== Bottom: grid-stride + memory-bound ===== -->
  <rect x="30" y="270" width="280" height="110" fill="#e8f0fe" stroke="#446688" stroke-width="1.2" rx="8" filter="url(#rough2)"/>
  <text x="170" y="292" text-anchor="middle" font-size="12" fill="#446688" font-weight="bold">并行策略</text>
  <g font-size="10" fill="#555">
    <text x="50" y="312">1 thread → 1 像素</text>
    <text x="50" y="328">grid-stride loop 覆盖</text>
    <text x="50" y="344">width × height 个像素</text>
    <text x="50" y="364" fill="#446688" font-weight="bold">连续 thread → 连续像素 → coalesced</text>
  </g>

  <rect x="330" y="270" width="280" height="110" fill="#eaf6ee" stroke="#4a7a3a" stroke-width="1.2" rx="8" filter="url(#rough2)"/>
  <text x="470" y="292" text-anchor="middle" font-size="12" fill="#4a7a3a" font-weight="bold">性能特征</text>
  <g font-size="10" fill="#555">
    <text x="350" y="312">每像素：3 次减法 / 8 字节访存</text>
    <text x="350" y="328">算术强度 ≈ 0.375 OP/B</text>
    <text x="350" y="346" fill="#b85450" font-weight="bold">严重 memory-bound</text>
    <text x="350" y="364" fill="#888">4096×5120 ≈ 80 MB，in-place</text>
  </g>
</svg>
