<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360">
  <rect width="720" height="360" fill="#1a1a2e" rx="12"/>
  <text x="360" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#e0e0e0">Sliding Window Self-Attention</text>
  <text x="360" y="60" text-anchor="middle" font-size="13" fill="#aaa">每个 query 只看左侧 W 个 key，复杂度从 O(N²) 降到 O(N·W)</text>

  <!-- sequence positions -->
  <g transform="translate(80,100)">
    <rect x="0" y="0" width="40" height="40" fill="#4fc3f7" stroke="#0277bd" rx="4"/>
    <text x="20" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">0</text>
    <rect x="50" y="0" width="40" height="40" fill="#4fc3f7" stroke="#0277bd" rx="4"/>
    <text x="70" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">1</text>
    <rect x="100" y="0" width="40" height="40" fill="#4fc3f7" stroke="#0277bd" rx="4"/>
    <text x="120" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">2</text>
    <rect x="150" y="0" width="40" height="40" fill="#4fc3f7" stroke="#0277bd" rx="4"/>
    <text x="170" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">3</text>
    <rect x="200" y="0" width="40" height="40" fill="#4fc3f7" stroke="#0277bd" rx="4"/>
    <text x="220" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a237e">4</text>
    <rect x="250" y="0" width="40" height="40" fill="#ff7043" stroke="#d84315" rx="4"/>
    <text x="270" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">5</text>

    <text x="145" y="70" text-anchor="middle" font-size="13" fill="#e0e0e0">序列位置 i（示例：N=6，W=3）</text>
  </g>

  <!-- arrows for window of position 5 -->
  <g transform="translate(80,100)">
    <line x1="270" y1="45" x2="270" y2="120" stroke="#ffd54f" stroke-width="2"/>
    <line x1="270" y1="120" x2="220" y2="120" stroke="#ffd54f" stroke-width="2" marker-end="url(#arrow-yellow)"/>
    <line x1="270" y1="120" x2="170" y2="120" stroke="#ffd54f" stroke-width="2" marker-end="url(#arrow-yellow)"/>
    <text x="270" y="150" text-anchor="middle" font-size="13" fill="#ffd54f">位置 5 只看窗口 [3,4,5]</text>
  </g>

  <!-- matrix highlight -->
  <g transform="translate(450,100)">
    <text x="0" y="-10" font-size="14" fill="#e0e0e0">Score 矩阵（局部）</text>
    <rect x="0" y="0" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="20" y="0" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="40" y="0" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="60" y="0" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="80" y="0" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="100" y="0" width="20" height="20" fill="#333" stroke="#555"/>

    <rect x="0" y="20" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="20" y="20" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="40" y="20" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="60" y="20" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="80" y="20" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="100" y="20" width="20" height="20" fill="#333" stroke="#555"/>

    <rect x="0" y="40" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="20" y="40" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="40" y="40" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="60" y="40" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="80" y="40" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="100" y="40" width="20" height="20" fill="#333" stroke="#555"/>

    <rect x="0" y="60" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="20" y="60" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="40" y="60" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="60" y="60" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="80" y="60" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="100" y="60" width="20" height="20" fill="#333" stroke="#555"/>

    <rect x="0" y="80" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="20" y="80" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="40" y="80" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="60" y="80" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="80" y="80" width="20" height="20" fill="#4fc3f7" stroke="#0277bd"/>
    <rect x="100" y="80" width="20" height="20" fill="#333" stroke="#555"/>

    <rect x="0" y="100" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="20" y="100" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="40" y="100" width="20" height="20" fill="#333" stroke="#555"/>
    <rect x="60" y="100" width="20" height="20" fill="#ff7043" stroke="#d84315"/>
    <rect x="80" y="100" width="20" height="20" fill="#ff7043" stroke="#d84315"/>
    <rect x="100" y="100" width="20" height="20" fill="#ff7043" stroke="#d84315"/>

    <text x="0" y="145" font-size="11" fill="#aaa">行=query 列=key</text>
    <text x="0" y="160" font-size="11" fill="#aaa">蓝色=有效值，灰色=忽略</text>
  </g>

  <text x="360" y="330" text-anchor="middle" font-size="13" fill="#aaa">长序列场景下窗口固定，显存/计算随 N 线性增长</text>

  <defs>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffd54f"/>
    </marker>
  </defs>
</svg>
