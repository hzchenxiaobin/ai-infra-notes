<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="360" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Occupancy 概念</text>

  <!-- SM slot -->
  <rect x="80" y="80" width="560" height="120" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="#2b2b2b">一个 SM 的 Warp 槽位（例如最大 32 个 warp）</text>

  <!-- Active warps -->
  <rect x="100" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="140" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="180" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="220" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="260" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="300" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="340" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <rect x="380" y="130" width="30" height="50" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>

  <!-- Empty slots -->
  <rect x="420" y="130" width="30" height="50" fill="#3a3a3a" stroke="#555555" stroke-width="2"/>
  <rect x="460" y="130" width="30" height="50" fill="#3a3a3a" stroke="#555555" stroke-width="2"/>
  <rect x="500" y="130" width="30" height="50" fill="#3a3a3a" stroke="#555555" stroke-width="2"/>
  <rect x="540" y="130" width="30" height="50" fill="#3a3a3a" stroke="#555555" stroke-width="2"/>

  <text x="240" y="205" text-anchor="middle" font-size="13" fill="#5cb86c" font-weight="bold">Active Warps = 8</text>
  <text x="500" y="205" text-anchor="middle" font-size="13" fill="#666666">Empty Slots = 4</text>

  <!-- Formula -->
  <rect x="80" y="240" width="560" height="80" rx="8" fill="#4a8edb" opacity="0.2" stroke="#6ab0ff" stroke-width="2"/>
  <text x="360" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#2b2b2b">Occupancy = 8 / 12 = 67%</text>
  <text x="360" y="305" text-anchor="middle" font-size="14" fill="#666666">实际中分母是 SM 支持的最大 warp 数</text>
  </g>
</svg>