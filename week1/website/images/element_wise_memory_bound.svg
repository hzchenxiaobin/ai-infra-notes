<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#0d1117"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#c9d1d9">Element-wise 操作为什么是纯 Memory-Bound</text>

  <!-- Roofline Chart -->
  <text x="80" y="70" font-size="14" font-weight="bold" fill="#58a6ff">Roofline 模型对比</text>

  <!-- Axes -->
  <line x1="80" y1="400" x2="680" y2="400" stroke="#8b949e" stroke-width="2" marker-end="url(#arrowR)"/>
  <line x1="80" y1="400" x2="80" y2="80" stroke="#8b949e" stroke-width="2"/>

  <text x="380" y="425" text-anchor="middle" font-size="12" fill="#c9d1d9">计算强度 (FLOP / Byte) →</text>
  <text x="55" y="240" text-anchor="middle" font-size="12" fill="#c9d1d9" transform="rotate(-90, 55, 240)">吞吐 →</text>

  <!-- Ridge point line -->
  <line x1="300" y1="400" x2="300" y2="150" stroke="#d29922" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="305" y="145" font-size="11" fill="#d29922">Ridge Point ≈ 12.6</text>
  <text x="305" y="160" font-size="10" fill="#8b949e">(A100: 19.5T / 1.55T)</text>

  <!-- Memory slope -->
  <line x1="80" y1="400" x2="300" y2="150" stroke="#58a6ff" stroke-width="2"/>
  <text x="130" y="330" font-size="12" fill="#58a6ff" font-weight="bold">带宽限制</text>

  <!-- Compute ceiling -->
  <line x1="300" y1="150" x2="680" y2="150" stroke="#3fb950" stroke-width="2"/>
  <text x="580" y="140" font-size="12" fill="#3fb950" font-weight="bold">算力峰值</text>

  <!-- Element-wise point -->
  <circle cx="95" cy="390" r="8" fill="#f85149"/>
  <text x="115" y="385" font-size="11" fill="#f85149" font-weight="bold">Element-wise</text>
  <text x="115" y="400" font-size="10" fill="#8b949e">AI ≈ 0.08</text>

  <!-- LayerNorm point -->
  <circle cx="100" cy="380" r="6" fill="#f85149"/>
  <text x="115" y="370" font-size="10" fill="#f85149">LayerNorm AI≈0.4</text>

  <!-- GEMM point -->
  <circle cx="600" cy="150" r="8" fill="#3fb950"/>
  <text x="580" y="170" text-anchor="middle" font-size="11" fill="#3fb950" font-weight="bold">GEMM</text>
  <text x="580" y="185" text-anchor="middle" font-size="10" fill="#8b949e">AI ≈ 715</text>

  <!-- Gap annotation -->
  <line x1="95" y1="250" x2="95" y2="380" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="45" y="320" font-size="10" fill="#f85149">99.3% 时间</text>
  <text x="45" y="335" font-size="10" fill="#f85149">在等数据</text>

  <!-- Comparison table -->
  <rect x="60" y="445" width="600" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="70" y="465" font-size="12" fill="#c9d1d9" font-weight="bold">操作</text>
  <text x="200" y="465" font-size="12" fill="#c9d1d9" font-weight="bold">FLOPs</text>
  <text x="300" y="465" font-size="12" fill="#c9d1d9" font-weight="bold">Bytes</text>
  <text x="400" y="465" font-size="12" fill="#c9d1d9" font-weight="bold">AI</text>
  <text x="500" y="465" font-size="12" fill="#c9d1d9" font-weight="bold">瓶颈</text>
  <text x="70" y="488" font-size="11" fill="#f85149">C=A+B</text>
  <text x="200" y="488" font-size="11" fill="#8b949e">1</text>
  <text x="300" y="488" font-size="11" fill="#8b949e">12</text>
  <text x="400" y="488" font-size="11" fill="#f85149">0.08</text>
  <text x="500" y="488" font-size="11" fill="#f85149">Memory</text>
  <text x="70" y="505" font-size="11" fill="#3fb950">GEMM 4096³</text>
  <text x="200" y="505" font-size="11" fill="#8b949e">137G</text>
  <text x="300" y="505" font-size="11" fill="#8b949e">192M</text>
  <text x="400" y="505" font-size="11" fill="#3fb950">715</text>
  <text x="500" y="505" font-size="11" fill="#3fb950">Compute</text>
</svg>