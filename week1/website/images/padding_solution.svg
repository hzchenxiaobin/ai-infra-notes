<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="420" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Padding 解决 Bank Conflict</text>

  <!-- Without padding -->
  <text x="180" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#e57373">❌ 无 Padding</text>
  <text x="180" y="95" text-anchor="middle" font-size="12" fill="#666666">float tile[32][32]</text>

  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="15" y="20" text-anchor="middle" font-size="9" fill="#fff">B0</text>
    <rect x="30" y="0" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="45" y="20" text-anchor="middle" font-size="9" fill="#fff">B1</text>
    <rect x="60" y="0" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="75" y="20" text-anchor="middle" font-size="9" fill="#fff">B2</text>
    <rect x="90" y="0" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="105" y="20" text-anchor="middle" font-size="9" fill="#fff">...</text>
    <rect x="120" y="0" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="135" y="20" text-anchor="middle" font-size="9" fill="#fff">B31</text>

    <rect x="0" y="30" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="15" y="50" text-anchor="middle" font-size="9" fill="#fff">B0</text>
    <rect x="30" y="30" width="30" height="30" fill="#e57373" stroke="#ef8b84" stroke-width="2"/>
    <text x="45" y="50" text-anchor="middle" font-size="9" fill="#fff">B1</text>

    <text x="75" y="90" text-anchor="middle" font-size="11" fill="#e57373">同一列的数据都在同一个 bank</text>
    <text x="75" y="110" text-anchor="middle" font-size="11" fill="#e57373">按列读 → 32-way conflict</text>
  </g>

  <!-- With padding -->
  <text x="540" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#5cb86c">✅ 有 Padding</text>
  <text x="540" y="95" text-anchor="middle" font-size="12" fill="#666666">float tile[32][33]</text>

  <g transform="translate(420, 110)">
    <rect x="0" y="0" width="30" height="30" fill="#5cb86c" stroke="#6cdb74" stroke-width="2"/>
    <text x="15" y="20" text-anchor="middle" font-size="9" fill="#fdfcf7">B0</text>
    <rect x="30" y="0" width="30" height="30" fill="#5cb86c" stroke="#6cdb74" stroke-width="2"/>
    <text x="45" y="20" text-anchor="middle" font-size="9" fill="#fdfcf7">B1</text>
    <rect x="60" y="0" width="30" height="30" fill="#5cb86c" stroke="#6cdb74" stroke-width="2"/>
    <text x="75" y="20" text-anchor="middle" font-size="9" fill="#fdfcf7">B2</text>
    <rect x="90" y="0" width="30" height="30" fill="#5cb86c" stroke="#6cdb74" stroke-width="2"/>
    <text x="105" y="20" text-anchor="middle" font-size="9" fill="#fdfcf7">...</text>
    <rect x="120" y="0" width="30" height="30" fill="#5cb86c" stroke="#6cdb74" stroke-width="2"/>
    <text x="135" y="20" text-anchor="middle" font-size="9" fill="#fdfcf7">B31</text>
    <rect x="150" y="0" width="20" height="30" fill="#3a3a3a" stroke="#555555"/>
    <text x="160" y="20" text-anchor="middle" font-size="8" fill="#666666">pad</text>

    <rect x="0" y="30" width="30" height="30" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
    <text x="15" y="50" text-anchor="middle" font-size="9" fill="#fff">B1</text>
    <rect x="30" y="30" width="30" height="30" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
    <text x="45" y="50" text-anchor="middle" font-size="9" fill="#fff">B2</text>

    <text x="85" y="90" text-anchor="middle" font-size="11" fill="#5cb86c">每行多一个 padding 单元</text>
    <text x="85" y="110" text-anchor="middle" font-size="11" fill="#5cb86c">同一列的数据错开 bank</text>
  </g>

  <!-- Code -->
  <rect x="60" y="260" width="600" height="120" rx="8" fill="#f0ede4" stroke="#3a3a3a" stroke-width="2"/>
  <text x="70" y="290" font-family="monospace" font-size="13" fill="#2b2b2b">// 有 conflict</text>
  <text x="70" y="310" font-family="monospace" font-size="13" fill="#2b2b2b">__shared__ float tile[TILE_DIM][TILE_DIM];</text>
  <text x="70" y="340" font-family="monospace" font-size="13" fill="#2b2b2b">// 无 conflict</text>
  <text x="70" y="360" font-family="monospace" font-size="13" fill="#2b2b2b">__shared__ float tile[TILE_DIM][TILE_DIM + 1];</text>
  </g>
</svg>