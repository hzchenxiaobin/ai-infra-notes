<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="380" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">Register Spilling（寄存器溢出）</text>

  <!-- Thread -->
  <rect x="80" y="80" width="200" height="240" rx="8" fill="#4a8edb" opacity="0.2" stroke="#6ab0ff" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#2b2b2b">一个 Thread</text>

  <!-- Registers -->
  <rect x="100" y="140" width="160" height="50" rx="4" fill="#4a9d5f" stroke="#5cb86c" stroke-width="2"/>
  <text x="180" y="170" text-anchor="middle" font-size="13" fill="#2b2b2b" font-weight="bold">寄存器（快）</text>

  <text x="180" y="215" text-anchor="middle" font-size="12" fill="#e57373" font-weight="bold">变量太多，寄存器不够</text>
  <line x1="180" y1="225" x2="180" y2="250" stroke="#e57373" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Local memory -->
  <rect x="100" y="260" width="160" height="50" rx="4" fill="#e8a838" stroke="#f0c050" stroke-width="2"/>
  <text x="180" y="290" text-anchor="middle" font-size="13" fill="#fdfcf7" font-weight="bold">Local Memory（慢）</text>

  <!-- Note -->
  <rect x="320" y="120" width="340" height="160" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="490" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b2b2b">Local Memory 真相</text>
  <text x="490" y="185" text-anchor="middle" font-size="13" fill="#666666">实际存储在 Global Memory 中</text>
  <text x="490" y="210" text-anchor="middle" font-size="13" fill="#666666">访问延迟 ~400-800 cycles</text>
  <text x="490" y="235" text-anchor="middle" font-size="13" fill="#666666">性能急剧下降</text>
  <text x="490" y="265" text-anchor="middle" font-size="13" fill="#e57373" font-weight="bold">应尽量避免 spilling</text>
  </g>
</svg>