<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sketch" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>

  <g filter="url(#sketch)">

  <rect width="720" height="400" fill="#fdfcf7"/>
  <text x="360" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#2b2b2b">矩阵转置的内存访问模式</text>

  <!-- Input matrix -->
  <rect x="80" y="80" width="200" height="200" fill="none" stroke="#6ab0ff" stroke-width="2"/>
  <text x="180" y="70" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Input A（行优先）</text>

  <!-- Rows highlighted -->
  <rect x="80" y="110" width="200" height="30" fill="#4a8edb" opacity="0.3"/>
  <rect x="80" y="150" width="200" height="30" fill="#4a8edb" opacity="0.2"/>
  <rect x="80" y="190" width="200" height="30" fill="#4a8edb" opacity="0.1"/>

  <text x="100" y="130" font-size="11" fill="#2b2b2b">Row 0</text>
  <text x="100" y="170" font-size="11" fill="#2b2b2b">Row 1</text>
  <text x="100" y="210" font-size="11" fill="#2b2b2b">Row 2</text>

  <!-- Arrow -->
  <text x="360" y="180" text-anchor="middle" font-size="20" fill="#2b2b2b">→</text>
  <text x="360" y="210" text-anchor="middle" font-size="13" fill="#666666">转置</text>

  <!-- Output matrix -->
  <rect x="440" y="80" width="200" height="200" fill="none" stroke="#5cb86c" stroke-width="2"/>
  <text x="540" y="70" text-anchor="middle" font-size="14" fill="#2b2b2b" font-weight="bold">Output A^T</text>

  <!-- Columns highlighted (were rows) -->
  <rect x="470" y="80" width="30" height="200" fill="#4a9d5f" opacity="0.3"/>
  <rect x="510" y="80" width="30" height="200" fill="#4a9d5f" opacity="0.2"/>
  <rect x="550" y="80" width="30" height="200" fill="#4a9d5f" opacity="0.1"/>

  <text x="475" y="100" font-size="11" fill="#2b2b2b" transform="rotate(90, 475, 100)">Col 0</text>
  <text x="515" y="100" font-size="11" fill="#2b2b2b" transform="rotate(90, 515, 100)">Col 1</text>
  <text x="555" y="100" font-size="11" fill="#2b2b2b" transform="rotate(90, 555, 100)">Col 2</text>

  <!-- Problem note -->
  <rect x="80" y="310" width="560" height="70" rx="8" fill="#fffdf5" stroke="#3a3a3a" stroke-width="2"/>
  <text x="360" y="340" text-anchor="middle" font-size="13" fill="#e57373" font-weight="bold">问题：读是 coalesced（连续行），写变成 stride access（连续列）</text>
  <text x="360" y="365" text-anchor="middle" font-size="13" fill="#666666">解决：用 Shared Memory 做中间缓冲，调整读写模式</text>
  </g>
</svg>