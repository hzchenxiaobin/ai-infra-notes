### 🎯 目标

通过今天的学习，你将：

1. 学会查找和运行 CUDA 官方 Samples
2. 掌握 \`deviceQuery\` 输出中每个字段的含义
3. 学会使用 \`cudaGetDeviceProperties\` 查询 GPU 属性
4. 掌握 CUDA Occupancy Calculator 的使用方法
5. 了解 CUDA C Programming Guide 第 5 章的核心内容
6. 能根据 GPU 参数计算峰值算力和显存带宽

> 💡 **为什么重要**：官方 Samples 是理解 GPU 硬件的"标准答案"。Day 1 和 Day 2 学的是概念，今天要用官方工具验证这些概念，并把你的 GPU 参数变成具体的数字。

---

### 学前导读：为什么要读官方代码

CUDA 官方提供了大量示例代码，它们不仅是学习材料，更是**最佳实践**。通过阅读官方代码，你可以：
- 了解 NVIDIA 推荐的编程模式
- 学习如何正确查询硬件属性
- 理解官方如何计算 occupancy
- 避免自己"重复造轮子"

今天的重点是**阅读和理解**，不是写大量代码。但你需要动手运行这些示例，把输出和你的 GPU 对应起来。

---

### 理论学习

#### 3.1 CUDA Samples 目录结构

CUDA Toolkit 安装后，Samples 通常位于以下位置之一：

\`\`\`bash
# CUDA 11.x 及以前
/usr/local/cuda/samples/

# CUDA 12.x 可能的位置
/usr/local/cuda/extras/demo_suite/
\`\`\`

如果找不到，可以用以下命令搜索：

\`\`\`bash
find /usr/local/cuda -name "deviceQuery" 2>/dev/null
find / -name "deviceQuery" 2>/dev/null | head -5
\`\`\`

常见 Samples 分类：

\`\`\`
cuda/samples/
├── 0_Introduction/          # 入门示例
├── 1_Utilities/             # 工具类（deviceQuery, bandwidthTest 等）
├── 2_Concepts_and_Techniques/  # 技术概念
├── 3_CUDA_Features/         # CUDA 特性
├── 4_CUDA_Libraries/        # CUDA 库
└── 5_Simulations/           # 物理模拟
\`\`\`

#### 3.2 deviceQuery 源码分析

![deviceQuery 输出示例](images/device_query_output.svg)

\`deviceQuery\` 的核心代码非常简单，只有两行：

\`\`\`cuda
cudaGetDeviceCount(&deviceCount);
cudaGetDeviceProperties(&prop, dev);
\`\`\`

但它输出的信息非常丰富。下面是重点字段的详细解释：

##### 基础信息

| 字段 | 含义 | 用途 |
|------|------|------|
| \`name\` | GPU 型号名称 | 如 "NVIDIA A100-PCIE-40GB" |
| \`totalGlobalMem\` | 全局显存总字节数 | 判断能加载多大的模型/数据 |
| \`multiProcessorCount\` | SM 数量 | 计算峰值算力 |
| \`warpSize\` | Warp 大小 | 通常为 32 |

##### 并行能力限制

| 字段 | 含义 | 用途 |
|------|------|------|
| \`maxThreadsPerBlock\` | 每个 block 最大线程数 | 通常为 1024 |
| \`maxThreadsPerMultiProcessor\` | 每个 SM 最大线程数 | A100 为 2048 |
| \`maxBlocksPerMultiProcessor\` | 每个 SM 最大 block 数 | A100 为 32 |
| \`maxGridSize\` | Grid 最大维度 | 决定能启动多少 block |

##### 内存相关

| 字段 | 含义 | 用途 |
|------|------|------|
| \`sharedMemPerBlock\` | 每个 block 最大共享内存 | Tiling 大小设计 |
| \`sharedMemPerMultiprocessor\` | 每个 SM 最大共享内存 | Occupancy 计算 |
| \`regsPerBlock\` | 每个 block 最大寄存器数 | 资源约束 |
| \`memoryClockRate\` | 显存时钟频率 | 计算显存带宽 |
| \`memoryBusWidth\` | 显存位宽 | 计算显存带宽 |

##### 计算能力

| 字段 | 含义 | 用途 |
|------|------|------|
| \`major\` / \`minor\` | 计算能力版本 | 决定可用的 CUDA 特性 |
| \`clockRate\` | GPU 核心频率 | 计算峰值算力 |
| \`pciBusID\` / \`pciDeviceID\` | PCI 总线信息 | 多 GPU 时区分设备 |

#### 3.3 自己写一个 mini deviceQuery

除了运行官方示例，你也可以自己写一个简化版：

\`\`\`cuda
#include <cuda_runtime.h>
#include <stdio.h>

int main() {
    int deviceCount;
    cudaGetDeviceCount(&deviceCount);
    printf("Detected %d CUDA device(s)\\n\\n", deviceCount);

    for (int dev = 0; dev < deviceCount; ++dev) {
        cudaDeviceProp prop;
        cudaGetDeviceProperties(&prop, dev);

        printf("Device %d: %s\\n", dev, prop.name);
        printf("  Compute Capability: %d.%d\\n", prop.major, prop.minor);
        printf("  Total Global Memory: %.2f GB\\n", prop.totalGlobalMem / (1024.0 * 1024 * 1024));
        printf("  Number of SMs: %d\\n", prop.multiProcessorCount);
        printf("  Warp Size: %d\\n", prop.warpSize);
        printf("  Max Threads per Block: %d\\n", prop.maxThreadsPerBlock);
        printf("  Max Threads per SM: %d\\n", prop.maxThreadsPerMultiProcessor);
        printf("  Max Blocks per SM: %d\\n", prop.maxBlocksPerMultiProcessor);
        printf("  Shared Memory per Block: %zu KB\\n", prop.sharedMemPerBlock / 1024);
        printf("  Registers per Block: %d\\n", prop.regsPerBlock);
        printf("  Memory Clock Rate: %.0f MHz\\n", prop.memoryClockRate / 1000.0);
        printf("  Memory Bus Width: %d bits\\n", prop.memoryBusWidth);
        printf("  GPU Clock Rate: %.0f MHz\\n\\n", prop.clockRate / 1000.0);
    }

    return 0;
}
\`\`\`

编译运行：

\`\`\`bash
nvcc -o mini_device_query mini_device_query.cu
./mini_device_query
\`\`\`

#### 3.4 CUDA Occupancy Calculator

![Occupancy Calculator 流程](images/occupancy_calculator_workflow.svg)

CUDA Occupancy Calculator 是一个 Excel 工具，可以计算理论 occupancy。它通常位于：

\`\`\`bash
/usr/local/cuda/tools/CUDA_Occupancy_Calculator.xls
\`\`\`

或者在 NVIDIA 官网下载最新版。

**使用步骤**：
1. 输入 GPU 的 Compute Capability
2. 输入 Kernel 的参数：
   - Threads per block
   - Registers per thread
   - Shared memory per block
3. 读取结果：
   - Active Warps per SM
   - Occupancy (%)
   - Active Blocks per SM
   - 哪个资源是瓶颈

**示例**：
- GPU：A100 (Compute Capability 8.0)
- Block size：256 threads
- Registers per thread：64
- Shared memory per block：0

计算结果会显示：
- 理论 Occupancy：50%
- 瓶颈资源：Registers per thread

##### 计算逻辑拆解

理论 occupancy 的核心是先看 **一个 SM 上最多能同时驻留多少个 block**，再换算成 warp。

**步骤 1：计算每个 block 占用的 warp 数**

\`\`\`
warps_per_block = ceil(threads_per_block / 32)
\`\`\`

**步骤 2：分别从三种资源算出 block 上限**

| 资源 | 限制公式 |
|------|---------|
| Threads / Warps | \`blocks_from_threads = floor(max_threads_per_sm / threads_per_block)\` |
| Registers | \`regs_per_block = ceil(threads_per_block * regs_per_thread / reg_granularity) * reg_granularity\`<br>\`blocks_from_regs = floor(max_regs_per_sm / regs_per_block)\` |
| Shared Memory | \`smem_per_block = ceil(smem_per_block / smem_granularity) * smem_granularity\`<br>\`blocks_from_smem = floor(max_smem_per_sm / smem_per_block)\` |
| 架构硬上限 | \`max_blocks_per_sm\` |

> **Granularity 说明**：寄存器分配通常按 256 个寄存器对齐，共享内存通常按 1024 bytes 对齐，具体数值随 Compute Capability 变化。

**步骤 3：取最小值得到 Active Blocks**

\`\`\`
active_blocks = min(blocks_from_threads, blocks_from_regs, blocks_from_smem, max_blocks_per_sm)
\`\`\`

**步骤 4：换算成 Active Warps 和 Occupancy**

\`\`\`
active_warps = active_blocks * warps_per_block
occupancy = active_warps / max_warps_per_sm * 100%
\`\`\`

**瓶颈资源**就是步骤 3 中让 \`active_blocks\` 取到最小值的那一项。

**以 A100 (CC 8.0) 验证上面的示例**：

- \`threads_per_block = 256\` → \`warps_per_block = 8\`
- \`regs_per_thread = 64\`，寄存器粒度 256
  - \`regs_per_block = ceil(256 * 64 / 256) * 256 = 16384\`
  - \`blocks_from_regs = floor(65536 / 16384) = 4\`
- Threads 限制：\`floor(2048 / 256) = 8\`
- Shared memory 限制：未使用，为 ∞
- \`active_blocks = min(8, 4, ∞, 32) = 4\`
- \`active_warps = 4 * 8 = 32\`，\`occupancy = 32 / 64 = 50%\`

> 注意：网页计算器基于 SM 资源上限做简化建模，用于**理解原理和快速估算**；要得到与硬件完全一致的精确值，仍建议使用官方 CUDA Occupancy Calculator 或 \`cudaOccupancyMaxPotentialBlockSize\`。

#### 3.5 CUDA Programming Guide 性能优化部分

![CUDA Guide Chapter 5](images/cuda_guide_ch5.svg)

NVIDIA 已经把传统的《CUDA C Programming Guide》升级为新版《CUDA Programming Guide》（https://docs.nvidia.com/cuda/cuda-programming-guide/）。新文档不再使用旧的“第 5 章 Performance Guidelines”结构，而是按主题重新组织成 5 个 Part。与性能优化直接相关的内容主要分布在 **Part 2（Programming GPUs in CUDA）**、**Part 3（Advanced CUDA）** 和 **Part 4（CUDA Features）**，硬件细节则集中在 **Part 5（Technical Appendices）**。

##### Part 1 铺垫：执行模型与硬件抽象

在谈性能之前，需要先建立几个核心概念（Part 1 中介绍）：

- **Thread / Block / Grid / Warp**：Warp 是 32 个线程组成的执行单位，同一 Warp 内的线程以 SIMT 方式执行同一条指令。
- **Streaming Multiprocessor（SM）**：GPU 的真正计算单元，每个 SM 上有 Warp Scheduler、Register File、Shared Memory、L1 Cache、各类执行单元（FP32/INT/Tensor Core/SFU 等）。
- **Memory Hierarchy**：Register → Shared Memory / L1 → L2 → Global Memory（HBM）。越靠近 SM，带宽越高、容量越小。
- **Compute Capability**：决定硬件能力（如是否支持 Tensor Core、TMA、异步拷贝等），查询 GPU 能力时要用到。

这些概念是后续所有性能分析的底层语言。

---

##### Part 2：Programming GPUs in CUDA（基础性能优化）

Part 2 面向刚开始写 CUDA 的人，但已经包含大量常见性能考量。旧版第 5 章的“三大支柱”——Utilization、Memory Throughput、Instruction Throughput——在这里作为编程时的基本准则出现。

###### 2.1 性能优化的整体思路

CUDA 程序的性能通常受限于以下三类因素之一：

1. **并行度不足**：GPU 没有足够多的活跃 Warp 来隐藏延迟（Latency Hiding）。
2. **内存带宽不足**：数据搬运或内存访问成为瓶颈。
3. **指令吞吐不足**：计算指令本身太慢，或使用了代价高的特殊函数、分支发散。

调优时可以用 Roofline 模型帮助定位：先算当前 kernel 的 **算术强度**（Arithmetic Intensity = FLOPs / Bytes），再对比 GPU 峰值算力和峰值带宽，判断是 memory-bound 还是 compute-bound。

- AI 低 → 优化内存访问（coalescing、shared memory、减少搬运）。
- AI 高 → 优化计算（指令选择、Occupancy、ILP）。

###### 2.2 利用率：Occupancy 与延迟隐藏

SM 上的 Warp Scheduler 每个 cycle 会选择“可执行”的 Warp 来执行。如果所有 Warp 都在等内存返回，SM 就会空闲。**高 Occupancy 能增加可选 Warp 数量，从而隐藏延迟**。

影响 Occupancy 的资源限制：

| 资源 | 说明 | 限制来源 |
|------|------|---------|
| 每个 block 的线程数 | block 越大，单个 SM 能同时驻留的 block 越少 | \`maxThreadsPerBlock\` |
| 每个线程的寄存器数 | 寄存器越多，SM 上能驻留的线程越少 | \`regsPerMultiprocessor\` |
| Shared memory | 占用越多，能并存的 block 越少 | \`sharedMemPerBlock\` |
| Block 总数 / SM 数量 | 硬件并发上限 | \`multiProcessorCount\` |

- **Occupancy** = 活跃 Warp 数 / SM 最大 Warp 数。
- **TLP（Thread-Level Parallelism）**：通过更多 Warp 隐藏延迟。
- **ILP（Instruction-Level Parallelism）**：单个线程内部独立指令越多，即使 Occupancy 不高也能隐藏延迟。

官方建议：不要一味追求 100% Occupancy。很多时候 **75% 左右的 Occupancy 已能获得接近峰值的性能**，继续增加 Warp 数量收益递减。

实用工具：

- \`cudaOccupancyMaxPotentialBlockSize\` 自动选择最佳 block size。
- \`__launch_bounds__(maxThreadsPerBlock, minBlocksPerMultiprocessor)\` 提示编译器减少寄存器使用。
- Nsight Compute 的 *Occupancy* 章节查看实际瓶颈。

\`\`\`cuda
// 示例：限制编译器为每个 block 256 线程、至少 2 个 block 驻留 SM
__launch_bounds__(256, 2)
__global__ void myKernel(float* out, const float* in, int n) {
    // ...
}
\`\`\`

###### 2.3 内存吞吐：Global Memory Coalescing

Global memory 访问以 Warp 为单位发起。现代 GPU 通过 L1/Tex Cache 和 L2 Cache 缓存数据，合并访问能极大提升有效带宽：

- Warp 内线程访问连续地址，落在同一 cache line（32/128 字节）内 → 少量事务。
- 访问越分散 → 事务越多 → 有效带宽越低。

理想模式：

\`\`\`cuda
// 理想：threadIdx.x 访问连续的 float
globalMem[idx * blockDim.x + threadIdx.x]
\`\`\`

不佳模式：

\`\`\`cuda
// 不佳：threadIdx.x 访问列，导致跨步很大
globalMem[threadIdx.x * N + idx]
\`\`\`

常用优化技巧：

1. 先用 coalesced 读入 shared memory。
2. 在 shared memory 中做需要跨步访问的计算（注意 bank conflict）。
3. 2D 数组用 \`cudaMallocPitch\` 分配，保证对齐。

\`\`\`cuda
size_t pitch;
cudaMallocPitch(&d_ptr, &pitch, width * sizeof(float), height);
// 元素访问：d_ptr[row * pitch / sizeof(float) + col]
\`\`\`

###### 2.4 内存吞吐：Shared Memory 与 Bank Conflict

Shared memory 位于 SM 内部，延迟约为 global memory 的 1/100。它是 tiling、转置、归约、卷积等算法的关键。

- 被划分为多个 bank（通常 32 个）。
- 同一 Warp 访问不同 bank → 无 conflict。
- 同一 Warp 访问同一 bank 的不同地址 → bank conflict。
- 同一 Warp 访问同一地址 → broadcast，无 conflict。

消除 bank conflict 的常见方法：

\`\`\`cuda
__shared__ float tile[TILE_DIM][TILE_DIM + 1];  // +1 消除转置时的 bank conflict
\`\`\`

###### 2.5 指令吞吐：算术与控制流

- **整数运算**：32 位加减/位运算吞吐高；32 位乘法较慢；除法/取模开销大，尽量用位运算或预计算倒数。
- **浮点运算**：FP32 是峰值算力计量单位；FP16/BF16/TF32 + Tensor Core 可获得更高吞吐。
- **特殊函数**：\`sin\`、\`cos\`、\`exp\`、\`log\`、\`sqrt\` 等走 SFU，吞吐低于普通 ALU。精度允许时用 intrinsic（\`__sinf\`、\`__expf\`）。
- **FMA**：乘加融合通常比单独 \`mul\` + \`add\` 更快且精度更高。
- **分支发散**：Warp 内线程走不同分支会串行化执行。尽量让条件基于 block/warp 级别，或用 warp vote 函数检测。

\`\`\`cuda
// 不佳：线程级条件分支
if (threadIdx.x % 2 == 0) { /* path A */ } else { /* path B */ }
\`\`\`

##### Part 3：Advanced CUDA（进阶性能优化）

Part 3 面向想进一步压榨性能的人，内容包括更细粒度的控制、多 GPU、warp-level primitives、异步执行等。旧版第 5 章中“Application Level / Device Level”的高级话题在这里展开。

###### 3.1 异步执行与并发

CPU 和 GPU 是独立计算资源，理想情况下通过异步 Stream 重叠执行：

- **Pinned Memory + \`cudaMemcpyAsync\`**：实现异步 Host↔Device 传输。
- **多 Stream**：把独立任务拆到不同 Stream，让拷贝与计算重叠。
- **CUDA Events**：用于精确测量 GPU 上时间或同步特定 Stream。

\`\`\`cuda
// 使用 pinned memory + 异步拷贝示例
cudaMallocHost(&h_ptr, bytes);  // pinned host memory
cudaMemcpyAsync(d_ptr, h_ptr, bytes, cudaMemcpyHostToDevice, stream);
kernel<<<grid, block, 0, stream>>>(d_ptr);
cudaMemcpyAsync(h_ptr, d_ptr, bytes, cudaMemcpyDeviceToHost, stream);
cudaStreamSynchronize(stream);
\`\`\`

> 如果 host 内存不是 pinned，\`cudaMemcpyAsync\` 会退化为同步拷贝。

###### 3.2 多 GPU 与 Multi-Process Service

- **多 GPU**：单节点多卡时，用 \`cudaSetDevice()\` 选择设备，或通过 NCCL 做数据并行。
- **MPS（Multi-Process Service）**：多个进程共享同一块 GPU 上下文，减少上下文切换开销，适合小 kernel 密集场景。

###### 3.3 Warp-Level Primitives

从 Compute Capability 3.0 起，CUDA 提供 warp shuffle，允许同一 warp 内线程直接交换寄存器数据，无需经过 shared memory：

\`\`\`cuda
// 从 lane 0 广播到整个 warp
float val = __shfl_sync(0xFFFFFFFF, localVal, 0);

// warp 内归约
for (int offset = 16; offset > 0; offset /= 2)
    val += __shfl_down_sync(0xFFFFFFFF, val, offset);
\`\`\`

这对归约、扫描、矩阵乘等非常有用，能减少 shared memory 用量和同步开销。

###### 3.4 现代架构高级特性

- **Asynchronous Data Copy（Ampere+）**：\`cp.async\` 把 global→shared 的 load 异步化，配合 pipeline 隐藏延迟。
- **Tensor Memory Accelerator（Hopper+）**：硬件级多维张量搬运，配合 \`mbarrier\` 实现细粒度流水线。
- **DPX Instructions（Hopper+）**：加速动态规划类 \`max-plus\` / \`min-plus\` 操作。

##### Part 4：CUDA Features（性能相关特性详解）

Part 4 对具体 CUDA 特性做完整讲解，其中很多特性本身就是性能优化工具。

| 特性 | 与性能的关系 |
|------|------------|
| **CUDA Streams / Events** | 异步并发、拷贝与计算重叠、精确计时 |
| **CUDA Graphs** | 对重复 kernel 序列录制一次、多次发射，降低 CPU launch overhead |
| **Unified Memory** | 自动页迁移，简化编程；需配合 \`cudaMemPrefetchAsync\` 和 \`cudaMemAdvise\` 避免 page fault |
| **Zero-Copy / Mapped Memory** | Kernel 直接访问 pinned host memory，适合只读/低频场景 |
| **Texture / Surface Memory** | 2D 空间局部性缓存；现代 GPU 上也可用 \`__ldg()\` 达到类似只读缓存效果 |

Unified Memory 预取示例：

\`\`\`cuda
cudaMallocManaged(&data, bytes);
cudaMemPrefetchAsync(data, bytes, deviceId, stream);        // 提前搬到 GPU
kernel<<<grid, block, 0, stream>>>(data);
cudaMemPrefetchAsync(data, bytes, cudaCpuDeviceId, stream);  // 搬回 CPU
cudaStreamSynchronize(stream);
\`\`\`

##### Part 5：Technical Appendices（硬件参考）

Part 5 是技术参考，调优时用来查具体数字：

- **Compute Capability**：每个架构支持的特性、SM 资源上限、warp 大小等。
- **Hardware Implementation**：SM 内部结构、Warp Scheduler、内存层次细节。
- **Instruction Throughput**：各架构上各类指令的吞吐（注意 CUDA 13.0 后部分吞吐表已移到 CUDA C++ Best Practices Guide）。
- **Memory Transaction Details**：不同 Compute Capability 下 global/shared memory 事务大小、对齐要求、bank 划分等。

建议把自己 GPU 的关键数字整理成 Cheat Sheet：峰值算力、显存带宽、L2 大小、shared memory/bank 数、每个 SM 的 warp 上限等。

##### 常用优化 Checklist

| 优化方向 | 具体做法 | 适用场景 |
|---------|---------|---------|
| 内存合并访问 | 让 Warp 内线程按连续地址访问 global memory | 几乎所有 global memory 读写 |
| Tiling + Shared Memory | 把数据分块加载到 shared memory 复用 | 矩阵乘、卷积、stencil |
| 消除 Bank Conflict | shared memory 加 padding | 转置、矩阵乘 |
| 提高 Occupancy | 调整 block size、减少寄存器/共享内存用量 | SM 利用率低、延迟高 |
| 异步拷贝 / Pipeline | 使用 \`cp.async\`、TMA、warp-level async | Ampere/Hopper 数据流水线 |
| 减少 Host↔Device 传输 | 使用 pinned memory、异步拷贝、Unified Memory | 数据搬运占比高 |
| 避免分支发散 | 让分支基于 warp/block 级别 | 条件计算多的 kernel |
| 使用 Warp Shuffle | 替代 shared memory 做 warp 内通信 | 归约、扫描、广播 |
| 选择合适精度 | FP16/BF16/TF32 + Tensor Core | 深度学习、矩阵计算 |
| 减少特殊函数 | 用 intrinsic 或查表替代 sin/exp 等 | 计算密集型 kernel |

### 扩展实验

#### 实验 1：计算你的 GPU 峰值算力

**理论 FP32 峰值算力**：

\`\`\`
Peak FLOP/s = SM数量 × 每个SM的FP32 CUDA Cores × GPU频率 × 2
\`\`\`

乘以 2 是因为 CUDA Core 通常每个 cycle 可以执行 2 条 FMA 指令。

以 A100 为例：
- SM 数量：108
- 每个 SM FP32 CUDA Cores：64
- GPU 频率：1.41 GHz

\`\`\`
Peak FP32 = 108 × 64 × 1.41 × 2 = 19.49 TFLOP/s
\`\`\`

**理论显存带宽**：

\`\`\`
Bandwidth = memoryClockRate × memoryBusWidth / 8
\`\`\`

以 A100 为例：
- memoryClockRate：1215 MHz = 1.215 × 10^9 Hz
- memoryBusWidth：5120 bits

\`\`\`
Bandwidth = 1.215 × 10^9 × 5120 / 8 = 777.6 GB/s
\`\`\`

> 注意：deviceQuery 输出的 memoryClockRate 单位是 kHz，需要转换。

#### 实验 2：对比不同 GPU 的参数

如果你有多块 GPU（或查看同学/同事的 GPU），对比以下参数：

| GPU | SM 数 | FP32 Cores/SM | 显存 | 带宽 | 计算能力 |
|-----|-------|--------------|------|------|---------|
| | | | | | |

思考：为什么不同 GPU 的架构差异这么大？

#### 实验 3：用 \`cudaChooseDevice\` 选择 GPU

在多 GPU 机器上，可以用 \`cudaChooseDevice\` 选择最合适的 GPU：

\`\`\`cuda
#include <cuda_runtime.h>

int main() {
    cudaDeviceProp prop;
    memset(&prop, 0, sizeof(prop));
    prop.major = 7;  // 至少 Turing
    prop.minor = 0;

    int dev;
    cudaChooseDevice(&dev, &prop);
    printf("Best device: %d\\n", dev);

    cudaSetDevice(dev);
    return 0;
}
\`\`\`
