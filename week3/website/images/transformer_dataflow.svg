<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk2" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Transformer 单层数据流</text>
  <path d="M 260 42 Q 450 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk2)"/>

  <!-- Input -->
  <g filter="url(#sk2)">
    <rect x="350" y="60" width="200" height="36" rx="8" fill="#f0ede4" stroke="#3a3a3a" stroke-width="1.6"/>
    <text x="450" y="82" text-anchor="middle" font-size="12" fill="#2b2b2b">Input x (B, N, d)</text>
  </g>
  <path d="M 450 98 L 450 110" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- LayerNorm1 -->
  <g filter="url(#sk2)">
    <rect x="320" y="114" width="260" height="36" rx="8" fill="#e8a838" stroke="#3a3a3a" stroke-width="1.6" opacity="0.7"/>
    <text x="450" y="136" text-anchor="middle" font-size="12" fill="#2b2b2b">LayerNorm1 [memory-bound]</text>
  </g>
  <path d="M 450 152 L 450 164" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- QKV Linear -->
  <g filter="url(#sk2)">
    <rect x="290" y="168" width="320" height="36" rx="8" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1.6" opacity="0.7"/>
    <text x="450" y="190" text-anchor="middle" font-size="12" fill="#2b2b2b">QKV Linear (GEMM) [compute-bound]</text>
  </g>
  <path d="M 450 206 L 450 218" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- Attention block -->
  <g filter="url(#sk2)">
    <rect x="200" y="222" width="500" height="100" rx="10" fill="#fce4ec" stroke="#3a3a3a" stroke-width="1.6"/>
    <text x="450" y="242" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">Attention</text>
  </g>
  <!-- QK^T -->
  <g filter="url(#sk2)">
    <rect x="220" y="250" width="130" height="28" rx="6" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="285" y="268" text-anchor="middle" font-size="10" fill="#2b2b2b">S = QK^T (GEMM)</text>
  </g>
  <text x="360" y="268" font-size="14" fill="#3a3a3a">→</text>
  <!-- Softmax -->
  <g filter="url(#sk2)">
    <rect x="380" y="250" width="130" height="28" rx="6" fill="#e57373" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="445" y="268" text-anchor="middle" font-size="10" fill="#2b2b2b">Softmax [mem-bound]</text>
  </g>
  <text x="520" y="268" font-size="14" fill="#3a3a3a">→</text>
  <!-- PV -->
  <g filter="url(#sk2)">
    <rect x="540" y="250" width="130" height="28" rx="6" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="605" y="268" text-anchor="middle" font-size="10" fill="#2b2b2b">O = PV (GEMM)</text>
  </g>
  <text x="450" y="304" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Prefill: N×N 矩阵 | Decode: 1×N (读 KV Cache)</text>
  <path d="M 450 324 L 450 336" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- Out Linear -->
  <g filter="url(#sk2)">
    <rect x="300" y="340" width="300" height="36" rx="8" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1.6" opacity="0.7"/>
    <text x="450" y="362" text-anchor="middle" font-size="12" fill="#2b2b2b">Output Linear (GEMM) [compute-bound]</text>
  </g>
  <path d="M 450 378 L 450 390" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- Residual add 1 -->
  <g filter="url(#sk2)">
    <circle cx="450" cy="400" r="16" fill="#f0ede4" stroke="#3a3a3a" stroke-width="1.4"/>
    <text x="450" y="404" text-anchor="middle" font-size="11" fill="#2b2b2b">+</text>
  </g>
  <text x="478" y="404" font-size="10" fill="#666">residual</text>
  <path d="M 450 418 L 450 430" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- LayerNorm2 -->
  <g filter="url(#sk2)">
    <rect x="320" y="434" width="260" height="36" rx="8" fill="#e8a838" stroke="#3a3a3a" stroke-width="1.6" opacity="0.7"/>
    <text x="450" y="456" text-anchor="middle" font-size="12" fill="#2b2b2b">LayerNorm2 [memory-bound]</text>
  </g>
  <path d="M 450 472 L 450 484" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- FFN -->
  <g filter="url(#sk2)">
    <rect x="180" y="488" width="540" height="60" rx="10" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="1.6"/>
    <text x="450" y="508" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b2b2b">FFN</text>
  </g>
  <g filter="url(#sk2)">
    <rect x="200" y="516" width="140" height="24" rx="6" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="270" y="532" text-anchor="middle" font-size="10" fill="#2b2b2b">FFN GEMM1</text>
  </g>
  <text x="350" y="532" font-size="12" fill="#3a3a3a">→</text>
  <g filter="url(#sk2)">
    <rect x="370" y="516" width="100" height="24" rx="6" fill="#e57373" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="420" y="532" text-anchor="middle" font-size="10" fill="#2b2b2b">GELU [mem]</text>
  </g>
  <text x="480" y="532" font-size="12" fill="#3a3a3a">→</text>
  <g filter="url(#sk2)">
    <rect x="500" y="516" width="140" height="24" rx="6" fill="#4a8edb" stroke="#3a3a3a" stroke-width="1" opacity="0.6"/>
    <text x="570" y="532" text-anchor="middle" font-size="10" fill="#2b2b2b">FFN GEMM2</text>
  </g>
  <path d="M 450 550 L 450 562" stroke="#3a3a3a" stroke-width="1.4" fill="none" marker-end="url(#ar2)"/>

  <!-- Residual add 2 -->
  <g filter="url(#sk2)">
    <circle cx="450" cy="574" r="16" fill="#f0ede4" stroke="#3a3a3a" stroke-width="1.4"/>
    <text x="450" y="578" text-anchor="middle" font-size="11" fill="#2b2b2b">+</text>
  </g>
  <text x="478" y="578" font-size="10" fill="#666">residual → 下一层</text>

  <!-- Legend -->
  <g filter="url(#sk2)">
    <rect x="660" y="114" width="14" height="14" fill="#4a8edb" opacity="0.7" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="680" y="126" font-size="10" fill="#444">GEMM (compute)</text>
    <rect x="660" y="134" width="14" height="14" fill="#e8a838" opacity="0.7" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="680" y="146" font-size="10" fill="#444">LayerNorm (memory)</text>
    <rect x="660" y="154" width="14" height="14" fill="#e57373" opacity="0.7" stroke="#3a3a3a" stroke-width="0.8"/>
    <text x="680" y="166" font-size="10" fill="#444">Softmax/GELU (memory)</text>
  </g>
</svg>
