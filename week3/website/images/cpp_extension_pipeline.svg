<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="920" height="560" fill="#fdfcf7"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">PyTorch C++ Extension 集成流水线</text>
  <path d="M 280 42 Q 460 50 640 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Step 1: .cu kernel -->
  <g filter="url(#sk)">
    <rect x="60" y="74" width="220" height="100" rx="8" fill="#e8f0fa" stroke="#4a8edb" stroke-width="1.5"/>
  </g>
  <text x="170" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6e9e">① .cu Kernel</text>
  <text x="170" y="120" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">softmax_kernel&lt;&lt;&lt;&gt;&gt;&gt;</text>
  <text x="170" y="136" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">layernorm_kernel&lt;&lt;&lt;&gt;&gt;&gt;</text>
  <text x="170" y="156" text-anchor="middle" font-size="9" fill="#888">Day 16 手写的 kernel</text>
  <path d="M 280 124 L 300 124" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 2: launch wrapper -->
  <g filter="url(#sk)">
    <rect x="300" y="74" width="220" height="100" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.5"/>
  </g>
  <text x="410" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e6e2e">② Launch Wrapper</text>
  <text x="410" y="120" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">launch_softmax(...)</text>
  <text x="410" y="136" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">launch_layernorm(...)</text>
  <text x="410" y="156" text-anchor="middle" font-size="9" fill="#888">封装 grid/block + stream</text>
  <path d="M 520 124 L 540 124" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 3: C++ binding -->
  <g filter="url(#sk)">
    <rect x="540" y="74" width="220" height="100" rx="8" fill="#fef6e6" stroke="#c98a2b" stroke-width="1.5"/>
  </g>
  <text x="650" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">③ C++ Binding</text>
  <text x="650" y="120" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">at::Tensor softmax_forward</text>
  <text x="650" y="136" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">(at::Tensor input)</text>
  <text x="650" y="156" text-anchor="middle" font-size="9" fill="#888">at::Tensor ↔ 裸指针 + stream</text>
  <path d="M 650 176 L 650 198" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 4: load_inline -->
  <g filter="url(#sk)">
    <rect x="540" y="202" width="220" height="100" rx="8" fill="#f3eaf7" stroke="#8e5db8" stroke-width="1.5"/>
  </g>
  <text x="650" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a">④ load_inline</text>
  <text x="650" y="248" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">my_ops = load_inline(</text>
  <text x="650" y="264" text-anchor="middle" font-size="9" fill="#666">  cuda_sources, cpp_sources,</text>
  <text x="650" y="278" text-anchor="middle" font-size="9" fill="#666">  functions=[...])</text>
  <text x="650" y="294" text-anchor="middle" font-size="9" fill="#888">运行时 JIT 编译为 .so</text>
  <path d="M 540 252 L 520 252" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 5: Python call -->
  <g filter="url(#sk)">
    <rect x="300" y="202" width="220" height="100" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.5"/>
  </g>
  <text x="410" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a2828">⑤ Python 调用</text>
  <text x="410" y="248" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">my_ops.softmax_forward(x)</text>
  <text x="410" y="264" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">my_ops.layernorm_forward(...)</text>
  <text x="410" y="284" text-anchor="middle" font-size="9" fill="#888">像普通 Python 函数调用</text>
  <path d="M 300 252 L 280 252" stroke="#3a3a3a" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>

  <!-- Step 6: Mini engine -->
  <g filter="url(#sk)">
    <rect x="60" y="202" width="220" height="100" rx="8" fill="#fff3cf" stroke="#e8a838" stroke-width="1.5"/>
  </g>
  <text x="170" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5415">⑥ Mini Engine</text>
  <text x="170" y="248" text-anchor="middle" font-size="10" fill="#444" font-family="monospace">TransformerBlock.forward</text>
  <text x="170" y="264" text-anchor="middle" font-size="9" fill="#666">★ 替换 F.softmax / F.layer_norm</text>
  <text x="170" y="284" text-anchor="middle" font-size="9" fill="#888">GEMM 仍用 torch.mm (cuBLAS)</text>

  <!-- key points box -->
  <g filter="url(#sk)">
    <rect x="60" y="340" width="800" height="200" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.4" stroke-dasharray="5 3"/>
  </g>
  <text x="80" y="364" font-size="13" font-weight="bold" fill="#2b2b2b">集成关键点</text>
  <text x="80" y="388" font-size="12" fill="#444">① <tspan font-weight="bold">at::Tensor</tspan> 接收张量：PyTorch 的张量类型，跨 C++/Python 传递</text>
  <text x="80" y="410" font-size="12" fill="#444">② <tspan font-weight="bold">data_ptr&lt;float&gt;()</tspan> 获取裸指针：从 Tensor 提取可传给 kernel 的 raw pointer</text>
  <text x="80" y="432" font-size="12" fill="#444">③ <tspan font-weight="bold">at::cuda::getCurrentCUDAStream()</tspan> 获取当前 stream：保证 kernel 在正确 stream 上执行</text>
  <text x="80" y="454" font-size="12" fill="#444">④ <tspan font-weight="bold">at::empty_like(input)</tspan> 分配输出：让 PyTorch 管理显存（无需手动 cudaMalloc）</text>
  <text x="80" y="476" font-size="12" fill="#444">⑤ <tspan font-weight="bold">PYBIND11_MODULE</tspan> 注册：把 C++ 函数暴露给 Python 调用</text>
  <text x="80" y="504" font-size="11" fill="#888" font-style="italic">load_inline 首次调用会 JIT 编译（~30s），后续从缓存加载（~0.1s）</text>
  <text x="80" y="522" font-size="11" fill="#2e6e2e" font-weight="bold">昇腾对照：aclOpCompile + 自定义算子注册，机制类似但走 ACL 框架</text>
</svg>
