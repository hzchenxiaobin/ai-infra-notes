<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk3" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="860" height="440" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">torch.profiler 工作流</text>
  <path d="M 250 40 Q 430 48 610 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk3)"/>

  <!-- Step 1: Code -->
  <g filter="url(#sk3)">
    <rect x="30" y="60" width="240" height="120" rx="12" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="1.8"/>
    <text x="150" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">① 编写 profiling 代码</text>
    <line x1="40" y1="92" x2="260" y2="92" stroke="#3a3a3a" stroke-width="0.6" stroke-dasharray="3 3"/>
  </g>
  <text x="40" y="112" font-size="9" fill="#444" font-family="monospace">with torch.profiler.profile(</text>
  <text x="50" y="126" font-size="9" fill="#444" font-family="monospace">activities=[CPU, CUDA]) as prof:</text>
  <text x="60" y="140" font-size="9" fill="#444" font-family="monospace">for _ in range(5):</text>
  <text x="70" y="154" font-size="9" fill="#444" font-family="monospace">out = model(x)</text>
  <text x="50" y="168" font-size="9" fill="#444" font-family="monospace">torch.cuda.synchronize()</text>

  <!-- Arrow -->
  <path d="M 274 120 L 308 120" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar3)"/>

  <!-- Step 2: Table output -->
  <g filter="url(#sk3)">
    <rect x="310" y="60" width="260" height="120" rx="12" fill="#fef3d3" stroke="#3a3a3a" stroke-width="1.8"/>
    <text x="440" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">② 算子时间表</text>
    <line x1="320" y1="92" x2="560" y2="92" stroke="#3a3a3a" stroke-width="0.6" stroke-dasharray="3 3"/>
  </g>
  <text x="320" y="110" font-size="9" fill="#444" font-family="monospace">Name        Self CUDA  Calls</text>
  <text x="320" y="124" font-size="9" fill="#4a8edb" font-family="monospace">aten::mm      450us      20</text>
  <text x="320" y="138" font-size="9" fill="#e8a838" font-family="monospace">aten::layernorm 120us   10</text>
  <text x="320" y="152" font-size="9" fill="#e57373" font-family="monospace">aten::softmax   80us     5</text>
  <text x="320" y="166" font-size="9" fill="#8b949e" font-family="monospace">aten::gelu      60us     5</text>

  <!-- Arrow -->
  <path d="M 574 120 L 608 120" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar3)"/>

  <!-- Step 3: Chrome trace -->
  <g filter="url(#sk3)">
    <rect x="610" y="60" width="240" height="120" rx="12" fill="#e8f0fe" stroke="#3a3a3a" stroke-width="1.8"/>
    <text x="730" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">③ Chrome Trace 可视化</text>
    <line x1="620" y1="92" x2="840" y2="92" stroke="#3a3a3a" stroke-width="0.6" stroke-dasharray="3 3"/>
  </g>
  <text x="620" y="110" font-size="9" fill="#444">prof.export_chrome_trace(</text>
  <text x="630" y="124" font-size="9" fill="#444" font-family="monospace">"trace.json")</text>
  <text x="620" y="142" font-size="9" fill="#666">→ chrome://tracing 打开</text>
  <text x="620" y="156" font-size="9" fill="#666">→ 看 kernel 时间线 + gap</text>

  <!-- Bottom: timeline visualization -->
  <g filter="url(#sk3)">
    <rect x="30" y="210" width="820" height="200" rx="12" fill="#fdfcf7" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="440" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Chrome Trace 时间线（Prefill 阶段示意）</text>
  </g>

  <!-- Timeline bars -->
  <text x="40" y="260" font-size="9" fill="#666">CPU:</text>
  <g filter="url(#sk3)">
    <rect x="80" y="250" width="40" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
    <rect x="130" y="250" width="40" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
    <rect x="180" y="250" width="60" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
    <rect x="250" y="250" width="40" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
    <rect x="300" y="250" width="50" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
    <rect x="360" y="250" width="60" height="14" rx="2" fill="#8b949e" stroke="#3a3a3a" stroke-width="0.6"/>
  </g>
  <text x="430" y="260" font-size="8" fill="#aaa">← launch overhead (CPU 调度)</text>

  <text x="40" y="290" font-size="9" fill="#666">GPU:</text>
  <!-- GPU kernel timeline with gaps -->
  <g filter="url(#sk3)">
    <rect x="82" y="280" width="38" height="14" rx="2" fill="#e8a838" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="86" y="291" font-size="7" fill="#2b2b2b">LN1</text>
    <rect x="125" y="280" width="48" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="129" y="291" font-size="7" fill="#2b2b2b">QKV</text>
    <rect x="180" y="280" width="55" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="184" y="291" font-size="7" fill="#2b2b2b">QK^T</text>
    <rect x="242" y="280" width="25" height="14" rx="2" fill="#e57373" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="245" y="291" font-size="7" fill="#2b2b2b">SM</text>
    <rect x="275" y="280" width="45" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="279" y="291" font-size="7" fill="#2b2b2b">PV</text>
    <rect x="328" y="280" width="35" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="332" y="291" font-size="7" fill="#2b2b2b">Out</text>
    <rect x="372" y="280" width="38" height="14" rx="2" fill="#e8a838" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="376" y="291" font-size="7" fill="#2b2b2b">LN2</text>
    <rect x="418" y="280" width="50" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="422" y="291" font-size="7" fill="#2b2b2b">FFN1</text>
    <rect x="476" y="280" width="20" height="14" rx="2" fill="#e57373" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="479" y="291" font-size="7" fill="#2b2b2b">G</text>
    <rect x="504" y="280" width="48" height="14" rx="2" fill="#4a8edb" stroke="#3a3a3a" stroke-width="0.6"/>
    <text x="508" y="291" font-size="7" fill="#2b2b2b">FFN2</text>
  </g>
  <text x="40" y="312" font-size="8" fill="#aaa">gap</text>
  <text x="120" y="312" font-size="8" fill="#aaa">gap</text>
  <text x="236" y="312" font-size="8" fill="#aaa">gap</text>
  <text x="365" y="312" font-size="8" fill="#aaa">gap</text>
  <text x="40" y="328" font-size="9" fill="#666" font-style="italic">↑ kernel 之间的空白 = launch overhead (CPU→GPU 调度延迟)</text>

  <!-- Metrics box -->
  <g filter="url(#sk3)">
    <rect x="30" y="350" width="390" height="50" rx="8" fill="#fff3e0" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="40" y="368" font-size="10" font-weight="bold" fill="#2b2b2b">关键指标</text>
    <text x="40" y="384" font-size="9" fill="#444">Self CUDA: GPU 执行时间 | Self CPU: 调度时间</text>
    <text x="40" y="396" font-size="9" fill="#444"># Calls: 调用次数 | CPU Mem: 内存分配</text>
  </g>
  <g filter="url(#sk3)">
    <rect x="440" y="350" width="390" height="50" rx="8" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="450" y="368" font-size="10" font-weight="bold" fill="#2b2b2b">分析目标</text>
    <text x="450" y="384" font-size="9" fill="#444">① 按 Self CUDA 排序找 top3 算子</text>
    <text x="450" y="396" font-size="9" fill="#444">② 观察 gap 判断 launch overhead</text>
  </g>

  <defs>
    <marker id="ar3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
</svg>
