<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk5" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
  </defs>
  <rect width="860" height="500" fill="#fdfcf7"/>
  <text x="430" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">Decode 为什么是 Memory-bound：M=1 的 GEMM</text>
  <path d="M 200 40 Q 430 48 660 40" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk5)"/>

  <!-- Prefill GEMM -->
  <g filter="url(#sk5)">
    <rect x="30" y="64" width="380" height="200" rx="12" fill="#e8f5e9" stroke="#3a3a3a" stroke-width="1.8"/>
    <text x="220" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Prefill: QKV GEMM (M=N=1024)</text>
  </g>
  <!-- Matrix visualization -->
  <g filter="url(#sk5)">
    <rect x="50" y="100" width="80" height="80" rx="4" fill="#4a8edb" opacity="0.5" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="90" y="145" text-anchor="middle" font-size="11" fill="#2b2b2b">x</text>
    <text x="90" y="195" text-anchor="middle" font-size="9" fill="#666">(1024, 512)</text>
  </g>
  <text x="140" y="145" font-size="16" fill="#3a3a3a">×</text>
  <g filter="url(#sk5)">
    <rect x="160" y="100" width="80" height="80" rx="4" fill="#e8a838" opacity="0.5" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="200" y="145" text-anchor="middle" font-size="11" fill="#2b2b2b">W</text>
    <text x="200" y="195" text-anchor="middle" font-size="9" fill="#666">(512, 1536)</text>
  </g>
  <text x="250" y="145" font-size="16" fill="#3a3a3a">=</text>
  <g filter="url(#sk5)">
    <rect x="270" y="100" width="80" height="80" rx="4" fill="#4a9d5f" opacity="0.5" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="310" y="145" text-anchor="middle" font-size="11" fill="#2b2b2b">QKV</text>
    <text x="310" y="195" text-anchor="middle" font-size="9" fill="#666">(1024, 1536)</text>
  </g>
  <text x="50" y="230" font-size="10" fill="#444">FLOPs = 2×1024×512×1536 ≈ 1.6G</text>
  <text x="50" y="248" font-size="10" fill="#444">Bytes = 1024×512 + 512×1536 ≈ 1.3M</text>
  <text x="50" y="266" font-size="10" fill="#4a8edb" font-weight="bold">AI ≈ 384 FLOP/Byte → Compute-bound ✓</text>

  <!-- Decode GEMM -->
  <g filter="url(#sk5)">
    <rect x="450" y="64" width="380" height="200" rx="12" fill="#fce4ec" stroke="#3a3a3a" stroke-width="1.8"/>
    <text x="640" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Decode: QKV GEMM (M=1)</text>
  </g>
  <!-- Matrix visualization - tiny x -->
  <g filter="url(#sk5)">
    <rect x="480" y="130" width="12" height="8" rx="2" fill="#4a8edb" opacity="0.7" stroke="#3a3a3a" stroke-width="1"/>
    <text x="486" y="155" text-anchor="middle" font-size="9" fill="#666">(1, 512)</text>
  </g>
  <text x="500" y="138" font-size="14" fill="#3a3a3a">×</text>
  <g filter="url(#sk5)">
    <rect x="520" y="100" width="80" height="80" rx="4" fill="#e8a838" opacity="0.5" stroke="#3a3a3a" stroke-width="1.2"/>
    <text x="560" y="145" text-anchor="middle" font-size="11" fill="#2b2b2b">W</text>
    <text x="560" y="195" text-anchor="middle" font-size="9" fill="#666">(512, 1536)</text>
  </g>
  <text x="610" y="138" font-size="14" fill="#3a3a3a">=</text>
  <g filter="url(#sk5)">
    <rect x="630" y="130" width="20" height="8" rx="2" fill="#4a9d5f" opacity="0.7" stroke="#3a3a3a" stroke-width="1"/>
    <text x="640" y="155" text-anchor="middle" font-size="9" fill="#666">(1, 1536)</text>
  </g>
  <text x="480" y="230" font-size="10" fill="#444">FLOPs = 2×1×512×1536 ≈ 1.6M</text>
  <text x="480" y="248" font-size="10" fill="#444">Bytes = 1×512 + 512×1536 ≈ 0.8M</text>
  <text x="480" y="266" font-size="10" fill="#e57373" font-weight="bold">AI ≈ 2 FLOP/Byte → Memory-bound ✗</text>

  <!-- Ridge line -->
  <g filter="url(#sk5)">
    <rect x="30" y="290" width="800" height="180" rx="12" fill="#fff3e0" stroke="#3a3a3a" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="430" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b2b2b">Ridge Point 对比 (A100: ~12.6 FLOP/Byte)</text>
  </g>

  <!-- Number line -->
  <g filter="url(#sk5)">
    <line x1="60" y1="370" x2="800" y2="370" stroke="#3a3a3a" stroke-width="2"/>
  </g>
  <text x="60" y="390" font-size="9" fill="#666">0</text>
  <text x="200" y="390" font-size="9" fill="#666">2</text>
  <text x="400" y="390" font-size="9" fill="#666">12.6</text>
  <text x="700" y="390" font-size="9" fill="#666">384</text>

  <!-- Ridge point marker -->
  <g filter="url(#sk5)">
    <line x1="400" y1="356" x2="400" y2="384" stroke="#e57373" stroke-width="2"/>
    <text x="400" y="350" text-anchor="middle" font-size="9" fill="#e57373" font-weight="bold">Ridge</text>
  </g>

  <!-- Decode marker -->
  <g filter="url(#sk5)">
    <circle cx="200" cy="370" r="8" fill="#e57373" stroke="#3a3a3a" stroke-width="1"/>
    <text x="200" y="410" text-anchor="middle" font-size="10" fill="#e57373" font-weight="bold">Decode AI≈2</text>
    <text x="200" y="424" text-anchor="middle" font-size="9" fill="#666">Memory-bound</text>
  </g>

  <!-- Softmax/LN marker -->
  <g filter="url(#sk5)">
    <circle cx="100" cy="370" r="8" fill="#e8a838" stroke="#3a3a3a" stroke-width="1"/>
    <text x="100" y="410" text-anchor="middle" font-size="9" fill="#e8a838" font-weight="bold">Softmax AI≈0.4</text>
  </g>

  <!-- Prefill marker -->
  <g filter="url(#sk5)">
    <circle cx="700" cy="370" r="8" fill="#4a9d5f" stroke="#3a3a3a" stroke-width="1"/>
    <text x="700" y="410" text-anchor="middle" font-size="10" fill="#4a9d5f" font-weight="bold">Prefill AI≈384</text>
    <text x="700" y="424" text-anchor="middle" font-size="9" fill="#666">Compute-bound</text>
  </g>

  <!-- Zone labels -->
  <text x="220" y="446" font-size="10" fill="#e57373" font-style="italic">← Memory-bound 区间</text>
  <text x="520" y="446" font-size="10" fill="#4a9d5f" font-style="italic">Compute-bound 区间 →</text>
</svg>
