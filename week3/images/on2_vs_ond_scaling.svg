<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="'Comic Sans MS','Marker Felt','Segoe UI',cursive">
  <defs>
    <filter id="sk" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="18" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8"/>
    </filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3a3a3a"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#fdfcf7"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#2b2b2b">O(N²) vs O(Nd)：HBM IO 随序列长度增长</text>
  <path d="M 270 42 Q 450 50 630 42" stroke="#2b2b2b" stroke-width="1.5" fill="none" filter="url(#sk)"/>

  <!-- Axes -->
  <!-- Y axis -->
  <path d="M 100 460 L 100 80" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="60" y="270" font-size="12" fill="#444" transform="rotate(-90 60 270)">HBM IO (MB, log scale)</text>
  <!-- X axis -->
  <path d="M 100 460 L 820 460" stroke="#3a3a3a" stroke-width="1.6" fill="none" marker-end="url(#ar)" filter="url(#sk)"/>
  <text x="460" y="490" text-anchor="middle" font-size="12" fill="#444">序列长度 N（d=64, FP32）</text>

  <!-- Y axis ticks (log) -->
  <g font-size="9" fill="#888">
    <text x="92" y="464" text-anchor="end">0.1</text>
    <text x="92" y="404" text-anchor="end">1</text>
    <text x="92" y="344" text-anchor="end">10</text>
    <text x="92" y="284" text-anchor="end">100</text>
    <text x="92" y="224" text-anchor="end">1000</text>
    <text x="92" y="164" text-anchor="end">10000</text>
  </g>
  <!-- grid lines -->
  <g stroke="#e8e4d8" stroke-width="0.8" filter="url(#sk)">
    <line x1="100" y1="400" x2="820" y2="400"/>
    <line x1="100" y1="340" x2="820" y2="340"/>
    <line x1="100" y1="280" x2="820" y2="280"/>
    <line x1="100" y1="220" x2="820" y2="220"/>
    <line x1="100" y1="160" x2="820" y2="160"/>
  </g>

  <!-- X positions for N=1024,2048,4096,8192,16384 -->
  <!-- map: 100 + (log2(N)-10)*80 -->
  <!-- N=1024 -> x=100, 2048 -> 180, 4096 -> 260, 8192 -> 340, 16384 -> 420 -->
  <g font-size="10" fill="#888">
    <text x="100" y="478" text-anchor="middle">1024</text>
    <text x="180" y="478" text-anchor="middle">2048</text>
    <text x="260" y="478" text-anchor="middle">4096</text>
    <text x="340" y="478" text-anchor="middle">8192</text>
    <text x="420" y="478" text-anchor="middle">16384</text>
  </g>

  <!-- O(N²) curve (standard attention): 4N²×4B in MB -->
  <!-- N=1024: 4MB -> y=400; 2048: 16MB -> 340; 4096: 64MB -> 280; 8192: 256MB -> 220; 16384: 1024MB -> 160 -->
  <path d="M 100 400 Q 140 370 180 340 Q 220 310 260 280 Q 300 250 340 220 Q 380 190 420 160"
        stroke="#b03a3a" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <g fill="#b03a3a" filter="url(#sk)">
    <circle cx="100" cy="400" r="5"/>
    <circle cx="180" cy="340" r="5"/>
    <circle cx="260" cy="280" r="5"/>
    <circle cx="340" cy="220" r="5"/>
    <circle cx="420" cy="160" r="5"/>
  </g>

  <!-- O(Nd) curve (FlashAttention): 4Nd×4B in MB -->
  <!-- N=1024: 0.25MB -> ~430; 2048: 0.5MB -> 412; 4096: 1MB -> 400; 8192: 2MB -> 388; 16384: 4MB -> 376 -->
  <path d="M 100 430 Q 140 421 180 412 Q 220 406 260 400 Q 300 394 340 388 Q 380 382 420 376"
        stroke="#4a8e4a" stroke-width="2.4" fill="none" filter="url(#sk)"/>
  <g fill="#4a8e4a" filter="url(#sk)">
    <circle cx="100" cy="430" r="5"/>
    <circle cx="180" cy="412" r="5"/>
    <circle cx="260" cy="400" r="5"/>
    <circle cx="340" cy="388" r="5"/>
    <circle cx="420" cy="376" r="5"/>
  </g>

  <!-- annotations on O(N²) points -->
  <g font-size="9" fill="#7a2828">
    <text x="108" y="396">4 MB</text>
    <text x="188" y="336">16 MB</text>
    <text x="268" y="276">64 MB</text>
    <text x="348" y="216">256 MB</text>
    <text x="428" y="156">1 GB</text>
  </g>
  <!-- annotations on O(Nd) points -->
  <g font-size="9" fill="#2e6e2e">
    <text x="108" y="444">0.25 MB</text>
    <text x="188" y="426">0.5 MB</text>
    <text x="268" y="414">1 MB</text>
    <text x="348" y="402">2 MB</text>
    <text x="428" y="390">4 MB</text>
  </g>

  <!-- gap annotations -->
  <path d="M 260 280 L 260 400" stroke="#888" stroke-width="1" stroke-dasharray="3 3" fill="none" filter="url(#sk)"/>
  <text x="270" y="345" font-size="10" fill="#888" font-style="italic">64x ↑</text>
  <path d="M 420 160 L 420 376" stroke="#888" stroke-width="1" stroke-dasharray="3 3" fill="none" filter="url(#sk)"/>
  <text x="430" y="280" font-size="10" fill="#888" font-style="italic">256x ↑</text>

  <!-- legend -->
  <g filter="url(#sk)">
    <rect x="500" y="100" width="300" height="100" rx="8" fill="#fffdf3" stroke="#9e9e9e" stroke-width="1.2"/>
  </g>
  <line x1="515" y1="124" x2="555" y2="124" stroke="#b03a3a" stroke-width="2.4"/>
  <text x="565" y="128" font-size="11" fill="#2b2b2b">标准 Attention O(N²)</text>
  <line x1="515" y1="150" x2="555" y2="150" stroke="#4a8e4a" stroke-width="2.4"/>
  <text x="565" y="154" font-size="11" fill="#2b2b2b">FlashAttention O(Nd)</text>
  <text x="515" y="180" font-size="10" fill="#666">N 翻倍：O(N²) 变 4x，O(Nd) 变 2x</text>

  <!-- conclusion box -->
  <g filter="url(#sk)">
    <rect x="500" y="220" width="300" height="90" rx="8" fill="#eaf6ee" stroke="#4a8e4a" stroke-width="1.3"/>
  </g>
  <text x="650" y="244" text-anchor="middle" font-size="12" fill="#2e6e2e" font-weight="bold">长序列下差距爆炸</text>
  <text x="515" y="266" font-size="11" fill="#444">N=4096：64 MB vs 1 MB → 64x</text>
  <text x="515" y="284" font-size="11" fill="#444">N=16384：1 GB vs 4 MB → 256x</text>
  <text x="515" y="302" font-size="10" fill="#888">N 越大，FlashAttention 优势越明显</text>

  <!-- OOM warning -->
  <g filter="url(#sk)">
    <rect x="500" y="330" width="300" height="70" rx="8" fill="#fdecec" stroke="#b03a3a" stroke-width="1.3"/>
  </g>
  <text x="650" y="354" text-anchor="middle" font-size="12" fill="#b03a3a" font-weight="bold">⚠ OOM 风险</text>
  <text x="515" y="376" font-size="11" fill="#7a2828">N=65536 时 S/P = 16 GB</text>
  <text x="515" y="392" font-size="11" fill="#7a2828">直接超出 HBM 容量</text>
</svg>
